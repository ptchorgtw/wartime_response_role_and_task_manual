流」</strong>具體處置作為：</p>\n<p>一、 後勤部長 L0（總務部部長 許慧莉）：最高後勤指揮與關鍵資源重分配</p>\n<ol>\n<li>\n<p><strong>迅速開設後勤協配中樞與人員到位</strong>： 部長第一時間進駐地下前進指揮所（開設於恩慈大樓 B1 會議室），召集 L1、L2 幹部就位，啟動「後勤支援關聯圖與 72 小時物資／能源支援計畫」。</p>\n</li>\n<li>\n<p><strong>與工務、資訊室緊急會商，宣告維生資源「負載卸除與節流優先序」</strong>： 機電棟與核心機房若受損，可能引發全院大停電或系統大當機。L0 會同設施運作組（工務室）立即手動強制執行冷酷的<strong>「電力負載卸除（Load Shedding）」</strong>與資源配給優先序： -   <strong>切斷非必要電力</strong>：強制切斷全院行政辦公區、一般病房、冷氣空調、景觀照明及 80% 的電梯迴路。 -   <strong>電力死守紅區</strong>：將緊急發電機僅存的寶貴柴油電力，百分之百死守在 B1 的臨時開刀房（韓偉 B1 腹膜透析室）、臨時 ICU（約翰／馬可 B1 資材組前方）、急診室急救區、資訊伺服器機房與血庫冰箱。</p>\n</li>\n<li>\n<p><strong>協助指揮官（院長）進行「外部聯防」物資及水源調度</strong>： 若盤點發現戰略物資、自來水或救護車運輸量能因攻擊出現缺口，後勤部長迅速向統籌呈報組（危管會）提交精確的「72小時物資與維生缺口清冊」，並透過聯絡官（黃雅芳行政副院長）向屏東縣衛生局、高屏區 EOC 或國軍請求緊急消防水車、醫療耗材與藥物運補。</p>\n</li>\n</ol>\n<p>二、 勤務組 L1（醫勤室主任 吳哲維）：水、電、通訊命脈緊急防禦節流</p>\n<p>勤務主管 L1\n須統籌事務組、運輸組與營養室，針對毒化水源威脅與通訊癱瘓展開極限應變：</p>\n<ol>\n<li>\n<p><strong>頂樓水塔化學投毒之「分段隔離與地下水互補」緊急處置</strong>： -   <strong>分段、分區關閉洩漏（物理隔離）</strong>：配合工務人員，勤務組立即奔赴頂樓，<strong>強制關閉受污染水塔的輸出管道閥門</strong>，實施物理隔離，防止任何化學毒水下滲流入透析中心、開刀房等重症耗水區。 -   <strong>啟用地下戰備水塔供水系統</strong>：立即啟動院內地下水塔互補供水，並精算「水資源紅區管制」下（僅供開刀房刷手、器械基本消毒及重症維生飲用；嚴禁一般盥洗）的剩餘水量天數。 -   <strong>手動封閉洗手間並發放「化學便器袋」</strong>：手動鎖死全院一般洗手間，嚴禁沖馬桶與常規水龍頭盥洗；勤務組迅速組織人員，向各病房及地下避難空間發放酒精乾洗手液與<strong>「化學便器袋（替代馬桶）」</strong>，實施極限防禦節流。</p>\n</li>\n<li>\n<p><strong>斷網斷通訊下之「異質性戰術通訊網」部署</strong>： -   <strong>發配專屬無線電</strong>：立即檢查並將全院無線電對講機發配給地下指揮官、B1 各替代醫療區負責人與工務搶修團隊，提供獨立雙向通訊。 -   <strong>啟動「徒步傳令兵（Runner）制度」</strong>：調派體能良好、熟悉院區動線的行政人員或志工穿著螢光反光背心、配戴專屬臂章。採用嚴格的「口令覆誦」與「紙本簽收簿」方式，徒步穿梭於 4F 檢驗科、馬太 B1 藥庫、B1 臨時手術室與地下指揮所間。精準遞送手工開立的緊急醫囑、配血單、藥單與災情報告，徹底阻絕電磁干擾或網路當機對決策的癱瘓。</p>\n</li>\n<li>\n<p><strong>大當機下無電梯之「無動力垂直轉運」支援</strong>： -   <strong>載具徵用</strong>：迅速在急診待命區、護理部前廳及指定集合點盤點並集中院內救護車推床、輪椅、擔架，以及護理站預備之<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>。 -   <strong>投入人工垂直搬運</strong>：調派勤務組內非醫療同工（保全、清潔、志工、行政）奔赴火線，協助護理人員採取「5 人一組（4 人搬運、1 人照護）」的人工接力搬運方式，沿內側安全安全梯，將高脆弱區之重症病患、維生設備垂直疏散轉運至最安全的 <strong>B1 地下備援醫療空間</strong>。</p>\n</li>\n<li>\n<p><strong>停電停水下之「孤島膳食與飲水維持」</strong>： -   <strong>3\\~7天戰備存糧盤點與動用</strong>：會同營養室（徐桂婷組長）動用儲備之緊急乾糧、應急口糧及備用礦泉水；若大連院區廚房電力受限無法烹調，第一優先協調本院 7-11 便利商店支援供糧，確保搶修人員、安防警衛、留守醫護與在院病患之基本生理能量。</p>\n</li>\n</ol>\n<p>三、 任務支援組 L2（資材組組長 吳佳蓉 /\n鄭酪緯）：戰略物資地下物理防護與「防滲透」管制</p>\n<p>任務支援主管 L2\n須主導關鍵藥衛材、防護裝備的保全、分發，並配合安全管制組（保安組）執行嚴格的人員身分辨識：</p>\n<ol>\n<li>\n<p><strong>戰備物資地下化、集中保管與物理加固</strong>： -   <strong>物資撤離地表</strong>：為防範暴民搶奪或敌特二次蓄意破壞，資材組同仁必須立即將儲存在高脆弱區域的重要藥品、衛材、非醫療防護設備，轉移並集結於結構最安全、最深層的地下據點------<strong>「約翰／馬可大樓 B1 資材室」「馬太大樓 B1 藥庫」</strong>。 -   <strong>地下物資庫房上鎖與防護</strong>：馬太 B1 藥房與藥庫冰箱實施高強度門禁管制，並配合安全管制組增設雙人武裝/防暴裝備巡邏哨看守，防止不法份子滲透搶奪麻醉藥品或抗生素。</p>\n</li>\n<li>\n<p><strong>防範第五縱隊滲透之「召回人員與志工安全辨識」</strong>： -   敵方特工採取「喬裝外包維修人員」之手段進行滲透，代表戰時極可能有機密外洩或敵特偽裝混入的風險。 -   <strong>召回與志工身分極限查核</strong>：在護理部前廳（或預備集合區）進行人員集結時，人資與資材組須實施極其嚴格的身分辨識、金屬探測與隨身行李武器搜查，嚴防在地協力者（第五縱隊）偽裝混入。 -   <strong>發配專屬螢光識別背心（或防偽臂章）</strong>：所有核實身分之召回員工與合法志工，必須配發並隨時穿戴<strong>「專屬螢光識別背心」與「 HICS 任務卡」</strong>，未配戴者一律視為入侵可疑份子，由保安哨即刻攔查並武裝壓制。</p>\n</li>\n<li>\n<p><strong>戰略藥衛材之「推拉式物流（Push Logistics / 主動盲派）」</strong>： -   當 HIS 醫療系統與電話因機房火災或駭客攻擊而全黑時，各醫療區無法使用電子請領單（Pull）。 -   資材人員不待前線申請，立即將預先打包備妥之標準化<strong>「戰傷急救箱 (Trauma Go-Kits)」</strong>（內含 CAT 戰術止血帶、骨內血管通路 IO 針、含止血劑紗布、廣效抗生素、林格氏液及 Ketamine 鎮痛劑）裝上推車，主動、盲派（Push）推送至急診紅區與韓偉 B1 臨時手術室門口，確保前線醫護伸手就能拿到救命物資，子彈永遠不斷。</p>\n</li>\n<li>\n<p><strong>開設地下「員工專屬庇護站」與身心照護（戰力保存）</strong>： -   <strong>庇護站物理隔斷</strong>：L2 須於地下最安全、最深層之區域（如恩慈 2F 員工運動中心）設立<strong>「員工專屬庇護站」</strong>，提供行軍床、飲水、乾糧與絕對安靜（聽不到哀嚎、看不到鮮血）的休息環境。 -   <strong>安排強制輪替與心理急救（PFA）</strong>：協同人資室，針對在機房縱火與投毒威脅下，頂著巨大壓力搶修的水電工務、參與初期壓制歹徒的保安警衛、以及退下火線的醫護同工，強制執行 <strong>12 小時一班的軍事化輪替機制</strong>。時間一到強令撤離火線，並由心理韌性特遣隊在庇護站實施 15 至 30 分鐘之心理「熱除頻（Hot Debriefing）」與心理急救（PFA），保存留守團隊的長期戰力。</p>\n</li>\n</ol>\n<p>四、 災後設施損害控制、勘查與復原歸建（後勤部災後復原作業）</p>\n<ol>\n<li>\n<p><strong>災後損害控制與危險排除（防範二次災害）</strong>： 待特工被武裝警力制服移交、火勢撲滅、化學物質遭環境部毒災隊完成隔離清消後，後勤部協同工務室評估建築物、水塔與機房結構受損狀況，在安全官評估無虞前，<strong>維持地下備用水源（戰備水塔）運作，嚴禁擅自開啟頂樓供水閘門</strong>。</p>\n</li>\n<li>\n<p><strong>損失清查呈報與耗材緊急補充</strong>： -   <strong>陳報損失</strong>：災害現場及相關單位於 3 日內清查人員傷亡及財物損毀（包括機房設備燒毀、水塔污染與消耗物資），由文件紀錄組（P3）彙整列冊陳報院長室。 -   <strong>補充防禦空置</strong>：配合採購小組（F2）緊急聯繫合約廠商，快速補齊消耗的滅火器、防護裝備、備用化學防護衣（PPE）及備用通訊天線，防止防禦空置。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，在面臨大量病患撤離與轉院的極限挑戰下，HICS\n架構中的<strong>後勤部門（Logistics\nSection）</strong>扮演著確保疏散行動不斷鏈的關鍵支撐角色。</p>\n<p>後勤部門由總務部部長擔任<strong>「後勤部長（L0）」</strong>，轄下分為<strong>「勤務組（L1）」</strong>與<strong>「任務支援組（L2）」</strong>，負責統籌全院物資、器材、人力、交通、藥品支援與維生物資調度。其具體因應作為如下：</p>\n<p><strong>一、 啟動緊急運輸調度與設立接運區（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>車輛徵用與調度</strong>：統籌本院所有運輸車輛（包含救護車、中型巴士及行政車輛）的調派作業，安排交通工具協助病人疏散與重置。若院內車輛不足，須配合聯絡官向外部聯合應變中心請求救護車或大眾運輸工具（接駁車）支援。</p>\n</li>\n<li>\n<p><strong>規劃接運疏散區</strong>：配合安全管制組與醫療照護組，建立明確的車輛轉運接駁點，例如：救護車以急診室大門出口為接運疏散區，私人車輛以恩慈大樓旁車道為接運區，接駁車以門診大廳出口為接運區，以分流不同嚴重程度的病患。</p>\n</li>\n</ol>\n<p><strong>二、 集中搬運載具與人力支援（後勤部長 L0 / 勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>集結搬運載具</strong>：迅速盤點並集中院內所有的輪椅、擔架、救護推床與樓梯疏散滑墊（軟擔架），將這些運輸設備統一送至病房區或急診待命區，供前線醫護人員調度使用。</p>\n</li>\n<li>\n<p><strong>投入搬運人力</strong>：在大量病患移出的過程中，總務部等後勤編組人員必須親自投入前線，協助護理人員執行病患的平行轉移或樓梯垂直搬運作業。</p>\n</li>\n</ol>\n<p><strong>三、 整備「隨車醫療物資」與藥品補給（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>戰備物資隨行</strong>：針對被判定為「高度照護」或「一般住院」的轉院病患，任務支援主管（資材與藥庫主管）必須準備足夠量的急救藥物、靜脈輸液、血液製品及相關衛材。這些物資<strong>必須與病人一起運送</strong>到重置區或接收醫院，以避免在轉送過程中或剛抵達接收醫院時，發生醫藥存量短時間內耗竭的致命危機。</p>\n</li>\n<li>\n<p><strong>裝備轉移支援</strong>：協助評估與提供病患離院重置時所必需的醫療裝備（如可攜式生理監視器、氧氣鋼瓶等），確保高風險病患轉運過程的維生需求。</p>\n</li>\n</ol>\n<p><strong>四、 維護疏散行動之通訊韌性（勤務組 L1）</strong>\n在撤離的混亂過程中，通訊暢通是車輛調度與病患交接的命脈。勤務主管須檢查所有手持對內與對外通訊設備，並分配專屬的無線電對講機與頻道給疏散指揮官、車輛調度人員、各樓層及急診轉送區，提供獨立的雙向通訊系統，並隨時向後勤組長報告通訊狀況。</p>\n<p><strong>五、 提供膳食與維生支援（任務支援組 L2 / 營養室）</strong>\n在撤離行動期間，負責為等候撤離的病人、家屬，以及執行高強度疏散與搬運任務的醫療和後勤員工，提供基本的飲用水、乾糧及膳食補給，維持應變人員的體力與病患的基本生理需求。</p>\n<p>高度照護病人如何執行垂直疏散？</p>\n<p>撤離時的「反向檢傷」判斷標準為何？</p>\n<p>如何協調聯防醫院接收轉診病人？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認本院所在區域即將進入「主戰區」，且指揮中心下達啟動\n<strong>HICS 第三階段「全面撤離與量能重置」</strong> 指令時：</p>\n<p>本院 <strong>HICS 後勤部門（Logistics\nSection）將作為整場撤離戰役的「生命線保衛者」與「物資搬遷大本營」</strong>。在<strong>後勤部長\nL0（總務部部長 許慧莉）</strong>的統籌下，協調轄下<strong>勤務組 L1（醫勤室主任\n吳哲維）</strong>與<strong>任務支援組 L2（資材組組長\n吳佳蓉）</strong>，全力協同執行部與計畫部，採取以下<strong>五大生存、保全、轉運與反資敵之具體戰術作為</strong>，確保本院核心醫療量能在戰火迫迫近前有序完成異地轉置：</p>\n<p>一、 後勤部長 L0（總務部部長\n許慧莉）：撤離資源總協配與「反資敵」安全裁決</p>\n<p>後勤部長 L0\n須進駐地下戰時指揮所，啟動全院「72小時物資/能源支援計畫」，並行使最高後勤調配權：</p>\n<ol>\n<li>\n<p><strong>開設「撤離後勤協配中樞」</strong>： -   許慧莉部長第一時間啟動後勤部緊急召回與編組，橫向對接計畫部長 P0（朱淑媛護理副院長），精確掌握當下的「需撤離病人分組 B」與「隨車醫護編組 A」之總量情報。</p>\n</li>\n<li>\n<p><strong>執行最冷酷的「反資敵（Denial of Assets）」封存銷毀指令</strong>： -   針對體積龐大、高度依賴常規電網、且在數小時內「物理上絕對無法搬運移轉」的院內高價值精密醫療資產（如大型中央血液透析機、高階 CT、MRI）。 -   L0 須會同設施運作主管 O2（工務室曹宏益主任） 與機構運作主管 O5（資訊室蔡哲民主任），執行<strong>物理鎖固、手動斷電、中斷維生氣體管線</strong>，並由資通人員執行<strong>硬體關鍵晶片拆卸與高機敏電子病歷硬碟之實體銷毀程序</strong>，防止國家級核心醫療科技與敏感病患個資落入敵手。</p>\n</li>\n<li>\n<p><strong>派遣「異地重置先遣裝設小組」</strong>： -   在主力撤離車隊出發前 1 小時，指派由資深資材人員與水電、資訊工務組成的「先遣裝設小組」，攜帶基本的備援通訊與行政設備，先行奔赴目標接收醫院（如協定之部立屏東醫院、寶建、安泰或屏東榮總）。 -   先遣小組負責於接收端現場辦理物理空間勘查，規建本院移置之「臨時醫療區」，拉設基本水電、通訊並開設物資接收點，確保主力抵達後 10 分鐘內可「即刻開診」。</p>\n</li>\n</ol>\n<p>二、 勤務組 L1（醫勤室主任\n吳哲維）：車輛極限徵用、轉運區分流與無動力搬運支援</p>\n<p>勤務主管 L1 須統籌運輸組、事務組與營養室，死守轉運過程之交通與安全防線：</p>\n<ol>\n<li>\n<p><strong>車輛極限動員與「車牌編碼登記」</strong>： -   吳哲維主任立即清點並動員院內所有的運輸能量：<strong>現有救護車共 4 輛</strong>、<strong>行政運輸中巴（15人座） 4 輛</strong>及 <strong>8人座行政車 6 輛</strong>；並透過聯絡官向聯合應變中心（LJEOC）爭取並接收<strong>外部支援救護車 2 輛</strong>與大眾接駁載具。 -   對所有車輛進行<strong>實體編碼並記錄車牌號碼</strong>，發配由行政/財務部人事組 F1 查核通過之「車隊專屬通行證」，防範敵特滲透破壞。</p>\n</li>\n<li>\n<p><strong>鋼鐵落實「三大接運疏散區」動線絕對分流</strong>： -   為防止上百名病患、隨行醫護與車隊在院外道路發生交岔壅塞與推擠，L1 指派警衛配合安全管制主管 O4（保安組），強制劃定並管制三大接運區： -   <strong>【急診室大門出口（救護車專區）】</strong>：僅允許編碼之簽證救護車停靠，作為重症（高度照護）病患垂直轉移之唯一上車通道。 -   <strong>【恩慈大樓旁車道（私人車專區）】</strong>：管制為「有家屬接送與可扶持安置病患」的快速裝載引導區。 -   <strong>【醫院門診大廳大門出口（接駁車專區）】</strong>：供大眾接駁載具與中巴集結，快速轉運輕症及可返家病患。</p>\n</li>\n<li>\n<p><strong>集中搬運載具與提供無動力垂直轉運體力支援</strong>： -   迅速在急診待命區與護理部前廳，集中全院之輪椅、擔架、推床及護理站預置之<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>。 -   調派勤務組內非臨床同工（保全、事務員、行政人員及合法召回志工），編入搬運小組。 -   配合一線護理人員，嚴格遵循<strong>「5人一組（4人徒步搬運、1人護理照護）」</strong>原則，協助高樓層一般住院與重症病患沿安全梯，安全垂直轉移至地面的車輛接運區。</p>\n</li>\n<li>\n<p><strong>斷網癱瘓下之「異質戰術通訊與徒步傳令（Runner）」不中斷維持</strong>： -   分發獨立頻道之 UHF/VHF 無線電對講機給車隊隊長、轉運區負責人與指揮所。 -   啟動「徒步傳令兵（Runner）」制度，派員穿著專屬螢光背心、配戴防偽臂章，持<strong>實體簽收簿（Logbook）</strong>，以人工口令覆誦方式傳遞最核心的車輛調度、傷亡登記與指揮官變更指令。</p>\n</li>\n</ol>\n<p>三、 任務支援組 L2（資材組長\n吳佳蓉）：戰略物資「打包編碼」與「人藥一對一隨行」保全</p>\n<p>任務支援主管 L2\n須主導關鍵藥衛材、防護裝備的保全、分發，並徹底推行戰鬥化物流：</p>\n<ol>\n<li>\n<p><strong>戰略藥衛材「打包編碼（Tagging &amp; Numbering）」與清點裝車</strong>： -   資材與藥庫人員必須在 2 小時內，將儲存在馬太 B1F 藥庫 與約翰/馬可 B1 資材室 的戰略救命物資打包裝入<strong>防潮防水資料箱</strong>。 -   將救命之「戰傷急救箱（Go-Kits）」、抗生素、破傷風疫苗、大量林格氏液 及備用血液製品，進行<strong>戰時特殊分類編碼列冊</strong>。 -   按編碼順序裝入專用運輸貨車（由 L2 指派專人隨車保管），確保到達異地重置醫療點後 10 分鐘內可完成開箱調劑。</p>\n</li>\n<li>\n<p><strong>冷酷推行「人藥一對一隨行配對」</strong>： -   在病患移入轉運車輛前，資材組與病房書記、護理同工配合，將病患專屬之 72 小時口服/注射用藥，連同其原有之手寫紙本「轉診單、紙本病歷摘要、用藥處方箋」，一同放入<strong>密封防水夾鏈袋，強制物理綁定於病患之擔架或推床旁</strong>。 -   L2 人員嚴格核對上車，確保「人藥一對一隨行、藥隨人走」，徹底防範重症或臥床病患在抵達接收醫院時發生醫療資訊斷鏈或無藥可用的致命疏失。</p>\n</li>\n<li>\n<p><strong>關鍵小型救命儀器之拆裝打包</strong>： -   協同醫工組（O2 設施運作組），在高度照護重症病患上車前 1 小時，將病患隨行必需之可攜式蓄電池呼吸器、床邊生理監視器與點滴幫浦迅速自原病房安全拆裝。 -   貼上「屏基大連院區財產識別標籤」與「病患配對名條」，固定於轉運車內隨車移出。</p>\n</li>\n</ol>\n<p>四、 膳食與維生組（營養室組長 徐桂婷）：轉運與孤島期「食水即戰力」保障</p>\n<p>營養室組長徐桂婷隸屬於 L1\n勤務組，協同後勤物資與維生組，負責極限膳食維持：</p>\n<ol>\n<li>\n<p><strong>3 至 7 天戰備膳食與飲水極速配發</strong>： -   動用庫存之緊急乾糧、應急口糧與瓶裝礦泉水。 -   在病患與員工上車前，後勤人員必須向每位疏散病患、隨車醫護、行政傳令兵及車隊司機，<strong>發放至少 2 至 3 日份之生存基本食水資料袋</strong>，保障轉運途中在途時間的最低生理維生。</p>\n</li>\n<li>\n<p><strong>對接外部合約商家與 7-11 進行物資外置</strong>： -   若大連院區廚房設施或供電受阻，營養組配合採購小組（F2），立即<strong>聯繫院內 7-11 便利商店或周邊在地合約商家（如嘉軒美食）</strong>，進行膳食緊急外購與調撥 ，並預劃將部分維生口糧直接運往異地接收重置點存放。</p>\n</li>\n</ol>\n<p>五、 撤離後現場安全監控、犯罪现场保全與損失呈報（後勤部收尾工作）</p>\n<ol>\n<li>\n<p><strong>安全官與保安組死守火線至最後一刻</strong>： -   在全院撤離的最後階段，後勤部長 L0 配合安全官，指揮保安人員死守監控系統。 -   若發生局部建築受空襲損壞，工務人員負責切斷受災區的水電氣迴路防範二次災害。 -   保安人員持防暴盾牌死守唯一武裝哨口，直至最後一輛簽證救護車駛離院區。</p>\n</li>\n<li>\n<p><strong>損失列冊陳報（災後3日內）</strong>： -   撤離行動完成後，後勤部長須於 3 日內，召集勤務、任務支援組及工務、資材，針對本次預防性撤離中所消耗的維生器材、滅火器材、防護防暴耗材、破損設施、以及打包移轉與封存之資產進行<strong>「災變損失與物資消耗清單彙整」</strong>。 -   呈交計畫部文件紀錄組（P3），以利院長室向衛福部、地方衛生局及保險公司辦理災損理賠及後續重建預算籌措。</p>\n</li>\n</ol>"}]}, {"role": "財務/行政部門（Finance/Administration Section）", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，接獲主管機關要求限時回報各項量能並進入戰時醫療整備之指令後，<strong>行政/財務部（Finance/Administration\nSection）</strong>在\nHICS（醫院事故指揮系統）中扮演穩定醫院營運、資金調度、人力召募與物資行政採購支援的關鍵後盾。其具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌「行政/財務部」指揮權</strong></p>\n<ol>\n<li>\n<p><strong>成立行政/財務部</strong>：由管理部部長擔任 HICS\n    編組下的<strong>「行政/財務部長（F0）」</strong>。</p>\n</li>\n<li>\n<p><strong>統籌應變業務</strong>：行政/財務部長負責統籌緊急應變所需之財務、預算、行政、採購、保險、法律及紀錄等工作，並全面監督財務管理及資金進出的業務，確保醫院戰時醫療整備有充足的經費與行政資源作為後盾。</p>\n</li>\n</ol>\n<p><strong>二、 執行人力盤點與召回調度（對接主管機關「人力」量能回報）</strong></p>\n<ol>\n<li>\n<p><strong>盤點與動員人力</strong>：由人力資源室主任擔任轄下的<strong>「人事小組長（F1）」</strong>。人事小組負責協調全院人員的召回機制、輪替班表，以及志工與支援人力的集合調度。</p>\n</li>\n<li>\n<p><strong>對接量能回報與前線支援</strong>：人事小組須精確掌握全院現有與可動員之人力數據，協調招募員工及志工至人力集合點，並儲備足夠的醫療及非醫療人員以供「待命區管理者」調度運用，確保前線有必要的人員輪替。相關人力盤點數據也須對接給統籌呈報組（危管會）及計畫部，以利於時限內向主管機關完成「人力」量能的呈報。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與供應鏈聯繫（對接「藥材、醫療氣體」量能整備）</strong></p>\n<ol>\n<li>\n<p><strong>執行緊急採購</strong>：由採購室主任擔任轄下的<strong>「採購小組長（F2）」</strong>。負責辦理戰時應變期間所需的各項緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>確保戰備物資供應鏈</strong>：針對主管機關要求回報的醫療氣體與藥材等物資，採購小組必須立即聯繫現有供應商與<strong>替代供應商</strong>，協調廠商緊急調度所需要的資材。透過建立多元供應管道，協助後勤部彌補戰略物資的缺口。</p>\n</li>\n</ol>\n<p><strong>四、 啟動緊急經費調度與法務支援</strong></p>\n<ol>\n<li>\n<p><strong>經費調度與加班結算</strong>：由會計室主任擔任轄下的<strong>「會計小組長（F4）」</strong>。負責辦理緊急災變必要之經費調度、各項應變費用支付，並確實記錄災變期間員工的出勤、差假、加班給與及財務狀況。</p>\n</li>\n<li>\n<p><strong>法務與保密工作</strong>：由職安室主任擔任轄下的<strong>「法律訴求小組長（F3）」</strong>。負責協助處理災時可能產生的法務問題、申訴，並接受與調查所有損害賠償之申請，同時須確保演習與戰時機密資料的保密工作。</p>\n</li>\n</ol>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」等複合性危機，急診與醫療前線面臨極大的人力與物資耗損。在\nHICS（醫院事故指揮系統）架構下，<strong>行政/財務部門（Finance/Administration\nSection）</strong>作為穩定醫院營運與後勤支援的關鍵後盾，須迅速啟動以下具體因應作為：</p>\n<p><strong>一、 統籌行政與財務應變指揮（行政/財務部長）</strong></p>\n<ol>\n<li>\n<p><strong>接掌指揮權：</strong>\n    由管理部部長擔任行政/財務部長（F0），統籌緊急應變所需之預算、行政、採購、保險、法律及紀錄等工作。</p>\n</li>\n<li>\n<p><strong>監督資金與行政支援：</strong>\n    全面監督財務管理及資金進出業務，確保前線應對大量傷患與恐慌人潮時，擁有充足的經費與行政資源作為後盾。</p>\n</li>\n</ol>\n<p><strong>二、 啟動緊急人力召回與輪替（人事小組）</strong>\n面對急診癱瘓危機，前線急需大量醫療與行政人力支援：</p>\n<ol>\n<li>\n<p><strong>執行緊急召回：</strong>\n    由人資室主任擔任人事小組長（F1），立即協調全院人員的召回機制，並啟動志工與外部支援人力的集合調度。</p>\n</li>\n<li>\n<p><strong>調派人力至待命區：</strong>\n    將召回之醫師、護理師、保全與行政人員，迅速派往「待命區（由行政支援中心管理）」，以供執行部調度至急診檢傷區、戶外領藥區或家屬安置區進行支援。</p>\n</li>\n<li>\n<p><strong>安排強制輪替班表：</strong>\n    針對面臨極大壓力的急診前線人員，規劃與協調足夠的輪替班表，避免醫護人員因過度負荷而發生戰鬥疲勞或崩潰。</p>\n</li>\n</ol>\n<p><strong>三、 執行緊急採購與供應商調度（採購小組）</strong>\n針對民眾搶購慢性病藥品及交通事故造成急救耗材大量消耗：</p>\n<ol>\n<li>\n<p><strong>啟動物資緊急調用：</strong>\n    由採購室主任擔任採購小組長（F2），立即辦理戰時或災變期間所需的各項緊急採購。</p>\n</li>\n<li>\n<p><strong>聯繫替代供應商：</strong>\n    針對庫存告急的慢性病藥物及戰傷急救耗材，迅速聯繫現有供應商與替代供應鏈，協調廠商緊急調度並加速運補，以彌補後勤物資缺口。</p>\n</li>\n</ol>\n<p><strong>四、 處理申訴與醫療爭議（法律訴求小組）</strong>\n面對家屬因無法提早領藥或被拒絕住院（因反向檢傷）而產生的不滿與恐慌：</p>\n<ol>\n<li>\n<p><strong>協助法務與申訴處理：</strong>\n    由職安室主任擔任法律訴求小組長（F3），協助處理災時可能產生的法務問題、家屬申訴及潛在的醫療糾紛。</p>\n</li>\n<li>\n<p><strong>損害求償調查：</strong>\n    若恐慌群眾在急診引發暴力滋擾，導致人員受傷或設備毀損，法律訴求小組須接受並調查所有損害賠償之申請，保障醫院與員工的合法權益。</p>\n</li>\n</ol>\n<p><strong>五、 緊急經費調度與加班結算（會計小組）</strong></p>\n<ol>\n<li>\n<p><strong>確保緊急資金：</strong>\n    由會計室主任擔任會計小組長（F4），辦理緊急災變必要之經費調度與各項應變費用支付，確保採購與後勤調度不受資金卡關影響。</p>\n</li>\n<li>\n<p><strong>記錄員工出勤與財務：</strong>\n    確實記錄災變期間所有被召回與留守加班員工的出勤、差假與加班給與，並維持醫院財務狀況之正確紀錄。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息及掛號、批價、藥局、檢驗或影像系統出現延遲」，此危機涉及假訊息引發的恐慌以及醫療資訊系統大當機（疑似遭受資安攻擊）。在\nHICS（醫院事故指揮系統）架構下，<strong>行政/財務部（Finance/Administration\nSection）</strong>由管理部部長擔任行政/財務部長（F0），負責全面監督財務管理及資金進出業務，並統籌緊急應變所需之預算、行政、採購、保險、法律及紀錄等工作，為前線切換至無網作業提供後盾。</p>\n<p>其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 人事小組（F1 / 人力資源室主任擔任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急人力召回與調度</strong>：因應各項資訊系統延遲或癱瘓，醫療前線必須全面啟動「紙本降級（Downtime）」與離線人工作業，人事小組須立即協調人員召回機制，並協調招募員工及志工至人力集合點報到。</p>\n</li>\n<li>\n<p><strong>儲備前線人力與強制輪替</strong>：將召回之人力交由「待命區管理者」調度，儲備足夠的醫療與非醫療人員以支援前線繁重的人工掛號、批價與擔任「傳令兵（Runner）」傳遞紙本醫囑。同時須安排必要的人員強制輪替，避免員工因高壓作業而過勞。</p>\n</li>\n</ol>\n<p><strong>二、 採購小組（F2 / 採購室主任擔任）</strong></p>\n<ol>\n<li>\n<p><strong>啟動緊急採購與物資調用</strong>：針對假訊息（如缺藥）可能引發的民眾搶藥潮，以及系統當機期間無法使用常規電子系統訂貨的困境，採購小組須立即辦理緊急採購與各項行政物資調用。</p>\n</li>\n<li>\n<p><strong>聯繫替代供應商</strong>：迅速聯繫現有及替代供應商，確保在資通訊系統異常時，醫院的關鍵藥品、衛材與紙本表單等資源仍能維持穩定補給。</p>\n</li>\n</ol>\n<p><strong>三、 法律訴求小組（F3 / 職安室主任擔任）</strong></p>\n<ol>\n<li>\n<p><strong>處理醫療爭議與申訴</strong>：面對系統延遲造成的病患久候、醫療處置遞延，以及假訊息（如拒收病人）可能引發的家屬不滿與衝突，法律訴求小組須協助處理法務問題、病人申訴，並接受與調查所有因事件引發的損害賠償申請。</p>\n</li>\n<li>\n<p><strong>確保機密與個資保護</strong>：在疑似遭受資安網路攻擊，且全院大量啟用紙本病歷與手寫檢驗單的混亂期間，必須協助確保病人個資及演習/機密資料的保密工作，防範資料外洩。</p>\n</li>\n</ol>\n<p><strong>四、 會計小組（F4 / 會計室主任擔任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急經費調度與支付</strong>：在批價與帳務系統出現延遲甚至癱瘓的狀況下，會計小組須設法辦理緊急災變必要之經費調度、各項應變費用之支付，確保緊急採購與後勤運作不受資金卡關影響。</p>\n</li>\n<li>\n<p><strong>記錄員工出勤與加班</strong>：確實記錄災變應變期間，所有被召回與留守支援「紙本降級作業」員工的出勤、差假與加班給與，並確保醫院財務與帳務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院瞬間失去了數位運作能力，且面臨嚴重的資安與法律威脅。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，雖然第一線的系統搶修與資安阻斷由資訊室負責，但<strong>財務/行政部門（Finance/Administration\nSection）</strong>是支撐全院切換為「紙本降級（Downtime）」人工作業、應對勒索威脅以及安撫病患衍生糾紛的關鍵後盾。</p>\n<p>由管理部部長擔任的<strong>「行政/財務部長（F0）」</strong>將統籌轄下各小組，其具體因應作為如下：</p>\n<p><strong>一、 統籌行政與財務指揮，堅守拒絕勒索底線（行政/財務部長 F0）</strong></p>\n<ol>\n<li>\n<p><strong>接掌指揮與資金調度</strong>：管理部部長負責全面監督災變期間的財務管理及資金進出業務，統籌緊急應變所需之預算、行政、採購、法律及紀錄等工作。</p>\n</li>\n<li>\n<p><strong>配合指揮官防護政策</strong>：面對境外勢力的勒索贖金要求，配合指揮官與國家關鍵基礎設施（CI）防護原則，統籌法務與財務資源，堅守拒絕向駭客支付贖金的底線，並將資源全力投入於系統備援與紙本降級作業的行政支援。</p>\n</li>\n</ol>\n<p><strong>二、 極限人力召回與支援「紙本降級」作業（人事小組 F1）</strong>\n在系統癱瘓下，所有掛號、批價、開單與病歷調閱皆須轉為極度耗時的人工紙本作業，人力需求將瞬間暴增。由人資室主任擔任的人事小組長（F1）須執行：</p>\n<ol>\n<li>\n<p><strong>緊急人力召回與調度</strong>：立即協調人員召回機制，並招募休假員工、行政人員及志工至人力集合點報到。</p>\n</li>\n<li>\n<p><strong>支援「傳令兵（Runner）」與紙本作業</strong>：將召回之人力交由待命區管理者運用，大量派發至各樓層與急診擔任「傳令兵」，以純人工徒步方式傳遞紙本醫囑、檢驗單與 X 光片，或支援前線繁重的人工掛號與批價作業。</p>\n</li>\n<li>\n<p><strong>強制輪替與戰力保存</strong>：紙本降級作業壓力極大，人事小組須安排必要的人員輪休與強制輪替班表，避免前線同仁因高壓人工作業而過勞。</p>\n</li>\n</ol>\n<p><strong>三、 突破電子採購癱瘓與緊急物資調用（採購小組 F2）</strong>\n由採購室主任擔任的採購小組長（F2），面對無法使用常規 HIS\n與電子採購系統訂貨的困境，須採取以下作為：</p>\n<ol>\n<li>\n<p><strong>啟動紙本與人工採購</strong>：立即改以紙本表單或電話、傳真等方式，辦理各項應變所需之緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>緊急採購備援設備與耗材</strong>：針對當機期間急需的紙本耗材（如三聯式病歷用紙、處方箋、碳粉匣）、緊急通訊設備（如無線電對講機電池）或資訊室搶修所需的備援硬體設備，迅速聯繫替代供應商進行緊急調度。</p>\n</li>\n</ol>\n<p><strong>四、 應對勒索威脅、個資外洩與醫療糾紛（法律訴求小組 F3）</strong>\n由職安室主任擔任的法律訴求小組長（F3），在遭遇勒索軟體與 APT\n攻擊時，面臨極高的法律風險：</p>\n<ol>\n<li>\n<p><strong>資安外洩之法律應對</strong>：針對駭客可能竊取或鎖死電子病歷的威脅，協助院方與檢調機關、資安警察對接，確保在法律框架下進行蒐證與通報，並評估病患個資外洩的潛在法律求償風險。</p>\n</li>\n<li>\n<p><strong>處理醫療爭議與申訴</strong>：系統大當機必然造成病患久候、看診延誤或醫療處置遞延。法律訴求小組須協助前線處理因此引發的家屬不滿、病人申訴，並接受與調查所有因事件衍生的損害賠償申請，防範醫療暴力與糾紛擴大。</p>\n</li>\n<li>\n<p><strong>機密資料保全</strong>：協助確保在大量啟用紙本病歷與手工檢驗單的混亂期間，實體機密資料能落實保密防護，避免二次外洩。</p>\n</li>\n</ol>\n<p><strong>五、 系統癱瘓下的緊急經費調度與超時紀錄（會計小組 F4）</strong>\n由會計室主任擔任的會計小組長（F4），在帳務系統無法連線的狀態下須維持資金運作：</p>\n<ol>\n<li>\n<p><strong>緊急經費支付與手工記帳</strong>：在批價與帳務系統癱瘓下，以手工記帳方式辦理緊急災變必要之經費調度與各項應變費用之支付，確保資訊搶修與緊急採購不受資金卡關影響。</p>\n</li>\n<li>\n<p><strong>加班與出勤紀錄</strong>：確實記錄應變期間所有被召回、留守支援「紙本降級作業」以及資訊室日夜搶修員工的出勤、差假與加班給與，確保員工權益與災後財務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨物資極度匱乏與交通受阻的「孤島效應」危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）</strong>由管理部部長擔任行政/財務部長（F0），負責統籌緊急應變所需之預算、行政、採購、人事、保險、法律及紀錄等工作，為前線撐過物資與人力危機提供堅實後盾。</p>\n<p>其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 人事小組（F1 / 人資室主任擔任）：因應員工到勤受交通影響</strong></p>\n<ol>\n<li>\n<p><strong>就近緊急召回與志工招募</strong>：面對員工因交通受阻無法到勤的人力缺口，人事小組須啟動緊急召回機制，<strong>優先召回居住於屏東市區附近、未受交通阻斷影響的同仁</strong>回院支援。同時協調招募員工及志工至人力集合點報到，以供待命區管理者運用。</p>\n</li>\n<li>\n<p><strong>滯留人力管理與強制輪替</strong>：針對受困院內、無法下班的醫護與行政人員，人事小組須與後勤部協調，儲備足夠的醫療與非醫療人力，並<strong>安排必要的人員強制輪替與休息</strong>，避免前線人員因長期高壓與無法換班而發生戰鬥疲勞。</p>\n</li>\n</ol>\n<p><strong>二、 採購小組（F2 / 採購室主任擔任）：突破物資配送延遲</strong></p>\n<ol>\n<li>\n<p><strong>啟動緊急採購與在地調用</strong>：面對燃油、醫療氣體、藥材、膳食及飲水等常規配送延遲或中斷，採購小組必須立即辦理緊急採購與各項應變物資之調用。</p>\n</li>\n<li>\n<p><strong>緊急聯繫替代供應商</strong>：迅速<strong>聯繫替代供應商或在地廠商</strong>，尋求不受長途交通中斷影響的資源補給（例如就近向本院便利商店或周邊合約廠商調度飲水、膳食），確保醫院的基本維生與醫療物資能維持供給。</p>\n</li>\n</ol>\n<p><strong>三、 會計小組（F4 / 會計室主任擔任）：資金支持與超時紀錄</strong></p>\n<ol>\n<li>\n<p><strong>緊急經費調度與支付</strong>：為了支持採購小組向替代廠商購買緊急物資、糧食或備用器材，會計小組須負責辦理災變期間緊急必要之<strong>經費調度與各項應變費用之支付</strong>，確保醫院的搶修與採購資金不斷鏈。</p>\n</li>\n<li>\n<p><strong>記錄員工出勤與加班</strong>：確實記錄應變期間所有被緊急召回、以及因交通受阻而被迫留守院內超時工作之員工的<strong>出勤、差假與加班給與</strong>，維護財務與帳務紀錄的正確性。</p>\n</li>\n</ol>\n<p><strong>四、 法律訴求小組（F3 / 職安室主任擔任）：應對轉送延遲衍生之爭議</strong></p>\n<ol>\n<li>\n<p><strong>處理申訴與醫療爭議</strong>：因物資匱乏及病人轉送不確定性提高（重症病患可能被迫滯留院內），極易引發病患及家屬的焦慮、不滿與醫療糾紛。法律訴求小組須<strong>協助處理法務問題、接受病人申訴</strong>，並防範可能引發的醫療暴力與衝突。</p>\n</li>\n<li>\n<p><strong>處理損害求償</strong>：接受並調查所有因物資短缺或轉送延遲等事件引發的損害求償申請。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨極高的實體安全威脅（如敵方滲透破壞）、資源搶奪風險以及群眾恐慌失控的危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）</strong>由管理部部長擔任「行政/財務部長（F0）」，負責統籌緊急應變所需之預算、行政、採購、人事、保險、法律及紀錄等工作。面對此等混亂與封鎖狀態，財務/行政部門的具體因應作為如下：</p>\n<p><strong>一、 處理拒絕庇護之醫療爭議與證據保全（法律訴求小組 F3 /\n職安室主任）</strong>\n面對避難人潮湧入，醫院為保全急重症醫療量能，勢必面臨「拒絕非醫療需求民眾進入」的艱難抉擇，這極易引發群眾不滿與後續的法律糾紛。</p>\n<ol>\n<li>\n<p><strong>處理申訴與法務問題</strong>：法律訴求小組須協助處理因門禁管制、拒絕收容或資源分配所引發的民眾申訴與潛在法律損害求償。</p>\n</li>\n<li>\n<p><strong>機密保全與蒐證協助</strong>：針對周邊可疑無人機或不明人車的偵蒐行為，必須協助確保院內機密資料（如病患個資、戰備物資清單）的保密防護。同時，指導或協助保全人員妥善保存相關影像與蒐證資料，以利後續提供給警政、檢調單位作為防諜與刑事調查之佐證。</p>\n</li>\n</ol>\n<p><strong>二、 嚴格身分辨識與封鎖下的人力輪替（人事小組 F1 / 人資室主任）</strong>\n面對不明人車與潛在的「第五縱隊（在地協力者）」滲透威脅，人員進出的身分管制將提升至最高級別。</p>\n<ol>\n<li>\n<p><strong>嚴格查核支援人力</strong>：在協調人員召回與志工招募至人力集合點時，人事小組必須實施極其嚴格的身分辨識與核對，防範有心人士偽裝成醫護或志工混入機房等關鍵設施進行破壞。</p>\n</li>\n<li>\n<p><strong>強制輪替與戰力保存</strong>：因應醫院實施「硬邊界」或內部封鎖（Lockdown），大量員工可能被迫滯留院內無法下班。人事小組須與後勤部協調，儲備足夠的醫療與非醫療人力，並安排滯留人員的強制輪班與輪替，避免前線員工因高壓防護與暴動威脅而身心崩潰。</p>\n</li>\n</ol>\n<p><strong>三、 啟動防護阻絕物資之緊急採購（採購小組 F2 / 採購室主任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急採購防護設備</strong>：面對外部群眾推擠與不明車輛威脅，執行部（保安組）急需實體阻絕設施。採購小組須立即辦理緊急採購，獲取防衝撞紐澤西護欄、蛇籠、鐵馬或相關防暴物資。</p>\n</li>\n<li>\n<p><strong>留守物資調用</strong>：在群眾包圍導致常規物流無法進入時，緊急聯繫替代供應商，就近調用能支撐留守員工與病患的緊急膳食與飲水。</p>\n</li>\n</ol>\n<p><strong>四、 緊急經費調度與超時紀錄（會計小組 F4 / 會計室主任）</strong></p>\n<ol>\n<li>\n<p><strong>經費調度與支付</strong>：為支援採購小組獲取防暴物資或緊急膳食，會計小組須辦理災變期間緊急必要之經費調度與費用支付，確保防護行動資金不斷鏈。</p>\n</li>\n<li>\n<p><strong>加班與出勤紀錄</strong>：確實記錄因醫院封鎖而被迫超時留守、或被緊急召回參與防護與醫療應變員工的出勤、差假與加班給與，以維護同仁權益及財務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，此時醫院面臨極端的戰爭威脅，必須在極短時間內進行大面積的「空間降階防護」，將核心醫療轉移至地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）「行政/財務部長（F0）」</strong>，負責統籌緊急應變所需之預算、行政、採購、保險、法律及紀錄等工作。面對防空疏散與\nB1 備援空間的緊急開設，財務/行政部門的具體因應作為如下：</p>\n<p><strong>一、 統籌防空避難之行政與資金支援（行政/財務部長 F0）</strong></p>\n<ol>\n<li>\n<p><strong>指揮應變行政中樞</strong>：管理部部長負責監督與統籌防空避難期間所需的所有行政與財務工作。</p>\n</li>\n<li>\n<p><strong>確保地下醫療運作資金</strong>：督導轄下採購與會計小組，確保 B1\n    備援醫療空間（檢傷行政區、臨時\n    ICU、臨時開刀房、恢復室及輕症病房）開設與運作所需的緊急資金調度無虞。</p>\n</li>\n</ol>\n<p><strong>二、 防空疏散下的人力盤點與強制輪替（人事小組 F1 / 人資室主任）</strong></p>\n<ol>\n<li>\n<p><strong>地下室人力集結與調度</strong>：在防空警報發布後，人事小組須協調招募員工、支援人力與志工至指定的\n    B1 人力集合點，以供待命區管理者（行政支援中心）精準派往 B1\n    的五大功能區運用。</p>\n</li>\n<li>\n<p><strong>戰力保存與輪休管理</strong>：在防空威脅與封鎖的高壓環境下，為維持「微型戰地醫院」的運作，人事小組須儲備足夠的醫療與非醫療人員，並安排滯留於\n    B1 避難區人員的強制輪替與休息，防範員工因恐慌與過勞而產生戰鬥疲勞。</p>\n</li>\n</ol>\n<p><strong>三、 B1 備援空間防護與維生物資之緊急採購（採購小組 F2 / 採購室主任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急採購與調用</strong>：為支援 B1\n    備援空間的開設，若發現防護設備、臨時照明、備用行軍床或急救衛材不足，採購小組須立即辦理緊急採購，或聯繫不受空襲影響的替代供應商與聯防醫院進行物資調用。</p>\n</li>\n<li>\n<p><strong>確保資源不斷鏈</strong>：在空襲威脅下，常規物流極可能中斷，採購小組須會同後勤部，設法取得能支撐\n    B1 員工與病患躲避空襲所需之緊急乾糧與飲水。</p>\n</li>\n</ol>\n<p><strong>四、 疏散意外之醫療爭議處理與機密保全（法律訴求小組 F3 /\n職安室主任）</strong></p>\n<ol>\n<li>\n<p><strong>處理疏散衍生之爭議</strong>：在緊急垂直疏散重症病患至\n    B1（尤其是無動力搬運）的混亂過程中，極易發生病患病情惡化或意外受傷。法律訴求小組須協助處理因疏散、降載或資源排擠所引發的家屬申訴與損害求償。</p>\n</li>\n<li>\n<p><strong>演習與機密資料保密</strong>：協助確保防空疏散期間，各項病歷資料與醫院機密文件的保密與安全，防範混亂中發生個資外洩。</p>\n</li>\n</ol>\n<p><strong>五、 災變期間之緊急經費調度與出勤紀錄（會計小組 F4 / 會計室主任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急費用支付</strong>：辦理因應空襲避難與開設 B1\n    功能區所衍生之各項緊急經費調度與費用支付。</p>\n</li>\n<li>\n<p><strong>超時與危險出勤紀錄</strong>：確實記錄因防空警報而被迫滯留於 B1\n    空間超時工作，或被緊急召回參與地下醫療搶救員工的出勤、差假與加班給與，以確保員工權益與財務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況 2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用 B1\n備援醫療空間及五處功能區」，此時醫院面臨戰時醫療整備與防空疏散的極端壓力。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）</strong>由管理部部長擔任行政/財務部長（F0）。其主要任務是確保在防空避難與備援醫療空間開設期間，醫院的行政、人力、資金與法務支援能維持運作。</p>\n<p>其轄下各組的具體因應作為如下：</p>\n<p><strong>一、 統籌防空避難之行政與資金支援（行政/財務部長 F0）</strong>\n由管理部部長擔任，負責統籌防空疏散與啟用 B1\n備援醫療空間期間，所需之緊急應變預算、行政、採購、保險、法律及紀錄等全般事務。確保地下微型戰地醫院在運作時，財務與行政後勤不斷鏈。</p>\n<p><strong>二、 疏散人力集結與戰力輪休管理（人事組 F1）</strong> 由人資室主任負責。</p>\n<ol>\n<li>\n<p><strong>人力召回與集結</strong>：協調人員召回、志工與支援人力集合，以便後續將人力精準派往\n    B1 的五大功能區（檢傷行政區、臨時 ICU\n    病房、臨時開刀房、恢復室、輕症病房）進行醫療救援與行政作業。</p>\n</li>\n<li>\n<p><strong>戰力輪替</strong>：在防空威脅與地下室高壓環境下，強制安排醫療與非醫療人員的輪替與休息，防範員工因恐慌與高壓而產生戰鬥疲勞。</p>\n</li>\n</ol>\n<p><strong>三、 備援空間防護物資之緊急採購（採購組 F2）</strong> 由採購室主任負責。</p>\n<ol>\n<li>\n<p><strong>緊急採購與調用</strong>：為支援 B1\n    備援空間的開設，若發現醫療耗材或防空避難物資不足，須立即辦理緊急採購及物資調用。</p>\n</li>\n<li>\n<p><strong>替代供應商聯繫</strong>：在空襲威脅下，常規物流極可能受阻，採購組須負責替代供應商之聯繫，確保\n    B1 醫療運作與避難物資供應無虞。</p>\n</li>\n</ol>\n<p><strong>四、 疏散爭議處理與資料保密（法律訴求組 F3）</strong> 由職安室主任負責。</p>\n<ol>\n<li>\n<p><strong>處理衍生爭議</strong>：在緊急垂直疏散重症病患至\n    B1，或執行醫療降載的混亂過程中，極易發生意外或引發家屬不滿。法律訴求組須協助處理相關之法務、申訴及損害求償問題。</p>\n</li>\n<li>\n<p><strong>機密資料保全</strong>：協助確保防空疏散期間，各項病歷資料與演習／醫院機密文件的保密防護，防範混亂中發生個資外洩。</p>\n</li>\n</ol>\n<p><strong>五、 災變期間之緊急經費調度與出勤紀錄（會計組 F4）</strong>\n由會計室主任負責。</p>\n<ol>\n<li>\n<p><strong>緊急費用支付</strong>：辦理因應空襲避難與開設 B1\n    各功能區所衍生之經費調度與費用支付。</p>\n</li>\n<li>\n<p><strong>加班與出勤紀錄</strong>：確實記錄因防空警報而被迫滯留於院內，或被緊急召回參與地下醫療搶救員工的加班與出勤狀況，並維持財務紀錄之正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨極端的大量戰傷病患（MCI）與核心醫療資源的極限負荷。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）「行政/財務部長（F0）」</strong>，其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 統籌緊急應變之財務與行政決策（行政/財務部長 F0）</strong>\n由管理部部長擔任，負責監督大量傷患災變期間的財務管理及資金進出業務，並統籌整體的緊急應變預算、行政、採購、保險、法律及紀錄等工作，確保前線醫療搶救的資金與行政資源不斷鏈。</p>\n<p><strong>二、 執行緊急人力召回與出勤管制（人事組 F1）</strong>\n由人資室主任擔任，面對急診、手術室與加護病房暴增的醫護人力需求：</p>\n<ol>\n<li>\n<p><strong>人力招募與集結</strong>：負責協調人員緊急召回，招募休假員工、支援人力與志工至人力集合點，以供待命區管理者進行前線調度。</p>\n</li>\n<li>\n<p><strong>戰力輪替與儲備</strong>：必須儲備足夠的醫療及非醫療人員，以便將高壓環境下的前線人員進行必要之輪替。</p>\n</li>\n<li>\n<p><strong>工時統計與出勤管制</strong>：根據人員簽到與簽退時間，統計工時以利後續報報加班；若有應到卻未到者，人資室須統計分析，若無正當理由將報請院方依相關辦法懲處。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與替代供應鏈（採購組 F2）</strong> 由採購室主任擔任：</p>\n<ol>\n<li>\n<p><strong>緊急採購與調用</strong>：面對大量戰傷病患瞬間消耗殆盡的藥品、輸血衛材、戰備急救箱與儀器設備，採購組須立即辦理應變所需之緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>替代供應商聯繫</strong>：若常規物流因戰事、交通壅塞或供應鏈受阻，採購組須主動聯繫替代供應商，確保搶救物資穩定輸入醫院。</p>\n</li>\n</ol>\n<p><strong>四、 爭議處理與損害求償調查（法律訴求組 F3）</strong> 由職安室主任擔任：</p>\n<ol>\n<li>\n<p><strong>法務與申訴處理</strong>：在大量傷患湧入、醫療降載與執行「反向檢傷」的混亂過程中，極易引發家屬焦慮不滿或醫療衍生爭議。法律訴求組須協助處理相關法務、申訴，並接受與調查所有損害賠償之申請。</p>\n</li>\n<li>\n<p><strong>資料保密</strong>：協助確保戰時大量傷患機密資料與演習文件的保密與防護。</p>\n</li>\n</ol>\n<p><strong>五、 災變期間之經費調度與帳務處理（會計組 F4）</strong> 由會計室主任擔任：</p>\n<ol>\n<li>\n<p><strong>緊急費用支付</strong>：辦理因應大量戰傷搶救與緊急採購所衍生之經費調度與費用支付，並維持財務紀錄之正確性。</p>\n</li>\n<li>\n<p><strong>加班費給與</strong>：辦理被緊急召回與參與高強度搶救員工之加班給與事宜。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨基礎設施受損與環境維安的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）「行政/財務部長（F0）」</strong>。雖然該部門不直接參與第一線的水電搶修或傷患救護，但卻是支撐全院人力調度、緊急採購物資、災損理賠與復原重建的關鍵後盾。</p>\n<p>其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 統籌緊急應變之財務與行政決策（行政/財務部長 F0）</strong>\n由管理部部長擔任，負責統籌此次基礎設施受損危機下的緊急應變預算、行政、採購、保險、法律及紀錄等工作，確保搶修與醫療應變行動有充足的行政與資金支持。</p>\n<p><strong>二、 緊急人力調度與出勤管制（人事組 F1）</strong>\n由人力資源室主任擔任。面對電梯停用需大量人力進行病患的水平/垂直搬運，以及通訊中斷需啟動「傳令兵（Runner）」傳遞訊息的狀況：</p>\n<ol>\n<li>\n<p><strong>後續人力支援與集結</strong>：負責協調人員緊急召回、安排輪替，並招募志工與支援人力至集合點，以供待命區管理者統一派發至前線協助搬運、搶修或傳令任務。</p>\n</li>\n<li>\n<p><strong>工時與差假紀錄</strong>：確實做好災變期間被緊急召回與參與高強度搶修員工的出勤、差假及加班紀錄。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與替代供應鏈（採購組 F2）</strong>\n由採購室主任擔任。面對停電、漏水與空調異常等搶修需求：</p>\n<ol>\n<li>\n<p><strong>緊急物資與零件採購</strong>：辦理應變所需之緊急採購與物品徵集（例如：緊急照明設備、手電筒、電池、沙包、吸水耗材或機電緊急修繕零件）。</p>\n</li>\n<li>\n<p><strong>替代供應商聯繫</strong>：若因周邊爆炸或通訊中斷導致常規供應鏈受阻，須主動聯繫替代供應商，確保搶修物資穩定輸入醫院。</p>\n</li>\n</ol>\n<p><strong>四、 災損求償與法律爭議處理（法律訴求組 F3）</strong> 由職安室主任擔任。</p>\n<ol>\n<li>\n<p><strong>損害求償調查</strong>：若震波或電梯突然停用導致員工、病患受困受傷，或造成醫院重大財產損失，該組負責接受並調查所有損害賠償之申請，協助處理相關法務與申訴。</p>\n</li>\n<li>\n<p><strong>保險理賠</strong>：協助總務部會同保險公司，辦理後續財損或人員傷亡之理賠相關事宜。</p>\n</li>\n<li>\n<p><strong>資料保密</strong>：協助確保演習與災情相關機密資料的保密與防護。</p>\n</li>\n</ol>\n<p><strong>五、 經費調度與帳務處理（會計組 F4）</strong> 由會計室主任擔任。</p>\n<ol>\n<li>\n<p><strong>緊急費用支付</strong>：辦理因應設施搶修與緊急採購所衍生之經費調度與費用支付，維持財務紀錄之正確性。</p>\n</li>\n<li>\n<p><strong>加班費給與</strong>：辦理參與搶修與應變員工之加班給與事宜。</p>\n</li>\n</ol>\n<p><strong>六、 災後復原階段之經費籌措與重建</strong>\n在應變後期與復原階段，財務/行政部門須配合災損鑑定小組的結果，編列「災害復原預算表」，陳報院長室及董事會以籌措經費，支援硬體設施（如漏水管線、空調與受損電梯）的復原與重建工作。</p>\n<p>在 B2 開設指揮所，有哪些具體的安全措施？</p>\n<p>如何與瑞光院區啟動「雙盲備援連線」？</p>\n<p>若指揮官失聯，自動順位繼承機制的執行細節為何？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）「行政/財務部長（F0）」</strong>。雖然該部門不直接參與第一線的主發電機搶修或液氧槽滅火防護，但卻是支撐全院因應複合型毀滅危機時，進行極限人力調度、緊急採購維生物資、處理災損理賠與災後重建的關鍵大後盾。</p>\n<p>面對機電棟遭無人機攻擊、發電機受損及液態氧外洩的極端狀況，財務/行政部門轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 統籌緊急應變之財務與行政決策（行政/財務部長 F0）</strong></p>\n<ul>\n<li>\n<p>由管理部部長擔任，負責統籌此次機電棟遭受無人機爆裂物攻擊與基礎設施受損危機下的<strong>緊急應變預算、行政、採購、保險、法律及紀錄等工作</strong>。</p>\n</li>\n<li>\n<p>確保工務室搶修主發電機與防堵液氧洩漏，以及醫療照護單位的疏散應變行動中，擁有充足的行政與資金支持。</p>\n</li>\n</ul>\n<p><strong>二、 緊急人力調度與疏散搬運支援（人事小組 F1）</strong></p>\n<ul>\n<li>\n<p>由人力資源室主任擔任。面對液氧槽洩漏的極高爆炸風險，鄰近病房可能需要緊急疏散；且因主發電機受損導致電梯停用，需大量人力進行重症病患的無動力水平與垂直搬運。</p>\n</li>\n<li>\n<p><strong>後續人力支援與集結</strong>：負責協調人員緊急召回、安排輪替，並招募志工與支援人力至集合點，以供待命區管理者統一派發至前線協助搬運病患、支援搶修或執行傳令任務。</p>\n</li>\n<li>\n<p><strong>工時與差假紀錄</strong>：確實做好災變期間被緊急召回與參與高強度搶修員工的出勤、差假及加班紀錄，並安排強制輪休以防範戰鬥疲勞。</p>\n</li>\n</ul>\n<p><strong>三、 啟動緊急採購與外部維生設備調度（採購小組 F2）</strong></p>\n<ul>\n<li>\n<p>由採購室主任擔任。面對主發電機受損與液態氧外洩導致的維生中斷危機，必須立即啟動替代供應鏈，突破物資匱乏的孤島狀態。</p>\n</li>\n<li>\n<p><strong>緊急物資與零件採購</strong>：立即辦理應變所需之緊急採購與物品徵集，例如緊急照明設備、手電筒、電池、防爆與吸水耗材，以及工務室搶修機電所需的緊急零件。</p>\n</li>\n<li>\n<p><strong>聯繫替代供應商與維生調度</strong>：因主氧氣槽與主發電機無法運作，須主動緊急聯繫外部廠商。例如聯繫發電機廠商（如明威發電機）請求移動式發電車或修繕支援，以及聯繫氧氣供應商（如台北氧氣公司、信光氧氣行）緊急調度大量備用氧氣鋼瓶，確保搶救物資與生命線穩定輸入醫院。</p>\n</li>\n</ul>\n<p><strong>四、 災損求償、保險理賠與醫療爭議處理（法律訴求小組 F3）</strong></p>\n<ul>\n<li>\n<p>由職安室主任擔任。</p>\n</li>\n<li>\n<p><strong>損害求償調查</strong>：若無人機爆裂物震波或停電導致員工受傷、病患受困電梯，或造成醫院重大財產損失（機電棟毀損），該組負責接受並調查所有因設施受損或人為攻擊引發之損害賠償申請，協助處理相關法務與申訴。</p>\n</li>\n<li>\n<p><strong>保險理賠</strong>：協助總務部會同保險公司，辦理後續機電設備財損或人員傷亡之理賠相關事宜。</p>\n</li>\n<li>\n<p><strong>資料保密與蒐證保存</strong>：協助確保災情相關機密資料的保密與防護，並妥善保存無人機攻擊的災損與蒐證紀錄，以利後續國防、國安單位與檢警之調查。</p>\n</li>\n</ul>\n<p><strong>五、 經費調度與災後重建資金籌措（會計小組 F4）</strong></p>\n<ul>\n<li>\n<p>由會計室主任擔任。</p>\n</li>\n<li>\n<p><strong>緊急費用支付</strong>：辦理因應設施搶修與緊急採購物資（如大量氧氣鋼瓶、發電機具設備）所衍生之經費調度與費用支付，維持財務紀錄之正確性。</p>\n</li>\n<li>\n<p><strong>加班費給與</strong>：辦理參與第一線搶修、滅火防爆及病患疏散應變員工之加班給與事宜。</p>\n</li>\n<li>\n<p><strong>災後復原經費籌措</strong>：在應變後期與復原階段，財務/行政部門須配合災損鑑定小組的結果，編列「災害復原預算表」，陳報院長室及董事會以籌措經費，全力支援受損機電棟、主發電機與液氧槽的復原與重建工作。</p>\n</li>\n</ul>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>在機電棟發生爆炸並造成兩名工務巡檢同仁受重創（一人嚴重骨折且大出血）的複合型危機中，大連院區的維生電力、水源或氣體系統可能瞬間中斷，全院亦可能面臨資訊大當機（Downtime\n紙本降級作業）。</p>\n<p>在此極端壓力情境下，<strong>HICS 財務/行政部門（Finance/Administration\nSection）</strong> 將打破平時的行政作業常規，在<strong>行政/財務部長 F0（管理部部長\n張隆鐘）人事、採購、法律訴求、會計</strong>等四個專業小組，為前線搶救同仁生命及電力搶修提供最堅實的資金、人力、法務與行政後盾：</p>\n<p>一、 行政/財務部長 F0（管理部部長 張隆鐘）：統籌行政財務應變中樞</p>\n<ol>\n<li>\n<p><strong>接掌指揮權與資金調度</strong>：部長第一時間進駐地下前進指揮所，全面監督與統籌因應「機電棟爆炸與工務同仁重創」所衍生的緊急經費、物資採購、保險、法律、人事調度及紀錄等工作。</p>\n</li>\n<li>\n<p><strong>確保搶救與搶修資源不斷鏈</strong>：定時（每八小時）確認財務支出與物資採購狀況，配合指揮官（吳榮州院長）的最高決策，確保受傷同仁在地下備援手術室/ICU 的急救費用、藥材及工務搶修所需之緊急資金，皆能最優先撥付，絕不受預算編列程序卡關影響。</p>\n</li>\n<li>\n<p><strong>參與事故行動會議</strong>：參與指揮中心各執行週期之應變會議，確保後續機電棟硬體原地重建、受損設備購置及人員安置計畫符合法規與預算範圍。</p>\n</li>\n</ol>\n<p>二、 人事小組 F1（人資室主任 劉淑梅）：緊急人力調配與職災關懷</p>\n<ol>\n<li>\n<p><strong>啟動就近緊急人力召回與集結</strong>：機電棟爆炸極易伴隨停電、電梯停用及通訊系統延遲，大量病患可能需要無動力水平或垂直搬運，且需行政人員投入擔任徒步「傳令兵（Runner）」傳遞紙本醫囑。人事組須立即啟動緊急召回，<strong>優先召回居住於屏東市區附近、未受交通阻斷影響的同仁及志工</strong>，至護理部前廳（或指定之 B1 人力集合點）報到登錄，並由待命區管理者（行政支援中心組長）精準派往一線進行搬運、搶修或行政支援。</p>\n</li>\n<li>\n<p><strong>前線員工「強制輪替班表」編排</strong>：針對在地下備援開刀房/ICU、急診紅區頂著巨大壓力搶救重傷同伴的醫護，以及在爆炸廢墟中冒險搶修的工務同仁，人事小組須與後勤部緊密協調，<strong>強制實施 12 小時一班的軍事化輪班機制</strong>。時間一到強令撤離火線，送入地下最安全、最安靜之「員工專屬庇護站」休息，防範因英雄主義超時工作導致醫療或維安疏失。</p>\n</li>\n<li>\n<p><strong>重大「職業災害」同工撫恤與關懷</strong>：受砸傷與大出血之兩名人員為本院執勤中之「工務巡檢同仁」，此事件屬本院重大職業災害。人資主任須立即會同職安室與社工室，協助員工及家屬辦理請假、留職停薪、勞保職災給付等手續，並由院部層級提供家屬慰問與撫恤關懷。</p>\n</li>\n</ol>\n<p>三、 採購小組 F2（採購室主任 邱芬娟）：搶修耗材與戰傷藥衛材緊急採購</p>\n<ol>\n<li>\n<p><strong>中止常規作業，集中應變量能</strong>：立即停止災害防救以外的所有常規採購及結報作業，將全組人員集中於辦理搶修與戰傷救治所需的「緊急採購與物資調用」。</p>\n</li>\n<li>\n<p><strong>機電緊急修繕零件與防護物資採購</strong>：面對機電棟爆炸損毀，採購小組須立即聯繫合約廠商與替代供應商，緊急採購與徵集搶修物資、零件（如：發電機備件、高壓維修零件、緊急照明設備、手電筒、電池、沙包或吸水耗材）。</p>\n</li>\n<li>\n<p><strong>戰備急救與維生物資加速調補</strong>：若搶救大出血同仁導致院內戰術止血帶（CAT）、骨針 IO、含止血劑紗布、林格氏液及強效麻醉鎮痛藥等物資庫存告急，採購小組須迅速聯繫替代供應鏈建立多元管道，協請廠商緊急加速運補；並在物流受阻時，就近向院內便利商店（7-11）或周邊合約商家調度留守人員所需之膳食與飲水。</p>\n</li>\n</ol>\n<p>四、 法律訴求小組 F3（職安室主任\n杜傳榮）：重大職災通報、原因調查與保險理賠</p>\n<ol>\n<li>\n<p><strong>法定重大「職業災害/職業傷病」登錄通報</strong>：針對同仁在執勤中遭受爆炸掉落物砸傷，法律訴求小組（職安室）須於法定時限內，<strong>立即登錄勞動部職業傷病系統</strong>，並向地方衛生主管機關完成通報，保全受創同仁的法效權益。</p>\n</li>\n<li>\n<p><strong>事故調查配合與證據保全</strong>：在火勢撲滅、爆炸危害排除後，職安室須派員會同工務室，積極協助消防機關與勞檢單位調查起火與爆炸原因。同時，協同文件紀錄組（P3）詳實、拍照保全所有通報紀錄、安全官評估、警衛密錄器畫面等第一手證據，以備後續司法調查與鑑識。</p>\n</li>\n<li>\n<p><strong>保險理賠事宜處置</strong>：職安室主任須主動聯繫本院投保之公共意外責任險、團體保險及勞保承保公司，接受並調查兩名受創同仁因爆炸受傷之損害賠償申請，協助辦理後續醫療理賠、傷殘補償、法律訴訟或調解和解事務，確保員工權益並管控醫院法律風險。</p>\n</li>\n<li>\n<p><strong>個資與機密保護</strong>：在疑似遭受資安攻擊且全院大量啟用手寫病歷的混亂期間，職安室須協助督導各單位，確保受傷同仁個資、病歷、以及醫院機密災損資料未遭外洩或被可疑人士偵蒐利用。</p>\n</li>\n</ol>\n<p>五、 會計小組 F4（會計室主任 趙一珍/李華敏）：資金極速灌注與事後入帳回補</p>\n<ol>\n<li>\n<p><strong>辦理經費調度與緊急費用支付</strong>：會計主任須即刻撥付因應空襲爆炸、機電緊急搶修及採購防護阻絕器材、備用零件所衍生之各項經費。</p>\n</li>\n<li>\n<p><strong>同工超時、危險出勤與加班給與結算</strong>：確實記錄並結算所有因爆炸而被緊急召回參與高強度抢修（工務）、防暴（保全）、搬運（行政）及維持地下醫療運作（醫護）員工的危險差假、出勤工時與加班費。</p>\n</li>\n<li>\n<p><strong>發放職災慰助金與經費籌措</strong>：配合社工室，統籌發放受傷工務巡檢同仁的緊急職災慰助金或補助方案。在復原階段，配合災害鑑定小組之結果，編列正式的「災害復原預算表」，陳報院長室及董事會，以籌措復原重建受損機電棟與大樓之大額資金。</p>\n</li>\n<li>\n<p><strong>系統復原後之手工帳務回補協助</strong>：在 HIS 帳務系統當機、前線啟動「紙本降級（Downtime）作業」期間，受傷同仁與搶修同工已耗用之高值藥品及衛材一律由前線護理站登錄於手寫欠繳單。待系統完全排除阻斷且資訊室重新開機後，會計小組須與醫療業務室批掛櫃檯、醫業課及資材組配合，將所有手工處方、耗材單人工回補登錄 HIS 系統計價，確保醫院財務帳務紀錄之正確性與完整性。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>一、 行政/財務部長 F0（管理部部長\n張隆鐘）：統籌行政財務應變中樞與資金極速灌注</p>\n<ol>\n<li>\n<p><strong>迅速就位並接掌「行政/財務部」指揮權</strong>： 管理部部長在接獲中控室通報「不明份子喬裝外包人員縱火投毒」的黑色與黃色緊急訊號後，必須於 <strong>10 分鐘內</strong> 攜帶行政管理備份資產，垂直轉移至地下一樓（B1）最穩固的戰時指揮所（恩慈大樓 B1 會議室），迅速召集人事、採購、法律訴求、會計等四個專業小組長報到就位。</p>\n</li>\n<li>\n<p><strong>確保生命線搶修與防衛資源資金斷鏈豁免</strong>： 財務/行政部長負責全面監督財務管理及資金進出的業務。針對特工破壞造成的「核心機房燃燒（電力/資安威脅）」與「頂樓水塔不明化學物質污染（水源中斷危機）」，部長會同指揮官下達最高行政豁免：<strong>「搶修與防暴採購不需逐級層簽，一律採事後補單計價」</strong>。定時（每八小時）確認應變資金調度狀況，確保前線修補核心機房、阻絕毒化水源、購置實體防暴耗材之資金百分之百充沛。</p>\n</li>\n<li>\n<p><strong>統籌跨部門後勤與行政支援協定</strong>： 與指揮官、聯絡官保持極限溝通。若工務室評估地下水互補系統受損、醫院面臨「斷水孤島」時，配合聯絡官，極速啟動與消防局、自來水廠及外部水車廠商的「緊急供水合約」，並預劃大額購水資金。</p>\n</li>\n</ol>\n<p>二、 人事小組 F1（人資室主任\n劉淑梅）：嚴防第五縱隊滲透、人力集結與強制輪班</p>\n<p>在「特工採取喬裝外包維修人員進行滲透」的極端情境下，人事組除了常規的人力調配，必須將「防止敵特二次滲透」視為人事管理的最核心戰術：</p>\n<ol>\n<li>\n<p><strong>實施極嚴格之「防滲透召回人員身分聯檢」</strong>： 當 HICS 啟動緊急召回居住於屏東地區的同工、志工至人力集合點（護理部前廳或恩慈 1F 停車場東側）時，人事小組必須協同安全管制組（保安組）於集合哨口設立<strong>「聯合檢查站」</strong>。 -   <strong>徹底身分核對</strong>：逐一核對所有召回員工與志工的實體身分證與執業執照。 -   <strong>物理防禦安檢</strong>：使用手持金屬探測器進行武器搜查，防止在地協力者或其餘特工冒充同工混入高脆弱區（如進入地下發電機房或 B1 手術室）進行二次蓄意破壞。 -   <strong>發配專屬防偽防護裝備</strong>：所有通過核實之人員，發配穿戴<strong>「專屬螢光識別背心（或臂章）」與「HICS 任務卡」</strong>，未穿戴者一律由保全就地扣留壓制，徹底杜絕灰色滲透。</p>\n</li>\n<li>\n<p><strong>前線應變與搶修團隊之「12小時軍事化強制輪休」</strong>： 面對核心機房燃燒的廢墟、頂樓化災高壓威脅，一線搶修工務、壓制特工的保全警衛、以及死守地下備援空間的醫護，其生理與心理負荷將達臨界點。人資主任必須實施<strong>「12 小時一班的軍事化強制輪換機制」</strong>。時間一到強令撤離火線，強行移至結構最安全深層的「員工專專屬庇護站」（恩慈 2F 員工運動中心），配合社工室心理韌性特遣隊進行 15 至 30 分鐘之心理急救（PFA），防範員工因高壓超時工作造成決策及安防疏失。</p>\n</li>\n<li>\n<p><strong>滯留人員工時與差假出勤極限管理</strong>： 因醫院實施「內部封鎖（Lockdown）」，大量同工被迫滯留院內。人資室必須確實記錄所有加班與高強度任務的出勤狀況，為災後進行完善的員工關懷、特休補償與危險差假給與提供法定依據。</p>\n</li>\n</ol>\n<p>三、 採購小組\nF2（採購室主任）：中斷常規採購、防暴阻絕設施與維生食水緊急調用</p>\n<ol>\n<li>\n<p><strong>中斷常規，全力轉向緊急安全採購</strong>： 採購小組立即暫停所有常規、非急迫性的醫院招標與行政結報作業。全組人員改採人工降級模式（HIS/採購系統可能因核心機房受威脅而防護性關機或當機），改以實體手寫單與電話進行「緊急防衛採購」。</p>\n</li>\n<li>\n<p><strong>防禦硬邊界「物理阻絕設施」極速採購與徵集</strong>： 配合執行部安全管制組（保安組）實施的「封閉 80% 出入口、僅保留急診車道作為唯一通道」之硬邊界防護決策，採購小組須立即辦理緊急採購： -   緊急調用並增購<strong>充水式紐澤西護欄、防爆鐵馬、蛇籠、防暴盾牌與金屬探測器</strong>。 -   若院內庫存不足，主動聯繫替代安防供應商，以極速貨運（或請求警方武裝護送）送達院區外圍交運，協助建立鐵壁硬邊界。</p>\n</li>\n<li>\n<p><strong>維生關鍵藥物與 cbrn 化災解毒沖洗衛材緊急調撥</strong>： -   特工於頂樓水塔投放不明化學物質，可能引發大量員工或病患化災灼傷、中毒。採購小組須立即與藥劑科配合，聯繫替代藥品供應鏈，緊急採購<strong>化學防護衣（PPE）、毒物解毒藥、生理食鹽水與大量沖洗耗材</strong>。 -   停止常規物資供應，清點庫存在途量，並電洽屏東縣衛生局與區域聯防合作醫院（屏榮、部屏），請求戰略衛材與藥材調撥支援。</p>\n</li>\n<li>\n<p><strong>「孤島狀態」下膳食與飲水之合約商家緊急調用</strong>： 若頂樓自來水塔受化學投毒影響，工務室實施「最嚴格水資源紅區管制」（地下戰備水之淨水僅供手術、ICU與急診，廁所封閉，嚴禁盥洗），院內將面臨飲水極限匱乏。採購小組須立即聯繫院內便利商店（7-11）或周邊合約商家，緊急調用並大額採購大量<strong>備用瓶裝礦泉水與緊急乾糧、應急口糧</strong>，確保在院 72 小時內的員工與病患生理維生。</p>\n</li>\n</ol>\n<p>四、 法律訴求小組 F3（職安室主任\n杜傳榮）：國家關鍵基礎設施遭「敵特破壞」之法定最嚴格法效證據保全（重中之重）</p>\n<p>此事件本質屬於<strong>「國家關鍵基礎設施（CI）遭受恐怖滲透、縱火與投毒之重大國安/刑事事件」</strong>。法律訴求小組長（職安室主任，兼任\nHICS 指揮中心安全官 A2）\n必須採取最嚴密的法律防護與物證保全作為，其具體步驟如下：</p>\n<ol>\n<li>\n<p><strong>詳實、逐字保全「應變決策與實體犯罪軌跡」</strong>： -   <strong>犯罪證據保全</strong>：會同保安組，將保安人員「隨身密錄器」錄下之喬裝特工特徵、被武裝壓制之影音檔案，以及現場發現之燃燒劑罐體、化學物質容器之散落位置與影像，進行高強度加密存檔，移交檢警調與國家安全調查單位。 -   <strong>醫療與降載決策紀錄</strong>：將當機期間全院啟動「紙本降級（Downtime）作業」的前線三聯式病歷、手寫處方、手動給藥單進行分類封存，防範在混亂中因資訊不透明或系統故障引發的<strong>個資外洩與醫療糾紛</strong>。</p>\n</li>\n<li>\n<p><strong>處理「拒絕收容與分流」之法律申訴與訴訟免責</strong>： 戰時因應內部封鎖（Lockdown），醫院為死守核心功能，將拒絕一般非就醫恐慌民眾進院尋求庇護。法律訴求小組須備妥「CI 安全防護與醫療資源保留」之法定指引與政府公告，作為法律免責盾牌，隨時準備應對民眾因門禁、拒絕收容、以及執行「反向檢傷」而產生的申訴案件、醫療爭議與法律損害求償。</p>\n</li>\n<li>\n<p><strong>受創設施之保險與災損調查申報</strong>： 主導受損核心機房與被污染頂樓水塔之災損調查。配合工務室，積極對接消防、勞檢機關勘查，保全事故鑑定之第一手物理證據，並主動通知保險公司，啟動本院財產損失保險及公共意外責任險的理賠理算程序。</p>\n</li>\n</ol>\n<p>五、 會計小組 F4（會計室主任 李華敏）：經費調度、出勤結算與事後帳務回補</p>\n<ol>\n<li>\n<p><strong>應變經費與修繕工程款之極速撥付</strong>： 會計室主任接獲 HICS 指揮中心指令後，立即在離線或有備援電力的狀況下辦理經費撥付。優先支付發電機油料購置、自來水車調撥急需款項，以及採購安防硬阻絕物資、化學 PPE、防暴器材的費用，免除繁瑣之常規核銷手續。</p>\n</li>\n<li>\n<p><strong>高強度、危險差假之出勤與加班給與結算</strong>： 確實統計與記錄所有因防空、阻絕投毒及滅火等高風險任務被召回員工的加班工時。核算參與「特工武裝壓制、核心機房初期滅火、高熱量盲派物資運補」之同工危險出勤、差假、加班費以及發放應急職災慰助金，並維護本院在極端孤島事件中財務紀錄的正確性。</p>\n</li>\n<li>\n<p><strong>當機復原後之手工帳務與藥耗材「人工補登回補（Data Backfilling）」</strong>： 系統大當機或防護性關機期間，全院採用紙本 Downtime 手工作業，病患的處方、急救耗材、急診檢驗等均以手工欠繳單形式登記。待資訊室修復核心機房與 HIS 系統並宣告重新開機後，會計小組須與批掛掛號、資材及藥劑科全力配合，將所有手工處方、用藥及計價耗材實施<strong>「電腦手動補登回補（Data Backfilling）」</strong>，確保本院營運、健保申報及財務帳務系統的最終完整性與正確性。</p>\n</li>\n<li>\n<p><strong>災後復原經費籌措編列</strong>： 配合總務部（後勤部長）與工務室出具之機房燒毀損毀、自來水塔投毒破壞鑑定結果，於危機管理委員會編列正式的<strong>「災後硬體設施原地重建與設備採購預算表」</strong>，陳報院長室及董事會籌措經費重建。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，在面臨大量病患需要極速結帳出院、轉院移出以及大規模人力調度的極端挑戰下，HICS（醫院事故指揮系統）中的<strong>財務/行政部門（Finance/Administration\nSection）</strong>是確保行政流程不卡關、人力與資金能應付突發狀況的關鍵支柱。</p>\n<p>財務/行政部門由管理部部長擔任<strong>「行政/財務部長（F0）」</strong>，負責統籌緊急應變所需之財務、行政、人事、採購及法律工作。其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 啟動極速結帳與「戰時記帳豁免機制」（會計組 F4 / 行政/財務部長\nF0）</strong>\n面對「反向檢傷」分類出的大量「可返家/提早出院」病患，若依循平時的結帳流程，將導致門診大廳與批掛櫃檯嚴重壅塞，延誤疏散黃金時間。</p>\n<ol>\n<li>\n<p><strong>極速結帳與疏散</strong>：資源控管組會將疏散報告轉交財務行政部門，以協助病患帳務之處理。</p>\n</li>\n<li>\n<p><strong>戰時記帳豁免機制</strong>：為求於 4\n    小時內將輕症或穩定病患極速清空，會計組與批掛人員須啟動「戰時記帳豁免機制」。讓病患優先辦理離院手續並安全疏散返家，將醫療費用改為「事後再行收費」或記帳處理，確保行政手續絕不阻礙救命的疏散動線。</p>\n</li>\n<li>\n<p><strong>緊急經費調度</strong>：辦理因撤離行動衍生之緊急車輛徵用、車資、安置費用或緊急採購所需之經費調度與支付。</p>\n</li>\n</ol>\n<p><strong>二、 支援搬運與撤離之「緊急人力調度」（人事組 F1）</strong>\n疏散高度照護與臥床病患需要極大的搬運與照護人力（如無動力垂直搬運需5人一組）。</p>\n<ol>\n<li>\n<p><strong>緊急人力集結</strong>：由人資室主任擔任人事小組長，負責協調人員的緊急召回與輪替。招募並集結院內休假員工、志工與外部支援人力至「人力待命點」。</p>\n</li>\n<li>\n<p><strong>交由待命區派發</strong>：將集結到的人力，統一交由「待命區管理者（行政支援中心）」運用，精準派發至各病房協助前線護理人員進行病患的平行轉移或樓梯搬運。</p>\n</li>\n<li>\n<p><strong>出勤與工時紀錄</strong>：確實記錄參與高強度疏散任務員工的出勤與加班狀況，並協助後續的員工關懷與差假安排。</p>\n</li>\n</ol>\n<p><strong>三、 啟動撤離所需之「緊急採購」（採購組 F2）</strong>\n由採購室主任擔任小組長。在撤離行動中，若前線回報運輸輔具或醫療隨行物資不足：</p>\n<ol>\n<li>\n<p><strong>物資徵集與調用</strong>：立即辦理應變所需的緊急採購（例如：急購或徵用額外的輪椅、樓梯疏散滑墊/軟擔架、攜帶式氧氣鋼瓶、轉院隨車急救包材等）。</p>\n</li>\n<li>\n<p><strong>替代供應商聯繫</strong>：主動聯繫交通運輸業者、救護車公司或替代供應商，協助後勤部獲取必要的撤離資源。</p>\n</li>\n</ol>\n<p><strong>四、 撤離過程中之「法律風險管控與機密防護」（法律訴求組 F3）</strong>\n由職安室主任擔任小組長。撤離行動極度混亂，伴隨極高的爭議風險：</p>\n<ol>\n<li>\n<p><strong>防範醫療與疏散爭議</strong>：協助處理病患在撤離、轉院途中因病情變化、設備不足或推擠所可能引發的損害賠償調查、申訴與衍生法律問題。</p>\n</li>\n<li>\n<p><strong>病患隱私與個資保護</strong>：在病患名冊造冊、病歷資料隨車轉移及向外部機構（衛生局、接收醫院）交接的過程中，協助確保符合個人資料保護法及相關法規，保護當事人名譽及病人隱私，防止機敏資料外洩。</p>\n</li>\n</ol>\n<p>社工室如何協助戰傷病患的家屬安撫與動向查詢？</p>\n<p>若醫院通訊完全中斷，社工與行政人力如何執行傳令任務？</p>\n<p>說明 HICS 體系下各部門如何協同執行病人的分級與撤離。</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方預警，確認院區即將編入「主戰區」，並由主管機關下達進行<strong>醫療核心能量的預防性撤離</strong>（對應\nHICS 第三階段：全面撤離與量能重置）之最高命令時 ：</p>\n<p>本院 <strong>HICS 財務/行政部門（Finance/Administration\nSection）將由財務/行政部長 F0（管理部部長 張隆鐘，代理人為人室主任\n劉淑梅）坐鎮指揮</strong> 。財務/行政部門雖然不直接參與一線傷患的實體轉運，但<strong>作為整場撤離戰役的「行政與資源大後盾」</strong>，將立即進駐地下指揮所（恩慈大樓\nB1 會議室） ，協調轄下人事、採購、法律訴求、會計四個專業小組，採取以下<strong>五大核心成員之具體因應作為</strong>，死守醫院資產安全、法律防線與人員戰力：</p>\n<p>一、 行政/財務部長 F0（管理部部長\n張隆鐘）：統籌撤離特別預算與跨院重置行政對接</p>\n<ol>\n<li>\n<p><strong>開設地下行政財務協配中樞</strong>： 張隆鐘部長第一時間垂直轉移至地下戰時指揮所 ，召集 F1 人事、F2 採購、F3 法律訴求、F4 會計組長報到就位 。</p>\n</li>\n<li>\n<p><strong>啟動「戰時行政授權與特別預算」</strong>： F0 召開應變會議，針對大規模撤離所衍生的交通載具租用、臨時重置空間水電租賃、簽證物資緊急採購，下達最高財務裁決：<strong>「全面凍結所有常規行政結報與非緊急採購 ，全院資金百分之百專款專用於撤離與量能重置 ，豁免常規繁瑣的層簽審核程序，採取離線手寫登記、事後追溯審計」</strong>，確保救命資金「零秒差」灌注到前線 。</p>\n</li>\n<li>\n<p><strong>異地重置之行政體系與合作醫院對接</strong>： 配合聯絡官（行政副院長 黃雅芳） ，代表本院行政體系與目標接收醫院（如衛生福利部屏東醫院、寶建醫院、安泰醫院、屏東榮總）之管理階層對接 。預先協商本院行政掛號、批價櫃檯進駐接收端後的<strong>「合併辦公空間、備援電力與網路接口分配」</strong>，確保本院醫療團隊在異地重置後能「即刻開診、無縫掛號」 。</p>\n</li>\n</ol>\n<p>二、 人事小組 F1（人資室主任\n劉淑梅）：醫事人員專業分層調配、員工動向追蹤與「家屬安置」</p>\n<p>在主戰區炮火迫近的高壓下，員工極易因擔憂家屬安全而導致出勤率崩盤 。人事小組必須實施戰術性人力資源調配：</p>\n<ol>\n<li>\n<p><strong>執行醫事人員「專業分層撤離調配」</strong>： 協同計畫部（護理部）之「隨車持續照護功能編組 A」 ，將召回與現有之醫事人力依專業背景實施「分層調配後送」： -   <strong>【重症與急救主力】</strong>：將重症監護、外科手術、急診、麻醉等專業醫護人員 ，隨同第四類重症病患（病人分組 B）配對上車 ，優先撤往安全重置區的各級急救責任醫院，全力支援急重症處置需求 。 -   <strong>【一般與照護同工】</strong>：內科醫師、一般病房護理同工，則預先規劃調派往安全重置區開設的臨時急救站（或第二型急救站、民防收容所） ，維持基本照護。</p>\n</li>\n<li>\n<p><strong>鐵血啟動「員工家屬戰時預防性集體庇護」</strong>： 為確保醫護同工能無後顧之憂、死守撤離火線，人事組必須執行<strong>家屬安置計畫</strong> ： -   開放大連院區結構最安全、最深層之地下空間（如恩慈大樓 B2 運動中心） ，或直接於安全重置區目標醫院周邊，協調學校、教堂設立<strong>「本院員工家屬臨時庇護所」</strong> 。 -   調派行政同工、志工進行家屬物資與膳食配給 ，以「醫院保護同工家屬」的科學化保護機制激勵軍心，死守醫護出勤率與戰鬥力 。</p>\n</li>\n<li>\n<p><strong>無網紙本式「撤離人員（同工、志工）動向登記」</strong>： 在系統大當機或斷電斷網狀態下，人資室於三大接運區設立「實體簽到哨」 ，人工手寫登記每位隨車撤離醫護、行政傳令兵（Runner）及志工的姓名、上了哪一輛車、前往哪一家接收醫院，確保「在撤離中無一人遺漏或私自離隊」 。</p>\n</li>\n</ol>\n<p>三、 採購小組 F2（採購室主任\n邱芬娟）：緊急車輛載具徵用、在途物流改道與異地膳水協議</p>\n<p>面對大批病人、貴重設備與管制藥物的外移，採購小組須立即啟動戰時應變合約：</p>\n<ol>\n<li>\n<p><strong>緊急租賃與徵用「簽證交通載具」</strong>： 配合後勤部勤務組（L1） ，除了院內現有的 4 輛救護車、4 輛中巴與行政車外 ，採購小組須立即致電簽約之外部救護車公司、遊覽車合約廠商及大型物流貨車業者 。以特別預算進行<strong>緊急現金徵用與包車合約簽署</strong>，迅速集結足夠運送臥床及輕症病患之車隊至指定集結點 。</p>\n</li>\n<li>\n<p><strong>實施在途物資與戰略藥衛材之「物流咽喉改道」</strong>： 主戰區一旦封鎖，常規物流將無法進入大連院區 。採購小組必須立即聯繫所有常規醫藥、氧氣、血液及民生物資供應商 ： -   發布<strong>「在途物資轉置指令（Logistics Rerouting）」</strong>，要求所有正在運輸途中的藥衛材、林格氏液及無菌耗材車輛 ，<strong>一律禁止駛入大連主院區，直接在高速公路關卡或安全節點「改道改派」</strong>，直接送往安全重置區的目標醫院或臨時倉庫 。 -   主動向屏東縣衛生局及 EOC 申請「簽證物資」補給，指派專人於安全區接收 。</p>\n</li>\n<li>\n<p><strong>異地重置點之膳食與乾淨飲水合約緊急預簽</strong>： 預估撤離轉運及到達異地初期將面臨斷糧斷水考驗 。採購小組須立即聯繫接收醫院周邊之合約餐廳、大型便利商店（如 7-11）或食品協力廠商 ，緊急調撥數日份之瓶裝礦泉水與乾糧 ，直接運抵重置點倉庫存放 。</p>\n</li>\n</ol>\n<p>四、 法律訴求小組 F3（職安室主任\n杜傳榮）：反資敵「資產銷毀」法律簽證、醫療免責與病歷個資保全</p>\n<p>此事件涉及重大國安與戰爭狀態，法律訴求小組長（職安室主任，兼任 HICS\n安全官 A2） 必須從法律與適法性層面死守醫院底線 ：</p>\n<ol>\n<li>\n<p><strong>執行高價值不可搬運資產之「反資敵銷毀」法律簽證</strong>： 針對體積龐大、高度仰賴大連院區常規電網、且在數小時內「物理上絕對無法搬運」的精密維生與醫療資產（如大型中央透析機、高階 CT、MRI） ： -   會同醫工組與工務室，確認執行<strong>「實體斷電、物理鎖固、破壞核心控制電路與拆卸銷毀硬碟」</strong>之程序 。 -   法律訴求小組須即時起草並由 F3 小組長（杜傳榮）簽發<strong>「戰時資產反資敵封存銷毀法律簽證書」</strong>，詳實記錄銷毀之資產型號、時間及依據之政府緊急命令，作為災後向國家申報損失補償與保險理賠之法定唯一憑證 。</p>\n</li>\n<li>\n<p><strong>保全醫療「反向檢傷」與「提早出院」之免責宣告說帖</strong>： 因應預防性撤離，醫院實施反向檢傷（強令生命徵象穩定之輕症病患辦理提早出院或下轉，騰出救護車與床位） 。 -   法律小組須備妥標準化之<strong>「戰時緊急醫療資源保留公告與免責說帖」</strong>，明訂在戰爭災害（緊急命令發布）狀態下，醫院依法執行反向檢傷之合法性。 -   將此免責文件印製成紙本，交由急診櫃檯、門診大廳及病房護理站，作為對抗不理性家屬申訴、醫療糾紛之「免責法律防磁盾牌」 。</p>\n</li>\n<li>\n<p><strong>維護 Downtime 紙本病歷與個資之「物理保密防護」</strong>： 在撤離的混亂過程中，前線大量產生 Downtime 紙本病歷、轉診單、手工欠繳單及病患手寫用藥治療紀錄 。法律小組須協同文件紀錄組（P3） ，督導病歷室與病房書記，將上述實體文件裝入<strong>「防潮、防偽加密封條之防水病歷夾鏈袋」中，強制物理鎖固於病患之擔架或隨車箱中</strong> ，嚴防病患隱私個資與醫療紀錄在戰火轉運途中外洩、遺失或損毀 。</p>\n</li>\n</ol>\n<p>五、 會計小組 F4（會計室主任\n趙一珍）：暴力啟動「戰時記帳豁免」與撤離在途現金流死守</p>\n<p>會計室主任趙一珍帶領會計團隊，必須打破平時繁瑣的入帳流程，以極致的類比方式支撐金流：</p>\n<ol>\n<li>\n<p><strong>暴力啟動「戰時記帳豁免機制」支持極速出院</strong>： 為確保一般病房內 30% 至 40% 的病患能在 4 小時內極速出院與下轉 ： -   會計小組指示所有批價、掛號櫃檯暫停常規的電子化入帳與繳費對帳程序 。 -   全面改收手寫「手工欠繳紀錄單」，在病患出院病歷上加蓋<strong>「戰時記帳豁免（事後追溯收款）」</strong>之實體紅色橡皮戳記 ，准予病患「零元結帳、免排隊立即離院」，徹底斬斷行政流程對醫療清空時效的阻礙 。</p>\n</li>\n<li>\n<p><strong>調撥並攜帶「戰時小額應急現金流（Petty Cash Go-Bag）」</strong>： 考量到戰時主戰區電網癱瘓、銀行停業、電子支付及 ATM 全面失效之「資訊全黑」絕境 ，會計組長須在撤離前，自本院金庫調撥並安全打包<strong>「會計應急現金包」</strong>（內含足額實體新台幣現鈔、應急支票簿、加油卡及手寫會計收據帳冊）。由會計人員隨同 HICS F0 部長攜帶至地下備援指揮所及異地重置點，用於轉運途中的<strong>車隊實體現金加油、臨時搬運工資發放、外部小額食水物資採購之即期支付</strong>，確保撤離車隊絕不因資金卡關而滯留主戰區。</p>\n</li>\n<li>\n<p><strong>災後帳務人工回補（Data Backfilling）與重建編列</strong>： -   待主院區核心HIS系統恢復、或接收端備援網路開機後，會計小組須與批掛掛號、資材及藥劑科全力配合，將所有手工處方、用藥及計價耗材實施<strong>「電腦手動補登回補（Data Backfilling）」</strong> 。 -   於危機管理委員會編列正式的<strong>「災後硬體設施原地重建與設備採購預算表」</strong>，陳報院長室及董事會籌措經費重建 。</p>\n</li>\n</ol>"}]}, {"role": "計劃部/狀況分析小組長", "entries": [{"scenario": "1-5", "title": "48小時降載至30%目標", "desc": "接獲屏東縣聯合應變管制中心通知，請以30%為目標，48小時內完成降載作業，並進行醫療量能盤點與資料彙整。", "html": "<p>針對接獲屏東縣聯合應變管制中心「48 小時內完成降載至 30%\n目標」之緊急指令，在\nHICS（醫院事故指揮系統）架構下，<strong>計畫部「狀況分析小組長」（編號\nP2，由護理部督導長擔任）</strong>是醫院的情報雷達與動向追蹤中樞。</p>\n<p>面對主推官提問的三大重點，狀況分析小組長的具體因應作為如下：</p>\n<p><strong>一、 針對 30 分鐘內指令確認、HICS 啟動與院內通報（因應提問 I）</strong></p>\n<ol>\n<li>\n<p><strong>極速就位與成立情報專區</strong>：接獲指揮官啟動 HICS 與降載指令後，狀況分析小組長須立即向計畫部長（P0，護理部部長）報到，並於指揮中心內設立「情報專區」。</p>\n</li>\n<li>\n<p><strong>協助發布事故行動計畫（IAP）</strong>：協助計畫部長將「48 小時內降載至 30%」的最高戰略目標，轉化為具體的事故行動計畫，並與指揮官確認後，通報給執行部與後勤部等各任務編組。</p>\n</li>\n<li>\n<p><strong>建立定時通報與狀況更新機制</strong>：啟動內部資訊通報機制，律定<strong>每 4 小時發布一次最新狀況報告</strong>（Status Report），將最新的降載進度、情勢預測及外部指令傳遞給各組長與發言人，確保全院應變資訊同步。</p>\n</li>\n</ol>\n<p><strong>二、 配合降載作業：執行病人動向追蹤與家屬安撫（因應提問 II）</strong>\n雖然實質的「反向檢傷」與病患篩選由執行部（醫療照護主管\nO1）執行，但狀況分析小組長必須主導降載期間的資訊正確性：</p>\n<ol>\n<li>\n<p><strong>啟動「病人動向追蹤機制」</strong>：轄下的「病人動向組」必須嚴密追蹤全院病患在降載過程中的去向。精確掌控哪些病患被列為「可返家/提早出院」、哪些被「轉院安置」或「留院照護」，確保病患在各區（或跨院轉移）的訊息傳遞正確可靠，絕不遺漏任何一人。</p>\n</li>\n<li>\n<p><strong>數據精算與疏散量能評估</strong>：配合執行部篩選出的名單，精算並評估在現有醫護人力與載具下，醫院的「最大疏散病人數量」，提供給指揮官作為後續資源分配的依據。</p>\n</li>\n<li>\n<p><strong>家屬詢答與情緒安撫</strong>：極限降載與強制出院極易引發家屬恐慌與不滿。狀況分析小組須彙整正確的病患動向名冊，協同社工室提供病人家屬正確的詢答資訊，進行情緒安撫，防範大廳或急診發生秩序失控。</p>\n</li>\n</ol>\n<p><strong>三、 盤點 SWEAT-M 關鍵資源與維持戰情面板（因應提問 III）</strong>\n狀況分析小組長須會同計畫部的「資源控管小組長（P1）」、後勤部及資訊室，完成跨部門的數據整合與上板：</p>\n<ol>\n<li>\n<p><strong>統合 SWEAT-M 關鍵資源評估數據</strong>：透過聯繫與協調，將全院的 <strong>SWEAT-M</strong> 狀態（包含：<strong>S</strong> 安全保障、<strong>W</strong> 水與廢水、<strong>E</strong> 備援電力與能源、<strong>A</strong> 交通可達性與疏散路線、<strong>T</strong> 電信通訊，以及 <strong>M</strong> 醫療物資與血氧量能）進行綜合分析，利用紅/黃/綠燈號標示資源的短缺與足夠狀態。</p>\n</li>\n<li>\n<p><strong>即時更新戰情面板（Status Board）</strong>：協同資訊室（O5），將收集到的 SWEAT-M 盤點數據、目前全院空床數、已降載出院人數、殘存醫護人力等關鍵情資，<strong>即時彙整並更新於實體或電子的「戰情面板（儀表板）」上</strong>。</p>\n</li>\n<li>\n<p><strong>對接指揮官與外部回報</strong>：將戰情面板上可視化的降載進度與資源缺口總結成報告，提供給事故指揮官做決策參考；同時將數據精準對接給「聯絡官」與「統籌呈報組」，確保醫院能於時限內向屏東縣聯合應變管制中心與衛生局完成量能回報與外部求援。</p>\n</li>\n</ol>"}]}, {"role": "執行部/醫療照護主管", "entries": [{"scenario": "1-5", "title": "48小時降載至30%目標", "desc": "接獲屏東縣聯合應變管制中心通知，請以30%為目標，48小時內完成降載作業，並進行醫療量能盤點與資料彙整。", "html": "<p>針對接獲屏東縣聯合應變管制中心「48 小時內完成降載至 30%\n目標」之緊急指令，在\nHICS（醫院事故指揮系統）架構下，<strong>執行部「醫療照護主管」（編號\nO1，通常由急診部主任、內外科主任或護理部督導長擔任）</strong>是第一線主導並執行醫療資源重分配、病床清空與病患分流的關鍵樞紐。</p>\n<p>面對主推官提問的第 II\n項重點（如何進行降載作業、病人篩選與門診調整公告），醫療照護主管的具體因應作為如下：</p>\n<p><strong>一、 暫停非急迫醫療服務與發布調整公告</strong>\n為了快速阻斷新的非緊急病患湧入，並保存醫療量能以應對戰時或災難需求，醫療照護主管必須立即下令執行業務縮減，並會同公共事務部門及資訊室對外發布醫療降載公告：</p>\n<ol>\n<li>\n<p><strong>門診與檢查降載</strong>：立即減少或暫停非醫院核心功能之醫療業務，<strong>無限期取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）的各項檢查</strong>。</p>\n</li>\n<li>\n<p><strong>手術延期</strong>：全面暫緩收治非緊急或選擇性手術，將寶貴的開刀房空間、麻醉藥品及救命手術的醫療能量絕對保留下來。</p>\n</li>\n</ol>\n<p><strong>二、 執行「反向檢傷（Reverse Triage）」與病人快速篩選</strong> 為達 48\n小時內將住院病人降載至 30%\n的嚴格目標，醫療照護主管須打破平時「不計代價救治」的常規收治邏輯，指揮資深主治醫師組成「反向檢傷特別小組」（為避免醫患情感影響判斷，可由平時不負責該病房之醫師擔任），進入一般病房甚至加護病房，強制評估並依醫療風險進行病患的快速分級與篩選：</p>\n<ol>\n<li>\n<p><strong>可出院病人（提早出院）</strong>：針對病情穩定、拔除靜脈點滴或提早出院在 <strong>72 小時內不會立即危及生命</strong>的病患，優先辦理提前出院手續；若需後續用藥者，給予口服藥或轉為門診追蹤模式。</p>\n</li>\n<li>\n<p><strong>可轉院 / 下轉病人（安置與轉診）</strong>：針對中重症但可移動，或需長期治療扶持之病患，啟動轉診機制，優先協調轉往後線支援醫院、基層診所或長照機構進行安置。</p>\n</li>\n<li>\n<p><strong>無法救治病患（戰時安寧）</strong>：對於極度依賴維生設備但預後極差的病患，醫療團隊須制定相應的安置方案，或啟動戰時安寧療護機制，避免佔用極限狀態下極其有限的急救資源。</p>\n</li>\n<li>\n<p><strong>必須留院病人（就地安置）</strong>：僅保留加護病房內插管、使用呼吸器、病情不穩定且無法轉出的重症病人。對於這類病患，優先配置留院照護，並規劃必要時轉移至地下替代醫療空間（如 B1 臨時 ICU）的動線。</p>\n</li>\n</ol>\n<p><strong>三、 極速騰出擴充量能（Surge Capacity）與資源重分配</strong></p>\n<ol>\n<li>\n<p><strong>病床清空與戰備轉換</strong>：督導護理站與病房單位將辦理出院或轉院的病床極速清空，並<strong>立刻換上戰備床單</strong>，強行騰出大連院區的急重症病床與開刀房空間，準備迎接隨時可能湧入的戰傷或大量傷病患。</p>\n</li>\n<li>\n<p><strong>人力與物資集中</strong>：將暫停常規服務單位（如門診、健檢）釋出之醫護及醫事人力，以及相關的物資，集中調度至醫院核心功能營運所需之重症單位。</p>\n</li>\n<li>\n<p><strong>照護比例重新配置</strong>：由於輕症病患大量轉出，留院者多為重度依賴的高風險病患。醫療照護主管必須<strong>按重症比例重新配置醫護人力與醫護比</strong>，確保降載後留院病人的安全與照護連續性。</p>\n</li>\n</ol>"}, {"scenario": "1-6", "title": "民眾縱火攻擊事件", "desc": "民眾因不滿醫院降載，於急診室外縱火。", "html": "<p>針對特別狀況「民眾因不滿醫院降載，而於急診室外縱火」，這屬於人為蓄意暴力與火災交織的「複合型危機」，同時極可能瞬間產生燒燙傷與嗆傷的大量傷患。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>執行部/醫療照護主管（O1，通常由急診部主任、內外科主任或護理部督導長擔任）</strong>是第一線傷患搶救與病患防護的最高醫療指揮官。面對主推官提問的重點，醫療照護主管的具體因應作為如下：</p>\n<p><strong>一、 災害現場應注意事項與環境判別（確保醫療作業安全）</strong></p>\n<ol>\n<li>\n<p><strong>確認「醫療紅區」的絕對安全</strong>：面對民眾縱火與潛在的暴動，醫療照護主管必須與「安全管制主管（O4，醫勤室保安組）」密切協調。在警消或保全未確認現場環境安全、未建立「實體防禦硬邊界」前，<strong>嚴禁醫護人員在無防護狀態下貿然衝入火場或暴動人群中進行救護</strong>，必須堅守「救災人員自身安全為最高原則」。</p>\n</li>\n<li>\n<p><strong>判估急診室內受災風險</strong>：迅速判別急診室外圍火勢、濃煙竄流方向，以及是否有波及急診室內氧氣管線引發二次爆炸的風險。若火煙已威脅到急診室內部，或暴徒企圖衝闖，須立即下令啟動「內部封鎖（Lockdown）」，降下防暴門，將醫護與現有重症病患保護於安全隔離區死守。</p>\n</li>\n</ol>\n<p><strong>二、 救援引導與急診室病患疏散</strong>\n若火勢或濃煙確實蔓延至急診搶救區，醫療照護主管必須果斷下令對「急診現有病患」進行救援引導與疏散：</p>\n<ol>\n<li>\n<p><strong>緊急疏散動線引導</strong>：指揮急診醫護人員暫停非緊急處置，將急診病患循與火源反方向的安全動線（如防火門另一側的鄰近安全棟別，或依預先規劃退至 B1 備援醫療空間）進行緊急疏散。</p>\n</li>\n<li>\n<p><strong>維持疏散中的醫療照護</strong>：在引導疏散過程中，必須確保重症病患（如插管、使用維生儀器者）的照護不中斷。醫護人員須攜帶緊急甦醒球（Ambu bag）、備用氧氣鋼瓶及急救藥品隨同病患轉移，並在人員移出後協助關閉防火門以侷限火煙。</p>\n</li>\n<li>\n<p><strong>設立臨時醫療站</strong>：於遠離火場及暴動人群的安全地帶（如門診大廳深處或地下室），迅速開設臨時救護站與檢傷區，重新集結醫療團隊並清點疏散病患人數。</p>\n</li>\n</ol>\n<p><strong>三、 檢傷分類與戰傷/燒燙傷搶救</strong>\n當火勢被控制或縱火傷患（包含遭波及的民眾或員工）被救出送至臨時醫療站時，醫療照護主管須立即展開大量傷患應變：</p>\n<ol>\n<li>\n<p><strong>啟動大量傷患機制（急診 333）與分區</strong>：若縱火造成傷患人數超出負荷，應通報指揮官啟動「急診 333」，緊急召回各科醫師與護理師支援。並於安全區迅速劃分：檢傷分類區、重傷治療區（紅區）、中傷治療區（黃區）及輕傷治療區（綠區）。</p>\n</li>\n<li>\n<p><strong>執行快速檢傷（START）</strong>：指派資深急診護理師或醫師擔任檢傷官，使用「快速檢傷（START）」或「兒童版快速檢傷（Jump START Pediatric）」，依病患的呼吸、循環與意識狀態，快速且冷酷地將傷患依紅、黃、綠、黑進行標示分類。</p>\n</li>\n<li>\n<p><strong>針對性緊急處置</strong>：針對縱火事件特有的<strong>燒燙傷、吸入性嗆傷及群眾推擠踩踏造成的創傷</strong>，指揮各區醫師優先進行呼吸道建立（插管）、給予高濃度氧氣、大量靜脈輸液（預防休克）及初步傷口覆蓋等「損傷控制復甦」處置。</p>\n</li>\n<li>\n<p><strong>資源調度與後送轉銜</strong>：統合各區傷患人數與傷情，向指揮中心回報。若重傷患人數超過醫院收治與處置能量，須立即透過聯絡官向衛生局或 EOC 請求救護車支援，將穩定後的燒燙傷病患後送至具備燒燙傷中心之合作醫院。</p>\n</li>\n</ol>"}]}, {"role": "執行部/安全管制主管", "entries": [{"scenario": "1-6", "title": "民眾縱火攻擊事件", "desc": "民眾因不滿醫院降載，於急診室外縱火。", "html": "<p>針對特別狀況「民眾因不滿醫院降載，而於急診室外縱火」，這屬於人為蓄意滋擾暴力與火災交織的「複合型安全危機」。在\nHICS（醫院事故指揮系統）架構下，<strong>執行部/安全管制主管（O4，通常由醫勤室保安組長擔任）</strong>是現場秩序維護、防暴控制與引導疏散的絕對核心。</p>\n<p>針對主推官提問的「現場環境判別、救援引導、檢傷分類」等過程，安全管制主管的具體因應作為如下：</p>\n<p><strong>一、 災害現場應注意事項與環境判別（防暴與現場封鎖）</strong>\n面對民眾縱火與潛在的群眾暴動，安全管制主管必須將「維安防護」與「災害控制」同步進行：</p>\n<ol>\n<li>\n<p><strong>雙重危害判別與確保自身安全</strong>：首先必須快速判別現場火勢規模與群眾失控程度。由於起火原因為「民眾不滿縱火」，現場極可能仍有暴徒或情緒激動的群眾。保安人員必須在確保自身安全的前提下行動，防範遭受暴徒攻擊。</p>\n</li>\n<li>\n<p><strong>啟動警民連線與外部求援</strong>：面對群眾抗爭與縱火，若事件無法立即平息，安全管制主管須立即指示警衛啟動「警民連線」，並撥打 110 報案請求優勢警力支援，同時通報 119 消防隊前來滅火。</p>\n</li>\n<li>\n<p><strong>實施「硬邊界防護」與現場封鎖</strong>：立即調派人力封鎖急診室外圍與火災現場，建立「實體防禦硬邊界（Hard Perimeter）」。拉起警戒線，必要時架設充水式紐澤西護欄或拒馬，將縱火暴徒與圍觀群眾強勢隔離於醫療搶救區之外。</p>\n</li>\n<li>\n<p><strong>啟動密錄器與現場蒐證</strong>：指示所有前往現場處理的警衛人員，務必開啟隨身配戴的「密錄器」，對縱火者的特徵、破壞行為及現場狀況進行全程錄影、拍照與蒐證，以利後續移交警方調查與醫院求償。</p>\n</li>\n</ol>\n<p><strong>二、 救援引導與疏散管制</strong>\n在火警發生時，安全管制主管轄下的保安人員需兼任自衛消防編組的「避難引導班」，確保人員安全撤離並維持救災通道暢通：</p>\n<ol>\n<li>\n<p><strong>啟動內部封鎖（Lockdown）保護紅區</strong>：若縱火暴徒企圖衝闖急診室，安全管制主管須果斷下令啟動「內部封鎖」。迅速降下急診室防暴門，將急診醫護人員與重症病患鎖入「安全隔離區（Safe Haven）」死守，防範暴徒搶奪醫療資源或造成人員傷亡。</p>\n</li>\n<li>\n<p><strong>安全疏散引導</strong>：在火勢威脅到急診室或候診區時，保安人員須引導受困的病患、家屬及醫護人員，循與火源反方向的安全動線（如防火門另一側或指定集結區）進行疏散避難，並在人員移出後協助關閉防火門以侷限火煙。</p>\n</li>\n<li>\n<p><strong>救災動線與交通淨空</strong>：強勢驅離急診前車道的違停或閒雜車輛。派員至院區重要路口接引消防車、救護車及警車，確保外部救援力量能第一時間順利進入火場與急救區。</p>\n</li>\n</ol>\n<p><strong>三、 協助檢傷分類之「秩序維護與動線管制」</strong>\n雖然實質的醫療「檢傷分類」由 T-CERT 救護班或急診醫護人員（醫療照護主管\nO1）執行，但安全管制主管必須為其提供絕對安全的作業環境：</p>\n<ol>\n<li>\n<p><strong>死守檢傷與救護站秩序</strong>：當救護班人員在安全的臨時救護站或緩衝區進行「快速檢傷（START）」與急救時，安全管制人員必須在周圍築起人牆或管制線。嚴格防範不滿的民眾或恐慌的家屬干擾檢傷流程或搶奪急救器材。</p>\n</li>\n<li>\n<p><strong>單向動線管制</strong>：配合急診或救護班建立單一且受控的檢傷通道，確保只有需要救治的傷患能夠進入治療區，將非醫療需求或企圖滋事的人員強勢驅離至管制區外。</p>\n</li>\n<li>\n<p><strong>保護傷患與財物</strong>：在混亂的檢傷與疏散過程中，協助確保傷患的個人財物妥善保管，防止有心人士趁火打劫。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況\n2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，醫院正面臨極高的實體安全威脅（敵方滲透或恐怖攻擊）、資源搶奪風險以及群眾恐慌失控的危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>執行部／安全管制主管（O4，通常由醫勤室保安組長擔任）</strong>是維持全院秩序、防護與動線管制的絕對核心。為達成院區警戒、出入口管制、監視器巡邏及確保救援動線不被阻斷，其具體因應與協調作為如下：</p>\n<p><strong>一、 實施「硬邊界防護」與極限出入口管制</strong></p>\n<ol>\n<li>\n<p><strong>極速物理封鎖</strong>：接獲指令後，安全管制主管須會同支援警力與民防單位，立即封閉院區 80% 的出入口與側門。透過拉下防火鐵捲門，並架設充水式紐澤西護欄、蛇籠、拒馬，甚至調度院方工程車橫停作為防衝撞的實體阻絕物，將非醫療需求的避難群眾阻絕於外。</p>\n</li>\n<li>\n<p><strong>設立單一武裝檢查站</strong>：全院僅保留急診車道作為唯一出入口，並設立由「武裝警力與院方高階護理師」共同站哨的聯合檢查站（Check-point）。執行嚴格的武器搜查、身分核對與醫療需求確認，強勢驅離僅為尋求庇護或索購物資的非緊急群眾，杜絕武裝人員或無關人員進入核心醫療區。</p>\n</li>\n</ol>\n<p><strong>二、 員工識別、訪客限制與防範第五縱隊滲透</strong></p>\n<ol>\n<li>\n<p><strong>嚴格盤查與身分核對</strong>：面對無人機與不明人車的偵蒐，可能為敵方第五縱隊（在地協力者）的破壞前兆，保全人員須落實極嚴格的身分核對與專屬識別配發。</p>\n</li>\n<li>\n<p><strong>防範偽裝者</strong>：配備金屬探測器與防爆毯，嚴格盤查院內可疑人士（包含穿著白袍的可疑偽裝人士），防範爆裂物放置、電纜剪斷或於水源投毒等毀滅性破壞作為。</p>\n</li>\n<li>\n<p><strong>訪客與陪病限制</strong>：全面限制探訪時段與陪病人數，家屬必須持實聯登記或陪病證方可進入，並將無關家屬隔離於急診搶救區之外，避免急診動線遭癱瘓。</p>\n</li>\n</ol>\n<p><strong>三、 反破壞武裝巡邏與監視器監控</strong></p>\n<ol>\n<li>\n<p><strong>監控與目標辨識</strong>：透過中控室 24 小時監視系統監控全院各公共區域，隨時掌握院區周邊動態，落實可疑無人機與不明人車的辨識、攔查及通報機制。</p>\n</li>\n<li>\n<p><strong>死守關鍵基礎設施（CI）</strong>：針對醫院的心臟地帶，如地下室緊急發電機房、伺服器資訊機房、頂樓水塔及戶外液氧槽等，增設 24 小時雙人武裝與防暴裝備巡邏哨，實施重兵看守。</p>\n</li>\n</ol>\n<p><strong>四、 確保救護車轉送與物資補給動線不被阻斷</strong></p>\n<ol>\n<li>\n<p><strong>交通與動線淨空</strong>：安全管制主管須強勢執行院區周邊與急診前方的交通管制，驅離急診前車道的違停或閒雜車輛。</p>\n</li>\n<li>\n<p><strong>專屬通道引導</strong>：專責引導救護車、關鍵物資卸補車輛及外部支援單位車輛進出，確保重症傷患的運輸與急救通道絕對暢通，不被恐慌群眾或避難人潮癱瘓。</p>\n</li>\n</ol>\n<p><strong>五、 啟動內部防暴鎖定與協調警消民防支援</strong></p>\n<ol>\n<li>\n<p><strong>防暴鎖定（Lockdown）與安全隔離</strong>：若社區群眾因恐慌或企圖搶奪物資（如抗生素、麻醉藥品）而演變為暴動衝闖，安全管制主管須迅速啟動「內部封鎖（Lockdown）」，瞬間降下急診室防暴門並關閉全院電梯控制權。將醫護人員與重症病患鎖入預先規劃的「安全隔離區（Safe Haven）」，由保全人員持防暴盾牌結陣死守。</p>\n</li>\n<li>\n<p><strong>現場蒐證與緊急報案</strong>：在維持秩序的同時，保安人員須開啟隨身密錄器進行錄影、拍照與蒐證；若遇強暴脅迫無法平息，應立即啟動警民連線並撥打 110 報案。</p>\n</li>\n<li>\n<p><strong>外部武裝接引與協防</strong>：與聯絡官配合，和轄區警察局、消防局、保二總隊及在地民防中隊保持密切聯繫。當外部武裝或防暴警力抵達時，安全管制組負責進行支援接引與動線引導，協同警方進行防暴、反制破壞作業及人潮轉移疏導。</p>\n</li>\n</ol>"}]}, {"role": "執行部/機構運作組", "entries": [{"scenario": "1-7", "title": "院內網路服務不穩", "desc": "院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況「院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲（疑似遭受資安攻擊）」，在\nHICS（醫院事故指揮系統）架構下，<strong>執行部/機構運作組（機構運作主管\nO5，通常由資訊室主任或醫工組員擔任）</strong>肩負維持醫院資訊核心功能、資安防禦與系統備援的關鍵重任。</p>\n<p>面對資訊系統延遲及潛在的資安威脅，機構運作組的具體因應作為如下：</p>\n<p><strong>一、 資安事件偵測、分級通報與隔離阻斷</strong></p>\n<ol>\n<li>\n<p><strong>網路流量監控與實體隔離</strong>：針對掛號、批價、檢驗或影像系統出現延遲、異常登入或疑似惡意連線，機構運作組須立即透過網路流量監控清查是否有大量病毒感染或駭客攻擊。一旦發現異常，應迅速將受感染網段之網路交換器拔除連線，執行「實體隔離與阻斷」，防範災情擴大並癱瘓核心的 HIS（醫療資訊系統）與 PACS（醫療影像）系統。</p>\n</li>\n<li>\n<p><strong>資安事件分級與法定通報</strong>：依據事件嚴重程度進行資安事件分級。確認為重大資安事件後，迅速向院內指揮官報告，並協同統籌呈報組，向外部主管機關（如衛福部）完成法定的資安通報作業。</p>\n</li>\n</ol>\n<p><strong>二、 下達系統癱瘓宣告並全面啟動「紙本降級（Downtime）」作業</strong>\n若評估系統延遲無法於短時間內排除，機構運作組必須果斷採取極限降載措施：</p>\n<ol>\n<li>\n<p><strong>宣告 Downtime 模式與通知前線</strong>：由機構運作主管（資訊室主任）向指揮官回報後，正式宣告啟動「全院當機處理機制」。透過備援通訊或總機（如 *9 緊急通報），緊急通知急診、門診、護理部、檢驗科、放射科、藥局及病歷室等單位，全面停止依賴電腦，切換為離線人工作業。</p>\n</li>\n<li>\n<p><strong>引導啟用當機緊急箱</strong>：指導前線單位砸破封條，取出預先整備的「當機緊急箱（Downtime Box）」。全面改用三聯式紙本病歷、手寫處方箋、紙本檢傷單，並依靠每日離線列印的最新住院名單來維持基礎醫療運作。</p>\n</li>\n</ol>\n<p><strong>三、 優先維持核心醫療運作與備援通訊</strong></p>\n<ol>\n<li>\n<p><strong>保障核心單位之離線運作流程</strong>：在系統降級期間，將搶修與支援資源絕對集中，優先維持急診、藥局、檢驗、放射及病歷查詢等攸關病患生命安全的核心服務。配合行政部門啟動的「傳令兵（Runner）制度」，以專人徒步方式精準遞送手寫醫囑、檢驗危險值（Panic Value）與實體 X 光片，克服斷網危機。</p>\n</li>\n<li>\n<p><strong>建構異質性戰術通訊網</strong>：若常規內部網路與分機系統因攻擊而癱瘓，機構運作組須協助架設或啟用備援通訊設備（如低軌衛星設備、UHF/VHF 獨立頻段無線電），確保院內各樓層指揮官、搶修團隊與外部主管機關的關鍵通訊暢通無阻。</p>\n</li>\n</ol>\n<p><strong>四、 資料備份保全與排定核心系統復原順序</strong></p>\n<ol>\n<li>\n<p><strong>確保異地備援與資料保護</strong>：確保所有核心醫療資料與電子病歷皆已安全備份至異地（如瑞光院區 7F 的異地備援機房）。在系統隔離狀態下，隨時準備由備援主機接手資料儲存與運算功能，以維護資訊的機密性、完整性與可用性。</p>\n</li>\n<li>\n<p><strong>依優先序執行系統復原</strong>：待病毒排除與資安威脅解除後，機構運作組須依據「急診、掛號批價、藥局、檢驗及影像系統」的優先順序，逐一將主機與網路設備重新開機並進行連線測試。</p>\n</li>\n<li>\n<p><strong>宣告復原與資料回補</strong>：經系統管理人員與各使用單位代表測試無誤後，正式通知全院結束當機處理機制，恢復資訊化作業，並協助各單位將紙本降級期間產生的大量手寫病歷與處方資料回補輸入至電腦系統中，確保佐證紀錄的完整。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況\n2-1「臺灣周邊海空域受封鎖或管制，屏東地區燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨極嚴峻的「孤島效應」與物資匱乏。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>執行部／機構運作主管（O5，由資訊室主任或醫工組技術師擔任）</strong>的核心職責是「協助醫院功能持續運作或重置，減少中斷必要之服務」。面對外部封鎖與資源延遲，機構運作主管的具體因應作為如下：</p>\n<p><strong>一、 執行 72 小時核心物資（資通訊與醫工設備）盤點、精算消耗與缺口</strong></p>\n<ol>\n<li>\n<p><strong>盤點醫工維生設備與備用耗材</strong>：機構運作主管須立即帶領醫工人員，針對全院關鍵醫療設備（如呼吸器、葉克膜、生理監視器、血液透析機等）進行總盤點，並清點相關設備的備用電池與專用耗材存量。</p>\n</li>\n<li>\n<p><strong>盤點資通訊與機房備援系統</strong>：帶領資訊室人員盤點不斷電系統（UPS）的電池健康度、機房空調冷卻需求，以及備援通訊設備（如 UHF/VHF 無線電對講機、低軌衛星接收器、公務手機）的數量與可用性。</p>\n</li>\n<li>\n<p><strong>精算消耗速率與提報缺口</strong>：評估在市電不穩或發電機供電的極限狀態下，UPS 電池能支撐的時間（例如是否能滿足至少 30 分鐘以上的緩衝），並估算醫工設備維修零件的 72 小時消耗缺口。將此缺口數據迅速提報給計畫部（資源控管小組 P1）與 HICS 指揮中心。</p>\n</li>\n</ol>\n<p><strong>二、 確立電力與維生設備之「優先順序」（配合黑堡節流計畫）</strong>\n在燃油配送延遲的情境下，機構運作主管必須與「設施運作主管（O2，工務室）」密切協同，確立極限狀態下的資源優先序：</p>\n<ol>\n<li>\n<p><strong>劃定資通訊與醫工設備之「供電紅區」</strong>：機構運作主管必須列出絕對不能斷電的核心設備清單。在工務室執行「電力負載卸除（Load Shedding）」時，確保緊急發電機的寶貴電力與燃料，<strong>優先且絕對死守在加護病房（ICU）、急診搶救區、開刀房的維生醫療儀器，以及維持電子病歷運作的核心伺服器機房與不斷電系統（UPS）</strong>。</p>\n</li>\n<li>\n<p><strong>主動關閉非核心系統以節約能源</strong>：為了降低 UPS 與發電機的負載及機房空調的散熱需求，主動關閉非必要的行政資訊系統、周邊測試伺服器與非緊急醫療儀器，實施資訊與醫工設備的「極限節流」。</p>\n</li>\n</ol>\n<p><strong>三、 替代供應商及向主管機關請求支援流程</strong>\n面對外部供應鏈中斷與員工無法到勤的危機，機構運作主管須啟動備援供應機制：</p>\n<ol>\n<li>\n<p><strong>緊急聯繫在地替代維護廠商</strong>：針對不斷電系統（UPS）、高壓機電與關鍵醫療設備，立即聯繫不受長途交通阻斷影響的在地或合約維護廠商（如：先進、飛暢、祥宇等 UPS 廠商），要求在交通完全癱瘓前，將備用電池、維修零組件或駐點工程師先行派駐至院內。</p>\n</li>\n<li>\n<p><strong>向主管機關請求緊急支援</strong>：若關鍵醫療設備故障或通訊網路中斷，且維修廠商因交通管制無法抵達，機構運作主管須將危機上報指揮官，由聯絡官向<strong>地方政府衛生局、緊急醫療應變中心（EOC）或縣市聯合應變指揮中心</strong>提出緊急支援請求。必要時請求協調軍警消單位，徵用車輛並強行突破交通壅塞節點，護送急需的資通訊/醫工搶修零件與技術人員進入院區。</p>\n</li>\n</ol>\n<p><strong>四、 整備斷網應變與「紙本降級（Downtime）」作業</strong>\n在海空域遭封鎖的灰色地帶衝突中，極易伴隨敵方的網路攻擊或海底電纜破壞。機構運作主管必須提前為「資訊全黑」做好準備：</p>\n<ol>\n<li>\n<p><strong>宣告並整備 Downtime 模式</strong>：確認全院各護理站、急診與門診的「當機緊急箱（Downtime Box）」處於可隨時啟用狀態。一旦發生無預警斷網，立即協助前線切換為三聯式紙本病歷、手寫處方箋與紙本檢傷單的離線作業模式。</p>\n</li>\n<li>\n<p><strong>建立異質性戰術通訊網</strong>：若外部電信網路或院內分機因封鎖癱瘓，機構運作主管須協助架設低軌衛星（如 OneWeb/Starlink）設備維持對外連線，並分配獨立頻段的無線電給各樓層指揮官，配合行政部門啟動「傳令兵（Runner）制度」，以人工徒步方式遞送緊急醫囑與情報，確保醫療運作不中斷。</p>\n</li>\n</ol>\n<p><strong>五、 因應員工到勤受阻之人力調度</strong>\n針對資訊室與醫工組工程師因交通受阻無法到勤的缺口：</p>\n<ol>\n<li>\n<p><strong>集中駐院戰力與強制輪替</strong>：將已在院內或突破交通障礙抵達的資通訊與醫工人員集中管理，實施軍事化強制輪班，確保 24 小時皆有技術人員緊盯核心系統與維生設備的運作狀態。</p>\n</li>\n<li>\n<p><strong>建立遠端安全連線</strong>：針對受困於家中無法到院的工程師，在確保資安防禦（如 VPN 與多重身分驗證）的前提下，開放遠端權限協助進行伺服器監控與軟體障礙排除，將實體人力集中於硬體搶修與設備搬運。</p>\n</li>\n</ol>\n<p>如何向主管機關呈報關鍵資源評估結果？</p>\n<p>向主管機關呈報關鍵資源評估（SWEAT-M）結果，主要透過「統籌呈報組」與「聯絡官」進行資料彙整與對外聯繫，並依據「平時演習整備」與「災時/戰時應變」階段有不同的呈報方式與流程：</p>\n<p><strong>一、 內部盤點與資料彙整機制</strong></p>\n<ol>\n<li>\n<p><strong>執行 SWEAT-M 燈號評估</strong>：由工務室、保安組、醫務部等主責單位，針對安全保障 (S)、水與廢水 (W)、備援電力與能源 (E)、交通可達性與疏散路線 (A)、電信通訊 (T) 以及醫療物資 (M) 進行盤點。評估過程中需利用紅、黃（琥珀）、綠色燈號，具體標示各項關鍵資源狀況是不足、緊張還是足夠。</p>\n</li>\n<li>\n<p><strong>統一收斂與彙整</strong>：由「統籌呈報組」（通常由副院長擔任組長）作為全院資訊的單一收斂窗口，負責將計畫部與各組盤點完畢的「床位名冊、手術/加護調度、72小時物資與醫療氣體缺口」等綜合量能與資源狀況進行彙總。</p>\n</li>\n</ol>\n<p><strong>二、 確立對外單一聯繫窗口</strong>\n對外呈報統一由<strong>聯絡官（LNO，由行政副院長擔任）</strong>作為醫院與衛生局、緊急醫療應變中心（EOC）、警消及地方政府應變管制中心等外部機關的「唯一官方聯繫窗口」，以確保通報管道暢通且資訊一致。</p>\n<p><strong>三、 呈報方式與時程要求</strong> <strong>1. 平時演習與整備階段（法定公文呈報）</strong></p>\n<ul>\n<li>\n<p><strong>演習前呈報</strong>：在演習前三週（如規定之 7/16），統籌呈報組須將「關鍵資源評估表」聯同演習計畫，透過公文或電子檔案直接呈報給地方衛生局進行初審，隨後報請衛生福利部核定。</p>\n</li>\n<li>\n<p><strong>演習後函復</strong>：演習檢討會後，主責單位（如保安組）須於規定期限內（如 8/20 前），將最終的「關鍵資源評估表」連同缺失改進追蹤表等資料，正式發文函復衛生局核備。</p>\n</li>\n</ul>\n<p><strong>2. 災時/戰時緊急應變階段（限時動態呈報）</strong></p>\n<ul>\n<li>\n<p><strong>落實限時初報與續報</strong>：當真實災害或戰事發生，接獲主管機關指令後，統籌呈報組與聯絡官必須在主管機關規定的時限內，迅速完成醫療量能的「限時初報」，並隨情勢發展定期執行「續報」作業。</p>\n</li>\n<li>\n<p><strong>具體提出支援缺口</strong>：在通報國土安全事件或重大災難時，不能僅呈報數據，必須具體說明「目前的醫療量能」以及「外部支援需求」，例如明確向主管機關請求調撥缺乏的藥材、血液、維生物資，或請求大眾運輸與救護車的調度支援。</p>\n</li>\n<li>\n<p><strong>啟動備援通訊呈報</strong>：平時透過律定之通訊網路與衛生局 EOC 系統連線呈報；若遭遇資安攻擊、斷網或斷訊等極端狀況，資訊室與機構運作主管須立即啟動備援通訊設備（如低軌衛星電話、UHF/VHF 無線電），確保關鍵資源短缺的求援情報能成功上傳並順暢對接主管機關。</p>\n</li>\n</ul>\n<p>如何向主管機關請求緊急支援？</p>\n<p>在醫院事故指揮系統（HICS）及緊急災難應變架構下，向主管機關請求緊急支援的流程與具體作為，主要透過<strong>單一聯繫窗口</strong>進行，並依據所需的支援類型向特定的主管機關提出明確請求。具體作法如下：</p>\n<p><strong>一、 確立對外單一聯繫窗口與通報機制</strong></p>\n<ol>\n<li>\n<p><strong>啟動聯絡官（LNO）機制</strong>：由行政副院長擔任「聯絡官」，作為醫院與衛生局、緊急醫療應變中心（EOC）、警消機關、地方政府聯合應變管制中心及軍方戰情中心等外部機關的「唯一官方聯繫窗口」，以確保通報管道暢通且資訊一致。</p>\n</li>\n<li>\n<p><strong>通報與提出請求</strong>：聯絡官或統籌呈報組須於時限內向主管機關完成限時初報與續報，並根據院內盤點結果，具體說明目前的醫療量能與外部支援需求。</p>\n</li>\n</ol>\n<p><strong>二、 提出請求時的必備資訊</strong>\n向主管機關請求外部支援時，必須提供完整且具體的資訊，以利專業單位立即應處：</p>\n<ol>\n<li>\n<p><strong>災情與需求說明</strong>：說明災情及現場位置、須注意事項，以及對方應具備之專業與裝備。</p>\n</li>\n<li>\n<p><strong>集結與後勤安排</strong>：向支援單位指定集結地點、休息區及報到時間，並為支援人員安排飲食等後勤支援。</p>\n</li>\n<li>\n<p><strong>損害評估請求</strong>：必要時可協請外部專家（如結構技師、機電專家）進行損害評估與技術指導。</p>\n</li>\n</ol>\n<p><strong>三、 針對不同情境的特定主管機關請求流程</strong> <strong>1.\n醫療物資、藥材與血液支援</strong></p>\n<ul>\n<li>\n<p><strong>請求單位</strong>：地方政府衛生局、緊急醫療應變中心（EOC）、血液基金會（捐血中心）。</p>\n</li>\n<li>\n<p><strong>具體作為</strong>：當醫院遭遇物資短缺時，可電洽衛生局請求協助緊急調撥物資，且資源調撥以「藥材及衛材」為最優先。若血庫見底，聯絡官須向 EOC 或捐血中心請求血液與相關醫材的緊急運補。</p>\n</li>\n</ul>\n<p><strong>2. 救護車、大眾運輸與交通調度支援</strong></p>\n<ul>\n<li>\n<p><strong>請求單位</strong>：縣市聯合應變指揮中心、地方衛生局緊急醫療網（EOC）。</p>\n</li>\n<li>\n<p><strong>具體作為</strong>：在面臨大量傷患或須進行大規模病患撤離時，若院內救護車與接駁車輛不足，應立即向衛生局 EOC 或聯合應變中心請求「救護車調度」及「大眾運輸工具（接駁車）徵用」。若遭遇聯外交通中斷，可協調調度徵用車輛（含軍警消車輛）強行突破交通壅塞節點，護送關鍵物資與血品進入院區。</p>\n</li>\n</ul>\n<p><strong>3. 安全防護與武裝防暴支援</strong></p>\n<ul>\n<li>\n<p><strong>請求單位</strong>：轄區警察局（如派出所）、保二總隊、消防局、機動中隊或在地民防單位。</p>\n</li>\n<li>\n<p><strong>具體作為</strong>：面對可疑無人機偵蒐、不明人車威脅或群眾恐慌暴動時，聯繫窗口須啟動「警民連線」並撥打 110，請求派遣優勢武裝警力到院協防。協請警方協助實施院區「硬邊界」物理封鎖、外圍交通管制，並防範敵方破壞或維持急診單一武裝檢查站的秩序。</p>\n</li>\n</ul>\n<p><strong>4. 維生基礎設施搶修與支援</strong></p>\n<ul>\n<li>\n<p><strong>請求單位</strong>：消防局、工務局、自來水公司、台電。</p>\n</li>\n<li>\n<p><strong>具體作為</strong>：若發生嚴重停水或水患，可向工務局及自來水公司申請抽水及送水服務，或向消防局請求消防水車及抽水機具支援；若遇火警、電梯受困或台電跳電等超出院方搶修能力的設施損壞，應迅速通報 119 勤務中心或台電請求緊急搶修支援。</p>\n</li>\n</ul>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>在\nHICS（醫院事故指揮系統）架構下，<strong>執行部／機構運作組（O5）</strong>（主要由資訊室主任及醫工組長擔任主管與成員）的核心任務為「協助醫院功能持續運作或重置，減少中斷必要之服務」。面對空襲威脅，醫院必須進行大面積的「空間降階防護」，將醫療量能移轉至地下一樓（B1）。</p>\n<p>針對 B1\n備援醫療空間的開設要求，機構運作組（涵蓋醫工與資訊）的具體因應與建置作為如下：</p>\n<p><strong>一、 關鍵醫療儀器之評估、拆裝與轉移重置（醫工組主責）</strong></p>\n<ol>\n<li>\n<p><strong>救命設備轉移與戰力延續</strong>：醫工人員必須協助評估、拆卸高價值且小型的救命儀器，將急救與維持生命所需的關鍵醫療儀器設備，從高樓層高風險區安全且迅速地移轉至 B1 備援功能區。</p>\n</li>\n<li>\n<p><strong>針對 B1 重症紅區之設備佈建</strong>： -   針對<strong>韓偉大樓 B1 腹膜透析室（臨時開刀房）約翰／馬可大樓 B1 資材組前方（臨時 ICU）</strong>，醫工組必須確保如生理監視器、麻醉機、呼吸器等高階維生設備成功移轉，並在地下空間完成重新佈設與校正測試，確保戰傷手術與重症監測的醫療作業能無縫接軌。</p>\n</li>\n</ol>\n<p><strong>二、 B1 備援醫療空間之資訊網路佈建與系統備援（資訊室主責）</strong></p>\n<ol>\n<li>\n<p><strong>地下資訊設施架設</strong>：配合空間轉置，資訊室必須迅速將必要的電腦終端設備、讀卡機、印表機與網路設施，重新佈設於 B1 的五處備援功能區（<strong>工務室前方檢傷行政區、臨時開刀房、恢復室、臨時 ICU 病房及路加 B1 停車場輕症病房</strong>），以維持急診檢傷、檢驗、放射、掛號批價及病歷查詢等核心醫療與行政服務持續運作。</p>\n</li>\n<li>\n<p><strong>核心系統與資料備份</strong>：由機構運作組（資通組）確認 HIS（醫療資訊系統）、EMR（電子病歷）、PACS（醫療影像）、檢驗、藥局、掛號批價及病歷資料之備援狀況。必須確保所有重要的醫療數據皆已安全備份，以維護資訊的機密性、完整性與可用性。</p>\n</li>\n</ol>\n<p><strong>三、 斷電與斷網狀態下的「紙本降級（Downtime）」極限作業</strong>\n空襲震波極可能摧毀機房，或伴隨敵方網路攻擊導致系統癱瘓。若因電源問題導致電腦系統無法運作，UPS（不斷電系統）僅能供應約\n15\n分鐘運轉，若半小時內電力無法恢復或網路全斷，機構運作組必須採取極限手段：</p>\n<ol>\n<li>\n<p><strong>宣告並啟動紙本降級</strong>：機構運作主管須立即宣告全院進入「紙本降級模式（Downtime）」，通知各單位停止依賴電腦系統，改為手工作業。</p>\n</li>\n<li>\n<p><strong>暴力啟用當機緊急箱</strong>：指示 B1 備援空間內的前線醫療與行政單位，立即砸破封條並取出預先整備的<strong>「當機緊急箱（Downtime Box）」</strong>。全面啟動紙本降級作業，改用內附的三聯式手寫病歷、手寫處方箋、紙本檢傷單與紙本表單，並依靠離線列印的病患名冊來維持地下微型戰地醫院的醫療運作。</p>\n</li>\n</ol>\n<p><strong>四、 建構地下備援通訊網</strong>\n地下室極易發生訊號死角，機構運作組（資通組）必須準備備援通訊設備，包含無線電與行動電話，確保在常規通訊受阻時，B1\n指揮中心與各臨時醫療區（如臨時開刀房、急診區）之間的通訊與離線作業流程能保持暢通，並統一對外訊息的發布管道。</p>"}]}, {"role": "執行部/設施運作組", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況\n2-1「臺灣周邊海空域受封鎖或管制，屏東地區燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，醫院正面臨嚴峻的物資匱乏與交通受阻的「孤島效應」。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>執行部 /\n設施運作主管（O2，通常由工務室主任擔任）</strong>是維繫醫院「生命線（Lifelines）」的絕對保衛者。面對主推官的提問，設施運作主管的具體因應作為如下：</p>\n<p><strong>一、 提出 72 小時核心物資盤點、精算消耗速率與補給缺口</strong></p>\n<ol>\n<li>\n<p><strong>極限盤點與精算</strong>：設施運作主管須立即針對醫院基礎運作的「三大命脈」------<strong>燃油（緊急發電機柴油）、醫療氣體（中央液氧槽及鋼瓶）、以及水資源（地下水塔儲水量）</strong>進行極限盤點。</p>\n</li>\n<li>\n<p><strong>評估消耗速率與缺口</strong>：依據戰時高壓環境及留院重症病患的需求，工程師需每小時精算剩餘儲油量、水資源及氧氣的消耗速率，確保在「最低維生耗能」下能撐過法定的 72 小時甚至 120 小時極限運作，並明確估算出補給缺口。</p>\n</li>\n<li>\n<p><strong>通報指揮中樞</strong>：將精算出的資源存量與短缺缺口，即時向 HICS 指揮中心與計畫部（資源控管小組 P1）回報，以作為後續醫療降載與外部求援的決策依據。</p>\n</li>\n</ol>\n<p><strong>二、 確立氧氣、油料與水電之優先順序，執行「黑堡」極限節流</strong>\n面對配送延遲，設施運作主管必須冷酷執行資源配給與「黑堡（Black\nStart）」孤島應變，以確保核心醫療不中斷：</p>\n<ol>\n<li>\n<p><strong>油料與電力優先序（執行負載卸除 Load Shedding）</strong>：因應燃油配送延遲，為確保緊急發電機的續航力，設施運作主管必須<strong>主動手動切斷行政辦公區、一般病房、冷氣空調、大型景觀照明與非維生醫療儀器的電源迴路</strong>。將所有寶貴的備用電力與油料，<strong>絕對死守在開刀房、加護病房（ICU）、急診室搶救區、伺服器機房與血庫冰箱等「紅區」</strong>。</p>\n</li>\n<li>\n<p><strong>氧氣與醫療氣體優先序</strong>：密切監控中央液氧槽的壓力。若氣體因運補中斷即將耗盡，須迅速協助醫療前線切換至備用氧氣鋼瓶。若備用鋼瓶亦告罄，須立即配合醫療照護主管，動員行政人員或輕傷家屬組成<strong>「捏球大隊」</strong>，以手動甦醒球（Ambu bag）接力維持重症病患呼吸，將氧氣絕對保留給最高需求的插管或手術病患。</p>\n</li>\n<li>\n<p><strong>水資源優先序</strong>：啟動院內地下戰備水塔，並打開連結管路互補供水。實施極度嚴格的「水資源紅區管制」，<strong>最乾淨的水源僅保留供開刀房刷手、器械基本消毒與病患飲用</strong>；嚴禁一般盥洗與沖馬桶（全面改發化學便器袋及使用乾洗手液）。</p>\n</li>\n</ol>\n<p><strong>三、 替代供應商及向主管機關請求支援流程</strong> 當院內極限節流仍無法彌補 72\n小時的消耗缺口時，設施運作主管須立即啟動外部求援與替代方案：</p>\n<ol>\n<li>\n<p><strong>橫向協調替代供應商</strong>：將油、水、氣的短缺缺口通報給後勤部與行政/財務部的「採購小組（F2）」，啟動在地替代供應商機制。例如，若地下水系統亦無法支撐，須立刻聯絡在地水商（如高山行山泉水）外購水源，或聯繫在地氣體廠商（如信光氧氣）緊急調度鋼瓶。</p>\n</li>\n<li>\n<p><strong>向主管機關請求支援流程</strong>：若因交通阻斷導致民間替代供應商無法運達，設施運作主管須將「維生物資面臨斷鏈」的危機上報給指揮官。由<strong>聯絡官（A3，行政副院長）地方政府衛生局、緊急醫療應變中心（EOC）或縣市聯合應變指揮中心</strong>提出緊急支援請求。</p>\n</li>\n<li>\n<p><strong>協調公權力介入運補</strong>：透過聯絡官協調，請求消防局調派消防水車支援醫院緊急供水；或請求聯合應變中心徵用軍警消車輛，強行突破交通壅塞節點，護送緊急燃油（柴油）與醫療氣體槽車進入院區卸補，以確保醫院生命線維持運作。</p>\n</li>\n</ol>\n<p>設施運作主管如何執行節流？ 補給中斷時的替代供應商為何？\n如何向主管機關請求緊急支援？</p>\n<p><strong>一、 設施運作主管如何執行節流（極限負載卸除與配給）</strong></p>\n<p>在面臨物資配送延遲或中斷的孤島狀態下，設施運作主管（工務室主任）必須冷酷</p>\n<p>我目前無法回覆。</p>\n<p>設施運作主管如何執行節流？ 補給中斷時的替代供應商為何？\n如何向主管機關請求緊急支援？</p>\n<p>針對您所提問的設施運作節流方式、替代供應商以及向主管機關求援的流程，在\nHICS（醫院事故指揮系統）架構與本院危機管理計畫中，有非常明確的規範與具體作為：</p>\n<p><strong>一、 設施運作主管如何執行節流（極限負載卸除與配給）</strong></p>\n<p>在面臨物資配送延遲或中斷的「孤島狀態」下，設施運作主管（工務室主任）必須冷酷地執行「黑堡（Black\nStart）」極限節流應變，確保核心醫療不中斷：</p>\n<ol>\n<li>\n<p><strong>電力極限節流（負載卸除 Load Shedding）：</strong> 設施運作主管不能被動等待跳電，而是必須主動、手動切斷所有行政辦公區、一般病房、冷氣空調、大型景觀照明、非維生醫療儀器與 80% 電梯的電源迴路。將緊急發電機的所有寶貴電力，絕對死守在開刀房、加護病房（ICU）、急診室搶救區、伺服器機房與血庫冰箱等「醫療紅區」。工程師須每小時精算剩餘儲油量並監控發電機溫度，確保在「最低維生耗能」下能撐過法定的 72 小時甚至 120 小時。</p>\n</li>\n<li>\n<p><strong>水資源極限管制：</strong> 啟動院內地下戰備水塔，並實施極其嚴格的「水資源分級配給」。最乾淨的水源僅保留供開刀房刷手、器械基本消毒與病患飲用。嚴禁一切員工與病患進行一般盥洗與沖馬桶，全面改發化學便器袋，並要求全院使用乾洗手液維持手部衛生。</p>\n</li>\n<li>\n<p><strong>醫療氣體節流：</strong> 密切監控中央液氧槽的壓力。若氣體因運補中斷即將耗盡，須迅速協助醫療前線切換至備用氧氣鋼瓶。若備用鋼瓶亦告罄，須立即配合醫療照護主管，動員行政人員或輕傷家屬組成<strong>「捏球大隊」</strong>，以手動甦醒球（Ambu bag）接力維持重症病患呼吸，將氧氣絕對保留給最高需求的插管或手術病患。</p>\n</li>\n</ol>\n<p><strong>二、 補給中斷時的替代供應商</strong></p>\n<p>當常規物流或維生管線中斷，採購小組與後勤單位會立即聯繫不受長途交通阻斷影響的「在地替代供應商」，確保醫院的基本維生與醫療物資能維持供給。主要替代供應商包含：</p>\n<ol>\n<li>\n<p><strong>飲用水替代：</strong> 若自來水與院內地下水系統皆不足以應付，將聯絡在地水商緊急外購礦泉水或山泉水，如<strong>高山行山泉水</strong>或<strong>賀眾飲水（賀屏企業有限公司）</strong>。</p>\n</li>\n<li>\n<p><strong>膳食與糧食替代：</strong> 若外部常規供餐廠商無法抵達或面臨緊急斷糧，第一優先協調<strong>本院便利商店（7-11）部立屏東醫院 HACCP 廚房</strong>或<strong>嘉軒美食有限公司</strong>進行緊急供膳。</p>\n</li>\n<li>\n<p><strong>醫療氣體與機電維修：</strong> 醫療氣體（如鋼瓶氧氣、液氧）將緊急聯繫<strong>信光氧氣</strong>或<strong>台北氧氣公司</strong>調度；緊急發電機與高壓機電設備則聯繫<strong>明威發電機</strong>、<strong>全盛</strong>或<strong>隆安機電</strong>等廠商進行支援與搶修。</p>\n</li>\n</ol>\n<p><strong>三、 如何向主管機關請求緊急支援</strong></p>\n<p>當院內極限節流與民間替代供應商皆無法彌補 72\n小時的消耗缺口時，設施運作主管必須立刻啟動外部求援與公權力介入運補流程：</p>\n<ol>\n<li>\n<p><strong>單一官方對接窗口：</strong> 設施運作主管須將「維生物資面臨斷鏈」的危機上報給指揮官。由醫院的<strong>聯絡官（通常由行政副院長擔任）地方政府衛生局、緊急醫療應變中心（EOC）或縣市聯合應變指揮中心</strong>提出緊急支援請求。</p>\n</li>\n<li>\n<p><strong>協調公權力介入運補水電：</strong> 透過聯絡官協調，可向主管機關請求調派<strong>消防水車</strong>支援醫院緊急供水。</p>\n</li>\n<li>\n<p><strong>徵用車輛強行突破：</strong> 針對燃油（柴油）、醫療氣體槽車、血液及關鍵藥材配送延遲，可請求縣市聯合應變指揮中心或地方衛生局<strong>調度、徵用車輛（或軍警消車輛）</strong>，強行突破交通壅塞管制節點，護送關鍵物資進入院區卸補，以確保醫院生命線維持運作。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用 B1\n備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭威脅，高樓層建築極易受飛彈震波波及。必須將醫療核心量能全數轉移至地下安全空間，進行大面積的「空間降階防護」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>執行部／設施運作組（O2）</strong>（由工務室主任擔任主管，轄下統籌工務室、醫工組與營養室）是災難中維繫醫院「生命線（Lifelines）」與打造地下微型戰地醫院的絕對主力。</p>\n<p>面對 B1 備援空間的開設要求，設施運作組的具體因應與建置作為如下：</p>\n<p><strong>一、 統籌五大 B1 備援醫療空間之基礎水電與氣體佈建</strong>\n設施運作組須依據院方逃生圖與備援空間規劃，在最短時間內於指定的 B1\n區域拉設臨時維生管線，確保醫療作業能順利運作：</p>\n<ol>\n<li>\n<p><strong>檢傷行政區（約翰/馬可 B1 工務室前方）</strong>：佈設充足的基礎照明與緊急電源插座，以供檢傷分類行政作業、資訊設備與通訊設備使用。</p>\n</li>\n<li>\n<p><strong>臨時開刀房（韓偉 B1 腹膜透析室）與 恢復室（韓偉 B1 環保室）</strong>：此為戰傷搶救最核心紅區。工務室須拉設專屬高載電源供手術燈與無影燈使用，並確認備用氧氣鋼瓶管路及抽吸（Suction）系統的建置。醫工組須協助將麻醉機、生理監視器從高樓層移至此處並完成校正測試。</p>\n</li>\n<li>\n<p><strong>臨時 ICU（約翰/馬可 B1 資材組前方）</strong>：為重症暫置與銜接區，設施運作組須高密度佈設不斷電系統（UPS）插座，確保每床皆有獨立電源供應呼吸器與監視器，並備妥充足的醫療氣體擴充端子。</p>\n</li>\n<li>\n<p><strong>輕症病房（路加 B1 停車場）</strong>：配合總務部將車輛強制淨空後，工務室須架設臨時大型照明設備、工業風扇以維持基本通風，並佈設基礎電力供一般儀器使用。</p>\n</li>\n</ol>\n<p><strong>二、 執行「黑堡（Black Start）」極限負載卸除與電力死守</strong>\n防空避難期間極可能伴隨外部電網遭炸毀。為確保 B1 備援空間能滿足至少 72\n小時的運作標準，設施運作組必須實施極限電力管制：</p>\n<ol>\n<li>\n<p><strong>極限負載卸除（Load Shedding）</strong>：工務室必須主動、手動切斷已撤離之高樓層行政區、一般病房與冷氣空調的電源迴路，將全院能源消耗降至最低。</p>\n</li>\n<li>\n<p><strong>死守 B1 醫療紅區電力</strong>：將緊急發電機的所有寶貴電力，絕對集中死守在 B1 的臨時開刀房、臨時 ICU 及伺服器機房。醫工組需確認所有轉移至 B1 的維生設備皆已正確連接至 UPS 系統，確保電力瞬斷時呼吸器與維生設備不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 供水、消防、感控與隱私之跨部門硬體建置</strong></p>\n<ol>\n<li>\n<p><strong>供水與衛浴設施</strong>：啟動院內地下戰備水塔，確保 B1 臨時開刀房刷手與器械基本消毒的緊急用水。若污水系統因停電或受損無法排放，須緊急封閉地下室廁所，並配合後勤部發放「化學便器袋」處理排泄物，防範地下空間爆發衛生與感染危機。</p>\n</li>\n<li>\n<p><strong>消防安全確保</strong>：工務人員須確認 B1 各功能區及疏散通道上的緊急照明燈、逃生指示燈與滅火器皆在正常狀態。針對氧氣鋼瓶集中區，須加強固定並排除任何潛在火源，防範火災或氣爆。</p>\n</li>\n<li>\n<p><strong>通風感控與隱私屏蔽</strong>：為防範 B1 密閉空間群聚感染，工務室須維持或拉設臨時抽排風設備確保空氣流通。針對臨時 ICU 與開刀房，協助使用屏風或可折疊的滑動牆進行空間區隔，確保戰傷病患的醫療隱私與基本感控區劃。</p>\n</li>\n<li>\n<p><strong>通訊管線支援</strong>：配合機構運作組（資訊室）的通訊重建需求，協助拉設網路線或無線電中繼天線的實體管線，確保地下室指揮與醫囑傳遞的通訊暢通。</p>\n</li>\n</ol>\n<p><strong>四、 病人及訪客之膳食與飲水供應（營養室）</strong> 在本次 HICS\n編組中，營養室隸屬於設施運作主管（O2）的督導範圍。</p>\n<ol>\n<li>\n<p><strong>啟動緊急供膳</strong>：在人員與病患大量疏散至地下室與大廳避難區的混亂狀態下，營養室須確保避難病患、家屬及迫降於 B1 執勤的醫護人員獲得基本的飲食與飲水供應。</p>\n</li>\n<li>\n<p><strong>戰備存糧動用</strong>：視外部運補中斷狀況，動用預先儲備的 3 至 7 天緊急乾糧與戰備飲用水，穩定避難區的人心與維持前線醫護的戰鬥體力。</p>\n</li>\n</ol>\n<p><strong>五、 災後設施巡檢與危險排除</strong>\n若空襲震波導致建築受損或管線破裂，設施運作組須迅速進行分段、分區關閉受損區域的電力、供水與醫療氣體閥門，隔離洩漏區域，防範二次災害，並即時將搶修進度與\nB1 空間的結構安全狀況回報給指揮中心。</p>"}]}, {"role": "後勤部/勤務主管", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況\n2-1「臺灣周邊海空域受封鎖或管制，屏東地區燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，醫院正面臨物資極度匱乏與交通受阻的「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>後勤部/勤務主管（L1，由醫勤室主任擔任）</strong>轄管事務組、運輸組與營養室，是維持醫院基本維生與運輸動線的關鍵。針對主推官提問的「72小時核心物資盤點、消耗速率、補給缺口、優先順序及替代供應商/主管機關支援流程」，勤務主管的具體因應作為如下：</p>\n<p><strong>一、 執行 72 小時維生物資（膳食與飲水）盤點與缺口評估</strong></p>\n<ol>\n<li>\n<p><strong>盤點與精算消耗速率</strong>：勤務主管須會同營養室，針對全院目前滯留的病患、家屬以及受困/留守的醫護與行政員工，精算飲水與膳食的每日消耗速率。</p>\n</li>\n<li>\n<p><strong>確立 72 小時安全存量與缺口</strong>：盤點院內儲備之 3 至 7 天緊急乾糧、應急口糧及戰備飲用水存量，計算出撐過黃金 72 小時的補給缺口。</p>\n</li>\n<li>\n<p><strong>分配優先順序</strong>：在斷糧斷水的危機下，勤務主管須貫徹指揮中心的資源優先序，實施嚴格的配給制度。將高熱量補給、熱食與最乾淨的飲用水，<strong>絕對優先供應給身處高壓搶救前線（如急診、開刀房、ICU）的醫護人員及重症病患</strong>，以維持核心戰鬥體力。</p>\n</li>\n</ol>\n<p><strong>二、 啟動替代供應商與極限供膳/供水機制</strong>\n面對常規物流配送延遲或中斷，勤務主管須會同採購部門啟動在地替代供應商，確保生命線不斷鏈：</p>\n<ol>\n<li>\n<p><strong>膳食替代方案</strong>：若外部常規供餐廠商無法抵達，第一優先協調<strong>本院便利商店（7-11）</strong>全力支援膳食供糧；若需熱食或大量製備，則緊急聯絡在地不受長途交通影響的替代供應商（如：部立屏東醫院 HACCP 廚房、嘉軒美食有限公司）進行緊急供膳。</p>\n</li>\n<li>\n<p><strong>飲水替代方案</strong>：若自來水與院內地下水系統皆不足以應付，勤務主管須聯絡在地水商（如：高山行山泉水、賀眾飲水）緊急外購礦泉水或山泉水，以解決最基本的膳食製備與飲用需求。</p>\n</li>\n</ol>\n<p><strong>三、 應對交通受阻：運輸工具極限調度與外部求援流程</strong>\n針對員工無法到勤及病人轉送不確定性提高的困境，勤務主管（運輸組）必須掌握所有交通資源：</p>\n<ol>\n<li>\n<p><strong>院內載具與車輛極限調度</strong>：迅速盤點並調度醫院現有之救護車、中型巴士及行政運輸車輛，隨時加滿燃油待命。同時集中院內所有輪椅、擔架與推床至待命區，供前線調度。</p>\n</li>\n<li>\n<p><strong>向主管機關請求支援流程</strong>：若病患必須緊急轉院，但院內車輛不足或聯外道路嚴重受阻，勤務主管須將「運輸缺口」上報給後勤部長與聯絡官。由聯絡官向<strong>縣市聯合應變指揮中心或地方衛生局（EOC）</strong>請求調度、徵用外部大眾運輸車輛（接駁車）、軍警消車輛支援病患疏散或物資運送。</p>\n</li>\n</ol>\n<p><strong>四、 跨組支援：配合「藥材、血液、氧氣、油料」優先順序的勤務運補</strong>\n雖然藥品、血液隸屬於任務支援組（L2），醫療氣體與燃油隸屬於工務室（O2），但勤務主管必須提供強大的物流勤務支援：</p>\n<ol>\n<li>\n<p><strong>勤務人力支援「盲派（Push）」</strong>：在交通與通訊雙重受阻下，勤務組須調派待命區的行政人員或志工擔任搬運工與傳令兵（Runner），協助將預先打包好的「戰傷急救箱」及備用氧氣鋼瓶，以人力徒步「盲派」推送至急診紅區與開刀房。</p>\n</li>\n<li>\n<p><strong>淨空卸補動線</strong>：確保急診車道與物資卸補區絕對淨空，讓任何突破萬難抵達的外部血車、氧氣車或燃油運補車能第一時間進入院區卸貨。</p>\n</li>\n</ol>\n<p><strong>五、 維持通訊韌性</strong>\n面對可能伴隨的通訊中斷，勤務主管須檢查所有手持通訊設備，並分配專屬的\n<strong>無線電對講機（UHF/VHF）頻道</strong>\n給各樓層指揮官、急診與搶修團隊，提供獨立的雙向通訊系統，確保物資調度與病患轉送的指令傳達不受電信網路異常影響。</p>"}]}, {"role": "後勤部/任務支援主管", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況\n2-1「臺灣周邊海空域受封鎖或管制，屏東地區燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，醫院正面臨極為嚴峻的物資匱乏與交通受阻的「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>後勤部／任務支援主管（L2，通常由資材組組長擔任）</strong>負責取得並保管醫療與非醫療物資、藥品、血液/用血資源、膳食、運輸工具及支援人力。面對主推官提問的「72\n小時核心物資盤點、消耗速率、補給缺口、優先順序」及「替代供應商與主管機關請求支援流程」，任務支援主管的具體因應作為如下：</p>\n<p><strong>一、 執行 72 小時戰略物資盤點、精算消耗與確立優先序</strong></p>\n<ol>\n<li>\n<p><strong>精算消耗速率與回報缺口</strong>：任務支援主管須立即會同轄下藥劑科、血庫及相關後勤單位，精確盤點全院現有的藥品、血液、膳食及醫療耗材存量。依據戰時高壓環境下的使用狀況，精算各項物資的消耗速率，並建立<strong>至少維持 72 小時</strong>的物資儲備清冊與藥品耗材清單，藉此明確估算出補給缺口。</p>\n</li>\n<li>\n<p><strong>確立資源優先使用順序</strong>：面對各項維生物資配送延遲，任務支援主管須與後勤部長及指揮官確認資源的「優先使用順序」。在孤島狀態下，必須實施嚴格的庫存管制，將有限的救命資源絕對集中於<strong>急診紅區、ICU（加護病房）與開刀房等重症搶救單位</strong>，避免資源遭非理性耗竭。</p>\n</li>\n<li>\n<p><strong>全院子庫緊急調度</strong>：針對災害搶救現場急需之物資品項，資材組人員須主動對全院各單位的「子庫」備量進行緊急盤點與調度集中，並嚴格監控前線耗材的消耗狀況。</p>\n</li>\n<li>\n<p><strong>接收與保管簽證物資</strong>：負責接收與妥善保管任何突破交通阻礙運達的簽證物資與備品，並配合指揮中心指令進行精準調度。</p>\n</li>\n</ol>\n<p><strong>二、 顛覆常規，啟動戰略藥材的「盲派（Push）」物流</strong></p>\n<ol>\n<li>\n<p><strong>切換推拉式物流（Push-Pull Logistics）</strong>：在聯外交通阻斷、系統可能當機的極端狀況下，平時為了降低庫存成本而採用的「有申請才領用（Pull）」常規物流系統將完全失效。任務支援主管必須指導資材與藥庫人員切換為戰鬥化的物流機制。</p>\n</li>\n<li>\n<p><strong>主動推進救命物資（盲派）</strong>：將預先打包好的標準化<strong>「戰傷急救箱（Trauma Kits / Go-Kits）」</strong>（內含大量戰術止血帶、骨針、含止血劑紗布、廣效抗生素及麻醉鎮痛藥劑等），不等待前線急診或開刀房發出領料單申請，直接以<strong>「盲派（Push）」</strong>方式主動推至急診紅區與開刀房門口，確保前線醫護人員只要伸手就能取得救命物資，維持戰鬥力不斷鏈。</p>\n</li>\n</ol>\n<p><strong>三、 應對血庫危機：啟動「走動式血庫（Walking Blood Bank）」</strong></p>\n<ol>\n<li>\n<p><strong>活體血庫啟動</strong>：面對血液運補延遲且血庫庫存瞬間見底的絕境，任務支援主管須配合檢驗科血庫，緊急啟動北約軍醫常用的<strong>「走動式血庫（Walking Blood Bank）」</strong>計畫。</p>\n</li>\n<li>\n<p><strong>院內緊急抽血與極速遞送</strong>：依據預先建檔的院內員工與志工血型名冊，緊急召集符合條件的（如 O 型血）同仁至指定安全區域。跳過平時繁瑣的血液分離程序，現場抽取「全血（Whole Blood）」並進行快篩，隨即由任務支援組調度的傳令兵極速送入開刀房或急診紅區搶救瀕死傷患，突破外界斷血危機。</p>\n</li>\n</ol>\n<p><strong>四、 啟動替代供應與外部求援流程（結合採購小組）</strong></p>\n<ol>\n<li>\n<p><strong>通報急補與協調採購</strong>：當任務支援組發現特定物資消耗突增及需求量極大、無法撐過 72 小時安全底線時，應即時通知行政/財務部的採購人員（採購小組 F2），啟動緊急補充程序。</p>\n</li>\n<li>\n<p><strong>聯繫替代供應商與聯防支援</strong>：面對常規物流配送延遲，任務支援主管須協同採購小組迅速聯繫不受長途交通阻斷影響的<strong>「在地替代供應商」</strong>，並聯繫屏東縣市簽有支援協定之合作醫院，請求攸關性命之藥品及衛材的緊急調度支援。</p>\n</li>\n<li>\n<p><strong>向主管機關請求調撥</strong>：若民間與聯防體系無法彌補缺口，則透過聯絡官向<strong>屏東縣衛生局或縣市聯合應變指揮中心</strong>請求協助緊急調撥物資，且資源調撥以「藥材及衛材」為絕對優先。若運輸完全中斷，甚至須請求協調調度徵用車輛或軍警消車輛支援物資與血液的運送。</p>\n</li>\n</ol>\n<p><strong>五、 待命區人力分配與員工身心照顧</strong></p>\n<ol>\n<li>\n<p><strong>精準配送支援人力</strong>：針對員工因交通受阻無法到勤的狀況，任務支援組須將突破交通障礙抵達的員工或召募到的志工集中至「待命區」，並依據前線（執行部）的實際需求，精準配送支援人力（如擔任物資搬運工或斷網時的傳令兵）。</p>\n</li>\n<li>\n<p><strong>防範戰鬥疲勞與身心照護</strong>：因交通受阻導致員工無法到勤換班，任務支援組必須關注被迫滯留前線執行部門人員的身心照顧。主動協調人事部門安排強制輪休，並提供必要的飲水、膳食與後勤補給，避免前線醫療戰力因過勞而全面崩潰。</p>\n</li>\n</ol>\n<p>如何計算物資消耗速率？ 物資短缺時的配給優先序？\n若需請求支援要找哪個單位？</p>\n<p><strong>一、 如何計算物資消耗速率？</strong>\n計算物資消耗速率必須依據「當下暴露或滯留的人數」、「醫療處置強度」及「預估維持的孤島時間（如\n72 小時）」進行精算與量化評估：</p>\n<ol>\n<li>\n<p><strong>水資源消耗精算</strong>：需針對不同身分與需求進行量化。例如，每人每天最基本飲水需求為 2.5--3 公升，基本衛生與烹飪各約需 2-6 公升；醫療處置方面，每位門診病患約需 5 公升，每位住院病患每天需 40-60 公升，而每次手術與生產則需高達 100 公升以上的用水。</p>\n</li>\n<li>\n<p><strong>血液資源消耗精算</strong>：可依據醫院急性病床數與病患結構推估，例如平時儲備量可以「醫院急性床位 x 10% x 30% x 1」的公式推估所需血袋數量，若面臨重度動員或大量傷患，則需提高預估比例。</p>\n</li>\n<li>\n<p><strong>醫療物資與防護裝備</strong>：需根據已暴露於災害的人口數、潛在傷病類型（如燒燙傷、創傷）及病患預計停留的時間來綜合估算消耗量。</p>\n</li>\n</ol>\n<p><strong>二、 物資短缺時的配給優先序？</strong>\n在物資極度匱乏的孤島狀態下，必須打破平時的常規，實施嚴格的「配給制度與負載卸除」，優先序如下：</p>\n<ol>\n<li>\n<p><strong>核心醫療紅區絕對優先</strong>：所有救命醫療資源（如戰備藥品、血液、氧氣）與緊急備用電力，必須絕對集中死守於<strong>急診室（特別是搶救紅區）、加護病房（ICU）與開刀房</strong>等重症搶救單位，同時必須確保資訊機房、血庫冰箱等關鍵設施的運作。</p>\n</li>\n<li>\n<p><strong>維生水資源嚴格管制</strong>：最乾淨的戰備水資源僅限供應於開刀房刷手、器械基本消毒與病患飲用，嚴禁一般盥洗與沖馬桶（改發化學便器袋）。</p>\n</li>\n<li>\n<p><strong>膳食與體力維持優先序</strong>：在斷糧斷水危機下，高熱量補給、熱食與乾淨飲水必須優先供應給<strong>身處高壓搶救前線的醫護人員、保安人員及重症病患</strong>，以防範第一線戰力因體力透支而崩潰。</p>\n</li>\n</ol>\n<p><strong>三、 若需請求支援要找哪個單位？</strong>\n當內部物資耗盡或出現重大缺口時，應透過\nHICS（醫院事故指揮系統）體系進行上報與外部求援：</p>\n<ol>\n<li>\n<p><strong>院內通報與調度</strong>：前線單位應將物資缺口上報給<strong>計畫部（資源控管小組 P1）</strong>以統合全院數據，或直接向<strong>後勤部（任務支援主管 L2 / 資材組）</strong>與<strong>行政/財務部（採購小組 F2）</strong>請求緊急院內調度與採購。</p>\n</li>\n<li>\n<p><strong>外部官方求援管道</strong>：跨院或跨機關的支援請求，統一由醫院的<strong>聯絡官（行政副院長擔任）</strong>作為單一官方對接窗口。</p>\n</li>\n<li>\n<p><strong>具體外部請求支援單位</strong>： -   <strong>主管機關與緊急應變中心</strong>：向<strong>地方政府衛生局、緊急醫療應變中心（EOC）或縣市聯合應變指揮中心</strong>請求協助，緊急調撥藥材、衛材、車輛與大宗物資。 -   <strong>醫療聯防網路</strong>：聯繫簽有醫療支援協定的<strong>合作醫院</strong>（如部立屏東醫院、寶建醫院、屏東榮民總醫院等），請求攸關性命之藥品、衛材、血液或病床的橫向緊急調度支援。 -   <strong>外部供應商</strong>：由採購或後勤單位聯繫<strong>在地替代供應商</strong>（確保不受長途聯外交通阻斷影響）以補足膳食、飲水與耗材，並向<strong>血液基金會（捐血中心）</strong>請求血液與相關醫材的緊急運補。</p>\n</li>\n</ol>"}]}, {"role": "行政支援組", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況\n2-1「臺灣周邊海空域受封鎖或管制，屏東地區燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與交通受阻的「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構與本院應變編組中，<strong>行政支援組（行政支援中心）「醫療/技術專家聯絡人（A4）」「歸建小組長（P4）」</strong>，其組長則擔任執行部前線的<strong>「待命區管理者（Staging\nArea Manager）」</strong>。</p>\n<p>面對主推官提問的「72小時核心物資盤點與優先順序、替代供應商與求援流程」，行政支援組的具體因應作為如下：</p>\n<p><strong>一、 擔任「待命區管理者」：前線人力與殘存物資的極限調度</strong>\n面對物資運補延遲與員工到勤受阻，待命區管理者必須將所有能動用的資源緊緊抓在手中，隨時支援前線（執行部）的需求：</p>\n<ol>\n<li>\n<p><strong>待命人力集中與造冊</strong>：將突破交通障礙抵達院區的員工、提早召回的人員或招募到的志工，全數集中至「待命區（大廳服務台或指定區域）」進行統一管理。精確評估這些人力的專長，隨時準備派往急診、加護病房或擔任斷網時的「傳令兵（Runner）」。</p>\n</li>\n<li>\n<p><strong>接收與配送戰備物資</strong>：評估執行部門（如急診、手術室）所需的資源，並通知後勤部門預做準備。一旦後勤部將僅存的戰傷急救箱、備用氧氣鋼瓶或緊急調度的血液送達待命區，行政支援組須配合「盲派（Push）」機制，精準且迅速地將救命物資配送至最危急的醫療紅區，確保搶救子彈不斷鏈。</p>\n</li>\n<li>\n<p><strong>配合物資優先順序配給</strong>：嚴格貫徹指揮官下達的資源優先順序，確保從待命區派發出的高熱量膳食、乾淨飲水與醫療防護裝備，絕對優先供應給身處高壓搶救前線的醫護及保全人員。</p>\n</li>\n</ol>\n<p><strong>二、 應對病人轉送不確定性：集中運輸載具與備援</strong>\n因外部交通管制，病患轉送（後撤）的難度大幅提高：</p>\n<ol>\n<li>\n<p><strong>載具集中與派發</strong>：待命區管理者須迅速盤點並集中院內所有的救護推床、輪椅、擔架，甚至是樓梯疏散滑墊（軟擔架）。將這些運輸載具統一安置於待命區，當聯外交通稍有恢復，或需將病患移至地下備援空間時，能
