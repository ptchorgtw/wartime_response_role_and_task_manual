>\n<p><strong>用藥病歷「實體隨行」</strong>：在轉運或後送時，確保病患的手寫處方、紙本轉診摘要裝入防水資料夾鏈袋，並<strong>實體綁定於擔架旁</strong>隨病人移出，嚴防交接斷鏈 。</p>\n</li>\n</ul>\n<p>2. 藥劑部（藥局）</p>\n<ul>\n<li>\n<p><strong>接收手寫處方箋</strong>：停止依賴電子傳輸，藥劑師全面改為接收由傳令兵手遞的手寫處方，進行人工配藥、三讀五對及發藥 。</p>\n</li>\n<li>\n<p><strong>啟動「盲派（Push）」物流</strong>：打破平時「有申請才領用（JIT）」的常規 。資材組與藥庫人員將預先打包的「戰傷急救箱」（內含止血帶、骨針、大量靜脈輸液、廣效抗生素等戰備耗材）主動推至急診紅區與臨時手術室口 ，確保前線醫護只要伸手就能拿到物資 。</p>\n</li>\n</ul>\n<p>3. 檢驗科（含血庫）</p>\n<ul>\n<li>\n<p><strong>手工單檢驗與危險值「Read-back」機制</strong>： -   醫師無法開立電腦檢查單時，全面改開「手工單」送檢 。 -   檢驗科停止電腦報告傳輸 ，改以「人工跑單（傳令兵）」手遞報告 ，或以對講機、分機電話向臨床口頭回報危險值（如 Hb 數值） 。 -   <strong>接聽之病房/急診人員，必須大聲唸出「病患姓名、病歷號與數據」向通報者執行 Read-back（口頭逐字覆誦確認）</strong>，確認無誤後始得執行給藥或用血，防範混亂中出錯 。</p>\n</li>\n<li>\n<p><strong>活體「走動式血庫」</strong>：若對外道路阻斷且南部血液中心缺血 ，血庫人員立即拿出「院內員工/志工血型建檔名冊」 ，緊急召集同仁就地抽全血，進行戰地極簡化交叉快篩後，直接將帶有體溫的血袋送入手術室救人 。</p>\n</li>\n</ul>\n<p>4. 放射科（影像）</p>\n<ul>\n<li><strong>手工開單與實體翻拍傳遞</strong>：若臨床無法使用 PACS 系統閱片，放射科回歸沖洗「實體 X 光膠片」手遞 ；或由臨床醫師直接跑至放射機房，<strong>以數位相機或拍立得直接翻拍電腦螢幕影像帶回前線</strong>，克服數位影像中斷瓶頸 。</li>\n</ul>\n<p>5. 掛號批價櫃檯</p>\n<ul>\n<li>\n<p><strong>人工掛號與實體手圈</strong>：批掛組調派人員以人工方式詢問、登記病人資料，手寫製作紙本病歷，並確實為病人戴上實體辨識手圈 。</p>\n</li>\n<li>\n<p><strong>暴力啟動「戰時記帳豁免機制（事後收費）」</strong>： 為了在 4 小時內極速降載一般病房 30% 至 40% 的病人 ，批價暫停繁瑣的結帳程序 。由會計組配合，於出院病歷上加蓋<strong>「戰時記帳豁免」實體紅色戳記，令其「零元結帳、免排隊立即離院」</strong> ，事後再依手工單據追溯計價 。</p>\n</li>\n</ul>\n<p>四、 神經中樞：建立「傳令兵（Runner）制度」與戰術通訊網路</p>\n<p>當全院 IBM HIS、PACS 及一般分機電話系統因攻擊或斷電癱瘓時，由總務部（L0\n後勤部）與保安組（O4）建立異質性備援通訊鏈 ：</p>\n<p>[ 頂樓高地 ] ➜ 啟動 OneWeb/Starlink 低軌衛星 ➜\n建立與衛福部/軍方加密直連</p>\n<p>[ 各層主管 ] ➜ 配發獨立頻道 UHF/VHF 無線電 ➜ 橫向對接地下 EOC 與哨口 [ 臨床火線 ] ➜ 啟動「徒步傳令兵（Runner）」 ➜ 紙本簽收簿 (Logbook)\n人力速遞</p>\n<ol>\n<li>\n<p><strong>分配戰術無線電對講機</strong>： 全院無線電統一由醫勤室保安組管理 ，緊急分配獨立頻段的 <strong>UHF/VHF 對講機</strong> 給各樓層指揮官、三大接運區負責人與地下 EOC 指揮所 。</p>\n</li>\n<li>\n<p><strong>啟動最抗干擾之「徒步傳令兵（Runner）制度」</strong>： -   調派體能優良的行政人員、清潔同工或志工穿著螢光反光背心、佩戴臂章擔任<strong>傳令兵</strong> 。 -   傳令兵徒步穿梭於病房、急診、馬太 B1 藥庫、4F 檢驗科與 B1 臨時手術室之間 。 -   所有手寫緊急醫囑、配血單、藥單與撤離進度報告，<strong>一律改由傳令兵徒步傳遞</strong> 。 -   傳令兵必須攜帶<strong>「實體簽收簿（Logbook）」</strong>，在交接物資與醫囑時，<strong>以「人工口令覆誦」與「實體簽名」完成交接點收</strong>，徹底阻絕電磁癱瘓對決策傳遞的阻礙 。</p>\n</li>\n</ol>\n<p>五、 資料回補：系統重啟後的「人工補登（Data Backfilling）」計畫</p>\n<p>當系統被攻防隔離、修復，或異地備援主機（備援機房設於<strong>瑞光院區\n7F</strong>）重啟，資訊室主任（O5）宣告核心 His\n電腦系統安全重啟、通訊網路恢復正常後 ：</p>\n<ol>\n<li>\n<p><strong>下線與結束機制</strong>： 資訊室值班人員正式通知各單位「結束全院當機處理機制」 。</p>\n</li>\n<li>\n<p><strong>暴力人工補登回補（Data Backfilling）</strong>： -   病歷室（P3）、會計室（F4）與各病區、藥局、檢驗科全力配合，<strong>將當機與紙本降級期間，前線產出的所有紙本病歷、手寫處方箋、手工欠繳計紀錄單與檢驗單逐一收集 。</strong> -   依照<strong>「資料人工回補標準作業流程（Data Backfilling SOP）」</strong>，逐筆將當機期間的用藥、耗材、手寫檢檢驗/影像報告，手動補登輸入 HIS 電腦系統中 。 -   此程序能徹底補齊病患的電子病歷連續性，並確保後續健保申報、自費計價及財務帳務紀錄的百分之百完整 。</p>\n</li>\n</ol>\n<p>📊 <strong>醫院資安防禦戰術建議</strong>：\n在面臨網路癱瘓與假訊息交織的資安攻防中，「Downtime 紙本降級」與「傳令兵\nRunner 簽收」是醫院不致「腦死」的物理神經網 。</p>\n<p>您需要我為您及資訊室（蔡哲民主任）、病歷室，規劃一份可以直接塑膠護貝並貼於各病房\nDowntime 藍色膠箱頂部的 <strong>『資訊室/病歷室：全院 Downtime 斷網紙本降級與\nRunner 實兵交接操作 A4\n核對卡』</strong>，以利下半年綜合實兵演練時，同仁能隨手勾稽、確實操作嗎？</p>\n<p>醫院在主戰區如何實施「反向檢傷」來騰出床位？</p>\n<p>在面臨戰爭威脅或院區即將編入主戰區的極端環境下，醫院無法再以承平時期的「不計代價救治每一人（Standard\nof\nCare）」模式運作，必須在資源極度匱乏的戰火中，冷酷且迅速地降級為「將有限的維生資源，留給最有機會存活的最多數人（Sufficiency\nof Care）」之危機護理標準 。</p>\n<p>本院（屏東基督教醫院大連院區）在\nHICS（醫院事故指揮系統）體系下，實施<strong>「反向檢傷（Reverse\nTriage）」</strong>的核心戰略是：<strong>在黃金時間內極速降載，清空物理空間，為隨時湧入的大量戰傷重症病患騰出「彈性擴充量能（Surge\nCapacity）」</strong> 。</p>\n<p>本院實施「反向檢傷」以騰出床位的具體作為、臨床標準與跨部門協同流程如下：</p>\n<p>一、 決策啟動與行政特別授權：掃除出院行政阻礙</p>\n<p>《孟子·梁惠王上》曰：「權，然後知輕重；度，然後知長短。」在戰前或臨災動員令下達的第一時間，指揮中樞（Command\nStaff）與行政/財務部（F0）必須立即打破常規流程，為前線實施「降載清空」掃除所有行政枷鎖\n：</p>\n<ol>\n<li>\n<p><strong>取消常規醫療以阻斷病患源頭（30分鐘內）</strong>： 接獲指令後，資訊室與掛號櫃檯須於 30 分鐘內群發簡訊、APP 推播並張貼紅色公告，<strong>無限期取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術</strong> ，使醫院呈現「只出不入」狀態 。</p>\n</li>\n<li>\n<p><strong>暴力啟動「戰時記帳豁免機制」</strong>： 為防範大批被下令出院的輕症病患在批價櫃檯排隊、阻礙後送車道及疏散動線 ，行政/財務部長（管理部部長）下達最高財務豁免：<strong>暫停繁瑣的電子化入帳與繳費對帳程序，出院手續一律改收「手寫手工欠繳紀錄單」，在病歷上加蓋「戰時記帳豁免（事後追溯收款）」紅色戳記，准予病患「零元結帳、免排隊立即離院」</strong> 。</p>\n</li>\n</ol>\n<p>二、 核心執行機制：組建「反向檢傷特別小組」</p>\n<p>為排除臨床醫患情感的干擾，確保評估過程絕對理性、客觀且快速，執行部（Operations）必須落實以下組建原則：</p>\n<ol>\n<li>\n<p><strong>排除原病房醫師之「雙盲評估」</strong>： 由醫務部（執行部長 O0）統籌，指派<strong>平時不負責該病房的資深主任級主治醫師</strong>組成「反向檢傷特別小組」 。例如，調派門診已停診之眼科、復健科或一般內科主任，強制進入一般住院病房及中度加護病房進行強勢評估 。</p>\n</li>\n<li>\n<p><strong>臨床篩選黃金準則</strong>： 特別小組成員攜帶專用檢核表，強制篩選出：<strong>「拔除靜脈點滴、暫停靜脈注射或提早出院/下轉，在 72 小時內不會立即危及生命」的相對穩定病患</strong> 。</p>\n</li>\n</ol>\n<p>三、 戰時病患精準「四級分類」與去向重置</p>\n<p>反向檢傷小組對全院住院、留觀病患進行逐一過濾，並精準落實以下四級分類與動線分流\n：</p>\n<p>1. 【第一類：可返家/提早出院（行動方便者）】</p>\n<ul>\n<li>\n<p><strong>臨床判定標準</strong>：生命徵象穩定，拔除點滴後於 72 小時內無生命危險者 。</p>\n</li>\n<li>\n<p><strong>去向處置</strong>：開立口服藥處方，配合戰時記帳豁免，交由社工室與勤務組調配交通工具，引導使用<strong>「醫院門診大廳大門出口（輕症接駁區）」</strong>，於 <strong>4 小時內極速清空疏散返家</strong> 。</p>\n</li>\n</ul>\n<p>2. 【第二類：安置/需扶持（無家屬照顧者）】</p>\n<ul>\n<li>\n<p><strong>臨床判定標準</strong>：生命徵象穩定，無立即致命風險，但缺乏生活自理能力、且在院內無家屬可照顧之患者 。</p>\n</li>\n<li>\n<p><strong>去向處置</strong>：由社工人員（心理與家屬支援分支）對接屏東市基層診所、長照機構或安全重置區的安置據點，辦理緊急轉銜手續並包車運送下轉 。</p>\n</li>\n</ul>\n<p>3. 【第三類：一般住院（臥床者）】</p>\n<ul>\n<li>\n<p><strong>臨床判定標準</strong>：需要常規醫療照護但無法自行移動之臥床患者 。</p>\n</li>\n<li>\n<p><strong>去向處置</strong>：若大連院區地表建物面臨空襲威脅，則利用「樓梯疏散滑墊」或軟擔架 ，以 <strong>5 人一組（4人徒步搬運、1人護理照護）</strong> 方式垂直疏散至院區預先規劃的<strong>「地下替代醫療空間（路加大樓 B1 輕症病房/停車場）」</strong> ；若面臨全面撤離，則轉送至屏東區域聯防醫院（部立屏東醫院、寶建、安泰或屏東榮總等） 。</p>\n</li>\n</ul>\n<p>4. 【第四類：高度照護（危急/ICU病患）】</p>\n<ul>\n<li>\n<p><strong>臨床判定標準</strong>：極度依賴維生設備、插管、使用電動呼吸器或洗腎之重症患者 。</p>\n</li>\n<li>\n<p><strong>去向處置</strong>： -   <strong>就地防爆掩蔽（Defend in Place）</strong>：若遭遇空襲無法立即垂直移動，醫護人員須在不斷開維生儀器的情況下 ，迅速將病床推入病房內無窗戶之「核心內筒（ Core Barrel，如電梯梯廳、內部走廊）」並拉下防爆窗簾 。 -   <strong>地下替代轉置</strong>：垂直疏散至<strong>「約翰/馬可大樓 B1（資材組前方）」開設之地下臨時 ICU</strong>，或 <strong>韓偉大樓 B1（腹膜透析室）開設之臨時開刀房</strong> 。 -   <strong>跨院後送與「人藥/病歷一對一防水綁定」</strong>：若需使用救護車後送 ，病歷室與病房書記必須確保病患的手寫紙本「轉診單、病歷摘要、用藥處方箋」裝入密封防水、防偽之夾鏈袋中，<strong>強制物理性綁定（如用專用膠帶貼牢）於病患擔架旁</strong>，並隨車攜帶 72 小時生存用藥與林格氏液一同轉移，防範接收端發生資訊與藥物斷鏈 。 -   <strong>戰時安寧療護機制</strong>：針對依賴維生設備、<strong>預後極差且物理上絕對無法搬運</strong>的危死患者，啟動戰時安寧療護，保留維生設備算力給更有存活機會之傷患 。</p>\n</li>\n</ul>\n<p>四、 執行指標與病房重構（戰備床單轉換）</p>\n<p>「反向檢傷」與降載在實兵運作中具有極嚴格的時效指標：</p>\n<ul>\n<li>\n<p><strong>24小時硬性指標</strong>：在接獲指令 24 小時內，全院必須<strong>強行騰出大連院區至少 30% 至 40% 的急重症病床與開刀房空間</strong> 。</p>\n</li>\n<li>\n<p><strong>48小時降載目標</strong>：配合全院於 <strong>48 小時內將住院病人降載至 30%</strong> 的戰略總目標 。</p>\n</li>\n<li>\n<p><strong>鋪設戰備床單</strong>：各病房凡落實「反向檢傷」清空出來的病床，護理人員必須<strong>立刻鋪更換上「戰備床單」</strong> 。這在視覺與流程上明確提示，該空間已由常規病房重構為「戰傷臨時收治病房」，準備迎接隨時可能湧入的戰傷洪流 。</p>\n</li>\n</ul>\n<p>五、 反向檢傷與醫療降載跨部門協同矩陣</p>\n<p>在 HICS 體系下，反向檢傷不是單一科室的工作，而是全院高強度協同的戰役： ------------------------------------------------------------------------------------------ <strong>HICS 編組 **          **           --------------------- ---------------------- --------------------------------------------- </strong>最高指揮（A0）<strong>    事故指揮官 吳榮州院長  發布全院動員令                      291]，設定最高戰略目標（降載至30%） ，簽署戰時記帳豁免與病人疏散計畫 。 </strong>執行部長（O0）<strong>    執行部長               統籌前線醫療行動          陳志文醫務部長 ，組建「反向檢傷特別小組」                     187]，下達取消所有非緊急常規醫療指令 。 </strong>醫療照護（O1）<strong>    醫療照護主管           帶領特別小組強制進入病房實施檢傷分類          急診部/內外科主任      187, 390]，落冊病人四級分類名冊           390]，鋪設戰備床單 。 </strong>計畫部門（P0）<strong>    計畫部長               維護「情資看板（Status Board）」          朱淑媛護理部部長       190]，精算最大疏散病人數量與可用空床             392, 403]；啟動「病人動向追蹤管理機制」 。 </strong>行政/財務（F0）<strong>   行政/財務部長          督導批價櫃檯與會計小組 F4          張隆鐘管理部部長       193]，暴力啟動「戰時記帳豁免」             397]，完成 Downtime 離線人工記帳 。 </strong>後勤部門（L0）**    後勤部長               動員勤務組 L1（搬運體力支援          許慧莉總務部部長       415]、集中全院輪椅擔架             416]）與任務支援組 L2（隨車物資與用藥打包，人藥隨行綁定 ）。 ------------------------------------------------------------------------------------------</p>\n<p>📋 <strong>臨床防呆戰術提示</strong>：\n「反向檢傷」是在極端資源競用下「斷尾求生」的殘酷醫療決策 ，在實際操作時極易伴隨家屬非理性情緒與醫療爭議 。</p>\n<p>您需要我為您及醫務部（陳志文部長）與各樓層護理長，設計一份可以直接印製並放在各病房當機箱中的\n<strong>『大連院區：戰時反向檢傷四級病人分類造冊與 A-B\n一對一隨車病歷防水綁定實兵核對檢核表（A4\n雙面雙色格式）』</strong>，以備下半年全院城鎮韌性實兵演練時，讓同仁隨手勾稽、確實操作嗎？</p>\n<p>如何與軍方及衛生局建立加密通訊？</p>\n<p>當本院（屏東基督教醫院大連院區）面臨戰爭威脅，或因敵特攻擊、飛彈震波導致常規電網、行動網路及\nIBM HIS\n系統大癱瘓時，維持本院「指揮大腦」與外部軍方及衛生局的通聯是死守醫療韌性的最高紅線\n。</p>\n<p>依據《大連院區平戰轉換總體白皮書》與\nHICS（醫院事故指揮系統）規範，<strong>事故指揮官\nA0（吳榮州院長）五大層級之具體因應作為</strong>，與軍方及衛生局建立並維持不中斷的加密與備援通訊：</p>\n<p>一、 啟用「指揮官避難包（Go-Bag）」之專用加密與衛星通信設備（備援通信\nAlternate）</p>\n<p>當國家級防空警報（Code Black）或全面撤離動員令發布後，本院 HICS\n指揮中樞將於 <strong>10 分鐘內</strong>\n轉移至地下結構最強固的防空避難核心區（恩慈大樓 B1 會議室或 B2\n地下總指揮所） ：</p>\n<ol>\n<li>\n<p><strong>取出避難包加密設備</strong>：指揮官與核心幕僚（安全官、聯絡官）會立即垂直轉移，並抓起預先整備定檢的<strong>「指揮官避難包（Go-Bag）」</strong> 。</p>\n</li>\n<li>\n<p><strong>啟用加密 UHF 無線電與 Iridium 衛星電話</strong>：避難包中配置有 <strong>Iridium 衛星電話</strong> 與 <strong>加密 UHF 無線電對講機</strong> 。抵達地下指揮所後，聯絡官會迅速將天線延伸至戶外無遮蔽區，並在 3 分鐘內啟動獨立不斷電系統（UPS） ，利用衛星電話及加密無線電，第一時間與<strong>作戰區防衛指揮部</strong>、<strong>中央聯合應變中心（CJEOC）</strong>及衛福部建立直通的加密語音管道 。</p>\n</li>\n</ol>\n<p>二、 架設頂樓「低軌衛星（OneWeb / Starlink）」與加密專線網路</p>\n<p>為了在資安斷網或實體網路線中斷時，仍能向軍方及衛福部撈取、同步關鍵醫療資源與災情數據，資訊室將實施以下作為\n：</p>\n<ol>\n<li>\n<p><strong>架設低軌衛星端點</strong>：資訊室網路組會同工務室，於頂樓高地（配接發電機以維持 72 小時不斷電）架設並啟用 <strong>低軌衛星（如 OneWeb 或 Starlink）接收端設備</strong> 。</p>\n</li>\n<li>\n<p><strong>建立加密虛擬專線（VPN）</strong>：透過低軌衛星網路，建立與<strong>中央衛福部 EOC</strong> 及<strong>軍方戰情中心</strong>的專屬加密 VPN 通道 。這不僅能防範敵方電子戰與 DDoS 監聽干擾 ，亦能與本院設於<strong>「瑞光院區 7F」的異地備援電腦機房</strong>同步資料 ，維持戰時情資共同運作圖像（COP） 。</p>\n</li>\n</ol>\n<p>三、 聯絡官使用「獨立頻段 UHF/VHF 無線電」與 GSM 橋接器對接地方衛生局</p>\n<p>聯絡官 A3（行政副院長 黃雅芳／管理部部長\n張隆鐘）作為與地方最高主管機關對接的單一窗口 ，將利用實體類比屏障與微弱訊號建立對接：</p>\n<ol>\n<li>\n<p><strong>啟用專屬獨立頻段</strong>：聯絡官在地下指揮所，使用 <strong>UHF/VHF 獨立頻段無線電對講機</strong> ，直接對接屏東縣政府衛生局緊急醫療網（EOC）及高屏區 EMOC 勤務中心 。本院已預先測試並排除地下室與鉛板隔離室等通訊死角的「中繼站」設定 ，確保無線電在地下 EOC 開設時仍能暢通 。</p>\n</li>\n<li>\n<p><strong>利用「GSM 橋接器」突破屏蔽</strong>：若常規基地台尚未完全損毀、但地下結構屏蔽嚴重時，聯絡官可調用院內配置的 <strong>GSM 橋接器（GSM Bridge）</strong> 或 GSM 遠程延伸天線 ，強行建立與縣市聯合應變指揮管制中心（LJEOC）的電話與簡訊回報備援線路 。</p>\n</li>\n</ol>\n<p>四、 擬定與協防軍警之「戰時指管通訊計畫」</p>\n<p>依據國家關鍵基礎設施防護規範，本院與周邊協防之軍警單位保持緊密聯繫\n：</p>\n<ol>\n<li>\n<p><strong>對接國軍支援協定</strong>：本院平時已與鄰近國軍部隊簽訂支援協定，包含 <strong>陸軍機械化步兵第二三四旅</strong> 及 <strong>陸軍屏東縣後備旅</strong> 等 。</p>\n</li>\n<li>\n<p><strong>落實戰時指管通訊計畫</strong>：本院已擬定<strong>「戰時與協防軍警指管通訊計畫」</strong> ，明訂在動員實施或防衛作戰時期，本院與協防軍警（民和派出所、保二總隊及在地民防中隊）的加密聯絡人清冊、預設戰術頻率及暗號金鑰 。當安全官 A2 通報發生暴徒衝闖、有心人士滲透或需要武裝護送關鍵物資（如 O 型備用血）時 ，聯絡官能透過此計畫之通訊管道迅速請求軍警實施強勢協防 。</p>\n</li>\n</ol>\n<p>五、 實行極端「無電磁通訊」之「徒步傳令兵（Runner）機制」（緊急通信\nEmergency）</p>\n<p>若遭受敵方強烈電磁脈衝（EMP）攻擊或強烈干擾，導致所有無線電、衛星與電子設備全部癱瘓時（即進入「資訊全黑」狀態）\n：</p>\n<ol>\n<li>\n<p><strong>啟動「傳令兵制度」</strong>：本院將徹底回歸最原始、最抗干擾的類比通訊方式------<strong>徒步傳令兵（Runner）</strong> 。</p>\n</li>\n<li>\n<p><strong>人工口令與實體簽收簿</strong>：由勤務組指派體能優良的行政人員穿著螢光背心、配戴防偽臂章擔任傳令兵 。傳令兵必須攜帶<strong>「實體簽收簿（Logbook）」</strong> ，在地下 EOC 指揮所、馬太 B1 藥庫、B1 臨時手術室及外圍軍警/衛生局前進協調所等關鍵站點之間穿梭 。</p>\n</li>\n<li>\n<p><strong>落實口頭覆誦（Read-back）</strong>：傳令兵傳遞核心調度指令、用血申請或傷亡報告時，一律採<strong>「口令覆誦」與「實體紙本簽名」</strong>雙重對核 ，杜絕資安外洩，死守戰地通訊最後防線 。</p>\n</li>\n</ol>\n<p>🔍\n建立戰時與軍警、衛生局的通訊韌性是平戰轉換推演的必考重點。需要我為您及指揮幕僚（黃雅芳副院長、杜傳榮主任），將上述通聯管道、專屬頻道與操作協定，彙整製成一份可隨身攜帶、防潮且直接放在「指揮官避難包\nGo-Bag」頂層的 <strong>「大連院區：戰時軍警、衛生局通訊 PACE\n構聯防呆查檢卡（A4 雙面精簡版）」</strong> 嗎？</p>\n<p>撤離途中如何確保重症病患的醫療資訊不中斷？</p>\n<p>在面臨主戰區威脅、全院啟動 <strong>HICS 第三階段「全面撤離與量能重置」</strong>\n的預防性撤離時，確保最脆弱之「高度照護重症病患（Class 4 /\n危急病人）」在轉運途中醫療資訊不斷鏈，是本院死守病人安全與資訊連續性的生命線\n。</p>\n<p>本院計畫部門（Planning Section）與執行部門（Operations\nSection）將協同病歷室及資訊室，採取以下<strong>五大類比與數位雙軌並行的核心戰術機制</strong>，死守重症病患轉運途中的醫療資訊安全：</p>\n<p>一、 醫療紀錄「人藥、病歷一對一物理綁定」隨隨車轉移（P3 文件紀錄組）</p>\n<p>為防範大批病患向外撤離時，與目標合作醫院（如部屏、寶建、安泰、屏榮）之資訊交接發生混亂與斷鏈\n，病歷室與病房單位必須落實「病歷隨人走」的剛性交接\n：</p>\n<ol>\n<li>\n<p><strong>防潮物理綁定（病歷袋）</strong>：在重症與臥床病患登上救護車前，病房書記與護理人員必須確認病患之實體紙本<strong>「轉診單、紙本轉院病歷摘要、手寫藥物治療紀錄（手寫處方箋）與檢驗/影像報告」</strong>皆已備齊，統一裝入具有防潮、防偽加密封條的<strong>「防水病歷夾鏈袋」</strong>中 。該資料袋必須<strong>強制物理綁定（使用束帶或專用防水膠帶貼牢）於病患擔架、推床或隨車箱旁</strong> 。</p>\n</li>\n<li>\n<p><strong>上車查驗與七項紀錄造冊</strong>：病歷室人員（P3）嚴格把關登車哨口，在病患上車時逐一確認「病歷是否隨同運送的紀錄」 。每個轉運病人皆必須登記並留下以下七項紙本文件紀錄以便後續追蹤 ： -   病人姓名、病歷號碼（身分證字號） ； -   病房或疾病分類、接收之合作醫院名稱 ； -   運送之救護車車輛資料、車牌號碼 ； -   病歷、藥物有無隨車隨同運送之查驗紀錄 ； -   車隊隨車護送之隨行醫護人員（隨車醫護編組 A）相關資料 。</p>\n</li>\n</ol>\n<p>二、 臨床持續觀察與「A-B 戰術一對一配對」隨隨車護航（O1 醫療照護組）</p>\n<p>資訊的連續性不僅存在於紙本，更存在於持續的臨床監視中 ：</p>\n<ol>\n<li>\n<p><strong>A-B一對一戰術配對</strong>：資源控管組（P1）打破科室建制，將隨車撤離的主治醫師與專責護理師造冊為<strong>「隨車持續照護功能編組 A」</strong> ，狀況分析組（P2）則將需撤離之危急病患（Class 4）精準建立<strong>「需撤離病人分組 B」</strong> 。在轉運途中，指派編組 A 醫護全程隨同救護車及擔架，死守 A-B 配對 。</p>\n</li>\n<li>\n<p><strong>連續維生資訊監視</strong>：隨行醫事人員在車載轉運期間，必須攜帶可攜式生理監視器與蓄電池維生裝備 ，持續監測並手寫記錄重症病人於轉送在途期間的生命徵象，維持重症照護資訊連續不中斷 。</p>\n</li>\n</ol>\n<p>三、 三大接運區實體「登錄哨」手動病人動向登記（P2 狀況分析組）</p>\n<p>若撤離時遭遇電信基地台受損或駭客 APT 攻擊導致電腦系統全黑 ：</p>\n<ol>\n<li>\n<p><strong>三大接運區設實體哨</strong>：狀況分析小組（病人動向組）必須立刻啟用最抗干擾的類比紙本登記，並親自投入第一線，於本院律定的<strong>三大簽證接運區</strong>（急診室大門救護車專區、恩慈旁私人車專區、門診大廳中巴接駁專區）設立<strong>「實體登錄哨」</strong> 。</p>\n</li>\n<li>\n<p><strong>手寫動向與追蹤管理</strong>：病歷人員及批掛人員以人工方式在登錄哨登記每位病患的<strong>「手圈編號、姓名、登上的車輛資料/車牌、隨車醫護姓名、接收之合作醫院名稱」</strong> 。登記情資必須每二至四小時彙整回報給地下前進指揮所及社工室，以便社工室及發言人即時、精準地提供家屬詢答，平息假訊息與失聯恐慌 。</p>\n</li>\n</ol>\n<p>四、 斷訊斷網大癱瘓下，暴力切換「紙本降級 (Downtime)」作業（O5\n機構主管）</p>\n<p>當資訊系統延遲或癱瘓時，資訊室立即宣告全院進入「紙本降級極限模式」\n：</p>\n<ol>\n<li>\n<p><strong>啟用 Downtime Box（當機緊急箱）</strong>：各病房護理站、急診與地下 B1 備援醫療區不等待修復，立即砸破封條取出預置的<strong>「當機緊急箱」</strong> ，全面切換為<strong>三聯式紙本手工病歷、手寫轉診摘要、手寫處方箋及紙本檢傷單</strong> ，確保撤離期間的處置與給藥流程全部留下實體字據 。</p>\n</li>\n<li>\n<p><strong>臨床 Handover 覆誦機制（Read-back）</strong>： -   <strong>對外醫師交班</strong>：在病患送上救護車前，急診轉運醫師或原主治醫師必須親自透過衛星電話、電話或 UHF/VHF 無線電 ，與合作接收醫院的對接醫師完成詳細的<strong>「臨床醫療交班（Handover）」</strong> 。 -   <strong>危險值確認</strong>：交班過程中必須逐一核對病患的<strong>維生參數設定（如呼吸器設定值、強心劑與鎮靜劑劑量）、特殊過敏史、以及即時檢驗報告之危險值</strong>，並大聲唸出病患姓名與數據進行 <strong>Read-back（口頭逐字覆誦雙重確認）</strong>，確認接收端完全掌握病情資訊後方能出發 。</p>\n</li>\n</ol>\n<p>五、 資料安全異地備援與災後「資料人工回補 (Data Backfilling)」計畫</p>\n<p>為防範大連院區在撤離或受空襲期間，歷史病歷主機與伺服器遭遇實體毀損，資訊室與病歷室共同實施資料保全與重建計畫\n：</p>\n<ol>\n<li>\n<p><strong>瑞光院區 7F 備援電腦機房接管</strong>：資訊室網路組人員必須在撤退初期 30 分鐘內，將核心 HIS、EMR 及 PACS 系統進行最後一次備份，並以加密數位管道（如 OneWeb/Starlink 低軌衛星 VPN 連線）同步傳輸至設於<strong>「瑞光院區 7F」之異地備援電腦機房</strong>，確保病患核心病史安全留存 。</p>\n</li>\n<li>\n<p><strong>全面人工補登回補（Data Backfilling）</strong>： -   撤離行動完成、 HIS 系統重啟或在目標合作醫院（異地重置醫療點）備援網路開通後 。 -   病歷室（P3）會同會計室及各臨床科別，將撤離與紙本降級期間所產生的所有<strong> Downtime 手工處方、檢驗單、用藥耗材及手寫病歷</strong>逐一收集 。 -   依照<strong>「資料人工回補標準作業流程（Data Backfilling SOP）」</strong>實施電腦補登回補 ，將在途與當機期間的完整診療軌跡重新輸入電腦系統，重建病患電子病歷的完整性與連續性 。</p>\n</li>\n</ol>\n<p>📑 重症病患在轉送途中的資訊移交與「病歷隨人走」程序繁瑣，且 Downtime\n紙本病歷與跨院臨床 Handover\n覆誦交班（Read-back）對一線醫護的默契要求極高 。</p>\n<p>我們是否需要將這套戰時重症轉運資訊保全程序，精煉彙整製成一份放在指揮所與護理站\nGo-Bag 中的實體 <strong>「HICS Phase\n3：重症病患預防性撤離『病歷物資隨車防水配對與跨院 Handover\n覆誦』實兵操作 A4 雙面核對卡（傳統紙本版）」</strong> 呢？</p>\n<p>如何防止醫療科技落入敵手？</p>\n<p>在戰爭威脅、面臨主戰區轉置或被迫進行部分與全面撤離的極端情境下，本院（屏東基督教醫院大連院區）為防範高價值醫療設備、關鍵資通訊系統及數百名病患之機密個資落入敵特、第五縱隊或敵方勢力手中，制定了嚴密且冷酷的<strong>「反資敵（Denial\nof Assets）」</strong>與<strong>「機密資料保密防護」</strong>戰略 。</p>\n<p>結合本院的平戰轉換白皮書與關鍵基礎設施（CI）防護指南，防止醫療科技與資產落入敵手的具體戰術作為如下：</p>\n<p>一、 實施無法撤離資產之「反資敵（Denial of Assets）」封存與銷毀機制</p>\n<p>在 HICS\n第三階段「全面撤離與量能重置」或面臨失守威脅時，若部分高階醫療科技設備因體積龐大、高度相依於院內常規電網（如大型中央透析機、高階\nCT、核磁共振 MRI 等精密儀器）而物理上絕對無法在數小時內拆裝、轉移\n：</p>\n<ol>\n<li>\n<p><strong>專人執行銷毀與封存命令</strong>：必須由事故指揮官下達最高行政授權，指派後勤部門（L0）與機構運作組（O5）的<strong>專責技術同工，在「反資敵」的最高戰略指導下，對無法撤離之關鍵物資與儀器設備執行封存或實體銷毀</strong> 。</p>\n</li>\n<li>\n<p><strong>物理性損毀核心晶片與儲存介質</strong>：為防止敵方獲取、修復並重啟我方的高階醫療系統或挪作敵軍戰地救治之用，專責同工須對上述儀器實施強制手動斷電 ，並對其<strong>核心控制主機、運算晶片、磁碟陣列等關鍵硬體，實施物理性的損毀、去磁或晶片物理拆卸銷毀</strong>，確保徹底癱瘓其運作功能，使其在物理上完全不可恢復 。</p>\n</li>\n</ol>\n<p>二、 資訊系統之「實體網段隔離與流量阻斷」</p>\n<p>戰時，敵方極可能同步展開針對本院基礎設施之國家級駭客（APT）攻擊、惡意程式或勒索軟體襲擊，企圖竊取、加密或鎖定本院醫療資訊（HIS）、電子病歷（EMR）、醫療影像（PACS）等核心科技網絡\n：</p>\n<ol>\n<li>\n<p><strong>實體網路阻斷（拔線）</strong>：資通簡報組（資訊室）工程師需 24 小時嚴密監控網路流量 。一旦偵測到疑似惡意連線、異常登入、病毒大量感染或網路服務不穩時，工程師必須當機立斷，<strong>拔除受感染網段交換器與核心交換器的連線，執行「實體隔離與阻斷」</strong>，避免災情擴大癱瘓核心的系統 。</p>\n</li>\n<li>\n<p><strong>切斷外部連結（Air-gapped/Local Server）</strong>：在面臨系統外洩或遭受強烈干擾風險時，資訊室工程師隨時準備切換或關閉外部網路，啟用「離線（Air-gapped）」系統、獨立防護網段或「在地伺服器（Local Server）」運作模式，將核心數據保護於院內物理防線內 。</p>\n</li>\n</ol>\n<p>三、 核心數據庫之「異地備援」與加密離線備份</p>\n<p>資料是現代醫療科技最核心的數位資產。為了防止因大連院區機房遭受物理打擊或敵特實體奪取而導致全院醫療歷史、研究科技數據與病歷庫外洩或損毀\n：</p>\n<ol>\n<li>\n<p><strong>瑞光院區 7F 異地備援即時傳輸</strong>：資訊室須在撤離前或遭受物理威脅的黃金時間內（如 30 分鐘內），將全院核心系統數據（HIS, PACS, LIS, EMR）進行最後一次安全備份，並以加密數位管道（如低軌衛星 Starlink/OneWeb VPN 連線），將數據即時同步至<strong>設於「瑞光院區 7F」之異地備援電腦機房</strong>，確保病史與營運資料安全存檔 。若大連主機遭敵實體奪取或戰火炸毀，瑞光備援機房將能無縫接管 。</p>\n</li>\n<li>\n<p><strong>離線加密硬碟隨身保全</strong>：資訊人員完成最後離線備份後，必須將<strong>含有最新核心系統與病患個資資料的「加密備份硬碟」直接交由指揮中心，放入指揮官隨身「避難包（Go-Bag）」中</strong>，由指揮官與核心幕僚於垂直轉移或向外撤離時隨身攜帶，死守防空疏散期間之資料安全 。</p>\n</li>\n</ol>\n<p>四、 關鍵資訊與電力設施之「24 小時武裝防暴巡邏」</p>\n<p>為了防範敵方第五縱隊（在地協力者特工）混住院區，趁撤退、混亂之際實施物理性破壞或盜取伺服器硬碟、剪斷發電機電纜、投毒等毀滅性人為破壞\n：</p>\n<ol>\n<li>\n<p><strong>增設 24 小時雙人武裝/防暴巡邏哨</strong>：保安室（安全管制主管 O4）會同前來協防之警政（民和派出所等）、保二總隊與在地民防單位 ，針對醫院的「數位心臟」與關鍵基礎設施（CI）------<strong>地下室緊急發電機房、伺服器資訊機房、頂樓水塔、戶外液氧槽</strong>等重地 ，增設 24 小時雙人武裝/防暴裝備巡邏哨 。</p>\n</li>\n<li>\n<p><strong>機房與機電通路「物理鎖固」</strong>：工務室與保安組全面巡檢並鎖固所有管線通道與機房門禁 ，一律加裝實體防護與防暴鎖具，嚴防非授權人員或暴徒撬鎖、破壞或放置爆裂物 。</p>\n</li>\n</ol>\n<p>五、 嚴格人員身份辨識與「白袍偽裝者」盤查機制</p>\n<ol>\n<li>\n<p><strong>杜絕「白袍偽裝特工」</strong>：巡邏哨同工配備金屬探測器、防爆毯等設備 ，<strong>嚴厲盤查並過濾院內穿著白袍的可疑偽裝人士</strong>，防止其進入核心機房或液氧儲區進行人為破壞 。</p>\n</li>\n<li>\n<p><strong>強制發配防偽專屬識別</strong>：總務部與人事組必須針對所有留守員工、臨時召回員工及外部支援人力、志工 ，進行極其嚴格的身分辨識與核對 。唯有通過核對者，方能<strong>發給專屬、不可仿造的識別證、螢光反光背心或特殊編號臂章</strong> ，嚴防敵方間諜假冒身份混入核心設施 。</p>\n</li>\n</ol>\n<p>六、 限制外圍防護邊界與資訊保密隔離</p>\n<ol>\n<li>\n<p><strong>硬邊界（Hard Perimeter）管制</strong>：立即關閉院區 80% 的非必要出入口與側門，將出入口縮減至單一急診車道，設立由武裝警力與院方高階護理師共同站哨的「聯合檢查站（Check-point）」，執行嚴格的武器搜查與身分核對 。</p>\n</li>\n<li>\n<p><strong>病患個資與 CI 災損資訊保密</strong>：法律訴求小組（職安室杜傳榮主任）與管理部  須嚴格落實<strong>「戰時機密資料保密防護」</strong> ，限制媒體記者拍攝任何帶有本院伺服器型號、網路頻率、發電機房等機密科技或 CI 設施的畫面 ；所有應變照片與事件紀錄統一由公共事務部安全掃描、下載並保密存檔，嚴防機敏災損與防務弱點外洩 。</p>\n</li>\n</ol>\n<p>🛡️\n在戰時高壓與敵我識別混亂的環境下，執行最冷酷的「資產反資敵銷毀」與「實體機房防禦」是保全國家醫療科技和病患個資的鋼鐵防線\n。</p>\n<p>我們是否需要針對上述這套流程，為資訊室（蔡哲民主任）、工務室（曹宏益主任）與安全官（杜傳榮主任），精簡彙整製成一份可以直接印出並護貝、掛在資訊伺服器機房大門與發電機房內的\n<strong>「大連院區：戰時關鍵基礎設施（CI）防破壞、反滲透與『反資敵資產銷毀』實兵\nA4 查檢核對卡（紙本防潮版）」</strong> 呢？</p>\n<p>在途病患的安全如何監控？</p>\n<p>在 HICS（醫院事故指揮系統）第三階段<strong>「全面撤離與量能重置（Phase\n3）」</strong>的極端戰火環境下，當本院（屏東基督教醫院大連院區）奉令執行預防性疏散，將數百名住院及急重症病患向外轉運時，<strong>「在途病患的安全監控」是死守病人生命安全與資訊連續性的關鍵戰役</strong>\n。</p>\n<p>為了在聯外交通混亂、斷水斷電、甚至隨時面臨通訊與系統大癱瘓的「黑堡孤島」絕境下確保在途病人不因資訊斷鏈或照護中斷而面臨致命危險\n，本院計畫部門、執行部門與後勤部門將協同地方衛生局與合作醫院，落實以下<strong>五大層級之鋼鐵般在途安全監控與生命線防禦體系</strong>：</p>\n<p>一、 決策與追蹤中樞：啟動雙端「Check-in / Check-out」動態銷號機制</p>\n<p>在病患大批疏散的混亂動線上，絕不能允許任何一個病患「憑空消失」 。計畫部<strong>狀況分析小組（P2，由護理部督導長擔任）</strong>將對接地方衛生局與\nEOC，實施動態監控 ：</p>\n<ol>\n<li>\n<p><strong>設立三大接運區實體「登錄哨」</strong>： -   在系統大當機或斷網時 ，病歷室與狀況分析同工親自投入一線，於三大簽證車道接運區（急診大門救護車專區、恩慈旁私人車專區、門診大廳接駁中巴專區）設立實體哨口 。 -   病患上車前，實體登錄其手圈編號、姓名、上了哪一輛簽證車（記錄車牌）、隨車隨行醫護人員（隨車醫護編組 A）相關資料、以及轉送之合作接收醫院 。</p>\n</li>\n<li>\n<p><strong>落實雙端動態回報與銷號（Check-in / Check-out）</strong>： -   <strong>【出發 Check-in】</strong>：車隊一出發，聯絡官立即透過 UHF/VHF 獨立頻段無線電或低軌衛星電話 ，向屏東縣衛生局 EOC 及 LJEOC 回報：<em>「屏基第 X 車隊（共 X 輛救護車/中巴）已出發，運送第四類高度照護重症病患共 X 名，預計前往部立屏東醫院」</em>，完成出發報到 。 -   <strong>【在途動態追蹤】</strong>：狀況分析小組（P2）在機構內部設立情報專區，每二至四小時彙整回報一次在途車隊進程 。 -   <strong>【抵達 Check-out】</strong>：當車隊安全抵達合作醫院、由本院派駐之「先遣裝設團隊」對接交班完成後 ，立即透過備援通訊向衛生局與本院地下指揮所回報，於實體白板看板上進行<strong>「銷號（Check-out）」</strong> 。</p>\n</li>\n</ol>\n<p>二、 臨床照護防線：鐵血推行「醫護-病人 A-B 戰術配對」與在途生命維持</p>\n<p>資訊的連續與生命的延續，仰賴於在途不中斷的臨床照護 ：</p>\n<ol>\n<li>\n<p><strong>A-B 戰術一對一配對隨車</strong>： -   資源控管組（P1）與醫務部配合，將召回與現有醫事人力建立<strong>「隨車持續照護功能編組 A（隨車醫護）」</strong> 。 -   狀況分析組（P2）則建立<strong>「需撤離病人分組 B」</strong> 。 -   將編組 A 與病人 B 進行<strong>「A-B 戰術配對」</strong>，指派專責主治醫師與護理師全程隨同救護車及轉送載具，死守病患在在途轉運期間的照護不中斷 。</p>\n</li>\n<li>\n<p><strong>在途連續維生與儀器轉移</strong>： -   針對第四類（Class 4）高度照護之危急或加護病房病患 ，隨車醫護配備可攜式生理監視器與可攜式蓄電池呼吸器 。 -   隨車物資必須準備足夠維持該病患 72 小時生存消耗之「個人專屬急救藥物、無菌靜脈林格氏液及備用血液製品（血庫提供之 O 型用全血）」盲派隨車 ，保障途中在途時間的最低維生。</p>\n</li>\n</ol>\n<p>三、 資訊不斷鏈：病歷用藥防水實體打包「隨車物理綁定」</p>\n<p>在戰火空襲下，若本院 HIS/PACS\n機房遭遇駭客攻擊大癱瘓或遭物理打擊摧毀，電子病歷將全黑 ：</p>\n<ol>\n<li>\n<p><strong>醫療文件隨行（防潮物理綁定）</strong>： -   在病患登上簽證車前，病歷室與病房書記、護理同工核對 ，將病患原有的<strong>手寫紙本「轉診單、紙本轉院病歷摘要、手寫藥物治療紀錄（手寫處方箋）與檢驗/影像報告」</strong>打包 。 -   上述實體文件統一裝入具有防潮、防偽加密封條的<strong>「防水病歷夾鏈袋」</strong>中 。 -   將該病歷袋<strong>強制物理性綁定（使用束帶或防水膠帶貼牢）於病患擔架、推床或隨車箱旁</strong> ，嚴防病患在抵達接收醫院時發生醫療資訊斷鏈 。</p>\n</li>\n<li>\n<p><strong>落實「交接登記」與「Read-back」跨院臨床交班</strong>： -   在病患被送上救護車前，急診轉運醫師或原主治醫師必須親自透過電話或備援無線電，與衛生局（EOC）排定接收之聯防合作醫院對接醫師完成詳細的<strong>「臨床醫療交班（Handover）」</strong> 。 -   交班時逐一確認病患的維生參數設定（如呼吸器設定值、強心劑與鎮靜劑劑量）、特殊過敏史、以及即時檢驗報告之危險值，並大聲唸出病患姓名與數據進行 <strong>Read-back（口頭逐字覆誦雙重確認）</strong> ，確保接收端接收資訊百分之百正確後始發車 。</p>\n</li>\n</ol>\n<p>四、 突發危安事件應變：安全官行使「安全中止權」與就地避難程序</p>\n<p>在撤離途中，若突然遭遇敵方無人機蜂群襲擾、周邊空襲爆炸或重大交通阻礙等極端威脅時\n：</p>\n<ol>\n<li>\n<p><strong>安全官行使「安全中止權（Safety Halt）」</strong>： -   安全官 A2（職安室主任 杜傳榮）全程於地下前進指揮所或透過與車隊長的備援無線電 ，動態實時監控疏散安全 。 -   一旦判定在途環境面臨二次爆震或嚴重受創之風險 ，安全官依法立即叫停撤離轉運 ，向指揮官（院長）發出警告。 -   指揮官迅速進行安全裁決，正式下達：<strong>「車隊撤離行動即刻暫停，立即轉入防空就地掩蔽避難狀態！」</strong> 。</p>\n</li>\n<li>\n<p><strong>執行在途「就地防爆掩蔽（Defend in Place）」與地下轉置</strong>： -   <strong>一線在途車隊</strong>：司機與隨行醫護立即引導病患與車輛撤離至最近之高架橋下、水泥結構掩體、或引導轉往地方政府開設之臨時急救站避難 。 -   <strong>院區裝載點（三大接運區）</strong>：避難引導人員迅速將剛推至車道的病患，<strong>垂直撤回最近的地下安全替代空間（約翰、馬可大樓 B1，或路加大樓 B1 停車場）</strong> 。 -   <strong>高樓層留守病房/ICU</strong>：醫護人員在不斷開生命維生儀器的情況下 ，迅速將推床推離靠窗區，<strong>移入無窗戶之「核心內筒」（如電梯梯廳、內部走廊、浴室）</strong>，拉下防爆窗簾，關死房門以防火煙侷限 。威脅解除並經設施管線漏電與結構安全鑑定無虞後，安全官報請指揮官核准方得重啟轉運 。</p>\n</li>\n</ol>\n<p>五、 接收端無縫轉銜：派遣先遣團隊與災後「資料人工回補 (Data\nBackfilling)」</p>\n<ol>\n<li>\n<p><strong>派遣「重置先遣團隊」打通交接通道</strong>： -   在本院主力撤離車隊（救護車及轉運接駁車）出發前，醫務部與行政支援組指派一小組由資深護理師、病歷批掛人員及總務資材同工組成的<strong>「先遣團隊（Relocation Advance Team）」</strong>優先出發，趕赴各合作接收醫院（部屏、寶建、安泰、屏榮） 。 -   先遣團隊提前進駐對方指定的接收區，<strong>打通本院病患轉入時的「臨時掛號、批價動線與病床物理分配」</strong> 。 -   主力車隊抵達接收醫院時，直接將病患推入指定病房直接收治，並完成病歷與隨行戰備藥品的當面簽收點交（Check-out） 。</p>\n</li>\n<li>\n<p><strong>落實災後「資料人工回補 (Data Backfilling)」</strong>： -   撤離行動順利完成、或異地重置醫療點與瑞光 7F 備援主機資料庫網路連線開機後 ，病歷室（P3）會同各臨床與批價科別，<strong>收集所有在途與當機期間前線產出的三聯式 Downtime 手工處方、檢驗單、手工病歷及轉診簽收單</strong> 。 -   啟動電腦人工補登機制，<strong>將病患在在途轉運途中以及臨災搶救中的所有完整醫囑與診療軌跡重新補登入 HIS 電腦系統</strong> ，確保病患核心病史、財務計帳與健保申報的法效正確性與完整性 。</p>\n</li>\n</ol>\n<p>🔍\n在戰時高壓、敵火襲擾且斷網大當機的混亂中，<strong>「隨車A-B配對」、「防水病歷物理綁定」與「Check-in\n/ Check-out 銷號機制」</strong>是確保在途病患安全不中斷的三大盾牌。</p>\n<p>您需要我為您及護理部、各護理站與醫勤運輸組，將這套在途監控與安全對接流程，彙整精簡成一份可直接印製、隨身裝入\nGo-Bag 中的實體 <strong>『屏基大連院區：HICS Phase 3\n戰時在途病患安全監控、隨行防水病歷物資與雙端 Check-in / Check-out 實兵\nA4 查檢核對卡（紙本防潮版）』</strong> 嗎？</p>\n<p>針對無法轉運的高價值精密設備，應如何執行具體的「反資敵」銷毀？</p>\n<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認醫院所在區域即將淪為「主戰區」\n，指揮官下令啟動 <strong>HICS 第三階段「全面撤離與量能重置」</strong> 時\n：</p>\n<p>針對體積龐大、相依於大連院區常規電網、且在撤離時限內<strong>「物理上絕對無法搬運與轉置」的高價值精密設備</strong>（如大型多切面電腦斷層\nCT、核磁共振儀 MRI、高階 X 光機、中央血液透析主機及核心資訊伺服器系統）\n，本院必須打破平時的資產保護常規，秉持<strong>「保障人員安全、防止科技資敵、預防二次災害、保留重建憑證」</strong>之鐵血原則\n，由\n授權，協同執行部（醫務部、工務室、資訊室、醫工組）與行政/財務部（法律訴求小組、會計小組）\n，採取以下<strong>六大階段之「反資敵（Denial of\nAssets）」封存與銷毀實兵操作 SOP</strong>：</p>\n<p>一、 第一階段：決策、法律免責宣告與戰時授權</p>\n<p>由於銷毀高價值國產與公產設備涉及極其複雜的民事、刑事與保險法律責任\n，必須在實施物理破壞前完成法律防線部署：</p>\n<ol>\n<li>\n<p><strong>實施無法搬運之極限評估</strong>： 由執行部長 O0（醫務部陳志文部長） 協同工務、醫工及資材組，在撤退前夕進行最後核點，確認某項高階精密儀器因「重量過重（如 MRI 磁磁體）、吊卸時間不足、或撤離通道受損」而<strong>物理上完全無法運離</strong> 。</p>\n</li>\n<li>\n<p><strong>簽發「反資敵封存銷毀令」與法律簽證</strong>： -   法律訴求小組長 F3（職安室主任 杜傳榮）  立即起草並由指揮官（吳榮州院長）  共同簽署<strong>《戰時資產反資敵封存銷毀法律簽證書》</strong> 。 -   該簽證書必須詳實記錄：執行命令之政府（軍方）緊急命令文號 、設備型號、財產編號、銷毀理由、銷毀執行人姓名及預估財務損失 。 -   此簽證書一式三份，由 F3 小組長安全打包放入指揮官隨身 <strong>Go-Bag 避難包</strong> 中攜離 ，作為戰後向國家申請「戰損補償、產險理賠、以及免除公務資產減損責任」的<strong>法定唯一唯一憑證</strong> 。</p>\n</li>\n</ol>\n<p>二、 第二階段：關鍵「可搬運核心零組件」之卸除與隨車攜離</p>\n<p>「反資敵」不僅是破壞，更是「技術致殘」與「核心技術保存」的結合 ：</p>\n<ol>\n<li>\n<p><strong>執行關鍵控制板之「物理卸除（Strip-down）」</strong>： 由醫工人員（機構運作組 O5 協力）  攜帶專用手工具，對無法搬運的 CT、MRI 等高精密儀器進行「去大腦化」拆卸 ： -   <strong>快速拔除並拆卸核心控制晶片（CPU板）、系統軟體加密狗（Dongle）、校正磁鑰（Calibration Keys）及主光學感測器。</strong></p>\n</li>\n<li>\n<p><strong>核心元件打包隨隨車後撤</strong>： 將上述拆下的高價值、體積小之關鍵核心零組件，貼上「大連院區財產識別貼紙」後，封入防水防震箱 ，交由隨車隨行後撤的醫事或資材同工隨身攜離 ，送往安全重置區之聯防醫院（部屏、寶建、安泰或屏榮） 。這能確保<strong>「縱使敵方實體奪取本院儀器，也因缺乏核心晶片與軟體密鑰而完全無法啟動使用」</strong>，且本院於戰後歸建時能以最快速度重新插板啟用 。</p>\n</li>\n</ol>\n<p>三、 第三階段：實體封存與切斷維生管線（預防二次災害）</p>\n<p>在執行物理銷毀或人員撤離無人駐守大連院區期間，必須極力防範精密設備因遭遇空襲火災或線路短路，引發全院性的二次毀滅性災害\n：</p>\n<ol>\n<li>\n<p><strong>強制執行「實體斷電與物理鎖固」</strong>： 工務室（設施運作 O2）人員，必須前往各高壓配電機房及設備端 ，<strong>手動拉下精密設備的專屬高壓空氣斷路器（ACB）及無熔線斷路器（NFB）</strong> 。 對配電箱及設備外殼實施實體上鎖、物理鎖固 ，並在開關上加蓋「戰時封存、嚴禁送電」之實體紅色警示封條。</p>\n</li>\n<li>\n<p><strong>分段、分區關閉醫療氣體閥門</strong>： -   工務室必須徹底<strong>切斷高壓氧氣、維生氣體及冷卻水管線</strong> 。 -   針對液氧槽與精密儀器的氣體銜接管路，進行<strong>「分段、分區機械式閥門手動手動關閉」</strong>，並排空管路內殘存之高壓氣體 。 -   徹底預防在無人駐守期間，高壓氧氣管路一旦因空襲震波破損 ，遭遇電線走火而引發毀滅性的高氧助燃與劇烈爆炸 。</p>\n</li>\n</ol>\n<p>四、 第四階段：資訊伺服器與病患隱私個資之「數位反資敵銷毀」</p>\n<p>病患電子病歷（EMR）及本院醫療資訊系統（HIS/PACS）一旦落入敵手，不僅嚴重洩漏數十萬屏東市民的個資隱私，更可能被敵方用於戰時情報分析\n：</p>\n<ol>\n<li>\n<p><strong>瑞光院區 7F「異地增量備份」確認</strong>： 資訊室主任（機構運作主管 O5）確認網路組已透過低軌衛星加密專線（VPN） ，將全院核心資料庫備份並安全同步傳輸至設於<strong>「瑞光院區 7F」之異地備援電腦機房</strong> 。</p>\n</li>\n<li>\n<p><strong>IBM HIS 主機與磁碟陣列（Storage）實體砸毀銷毀</strong>： -   在主力撤離前 1 小時，資訊室工程師拔除主機電源 。 -   <strong>對實體硬碟、磁碟陣列（Storage Hard Drives）及備份磁帶晶片，實施高強度「強磁去磁、物理實體鑽孔、或硬碟砸毀銷毀程序」</strong> 。 -   確認硬碟硬體晶片已實體碎裂，完全阻絕透過資料救援科技進行物理還原的可能，死守國家與市民個資底線 。</p>\n</li>\n</ol>\n<p>五、 第五階段：高價值無法搬運精密醫療設備之「硬體反資敵銷毀」</p>\n<p>針對大型\nCT、MRI、高階超音波及手術室麻醉機台等，採取不可恢復的「技術性物理癱瘓」：</p>\n<ol>\n<li>\n<p><strong>物理實體砸毀控制面板</strong>： 指派專人，使用重錘對精密設備的核心操作控制台、液晶觸控螢幕及光學掃描窗進行<strong>實體碎裂砸毀</strong> ，使其失去最基礎的人機操作介面 。</p>\n</li>\n<li>\n<p><strong>割斷內部精密配線與光纖管束</strong>： 使用絕緣剪刀與切斷工具，強行割斷儀器內側高密度的精密訊號電纜傳輸線、主機光纖管束（Fiber Optics）及感測器線束 ，破壞其內部的精密電路電晶體配置 。</p>\n</li>\n<li>\n<p><strong>MRI 系統「超導體失超（Quench）」之戰時緊急處置</strong>： 核磁共振超導儀器（MRI）若被敵方奪取，將成為極高價值的醫療與工業資源 。醫工同工會同工務組，在萬不得已且撤離的最後關頭，可手動按下<strong>「緊急 Quench（失超）按鈕」</strong> ： -   此動作會使液氦在極短時間內急劇汽化並向戶外管道噴射釋放 ，使超導線圈失去超導狀態、磁場瞬間消失，<strong>磁體線圈因高熱徹底燒毀與永久性物理性損毀</strong>，使該 MRI 磁體徹底報廢，不給敵方留下一絲一毫可修復使用的空間 。</p>\n</li>\n</ol>\n<p>六、 第六階段：清查登記與戰損呈報</p>\n<ol>\n<li>\n<p><strong>實施拍照與紙本人工清點存證</strong>： 銷毀完畢後，執行人員與 A2 安全官（杜傳榮）  必須使用具有備用蓄電池的數位相機或拍立得，<strong>對銷毀後的設備殘骸（須包含財產編號與設備型號）進行實體拍照存證</strong> 。照片與銷毀清單人工手寫編碼歸檔 ，裝入防水夾鏈袋中 。</p>\n</li>\n<li>\n<p><strong>3日內陳報戰損並啟動災後重建計畫</strong>： -   後撤安全重置點後，總務部與會計小組於 <strong>3 日內</strong> 清查本院在此次預防性撤離中反資敵封存與銷毀的資產清冊 ，呈交院長室及危管會 。 -   在戰火停息、大連院區威脅解除並安全歸建後，以此清冊與銷毀相片 ，向主管機關申報戰損與辦理保險理賠 ，並由會計小組編列正式的<strong>「災後硬體設施原地重建與設備採購預算表」</strong>，陳報院長室及董事會籌措經費重建，購置全新精密設備 。</p>\n</li>\n</ol>\n<p>🛡️ 戰時的「反資敵（Denial of\nAssets）」銷毀行動極其冷酷，且稍有不慎極易在混亂中造成人員感電、缺氧或吸入液氦等二次職業傷害\n。</p>\n<p>需要我為您、工務室曹宏益主任與醫工同工，彙整製成一份可以直接雙面列印並護貝、掛在精密儀器機房門後的\n<strong>『大連院區精密設備：戰時反資敵（HICS Phase\n3）實體封存與物理物理銷毀實兵操作 10 步防呆 A4 查檢卡』</strong> 嗎？</p>\n<p>應對預防性撤離，哪些重症設備需優先封存或毀損？\n如何確保撤離過程中「先遣對接團隊」能即刻開診？\n針對無法轉運的洗腎患者，應如何執行就地安置？</p>\n<p>一、 無法轉運之高價值重症設備「反資敵（Denial of Assets）」封存與銷毀</p>\n<p>當本院大連院區即將編入主戰區，且奉令執行最高級別之預防性撤離（HICS\n第三階段「全面撤離與量能重置」）時 ，針對體積龐大、高度仰賴院內常規電網、且在數小時內「物理上絕對無法搬運轉移」的高價值精密醫療設備\n：</p>\n<p>1. 應優先執行封存與反資敵銷毀之設備清單</p>\n<p>依據全災害管理與 CI\n防護要點，本院必須針對以下關鍵醫療及維生設備實施冷酷且徹底之「技術致殘」與「反資敵銷毀」，誓死防止國家級醫療科技與數十萬屏東市民的隱私個資落入敵手\n：</p>\n<ul>\n<li>\n<p><strong>影像診斷設備（影像設備）</strong>：<strong>高階多切面電腦斷層（CT）、核磁共振儀（MRI）</strong>及血管攝影等介入性治療設備 。</p>\n</li>\n<li>\n<p><strong>重要維生設備</strong>：無法及時拆裝移走之<strong>葉克膜（ECMO）、大型中央血液透析主機（洗腎機）</strong>及備用手術麻醉機 。</p>\n</li>\n<li>\n<p><strong>資通訊核心主機</strong>：醫院資訊室之<strong>核心 IBM HIS（醫療資訊）伺服器、儲存磁碟陣列（Storage）、PACS 醫療影像主機、LIS 檢驗資料庫</strong>及核心網路交換器 。</p>\n</li>\n<li>\n<p><strong>關鍵維生基礎設施</strong>：<strong>地下室緊急發電機控制盤、高壓配電空氣斷路器（ACB）</strong>、及戶外液氧槽輸出控制閥等關鍵機電設施 。</p>\n</li>\n</ul>\n<p>2. 反資敵銷毀與封存之具體實兵操作步驟</p>\n<ul>\n<li>\n<p><strong>法律免責與憑證保全</strong>：法律訴求小組長 F3（職安室主任 杜傳榮）會同會計小組 ，迅速草擬並由指揮官共同簽署<strong>《戰時資產反資敵封存銷毀法律簽證書》</strong> 。該證書將詳實記錄銷毀設備的型號、財產編號與照片 ，隨後裝入指揮官隨身 <strong>Go-Bag 避難包</strong> 中攜離 ，作為災後向國家申報戰損與保險理賠的法定唯一憑證 。</p>\n</li>\n<li>\n<p><strong>關鍵控制元件之拆卸隨行（技術致殘）</strong>：醫工人員（O5 機構持續運作組協力）  攜帶專用手工具，<strong>強行拆除上述 CT、MRI 及洗腎機之核心控制晶片（CPU板）、系統軟體加密狗（Dongle）、校正磁鑰及高階感測器</strong>，貼上本院財產貼紙後，打包隨隨車隨同醫護後撤 。此舉可確保「縱使敵方實體奪取本院儀器，也因缺乏核心晶片而完全無法啟動使用」，且我方戰後歸建時可快速重新插板啟用 。</p>\n</li>\n<li>\n<p><strong>硬碟物理實體砸毀與去磁（數位反資敵）</strong>：資訊室工程師在確認將全院核心資料庫異地即時增量備份至<strong>「瑞光院區 7F」之異地備援機房</strong>後 ，拔除所有主機電源 ，對實體硬碟、磁碟陣列實施高強度<strong>實體鑽孔、強磁去磁、或使用重錘實體砸毀銷毀</strong> ，杜絕資料還原 。</p>\n</li>\n<li>\n<p><strong>電力與醫療氣體之「斷尾式安全封存」</strong>：工務室人員手動拉下精密設備的專屬高壓空氣斷路器（ACB）及無熔線斷路器（NFB）並上鎖 ；對高壓氧氣管路、液氧槽管線執行<strong>「分段、分區機械式閥門手動關閉」</strong>，並排空管路內殘存的高壓氧氣 。此舉可徹底防範在無人駐守期間，氧氣管線一旦因空襲震波破損、遭遇電線走火而引發高氧助燃之毀滅性大爆炸 。</p>\n</li>\n<li>\n<p><strong>MRI 系統「超導體失超（Quench）」緊急處置</strong>：若核磁共振儀（MRI）面臨實體被敵奪取之迫切威脅，醫工人員在撤離的最後關頭，手動按下<strong>「緊急 Quench 按鈕」</strong>，使液氦在極短時間內急劇汽化並釋放，超導線圈因失去冷卻、失去超導狀態而高熱永久性燒毀，使該 MRI 磁體徹底報廢，不給敵方留下一絲一毫可修復使用的空間 。</p>\n</li>\n</ul>\n<p>二、「先遣對接團隊」無縫移植與即刻開診之核心機制</p>\n<p>為了確保在主力車隊與數百名病患抵達接收合作醫院（如協定聯防之部立屏東醫院、寶建、安泰或屏東榮總）時\n，大連院區團隊能<strong>「抵達即開診、10分鐘內開始掛號、配藥與救治」</strong>，本院聯絡官與醫務部必須啟動以下無縫對接機制\n：</p>\n<p>1. 提前派駐先遣裝設團隊（Relocation Advance Team）</p>\n<p>在主力撤離車隊出發前 1\n小時，指派由<strong>資深護理師、病歷批掛主管、資訊工程師及總務資材同工</strong>組成的「先遣對接團隊」優先出發赴各接收合作醫院\n。</p>\n<p>2. 先遣團隊抵達接收端之核心因應作為</p>\n<ul>\n<li>\n<p><strong>實地打通物理空間與 HICS 指管對接</strong>：先遣團隊會同對接醫院之指揮官 ，實地勘查與劃定本院移置進駐之「臨時開刀房、ICU與急診檢傷區」 ，確認備援水電與網路接口，重新架設大連院區的應變標示 。</p>\n</li>\n<li>\n<p><strong>架設臨時 HIS 終端與低軌衛星網路連線</strong>：先遣資訊工程師攜帶便攜式 IT 設備、手提電腦及低軌衛星（OneWeb/Starlink）接收端 ，在對方指定區域<strong>打通與「瑞光 7F 備援機房」之加密虛擬專線（VPN）連線</strong> 。這能確保主力抵達後 <strong>10 分鐘內即可「無縫重啟 HIS 掛號、讀取病歷與電子醫囑」</strong> 。</p>\n</li>\n<li>\n<p><strong>實施跨院之詳細「臨床醫療交班（Handover）」</strong>：急診與病房醫師先遣對接，與接收醫院的值班醫師完成詳細的電話或無線電臨床交班，逐一對核病患之維生參數設定（如呼吸器設定、強心劑與鎮靜劑劑量）、特殊過敏史及檢驗危險值 。</p>\n</li>\n<li>\n<p><strong>接收大連院區「隨車人藥、病歷防水綁定」夾鏈袋</strong>： -   病患上車前，本院已落實<strong>「病歷隨人走」</strong>的 A-B 醫患配對 。 -   手寫紙本「轉診單、轉院病歷摘要、手寫給藥與治療紀錄」皆裝入防潮防水之病歷夾鏈袋中，<strong>物理物理綁定（如貼上或綁牢）於病患擔架旁</strong> 。 -   主力抵達哨口時，先遣團隊直接與隨車隨行醫護核對，<strong>實施 Check-out 手動登記銷號</strong> ，病患無需在急診排隊推擠，能「即刻推入指定病床直接收治」，保障轉運過程與接收初期的資訊不斷鏈 。</p>\n</li>\n<li>\n<p><strong>戰備救命物資直接點收儲放（不增加合作醫院物資赤字）</strong>：先遣資材同工與隨車貨車會合，當面點收並儲放大連院區隨車運抵之 <strong>足量維持 72 小時消耗之「戰備急救箱（Go-Kits）、管制麻醉止痛藥物、無菌靜脈林格氏液及備用血品」</strong> ，確保開診初期大連團隊具備自給自足的運作量能 。</p>\n</li>\n<li>\n<p><strong>完成跨院 HICS 功能整合與排班</strong>：先遣團隊協助將隨車抵達的大連院區醫護人员（隨車醫護編組 A）與接收醫院的團隊進行<strong>「HICS 功能整合與合併排班」</strong> ，使大連院區團隊能即刻接管、啟動指定的臨時病房或開刀房執行戰傷搶救 。</p>\n</li>\n</ul>\n<p>三、 無法轉運之「洗腎病患」就地安置與維生防衛策略</p>\n<p>在主戰區炮火逼近、且常規網路與水電基礎設施遭遇嚴重破壞的孤島絕境下\n，針對部分病情複雜、依賴維生透析設備且評估轉送風險極高而「無法轉運」的洗腎（血液透析）病患，本院必須採取以下鋼鐵般之就地安置、掩蔽與維生替代防禦作為：</p>\n<p>1. 建立「透析資源地圖」與臨床病情分類（病人分組 B）</p>\n<p>配合衛福部醫事司指導，本院在平時與戰前整備期即已建立<strong>「透析資源地圖」</strong>，詳細盤點並造冊院內洗腎、慢性病及居家照護等高依賴族群的分布\n。一旦面臨撤離：</p>\n<ul>\n<li>由反向檢傷小組對在院透析病患進行強勢評估 ： -   <strong>病情相對穩定、可暫停一至二次透析者</strong>：判定為「第一類（可返家）」或「第二類（安置）」 。配合「戰時記帳豁免機制」辦理極速出院 ，並由社工人員轉銜至安全重置區之透析院所 。 -   <strong>病情危急、重症且極度依賴連續性血液淨化（CRRT/洗腎機）無法斷開管路者</strong>：判定為 <strong>Class 4 高度照護病患</strong> ，列為最高優先級「就地安置與防禦掩蔽」對象 。</li>\n</ul>\n<p>2. 實施「就地防爆掩蔽（Defend in Place）」空間戰術轉換</p>\n<p>若空襲警報響起（Code Black）或戰火突然波及，且高樓層洗腎中心或 ICU\n面臨直接火力威脅時 ：</p>\n<ul>\n<li>\n<p><strong>核心內筒掩蔽</strong>：護理人員在<strong>絕不斷開洗腎維生管路與儀器的情況下</strong>，迅速將病患連同推床、移動式透析設備推離大面積玻璃與靠窗區域 。</p>\n</li>\n<li>\n<p><strong>轉移至防震安全核心</strong>：將病患推入建築物防空結構最強固、無窗戶的<strong>「核心內筒（Core Barrel，如電梯梯廳、內部走廊、浴室等）」</strong>進行就地防爆掩蔽，並拉下所有防爆窗簾、關閉防火防煙門 。</p>\n</li>\n<li>\n<p><strong>無動力垂直轉置地下安全區（若建築受損）</strong>：若洗腎中心原建築受損、面臨火災或倒塌風險，護理人員須利用可攜式蓄電池維生設備與「樓梯疏散滑墊」 ，嚴格遵循<strong>「5人一組（4人徒步搬運擔架、1人專業護理照護）」</strong>救命原則 ，沿著無窗之內側安全安全梯，人工接力將重症洗腎病患垂直轉移至地下一樓 B1 備援替代醫療區 。</p>\n</li>\n</ul>\n<p>3. 韓偉大樓地下一樓（B1）之「地下血液透析」空間重構</p>\n<p>本院已預規劃將<strong>「韓偉大樓地下一樓（B1）腹膜透析室」</strong>在平戰轉換中迅速重構並開設為「臨時開刀房」\n。</p>\n<ul>\n<li>針對滯留或無法轉運之洗腎病患，醫務部與工務室須利用該區既有的腹膜透析及洗腎水電管線接口 ，將其部分空間重組為「臨時地下 ICU/血液透析照護區」，進行就地收治 。</li>\n</ul>\n<p>4. 啟動「黑堡（Black Start）」孤島狀態下之電力與純水死守配給</p>\n<p>血液透析極度依賴高純度的透析用水及穩定電力。在外部電網全毀、自來水管破裂的極端斷水斷電狀態下，工務室與後勤部必須冷酷執行以下維生資源配給，以維持就地安置洗腎患者的運作\n：</p>\n<ul>\n<li>\n<p><strong>電力負載卸除（Load Shedding）</strong>：工務室強制拉下行政區、一般病房、非必要空調及高樓層（已撤離區）的電源迴路 ；<strong>將緊急發電機的所有寶貴電力，絕對優先「死守」在開刀房、ICU 以及正在進行透析的地下備援重症區</strong> 。工程師每小時精算柴油儲油量，確保撐過黃金救援 72 小時 。</p>\n</li>\n<li>\n<p><strong>水資源紅區配給與水質保全</strong>：全面啟用院內地下水塔互補供水系統 。實施極其嚴格的「水資源分級配給」------<strong>最純淨、最乾淨的水僅供開刀房手術、醫療器械基本消毒及「洗腎透析用水」</strong>；嚴禁一切盥洗與洗手 。工務室醫工組必須持續監控透析 RO 水處理設備在發電機供電下的水質導電度，死守水質安全紅線，避免發生透析水質污染。</p>\n</li>\n</ul>\n<p>5. 戰時極限資源競用下之「安寧療護機制」轉銜</p>\n<ul>\n<li>\n<p>若戰事極度惡化，導致燃油、自來水及透析耗材（人工腎臟、透析液）完全耗盡、外部運補中斷 ，且醫院已無力再提供透析運作所需的水電純度時 ：</p>\n</li>\n<li>\n<p>本院將在危機護理標準下，由醫務部、心理與家屬支援分支協同臨床專家 ，針對<strong>依賴維生透析設備、但病情危重預後極差且物理上絕對無法搬運</strong>的危死患者，啟動<strong>「戰時安寧療護機制」</strong> ，提供止痛及臨終關懷 。此舉能將極度短缺的剩餘發電機燃料、林格氏液等物資，絕對優先集中留給最有機會生還的戰傷重大創傷病患，死守戰地醫療最大化救治戰力之倫理底線 。</p>\n</li>\n</ul>\n<p>🏥 應對「主戰區全面撤離（HICS Phase\n3）」涉及的「資產反資敵銷毀」、「先遣團隊對接開診」與「無法轉運洗腎病患之就地掩蔽防禦」流程，是檢驗醫院平戰轉換城鎮韌性的核心實兵指標\n。</p>\n<p>您需要我為您及醫務部（陳志文部長）、工務室（曹宏益主任）與資訊室，將上述這三套戰術\nSOP 彙整提煉，編制一份實體的 <strong>『屏基大連院區：戰時預防性全面撤離（HICS\nPhase 3）精密資產反資敵銷毀、先遣即刻開診、暨洗腎重症就地安置實兵 A4\n查檢對核卡（紙本防潮雙面版）』</strong>，以利演習桌推與下半年 CI\n防護實兵驗證時，讓各崗位主管能隨手勾稽、確實演練嗎？</p>\n<p>如何處理核心機房火災引發的資安事件與實體隔離？ 在斷水斷電下，HICS\n指揮組如何調度備用水源？ 如何區分喬裝份子與被召回的院內員工身分？</p>\n<p>一、 核心機房火災與資安事件之複合應處與實體隔離</p>\n<p>在大連院區面臨戰時遭受遠距火力波及或敵特蓄意破壞，導致核心資訊機房發生「紅色訊號（火災及爆炸）」\n，且同時偵測到疑似網路攻擊（如釣魚郵件、異常登入、惡意連線、勒索軟體等）致使\nHIS、PACS、EMR 系統大癱瘓之複合危機時 ，本院資訊室（機構運作主管 O5\n及資通簡報組）必須聯手安全防護班，實施以下<strong>實體隔離、系統降級與資料保全</strong>之鋼鐵防禦作為：</p>\n<ol>\n<li>\n<p><strong>機房火災之「物理斷電與管線隔離」</strong>： -   火警確認後，中控室總機立即撥打 119 通報並按 *9 進行全院廣播，通知臨時救災小組到場 。 -   <strong>安全防護班（工務組/安全組）在確認機房內人員已脫離維生管線的前提下</strong> ，配合臨時指揮官指示，前往配電室<strong>強制拉下機房專屬之高壓空氣斷路器（ACB）及無熔線斷路器（NFB），徹底手動斷電並物理鎖固</strong> ，同時關閉機房鄰近空調與維生管線，防止高氧助燃與漏電引發二次爆炸災害 。</p>\n</li>\n<li>\n<p><strong>資安網段之「實體隔離拔線（Isolate）」與機房安全關機</strong>： -   資訊室網路組工程師透過流量監控發現異常連線或惡意病毒大量擴散時 ，<strong>不等待修復，立即拔除受感染網段交換器與核心交換器的實體連線進行「實體隔離」</strong>，以物理拔線方式阻斷災情蔓延至核心 IBM 主機與 PACS 醫療影像系統 。 -   值班人員嚴密監控資訊機房 UPS 不斷電系統 。若發電機因火災或故障於 10 秒內無法正常供電，<strong>當 UPS 電量低於 30% 時，危機應變分組必須立即對其餘 HIS 醫療主機及網路儲存媒體執行「緊急安全關機作業」</strong>，嚴防硬體毀損與關鍵病史資料遺失 。</p>\n</li>\n<li>\n<p><strong>暴力啟動全院「紙本降級（Downtime）」與傳令兵機制</strong>： -   資訊室主任判定系統癱瘓且無法於 30 分鐘內修復，立即呈報指揮官啟動<strong>「全院當機處理機制」</strong> 。 -   前線各病房、急診、藥局、檢驗及放射單位<strong>砸破封條啟用「當機緊急箱（Downtime Box）」</strong> 。臨床醫師全面改用箱內備妥之紙本三聯手工病歷、手寫處方單及檢驗/影像檢查手工單 。 -   <strong>啟動最抗干擾之「徒步傳令兵（Runner）制度」</strong>：調派體能良好的後勤同工穿著螢光背心、配戴防偽臂章，持<strong>「實體簽收簿（Logbook）」</strong>，以徒步人手傳遞、人工口令覆誦對核方式，穿梭於地下 EOC、馬太 B1 藥庫、B1 臨時手術室與 4F 檢驗科之間傳遞緊急醫囑、配血單與用藥單，徹底阻絕電磁癱瘓對決策的阻礙 。</p>\n</li>\n<li>\n<p><strong>「瑞光院區 7F」異地備援接管與資料人工回補（Data Backfilling）</strong>： -   資訊工程師在撤離前，確認全院 EMR、PACS、HIS 資料皆已即時同步增量備份至<strong>「瑞光院區 7F」之異地備援電腦機房</strong>，確保資料安全存檔 。 -   待危機解除、HIS 系統安全重啟後，病歷室與會計組收集當機期間產生的所有紙本 Downtime 病歷、手工處方及計價欠繳單 。依照<strong>「資料人工回補標準作業流程（Data Backfilling SOP）」</strong>，逐筆將手工診療軌跡、給藥、計價補登輸入電子系統，捍衛病歷連續性與健保申報正確性 。</p>\n</li>\n</ol>\n<p>二、 斷水斷電極端「孤島效應」下之備用水源調度機制</p>\n<p>在大連院區因空襲震波導致自來水主幹管爆裂、且遭遇常規電網全毀、中油燃油車因聯外道路中斷無法運補的「黑堡（Black\nStart）」孤島狀態下 ：</p>\n<p>在 HICS 體系下，事故指揮官 A0（院長）下達「資源優先使用與配給」最高指令\n，後勤部長 L0（總務部部長許慧莉）與勤務主管\nL1（醫勤室主任吳哲維）、設施運作主管 O2（工務室主任曹宏益）密切協同\n，啟動以下<strong>備用水源極限調度與紅區配給方案</strong>：</p>\n<ol>\n<li>\n<p><strong>地下水（戰備水井）與蓄水池互補啟用（工務室 O2）</strong>： -   自來水供水異常發生時，工務室人員立即廣播全院節約用水 ，並<strong>手動啟動本院「地下水供水系統（戰備水塔）」</strong> 。 -   工務人員迅速<strong>將大連院區頂樓的五座蓄水塔連結管路完全打開，實施「五座水塔互補供水」</strong>，將全院殘存之純淨儲水集中調度 。</p>\n</li>\n<li>\n<p><strong>實施冷酷的「水資源紅區管制與分級配給」</strong>： -   為死守醫療生命線，指揮中心實施極嚴格的水資源管制 ： -   <strong>【一級核心水源（最純淨水）】</strong>：<strong>絕對優先死守且僅供「開刀房刷手、醫療器械基本消毒及重症病患飲用」</strong> 。工務組醫工人員持續監控透析 RO 水處理設備，確保就地安置之 Class 4 洗腎重症患者之透析水質安全。 -   <strong>【二級生活水源（管制停用）】</strong>：<strong>嚴禁一切員工、家屬及病患洗手、刷牙或盥洗</strong>；全院強制改用酒精乾洗手液維持手部衛生，防範院內交叉感染爆發 。 -   <strong>【三級排污用水（沖馬桶封閉）】</strong>：<strong>全院廁所實施實體封鎖，禁止沖水</strong> 。改為配發「化學便器袋」，或放置大型儲水桶，限由清潔同工舀用廢水、雨水或冷氣冷凝水人工舀水沖洗 。</p>\n</li>\n<li>\n<p><strong>外部緊急水源與外購調度（聯絡官 A3 / 後勤 L0）</strong>： -   若院內地下水系統損壞或水源枯竭，聯絡官立即撥打電話 <strong>08-7662911 或 119</strong> 向屏東縣消防局申請水車到院進行送水與抽水支援 。 -   採購小組與勤務組立即啟動戰時緊急合約外購水源 ：迅速致電<strong>「高山行山泉水（0910-788388）」</strong>或<strong>「賀眾牌飲水/賀屏企業（08-7519000）」</strong>，租用大噸位山泉水車與成箱桶裝礦泉水送院，解決地下臨時醫療區、膳食製備與急診搶救之基本生理水源缺口 。 -   勤務組會同營養室（徐桂婷組長）動用預先儲備的 <strong>3 至 7 天緊急乾糧與飲水</strong>，優先補給執行高強度搬運的後勤人員、醫護同工與重症患者，維持基本生理機能 ；若外界道路完全斷絕，則協調院內之 <strong>便利商店（7-11）</strong> 作為第一優先膳食與飲水供糧據點 。</p>\n</li>\n</ol>\n<p>三、 戰時防滲透：區分「喬裝分子（特工）」與「被召回員工」之辨識機制</p>\n<p>戰時，敵方第五縱隊（在地協力者特工）極可能喬裝避難難民、甚至穿上白袍偽裝成臨床醫護，混在召回員工中滲透院區，企圖竊取磁碟伺服器、切斷發電機纜線或在頂樓戰備水塔投毒\n。大連院區保安組、總務部與人事組必須採取以下<strong>四道重層物理與資訊核對防線</strong>，實施鋼鐵辨識：</p>\n<p>[ 第一道：急診車道 ] ➜ 物理封鎖 80% 側門，設立由「武裝警力 +\n高階護理師」共同站哨之「聯合檢查站」</p>\n<p>[ 第二道：登錄哨口 ] ➜\n於護理部前廳設置「人力集合點」，人事組嚴格查核「雙重證件」比對應召名冊</p>\n<p>[ 第三道：防偽識別 ] ➜\n通過者強制配發「不可仿造之特殊防偽識別證、螢光反光背心或編號臂章」</p>\n<p>[ 第四道：CI 武裝巡邏 ] ➜\n發電機、機房重地設「雙人武裝哨」，隨身配備金屬探測器，嚴厲盤查「白袍偽裝者」</p>\n<p>第一道：急診車道「聯合檢查站（Check-point）」物理管制</p>\n<ul>\n<li>\n<p>安全管制組（保安組）配合前來協防之屏東警政、保二總隊，<strong>立即封閉大連院區 80% 的出入口與側門</strong>，拉下防火鐵捲門，並架設拒馬、充水式紐澤西護欄等實體防衝撞阻絕物 。</p>\n</li>\n<li>\n<p>全院僅保留「急診車道」作為唯一出入口，並設立由<strong>「武裝警力與院方高階護理師」共同站哨的「聯合檢查站」</strong> 。</p>\n</li>\n<li>\n<p><strong>【警力職責】</strong>：負責對進出人員、被召回員工進行金屬探測、武器與行李防爆搜查 。</p>\n</li>\n<li>\n<p><strong>【高階護理師職責】</strong>：利用臨床熟面孔優勢，進行一線面部識別，並口頭詢問醫療專業常識與院內基本人事編制，強勢阻絕非傷患、無關家屬或未能證實身分之喬裝分子進入 。</p>\n</li>\n</ul>\n<p>第二道：「人力集合點」之人事召回雙證件核對（人事組 F1）</p>\n<ul>\n<li>\n<p>人事小組長（人資室主任）於本院指定的召回集結區------<strong>「本院護理部前廳（主要）」</strong>或「恩慈大樓 1F 停車場東側（預備）」開設支援人力登錄哨 。</p>\n</li>\n<li>\n<p>所有透過總機「一呼百應」語音系統召回、或接獲 Line 動員令返院之員工，一律必須親自到登錄哨簽到 。</p>\n</li>\n<li>\n<p>人事同工<strong>嚴格查驗其「雙重身份證明」</strong>（員工識別證，搭配國民身份證或醫事人員執業執照） ，並與當日 HICS 資源控管組（P1）及人資系統所印發的<strong>「最新召回應召同仁造冊名單」</strong>進行逐一實時核對，確保名冊有其人且資料無誤，杜絕冒名頂替 。</p>\n</li>\n</ul>\n<p>第三道：強制配發不可仿造的實體「防偽專屬識別」</p>\n<ul>\n<li>\n<p>凡經人事組與總務部核對證件、對照召回名冊無誤之員工、外部支援醫療同工或合法招募志工 ：</p>\n</li>\n<li>\n<p><strong>必須當場強制配發本院戰時專屬、不可仿造的「特殊防偽識別證、螢光反光背心、或帶有專屬防偽編號的臂章」</strong> 。</p>\n</li>\n<li>\n<p>未配戴此防偽專屬識別者，縱使身穿本院醫護白袍，一律嚴禁跨越防火鐵門進入病房區、地下 EOC 及 B1 五大醫療備援红區，並由現場保全實施物理扣留 。</p>\n</li>\n</ul>\n<p>第四道：關鍵 CI 基礎設施「白袍偽裝者」巡守與口頭詢答（保安組 O4）</p>\n<ul>\n<li>\n<p>針對維持本院數位與生命命脈的「關鍵基礎設施（CI）」------<strong>地下室緊急發電機房、伺服器資訊機房、頂樓蓄水池水塔、及戶外液氧槽</strong> ：</p>\n</li>\n<li>\n<p>保安組（安全管制主管 O4）增設 <strong>24 小時雙人武裝/防暴巡邏哨</strong> ，巡邏人員隨身佩戴啟動<strong>「密錄器」進行錄影、拍照與即時蒐證</strong> 。</p>\n</li>\n<li>\n<p>巡邏哨配備金屬探測器、防爆毯 ，<strong>針對在上述 CI 機敏重地附近徘徊、且「穿著白袍之可疑人士」實施最嚴厲的隨機盤查</strong> 。</p>\n</li>\n<li>\n<p>盤查時除核對其專屬防偽識別證外，巡邏隊必須現場對其進行「口頭壓力測試核對」（如要求其說出直屬科別、直屬主管姓名、院內分機、當前 HICS 廣播代號或基本醫學常識） 。一旦發現對方閃爍其詞、口音有異或回答不符，一律視為敵方喬裝之滲透特工，巡邏警衛立即以防暴盾牌結陣壓制，拉響警鈴，並立刻啟動警民連線報警移交警政、國安調查單位處理 。</p>\n</li>\n</ul>\n<p>🛡️ <strong>城鎮韌性與 CI 防護桌推提示</strong>：\n機房火警與資安攻擊、斷水斷電極限運作，以及防範第五縱隊滲透，是檢驗本院平戰轉換白皮書中「後勤維生」與「安全固守」最具挑戰性的實兵課目\n。</p>\n<p>您需要我為您及工務室曹宏益主任、資訊室蔡哲民主任、醫勤保安組王建文組長，彙整編印一份可以直接塑膠護貝、掛在地下指揮所情資看板旁的\n<strong>『大連院區：戰時關鍵基礎設施（CI）安全固守、負載卸除、暨水資源分級配給一線實兵\nA4 查檢核對卡（紙本防潮雙面版）』</strong>，以利下半年 CI\n防護實兵驗證時，各崗位同工能隨手勾稽、確實操作嗎？</p>\n<p>如何啟動走動式血庫機制？ 詳細說明B1備援醫療空間配置\n解析斷網下的紙本降級作業流程</p>\n<p>在屏東基督教醫院（屏基）大連院區的「平戰轉換與戰時醫療韌性」總體規劃中，面對戰爭威脅、斷水斷電、資安網路癱瘓等極端「孤島效應」挑戰，醫院制定了鋼鐵般的實兵操作程序。以下針對您提出的三項核心戰術問題，提供詳盡的具體執行規範與空間配置解析：</p>\n<p>一、 如何啟動「走動式血庫（Walking Blood Bank）」機制？</p>\n<p>在主戰區炮火封鎖或聯外大橋炸毀的極端情境下，若醫院面臨大量戰傷大出血患者湧入，且高雄捐血中心與外部運補因交通中斷而無法及時送達、導致血庫庫存瞬間見底的瀕死絕境時，檢驗科將立即啟動北約軍醫常用的<strong>「走動式血庫（Walking\nBlood Bank，院內活體自給自足捐血計畫）」</strong> 。具體啟動與操作流程如下：</p>\n<p>1. 事前編組與名冊建檔（動員準備期）</p>\n<ul>\n<li>\n<p><strong>活體血庫名冊管理</strong>：平時及戰前整備期，檢驗科已針對院內員工及合法登記的志工進行完整的血型檢驗與傳染病篩檢，並簽署自願捐血同意書，建立專屬的<strong>「員工/志工血型與傳染病篩檢建檔名冊」</strong> 。</p>\n</li>\n<li>\n<p><strong>捐血作業小組籌組</strong>：由院方「輸血委員會」召集，組成包括醫師（不限科別）、醫檢師、護理師共 4 至 6 人的<strong>專責「捐血作業小組」</strong>，負責評估捐血標準、全血採集及開立檢驗 。</p>\n</li>\n</ul>\n<p>2. 緊急召集與廣播啟動（T0 決策點）</p>\n<ul>\n<li>\n<p><strong>指揮官授權廣播</strong>：檢驗科值班人員向 HICS 事故指揮官 A0（吳榮州院長）回報血液枯竭情資，指揮官裁決後下達動員令 。</p>\n</li>\n<li>\n<p><strong>一呼百應緊急群呼</strong>：總機透過廣播系統、手機 Line 群組及中華電信<strong>『一呼百應』語音群呼系統</strong> ，針對名冊中符合條件（如 O 型血及相符血型）之院內留守同工及志工發出召集 。</p>\n</li>\n</ul>\n<p>3. 臨時地下捐血站之「空間戰術配置」</p>\n<p>為了防空安全，捐血站將開設於地下一樓安全的獨立場域------<strong>「韓偉大樓地下一樓\nB1 出口位置（臨時捐血區）」</strong> ，理想工作溫度為 20--24℃\n。小組成員利用圍簾、紅龍隔離，設置以下四大功能區 ：</p>\n<ul>\n<li>\n<p><strong>【A區：登記與等待區】</strong>：捐血人在此核對雙證件 ，填寫健康問卷、捐血登記表，並由專人測量體重、血壓、體溫等生命徵象，確保安全 。</p>\n</li>\n<li>\n<p><strong>【B區：問診與體檢區】</strong>：由醫師進行面談與健康評估，醫檢師使用 Hb meter 進行血紅素篩檢，確認符合捐血標準後開立「手工檢驗單」 。</p>\n</li>\n<li>\n<p><strong>【C區：採血作業區】</strong>：使用採血推床或陪病椅 。實施嚴格下針處「二消」（酒精大範圍擦拭，並以 2% chlorhexidine 上下擦拭 30 秒、等待 30 秒） 。置空血袋於磅秤上，下針後先收集前段血於檢體袋，真空抽取檢驗試管送檢，再折斷主血袋管路擋板採集全血，手動搖動混勻抗凝劑（CPDA-1） 。</p>\n</li>\n<li>\n<p><strong>【D區：休息觀察區】</strong>：捐血人在此平躺或靜坐休息至少 10 至 15 分鐘，提供高熱量餅乾、飲水與保暖毛毯，預防頭暈或血管迷走神經反應 。</p>\n</li>\n</ul>\n<p>4. 戰地「即抽即輸」肉搏程序與冷鏈</p>\n<ul>\n<li>\n<p><strong>僅採集全血</strong>：在動員實施階段，血庫<strong>僅採集全血（Whole Blood）</strong> 。</p>\n</li>\n<li>\n<p><strong>簡化極速快篩</strong>：現場僅進行 ABO血型、Rh血型，以及 HIV、HCV、HBV 的極簡快篩檢驗 ，合格後人工貼上「檢驗合格」與手寫血袋正面標籤 。</p>\n</li>\n<li>\n<p><strong>傳令百米速遞</strong>：剛抽取出、尚有體溫的合格血袋套入夾鏈袋中 ，不經成分血分離，直接由穿著螢光反光背心的「徒步傳令兵（Runner）」以百米衝刺速度直接送入地下臨時開刀房或急診搶救紅區，立即輸注，搶救生命 。</p>\n</li>\n<li>\n<p><strong>4至6小時冷鏈封存</strong>：若新鮮全血預計在 24 小時內不會使用，必須在採血完成 4 至 6 小時內，送至受連續溫度監控（1-6℃）並連接緊急電源/UPS 的保存冰箱中製成儲存全血，且與常規捐血中心的血品分區存放 。</p>\n</li>\n</ul>\n<p>二、 詳細說明 B1 備援醫療空間配置</p>\n<p>當醫院高樓層行政區與玻璃帷幕在戰爭中面臨空襲震波及爆炸二次殺傷的致命弱點時，策略重點在於將核心臨床功能「垂直向下潛藏」\n。大連院區已將地下一樓（B1）空間重新重構，規劃出<strong>五大備援醫療功能區</strong>與大後勤支援鏈，其實體配置與用途明細如下：</p>\n<p>1. 地下一樓（B1）五大備援醫療空間配置表 ----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- <strong>備援醫療功能區</strong>   <strong>地下一樓（B1）實體配置位置   </strong>空間主要戰術用途 **                                                                        <strong>物理管制重點 ** **                                                                                                                 -------------------- ------------------------------ ------------------------------------------------------------------------------------------------------------ ------------------------------------------------------------ </strong>【檢傷行政區】<strong>   </strong>約翰、馬可大樓 B1            大量傷患實體登記、檢傷分類行政作業、傷票與傷病卡掛牌、傷病患去向與轉送紀錄登記、家屬初步查詢與尋人導引       管制工務室前方通道、主要走廊、樓梯間，確保檢傷一線防線通暢 。                                                                                           。 129]                127, 128, 129, 130]                                                                                                                         <strong>【臨時 ICU         </strong>約翰、馬可大樓 B1            重症暫置、ICU 銜接照護。集中部署可攜式呼吸器、多功能生理監視器、床邊給氧端口及吸引系統，死守重症生命底線     管制資材組前方停車場周邊通道、與韓偉大樓連通處防火門 。                                                                                  127]。 128, 129]           127, 128, 129, 130]                                                                                                                         <strong>【臨時開刀房】</strong>   <strong>韓偉大樓 B1 腹膜透析室</strong>     提供緊急手術與戰傷處置之微型手術室。配置至少一至兩張手術台、防爆手術燈/無影燈、負壓排氣空調及戰時麻醉支援    嚴格管制腹膜透析室大門、電梯口與鄰近主要通道，執行無菌管制 。                                                                                  。 129]                148]                                                                                                                                        <strong>【恢復室】</strong>       <strong>韓偉大樓 B1 環保室</strong>      128, 282]。                                                                                                 129]。 129]                                                                                                                                                             <strong>【輕症病房】</strong>     <strong>路加大樓 B1 停車場</strong>      。                                                                                           128]。 129]                                                                                                                                                             -----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------</p>\n<p>2. 地下大後勤補給與指揮鏈配置</p>\n<p>除了前線醫療功能區外，地下層亦配備了維持醫院自給自足的「糧草、彈藥與指揮大腦」補給線：</p>\n<ul>\n<li>\n<p><strong>馬太大樓地下一樓（B1）</strong>：並未收治病患，管制為<strong>「疏散與管制動線（動線接續區）」</strong> 。地下室設有<strong>「馬太 B1 藥庫及藥庫冰箱」</strong>，作為戰時全院藥品、戰略藥劑（抗生素、麻醉止痛藥）補給與配送支援的地下中樞 。</p>\n</li>\n<li>\n<p><strong>約翰/馬可大樓 B1 資材室</strong>：後勤物資補給總庫，存放醫療耗材（紗布、林格氏液、PPE）、乾糧、防護具等，就近提供物資支援 。</p>\n</li>\n<li>\n<p><strong>韓偉大樓 B1 藥局</strong>：開設於 <strong>韓偉大樓 B1 藥劑科</strong> ，提供戰時手寫處方的紙本調劑與人工發藥服務 。</p>\n</li>\n<li>\n<p><strong>戰時指揮所（前進指揮所 / 地下 EOC）</strong>：建議開設於 <strong>恩慈大樓地下一樓會議室</strong>（必要時退守 B2 防空總指揮所及 B2 電腦教室） ，此區域結構最強固，配置衛星電話、獨立不斷電 UPS，作為指揮大腦 。</p>\n</li>\n<li>\n<p><strong>人員休息及生活支援區（員工庇護站）</strong>：建議開設於 <strong>恩慈大樓 2 樓員工運動中心</strong> 。提供強制輪休人員熱食、行軍床、耳塞與眼罩，確保同工在「聽不見哀嚎、看不見鮮血」的絕對安全安靜環境中進行生理修復 。</p>\n</li>\n</ul>\n<p>三、 解析斷網下的「紙本降級（Downtime）」作業流程</p>\n<p>當醫院遭受國家級駭客（APT）進行分散式阻斷服務攻擊（DDoS）或勒索軟體鎖定，HIS（醫療資訊）、PACS（影像）、LIS（檢驗）及\nEMR（電子病歷）系統陷入大癱瘓，且伴隨全院斷網、斷電的「資訊全黑（又盲又啞）」最壞情境時\n，本院將暴力切換至「類比/手工作業」\n，具體作業流程如下：</p>\n<p>[ 步驟 1：資安隔離與宣告 ] ➜ [ 步驟 2：暴力拆 Downtime Box ] ➜ [\n步驟 3：跨科手工流程 ] ➜ [ 步驟 4：傳令兵 &amp; 無線電 ] ➜ [ 步驟\n5：系統重啟與回補 ]</p>\n<p>步驟一：資安阻斷、當機判定與法定宣告</p>\n<ul>\n<li>\n<p><strong>實體網段拔線隔離</strong>：資訊室網路組人員透過流量監控發現異常連線或惡意病毒大量擴散時，<strong>不等待修復，立即拔除受感染網段交換器與核心交換器的實體連線進行「實體隔離」</strong>，物理切斷，防止受感染 HIS 主機波及核心資料庫 。</p>\n</li>\n<li>\n<p><strong>緊急安全關機</strong>：若發電機電力中斷，資訊機房 UPS 電力低於 30% 且無法復電時，為防硬體受損及關鍵病史資料遺失，危機應變組立即對 IBM HIS 核心伺服器、網路儲存媒體執行<strong>「緊急安全關機作業」</strong> 。</p>\n</li>\n<li>\n<p><strong>宣告與廣播啟動</strong>：資訊長判定 30 分鐘內無法修復系統，呈報指揮官。指揮官正式宣告全院啟用「全院當機處理機制」 。總機利用 <strong>緊急內線按</strong> *9 進行全院大語音廣播（或利用 UHF 無線電/手持大聲公傳遞宣告） 。</p>\n</li>\n</ul>\n<p>步驟二：暴力砸開「當機緊急箱（Downtime Box）」</p>\n<ul>\n<li>\n<p>全院各病房護理站、急診室、藥局、檢驗科、放射科及掛號批價櫃檯，<strong>立即砸破/剪開預先整備、定期查核更新的藍色「當機緊急箱（Downtime Box）」之防偽封條</strong> 。</p>\n</li>\n<li>\n<p>取出箱內配備的<strong>「救命手工工具」</strong>：三聯式紙本手工病歷、手寫處方單（藥單）、手寫檢驗/影像檢查手工單、紙本檢傷單、病患條碼貼紙、手電筒、計算機，以及各病區每日預先離線下列印之「最新住院病人名單」 。</p>\n</li>\n</ul>\n<p>步驟三：各單位紙本替代運作機制與臨床限制</p>\n<ul>\n<li>\n<p><strong>前線臨床（病房、急診、手術室）</strong>： -   醫師全面改採三聯式紙本病歷，手寫處方箋（用藥醫囑） ；護理師改以人工白板、手寫床位名冊進行病人交班與醫囑三讀五對 。 -   重症病患需要垂直轉移或後送轉院時，病書記與病歷人員確認其手寫轉診單、紙本轉院病歷摘要、手寫藥物治療紀錄裝入<strong>「防水病歷袋」中，強制物理綁定（使用束帶或防水膠帶貼牢）於病患隨行擔架或推床旁</strong>，實施「病歷隨人走」 。</p>\n</li>\n<li>\n<p><strong>門診/急診藥局</strong>：全面停止依賴電子傳輸。 -   藥劑師全面改為接收由「傳令兵」徒步手遞之手寫處方箋，進行人工調劑、三讀五對與發藥 。 -   啟動<strong>「推拉式物流（Push-Pull Logistics）」盲派機制</strong> ，資材人員與藥劑師主動將預先包裝完成之「戰傷急救箱」（內含止血帶、骨針、靜脈輸液、廣效抗生素等戰備耗材）主動推進至急診紅區與臨時開刀房門口 ，確保醫護隨手可得救命子彈 。</p>\n</li>\n<li>\n<p><strong>檢驗科（含血庫）</strong>： -   醫師無法開電腦單時，全面改接收手寫「手工單」與「災時捐血血液檢驗單」進行檢驗與配血 。 -   檢驗科停止電腦報告傳輸 ，改以對講機、分機電話向臨床口頭回報危險值（如 Hb 血紅素數值） 。 -   <strong>接聽之病房或急診護理師，必須大聲唸出「病患姓名、病歷號碼與檢驗數值」向通報者執行 Read-back（逐字口頭覆誦雙重確認）</strong>，經雙重核對無誤後始得執行給藥與用血，嚴防給藥與輸血錯誤 。</p>\n</li>\n<li>\n<p><strong>放射科</strong>：若臨床無法使用 PACS 系統閱片。 -   放射科回歸沖洗「實體 X 光膠片」並派人手遞送 ；或由臨床醫師親自跑至放射機房，<strong>以數位相機或拍立得直接翻拍電腦螢幕影像帶回前線</strong>，克服數位影像中斷瓶頸 。</p>\n</li>\n<li>\n<p>** admissions 掛號批價櫃檯<strong>： -   批掛人員以人工方式詢問登記病人資料，手寫製作病歷，並確實為病人戴上實體辨識手圈 。 -   </strong>暴力啟動「戰時記帳豁免機制（事後收費）」<strong>：為了 4 小時極速清空病房 ，暫停所有常規批價與排隊流程，出院手續改收「手寫手工欠繳紀錄單」，在出院病歷上加蓋</strong>「戰時記帳豁免」紅色戳記，令病患「零元結帳、免排隊立即離院」**，事後再行追溯計價 。</p>\n</li>\n</ul>\n<p>步驟四：神經中樞建立：UHF/VHF 對講機與「徒步傳令兵 (Runner)」</p>\n<ul>\n<li>\n<p><strong>戰術無線電發配</strong>：全院無線電由醫勤室保安組管理 ，緊急將獨立頻段的 <strong>UHF/VHF 對講機</strong> 發配給各病房指揮官、三大接車道負責人與地下 EOC，維持獨立、無障礙的雙向通訊 。</p>\n</li>\n<li>\n<p><strong>徒步傳令兵制度（Runner）</strong>：調派體能良好的行政、事務或志工人員穿著螢光背心、配戴防偽臂章，擔任傳令兵 。</p>\n</li>\n<li>\n<p><strong>實體簽收簿（Logbook）對核</strong>：傳令兵徒步穿梭於地下指揮所、馬太 B1 藥庫、B1 臨時開刀房、4F 檢驗科之間傳遞手寫醫囑、配血單與疏散進度 。傳令兵必須持<strong>實體簽收簿</strong>，在交接物資與醫囑時，<strong>實施「人工口頭口令覆誦」與「實體簽名對核」雙重確認</strong>，徹底阻絕電磁癱瘓對指管決策的阻礙 。</p>\n</li>\n</ul>\n<p>步驟五：資料回補（Data Backfilling SOP）</p>\n<ul>\n<li>\n<p><strong>異地備援資料核對</strong>：待威脅解除，資訊工程師重啟 IBM 醫療資訊主機 ，並從設置於 <strong>瑞光院區 7F</strong> 的備援機房確認撤離與當機期間的資料完整性 。</p>\n</li>\n<li>\n<p><strong>手動補登回補（Data Backfilling）</strong>：資訊室主任（O5）正式通知各單位結束當機機制，恢復正常電子化作業 。病歷室（P3）、會計室與各臨床、藥局及檢驗科全力配合 ：<strong>收集當機與紙本降級期間，前線產出的所有紙本三聯手工病歷、手寫處方單、手寫檢驗單與事後欠繳計帳紀錄，依照「資料人工回補標準作業流程（Data Backfilling SOP）」，逐筆手動將手工診療軌跡、給藥劑量、影像/檢驗報告與耗材補登補輸入 HIS 電腦系統中</strong> ，補齊病患電子病歷的連續性，確保後續財務帳務紀錄與健保申報的百分之百完整法效 。</p>\n</li>\n</ul>\n<p>📋 這些「走動式血庫、B1地下備援空間配置、與 Downtime\n斷網紙本降級作業」是本院在平戰轉換兵推中，極度考驗一線醫護默契與臨場應變的黃金實兵課目。為了讓各病房護理站、檢驗科及總務部同仁在面臨大癱瘓時不慌亂，需要我為您將這三套程序精簡彙整，編製成一份可直接印製、雙面塑膠護貝並放入各單位當機藍色膠箱頂部的<strong>「屏基大連院區：戰時紙本降級、走動式血庫、暨\nB1 備援醫療區開設 10 大防呆行動一線實兵 A4\n查檢核對卡（繁體中文版）」</strong>嗎？</p>\n<p>請提供護理部戰時預防性全面撤離與 A-B 隨車配對 SOP 查檢卡。\n請提供病房單位主戰區預防性撤離的一線醫護實兵操作查檢對核卡。\n當醫院通訊完全中斷時，傳令兵（Runner）機制的具體運作流程為何？\n放射科在斷網時如何傳遞影像給手術團隊？\n若中央氧氣系統耗盡，工務室有哪些替代應處作為？</p>\n<p>護理部戰時預防性全面撤離與 A-B 隨車配對 SOP 查檢卡</p>\n<p>本查檢卡依據 HICS\n應變體系與本院病人疏散重置計畫制定，供<strong>計畫部長（護理部部長）</strong>與<strong>資源控管組、狀況分析組（護理督導長）</strong>於啟動預防性全面撤離時，進行實兵指揮與人力、病人配對調度勾稽\n：</p>\n<p>📋 護理部撤離指揮與 A-B 配對行動查檢表 ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- <strong>階段與權責</strong>                                 <strong>查檢項目與具體動作要領</strong>                                                                                                                                                 <strong>執行狀態</strong>   <strong>備註／佐證 ** ---------------------------------------------- -------------------------------------------------------------------------------------------------------------------------------------------------------------------------- -------------- -------------------------------------------------- </strong>【階段一：量能精算】<strong>\\<br>計畫部長         □ </strong>精確盤點全院在院人數<strong>：統計各病房、急診留觀區之確切病人總數、各病區可用空床、護理人力及現有維生設備 。                                              □已完成        產出「全院床位與設備清冊」  (P0)\\<br>資源控管組 (P1)                                                                                                                                                                                               □ </strong>建立「情資看板（Status Board）」<strong>：於地下指揮所（恩慈 B1）設立實體看板，動態更新全院護理人力總數與班表 。                                           □已完成        提供指揮官 A0 決策參考  </strong>【階段二：醫療降載】<strong>\\<br>計畫部長         □ </strong>下達 48 小時降載指令<strong>：協同醫務部（執行部 O0），在 48 小時內將大連院區住院病人降載至 </strong>30%<strong> 總目標 。                                                   □已完成        取消所有非緊急門診與常規手術  (P0)\\<br>狀況分析組 (P2)                                                                                                                                                                                               □ </strong>執行病人「四級分類造冊」<strong>：督導各病區護理長配合反向檢傷特別小組，將病人分類為「第一類（可返家）」、「第二類（安置）」、「第三類（一般住院）」、「第四類（高度照護）」 □已完成        建立「需撤離病人分組 B」名冊  。                                                                                                                                                                       </strong>【階段三：A-B配對】<strong>\\<br>資源控管組        □ </strong>組建「隨車持續照護功能編組 A」<strong>：盤點可動用之護理人力（含召回及跨單位調派之門診、健檢護理師），登錄造冊為編組 A 。                               □已完成        產出「醫事隨車撤離功能編組 A」名單                                                                                                                                                                                              55] □ </strong>執行「A-B 戰術一對一配對」<strong>：將「隨車醫護編組 A」與「需撤離病人（特別是 Class 4 重症與 Class 3 臥床者）分組 B」進行 1 對 1 綁定 。               □已完成        隨車護理同工與重症病患同車出發，死守在途照護線 </strong>【階段四：物資隨行】<strong>\\<br>執行部照護主管   □ </strong>人藥病歷隨行查驗<strong>：確認每位轉院病患皆備妥「手寫轉診單、紙本病歷摘要、手寫給藥與治療紀錄」，並裝入防水防潮夾鏈袋中 。                                     □已完成        防水病歷袋強制物理綁定於擔架旁                                                                                                                                                                                                    340] □ </strong>72小時隨車維生物資點交<strong>：向資材組、藥劑科確認隨車救護車上已備妥該病人專屬之 </strong>72 小時口服與注射救命藥物、林格氏液及備用氧氣小鋼瓶<strong> 。              □已完成        確保在途轉運中維生資源絕不斷鏈  </strong>【階段五：追蹤銷號】<strong>\\<br>狀況分析組       □ </strong>啟動「撤離時病人追蹤管理機制」<strong>：於三大車道接運區（急診大門救護車區、恩慈私人車區、門診大廳接駁中巴區）配合設立實體登錄哨 。                    □已完成        逐一登記病患上手圈編號、姓名、上車車牌及接收醫院 (P2)\\<br>文件紀錄組 (P3)  338]                                                                                                                                                                                                                                     □ </strong>跨端動態回報與銷號（Check-out）**：車隊出發（Check-in）與抵達接收醫院（Check-out）均需透過無線電或衛星電話向地方衛生局及本院 EOC 指揮所回報 。        □已完成        於指揮所白板上進行實體登記與銷號  -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------</p>\n<p>病房單位主戰區預防性撤離一線醫護實兵操作查檢對核卡</p>\n<p>本卡由<strong>醫療照護主管（O1）</strong>與各病房護理長、當值主治醫師共同執行，用於即將淪為主戰區時，病房之「降載、無動力垂直搬運、房間絕對淨空與防水病歷交接」實兵肉搏操作\n：</p>\n<p>🏥 病房一線醫護實兵操作查檢卡（A4 雙面繁體紙本版）</p>\n<p>【第一步：配合反向檢傷與病患分級】</p>\n<ul>\n<li>\n<p>[ ] <strong>對接反向檢傷特別小組</strong>：主動對接由非本病房資深主任組成之特別小組，迅速完成在院病人病情審查 。</p>\n</li>\n<li>\n<p>[ ] <strong>四級分類登錄</strong>：將病房患者名冊精準劃分為： -   <strong>Class 1（可返家）</strong>：生命徵象穩定，拔除點滴後 72 小時內無生命危險者 。 -   <strong>Class 2（安置）</strong>：生命徵象穩定但缺乏自理能力、且無家屬照顧者（轉銜至基層診所或長長照機構） 。 -   <strong>Class 3（一般住院）</strong>：需持續醫療照護之臥床患者（準備轉送合作聯防醫院） 。 -   <strong>Class 4（高度照護）</strong>：極度依賴維生設備、插管或使用呼吸器之危急 ICU 患者（列為救護車運送與 A-B 隨車配對最高優先級） 。</p>\n</li>\n</ul>\n<p>【第二步：辦理極速出院與動線绝对分流】</p>\n<ul>\n<li>\n<p>[ ] <strong>4小時極速清空</strong>：針對判定為 Class 1 與 Class 2 的穩定患者，迅速簽發手寫處方開立口服藥 。配合<strong>「戰時記帳豁免機制（事後收費）」</strong>加蓋實體戳記，病人不需至櫃檯排隊，於 4 小時內迅速安全離院返家，清空病床 。</p>\n</li>\n<li>\n<p>[ ] <strong>鋪設戰備床單</strong>：凡落實「反向檢傷」清空出來的病床，護理同工必須<strong>立刻鋪上「戰備床單」</strong>，視覺化宣告該區域轉換為戰備重症擴充床，隨時準備收治轉入的戰傷重症患者 。</p>\n</li>\n<li>\n<p>[ ] <strong>出口絕對分流</strong>： -   引導提早出院的輕症患者與接送家屬，一律使用<strong>「醫院門診大廳大門出口（搭乘行政中巴與接駁車）」</strong> 。 -   將<strong>「醫院急診室大門出口（救護車專區）」</strong>絕對留給高度照護病患的擔架與隨車氧氣設備，嚴防動線交岔與壅塞 。</p>\n</li>\n</ul>\n<p>【第三步：無動力純人力垂直搬運與房間絕對淨空】</p>\n<ul>\n<li>\n<p>[ ] <strong>實行水平與垂直疏散原則</strong>：遵循<strong>「先水平、再垂直」</strong>，優先平行推移病患至防火門另一側的鄰近安全棟別 ；若整層面臨直接威脅且電梯停擺，立即啟動垂直人工搬運 。</p>\n</li>\n<li>\n<p>[ ] <strong>5人一組無動力接力垂直搬運</strong>： -   針對插管、依賴維生設備之重症患者，會同勤務組與保安組派來支援的體力人員，嚴格執行<strong>「5 人一組（4 人徒步搬運擔架/樓梯疏散滑墊、1 人專業護理照護攜帶蓄電池維生設備）」</strong>的原則 。 -   利用病房備妥之<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>或軟擔架，沿著無窗之內側安全梯進行純人力垂直安全轉移 。 -   行動方便之病患在房間內疏散時，病房須發給每人被單一條予以包裹保暖 。</p>\n</li>\n<li>\n<p>[ ] <strong>實施「房間淨空（Room Clearance）」防呆核對</strong>： -   病患全數移出後，當值醫護必須徹底巡查房間內的每一個角落，<strong>包含浴室、儲藏室及衣櫃內</strong>，確認無任何一人被遺漏 。 -   確認房間淨空後，<strong>必須在房門口外側手動劃上「打叉（X）」標示或關閉房門</strong>，防止後續搶救與應變同工重複進入，浪費逃生時效 。</p>\n</li>\n</ul>\n<p>【第四步：死守醫療文件與隨車藥物防水物理綁定】</p>\n<ul>\n<li>\n<p>[ ] <strong>病歷裝袋與物理綁定</strong>：病房書記與護理同工核對轉運病患身分，將其手寫紙本「轉診單、紙本轉院病歷摘要、手寫藥物治療紀錄與用藥處方箋」打包裝入<strong>防水病歷夾鏈袋</strong>中 。利用束帶或專用防水膠帶，將病歷夾鏈袋<strong>物理性貼牢綁定於病患之隨行擔架、推床或輪椅旁</strong>，隨同病患隨車移出交接 。</p>\n</li>\n<li>\n<p>[ ] <strong>72小時隨病人生存物資配對</strong>：配合資材組，將病患專屬之 72 小時口服與注射救命藥物、林格氏液及攜帶式維生儀器（生理監視器、氧氣小鋼瓶）進行病患與物資的<strong>一對一綁定隨隨車運送</strong>，徹底防範抵達接收醫院初期發生致命的醫療斷鏈 。</p>\n</li>\n<li>\n<p>[ ] <strong>登車哨口清點與登記</strong>：病患登上救護車前，一線護理師必須向登錄哨口之狀況分析小組（病歷人員）詳實核對並登記病患手圈編號、上了哪一輛救護車（車牌號碼）、隨行隨車護送之護理人員姓名、以及預定接收醫院，始得放行出發 。</p>\n</li>\n</ul>\n<p>院內通訊完全中斷下，傳令兵（Runner）機制的具體運作流程</p>\n<p>當本院（屏東基督教醫院大連院區）遭遇國家級駭客攻擊（APT）、勒索軟體鎖定\nHIS/PACS/EMR 系統大癱瘓 ，且空襲震波或強烈電磁脈衝（EMP）摧毀全院常規電網、行動網路及內部通訊基地台，致使醫院陷入「資訊與通訊全黑（孤島效應）」的極端狀態下\n：</p>\n<p>後勤部門勤務組將配合安全管制組，立即啟動最古老、最抗電磁干擾、死守指管決策的<strong>「徒步傳令兵（Runner）機制」</strong>\n，其具體運作流程規範如下：</p>\n<p>[ 步驟 1：傳令兵動員與防偽身分辨識 ] ➜ [ 步驟\n2：領取裝備與開設「傳令調度哨」 ] ➜ [ 步驟 3：三聯式任務派單與實體登記\n] ➜ [ 步驟 4：徒步傳遞與「口令覆誦、實體簽收」 ] ➜ [ 步驟\n5：完成任務返哨與核銷紀錄 ]</p>\n<p>步驟一：傳令兵動員與鋼鐵「防偽身分辨識」</p>\n<ol>\n<li>\n<p><strong>人力編組與召集</strong>：後勤部長（總務部部長 許慧莉）與勤務主管（醫勤室主任 吳哲維） ，立即從被緊急召回的員工、支援行政同工或輕傷志工中 ，篩選出<strong>體能優良、熟悉大連院區各棟別及地下室複雜動線</strong>的行政與後勤人員，編組為<strong>「徒步傳令兵小組」</strong> 。</p>\n</li>\n<li>\n<p><strong>強制發配防偽專屬識別</strong>：為了防止敵方第五縱隊（喬裝特工）穿著白袍假冒院內員工混入破壞 ，人事組與勤務組對所有召集的傳令人員進行嚴格的「雙重身分證件」核對 。通過核對者，<strong>現場強制發給穿戴螢光反光背心、並佩戴帶有專屬防偽編號的特殊傳令兵臂章</strong> 。無配戴此防偽專屬識別者，一律嚴禁跨越任何防火鐵門、不得進入地下 EOC 及備援醫療红區 。</p>\n</li>\n</ol>\n<p>步驟二：領取裝備與開設「傳令調度哨」</p>\n<ol>\n<li>\n<p><strong>調度哨口開設</strong>：勤務主管立即於地下指揮所（恩慈大樓 B1 會議室）門口開設<strong>「中央傳令調度哨（Runner Dispatch Station）」</strong>，派駐 1 名後勤管理師擔任傳令調度員 。</p>\n</li>\n<li>\n<p><strong>配備類比裝備</strong>：每位防偽傳令兵出發前，向調度哨領取以下<strong>「救命類比工具包」</strong>： -   具有防護蓋之<strong>「實體簽收簿（Logbook）」</strong>及兩支原子筆 。 -   高亮度 LED 手電筒（含備用電池，應對斷電環境） 。 -   全院地下一樓（B1）至高樓層避難場所實體逃生與動線地圖 。 -   緊急口哨 1只（用於黑暗中示警或局部召集）。</p>\n</li>\n</ol>\n<p>步驟三：三聯式任務派單與實體登記</p>\n<ol>\n<li>\n<p><strong>任務開立</strong>：當地下 EOC 指揮官（院長）下達緊急指令（例如：向馬太 B1 藥庫調撥強效麻醉鎮痛藥劑，或向 4F 檢驗科遞送緊急急診配血單）時 ：</p>\n</li>\n<li>\n<p><strong>填寫實體派單</strong>：調度員在沒有電腦的情況下 ，手寫填製<strong>「三聯式傳令任務派單」</strong>，詳細記錄：派單時間、發信單位、收信單位、指令/物資簡述、以及指派之傳令兵編號 。</p>\n</li>\n<li>\n<p><strong>聯數分流</strong>： -   <strong>第一聯（存根聯）</strong>：留存於調度哨白板上，用於動態追蹤在途傳令兵的去向 。 -   <strong>第二聯與第三聯</strong>：連同要傳遞的紙本 Downtime 手寫處方箋/配血單/戰情報告 ，夾入防水防潮夾鏈袋中，交付給該傳令兵攜行出發 。</p>\n</li>\n</ol>\n<p>步驟四：徒步傳遞與「口令覆誦、實體簽收」雙重確認</p>\n<ol>\n<li>\n<p><strong>徒步人手傳遞</strong>：傳令兵一律嚴禁使用電梯（防範因電力瞬斷受困），<strong>全程利用無窗戶之內側安全安全梯、徒步穿梭跑動</strong>於地下 EOC 指揮所、病房護理站、馬太 B1 藥庫、B1 臨時開刀房、4F 檢驗科與外圍哨口之間 。</p>\n</li>\n<li>\n<p><strong>口頭覆誦確認（Read-back）</strong>：傳令兵抵達目的地後（如馬太 B1 藥庫），必須向接收端主管大聲唸出派單內容，<strong>由接收端同工對其進行「口令覆誦（Read-back）」，逐字核對無誤</strong> 。</p>\n</li>\n<li>\n<p><strong>實體紙本簽收對核</strong>：接收端主管核對紙本單據與品項無誤後，必須在傳令兵隨身攜帶的<strong>「實體簽收簿（Logbook）」及派單第三聯上，手寫簽署姓名與確切點收時間 </strong>。傳令兵收回已簽章的第三聯及簽收簿，並將派單第二聯（收執聯）連同手寫處方箋留給接收端執行 。</p>\n</li>\n</ol>\n<p>步驟五：完成任務返哨與核銷紀錄</p>\n<ol>\n<li>\n<p><strong>返哨銷號</strong>：傳令兵完成任務後，必須立即以最快速度原路徒步返回恩慈 B1 指揮所門口之「中央傳令調度哨」報到 。</p>\n</li>\n<li>\n<p><strong>核銷與存檔</strong>：將已簽署之派單第三聯及簽收簿交給調度員，調度員對比哨口白板上的第一聯，確認任務完成 ，於實體白板上劃去該任務，進行<strong>「銷號（Check-out）」</strong> 。</p>\n</li>\n<li>\n<p><strong>保全佐證憑證</strong>：所有完成任務的簽收派單一律依時間編碼歸檔，裝入防潮箱保存 ，作為未來災後功能復原時，進行 HIS 系統電腦資料補登（Data Backfilling）與健保會計帳務追溯申報的<strong>法定唯一類比憑證</strong> 。</p>\n</li>\n</ol>\n<p>放射科在斷網時如何傳遞影像給手術團隊？</p>\n<p>若大連院區遭到資安攻擊或電磁損毀，導致全院 IBM HIS 及\nPACS（醫療影像儲傳系統）主機與網路大癱瘓，臨床醫師無法在開刀房或急診電腦終端撈取數位影像時\n，<strong>放射科（醫療應變與傷患搶救組之重要輔助單位）</strong>將立即啟動以下紙本與類比替代影像傳遞程序\n：</p>\n<ol>\n<li>\n<p><strong>全面切換紙本手工單開單</strong>： 當 HIS 系統全黑時，手術團隊或急診值班醫師無法線上開立影像檢查醫囑 。 臨床醫師必須砸破各病區 Downtime Box（當機緊急箱） ，手寫填製<strong>「紙本檢驗/影像檢查手工單」</strong> ，並確實註明病患姓名、手圈編號及要照射的部位 。由「徒步傳令兵（Runner）」徒手遞送至放射科 。</p>\n</li>\n<li>\n<p><strong>執行緊急影像檢查並回歸沖洗「實體膠片」</strong>： 放射科醫事放射師接獲手寫單後，立即在發電機或不斷電 UPS 的獨立供電支持下，為緊急戰傷或手術患者執行 X 光或電腦斷層（CT）掃描 。 在數位 PACS 無法傳輸的狀態下，放射科立即重啟古老的暗房或獨立沖洗設備，<strong>將拍下的影像沖洗、輸出為「實體 X 光片（膠片）」</strong> 。</p>\n</li>\n<li>\n<p><strong>無网救急替代：數位相機/拍立得「翻拍螢幕傳遞」</strong>： 若大連院區現場已無實體沖洗膠片可用，或沖洗耗材已耗盡 ： -   放射師在儀器自帶的獨立單機螢幕（Local Server Display）上調出患者的清晰骨傷或破片影像 。 -   <strong>放射科醫師或臨床醫師攜帶高畫質數位相機、智慧型手機（離線模式）或拍立得（Instax），直接對著放射儀器的電腦單機螢幕進行「實時翻拍」</strong> 。 -   翻拍時須同時將病患的手寫識別紙條、拍攝時間一同攝入畫面中，進行人工對核。</p>\n</li>\n<li>\n<p><strong>傳令兵百米速遞與手寫報告交接</strong>： -   放射科將沖洗出的實體膠片、或是拍立得相片連同放射專科醫師<strong>手寫簽名之紙本簡易影像診斷摘要（Downtime 手工報告）</strong>，一併封入夾鏈袋中 。 -   交付給穿著反光背心的「徒步傳令兵」，以百米衝刺速度直接送入 <strong>韓偉大樓 B1 腹膜透析室（臨時開刀房）</strong> 交予手術與麻醉團隊，克服斷網瓶頸，爭取重大創傷患者的救命手術時效 。</p>\n</li>\n<li>\n<p><strong>災後系統資料「電腦手動補登（Data Backfilling）」</strong>： 待威脅解除、本院網絡修復、HIS 與 PACS 電腦系統安全重啟後，放射科同工必須妥善收集並整理當機期間所有的紙本手工單、手寫報告存根及實體膠片備份 。 放射科同工須<strong>執行「資料人工補登回補（Data Backfilling）」，將當機離線作業期間的所有影像檔案、患者檢查處置、影像診斷報告，手動補登輸入至 WEB 系統及電腦 PACS 資料庫中</strong> ，補齊病患電子病歷的完整性與連續性 。</p>\n</li>\n</ol>\n<p>若中央氧氣系統耗盡，工務室之替代應處作為</p>\n<p>在主戰區炮火逼近、外部運補車輛遭炸毀、且自來水與常規電網完全中斷的極端孤島狀態下\n：\n若大連院區的中央液氧槽（液態氧儲槽）因空襲震波破損洩漏、或外部液態氧供應商（台北氧氣公司\n07-6319474）因道路封鎖無法進場補給 ，致使全院中央氧氣系統面臨存量見底、氣壓急劇下降的致命威脅時：</p>\n<p>在 HICS 體系下，<strong>工務室（關鍵資源與設施搶修組，擔任「設施運作主管\nO2」）</strong> \n將協同臨床護理與資材部，立即啟動以下<strong>三階段之「斷氣停氣異常緊急應對（訊號777）」替代維生作為</strong>\n：</p>\n<p>第一階段：分區閥門手動隔離，阻止氧氣洩漏與防範火災</p>\n<ol>\n<li>\n<p><strong>管路分段、分區關閉（工務室 O2）</strong>：工務室主任曹宏益立即帶領值班同工，前往醫療氣體閥門箱 ，<strong>對受損之中央輸氣管路或液氧槽銜接管線，執行「分段、分區機械式閥門手動手動關閉」</strong> 。</p>\n</li>\n<li>\n<p><strong>實施實體隔離</strong>：手動上鎖關閉漏氣區域，阻止高壓氧氣繼續外洩。</p>\n</li>\n<li>\n<p><strong>預防二次爆炸殺傷</strong>：排空破損管路內的殘存氣體 。此舉是死守「CI防護」的鋼鐵紅線，<strong>徹底防範外洩的高濃度氧氣在無人駐守或空襲中，一旦遭遇電線走火或爆炸破片，引發毀滅性的高氧助燃與劇烈大爆炸</strong> 。</p>\n</li>\n</ol>\n<p>第二階段：指導前線切換床邊備用氧氣鋼瓶，並啟動緊急調撥（黃金 3 分鐘）</p>\n<ol>\n<li>\n<p><strong>前線 3 分鐘極速切換（病房/急診/臨時 ICU）</strong>：工務室設施主管立即通知各病房護理站、急診室及地下臨時 ICU 的護理人員，在 <strong>3 分鐘內</strong> 手動將重症插管病患的中央氧氣管線拔除，<strong>快速且精準地切換並接上床邊備用的氧氣小鋼瓶（或護理站備用急救藥車之小氧氣筒）</strong>，維持重症照護生命延續 。</p>\n</li>\n<li>\n<p><strong>戰備庫存鋼瓶盲派派發（工務室/資材組協力）</strong>：工務同工與資材人員（任務支援組 L2）立即前往位於地面的安全鋼瓶儲區 ，<strong>將儲備的備用氧氣大鋼瓶、氧氣面罩、潮濕瓶，利用推車不待申請直接「盲派」推送至 B1 臨時開刀房、臨時 ICU 及急診搶救紅區</strong> 。</p>\n</li>\n<li>\n<p><strong>外部緊急氣體調度（採購組 F2 / 聯絡官 A3）</strong>：聯絡官與採購人員立即啟用戰時緊急合約，迅速致電本院簽約之氧氣鋼瓶供應商：<strong>「信光氧氣行（08-7323787、0910-185003）」</strong> ，請求租用大噸位氣體運輸車輛，並在軍警武裝或衛生局協調的綠色無障礙路線掩護下，將備用氧氣鋼瓶運送至本院指定的安全卸補點 。</p>\n</li>\n</ol>\n<p>第三階段：鋼瓶耗盡之終極肉搏------組建全院「人工捏球大隊」</p>\n<ol>\n<li>\n<p><strong>啟動手動呼吸維生替代方案</strong>：若戰火封鎖時間過長，導致外部鋼瓶運補完全被阻斷，且院內所有的備用氧氣鋼瓶全部消耗殆盡，導致重症病患之電動呼吸器因無氣壓、無電力而全面停擺時（最極端之「孤島效應」） ：</p>\n</li>\n<li>\n<p><strong>動員並籌組「捏球大隊（Ambu Bag Team）」</strong>：指揮官與後勤部長立即下達動員令，將院內所有不需執行一線搶救的行政人員、社工同工、保全警衛、清潔同工、甚至病情輕微之病患家屬，<strong>打破建制、全面動員並組建「手動捏球大隊」</strong> 。</p>\n</li>\n<li>\n<p><strong>純人力 15 分鐘接力捏球肉搏</strong>： -   在臨時 ICU、臨時開刀房及病房內，<strong>為每位插管重症病患旁，強制配置兩人 （1人手動按壓甦醒球、1人待命與計時）</strong>。 -   大隊人員嚴格遵循<strong>每 15 分鐘一班的強制輪替頻率，以純人力的體力與意志力，不間斷地手動捏壓甦醒球（Ambu bag）接力</strong> 。 -   以最原始、最耗費體力但最可靠的物理人工呼吸方式，<strong>死守並維持重症病患在等待簽證救護車後撤、或等待管線修復前的最後一口氣</strong>，拒絕在最後一刻向死神妥協 。</p>\n</li>\n</ol>\n<p>🧩 這些查檢卡與流程對病房、放射科及工務室在平戰轉換兵推中非常實用。</p>\n<p>需要我為您將這五套核心流程彙整編排，設計成一份可以直接雙面列印並分發給各樓層護理站與工務室備用的<strong>「大連院區：戰時臨床維生與斷網降級實兵\nA4 查檢手冊樣張」</strong>嗎？</p>\n<p>若特工投毒導致全院斷水，總務部有何替代方案？\n如何對水塔進行化學物質除污？ 地下備用水源能支撐醫院運作多久？\n若特工引發火災，B1備援空間安全嗎？ 指揮組如何進行撤離命令的真實性查核？\n執行部在撤離時如何落實「反資敵」作為？\n計畫部如何確保病患轉運途中的照護連續性？</p>\n<p>一、 若特工投毒導致全院斷水，總務部的五大替代方案</p>\n<p>當本院（屏東基督教醫院大連院區）遭遇敵方第五縱隊（在地協力者特工）於水源投毒，導致全院自來水供應中斷且常規水質受污染時\n：</p>\n<p>在 HICS 體系下，<strong>後勤部長 L0（總務部部長 許慧莉）</strong> 與 <strong>勤務主管\nL1（醫勤室主任 吳哲維）</strong> 將協同 <strong>設施運作主管 O2（工務室主任\n曹宏益）</strong> ，立即啟動以下五大鋼鐵後勤替代維生方案，防止醫療大腦與核心功能因斷水「休克」\n：</p>\n<ol>\n<li>\n<p><strong>實施常規水閘「實體隔離」並啟動「地下備用水井」</strong>： -   工務室（設施運作組）接獲水源投毒報告後，立即前往高壓電機房與水閥控制區，<strong>手動關閉全院自來水進水閥門，對常規進水管線實施實體物理隔離</strong>，嚴防受毒害水體繼續流入儲水箱中 。 -   在判定地下井水安全未受波及的前提下，<strong>手動啟動本院「地下水供水系統（戰備水井）」</strong>，將蓄存於備用水池的水源導入管路 。</p>\n</li>\n<li>\n<p><strong>實施頂樓「五座水塔互補供水」調度</strong>： -   工務人員迅速將大連院區頂樓的<strong>五座蓄水塔連結管路完全打開，實施「五座水塔互補供水」</strong> 。 -   將殘存於乾淨水塔中的水資源進行集中統一分配 ，供地下臨時 ICU（約翰/馬可 B1）與臨時開刀房（韓偉 B1）緊急醫療使用 。</p>\n</li>\n<li>\n<p><strong>執行冷酷的「水資源紅區管制與分級配給」</strong>： -   為死守醫療生命線，指揮中心實施極嚴格的水資源分級配給管制 ： -   <strong>【一級核心水源（最純淨水）】</strong>：<strong>絕對優先死守且僅供「開刀房刷手、醫療器械基本消毒、洗腎RO用水、及重症病患飲用」</strong> 。 -   <strong>【二級生活水源（管制停用）】</strong>：<strong>嚴禁一切員工、家屬及病患進行盥洗、刷牙或洗手</strong>；全院強制改用酒精乾洗手液維持手部衛生，防範院內交叉感染爆發 。 -   <strong>【三級排污用水（沖馬桶封閉）】</strong>：<strong>全院廁所實施實體封鎖，禁止沖水</strong> 。改為配發「化學便器袋」，或由清潔人員人工舀用廢水、冷氣冷凝水進行最低限度沖洗 。</p>\n</li>\n<li>\n<p><strong>啟動「外購水源與消防水車緊急送水」</strong>： -   若地下備用水源枯竭，聯絡官 A3（行政副院長 黃雅芳）立即向屏東縣政府衛生局、聯合應變中心（LJEOC）及消防局請求送水車支援 。 -   <strong>致電屏東消防局（電話：08-7662911 或 119）申請水車到院進行送水與抽水支援</strong> 。 -   採購小組（F2）立即啟動戰時緊急供水合約進行外購水源，調派大噸位山泉水車與成箱桶裝水送院，迅速解決地下替代醫療區之缺口 ： -   <strong>「高山行山泉水」聯絡電話：0910-788388</strong> ； -   <strong>「賀眾牌飲水/賀屏企業」聯絡電話：08-7519000</strong> 。</p>\n</li>\n<li>\n<p><strong>動用 3 至 7 天「戰備存糧與生活飲水」</strong>： -   勤務組會同營養室（徐桂婷組長）動用預先儲備的 <strong>3 至 7 天緊急乾糧、應急口糧與防潮包裝之戰備飲用水</strong> ，絕對優先補給執行高強度搬運的後勤人員、醫護同工與重症病患，維持基本生理機能 。若外界交通完全斷絕，則協調院內之 <strong>便利商店（7-11）</strong> 作為第一優先膳食與飲水供糧據點 。</p>\n</li>\n</ol>\n<p>二、 如何對水塔進行化學物質除污？</p>\n<p>根據《地下空間作為替代醫療場所運作指引》，當外部供水系統遭受破壞或懷疑水源受化學、毒化物質污染時\n：</p>\n<ol>\n<li>\n<p><strong>危害控制組（O3）與環保室之除污權責</strong>： -   在 HICS 應變體系下，由感控科/感管組主任擔任的<strong>危害控制主管（O3）環保室</strong>，負責對遭受化學、毒化、生物武器或輻射污染的「設施、設備」進行危害偵檢、監控、除污及洩漏處理 。</p>\n</li>\n<li>\n<p><strong>化學物質除污的實務操作與局限</strong>： -   <strong>水質應急處理</strong>：指引明訂，在外部常規供水系統無法運作、而必須自行進行水質處理時，機構應利用既有的備用處理設施，投加 <strong>「氯片、氯溶液或使用活性碳與高效過濾器」</strong> 進行基礎化學消毒與雜質過濾 。 -   <strong>技術細節局限說明</strong>：<strong>本院平戰轉換白皮書與相關指引中，並未詳列針對「水塔本體進行化學物質除污」的具體化學中和配方（如特定毒劑之解毒劑劑量）或水塔壁面洗刷之工程步驟。</strong></p>\n</li>\n<li>\n<p><strong>戰時實務處置要領（先阻絕，後重建）</strong>： -   在實兵運作中，若水塔已遭特工投毒，現場不應在混亂中冒險進行複雜的化學洗刷與重新供水。 -   正確作為是<strong>立即停止使用該受污染之水塔，拉下高壓空氣斷路器切斷供水馬達電力，並在排閥處手動物理鎖固、張貼紅色警告封條</strong> 。 -   在安全管制組（保安組）對水塔周邊CI關鍵設施增設 24 小時雙人巡邏哨、防範二次投毒的前提下 ，直接<strong>改用消防隊水車送水與緊急外購純淨山泉水，直接接入未受污染的獨立備用管路</strong>中 ，確保醫療用水的百分之百安全 。</p>\n</li>\n</ol>\n<p>三、 地下備用水源能支撐醫院運作多久？</p>\n<p>根據衛福部急救責任醫院與地下替代醫療場所之關鍵維生規範，本院地下備用水源（含蓄水池、水井及儲水箱）的設計與支撐時效標準如下：</p>\n<ol>\n<li>\n<p><strong>法定 72 小時（3天）自主運作能力</strong>： -   國家指引與 HICS 規範要求，本院作為關鍵基礎設施與重度級急救責任醫院，儲水設施必須<strong>確保在外部供水完全中斷（孤島效應）時，具備至少 72 小時（3日）的充足供應與自主運作能力</strong> 。</p>\n</li>\n<li>\n<p><strong>水量精算標準（200公升指標）</strong>： -   地下替代醫療場所的備用水量儲備，是以 <strong>「200 公升 × 醫院病床數 × 3 日」</strong> 之量化公式進行科學化精算與足額儲存 ，確保在極限運作下飲用與醫療用水不中斷 。</p>\n</li>\n<li>\n<p><strong>極限管制下可最大化支撐至 120 小時</strong>： -   在市電全斷且燃油車無法運補的極端「黑堡（Black Start）」孤島狀態下 ： -   若工務室（設施運作主管 O2）強制執行<strong>電力負載卸除（Load Shedding）</strong> （切斷行政辦公區、非維生醫療儀器與一般空調電源，僅死守開刀房、ICU及血庫冰箱等紅區） ，並<strong>鐵血執行前述之「水資源紅區管制與分級配給」</strong>（嚴禁一切員工盥洗與洗手，全院封閉廁所並改用化學便器袋） ： -   透過此「斷尾求生」的極限節流配給，現有蓄水池與地下戰備水塔的殘存儲水量，<strong>足以將醫院的核心維生運作時效，由基本的 72 小時，最大化延長支撐至 120 小時（5天）</strong> ，誓死為前線撐過等待外部增援或管線搶修完成的戰略黃金期 。</p>\n</li>\n</ol>\n<p>四、 若特工引發火災，B1 備援空間安全嗎？</p>\n<p>若敵方特工在本院大連院區地表引發火災或爆炸（紅色訊號） ，位於地下室地下一樓（B1）的備援空間（包含臨時開刀房、ICU及輕症病房）\n，在落實指引防火配置下是<strong>具備高度結構防護安全與時效性安全保障的，但仍需隨時防範二次煙燻與逃生瓶頸。</strong></p>\n<p>具體安全評估與防護機制如下：</p>\n<ol>\n<li>\n<p><strong>具備 60 分鐘強固防火區劃與防爆時效</strong>： -   依據指引，本院地下一樓（B1）替代醫療場所在規劃改建時，<strong>已分成多個獨立的「防火區劃」</strong>，能在火災或煙霧發生時阻隔火勢，爭取黃金疏散時間 。 -   B1 備援空間內的所有隔間建材與防火門，<strong>皆安裝有至少具備 60 分鐘（1小時）防火時效之建材與防爆耐火門</strong> ，能有效將地表的火勢與爆震波阻絕於地下臨床區之外 。</p>\n</li>\n<li>\n<p><strong>配置獨立通風控制與 HEPA 氣閘防排煙系統</strong>： -   地下備援空間配備有<strong>通風控制系統、污染物擴散限制機制與排煙設備</strong> 。 -   B1 前室與病房、公共區域之間維持不同壓力（如負壓氣閘室），且配備有 <strong>HEPA 過濾器</strong>，系統能在避難期間切換為空氣循環模式連續運行 <strong>至少 72 小時</strong> ，強力捕捉病原體、化武污染物及火災有害碳煙，防止煙毒窒息危害地下病患 。</p>\n</li>\n<li>\n<p><strong>自動滅火系統：確保「噴水滅火」而非泡沫滅火</strong>： -   指引嚴格要求，停車場（如路加大樓 B1 輕症病房區）與地下空間的自動滅火設備，<strong>必須採用「噴水系統」而非泡沫系統</strong> 。 -   此項防呆設計可確保在特工縱火引發自動滅火時，噴灑的水流不會損壞地下臨時 ICU 病房內高價且脆弱的呼吸器、多功能生理監視器等重症插管病人維生電路，死守患者呼吸安全 。</p>\n</li>\n<li>\n<p><strong>死守地下層管制點與「二次避難防線」</strong>： -   安全管制組（保安組）派員駐守地下一樓（B1）的<strong>樓梯間、電梯口、主要通道及各功能區出入口</strong> ，在火災警報（紅色訊號）響起時，自衛消防編組能迅速降下部分防火捲門以<strong>侷限火煙</strong> 。 -   若 B1 某個防火區劃受損，醫護人員可啟動「先水平、後垂直」的<strong>二次避難（二次疏散）</strong>機制，利用樓梯疏散滑墊或軟擔架將病患垂直或水平轉移至相鄰安全的地下棟別或地面急診出口 。 -   <strong>安全官（A2）一票否決中止權</strong>：安全官（職安室主任 杜傳榮）全程監控環境安全 。一旦判定地表火勢失控、有感電、結構坍塌或通風排煙系統因電磁損毀而即將發生嚴重二氧化碳煙燻窒息時，安全官將<strong>行使「安全中止權」，直接向指揮官提出中止演習或中止就地收治之裁決，引導地下病患向院外安全重置點實施全面後撤</strong> 。</p>\n</li>\n</ol>\n<p>五、 指揮組如何進行撤離命令的真實性查核？</p>\n<p>在即將淪為主戰區的高壓環境下，敵方極可能透過駭客 APT 攻擊本院 HIS /\n公務手機發布虛假公文，或利用假訊息、認知戰偽造撤離指令，意圖使本院提前自亂陣腳並製造城鎮恐慌\n。</p>\n<p>在 HICS 體系下，<strong>事故指揮官 A0（吳榮州院長）</strong>\n與聯絡官、資通簡報組（資訊室）將採取以下三道「數位與類比交叉查證」防線，查核撤離命令的真實性：</p>\n<ol>\n<li>\n<p><strong>與外部發令機關進行「雙向口頭與備援通訊核對」</strong>： -   聯絡官立即向發布危險區撤離指令的官方中樞------<strong>「屏東縣政府衛生局」及「高屏區 EMOC 勤務中心」</strong>進行直接電話對接 。 -   事故指揮官（院長）同時與<strong>中央聯合應變中心（CJEOC）、衛福部醫事司、以及國防部聯合戰情中心（JOCC）</strong>進行直通確認，比對作戰區情資是否確實建議危險區撤離，確保官方與軍方步調完全一致 。</p>\n</li>\n<li>\n<p><strong>查驗法定「緊急命令文號、金鑰與暗號」</strong>： -   查核接獲之公文或指令是否包含由中央或作戰區防衛指揮部簽發的<strong>「官方正式緊急命令文號」或「CI 防護動員令暗號金鑰」</strong> ，杜絕敵方假冒公關或通訊軟體群組指令 。 -   資訊室技術副主任監控通訊管道安全，確認接收指令之電子加密簽章完整無遭篡改 。</p>\n</li>\n<li>\n<p><strong>確認「接收端（合作醫院）之點對點對接情資」</strong>： -   聯絡官 A3（行政副院長 黃雅芳）立即向預計重置之安全區目標合作聯防醫院（如部立屏東醫院、寶建醫院、安泰醫院或屏東榮總）之指揮官（院長）進行照會 。 -   <strong>雙向確認對方是否「同時間接獲地方衛生局命令，要求其騰出床位準備點對點接收屏基移出之病患」</strong> 。 -   當上述三方情資（軍方/衛福部 EOC、地方衛生局、合作醫院接收端）完全交織對應、確認無誤後，事故指揮官始正式宣告本院進入 HICS 第三階段「全面撤離與量能重置」，發布動員令啟動實兵疏散 。</p>\n</li>\n</ol>\n<p>六、 執行部在撤離時如何落實「反資敵（Denial of Assets）」作為？</p>\n<p>當本院被迫進行預防性全面撤離時，為了防範高價值醫療設備、國家級醫療大腦及病患之個資落入敵手\n，<strong>執行部長 O0（醫務部部長 陳志文）</strong>\n協同機構運作主管 O5（資訊室主任 蔡哲民）、設施運作主管 O2（工務室主任\n曹宏益）與醫工組 ，落實以下四項冷酷的反資敵作為：</p>\n<ol>\n<li>\n<p><strong>貴重控制元件之「技術致殘式」卸除（人藥、機密晶片隨行）</strong>： -   針對體積龐大、相依於大連院區常規電網而「物理上絕對無法在數小時內搬走」的高精密診斷設備（如多切面 CT、高階超音波、核磁共振 MRI 等精密儀器） ： -   由醫工人員（O5機構運作組協力）攜帶專用手工具，<strong>迅速將設備之核心控制晶片（CPU板）、系統軟體加密狗（Dongle）、校正磁鑰（Calibration Keys）及主光學感測器強行拆卸</strong> 。 -   貼上本院財產識別貼紙後，封入防震箱，隨後車後撤醫護或資材同工一同隨同救護車後撤移轉 。這能確保<strong>「縱使敵方實體奪取本院儀器，也因缺乏核心晶片與密鑰而完全癱瘓，不可修復使用」</strong>，且我方於戰後歸建時能最快插板重啟 。</p>\n</li>\n<li>\n<p><strong>核心伺服器與個資資料庫之「硬體物理砸毀與強磁去磁」</strong>： -   資訊工程師在確認全院最新的醫療 HIS、EMR 及 PACS 核心資料庫已異地即時同步增量備份至<strong>「瑞光院區 7F」之異地備援機房</strong>後 ： -   由工程師強制拔除核心機房 UPS 電源 。指派專人，<strong>使用重錘、電鑽等重型工具，對 IBMHIS 核心伺服器硬碟、磁碟陣列（Storage Hard Drives）及備份磁帶晶片，實施高強度「硬體物理實體砸毀、硬碟晶片物理鑽孔或強磁去磁銷毀程序」</strong> 。 -   確認硬碟硬體晶片實體碎裂，徹底阻絕透過任何資料救援科技進行物理還原的可能，死守市民隱私個資與醫療大腦防線 。</p>\n</li>\n<li>\n<p><strong>電力與醫療氣體之「斷尾式封存與安全切斷」</strong>： -   工務室（設施運作主管 O2）人員，必須前往各高壓配電機房及設備端 ，<strong>手動拉下所有貴重設備的專屬高壓空氣斷路器（ACB）及無熔線斷路器（NFB）並物理上鎖鎖固</strong> 。 -   對液氧槽及中央醫療氣體銜接管路，執行<strong>「分段、分區機械式閥門手動手動關閉」</strong>，並排空管路內殘存之高壓氣體 。徹底防範在無人駐守期間，高壓氧氣管路一旦因空襲震波破損 ，遭遇電線走火引發毀滅性的高氧助燃與劇烈爆炸 。</p>\n</li>\n<li>\n<p><strong>超導核磁共振（MRI）系統「失超 Quench」之戰時緊急處置</strong>： -   核磁共振超導儀器（MRI）若被敵方奪取，將成為極高價值的醫療與工業資源 。 -   醫工人員在萬不得已且撤離的最後關頭，手動按下<strong>「緊急 Quench（失超）按鈕」</strong> ： -   此動作會使液氦在極短時間內急劇汽化並向戶外管道噴射釋放 ，超導線圈因失去冷卻失去超導狀態、磁場瞬間消失，<strong>磁體線圈因高熱徹底燒毀與永久性物理性損毀</strong>，不給敵方留下一絲一毫可修復重啟的物理空間 。</p>\n</li>\n</ol>\n<p>七、 計畫部如何確保病患轉運途中的照護連續性？</p>\n<p>在 HICS 應變體系下，<strong>計畫部長 P0（護理副院長兼護理部部長 朱淑媛）</strong>\n將協同資源控管小組（P1）、狀況分析小組（P2）與文件紀錄小組（P3） ，採取以下五大核心戰術機制，確保病患在在途轉運途中「生命絕不斷鏈、照護絕不中斷」：</p>\n<ol>\n<li>\n<p><strong>落實病人精準分類與轉送排序（狀況分析組 P2 / 資源控管組 P1）</strong>： -   狀況分析小組（P2）與一線醫師，依據「反向檢傷（Reverse Triage）」評估，精準將在院及留觀病患精準分級造冊 ： -   <strong>Class 4（高度照護）</strong>：極度依賴維生設備、插管、使用電動呼吸器或洗腎之加護病房重症患者 。 -   <strong>Class 3（一般住院）</strong>：常規醫療照護但無法自行移動之臥床患者 。 -   計畫部精準建立<strong>「需撤離病人分組 B」</strong> ，並將有限的簽證救護車與轉運資源，絕對優先保留給 Class 4 與 Class 3 病患，確立轉送排序 。</p>\n</li>\n<li>\n<p><strong>鐵血推行「醫護-病人 A-B 戰術一對一配對隨車」</strong>： -   計畫部「資源控管組（P1）」與醫務部配合，將緊急召回及跨單位調派之醫師、護理同工建立為<strong>「隨車持續照護功能編組 A」</strong> 。 -   狀況分析組（P2）將「隨車編組 A」與「重症病人分組 B」進行<strong>一對一的 A-B 戰術配對</strong> 。指派專責主治醫師與護理人員，全程隨同救護車及轉運推床，在在途在途運送期間執行<strong>醫療持續照護</strong>，攜行生命支持 。</p>\n</li>\n<li>\n<p><strong>落實醫療紀錄與用藥隨行「防水物理綁定」</strong>： -   「文件紀錄組（P3）」與病房書記嚴格查驗，在病人送上救護車前，確認每位轉運病患的手寫紙本<strong>「轉診單、紙本轉院病歷摘要、藥物治療紀錄與用藥處方箋」</strong>已備齊 。 -   上述實體文件裝入防潮防水之夾鏈袋中，<strong>以物理方式強制綁定（貼牢）於病患隨行之推床、擔架或隨車箱旁</strong> ，確保病患抵達部屏、寶建、安泰或屏榮等合作醫院時資訊無縫對接 。</p>\n</li>\n<li>\n<p><strong>死守「72小時隨車在途生存物資」盲派（任務支援組 L2 協力）</strong>： -   計畫部督導病房，與資材組（任務支援 L2）密切配合，隨高度照護與臥床病人登上救護車時，<strong>必須與病人同車運送足量維持該病患 72 小時生存消耗之救命管制藥物（如強效麻醉鎮痛藥）、無菌靜脈林格氏液及血庫 O 型備用全血</strong> 。 -   配備可攜式生理監視器、氧氣小鋼瓶（工務室精算消耗速率）等蓄電池維生裝備隨車出發，徹底防止因在途塞車、戰火阻斷而使病患面臨維生物資見底的絕境 。</p>\n</li>\n<li>\n<p><strong>三大接運區實體登錄與「Check-in / Check-out」雙端動態銷號</strong>： -   狀況分析組（P2）親自投入一線，於急診大門救護車出口等三大接運區設立實體<strong>「登錄哨」</strong> ，手寫登記每位病患的「手圈編號、上了哪一輛簽證車（記錄車牌）、隨車隨行醫護姓名、以及接收醫院」 。 -   <strong>【出發 Check-in】</strong>：車隊一出發，聯絡官立即透過 UHF/VHF 獨立頻段無線電或衛星電話向衛生局與 EOC 進行出發報到 。 -   <strong>【抵達 Check-out】</strong>：車隊安全抵達合作醫院、由本院派駐之「先遣裝設團隊」對接交班完成後 ，立即透過備援通訊向衛生局與本院地下指揮所回報，於實體白板看板上進行<strong>「銷號（Check-out）」</strong> ，確保在撤離混亂中「病患一個都不能少」 。</p>\n</li>\n</ol>\n<p>🚰\n考慮到戰時水源投毒與斷水斷電屬於嚴重的關鍵基礎設施（CI）複合安全威脅，需要我為您及工務室曹宏益主任、醫工組，將這套在斷水斷電下「地下水/蓄水池互補調度、水資源分級紅區管制、暨水塔防護防投毒」的應變程序，彙整精簡製成一份可直接印製、雙面塑膠護貝的\n<strong>「總務部/工務室：戰時水源投毒與斷水極限應變實兵操作 A4\n查檢核對卡（防潮紙本版）」</strong> 嗎？</p>\n<p>Today • 5:58 AM</p>\n<p>指揮組如何進行「指揮中樞地下化」的任務？\n指揮組如何反制這兩名偽裝維修人員的破壞行為？\n如果頂樓水塔真的被投放化學物質，供水如何緊急調度？\n保安組在機房遭受燃燒劑威脅時，如何實施硬邊界防護？</p>\n<p>在面對戰爭威脅、敵特滲透及關鍵基礎設施（CI）遭受破壞的複合型危機中，本院（屏東基督教醫院大連院區）在\n<strong>HICS（醫院事故指揮系統）</strong>\n體系下，針對指揮中樞防護、反滲透、水資源危機及硬邊界防禦，制定了以下鋼鐵般的實兵應變作為：</p>\n<p>一、 指揮組進行「指揮中樞地下化」任務之具體步驟</p>\n<p>大連院區行政中樞與院長室平時多位於高樓層，戰時極易受空襲震波及爆炸二次殺傷波及\n。為確保「指揮權絕對不中斷」，指揮組將依循以下三階段步驟，在最短時間內將指揮中樞向下潛藏：</p>\n<ol>\n<li>\n<p><strong>攜帶避難包（Go-Bag）極速垂直轉移（10分鐘內）</strong>： -   當接獲國家級防空警報（Code Black）或全面動員令時，事故指揮官 A0（吳榮州院長）與 HICS 核心幕僚（安全官、聯絡官、發言官）須於 <strong>10 分鐘內</strong> ，抓起預先整備定檢的<strong>「指揮官避難包（Go-Bag）」</strong> 。 -   避難包內含：Iridium 衛星電話、加密 UHF 無線電、萬用主鑰匙、全院實體藍圖、高階員工名冊與 EMR 資料備份硬碟 。 -   全體人員循無窗戶的內側安全梯，迅速垂直轉移至地下結構最強固的避難核心區------<strong>恩慈大樓地下一樓（B1）會議室（或地下二樓 B2 防空總指揮所）</strong>開設戰時指揮所 。</p>\n</li>\n<li>\n<p><strong>地下指揮所硬體瞬間啟動（3分鐘內）</strong>： -   抵達地下指揮所後，技術人員須於 <strong>3 分鐘內</strong> 啟動獨立不斷電系統（UPS）與備用電力，架設白板與實體<strong>「情資看板（Status Board）」</strong>，並確保將通訊天線延伸至戶外無遮蔽區，打通加密通聯管道 。</p>\n</li>\n<li>\n<p><strong>網狀異地備援與自動順位繼承</strong>： -   <strong>雙盲備援連線</strong>：地下指揮所啟動後，立即與本院設於<strong>「瑞光院區 7F」</strong>之備援機房（或簽定協定之外部機構）建立雙盲備援連線 。若大連主院區指揮所不幸遭直接摧毀或失聯達 15 分鐘，瑞光院區的副指揮官將立即啟用「備援應變中心（Backup EOC）」接管全院指揮權 。 -   <strong>無頭狀態自動繼承</strong>：若核心指揮官遇襲失聯，院內「HICS 自動順位繼承機制」將於 5 分鐘內生效 。由當值最高層級臨床主管（依序為急診部主任、重症醫學部主任、外科部主任）自動接管全院指揮權並穿上指揮官背心，杜絕群龍無首 。</p>\n</li>\n</ol>\n<p>二、 指揮組反制「偽裝維修人員」滲透破壞之重層防線</p>\n<p>戰時，敵方第五縱隊（在地協力者特工）極可能假冒「工務維修人員」或「資訊系統維護商」企圖進入機房破壞。指揮組與保安組（安全管制主管\nO4）將實施以下四道鋼鐵防線：</p>\n<ol>\n<li>\n<p><strong>第一道：急診車道「聯合檢查站」身份核對</strong>： -   保安組配合警政、保二總隊關閉 80% 出入口，僅保留急診車道 。 -   由<strong>「武裝警力與高階護理師」共同站哨</strong>，利用護理師對院內熟面孔的優勢與專業詢答 ，嚴格盤查所有意圖進入之人員，強勢阻絕無法證實身份者 。</p>\n</li>\n<li>\n<p><strong>第二道：人事召回「雙重證件」與名冊對照</strong>： -   人事組（人資室主任 F1）於護理部前廳設置登錄哨 。 -   召回員工及進入院區的協廠商，必須提供<strong>員工識別證搭配身分證或執業執照之「雙重身分證明」</strong> ，並與當日 HICS 資源控管組（P1）最新造冊之名冊實時核對，確保名符其實，杜絕冒名頂替 。</p>\n</li>\n<li>\n<p><strong>第三道：強制配發「不可仿造之防偽識別」</strong>： -   凡通過核對者，現場強制發給本院戰時專屬、不可仿造的<strong>「特殊防偽識別證、螢光反光背心、或帶有專屬防偽編號的臂章」</strong> 。未配戴者一律視為非授權人士，保全有權實施物理扣留 。</p>\n</li>\n<li>\n<p><strong>第四道：關鍵設施「白袍/制服偽裝者」武裝盤查與壓制</strong>： -   針對地下發電機房、伺服器機房、液氧槽等關鍵基礎設施（CI），增設 <strong>24 小時雙人武裝/防暴巡邏哨</strong>，巡邏人員隨身佩戴並<strong>啟動密錄器實時蒐證</strong> 。 -   巡邏哨配備金屬探測器，若發現可疑維修人員徘徊，<strong>立即執行「口頭壓力測試詢答」</strong>（要求其說出直屬科室、主管姓名、分機、當前 HICS 廣播代號等） 。 -   一旦對方閃爍其詞、口音有異，<strong>巡邏警衛立即以防暴盾牌結陣物理壓制</strong> ，拉響警鈴，並以對講機（或按※9）通報安全管制主管，立即啟動警民連線報警移交警政、國安單位 。</p>\n</li>\n</ol>\n<p>三、 頂樓水塔若遭投放化學物質，供水之緊急調度機制</p>\n<p>若頂樓水塔不幸遭投毒或化學物質污染，本院將切斷污染源並啟動「地下水/蓄水池互補調度」與「紅區分級配給」\n：</p>\n<ol>\n<li>\n<p><strong>管閘手動隔離，切斷污染源（工務室 O2）</strong>： -   工務室（設施運作主管 O2）接獲化學物質投毒報告後，<strong>立即前往閥門控制區手動關閉全院自來水進水閥，實施進水管線實體隔離</strong> 。 -   停止使用遭投毒之受損水塔，拉下供水馬達之高壓空氣斷路器（ACB）並物理上鎖鎖固，張貼紅色警示封條，排空受污染管線，严防毒水流入臨床區 。</p>\n</li>\n<li>\n<p><strong>啟動「地下水井」與未受污染水塔互補</strong>： -   在確認地下水井及地下蓄水池未受毒害的前提下，<strong>手動啟動本院「地下水供水系統（戰備水塔）」</strong> 。 -   打開其餘未受污染的蓄水塔連結管路，實施<strong>「水塔互補供水」</strong>，將乾淨的水集中調度至地下臨時 ICU 及開刀房 。</p>\n</li>\n<li>\n<p><strong>執行冷酷的「水資源紅區管制與分級配給」</strong>： -   <strong>【一級核心水源（最純淨水）】</strong>：<strong>絕對優先死守且僅供「開刀房刷手、醫療器械基本消毒及重症病患飲用」</strong> 。工務組醫工人員持續監控透析 RO 水處理設備，確保洗腎透析用水之純度。 -   <strong>【二級生活水源（管制停用）】</strong>：<strong>嚴禁一切員工、家屬及病患進行盥洗、刷牙或洗手</strong>；全院強制改用酒精乾洗手液維持手部衛生，防範院內感染爆發 。 -   <strong>【三級排污用水（沖馬桶封閉）】</strong>：全院廁所實施實體鎖閉，禁止沖水，改配發「化學便器袋」，或由清潔同工舀用冷氣冷凝水或廢水人工沖洗 。</p>\n</li>\n<li>\n<p><strong>啟動外購水源與消防水車緊急送水（聯絡官 A3）</strong>： -   聯絡官立即向屏東縣政府衛生局、聯合應變中心（LJEOC）及消防局請求送水車支援 。 -   <strong>撥打屏東消防局電話（08-7662911 或 119）申請水車到院送水</strong> ；同時致電緊急採購合約廠商調派水車與瓶裝礦泉水送院 ： -   <strong>「高山行山泉水」：0910-788388</strong>  -   <strong>「賀眾牌飲水/賀屏企業」：08-7519000</strong></p>\n</li>\n<li>\n<p><strong>化學物質除污局限說明</strong>： 根據《地下空間作為替代醫療場所運作指引》，緊急時可使用「氯片、氯溶液或活性碳與高效過濾器」進行水質應急化學處理 。但考量戰時高壓，化學除污工程繁瑣且具安全風險，<strong>本院實務上以「徹底封鎖污染水塔、直接接入消防水車與外購乾淨水源」為最高安全原則</strong> 。</p>\n</li>\n</ol>\n<p>四、 保安組在機房遭受燃燒劑威脅時之硬邊界防護與 Lockdown</p>\n<p>若敵特企圖對核心機房投放燃燒劑、實施縱火破壞時，保安組（安全管制主管\nO4）將協同自衛消防編組，啟動最嚴厲的實體硬邊界防護與防暴鎖定 ：</p>\n<ol>\n<li>\n<p><strong>實施極限「物理硬邊界（Hard Perimeter）」封鎖</strong>： -   安全管制組會同支援警力，<strong>立即封閉大連院區 80% 的出入口與側門</strong>，拉下防火捲門，架設拒馬、蛇籠、充水式紐澤西護欄 。 -   調派院內大型運輸車或工程車，<strong>打橫停放於非必要出入口及機房外圍通道，作為防衝撞的實體阻絕物</strong>，防止暴民或載有燃燒劑的車輛衝撞機房 。</p>\n</li>\n<li>\n<p><strong>核心機房外圍之「鋼鐵格柵與物理隔離」</strong>： -   針對位於地表或易受投擲燃燒瓶影響的機房通風口、窗口、液氧槽及發電機房周邊 ，<strong>架設高強度金屬防護柵欄與蛇籠</strong>，強制使機構與任何可能引爆燃燒劑的外部空間保持安全防爆距離，防止燃燒劑被直接投入機房 。</p>\n</li>\n<li>\n<p><strong>啟動防暴「內部封鎖（Lockdown）」與機電控制</strong>： -   一旦機房或其周邊遭受燃燒劑威脅，保安組立即啟動「內部封鎖」 。<strong>急診防暴門瞬間降下，全院電梯控制權強制關閉</strong>，防止敵特利用電梯在各樓層竄改或擴大縱火點 。 -   保安人員持防暴盾牌結陣死守各防火捲門與安全門，將醫護人員與重症病患保護於預先規劃的「安全隔離區（Safe Haven）」內 。</p>\n</li>\n<li>\n<p><strong>空調與氣閘隔離（防煙毒窒息）</strong>： -   工務室（設施主管 O2）配合安全防護班，<strong>立即關閉該區域之鄰近空調與通風開關</strong> ，排煙系統（自動排煙）啟動以延緩煙霧擴散 。 -   利用 HEPA 過濾器與地下室防護前室之負壓氣閘限制污染物擴散 ，<strong>徹底防範燃燒劑產生的有害碳煙與劇毒氣體透過管線吸入臨床病房</strong>，死守患者呼吸安全 。</p>\n</li>\n<li>\n<p><strong>現場蒐證與外部武裝接引</strong>： -   保安組（警衛）在現場維持秩序、防範縱火特工逃離時，<strong>必須全程佩戴並啟動「密錄器」進行錄影、拍照與即時蒐證</strong>，為後續警方調查提供鐵證 。 -   指派專人前往大連路與莊敬街交叉口（或其他律定接應點）接引前來協防的警消與保警中隊，導引其快速切入戰術位置實施滅火與特工搜捕 。</p>\n</li>\n</ol>\n<p>⚖️ <strong>法律訴求與機密保全提醒（職安室杜傳榮主任/法律訴求小組 F3）</strong>：\n針對上述機房縱火、水源投毒及偽裝特工事件，職安室須於事發後 3\n日內，詳實記錄財損、設備異常與人員受傷情形 ，並將保全之錄影密錄器畫面依「戰時資料保密防護」機制進行安全下載與保密存檔\n，以利後續向國家申請戰損補償、產險理賠及向警政單位舉證 。</p>\n<p>📊 為了確保大連院區的工務同工與保安人員在面臨火警、投毒等 CI\n設施受創時不慌亂，需要我為您及王建文保安組長、曹宏益工務主任，將這套防滲透巡邏、水閘隔離、以及機房防燃燒劑的標準動作，彙整精簡製成一份實體的\n<strong>「大連院區：戰時 CI\n關鍵基礎設施安全防護、防投毒、暨防暴鎖定（Lockdown）實兵 A4\n雙面核對卡（紙本防潮版）」</strong> 嗎？</p>\n<p>當發電機啟動失敗，工務同仁有哪些應急程序？</p>\n<p>當本院（屏東基督教醫院大連院區）發生台電中斷供電，或院內高壓設備異常導致停電時\n，工務室（設施運作主管\nO2）必須立即啟動<strong>「供電設備異常緊急處理流程（AMD-3-113）」</strong>\n。</p>\n<p>若是自動切換開關（ATS）偵測停電後未能自動切換、或<strong>緊急柴油發電機自動啟動失敗</strong>\n，工務同仁必須在<strong>停電黃金時間內</strong>，依序執行以下<strong>五大應急操作程序與實兵排障步驟</strong>：</p>\n<p>一、 第一階段：啟動 30 秒內之「手動切換（ATS）」與廠商緊急召請</p>\n<ol>\n<li>\n<p><strong>手動強制切換 ATS</strong>： -   在正常狀況下，停電持續 <strong>12 秒</strong>後，ATS 設備會自動投入並切換由發電機供電 。 -   若發電機自動啟動失敗、或啟動 <strong>30 秒</strong>後仍無法正常供電時，值班工務人員必須立即抵達機房，<strong>確認 ATS 盤面指示燈號後，手動切換 ATS 由發電機供電</strong> 。</p>\n</li>\n<li>\n<p><strong>緊急召請外部廠商支援</strong>： -   一旦發電機啟動失敗，工務同仁在進行自主盤查的同時，須立即聯絡維護廠商，要求派遣專業工程師緊急進場支援 ： -   <strong>【發電機維護廠商】</strong>：<strong>明威發電機</strong>（電話：07-3497424、0933-310332，聯絡人：紀元） 。 -   <strong>【高壓設備維護廠商】</strong>：<strong>隆安檢測科技有限公司 / 隆安機電</strong>（電話：07-7929222、0988-187315，聯絡人：黃朝裕） 。 -   <strong>【台電供電故障窗口】</strong>：<strong>台灣電力公司</strong>（電話：08-7321111） 。</p>\n</li>\n</ol>\n<p>二、 第二階段：工務室「五大核心硬體」現場強制啟動（Forced Start）檢查</p>\n<p>在等待廠商進場的期間，值班工務人員必須爭分奪秒，攜帶手電筒與萬用工具，對發電機組與供電系統實施以下\n<strong>5 項物理排障與強制啟動程序</strong> ：</p>\n<p>1. 供電系統查修</p>\n<ul>\n<li>\n<p><strong>空氣斷路器（ACB）跳脫檢查</strong>：確認各分路空氣斷路器（ACB）是否正常 。若跳脫，必須<strong>先確認線路無短路、無異味或無燒焦現象</strong>，將警報復歸後重新投入 。若無法自動投入，則改以<strong>手動方式投入</strong> 。</p>\n</li>\n<li>\n<p><strong>自動復閉電驛異常排除</strong>：檢查自動復閉電驛是否正常 。若有異常警報，須將警報復歸後才能投入 ；若連續投入失敗，應重新拔插控制線路，檢查是否接觸不良 。</p>\n</li>\n</ul>\n<p>2. 檢查 ATS（自動切換開關）控制盤</p>\n<ul>\n<li>\n<p><strong>確認開關切入自動</strong>：確認控制盤上的「引擎啟動選擇開關」是否切在「自動（Auto）」位置 。</p>\n</li>\n<li>\n<p><strong>保險絲與開關斷路確認</strong>：檢查控制盤內的保險絲及無熔絲開關（NFB）是否斷路 。若斷路，應立即<strong>更換保險絲或將開關復歸</strong> 。</p>\n</li>\n<li>\n<p><strong>緊急停俥鈕釋放</strong>：確認發電機本體或控制盤之<strong>「緊急停俥按鈕（EMG Stop）」</strong>是否有被誤壓 。若被壓下，須<strong>旋轉按鈕以使其釋放</strong> 。</p>\n</li>\n</ul>\n<p>3. 檢查發電機燃料與油料</p>\n<ul>\n<li>\n<p><strong>柴油存量確認</strong>：確認發電機之日用柴油是否充足 。若油料不足，工務同仁必須立即<strong>前往約翰大樓地下二樓（B2F）柴油主儲槽進行取油與補充</strong>，或緊急聯絡油料合約商吉昌重油（電話：08-7665578、0935-791509）調撥重柴油運補 。</p>\n</li>\n<li>\n<p><strong>柴油管路排氣</strong>：若柴油管路不慎吸入空氣，會導致點火失敗。工務同仁須對<strong>柴油噴射泵進行手動排氣動作</strong>，排除氣阻 。</p>\n</li>\n<li>\n<p><strong>機油油位檢查</strong>：拉出油尺檢查機油油位是否在正常高度。若油位異常過高或過低，可能是引擎汽缸損毀或洩漏，須記錄故障狀況並回報 。</p>\n</li>\n</ul>\n<p>4. 檢查啟動電瓶</p>\n<ul>\n<li>\n<p><strong>電壓檢測</strong>：使用三用電表量測發電機啟動電瓶電壓，<strong>若電壓低於 12.5 VDC 額定值，判定電量不足，必須立即更換備用電池</strong> 。</p>\n</li>\n<li>\n<p><strong>連接接頭與融損檢查</strong>：確認電瓶連接線接頭是否鎖緊固定，檢查接頭是否有高溫造成的金屬熔融現象 。 -   若電瓶接頭燒毀，<strong>更換使用備用電瓶</strong> ； -   若連接電線燒毀，<strong>改使用夾式連接線</strong>進行跨接強制導電 。</p>\n</li>\n</ul>\n<p>5. 強制切換「手動」測試啟動</p>\n<ul>\n<li>正常狀況下發電機選擇開關為「自動」 。在上述油、電、控制盤檢查完畢且發電機自動啟動仍失效時，工務同仁應<strong>將發電機選擇開關旋轉至「手動（Manual）」位置，手動進行啟動點火測試</strong> 。</li>\n</ul>\n<p>三、 第三階段：停電超過 10 分鐘之「全院當機廣播」與「紙本降級作業」</p>\n<p>若工務同仁在現場進行排障後，發電機仍然無法啟動，且停電持續達 <strong>10\n分鐘</strong>仍無法正常供電時 ：</p>\n<ol>\n<li>\n<p><strong>下達紙本降級宣告與全院廣播</strong>： -   工務人員立即通知中控室總機 ，請總機<strong>利用內線直撥</strong> *9 <strong>對全院區進行語音廣播（若總機交換機因斷電癱瘓，則啟用保安組管理的無線電對講機，或派徒步傳令兵 Runner 徒步通知）</strong>，正式宣告全院啟用當機應變與停電應變措施，關閉仍有電力之非必要設備 。 -   總機廣播詞：<em>「各位同工及來賓平安，現在進行緊急發電機啟動異常應變，將會造成瞬間停電，請各單位自行啟動停電應變措施，並將仍有電力之非必要設備關閉，不便之處敬請見諒。」</em> 。</p>\n</li>\n<li>\n<p><strong>前線臨床「暴力拆箱」切換紙本</strong>： -   各護理站、急診、手術室、藥局、檢驗科及批價櫃檯，不等待修復，立即砸破封條啟用<strong>「當機緊急箱（Downtime Box）」</strong> 。 -   全院全面切換為紙本三聯手工病歷、手寫處方單、手寫檢驗/影像檢查手工單 。檢驗與放射科危險值回報嚴格執行<strong>「Read-back（口頭覆誦雙重確認）」</strong>，以人工和類比方式維持醫療核心功能不斷鏈 。</p>\n</li>\n</ol>\n<p>四、 第四階段：孤島或戰災狀態下之「殘酷電力負載卸除（Load Shedding）」</p>\n<p>若醫院面臨的是戰爭、空襲或敵特破壞等外部交通、燃油運補完全中斷的極端孤島情境（Black\nStart） ：</p>\n<p>縱使工務同仁後續成功排障、強啟了緊急發電機，由於大連院區柴油存量有限，工務室必須遵照指揮官\nA0（吳榮州院長）之命令 ，強制執行<strong>「電力負載卸除（Load Shedding）」</strong>：</p>\n<ol>\n<li>\n<p><strong>物理切斷非生產性用電</strong>： -   工務同仁必須<strong>主動手動拉下並切斷所有行政辦公區、一般病房、冷氣空調、大廳大型景觀照明、以及 80% 非必要之電梯電源迴路</strong>，將寶貴的電力極限節省下來 。</p>\n</li>\n<li>\n<p><strong>死守五大核心醫療紅區供電</strong>： -   將發電機的所有備用電力，<strong>百分之百「死守」在 B1 臨時開刀房、臨時 ICU、急診室急救區、資訊伺服器機房及血庫/藥庫冰箱</strong>等直接攸關病患性命的「重症紅區」 。 -   工務同仁須<strong>每隔 30 分鐘詳實記錄發電機的運轉狀態與溫度</strong>（填寫《緊急發電機運轉自動檢查紀錄表》） ，並<strong>每小時精算地下柴油剩餘存量</strong> ，確保在極低維生耗能下，大連院區能強行撐過法定的 72 小時、甚至延長支撐至 120 小時 。</p>\n</li>\n</ol>\n<p>五、 第五階段：台電/常規高壓供電恢復後之復原與冷俥</p>\n<p>當台電恢復常規供電，或院內高壓供電設備異常狀況由隆安檢測工程師搶修排除後\n：</p>\n<ol>\n<li>\n<p><strong>ATS 自動/手動切回市電</strong>： -   ATS 設備會在 <strong>12 秒內</strong> 自動切換為台電常規市電供電 。若 ATS 未能自動跳回，工務人員確認盤面指示燈後，手動將其切回市電 。</p>\n</li>\n<li>\n<p><strong>發電機冷俥停機</strong>： -   常規供電恢復且系統正常後，發電機必須<strong>執行「冷俥（Cooling Run）2 分鐘」程序，進行低載降溫，隨後自動停俥</strong>，系統恢復正常監控狀態 。</p>\n</li>\n<li>\n<p><strong>結束當機機制與資料人工回補</strong>： -   資訊室宣告結束當機處
