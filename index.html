rong>\n面對氧氣與電力雙重中斷，前線醫護人員必須死守病患的生命底線：</p>\n<ol>\n<li>\n<p><strong>極限人工給氧（捏球大隊）</strong>：加護病房（ICU）與病房護理人員接獲供氣異常通知後，須在 3 分鐘內將重症病患切換至床邊備用氧氣鋼瓶。若鋼瓶耗盡且電動呼吸器因斷電停擺，須立即動員行政人員或家屬組成「捏球大隊」，以手動甦醒球（Ambu bag）接力維持重症病患呼吸。</p>\n</li>\n<li>\n<p><strong>爆炸傷患搶救</strong>：若機電棟有工務人員或警衛因爆裂物受傷，急診部須立即設立臨時救護站，執行戰傷檢傷分類、損傷控制復甦與緊急救護。</p>\n</li>\n<li>\n<p><strong>鄰近病房防護與疏散</strong>：若機電棟的爆炸震波或火勢威脅到鄰近病房，醫療照護組須配合安全管制組，立即引導病患進行「就地防爆掩蔽（核心內筒）」或「水平/垂直疏散」，將病患撤離至安全棟別。</p>\n</li>\n</ol>\n<p><strong>五、 執行部長（O0 / 醫務部部長）：統籌前線行動與醫療極速降載</strong></p>\n<ol>\n<li>\n<p><strong>最高戰術指揮</strong>：統合轄下的醫療、工務、保安與危害控制等小組，確保「設施搶修、火勢控制、維安封鎖、醫療維生」同步進行而不混亂。</p>\n</li>\n<li>\n<p><strong>醫療全面降載</strong>：因醫院失去主發電機與主液氧槽，醫療量能已達崩潰邊緣。執行部長須立即下令取消所有非緊急手術與常規醫療，執行「反向檢傷」，將穩定病患極速疏散出院，保留所有殘存資源給重症維生與爆炸傷患。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當大連院區發生機電棟爆炸，並伴隨兩名工務同仁遭到掉落物砸傷、其中一人嚴重骨折且大出血的複合型緊急危機時，本院\n<strong>HICS 執行部門（Operations Section）</strong> 將立即切換為「戰鬥模式」。在\n<strong>執行部長 O0（醫務部部長陳志文）</strong>\n的統一指揮與跨組協調下，執行部門下轄的各專業分支與待命區管理團隊將協同展開以下第一線技術性搶修、環境安全控制與生存維生搶救作為：</p>\n<p>一、 執行部長 O0（醫務部部長陳志文）：前線戰術作戰總指揮</p>\n<ol>\n<li>\n<p><strong>開設前進指揮所與戰術重構</strong>：執行部長（醫務部部長陳志文，代理人為急診部主任王建銘）立即進駐前進指揮所（主要開設於護理部一樓會議室）。迅速彙整機電棟受災與人員砸傷傷情，下達執行部首道第一線搶救命令。</p>\n</li>\n<li>\n<p><strong>跨組協同作戰指揮</strong>：統籌協調醫療照護主管（O1）、設施運作主管（O2）、危害控制主管（O3）、安全管制主管（O4）及機構運作主管（O5）等分支，同步執行「人員搜救、損傷控制復甦、維生電力死守、受損管路安全隔離與外部消防警政車輛接引」。</p>\n</li>\n</ol>\n<p>二、 醫療照護主管\nO1（急診、內外科主任／護理部督導長）：戰傷創傷救命（DCR）與地下重症空間轉置</p>\n<ol>\n<li>\n<p><strong>派遣創傷小組奔赴現場執行「損傷控制復甦（DCR）」</strong>： -   <strong>一線創傷急救</strong>：聽聞總機因爆炸與人員砸傷廣播「院內急救 999 訊號」與「大量傷患急診 333」後，醫療照護團隊立即攜帶緊急甦醒與止血耗材奔赴機電棟現場。 -   <strong>CAT戰術止血帶強力止血</strong>：針對砸傷同仁的大出血，醫護人員第一時間於傷肢上方施用 <strong>戰術止血帶（CAT）</strong> 進行強力止血；迅速建立骨內血管通路（IO 針），注射生理食鹽水並給予強效鎮痛藥物，防範低血容性休克與神經性休克。 -   <strong>嚴重骨折保護固定</strong>：使用夾板及耗材對严重骨折部位進行包紮與簡易固定，防止二次搬運移位造成深層血管與神經二次傷害。</p>\n</li>\n<li>\n<p><strong>純人力無動力垂直轉運</strong>： -   因機電棟爆炸極易伴隨全院電力瞬斷或電梯停擺，醫護同工立即啟用護理站備妥之 <strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong> 或軟擔架，採取「4人搬運、1人照護」的純人力垂直搬運方式，沿建築物內側安全梯將受創同仁安全轉移至最穩固的 <strong>地下一樓（B1）備援醫療空間</strong>。</p>\n</li>\n<li>\n<p><strong>啟用 B1「微型戰地醫院」死守生命線</strong>： -   <strong>臨時開刀房（韓偉大樓 B1 腹膜透析室）</strong>：若嚴重骨折大出血同仁傷情危急，需要即刻執行損傷控制手術（DCS），手術與麻醉團隊立即進駐並啟用臨時開刀房進行緊急手術與麻醉支援。 -   <strong>術後恢復與 ICU 銜接</strong>：術後將傷患移至旁邊的 <strong>韓偉大樓 B1 環保室（恢復室）</strong> 進行密切監測，並銜接轉送至 <strong>約翰／馬可大樓 B1 資材組前方之「臨時 ICU 病房」</strong> 續行維生生命支持。</p>\n</li>\n</ol>\n<p>三、 設施運作主管\nO2（工務室主任曹宏益／組長唐朝生）：死守重症電力與維生管線異常隔離</p>\n<ol>\n<li>\n<p><strong>發電機自動啟動與手動強制處置</strong>：工務人員立即確認備用發電機是否在電力中斷 10 秒內自動啟動，並由 ATS 設備在 12 秒內自動切換至發電機供電給資訊室 UPS 設備與核心醫療迴路。若 ATS 切換異常，工務同仁立即奔赴約翰大樓 B2 工務基地執行強制手動啟動。</p>\n</li>\n<li>\n<p><strong>殘酷執行「電力負載卸除（Load Shedding）」</strong>： -   為了死守受創同仁正在手術與 ICU 賴以生存的維生儀器電力，工務室強制執行電力負載卸除。 -   <strong>手動強制切斷</strong> 全院所有行政辦公區、一般病房、冷氣空調、照明及 80% 的電梯電源迴路。 -   將僅存的寶貴柴油發電電力，<strong>百分之百死守在開刀房、ICU、急診急救區、資訊伺服器機房與血庫冰箱</strong>。</p>\n</li>\n<li>\n<p><strong>管路受損隔離與防範二次災害</strong>：針對爆炸引發的管線破裂，工務同仁立即實施<strong>「分段、分區關閉」</strong>，迅速關閉受損區域的電力、供水與氣體閥門，防範水患引發漏電感電，或醫療氧氣外洩引發二次火災爆炸。</p>\n</li>\n</ol>\n<p>四、 安全管制主管\nO4（總務部醫勤室組長王建文／保安組陶大屏）：現場封鎖、傷患搜救與 119\n外部救災引導</p>\n<ol>\n<li>\n<p><strong>初期滅火與隨身密錄器蒐證</strong>：警衛同仁接獲爆炸與火災「紅色訊號」後，迅速攜帶滅火器奔赴機電棟進行初期滅火。滅火班警衛在救援過程中，<strong>務必隨身佩戴並啟動密錄器</strong>，實施第一手現場安全蒐證與影像記錄，防止閒雜人等破壞現場證據。</p>\n</li>\n<li>\n<p><strong>實施現場警戒封鎖</strong>：使用警戒線或充水式紐澤西護欄迅速<strong>封鎖機電棟爆炸現場</strong>。將未授權人員驅離至管制區外，嚴禁無防護裝備的人員靠近受損建築物，防止因二次坍塌造成延伸傷害。</p>\n</li>\n<li>\n<p><strong>119 / 110 外部救災接引</strong>：門口警衛立即派員至院區外圍重要路口（<strong>大連路與莊敬街交叉口巷口</strong>），主動引導前來支援的消防車、救護車及警政車輛快速直達事故現場，維持救災車道與運輸動線的絕對暢通。</p>\n</li>\n</ol>\n<p>五、\n待命區管理者（行政支援中心組長）：前線關鍵藥衛材「主動盲派（Push）」物流</p>\n<ol>\n<li><strong>打破常規，戰備急救箱主動推送</strong>： -   因爆炸極易連帶引發系統中斷或大當機（Downtime），前線醫護此時無法經由 HIS 電子系統發出請領單（Pull）。 -   待命區管理者（行政支援中心組長吳明容）立即會同藥劑科（死守馬太大樓 B1 藥庫）與資材組（進駐約翰/馬可 B1 資材室）。 -   主動將預先打包備妥之標準化 <strong>「戰備急救箱 (Go-Kits / Trauma Kits)」</strong> （內含戰術止血帶、骨針 IO、止血紗布、林格氏液及強效麻醉鎮痛藥）裝上推車，直接<strong>「盲派（Push）」</strong>推送至急診搶救紅區與韓偉 B1 臨時手術室門口，確保搶救子彈伸手即得，不因系統癱瘓中斷救命調度。</li>\n</ol>\n<p>六、 危害控制主管 O3（放射科曾文盛主任／感控科李忠成主任）</p>\n<ul>\n<li><strong>毒災監控與危害物質偵檢</strong>：放射科主任與感管組長密切配合，評估爆炸區是否有柴油洩漏、中央壓縮空氣／氧氣管線或放射性危害物質破損，提供安全防護建議，保障搶修同工與搜救警衛的安全。</li>\n</ul>\n<p>七、 機構運作主管 O5（資訊室主任／醫工技術師）</p>\n<ul>\n<li><strong>關鍵醫療儀器移轉支援</strong>：醫工人員協助將急救所需的重大醫療儀器設備，從高樓層移轉並重新佈設於 B1 的五大備援功能區（如臨時 ICU 與開刀房）。若通訊因電力爆炸中斷，主導演習備援通訊測試，並引導前線全面啟用「當機緊急箱 (Downtime Box)」改採紙本類比手工作業。</li>\n</ul>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>當屏東基督教醫院大連院區面臨「兩名喬裝成外包維修人員之特工（第五縱隊），意圖對核心機房放火、頂樓水塔投毒以癱瘓運作」的複合型實體維安與生化污染（CBRN）極端危機時，全院立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>。</p>\n<p>在 HICS 體系下，<strong>執行部門（Operations Section）將由執行部長\nO0（醫務部部長陳志文，代理人為急診部主任王建銘）坐鎮指揮</strong>。執行部門下轄的各專業分支（O1\\~O5）與待命區管理團隊將立即切換為「戰術防禦模式」，打破科室本位，採取以下第一手實兵反制、物理阻絕與維生管線隔離作為：</p>\n<p>一、 執行部長 O0（醫務部部長陳志文）：前線戰術重構與跨組協同</p>\n<ol>\n<li>\n<p><strong>開設地下前進指揮所</strong>：部長接獲指揮官 A0（吳榮州院長）下達之「全院實施內部封鎖、毒化災及火災應變」指令後，立即進駐前進指揮所（主要開設於護理部一樓會議室，若面臨威脅則迅速垂直轉移至恩慈大樓 B1 會議室或地下 EOC 備援指揮所）。</p>\n</li>\n<li>\n<p><strong>下達戰術總動員</strong>：迅速統合轄下醫療照護主管（O1）、設施運作主管（O2）、危害控制主管（O3）、安全管制主管（O4）及機構運作主管（O5），協同啟動「硬邊界防護、水電防禦配給、資安網路實體阻斷與毒化災控制」。</p>\n</li>\n</ol>\n<p>二、 安全管制主管\nO4（醫勤室保安組長王建文／陶大屏）：實體攔查、硬邊界封鎖與 110/119 接引</p>\n<ol>\n<li>\n<p><strong>武裝制服歹徒與現場蒐證</strong>：保安組與值勤警衛攜帶防暴盾牌、鋼叉、金屬探測器等戰術裝備，協同已進院之武裝警力，直奔核心機房與頂樓水塔，<strong>強勢將兩名喬裝之不明份子進行武裝攔查、制服並限制其行動</strong>。警衛在處置過程中，<strong>務必隨身佩戴並啟動密錄器</strong>，實施第一手現場安全蒐證與影像記錄，隨後移交警方，絕不破壞破壞物（如燃燒劑罐體、毒物容器）之鑑識現場。</p>\n</li>\n<li>\n<p><strong>啟動全院「硬邊界防護（Hard Perimeter）」與「內部封鎖（Lockdown）」</strong>： -   保安組會同支援警力， <strong>立即封閉大連院區 80% 的出入口與側門</strong>。 -   迅速降下各區域防火、防暴鐵捲門。全院僅保留急診車道作為唯一通道，並設立由<strong>「武裝警力與院方高階護理師」共同站哨的聯合檢查站（Check-point）</strong>。 -   對所有進出人員執行極其嚴格的身分辨識、金屬探測與隨身行李搜查，強勢阻絕非傷患、無關家屬或偽裝特工進入醫療區。</p>\n</li>\n<li>\n<p><strong>引導外部警消救災</strong>：指派警衛至院區外圍重要路口（<strong>大連路與莊敬街交叉口巷口</strong>），引導前來支援的消防車、防爆小組、警察局及保二總隊機動中隊車輛快速進入戰術位置，並維持外部車道的絕對暢通。</p>\n</li>\n</ol>\n<p>三、 危害控制主管\nO3（感染科主任李忠成／放射科主任曾盛文）：分段毒水隔離、毒化災除污與滅火處置</p>\n<ol>\n<li>\n<p><strong>實施水管閥門「分段、分區關閉」</strong>：針對頂樓水塔可能投放的不明化學物質，危害控制主管立即啟動毒化災（黃色訊號）應變程序，會同工務室立即奔赴頂樓，<strong>實施水管閥門之「分段、分區關閉」</strong>，封鎖並隔離受污染水塔之輸出管道，防止劇毒污水流入洗腎中心、開刀房等臨床高耗水重症紅區。</p>\n</li>\n<li>\n<p><strong>化學物質偵檢、除污與外部對接</strong>： -   緊急對接進院之屏東縣環保局、環境部毒災應變隊，進行水質採樣、污染物定性定量檢測與除污指導。 -   若有病患或巡檢同工接觸到不明化學物質，危害控制組負責指揮於臨時除污設備區執行人員除污，防止有害物質在院內密閉空間中發生交叉二次污染。</p>\n</li>\n<li>\n<p><strong>機房縱火之初期滅火（兼任滅火班）</strong>：在消防對應編組中，危害控制組兼任「滅火班」。面對歹徒於核心機房投放燃燒劑，立即協同安全防護班，就近使用乾粉滅火器進行初期滅火，侷限火煙範圍。</p>\n</li>\n</ol>\n<p>四、 設施運作主管\nO2（工務室主任曹宏益／組長唐朝生）：死守發電機、備用水源切換與「極限水電配給」</p>\n<ol>\n<li>\n<p><strong>發電機自動啟動與手動強制處置</strong>：若縱火或爆炸引發市電瞬斷，工務人員立即確認備用發電機是否於 10 秒內自動啟動，並由 ATS 自動切換供電給資訊室 UPS 與核心維生迴路。若自動切換異常，工務同仁立即奔赴約翰大樓 B2 工務基地執行強制手動啟動，並致電高壓維護廠商隆安機電或發電機廠商明威。</p>\n</li>\n<li>\n<p><strong>地下備用水源切換</strong>：頂樓水塔遭隔離封鎖後，工務室立即<strong>啟動院內地下水（戰備水塔）供水系統</strong>，將水塔連結管路打開，讓院內五座水塔實現互補供水。</p>\n</li>\n<li>\n<p><strong>殘酷執行「水電負載卸除與紅區分級配給」</strong>： -   <em>電力負載卸除（Load Shedding）</em>：主動且手動切斷全院所有行政辦公區、一般病房、冷氣空調、大型景觀照明及 80% 的電梯電源迴路，將僅存之發電機電力<strong>百分之百死守在開刀房、ICU、急診急救區與伺服器機房</strong>。 -   <em>水資源紅區管制</em>：備用地下水塔之淨水<strong>百分之百優先且僅供應給開刀房刷手、器械基本消毒及重症病患維生飲用</strong>。 -   <strong>手動封閉全院一般洗手間</strong>，嚴禁一般病患、家屬與員工盥洗或沖馬桶；由 L1 後勤勤務組向病房與避難區發放化學便器袋及乾洗手液，實施防禦空置。</p>\n</li>\n</ol>\n<p>五、 機構運作主管\nO5（資訊室主任蔡哲民）：資安阻斷、異地同步與「紙本降級」重置</p>\n<ol>\n<li>\n<p><strong>資安實體隔離阻斷</strong>：防範特工物理入侵核心機房時，實施同步的 APT 駭客攻擊或植入勒索軟體。網路組同仁實施嚴密流量監控，一旦判定核心主機面臨物理或網路資安威脅，立即<strong>拔除受威脅網段之連線交換器實施「實體隔離與阻斷」</strong>，防止災情擴大至全院。</p>\n</li>\n<li>\n<p><strong>異地備援機房接管與極限備份</strong>：確認大連主院區之 HIS（醫療資訊）、PACS（影像）核心資料，已安全同步備份至<strong>瑞光院區 7F 異地備援機房</strong>。若主院區伺服器因火災防護安全關機，隨時準備由瑞光異地機房接管運算與資料儲存。</p>\n</li>\n<li>\n<p><strong>重置「紙本降級（Downtime）」作業</strong>：若系統出現阻斷，機構運作主管立即宣告啟動當機應變機制。引導全院各單單位於 30 分鐘內砸開<strong>「當機緊急箱 (Downtime Box)」</strong>，全面改採手寫三聯式紙本病歷、手寫處方與人工檢驗流程，並配合 L1 勤務組啟動徒步「傳令兵（Runner）」傳遞單據。</p>\n</li>\n</ol>\n<p>六、 醫療照護主管 O1 與 待命區管理者：就地掩蔽與戰備物資「盲派」</p>\n<ol>\n<li>\n<p><strong>醫療照護主管 O1（臨床醫護團隊）</strong>：若周邊出現實體爆震或火災威脅，醫護人員須在不斷開呼吸器與維生儀器的極限情況下，迅速將重症病患推離靠窗區域，移至無窗之 <strong>「核心內筒」</strong> 進行防爆就地掩蔽。</p>\n</li>\n<li>\n<p><strong>待命區管理者（行政支援中心組長吳明容）</strong>：一線 HIS 當機後，臨床無法電腦請領（Pull）。待命區管理者立即會同藥劑科（馬太 B1 藥庫）與資材組（約翰/馬可 B1 資材室），主動將預先打包之 <strong>「戰備急救箱（Go-Kits / Trauma Kits）」</strong> 及手電筒、乾洗手液、化學便器袋等維生物資，以最抗干擾的 <strong>「盲派（Push）」</strong> 方式推送至急診檢傷區與病房護理站，保障前線戰力不因斷網斷電崩盤。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，在\nHICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）</strong>是將指揮官的撤離與分流決策化為實際行動的最前線。</p>\n<p>由醫務部部長擔任<strong>「執行部長（O0）」</strong>，負責計畫及指揮所有的醫療行動與災害控制，督導轄下各主管執行病患分級、降載與疏散。其具體因應作為如下：</p>\n<p><strong>一、 醫療照護主管（O1）：執行「病人分級」與「反向檢傷（Reverse\nTriage）」</strong></p>\n<ol>\n<li>\n<p><strong>落實病人分級與造冊</strong>：依據撤離需求，由資深醫師組成「反向檢傷特別小組」進行病患強勢評估，將病人精準分類以利後續處置：</p>\n<ul>\n<li>\n<p><strong>可返家/提早出院病人（行動方便者）</strong>：拔除靜脈點滴或提早出院，在\n    72 小時內不會立即危及生命的穩定病患。</p>\n</li>\n<li>\n<p><strong>需扶持/安置病人</strong>：無立即危險但需照護，辦理下轉至基層診所或長照機構。</p>\n</li>\n<li>\n<p><strong>一般住院病人（臥床者）</strong>：考慮移至院內安全病房，或轉送至其他醫院安置。</p>\n</li>\n<li>\n<p><strong>高度照護病人（危急/ICU病患）</strong>：評估轉送風險，須安排加護病房重置，或優先轉送至具備重症收治能力之醫院。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>極限醫療降載與出院辦理</strong>：針對評估為可提早出院或下轉的病患，迅速辦理緊急出院手續，以極速清空空間、減少需動用救護車轉運的病患總數。</p>\n</li>\n<li>\n<p><strong>醫療摘要與物資隨行</strong>：護理人員須確認每位轉運病患皆留下轉診單與病歷摘要紀錄；同時將足夠量的急救藥物、靜脈輸液或血液製品與病患一起運送，確保轉送過程中與到達接收醫院時的醫療照護不中斷。</p>\n</li>\n</ol>\n<p><strong>二、 安全管制主管（O4）：疏散動線維安與車輛管制</strong></p>\n<ol>\n<li>\n<p><strong>動線淨空與引導</strong>：負責維持撤離通道、電梯與樓梯間的絕對暢通。擔任避難引導，協助將病患依據「先水平、再垂直」的原則，安全移出至預定的疏散集結區。</p>\n</li>\n<li>\n<p><strong>車道與救護車管制</strong>：在急診室大門、門診大廳出口或恩慈大樓旁車道等接運疏散區實施交通管制，引導外部支援救護車、接駁車輛進出，確保車輛轉運順暢。</p>\n</li>\n<li>\n<p><strong>群眾與秩序控制</strong>：在撤離的混亂過程中，嚴格管制人員進出，防範恐慌群眾推擠或家屬阻礙重症病患的緊急轉送。</p>\n</li>\n</ol>\n<p><strong>三、 設施運作主管（O2）與機構運作主管（O5）：維生支援與設備轉移</strong></p>\n<ol>\n<li>\n<p><strong>確保疏散路線之維生系統（O2）</strong>：工務人員須確保疏散動線上的照明、安全梯暢通，以及臨時集結區的備用電源與醫療氣體供應正常，以利高度照護病患（如依賴呼吸器者）在等待轉運時的維生需求。</p>\n</li>\n<li>\n<p><strong>協助醫療設備轉移（O5）</strong>：醫工與資訊人員協助評估並拆裝必須隨高度照護病患轉送的關鍵醫療設備（如可攜式生理監視器），並協助醫院核心醫療服務的遷移與重置行動。</p>\n</li>\n</ol>\n<p><strong>四、 待命區管理者：統籌搬運人力與運輸載具</strong>\n在撤離行動中，負責管理並調度待命區的支援人力。迅速盤點並集中輪椅、擔架與救護推床，將人力與運輸工具精準派發至各病房，協助前線護理人員進行病患的平行轉移或經由樓梯的無動力垂直搬運作業。</p>\n<p>如何對高度照護病人進行「反向檢傷」與撤離評估？</p>\n<p>若救護車量能不足，聯絡官如何協調外部交通資源？</p>\n<p>分流至長照機構或診所的病患，其醫療摘要如何交接？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方與主管機關預警，確認院區即將編入「主戰區」，並啟動最高級別的醫療核心能量預防性全面撤離（HICS\n第三階段：全面撤離與量能重置）時：</p>\n<p>本院 <strong>HICS 執行部門（Operations Section）將由執行部長 O0（醫務部部長\n陳志文／代理人為急診部主任\n王建銘）坐鎮指揮</strong>。執行部門將立即終止所有常規非緊急業務，實施戰術重組，將一線部隊與後勤調配編制切換為<strong>「撤離準備組」</strong>與<strong>「持續照護組」雙軌並行模式</strong>。</p>\n<p>以下為執行部門（Operations\nSection）轄下各功能組與待命區，在戰火迫近之黃金時間內，確保病患安全、核心量能外移及資產防禦的<strong>六大範疇具體戰術作為</strong>：</p>\n<p>一、 執行部長 O0（陳志文）：開設撤離前線\nEOC、組織戰術重構與「反資敵」安全裁決</p>\n<ol>\n<li>\n<p><strong>戰術空間轉置與指揮扁平化</strong>： -   執行部長立即配合指揮官 A0（院長）進駐恩慈大樓地下一樓（B1）會議室（戰時指揮所），並將執行部編組當場拆分為：<strong>「撤離準備組」</strong>（主導出院、分級安置與轉運上車）與<strong>「持續照護組」</strong>（死守在院重症生命維持，直至病患登上轉運車）。</p>\n</li>\n<li>\n<p><strong>啟動並下達「反資敵（Denial of Assets）」封存銷毀指令</strong>： -   針對體積龐大、高度依賴常規電網與水源、且在極短時間內「無法搬運重置」的院內高價值精密醫療資產（如大型多階 CT、高階 MRI、大型中央血液透析機），執行部長下達最冷酷的<strong>「反資敵（Denial of Assets）」</strong>指令。 -   指示機構運作主管 O5（資訊室/醫工組）與設施運作主管 O2（工務室）配合，對上述無法帶走的維生與診斷設備進行<strong>強制手動斷電、機電物理鎖固或關鍵晶片與高機密硬碟之實體拆卸與銷毀程序</strong>，防止核心醫療科技與敏感病人個資落入敵手。</p>\n</li>\n</ol>\n<p>二、 醫療照護主管 O1：實施「反向檢傷」、病人分級造冊、與 A-B\n一對一醫護配對</p>\n<p>由急診、內科、外科主任與護理部督導長共同主導演練，對全院現有住院、門急診病患進行生死分流與轉銜：</p>\n<ol>\n<li>\n<p><strong>實兵實施強勢「反向檢傷（Reverse Triage）」</strong>： -   由平時不負責該病房的資深主治醫師組成「反向檢傷特別小組」，進入一般病房與中度加護病房，帶著檢核表強制進行病患評估。 -   將病患依據醫療風險與可轉移性，精確進行<strong>「四級病人分類造冊」</strong>： -   <strong>【第一類：可返家/提早出院】</strong>：生命徵象穩定，拔除靜脈點滴在 72 小時內無立即致命危險者，辦理提早出院。 -   <strong>【第二類：需扶持安置者】</strong>：無立即生命危險但缺乏生活自理能力者，安排下轉至安全重置區的長照機構或由家屬私人車接回。 -   <strong>【第三類：一般住院（臥床者）】</strong>：需要常規照護之臥床患者，列為中優先級，配合行政接駁車或一般救護車轉移。 -   <strong>【第四類：高度照護（危急/ICU病患）】</strong>：極度依賴維生設備、插管、使用呼吸器之重症患者，列為最高優先級。</p>\n</li>\n<li>\n<p><strong>執行轉運醫護與重症病患之「一對一（A與B）配對」</strong>： -   <strong>持續照護組</strong>依據病患嚴重度與複雜度分組 B；橫向對接計畫部（護理部）所排定之醫事人員撤離功能編組 A（隨車醫師與護理師）。 -   將編組 A 與病人 B 進行<strong>「A-B 戰術配對」</strong>，指派主治醫師與專責護理師，隨同救護車及轉送載具全程守護重症病人，維持轉運途中的<strong>醫療持續照護</strong>。</p>\n</li>\n<li>\n<p><strong>死守「醫療文件、處方用藥與救命物資」必須隨車轉移</strong>： -   病房護理人員與病歷室人員（P3）嚴格查驗，確保每位準備上車轉院的重置病患，其原有的<strong>手寫「轉診單、紙本轉院病歷摘要、手寫藥物治療紀錄與用藥處方箋」裝入防水夾鏈袋，確實與病人綁定並搭配隨車移出</strong>。 -   資材與藥庫人員支援將足夠消耗 72 小時之「戰傷急救箱、備用血液、靜脈輸液（林格氏液）與管制麻醉止痛藥（如 Ketamine）」隨車運送，防止到達接收醫院初期面臨物資枯竭。</p>\n</li>\n</ol>\n<p>三、 待命區管理者：調配「無動力垂直搬運」人力與集中調度轉運輔具</p>\n<ol>\n<li>\n<p><strong>實施搬運人力與載具極限調配</strong>： -   待命區管理者（行政支援中心組長 吳明容） 負責評估執行部門前線所需的體力支援，並管理待命區內的支援人員（含志工、行政人員、保全等）。 -   迅速在急診待命區、護理部前廳及指定集合點，將全院輪椅、擔架、推床及護理站配置的<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>進行實體極限集中盤點與再發配。</p>\n</li>\n<li>\n<p><strong>無動力徒步搬運接力（無電梯狀態）</strong>： -   若此時市電已斷、高樓層電梯停用且主戰區炮火逼近，待命區管理者指派非醫療後勤人員（行政同工、保全、輕傷志工），親自投入前線病房。 -   配合護理同工，嚴格遵循<strong>「5人一組（4人徒步搬運擔架、1人專業護理照護）」</strong>的救命原則，以人工接力方式，將臥床與重症病患沿內側安全梯垂直疏散轉移至地面的車輛接運區。</p>\n</li>\n</ol>\n<p>四、 安全管制主管 O4：管制三大「簽證車輛接運區」與死守外圍動線</p>\n<p>由醫勤室保安組組長（王建文、陶大屏）坐鎮指揮，在全院實施內部封鎖（Lockdown）的狀態下，進行鋼鐵般的硬邊界管制與車道分流：</p>\n<ol>\n<li>\n<p><strong>對接 110/119 與簽證車隊「外援接引」</strong>： -   保安組指派專人至外圍關鍵路口（<strong>大連路與莊敬街交叉口巷口</strong>）進行實體交通管制，引導屏東縣衛生局與縣市聯合應變中心（LJEOC）派出的「簽證救護車（2輛支援）」及大眾中巴接駁載具切入指定路網。</p>\n</li>\n<li>\n<p><strong>嚴格落實「三大接運疏散區」動線絕對分流</strong>： -   為防止上百名撤離人員、家屬與急救車輛在院外道路發生致命推擠，安全管制主管嚴格實施車道與動線管制： -   <strong>【救護車專區（急診室大門出口）】</strong>：僅允許編碼列冊之重症救護車進入，作為高度照護與臥床病患之撤離吞吐咽喉。 -   <strong>【私人車專區（恩慈大樓旁車道）】</strong>：管制為「有家屬接送與可自行移動者」的快速上車安置區。 -   <strong>【大眾接駁車專區（醫院門診大廳大門出口）】</strong>：作為大眾交通工具、中巴接駁輕症病患撤離的集結點。 -   強勢驅離一切非撤離車隊的違停車輛，對意圖強闖或阻礙重症後送通道的恐慌群眾，由保全持盾牌與武裝警力進行<strong>硬邊界防護阻絕</strong>。</p>\n</li>\n</ol>\n<p>五、 設施運作主管 O2 與 機構運作主管\nO5：死守動線生命線、設備打包拆卸與「紙本降級」</p>\n<ol>\n<li>\n<p><strong>維持疏散動線之維生水電與照明（設施運作 O2 - 工務曹宏益）</strong>： -   工務室人員必須死守緊急發電機，確保在撤離的數小時內，安全安全梯、垂直電梯、以及病人集結區（門診大廳、急診前廳）具有不中斷的<strong>臨時照明、備用電源與醫療氧氣鋼瓶的壓力監控</strong>。</p>\n</li>\n<li>\n<p><strong>關鍵小型醫療儀器移轉與打包（機構運作 O5 - 資訊蔡哲民）</strong>： -   資訊與醫工人員必須在病患上車前 1 小時，配合「持續照護組」將隨高度照護重症病患轉運所必需之可攜式維生儀器（如可攜式蓄電池呼吸器、床邊生理監視器、點滴幫浦）迅速自原病房拆裝、打包，黏貼上「大連院區財產識別貼紙」後隨病患運送上車。</p>\n</li>\n<li>\n<p><strong>無預警資安癱瘓之「Downtime 暴力降級」處置（O5）</strong>： -   若在撤離的黃金期中，本院核心 HIS 或 PACS 電腦系統因台電瞬斷或敵特網路攻擊（DDoS）宣告大延遲或癱瘓，機構運作主管立即向執行部長報告，全院暴力降級。 -   通知前線各病房護理站砸開<strong>「當機緊急箱 (Downtime Box)」</strong>封條，全面改採人工手寫轉診單、手寫處方與紙本病人交接單，阻絕網路癱瘓對撤離時效的阻礙。</p>\n</li>\n</ol>\n<p>六、 危害控制主管 O3：化學與爆震威脅監控與撤離途中現場處置</p>\n<ol>\n<li><strong>突發火煙與特種化化物質外洩處理</strong>： -   由于即將成為「主戰區」，院區可能隨時遭遇飛彈震波波及。擔任危害控制主管（感染科/放射科主任） 的 O3 同工必須即時透過遠端監視或偵檢設備監控院內管線。 -   一旦撤離過程中發生局部建物倒塌、燃燒劑火警、或因爆炸導致地下柴油油槽、醫療中央液氧破裂洩漏，O3 須立即<strong>指揮消防滅火編組（滅火班）實施侷限火煙與緊急隔離</strong>，並引導病患轉向備用備用疏散通道避難，絕不容許有毒氣體下滲污染地下備援集結區。</li>\n</ol>"}]}, {"role": "計畫部門（Planning Section）", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報各項量能。在HICS（醫院事故指揮系統）架構下，<strong>計畫部（Planning\nSection）</strong>扮演著醫院的「大腦與雷達」，負責情資蒐集、資源盤點與決策支援。其具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌情資與計畫指揮權</strong></p>\n<ol>\n<li>\n<p><strong>成立計畫部</strong>：由護理副院長兼護理部部長擔任「計畫部長（Planning\n    Section Chief）」。</p>\n</li>\n<li>\n<p><strong>擬定行動計畫</strong>：計畫部長負責綜觀全局、綜整所有事件相關資訊，建立替代執行方案，並為每個執行週期建立「事故行動計畫（IAP）」。</p>\n</li>\n</ol>\n<p><strong>二、 資源控管組（Resource Unit）：精確盤點各項量能</strong>\n主管機關要求的「床位、人力、急診、手術、加護、設備物資」等數據，主要由計畫部轄下的資源控管組（由護理部督導長擔任組長）負責盤點與建檔。</p>\n<ol>\n<li>\n<p><strong>建立資源清單</strong>：迅速清點與監控全院員工（人力）、床位、設施、物資及主要設備的供應情況與位置，以確保事件應變時有足夠的資源供應。</p>\n</li>\n<li>\n<p><strong>維持「情資看板（Status\n    Board）」</strong>：隨時掌控全院空床數、可用開刀房數、待處理傷患數與醫護人力數等關鍵數據，提供給指揮官做決策參考。</p>\n</li>\n</ol>\n<p><strong>三、 狀況分析組（Situation Unit）：分析情勢與掌控病人動向</strong></p>\n<ol>\n<li>\n<p><strong>病人動向管理</strong>：由護理部督導長擔任組長，負責追蹤全院病人動向。因應戰時整備所啟動的極限醫療降載與反向檢傷，必須精確掌握出院、轉院、留院病人的數據及床位管理。</p>\n</li>\n<li>\n<p><strong>情勢分析與預判</strong>：蒐集、分析當前災情資訊，製作狀況圖資與總結報告，並預測未來情勢發展，準備地圖與實用知識，以供應變行動所需。</p>\n</li>\n</ol>\n<p><strong>四、 文件紀錄組（Documentation Unit）：確保資料完整與法效性</strong></p>\n<ol>\n<li>\n<p><strong>資料保存</strong>：由門診經理擔任組長，於意外事故發生期間，妥善保存所有病人病歷及文件資料的正確性與完整性。</p>\n</li>\n<li>\n<p><strong>演習與通報佐證</strong>：適時蒐集、記錄並保存所有事件過程（包含向主管機關回報之通報紀錄、照片、評核表等佐證資料），以作為日後檔案分析、檢討改善及法律所需之參考資料。</p>\n</li>\n</ol>\n<p><strong>五、 跨部對接與協助限時呈報</strong>\n計畫部作為全院資源與情資的匯聚中心，在完成上述的各項量能（床位、人力、設備、物資）盤點與分析後，必須與「統籌呈報組（危管會）」及「聯絡官」緊密合作對接。將精確的資源數據提交給統一窗口，確保醫院能於主管機關規定的時限內，順暢且正確地完成各項醫療量能的初報與續報作業。</p>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述的複合性危機（假訊息、恐慌人潮、交通事故傷患與家屬急迫需求），在\nHICS（醫院事故指揮系統）架構下，<strong>計畫部（Planning\nSection）</strong>扮演著醫院的「大腦與雷達」角色。面對前線混亂，計畫部必須迅速彙整情資、追蹤病人動向並提供決策支援，以穩定醫院運作。</p>\n<p>由護理部部長擔任的「計畫部長」將統籌轄下各組，其具體因應作為如下：</p>\n<p><strong>一、 蒐事情資分析與支援反制假訊息（狀況分析組）</strong></p>\n<ol>\n<li>\n<p><strong>即時情資彙整</strong>：狀況分析組負責蒐集並分析當前急診壅塞情況、交通事故傷患人數、慢性病藥品搶購與消耗狀況，製作資訊總結報告。</p>\n</li>\n<li>\n<p><strong>對接發言人闢謠</strong>：在機構內部設立專區，每四小時發布一次最新狀況報告。將全院真實的收治量能、剩餘病床數及藥品存量等精確數據，迅速傳遞給發言官（醫療副院長），作為對外闢謠與新聞發布的客觀依據，以有效平息民眾因假訊息引發的心理恐慌。</p>\n</li>\n</ol>\n<p><strong>二、 掌控病人動向與支援家屬尋人（狀況分析組與資源控管組）</strong></p>\n<ol>\n<li>\n<p><strong>精確的病人動向管理</strong>：面對家屬強烈要求住院或查詢撤離資訊，狀況分析組必須啟動嚴格的「病人動向管理」。精確記錄每位病患的檢傷分級、提早出院、轉院撤離或留觀的動向，確認病患動向訊息在各區傳遞正確可靠。</p>\n</li>\n<li>\n<p><strong>建立傷亡與尋人名冊</strong>：針對交通事故湧入的大量傷患，必須確保在混亂中正確記錄無名或昏迷病患的特徵與身分。將這些動態名冊提供給「家屬接待區」的社工與公關人員，以便他們能正確且迅速地回覆家屬的尋人與撤離資訊查詢。</p>\n</li>\n</ol>\n<p><strong>三、 維護「情資看板」與監控極限資源（資源控管組）</strong></p>\n<ol>\n<li>\n<p><strong>維持情資看板（Status\n    Board）</strong>：資源控管組必須隨時掌控並更新全院的「空床數」、「可用開刀房數」、「急診待處理傷患數」與「醫護人力數」。將這些核心數據可視化，提供給指揮官作為是否實施全院進一步封鎖或極限降載的決策依據。</p>\n</li>\n<li>\n<p><strong>監控物資消耗預警</strong>：監控所有員工、設施、物資（特別是被民眾搶購的慢性病藥品與前線急救耗材）的供應情況。一旦推估出物資即將耗盡的臨界點，須立即向後勤部提出警告與資源調度需求。</p>\n</li>\n</ol>\n<p><strong>四、 制定事故行動計畫與替代方案（計畫部長）</strong>\n由計畫部長綜觀急診面臨癱瘓的全局，根據執行部前線的回報，建立替代執行方案（例如評估並規劃戶外慢性病領藥區、臨時輕症安置區），並為下一個應變週期（如未來的\n12\n小時）撰寫與發布「事故行動計畫（IAP）」，確保全院各部門的應變步調一致。</p>\n<p><strong>五、 確保混亂中的病歷與法效紀錄（文件紀錄組）</strong>\n在急診極度壅塞與家屬施壓的混亂環境中，文件紀錄組（由門診經理擔任組長）須主動至前線協助病患填寫基本資料、辦理住院/出院手續，並彙整傷患去向。更重要的是，必須妥善保存所有病人病歷、檢傷拒收及反向檢傷的處置文件。這些紀錄將作為日後檔案分析、醫療糾紛釐清及法律所需之重要佐證資料，以保障前線醫護人員。</p>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊）」，在\nHICS（醫院事故指揮系統）架構下，<strong>計畫部（Planning\nSection）</strong>作為全院的情資匯聚中樞與大腦，必須在資訊系統癱瘓（或降級）的混亂中，以「人工/離線作業」穩住情資、確保紀錄完整，並提供客觀數據以反制假訊息。</p>\n<p>由護理部部長擔任的「計畫部長」統籌轄下各組，其具體因應作為如下：</p>\n<p><strong>一、 蒐集真實數據支援反制假訊息（狀況分析組與資源控管組）</strong></p>\n<ol>\n<li>\n<p><strong>精確盤點破除謠言</strong>：針對社群媒體流傳「停診、缺藥、拒收病人」等不實假訊息，資源控管組（P1）必須立即以人工或備援通訊方式，精確盤點並確認全院實際的病床空床數、醫療人力與藥品/衛材的真實庫存。</p>\n</li>\n<li>\n<p><strong>對接發言官闢謠</strong>：狀況分析組（P2）彙整上述真實數據後，產出最新狀況報告與總結，迅速提供給發言官（PIO/醫療副院長）。這些精確的情資將作為院方對外發布新聞稿、澄清謠言的客觀依據，以有效平息民眾與社會的恐慌。</p>\n</li>\n</ol>\n<p><strong>二、 系統延遲下的「紙本化」病人動向管理（狀況分析組）</strong></p>\n<ol>\n<li>\n<p><strong>人工掌握病人動向</strong>：因掛號、批價、檢驗與影像系統延遲，原有的電子看板與追蹤系統可能失效。狀況分析組必須啟動人工追蹤機制，確實記錄病人在各區（門急診、留觀、病房）的動向，確保訊息傳遞正確可靠。</p>\n</li>\n<li>\n<p><strong>支援家屬詢答</strong>：將掌握到的人工動向資訊提供給相關單位（如轉診中心或社工室），確保在家屬因假訊息或久候而焦急查詢時，能給予正確的詢答與安撫，降低因系統當機與資訊不透明所造成的醫病衝突。</p>\n</li>\n</ol>\n<p><strong>三、 確保當機期間的病歷與佐證資料完整（文件紀錄組）</strong></p>\n<ol>\n<li>\n<p><strong>維護紙本病歷法效性</strong>：在醫療前線切換為「紙本降級（Downtime）」作業（使用當機緊急箱內的三聯式紙本病歷、手寫處方箋及檢驗單）期間，文件紀錄組（P3，由門診經理擔任）必須妥善管理並保存所有紙本文件資料，確保意外事故發生期間病人病歷的正確性與完整性。</p>\n</li>\n<li>\n<p><strong>保存應變與資安佐證紀錄</strong>：負責蒐集並保存系統延遲/資安攻擊期間的所有通報紀錄（包含向主管機關之資安通報）、應變過程照片及評核表。這些實體資料將作為日後系統資料回補、檔案分析、檢討改善及後續潛在醫療/法律糾紛之重要參考與佐證資料。</p>\n</li>\n</ol>\n<p><strong>四、 維護實體情資看板與擬定替代行動方案（計畫部長與資源控管組）</strong></p>\n<ol>\n<li>\n<p><strong>維持實體「情資看板」</strong>：在 HIS\n    系統與電子儀表板可能延遲或失效的狀況下，資源控管組須在指揮中心維持實體的「情資看板（Status\n    Board）」，透過傳令兵或對講機回報，隨時掌控並更新全院可用資源與現況數據，以提供指揮官進行醫療降載的決策參考。</p>\n</li>\n<li>\n<p><strong>擬定事故行動計畫（IAP）</strong>：計畫部長綜觀資訊當機與假訊息對全院的影響範圍，建立替代執行方案（例如評估紙本作業下的人力調度需求），並為下一個應變週期撰寫與發布「事故行動計畫（IAP）」，確保全院各部門在「無網狀態」下的應變步調能保持一致。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這意味著醫院的「數位神經系統」遭到惡意癱瘓，面臨「又盲又啞」的極端危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>計畫部門（Planning\nSection）</strong>作為醫院的「大腦與雷達」，負責情資蒐集、資源盤點與決策支援。在面對資訊系統全面當機、電子數據無法存取的混亂狀態下，計畫部必須迅速切換為「人工/離線作業」模式，以穩住全院情資、確保醫療紀錄完整，並協助全院無縫切換至紙本降級運作。</p>\n<p>由護理部部長擔任的「計畫部長（P0）」將統籌轄下各組，其具體因應作為如下：</p>\n<p><strong>一、 統籌災情情資與擬定「紙本降級」行動計畫（計畫部長 P0）</strong></p>\n<ol>\n<li>\n<p><strong>評估癱瘓衝擊與建立替代方案</strong>：計畫部長須綜觀 APT 與 DDoS 攻擊對全院 HIS、PACS 及掛號系統的破壞範圍，與指揮官及資訊室研商，全面啟動醫療持續運作的替代執行方案，即宣告進入「Downtime（紙本降級）極限模式」。</p>\n</li>\n<li>\n<p><strong>發布事故行動計畫（IAP）</strong>：為下一個應變週期撰寫與發布「事故行動計畫（IAP）」，確保全院各科室在「無網狀態」下的人工掛號、紙本作業、人力調度與傳令兵（Runner）機制能保持步調一致。</p>\n</li>\n</ol>\n<p><strong>二、 系統癱瘓下的「人工化」病人動向管理（狀況分析小組 P2）</strong></p>\n<ol>\n<li>\n<p><strong>紙本追蹤病人動向</strong>：因 HIS 系統遭勒索軟體癱瘓，原有的電子看板與追蹤系統完全失效。狀況分析組（由護理部督導長擔任組長）轄下的「病人動向組」必須立即啟動人工追蹤機制，確實以紙本記錄病人在各區（門急診、留觀、病房、開刀房）的最新動態，確保無網狀態下病人動向訊息傳遞正確可靠。</p>\n</li>\n<li>\n<p><strong>災情分析與家屬安撫</strong>：蒐集各單位因資訊癱瘓受影響的程度，每四小時發布一次最新狀況報告。同時，針對因系統當機導致看診、檢驗與領藥嚴重延遲而焦慮的病患與家屬，給予正確的資訊說明與情緒安撫，降低醫病衝突。</p>\n</li>\n</ol>\n<p><strong>三、 維護「實體情資看板」與監控備援物資（資源控管小組 P1）</strong></p>\n<ol>\n<li>\n<p><strong>維持實體「情資看板（Status Board）」</strong>：在電子儀表板失效的狀況下，資源控管組須在指揮中心架設實體白板或看板。透過傳令兵（Runner）或獨立頻段無線電回報，以人工方式隨時掌控並更新全院的空床數、可用開刀房數、醫護人力數等關鍵數據，提供給指揮官作為決策參考。</p>\n</li>\n<li>\n<p><strong>盤點紙本作業所需資源</strong>：嚴密監控各單位「當機緊急箱（Downtime Box）」的啟用狀況，確保三聯式紙本病歷、手寫處方箋、紙本檢傷單、條碼貼紙及每日離線列印的住院名單等物資供應充足，並協助盤點可充當「傳令兵」的行政與志工人力。</p>\n</li>\n</ol>\n<p><strong>四、 確保當機期間的病歷法效性與資安佐證保全（文件紀錄小組 P3）</strong></p>\n<ol>\n<li>\n<p><strong>維護紙本病歷法效性與完整性</strong>：在醫療前線切換為「紙本降級（Downtime）」作業期間，文件紀錄組（由門診經理擔任）必須妥善管理並保存所有手寫的紙本病歷、處方箋及檢驗報告，確保在無電腦系統輔助的意外事故發生期間，病人醫療紀錄的正確性與完整性。</p>\n</li>\n<li>\n<p><strong>保存資安攻擊佐證紀錄</strong>：負責蒐集並保存勒索軟體的勒索訊息畫面、系統異常日誌（可透過相機翻拍）、資安通報紀錄及應變過程的所有決策文件。這些實體資料將作為日後檢調機關進行駭客追查、系統資料清洗回補、檔案分析及應對潛在醫療糾紛的重要佐證資料。</p>\n</li>\n</ol>\n<p><strong>五、 預劃災後資料回補與系統歸建（歸建小組 P4）</strong></p>\n<ol>\n<li>\n<p><strong>規劃資料回補準則</strong>：在系統修復前，歸建小組先行與資訊室及各臨床單位協調，訂立未來 APT 攻擊威脅解除、HIS/PACS 系統經清洗復原並重新上線後的「資料回補」與系統歸建作業準則。</p>\n</li>\n<li>\n<p><strong>確保醫療紀錄無縫接軌</strong>：規劃如何將當機期間累積的大量紙本病歷、手寫醫囑與實體 X 光片紀錄，有條不紊地重新人工補輸入至電子系統中，確保病患數位病歷的延續性與完整性。</p>\n</li>\n</ol>"}, {"scenario": "1-5", "title": "48小時降載至30%目標", "desc": "接獲屏東縣聯合應變管制中心通知，請以30%為目標，48小時內完成降載作業，並進行醫療量能盤點與資料彙整。", "html": "<p>針對接獲屏東縣聯合應變管制中心「48 小時內完成降載至 30%\n目標」之緊急指令，在\nHICS（醫院事故指揮系統）架構下，<strong>計畫部（Planning\nSection）</strong>扮演著全院的「大腦與情報中樞」，負責情資蒐集、資源盤點、病人動向追蹤與決策支援。</p>\n<p>由護理部部長擔任的「計畫部長（P0）」將統籌轄下各編組，針對主推官提問的三大重點，計畫部的具體因應作為如下：</p>\n<p><strong>一、 於 30 分鐘內確認指令、啟動通報與擬定計畫（因應提問 I）</strong></p>\n<ol>\n<li>\n<p><strong>擬定事故行動計畫（計畫部長 P0）</strong>：計畫部長接獲指揮官啟動 HICS 後，須迅速綜觀全局、綜整所有事件相關資訊，與指揮官研商建立降載的替代執行方案，並為下一個執行週期擬定與發布「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>設立情報專區與院內通報（狀況分析小組 P2）</strong>：由護理部督導長擔任的狀況分析小組長，須於接獲指令 30 分鐘內在機構內部設立「情報專區」，協助指揮官進行降載指令之確認與院內通報。</p>\n</li>\n<li>\n<p><strong>建立定時情資發布機制（狀況分析小組 P2）</strong>：建立每四小時發布一次最新狀況報告的機制，預測未來情勢可能之發展，將最新的降載政策、情勢與指令傳遞給各任務編組與發言人。</p>\n</li>\n</ol>\n<p><strong>二、 支援降載作業：掌控病人動向與病歷保全（因應提問 II）</strong>\n雖然實質的「反向檢傷」與病患篩選由執行部操作，但計畫部必須主導降載期間的資訊正確性與家屬溝通：</p>\n<ol>\n<li>\n<p><strong>啟動「病人動向追蹤機制」（狀況分析小組 P2）</strong>：轄下的「病人動向組」必須嚴密追蹤全院病患在降載過程中的去向。針對執行部篩選出的名單，精確掌控哪些病患被列為「提早出院」、哪些被「轉院安置」或「留院照護」，確保病患動向訊息在各區傳遞正確可靠，絕不遺漏任何一人。</p>\n</li>\n<li>\n<p><strong>家屬詢答與恐慌安撫（狀況分析小組 P2）</strong>：極限降載與強制出院極易引發家屬恐慌與不滿。狀況分析小組須根據正確的病患動向名冊，給予病人家屬正確的詢答資訊並進行情緒安撫，防範大廳或急診發生秩序失控。</p>\n</li>\n<li>\n<p><strong>醫療文件與病歷保全（文件紀錄小組 P3）</strong>：由門診經理擔任組長，在大量病患辦理出院或轉院的過程中，妥善保存病人病歷及所有轉診文件資料的正確性與完整性。並適時記錄所有事件過程資料，作為日後檔案分析與法律所需之參考。</p>\n</li>\n</ol>\n<p><strong>三、 盤點 SWEAT-M 關鍵資源、維持戰情面板與對接呈報（因應提問 III）</strong></p>\n<ol>\n<li>\n<p><strong>監控與盤點關鍵資源（資源控管小組 P1）</strong>：由護理部督導長擔任組長，須迅速清點與監控全院員工、床位、設施、物資及主要設備的供應情況，並建立所有資源使用情形的清單。</p>\n</li>\n<li>\n<p><strong>執行 SWEAT-M 狀態評估（計畫部會同後勤部）</strong>：計畫部須會同後勤部，針對醫院的 <strong>SWEAT-M</strong> 指標進行全面盤點，包含：<strong>S</strong> 安全保障（Security）、<strong>W</strong> 水與廢水（Water）、<strong>E</strong> 備援電力與能源（Energy）、<strong>A</strong> 交通可達性與疏散路線（Accessibility）、<strong>T</strong> 電信通訊（Telecommunications），以及 <strong>M</strong> 醫療物資（Medical supplies），並利用紅、黃、綠燈號標示資源狀況的不足、緊張或足夠。</p>\n</li>\n<li>\n<p><strong>維持「情資看板 / 戰情面板」（資源控管小組 P1）</strong>：協同資訊室（O5），將收集到的 SWEAT-M 盤點數據、全院空床數、可用開刀房數、已降載出院人數及殘存醫護人力等關鍵情資，即時彙整並更新於實體的「情資看板（Status Board）」上，將醫療量能可視化，提供給指揮官做決策參考。</p>\n</li>\n<li>\n<p><strong>對接外部限時回報（計畫部協同聯絡官）</strong>：計畫部作為資源與情資的匯聚中心，在完成上述量能數據統整後，必須將精確的數據提交給「統籌呈報組」與聯絡官，確保醫院能於主管機關規定的 48 小時時限內，順暢且正確地向屏東縣聯合應變管制中心與衛生局完成降載進度與醫療量能的初報與續報作業。</p>\n</li>\n</ol>\n<p>2、主推官提問/回覆重點： I. 接獲指令後如何於 30\n分鐘內立刻進行降載指令確認與啟動HICS、完成院內通報(計劃部/狀況分析小組長、指揮官)\n。 II.\n如何進行降載作業：可出院/轉院病人篩選、非急迫手術/檢查/門診調整公告\n(執行部/醫醫療照護主管) 。 III.\n本院如何進行關鍵資源(SWEAT-M表格)盤點，並將資料彙整於戰情面版並回報指揮中心(後勤部、計劃部、資訊室)。</p>\n<p>後勤部 如何因應？說明具體作為。</p>\n<p>針對接獲屏東縣聯合應變管制中心「48 小時內完成降載至 30%\n目標」之緊急指令，在\nHICS（醫院事故指揮系統）架構下，<strong>後勤部（Logistics\nSection）</strong>扮演著全院資源調度、運輸疏散與維生物資供應的「生命線」與大後盾。</p>\n<p>由總務部部長擔任的<strong>「後勤部長（L0）」</strong>將統籌轄下的勤務組（L1）與任務支援組（L2）。面對主推官提問的三大重點，後勤部的具體因應作為如下：</p>\n<p><strong>一、 於 30 分鐘內配合指令確認與 HICS 啟動作業（因應提問 I）</strong>\n雖然降載指令的確認與院內通報主要由指揮官與計畫部主導，但後勤部必須在 30\n分鐘內完成對應的緊急編組與資源預備：</p>\n<ol>\n<li>\n<p><strong>後勤指揮樞紐就位</strong>：後勤部長接獲 HICS 啟動指令後，須於 30 分鐘內召集轄下<strong>勤務主管（L1，由醫勤室主任擔任）</strong>與<strong>任務支援主管（L2，由資材組長擔任）</strong>就位，並向指揮官與計畫部確認本次極限降載的目標與撤離規模。</p>\n</li>\n<li>\n<p><strong>啟動待命區與後勤動員</strong>：後勤部須立即通知營養室、藥劑科、血庫、運輸組等分支單位進入緊急備援狀態。同時配合「待命區管理者」，準備接收即將被召回的休假員工、志工及外部支援人力，並將其編入搬運、傳令或物流支援編組。</p>\n</li>\n</ol>\n<p><strong>二、 支援降載作業：統籌病患轉運與隨車物資（因應提問 II）</strong>\n執行部（醫療照護主管）完成「可出院/轉院病人」的篩選與反向檢傷後，<strong>實體的疏散與物資轉移必須完全仰賴後勤部的支援</strong>：</p>\n<ol>\n<li>\n<p><strong>緊急運輸車輛與載具調度（勤務組 L1）</strong>： -   <strong>院內車輛極限調派</strong>：勤務組（運輸組）須立即統籌本院所有的運輸車輛，包含現有救護車及行政運輸中巴，於急診室大門或指定接運疏散區待命。 -   <strong>外部交通資源協調</strong>：若評估轉院人數超出本院車輛負荷，後勤部須配合聯絡官，向屏東縣政府衛生局（EOC）或聯合應變中心請求大眾運輸車輛（接駁車）或外部救護車的緊急調度支援。 -   <strong>集中搬運載具</strong>：迅速盤點並集中院內所有的輪椅、擔架、推床與樓梯疏散滑墊，統一派發至各病房區，協助前線進行病患的快速水平與垂直移出。</p>\n</li>\n<li>\n<p><strong>確保「戰備物資與藥品」隨車交接（任務支援組 L2）</strong>： -   <strong>隨車物資打包</strong>：針對被執行部判定為需轉送的「高度照護」或「一般住院」病患，任務支援組（藥劑科、資材組、血庫）必須準備足夠量的急救藥物、靜脈輸液、血液製品及相關維生衛材。 -   <strong>防止醫療斷鏈</strong>：嚴格規定這些急救與維生物資<strong>必須與病人一起運送</strong>至接收醫院，以避免在轉送過程中或剛抵達合作醫院時，發生醫藥存量短時間內耗竭的致命危機。</p>\n</li>\n</ol>\n<p><strong>三、 執行 SWEAT-M 關鍵資源盤點與戰情上板（因應提問 III）</strong>\n後勤部是執行 <strong>SWEAT-M 關鍵資源評估</strong>\n的絕對主力。後勤部長須指示各組針對以下指標進行精確盤點，並會同計畫部與資訊室將數據轉化為紅/黃/綠燈號，即時更新於「戰情面板（Status\nBoard）」上，以利回報指揮中心：</p>\n<ol>\n<li>\n<p><strong>S (Security 安全保障)</strong>：配合安全管制組（保安組），確認院區門禁、交通疏導人力，以及是否有足夠防護裝備支援保全與醫護人員。</p>\n</li>\n<li>\n<p><strong>W (Water &amp; Waste Water 水與廢水)</strong>：由工務室與營養室盤點全院戰備水塔儲水量、礦泉水與乾糧存量，確保在 48 小時降載期間，能維持留院重症病患與高強度作業員工的飲水與膳食供應。</p>\n</li>\n<li>\n<p><strong>E (Energy 備援電力與能源)</strong>：配合工務室盤點緊急發電機之柴油存量、不斷電系統（UPS）狀態，評估在斷電孤島情境下可支撐的核心運作時間。</p>\n</li>\n<li>\n<p><strong>A (Accessibility 交通可達性與疏散路線)</strong>：勤務組（運輸組）須精確盤點並上報目前可動用的<strong>救護車數量、中巴數量、司機人力</strong>，以及外部交通路線是否暢通，此為指揮官評估「最大疏散量能」的核心依據。</p>\n</li>\n<li>\n<p><strong>T (Telecommunications 電信通訊)</strong>：勤務主管須檢查所有手持通訊設備，盤點並分配 UHF/VHF 無線電對講機給各疏散指揮官與車輛調度人員，確保降載疏散過程中的通訊韌性。</p>\n</li>\n<li>\n<p><strong>M (Medical Supplies 醫療物資與血氧)</strong>：任務支援組（資材組、藥劑科、血庫）須精確盤點院內抗生素、麻醉藥品、備用氧氣鋼瓶及各血型血液的存量。</p>\n</li>\n<li>\n<p><strong>彙整上板與提出缺口支援</strong>：後勤部完成上述盤點後，須將數據火速提交給計畫部（資源控管小組 P1）與資訊室，將其可視化於戰情面板。若盤點發現救護車、血液或戰備藥物出現紅燈（嚴重不足）缺口，後勤部長須立即協同行政/財務部（採購小組 F2）或聯絡官，向外部供應商及屏東縣衛生局啟動緊急求援與徵用調度。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨物資匱乏與「孤島效應」的嚴峻考驗。在\nHICS（醫院事故指揮系統）架構下，<strong>計畫部門（Planning\nSection）</strong>作為全院的情資匯聚中樞與大腦，必須精確掌握資源缺口、監控病人動向並擬定替代行動方案。</p>\n<p>由護理部部長擔任的「計畫部長（P0）」將統籌轄下編組，其具體因應作為如下：</p>\n<p><strong>一、 盤點物資缺口與精算消耗速率（資源控管組 P1）</strong>\n面對各項維生與醫療物資配送延遲，以及員工因交通受阻無法到勤，由護理部督導長擔任的資源控管小組長必須立即展開清點：</p>\n<ol>\n<li>\n<p><strong>建立實體資源清單</strong>：精確清點院內殘存的人力、病床數、燃油、醫療氣體、藥品、血液、飲水及膳食等關鍵資源的位置與數量。</p>\n</li>\n<li>\n<p><strong>精算消耗速率與通報缺口</strong>：評估上述物資的消耗速率與短缺缺口，並與後勤部門密切聯繫，將精確的資源數據與支援需求提供給指揮官與聯絡官，作為向外部（如衛生局、EOC）請求緊急運補的依據。</p>\n</li>\n</ol>\n<p><strong>二、 彙整情資與發布狀況報告（狀況分析組 P2）</strong>\n由護理部督導長擔任的狀況分析小組長，須負責蒐集與分析當下情勢：</p>\n<ol>\n<li>\n<p><strong>定期發布狀況報告</strong>：在機構內部設立專區，每四小時發布一次最新狀況報告，綜整物資短缺情形、交通受阻狀況及未來情勢的可能發展。</p>\n</li>\n<li>\n<p><strong>對接發言官與安撫家屬</strong>：將統整後的精確數據提供給發言官（醫療副院長），作為對外說明的依據；並透過轄下的「病人動向組」，針對因物資匱乏或轉送延遲而焦慮的病人家屬，給予正確的詢答與情緒安撫。</p>\n</li>\n</ol>\n<p><strong>三、 掌控「轉送受阻」的病人動向（狀況分析組 P2 / 文件紀錄組 P3）</strong>\n因外部交通受影響導致病人轉送不確定性提高，部分需後送的病患可能被迫滯留院內：</p>\n<ol>\n<li>\n<p><strong>嚴密追蹤病人動向</strong>：狀況分析組須確實記錄病患在各區域（如急診、留觀、病房或臨時安置區）的最新動向，確保在混亂中病人動向訊息傳遞正確可靠。</p>\n</li>\n<li>\n<p><strong>維護病歷與交接紀錄</strong>：文件紀錄組（由門診經理擔任）必須妥善保存滯留病患或準備轉送病患的病歷與文件資料。確保未來轉送通道一旦重啟，病人的醫療摘要與用藥紀錄能完整隨車交接。</p>\n</li>\n</ol>\n<p><strong>四、 擬定替代方案與事故行動計畫（計畫部長 P0）</strong>\n面對極端的資源匱乏與人員短缺，計畫部長必須綜觀全局並提出戰略建議：</p>\n<ol>\n<li>\n<p><strong>擬定替代執行方案</strong>：針對員工無法到勤的缺口，與醫療照護組協調人力重分配的替代方案（如跨科支援或強制輪班）；針對物資與血液配送延遲，提供「走動式血庫（院內活體捐血）」或啟動降載機制的評估建議。</p>\n</li>\n<li>\n<p><strong>建立事故行動計畫（IAP）</strong>：籌備並主持行動計畫會議，為下一個執行週期（如未來的\n    12 或 24 小時）建立並發布「事故行動計畫（Incident Action\n    Plan）」，確保全院各部門在「孤島狀態」下的應變步調保持一致。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨極高的實體安全威脅（如敵方滲透破壞）以及群眾恐慌引發的資源搶奪危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>計畫部門（Planning\nSection）「計畫部長（P0）」</strong>。面對外部威脅與內部警戒狀態，計畫部門必須迅速蒐集情資、盤點封鎖狀態下的資源，並擬定應變計畫。其轄下各組的具體因應作為如下：</p>\n<p><strong>一、 統籌情資與擬定事故行動計畫（計畫部長 P0）</strong></p>\n<ol>\n<li>\n<p><strong>建立替代執行方案</strong>：計畫部長須綜觀無人機威脅與避難群眾包圍的發展情勢，配合執行部（保安組）實施的「硬邊界防護」與「內部封鎖（Lockdown）」狀態，建立醫療持續運作的替代執行方案。</p>\n</li>\n<li>\n<p><strong>制定與發布\n    IAP</strong>：主持會議，並為每個執行週期建立與發布「事故行動計畫（IAP）」，確保全院各單位明確知悉當下的安全警戒級別、門禁管制狀態，以及醫療降載的最新策略。</p>\n</li>\n</ol>\n<p><strong>二、 威脅情資分析與家屬安撫（狀況分析組 P2）</strong>\n由護理部督導長擔任狀況分析小組長，負責處理與預測情勢：</p>\n<ol>\n<li>\n<p><strong>蒐集與預測情勢</strong>：密切蒐集外部可疑人車、無人機偵蒐及避難人潮的動態資訊。分析群眾是否有失控暴動的可能，並預測未來情勢發展，將總結報告提供給指揮官與發言官，作為指揮決策及對外發布新聞稿的依據。</p>\n</li>\n<li>\n<p><strong>病人動向追蹤與安撫</strong>：在此等危機下，院內極可能啟動防暴鎖定。轄下的「病人動向組」必須嚴密追蹤並確認院內病患在各安全隔離區的正確位置；同時，針對因外部威脅或醫院實施封鎖而感到恐慌的病患與家屬，給予正確的詢答與情緒安撫，穩定院內民心。</p>\n</li>\n</ol>\n<p><strong>三、 封鎖狀態下的極限資源盤點（資源控管組 P1）</strong>\n由護理部督導長擔任資源控管小組長：</p>\n<ol>\n<li>\n<p><strong>監控物資與消耗狀況</strong>：因應群眾包圍及出入管制，外部運補極可能中斷。資源控管小組須精確盤點院內關鍵物資、藥品及主要設備的供應情況與位置，重新精算在「孤島/封鎖狀態」下的消耗速率，以確保應變時有足夠的供應。</p>\n</li>\n<li>\n<p><strong>掌握防護人力</strong>：監控並掌握全院現有的員工數量（包含保全與支援防護人力），建立資源使用清單，確保執行部門有足夠的人力維持醫院的實體安全防線。</p>\n</li>\n</ol>\n<p><strong>四、 保全證據與法律紀錄（文件紀錄組 P3）</strong>\n由門診經理擔任文件紀錄小組長：</p>\n<ol>\n<li>\n<p><strong>記錄決策與事件過程</strong>：面對民眾要求庇護或物資，醫院在資源受限下可能必須下達「拒絕收容」的艱難決策。文件紀錄組必須妥善且詳實地蒐集並記錄指揮中心的決策過程與事件發展，以作為日後應對外部申訴、歷史記載或法律求償所需之參考資料。</p>\n</li>\n<li>\n<p><strong>協助蒐集偵蒐證據</strong>：記錄可疑無人機、不明人車出現的時間、地點與破壞行為等相關資訊，並妥善保存，以便後續提供給警政、軍方或國安調查單位作為鑑識與追查的佐證。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，此時醫院面臨極端的戰爭與空襲威脅，必須進行大面積的「空間降階防護」與「戰術空間轉換」。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>計畫部門（Planning\nSection）「計畫部長（P0）」</strong>。面對緊急防空疏散與 B1\n備援空間的開設，計畫部門必須迅速蒐集情資、精算資源、追蹤病人動向，並擬定應變行動計畫。</p>\n<p>計畫部門轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 統籌防空疏散情資與擬定行動計畫（計畫部長 P0）</strong>\n由護理部部長擔任：</p>\n<ol>\n<li>\n<p><strong>建立替代執行方案</strong>：綜觀空襲威脅與空間轉置的情勢，配合執行部將高樓層核心醫療轉移至地下室（B1）的行動，建立醫療持續運作的替代執行方案。</p>\n</li>\n<li>\n<p><strong>制定與發布 IAP</strong>：主持會議，並為防空疏散與 B1\n    備援空間啟用的執行週期，建立與發布「事故行動計畫（IAP）」。</p>\n</li>\n</ol>\n<p><strong>二、 空間轉置下的極限資源盤點（資源控管小組 P1）</strong>\n由護理部督導長擔任：</p>\n<ol>\n<li>\n<p><strong>監控物資與供應情況</strong>：監控所有員工、設施、物資及主要醫療設備在疏散過程中的供應情況與位置。</p>\n</li>\n<li>\n<p><strong>建立 B1 資源清單</strong>：針對即將啟用的 B1 五處功能區（檢傷行政區、臨時\n    ICU\n    病房、臨時開刀房、恢復室、輕症病房），建立所有資源使用情形的清單，確保防空避難與微型戰地醫院應變時，具備足夠的物資與設備供應。</p>\n</li>\n</ol>\n<p><strong>三、 防空疏散之情勢預測與病人動向追蹤（狀況分析小組 P2）</strong>\n由護理部督導長擔任：</p>\n<ol>\n<li>\n<p><strong>情勢預測與地圖準備</strong>：蒐集並分析空襲威脅之資訊總結報告，準備各棟別\n    B1 備援醫療空間（約翰、馬可、馬太、路加及韓偉大樓\n    B1）的逃生與疏散避難地圖，以供應變行動與動線管制所用。</p>\n</li>\n<li>\n<p><strong>病人動向嚴密追蹤</strong>：轄下的「病人動向組」必須在混亂的垂直疏散過程中，嚴密追蹤病患由高樓層轉移至\n    B1 各安全功能區的正確位置，確保無人遺漏。</p>\n</li>\n<li>\n<p><strong>家屬安撫與資訊發布</strong>：針對因防空警報與緊急疏散而恐慌的住院病患及家屬，給予正確的詢答與情緒安撫，並於機構內設立專區，定時（如每四小時）發布最新狀況報告。</p>\n</li>\n</ol>\n<p><strong>四、 疏散過程之病歷與文件保全（文件紀錄小組 P3）</strong> 由門診經理擔任：</p>\n<ol>\n<li>\n<p><strong>病歷與機密資料保全</strong>：在緊急疏散至 B1\n    備援空間的混亂過程中，必須妥善保存病人病歷及所有醫療文件資料的正確性與完整性。</p>\n</li>\n<li>\n<p><strong>記錄決策與事件過程</strong>：蒐集、記錄並保存防空疏散、病患轉移與備援空間啟用過程中的所有決策及事件發展資料，作為日後歷史記載、檢討改善或法律所需之參考佐證。</p>\n</li>\n</ol>\n<p><strong>五、 預劃空襲解除後之復原（歸建小組 P4）</strong> 由行政支援中心主任擔任：</p>\n<ol>\n<li><strong>規劃復原歸建準則</strong>：針對所有撤離至 B1\n    的人員及醫療資源，先行訂立並協調未來空襲威脅解除後，返回原樓層或進行復原歸建的指示及準則，並依據事件變化，適當縮減不必要的功能單位。</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭與空襲威脅，必須進行大面積的「空間降階防護」與「戰術空間轉換」。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>計畫部門（Planning\nSection）「計畫部長（P0）」</strong>。面對緊急防空疏散與 B1\n備援空間的開設，計畫部門必須迅速蒐集情資、精算資源、追蹤病人動向，並擬定應變行動計畫。</p>\n<p>計畫部門轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 統籌防空疏散情資與擬定行動計畫（計畫部長 P0）</strong>\n由護理部部長擔任：</p>\n<ol>\n<li>\n<p><strong>建立替代執行方案</strong>：綜觀空襲威脅與空間轉置的情勢，配合執行部將高樓層核心醫療轉移至地下室（B1）的行動，建立醫療持續運作的替代執行方案。</p>\n</li>\n<li>\n<p><strong>制定與發布 IAP</strong>：主持會議，並為防空疏散與 B1\n    備援空間啟用的執行週期，建立與發布「事故行動計畫（IAP）」。</p>\n</li>\n</ol>\n<p><strong>二、 空間轉置下的極限資源盤點（資源控管小組 P1）</strong>\n由護理部督導長擔任：</p>\n<ol>\n<li>\n<p><strong>監控物資與供應情況</strong>：監控所有員工、設施、物資及主要醫療設備在往\n    B1 疏散過程中的供應情況與位置。</p>\n</li>\n<li>\n<p><strong>建立 B1 資源清單</strong>：針對即將啟用的 B1 五處功能區（包含：約翰/馬可\n    B1 的檢傷行政區與臨時 ICU 病房、韓偉 B1 的臨時開刀房與恢復室、路加\n    B1\n    的輕症病房），建立所有資源使用情形的清單，確保防空避難與微型戰地醫院應變時，具備足夠的物資與設備供應。</p>\n</li>\n</ol>\n<p><strong>三、 防空疏散之情勢預測與病人動向追蹤（狀況分析小組 P2）</strong>\n由護理部督導長擔任：</p>\n<ol>\n<li>\n<p><strong>情勢預測與地圖準備</strong>：蒐集並分析空襲威脅之資訊總結報告，準備各棟別\n    B1 備援醫療空間（約翰、馬可、馬太、路加及韓偉大樓\n    B1）的逃生與疏散避難地圖，以供應變行動與動線管制所用。</p>\n</li>\n<li>\n<p><strong>病人動向嚴密追蹤</strong>：轄下的「病人動向組」必須在混亂的垂直疏散過程中，嚴密追蹤病患由高樓層轉移至\n    B1 各安全功能區的正確位置，確保無人遺漏。</p>\n</li>\n<li>\n<p><strong>家屬安撫與資訊發布</strong>：針對因防空警報與緊急疏散而恐慌的住院病患及家屬，給予正確的詢答與情緒安撫，並於機構內設立專區，定時（如每四小時）發布最新狀況報告，傳遞正確資訊。</p>\n</li>\n</ol>\n<p><strong>四、 疏散過程之病歷與文件保全（文件紀錄小組 P3）</strong> 由門診經理擔任：</p>\n<ol>\n<li>\n<p><strong>病歷與機密資料保全</strong>：在緊急疏散至 B1\n    備援空間的混亂過程中，必須妥善保存病人病歷及所有醫療文件資料的正確性與完整性。</p>\n</li>\n<li>\n<p><strong>記錄決策與事件過程</strong>：蒐集、記錄並保存防空疏散、病患轉移與備援空間啟用過程中的所有決策及事件發展資料，作為日後檔案分析、歷史記載、檢討改善或法律所需之參考佐證。</p>\n</li>\n</ol>\n<p><strong>五、 預劃空襲解除後之復原（歸建小組 P4）</strong> 由行政支援中心主任擔任：</p>\n<ol>\n<li>\n<p><strong>規劃復原歸建準則</strong>：針對所有撤離至 B1\n    的人員及醫療資源，先行訂立並協調未來空襲威脅解除後，返回原樓層或進行復原歸建的指示及準則。</p>\n</li>\n<li>\n<p><strong>適當縮編</strong>：依據戰火或空襲事件的變化，適當地將不必要的地下室功能單位縮減，以利資源集中。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨大量傷患（MCI）與核心醫療資源的極限負荷。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>計畫部門（Planning\nSection）「計畫部長（P0）」</strong>。其核心任務是迅速蒐集災情資訊、精算與調度全院醫護人力、嚴密追蹤大量傷患動向，並擬定事故行動計畫（IAP）。</p>\n<p>計畫部門及其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 確立戰略與發布事故行動計畫（計畫部長 P0）</strong> 由護理部部長擔任：</p>\n<ol>\n<li>\n<p><strong>確立目標與召開會議</strong>：與指揮官研商，確立大量戰傷病患處理的目標與執行週期。籌備並召集指揮幕僚與各組長召開行動計畫會議。</p>\n</li>\n<li>\n<p><strong>擬定與發布 IAP</strong>：擬妥「事故行動計畫（Incident Action\n    Plan）」並分發給四大部門執行。</p>\n</li>\n<li>\n<p><strong>情報整合</strong>：與後勤部長、待命區管理者密切聯繫，精確掌握全院現有的人力、物資情報，並定期向指揮官呈報最新消息與計畫更新。</p>\n</li>\n</ol>\n<p><strong>二、 醫護人力調配與資源控管（資源控管小組 P1）</strong> 由護理部督導長擔任：</p>\n<ol>\n<li>\n<p><strong>精算與調配人力資源</strong>：面對急診、手術與加護病房暴增的需求，必須與狀況分析小組、各醫療部門及後勤部共同評估，精確分派與調度全院醫護人力及物資。</p>\n</li>\n<li>\n<p><strong>掌握資源動態</strong>：與聯絡官及後勤部合作，隨時掌握各項急救資源（如病床、儀器）的數量、分佈與用途資訊，並維持資料的完整與即時更新。</p>\n</li>\n</ol>\n<p><strong>三、 設立情報專區與追蹤病人動向（狀況分析小組 P2）</strong>\n由護理部督導長擔任：</p>\n<ol>\n<li>\n<p><strong>情報發布</strong>：在機構內部設立情報專區，指派人員記錄院際與外部聯繫內容，每四小時發布一次最新狀況報告，傳遞正確的戰情與傷亡資訊。</p>\n</li>\n<li>\n<p><strong>家屬詢答與安撫</strong>：轄下之「病人動向組」須針對大量湧入的焦急家屬提供詢答，並進行情緒安撫，防範急診或大廳秩序失控。</p>\n</li>\n</ol>\n<p><strong>四、 前線掛號與傷患名單彙整（文件紀錄小組 P3）</strong>\n由門診經理（或醫療業務室主任）擔任，在大量傷患湧入時，此小組必須直接投入前線：</p>\n<ol>\n<li>\n<p><strong>急診現場掛號</strong>：立即派員至急診室現場進行緊急掛號，主動協助混亂中的傷病患填寫基本資料（姓名、病歷號、身分證號碼等）。</p>\n</li>\n<li>\n<p><strong>動向登錄與資訊交流</strong>：將所有湧入傷患的資料及去向（如進入重傷區、臨時開刀房或留觀區）進行彙整與登錄。向急診護理師組長報告，確保各區訊息傳遞正確可靠。</p>\n</li>\n<li>\n<p><strong>協助緊急住院</strong>：協助戰傷病患辦理快速住院手續，並張貼住院名單，以利家屬查詢與後續處置。</p>\n</li>\n</ol>\n<p><strong>五、 預劃復原與歸建準則（歸建小組 P4）</strong> 由行政支援中心主任擔任：</p>\n<ol>\n<li>\n<p><strong>規劃復原計畫</strong>：在大量傷患搶救的同時，先行訂立並協調未來當傷患潮減退、危機解除後的復原與歸建指示及準則。</p>\n</li>\n<li>\n<p><strong>適當縮編</strong>：依據事件的變化與醫療降載的情況，適當地將不必要的功能單位縮減，以利將資源最大化集中於戰傷搶救。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>在 HICS（醫院事故指揮系統）架構下，<strong>計畫部門（Planning\nSection）</strong>作為醫院的大腦與情報中樞，負責收集、評估並傳遞所有災情資訊，維持情資看板，並制定事故行動計畫（IAP）。</p>\n<p>面對震動、電力瞬斷、漏水與通訊中斷等複合型基礎設施受損危機，計畫部門由護理部部長擔任<strong>「計畫部長（P0）」</strong>，其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 統籌災情情報與建立替代執行方案（計畫部長 P0）</strong></p>\n<ol>\n<li>\n<p><strong>建立替代方案與\n    IAP</strong>：計畫部長須綜觀漏水、停電、空調異常與通訊中斷等災情資訊，與指揮官研商建立替代執行方案，並為每個運作週期建立與發布「事故行動計畫（IAP）」,,。</p>\n</li>\n<li>\n<p><strong>指揮通訊降級應變</strong>：面對戰火波及或設備異常導致的斷網斷訊危機，計畫部須主導全院的「通訊韌性與紙本降級作業」,。</p>\n</li>\n</ol>\n<p><strong>二、 啟動「紙本降級（Downtime）」與傳令兵機制</strong>\n大連院區的醫療運作高度依賴資訊系統，若遭遇通訊中斷或停電當機，計畫部門須採取以下極限措施：</p>\n<ol>\n<li>\n<p><strong>宣告紙本降級模式</strong>：若內部伺服器或網路癱瘓，透過可用之備援通訊正式宣告全院進入「Downtime\n    紙本降級極限模式」,。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：指示各單位砸破封條，取出預先印製的「當機緊急箱（Downtime\n    Box）」。全面改用三聯式紙本病歷、手寫處方箋、紙本檢傷單與每日離線列印的最新住院名單來維持醫療運作,。</p>\n</li>\n<li>\n<p><strong>啟動傳令兵（Runner）制度</strong>：在電信通訊與網路中斷下，啟動最抗干擾的「傳令兵制度」。指定熟悉院區動線的行政人員或志工以徒步方式在各樓層與指揮所間穿梭，採用嚴格的「口令覆誦」與「簽收簿」方式，精準遞送緊急醫囑、檢驗報告與災情報告,。</p>\n</li>\n<li>\n<p><strong>架設異質性備援通訊</strong>：配合架設低軌衛星設備與使用獨立頻段的無線電（UHF/VHF），維持指揮中心與各樓層間的微弱但關鍵的對外與對內連線,。</p>\n</li>\n</ol>\n<p><strong>三、 資源控管與災情情資發布（資源控管 P1 / 狀況分析 P2）</strong></p>\n<ol>\n<li>\n<p><strong>資源盤點與監控</strong>：資源控管小組（P1）須嚴密監控在停電與設施受損下，所有員工、設施、物資與主要設備（如備用電源、手電筒）的供應情況與位置，確保應變時有足夠供應，並建立清單,。</p>\n</li>\n<li>\n<p><strong>災情分析與定時通報</strong>：狀況分析小組（P2）負責蒐集並處理基礎設施受損（如電梯停用受困、空調失效範圍）的資訊總結報告，預測未來情勢發展。在機構內部設立情報專區，每四小時發布一次最新狀況報告,,。</p>\n</li>\n<li>\n<p><strong>確保資料備份安全</strong>：在電力與系統異常期間，狀況分析小組須與資訊持續運作組及資訊室合作，確保現有資料都有備份與適當保存，並維護資訊安全（機密性、完整性、可用性）。</p>\n</li>\n</ol>\n<p><strong>四、 病人動向追蹤與病歷保存（文件紀錄小組 P3）</strong></p>\n<ol>\n<li>\n<p><strong>追蹤疏散動向</strong>：若漏水、消防警報或建物受損導致必須執行病患疏散，文件紀錄小組須啟動「撤離時病人追蹤管理機制」，確保在混亂與無電腦系統的狀態下，正確掌握病人去向與動向,。</p>\n</li>\n<li>\n<p><strong>保全病歷與文件</strong>：在停電與當機期間，妥善保存病人病歷及所有文件資料的正確性及完整性，並適時記錄與保存所有事件過程資料，作為日後復原分析與法律參考,。</p>\n</li>\n</ol>\n<p><strong>五、 預劃設施復原與歸建（歸建小組 P4）</strong></p>\n<ol>\n<li>\n<p><strong>擬定復原準則</strong>：歸建小組須針對所有人員及資源，預先訂立並協調水電、空調與通訊搶修完成後的復原與歸建指示及準則,。</p>\n</li>\n<li>\n<p><strong>組織縮編調整</strong>：隨著基礎設施逐步恢復運作，依據事件的變化與降載情況，適當地將不必要的應變功能單位縮減，引導醫院平穩回歸正常運作,。</p>\n</li>\n</ol>\n<p>工務室如何搶修受損的電力與漏水管線？</p>\n<p>資訊室如何啟動紙本降級與傳令兵機制？</p>\n<p>安全管制組如何執行電梯受困救援與疏散？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院瞬間面臨敵方實體攻擊、維生電力中斷以及極高爆炸風險的複合型毀滅性危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>計畫部門（Planning\nSection）</strong>作為醫院的「大腦與情報中樞」，必須在混亂與極度危險的狀態下迅速蒐集災情資訊、精算殘存資源，並擬定應急的替代行動方案。</p>\n<p>計畫部門由護理部部長擔任<strong>「計畫部長（P0）」</strong>，其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 統籌複合災情與擬定極限事故行動計畫（計畫部長 P0）</strong></p>\n<ol>\n<li>\n<p><strong>綜整災情與建立替代方案</strong>：計畫部長須迅速綜觀無人機攻擊、發電機毀損與液氧外洩的全面情資，與指揮官及執行部門研商，建立醫療持續運作與防爆避難的替代執行方案。</p>\n</li>\n<li>\n<p><strong>制定與發布 IAP</strong>：為因應氧氣與電力中斷的極端狀態，主持應變會議，並為接下來的搶救與疏散週期建立並發布「事故行動計畫（IAP）」。</p>\n</li>\n</ol>\n<p><strong>二、 預測爆炸情勢與追蹤疏散動向（狀況分析小組 P2）</strong></p>\n<ol>\n<li>\n<p><strong>情勢預測與危害分析</strong>：狀況分析小組須蒐集並分析液態氧洩漏與火災可能引發的爆炸影響範圍，預測未來情勢可能之發展（包含敵方無人機二次攻擊的風險），準備相關地圖與情資，提供指揮官作為決定病房是否全面疏散的決策參考。</p>\n</li>\n<li>\n<p><strong>斷電下的病人動向追蹤</strong>：面對機電棟周邊病房可能進行的緊急水平或垂直疏散，轄下的「病人動向組」必須在停電與混亂的狀態下，嚴密進行病人動向追蹤。確保每位重症與一般病患轉移至安全區的資訊正確可靠，絕不遺漏任何人員於高爆炸風險區。</p>\n</li>\n<li>\n<p><strong>家屬詢答與安撫</strong>：針對因爆炸聲、停電與突發疏散而極度恐慌的病患及家屬，進行適當的詢答與情緒安撫，防範恐慌蔓延。</p>\n</li>\n</ol>\n<p><strong>三、 盤點極限維生物資與人力資源（資源控管小組 P1）</strong></p>\n<ol>\n<li>\n<p><strong>精算殘存維生資源</strong>：在主發電機受損與中央氧氣中斷的狀態下，資源控管小組須立即監控並盤點全院關鍵設備的供應情況。精算現有不斷電系統（UPS）電池的可用時間、備用氧氣鋼瓶數量，以及手電筒等緊急照明物資的確切位置與數量。</p>\n</li>\n<li>\n<p><strong>調控「人工維生」人力</strong>：配合執行部門的極限應變，盤點並調控可動用的醫護、行政人員或志工人力。若備用氧氣耗盡，須協助調度人員組成「捏球大隊」，以手動甦醒球人工接力維持重症病患呼吸。</p>\n</li>\n</ol>\n<p><strong>四、 記錄攻擊決策與病歷保全（文件紀錄小組 P3）</strong></p>\n<ol>\n<li>\n<p><strong>保全病歷資料</strong>：在停電及病患緊急疏散的過程中，妥善保存病人病歷及所有文件資料的正確性與完整性，確保醫療紀錄不因戰火混亂而遺失。</p>\n</li>\n<li>\n<p><strong>記錄災變過程與蒐證</strong>：詳細記錄無人機攻擊的時間、災損情況，以及指揮中心下達「極限負載卸除（Load Shedding）」或緊急疏散的各項決策過程。這些文件將作為日後國安單位調查攻擊事件、醫院復原分析與法律備查的重要佐證資料。</p>\n</li>\n</ol>\n<p><strong>五、 預劃災後搶修與歸建（歸建小組 P4）</strong></p>\n<ol>\n<li>\n<p><strong>預先擬定復原準則</strong>：在工務室與外部消防/防爆單位進行搶修與危害排除的同時，歸建小組須預先訂立未來警報解除、氧氣槽與發電機修復後的病患歸建指示及準則。</p>\n</li>\n<li>\n<p><strong>醫療量能重置規劃</strong>：評估機電棟受損程度，若原區域短時間內無法恢復安全運作，須協調規劃將該區病患永久轉移至其他安全棟別或啟動異地重置計畫。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當屏東基督教醫院（屏基）大連院區遭遇機電棟爆炸，並伴隨兩名工務巡檢同仁受重創（一人嚴重骨折大出血）的複合型危機時，<strong>HICS\n計畫部門 (Planning Section)</strong>\n將作為整場戰役的<strong>『情報大腦與決策雷達』</strong>。</p>\n<p>由於爆炸事件可能直接損毀電力、網路、水源與醫療氣體管線（對應全院停電、電腦當機、停水與斷氣危機），且傷患為本院執勤中的同工；計畫部門必須在<strong>計畫部長\nP0（護理部主任朱淑媛 /\n曾瑞慧督導）五大具體的情報綜整、資源控管、傷情追蹤與法效紀錄作為</strong>：</p>\n<p>一、 計畫部長 P0（護理部主任朱淑媛）：綜觀全局與「事故行動計畫\n(IAP)」制定</p>\n<ol>\n<li>\n<p><strong>開設計畫部情資看板（Status Board）</strong>： 部長與幕僚立即於前進指揮所（主要設於護理部一樓會議室；若高樓層受損，則轉移至恩慈大樓 B1 會議室）架設實體情資看板，動態更新全院「可用急性床/加護床」、「可用備援開刀房」、「急救人力」及「受傷人員去向」。</p>\n</li>\n<li>\n<p><strong>制定通訊癱瘓下之 Downtime（當機）行動計畫</strong>： 爆炸極易伴隨市電瞬斷或網路癱瘓。P0 須主導演習或實災下的「通訊韌性與紙本降級作業」，發布命令通知全院各單位砸開<strong>「當機緊急箱 (Downtime Box)」</strong>，全面改採三聯式紙本病歷、手寫醫囑與人工檢驗/影像流程。</p>\n</li>\n<li>\n<p><strong>撰擬與發布下一個運作週期 IAP</strong>： 針對爆炸損害（如發電機燃油存量、部分配電迴路毀損）及傷患救治，主持應變會議，為未來的 12 小時撰寫並發布「事故行動計畫（Incident Action Plan, IAP）」。</p>\n</li>\n</ol>\n<p>二、 資源控管小組長 P1（護理部督導長蕭麗萍）：重症量能監控與救命資源調配</p>\n<ol>\n<li>\n<p><strong>死守 B1 備援重症量能（床位控管）</strong>： P1 須立即清點並控管全院急重症床位。針對砸傷同仁骨折大出血、需要極速進行損傷控制手術（DCS）之傷情，優先保留並調撥地下一樓（B1）的備援重症空間： -   <strong>韓偉大樓 B1 腹膜透析室（臨時開刀房）</strong>。 -   <strong>韓偉大樓 B1 環保室（恢復室）</strong>。 -   <strong>約翰／馬可大樓 B1 資材組前方（臨時 ICU 病房）</strong>，以銜接術後維生支持。</p>\n</li>\n<li>\n<p><strong>救命藥材料物資控管（協同資材組）</strong>： 因應大出血搶救，清點並監控前線戰術止血帶（CAT）、骨內血管通路（IO 針）、止血紗布及林格氏液之安全庫存；隨時盤點馬太大樓 B1 藥庫之戰備藥品基準，並監控血庫 O 型血品存量，隨時與檢驗科準備啟動「走動式血庫」。</p>\n</li>\n<li>\n<p><strong>維生基礎設施資源監控</strong>： 隨時向工務室（設施運作組 O2）獲取緊急發電機柴油存量、中央醫療氣體與地下水塔供水數據，精算消耗速率，一旦逼近 72 小時法定維持臨界點，立即向指揮官與聯絡官發出警報，以利向外部 EOC 請求緊急運補。</p>\n</li>\n</ol>\n<p>三、 狀況分析小組長\nP2（護理部督導長李春綢）：傷同仁動向追蹤與環境危害災情分析</p>\n<ol>\n<li>\n<p><strong>受創同仁動向追蹤與家屬安撫</strong>： P2 下轄之「病人動向組」負責精確追蹤該兩名受砸傷工務巡檢同仁的救治狀態。使用紙本名冊確實記錄其檢傷分級（如掛上紅色重傷票、黃色中傷票）、手術進度及安置位置，並與社工室配合，在設於轉診中心的「家屬休息安撫區」中，對心急如焚的同仁家屬進行正確的說明與心理急救（PFA）。</p>\n</li>\n<li>\n<p><strong>爆炸災損與衍生危害分析</strong>： 密切蒐集並分析爆炸現場情資，包括「是否伴隨高壓電感電、瓦斯/氧氣管線洩漏、結構物二次坍塌」等衍生危害，繪製危害地圖提供給安全官（杜傳榮主任）與指揮官做中止危險行動或執行病房疏散之決策依據。</p>\n</li>\n<li>\n<p><strong>定期發布內部狀況報告</strong>： 每四小時發布一次最新災情與醫療量能總結報告，並將數據對接發言人（劉思源醫療副院長），作為反制外界認知戰謠言（如「醫院停診、遭敵襲癱瘓」）之客觀依據。</p>\n</li>\n</ol>\n<p>四、 文件紀錄小組長\nP3（門診經理吳瑞敏）：紙本病歷保全與重大「職業災害」證據留存</p>\n<ol>\n<li>\n<p><strong>當機狀態下之紙本病歷完整性保全</strong>： 爆炸可能導致全院資訊全黑。P3 須派員至急診紅區與臨時手術室，協助受傷同仁填寫基本資料、辦理手工記帳，並妥善保存兩名受創同仁的所有紙本病歷、檢傷紀錄與手術同意書，防範個資外洩或日後醫療糾紛。</p>\n</li>\n<li>\n<p><strong>重大「職業傷病與醫安事件」證據保全（重中之重）</strong>： 受傷人員為「工務巡檢人員」，此事件屬本院重大職業災害。P3 必須詳實、逐字且拍照記錄以下事件軌跡： -   爆炸發生的確切時間、地點。 -   工務值班人員的巡檢路線、安全防護裝備配戴狀況。 -   造成砸傷之掉落物種類、現場安全官評估紀錄。 -   現場急救、施用戰術止血帶及垂直疏散之具體經過與時間點。 -   這些第一手資料必須完整彙整，並在 <strong>3 日內</strong> 列冊呈報院長室；同時即刻移交給安全官 A2（職安室主任），以在法定時限內登錄於<strong>勞動部職業傷病系統</strong>，並作為後續勞保職災給付、團體保險與公共意外責任險理賠、以及勞檢機關調查之法定最重要佐證。</p>\n</li>\n</ol>\n<p>五、 歸建小組長 P4（行政支援中心主任曾士香）：災後復原重建與單位縮編預劃</p>\n<ol>\n<li>\n<p><strong>規劃災後復原歸建準則</strong>： 在火勢撲滅、機電系統搶修且安全官評估環境無虞後，P4 須先行訂立並協調搶修人員、臨時開設科室（如韓偉 B1 臨時手術室）返回原高樓層常規營運狀態之指示與準則。</p>\n</li>\n<li>\n<p><strong>應變功能單位適當縮編</strong>： 隨著外部供電恢復或發電機組搶修完成，配合 HICS 決策，適當地將臨時開設的地下功能單位縮編，引導醫院平穩回歸常態。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>當本院（屏東基督教醫院大連院區）遭遇兩名喬裝成外包人員的不明份子（特工/第五縱隊）意圖於「核心機房」與「頂樓水塔」投放燃燒劑與不明化學物質，企圖進行實體與毒化（CBRN）複合型破壞時：</p>\n<p>院方將立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>，並對全院發布<strong>「黑色訊號（暴力/維安）」</strong>與<strong>「黃色訊號（化災）」</strong>。在此維安與生化極端威脅下，<strong>HICS\n計畫部門（Planning\nSection）將扮演整場防禦戰的「情報大腦」與「決策雷達」</strong>。</p>\n<p>在<strong>計畫部長 P0（護理副院長兼護理部部長 朱淑媛 / 代理人\n曾瑞慧督導）</strong>的統籌下，計畫部門將協調轄下各專業小組，展開以下最抗干擾、高強度的情資綜整、資源監控、紙本降級（Downtime）管制與法效證據保全作為：</p>\n<p>一、 計畫部長 P0（護理部主任\n朱淑媛）：事故行動計畫（IAP）重構與紙本降級（Downtime）決策</p>\n<ol>\n<li>\n<p><strong>開設地下計畫中樞情資看板（Status Board）</strong>： -   計畫部長與幕僚迅速垂直轉移至地下避難核心區------<strong>恩慈大樓 B1 會議室（戰時指揮所）</strong>，架設實體情資白板。 -   透過 UHF/VHF 無線電與徒步傳令兵（Runner），橫向對接執行部機構運作主管（資訊室 O5）與安全管制主管（保安組 O4），即時於看板動態更新「水塔隔離進度」、「發電機/機房受損狀況」與「封鎖警戒狀態」。</p>\n</li>\n<li>\n<p><strong>制定「資訊全黑與斷水」之 Downtime 行動計畫</strong>： -   因應特工企圖縱火核心機房，資訊室為執行物理安全關機或遭受資安攻擊，P0 必須立即啟動 <strong>HIMSS 資訊系統當機（Downtime Procedure）標準作業規範</strong>，下達全院強制進入「紙本降級極限模式」。 -   下令全院各病房與急診砸開<strong>「當機緊急箱 (Downtime Box)」</strong>，全面改用手寫三聯式病歷與手動給藥。</p>\n</li>\n<li>\n<p><strong>制定與發布下一個運作週期 IAP</strong>： -   針對「院區實施內部封鎖（Lockdown）與供水分級配給」之極限狀態，主持應變會議，為未來的 12 小時撰寫並發布<strong>「事故行動計畫（Incident Action Plan, IAP）」</strong>，確保全院（特別是開刀房、ICU 與洗腎中心）的防護、用水與用藥步調一致。</p>\n</li>\n</ol>\n<p>二、 資源控管小組長 P1（護理部督導長 蕭麗萍 /\n曾瑞慧）：維生能源極限盤點與耗材監控</p>\n<ol>\n<li>\n<p><strong>水電氣「生命線」極限餘量精算</strong>： -   因頂樓水塔遭化學物質投毒威脅，P1 必須協同設施運作組（工務室 O2）盤點本院<strong>地下備用水源（戰備水塔）的儲水量</strong>。 -   精算在<strong>「水資源紅區管制」</strong>下（最乾淨水源僅供開刀房刷手、器械基本消毒及重症維生飲用；手動封閉全院一般洗手間、嚴禁盥洗、發放化學便器袋），地下水源能維持的核心醫療天數。 -   監控發電機儲油槽燃油消耗速率，以確保在極限「電力負載卸除（Load Shedding）」狀態下能維持 72 至 120 小時之運作。</p>\n</li>\n<li>\n<p><strong>防護裝備與解毒藥衛材庫存控管</strong>： -   密切監控前線保全、工務搶修人員與危害控制組（感管科 O3）所需的<strong>化學防護衣（PPE）</strong>、生化過濾口罩、金屬探測器等安防裝備數量。 -   對接任務支援組（資材組 L2），清點馬太 B1 藥庫中針對不明化學物質之可能解毒藥劑、沖洗液之安全庫存。</p>\n</li>\n</ol>\n<p>三、 狀況分析小組長 P2（護理部督導長 李春綢 /\n莊詩蘋）：生化火災空間危害分析與「無網病人動向追蹤」</p>\n<ol>\n<li>\n<p><strong>繪製「院區危害動態地圖」</strong>： -   P2 須根據安全官（職安室主任）與環保局毒災隊之偵檢情資，評估不明化學物質是否具揮發性、是否隨頂樓通風管線下滲，以及機房燃火之煙霧擴散方向。 -   於地下指揮所架設院區實體藍圖，<strong>繪製並動態更新「毒氣/火煙擴散警戒紅區」與「安全避難綠區」</strong>，提供給執行部長（陳志文）作為病房水平疏散或封鎖之決策雷達。</p>\n</li>\n<li>\n<p><strong>全院當機下之「病人動向追蹤」</strong>： -   在系統大當機、電子追蹤看板癱瘓的狀態下，P2 轄下之「病人動向組」立即切換為<strong>紙本手工登錄</strong>。 -   嚴密記錄因應威脅而實施緊急水平疏散之重症病患（如 ICU 推進至無窗核心內筒掩蔽，或垂直轉移至 B1 備援空間者）之確切人數、所在位置與手圈編號，確保在極度混亂中「無一人被遺漏於高風險區（如頂樓鄰近病房）」。</p>\n</li>\n</ol>\n<p>四、 文件紀錄小組長 P3（門診經理\n吳瑞敏）：敵特破壞與毒化威脅之「法效證據保全」（重中之重）</p>\n<p>此事件屬於<strong>「國家關鍵基礎設施遭遇恐怖滲透與實體破壞」</strong>的重大國安與司法事件。P3\n必須徹底拋棄平時的行政思維，實施最嚴格的<strong>法效證據與決策保全</strong>：</p>\n<ol>\n<li>\n<p><strong>詳實、逐字且拍照記錄「應變決策軌跡」</strong>： -   記錄不明份子闖入的確切時間點。 -   記錄指揮官（院長）下達「內部封鎖（Lockdown）」與「拒絕非醫療一般收容避難」之艱難決策過程與客觀科學依據，防範事後因拒絕收容引發之法律糾紛與行政申訴。 -   記錄工務、保全及一線醫檢同工執行「武裝制服特工、關閉水閥隔離、極限電力卸除」之具體時間與執行人。</p>\n</li>\n<li>\n<p><strong>保全實體安防與犯罪證據（協助司法調查）</strong>： -   協同安全管制組（保安組），將一線警衛隨身密錄器錄下之特工面貌、喬裝特特徵、被壓制過程之影音檔案，以及現場發現之燃燒劑罐體、不明化學物質容器等關鍵物理證物之發現地點與狀態，<strong>拍照、錄影、列冊並由專夾封存</strong>。 -   在警方、檢調與防爆鑑識單位進院後，由聯絡官協助將 P3 彙整之「第一手醫安與維安事件報告表」及影音證據完整移交，作為日後刑事起訴與國家安全調查之法定最重要佐證。</p>\n</li>\n<li>\n<p><strong>維護 Downtime 紙本病歷法效性</strong>： -   妥善管理、收集並保存當機期間前線產出的所有紙本病歷、手寫給藥單、手寫檢驗單等實體紙本。防範在斷電或混亂中發生個資外洩，並作為日後系統資料回補（Data Backfilling）與醫療糾紛防範的唯一憑證。</p>\n</li>\n</ol>\n<p>五、 歸建小組長 P4（行政支援中心主任\n曾士香）：環境毒物除污檢測與安全歸建規劃</p>\n<ol>\n<li>\n<p><strong>規劃空襲與毒化威脅解除後之環境安全檢測</strong>： -   在特工被制服、火勢撲滅後，P4 須主導制定<strong>「環境安全除污與檢測規範」</strong>。 -   配合危害控制主管（感管/放射），協同環境部毒災隊、衛生局等外部專家，必須確認：頂樓水塔水質經化驗完全無毒、核心機房通風管路無殘留化學揮發物、且全院用電網路完全恢復安全後，方可發布警報解除。</p>\n</li>\n<li>\n<p><strong>應變功能單位適當縮編與有序歸建</strong>： -   配合指揮官命令，逐步關閉 B1 的臨時醫療功能區（如轉移回常規 ICU、常規手術室）。 -   協助將紙本降級期間的醫療紀錄，交由會計小組與醫業課，指導全院進行有條不紊的電腦數據人工回補與歸檔。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨極其混亂的病患大批移動與轉院挑戰。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>計畫部門（Planning\nSection）「計畫部長（P0）」</strong>，其轄下各小組在此撤離行動中的具體因應作為如下：</p>\n<p><strong>一、 統籌疏散計畫與評估「最大疏散量能」（計畫部長 P0 / 狀況分析 P2）</strong></p>\n<ol>\n<li>\n<p><strong>擬定疏散與重置計畫</strong>：計畫部長須綜觀全局，與指揮官研商並建立各個運作週期的「事故行動計畫（IAP）」，確立病患撤離的先後順序與替代執行方案。</p>\n</li>\n<li>\n<p><strong>評估疏散能量</strong>：面對執行部門（O組）依據「反向檢傷」分類出的高度照護、一般住院與可返家病人名單，<strong>狀況分析小組（P2）</strong>必須精算並評估在現有固定工作人員情況下，醫院的「最大疏散病人數量」，並交由指揮官統籌分配撤離與運輸資源。</p>\n</li>\n</ol>\n<p><strong>二、 維護情資看板與發布狀況報告（狀況分析 P2）</strong></p>\n<ol>\n<li>\n<p><strong>情資看板（Status\n    Board）維護</strong>：在撤離過程中，狀況分析小組須隨時更新並掌控全院的「待轉送傷患數」、「已清空/可用病床數」以及「醫護人力數」，為指揮官提供即時的決策數據。</p>\n</li>\n<li>\n<p><strong>定時戰情發布</strong>：在機構內部設立情報專區，每四小時發布一次最新狀況與疏散進度總結報告，並預測未來情勢發展。</p>\n</li>\n</ol>\n<p><strong>三、 啟動「撤離時病人追蹤管理機制」（資源控管 P1 / 狀況分析 P2）</strong></p>\n<ol>\n<li>\n<p><strong>病患動向精準追蹤</strong>：一旦啟動疏散與重置機制，資源控管小組（P1）與狀況分析小組下的「病人動向組」必須立即啟動<strong>「撤離時病人追蹤管理機制」</strong>。</p>\n</li>\n<li>\n<p><strong>確認接收與重置</strong>：負責協調並記錄每位病患的去向（如：提早返家、下轉長照機構、或轉送至聯防醫院）。確認病人確實完成轉院重置，確保動向資訊在各區傳遞正確可靠。</p>\n</li>\n<li>\n<p><strong>家屬詢答與資訊對接</strong>：掌握正確的病患疏散名單與去向後，協助社工室進行病人家屬的詢答、通知與安撫工作，避免混亂中發生家屬找不到病患的恐慌。</p>\n</li>\n</ol>\n<p><strong>四、 保全「病歷與醫療文件」隨病患轉移（文件紀錄 P3）</strong>\n由門診經理與資源發展中心人員組成的<strong>文件紀錄小組（P3）</strong>，在撤離行動中肩負醫療資訊不中斷的重任：</p>\n<ol>\n<li>\n<p><strong>醫療文件打包與隨行</strong>：在高度照護或一般住院病人移出與轉院時，必須統籌並確認病人的「轉診單、病歷摘要、藥物治療紀錄及檢驗報告」等相關物質，確實與病患搭配並隨車轉送至接收醫院，確保接收端的醫療照護能無縫接軌。</p>\n</li>\n<li>\n<p><strong>保全歷史紀錄</strong>：妥善保存留院病人的病歷及所有文件資料的完整性，並蒐集、記錄撤離事件的過程資料，作為日後復原分析與法律備查所需。</p>\n</li>\n</ol>\n<p><strong>五、 監控撤離所需之關鍵資源（資源控管 P1）</strong>\n由護理部督導長擔任組長的資源控管小組（P1），須嚴密監控執行撤離行動時所有員工、設施、物資（如軟擔架、輪椅、氧氣鋼瓶）及救護車輛的供應情況與位置。建立資源使用清單，確保疏散過程中後勤支援不斷鏈。</p>\n<p>分級撤離時，高度照護病人的轉運載具有何特殊要求？</p>\n<p>醫務部如何執行「反向檢傷」以極速清空病床空間？</p>\n<p>撤離過程中若通訊中斷，計畫部如何確保病人動向追蹤？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認醫院所在區域即將編入「主戰區」，並下達進行醫療核心能量的預防性撤離（HICS\n第三階段：全面撤離與量能重置）指令時：</p>\n<p>本院 <strong>HICS 計畫部門（Planning\nSection）將作為整場撤離戰役的「情報大腦」與「決策雷達」</strong>。在<strong>計畫部長\nP0（護理部部長 朱淑媛 / 代理人\n曾瑞慧督導）五大核心角色的具體生存因應與撤離重置作為</strong>：</p>\n<p>一、 計畫部長 P0（護理部部長\n朱淑媛）：重構「預防性撤離事故行動計畫（IAP）」</p>\n<p>計畫部長須迅速進駐地下避難核心區（恩慈大樓 B1 會議室或 B2\n戰時指揮所），展開決策：</p>\n<ol>\n<li>\n<p><strong>確立撤離處理目標與執行週期</strong>：計畫部長立即與事故指揮官（院長）研商，因應戰火迫近之時效限制，確立以「病患安全零傷亡、核心醫藥不資敵、目標醫院無縫對接」為最高處理目標，並以 <strong>2 至 4 小時</strong> 為緊急執行週期召開應變會議。</p>\n</li>\n<li>\n<p><strong>制定並發布「全面撤離與量能重置 IAP」</strong>：迅速籌備並擬妥戰時<strong>「事故行動計畫（Incident Action Plan, IAP）」</strong>，內容必須明確律定：安全警戒級別、各科別與病房垂直/水平撤離動線、簽證車輛與隨行維生裝備配給、以及與外部聯防醫院（屏醫、寶建、安泰、屏榮）的點對點對接策略，並分發給四大部執行。</p>\n</li>\n<li>\n<p><strong>橫向控管資源情資</strong>：與後勤部長（總務部長 許慧莉）及執行部門待命區管理者（吳明容組長）保持無線電或傳令兵暢通聯繫，以確保所轄小組掌握的人力、物資及車輛情報百分之百正確可靠。</p>\n</li>\n</ol>\n<p>二、 資源控管小組長 P1（護理部督導長 李春綢 /\n蕭麗萍）：執行「醫事人員撤離功能編組 A」</p>\n<p>資源控管組是維持人力與物資流動的核心：</p>\n<ol>\n<li>\n<p><strong>編組「隨車持續照護功能編組 A」</strong>： -   資源控管小組必須與執行部（醫療照護主管 O1）配合，打破科室建制，將院內現有的醫師、護理師及專科醫檢/藥事人員詳細造冊，建立<strong>「醫事隨車撤離功能編組 A（隨車醫護）」</strong>與「暫時留守醫事編組」。 -   明確調配重症監護、外科手術、麻醉及急診專業人員隨同重症病患後撤；一般內科、常規護理人員則預劃轉至具照護功能之臨時急救站支援。</p>\n</li>\n<li>\n<p><strong>盤點並精算撤離所需之關鍵資源</strong>： -   嚴密清點、監控全院可攜式維生設備（如可攜式蓄電池呼吸器、床邊生理監視器、點滴幫浦）及關鍵耗材（如隨車用小氧氣筒、軟擔架、樓梯疏散滑墊）的供應情況與即時位置，建立實體資源清單。 -   將資源數據呈報指揮官與聯絡官，作為向縣市聯合應變中心（LJEOC）請求救護車輛與外部交通資源、簽證物資運補的科學化量化依據。</p>\n</li>\n</ol>\n<p>三、 狀況分析小組長 P2（護理部督導長 莊詩蘋）：精算疏散量能與執行「A-B\n戰術配對」</p>\n<p>狀況分析組（含病人動向組）是確保「病人一個都不能少」的防線：</p>\n<ol>\n<li>\n<p><strong>精算並評估「最大疏散病人數量」</strong>：根據現有固定護理同工與可用之院內 4 輛救護車、4 輛 15 人座中巴、6 輛行政車（及外部支援之 2 輛救護車與 LJEOC 簽證大眾載具），精算本院於指定時限內能安全撤離的「最大疏散病人數量」，回報指揮官做資源统籌。</p>\n</li>\n<li>\n<p><strong>落實病人「複雜度分組 B」與「A-B 戰術配對」</strong>： -   配合一線主治醫師之「反向檢傷（Reverse Triage）」分類，狀況分析小組將住院與急診病患依據病情嚴重度精準造冊，進行<strong>「需撤離病人分組 B」</strong>。 -   迅速實施<strong>「A（醫護）與 B（病人）一對一配對」</strong>：指派組別 A 的主治醫師與專責護理師，隨車照護分組 B 的重症/危急病患，確保病患在垂直疏散（5人一組人力垂直轉運）及車輛轉運途中，均能獲得連續性的醫療持續照護。</p>\n</li>\n<li>\n<p><strong>暴力啟動「撤離時病人追蹤管理機制」</strong>： -   系統大當機或斷網時，狀況分析組立即啟用最抗干擾的紙本病人動向登記。 -   指派專人於三大轉運區（急診室大門救護車專區、恩慈大樓旁私人車專區、門診大廳大眾接駁車專區），<strong>實體登記每位病人的手圈編號、姓名、上了哪一輛車、車牌號碼、隨車隨行醫護姓名、以及轉送之合作接收醫院名稱</strong>。 -   每四小時向地下指揮所及發言人更新狀況，並對接社工室，負責焦慮病人家屬的準確詢答與情緒安撫，防範恐慌引發暴動。</p>\n</li>\n</ol>\n<p>四、 文件紀錄小組長 P3（門診經理\n吳瑞敏）：死守「醫療紀錄、用藥處方隨車隨行」</p>\n<p>文件紀錄組是保障病患醫療法效權利與資訊連續性的生命線：</p>\n<ol>\n<li>\n<p><strong>死守「病歷與醫療文件」隨病人搭配轉移</strong>： -   病患上車前，P3 須督導病房書記與護理同工，將每位病人原有的<strong>實體手寫「轉診單、紙本轉院病歷摘要、手寫藥物治療紀錄與用藥處方箋」進行防潮、防水夾鏈袋打包</strong>。 -   嚴格執行上車查驗，<strong>確保夾鏈袋病歷確實隨救護車與擔架搭配轉移</strong>，並詳實記錄「病歷是否隨同運送」，防範病患抵達接收醫院（如屏醫、寶建、安泰）時因資訊斷鏈造成致命的給藥或手術錯誤。</p>\n</li>\n<li>\n<p><strong>保全「撤離應變與反資敵決策軌跡」</strong>： -   妥善保存、收集當機與撤離期間產生的所有紙本 Downtime 病歷、手工欠繳單及轉診簽收簿。 -   詳實記錄撤離期間指揮官（院長）下達之所有戰略決策，特別是執行部針對無法搬運之大型高階設備（如多階 CT、高階 MRI、中央洗腎機）實施手動斷電、物理鎖固及關鍵晶片拆卸等<strong>「反資敵（Denial of Assets）」</strong>決策的時間與執行細節，作為日後災損分析與法律免責的唯一關鍵憑證。</p>\n</li>\n</ol>\n<p>五、 歸建小組長 P4（行政支援中心主任\n曾士香）：預劃戰火解除後之復原與有序歸建</p>\n<p>歸建組主導撤離任務的最後收尾與未來重建：</p>\n<ol>\n<li>\n<p><strong>先行訂立「復原與歸建指示及準則」</strong>： -   在主院區核心能量實施預防性撤離的同時，P4 必須先行與衛生局、接收端醫院完成協調，草擬未來主戰區威脅解除（或警報解除）後，醫護團隊攜帶設備、病患<strong>有序返回大連主院區歸建</strong>的流程與指示。</p>\n</li>\n<li>\n<p><strong>動態執行「應變功能單位縮編」</strong>： -   隨著病患波次上車並安全後撤，P4 協助指揮部長與執行部，依據留在主院區的人員與病患殘存量，<strong>動態、適當地將不必要的功能單位進行縮編與人員下線管制</strong>，減少暴露在主戰區的高風險人力，保存核心戰力。 -   對撤離至接收醫院本院醫護（編組 A）進行整合追蹤，隨時準備於重置醫療點重啟開診服務。</p>\n</li>\n</ol>"}]}, {"role": "後勤部門（Logistics Section）", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，接獲主管機關進入戰時醫療整備並限時回報量能的指令後，<strong>後勤部（Logistics\nSection）</strong>在HICS（醫院事故指揮系統）中扮演維持醫院續戰力、資源調度與物資補給的關鍵命脈。其具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌「後勤部」指揮權</strong></p>\n<ol>\n<li>\n<p><strong>成立後勤部</strong>：由總務部部長擔任<strong>「後勤部長（L0）」</strong>，負責管理並參與應變行動計畫中所有維持服務及事件所需支援相關設備、物資、器材及人力之調度。</p>\n</li>\n<li>\n<p><strong>指揮轄下編組</strong>：後勤部長須立即召集轄下的<strong>「勤務組（L1）」</strong>與<strong>「任務支援組（L2）」</strong>，針對主管機關要求回報的各項物資與後勤量能展開限時盤點。</p>\n</li>\n</ol>\n<p><strong>二、 執行限時量能盤點（救護車、血液、藥材與維生物資）</strong>\n針對主管機關所要求回報的特定後勤量能，後勤部須打破平時常規，迅速產出精確數據：</p>\n<ol>\n<li>\n<p><strong>救護車與運輸量能</strong>：由轄下的<strong>勤務組</strong>（醫勤室、運輸組）負責評估並盤點院內現有之救護車數量、行政運輸車輛及駕駛人力，協調內部和外部之調度資訊。</p>\n</li>\n<li>\n<p><strong>血液與藥材量能</strong>：由轄下的<strong>任務支援組</strong>（資材組、藥劑科、血庫）迅速盤點現有戰備藥品、醫療耗材、急救器械與血庫各血型存量。</p>\n</li>\n<li>\n<p><strong>建立72小時儲備清冊</strong>：後勤部必須評估戰時物資消耗速率，盤點並建立<strong>「物資儲備清冊、藥品耗材清單及膳食飲水備援資料」</strong>，確保在戰災孤島效應下，醫院具備<strong>至少維持72小時</strong>的後勤維生量能。</p>\n</li>\n</ol>\n<p><strong>三、 跨部對接數據與提出外部支援需求</strong></p>\n<ol>\n<li>\n<p><strong>提交回報數據</strong>：後勤部完成盤點後，須將「救護車、血液、藥材」等精確量能數據，迅速提交給計畫部（資源控管組）與統籌呈報組（危管會），以確保醫院能於時限內向衛生主管機關完成量能初報與續報。</p>\n</li>\n<li>\n<p><strong>請求外部支援</strong>：若盤點發現戰略物資、血液或運輸量能存在缺口，後勤部長須透過聯絡官或行政/財務部，緊急向衛生局、高雄捐血中心、區域聯防醫院或協力廠商提出緊急調撥與支援請求。</p>\n</li>\n</ol>\n<p><strong>四、 啟動戰時物流機制（推拉式物流與走動式血庫）</strong>\n因應戰時醫療整備，後勤部須同步啟動極限物資供應計畫：</p>\n<ol>\n<li>\n<p><strong>推拉式物流與「盲派（Push）」</strong>：顛覆平時的「及時供貨（JIT）」與申請領用流程，後勤部需將預先打包好的「戰傷急救箱（Trauma\n    Kits）」（含戰術止血帶、骨針、抗生素、輸液等），在不待前線表單申請的情況下，直接主動<strong>「盲派（Push）」</strong>配送至急診紅區與臨時開刀房門口，確保前線醫護隨手可得救命物資。</p>\n</li>\n<li>\n<p><strong>走動式血庫（Walking Blood\n    Bank）整備</strong>：血庫須整備大量輸血規範（MTP）。若面臨外部血液運補中斷且庫存耗盡的絕境，需準備啟動「走動式血庫」，緊急召集符合血型條件的院內員工現場抽血、快篩，並直接送入手術室輸血搶救。</p>\n</li>\n</ol>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述的複合性危機（民眾恐慌湧入、搶購慢性病藥物、交通事故傷患及家屬急迫需求），在\nHICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）</strong>扮演著穩定醫療物資、確保前線搶救不中斷及支援空間開設的「生命線」角色。</p>\n<p>由總務部部長擔任的「後勤部長（L0）」將統籌轄下各組，其具體因應作為如下：</p>\n<p><strong>一、 管制藥品庫存與啟動戰傷「盲派」補給（任務支援組）</strong></p>\n<ol>\n<li>\n<p><strong>慢性病藥物庫存管控：</strong>\n    面對民眾的恐慌搶藥潮，任務支援組（藥劑科、資材組）必須嚴格盤點並管制院內慢性病藥品與戰備藥物的庫存。配合指揮官規範，將慢性病藥品精準配發至指定分流點，避免資源遭非理性耗竭。</p>\n</li>\n<li>\n<p><strong>交通事故傷患之「盲派（Push）」物流：</strong>\n    針對交通事故湧入的大量傷患，必須顛覆平時的申請領用程序。後勤部需主動將預先準備好的「戰傷急救箱」（含止血帶、紗布、輸液、抗生素等）及急救耗材，以「盲派（Push）」方式直接推至急診紅區，確保前線醫護不待開單申請即可隨手取得救命物資。</p>\n</li>\n<li>\n<p><strong>緊急調度醫療載具：</strong>\n    勤務主管須迅速向急診前線補充、集中所需之推床、輪椅、擔架等運輸設備，以應對大量傷患與緊急病患的移動需求。</p>\n</li>\n</ol>\n<p><strong>二、 支援戶外分流站與家屬安置區之硬體開設（設施與勤務支援）</strong></p>\n<ol>\n<li>\n<p><strong>開設臨時空間：</strong>\n    配合執行部（醫療照護組）實施極限分流的決策，後勤部須迅速調度物資與工務人力，搬離大廳座椅或於院區外圍搭建帳篷，並拉設臨時電源與照明。</p>\n</li>\n<li>\n<p><strong>硬體支援分流：</strong>\n    協助設立「戶外慢性病處方籤領藥區」及「家屬接待區」，透過實體空間的快速轉換，協助將單純領藥與查詢撤離資訊的恐慌人群，有效阻絕於急診搶救區之外。</p>\n</li>\n</ol>\n<p><strong>三、 確保救護車運輸動線與車輛調度（勤務組）</strong></p>\n<ol>\n<li>\n<p><strong>建立救護車運輸區：</strong>\n    勤務主管（醫勤室、運輸組）須與執行部之安全管制主管密切協調，明確劃定並建立專屬的「救護車運輸區」，確保交通事故重症傷患的運送動線，絕對不被恐慌的群眾或違停車輛癱瘓。</p>\n</li>\n<li>\n<p><strong>備妥疏散與接駁車輛：</strong>\n    評估醫院應變所需之運輸工具，隨時備妥院內行政車輛及合作救護車。一旦醫療前線決定將現有病患提早出院或轉院以騰出病床，後勤部立即提供交通運輸支援。</p>\n</li>\n</ol>\n<p><strong>四、 確保前線醫護之防護與身心維生物資（勤務組 / 任務支援組）</strong></p>\n<ol>\n<li>\n<p><strong>防護與維生物資補給：</strong>\n    勤務組須評估並提供急診前線人員因應大量人潮所需的個人防護裝備（PPE）數量。同時，在混亂與高壓的應變期間，必須確保工作人員的飲水與膳食供應，維持醫療團隊的基本體力。</p>\n</li>\n<li>\n<p><strong>支援前線強制輪替與心理照護：</strong>\n    前線醫護面對暴增的傷患與家屬的施壓，極易產生體力耗竭與戰鬥疲勞。後勤部（任務支援主管）須關注執行部門人員的身心照顧，安排足夠的支援人力進行輪替，並配合「心理韌性特遣隊」，在員工庇護站提供必要的休息空間與心理除頻（Debriefing）支持。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息，且掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊/大當機）」，在\nHICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）</strong>是維持醫院「無網/紙本作業」運作與實體物資命脈的關鍵。</p>\n<p>由總務部部長擔任的「後勤部長（L0）」將統籌轄下編組，其具體因應作為如下：</p>\n<p><strong>一、 統籌後勤指揮與無網作業資源調度</strong></p>\n<ol>\n<li>\n<p><strong>接掌指揮權與評估需求</strong>：後勤部長負責管理並參與應變行動計畫中所有維持服務及事件所需支援相關設備、物資、器材及人力之調度。</p>\n</li>\n<li>\n<p><strong>配合紙本降級作業</strong>：面對系統延遲或癱瘓，後勤部須配合前線切換至「紙本降級（Downtime）」模式，隨時準備提供人工掛號、手寫處方與紙本病歷所需的行政耗材與支援人力。</p>\n</li>\n</ol>\n<p><strong>二、 啟動「盲派（Push）」物流與藥材管制（任務支援組）</strong> 面對藥局與\nHIS（醫療資訊）系統延遲，前線無法依循平時的電子系統開單或申請領用，任務支援主管（資材組長與藥劑科）須立即啟動極限補給機制：</p>\n<ol>\n<li>\n<p><strong>推拉式物流與盲派機制</strong>：顛覆平時「申請才領用（Pull）」的常規，後勤人員必須不待前線發出電子領料單，直接將預先打包好的物資與藥品（如戰傷急救箱、抗生素、輸液等），以主動「盲派（Push）」的方式推至急診紅區與開刀房門口，確保前線醫護伸手就能拿到救命物資。</p>\n</li>\n<li>\n<p><strong>戰略藥品與物資庫存管制</strong>：因應假訊息可能引發民眾恐慌與搶藥潮，藥劑科與資材組須立即盤點並嚴格管制院內戰略藥品（如抗生素、止痛麻醉藥、破傷風疫苗）與耗材的庫存量，避免資源遭到非理性耗竭。</p>\n</li>\n</ol>\n<p><strong>三、 建立備援通訊與支援「傳令兵」制度（勤務組）</strong>\n針對資通訊系統延遲、網路不穩甚至院內電話中斷的危機，勤務主管（醫勤室/事務組長）須確保院內指揮指令傳遞順暢：</p>\n<ol>\n<li>\n<p><strong>發配戰術通訊設備</strong>：評估醫院服務所需的通訊設備分配，緊急調度並發配獨立頻段的無線電（UHF/VHF對講機）給各樓層指揮官與前線單位，克服斷網危機以維持雙向通訊。</p>\n</li>\n<li>\n<p><strong>支援「傳令兵（Runner）」人力</strong>：在資訊癱瘓期間，勤務組與任務支援組需調派體能良好的行政人員、運輸工具或志工擔任「傳令兵」。以徒步方式穿梭於各樓層、急診與指揮所間，精準遞送紙本的緊急開刀醫囑、血液配對單與檢驗報告。</p>\n</li>\n</ol>\n<p><strong>四、 維持第一線人員體力與飲水膳食（勤務組 / 任務支援組）</strong>\n系統當機將導致所有掛號、批價、檢驗與給藥流程轉為耗時的人工作業，醫護與行政人員將面臨極大的體力消耗與病患家屬久候不滿的壓力：</p>\n<ol>\n<li>\n<p><strong>工作人員膳食與飲水供應</strong>：勤務主管須負責確保所有應變與值班工作人員的飲食及飲水供應，維持高壓無網作業下的員工體力。</p>\n</li>\n<li>\n<p><strong>員工身心照顧與人力調度</strong>：任務支援主管須關注執行部門人員的身心照顧，安排必要的人員輪替與人力資源辨識，避免員工因系統癱瘓的龐大業務量與假訊息帶來的群眾壓力而發生戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院的「數位神經系統」遭到惡意癱瘓，瞬間陷入「又盲又啞」的極端危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，雖然系統搶修與資安防禦是由執行部門的資訊室（機構運作主管\nO5）負責，但<strong>後勤部門（Logistics\nSection）</strong>是支撐全院在失去電腦輔助下，能順利切換為「純實體、全人工」運作的最重要骨幹。</p>\n<p>由總務部部長擔任的<strong>「後勤部長（L0）」</strong>將統籌轄下的<strong>「勤務組（L1）」</strong>與<strong>「任務支援組（L2）」</strong>，其具體因應作為如下：</p>\n<p><strong>一、 統籌後勤指揮，全力支援「紙本降級（Downtime）」作業（後勤部長\nL0）</strong>\n面對網路中斷與電子表單失效，後勤部長須立即指示轄下單位，將後勤運作模式從平時的「高度電子化依賴」切換為「純人工作業」。</p>\n<ul>\n<li><strong>支援實體表單與耗材</strong>：配合全院各護理站與急診砸破並啟用「當機緊急箱（Downtime Box）」，後勤部須確保紙本作業所需的各項行政耗材（如三聯式紙本病歷、手寫處方箋、條碼貼紙等）有充足的實體備品可供無限期使用。</li>\n</ul>\n<p><strong>二、 建構實體備援通訊與「傳令兵（Runner）」網路（勤務組 L1）</strong> 當 DDoS\n攻擊癱瘓內部網路與 VoIP\n網路電話時，醫院的常規通訊將被阻斷。勤務主管（醫勤室/事務組長）必須負責建立替代的實體與無線電通訊網：</p>\n<ul>\n<li>\n<p><strong>發配戰術通訊設備</strong>：立即檢查並調出院內所有備用的手持通訊設備。配發抗電磁干擾的 UHF/VHF 獨立頻段無線電對講機給各樓層指揮官、急診前線與搶修團隊，提供獨立的雙向通訊系統。</p>\n</li>\n<li>\n<p><strong>啟動實體「傳令兵（Runner）」制度</strong>：在電子醫囑與檢驗報告無法傳輸的狀況下，勤務組須與人事部門協調，將體能良好的行政人員或志工編組為「傳令兵」。讓他們穿上螢光反光背心、佩戴專屬臂章，以徒步衝刺方式在各樓層、急診與指揮所間穿梭。透過嚴格的「口令覆誦」與「簽收簿（Logbook）」，精準遞送緊急開刀醫囑、血液配對單與手寫檢驗報告，用「人力」取代「網路」。</p>\n</li>\n</ul>\n<p><strong>三、 顛覆常規，啟動戰略物資「盲派（Push）」物流（任務支援組 L2）</strong> 在\nHIS\n系統當機期間，前線醫師與護理師完全無法透過電腦開立領料單或藥單，平時依賴的「有申請才領用（Pull）」物流機制將徹底停擺。</p>\n<ul>\n<li>\n<p><strong>切換推拉式物流（Push-Pull Logistics）</strong>：任務支援主管（資材組長）與藥庫人員必須化被動為主動，啟動戰時物流邏輯。</p>\n</li>\n<li>\n<p><strong>主動推送救命物資</strong>：將預先打包好的「戰傷急救箱（Trauma Kits）」（內含止血帶、點滴、廣效抗生素等）及各項關鍵衛材，不待前線發出電子表單申請，直接以<strong>「盲派（Push）」</strong>的方式，主動用推車送至急診紅區與開刀房門口。確保前線醫護人員只要伸手就能拿到救命物資，維持搶救子彈不斷鏈。</p>\n</li>\n</ul>\n<p><strong>四、 維護高強度人工作業下的人員維生與身心照顧（勤務組 L1 / 任務支援組\nL2）</strong>\n系統大當機將導致所有掛號、批價、檢驗、給藥與病歷紀錄流程，轉為極度耗時且繁瑣的人工作業。醫護與行政人員（包含四處奔跑的傳令兵）將面臨極大的體力消耗，以及病患家屬因久候不滿所帶來的巨大精神壓力。</p>\n<ul>\n<li>\n<p><strong>強化飲水與膳食供應</strong>：勤務主管須負責確保所有投入「紙本降級」高壓作業與應變值班工作人員的飲食及飲水供應，維持醫療團隊與傳令人員的基本體力。</p>\n</li>\n<li>\n<p><strong>員工身心照顧與輪休</strong>：任務支援主管須關注執行部門人員的身心負荷，協助安排必要的人員輪替庇護。防範員工因系統癱瘓帶來的龐大業務量，以及可能伴隨的假訊息與群眾壓力，而發生戰鬥疲勞或心理崩潰。</p>\n</li>\n</ul>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，醫院面臨嚴峻的物資匱乏與「孤島效應」。在\nHICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）</strong>由總務部部長擔任後勤部長（L0），負責統籌維持醫療服務與事件所需的所有物資、器材、人力及運輸支援。</p>\n<p>後勤部門轄下各編組的具體因應作為如下：</p>\n<p><strong>一、 統籌資源接收與精算優先使用序（後勤部長 L0 / 勤務組 L1 /\n任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>確立物資分配優先序</strong>：面對各項維生物資配送延遲，後勤部（含採購室、資材組、營養室等）須精算藥品、血液、氧氣、膳食及耗材的消耗速率與現存缺口，並與指揮官確認資源的「優先使用順序」，將有限資源絕對集中於重症搶救。</p>\n</li>\n<li>\n<p><strong>簽證物資保管與外部協調</strong>：負責接收與保管任何突破交通阻礙運達的簽證物資與備品。若運輸完全中斷，須請縣市聯合應變指揮中心協調調度徵用車輛，支援血液與醫療物資的運送。</p>\n</li>\n</ol>\n<p><strong>二、 啟動戰略藥材的「盲派（Push）」物流（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>顛覆常規領用</strong>：在戰時或聯外交通阻斷的極端狀況下，平時「有申請才領用（Pull）」的物流系統將失效。任務支援主管（資材組長）與藥劑科必須採取<strong>「推拉式物流（Push-Pull\n    Logistics）」</strong>機制。</p>\n</li>\n<li>\n<p><strong>主動推進救命物資</strong>：將預先打包好的「戰傷急救箱（Trauma Kits /\n    Go-Kits）」（內含大量戰術止血帶、骨針、含止血劑紗布、廣效抗生素及麻醉鎮痛藥劑），不待前線發出需求，主動<strong>「盲派（Push）」</strong>推至急診紅區與開刀房門口，確保前線醫護伸手就能拿到救命物資。</p>\n</li>\n<li>\n<p><strong>嚴格庫存管制</strong>：盤點並嚴格管制現有之關鍵藥品與衛材庫存，避免資源被非理性耗竭。</p>\n</li>\n</ol>\n<p><strong>三、 血庫危機應變與啟動「走動式血庫」（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>活體血庫啟動</strong>：面對血液運補延遲且庫存瞬間見底的絕境，後勤部須配合檢驗科血庫，緊急啟動北約軍醫常用的<strong>「走動式血庫（Walking\n    Blood Bank）」</strong>計畫。</p>\n</li>\n<li>\n<p><strong>院內緊急抽血</strong>：依據預先建檔的院內員工與志工血型名冊，緊急召集符合條件的\n    O 型血同仁至指定安全區域。跳過繁瑣分離程序，現場抽取「全血（Whole\n    Blood）」並進行快篩，隨即由傳令兵極速送入開刀房或急診紅區搶救瀕死傷患。</p>\n</li>\n</ol>\n<p><strong>四、 維持人員飲水、膳食與身心照顧（勤務組 L1 / 任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>啟動膳食災難應變</strong>：勤務主管（醫勤室與營養室）須規劃並確保工作人員的飲水與膳食供應。若遇斷糧危機，第一優先協調本院便利商店（7-11）支援膳食供糧，或發放儲備之乾糧；若遇停水，則動用備用礦泉水或山泉水以解決膳食製備與飲用需求。</p>\n</li>\n<li>\n<p><strong>員工身心照顧</strong>：因交通受阻導致員工無法到勤換班，任務支援組須關注滯留前線執行部門人員的身心照顧與戰鬥疲勞，協調人事部門強制安排輪休，避免醫療團隊崩潰。</p>\n</li>\n</ol>\n<p><strong>五、 運輸工具與待命人力極限調度（勤務組 L1 / 任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>院內外交通運輸調度</strong>：針對病人轉送不確定性提高，勤務主管須評估並調度醫院服務所需之運輸工具（如現有之救護車及中巴），並協調外部車輛支援，以利在交通稍有恢復時能立即進行傷患後送。</p>\n</li>\n<li>\n<p><strong>待命區人力分配</strong>：將突破交通障礙抵達的員工或召募到的志工集中至待命區，依據前線（執行部）的實際需求，精準配送支援人力（如擔任搬運工或傳令兵）。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，醫院正面臨敵方滲透破壞威脅、群眾恐慌失控以及資源遭搶奪的極端危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）</strong>由總務部部長擔任後勤部長（L0），負責統籌維持醫療服務與事件所需的所有物資、器材、運輸及人力支援。面對外部威脅與避難人潮，後勤部門必須採取強勢的物資保衛與後勤支援行動，其轄下各組的具體因應作為如下：</p>\n<p><strong>一、 啟動物資防護與設立「戰略物資地下補給站」（任務支援組 L2）</strong>\n面對欲進入院區尋求物資的避難人潮，平時的庫存區極易成為搶奪目標。</p>\n<ol>\n<li>\n<p><strong>物資地下化與集中看管</strong>：任務支援主管（資材組長）必須立即將重要的醫療及非醫療設備、藥品與物資，移轉並集中儲存。配合空間轉換計畫，將地下停車場車輛強制淨空，劃定為「戰略物資地下補給站」，並請求安全管制組增派重兵看守，防範暴民搶奪或有心人士破壞。</p>\n</li>\n<li>\n<p><strong>切換推拉式物流防護</strong>：在保護戰略物資（如抗生素、止痛麻醉藥等）的前提下，維持「盲派（Push）」機制的整備，將「戰傷急救箱」安全且隱密地推送至急診與開刀房等核心醫療紅區，確保前線醫療量能不斷鏈。</p>\n</li>\n</ol>\n<p><strong>二、 支援「硬邊界」阻絕與運輸車輛調度（勤務組 L1）</strong>\n針對周邊不明人車與推擠的避難群眾，執行部（保安組）將實施封鎖 80%\n出入口的「硬邊界防護」。</p>\n<ol>\n<li>\n<p><strong>提供實體阻絕載具</strong>：勤務主管（醫勤室/事務組長）負責調度醫院現有的運輸工具。為支援出入口的物理封鎖，勤務組須配合調派院方工程車或大型運輸車輛橫停於非必要出入口，作為防衝撞的實體阻絕物。</p>\n</li>\n<li>\n<p><strong>確保救護運輸動線</strong>：在群眾包圍下，勤務組必須與保安人員密切協調，確保僅存的單一檢傷通道或專屬車道暢通，讓本院救護車或運補車輛能安全進出。</p>\n</li>\n</ol>\n<p><strong>三、 死守飲水、膳食與維生物資（勤務組 L1 / 後勤部長 L0）</strong></p>\n<ol>\n<li>\n<p><strong>拒絕非醫療物資釋出</strong>：面對社區避難人潮索求物資，後勤部長須貫徹指揮官「資源優先保留給急重症與核心醫療」的決策。嚴格管制院內現有的飲水、膳食與備品，防範資源被非醫療需求耗竭。</p>\n</li>\n<li>\n<p><strong>保障前線員工供糧</strong>：勤務組須確保院內工作人員及現有病患的飲食與飲水供應。在極端防護狀態下，將高熱量補給與熱食絕對優先供應給身處高壓搶救前線的醫護及保安人員。</p>\n</li>\n</ol>\n<p><strong>四、 嚴格執行人員辨識與待命區管制（後勤部長 L0 / 任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>防範第五縱隊滲透</strong>：針對可疑無人機與不明人車的偵蒐行為（可能為敵方特工或在地協力者），後勤部長必須嚴格落實「人力資源召募與辨識」。所有被召回的員工、支援人力或志工，必須經過極其嚴格的身分核對與配發專屬識別（如反光背心、臂章），杜絕偽裝者混入破壞伺服器或發電機等關鍵設施。</p>\n</li>\n<li>\n<p><strong>待命區安全管理</strong>：任務支援組須將經過辨識的支援人力集中於安全的待命區，依據前線（如檢傷區或防暴區）的需求，精準且安全地進行人力與物資的配送調度。</p>\n</li>\n</ol>\n<p><strong>五、 設立「安全庇護所」與員工身心照顧（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>建置絕對安全的休息區</strong>：面對群眾暴動壓力與外部武裝威脅，前線醫護人員極易面臨心理崩潰與生理耗竭。任務支援組負責執行部門人員的身心照顧。須於大連院區結構最安全、最深層的地下室區域，設立「員工專屬庇護站」。</p>\n</li>\n<li>\n<p><strong>提供防護與恢復環境</strong>：在庇護所內提供熱食、飲水、行軍床等後勤資源，並會同安全管制組實施嚴格門禁。確保強制輪替下班的醫護人員能擁有一個「聽不到哀嚎聲、看不到鮮血」的絕對安靜環境，以利其恢復體力並接受心理急救（PFA），維持長期的醫療戰鬥力。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，此時醫院面臨極端的戰爭威脅，防空疏散與空間地下化成為首要任務。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）「後勤部長（L0）」</strong>，轄下包含<strong>「勤務組（L1）」</strong>與<strong>「任務支援組（L2）」</strong>。後勤部門必須在防空警報發布的極短時間內，將維持醫療運作的「糧草、彈藥與通訊」全數轉移至安全的地下空間。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 統籌物資地下化與開設「B1 戰略物資補給站」（後勤部長 L0 /\n任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>緊急轉移重要物資</strong>：任務支援主管（資材組長）須立即取得並儲存所有重要的醫療及非醫療設備、物資與藥品，將其由高脆弱區域轉移至安全的地下室。</p>\n</li>\n<li>\n<p><strong>開設 B1\n    專屬補給點</strong>：依據院方備援空間規劃，確實於<strong>「約翰／馬可大樓 B1\n    資材室」</strong>開設後勤物資補給點；並於<strong>「馬太大樓 B1\n    藥庫」</strong>開設藥品補給、緊急用藥調度與配送支援區，以支撐微型戰地醫院的運作。</p>\n</li>\n</ol>\n<p><strong>二、 支援 B1 五大醫療功能區之衛材與血品供應（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>急救物資與藥品配送</strong>：任務支援組必須主動將急救耗材、戰備物資及藥品，分派並推進至剛開設的\n    B1 五處功能區（包含檢傷行政區、臨時 ICU\n    病房、臨時開刀房、恢復室及輕症病房），以確保前線醫療量能不斷鏈。</p>\n</li>\n<li>\n<p><strong>血液與無菌器械支援</strong>：協調血庫進行緊急用血支援；並聯絡維持於韓偉大樓\n    3F 的供應室，進行中央無菌器械的緊急調度與配送說明。</p>\n</li>\n</ol>\n<p><strong>三、 確保地下室備援通訊與運輸調度（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>建立地下通訊網</strong>：地下室極易發生訊號死角。勤務主管（醫勤室/事務組長）須檢查所有手持與備援通訊設備，評估並分配無線電頻道給進入\n    B1\n    各功能區的指揮官與醫護人員，提供獨立雙向通訊系統，確保防空避難期間的指揮通訊暢通。</p>\n</li>\n<li>\n<p><strong>運輸載具調度</strong>：調度院內輪椅、擔架與推床，並向資源控管小組請求支援人員，協助將重症病患、維生儀器及物資從高樓層垂直疏散至\n    B1 避難區。</p>\n</li>\n</ol>\n<p><strong>四、 維持地下避難期間之膳食與飲水供應（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>啟動緊急供膳</strong>：在人員與病患大量疏散至地下室與大廳避難區的混亂狀態下，勤務組（會同營養室）必須確保工作人員、避難病患及家屬的飲食與飲水供應。</p>\n</li>\n<li>\n<p><strong>戰備存糧動用</strong>：視狀況動用營養室儲備之 3 至 7\n    天緊急乾糧與飲水，穩定避難區的人心與員工體力。</p>\n</li>\n</ol>\n<p><strong>五、 設立庇護所與員工身心照顧（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>防空避難下的人力調度</strong>：評估並管理待命區的支援人力，依據各 B1\n    醫療功能區的需求進行精準配送。</p>\n</li>\n<li>\n<p><strong>設立員工休息區</strong>：在防空威脅的高壓環境下，任務支援組負責執行部門人員的身心照顧。需依計畫於指定安全區域（如建議的恩慈\n    2F 運動中心或安全的 B1\n    空間）設立人員休息及生活支援區，提供輪班、用餐、飲水及待命的庇護環境，防範戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，此時醫院面臨極端的戰爭威脅，必須在極短時間內將核心醫療量能轉移至地下室以進行「空間降階防護」。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）「後勤部長（L0）」</strong>，其核心任務是確保防空疏散期間「糧草、彈藥與通訊」能全數安全轉移並支撐地下微型戰地醫院的運作。</p>\n<p>後勤部門及其轄下「勤務組（L1）」與「任務支援組（L2）」的具體因應作為如下：</p>\n<p><strong>一、 開設 B1 戰略物資與藥品補給站（任務支援組 L2 / 後勤部長 L0）</strong></p>\n<ol>\n<li>\n<p><strong>物資地下化與配置</strong>：任務支援主管（資材組長）須立即將重要醫療及非醫療設備、藥品，由高脆弱區域轉移至地下室安全區。依據院方備援空間規劃，確實於<strong>「約翰／馬可大樓\n    B1 資材室」</strong>開設後勤物資補給點；並於<strong>「馬太大樓 B1\n    藥庫」</strong>開設藥品補給、緊急用藥調度與配送支援區。</p>\n</li>\n<li>\n<p><strong>中央供應維持</strong>：聯繫維持於<strong>韓偉大樓 3F\n    的供應室</strong>，進行中央無菌器械的緊急調度與配送協調，以支援 B1\n    的手術需求。</p>\n</li>\n</ol>\n<p><strong>二、 支援 B1 五大醫療功能區之衛材與血品（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>前線急救物資推送</strong>：任務支援組必須主動將急救耗材、72小時戰備物資及藥品，分派並推進至剛開設的\n    B1 五處功能區（包含：約翰/馬可 B1 的檢傷行政區與臨時 ICU、韓偉 B1\n    的臨時開刀房與恢復室、路加 B1 的輕症病房），確保前線醫療量能不斷鏈。</p>\n</li>\n<li>\n<p><strong>血液調度</strong>：協調血庫進行緊急用血支援及血液資源調度，支撐臨時開刀房的戰傷搶救。</p>\n</li>\n</ol>\n<p><strong>三、 確保地下室備援通訊與運輸載具調度（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>建立地下通訊網</strong>：地下室極易發生訊號死角，勤務主管（事務組長/醫勤室）須檢查所有手持與備援通訊設備，分配無線電頻道給進入\n    B1\n    各功能區的指揮官與醫護人員，提供獨立雙向通訊系統，確保防空避難期間指揮通訊暢通。</p>\n</li>\n<li>\n<p><strong>垂直疏散運輸調度</strong>：盤點並調度院內推床、輪椅與軟擔架，協助醫療照護組將重症病患、維生儀器從高樓層安全且快速地垂直疏散至\n    B1 避難區。</p>\n</li>\n</ol>\n<p><strong>四、 維持防空避難期間之膳食與飲水供應（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>戰備存糧動用</strong>：在人員與病患大量疏散至地下室與大廳避難區的混亂狀態下，勤務組須會同營養室，動用預先儲備的\n    <strong>3 至 7 天緊急乾糧與飲水</strong>，穩定避難區的人心與員工體力。</p>\n</li>\n<li>\n<p><strong>供膳分配</strong>：確保所有迫降於 B1\n    工作的人員、避難病患及家屬能獲得基本的飲食與飲水供應。</p>\n</li>\n</ol>\n<p><strong>五、 設立「員工庇護所」與身心照顧（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>防空避難下的人力調度</strong>：評估並管理待命區的支援人力，依據各 B1\n    醫療功能區的搶救需求進行精準的人力配送。</p>\n</li>\n<li>\n<p><strong>設立員工休息與生活區</strong>：在防空威脅與地下室高壓環境下，任務支援組必須負責執行部門人員的身心照顧。依據計畫於指定區域（如建議的<strong>恩慈\n    2F 運動中心</strong>或安全的 B1\n    空間）設立人員休息及生活支援區，提供輪班、用餐、飲水及待命的庇護環境，防範醫護人員發生戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨戰傷病患洪流，醫療物資與後勤支援的消耗將達到極限。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）「後勤部長（L0）」</strong>，其轄下的「勤務組（L1）」與「任務支援組（L2）」是支撐前線醫療搶救的「彈藥庫」與「生命線」。</p>\n<p>面對大量戰傷病患與急重症需求的暴增，後勤部門的具體因應作為如下：</p>\n<p><strong>一、 顛覆常規，啟動戰傷物資「主動盲派（Push）」（任務支援組 L2 /\n藥劑科 / 資材組）</strong></p>\n<ol>\n<li>\n<p><strong>推拉式物流（Push-Pull\n    Logistics）</strong>：在大量傷患湧入、急診與開刀房極度混亂的狀態下，平時的「填單申請（Pull）」與「及時供貨」模式將完全失效。藥劑科與供應中心必須化被動為主動，啟動戰鬥化物流。</p>\n</li>\n<li>\n<p><strong>戰備急救箱直送紅區</strong>：任務支援組（資材組）與藥局人員須將預先打包好的「戰傷急救箱（Trauma\n    Kits）」，內含戰術止血帶（CAT）、骨內血管通路設備（IO針）、止血紗布、廣效抗生素、大量林格氏液及強效麻醉鎮痛藥劑（如\n    Ketamine），不待前線申請，直接「盲派（Push）」推送至急診紅區與臨時開刀房門口，確保搶救醫師伸手就能拿到「救命子彈」。</p>\n</li>\n</ol>\n<p><strong>二、 支援極限輸血需求與啟動「走動式血庫」（任務支援組 L2 / 血庫）</strong></p>\n<ol>\n<li>\n<p><strong>緊急調度與求援</strong>：面對手術與急救暴增的用血需求，協助檢驗科血庫向捐血中心或緊急醫療網請求血液運補；若遇交通阻斷，則啟動與南部軍醫院的緊急血液橫向調度。</p>\n</li>\n<li>\n<p><strong>啟動院內活體血庫</strong>：若血庫 O\n    型血與血小板瞬間見底且面臨斷援絕境，須配合啟動北約軍醫常用的<strong>「走動式血庫（Walking\n    Blood\n    Bank）」</strong>。透過廣播緊急召集符合條件的院內同仁至指定地點，現場抽取全血、進行極簡快篩，並由傳令兵（Runner）以百米衝刺送入開刀房或急診紅區，直接輸入瀕死傷患體內。</p>\n</li>\n</ol>\n<p><strong>三、 執行戰術空間重構與載具調度（勤務組 L1 / 總務部）</strong></p>\n<ol>\n<li>\n<p><strong>大廳瞬間轉換為戰地急診</strong>：為應對急診空間爆滿，總務部須在 30\n    分鐘內迅速清空一樓門診大廳的候診椅與雜物，依紅、黃、綠、黑四色動線，將大廳轉換為「大量傷患檢傷區」與「輕傷縫合區」，有效阻絕恐慌的輕傷患進入重症區。</p>\n</li>\n<li>\n<p><strong>運輸載具集中</strong>：勤務組須迅速盤點並集中院內所有的救護車推床、輪椅和擔架，交由待命區管理者統一派發，以利將大量傷患從檢傷區快速推送至各治療區。</p>\n</li>\n<li>\n<p><strong>車輛調派</strong>：統籌調派院內救護車及行政運輸車（如中巴），支援輕症病患的疏散或重症病患的轉院後送。</p>\n</li>\n</ol>\n<p><strong>四、 建立備援通訊網（勤務組 L1）</strong>\n在大量傷患應變的混亂中，勤務組須檢查所有手持通訊設備，並分配專屬的無線電（UHF/VHF）頻道給急診、手術室及各樓層指揮官，提供獨立的雙向通訊系統，確保指揮體系在網路可能壅塞或中斷時仍能暢通。</p>\n<p><strong>五、 前線戰力之膳食供應與強制輪替庇護（任務支援組 L2 / 勤務組 L1 /\n營養室）</strong></p>\n<ol>\n<li>\n<p><strong>緊急供膳與飲水</strong>：由營養室會同勤務組，精算各急救區的工作人員數量，提供熱食、高熱量補給與飲水，維持急診與開刀房醫護人員的高強度戰鬥體力。</p>\n</li>\n<li>\n<p><strong>設立「安全庇護所」</strong>：在院內最安全的區域（如地下室）設立員工專屬庇護站，嚴格管制非工作人員進入。配合人事室執行「軍事化強制輪班機制」（如\n    12 小時一班），確保下班的醫護人員能在絕對安靜的環境中休息。</p>\n</li>\n<li>\n<p><strong>心理急救（PFA）支援</strong>：針對剛處理完大量血肉模糊傷患、面臨巨大壓力與道德撕裂的醫護團隊，配合「心理韌性特遣隊」在庇護站提供心理除頻（Debriefing）與情緒支持，防範醫療團隊爆發創傷後壓力症候群（PTSD）與戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，雖然基礎設施的實際搶修由執行部門（工務室、資訊室）負責，但<strong>後勤部門（Logistics\nSection）</strong>必須在背後提供所有必要的物資、通訊設備與民生支援，確保前線搶修與醫療運作不斷鏈。</p>\n<p>在本院\nHICS（醫院事故指揮系統）架構下，後勤部門由總務部部長擔任<strong>「後勤部長（L0）」</strong>，轄下分為<strong>「勤務組（L1）」</strong>與<strong>「任務支援組（L2）」</strong>。面對此複合型設施受損危機，其具體因應作為如下：</p>\n<p><strong>一、 統籌全院後勤支援與資源調度（後勤部長 L0）</strong></p>\n<ol>\n<li>\n<p><strong>整體物資與支援調度</strong>：由總務部部長擔任，負責管理並參與應變行動計畫中所有維持服務及事件所需支援之相關設備、物資、器材及人力之調度。</p>\n</li>\n<li>\n<p><strong>跨部門協調</strong>：與指揮官保持密切聯繫，配合工務室（設施運作主管）與資訊室（機構運作主管）的搶修需求，指示轄下小組全力提供支援。</p>\n</li>\n</ol>\n<p><strong>二、 因應通訊中斷與電梯停用之應變（勤務主管 L1）</strong>\n由醫勤室主任擔任，統籌事務組、運輸組與營養室，針對通訊與運輸癱瘓展開行動：</p>\n<ol>\n<li>\n<p><strong>分配備援通訊設備</strong>：面對電話與網路中斷，勤務主管須立即檢查所有手持通訊及對內/對外通訊設備，並負責分配專屬的無線電對講機（UHF/VHF）頻道給各樓層指揮官、急診與搶修團隊，提供獨立的雙向通訊系統。</p>\n</li>\n<li>\n<p><strong>緊急運輸與載具集中</strong>：因電力瞬斷導致電梯停用時，病患無法進行常規的垂直移動。勤務組須迅速盤點並集中院內所有的輪椅、擔架與救護推床，並向資源控管小組申請人力支援，以便在需要時以純人力方式透過樓梯搬運病患或搶修物資。</p>\n</li>\n</ol>\n<p><strong>三、 停水停電下之膳食與飲水維持（勤務主管 L1 / 營養室）</strong>\n面對可能因震動造成的管線破裂（漏水/停水）或電力異常，營養室必須啟動「膳食危機應變」：</p>\n<ol>\n<li>\n<p><strong>緊急飲水調度</strong>：若發生停水事件導致無乾淨水源可用，須立即對外購買或調度礦泉水與山泉水，以解決全院病患與前線搶修人員的基本飲水與膳食製備需求。</p>\n</li>\n<li>\n<p><strong>啟動緊急供餐機制</strong>：若停電無法立即恢復，導致廚房烹調設備與冷藏設備無法使用，營養室須聯絡緊急供應商（如嘉軒美食等）負責供膳，或啟用儲備之備用乾糧，確保工作人員與病患的飲食不斷炊。</p>\n</li>\n</ol>\n<p><strong>四、 緊急物資取得與支援調度（任務支援主管 L2）</strong>\n由資材組組長擔任，統籌資材、藥局與人力調度：</p>\n<ol>\n<li>\n<p><strong>應急物資與設備發配</strong>：針對停電、漏水與搶修需求，資材組須迅速取得並發配所有重要的醫療與非醫療物資（例如：緊急照明設備、手電筒、電池、沙包或吸水耗材）給各單位使用。</p>\n</li>\n<li>\n<p><strong>紙本降級下之物資盲派</strong>：在通訊與資訊系統癱瘓下，停止依賴電腦填單領物資。資材與藥庫人員須配合前線的緊急需求，主動將所需物資與急救箱推送（盲派）至需要的醫療區或待命區。</p>\n</li>\n<li>\n<p><strong>身心照顧與備援人力</strong>：協同人資與心理師，提供搶修人員與前線醫療人員的飲水、後勤補給及身心照顧，並協助調度待命人力投入搬運或跑腿傳令（Runner）任務。</p>\n</li>\n</ol>\n<p>保安室如何應對敵方破壞或投毒？</p>\n<p>在通訊中斷時，如何執行傳令兵機制？</p>\n<p>B1 備援醫療空間的具體配置與用途</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院同時面臨敵方實體攻擊（恐攻或戰爭行為）、維生電力中斷以及極高火災爆炸風險的複合型毀滅性危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）「後勤部長（L0）」</strong>。雖然第一線的爆炸封鎖與搶修由執行部門（保安組、工務室）負責，但後勤部是確保搶修人員安全、支援病患疏散以及提供緊急維生替代物資的絕對骨幹。</p>\n<p>其轄下各組（勤務組 L1、任務支援組 L2）的具體因應作為如下：</p>\n<p><strong>一、 統籌後勤指揮與支援極限搶修（後勤部長 L0）</strong></p>\n<ol>\n<li>\n<p><strong>最高後勤調度</strong>：後勤部長須立即統籌所有物資與人力，配合指揮官與執行部門（工務室）的搶修需求，提供防爆、搶修及維生所需的各項實體資源。</p>\n</li>\n<li>\n<p><strong>緊急聯繫外部供應商（會同採購組）</strong>：面對主發電機受損與主氧氣槽洩漏，後勤部須配合採購單位，緊急聯繫氧氣供應商（如信光氧氣行、台北氧氣公司）與發電機廠商（如明威發電機），請求緊急調度「大量備用氧氣鋼瓶」與「移動式發電車」至院區安全地帶支援。</p>\n</li>\n</ol>\n<p><strong>二、 極速調配「備用氧氣」與緊急維生物資（任務支援組 L2 / 資材組）</strong></p>\n<ol>\n<li>\n<p><strong>盲派（Push）氧氣鋼瓶與甦醒球</strong>：因液態氧主儲槽洩漏，全院中央供氧可能瞬間中斷。資材組必須立即盤點全院庫存的「備用氧氣鋼瓶」，並主動將鋼瓶推送（盲派）至開刀房、ICU與急診等重症紅區。同時，發配大量的手動甦醒球（Ambu bag），以支援前線成立「捏球大隊」進行人工呼吸接力。</p>\n</li>\n<li>\n<p><strong>發配緊急照明與搶修裝備</strong>：因主發電機受損導致全院面臨斷電或實施極限負載卸除（Load Shedding），資材組須迅速提供緊急照明設備、手電筒、電池及必要的防護裝備給工務室搶修人員與前線醫護使用。</p>\n</li>\n</ol>\n<p><strong>三、 支援病房緊急疏散之「載具與人力調度」（勤務組 L1 / 總務部）</strong></p>\n<ol>\n<li>\n<p><strong>集中搬運載具</strong>：機電棟發生爆炸與洩漏，鄰近病房極可能需要進行緊急水平或垂直疏散。勤務主管須迅速盤點並集中院內所有的輪椅、擔架、救護推床與樓梯疏散滑墊（軟擔架），統一送至疏散病房區供醫護人員調度使用。</p>\n</li>\n<li>\n<p><strong>投入無動力搬運人力</strong>：因發電機受損導致電梯停擺，總務部等後勤編組人員必須親自投入前線，協助護理人員以純人力方式（5人一組），經由安全梯將重症病患垂直搬運至安全樓層或地下避難空間。</p>\n</li>\n</ol>\n<p><strong>四、 提供搶救人員之膳食、飲水與庇護（勤務組 L1 / 營養室）</strong></p>\n<ol>\n<li>\n<p><strong>維持搶修人員體力</strong>：工務室搶修人員與保安組警衛正冒著極高爆炸風險在機電棟周邊進行封鎖與搶修。勤務組會同營養室必須優先確保這些高強度應變人員的飲水與高熱量膳食補給，維持其戰鬥體力。</p>\n</li>\n<li>\n<p><strong>設立安全庇護與輪替區</strong>：在遠離機電棟爆炸與洩漏威脅的地下室或安全區域，協助設立員工休息庇護區，供撤離的醫護人員及搶修輪替人員安全休息。</p>\n</li>\n</ol>\n<p><strong>五、 配合安全管制與物資轉移防護（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>危險區物資撤離</strong>：若機電棟周邊的庫房或物資存放區面臨爆炸延燒風險，任務支援組須在安全官允許的前提下，迅速將該區域的重要醫療與非醫療物資轉移至地下安全處（如 B1 戰略物資補給站）集中保管。</p>\n</li>\n<li>\n<p><strong>嚴格物資發放管制</strong>：在爆炸恐慌與資源匱乏的狀態下，實施最嚴格的物資管制，「非必要之用品暫不供應」，確保每一分物資皆用在刀口上。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>屏東基督教醫院大連院區：機電棟爆炸與人員重創事故下之 HICS\n後勤部門（Logistics Section）生存應變與戰術補給報告</p>\n<p>當大連院區面臨機電棟爆炸（火災及爆炸：紅色訊號），並伴隨兩名在場工務巡檢同仁遭受掉落物砸傷（其中一人嚴重骨折且大出血）的複合型極端危機時，<strong>HICS\n後勤部門（Logistics\nSection）將作為維繫地下微型戰地醫院運作的「生命線保衛者」與「大後勤補給中樞」</strong>。</p>\n<p>後勤團隊將在<strong>後勤部長 L0（總務部部長 許慧莉）勤務組 L1（醫勤室主任\n吳哲維）任務支援組 L2（資材組組長\n吳佳蓉）</strong>，配合現場工務搶修與急診、開刀房的損傷控制復甦（DCR），採取以下最抗干擾、高強度的後勤維生、極限物資「盲派」與同工身心保衛作為：</p>\n<p>一、 後勤部長 L0（總務部部長 許慧莉）：最高後勤指揮與關鍵資源重分配</p>\n<ol>\n<li>\n<p><strong>迅速開設後勤協配中樞與人員到位</strong>： 部長第一時間進駐地下前進指揮所，指揮 L1 與 L2 主管迅速到位，配合執行部（O組）將維持醫療運作的「糧草、彈藥與通訊」全數轉移、集中並死守於結構最穩固的地下防空避難空間。</p>\n</li>\n<li>\n<p><strong>死守 B1 核心醫療區之「維生電力與氣體優先序」</strong>： 機電棟爆炸將引發市電瞬斷、水氣中斷或系統大當機。後勤部長會同工務室立即執行冷酷的<strong>「電力負載卸除（Load Shedding）」</strong>與資源分配優先序： -   <strong>切斷非必要電力</strong>：手動切斷全院行政辦公區、冷氣空調、一般病房及 80% 的電梯電源。 -   <strong>電力死守紅區</strong>：將緊急發電機的電力與備用醫療氣體（氧氣鋼瓶），百分之百優先灌注至正在搶救重創同工的 <strong>B1 臨時開刀房（韓偉 B1 腹膜透析室）、臨時 ICU（約翰／馬可 B1 資材組前方）</strong>及急診室，維持受創同仁的生命支持系統不斷鏈。</p>\n</li>\n</ol>\n<p>二、 勤務組 L1（醫勤室主任 吳哲維）：備援通訊、無動力搬運與膳食維持</p>\n<ol>\n<li>\n<p><strong>無預警斷網斷訊下之「異質性戰術通訊網」部署</strong>： 機電棟損毀將導致全院 HIS/PACS 電腦系統與分機癱瘓。勤務主管（事務組長配合）須立即： -   <strong>發配專屬無線電</strong>：立即檢查並發配獨立頻段之 UHF/VHF 無線電對講機給地下指揮官、B1 功能區負責人與工務搶修團隊，提供獨立雙向通訊。 -   <strong>啟動最抗干擾之「徒步傳令兵（Runner）制度」</strong>：指派體能良好之行政同仁或輕傷志工穿著螢光背心，採用嚴格的「口令覆誦」與「紙本簽收簿」方式，徒步穿梭於指揮所、4F 檢驗科、藥庫與 B1 臨時手術室，遞送手寫醫囑、配血單與災情報告，防範電磁癱瘓。</p>\n</li>\n<li>\n<p><strong>無動力垂直轉運與搬運支援（死守生命時間）</strong>： 電梯因電力瞬斷停用，受重創（大出血骨折）的工務同仁急需從爆炸高風險區移出： -   <strong>載具極限徵用</strong>：勤務組迅速盤點並集中全院救護車推床、輪椅與護理站備用之<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>。 -   <strong>非醫療人力親自投入搬運</strong>：調派總務部非醫療後勤同仁（如行政、保全、清潔、志工）直接奔赴現場，協助醫護小組採取「4人搬運、1人照護」的人工接力搬運，沿內側安全安全梯將重創同仁垂直轉運至 B1 臨時手術室進行緊急損傷控制手術（DCS）。</p>\n</li>\n<li>\n<p><strong>停電停水下之「孤島膳食與飲水維持」</strong>： -   <strong>3\\~7天戰備存糧動用</strong>：會同營養室立即盤點並動用預先儲備之緊急乾糧、礦泉水；若廚房因停電受限，第一優先調撥本院 7-11 便利商店之供糧，維持搶修人員、醫護團隊與在院病患之基本生理體力。</p>\n</li>\n</ol>\n<p>三、 任務支援組 L2（資材組組長\n吳佳蓉）：關鍵藥材「盲派」與活體血液、同工身心保衛</p>\n<ol>\n<li>\n<p><strong>打破常規，戰備衛材之「推拉式盲派（Push Logistics）」物流</strong>： 受創同工面臨大出血致命危機，此時 HIS 電子系統當機，前線醫護無法開單請領（Pull）。任務支援主管立即會同藥劑科： -   <strong>戰備 Go-Kits 直送紅區</strong>：不等待任何前線申請，資材同仁主動將預先打包之<strong>「戰傷急救箱 (Trauma Go-Kits)」</strong>（內含 CAT 戰術止血帶、骨內血管通路 IO 針、含止血劑紗布、強效鎮痛藥 Ketamine、大量林格氏液）裝上推車，直接盲派（Push）推至急診紅區與韓偉 B1 臨時手術室門口，確保第一線伸手即有救命物資。</p>\n</li>\n<li>\n<p><strong>失血性休克危機下之「走動式血庫（Walking Blood Bank）」備援</strong>： 若重創同工大出血急需輸血液製品，且高雄捐血中心因交通中斷或電網癱瘓無法即時運補時： -   <strong>召集活體血庫同仁</strong>：L2 配合檢驗科血庫，立即廣播召集符合血型條件、平時已預先建檔篩檢並簽署同意書之院內員工與志工，至安全地下室臨時抽血站。 -   <strong>現場抽全血快篩</strong>：醫檢師現場抽取活體 O 型全血（Whole Blood），進行極簡化交叉快速篩檢，由傳令兵极速送入手術室直接輸入瀕死同仁體內，以活體供血打破斷援危機。</p>\n</li>\n<li>\n<p><strong>開設地下「員工專屬庇護站」與心理急救（PFA）</strong>： 受創人員為本院執勤同工，爆炸現場慘烈，容易對工務抢修同仁及搶救醫護造成極大之心理衝擊。 -   <strong>庇護站物理隔斷</strong>：L2 須於結構最安全、最深層之地下室區域（如恩慈 2F 員工運動中心）設立<strong>「同工專屬庇護站」</strong>，提供行軍床、熱食與絕對安靜（聽不到哀嚎、看不到鮮血）的休息環境。 -   <strong>強制 Hot Debriefing 與心理急救</strong>：協同人資室、社工與院牧部心理韌性特遣隊進駐，對退下火線之工務、保全與醫護，強制進行 15 至 30 分鐘之心理「熱除頻（Hot Debriefing）」與心理急救（PFA），穩定員工士氣，防範英雄主義式過勞與集體創傷後壓力症候群（PTSD）。</p>\n</li>\n</ol>\n<p>四、 災後復原階段之重建、理賠與證據保全（後勤部災後復原作業）</p>\n<ol>\n<li>\n<p><strong>配合災情勘查與硬體復原重建</strong>： 火勢撲滅且安全官（職安室杜傳榮主任）確認環境結構安全後，後勤組（總務部）依作業規定，向相關單位申請災損鑑定小組到院實施災損勘查與鑑定。主導受損機電、漏水管線、空調系統之搶修與發包重建。</p>\n</li>\n<li>\n<p><strong>受創同仁職災理賠與保險事務處置</strong>： 受傷同工屬於在職巡檢遭受職災： -   <strong>職災與保險理賠</strong>：後勤組（總務部）會同會計室（會計小組 F4）、人資室，立即通知保險公司，啟動本院公共意外責任險、團體保險，並協助職安室登錄勞動部職業傷病系統，保障受創同仁法效權益與醫療補償。</p>\n</li>\n<li>\n<p><strong>損失呈報與消防維生器材補充</strong>： -   <strong>陳報損失</strong>：災害現場及相關單位於 3 日內清查人員傷亡及財物損失情形，由文件紀錄小組（P3）與後勤部彙整列冊陳報院長室。 -   <strong>耗材補充</strong>：會同消防代檢公司全面檢查全院消耗之滅火器、防護裝備、氧氣鋼瓶及緊急醫療物資，填寫工務單由工務室與資材組迅速補齊，防止防禦空置。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>當屏東基督教醫院（屏基）大連院區面臨「兩名喬裝成外包人員的特工（第五縱隊），意圖對核心機房放火、對頂樓水塔投毒」之毀滅性實體與化學（CBRN）複合型國家級安全攻擊時，全院將立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>「戰鬥模式」。</p>\n<p>在此極端危機下，<strong>後勤部門（Logistics\nSection）將作為「地下微型戰地醫院」與第一線搶修團隊的「生命線保衛者」與「物資防禦中樞」</strong>。後勤團隊將在<strong>後勤部長\nL0（總務部部長 許慧莉）勤務組 L1（醫勤室主任 吳哲維）任務支援組\nL2（資材組組長\n吳佳蓉）</strong>，跨組協同執行部設施運作組（工務室），採取以下最抗干擾、高強度的<strong>「食、水、通訊、防禦物
