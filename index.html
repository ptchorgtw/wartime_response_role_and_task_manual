徒步傳令兵（Runner）」傳單</strong>： 在電話分機與內網全斷時，放射科改以電話、對講機口頭通報影像異常，或配合行政部門派出的傳令兵，以實體手寫單和口頭「Read-back（口頭覆誦雙重確認）」方式傳遞診斷結果，防範給藥與手術部位錯誤。</p>\n</li>\n<li>\n<p><strong>系統復原後之資料回補（Data Backfilling）</strong>： 待資安威脅或電力故障排除、資訊系統安全復原後，放射科同工須將當機期間保管之紙本單據進行事後補開單計價，並<strong>手動將影像重新補傳 WebPACS 系統</strong>，保全電子病歷的完整性。</p>\n</li>\n</ol>\n<p>四、 放射科主任履行「O3 危害控制組主管」職責，監控化學與毒災洩漏</p>\n<ol>\n<li>\n<p><strong>機電爆炸衍生危害監控</strong>： 由於爆炸發生在「機電棟」，此處存放有緊急發電機柴油油槽，且鄰近可能存有其他壓力容器。放射科主任曾文盛（擔任 HICS 危害控制主管 O3）必須立即進駐中控室，會同感管、醫勤保安與工務組，<strong>評估爆炸現場是否伴隨柴油、冷媒、中央壓縮氣體或放射性危害物質破裂洩漏</strong>，劃定管制區防線。</p>\n</li>\n<li>\n<p><strong>輻射污染防護與 CT 檢查防污染管制</strong>： 若評估爆炸波及特種設備或伴隨特種化武攻擊，導致兩名受傷同工身上帶有生化、游離輻射等毒性污染，在將傷患送入放射科執行緊急電腦斷層（CT）檢查前，放射科人員必須<strong>嚴格執行「輻射污染病人送 CT 檢查作業流程」</strong>，穿戴指定等級之防護裝備，並於檢查後將儀器推出「X光室外」進行徹底的環境與設備清消，杜絕核心醫療影像設備遭受永久性交叉污染。</p>\n</li>\n</ol>\n<p>五、 設備異常與關鍵合約廠商緊急聯繫</p>\n<p>若電力異常、瞬斷或震波導致核心影像設備損毀故障，放射科值班人員須立即致電各維護廠商緊急搶修，防止影像診斷中斷：</p>\n<ul>\n<li>\n<p><strong>西門子 CT（電腦斷層）與血管攝影設備</strong>： -   西門子 CT 負責人：郭益志（0960-548012） -   西門子血管攝影負責人：Rex Lee（0910-678549） -   西門子維修緊急專線：0800-021888</p>\n</li>\n<li>\n<p><strong>老達利 X 光機設備（移動式與一般 X 光機）</strong>： -   老達利課長：歐怡麟（0960-559910）</p>\n</li>\n<li>\n<p><strong>三鋼 X 光與影像相關設備</strong>： -   三鋼技術專員：魏先生（0976-570878）</p>\n</li>\n</ul>"}]}, {"role": "感控室", "entries": [{"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，在戰時空間降階與大量傷病患湧入的高壓環境下，<strong>感控室（感染管制組）</strong>肩負防範地下避難空間爆發群聚感染及危害物質除污的重大責任。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，感控科/感管組主任擔任執行部門的<strong>「危害控制主管（O3）」</strong>，並主導演習編組中的<strong>「危害控制組」</strong>。面對防空疏散與\nB1 備援空間的緊急開設，感控室的具體因應作為如下：</p>\n<p><strong>一、 擔任 HICS「危害控制組（O3）」：執行危害偵檢與除污</strong></p>\n<ol>\n<li>\n<p><strong>危害偵檢與監控</strong>：若空襲震波導致院內實驗室、危險化學品庫房破損外洩，或遭遇敵方化學/生物武器等特殊攻擊，感控室須會同相關科室負責危害物質的偵檢與監控。</p>\n</li>\n<li>\n<p><strong>執行除污作業（Decontamination）</strong>：負責指揮或督導遭受化武或輻射污染的戰傷病患進行除污，並針對遭受污染的地下室設施與醫療設備進行除污及洩漏處理，防範有害物質在\n    B1 密閉備援空間內擴散。</p>\n</li>\n</ol>\n<p><strong>二、 B1 地下備援空間之感染管制（Infection Control）</strong></p>\n<ol>\n<li>\n<p><strong>防範地下空間群聚感染</strong>：B1 備援空間（尤其是路加 B1\n    的輕症病房或各避難集結區）人潮擁擠且通風條件受限，極易引發傳染病群聚感染。感控室必須嚴格督導地下室各醫療功能區的感染管制措施，確保手部衛生與咳嗽禮節的落實。</p>\n</li>\n<li>\n<p><strong>指導防護裝備（PPE）使用</strong>：協助醫療照護組（O1），依據地下室現場狀況與傷患類型，指導前線醫護人員正確穿戴及準備適當等級的個人防護裝備（PPE），以保護醫療團隊的安全。</p>\n</li>\n</ol>\n<p><strong>三、 大量傷患之分流與傳染病患隔離評估</strong></p>\n<ol>\n<li>\n<p><strong>傳染風險辨識</strong>：在 B1「檢傷行政區」（約翰/馬可\n    B1）面對大量湧入的傷病患時，感控室須協助急診團隊快速辨識、篩檢出可能帶有高傳染性疾病的個案。</p>\n</li>\n<li>\n<p><strong>規劃隔離動線</strong>：確保疑似傳染病患與一般戰傷/外傷病患的收治動線嚴格分離。若有傳染病患需收治住院，須依感控動線將其轉送至指定的專責隔離區（如\n    6A 負壓隔離病房），避免與 B1 其他傷患發生交叉感染。</p>\n</li>\n</ol>\n<p><strong>四、 督導環境清消與醫療廢棄物處理</strong> 在 B1 臨時開刀房與臨時 ICU\n等重症紅區運作期間，將瞬間產生大量沾血的急救衛材與醫療廢棄物。感控室須督導環保室與外包清潔人員，確實執行地下醫療區的環境清潔與消毒，並妥善規劃生物醫療廢棄物的密閉收集與清運流程，確保微型戰地醫院的衛生底線。</p>"}]}, {"role": "社工室", "entries": [{"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述的複合性危機（假訊息、恐慌人潮湧入急診、搶購藥品、交通事故大量傷患及家屬急迫需求），社工室在\nHICS（醫院事故指揮系統）中扮演<strong>「心理與家屬支援分支（隸屬執行部）」</strong>及<strong>「危機溝通與關懷」</strong>的關鍵角色。</p>\n<p>面對急診前線的混亂與高壓，社工室的具體因應作為如下：</p>\n<p><strong>一、 設立家屬接待區：執行尋人、詢答與情緒安撫</strong></p>\n<ol>\n<li>\n<p><strong>空間隔離與安置</strong>：面對湧入急診要求查詢撤離資訊或尋找交通事故傷患的家屬，社工人員需迅速將家屬引導至專屬的「家屬接待區（如轉診中心）」，將其有效隔離於急診搶救區之外，避免干擾前線醫療動線。</p>\n</li>\n<li>\n<p><strong>傷亡確認與尋人協尋</strong>：主動利用時機確認無名傷患的身分、年齡、住址與親友電話，協助家屬確認傷亡名單與病人動向。</p>\n</li>\n<li>\n<p><strong>情緒安撫與物品保管</strong>：針對極度恐慌的家屬與病患給予心理情緒支持與悲傷輔導；同時負責傷患遺留物品的登記與保管（確定未受污染物品另置塑膠袋並貼上姓名），以安定家屬的心。</p>\n</li>\n</ol>\n<p><strong>二、 支援極限醫療降載與病患疏散轉銜</strong></p>\n<ol>\n<li>\n<p><strong>啟動極速出院與轉送</strong>：為騰出急診與急重症病床給交通事故重傷患，社工室須配合啟動車輛調度，協助原本預計出院的輕症病患或穩定病患於4小時內完成結帳與安全疏散返家。</p>\n</li>\n<li>\n<p><strong>代辦行政手續</strong>：主動協助大量傷患辦理離院返家、緊急下轉或轉送其他醫療機構的相關行政手續，減輕急診護理人員的行政負擔。</p>\n</li>\n</ol>\n<p><strong>三、 防範醫療暴力與處理醫療爭議</strong></p>\n<ol>\n<li>\n<p><strong>處理非理性訴求</strong>：面對家屬因輕症被拒絕住院（反向檢傷）或無法提早領取慢性病藥品而產生的極端抱怨，社工室須立即啟動溝通與關懷機制，向家屬說明戰備時期的檢傷與收治原則。</p>\n</li>\n<li>\n<p><strong>防暴通報對接</strong>：若家屬情緒失控升級為言語或肢體暴力，社工人員須確保自身安全，並立即透過通報系統（如按*9）聯繫警衛與保安組啟動防暴應變，由警方介入維持秩序。</p>\n</li>\n</ol>\n<p><strong>四、 資訊彙整與通訊支援</strong></p>\n<ol>\n<li>\n<p><strong>支援總機詢答</strong>：指派專人前往中控室協助總機接聽並回覆電話，因應大量湧入查詢災情與親友下落的外部來電。</p>\n</li>\n<li>\n<p><strong>對接計畫部名冊</strong>：協助統計並彙整傷病患名單，迅速交給計畫部的「文件紀錄小組長」與急診護理師組長，確保全院傷患動向資訊正確一致。</p>\n</li>\n</ol>\n<p><strong>五、 啟動「心理韌性特遣隊」保護前線醫護</strong>\n面對殘酷的大量傷亡與家屬壓力，急診醫護極易產生戰鬥疲勞與創傷後壓力症候群（PTSD）。社工師將與精神科醫師、臨床心理師及院牧部傳道共同組成<strong>「心理韌性特遣隊」</strong>。他們會全天候進駐「員工專屬庇護站」，針對剛結束高壓搶救任務的醫護團隊進行<strong>「心理急救（PFA）」</strong>與<strong>「即時熱除頻（Hot\nDebriefing）」</strong>，提供傾聽與情緒引流，預防第一線醫療人員發生急性壓力崩潰，確保醫療戰力得以延續。</p>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨戰傷病患的洪流，不僅醫療體系面臨極限，病患家屬的恐慌以及醫護人員的心理壓力也將達到頂點。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>社工室</strong>（協同院牧部）主要隸屬於執行部門的<strong>「醫療照護組（O1）」</strong>與<strong>「心理與家屬支援分支」</strong>，同時亦支援行政/財務部的<strong>「人事組（F1）」</strong>。其具體因應作為如下：</p>\n<p><strong>一、 設立「家屬接待區」與家屬安撫</strong></p>\n<ol>\n<li>\n<p><strong>空間隔離與接待</strong>：在急診搶救區外設立獨立的「家屬接待/安撫區」，嚴格隔離於血腥的急救前線之外，負責安撫焦急家屬的情緒。</p>\n</li>\n<li>\n<p><strong>尋人與資訊溝通</strong>：主動協助確認傷亡名單與病患動向，向家屬說明醫療處置現況，並提供必要的服務性物資（如飲水）與情緒支持，防堵混亂與恐慌蔓延。</p>\n</li>\n</ol>\n<p><strong>二、 傷患資料確認、名單彙整與物品保管</strong></p>\n<ol>\n<li>\n<p><strong>身分資料建立</strong>：在不妨礙前線醫療治療的情況下，主動利用時機確認湧入病患的身分、年齡、住址及親友電話等各項資料是否登記完整，補足建檔資訊。</p>\n</li>\n<li>\n<p><strong>名單與動向彙整</strong>：協助統計並彙整傷病患名單，交接給「計畫部-文件紀錄小組長」與護理師組長，確保災變中傷患去向明確可靠。</p>\n</li>\n<li>\n<p><strong>物品登記保管</strong>：負責傷患隨身財務與物品的登記及妥善保管。</p>\n</li>\n</ol>\n<p><strong>三、 協助極限醫療降載與轉院/出院手續代辦</strong></p>\n<ol>\n<li>\n<p><strong>轉銜與後送辦理</strong>：配合全院實施的「反向檢傷」與醫療降載，協助可提早出院或需轉院的病患辦理離院返家、下轉至基層長照機構或轉送其他醫院的相關手續。</p>\n</li>\n<li>\n<p><strong>代辦各項行政手續</strong>：在混亂的急診現場主動替病患與家屬代辦各種醫療與住院相關行政手續。</p>\n</li>\n</ol>\n<p><strong>四、 執行醫護「心理急救（PFA）」與戰力防護</strong></p>\n<ol>\n<li>\n<p><strong>成立心理韌性特遣隊</strong>：社工師需與精神科醫師、臨床心理師及院牧部傳道共同組成「心理韌性特遣隊（Psychological\n    Resilience Task Force）」，全天候進駐地下室的員工專屬庇護站。</p>\n</li>\n<li>\n<p><strong>即時熱除頻（Hot\n    Debriefing）</strong>：針對剛經歷高壓戰傷搶救、目睹慘烈傷亡，或因執行殘酷檢傷分類而面臨巨大道德撕裂的醫護人員，強制進行「心理除頻」與「心理急救（PFA）」。引導情緒宣洩，預防醫護團隊爆發創傷後壓力症候群（PTSD）與戰鬥疲勞，確保醫療戰鬥力的長期續航。</p>\n</li>\n</ol>\n<p><strong>五、 外部救災團體接待與志願人力調度</strong></p>\n<ol>\n<li>\n<p><strong>救災團體對接</strong>：由社工室主任協助外部救災團體、社會資源的接待與溝通協調事宜。</p>\n</li>\n<li>\n<p><strong>志工與人力集結</strong>：配合行政/財務部「人事組（F1）」，協調招募、集合院內外志工與支援人力至指定的人力待命點，交由待命區管理者統一派發至前線。</p>\n</li>\n<li>\n<p><strong>支援總機通訊</strong>：在大量傷患引發的外部詢問電話暴增時，派員前往協助總機回覆電話，減輕通訊癱瘓壓力。</p>\n</li>\n</ol>\n<p><strong>六、 極端狀態下的維生支援（捏球大隊）</strong>\n若遭遇戰火波及導致全院斷電且備用氧氣鋼瓶耗盡、電動呼吸器全面停擺的孤島絕境，社工人員也必須投入第一線肉搏戰，編入由非醫療人員組成的「捏球大隊」，以手動甦醒球（Ambu\nbag）接力捏球，以純人力維持重症病患的呼吸與生命徵象。</p>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當機電棟遭遇爆炸且造成兩名執勤工務巡檢同仁受砸傷（一人嚴重骨折且大出血），並伴隨全院因電力瞬斷或網路延遲可能引發資訊大當機（Downtime）的極端危機時，<strong>社工室將立即在\nHICS（醫院事故指揮系統）架構下，扮演「關懷組」與「心理與家屬支援分支」的核心骨幹</strong>。</p>\n<p>由於受創同工為朝夕相處的「院內員工」，爆炸現場的慘烈與搶救工務夥伴的高壓，極易對現場人員造成嚴重的心理創傷。社工室將採取以下<strong>六大具體生存應變與家屬/員工心理防禦作為</strong>：</p>\n<p>一、 迅速開設地下「家屬接待/安撫區」，主動聯繫同工家屬</p>\n<ol>\n<li>\n<p><strong>空間隔離與接待</strong>：社工室接獲「紅色訊號（爆炸）」與「急診 333 大量傷患」廣播後，立即派員在急診搶救紅區之外的安全區域（如轉診中心或恩慈大樓地下一樓）開設<strong>「家屬接待/安撫區」</strong>。此區域必須與血腥、混亂的急救火線實施物理隔離，避免家屬目睹同工受創畫面導致急性心理崩潰。</p>\n</li>\n<li>\n<p><strong>主動家屬聯繫與資訊溝通</strong>：社工同仁與批掛組、病歷室密切配合，主動且迅速協助確認受傷工務巡檢同仁的身分、疾病分類及救治去向（如是否已送入 B1 臨時開刀房進行損傷控制手術）。主動聯繫傷者家屬並引導其至接待區，以<strong>公開、透明、溫和</strong>的態度向家屬說明醫療搶救進度與本院「照護功能正常運作、醫療不中斷」之實情，防範外界不實謠言或認知戰引發恐慌。</p>\n</li>\n<li>\n<p><strong>隨身財物及物品登記保管</strong>：由社工人員配合急診護理師，將受砸傷工務同仁隨身留下的財務、受損衣物、巡檢裝備進行分類與妥善登記保管，確定未受污染物品另置於塑膠袋並貼上姓名，交家屬簽收，以安定家屬焦慮的心。</p>\n</li>\n</ol>\n<p>二、 暴力當機下之「行政代辦與資訊彙整支援」</p>\n<ol>\n<li>\n<p><strong>急診現場手工登記與行政代辦</strong>：由於爆炸極易引發網路中斷與 HIS 電腦當機，社工人員主動在不妨礙前線醫師與護理師搶救同工的前提下，利用時機詢問並確認兩名傷患的手工基本資料。協助將名單與病患去向彙整後交給計畫部「文件紀錄小組長」與護理師組長。</p>\n</li>\n<li>\n<p><strong>無網記帳手續代辦</strong>：主動替受傷同仁及家屬辦理手工欠繳、記帳及後續在 B1 臨時手術室／臨時 ICU 的各項緊急住院與記帳行政手續，將一線醫護的行政負擔降到最低。</p>\n</li>\n<li>\n<p><strong>協助總機詢答與闢謠</strong>：因爆炸巨響、市電瞬斷極易引發大量外部詢問電話，社工室派員前往中控室協助總機接聽並回覆電話，主動澄清不實謠言，並引導避難群眾轉移至政府指定收容所。</p>\n</li>\n</ol>\n<p>三、 啟動「心理韌性特遣隊」，針對醫護與搶修同工實施「即時熱除頻」</p>\n<ol>\n<li>\n<p><strong>成立心理防護網</strong>：受害者為熟識的工務同仁，且傷勢嚴重（骨折大出血），加上面臨緊急戰術轉置或反向檢傷的生死抉擇，一線醫護與工務搶修團隊極易產生巨大的「道德撕裂與心理創傷（Moral Injury）」及戰鬥疲勞。社工師將立即與精神科醫師、臨床心理師及院牧部傳道共同組成<strong>「心理韌性特遣隊（Psychological Resilience Task Force）」</strong>。</p>\n</li>\n<li>\n<p><strong>員工庇護站「即時熱除頻（Hot Debriefing）」</strong>：特遣隊全天候進駐地下最安全、最安靜、看不見鮮血的「員工專屬庇護站」。對於剛結束高壓搶修的工務同仁、參與初期滅火的安全警衛、以及從 B1 臨時手術室/ICU 退下火線的醫護，<strong>強制執行 15 至 30 分鐘之「熱除頻（Hot Debriefing）」與「心理急救（PFA）」</strong>。</p>\n</li>\n<li>\n<p><strong>引導情緒與重構道德認知</strong>：在對話中傾聽、釋放其悲傷與恐慌，並引導同工心理卸下「未能保護夥伴」或「反向檢傷排除他人」之罪惡感與道德包袱，以科學化保護機制死守同工的心理底線，保存留守團隊的長期戰力。</p>\n</li>\n</ol>\n<p>四、 極端維生絕境下編入「捏球大隊」人工給氧</p>\n<p>若爆炸嚴重波及緊急發電機，或面臨進一步空襲轟炸，導致地下備援開刀房與 ICU\n之電力完全耗盡、備用中央液氧槽洩漏，且可攜式氧氣小鋼瓶全部用罄時：</p>\n<ul>\n<li>\n<p><strong>肉搏維生支援</strong>：社工同仁必須與行政同仁、保全及病患家屬共同接受動員，編入<strong>「捏球大隊（Ambu Bag Team）」</strong>。</p>\n</li>\n<li>\n<p>每位重症與手術中病患（特別是正在接受搶救的骨折大出血同仁）旁配置兩人，<strong>實施每 15 分鐘輪換一次的手動甦醒球人工捏球接力</strong>，以肉身純體力與意志力，死守受創夥伴生命徵象的最後一口氣。</p>\n</li>\n</ul>\n<p>五、 協調外部志工與接待救災團體（支援人事組 F1）</p>\n<ol>\n<li>\n<p><strong>志工動員與安全辨識</strong>：社工室主任與人資主任（人事組 F1）配合，在地下前進指揮所招募並集結院內外志工，<strong>嚴格核對身分並配發「專屬螢光識別背心（或臂章）」</strong>，防範在地協力者（第五縱隊）偽裝滲透。將志工派發至前線，協助無電梯狀態下的純人力水平/垂直病患搬運、物資傳遞及跑腿傳令（Runner）。</p>\n</li>\n<li>\n<p><strong>救災資源對接</strong>：負責接待前來醫院協助的外部慈善團體或志願搜救組織，提供明確動線導引與茶水。</p>\n</li>\n</ol>\n<p>六、 災後復原階段之「職災撫恤、理賠與長期心輔」</p>\n<p>在火勢撲滅、機電系統復原且危機解除後，社工室工作轉入「復原期（Recovery）」：</p>\n<ol>\n<li>\n<p><strong>發放職災慰助金與補助方案</strong>：社工室協助配合院長室與行政/財務組，統籌統發受傷工務巡檢同仁的<strong>緊急職災慰助金</strong>，並主動對受災家屬宣佈相關補助方案。</p>\n</li>\n<li>\n<p><strong>捐贈物資與救助款分配</strong>：由行政財務組與社工室統籌、規劃社會捐贈之緊急物資與賑災款項之優先順序分配。</p>\n</li>\n<li>\n<p><strong>員工與家屬之長期心理諮商輔導</strong>：爆炸案對兩名受砸傷同工、其親屬及目睹事件之工務組同仁的心靈破壞極大。社工室與院牧部將持續實施<strong>個別或團體諮商輔導</strong>，撫慰受創心靈，並協調紅十字會、生命線等外部專業機構，提供受災人員長期的心理重建支持，激勵其重新回歸生活軌跡。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨極速的醫療降載、大量病患轉院及家屬恐慌等挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>社工室</strong>主要編制於執行部門的<strong>「醫療照護組（O1）」</strong>（負責心理與家屬支援分支），同時也支援行政/財務部門的<strong>「人事組（F1）」</strong>。社工室是維繫病患安置、家屬溝通以及醫護心理防線的關鍵樞紐。</p>\n<p>面對此撤離與分流指令，社工室的具體因應作為如下：</p>\n<p><strong>一、 協助極速出院、轉院與機構安置（配合醫療降載）</strong></p>\n<ol>\n<li>\n<p><strong>極速結帳與疏散協助</strong>：配合「反向檢傷」分類，針對預計出院的輕症病患或穩定待觀察病患，啟動社工室與行政車輛調度，協助病患於\n    4 小時內完成離院手續並安全疏散返家。</p>\n</li>\n<li>\n<p><strong>跨機構轉銜與安置</strong>：協助辦理傷患離院返家或轉送其他醫療機構的手續。對於無家屬照顧、或需轉銜至基層診所與長照機構安置的弱勢病患，社工人員須協調外部專業醫療與社福組織，妥善安排轉院安置計畫。</p>\n</li>\n<li>\n<p><strong>代辦各項手續與物資保管</strong>：在混亂的撤離中，協助病患代辦各種行政手續，並負責傷患個人物品的登記與保管，隨同病患轉移。</p>\n</li>\n</ol>\n<p><strong>二、 設立家屬接待區與執行「家屬聯繫與動向追蹤」</strong>\n大規模撤離最容易引發家屬找不到病患的恐慌，社工室必須擔起溝通橋樑：</p>\n<ol>\n<li>\n<p><strong>設立家屬接待區/安撫區</strong>：將家屬接待區隔離於急診搶救區與撤離動線之外，引導並集中安撫家屬。</p>\n</li>\n<li>\n<p><strong>病患動向查詢與通知</strong>：主動利用時機確認轉運病人的身分、年齡、住址、親友電話等資料是否登記完整。掌握病患的疏散名單與重置去向（轉送至哪家醫院或機構）後，主動進行家屬的聯繫、詢答與通知，確保動向資訊正確傳達給家屬。</p>\n</li>\n<li>\n<p><strong>外部救災團體與媒體溝通</strong>：協助接待外部救災團體與協調事宜；若有媒體採訪，社工室須協助維護病人隱私，並徵詢病人或家屬的受訪意願。</p>\n</li>\n</ol>\n<p><strong>三、 執行病患、家屬與員工的「心理急救（PFA）」</strong></p>\n<ol>\n<li>\n<p><strong>病患與家屬情緒支持</strong>：對於因突發撤離而產生焦慮的病人及家屬，提供情緒支持、安撫與心理輔導。</p>\n</li>\n<li>\n<p><strong>成立「心理韌性特遣隊」護衛醫護人員</strong>：戰時或災難下面對「反向檢傷（決定誰先撤離、誰留下）」會對醫護人員造成巨大的道德撕裂與心理創傷。社工師須與精神科醫師、臨床心理師及院牧部牧師組成「心理韌性特遣隊」，進駐員工安全庇護站。</p>\n</li>\n<li>\n<p><strong>實施任務後心理除頻（Debriefing）</strong>：針對剛結束高壓搶救或撤離任務的醫護團隊，提供傾聽與專業的心理急救（PFA），預防醫護人員發生急性壓力崩潰，確保醫療團隊的戰鬥力得以延續。</p>\n</li>\n</ol>\n<p><strong>四、 支援人力招募與極端狀況支援</strong></p>\n<ol>\n<li>\n<p><strong>志工與人力調度</strong>：作為「人事組（F1）」的協辦單位，社工室須協助協調、招募員工及志工至人力集合點，交由待命區管理者派發，以支援龐大的病患搬運與撤離需求。</p>\n</li>\n<li>\n<p><strong>投入極限維生支援（捏球大隊）</strong>：若在撤離等待過程中遭遇極限斷電、備用氧氣耗盡的孤島狀態，社工人員也必須接受動員，與行政人員、保全組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持重症病患的呼吸。</p>\n</li>\n</ol>\n<p>醫療照護組如何配合撤離？</p>\n<p>後勤部門在撤離時如何支援？</p>\n<p>病人分級後由哪個部門執行轉院？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認醫院所在區域即將進入「主戰區」，且指揮中心下達啟動\n<strong>HICS 第三階段「全面撤離與量能重置」</strong> 的預防性全面撤離命令時 ：</p>\n<p>在\nHICS（醫院事故指揮系統）應變體系下，<strong>社工室將扮演執行部門（Operations\nSection）轄下的「心理與家屬支援分支（隸屬醫療照護組 O1）」核心主責角色</strong>\n，同時也作為<strong>行政/財務部「人事組（F1）」</strong>的關鍵協辦單位\n。社工團隊是維繫病患安全安置、安定病人家屬焦慮、防範院內維安衝突、以及死守醫護同工「心理防線」不致崩潰的堅固護盾。</p>\n<p>在社工室主任的統籌下，全體社工同工將迅速垂直轉移至地下避難核心區，展開以下<strong>五大範疇的具體生存應變與實兵防禦作為</strong>：</p>\n<p>一、 設立地下「家屬接待區」：執行無網尋人、家屬詢答與物品保管</p>\n<p>在主戰區炮火威脅且醫院實施內部封鎖（Lockdown）的混亂情境下 ，家屬找不到病患的恐慌極易引發集體暴動 。社工室必須在第一時間建立空間隔離防禦：</p>\n<ol>\n<li>\n<p><strong>實施「家屬與急救前線」空間實體隔離</strong>： -   社工人員迅速配合安全管制組（保安組），將聚集於急診前廳或病房的家屬，<strong>引導並安置於專屬的「家屬接待/安撫區」</strong>（例如：預先設定之轉診中心，或地下結構最安全的 <strong>恩慈大樓 B1 員工運動中心/協談室</strong>） 。 -   將家屬實體隔離於血腥的急診重症搶救區與繁忙的撤離轉運通道之外 ，確保前線醫療救治與簽證車隊轉運暢通無阻 。</p>\n</li>\n<li>\n<p><strong>執行無網「手動尋人與動向追蹤」</strong>： -   當 HIS 醫療資訊系統因當機全黑時 ，社工人員不等待修復，立即派專人對接計畫部的「狀況分析組（P2）」與「文件紀錄組（P3）」 。 -   取得人工紙本登記之最新「需撤離病人分組 B」與「上車簽證轉送名冊」 ，主動登記無名傷患的身分、年齡與住址 ，並以此確切名冊向焦急的家屬進行<strong>一對一的「去向詢答與轉院通知」</strong> ，告知病患轉送之標的聯防醫院（如屏醫、寶建、安泰或屏榮） 。</p>\n</li>\n<li>\n<p><strong>傷患財物與隨身物品之「防潮加密保管」</strong>： -   社工人員負責收集、登記與保管混亂中傷患遺留的隨身財物與行李 。 -   確定未受化災或戰火污染之物品，統一裝入塑膠袋中並貼上病患姓名 ，隨同病患之防水病歷袋一併移出轉移 ，嚴防戰亂中發生財物遺失或被趁火打劫 。</p>\n</li>\n</ol>\n<p>二、 支援極限醫療降載：協助辦理「極速離院、下轉與長照機構轉銜」</p>\n<p>為達成 24 小時內強行騰出大連院區至少 30% 至 40% 急重症病床的戰略目標\n，社工人員必須全力協助臨床醫護執行「降載疏散」：</p>\n<ol>\n<li>\n<p><strong>協助「第一類可返家病患」4小時極速出院</strong>： -   配合一線醫師執行的「反向檢傷（Reverse Triage）」評估結果 。 -   社工室立即出動協助，對接行政部車輛調度 ，協助預計出院的輕症或穩定病患配合<strong>「戰時記帳豁免機制」</strong>（零元結帳、免排隊、事後補收費） ，於 <strong>4 小時內</strong> 迅速辦理出院並安排車輛安全疏散返家 。</p>\n</li>\n<li>\n<p><strong>辦理「第二類需扶持者」之跨機構轉銜安置</strong>： -   針對生命徵象穩定，但缺乏生活自理能力、且在院內無家屬照顧的弱勢或住院病患 。 -   社工人員立即電洽並協調外部簽約之基層診所、社會福利機構或安全重置區的長照機構 ，妥善代辦轉院與轉送手續 ，迅速將非急重症病患轉銜出去，淨空大連院區的空間 。</p>\n</li>\n</ol>\n<p>三、\n啟動「心理韌性特遣隊」：死守醫護戰力，執行任務後「心理急救（PFA）與熱除頻」</p>\n<p>戰時面對殘酷的血肉模糊傷傷患、至親同胞的傷亡 ，以及面臨反向檢傷時必須放棄救治某些傷患的巨大「道德撕裂（Moral\nInjury）」 ，一線醫護的心理防線極易在 48\n小時內徹底崩潰 。社工室必須採取最主動的心理防禦：</p>\n<ol>\n<li>\n<p><strong>組建「心理韌性特遣隊」進駐地下庇護所</strong>： -   社工師與精神科醫師、臨床心理師及院牧部傳道共同組成<strong>「心理韌性特遣隊（Psychological Resilience Task Force）」</strong> 。 -   全天候進駐大連院區結構最安全、最深層地下室的<strong>「員工專屬庇護站」</strong>（如建議開設之恩慈大樓 2 樓員工運動中心） 。</p>\n</li>\n<li>\n<p><strong>強制執行任務後「即時熱除頻（Hot Debriefing）」</strong>： -   當前線工務、保安警衛或病房、急診醫護人員頂著大火與炮擊，輪替下班撤離火線時 ，特遣隊必須強制要求其在準備吃飯、睡眠前的 <strong>15 分鐘內</strong>，進行 <strong>15 至 30 分鐘之心理「除頻（Debriefing）」</strong> 。</p>\n</li>\n<li>\n<p><strong>引導情緒宣洩與實施「心理急救（PFA）」</strong>： -   提供絕對安靜、聽不到哀嚎、看不見鮮血的傾聽空間 ，引導同工宣洩壓抑的恐慌與憤怒 。 -   社工師實施專業心理急救（PFA） ，堅定地告訴同仁：<em>「你們已經做了在這種極端情況下能做的最好決定，你們沒有錯，這不是你們的責任」</em> ，<strong>協助她們卸下沉重的道德包袱，平復創傷後壓力症候群（PTSD）與戰鬥疲勞</strong> ，確保她們在 12 小時的生理休整後能重新冷靜地投入戰鬥 。</p>\n</li>\n</ol>\n<p>四、 行政與後勤協力：志工與支援人力調度、外部對接與防暴溝通</p>\n<ol>\n<li>\n<p><strong>調度志工與支援人力（人事組 F1 協力）</strong>： -   社工室發揮平日對外溝通優勢，協助人事組（F1）進行<strong>外部救災志工、已退休醫事同工與志願人力的集結、接待與登記</strong> 。 -   將通過安檢與身分核對的志工人力派往待命區 ，精準指派其擔任「徒步搬運工」或協助前線物資打包 ，分擔前線龐大之體力與後勤負荷 。</p>\n</li>\n<li>\n<p><strong>支援中控室總機，維持詢答線暢通</strong>： -   針對大量湧入查詢災情與病患下落的外部來電，社工室派專人進駐中控室，<strong>協助總機接聽並回覆電話，進行安撫與資訊過濾</strong> ，緩解資訊部門與通訊系統的飽和壓力。</p>\n</li>\n<li>\n<p><strong>防範非理性醫療暴力與對接防暴 Lockdown</strong>： -   面對因反向檢傷被拒絕住院、或因物資受限無法提早領藥而產生極端抱怨與攻擊行為的家屬 ，社工人員主動在接待區啟動「危機溝通」，詳細說明戰時檢傷與收治之法令公告 。 -   若家屬情緒失控升級為實體暴力，社工人員在確保自身安全的前提下，<strong>立即按下警鈴或以對話機（按※9）通報安全管制主管（保安組）</strong> ，啟動防暴封鎖（Lockdown）與警方協防，強力阻絕衝突蔓延 。</p>\n</li>\n<li>\n<p><strong>協辦家屬詢答說帖，反制假訊息認知戰</strong>： -   協同公共事務部（資源發展中心）與護理部，共同擬定標準化、溫和的<strong>「家屬詢答與通知說帖」</strong> 。 -   確保社工室、家屬接待區、病房護理站與急診對外解釋病患轉院安置、去向的處置標準百分之百一致 ，防止敵方假訊息或謠言在病患家屬間散播引發恐慌衝突 。</p>\n</li>\n</ol>\n<p>五、 極端狀態下的維生肉搏：主動投入「捏球大隊」</p>\n<p>若大連院區高樓層因主戰區飛彈震波或空襲而受創損毀，且伴隨全院大斷電、儲備之可攜式氧氣鋼瓶及電動呼吸器全部耗盡的「黑堡孤島」極限狀態時\n：</p>\n<ul>\n<li>\n<p>社工人員必須展現鐵血紀律，打破行政建制，<strong>自願接受動員並親自投入第一線肉搏戰</strong> 。</p>\n</li>\n<li>\n<p>社工同工將與行政、保全、清潔人員共同編入<strong>「捏球大隊（Ambu Bag Team）」</strong> 。</p>\n</li>\n<li>\n<p>在臨時 ICU 病房（約翰/馬可 B1）或急診紅區內，每位重症病患旁配置兩人 ，社工人員負責<strong>每 15 分鐘一班的手動甦醒球（Ambu bag）人工捏球接力</strong> ，以純人力的體力與意志力，維持插管重症病患在等待簽證救護車轉運前的最後一口氣 。</p>\n</li>\n</ul>"}]}, {"role": "營養室", "entries": [{"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對主管機關通知可能發生空襲或遠距火力威脅，要求醫院啟用 B1\n備援醫療空間及五處核心功能區的極端戰災情境，在\nHICS（醫院事故指揮系統）架構下，<strong>營養室</strong>隸屬於後勤部門的<strong>「勤務組（L1）」</strong>，肩負著維持前線醫療團隊與避難病患「基本維生」的關鍵重任。</p>\n<p>面對防空疏散與地下微型戰地醫院的緊急開設，營養室的具體因應與作業規劃如下：</p>\n<p><strong>一、 成立「膳食供應組」統籌指揮與精算調度</strong></p>\n<ol>\n<li>\n<p><strong>設立應變中樞</strong>：災難發生時，營養室須立即於單位內部成立<strong>「膳食供應組」指揮中心</strong>，由營養室主管（組長或營養師）擔任指揮官，綜理各項供膳因應事宜。</p>\n</li>\n<li>\n<p><strong>精算與送餐管理</strong>：轄下的「行政組」負責與各區聯絡，精確統計全院各 B1 避難區及臨時醫療功能區的用餐量；「物料組」則負責監督供餐並協助地下病房與紅區的送餐作業，確保在混亂的環境中配膳正確無誤。</p>\n</li>\n</ol>\n<p><strong>二、 動用戰備存糧與規劃 B1 避難餐飲</strong></p>\n<ol>\n<li>\n<p><strong>動用緊急糧食與飲水</strong>：空襲期間極可能伴隨聯外交通與常規物流中斷。營養室須立即盤點並動用預先儲備的 <strong>3 至 7 天緊急乾糧、飲用水及耐放食材（以根莖類為主）</strong>，確保防空避難期間的糧食供應不斷鏈。</p>\n</li>\n<li>\n<p><strong>提供不易腐敗物資</strong>：供膳原則應改為提供不易腐敗的食物（如罐頭、穀物、能量棒），並以「無需或僅需極少烹調與冷藏」為最高原則，以利在地下空間與緊急狀態下能快速分發。</p>\n</li>\n<li>\n<p><strong>支援高耗能人員與避難群眾</strong>：會同醫勤室，將有限的熱食與高熱量物資<strong>優先供應給進入 B1 臨時 ICU、臨時開刀房等區域進行戰傷搶救的高耗能醫護人員</strong>，以及於「員工庇護所」輪休待命的員工；同時為迫降於 B1 輕症病房及各避難區的病患與家屬提供基本膳食，穩定避難區的人心與體力。</p>\n</li>\n<li>\n<p><strong>地下空間餐飲規劃</strong>：若於備援空間劃設飲食區，應確保烹飪與用餐區域獨立，並備妥可支援手部衛生的設施及充足的食品儲存空間。</p>\n</li>\n</ol>\n<p><strong>三、 斷電危機下的「食材冷鏈保衛」（黑堡應變）</strong>\n若空襲摧毀電網或工務室執行「極限負載卸除」導致本院斷電，營養室必須採取極限保鮮措施防範食品中毒：</p>\n<ol>\n<li>\n<p><strong>極限管控冷藏設備</strong>：在備用電力受限下，<strong>極限減少進出冷藏及冷凍庫的次數</strong>。一般冷藏若不開啟仍可維持 4 小時，冷凍若不開啟可維持 24 小時。</p>\n</li>\n<li>\n<p><strong>食材使用優先順序</strong>：應先列出食物清單再快速拿取，<strong>優先消耗冷藏食物，隨後再使用冷凍食物</strong>。對有疑慮或異味的食材必須果斷丟棄，防範院內爆發群聚食品中毒。</p>\n</li>\n<li>\n<p><strong>物理保冰替代</strong>：必要時採用冰塊保存食物，盡速以冰桶將食材冷藏，延長保鮮時間。</p>\n</li>\n</ol>\n<p><strong>四、 啟動外部緊急供膳、斷水及「斷糧」替代方案</strong></p>\n<ol>\n<li>\n<p><strong>外部緊急供應商接手</strong>：若空襲導致本院廚房設施損毀，或地下室空間重構時必須完全淨空廚房區域，營養室須立即聯絡緊急供應商（如：<strong>部立屏東醫院 HACCP 廚房、嘉軒美食有限公司</strong>）接手負責全院供餐。</p>\n</li>\n<li>\n<p><strong>極端斷水替代</strong>：若發生管線破裂或停水事件，但在不須撤離且設備仍可使用的狀況下，立即改以購買礦泉水或調度山泉水，解決基本的膳食製備與飲用需求。</p>\n</li>\n<li>\n<p><strong>極端斷糧支援</strong>：如遇聯外交通完全阻絕、外部供應商無法抵達的孤島斷糧危機，將立即協調<strong>本院便利商店（7-11）</strong>作為第一優先支援膳食供糧的應急據點，全力支援地下微型戰地醫院的最低維生需求。</p>\n</li>\n</ol>"}]}]}, {"id": "logistics_admin", "name": "後勤與行政支援", "roles": [{"role": "總務部", "entries": [{"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」之複合性危機，總務部在\nHICS（醫院事故指揮系統）架構下主要接掌「後勤部（Logistics\nSection）」指揮權，負責全院空間轉換、物資調度與勤務支援，以確保急診前線搶救順暢。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 啟動大面積戰術空間轉換（因應大量傷患與恐慌人潮）</strong>\n面對交通事故與恐慌人潮瞬間癱瘓急診，總務部必須迅速執行空間重構：</p>\n<ol>\n<li>\n<p><strong>大廳瞬間轉換</strong>：總務部須於接獲大量傷患通報的30分鐘內，清空一樓門診大廳的所有候診椅、裝飾物與宣傳立牌。依據地面預先貼好的紅（重傷）、黃（中傷）、綠（輕傷）、黑（死亡/無救）四色動線，將大廳轉換為「大量傷患一線檢傷區」與「輕傷縫合包紮區」，有效將佔比極高的恐慌輕傷患阻絕於真正急診重症區外。</p>\n</li>\n<li>\n<p><strong>地下室空間淨空與設立臨時專區</strong>：強制淨空地下停車場車輛，將其劃定為「戰略物資地下補給站」。同時，於動線絕對獨立的角落設立「臨時太平間（Morgue）」，確保生者（家屬、輕症）與死者動線嚴格物理分離，避免加劇民眾與醫護的心理恐慌。</p>\n</li>\n</ol>\n<p><strong>二、 統籌後勤指揮與物資/衛材調度</strong></p>\n<ol>\n<li>\n<p><strong>接掌後勤指揮權</strong>：總務部部長將擔任 HICS\n    的「後勤部長（L0）」，負責統籌物資、器材、人力、交通及膳食等調度。</p>\n</li>\n<li>\n<p><strong>統籌救援物資與衛材供應</strong>：總務部須統籌運用獲得之救援物資，並嚴密規劃需求的優先順序。現場急需之衛材部分，由總務部衛材管理人員及供應室人員負責準備並提供給前線。</p>\n</li>\n<li>\n<p><strong>緊急設備補充</strong>：針對急診室搶救需求，迅速集中與補充擔架、推床等設備；若急診本身配備不足，總務人員須協助從內、外科病房緊急調用以應付大量傷患。</p>\n</li>\n</ol>\n<p><strong>三、 支援病患搬運與人力調派</strong></p>\n<ol>\n<li><strong>協助傷患搬運</strong>：在大量傷患應變機制啟動時，總務部須調派所屬人員前往急診現場，負責協助醫護人員進行病患的搬運工作，以加速急診前線的處理與空間騰出。</li>\n</ol>\n<p><strong>四、 協助戶外分流站與家屬安置區之硬體開設</strong>\n配合執行部（醫療照護組）與社工室的決策，總務部須調度物資與人力，協助搭設與搬運硬體設備（如帳篷、桌椅），以支援開設「戶外慢性病處方籤領藥區」與專屬的「家屬接待區」。透過空間硬體的支援，將單純要求提早領藥與查詢撤離資訊的家屬及恐慌民眾，實體隔離於急診搶救動線之外。</p>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，醫院正面臨物資極度匱乏與交通受阻的「孤島效應」。在\nHICS（醫院事故指揮系統）架構下，<strong>總務部</strong>扮演著維繫全院實體資源命脈的關鍵角色。總務部部長將擔任<strong>「後勤部長（L0）」</strong>，負責統籌緊急應變所需之物資、器材、人力及運輸調度。</p>\n<p>總務部及其轄下單位的具體因應作為如下：</p>\n<p><strong>一、 接掌後勤指揮，統籌物資與精算優先順序</strong></p>\n<ol>\n<li>\n<p><strong>確立物資分配優先序</strong>：面對各項維生物資配送延遲，總務部須立即會同轄下採購、資材及營養等單位，精算藥材、膳食、飲水與耗材的消耗速率與現存缺口。總務部須統籌運用獲得之救援物資，並嚴密規劃需求的優先順序，將有限資源絕對集中於重症搶救與維持核心醫療運作。</p>\n</li>\n<li>\n<p><strong>簽證物資接收與保管</strong>：負責接收與保管任何突破交通阻礙運達的簽證物資、備品與救援資源，並快速調配至急需的單位。</p>\n</li>\n</ol>\n<p><strong>二、 啟動戰略物資「盲派（Push）」物流</strong></p>\n<ol>\n<li>\n<p><strong>顛覆常規領用</strong>：在聯外交通阻斷的極端狀況下，總務部轄下的資材組與藥劑科必須採取「推拉式物流（Push-Pull\n    Logistics）」機制，打破平時「有申請才領用」的常規。</p>\n</li>\n<li>\n<p><strong>主動推進救命物資</strong>：資材人員須將預先打包好的「戰傷急救箱」或衛材，不待前線發出需求，主動「盲派（Push）」推至急診紅區與開刀房門口，確保前線醫護伸手就能拿到救命物資，並嚴格管制現有庫存。</p>\n</li>\n</ol>\n<p><strong>三、 支援病患搬運與殘存人力調度</strong></p>\n<ol>\n<li>\n<p><strong>協助傷患搬運</strong>：面對員工到勤受交通影響而出現嚴重人力缺口，總務部必須調派所屬人員前往急診現場或病房，負責協助醫護人員進行病患的搬運與輸送工作。</p>\n</li>\n<li>\n<p><strong>待命人力與支援調度</strong>：總務部須評估執行部門所需資源，將突破交通障礙抵達的員工或志工集中至待命區，依據前線需求，精準調度與配送支援人力。</p>\n</li>\n</ol>\n<p><strong>四、 維持人員飲水、膳食供應</strong></p>\n<ol>\n<li>\n<p><strong>啟動膳食災難應變</strong>：因應飲水與膳食配送延遲，總務部須協調醫勤室與營養室確保工作人員的飲食及飲水供應。</p>\n</li>\n<li>\n<p><strong>替代供糧方案</strong>：若遇停水，須動用備用礦泉水或山泉水以解決膳食製備與飲用需求；若遇緊急斷糧危機，則第一優先協調本院便利商店（7-11）或在地替代廠商支援膳食供糧，維持留守員工的體力。</p>\n</li>\n</ol>\n<p><strong>五、 運輸工具之極限調度</strong></p>\n<ol>\n<li><strong>院內外交通運輸調度</strong>：針對病人轉送不確定性提高，總務部（運輸組）須評估並調度醫院現有之運輸工具（如中巴及救護車），隨時做好準備。一旦交通稍有恢復，或有國軍/外部車輛支援抵達，即可立即進行傷患的安全後送與轉銜。</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透偵蒐、資源搶奪與群眾失控的複合型安全危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>總務部</strong>是全院實體資源守護與後勤調度的樞紐。總務部部長擔任<strong>「後勤部長（L0）」</strong>，負責管理並參與應變行動計畫中所有維持醫療服務與事件所需支援的相關設備、物資、器材及人力之調度。</p>\n<p>總務部的具體因應作為如下：</p>\n<p><strong>一、 統籌物資保衛與設立地下補給站</strong>\n面對社區避難人潮湧入並尋求物資，總務部必須採取強勢的物資保衛行動，防範平時的庫存區成為搶奪目標。</p>\n<ol>\n<li>\n<p><strong>拒絕非醫療發放與嚴格管制</strong>：貫徹指揮中心決策，嚴格管制院內現存的飲水、食物與醫療備品，防範資源被非醫療需求耗竭，將物資供應絕對保留給核心醫療搶救使用。</p>\n</li>\n<li>\n<p><strong>物資地下化與集中看管</strong>：會同轄下資材單位，將重要物資移轉至安全區域。配合空間轉換，將地下停車場車輛強制淨空（必要時動用拖車），劃定為「戰略物資地下補給站」，以利隱密補給並防範暴民搶奪。</p>\n</li>\n</ol>\n<p><strong>二、 支援「硬邊界」防護與實體阻絕</strong>\n針對不明人車與推擠群眾，醫院必須配合警力實施物理封鎖（Lockdown）與出入管制。</p>\n<ol>\n<li>\n<p><strong>提供實體阻絕載具</strong>：總務部須調度院方現有之工程車或大型車輛，協助保安組橫停於非必要之出入口，作為防衝撞的實體阻絕物，加固「硬邊界」防線。</p>\n</li>\n<li>\n<p><strong>救護與卸補動線確保</strong>：在出入口大幅縮減與群眾包圍下，統籌交通與運輸工具調度，協助確保單一檢傷通道、救護車轉送與關鍵物資卸補車道的絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 嚴密的人力資源辨識與防滲透</strong></p>\n<ol>\n<li>\n<p><strong>防護第五縱隊（在地協力者）滲透</strong>：針對無人機偵蒐與不明人車（可能為敵方特工破壞前兆），總務部必須嚴格執行「人力資源召募與辨識」。對於任何被召回的員工、支援人力或志工，實施極其嚴格的身分核對並配發專屬識別，杜絕有心人士偽裝混入關鍵設施（如發電機房、伺服器機房）進行破壞。</p>\n</li>\n<li>\n<p><strong>待命區資源管理</strong>：妥善統籌待命區的人力與物資，並依據前線防護或急救需求，精準且安全地進行人力調度與配送。</p>\n</li>\n</ol>\n<p><strong>四、 維持前線員工之維生與身心照顧</strong></p>\n<ol>\n<li>\n<p><strong>飲水與膳食供應</strong>：在醫院實施內部封鎖與最高警戒狀態下，外送物流將完全中斷。總務部須統籌工作人員的飲水、食物供應，確保人員健康與福利。將熱食與高熱量物資絕對優先補給給身處高壓搶救前線的醫護與保安防暴人員。</p>\n</li>\n<li>\n<p><strong>員工住宿與庇護支援</strong>：為因應高壓防暴與強制輪班，總務部須統籌住宿資源，協助於安全的地下室區域設立員工專屬庇護站，提供行軍床與休息物資，維持留守員工長期應變的戰鬥力。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況 2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用 B1\n備援醫療空間及五處功能區」，此時醫院面臨極端的戰爭與空襲威脅，必須進行大面積的「空間降階防護」，將核心醫療轉移至地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>總務部</strong>不僅其部長擔任<strong>「後勤部長（L0）」</strong>，其轄下更涵蓋工務、醫勤（事務、運輸、保安）等關鍵單位。總務部是維持地下「微型戰地醫院」運作的生命線與大後勤中樞。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 統籌後勤資源與大後勤指揮（後勤部長 L0）</strong></p>\n<ol>\n<li>\n<p><strong>最高後勤調度</strong>：總務部部長作為後勤部長，負責管理並參與應變行動，統籌調度維持\n    B1 醫療服務與防空避難所需之所有設備、物資、器材及人力。</p>\n</li>\n<li>\n<p><strong>跨部門協調</strong>：與指揮官、行政/財務部長及聯絡官保持密切聯繫，確保各項防空疏散與資源調度程序的正確性與即時性。</p>\n</li>\n</ol>\n<p><strong>二、 執行「戰術空間轉換」與維生保衛</strong></p>\n<ol>\n<li>\n<p><strong>空間重構與開設</strong>：總務部（協同轄下工務室）依據指揮中心命令，必須迅速搬離大廳或地下室原有的雜物與座椅，協助拉設臨時電源與照明，將地下室非醫療空間迅速轉換為\n    B1 五大功能區（檢傷行政區、臨時\n    ICU、臨時開刀房、恢復室及輕症病房）。</p>\n</li>\n<li>\n<p><strong>生命線保衛與極限節流</strong>：作為醫院的「生命線保衛者」，必須確保發電機、地下水塔與醫療氣體在\n    B1\n    備援空間持續運作；必要時執行「負載卸除」，強行切斷高樓層或非必要區域的電源，以延長燃料與維生系統的使用時間。</p>\n</li>\n</ol>\n<p><strong>三、 運輸載具調度與垂直疏散支援</strong></p>\n<ol>\n<li>\n<p><strong>病患搬運支援</strong>：總務部人員須投入防空疏散的實體搬運工作，協助將無法自行移動的病患轉移至安全區。</p>\n</li>\n<li>\n<p><strong>載具集中與派發</strong>：總務部轄下單位須確實盤點並集中待命的救護車推床、輪椅和擔架數量，並指派人員協助醫療照護組將重症病患從高樓層垂直搬運疏散至\n    B1 避難區。</p>\n</li>\n</ol>\n<p><strong>四、 維持地下層之備援通訊網路</strong></p>\n<ol>\n<li>\n<p><strong>建立獨立通訊</strong>：因地下室極易發生訊號死角，總務部（轄下事務組）需檢查所有手持通訊設備，並評估通訊需求。</p>\n</li>\n<li>\n<p><strong>頻道分配</strong>：分配專屬的無線電頻道給進入 B1\n    各功能區的指揮官與醫護人員，提供獨立雙向通訊系統，確保防空避難期間的指揮通訊暢通。</p>\n</li>\n</ol>\n<p><strong>五、 防空避難期間之膳食飲水與員工庇護</strong></p>\n<ol>\n<li>\n<p><strong>穩定民心與體力</strong>：總務部負責統籌防空避難期間，所有迫降於 B1\n    工作的人員、避難病患及家屬的基本飲水與膳食供應，必要時動用戰備存糧。</p>\n</li>\n<li>\n<p><strong>設立員工庇護所</strong>：協助照顧執行部門人員的健康與福利，於指定安全區域設立員工休息及生活支援區，提供輪休庇護，確保醫療人員的戰力維持。</p>\n</li>\n</ol>\n<p><strong>六、 災後損害勘查與硬體復原重建</strong></p>\n<ol>\n<li>\n<p><strong>災情勘查與鑑定</strong>：待空襲威脅或警報解除後，總務部負責向相關單位申請災損鑑定小組到院，實施災損勘查與結構安全鑑定。</p>\n</li>\n<li>\n<p><strong>設施復原重建</strong>：依據勘查結果，統籌辦理建築物內部設備的修繕、危險排除與硬體設施復原重建工作，協助醫院盡速恢復常規營運。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨基礎設施嚴重受損的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>總務部</strong>扮演著支撐全院運作的後勤骨幹，由總務部部長擔任<strong>「後勤部長（L0）」</strong>。雖然第一線的搶修是由工務室或資訊室執行，但總務部必須統籌所有的物資、人力與設施支援，確保搶修與醫療應變能夠順利推進。</p>\n<p>面對此極端狀況，總務部的具體因應作為如下：</p>\n<p><strong>一、 擔任「後勤部長（L0）」，統籌全院資源與支援</strong></p>\n<ol>\n<li>\n<p><strong>最高後勤指揮</strong>：總務部部長作為後勤部長，負責管理並參與應變行動計畫中所有維持服務及事件所需支援的相關設備、物資、器材及人力之調度。</p>\n</li>\n<li>\n<p><strong>督導轄下分組</strong>：統籌並督導勤務組（含醫勤室、營養室、運輸組）與任務支援組（含資材組），確保通訊備援、膳食飲水供應及醫療/非醫療物資的取得與分配。</p>\n</li>\n</ol>\n<p><strong>二、 執行緊急物資管控與支援調度</strong></p>\n<ol>\n<li>\n<p><strong>進入緊急備援狀態</strong>：總務工作人員須立即進入緊急備援狀態，清點現有庫存與在途訂量品項，並轉知採購人員。</p>\n</li>\n<li>\n<p><strong>物資極限管制</strong>：在災害期間，實施嚴格的物資管制，「非必要之用品暫不供應」，將有限資源保留給搶修與緊急醫療任務使用。</p>\n</li>\n<li>\n<p><strong>發放搶修與應變物資</strong>：配合前線需求，總務部與資材人員須迅速提供緊急照明設備、手電筒、電池、沙包、吸水耗材以及水電機具供應，支援工務室的漏水防堵與停電搶修。</p>\n</li>\n</ol>\n<p><strong>三、 協助病患搬運與空間戰術轉換</strong></p>\n<ol>\n<li>\n<p><strong>無動力搬運支援</strong>：因電力瞬斷導致電梯停用，病患若需進行水平或垂直疏散，總務部人員必須親自投入前線，協助以擔架或推床進行「病患搬運」的體力任務。</p>\n</li>\n<li>\n<p><strong>空間降階與轉換</strong>：若病房因漏水、空調異常或火警受損，總務部須依據指揮中心命令，迅速搬離大廳座椅、協助搭建帳篷或拉設臨時電源與照明，將非醫療空間轉換為臨時病房、救護站或人員收容區。</p>\n</li>\n</ol>\n<p><strong>四、 檢視建築損壞與災情勘查</strong></p>\n<ol>\n<li>\n<p><strong>初期災損巡視</strong>：震動與爆炸發生後，總務部（後勤組）人員須協助檢視建築物損壞之情形，並回報給\n    HICS 指揮中心。</p>\n</li>\n<li>\n<p><strong>申請災損鑑定</strong>：在搶救告一段落後，總務部依作業規定，向相關單位申請災損鑑定小組到院實施災損勘查與鑑定。</p>\n</li>\n</ol>\n<p><strong>五、 主導災後「硬體設施復原重建」</strong>\n在應變後期與復原階段，總務部是主導醫院重生的核心單位：</p>\n<ol>\n<li>\n<p><strong>復原工程發包</strong>：總務部負責主導受損硬體設施（如漏水管線、空調系統、電梯與受損建築）的復原重建工作。</p>\n</li>\n<li>\n<p><strong>施工安全與監工</strong>：依本院編列復原之預算及其執行作業規定，視狀況進行公告招標及開標，並規劃嚴格的施工安全管制，指派監工管制施工進度及品質，確保修復後的設施強固與安全。</p>\n</li>\n</ol>\n<p>工務室如何確保醫院核心區域的備用電力？</p>\n<p>資訊室在斷網時如何協助病歷資料的紙本作業？</p>\n<p>護理部在設施受損時如何進行病患的垂直疏散？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院瞬間面臨敵方實體破壞、極高爆炸/火災風險，以及維生系統（電力與氧氣）雙雙中斷的複合型毀滅性孤島危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>總務部</strong>是支撐全院極限搶修、病患防護與後勤補給的最強大骨幹。總務部部長將擔任指揮中心的<strong>「後勤部長（L0）」</strong>，雖然第一線的滅火與機電搶修由工務室執行，但總務部必須統籌所有的物資、人力與設施支援，確保搶救行動不斷鏈。</p>\n<p>總務部的具體因應作為如下：</p>\n<p><strong>一、 擔任「後勤部長（L0）」，統籌後勤指揮與極限支援</strong></p>\n<ol>\n<li>\n<p><strong>最高後勤調度</strong>：總務部部長作為後勤部長，負責管理並參與應變行動計畫中所有維持醫療服務及事件所需支援的相關設備、物資、器材及人力之調度。</p>\n</li>\n<li>\n<p><strong>督導轄下分支支援搶修</strong>：統籌並督導勤務組（含醫勤室、營養室、運輸組）與任務支援組（含資材組），全力配合工務室搶修主發電機與防堵液氧洩漏的需求，提供搶修所需之各項實體資源與防護裝備。</p>\n</li>\n</ol>\n<p><strong>二、 執行緊急物資極限管控與外部維生調度</strong></p>\n<ol>\n<li>\n<p><strong>啟動緊急備援與物資管制</strong>：總務工作人員須立即進入緊急備援狀態，實施最嚴格的物資管制，貫徹<strong>「非必要之用品暫不供應」</strong>原則，將有限資源絕對保留給搶修人員與重症維生任務使用。</p>\n</li>\n<li>\n<p><strong>發放搶修與應變物資</strong>：因應主發電機受損帶來的斷電危機，總務部（資材組）須迅速提供<strong>緊急照明設備、手電筒、電池、沙包及防護裝備</strong>給第一線搶修人員，支援工務室的機電搶修與現場封鎖。</p>\n</li>\n<li>\n<p><strong>外部維生物資請求</strong>：面對主氧氣槽洩漏與主發電機受損，總務部須配合採購單位，緊急聯繫外部供應商（如明威發電機、信光氧氣行等）或向聯合應變中心請求緊急調度「大量備用氧氣鋼瓶」與「移動式發電車」至遠離火場的安全地帶支援。</p>\n</li>\n</ol>\n<p><strong>三、 集中搬運載具與親自投入「無動力疏散搬運」</strong>\n爆炸與液氧洩漏極可能迫使鄰近機電棟的病房進行緊急疏散，且主發電機受損將導致電梯全面停擺：</p>\n<ol>\n<li>\n<p><strong>集中運輸載具</strong>：總務部須迅速盤點並集中院內所有的輪椅、擔架、救護推床與樓梯疏散滑墊（軟擔架），統一送至病房區或急診待命區，供前線醫護人員調度使用。</p>\n</li>\n<li>\n<p><strong>親自投入無動力搬運</strong>：在大量病患急需移出的過程中，總務部等非醫療後勤編組人員必須打破職級界線，親自投入前線。以純人力方式（如 5人一組），協助護理人員將重症病患經由安全梯進行高強度的<strong>水平與垂直搬運作業</strong>。</p>\n</li>\n</ol>\n<p><strong>四、 執行空間戰術轉換與緊急庇護供膳</strong></p>\n<ol>\n<li>\n<p><strong>空間降階與硬體重建</strong>：若病患需緊急疏散至大廳或地下室安全的避難區，總務部須依據指揮中心命令，迅速搬離原有雜物與座椅、協助搭建臨時帳篷，並會同工務室進行「醫療器材架設、水電重建及電腦佈設」等空間戰術轉換，將非醫療空間轉換為臨時救護站或人員收容區。</p>\n</li>\n<li>\n<p><strong>維持膳食飲水與設立庇護所</strong>：工務室搶修人員與警衛正冒著極高爆炸風險進行搶救，總務部須會同營養室優先確保這些高強度應變人員的飲水與高熱量膳食補給。同時，在遠離爆炸威脅的地下室或安全區域設立員工休息庇護區，供撤離的醫護人員及搶修輪替人員安全休息，防範戰鬥疲勞。</p>\n</li>\n</ol>\n<p><strong>五、 主導災後災情勘查與硬體設施復原重建</strong></p>\n<ol>\n<li>\n<p><strong>初期災損巡視與申請鑑定</strong>：爆炸震動過後，總務部人員須協助檢視機電棟及鄰近建築物損壞之情形，並向相關單位申請災損鑑定小組到院實施災損勘查與結構安全鑑定。</p>\n</li>\n<li>\n<p><strong>主導復原重建工程</strong>：在應變後期與復原階段，總務部是主導醫院重生的核心單位。負責受損硬體設施（如受損的主發電機、液氧槽管線與被破壞的建築結構）的復原重建工作。視狀況進行工程發包，規劃嚴格的施工安全管制並派員監工，確保醫院盡速恢復強固與安全的營運韌性。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>當屏東基督教醫院（屏基）大連院區面臨「兩名喬裝成外包維修人員的特工企圖在核心機房放火、並於頂樓自來水塔投放不明化學物質」之國家關鍵基礎設施（CI）實體與化學（CBRN）複合型敵特滲透攻擊時，<strong>總務部在\nHICS（醫院事故指揮系統）架構下主要接掌「後勤部門（Logistics\nSection）」指揮權</strong>。</p>\n<p>在<strong>後勤部長 L0（總務部部長 許慧莉）勤務組 L1（醫勤室主任\n吳哲維）任務支援組 L2（資材組組長 吳佳蓉）</strong>，並會同工務室（設施運作主管\nO2）及保安組（安全管制主管\nO4），將立即啟動以下<strong>六個階段之生存抗擊、水電管線緊急防禦、物資盲派與防滲透管制具體作為</strong>：</p>\n<p>一、 迅速開設後勤協配中樞，支援全院「硬邊界防護」阻絕滲透</p>\n<ol>\n<li>\n<p><strong>後勤指揮地下化開設</strong>：總務部部長第一時間進駐地下前進指揮所（開設於恩慈大樓 B1 會議室），啟動「72小時物資／能源維持與後勤支援計畫」。</p>\n</li>\n<li>\n<p><strong>提供實體防禦阻絕載具</strong>：配合安全管制組（保安組）實施的「全院內部極速封鎖（Lockdown）」與「建立硬邊界防禦（Hard Perimeter）」決策，總務部立即<strong>調派院方工程車或大型運輸車輛橫停於非必要之出入口</strong>，作為防衝撞的實體阻絕物，強勢加固物理防線，阻絕其餘敵特或恐慌民眾衝撞院區。</p>\n</li>\n<li>\n<p><strong>維持急救與運補動線絕對淨空</strong>：在出入口大幅縮減、僅保留急診車道作為唯一通道時，總務部（勤務組）統籌交通與運輸工具調度，強勢驅離急診前車道的違停或閒雜車輛，確保救護車轉送、消防車及關鍵物資運送（如血液、氧氣）車道保持絕對暢通。</p>\n</li>\n</ol>\n<p>二、 嚴密防堵「第五縱隊」！實施召回人員與志工之身分安檢與防偽識別</p>\n<p>由於歹徒採取「喬裝外包人員」之滲透手段，代表戰時有機密外洩或敵特偽裝混入的極高風險：</p>\n<ol>\n<li>\n<p><strong>實施極嚴格之「身分物理聯檢」</strong>：當 HICS 啟動緊急召回同工、志工至主要待命區（護理部前廳）或預備集合區（恩慈 1F 停車場東側）集結時，總務部與人事組、保安組於集合哨口設立「聯合檢查站」。逐一核對所有召回員工與志工的實體身分證與執業執照，並<strong>使用手持金屬探測器進行武器搜查</strong>，防止在地協力者或其餘特工冒充同工混入高脆弱區。</p>\n</li>\n<li>\n<p><strong>發配防偽專屬識別與門禁鎖固</strong>：所有核實身分之召回同工與合法志工，必須配發並隨時穿戴<strong>「專屬螢光識別背心（或臂章）」與「HICS 任務卡」</strong>。未穿戴者一律視為入侵可疑份子，由保安哨即刻壓制，嚴防特工混入地下室發電機房、伺服器機房、頂樓水塔或戶外液氧槽等關鍵設施（CI）進行二次破壞。</p>\n</li>\n</ol>\n<p>三、 自來水投毒應變：毒水隔離、地下水切換與「水資源紅區管制」</p>\n<p>針對頂樓水塔遭化學物質投毒威脅，總務部統籌工務室，採取最嚴格之供水與節流控制：</p>\n<ol>\n<li>\n<p><strong>頂樓受污染水塔之「物理隔離」</strong>：總務部督導工務室立即奔赴頂樓，<strong>實施水管閥門之「分段、分區關閉」</strong>，封鎖並隔離受污染水塔之輸出管道，防止劇毒污水流入洗腎中心、開刀房等臨床高耗水重症紅區。</p>\n</li>\n<li>\n<p><strong>啟動地下戰備水塔供水系統</strong>：工務人員立即<strong>啟動地下水系統正常供水，並將水塔連結管路打開，讓五座水塔實現互補供水</strong>，維持核心供水不中斷。</p>\n</li>\n<li>\n<p><strong>殘酷執行「水資源紅區管制」</strong>： -   備用地下水塔之淨水<strong>百分之百優先、且僅供應給 B1 臨時開刀房刷手、器械基本消毒及重症維生飲用</strong>。 -   <strong>手動封閉全院一般洗手間</strong>，嚴禁一般盥洗與沖洗馬桶；勤務組迅速向病房及避難區發放酒精乾洗手液與<strong>「化學便器袋（替代馬桶）」</strong>，實施極限防禦節流。</p>\n</li>\n<li>\n<p><strong>請求外部水車與外購水源</strong>：若地下水系統故障或水源不足，總務部（後勤部長）配合聯絡官，立即<strong>向自來水公司、消防局或山泉水合約廠商（如高山行山泉水 0910-788388）請求水車支援或進行緊急外購水源</strong>，並由總務部廣播全院節約用水。</p>\n</li>\n</ol>\n<p>四、 核心機房縱火應變：極限「電力負載卸除」與「戰備藥耗材盲派」</p>\n<ol>\n<li>\n<p><strong>死守紅區電力供應（電力負載卸除 Load Shedding）</strong>：若機房大火或電力線路受損引發供電異常，工務室在總務部部長指揮下，強制手動切斷全院所有行政辦公區、一般病房、冷氣空調及 80% 的電梯電源迴路。<strong>將緊急發電機僅存的柴油電力，百分之百死守在開刀房、ICU、急診室、資訊機房與血庫冰箱等重症紅區</strong>。</p>\n</li>\n<li>\n<p><strong>戰略物資地下化防護</strong>：為防範有心人士在縱火與斷電混亂中搶奪資源，任務支援主管（資材組長）立即將重要的醫療及非醫療設備、藥品與物資移轉集中，確實於<strong>「約翰／馬可大樓 B1 資材室」及「馬太大樓 B1 藥庫」</strong>設立地下補給站，並請保安組增派 24 小時重兵防守，防範暴民搶奪。</p>\n</li>\n<li>\n<p><strong>啟動當機狀態下之「戰備物資盲派（Push）」物流</strong>：若爆炸大火連帶引發資訊伺服器損毀、全院系統大當機（Downtime），臨床無法電子叫料。後勤人員打破平時「有申請才領用（Pull）」的常規，將預先打包之<strong>「戰傷急救箱 (Trauma Go-Kits / Go-Kits)」</strong>（內含戰術止血帶、骨針、含止血劑紗布、輸液、抗生素等），<strong>不待前線表單申請，直接以「盲派（Push）」主動推送至急診紅區與韓偉 B1 臨時手術室門口</strong>，確保前線戰力不因斷網崩盤。</p>\n</li>\n</ol>\n<p>五、 無動力垂直轉運、孤島膳食維持與「員工庇護站」開設</p>\n<ol>\n<li>\n<p><strong>無電梯電網癱瘓下之「無動力垂直疏散」支援</strong>：若大火蔓延威脅原病區、且電力異常導致電梯停擺，勤務組（L1）迅速盤點並集中院內所有的輪椅、擔架、推床，以及護理站預備之<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>。動員總務部非醫療同工（行政、保全、清潔、志工），親自投入前線，協助護理人員採取<strong>「5人一組（4人搬運、1人照護）」</strong>的人工接力搬運，安全且快速地將高樓層重症病患、維生設備垂直疏散轉運至地下一樓（B1）備援空間。</p>\n</li>\n<li>\n<p><strong>停水停電下之「孤島膳食與飲水維持」</strong>：若廚房烹調或冷藏設備因斷電斷水停擺，總務部（營養室）立即動用預先儲備的 <strong>3 至 7 天緊急乾糧、應急口糧與飲水</strong>；若物資耗竭，第一優先協調並調撥<strong>本院便利商店（7-11）</strong>或在地合約商家支援膳食，維持抢修人員、防暴保全及在院患者之體力。</p>\n</li>\n<li>\n<p><strong>開設地下「員工專屬庇護站」維護長期戰力</strong>：在高壓危安、初期滅火與搶修環境下，同工身心極易耗竭。總務部須於結構最安全、最深層之地下室區域（如恩慈 2F 員工運動中心）設立<strong>「員工專屬庇護站」</strong>，提供行軍床與休息物資。會同安全管制組實施嚴格門禁，確保同工在「聽不到哀嚎聲、看不到鮮血」的絕對安靜環境中進行強制輪休，防範戰鬥疲勞。</p>\n</li>\n</ol>\n<p>六、 災後復原階段：災損鑑定、原因調查與理賠保全</p>\n<ol>\n<li>\n<p><strong>配合災情勘查與硬體復原重建</strong>：火勢撲滅、歹徒移交且安全官評估無虞後，總務部（後勤組）依作業規定，向相關單位<strong>申請災損鑑定小組到院實施災損勘查與結構安全鑑定</strong>。主導受損核心機房、被污染頂樓自來水塔之搶修，並指派監工管制發包施工之進度及品質，確保修復後的設施強固安全。</p>\n</li>\n<li>\n<p><strong>消防與防禦空置補充</strong>：由環保室會同外包清潔公司對現場實施泡水、化災、煙煙燻區域之徹底除污與環境消毒，防範傳染病流行；會同消防代檢公司全面檢查全院消耗之滅火器、防護裝備、化學防護衣（PPE）並迅速補齊，防止防禦空置。</p>\n</li>\n<li>\n<p><strong>保險與理賠事宜處置</strong>：總務部會同會計室，立即通知保險公司，辦理財產損失、公共意外責任險與團體保險之理賠理算，保全醫院資產。</p>\n</li>\n<li>\n<p><strong>損失呈報</strong>：於災害發生 <strong>3 日內</strong> 清查人員傷亡及財物損毀損失情形，列冊陳報院長室。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，在面臨大量病患需要緊急撤離、轉院與重置的極端挑戰下，<strong>總務部</strong>在\nHICS（醫院事故指揮系統）架構下扮演著支撐全院疏散行動不斷鏈的「後勤中樞」角色。</p>\n<p>總務部部長擔任 HICS\n中的<strong>「後勤部長（L0）」</strong>，轄下督導「勤務組（L1）」與「任務支援組（L2）」。其具體因應作為如下：</p>\n<p><strong>一、 擔任「後勤部長（L0）」，統籌全院撤離資源</strong></p>\n<ol>\n<li>\n<p><strong>最高後勤指揮</strong>：總務部部長作為後勤部長，負責管理並參與應變行動計畫中，所有維持醫療服務及疏散事件所需支援的相關設備、物資、器材及人力之調度。</p>\n</li>\n<li>\n<p><strong>統籌跨組後勤支援</strong>：統籌並督導勤務組、任務支援組、營養室及藥劑科等單位，確保撤離過程中的物資、交通、膳食、住宿、藥品與血液支援，並管理待命區的各項資源。</p>\n</li>\n</ol>\n<p><strong>二、 啟動緊急運輸車輛調度與通訊維持（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>車輛徵用與調派</strong>：由醫勤室主任擔任勤務主管，負責評估醫院疏散服務所需的運輸工具。總務部須統籌調派院內現有車輛或請求外部大眾運輸工具（接駁車），以協助病人的疏散運送與重置。</p>\n</li>\n<li>\n<p><strong>規劃通訊與膳食</strong>：規劃疏散過程中的內部與外部通訊設備分配，並為參與高強度疏散任務的工作人員及等候撤離的病患提供飲水與膳食供應。</p>\n</li>\n</ol>\n<p><strong>三、 整備「隨車醫療物資」與衛材供應（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>戰備物資隨行準備</strong>：由資材組組長擔任任務支援主管，負責取得並儲存所有重要的醫療與非醫療物資及藥品。總務部衛材管理人員及供應室人員必須迅速準備撤離所需的相關衛材。</p>\n</li>\n<li>\n<p><strong>防範轉送物資斷鏈</strong>：總務部（後勤組）必須確保準備足夠量的急救藥物、靜脈輸液或血液製品，並<strong>與病人一起運送</strong>到重置區或接收醫院，以避免在轉送過程中或剛抵達接收醫院時發生醫藥存量耗竭的危機。</p>\n</li>\n</ol>\n<p><strong>四、 親自投入病患搬運與疏散協助</strong>\n在病患實體移出的行動中，護理人員主要負責病患的醫療照護，而<strong>總務部人員必須親自投入前線</strong>，負責協助進行「病患搬運」的重度體力任務，協助將行動不便或重症病患移出至安全的疏散集結區或救護車上。</p>\n<p><strong>五、 執行疏散地點之「設施重建與器材架設」</strong>\n若醫院啟動院內安全區或院外臨時醫療區的安置計畫，總務部必須會同工務室及資訊室，前往指定的疏散安置地點進行「醫療器材架設、水電重建及電腦佈設」等基礎設施重建工作，確保重置區域的硬體設施能立即滿足接續的醫療運作需求。</p>\n<p>反向檢傷的精確分類標準為何？</p>\n<p>高度照護病患撤離時的隨車裝備有哪些？</p>\n<p>如何與其他聯防醫院協調接收病患量能？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方預警，確認醫院所在區域即將編入「主戰區」，指揮中心下達啟動\n<strong>HICS 第三階段「全面撤離與量能重置」</strong> 的預防性全面撤離指令時 ：</p>\n<p>在 HICS 應變體系下，<strong>總務部主要接掌「後勤部門（Logistics\nSection）」的指揮權</strong> 。在<strong>後勤部長 L0（總務部部長\n許慧莉）勤務組 L1（醫勤室主任 吳哲維）任務支援組 L2（資材組組長 吳佳蓉 /\n鄭酪緯）</strong> ，並橫向對接執行部（醫務部、工務室、保安組）及計畫部（護理部）\n，立即啟動以下<strong>六大範疇之實兵撤離、車輛動員、物資「編碼盲派」與「反資敵」處置具體作為</strong>：</p>\n<p>一、 後勤指揮中樞「地下化開設」與撤離資源總估算（後勤部長 L0 許慧莉）</p>\n<ol>\n<li>\n<p><strong>後勤指揮地下化轉移與開設</strong>： 總務部部長（後勤部長 L0 許慧莉）第一時間攜帶後勤資源管制備份清單 ，垂直轉移至地下一樓最強固的戰時前進指揮所------<strong>恩慈大樓 B1 會議室</strong>就位 ，啟動「72小時物資/能源維持與後勤支援計畫」 。</p>\n</li>\n<li>\n<p><strong>精算並對接撤離與重置資源情資</strong>： 後勤部長第一時間與計畫部長 P0（朱淑媛護理部部長）密切通聯 ，精確掌握計畫部依「反向檢傷」分類造冊後的最新「需撤離病人分組 B」與「隨車醫護編組 A」之總量 ，作為調配車輛載具、打包隨車藥材與維生氧氣鋼瓶的科學化依據 。</p>\n</li>\n<li>\n<p><strong>異地重置點之「後勤先遣小組」派駐</strong>： 在主力撤離車隊出發前 1 小時，指派資材與事務人員組成<strong>「先遣小組」</strong>，先行趕往指定的接收聯防責任醫院（如協定支援之衛生福利部屏東醫院、寶建醫院、安泰醫院或屏東榮總） 。先遣小組負責對接接收端醫院之指揮官，實地勘查物理空間、設立本院移置之「臨時醫療區」物資接收點，確保主力抵達後能快速投入醫療任務 。</p>\n</li>\n</ol>\n<p>二、 勤務組 L1（醫勤室主任\n吳哲維）：車輛極限動員與三大轉運區鋼鐵分流管制</p>\n<p>勤務組主管 L1 須統籌運輸組、事務組與營養室，死守轉運過程的交通生命線\n：</p>\n<ol>\n<li>\n<p><strong>運輸車輛極限徵用與「車牌編碼登記」</strong>： -   運輸組立即清點並動員院內所有的運輸能量：<strong>本院現有救護車共 4 輛</strong>、<strong>行政運輸車中巴（15人座） 4 輛</strong>及 <strong>8人座行政車 6 輛</strong> 。 -   透過聯絡官（行政副院長 黃雅芳）向縣市聯合應變中心（LJEOC）爭取並接收<strong>外部支援救護車共 2 輛</strong>與大眾接駁載具 。 -   對所有車輛進行<strong>實體編碼並記錄車牌號碼</strong>，隨時向衛生局回報車隊啟動與抵達進程 。</p>\n</li>\n<li>\n<p><strong>落實「三大接運疏散區」動線絕對分流</strong>： 為避免上百名撤離病患、隨行醫護與車隊在院外道路發生交岔壅塞與推擠，L1 配合保安組實施硬邊界防護與車道管制，將不同嚴重程度的病患與載具實施鋼鐵般的分流 ： -   <strong>【救護車專區（急診室大門出口）】</strong>：專供第四類高度照護（危急/ICU）及第三類臥床病患垂直轉移上車 。 -   <strong>【私人車專區（恩慈大樓旁車道）】</strong>：管制為「有家屬接送與可扶持安置病患」的快速裝載引導區 。 -   <strong>【大眾接駁車專區（醫院門診大廳大門出口）】</strong>：供大眾接駁載具、中巴集結，快速轉運第一類輕症及可返家病患 ，避免與重症救護車動線發生交岔、推擠與壅塞 。</p>\n</li>\n<li>\n<p><strong>集中搬運載具與提供無動力垂直轉運支援</strong>： -   迅速在急診待命區、護理部前廳，集中全院之輪椅、擔架、推床及護理站配置的<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong> 。 -   調派勤務組內非臨床同工（保全、事務員、清潔工、行政同工及合法召回志工），與一線護理人員配合，嚴格遵循<strong>「5人一組（4人徒步搬運擔架、1人專業護理照護）」</strong>原則 ，協助臥床與重症病患沿無窗之內側安全梯，安全垂直轉移至地面的車輛接運區 。</p>\n</li>\n</ol>\n<p>三、 任務支援組 L2（資材組長\n吳佳蓉）：關鍵救命藥材「打包編碼」與「人藥一對一隨行」</p>\n<p>任務支援主管 L2\n須主導關鍵藥衛材、裝備的打包、轉移、分配與核對，並配合臨床啟動戰鬥化物流\n：</p>\n<ol>\n<li>\n<p><strong>戰備物資與外傷醫材「打包編碼（Tagging &amp; Numbering）」上車</strong>： -   資材組與藥劑科配合，將救命之戰傷急救箱（Go-Kits / Trauma Go-Kits）、林格氏液、抗生素、管制麻醉止痛藥（如 Ketamine 等強效麻醉鎮痛藥劑） ，進行<strong>戰時特殊分類編碼列冊</strong> 。 -   按編碼順序裝入專用運輸貨車（由 L2 指派專人隨車保管），運往安全重置區目標醫院，由接收端專人點收、儲放，確保到院後 10 分鐘內可完成開箱調劑 。</p>\n</li>\n<li>\n<p><strong>死守「人藥、人機一對一隨行」安全紅線</strong>： -   在病患移入轉運車輛前，資材人員與病房書記、護理同工配合 ，將病患專屬之 72 小時口服與注射救命用藥，連同其手寫紙本「轉診單、紙本轉院病歷摘要、用藥處方箋」，一併放入<strong>密封防水、防潮夾鏈袋中，強制物理綁定於病患隨行之擔架、推床或隨車箱旁</strong>，落實「藥隨人走」 。 -   協助將病患隨行必需之可攜式維生裝備（如可攜式生理監視器、點滴幫浦、備用氧氣小鋼瓶）安全拆卸、貼上「大連院區財產識別貼紙」後隨病患運送上車，避免轉送途中及抵達初期發生維生設備與藥物斷鏈 。</p>\n</li>\n<li>\n<p><strong>韓偉大樓 3F 供應室與醫療氣體之緊急銜接</strong>： -   維持 <strong>韓偉大樓 3F 供應室</strong> 之無菌器械配送說明 ；聯絡並調配轉運救護車及中巴上隨車用的備用氧氣鋼瓶，精算消耗速率 ，保證高風險病患轉運過程的氧氣供應 。</p>\n</li>\n</ol>\n<p>四、 勤務組 L1（營養室組長\n徐桂婷）：停水停電下之「孤島膳食維持」與地下層備援通訊</p>\n<ol>\n<li>\n<p><strong>動用 3 至 7 天戰備存糧與飲水</strong>： -   預警撤離期間可能伴隨聯外交通與常規物流中斷 。營養室組長（徐桂婷）須立即動用預先儲備的 <strong>3 至 7 天緊急乾糧、應急口糧與飲水</strong> 。 -   在人員與病患大量疏散集結的混亂狀態下，確保所有等候撤離之病患、家屬，以及執行高強度搬運的醫療和後勤員工，獲得基本的飲水與熱食供應，維持應變人員體力 。</p>\n</li>\n<li>\n<p><strong>啟動極端斷糧支援合約</strong>： -   若物資極度耗竭且外部常規物流中斷，勤務組第一優先協調本院內之<strong>便利商店（7-11）</strong>作為緊急膳食供糧據點 ，或調撥周邊合約商家，大額採購生存食水 。</p>\n</li>\n<li>\n<p><strong>建立地下層備援通訊網路與傳令兵支援</strong>： -   地下室、安全梯與鉛板隔離室極易發生訊號死角。勤務組須檢查全院手持通訊設備，將獨立頻道之 <strong>UHF/VHF 無線電對講機</strong> 分配給車隊司機、三大轉運區負責人、病房區與地下前進指揮所，維持獨立、無障礙的備援雙向通訊 。 -   調派體能良好的後勤同工擔任穿著反光背心的「徒步傳令兵（Runner）」，持實體簽收簿，以人工口令覆誦與簽名方式傳遞最核心的車輛調度、物資點交與指揮官變更指令 。</p>\n</li>\n</ol>\n<p>五、 協同執行最冷酷的「反資敵（Denial of Assets）」封存與銷毀處置</p>\n<p>在主戰區炮火逼近、且撤離時間極為有限的情況下，大型、高度仰賴大連院區常規電網、且在數小時內「物理上絕對無法搬運轉移」的貴重精密醫療資產（如大型多階\nCT、高階 MRI、中央洗腎機、資訊核心伺服器）：</p>\n<ol>\n<li>\n<p><strong>下達物理鎖固與封存</strong>： 後勤部長 L0 會同工務室主任與資訊室主任 ，對上述無法帶走的維生與診斷設備執行<strong>強制手動斷電、切斷醫療氣體管線、及機械物理上鎖鎖固</strong> 。</p>\n</li>\n<li>\n<p><strong>反資敵實體銷毀與法律簽證</strong>： 指派專人對高機密硬碟、含有患者個資之硬體關鍵晶片執行<strong>「物理實體砸毀/去磁銷毀」</strong> 。並由法律訴求小組 F3（職安室主任 杜傳榮）簽發<strong>「戰時資產反資敵封存銷毀法律簽證書」</strong>，詳實記錄銷毀之資產型號與時間，防止國家級醫療科技與病人個資落入敵手 。</p>\n</li>\n</ol>\n<p>六、 地下「員工專屬庇護站」運作與災後復原清算（後勤部收尾工作）</p>\n<ol>\n<li>\n<p><strong>地下「員工專屬庇護站」維持</strong>： 在高壓撤離與體力嚴重透支的環境下，為防範同工產生「戰鬥疲勞」 。總務部須於結構最安全、最深層之地下空間（如 <strong>恩慈大樓 2 樓員工運動中心</strong>）設立「員工專屬庇護站」 。配合安全管制組實施嚴格門禁 ，提供行軍床與生活支援，確保交班同工在「聽不到哀嚎聲、看不到鮮血」的絕對安靜環境中進行強制輪休 。</p>\n</li>\n<li>\n<p><strong>災後 3 日內清查損失與呈報</strong>： 待撤離行動安全完成、主戰區威脅解除後： -   <strong>損害勘查與鑑定</strong>：後勤組配合安全官（職安室主任）與工務室，向相關單位<strong>申請災損鑑定小組到院，實施結構安全鑑定</strong> ；由環保室會同清潔人員對現場泡水、廢棄物與煙燻區域進行<strong>徹底除污與環境消毒</strong>，防範傳染病流行 。 -   <strong>清查物資消耗與呈報</strong>：後勤部長於 <strong>3 日內</strong> 清查本院在此次預防性撤離中所消耗的維生器材、滅火器材、防護防暴耗材、破損設施、以及打包移轉與封存之資產 ，列冊呈交計畫部文件紀錄組（P3） ，陳報院長室向主管機關申報戰損與辦理保險理賠 。</p>\n</li>\n</ol>"}]}, {"role": "工務室", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>工務室</strong>擔任執行部門的<strong>「設施運作主管（O2）」</strong>及演習編組中的<strong>「關鍵資源與設施搶修組」</strong>，是災難中維繫醫院「生命線（Lifelines）」的保衛者。</p>\n<p>工務室因應孤島危機的具體作為如下：</p>\n<p><strong>一、 燃油與電力極限管制：殘酷執行「負載卸除（Load Shedding）」</strong></p>\n<ol>\n<li>\n<p><strong>精算消耗與回報缺口</strong>：面對燃油配送延遲，工務室須立即精算現有儲油量與消耗速率，並向指揮中心回報短缺缺口與請求支援。</p>\n</li>\n<li>\n<p><strong>切斷非必要電源（負載卸除）</strong>：為確保緊急發電機的續航力，工務室必須主動手動切斷行政辦公區、一般病房、冷氣空調與非維生儀器的電源迴路。</p>\n</li>\n<li>\n<p><strong>死守醫療紅區</strong>：將所有備用發電機的寶貴電力，絕對死守在開刀房、ICU、急診室急救區與血庫冰箱。透過監控發電機溫度與耗能，確保在「最低維生耗能」下能撐過法定的\n    72 小時（甚至 120 小時）。若 ATS\n    設備切換異常或發電機啟動失敗，須立即執行強制手動啟動並緊急聯繫維護廠商。</p>\n</li>\n</ol>\n<p><strong>二、 醫療氣體應變：切換備援與極限替代</strong></p>\n<ol>\n<li>\n<p><strong>評估氣體存量與隔離</strong>：精算中央醫療氧氣與氣體的消耗速率。若管路受損或主機異常，須視情況分段、分區關閉，隔離洩漏區域。</p>\n</li>\n<li>\n<p><strong>切換備用鋼瓶</strong>：若中央液氧槽受損或氣體耗盡，工務室須協助並通知前線醫護人員，快速精準切換至備用氧氣鋼瓶供氣。</p>\n</li>\n<li>\n<p><strong>配合人工維生替代</strong>：若備用鋼瓶亦耗盡，須配合醫療照護單位，動員人員組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持重症病患呼吸。</p>\n</li>\n</ol>\n<p><strong>三、 飲水與供水應變：啟動備援水源與嚴格配給</strong></p>\n<ol>\n<li>\n<p><strong>啟動地下水系統</strong>：面對自來水供水受阻或停水，工務室須立即啟動院內地下水塔供水系統，並將水塔連結管路打開，讓五座水塔互補供水。</p>\n</li>\n<li>\n<p><strong>實施水資源分級配給</strong>：實施極其嚴格的「水資源紅區管制」，最乾淨的水僅供開刀房刷手、器械基本消毒與病患飲用；嚴禁一切盥洗與沖馬桶（改發化學便器袋）。</p>\n</li>\n<li>\n<p><strong>請求外部水援</strong>：若地下水系統故障或水源不足，工務室須向消防隊請求水車支援或聯絡廠商外購水源。</p>\n</li>\n</ol>\n<p><strong>四、 維持基礎設施與回報優先使用順序</strong></p>\n<ol>\n<li>\n<p><strong>確立物資優先序</strong>：工務室須會同後勤與採購單位，確認運達物資的接收與保管位置，並確立電力、水資源與醫療氣體的「優先使用順序」。</p>\n</li>\n<li>\n<p><strong>巡檢與搶修</strong>：持續巡檢空調、建築物結構、電梯及醫療儀器設備，依據各單位回報的災損狀況立即派員進行搶修作業，確保核心設施在孤島狀態下能維持最低限度運作。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透破壞（如第五縱隊）及群眾恐慌推擠的複合型安全危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>工務室</strong>擔任執行部的<strong>「設施運作主管（O2）」</strong>與演習編組中的<strong>「關鍵資源與設施搶修組」</strong>，是災難中維繫醫院「生命線（Lifelines）」的保衛者。面對此等外部威脅與內部警戒狀態，工務室的具體因應作為如下：</p>\n<p><strong>一、 關鍵基礎設施（CI）的反破壞與安全加固</strong>\n面對可疑無人機與不明人車可能進行的偵蒐與破壞，工務室必須守護醫院的心臟地帶：</p>\n<ol>\n<li>\n<p><strong>加固維生機房防護</strong>：會同安全管制組（保安組），針對<strong>地下室緊急發電機房、伺服器資訊機房、頂樓水塔及戶外液氧槽</strong>等關鍵基礎設施（CI），增設\n    24 小時巡邏哨。</p>\n</li>\n<li>\n<p><strong>防範人為癱瘓</strong>：全面巡檢並鎖固管線通道與機房門禁，防範有心人士（或偽裝的在地協力者）進行放置爆裂物、剪斷電纜或於水源投毒等毀滅性人為破壞，確保維生系統不被癱瘓。</p>\n</li>\n</ol>\n<p><strong>二、 支援「硬邊界」阻絕與內部封鎖（Lockdown）的機電控制</strong>\n面對避難群眾湧入或企圖搶奪物資的失控風險，工務室需透過物理設施提供防禦支援：</p>\n<ol>\n<li>\n<p><strong>提供實體防禦載具</strong>：配合實施「硬邊界」封鎖與極限進出管制，工務室可協助調度院方<strong>工程車</strong>橫停於非必要之出入口，作為防衝撞的實體阻絕物。</p>\n</li>\n<li>\n<p><strong>啟動防暴機電鎖定</strong>：若群眾暴動衝闖，工務室須配合指揮中心迅速啟動「內部封鎖（Lockdown）」，瞬間<strong>降下急診室防暴門及各區域防火鐵捲門</strong>，並<strong>強制關閉全院電梯控制權</strong>，將非授權人員阻絕於核心醫療區之外，以保護重症病患與醫護人員。</p>\n</li>\n</ol>\n<p><strong>三、 戰術空間轉換的臨時水電氣支援</strong>\n因應大量避難人潮處理或物資隱密防護的需求，醫院空間需進行戰術轉換：</p>\n<ol>\n<li>\n<p><strong>基礎設施機動佈設</strong>：依據指揮中心命令，協助將非醫療空間（如大廳）轉換為大量傷患檢傷區，或將地下停車場淨空轉為「戰略物資地下補給站」。</p>\n</li>\n<li>\n<p><strong>拉設臨時維生管線</strong>：在這些臨時轉換的空間內，工務室須迅速拉設<strong>臨時電源、照明設備與通風設施</strong>，以維持檢傷分類與醫療處置的基本運作。</p>\n</li>\n</ol>\n<p><strong>四、 維生管線極限監控與「黑堡」應變準備</strong>\n外部的破壞行動極可能伴隨癱瘓區域電網或自來水廠，工務室必須做好「孤島」的極限應變：</p>\n<ol>\n<li>\n<p><strong>資源盤點與監控</strong>：盤點並持續監控能源、水、醫療氣體、備援電力及設備搶修量能。</p>\n</li>\n<li>\n<p><strong>執行負載卸除（Load\n    Shedding）</strong>：若市電全斷且外部運補受阻，工務室須主動手動切斷行政辦公區、一般病房與冷氣空調的電源迴路，將所有緊急發電機的寶貴電力，絕對死守在開刀房、ICU\n    與急診室急救區。</p>\n</li>\n<li>\n<p><strong>水氣替代方案</strong>：若自來水遭阻斷，啟動院內地下戰備水塔，並實施極嚴格的水資源配給；若中央液氧槽受損洩漏，則迅速協助切換至備用氧氣鋼瓶。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況\n2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭與空襲威脅，必須進行大面積的「空間降階防護」，將核心醫療轉移至安全的地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>工務室</strong>擔任執行部門的<strong>「設施運作主管（O2）」</strong>與演習編組中的<strong>「關鍵資源與設施搶修組」</strong>，是戰災中維繫醫院「生命線（Lifelines）」的絕對保衛者。</p>\n<p>面對防空疏散與 B1 備援空間的緊急開設，工務室的具體因應作為如下：</p>\n<p><strong>一、 建立 B1 五大備援功能區之基礎設施（戰術空間轉換）</strong>\n配合全院將醫療量能轉移至地下一樓（B1），工務室必須在極短時間內，於臨時轉換的空間拉設維生基礎設施：</p>\n<ol>\n<li>\n<p><strong>機電與照明架設</strong>：迅速於約翰／馬可大樓 B1（檢傷行政區、臨時\n    ICU）、韓偉大樓 B1（臨時開刀房、恢復室）及路加大樓\n    B1（輕症病房）等五大功能區內，拉設臨時電源、照明設備與通風／空調設施。</p>\n</li>\n<li>\n<p><strong>醫療氣體與供水銜接</strong>：確保 B1 臨時開刀房與臨時 ICU\n    病房具備穩定的醫療氣體（如氧氣）供應與急救用水，以支撐地下微型戰地醫院的戰傷搶救需求。</p>\n</li>\n</ol>\n<p><strong>二、 執行「極限負載卸除（Load Shedding）」與死守紅區電力</strong>\n空襲極可能伴隨外部電網與自來水廠遭癱瘓，工務室必須啟動「黑堡（Black\nStart）」孤島應變：</p>\n<ol>\n<li>\n<p><strong>主動切斷非必要電源</strong>：依據指揮官命令，強制執行冷酷的「電力負載卸除」。主動手動切斷行政辦公區、一般病房、冷氣空調及高樓層（已撤離區）的電源迴路，以節約能源。</p>\n</li>\n<li>\n<p><strong>死守核心醫療電力</strong>：將緊急發電機的所有寶貴電力，絕對死守在 B1\n    臨時開刀房、臨時 ICU\n    及伺服器機房等紅區。持續監控發電機溫度與剩餘柴油儲量，確保在「最低維生耗能」下能撐過法定的\n    72 小時。</p>\n</li>\n</ol>\n<p><strong>三、 進駐地下專屬據點與維持搶修量能</strong></p>\n<ol>\n<li>\n<p><strong>進駐 B1\n    工務基地</strong>：工務人員須依據備援空間配置，確實於<strong>「約翰／馬可大樓\n    B1\n    工務室」</strong>就位，以此作為工務、醫工支援及搶修銜接的地下前進指揮所。</p>\n</li>\n<li>\n<p><strong>醫工設備轉置協助</strong>：協助醫療單位將急救所需的重大醫療儀器設備，從高樓層移轉並重新佈設於\n    B1 備援功能區。</p>\n</li>\n</ol>\n<p><strong>四、 災後損害控制與危險排除（防範二次災害）</strong>\n若空襲震波導致院區建築物受損或管線破裂：</p>\n<ol>\n<li>\n<p><strong>隔離洩漏與阻斷</strong>：工務室須迅速進行分段、分區關閉受損區域的電力、供水與醫療氣體閥門，防範氧氣外洩引發火災爆炸或引發嚴重淹水等二次災害。</p>\n</li>\n<li>\n<p><strong>設施搶修與評估</strong>：會同相關編組進行建築物結構與設備的損害評估，啟動備用系統並決定搶修的優先順序，確保地下醫療避難空間的絕對安全。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨關鍵基礎設施嚴重受損的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>工務室</strong>主任擔任執行部門的<strong>「設施運作主管（O2）」</strong>，負責全院電力、供水、空調、建築物結構及醫療氣體的維護與管制。在災難發生時，工務室是決定醫院存亡的<strong>「生命線（Lifelines）保衛者」</strong>。</p>\n<p>面對此極端狀況，工務室的具體因應作為如下：</p>\n<p><strong>一、 應對電力瞬斷與執行「極限負載卸除」（電力搶修）</strong></p>\n<ol>\n<li>\n<p><strong>確認發電機啟動</strong>：發生電力瞬斷時，工務人員須立即確認\n    ATS（自動切換開關）是否在 12\n    秒內自動切換由發電機供電；若自動啟動失敗，須立即派員至機房執行「強制啟動」。</p>\n</li>\n<li>\n<p><strong>啟動 10 分鐘停電應變</strong>：若停電達 10\n    分鐘仍無法正常供電，須通知總機廣播各單位啟動應變措施，並要求各單位關閉非必要設備的電源。</p>\n</li>\n<li>\n<p><strong>殘酷負載卸除（Load\n    Shedding）與死守紅區</strong>：若遭遇外部電網全毀的「孤島（Black\n    Start）」狀態，工務室須依指揮官命令，強制手動切斷所有行政辦公區、一般病房、冷氣空調與非維生醫療儀器的電源。將緊急發電機的寶貴電力，絕對死守在開刀房、ICU、急診室、伺服器機房與血庫等「紅區」。</p>\n</li>\n<li>\n<p><strong>精算燃料</strong>：工程師須每小時精算剩餘儲油量並監控發電機溫度，確保在最低維生耗能下，醫院能撐過法定的\n    72 小時極限運作。</p>\n</li>\n</ol>\n<p><strong>二、 應對管線漏水與停水危機（水源搶修）</strong></p>\n<ol>\n<li>\n<p><strong>隔離洩漏</strong>：針對震波引起的管線破裂與漏水，工務人員須迅速進行分段、分區關閉開關，以隔離洩漏區域，防止水患波及機房或引發漏電。</p>\n</li>\n<li>\n<p><strong>啟用地下水與水塔互補</strong>：若自來水主幹管斷裂導致全院停水，工務室須立即啟動院內地下水（戰備水塔）供水系統，並將頂樓五座水塔的連結管路打開，使其互補供水。</p>\n</li>\n<li>\n<p><strong>水資源分級配給與求援</strong>：實施極度嚴格的管制，最乾淨的水源僅保留供開刀房刷手、器械消毒與飲用，禁止一般盥洗與沖馬桶；若地下水亦失效，須立刻向消防隊或外部廠商（如山泉水車）請求緊急水源支援。</p>\n</li>\n</ol>\n<p><strong>三、 應對空調與醫療氣體異常（氣體搶修）</strong></p>\n<ol>\n<li>\n<p><strong>醫療氣體切換</strong>：若中央液氧槽、壓縮空氣或真空系統因震動受損而供氣異常，工務室須現場確認原因，並立即切換至備用系統。若\n    30\n    分鐘內無法正常供氣，須通知各臨床單位自行啟動應變（如改用氧氣鋼瓶）。</p>\n</li>\n<li>\n<p><strong>空調維持</strong>：儘速搶修受損的空調主機，優先確保手術室、加護病房與資訊機房的恆溫與無菌環境。</p>\n</li>\n</ol>\n<p><strong>四、 應對電梯停用與受困救援</strong></p>\n<ol>\n<li>\n<p>震波或停電導致電梯停用時，工務室須優先派員巡視確認車廂內是否有病患或員工受困。</p>\n</li>\n<li>\n<p>立即聯絡電梯維護廠商，並由工務人員協同警衛（安全管制組）執行受困人員的緊急救援作業。在極端限電下，工務室須將\n    80% 的電梯電源切斷，僅保留必要之維生與運輸電梯。</p>\n</li>\n</ol>\n<p><strong>五、 應對消防警報與建物震損評估</strong></p>\n<ol>\n<li>\n<p><strong>火警確認與斷電</strong>：若爆炸或震動引發消防警報，工務人員須確認受信總機位置，若現場發生真實火災，須配合「危害控制組」執行初期滅火，並視情況切斷該區電源與空調，避免火煙透過管線蔓延。</p>\n</li>\n<li>\n<p><strong>結構災損評估</strong>：地震與爆炸後，工務室須全面巡查建築物主體結構是否有倒塌、龜裂之虞，將損害評估、搶修情形與復原的優先順序，彙整回報給\n    HICS 指揮中心，以供指揮官作為是否執行病房疏散的決策依據。</p>\n</li>\n</ol>\n<p>工務室如何處理管線漏水？</p>\n<p>若備用電力失效有哪些替代方案？</p>\n<p>如何向外部單位請求消防或修繕支援？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院正面臨敵方實體破壞、高度爆炸風險以及維生系統（電力與氧氣）雙重中斷的極端毀滅性危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>工務室</strong>主任擔任執行部門的<strong>「設施運作主管（O2）」</strong>，同時主導「關鍵資源與設施搶修組」。面對此孤島與戰災威脅，工務室是死守醫院「生命線（Lifelines）」的最後防線，其具體因應作為如下：</p>\n<p><strong>一、 應對液態氧氣洩漏：極限隔離與備援切換</strong></p>\n<ol>\n<li>\n<p><strong>分區隔離洩漏源</strong>：液態氧外洩若遇爆裂物火源，將引發災難性大爆炸。工務人員必須在安全官確認環境許可且穿戴防護裝備的前提下，迅速進行分段、分區關閉液氧槽與輸氣管路的閥門，以物理方式隔離洩漏區域。</p>\n</li>\n<li>\n<p><strong>切換備援氣體</strong>：確認主供氣設備（液氧槽）異常後，工務室須嘗試切換至備用系統。若管路受損嚴重無法供氣，必須立即通知全院各臨床單位中央供氧已中斷，指示前線醫護立刻自行啟動應變措施，切換使用備用的氧氣鋼瓶。</p>\n</li>\n<li>\n<p><strong>配合人工維生應變</strong>：若院內備用氧氣鋼瓶不敷使用，工務室須通報醫療照護組，配合動員組成「捏球大隊」，以手動甦醒球（Ambu bag）接力維持重症病患呼吸。</p>\n</li>\n</ol>\n<p><strong>二、 應對主發電機受損：執行「極限負載卸除（Load Shedding）」</strong></p>\n<ol>\n<li>\n<p><strong>評估電力與強制啟動</strong>：爆炸發生後，工務人員須立即確認 ATS（自動切換開關）是否作動。若主發電機受損無法在 12 秒內自動啟動，須派員執行「強制啟動」或評估是否有其他次級備用發電機可用。</p>\n</li>\n<li>\n<p><strong>殘酷負載卸除</strong>：若主發電機遭炸毀導致全院面臨全面斷電，工務室必須依據指揮官指令，強制手動切斷所有行政辦公區、一般病房、冷氣空調與非維生醫療儀器的電源迴路。</p>\n</li>\n<li>\n<p><strong>死守醫療紅區</strong>：將僅存的不斷電系統（UPS）電量或次級備用電力，絕對死守在開刀房、ICU 及急診室急救區等重症紅區。同時須監控殘存設備狀態，確保在「最低維生耗能」下爭取搶修與外部救援的時間。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急外部修繕與資源調度</strong></p>\n<ol>\n<li>\n<p><strong>緊急通報維護廠商</strong>：針對超出院內搶修能力的損毀，工務室須立即聯絡發電機維護廠商（如明威發電機）及醫療氣體供應商（如台北氧氣公司、信光氧氣行），要求立即派員支援搶修。</p>\n</li>\n<li>\n<p><strong>請求替代維生物資</strong>：協同總務部與聯絡官，緊急向外部請求調度「移動式發電車」與「大量備用氧氣鋼瓶」至院區遠離火場的安全地帶，以最快速度恢復急重症單位的維生供應。</p>\n</li>\n</ol>\n<p><strong>四、 災後損害控制與防範二次災害</strong></p>\n<ol>\n<li>\n<p><strong>結構與災損評估</strong>：無人機爆炸震波可能導致建築物受損。工務室須全面巡視機電棟及鄰近建築物主體結構是否有倒塌、龜裂之虞，並將損害評估與搶修情形彙整回報給 HICS 指揮中心。</p>\n</li>\n<li>\n<p><strong>配合現場封鎖與滅火</strong>：配合安全管制組（保安組）拉起警戒線，絕對封鎖機電棟周邊區域，禁止閒雜人員進入。若爆炸引發火勢，在消防隊抵達前，須配合進行初期滅火並切斷該區電源與空調，防止火煙透過管線蔓延至醫療大樓。</p>\n</li>\n<li>\n<p><strong>提供疏散決策依據</strong>：隨時將電力與供氧的搶修進度、殘存 UPS 可用時間等關鍵數據回報給指揮官，作為指揮中心決定是否對鄰近病房進行「水平/垂直疏散」或全院重置的決策依據。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>在屏東基督教醫院（屏基）大連院區遭受喬裝成外包人員的特工（第五縱隊）意圖對「核心機房」進行縱火、並對「頂樓水塔」投放不明化學物質投毒的複合型極端維安與生化（CBRN）破壞危機下，全院立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>。</p>\n<p>在 HICS 體系中，<strong>工務室將擔任執行部門（Operations Section）轄下的「O2\n設施運作組」核心主力</strong>（主責：工務室主任 曹宏益；代理人：工務組長\n唐朝生）\\<!--\n-->。作為維持全院水、電、氣生命線（Lifelines）的絕對保衛者，工務室必須採取以下<strong>五大範疇的極限生存、物理阻絕、水電管線緊急隔離與戰術重置具體作為</strong>：</p>\n<p>一、 關鍵基礎設施（CI）防禦升級與 Lockdown 防暴機電控制</p>\n<p>面對喬裝成維修人員的滲透威脅，工務室必須與安全管制組（保安組\nO4）緊密配合，迅速鎖固並重兵防守醫院的心臟地帶：</p>\n<ol>\n<li>\n<p><strong>關鍵基礎設施（CI）實體鎖固與巡邏</strong>： 工務人員必須立即全面關閉並鎖固院區最核心的維生機房門禁與管線通道，包含<strong>「地下室緊急發電機房、伺服器資訊機房、頂樓水塔及戶外液氧槽」</strong>\\<!-- -->。協同保安人員增設 24 小時雙人巡邏哨，嚴禁任何外包維護人員以任何藉口未經指揮所雙重核對而擅自進入機房區域\\<!-- -->。</p>\n</li>\n<li>\n<p><strong>執行「內部封鎖 (Lockdown)」與電梯阻斷控制</strong>： 若歹徒在院內發動襲擊或恐慌民眾衝闖，工務室須配合指揮中心，一鍵啟動防暴機電控制：<strong>「瞬間降下急診室防暴門及各區域防火鐵捲門，並強制關閉全院電梯控制權」</strong>\\<!-- -->。此舉能利用物理鐵捲門與電梯停擺，將非授權人員與歹徒強制阻絕於核心醫療區之外\\<!-- -->，防止其垂直移動至高樓層病房實施破壞。</p>\n</li>\n<li>\n<p><strong>提供實體防禦阻絕載具</strong>： 配合硬邊界防護（Hard Perimeter），工務室立即<strong>調度院內工程車或重型工程載具</strong>，橫停於院區非必要之出入口作為防衝撞阻絕物，鞏固實體防線\\<!-- -->。</p>\n</li>\n</ol>\n<p>二、 頂樓水塔「投毒化災應變」：管線物理隔離與地下備用水源切換</p>\n<p>特工企圖於頂樓水塔投放不明化學物質，將直接威脅洗腎中心、開刀房等重症區的患者安全。工務室必須立即實施「無網、類比式」的水源分段防禦：</p>\n<ol>\n<li>\n<p><strong>水管閥門「分段、分區關閉」實施物理隔離</strong>： 接獲危害控制組（感管科 O3）通報水塔遭受威脅後，工務同仁立即奔赴管線咽喉處，<strong>迅速執行水管閥門之「分段、分區關閉」</strong>，將受污染水塔的輸出管道徹底封鎖與實體隔離，防止有毒自來水下滲流入透析中心、開刀房或洗腎機等高耗水重症紅區，防止災情擴大\\<!-- -->。</p>\n</li>\n<li>\n<p><strong>啟動「地下備用水源」互補子供水系統</strong>： 水塔閥門關閉後，工務室立即<strong>「啟動院內地下水（戰備水塔）供水系統，並將頂樓五座水塔的連結管路打開，讓五座水塔實現互補供水」</strong>\\<!-- -->，確保院內在孤島狀態下依然維持必要之核心供水\\<!-- -->。</p>\n</li>\n<li>\n<p><strong>執行嚴酷之「水資源紅區管制」與分級配給</strong>： 若評估地下備用水源量能受限，工務室立即協同勤務組（L1）實施最嚴格的節水配給： -   地下備用水塔之淨水<strong>百分之百優先且僅供應給 B1 臨時手術室（開刀房刷手、器械基本消毒）及重症病患維生飲用</strong>\\<!-- -->。 -   <strong>手動封閉全院一般洗手間與水龍頭</strong>，嚴禁一般病患、員工或家屬進行常規盥洗與沖洗馬桶，全面改用乾洗手液與分發「化學便器袋」替代常規馬桶，死守寶貴水源\\<!-- -->。</p>\n</li>\n<li>\n<p><strong>對接外部緊急水源運補</strong>： 若地下水系統故障，工務室立即電洽合約廠商（如高山行山泉水 0910-788388）<strong>外購水源</strong>，或協調消防局派水車至院外大連路巷口進行緊急供水導入，並配合發言人公告全院節水\\<!-- -->。</p>\n</li>\n</ol>\n<p>三、 核心機房「縱火應變」：消防斷電關氣與緊急發電機死守電力</p>\n<p>面對特工在核心機房投放燃燒劑放火，工務室必須在救災與死守電力冷鏈之間取得極限平衡：</p>\n<ol>\n<li>\n<p><strong>兼任「自衛消防編組」實施初期滅火與關閉氣體電源</strong>： 工務室值班人員聽聞「紅色訊號（爆炸與火災）」\\<!-- -->，立即攜帶滅火器直奔機房現場配合滅火班實施初期滅火\\<!-- -->。在確認現場人員已脫離維生系統並由臨時指揮官授權後，<strong>立即切斷受災區域電源並分段關閉醫療氣體（如氧氣、壓縮空氣）閥門</strong>，避免氣體外洩成為高濃度助燃物或引發二次燃爆\\<!-- -->。</p>\n</li>\n<li>\n<p><strong>緊急發電機「ATS 自動切換確認」與強制手動啟動</strong>： 若縱火與爆炸導致台電市電瞬斷，工務人員立即在中控室確認<strong>緊急發電機是否於 10 至 12 秒內自動啟動，並由 ATS 自動切換供電給資訊機房 UPS 與核心維生迴路</strong>\\<!-- -->。若自動切換失敗，工務同仁必須以肉身突入 B2 工務基地，將開關旋轉至「手動」執行強制手動啟動，並致電維護廠商隆安機電（0988-187315）或明威發電機（0933-103323）\\<!-- -->。</p>\n</li>\n<li>\n<p><strong>執行冷酷的電力「負載卸除 (Load Shedding)」戰術</strong>： 為確保地下室儲油槽的有限燃油能維持醫院生存達黃金 72 小時以上，工務室必須主動且手動執行「斷尾求生」的電力負載卸除： -   <strong>切斷非必要電力</strong>：強制切斷全院行政辦公區、一般病房、冷氣空調、大廳景觀照明、非維生儀器以及 80% 的電梯電源\\<!-- -->。 -   <strong>電力死守紅區</strong>：將僅存的備用發電機電力，<strong>百分之百、絕對死守在開刀房、ICU、急診室搶救區、資訊伺服器機房與血庫保存冰箱</strong>，死守冷鏈不斷電\\<!-- -->。每小時精算燃油消耗速率，向指揮中心提報。</p>\n</li>\n</ol>\n<p>四、 地下「B1 備援醫療空間轉置」之臨時水電氣戰術支援</p>\n<p>因應地面層或高樓層受創，醫院啟動防空與空間轉換，將核心功能轉移至地下一樓（B1）時，工務室必須在\n<strong>30 分鐘內</strong> 徒手拉設出地下微型戰地醫院的維生管線：</p>\n<ol>\n<li>\n<p><strong>拉設臨時電源與照明</strong>： 迅速於 <strong>約翰／馬可大樓 B1（檢傷行政區、臨時 ICU）</strong>、<strong>韓偉大樓 B1（臨時開刀房、恢復室）</strong>及<strong>路加大樓 B1（輕症病房）</strong>拉設臨時備用電源迴路、照明設備與臨時通風空調，確保醫護人員有基本光線執行手術\\<!-- -->。</p>\n</li>\n<li>\n<p><strong>醫療氣體與維生用水銜接</strong>： 將備用醫療氧氣（備用小鋼瓶）與真空吸引系統迅速佈設至 B1 臨時 ICU 與臨時開刀房，確保手術室刷手與器械基本消毒具有最低維生的淨水供應\\<!-- -->。若中央氧氣系統耗盡，工務室須與後勤資材組配合，通知並協助醫護人員<strong>快速精準切換至床邊備用的氧氣鋼瓶</strong>\\<!-- -->。</p>\n</li>\n</ol>\n<p>五、 災後復原階段：損害鑑定、起火原因調查與消防器材補齊</p>\n<p>歹徒被壓制且火勢撲滅、化災解除後，工務室工作轉入復原期（Recovery）：</p>\n<ol>\n<li>\n<p><strong>配合起火原因與毒化水質鑑定</strong>： 工務室派員會同安全官（職安室 A2）與警方、消防局及環境部毒災應變隊，積極調查核心機房起火原因並勘查結構災損\\<!-- -->。在頂樓自來水塔經毒災專家化驗並完成徹底清洗、水質完全無毒前，<strong>繼續維持地下備用自來水系統供水，嚴禁擅自開啟頂樓供水總開關</strong>\\<!-- -->。</p>\n</li>\n<li>\n<p><strong>補充全院消防及維生耗材</strong>： 工務室立即派員會同消防代檢公司，檢查並盤點在此次滅火與防暴中消耗的滅火器、防護裝備及各類安全設備損耗情形，填寫工務單並迅速補充備齊，防範醫院安全空置\\<!-- -->。</p>\n</li>\n</ol>"}]}, {"role": "環保室", "entries": [{"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況 2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用 B1\n備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭威脅，必須將核心醫療量能轉移至地下室以進行「空間降階防護」。</p>\n<p>在\nHICS（醫院事故指揮系統）與演習架構下，<strong>環保室</strong>不僅是環境衛生的維護者，更是提供地下備援空間的關鍵單位，並身兼執行部<strong>「安全管制組（O4）」</strong>的核心成員。其具體因應作為如下：</p>\n<p><strong>一、 極速清空本部空間，配合開設「戰時恢復室」</strong></p>\n<ol>\n<li>\n<p><strong>讓出指定備援空間</strong>：依據院方逃生圖與備援空間規劃，<strong>「韓偉大樓 B1\n    環保室」「恢復室」</strong>。</p>\n</li>\n<li>\n<p><strong>空間戰術轉換</strong>：環保室人員在接獲空襲或空間轉置指令後，必須極速淨空該空間內非必要的清潔機具、推車與雜物。將空間完全讓給手術與麻醉團隊進駐，以利執行戰傷病患的術後觀察、恢復照護及轉送銜接。</p>\n</li>\n</ol>\n<p><strong>二、 擔任 HICS「安全管制組（O4）」：協同動線與秩序維護</strong></p>\n<ol>\n<li>\n<p><strong>執行安全管制</strong>：環保室組長作為「安全管制組」的主責/代理幹部之一，須協同醫勤室保安組，共同執行防空避難期間的安全維護與動線規劃。</p>\n</li>\n<li>\n<p><strong>地下層管制點防守</strong>：派員協助駐守 B1\n    的樓梯間、電梯口、主要通道及各醫療功能區（特別是環保室自身轉換的恢復室）的出入口。執行嚴格的出入管制與群眾控制，防範避難民眾誤闖醫療紅區，確保傷患轉送動線絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 維持地下「微型戰地醫院」之環境衛生與廢棄物清運</strong></p>\n<ol>\n<li>\n<p><strong>醫療廢棄物集中管控</strong>：隨著大量病患與戰傷搶救移轉至 B1\n    備援醫療空間（臨時\n    ICU、開刀房等），將瞬間產生大量沾血衛材與醫療廢棄物。環保室須會同外包清潔人員，於地下室建立臨時的感染性廢棄物收集與清運動線，妥善打包隔離，避免密閉空間內發生交叉感染。</p>\n</li>\n<li>\n<p><strong>地下避難區環境清消</strong>：在人潮擁擠且通風受限的地下避難空間內，環保室須持續進行環境清潔與消毒作業，防範因防空避難衍生的院內傳染病群聚感染。</p>\n</li>\n</ol>\n<p><strong>四、 災後 / 空襲後之現場清理與復原</strong>\n若空襲震波導致院區高樓層受損、玻璃碎裂或管線破裂，在空襲警報解除且經工務/職安單位確認結構安全後，環保室須會同清潔公司人員迅速投入災害現場的清理工作，排除積水、髒污與危險散落物，協助醫院盡速恢復基本運作。</p>"}]}, {"role": "資材組", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>在此次資材組應變演練中，針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲」，資材組依7個模擬情境進行演練，具體因應作為如下：</p>\n<p><strong>一、 情境1：警報後2小時內緊急下移</strong></p>\n<ol>\n<li>\n<p><strong>限時下移高耗用醫材</strong>：警報後2小時內，將紗布、輸液、止血包、手套、縫合包等急救耗材下移至地下備援庫。</p>\n</li>\n<li>\n<p><strong>明確權責分工</strong>：演練重點在於確立下令者、清點者、搬運者、接收者與地下庫簽收者之權責分工，並注意搬運路線擁塞與電梯停用風險。</p>\n</li>\n</ol>\n<p><strong>二、 情境2：地下空間容量不足</strong></p>\n<ol>\n<li>\n<p><strong>物資分級搬入</strong>：地下備援空間原僅規劃放置文件或少量備品，需依A級（急救品優先）、B級（高周轉品）、C級（可延後）分級搬入，避免通道堆滿、消防動線受阻。</p>\n</li>\n<li>\n<p><strong>驗證空間條件</strong>：確認地下空間是否具備溫溼度控制、照明、標示與防潮措施。</p>\n</li>\n</ol>\n<p><strong>三、 情境3：搬運途中遇停電與電梯中斷</strong></p>\n<ol>\n<li>\n<p><strong>改採人工搬運</strong>：院內停電、電梯停止時，僅剩樓梯與手推車可用，須改用人工搬運、分批縮短單次重量、設立中繼暫置點。</p>\n</li>\n<li>\n<p><strong>留意液體與精密器材風險</strong>：醫材若包含液體、玻璃瓶、精密器材，搬運風險更高，並確認地下空間是否有獨立電源、照明與門禁備援。</p>\n</li>\n</ol>\n<p><strong>四、 情境4：地下庫存被要求緊急支援臨床</strong></p>\n<ol>\n<li>\n<p><strong>測試供應轉換能力</strong>：急診與手術室突然要求地下庫立即出庫30%止血與注射類醫材，測試地下空間是否僅為「存放點」，還是能快速轉為「供應點」。</p>\n</li>\n<li>\n<p><strong>檢核出庫流程與追溯機制</strong>：確認出庫流程、領用權限、庫存帳與實物是否一致、補貨速度是否跟上，並檢查醫材條碼、批號、效期與先進先出機制。</p>\n</li>\n</ol>\n<p><strong>五、 情境5：地下空間進水或環境異常</strong></p>\n<ol>\n<li>\n<p><strong>啟動防潮應變</strong>：地下室因暴雨、消防灑水、管線破裂或滲水導致地坪潮濕時，啟用防潮墊、離地上架、防水箱、緊急移架，並通報異常與評估損耗。</p>\n</li>\n<li>\n<p><strong>判斷立即回撤品項</strong>：研判哪些醫材因受潮風險必須立即回撤。</p>\n</li>\n</ol>\n<p><strong>六、 情境6：大量傷患事件</strong></p>\n<ol>\n<li>\n<p><strong>啟動緊急衛材配送</strong>：重大交通事故造成大量傷患湧入急診，短時間內大量使用紗布、止血用品、縫線、導管及固定器材時，須啟動緊急衛材配送並增加配送頻率。</p>\n</li>\n<li>\n<p><strong>即時回報消耗與預估補貨</strong>：即時回報庫存消耗速度，並預估供應商後續補貨需求。</p>\n</li>\n</ol>\n<p><strong>七、 情境7：物流全面停擺</strong></p>\n<ol>\n<li>\n<p><strong>啟動第二供應商與優先清單</strong>：颱風造成物流停擺72小時、燃油不足導致配送車輛無法運輸時，須每日盤點關鍵衛材、啟動第二供應商、建立衛材優先配發清單。</p>\n</li>\n<li>\n<p><strong>申請區域支援</strong>：向區域醫療網申請支援。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，資材組依10個模擬狀況進行演練，具體因應作為如下：</p>\n<p><strong>一、 狀況1：急診與住院單位同時要求下移大量醫材</strong></p>\n<ol>\n<li><strong>統一調度分流</strong>：以急救、止血、輸液、耗材類為優先，資材組統一控管，依功能區分流。</li>\n</ol>\n<p><strong>二、 狀況2：電梯暫停使用，樓梯與通道擁塞</strong></p>\n<ol>\n<li><strong>人工分批搬運</strong>：改採人工分批搬運，設中繼暫放點與單向動線，避免逆向交錯。</li>\n</ol>\n<p><strong>三、 狀況3：五處功能區儲位不足，品項混放風險升高</strong></p>\n<ol>\n<li><strong>依功能區分類存放</strong>：依功能區分類存放醫材、藥品、器材與一般物資，建立明確標示、區域責任人與進出管制。</li>\n</ol>\n<p><strong>四、 狀況4：部分醫材對溫濕度敏感，B1環境潮濕或通風不良</strong></p>\n<ol>\n<li><strong>高敏感物資隔離</strong>：高敏感醫材改放乾燥區，使用防潮箱、離地上架與環境巡檢機制。</li>\n</ol>\n<p><strong>五、 狀況5：臨床單位持續收治病人，臨時大量申領醫材</strong></p>\n<ol>\n<li><strong>雙人覆核分批出庫</strong>：採領用單雙人覆核、分批出庫、即時補登庫存與批號管理，兼顧配發速度與帳物一致。</li>\n</ol>\n<p><strong>六、 狀況6：B1備援醫療空間不足，急救區/手術處置區/留觀區同時提出需求</strong></p>\n<ol>\n<li>\n<p><strong>限時完成首批配送</strong>：目標於30分鐘內完成第一批衛材配送，並建立衛材優先配發原則。</p>\n</li>\n<li>\n<p><strong>盤點與優先調撥</strong>：立即盤點中央倉及各庫房存量，優先調撥急救及外傷處置衛材至B1，暫停非急迫性單位領料，每2小時更新庫存及補給狀況。</p>\n</li>\n</ol>\n<p><strong>七、 狀況7：地下室物流動線受阻</strong></p>\n<ol>\n<li><strong>調整動線與人力</strong>：大量病人及工作人員進入B1造成物流通道壅塞時，調整配送路線、設置臨時衛材發放站、增派人力採人工搬運，並維持衛材及總務專用通道。</li>\n</ol>\n<p><strong>八、 狀況8：關鍵衛材消耗速度超出預期（約為平日3倍）</strong></p>\n<ol>\n<li>\n<p><strong>掌握庫存可撐時間</strong>：因大量外傷病人收治，止血材料、紗布、縫線、胸管、固定器材等消耗量增加3倍，須即時計算剩餘庫存可支撐時間。</p>\n</li>\n<li>\n<p><strong>啟動限量與替代</strong>：啟動安全庫存及限量發放、啟用替代品，並向區域醫療網申請支援調撥。</p>\n</li>\n</ol>\n<p><strong>九、 狀況9：資材倉儲庫房無法進入，僅能使用B1預置衛材</strong></p>\n<ol>\n<li><strong>啟用B1戰備衛材庫</strong>：因空襲警報持續、地面倉庫無法進入領料，啟用B1戰備衛材庫，依五處功能區需求配發，每4小時盤點庫存並評估可維持運作時間。</li>\n</ol>\n<p><strong>十、 狀況10：外部補給延遲72小時</strong></p>\n<ol>\n<li>\n<p><strong>啟動72小時物資管制</strong>：因交通管制及空襲威脅，供應商停止配送時，啟動72小時物資管制，建立衛材配發優先順序（急診、手術、加護病房、備援醫療空間）。</p>\n</li>\n<li>\n<p><strong>定期回報與協調調撥</strong>：每日向CI指揮中心回報庫存及缺口，協調主管機關及區域醫療網辦理緊急調撥。</p>\n</li>\n</ol>"}]}, {"role": "採購/倉儲", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，「採購與倉儲（資材）」分別隸屬於<strong>行政/財務部的「採購小組（F2，由採購室主任擔任）」後勤部的「任務支援組（L2，由資材組長擔任）」</strong>。面對外部供應鏈中斷，其具體因應作為如下：</p>\n<p><strong>一、 啟動緊急採購與外部跨院調用（採購小組）</strong></p>\n<ol>\n<li>\n<p><strong>停止常規作業</strong>：立即停止災害防救以外的所有常規採購及結報作業，將單位量能全數集中於應變所需之緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>啟動替代供應與聯防支援</strong>：面對既有物流配送延遲，採購人員須迅速電洽協力及替代供應商，並聯繫屏東縣市簽有支援協定之合作醫院，請求需求品項的緊急調度支援。同時向屏東縣衛生局請求協助調撥，並以攸關生命的藥材及衛材為最優先。</p>\n</li>\n</ol>\n<p><strong>二、 精算物資缺口與接收簽證物資（採購室／資材組）</strong></p>\n<ol>\n<li>\n<p><strong>確立優先順序與回報缺口</strong>：會同後勤物資與維生組，精算藥品、血液、氧氣、膳食及耗材的消耗速率與現存缺口，並與指揮官確認資源的「優先使用順序」，將有限資源集中於重症搶救。</p>\n</li>\n<li>\n<p><strong>簽證物資保管</strong>：負責確認任何突破交通阻礙運達的簽證物資、備品及乾糧飲水的接收與保管位置，並配合指揮中心進行調度。</p>\n</li>\n</ol>\n<p><strong>三、 顛覆常規，啟動戰略衛材「盲派（Push）」物流（資材組/倉儲）</strong></p>\n<ol>\n<li>\n<p><strong>切換推拉式物流</strong>：在聯外交通阻斷、系統可能當機的極端情況下，平時為了降低庫存成本而採用的「有申請才領用（Pull）」常規物流系統將完全失效。資材室人員必須切換為「推拉式物流（Push-Pull\n    Logistics）」。</p>\n</li>\n<li>\n<p><strong>主動推進救命物資</strong>：將預先打包好的標準化「戰傷急救箱（Trauma Kits\n    /\n    Go-Kits）」（內含大量戰術止血帶、骨針、含止血劑紗布等戰備物資），不等待前線急診發出領料單或表單申請，直接以「盲派（Push）」方式主動推至急診紅區與開刀房門口，確保前線醫護人員伸手就能取得救命物資，維持戰鬥力不斷鏈。</p>\n</li>\n</ol>\n<p><strong>四、 執行全院子庫緊急調度與急補通報（資材組）</strong></p>\n<ol>\n<li>\n<p><strong>院內子庫重分配</strong>：針對災害搶救現場急需之物資品項，資材組人員須主動對全院各單位的「子庫」備量進行緊急盤點與調度集中。</p>\n</li>\n<li>\n<p><strong>通報急補</strong>：密切監控前線耗材的消耗狀況，一旦發現消耗突增及需求量極大的品項，資材組人員應即時通知採購人員，啟動緊急補充程序。</p>\n</li>\n</ol>"}]}, {"role": "資訊室", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報各項量能並進入戰時醫療整備。資訊室在\nHICS（醫院事故指揮系統）中扮演確保通訊暢通、系統穩定與資訊備援的神經中樞。其具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌「機構運作主管」與「資通簡報組」</strong></p>\n<ol>\n<li>\n<p><strong>納入 HICS 編組</strong>：資訊室主任將擔任 HICS\n    執行部轄下的<strong>「機構運作主管（O5）」</strong>，負責協助醫院功能持續運作，減少中斷必要的資訊服務。同時主責演習任務編組中的<strong>「資通簡報組」</strong>。</p>\n</li>\n<li>\n<p><strong>應變中心開設與通訊構聯</strong>：迅速協助臨災應變中心（指揮所）的軟硬體開設，負責架設網路、投影與音響設備。更重要的是確認<strong>多元備援通訊</strong>（如衛星電話、無線電或\n    Meshtastic\n    等）的測試與暢通，確保院方能順利與衛生局等外部主管機關對接，完成限時初報與續報。</p>\n</li>\n</ol>\n<p><strong>二、 維持核心系統運作並協助量能數據撈取</strong></p>\n<ol>\n<li>\n<p><strong>確保核心系統穩定</strong>：確保\n    HIS（醫療資訊系統）、EMR（電子病歷）、PACS（醫療影像）、檢驗及掛號批價等核心系統的穩定運作，避免因系統當機影響臨床作業。</p>\n</li>\n<li>\n<p><strong>協助數據撈取與情資看板</strong>：協助計畫部與統籌呈報組（危管會），從資訊系統中即時撈取精確的「全院空床數、當班人力名冊、急診留觀與手術排程」等數據。透過系統化的應變儀表板或\n    AI\n    知識庫快速彙整資訊，以利醫院能於主管機關規定的時限內完成各項量能的回報。</p>\n</li>\n</ol>\n<p><strong>三、 啟動資安防禦與核心資料備份</strong></p>\n<ol>\n<li>\n<p><strong>資安攻防與監控</strong>：因應戰前階段敵方資訊作戰、假訊息及網路攻擊風險升高，資訊室須加強網路流量監控，防堵疑似釣魚郵件、異常登入與惡意連線，防範駭客（如勒索軟體）癱瘓醫療系統。</p>\n</li>\n<li>\n<p><strong>極限資料備份</strong>：立即執行全院核心資料庫、電子病歷與重要營運檔案的備份作業（含離線與異地備份），確保戰時醫療紀錄與關鍵資料的保密性與可用性。</p>\n</li>\n</ol>\n<p><strong>四、 整備「紙本降級（Downtime）」與斷網應變機制</strong></p>\n<ol>\n<li>\n<p><strong>整備無網作業環境</strong>：戰時極可能面臨聯外網路中斷、斷電或基礎設施遭摧毀的「資訊全黑」情境，資訊室必須配合啟動並測試<strong>「紙本降級（Downtime）極限模式」</strong>。</p>\n</li>\n<li>\n<p><strong>確保當機備援物資</strong>：確認各護理站、急診與 B1\n    備援醫療空間皆已備妥<strong>「當機緊急箱（Downtime\n    Box）」</strong>，內含每日離線列印的最新住院名單、紙本病歷、手寫處方箋與檢傷單。確保在資訊系統完全癱瘓時，全院醫療核心功能與量能盤點仍能無縫切換至人工紙本方式持續運作。</p>\n</li>\n</ol>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」之複合性危機，資訊室在\nHICS（醫院事故指揮系統）中擔任<strong>「機構運作主管（O5）」</strong>與<strong>「資通簡報組」</strong>的核心角色，負責確保前線分流的軟硬體運作及資訊通訊暢通。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 支援戶外分流站與臨時救護站之資訊設備架設</strong></p>\n<ol>\n<li><strong>緊急架設前線設備</strong>：因應急診為應付大量傷患與慢性病搶藥人潮所啟動的極限分流，本院臨時救護站與分流區的開設須由工務室及<strong>資訊室負責</strong>。資訊人員必須迅速前往「戶外慢性病處方籤領藥區」或「臨時大量傷患檢傷區」，緊急架設電腦、網路連線、讀卡機與印表機，確保戶外醫療分流與掛號批價作業能順利連線運作。</li>\n</ol>\n<p><strong>二、 維持核心醫療系統穩定與數據撈取（支援闢謠與決策）</strong></p>\n<ol>\n<li>\n<p><strong>防範系統超載當機</strong>：面對短時間內大量湧入的掛號、檢傷登錄與領藥需求，資訊室必須嚴密監控\n    HIS（醫療資訊系統）、EMR（電子病歷）與\n    PACS（醫療影像）等核心系統的負載狀況，避免因流量過載而發生當機，確保急重症搶救之資訊系統維持運作。</p>\n</li>\n<li>\n<p><strong>即時數據撈取與儀表板支援</strong>：協助計畫部（資源控管組）與發言官，透過「醫療應變儀表板」或\n    AI\n    知識庫，即時撈取全院精確的病床空床數、急診留觀人數及慢性病藥品庫存量。這些正確數據將作為指揮官實施醫療降載的決策依據，並提供給發言官作為對外發布新聞稿、反制假訊息的客觀證據。</p>\n</li>\n</ol>\n<p><strong>三、 確保全院通訊網路與家屬查詢專線暢通</strong></p>\n<ol>\n<li>\n<p><strong>維持總機與通訊韌性</strong>：面對恐慌家屬大量湧入的查詢電話，資訊室須確保總機系統與內外部電話線路的穩定。若一般電信網路因交通事故或擠斷而異常，資訊室須立即啟用多元備援通訊（如衛星電話、Meshtastic\n    等），確保院內指揮中心與外部衛生局、消防局的通報聯絡不中斷。</p>\n</li>\n<li>\n<p><strong>支援家屬尋人系統</strong>：確保「病人動向管理」與大量傷患登錄系統的穩定傳輸，讓社工室與家屬接待區能透過電腦系統即時查詢交通事故傷患的收治位置，加速家屬尋人效率並安撫情緒。</p>\n</li>\n</ol>\n<p><strong>四、 協助數位管道發布闢謠與就醫管制訊息</strong></p>\n<ol>\n<li><strong>數位管道即時推播</strong>：配合公共事務/發言官的決策，資訊室須協助將「醫院真實收治量能、戶外領藥動線管制及闢謠聲明」等重要訊息，迅速更新至醫院官方網站、APP，並透過院內各候診區的資訊系統與跑馬燈進行輪播宣導，藉由公開透明的數位資訊降低現場民眾的恐慌與不理性闖入。</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3（社群媒體流傳不實訊息，且掛號、批價、藥局、檢驗或影像系統出現延遲），此為典型的「資安攻擊（資訊戰）」與「假訊息（輿論戰）」複合危機。資訊室在\nHICS（醫院事故指揮系統）中擔任<strong>「機構運作主管（O5）」</strong>及演習編組中的<strong>「資通簡報組」</strong>核心角色，負責維持醫療系統持續運作、資安防禦與通訊韌性。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 災情評估與啟動「全院當機處理機制」（Downtime）</strong></p>\n<ol>\n<li>\n<p><strong>下達紙本降級決策</strong>：資訊室主任（資訊長）須迅速評估系統延遲狀況。若判定系統遭受惡意攻擊或無法於短時間內修復，應立即向指揮官報告，並下達啟動「全院當機處理機制」。</p>\n</li>\n<li>\n<p><strong>通知前線切換離線作業</strong>：透過總機（如使用 *9\n    緊急通報）或備援通訊，緊急通知醫務部、急診、護理部、檢驗、藥局與批掛等受影響單位，全面改採人工作業（啟動\n    Downtime Box\n    當機緊急箱，使用紙本病歷、手寫處方箋與檢驗單），以確保醫療核心服務不中斷。</p>\n</li>\n</ol>\n<p><strong>二、 執行資安事件阻斷與病毒排除（網路攻擊防禦）</strong></p>\n<ol>\n<li>\n<p><strong>流量監控與實體隔離</strong>：針對疑似釣魚郵件、異常登入或惡意連線，資訊室網路組人員需透過網路流量監控，查出遭大量病毒感染之網段。並立即將該網段之交換器與核心交換器拔除連線，執行實體隔離與阻斷，避免災情擴大癱瘓核心的\n    HIS 或 PACS 系統。</p>\n</li>\n<li>\n<p><strong>資安分級與法定通報</strong>：依據事件嚴重程度進行資安事件分級，並迅速向院內指揮中心及外部主管機關（如衛福部）完成法定的「資安通報」。</p>\n</li>\n<li>\n<p><strong>病毒排除</strong>：增派資訊室各組人力支援，針對受感染之電腦進行病毒排除與修復工作。</p>\n</li>\n</ol>\n<p><strong>三、 啟動備援系統與排定復原順序</strong></p>\n<ol>\n<li>\n<p><strong>異地備援接管</strong>：若主機或資料庫受損，危機應變分組應立即啟動備援系統（例如啟用位於瑞光院區\n    7F 具備獨立防護環境的 PACS、HIS\n    異地備援機房），確保資料庫安全不遺失。</p>\n</li>\n<li>\n<p><strong>排定復原優先順序</strong>：與指揮中心確認核心系統的復原優先順序，優先搶修急診、掛號批價、藥局、檢驗及影像等攸關病患生命安全之系統。</p>\n</li>\n<li>\n<p><strong>測試與重新上線</strong>：在確認病毒排除或系統修復後，先由程式設計人員與使用單位進行連線測試，測試無誤後再通知各單位結束當機機制，恢復正常電子資訊作業。</p>\n</li>\n</ol>\n<p><strong>四、 維持通訊韌性與備援通訊網</strong></p>\n<ol>\n<li><strong>確保備援通訊暢通</strong>：在內部網路系統癱瘓或不穩期間，資訊室須確保院內指揮指令傳遞順暢，緊急啟用備援通訊設備（如\n    UHF/VHF\n    無線電對講機、低軌衛星系統等），建立抗干擾的異質性戰術通訊網，以利各樓層指揮官與前線溝通。</li>\n</ol>\n<p><strong>五、 數據撈取支援闢謠與佐證紀錄保存</strong></p>\n<ol>\n<li>\n<p><strong>支援發言官闢謠</strong>：面對社群媒體流傳「停診、缺藥、拒收病人」之假訊息，資訊室須協助從未受損的備援資料庫中，撈取全院實際的病床數、物資與藥品庫存等正確數據。將這些真實資訊提供給公共事務/發言官，作為對外發布澄清新聞稿、反制假訊息的客觀依據。</p>\n</li>\n<li>\n<p><strong>保存佐證紀錄</strong>：妥善備份並保存系統當機期間的各項應變紀錄、通聯紀錄與資安通報資料，以利後續系統資料回補、檢討改善及應對潛在的醫療爭議。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對特別狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院的「數位神經系統」遭到全面癱瘓，面臨「又盲又啞」的極端危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>資訊室</strong>主任擔任執行部門的<strong>「機構運作主管（O5）」</strong>，同時主導<strong>「資通簡報組」</strong>，是抵禦網路攻擊與維持醫療系統運作的核心防線。</p>\n<p>面對國家級駭客的攻擊與勒索，資訊室的具體因應作為如下：</p>\n<p><strong>一、 執行實體隔離、資安阻斷與法定通報</strong></p>\n<ol>\n<li>\n<p><strong>流量監控與實體隔離</strong>：資訊室網路組人員需透過網路流量監控，迅速查出遭受大量病毒或惡意程式感染之網段。為避免勒索軟體與 APT 災情擴大至核心的 HIS 醫療資訊系統或 PACS 影像系統資料庫，必須立即將該網段之交換器與核心交換器拔除連線，執行物理層面的「實體隔離」與阻斷。</p>\n</li>\n<li>\n<p><strong>資安事件分級與通報</strong>：依據事件嚴重程度進行資安事件分級，並迅速向院內 HICS 指揮中心回報，同時依法向外部主管機關（如衛福部、行政院國家資通安全會報）完成重大「資安通報」。</p>\n</li>\n<li>\n<p><strong>拒絕勒索與病毒排除</strong>：配合國家關鍵基礎設施（CI）防護原則拒絕支付贖金，並增派資訊室各組人手支援，針對受感染之電腦或伺服器進行惡意程式的清除與病毒排除工作。</p>\n</li>\n</ol>\n<p><strong>二、 宣告系統當機並啟動「紙本降級（Downtime）」作業</strong></p>\n<ol>\n<li>\n<p><strong>宣告 Downtime 模式</strong>：若確認系統遭駭客癱瘓且無法於短時間內（如 30 分鐘）排除，資訊室主任須向指揮官報告，並透過廣播或備援通訊向全院正式宣告進入「Downtime（紙本降級）極限模式」。</p>\n</li>\n<li>\n<p><strong>通知各單位啟用緊急箱</strong>：通知急診、門診、藥局、檢驗科、放射科及病歷室等受影響單位，立即砸破封條取出預先整備的「當機緊急箱（Downtime Box）」。指示全院全面改用三聯式紙本病歷、手寫處方箋、紙本檢傷單，並依賴每日離線列印的最新住院名單來維持核心醫療運作。</p>\n</li>\n</ol>\n<p><strong>三、 建構「異質性戰術通訊網」以克服 DDoS 斷網</strong> 駭客的 DDoS\n攻擊往往伴隨外部網路與 VoIP\n網路電話癱瘓，資訊室必須確保指揮指令傳遞順暢：</p>\n<ol>\n<li>\n<p><strong>架設備援通訊</strong>：迅速啟用院方部署的低軌衛星（如 OneWeb/Starlink）設備，建立與中央衛福部的微弱但絕對關鍵的對外連線。</p>\n</li>\n<li>\n<p><strong>配發獨立無電線與傳令機制</strong>：院內改為配發獨立頻段的 UHF/VHF 無線電給各樓層指揮官進行雙向溝通。同時，配合計畫部門啟動最古老且抗電磁干擾的「傳令兵（Runner）制度」，以專人徒步方式精準遞送緊急紙本醫囑與檢驗報告。</p>\n</li>\n</ol>\n<p><strong>四、 啟動異地備援接管與排定系統復原順序</strong></p>\n<ol>\n<li>\n<p><strong>啟動異地備援</strong>：緊急啟動設置於 <strong>瑞光院區 7F</strong> 具備獨立防護環境的異地備援機房（包含 PACS、HIS 主機與備份的儲存媒體）。確保未受感染的乾淨備份資料庫能接手資料儲存與運算，維護資訊安全的核心機密性與完整性。</p>\n</li>\n<li>\n<p><strong>排定復原順序</strong>：在系統清洗與病毒排除後，資訊室復原分組須依據攸關病患生命安全的優先順序，逐一將急診、掛號批價、藥局、檢驗及放射等核心業務系統重新開機復原。</p>\n</li>\n<li>\n<p><strong>測試與重新上線</strong>：程式上線前，須由程式設計人員與使用單位代表進行連線測試，待測試通過且系統正常運作後，再通知各臨床單位結束全院當機處理機制，恢復資訊化作業模式。</p>\n</li>\n</ol>\n<p><strong>五、 數據撈取支援闢謠與佐證紀錄保存</strong></p>\n<ol>\n<li>\n<p><strong>支援發言官闢謠</strong>：境外勢力攻擊常伴隨假訊息認知作戰。資訊室須利用未受損的備援資料庫或 NotebookLM AI 應變知識庫，即時撈取全院實際的病床數、醫療人力與物資等精確數據，提供給發言官作為對外發布新聞稿、反駁「停診、癱瘓」等假訊息的客觀證據。</p>\n</li>\n<li>\n<p><strong>保全資安鑑識資料</strong>：妥善備份並保存勒索軟體訊息畫面、系統異常日誌、網路阻擋紀錄及資安通報等實體資料，作為日後檢調機關駭客追查、系統資料回補與檢討改善的重要佐證。</p>\n</li>\n</ol>"}, {"scenario": "1-5", "title": "48小時降載至30%目標", "desc": "接獲屏東縣聯合應變管制中心通知，請以30%為目標，48小時內完成降載作業，並進行醫療量能盤點與資料彙整。", "html": "<p>針對接獲屏東縣聯合應變管制中心「48 小時內完成降載至 30%\n目標」之緊急指令，在\nHICS（醫院事故指揮系統）架構下，<strong>資訊室</strong>（擔任執行部之<strong>「機構運作主管\nO5」</strong>及演習編組中的<strong>「資通簡報組」</strong>）雖然不直接接觸病患，卻是確保降載指令精準傳達、病患名單快速篩選以及醫療量能數據可視化的「數位神經中樞」,。</p>\n<p>面對主推官提問的三大重點，資訊室的具體因應作為如下：</p>\n<p><strong>一、 於 30 分鐘內支援指令確認、HICS 啟動與院內通報（因應提問 I）</strong></p>\n<ol>\n<li>\n<p><strong>確保通訊與廣播網絡暢通</strong>：接獲指揮官下達啟動 HICS 與降載的決策後，資訊室須確保院內總機系統、緊急廣播設備及內部通訊網路（如內部群組、一呼百應語音系統）運作正常，協助計畫部與指揮官於 30 分鐘內迅速將「全院動員與醫療降載」之最高指令精準通達全院各單位,。</p>\n</li>\n<li>\n<p><strong>整備備援通訊與防護</strong>：預防突發的網路壅塞或外部斷訊，資通簡報組須整備並確認多元備援通訊設備（如無線電對講機、衛星電話等）處於可用狀態，以確保指揮中心對內與對外的戰術通聯不中斷,。</p>\n</li>\n</ol>\n<p><strong>二、 支援降載作業：系統參數調整與群發停診公告（因應提問 II）</strong>\n當執行部（醫療照護主管）決定降載與停診名單後，資訊室必須提供強大的數位執行力以阻斷人流：</p>\n<ol>\n<li>\n<p><strong>極速群發簡訊阻斷就醫</strong>：配合醫務部取消非緊急門診、醫美排程、常規健檢與排程手術的決策，資訊室須會同掛號櫃檯，於 <strong>1 小時內</strong>透過 HIS 系統、APP 推播或簡訊群發系統，向預約病患發布停診或延期通知，迅速阻斷新的非緊急病患湧入醫院,。</p>\n</li>\n<li>\n<p><strong>HIS 系統權限與結帳參數調整</strong>：在系統端即時鎖定或關閉非緊急門診的掛號權限。同時，配合行政/財務部門的「戰時記帳豁免機制」，調整系統的結帳與出院流程，加速前線辦理「可提早出院病患」的極速離院手續，避免病患卡在批掛櫃檯。</p>\n</li>\n<li>\n<p><strong>撈取「反向檢傷」評估數據</strong>：協助臨床醫療團隊從系統中快速撈取全院住院病患清單與重要檢驗/生理指標，提供給「反向檢傷特別小組」作為快速評估病患是否可提早出院、轉院安置或必須留院的高度照護數據基礎。</p>\n</li>\n</ol>\n<p><strong>三、 執行關鍵資源盤點、戰情上板與外部回報對接（因應提問 III）</strong>\n資訊室是實現 <strong>SWEAT-M</strong> 數據可視化與建置戰情面板的核心技術支援單位：</p>\n<ol>\n<li>\n<p><strong>即時數據撈取與跨系統對接</strong>：配合計畫部（資源控管小組 P1）與後勤部，從 ERP（資源管理系統）與 HIS 系統中，即時且精準地撈取全院當前的「空床數」、「已降載出院/轉院人數」、「可用開刀房數」、「當班醫護人力總數」以及「氧氣、血品與戰備藥材庫存」等關鍵量能數據。</p>\n</li>\n<li>\n<p><strong>建置與維護「戰情面板（醫療應變儀表板）」</strong>：結合各組盤點出的 <strong>SWEAT-M</strong> 指標（S 安全保障、W 水、E 備援電力、A 交通運輸、T 通訊、M 醫療物資），利用系統化的「醫療應變儀表板」或 AI 應變知識庫，將複雜的資源缺口轉化為紅/黃/綠燈號等可視化圖表，即時呈現於指揮中心的戰情面板（Status Board）上，供指揮官進行後續撤離或量能重分配的精準決策,,。</p>\n</li>\n<li>\n<p><strong>維持對外通報連線以利回報</strong>：確保醫院與屏東縣聯合應變管制中心、衛生福利部緊急醫療管理系統（EOC）連線的網路傳輸暢通。協助「統籌呈報組」與聯絡官能於主管機關規定的 48 小時時限內，順利將降載進度、SWEAT-M 盤點結果與外部求援資料成功上傳與回報,。</p>\n</li>\n</ol>"}, {"scenario": "1-7", "title": "院內網路服務不穩", "desc": "院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況「院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲（疑似遭受資安攻擊）」，此情境符合演習特別狀況\n3-3 之資安攻防演練與資訊系統備援危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>資訊室</strong>主任擔任執行部門的<strong>「機構運作主管（O5）」</strong>，同時主導<strong>「資通簡報組」</strong>，肩負全院通訊韌性、資安防禦與斷網應變的核心重任。面對系統延遲與資安威脅，資訊室的具體因應作為如下：</p>\n<p><strong>一、 資安事件偵測、隔離阻斷與事件分級通報</strong></p>\n<ol>\n<li>\n<p><strong>流量監控與實體隔離</strong>：針對掛號、批價、檢驗或 PACS 影像系統出現的延遲，資訊室網路組人員須立即透過網路流量監控，清查是否遭受 DDoS 攻擊、勒索軟體感染或惡意連線。一旦發現異常網段，應迅速拔除該網段之網路交換器連線，執行「實體隔離與阻斷」，防範災情擴大癱瘓整體 HIS（醫療資訊系統）。</p>\n</li>\n<li>\n<p><strong>資安事件分級與法定通報</strong>：依據事件嚴重程度進行資安事件分級。確認事件層級後，迅速向院內指揮中心（指揮官）報告，並協同統籌呈報組，向外部主管機關（如衛福部）完成法定的資安通報作業。</p>\n</li>\n</ol>\n<p><strong>二、 宣告系統癱瘓並全面啟用「紙本降級（Downtime）」離線流程</strong>\n若評估系統延遲或癱瘓無法於短時間內（如 30\n分鐘）排除，資訊室必須果斷採取極限降級措施：</p>\n<ol>\n<li>\n<p><strong>宣告 Downtime 模式</strong>：由資訊室主任向值班主管與指揮官回報後，正式宣告啟動「全院當機處理機制」。透過總機（撥打 *9 緊急通報）或備援無線電，緊急通知急診、門診、護理部、檢驗科、放射科、藥局及病歷室等單位改採人工作業。</p>\n</li>\n<li>\n<p><strong>引導啟用當機緊急箱</strong>：指導前線醫療與行政單位砸破封條，取出預先整備的<strong>「當機緊急箱（Downtime Box）」</strong>。全面切換使用三聯式紙本病歷、手寫處方箋、紙本檢傷單與條碼貼紙，並依靠每日離線列印的最新住院名單來維持基礎醫療運作。</p>\n</li>\n</ol>\n<p><strong>三、 優先維持核心醫療運作與備援通訊</strong></p>\n<ol>\n<li>\n<p><strong>保障急診、藥局、檢驗、放射及病歷之離線運作</strong>：在系統降級期間，將資訊搶修與行政支援資源絕對集中，優先維持急診搶救、藥局發藥、檢驗、放射及病歷查詢等攸關病患生命安全的核心服務。配合行政部門啟動最古老且抗干擾的<strong>「傳令兵（Runner）制度」</strong>，以專人徒步方式在各樓層間精準遞送手寫醫囑、檢驗危險值（Panic Value）與實體 X 光片。</p>\n</li>\n<li>\n<p><strong>建構異質性戰術通訊網</strong>：若常規內部網路與 VoIP 分機系統因攻擊癱瘓，資訊室須協助架設或啟用備援通訊設備（如低軌衛星 OneWeb/Starlink 接收器、UHF/VHF 獨立頻段無線電對講機），確保指揮中心對內各樓層與對外主管機關的關鍵通訊暢通無阻。</p>\n</li>\n</ol>\n<p><strong>四、 確保異地備援與災後核心系統復原順序</strong></p>\n<ol>\n<li>\n<p><strong>異地資料保全與接管</strong>：確保所有核心醫療資料、電子病歷皆已安全完成離線備份與異地備份。若大連主院區機房受損嚴重，隨時準備啟動設置於<strong>瑞光院區 7F 的異地備援機房</strong>，由備援主機接手 PACS 與 HIS 資料的儲存與運算功能。</p>\n</li>\n<li>\n<p><strong>依優先序執行系統開機</strong>：待資安威脅解除、病毒排除後，資訊室復原分組須依據「急診、掛號批價、藥局、檢驗及影像系統」的核心優先順序，逐一將主機與網路設備重新開機並進行連線測試。</p>\n</li>\n<li>\n<p><strong>宣告復原與資料回補</strong>：經系統管理人員與各使用單位代表連線測試無誤後，正式通知全院結束當機處理機制，恢復資訊化電子作業。並協助各臨床單位將紙本降級期間產生的大量手寫病歷與處方資料，有條不紊地回補輸入至電腦系統中，確保病患數位病歷的完整性與法效性。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭與空襲威脅，不僅實體空間可能受損，更極易伴隨敵方的國家級駭客攻擊或電信基礎設施癱瘓。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>資訊室</strong>主任擔任執行部門的<strong>「機構運作主管（O5）」</strong>，同時主導演習編組中的<strong>「資通簡報組」</strong>。資訊室的最高任務是建構戰時的「通訊韌性」，並在資訊系統癱瘓時引導全院切換至降級作業。</p>\n<p>面對防空疏散與 B1 備援空間的緊急開設，資訊室的具體因應作為如下：</p>\n<p><strong>一、 建立 B1 地下微型戰地醫院之資訊與通訊網</strong></p>\n<ol>\n<li>\n<p><strong>備援設備轉置</strong>：配合醫療空間降階防護，資訊室必須迅速將必要的電腦終端設備與網路設施，移轉並重新佈設於\n    B1 的五處備援功能區（檢傷行政區、臨時 ICU\n    病房、臨時開刀房、恢復室及輕症病房），以維持急診、檢驗、放射及病歷查詢等核心服務持續運作。</p>\n</li>\n<li>\n<p><strong>建構異質性戰術通訊網</strong>：地下室極易成為訊號死角，資訊室須協助建立備援通訊管道。若對外網路與市話中斷，須啟動備援通訊設備（如低軌衛星\n    OneWeb/Starlink 接收器），建立與外部主管機關（如衛福部）的關鍵連線。</p>\n</li>\n</ol>\n<p><strong>二、 斷網斷電下的「紙本降級（Downtime）」作業</strong>\n若空襲震波摧毀機房，或伴隨敵方網路攻擊（如 DDoS、勒索軟體）導致 HIS/PACS\n系統癱瘓，資訊室將面臨「資訊全黑」的極端危機：</p>\n<ol>\n<li>\n<p><strong>宣告系統當機與切換</strong>：資訊室須立即向指揮官回報，並對全院宣告進入「紙本降級模式（Downtime）」，通知各單位停止依賴電腦系統，改採人工作業。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：指導前線醫療與行政單位砸破並取出預先整備的<strong>「當機緊急箱（Downtime\n    Box）」</strong>，使用內含的三聯式紙本病歷、手寫處方箋、紙本檢傷單，並依靠離線列印的病患名冊維持醫療運作。</p>\n</li>\n<li>\n<p><strong>啟用傳令兵（Runner）機制</strong>：在通訊全斷的狀態下，配合行政單位啟動人工傳遞機制，以徒步方式在\n    B1 各醫療區之間精準遞送緊急開刀醫囑與檢驗危險值。</p>\n</li>\n</ol>\n<p><strong>三、 執行資安防禦與異地備援監控</strong></p>\n<ol>\n<li>\n<p><strong>防禦資安攻擊</strong>：戰時極可能伴隨惡意連線或異常登入。資訊室須監控網路流量，若發現疑似駭客攻擊，應立即執行資安事件分級、將受感染的網段進行物理隔離與阻斷，防止災情擴散至核心醫療系統。</p>\n</li>\n<li>\n<p><strong>啟動瑞光異地備援</strong>：確保設置於<strong>瑞光院區 7F</strong> 的異地備援機房（包含\n    PACS、HIS\n    主機與備份的儲存媒體）維持運作。若大連主院區機房遭戰火波及損毀，隨時準備由異地備援主機接手資料儲存與運算功能。</p>\n</li>\n</ol>\n<p><strong>四、 核心系統之資料備份與災後重置</strong></p>\n<ol>\n<li>\n<p><strong>機密資料保護</strong>：確保所有醫療系統最新資料皆已妥善完成離線備份，將備份硬碟交由指揮中心（如指揮官避難包）或存放於安全防護區，防範戰火中發生病歷資料遺失。</p>\n</li>\n<li>\n<p><strong>規劃復原順序</strong>：待空襲威脅解除或硬體修復後，資訊室須依據急診、藥局、檢驗、放射及掛號等核心業務的優先順序，逐步進行資訊系統的重置、網路搶修與離線紙本資料的電腦回補作業。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨震波破壞與關鍵基礎設施（CI）受損，可能導致全院陷入「又盲又啞」的資訊癱瘓危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>資訊室</strong>主任擔任執行部門的<strong>「機構運作主管（O5）」</strong>，其首要任務是維持資訊系統與必要通訊服務的不中斷或重置。</p>\n<p>面對電力瞬斷、通訊中斷與系統異常，資訊室的具體因應作為如下：</p>\n<p><strong>一、 應對電力瞬斷與死守機房備援電力（UPS 監控與安全關機）</strong></p>\n<ol>\n<li>\n<p><strong>監控備援電力</strong>：發生電力瞬斷時，資訊室值班人員須立即監控機房的不斷電系統（UPS）。電腦主機至少可依靠\n    UPS 供應 15 至 30 分鐘的運轉電力。</p>\n</li>\n<li>\n<p><strong>機房環境監控</strong>：配合工務室確認緊急發電機是否於 10至12\n    秒內成功供電給資訊機房，並密切檢查機房空調溫度是否有異常竄高的情形。</p>\n</li>\n<li>\n<p><strong>執行系統安全關機</strong>：若台電無法復電，且緊急發電機亦無法供電，當 UPS\n    電量低於 30%\n    時，為避免硬體毀損或資料遺失，資訊室須依序針對網路設備、醫療資訊系統（HIS）、影像儲傳系統（PACS）等主機執行緊急安全關機作業。</p>\n</li>\n</ol>\n<p><strong>二、 應對通訊中斷與建構「異質性戰術通訊網」</strong></p>\n<ol>\n<li>\n<p><strong>備援通訊架設</strong>：若常規電信網路或院內分機癱瘓，資訊室須協助架設與啟用異質性備援通訊設備（如低軌衛星電話、UHF/VHF\n    獨立頻段無線電），以維持指揮中心對內與對外的微弱但關鍵的連線。</p>\n</li>\n<li>\n<p><strong>總機人力支援</strong>：若發生重大通訊災情，資訊室人員應立即返院，增加臨時總機人力，負責協助電話轉接、回覆詢問及檢測各樓層電話線路是否正常。</p>\n</li>\n</ol>\n<p><strong>三、 宣告系統癱瘓並啟動「紙本降級（Downtime）」作業</strong>\n若伺服器或網路設備因震動受損，或面臨斷電超過半小時無法恢復，資訊室必須採取極限手段：</p>\n<ol>\n<li>\n<p><strong>宣告 Downtime\n    模式</strong>：由資訊室評估受影響範圍後，通知急診、門診、藥局、檢驗科、放射科及病歷室等單位，全面啟動「電腦當機應變機制」，改採人工作業。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：協助各單位轉入「紙本降級模式」，取出當機緊急箱（Downtime\n    Box）內的紙本病歷、手寫處方箋與離線列印的住院名單維持醫療運作。</p>\n</li>\n<li>\n<p><strong>配合傳令機制</strong>：在網路與通訊全斷下，配合計畫部啟動「傳令兵（Runner）」制度，以人工徒步方式遞送醫囑與檢驗報告。</p>\n</li>\n</ol>\n<p><strong>四、 防範複合型駭客攻擊與確保資料異地備援安全</strong></p>\n<ol>\n<li>\n<p><strong>資安隔離阻斷</strong>：戰時震波與爆炸可能伴隨敵方的網路攻擊（如分散式阻斷服務攻擊\n    DDoS、惡意程式或勒索軟體）。資訊室須透過網路流量監控，若發現異常連線或大量病毒感染，應立即將受感染網段之交換器拔除隔離，阻斷災情擴大。</p>\n</li>\n<li>\n<p><strong>異地資料保全</strong>：與狀況分析小組（P2）合作，確保所有現有的重要醫療數據與病歷資料，皆已安全備份至位於<strong>瑞光院區\n    7F 的異地備援電腦機房</strong>，維護資訊安全的核心機密性與完整性。</p>\n</li>\n</ol>\n<p><strong>五、 災後核心系統復原與歸建</strong></p>\n<ol>\n<li>\n<p><strong>系統開機與測試</strong>：待工務室恢復穩定供電或設備搶修完成後，資訊室復原分組須依據核心優先順序，逐一將核心交換器、網路設備、IBM\n    HIS 醫療資訊主機、PACS 主機及掛號系統重新開機。</p>\n</li>\n<li>\n<p><strong>通知復原</strong>：經過系統管理人員與使用單位代表測試無誤後，正式通知各臨床單位結束全院當機處理機制，恢復資訊化作業模式。</p>\n</li>\n</ol>\n<p>工務室如何確保醫療氣體與負載卸除的優先順序？</p>\n<p>資訊室在斷網時如何協助紙本降級與資料保全？</p>\n<p>若電力與水資源同時中斷，工務室有哪些極限替代方案？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院正面臨敵方實體攻擊、高爆炸火災風險，以及維生電力與氧氣雙雙中斷的極端「黑堡（Black\nStart）」孤島危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>資訊室</strong>主任擔任執行部門的<strong>「機構運作主管（O5）」</strong>，其首要任務是在面臨極限斷電與爆炸威脅時，保護醫院的「數位神經系統」與核心資料，並在系統無法運作時引導全院切換至降級作業。</p>\n<p>面對主發電機受損與爆炸威脅，資訊室的具體因應作為如下：</p>\n<p><strong>一、 應對主發電機受損：監控 UPS 備援與執行「系統安全關機」</strong>\n無人機攻擊導致主發電機受損，全院可能面臨立即的全面斷電。資訊室必須採取極限保護措施以防硬體毀損與資料遺失：</p>\n<ol>\n<li>\n<p><strong>監控機房備援電力與環境</strong>：電力瞬斷時，資訊室值班人員須立即監控機房的不斷電系統（UPS），確認其至少能提供 30 分鐘的作業電力。同時，因空調可能隨之停擺，須密切監控機房溫度是否異常竄高。</p>\n</li>\n<li>\n<p><strong>評估供電與強制關機</strong>：配合工務室確認是否還有其他備用電源可用。若確認柴油發電機受損無法供電，且台電無法立即復電，當 UPS 電量低於 30% 時，資訊室主管須果斷下達指令，依序針對網路設備、醫療資訊系統相關主機（如 IBM 主機）、PACS 主機等核心設備執行「安全關機作業」，以避免不正常斷電造成資料庫永久性毀損。</p>\n</li>\n</ol>\n<p><strong>二、 宣告系統癱瘓並全面啟動「紙本降級（Downtime）」作業</strong>\n在確認系統必須關機或已因斷電停擺後，醫療前線將瞬間「又盲又啞」，資訊室須主導作業模式的切換：</p>\n<ol>\n<li>\n<p><strong>宣告 Downtime 模式</strong>：資訊室主任（或值班人員）須立即向指揮官與值班主管報告，並透過總機或備援通訊向急診、門診、藥局、檢驗科及病房等單位，宣告正式進入「紙本降級（Downtime）極限模式」，通知各單位改採人工作業。</p>\n</li>\n<li>\n<p><strong>指引啟用當機緊急箱</strong>：確保各單位立即取出「當機緊急箱（Downtime Box）」，全面改用三聯式紙本病歷、手寫處方箋、紙本檢傷單，並依靠每日離線列印的最新住院名單維持醫療核心運作。</p>\n</li>\n<li>\n<p><strong>配合「傳令兵（Runner）」機制</strong>：在資訊網路癱瘓的狀態下，配合行政與計畫部門啟動最古老的「傳令兵」制度，以人工徒步方式精準遞送緊急開刀醫囑與檢驗報告。</p>\n</li>\n</ol>\n<p><strong>三、 克服斷電斷網：建構「異質性戰術通訊網」</strong>\n爆炸與停電極易導致周邊的電信基地台與院內 VoIP\n網路電話癱瘓，資訊室必須維持指揮中心的通訊韌性：</p>\n<ol>\n<li>\n<p><strong>啟動備援通訊設備</strong>：迅速啟用獨立頻段的 UHF/VHF 無線電對講機，發配給各樓層指揮官、急診前線與機電搶修團隊。若對外通訊完全中斷，須協助架設低軌衛星（如 OneWeb/Starlink）設備，死守與外部衛生局、EOC 及消防防爆單位的關鍵求援連線。</p>\n</li>\n<li>\n<p><strong>總機人力緊急支援</strong>：若發生重大通訊災情，資訊室人員應立即返院支援臨時總機，負責轉接、回覆內部詢問及檢測各單位電話線路是否正常。</p>\n</li>\n</ol>\n<p><strong>四、 防範爆炸波及與「異地備援接管」</strong>\n機電棟的液態氧氣主儲槽洩漏伴隨極高爆炸風險，若火勢或震波威脅到大連院區的資訊機房，資訊室須啟動空間備援：</p>\n<ol>\n<li><strong>機密資料保護與異地備援</strong>：確保所有核心醫療數據皆已透過常規排程完成備份。若大連院區機房面臨實體摧毀風險，須隨時準備啟動設置於 <strong>瑞光院區 7F</strong> 等具備獨立防護環境的異地備援機房，由備援主機接手資料儲存與運算功能，確保醫療紀錄的絕對安全。</li>\n</ol>\n<p><strong>五、 災後核心系統復原與資料回補</strong>\n待工務室與外部防爆/消防單位完成液氧槽危害排除、撲滅火勢，並由移動式發電車或台電恢復穩定供電後，資訊室須執行嚴謹的復原作業：</p>\n<ol>\n<li>\n<p><strong>排定開機與復原順序</strong>：危機復原分組須依據攸關病患生命安全的優先順序，逐一將核心交換器、網路設備、IBM 醫療資訊系統主機、PACS 主機及掛號系統重新開機。</p>\n</li>\n<li>\n<p><strong>連線測試與宣告復原</strong>：系統重新上線前，須由程式設計人員與使用單位代表進行連線測試。待測試通過且系統正常運作後，再通知各臨床單位結束全院當機處理機制，恢復資訊化作業模式。</p>\n</li>\n<li>\n<p><strong>協助資料回補</strong>：協助各臨床科室將斷電與當機期間產生的大量紙本病歷、手寫處方與檢驗報告，有條不紊地補輸入至電子系統中，確保病患數位病歷的延續性與完整性。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與
