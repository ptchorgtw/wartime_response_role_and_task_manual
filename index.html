復室」。</p>\n</li>\n<li>\n<p><strong>執行核心任務</strong>：負責戰傷病患緊急手術後的術後觀察、恢復照護，以及後續移轉至臨時\n    ICU 病房（約翰/馬可 B1）或進行後送的轉送銜接。</p>\n</li>\n</ol>\n<p><strong>四、 協調無菌器械與急救資源（血品/藥品）支援</strong></p>\n<ol>\n<li>\n<p><strong>無菌器械調度</strong>：在 B1\n    臨時開刀房運作期間，手術室須與維持在<strong>韓偉大樓 3F\n    的供應室</strong>保持密切聯繫，協調中央無菌器械的緊急調度與配送，確保手術器械不斷鏈。</p>\n</li>\n<li>\n<p><strong>用血與用藥支援</strong>：與後勤部門的任務支援組（藥庫位於馬太\n    B1、資材位於約翰/馬可\n    B1）及檢驗科血庫協調，確保手術所需的急救衛材、麻醉藥品及緊急用血能優先且穩定地供應至\n    B1 臨時開刀房。</p>\n</li>\n</ol>\n<p><strong>五、 配合垂直疏散與人員防空避難</strong>\n若空襲警報發布時，仍有無法立即移動之重症術後病患，手術/麻醉團隊須利用軟擔架或蓄電池設備，經由安全梯以人力將病患垂直疏散至\nB1\n避難區；團隊自身亦須聽從指揮官與安全官指令，於地下層進行就地防爆掩蔽與動線管制。</p>"}]}, {"role": "外科/骨科/麻醉/手術室", "entries": [{"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨大量戰傷病患（MCI）的湧入，核心的創傷搶救與手術量能將受到極限挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>外科、骨科、麻醉科與手術室</strong>團隊隸屬於執行部門的<strong>「醫療照護組（O1）」</strong>，由外科主任等擔任醫療照護主管。面對大量需要緊急手術與搶救的戰傷病患，其具體因應作為如下：</p>\n<p><strong>一、 立即停止常規醫療，執行「極限降載」與「反向檢傷」</strong>\n為了應對瞬間暴增的手術與加護病房（ICU）需求，外科系必須強行騰出醫療空間與資源：</p>\n<ol>\n<li>\n<p><strong>停止非緊急手術</strong>：接獲大量傷患與戰備指令後，立即暫停或無限期延後所有非緊急、非急迫性（Elective）的排程手術。將全院寶貴的開刀房空間、麻醉藥品、醫療氣體與醫護人力，絕對保留給戰傷病患搶救使用。</p>\n</li>\n<li>\n<p><strong>外科病房與 SICU 反向檢傷（Reverse\n    Triage）</strong>：外科與骨科資深主治醫師須進入外科一般病房及外科加護病房（SICU），強制執行反向檢傷。將生命徵象穩定、提早出院不會立即危及生命的術後病患，快速辦理出院或下轉至基層與長照機構，強行騰出急重症病床與「擴充量能（Surge\n    Capacity）」。</p>\n</li>\n</ol>\n<p><strong>二、 響應「急診 333」召回，進駐急診紅/黃區指揮搶救</strong>\n面對急診湧入的大量傷患，外科與骨科醫師必須打破平時的門診與病房編制，直接投入前線：</p>\n<ol>\n<li>\n<p><strong>緊急召回與編組</strong>：聽聞總機廣播「急診\n    333」大量傷患代號，外科系與骨科醫師依據「醫師緊急召回名冊（第一波、第二波）」，迅速前往急診報到。</p>\n</li>\n<li>\n<p><strong>接管重傷（紅）與中傷（黃）區</strong>：在大量戰傷事件中，由外科/骨科支援醫師擔任急診重傷區（紅區）與中傷區（黃區）的<strong>「指揮醫師」</strong>。</p>\n</li>\n<li>\n<p><strong>執行損傷控制</strong>：在黃金時間內，針對戰傷、爆炸碎片傷與貫穿傷病患，執行「損傷控制復甦（Damage\n    Control\n    Resuscitation）」與緊急救命處置，並決定病患送入開刀房的優先順序。</p>\n</li>\n</ol>\n<p><strong>三、 開設 B1 備援手術區，維持戰火下之「核心手術量能」</strong>\n若地面樓層面臨空襲威脅或安全疑慮，手術與麻醉團隊必須配合全院空間降階防護，轉入地下室維持運作：</p>\n<ol>\n<li>\n<p><strong>開設 B1\n    臨時開刀房</strong>：手術室與麻醉團隊須迅速攜帶急救與麻醉儀器，確實於<strong>韓偉大樓\n    B1\n    腹膜透析室</strong>開設「臨時開刀房」，在此地下安全區內執行戰傷處置與緊急手術。</p>\n</li>\n<li>\n<p><strong>開設 B1 恢復室</strong>：於<strong>韓偉大樓 B1\n    環保室</strong>開設「恢復室」，負責戰傷病患緊急手術後的術後觀察、恢復照護，並準備將病患銜接轉送至約翰/馬可大樓\n    B1 的臨時 ICU。</p>\n</li>\n</ol>\n<p><strong>四、 極限用血調控與「推拉式」戰略物資支援</strong>\n手術暴增將導致麻醉藥品與血液瞬間見底，手術/麻醉團隊必須採取戰時非常規手段：</p>\n<ol>\n<li>\n<p><strong>極限輸血與血品降級</strong>：配合血庫的大型災難用血調控，在控制不佳且資源匱乏的環境中，緊急手術應改為僅使用\n    O 型血或「全血（Whole\n    Blood）」直接輸血搶救。若血庫枯竭，隨時準備接收由院內「走動式血庫」現場抽取並由傳令兵送達的新鮮全血。</p>\n</li>\n<li>\n<p><strong>接收「盲派」急救箱</strong>：在戰地開刀房的混亂狀態下，停止常規的填單領藥。由藥劑科與資材組啟動「推拉式物流（Push-Pull\n    Logistics）」，將裝滿戰術止血帶、止血紗布、強效麻醉鎮痛藥劑（如\n    Ketamine）的「戰傷急救箱」主動盲派（Push）至臨時開刀房門口，確保搶救子彈不斷鏈。</p>\n</li>\n</ol>\n<p><strong>五、 配合紙本降級（Downtime）與無通訊作業</strong> 若戰火或駭客攻擊導致\nHIS/PACS 系統當機、網路癱瘓：</p>\n<ol>\n<li>\n<p><strong>紙本手術與麻醉紀錄</strong>：手術室與麻醉科必須迅速砸破並啟用「當機緊急箱（Downtime\n    Box）」，全面改用手寫紙本的手術紀錄、麻醉紀錄與處方箋。</p>\n</li>\n<li>\n<p><strong>傳令兵（Runner）機制</strong>：在通訊中斷下，配合行政部門派出的「傳令兵」，以人工徒步方式在\n    B1 臨時開刀房、檢驗科血庫與臨時 ICU\n    之間傳遞緊急醫囑、手術檢體與血液配對單，確保戰傷手術不因資訊中斷而停擺。</p>\n</li>\n</ol>"}]}, {"role": "加護病房", "entries": [{"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨大量戰傷病患湧入，加護病房（ICU）的重症收治量能將面臨極限挑戰。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>加護病房（含 MICU、SICU\n等）「醫療照護組（O1）」</strong>，必須在最短時間內騰出救命空間並維持重症照護底線。其具體因應作為如下：</p>\n<p><strong>一、 執行「反向檢傷（Reverse Triage）」與極速騰出空床</strong>\n面對急診與手術室源源不絕送入的重症戰傷病患，加護病房必須打破平時的收治標準，強行擴充量能：</p>\n<ol>\n<li>\n<p><strong>反向檢傷</strong>：配合平時不負責該病房的資深主任級醫師組成「反向檢傷特別小組」，進入中度或一般加護病房強制評估現有病患。</p>\n</li>\n<li>\n<p><strong>極限降載</strong>：篩選出「拔除靜脈點滴或提早出院/下轉，在 72\n    小時內不會立即危及生命」的相對穩定病患，快速辦理降級轉出至一般病房、基層診所或長照機構，強行騰出寶貴的急重症病床作為「擴充病床（Surge\n    Beds）」以接收戰傷病患。</p>\n</li>\n</ol>\n<p><strong>二、 響應「急診 333」大量傷患動員與人力支援</strong></p>\n<ol>\n<li>\n<p><strong>前線支援</strong>：當總機廣播「急診 333」大量傷患代號時，各加護病房（如\n    MICU、SICU、PICU）須依據院內人力支援配置（白班、小夜或大夜班），立即調派\n    1 至 2\n    名支援護理人員前往急診現場，向急診護理師組長報到，協助前線的重傷區搶救與醫療處置。</p>\n</li>\n<li>\n<p><strong>戰力輪替</strong>：在處理大量戰傷的高壓環境下，配合人事與護理部啟動「軍事化強制輪班機制」（如\n    12 小時一班），強制安排 ICU\n    醫護人員至地下室的「員工專屬庇護站」輪休，並接受心理韌性特遣隊的心理急救（PFA），防範戰鬥疲勞與創傷後壓力症候群（PTSD）。</p>\n</li>\n</ol>\n<p><strong>三、 空間降階防護與開設「B1 臨時 ICU 病房」</strong>\n若空襲或戰火威脅到高樓層的加護病房，ICU 團隊必須執行戰術空間轉置：</p>\n<ol>\n<li>\n<p><strong>就地掩蔽（Defend in Place）</strong>：若遇緊急空襲無法下樓，ICU\n    醫護人員須在不斷開呼吸器與維生儀器的極限情況下，將病床迅速推離靠窗區域，移至建築物的「核心內筒（如電梯梯廳、無窗戶的內部走廊）」進行防爆掩蔽，並拉下防爆窗簾。</p>\n</li>\n<li>\n<p><strong>無動力垂直疏散</strong>：若高樓層受損，須利用可攜式蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，以純人力接力將插滿管路的重症病患經安全梯垂直疏散至地下室。</p>\n</li>\n<li>\n<p><strong>進駐備援空間</strong>：確實於<strong>約翰／馬可大樓\n    B1（資材組前方）</strong>開設「臨時 ICU\n    病房」，負責重症暫置、醫療設備監測，並無縫銜接由臨時開刀房轉出的術後戰傷病患。</p>\n</li>\n</ol>\n<p><strong>四、 孤島狀態下的「維生系統死守」與人工替代方案</strong>\n若空襲摧毀外部電網或自來水廠，加護病房將面臨斷電、斷氣的危機：</p>\n<ol>\n<li>\n<p><strong>死守紅區電力</strong>：配合工務室的「負載卸除」，確保緊急發電機的所有寶貴電力絕對優先死守在\n    ICU、開刀房與急診室等重症紅區。</p>\n</li>\n<li>\n<p><strong>極限人工給氧</strong>：若中央液氧槽受損或管線失去壓力，ICU 護理人員須在 3\n    分鐘內將病患切換至備用氧氣鋼瓶；若鋼瓶耗盡，則立即動員備用人力組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）進行人工捏球接力，維持重症病患呼吸。</p>\n</li>\n<li>\n<p><strong>斷網紙本作業</strong>：若 HIS 系統因駭客攻擊癱瘓，ICU\n    須立即啟用「當機緊急箱（Downtime\n    Box）」，全面切換為紙本病歷與手寫處方箋，並透過無線電或「傳令兵（Runner）」傳遞檢驗危險值與醫囑。</p>\n</li>\n</ol>"}]}, {"role": "藥劑部", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報各項醫療量能。藥劑部（科）在\nHICS（醫院事故指揮系統）中隸屬於後勤部，扮演維持醫療戰鬥力與戰略物資補給的關鍵命脈。其具體因應作為如下：</p>\n<p><strong>一、 納入 HICS 編組與執行限時量能盤點</strong></p>\n<ol>\n<li>\n<p><strong>進駐後勤與醫療應變編組</strong>：藥劑科主任將納入 HICS\n    指揮體系下的<strong>「後勤物資與維生組」</strong>（擔任副組長或窗口），並協同支援「醫療應變與傷患搶救組」。</p>\n</li>\n<li>\n<p><strong>限時盤點與回報 72\n    小時量能</strong>：藥劑科必須迅速盤點院內常規藥品與戰備藥物庫存（包含廣效抗生素、止痛麻醉藥劑、破傷風疫苗及大量林格氏液等）。必須評估消耗速率與缺口，建立<strong>至少維持\n    72\n    小時</strong>的藥品耗材清單與物資儲備清冊，並將數據迅速提交給「統籌呈報組（危管會）」，以利準時向主管機關完成量能回報。</p>\n</li>\n</ol>\n<p><strong>二、 啟動戰傷藥品「推拉式物流」與「盲派」</strong></p>\n<ol>\n<li>\n<p><strong>打破平時領藥常規</strong>：戰時必須顛覆平時為了控管成本的「及時供貨（JIT）」與臨床開單的「申請領用（Pull）」流程。</p>\n</li>\n<li>\n<p><strong>實施主動盲派（Push\n    Logistics）</strong>：藥劑部需將預先打包好的標準化<strong>「戰傷急救箱（Trauma\n    Kits /\n    Go-Kits）」</strong>（內含止血帶、點滴、抗生素、麻醉鎮痛藥劑等）裝上推車，在不等待前線開立表單申請的情況下，直接主動<strong>「盲派（Push）」</strong>推至急診紅區與臨時開刀房門口，確保前線醫護人員隨手就能取得救命藥物。</p>\n</li>\n</ol>\n<p><strong>三、 整備紙本降級（Downtime）與人工給藥機制</strong>\n戰時極可能遭遇駭客攻擊、斷網或斷電導致\nHIS（醫療資訊系統）癱瘓，藥劑部必須配合啟動<strong>「紙本降級（Downtime）極限模式」</strong>。藥局人員需演練在資訊系統全黑的情況下，接收由傳令兵（Runner）遞送的手寫處方箋，以人工、紙本及離線作業方式，維持核心的藥事服務絕對不中斷。</p>\n<p><strong>四、 對接外部支援與物資調度</strong>\n針對限時盤點中所發現的戰備藥品缺口，藥劑部須透過聯絡官或總務部，緊急聯繫屏東縣衛生局、外部藥品供應商或區域聯防合作醫院請求緊急支援調撥。一旦簽證物資或支援藥品運達，藥劑科需確認接收、安全保管，並訂定戰災期間藥品的優先使用順序。</p>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之複合性危機（民眾因假訊息與恐慌大量湧入急診、搶購慢性病藥品、交通事故大量傷患），藥劑科在\nHICS（醫院事故指揮系統）中隸屬於後勤部（或配合醫療照護組），肩負著穩定藥品庫存、迅速支援前線搶救的關鍵任務。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 啟動藥師緊急召回機制（因應大量傷患）</strong>\n面對交通事故引起的大量傷患（代號333），當班藥師若評估人力無法負荷，必須立即啟動「藥劑科緊急召回辦法」：</p>\n<ol>\n<li>\n<p><strong>第一波召回：</strong>\n    由住院藥局組長（或急診藥師）調派院內現有住院藥師支援 1 至 5 人。</p>\n</li>\n<li>\n<p><strong>第二波召回：</strong> 門、住院藥局組長相互支援，調派 5 至 10\n    名藥師，並以居住於屏東地區者優先召回，投入急診或戶外領藥支援。</p>\n</li>\n<li>\n<p><strong>第三波召回：</strong>\n    若疫情或傷患規模持續擴大，由藥劑科主任召回全部藥師人力（包含正在休假中的藥師）回院支援。</p>\n</li>\n</ol>\n<p><strong>二、 設立戶外領藥區與管制慢性病藥物（因應搶購潮與分流）</strong></p>\n<ol>\n<li>\n<p><strong>戶外慢性病領藥分流：</strong>\n    針對因假訊息恐慌而要求提早領取慢性病藥品的民眾，藥劑科需配合院方決策，於急診室外或大廳設立「戶外慢性病處方籤領藥區」。透過戶外領藥機制，將單純領藥的民眾阻絕於急診搶救區之外，避免急診動線癱瘓。</p>\n</li>\n<li>\n<p><strong>嚴格管制戰略藥品：</strong>\n    藥劑科必須立即盤點並嚴格管制院內慢性病藥品及戰略藥品（如抗生素、止痛麻醉藥、破傷風疫苗等）的庫存，避免因民眾非理性搶購而導致資源提早耗竭。</p>\n</li>\n</ol>\n<p><strong>三、 啟動戰傷急救「盲派（Push Logistics）」補給（因應交通事故重症）</strong></p>\n<ol>\n<li>\n<p><strong>打破常規領藥程序：</strong>\n    針對交通事故湧入的大量重症傷患，藥劑科必須顛覆平時「開單申請才領用（Pull）」的常規流程。</p>\n</li>\n<li>\n<p><strong>主動盲派至前線：</strong> 藥劑科人員需將預先備妥的「戰傷急救箱（Trauma\n    Kits /\n    Go-Kits）」（內含止血紗布、輸液、抗生素、強效麻醉鎮痛藥劑等），以「盲派（Push）」方式直接推至急診紅區（重傷治療區）或臨時開刀房門口。派員主動提供急診醫療人員所需藥物，確保前線醫護不待申請即可隨手取得救命物資。</p>\n</li>\n</ol>\n<p><strong>四、 監控耗材速率與對接外部支援</strong></p>\n<ol>\n<li>\n<p>藥劑科主任需持續評估慢性病藥物與急救藥品的消耗速率，並將精確的庫存與缺口數據提交給後勤部與計畫部。</p>\n</li>\n<li>\n<p>若發現藥品庫存即將告罄，須立即協同行政/財務部轄下的「採購小組」或聯絡官，緊急聯繫替代供應商、屏東縣衛生局或區域聯防醫院，請求緊急調撥藥材支援，以確保醫療核心功能不中斷。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3所描述的「社群媒體流傳缺藥、停診等假訊息，且藥局、掛號、批價等資訊系統大當機」，這是一場結合「輿論恐慌」與「資訊癱瘓」的複合性危機。藥劑科在\nHICS（醫院事故指揮系統）中隸屬於後勤部（任務支援組）與執行部醫療照護之輔助單位，必須立即切換為無網作業模式，並主動出擊支援前線。</p>\n<p>藥劑科的具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」人工作業</strong></p>\n<ol>\n<li>\n<p><strong>切換離線作業</strong>：當接獲資訊室啟動「全院當機處理機制」之通報後，門診藥局與急診藥局必須立即停止依賴癱瘓的\n    HIS 系統（醫療資訊系統），全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>接收手寫處方</strong>：配合臨床單位啟用的「當機緊急箱（Downtime\n    Box）」，藥局人員須改為接收醫師的手寫處方箋進行人工調劑、核對與發藥，以確保給藥服務與醫療核心功能不中斷。</p>\n</li>\n</ol>\n<p><strong>二、 顛覆常規，啟動戰略藥品「盲派（Push）」物流</strong></p>\n<ol>\n<li>\n<p><strong>打破申請領用流程</strong>：在系統當機期間，急診與開刀房前線無法透過電子系統發出領藥單（Pull）。藥劑科必須顛覆平時「有申請才領用（JIT）」的常規流程。</p>\n</li>\n<li>\n<p><strong>主動盲派救命物資</strong>：藥局人員須將預先打包好的「戰傷急救箱（Trauma\n    Kits /\n    Go-Kits）」（內含廣效抗生素、強效麻醉鎮痛藥劑、輸液等戰備庫存），不待前線申請，直接以「盲派（Push\n    Logistics）」方式主動推至急診紅區與開刀房門口。確保前線醫護在無網狀態下，伸手就能取得救命藥物。</p>\n</li>\n</ol>\n<p><strong>三、 盤點藥品真實庫存，反制「缺藥」假訊息</strong></p>\n<ol>\n<li>\n<p><strong>嚴格庫存管制</strong>：面對社群媒體流傳「本院缺藥」的不實訊息，可能引發民眾恐慌性的慢性病藥品搶購潮。藥劑科必須立即盤點並嚴格管制現有之慢性病藥物與戰備藥品庫存，避免資源遭到非理性耗竭。</p>\n</li>\n<li>\n<p><strong>數據對接闢謠</strong>：將精確的藥品實體存量數據，迅速回報給計畫部的「資源控管小組（P1）」彙整。這些真實數據將提供給發言官（醫療副院長），作為對外發布新聞稿、反駁缺藥謠言的最有力客觀證據。</p>\n</li>\n</ol>\n<p><strong>四、 啟動「藥劑科緊急召回辦法」彌補人力缺口</strong>\n資訊系統當機將導致找藥、核對與發藥轉為極度耗時的人工作業，為應付恐慌就醫與大量手寫處方，當班藥師若評估無法負荷，須立即向主管報告並啟動人力召回：</p>\n<ol>\n<li>\n<p><strong>平日時段</strong>：第一波由組長調派院內現有住院藥師支援 2\n    人；第二波門/住院藥局相互支援調派 5-10\n    名（以居住屏東地區優先）；第三波由主任召回全部藥師人力（含休假）。</p>\n</li>\n<li>\n<p><strong>假日與大夜時段</strong>：第一波調派 1-5 人支援；第二波召回 5-10\n    人；若災情擴大則發布第三波全面召回，全力支援前線的無網調劑作業。</p>\n</li>\n</ol>\n<p><strong>五、 配合通訊降級與「傳令兵（Runner）」制度</strong></p>\n<ol>\n<li>\n<p>在網路與院內電話皆不穩定的「資訊全黑」狀態下，藥劑科須配合全院啟動的「傳令兵（Runner）」制度。</p>\n</li>\n<li>\n<p>透過指定穿著螢光背心的專人徒步穿梭，接收來自急診或病房的緊急手寫紙本醫囑，並將調劑完成的緊急藥品透過傳令兵精準遞送回前線，克服斷網斷訊危機。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院正面臨物資匱乏與交通受阻的「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>藥劑科</strong>（藥劑部）在編組中隸屬於後勤部（任務支援組）與執行部（醫療照護組）的醫療輔助單位，肩負著全院救命藥物調度與前線支援的重任。其具體因應作為如下：</p>\n<p><strong>一、 盤點並嚴格管制戰略藥品（彈藥庫管）</strong>\n面對外部藥材配送延遲或中斷，藥劑科必須立即盤點並嚴格管制院內關鍵戰略藥品的庫存。這些戰備物資包括廣效抗生素、止痛麻醉藥（如\nKetamine\n等強效麻醉鎮痛藥劑）、破傷風疫苗及大量林格氏液等。透過嚴密的庫存管制，避免寶貴的醫療資源在物資斷援的狀況下遭到非理性耗竭。</p>\n<p><strong>二、 顛覆常規，啟動戰略物資「盲派（Push）」物流</strong>\n在戰時或聯外交通阻斷的極端狀況下，平時為了降低庫存成本所採用的「及時供貨（JIT）」與「有申請才領用（Pull）」的物流系統將完全失效。藥劑科必須採取主動出擊的補給模式：</p>\n<ol>\n<li>\n<p><strong>推拉式物流（Push-Pull\n    Logistics）</strong>：改變平時的申請領用流程，啟動戰傷專屬衛材的物流應變。</p>\n</li>\n<li>\n<p><strong>主動推進救命物資（盲派）</strong>：將預先打包好的標準化「戰傷急救箱（Trauma\n    Kits /\n    Go-Kits）」，不待前線發出領料單或表單申請，直接依據現場的傷患湧入狀況（如急診巨響或傳令兵口信），主動以「盲派（Push）」方式推至急診紅區與開刀房門口。確保前線醫護人員只要伸手就能拿到救命藥物，維持醫療戰鬥力不斷鏈。</p>\n</li>\n</ol>\n<p><strong>三、 克服交通受阻，啟動「藥劑科緊急召回辦法」</strong>\n針對員工到勤受交通影響而產生的人力缺口，藥劑科值班藥師需向住院藥局組長報告，並依據現況評估啟動緊急召回機制。為避開長途交通阻礙，將<strong>優先召回居住於屏東地區的藥師</strong>：</p>\n<ol>\n<li>\n<p><strong>平日時段應變</strong>：第一波先調派院內現有之住院藥師 2\n    人支援；第二波由門、住院藥局組長相互支援調派 5-10\n    名藥師（以居住屏東地區優先）；若災情嚴重人力仍無法負荷，第三波由主任召回全部藥師人力（包含休假人員）。</p>\n</li>\n<li>\n<p><strong>假日與大夜時段應變</strong>：第一波調派住院藥師 1-5\n    人支援；第二波調派支援藥師 5-10\n    人（以屏東地區優先）；第三波由主任全面召回全部藥師人力回院支援。</p>\n</li>\n</ol>\n<p><strong>四、 支援前線醫療照護與待命區調度</strong></p>\n<ol>\n<li>\n<p><strong>前線醫療輔助與派員</strong>：藥劑科在執行部（醫療照護組）中擔任醫療輔助人力，必須派員主動提供急診醫療人員所需藥物，負責接獲請求之藥品時迅速送至現場。</p>\n</li>\n<li>\n<p><strong>待命支援與接應</strong>：將突破交通障礙抵達院區的藥劑科人員集中配置，由待命區管理者或任務支援主管統籌配送支援人力與藥品資源，隨時準備支援最危急的醫療區域。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端戰爭威脅，必須將核心醫療與維生物資全數轉移至安全的地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>藥劑科</strong>隸屬於後勤部門的<strong>「任務支援組（L2）」</strong>與演習編組中的<strong>「後勤物資與維生組」</strong>。作為微型戰地醫院的「彈藥庫」，藥劑科的具體因應作為如下：</p>\n<p><strong>一、 空間轉置與進駐開設「B1 戰時藥庫」</strong></p>\n<ol>\n<li>\n<p><strong>極速轉移與進駐</strong>：依據院方逃生圖與備援醫療空間規劃，藥劑科人員必須迅速將高脆弱區域的重要藥品轉移至地下室，確實於<strong>「馬太大樓\n    B1 藥庫」</strong>進駐就位。</p>\n</li>\n<li>\n<p><strong>建立地下調度中樞</strong>：將馬太 B1\n    藥庫轉作為地下微型戰地醫院的藥品補給、緊急用藥調度與配送支援的絕對核心位置。</p>\n</li>\n</ol>\n<p><strong>二、 戰備藥品極限管控與 72 小時量能維持</strong></p>\n<ol>\n<li>\n<p><strong>管制戰略藥品</strong>：藥劑科需極限盤點並嚴格管制抗生素、止痛麻醉藥（如\n    Ketamine\n    等強效麻醉鎮痛藥劑）、破傷風疫苗及大量林格氏液等戰略救命藥品。</p>\n</li>\n<li>\n<p><strong>消耗精算與支援請求</strong>：精算戰時高壓環境下藥品的 72\n    小時消耗速率；若因空襲導致外部常規物流受阻、配送延遲而產生缺口，須立即向後勤部長回報，並請求衛生局（EOC）或聯防醫院進行緊急調度支援。</p>\n</li>\n</ol>\n<p><strong>三、 啟動「推拉式物流」與主動「盲派（Push）」前線</strong></p>\n<ol>\n<li>\n<p><strong>顛覆常規給藥流程</strong>：在戰時封鎖下，平時被動等待領藥單的「及時供貨（JIT）」模式將完全失效。</p>\n</li>\n<li>\n<p><strong>主動火力支援</strong>：藥庫人員須化被動為主動，不等待前線醫師的表單申請（Pull），直接將預先打包好的戰傷急救藥品裝上推車，進行<strong>「盲派（Push）」</strong>，將藥物直接推送至約翰/馬可\n    B1 的臨時 ICU、韓偉 B1\n    的臨時開刀房及檢傷區等紅區，確保前線搶救的「子彈」絕對不斷鏈。</p>\n</li>\n</ol>\n<p><strong>四、 斷網斷電下的「紙本降級（Downtime）」給藥作業</strong>\n若空襲伴隨敵方網路攻擊或震波摧毀機房，導致 HIS\n醫療資訊系統癱瘓，藥劑科將面臨無法從電腦接收處方的危機：</p>\n<ol>\n<li>\n<p><strong>切換紙本作業</strong>：配合全院宣告進入「紙本降級模式（Downtime）」，藥局須全面停止依賴電腦，改為接收前線開立的<strong>「手寫處方箋」</strong>進行給藥。</p>\n</li>\n<li>\n<p><strong>配合傳令兵（Runner）機制</strong>：在對講機或電話不通的極端狀態下，配合行政單位啟動的「傳令兵」徒步人工遞送機制，精準接收醫囑與派發藥物，維持核心藥事服務不中斷。</p>\n</li>\n</ol>\n<p><strong>五、 啟動大量傷患之「藥師緊急召回」與戰力輪替</strong></p>\n<ol>\n<li>\n<p><strong>緊急人力召回</strong>：面對大量戰傷病患湧入，藥劑科主任與組長須依據大量傷患緊急醫療救護應變計畫，視傷患規模啟動第一波至第三波的藥師人力緊急召回（含休假藥師回院支援），以補充地下醫院的供藥戰力。</p>\n</li>\n<li>\n<p><strong>心理與生理防護</strong>：配合後勤與人事部門，安排藥師至指定之員工庇護所進行強制輪替與休息，防範高壓環境下產生戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨極端的戰災大量傷患（MCI）考驗。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>藥劑科</strong>隸屬於後勤部門的<strong>「任務支援組（L2）」</strong>，同時也是演習編組中<strong>「後勤物資與維生組」</strong>的核心單位。作為維持醫療戰鬥力與戰傷搶救的「彈藥庫」，藥劑科的具體因應作為如下：</p>\n<p><strong>一、 啟動大量傷患機制與「藥師緊急召回」</strong></p>\n<ol>\n<li>\n<p><strong>緊急人力動員</strong>：當急診發布「急診\n    333」大量傷患代號時，藥劑科須依據「藥劑科緊急召回辦法」進行人力調度。</p>\n</li>\n<li>\n<p><strong>極限戰力補充</strong>：若急診或前線需求超出負荷，藥劑科主任須啟動最高級別的人力召集，<strong>召回「全部藥師人力（包含休假藥師）」回院支援</strong>，確保在暴增的處方需求下，供藥戰力得以維持。</p>\n</li>\n</ol>\n<p><strong>二、 顛覆常規，啟動「推拉式物流」與主動「盲派（Push）」</strong>\n在戰傷洪流湧入、急診與開刀房極度混亂的狀態下，平時「被動等待填單申請、及時供貨（JIT）」的常規給藥模式將完全失效。</p>\n<ol>\n<li>\n<p><strong>主動火力支援</strong>：藥劑科人員必須化被動為主動，派員<strong>主動提供急診醫療人員所需的救命藥物</strong>，並在接獲請求時迅速將藥品親送至搶救現場。</p>\n</li>\n<li>\n<p><strong>戰備急救箱盲派前線</strong>：藥庫人員須將預先打包好的標準化<strong>「戰傷急救箱（Trauma\n    Kits）」</strong>裝上推車，內含廣效抗生素、破傷風疫苗、Ketamine\n    等強效麻醉鎮痛藥劑及大量林格氏液等戰備藥品。<strong>不等待前線醫師的表單申請（Pull），直接進行「盲派（Push）」，將物資推至急診紅區與臨時開刀房門口</strong>，確保前線搶救團隊伸手就能拿到藥品，救命子彈絕對不斷鏈。</p>\n</li>\n</ol>\n<p><strong>三、 執行戰略藥品極限管控</strong>\n面對瞬間暴增的手術與急救需求，藥劑科必須嚴格盤點並<strong>管制抗生素、止痛麻醉藥、破傷風疫苗等戰略藥品</strong>的消耗速率，避免寶貴的救命藥品在初期就被耗盡，確保後續戰傷病患的醫療底線。</p>\n<p><strong>四、 斷網狀態下的「紙本降級（Downtime）」給藥作業</strong>\n若戰火震波或駭客攻擊導致 HIS\n醫療資訊系統與網路癱瘓，藥劑科將面臨無法從電腦接收處方的極端危機：</p>\n<ol>\n<li>\n<p><strong>切換紙本作業</strong>：配合全院宣告進入「紙本降級模式（Downtime）」，藥局須全面停止依賴電腦系統，啟用當機緊急箱，<strong>改為接收前線開立的「手寫處方箋」進行給藥</strong>。</p>\n</li>\n<li>\n<p><strong>配合傳令兵（Runner）機制</strong>：在通訊中斷的狀態下，配合行政單位啟動的「傳令兵」人工徒步遞送機制，精準接收從急診或\n    B1\n    臨時開刀房送來的緊急開刀醫囑與藥單，維持混亂中的核心藥事服務不中斷。</p>\n</li>\n</ol>"}]}, {"role": "血庫", "entries": [{"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，在大量戰傷病患湧入的極端考驗下，血庫面臨血液資源瞬間耗竭的危機。在\nHICS（醫院事故指揮系統）架構下，血庫作為「醫療應變與傷患搶救組」的核心單位，其具體因應作為如下：</p>\n<p><strong>一、 啟動極限用血調控與庫存盤點</strong></p>\n<ol>\n<li>\n<p><strong>精算與通報</strong>：立即向指揮官回報血庫現有的血液總量及各血型存量。</p>\n</li>\n<li>\n<p><strong>嚴格節流與暫停常規手術</strong>：啟動大型災難用血調控機制，配合全院停止非緊急手術，並降低慢性貧血的輸血閾值（建議\n    Hb \\&lt; 6.5），將寶貴血液資源全數保留給戰傷搶救。</p>\n</li>\n<li>\n<p><strong>血品降級與 O\n    型血/全血優先</strong>：在戰時資源受限、控制不佳的高壓環境中，應調整平時精細的輸血習慣，改為<strong>僅使用\n    O 型血或「全血（Whole\n    Blood）」</strong>進行大量傷患搶救。在未知血型初期先使用 O\n    型血，並盡快取得病患血型以改用同血型血品。</p>\n</li>\n</ol>\n<p><strong>二、 外部緊急調度與聯防求援</strong>\n面對手術與急救暴增的用血需求，血庫需立即向外部捐血中心請求血液運補。若因戰火或交通阻斷導致外部物流無法運送（例如高雄捐血中心無法支援），則需透過聯絡官協調，啟動與南部軍醫院等區域聯防醫院的緊急血液橫向調度。</p>\n<p><strong>三、 啟動「走動式血庫（Walking Blood Bank）」與院內活體抽血</strong> 當庫存的\nO\n型血與血小板瞬間見底，且面臨外部斷援的絕境時，血庫必須立即轉換為戰地自給自足模式：</p>\n<ol>\n<li>\n<p><strong>緊急召集活體血庫</strong>：立即啟動北約軍醫常用的<strong>「走動式血庫（Walking\n    Blood\n    Bank）」</strong>計畫。依據平時預先檢驗並建檔的「院內員工/志工血型與傳染病篩檢名冊」，透過廣播或大聲公緊急召集符合條件（特別是\n    O 型血）的同仁至指定地點集合捐血。</p>\n</li>\n<li>\n<p><strong>開設臨時捐血站</strong>：由院方籌組的「捐血作業小組（4-6人）」於安全的地下室區域（建議溫度維持\n    20-24℃）迅速架設包含登記、問診體檢、採血作業及休息觀察區的臨時捐血站。</p>\n</li>\n</ol>\n<p><strong>四、 戰地極簡化採檢與「即抽即輸」肉搏戰</strong></p>\n<ol>\n<li>\n<p><strong>極簡化快篩</strong>：在戰火壓力下，跳過平時繁瑣的血液分離程序，<strong>僅採集新鮮的「全血」</strong>。現場進行極簡化的交叉試驗快篩（僅檢驗\n    ABO血型、Rh血型及 HIV、HCV、HBV 等必要項目），以爭取黃金搶救時間。</p>\n</li>\n<li>\n<p><strong>傳令兵（Runner）盲派速遞</strong>：剛抽取出尚有體溫的全血袋，交由行政人員或輕傷志工擔任的「傳令兵（Runner）」以百米衝刺速度直接送入開刀房或急診紅區，直接輸入瀕死傷患體內搶救生命。</p>\n</li>\n<li>\n<p><strong>全血保存控管</strong>：若採集的新鮮全血預計在 24\n    小時內無法使用，血庫人員須確保於採血後 4-6 小時內將其送入 1-6℃\n    的保存冰箱（具備不斷電系統）製成儲存全血。</p>\n</li>\n</ol>\n<p><strong>五、 資訊中斷下之「紙本降級（Downtime）」備援作業</strong>\n若空襲震波或駭客攻擊導致電子資訊系統（HIS/LIS）與網路癱瘓，血庫須全面切換為紙本降級模式，砸破當機緊急箱並啟用備援的「災時捐血血液檢驗單（手工檢驗單）」及手寫血袋標籤維持運作。並透過無線電或傳令兵以人工徒步方式，精準傳遞血液配對單與緊急醫囑。</p>"}]}, {"role": "檢驗科", "entries": [{"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊/大當機）」，此危機同時涵蓋了輿論恐慌與資訊系統癱瘓。</p>\n<p>檢驗科（含血庫）在\nHICS（醫院事故指揮系統）中隸屬於<strong>執行部（醫療照護組）</strong>之醫療輔助單位。面對電腦當機與混亂，檢驗科必須立即切換為「無網作業」模式，確保攸關性命的檢驗數據與血品供應不中斷。其具體因應作為如下：</p>\n<p><strong>一、 啟動「紙本降級（Downtime）」與人工檢驗通報機制</strong></p>\n<ol>\n<li>\n<p><strong>切換手工單據作業</strong>：當檢驗系統（LIS/HIS）出現延遲或失效時，檢驗科必須立即停止依賴電腦系統。醫師無法開立電腦檢查單時，全面改為接收「手工單」與「災時捐血血液檢驗單」進行檢驗作業。</p>\n</li>\n<li>\n<p><strong>人工跑單與危險值覆誦（Read-back）</strong>：檢驗科停止電腦傳輸報告，改以「人工跑單（傳令兵）」方式遞送，或透過對講機、電話向臨床口頭回報危險值（Panic\n    Value）。在口頭回報過程中，必須嚴格執行「Read-back（覆誦確認）」機制，確保在無網狀態下的醫療數據傳遞絕對正確。</p>\n</li>\n<li>\n<p><strong>系統復原後之資料回補</strong>：當機期間的手寫報告雖無法由電腦查閱，但檢驗科必須妥善留存所有檢驗單據。待事件過後資訊系統恢復，先由相關單位入帳，檢驗室再將檢驗報告人工補輸入電腦系統中，以維持病歷完整性。</p>\n</li>\n</ol>\n<p><strong>二、 啟動血庫應變與「走動式血庫（Walking Blood Bank）」</strong></p>\n<ol>\n<li>\n<p><strong>盤點並回報血品存量</strong>：檢驗科須立即清點血庫中現有之血液及各血型存量，並迅速向指揮官（或計畫部）報告。這些精確的存量數據也可提供給發言官，作為反制社群媒體流傳「本院缺藥/缺血」假訊息的客觀闢謠證據。若血庫缺血，需立即向捐血中心請求支援。</p>\n</li>\n<li>\n<p><strong>極限啟動活體血庫</strong>：若遭遇聯外交通中斷或全台缺血，無法獲得高雄捐血中心運補，且血庫庫存見底時，檢驗科須配合啟動北約軍醫常用的「走動式血庫（Walking\n    Blood Bank）」計畫。緊急召集院內名冊上符合條件的 O\n    型血員工與志工，跳過平時繁瑣的血液分離程序，現場抽取「全血（Whole\n    Blood）」並進行極簡化的交叉試驗快篩，交由傳令兵極速送往急診紅區或開刀房搶救瀕死傷患。</p>\n</li>\n</ol>\n<p><strong>三、 啟動「檢驗科緊急召回辦法」與支援急診前線</strong>\n系統當機將導致檢驗流程大幅變慢，若現場同時伴隨恐慌人潮或大量傷患，檢驗科必須迅速彌補人力缺口：</p>\n<ol>\n<li>\n<p><strong>評估與緊急召回</strong>：依據急診的傷患人數與發生時段啟動召回機制。例如：平日急診大量傷患人數大於\n    10 人，或星期六下午、星期日及大夜班人數大於 20\n    人時，檢驗科值班人員須立即通知主任。由主任進行人力調度，通知醫檢師回院支援。</p>\n</li>\n<li>\n<p><strong>派員前線抽血與主動回報</strong>：由檢驗科組長安排被召回的醫檢師，直接前往急診室協助護理人員進行抽血採檢作業，減輕急診前線的高壓負擔。檢體送至檢驗科後，必須主動、快速地將各項檢驗報告提供給急診醫療人員，確保搶救流程順暢。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨戰傷病患洪流，醫療輔助的診斷與輸血量能將面臨極限挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>檢驗科（含血庫）「醫療照護組（O1）」</strong>，並為演習編組中<strong>「醫療應變與傷患搶救組」</strong>的關鍵輔助單位。</p>\n<p>面對大量傷患與檢驗、輸血需求的暴增，檢驗科的具體因應作為如下：</p>\n<p><strong>一、 啟動「急診 333」大量傷患召回與前線抽血支援</strong> 接獲總機廣播「急診\n333」後，檢驗科必須立即打破常規排班，進行緊急人力召回與前線支援：</p>\n<ol>\n<li>\n<p><strong>依傷患規模啟動召回</strong>：</p>\n<ul>\n<li>\n<p><strong>平日</strong>：急診室評估大量傷患人數（以 10\n    人為界線），檢驗科值班人員通知主任，由主任進行人力調度與通知回院支援。</p>\n</li>\n<li>\n<p><strong>假日與大夜班</strong>：急診室評估大量傷患人數（以 20\n    人為界線），由主任進行人力調度與通知回院支援。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>前線抽血支援</strong>：由組長安排醫檢師直接前往急診室現場，協助急診護理人員進行戰傷病患的緊急採檢與抽血作業。</p>\n</li>\n</ol>\n<p><strong>二、 執行緊急檢驗與「主動式」報告發布</strong></p>\n<ol>\n<li>\n<p><strong>專責處理緊急檢驗</strong>：急診前線採集完成的檢體，須迅速送至 <strong>4F\n    檢驗科</strong>，並派專員全責處理各項緊急戰傷檢驗工作。</p>\n</li>\n<li>\n<p><strong>主動回報機制</strong>：在戰傷搶救的高壓環境下，檢驗科人員必須化被動為主動，快速且主動向急診前線醫療人員提供各項檢驗報告，以確保創傷團隊能迅速判斷傷情與後續處置。</p>\n</li>\n</ol>\n<p><strong>三、 血庫極限調控與啟動「走動式血庫（活體捐血）」</strong>\n面對大量戰傷手術與急救暴增的用血需求，檢驗科（血庫）須採取非常規的血液調度機制：</p>\n<ol>\n<li>\n<p><strong>庫存回報與外部求援</strong>：檢驗科負責立即向指揮官報告現有血庫血液總量及各血型存量；若血庫面臨缺血危機，需立即向外部捐血中心請求緊急運補支援。</p>\n</li>\n<li>\n<p><strong>啟動走動式血庫</strong>：若因戰火封鎖導致血液枯竭、外部運補中斷，檢驗科需配合啟動院內員工的<strong>「活體捐血（走動式血庫）」</strong>計畫。</p>\n</li>\n<li>\n<p><strong>戰地極簡化採檢</strong>：在動員實施階段的臨時捐血作業中，<strong>僅採集「全血」</strong>以供前線急救，並執行極簡化的快篩項目（僅檢驗\n    ABO 血型、Rh 血型，以及 HIV、HCV、HBV），以爭取黃金搶救時間。</p>\n</li>\n</ol>\n<p><strong>四、 資訊中斷下之「紙本降級（Downtime）」檢驗作業</strong>\n若戰火震波或駭客攻擊導致醫院檢驗資訊系統（LIS）與網路癱瘓，檢驗科將面臨無法從電腦接收醫囑或發布報告的極端危機：</p>\n<ol>\n<li>\n<p><strong>切換人工紙本作業</strong>：檢驗科須配合全院轉入紙本降級模式，全面改採手寫檢驗單與紙本報告維持運作。</p>\n</li>\n<li>\n<p><strong>危險值口頭回報與傳令速遞</strong>：檢驗科改以對講機或人工電話回報檢驗危險值（Panic\n    Value），並嚴格執行「Read-back（覆誦確認）」機制以防錯誤；同時配合行政單位的「傳令兵（Runner）」制度，以徒步衝刺方式在\n    4F 檢驗科與 B1 臨時開刀房、臨時 ICU\n    之間精準傳遞檢驗報告與血液配對單。</p>\n</li>\n</ol>"}]}, {"role": "放射科", "entries": [{"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊/大當機）」，此危機同時涵蓋了輿論恐慌與資訊系統癱瘓。</p>\n<p>放射科在\nHICS（醫院事故指揮系統）中隸屬於<strong>執行部（醫療照護組）</strong>之重要醫療輔助單位。面對影像系統（PACS）與醫療資訊系統（HIS）的癱瘓或嚴重延遲，放射科必須立即切換為「無網/離線作業」模式，確保攸關性命的緊急影像檢查不中斷。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 啟動「紙本降級（Downtime）」與離線影像傳遞機制</strong></p>\n<ol>\n<li>\n<p><strong>切換紙本手工單作業</strong>：當 HIS\n    系統出現延遲或失效，醫師無法開立電腦檢查單時，放射科必須立即停止依賴電腦系統，全面改為接收醫師手寫的「紙本手工單（當機緊急箱內表單）」來執行\n    X 光或電腦斷層等影像檢查。</p>\n</li>\n<li>\n<p><strong>實體影像與翻拍傳遞</strong>：在 PACS 系統當機、無法透過 WEB\n    傳輸數位影像供臨床醫師閱片時，放射科須回歸古老的作業模式，沖洗實體 X\n    光片交由傳令兵遞送；或者協調臨床醫師直接前往放射機房，以數位相機或拍立得直接翻拍螢幕，透過人工方式將影像帶回前線，克服斷網危機以爭取搶救時效。</p>\n</li>\n<li>\n<p><strong>系統復原後之資料回補</strong>：當機期間的所有紙本檢查單據必須妥善集中保管。待資安事件排除、資訊系統恢復正常運作後，放射科人員須事後補開單，並將離線作業期間的影像重新上傳至\n    WEB 與 PACS 系統中，確保病患電子病歷的完整性。</p>\n</li>\n</ol>\n<p><strong>二、 啟動「放射科緊急召回辦法」彌補作業延遲</strong>\n系統大當機將導致每位病患的報到、檢查與影像傳遞時間大幅拉長。若現場同時伴隨恐慌就醫人潮或大量傷患，放射科必須迅速啟動人力召回以應付急重症需求：</p>\n<ol>\n<li>\n<p><strong>平日時段應變</strong>：若遇突發狀況致當班人員無法負荷（如接獲急診 333\n    廣播），值班人員須立即通報放射科組長，由組長機動調派門診放射人力前往支援急診與重症影像檢查，直至全數檢查完成。</p>\n</li>\n<li>\n<p><strong>假日與夜間召回</strong>：若於非上班時間發生系統癱瘓與大量需求，值班人員須通報組長，由組長啟動緊急召回機制，調派人員回院支援。</p>\n</li>\n<li>\n<p><strong>支援病患推送</strong>：在資訊當機且全院人力吃緊的混亂狀態下，放射科人員須主動協助需接受\n    X 光檢查之病患的推送與搬運作業，減輕急診前線的勤務負擔。</p>\n</li>\n</ol>\n<p><strong>三、 配合醫療降載與提供真實數據（支援闢謠）</strong></p>\n<ol>\n<li>\n<p><strong>暫停常規排檢</strong>：面對系統延遲與假訊息引發的就醫亂象，放射科須配合醫務部（執行部長）的決策，暫停非急迫性的常規影像排檢與健檢業務，將寶貴的檢查設備與人員量能絕對集中於急重症與戰傷搶救。</p>\n</li>\n<li>\n<p><strong>數據對接闢謠</strong>：放射科主管須精確盤點本科設備（如 X\n    光機、CT、MRI）的實際運作狀況與量能，迅速回報給計畫部的「資源控管組（P1）」。這些真實的運作數據將提供給發言官（醫療副院長），作為對外發布新聞稿、反駁社群媒體流傳「本院停診或遭攻擊癱瘓」等假訊息的客觀證據。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨戰傷病患洪流，影像診斷需求將面臨極限挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>放射科</strong>隸屬於執行部門的<strong>「醫療照護組（O1）」</strong>作為關鍵的醫療輔助單位，同時放射科主任亦擔任<strong>「危害控制主管（O3）」</strong>之一。</p>\n<p>面對大量戰傷病患與暴增的影像需求，放射科的具體因應作為如下：</p>\n<p><strong>一、 響應「急診 333」大量傷患動員與緊急召回</strong> 當接獲總機廣播「急診\n333」大量傷患代號，或突發狀況值班人員無法負荷時，放射科必須立即啟動人力支援計畫：</p>\n<ol>\n<li>\n<p><strong>平日應變</strong>：經組長評估後調派人力，由放射科門診人員直接支援急診大量傷患的影像檢查，直至檢查完成，並回報組長及主任。</p>\n</li>\n<li>\n<p><strong>假日應變</strong>：經值班人員評估並通知組長，由組長緊急調派人力回院支援急診大量傷患，直至檢查完成，並落實「值班人員→組長→主任」的通報程序。</p>\n</li>\n</ol>\n<p><strong>二、 執行緊急影像檢查與「主動協助推送」</strong></p>\n<ol>\n<li>\n<p><strong>極速影像產出</strong>：負責執行緊急戰傷病患的 X 光或\n    CT（電腦斷層）檢查，並必須盡快將正確無誤的影像資料傳送至閱片系統，以利急診與創傷外科醫師迅速判斷傷情。</p>\n</li>\n<li>\n<p><strong>主動協助搬運</strong>：在急診前線人力極度吃緊的狀態下，放射科人員必須打破常規，主動協助需接受\n    X 光檢查的病患進行推床與推送作業。</p>\n</li>\n</ol>\n<p><strong>三、 斷網與資安攻擊下之「紙本降級（Downtime）」作業</strong>\n若戰火震波或敵方駭客攻擊導致 PACS（醫療影像儲傳系統）或 HIS\n系統癱瘓，放射科將面臨無法傳輸數位影像的極端危機：</p>\n<ol>\n<li>\n<p><strong>切換紙本手工單</strong>：若臨床醫師無法開立電腦檢查單，須全面改開立「手寫紙本檢查單」。</p>\n</li>\n<li>\n<p><strong>實體膠片與人工傳遞</strong>：在無法傳輸數位影像時，放射科須回歸古老的作業模式，改為沖洗實體\n    X\n    光片（膠片）；或由臨床醫師直接跑至放射科機房，以數位相機或拍立得翻拍螢幕上的影像來傳遞戰情。</p>\n</li>\n<li>\n<p><strong>災後回補</strong>：待事件過後或資訊系統恢復，放射科須事後補開單，並將影像重新上傳至\n    WEB 系統供後續病歷留存。</p>\n</li>\n</ol>\n<p><strong>四、 協助 HICS「危害控制組（O3）」與特殊輻傷處置</strong></p>\n<ol>\n<li>\n<p>放射科主任作為危害控制主管（O3），須協助統籌危害物質的偵檢、監控、洩漏處理與病人除污作業。</p>\n</li>\n<li>\n<p>若戰傷病患伴隨核生化或輻射污染，且病患須離開除污室至放射科執行電腦斷層（CT）檢查時，放射科人員必須嚴格依據本院「輻射污染病人送\n    CT 檢查作業流程」進行防護與管制，確保院內核心影像設備不被輻射污染。</p>\n</li>\n</ol>"}]}, {"role": "感控室", "entries": [{"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，在戰時空間降階與大量傷病患湧入的高壓環境下，<strong>感控室（感染管制組）</strong>肩負防範地下避難空間爆發群聚感染及危害物質除污的重大責任。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，感控科/感管組主任擔任執行部門的<strong>「危害控制主管（O3）」</strong>，並主導演習編組中的<strong>「危害控制組」</strong>。面對防空疏散與\nB1 備援空間的緊急開設，感控室的具體因應作為如下：</p>\n<p><strong>一、 擔任 HICS「危害控制組（O3）」：執行危害偵檢與除污</strong></p>\n<ol>\n<li>\n<p><strong>危害偵檢與監控</strong>：若空襲震波導致院內實驗室、危險化學品庫房破損外洩，或遭遇敵方化學/生物武器等特殊攻擊，感控室須會同相關科室負責危害物質的偵檢與監控。</p>\n</li>\n<li>\n<p><strong>執行除污作業（Decontamination）</strong>：負責指揮或督導遭受化武或輻射污染的戰傷病患進行除污，並針對遭受污染的地下室設施與醫療設備進行除污及洩漏處理，防範有害物質在\n    B1 密閉備援空間內擴散。</p>\n</li>\n</ol>\n<p><strong>二、 B1 地下備援空間之感染管制（Infection Control）</strong></p>\n<ol>\n<li>\n<p><strong>防範地下空間群聚感染</strong>：B1 備援空間（尤其是路加 B1\n    的輕症病房或各避難集結區）人潮擁擠且通風條件受限，極易引發傳染病群聚感染。感控室必須嚴格督導地下室各醫療功能區的感染管制措施，確保手部衛生與咳嗽禮節的落實。</p>\n</li>\n<li>\n<p><strong>指導防護裝備（PPE）使用</strong>：協助醫療照護組（O1），依據地下室現場狀況與傷患類型，指導前線醫護人員正確穿戴及準備適當等級的個人防護裝備（PPE），以保護醫療團隊的安全。</p>\n</li>\n</ol>\n<p><strong>三、 大量傷患之分流與傳染病患隔離評估</strong></p>\n<ol>\n<li>\n<p><strong>傳染風險辨識</strong>：在 B1「檢傷行政區」（約翰/馬可\n    B1）面對大量湧入的傷病患時，感控室須協助急診團隊快速辨識、篩檢出可能帶有高傳染性疾病的個案。</p>\n</li>\n<li>\n<p><strong>規劃隔離動線</strong>：確保疑似傳染病患與一般戰傷/外傷病患的收治動線嚴格分離。若有傳染病患需收治住院，須依感控動線將其轉送至指定的專責隔離區（如\n    6A 負壓隔離病房），避免與 B1 其他傷患發生交叉感染。</p>\n</li>\n</ol>\n<p><strong>四、 督導環境清消與醫療廢棄物處理</strong> 在 B1 臨時開刀房與臨時 ICU\n等重症紅區運作期間，將瞬間產生大量沾血的急救衛材與醫療廢棄物。感控室須督導環保室與外包清潔人員，確實執行地下醫療區的環境清潔與消毒，並妥善規劃生物醫療廢棄物的密閉收集與清運流程，確保微型戰地醫院的衛生底線。</p>"}]}, {"role": "社工室", "entries": [{"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述的複合性危機（假訊息、恐慌人潮湧入急診、搶購藥品、交通事故大量傷患及家屬急迫需求），社工室在\nHICS（醫院事故指揮系統）中扮演<strong>「心理與家屬支援分支（隸屬執行部）」</strong>及<strong>「危機溝通與關懷」</strong>的關鍵角色。</p>\n<p>面對急診前線的混亂與高壓，社工室的具體因應作為如下：</p>\n<p><strong>一、 設立家屬接待區：執行尋人、詢答與情緒安撫</strong></p>\n<ol>\n<li>\n<p><strong>空間隔離與安置</strong>：面對湧入急診要求查詢撤離資訊或尋找交通事故傷患的家屬，社工人員需迅速將家屬引導至專屬的「家屬接待區（如轉診中心）」，將其有效隔離於急診搶救區之外，避免干擾前線醫療動線。</p>\n</li>\n<li>\n<p><strong>傷亡確認與尋人協尋</strong>：主動利用時機確認無名傷患的身分、年齡、住址與親友電話，協助家屬確認傷亡名單與病人動向。</p>\n</li>\n<li>\n<p><strong>情緒安撫與物品保管</strong>：針對極度恐慌的家屬與病患給予心理情緒支持與悲傷輔導；同時負責傷患遺留物品的登記與保管（確定未受污染物品另置塑膠袋並貼上姓名），以安定家屬的心。</p>\n</li>\n</ol>\n<p><strong>二、 支援極限醫療降載與病患疏散轉銜</strong></p>\n<ol>\n<li>\n<p><strong>啟動極速出院與轉送</strong>：為騰出急診與急重症病床給交通事故重傷患，社工室須配合啟動車輛調度，協助原本預計出院的輕症病患或穩定病患於4小時內完成結帳與安全疏散返家。</p>\n</li>\n<li>\n<p><strong>代辦行政手續</strong>：主動協助大量傷患辦理離院返家、緊急下轉或轉送其他醫療機構的相關行政手續，減輕急診護理人員的行政負擔。</p>\n</li>\n</ol>\n<p><strong>三、 防範醫療暴力與處理醫療爭議</strong></p>\n<ol>\n<li>\n<p><strong>處理非理性訴求</strong>：面對家屬因輕症被拒絕住院（反向檢傷）或無法提早領取慢性病藥品而產生的極端抱怨，社工室須立即啟動溝通與關懷機制，向家屬說明戰備時期的檢傷與收治原則。</p>\n</li>\n<li>\n<p><strong>防暴通報對接</strong>：若家屬情緒失控升級為言語或肢體暴力，社工人員須確保自身安全，並立即透過通報系統（如按*9）聯繫警衛與保安組啟動防暴應變，由警方介入維持秩序。</p>\n</li>\n</ol>\n<p><strong>四、 資訊彙整與通訊支援</strong></p>\n<ol>\n<li>\n<p><strong>支援總機詢答</strong>：指派專人前往中控室協助總機接聽並回覆電話，因應大量湧入查詢災情與親友下落的外部來電。</p>\n</li>\n<li>\n<p><strong>對接計畫部名冊</strong>：協助統計並彙整傷病患名單，迅速交給計畫部的「文件紀錄小組長」與急診護理師組長，確保全院傷患動向資訊正確一致。</p>\n</li>\n</ol>\n<p><strong>五、 啟動「心理韌性特遣隊」保護前線醫護</strong>\n面對殘酷的大量傷亡與家屬壓力，急診醫護極易產生戰鬥疲勞與創傷後壓力症候群（PTSD）。社工師將與精神科醫師、臨床心理師及院牧部傳道共同組成<strong>「心理韌性特遣隊」</strong>。他們會全天候進駐「員工專屬庇護站」，針對剛結束高壓搶救任務的醫護團隊進行<strong>「心理急救（PFA）」</strong>與<strong>「即時熱除頻（Hot\nDebriefing）」</strong>，提供傾聽與情緒引流，預防第一線醫療人員發生急性壓力崩潰，確保醫療戰力得以延續。</p>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨戰傷病患的洪流，不僅醫療體系面臨極限，病患家屬的恐慌以及醫護人員的心理壓力也將達到頂點。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>社工室</strong>（協同院牧部）主要隸屬於執行部門的<strong>「醫療照護組（O1）」</strong>與<strong>「心理與家屬支援分支」</strong>，同時亦支援行政/財務部的<strong>「人事組（F1）」</strong>。其具體因應作為如下：</p>\n<p><strong>一、 設立「家屬接待區」與家屬安撫</strong></p>\n<ol>\n<li>\n<p><strong>空間隔離與接待</strong>：在急診搶救區外設立獨立的「家屬接待/安撫區」，嚴格隔離於血腥的急救前線之外，負責安撫焦急家屬的情緒。</p>\n</li>\n<li>\n<p><strong>尋人與資訊溝通</strong>：主動協助確認傷亡名單與病患動向，向家屬說明醫療處置現況，並提供必要的服務性物資（如飲水）與情緒支持，防堵混亂與恐慌蔓延。</p>\n</li>\n</ol>\n<p><strong>二、 傷患資料確認、名單彙整與物品保管</strong></p>\n<ol>\n<li>\n<p><strong>身分資料建立</strong>：在不妨礙前線醫療治療的情況下，主動利用時機確認湧入病患的身分、年齡、住址及親友電話等各項資料是否登記完整，補足建檔資訊。</p>\n</li>\n<li>\n<p><strong>名單與動向彙整</strong>：協助統計並彙整傷病患名單，交接給「計畫部-文件紀錄小組長」與護理師組長，確保災變中傷患去向明確可靠。</p>\n</li>\n<li>\n<p><strong>物品登記保管</strong>：負責傷患隨身財務與物品的登記及妥善保管。</p>\n</li>\n</ol>\n<p><strong>三、 協助極限醫療降載與轉院/出院手續代辦</strong></p>\n<ol>\n<li>\n<p><strong>轉銜與後送辦理</strong>：配合全院實施的「反向檢傷」與醫療降載，協助可提早出院或需轉院的病患辦理離院返家、下轉至基層長照機構或轉送其他醫院的相關手續。</p>\n</li>\n<li>\n<p><strong>代辦各項行政手續</strong>：在混亂的急診現場主動替病患與家屬代辦各種醫療與住院相關行政手續。</p>\n</li>\n</ol>\n<p><strong>四、 執行醫護「心理急救（PFA）」與戰力防護</strong></p>\n<ol>\n<li>\n<p><strong>成立心理韌性特遣隊</strong>：社工師需與精神科醫師、臨床心理師及院牧部傳道共同組成「心理韌性特遣隊（Psychological\n    Resilience Task Force）」，全天候進駐地下室的員工專屬庇護站。</p>\n</li>\n<li>\n<p><strong>即時熱除頻（Hot\n    Debriefing）</strong>：針對剛經歷高壓戰傷搶救、目睹慘烈傷亡，或因執行殘酷檢傷分類而面臨巨大道德撕裂的醫護人員，強制進行「心理除頻」與「心理急救（PFA）」。引導情緒宣洩，預防醫護團隊爆發創傷後壓力症候群（PTSD）與戰鬥疲勞，確保醫療戰鬥力的長期續航。</p>\n</li>\n</ol>\n<p><strong>五、 外部救災團體接待與志願人力調度</strong></p>\n<ol>\n<li>\n<p><strong>救災團體對接</strong>：由社工室主任協助外部救災團體、社會資源的接待與溝通協調事宜。</p>\n</li>\n<li>\n<p><strong>志工與人力集結</strong>：配合行政/財務部「人事組（F1）」，協調招募、集合院內外志工與支援人力至指定的人力待命點，交由待命區管理者統一派發至前線。</p>\n</li>\n<li>\n<p><strong>支援總機通訊</strong>：在大量傷患引發的外部詢問電話暴增時，派員前往協助總機回覆電話，減輕通訊癱瘓壓力。</p>\n</li>\n</ol>\n<p><strong>六、 極端狀態下的維生支援（捏球大隊）</strong>\n若遭遇戰火波及導致全院斷電且備用氧氣鋼瓶耗盡、電動呼吸器全面停擺的孤島絕境，社工人員也必須投入第一線肉搏戰，編入由非醫療人員組成的「捏球大隊」，以手動甦醒球（Ambu\nbag）接力捏球，以純人力維持重症病患的呼吸與生命徵象。</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨極速的醫療降載、大量病患轉院及家屬恐慌等挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>社工室</strong>主要編制於執行部門的<strong>「醫療照護組（O1）」</strong>（負責心理與家屬支援分支），同時也支援行政/財務部門的<strong>「人事組（F1）」</strong>。社工室是維繫病患安置、家屬溝通以及醫護心理防線的關鍵樞紐。</p>\n<p>面對此撤離與分流指令，社工室的具體因應作為如下：</p>\n<p><strong>一、 協助極速出院、轉院與機構安置（配合醫療降載）</strong></p>\n<ol>\n<li>\n<p><strong>極速結帳與疏散協助</strong>：配合「反向檢傷」分類，針對預計出院的輕症病患或穩定待觀察病患，啟動社工室與行政車輛調度，協助病患於\n    4 小時內完成離院手續並安全疏散返家。</p>\n</li>\n<li>\n<p><strong>跨機構轉銜與安置</strong>：協助辦理傷患離院返家或轉送其他醫療機構的手續。對於無家屬照顧、或需轉銜至基層診所與長照機構安置的弱勢病患，社工人員須協調外部專業醫療與社福組織，妥善安排轉院安置計畫。</p>\n</li>\n<li>\n<p><strong>代辦各項手續與物資保管</strong>：在混亂的撤離中，協助病患代辦各種行政手續，並負責傷患個人物品的登記與保管，隨同病患轉移。</p>\n</li>\n</ol>\n<p><strong>二、 設立家屬接待區與執行「家屬聯繫與動向追蹤」</strong>\n大規模撤離最容易引發家屬找不到病患的恐慌，社工室必須擔起溝通橋樑：</p>\n<ol>\n<li>\n<p><strong>設立家屬接待區/安撫區</strong>：將家屬接待區隔離於急診搶救區與撤離動線之外，引導並集中安撫家屬。</p>\n</li>\n<li>\n<p><strong>病患動向查詢與通知</strong>：主動利用時機確認轉運病人的身分、年齡、住址、親友電話等資料是否登記完整。掌握病患的疏散名單與重置去向（轉送至哪家醫院或機構）後，主動進行家屬的聯繫、詢答與通知，確保動向資訊正確傳達給家屬。</p>\n</li>\n<li>\n<p><strong>外部救災團體與媒體溝通</strong>：協助接待外部救災團體與協調事宜；若有媒體採訪，社工室須協助維護病人隱私，並徵詢病人或家屬的受訪意願。</p>\n</li>\n</ol>\n<p><strong>三、 執行病患、家屬與員工的「心理急救（PFA）」</strong></p>\n<ol>\n<li>\n<p><strong>病患與家屬情緒支持</strong>：對於因突發撤離而產生焦慮的病人及家屬，提供情緒支持、安撫與心理輔導。</p>\n</li>\n<li>\n<p><strong>成立「心理韌性特遣隊」護衛醫護人員</strong>：戰時或災難下面對「反向檢傷（決定誰先撤離、誰留下）」會對醫護人員造成巨大的道德撕裂與心理創傷。社工師須與精神科醫師、臨床心理師及院牧部牧師組成「心理韌性特遣隊」，進駐員工安全庇護站。</p>\n</li>\n<li>\n<p><strong>實施任務後心理除頻（Debriefing）</strong>：針對剛結束高壓搶救或撤離任務的醫護團隊，提供傾聽與專業的心理急救（PFA），預防醫護人員發生急性壓力崩潰，確保醫療團隊的戰鬥力得以延續。</p>\n</li>\n</ol>\n<p><strong>四、 支援人力招募與極端狀況支援</strong></p>\n<ol>\n<li>\n<p><strong>志工與人力調度</strong>：作為「人事組（F1）」的協辦單位，社工室須協助協調、招募員工及志工至人力集合點，交由待命區管理者派發，以支援龐大的病患搬運與撤離需求。</p>\n</li>\n<li>\n<p><strong>投入極限維生支援（捏球大隊）</strong>：若在撤離等待過程中遭遇極限斷電、備用氧氣耗盡的孤島狀態，社工人員也必須接受動員，與行政人員、保全組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持重症病患的呼吸。</p>\n</li>\n</ol>\n<p>醫療照護組如何配合撤離？</p>\n<p>後勤部門在撤離時如何支援？</p>\n<p>病人分級後由哪個部門執行轉院？</p>"}]}]}, {"id": "logistics_admin", "name": "後勤與行政支援", "roles": [{"role": "總務部", "entries": [{"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」之複合性危機，總務部在\nHICS（醫院事故指揮系統）架構下主要接掌「後勤部（Logistics\nSection）」指揮權，負責全院空間轉換、物資調度與勤務支援，以確保急診前線搶救順暢。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 啟動大面積戰術空間轉換（因應大量傷患與恐慌人潮）</strong>\n面對交通事故與恐慌人潮瞬間癱瘓急診，總務部必須迅速執行空間重構：</p>\n<ol>\n<li>\n<p><strong>大廳瞬間轉換</strong>：總務部須於接獲大量傷患通報的30分鐘內，清空一樓門診大廳的所有候診椅、裝飾物與宣傳立牌。依據地面預先貼好的紅（重傷）、黃（中傷）、綠（輕傷）、黑（死亡/無救）四色動線，將大廳轉換為「大量傷患一線檢傷區」與「輕傷縫合包紮區」，有效將佔比極高的恐慌輕傷患阻絕於真正急診重症區外。</p>\n</li>\n<li>\n<p><strong>地下室空間淨空與設立臨時專區</strong>：強制淨空地下停車場車輛，將其劃定為「戰略物資地下補給站」。同時，於動線絕對獨立的角落設立「臨時太平間（Morgue）」，確保生者（家屬、輕症）與死者動線嚴格物理分離，避免加劇民眾與醫護的心理恐慌。</p>\n</li>\n</ol>\n<p><strong>二、 統籌後勤指揮與物資/衛材調度</strong></p>\n<ol>\n<li>\n<p><strong>接掌後勤指揮權</strong>：總務部部長將擔任 HICS\n    的「後勤部長（L0）」，負責統籌物資、器材、人力、交通及膳食等調度。</p>\n</li>\n<li>\n<p><strong>統籌救援物資與衛材供應</strong>：總務部須統籌運用獲得之救援物資，並嚴密規劃需求的優先順序。現場急需之衛材部分，由總務部衛材管理人員及供應室人員負責準備並提供給前線。</p>\n</li>\n<li>\n<p><strong>緊急設備補充</strong>：針對急診室搶救需求，迅速集中與補充擔架、推床等設備；若急診本身配備不足，總務人員須協助從內、外科病房緊急調用以應付大量傷患。</p>\n</li>\n</ol>\n<p><strong>三、 支援病患搬運與人力調派</strong></p>\n<ol>\n<li><strong>協助傷患搬運</strong>：在大量傷患應變機制啟動時，總務部須調派所屬人員前往急診現場，負責協助醫護人員進行病患的搬運工作，以加速急診前線的處理與空間騰出。</li>\n</ol>\n<p><strong>四、 協助戶外分流站與家屬安置區之硬體開設</strong>\n配合執行部（醫療照護組）與社工室的決策，總務部須調度物資與人力，協助搭設與搬運硬體設備（如帳篷、桌椅），以支援開設「戶外慢性病處方籤領藥區」與專屬的「家屬接待區」。透過空間硬體的支援，將單純要求提早領藥與查詢撤離資訊的家屬及恐慌民眾，實體隔離於急診搶救動線之外。</p>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，醫院正面臨物資極度匱乏與交通受阻的「孤島效應」。在\nHICS（醫院事故指揮系統）架構下，<strong>總務部</strong>扮演著維繫全院實體資源命脈的關鍵角色。總務部部長將擔任<strong>「後勤部長（L0）」</strong>，負責統籌緊急應變所需之物資、器材、人力及運輸調度。</p>\n<p>總務部及其轄下單位的具體因應作為如下：</p>\n<p><strong>一、 接掌後勤指揮，統籌物資與精算優先順序</strong></p>\n<ol>\n<li>\n<p><strong>確立物資分配優先序</strong>：面對各項維生物資配送延遲，總務部須立即會同轄下採購、資材及營養等單位，精算藥材、膳食、飲水與耗材的消耗速率與現存缺口。總務部須統籌運用獲得之救援物資，並嚴密規劃需求的優先順序，將有限資源絕對集中於重症搶救與維持核心醫療運作。</p>\n</li>\n<li>\n<p><strong>簽證物資接收與保管</strong>：負責接收與保管任何突破交通阻礙運達的簽證物資、備品與救援資源，並快速調配至急需的單位。</p>\n</li>\n</ol>\n<p><strong>二、 啟動戰略物資「盲派（Push）」物流</strong></p>\n<ol>\n<li>\n<p><strong>顛覆常規領用</strong>：在聯外交通阻斷的極端狀況下，總務部轄下的資材組與藥劑科必須採取「推拉式物流（Push-Pull\n    Logistics）」機制，打破平時「有申請才領用」的常規。</p>\n</li>\n<li>\n<p><strong>主動推進救命物資</strong>：資材人員須將預先打包好的「戰傷急救箱」或衛材，不待前線發出需求，主動「盲派（Push）」推至急診紅區與開刀房門口，確保前線醫護伸手就能拿到救命物資，並嚴格管制現有庫存。</p>\n</li>\n</ol>\n<p><strong>三、 支援病患搬運與殘存人力調度</strong></p>\n<ol>\n<li>\n<p><strong>協助傷患搬運</strong>：面對員工到勤受交通影響而出現嚴重人力缺口，總務部必須調派所屬人員前往急診現場或病房，負責協助醫護人員進行病患的搬運與輸送工作。</p>\n</li>\n<li>\n<p><strong>待命人力與支援調度</strong>：總務部須評估執行部門所需資源，將突破交通障礙抵達的員工或志工集中至待命區，依據前線需求，精準調度與配送支援人力。</p>\n</li>\n</ol>\n<p><strong>四、 維持人員飲水、膳食供應</strong></p>\n<ol>\n<li>\n<p><strong>啟動膳食災難應變</strong>：因應飲水與膳食配送延遲，總務部須協調醫勤室與營養室確保工作人員的飲食及飲水供應。</p>\n</li>\n<li>\n<p><strong>替代供糧方案</strong>：若遇停水，須動用備用礦泉水或山泉水以解決膳食製備與飲用需求；若遇緊急斷糧危機，則第一優先協調本院便利商店（7-11）或在地替代廠商支援膳食供糧，維持留守員工的體力。</p>\n</li>\n</ol>\n<p><strong>五、 運輸工具之極限調度</strong></p>\n<ol>\n<li><strong>院內外交通運輸調度</strong>：針對病人轉送不確定性提高，總務部（運輸組）須評估並調度醫院現有之運輸工具（如中巴及救護車），隨時做好準備。一旦交通稍有恢復，或有國軍/外部車輛支援抵達，即可立即進行傷患的安全後送與轉銜。</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透偵蒐、資源搶奪與群眾失控的複合型安全危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>總務部</strong>是全院實體資源守護與後勤調度的樞紐。總務部部長擔任<strong>「後勤部長（L0）」</strong>，負責管理並參與應變行動計畫中所有維持醫療服務與事件所需支援的相關設備、物資、器材及人力之調度。</p>\n<p>總務部的具體因應作為如下：</p>\n<p><strong>一、 統籌物資保衛與設立地下補給站</strong>\n面對社區避難人潮湧入並尋求物資，總務部必須採取強勢的物資保衛行動，防範平時的庫存區成為搶奪目標。</p>\n<ol>\n<li>\n<p><strong>拒絕非醫療發放與嚴格管制</strong>：貫徹指揮中心決策，嚴格管制院內現存的飲水、食物與醫療備品，防範資源被非醫療需求耗竭，將物資供應絕對保留給核心醫療搶救使用。</p>\n</li>\n<li>\n<p><strong>物資地下化與集中看管</strong>：會同轄下資材單位，將重要物資移轉至安全區域。配合空間轉換，將地下停車場車輛強制淨空（必要時動用拖車），劃定為「戰略物資地下補給站」，以利隱密補給並防範暴民搶奪。</p>\n</li>\n</ol>\n<p><strong>二、 支援「硬邊界」防護與實體阻絕</strong>\n針對不明人車與推擠群眾，醫院必須配合警力實施物理封鎖（Lockdown）與出入管制。</p>\n<ol>\n<li>\n<p><strong>提供實體阻絕載具</strong>：總務部須調度院方現有之工程車或大型車輛，協助保安組橫停於非必要之出入口，作為防衝撞的實體阻絕物，加固「硬邊界」防線。</p>\n</li>\n<li>\n<p><strong>救護與卸補動線確保</strong>：在出入口大幅縮減與群眾包圍下，統籌交通與運輸工具調度，協助確保單一檢傷通道、救護車轉送與關鍵物資卸補車道的絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 嚴密的人力資源辨識與防滲透</strong></p>\n<ol>\n<li>\n<p><strong>防護第五縱隊（在地協力者）滲透</strong>：針對無人機偵蒐與不明人車（可能為敵方特工破壞前兆），總務部必須嚴格執行「人力資源召募與辨識」。對於任何被召回的員工、支援人力或志工，實施極其嚴格的身分核對並配發專屬識別，杜絕有心人士偽裝混入關鍵設施（如發電機房、伺服器機房）進行破壞。</p>\n</li>\n<li>\n<p><strong>待命區資源管理</strong>：妥善統籌待命區的人力與物資，並依據前線防護或急救需求，精準且安全地進行人力調度與配送。</p>\n</li>\n</ol>\n<p><strong>四、 維持前線員工之維生與身心照顧</strong></p>\n<ol>\n<li>\n<p><strong>飲水與膳食供應</strong>：在醫院實施內部封鎖與最高警戒狀態下，外送物流將完全中斷。總務部須統籌工作人員的飲水、食物供應，確保人員健康與福利。將熱食與高熱量物資絕對優先補給給身處高壓搶救前線的醫護與保安防暴人員。</p>\n</li>\n<li>\n<p><strong>員工住宿與庇護支援</strong>：為因應高壓防暴與強制輪班，總務部須統籌住宿資源，協助於安全的地下室區域設立員工專屬庇護站，提供行軍床與休息物資，維持留守員工長期應變的戰鬥力。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況 2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用 B1\n備援醫療空間及五處功能區」，此時醫院面臨極端的戰爭與空襲威脅，必須進行大面積的「空間降階防護」，將核心醫療轉移至地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>總務部</strong>不僅其部長擔任<strong>「後勤部長（L0）」</strong>，其轄下更涵蓋工務、醫勤（事務、運輸、保安）等關鍵單位。總務部是維持地下「微型戰地醫院」運作的生命線與大後勤中樞。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 統籌後勤資源與大後勤指揮（後勤部長 L0）</strong></p>\n<ol>\n<li>\n<p><strong>最高後勤調度</strong>：總務部部長作為後勤部長，負責管理並參與應變行動，統籌調度維持\n    B1 醫療服務與防空避難所需之所有設備、物資、器材及人力。</p>\n</li>\n<li>\n<p><strong>跨部門協調</strong>：與指揮官、行政/財務部長及聯絡官保持密切聯繫，確保各項防空疏散與資源調度程序的正確性與即時性。</p>\n</li>\n</ol>\n<p><strong>二、 執行「戰術空間轉換」與維生保衛</strong></p>\n<ol>\n<li>\n<p><strong>空間重構與開設</strong>：總務部（協同轄下工務室）依據指揮中心命令，必須迅速搬離大廳或地下室原有的雜物與座椅，協助拉設臨時電源與照明，將地下室非醫療空間迅速轉換為\n    B1 五大功能區（檢傷行政區、臨時\n    ICU、臨時開刀房、恢復室及輕症病房）。</p>\n</li>\n<li>\n<p><strong>生命線保衛與極限節流</strong>：作為醫院的「生命線保衛者」，必須確保發電機、地下水塔與醫療氣體在\n    B1\n    備援空間持續運作；必要時執行「負載卸除」，強行切斷高樓層或非必要區域的電源，以延長燃料與維生系統的使用時間。</p>\n</li>\n</ol>\n<p><strong>三、 運輸載具調度與垂直疏散支援</strong></p>\n<ol>\n<li>\n<p><strong>病患搬運支援</strong>：總務部人員須投入防空疏散的實體搬運工作，協助將無法自行移動的病患轉移至安全區。</p>\n</li>\n<li>\n<p><strong>載具集中與派發</strong>：總務部轄下單位須確實盤點並集中待命的救護車推床、輪椅和擔架數量，並指派人員協助醫療照護組將重症病患從高樓層垂直搬運疏散至\n    B1 避難區。</p>\n</li>\n</ol>\n<p><strong>四、 維持地下層之備援通訊網路</strong></p>\n<ol>\n<li>\n<p><strong>建立獨立通訊</strong>：因地下室極易發生訊號死角，總務部（轄下事務組）需檢查所有手持通訊設備，並評估通訊需求。</p>\n</li>\n<li>\n<p><strong>頻道分配</strong>：分配專屬的無線電頻道給進入 B1\n    各功能區的指揮官與醫護人員，提供獨立雙向通訊系統，確保防空避難期間的指揮通訊暢通。</p>\n</li>\n</ol>\n<p><strong>五、 防空避難期間之膳食飲水與員工庇護</strong></p>\n<ol>\n<li>\n<p><strong>穩定民心與體力</strong>：總務部負責統籌防空避難期間，所有迫降於 B1\n    工作的人員、避難病患及家屬的基本飲水與膳食供應，必要時動用戰備存糧。</p>\n</li>\n<li>\n<p><strong>設立員工庇護所</strong>：協助照顧執行部門人員的健康與福利，於指定安全區域設立員工休息及生活支援區，提供輪休庇護，確保醫療人員的戰力維持。</p>\n</li>\n</ol>\n<p><strong>六、 災後損害勘查與硬體復原重建</strong></p>\n<ol>\n<li>\n<p><strong>災情勘查與鑑定</strong>：待空襲威脅或警報解除後，總務部負責向相關單位申請災損鑑定小組到院，實施災損勘查與結構安全鑑定。</p>\n</li>\n<li>\n<p><strong>設施復原重建</strong>：依據勘查結果，統籌辦理建築物內部設備的修繕、危險排除與硬體設施復原重建工作，協助醫院盡速恢復常規營運。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨基礎設施嚴重受損的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>總務部</strong>扮演著支撐全院運作的後勤骨幹，由總務部部長擔任<strong>「後勤部長（L0）」</strong>。雖然第一線的搶修是由工務室或資訊室執行，但總務部必須統籌所有的物資、人力與設施支援，確保搶修與醫療應變能夠順利推進。</p>\n<p>面對此極端狀況，總務部的具體因應作為如下：</p>\n<p><strong>一、 擔任「後勤部長（L0）」，統籌全院資源與支援</strong></p>\n<ol>\n<li>\n<p><strong>最高後勤指揮</strong>：總務部部長作為後勤部長，負責管理並參與應變行動計畫中所有維持服務及事件所需支援的相關設備、物資、器材及人力之調度。</p>\n</li>\n<li>\n<p><strong>督導轄下分組</strong>：統籌並督導勤務組（含醫勤室、營養室、運輸組）與任務支援組（含資材組），確保通訊備援、膳食飲水供應及醫療/非醫療物資的取得與分配。</p>\n</li>\n</ol>\n<p><strong>二、 執行緊急物資管控與支援調度</strong></p>\n<ol>\n<li>\n<p><strong>進入緊急備援狀態</strong>：總務工作人員須立即進入緊急備援狀態，清點現有庫存與在途訂量品項，並轉知採購人員。</p>\n</li>\n<li>\n<p><strong>物資極限管制</strong>：在災害期間，實施嚴格的物資管制，「非必要之用品暫不供應」，將有限資源保留給搶修與緊急醫療任務使用。</p>\n</li>\n<li>\n<p><strong>發放搶修與應變物資</strong>：配合前線需求，總務部與資材人員須迅速提供緊急照明設備、手電筒、電池、沙包、吸水耗材以及水電機具供應，支援工務室的漏水防堵與停電搶修。</p>\n</li>\n</ol>\n<p><strong>三、 協助病患搬運與空間戰術轉換</strong></p>\n<ol>\n<li>\n<p><strong>無動力搬運支援</strong>：因電力瞬斷導致電梯停用，病患若需進行水平或垂直疏散，總務部人員必須親自投入前線，協助以擔架或推床進行「病患搬運」的體力任務。</p>\n</li>\n<li>\n<p><strong>空間降階與轉換</strong>：若病房因漏水、空調異常或火警受損，總務部須依據指揮中心命令，迅速搬離大廳座椅、協助搭建帳篷或拉設臨時電源與照明，將非醫療空間轉換為臨時病房、救護站或人員收容區。</p>\n</li>\n</ol>\n<p><strong>四、 檢視建築損壞與災情勘查</strong></p>\n<ol>\n<li>\n<p><strong>初期災損巡視</strong>：震動與爆炸發生後，總務部（後勤組）人員須協助檢視建築物損壞之情形，並回報給\n    HICS 指揮中心。</p>\n</li>\n<li>\n<p><strong>申請災損鑑定</strong>：在搶救告一段落後，總務部依作業規定，向相關單位申請災損鑑定小組到院實施災損勘查與鑑定。</p>\n</li>\n</ol>\n<p><strong>五、 主導災後「硬體設施復原重建」</strong>\n在應變後期與復原階段，總務部是主導醫院重生的核心單位：</p>\n<ol>\n<li>\n<p><strong>復原工程發包</strong>：總務部負責主導受損硬體設施（如漏水管線、空調系統、電梯與受損建築）的復原重建工作。</p>\n</li>\n<li>\n<p><strong>施工安全與監工</strong>：依本院編列復原之預算及其執行作業規定，視狀況進行公告招標及開標，並規劃嚴格的施工安全管制，指派監工管制施工進度及品質，確保修復後的設施強固與安全。</p>\n</li>\n</ol>\n<p>工務室如何確保醫院核心區域的備用電力？</p>\n<p>資訊室在斷網時如何協助病歷資料的紙本作業？</p>\n<p>護理部在設施受損時如何進行病患的垂直疏散？</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，在面臨大量病患需要緊急撤離、轉院與重置的極端挑戰下，<strong>總務部</strong>在\nHICS（醫院事故指揮系統）架構下扮演著支撐全院疏散行動不斷鏈的「後勤中樞」角色。</p>\n<p>總務部部長擔任 HICS\n中的<strong>「後勤部長（L0）」</strong>，轄下督導「勤務組（L1）」與「任務支援組（L2）」。其具體因應作為如下：</p>\n<p><strong>一、 擔任「後勤部長（L0）」，統籌全院撤離資源</strong></p>\n<ol>\n<li>\n<p><strong>最高後勤指揮</strong>：總務部部長作為後勤部長，負責管理並參與應變行動計畫中，所有維持醫療服務及疏散事件所需支援的相關設備、物資、器材及人力之調度。</p>\n</li>\n<li>\n<p><strong>統籌跨組後勤支援</strong>：統籌並督導勤務組、任務支援組、營養室及藥劑科等單位，確保撤離過程中的物資、交通、膳食、住宿、藥品與血液支援，並管理待命區的各項資源。</p>\n</li>\n</ol>\n<p><strong>二、 啟動緊急運輸車輛調度與通訊維持（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>車輛徵用與調派</strong>：由醫勤室主任擔任勤務主管，負責評估醫院疏散服務所需的運輸工具。總務部須統籌調派院內現有車輛或請求外部大眾運輸工具（接駁車），以協助病人的疏散運送與重置。</p>\n</li>\n<li>\n<p><strong>規劃通訊與膳食</strong>：規劃疏散過程中的內部與外部通訊設備分配，並為參與高強度疏散任務的工作人員及等候撤離的病患提供飲水與膳食供應。</p>\n</li>\n</ol>\n<p><strong>三、 整備「隨車醫療物資」與衛材供應（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>戰備物資隨行準備</strong>：由資材組組長擔任任務支援主管，負責取得並儲存所有重要的醫療與非醫療物資及藥品。總務部衛材管理人員及供應室人員必須迅速準備撤離所需的相關衛材。</p>\n</li>\n<li>\n<p><strong>防範轉送物資斷鏈</strong>：總務部（後勤組）必須確保準備足夠量的急救藥物、靜脈輸液或血液製品，並<strong>與病人一起運送</strong>到重置區或接收醫院，以避免在轉送過程中或剛抵達接收醫院時發生醫藥存量耗竭的危機。</p>\n</li>\n</ol>\n<p><strong>四、 親自投入病患搬運與疏散協助</strong>\n在病患實體移出的行動中，護理人員主要負責病患的醫療照護，而<strong>總務部人員必須親自投入前線</strong>，負責協助進行「病患搬運」的重度體力任務，協助將行動不便或重症病患移出至安全的疏散集結區或救護車上。</p>\n<p><strong>五、 執行疏散地點之「設施重建與器材架設」</strong>\n若醫院啟動院內安全區或院外臨時醫療區的安置計畫，總務部必須會同工務室及資訊室，前往指定的疏散安置地點進行「醫療器材架設、水電重建及電腦佈設」等基礎設施重建工作，確保重置區域的硬體設施能立即滿足接續的醫療運作需求。</p>\n<p>反向檢傷的精確分類標準為何？</p>\n<p>高度照護病患撤離時的隨車裝備有哪些？</p>\n<p>如何與其他聯防醫院協調接收病患量能？</p>"}]}, {"role": "工務室", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>工務室</strong>擔任執行部門的<strong>「設施運作主管（O2）」</strong>及演習編組中的<strong>「關鍵資源與設施搶修組」</strong>，是災難中維繫醫院「生命線（Lifelines）」的保衛者。</p>\n<p>工務室因應孤島危機的具體作為如下：</p>\n<p><strong>一、 燃油與電力極限管制：殘酷執行「負載卸除（Load Shedding）」</strong></p>\n<ol>\n<li>\n<p><strong>精算消耗與回報缺口</strong>：面對燃油配送延遲，工務室須立即精算現有儲油量與消耗速率，並向指揮中心回報短缺缺口與請求支援。</p>\n</li>\n<li>\n<p><strong>切斷非必要電源（負載卸除）</strong>：為確保緊急發電機的續航力，工務室必須主動手動切斷行政辦公區、一般病房、冷氣空調與非維生儀器的電源迴路。</p>\n</li>\n<li>\n<p><strong>死守醫療紅區</strong>：將所有備用發電機的寶貴電力，絕對死守在開刀房、ICU、急診室急救區與血庫冰箱。透過監控發電機溫度與耗能，確保在「最低維生耗能」下能撐過法定的\n    72 小時（甚至 120 小時）。若 ATS\n    設備切換異常或發電機啟動失敗，須立即執行強制手動啟動並緊急聯繫維護廠商。</p>\n</li>\n</ol>\n<p><strong>二、 醫療氣體應變：切換備援與極限替代</strong></p>\n<ol>\n<li>\n<p><strong>評估氣體存量與隔離</strong>：精算中央醫療氧氣與氣體的消耗速率。若管路受損或主機異常，須視情況分段、分區關閉，隔離洩漏區域。</p>\n</li>\n<li>\n<p><strong>切換備用鋼瓶</strong>：若中央液氧槽受損或氣體耗盡，工務室須協助並通知前線醫護人員，快速精準切換至備用氧氣鋼瓶供氣。</p>\n</li>\n<li>\n<p><strong>配合人工維生替代</strong>：若備用鋼瓶亦耗盡，須配合醫療照護單位，動員人員組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持重症病患呼吸。</p>\n</li>\n</ol>\n<p><strong>三、 飲水與供水應變：啟動備援水源與嚴格配給</strong></p>\n<ol>\n<li>\n<p><strong>啟動地下水系統</strong>：面對自來水供水受阻或停水，工務室須立即啟動院內地下水塔供水系統，並將水塔連結管路打開，讓五座水塔互補供水。</p>\n</li>\n<li>\n<p><strong>實施水資源分級配給</strong>：實施極其嚴格的「水資源紅區管制」，最乾淨的水僅供開刀房刷手、器械基本消毒與病患飲用；嚴禁一切盥洗與沖馬桶（改發化學便器袋）。</p>\n</li>\n<li>\n<p><strong>請求外部水援</strong>：若地下水系統故障或水源不足，工務室須向消防隊請求水車支援或聯絡廠商外購水源。</p>\n</li>\n</ol>\n<p><strong>四、 維持基礎設施與回報優先使用順序</strong></p>\n<ol>\n<li>\n<p><strong>確立物資優先序</strong>：工務室須會同後勤與採購單位，確認運達物資的接收與保管位置，並確立電力、水資源與醫療氣體的「優先使用順序」。</p>\n</li>\n<li>\n<p><strong>巡檢與搶修</strong>：持續巡檢空調、建築物結構、電梯及醫療儀器設備，依據各單位回報的災損狀況立即派員進行搶修作業，確保核心設施在孤島狀態下能維持最低限度運作。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透破壞（如第五縱隊）及群眾恐慌推擠的複合型安全危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>工務室</strong>擔任執行部的<strong>「設施運作主管（O2）」</strong>與演習編組中的<strong>「關鍵資源與設施搶修組」</strong>，是災難中維繫醫院「生命線（Lifelines）」的保衛者。面對此等外部威脅與內部警戒狀態，工務室的具體因應作為如下：</p>\n<p><strong>一、 關鍵基礎設施（CI）的反破壞與安全加固</strong>\n面對可疑無人機與不明人車可能進行的偵蒐與破壞，工務室必須守護醫院的心臟地帶：</p>\n<ol>\n<li>\n<p><strong>加固維生機房防護</strong>：會同安全管制組（保安組），針對<strong>地下室緊急發電機房、伺服器資訊機房、頂樓水塔及戶外液氧槽</strong>等關鍵基礎設施（CI），增設\n    24 小時巡邏哨。</p>\n</li>\n<li>\n<p><strong>防範人為癱瘓</strong>：全面巡檢並鎖固管線通道與機房門禁，防範有心人士（或偽裝的在地協力者）進行放置爆裂物、剪斷電纜或於水源投毒等毀滅性人為破壞，確保維生系統不被癱瘓。</p>\n</li>\n</ol>\n<p><strong>二、 支援「硬邊界」阻絕與內部封鎖（Lockdown）的機電控制</strong>\n面對避難群眾湧入或企圖搶奪物資的失控風險，工務室需透過物理設施提供防禦支援：</p>\n<ol>\n<li>\n<p><strong>提供實體防禦載具</strong>：配合實施「硬邊界」封鎖與極限進出管制，工務室可協助調度院方<strong>工程車</strong>橫停於非必要之出入口，作為防衝撞的實體阻絕物。</p>\n</li>\n<li>\n<p><strong>啟動防暴機電鎖定</strong>：若群眾暴動衝闖，工務室須配合指揮中心迅速啟動「內部封鎖（Lockdown）」，瞬間<strong>降下急診室防暴門及各區域防火鐵捲門</strong>，並<strong>強制關閉全院電梯控制權</strong>，將非授權人員阻絕於核心醫療區之外，以保護重症病患與醫護人員。</p>\n</li>\n</ol>\n<p><strong>三、 戰術空間轉換的臨時水電氣支援</strong>\n因應大量避難人潮處理或物資隱密防護的需求，醫院空間需進行戰術轉換：</p>\n<ol>\n<li>\n<p><strong>基礎設施機動佈設</strong>：依據指揮中心命令，協助將非醫療空間（如大廳）轉換為大量傷患檢傷區，或將地下停車場淨空轉為「戰略物資地下補給站」。</p>\n</li>\n<li>\n<p><strong>拉設臨時維生管線</strong>：在這些臨時轉換的空間內，工務室須迅速拉設<strong>臨時電源、照明設備與通風設施</strong>，以維持檢傷分類與醫療處置的基本運作。</p>\n</li>\n</ol>\n<p><strong>四、 維生管線極限監控與「黑堡」應變準備</strong>\n外部的破壞行動極可能伴隨癱瘓區域電網或自來水廠，工務室必須做好「孤島」的極限應變：</p>\n<ol>\n<li>\n<p><strong>資源盤點與監控</strong>：盤點並持續監控能源、水、醫療氣體、備援電力及設備搶修量能。</p>\n</li>\n<li>\n<p><strong>執行負載卸除（Load\n    Shedding）</strong>：若市電全斷且外部運補受阻，工務室須主動手動切斷行政辦公區、一般病房與冷氣空調的電源迴路，將所有緊急發電機的寶貴電力，絕對死守在開刀房、ICU\n    與急診室急救區。</p>\n</li>\n<li>\n<p><strong>水氣替代方案</strong>：若自來水遭阻斷，啟動院內地下戰備水塔，並實施極嚴格的水資源配給；若中央液氧槽受損洩漏，則迅速協助切換至備用氧氣鋼瓶。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況\n2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭與空襲威脅，必須進行大面積的「空間降階防護」，將核心醫療轉移至安全的地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>工務室</strong>擔任執行部門的<strong>「設施運作主管（O2）」</strong>與演習編組中的<strong>「關鍵資源與設施搶修組」</strong>，是戰災中維繫醫院「生命線（Lifelines）」的絕對保衛者。</p>\n<p>面對防空疏散與 B1 備援空間的緊急開設，工務室的具體因應作為如下：</p>\n<p><strong>一、 建立 B1 五大備援功能區之基礎設施（戰術空間轉換）</strong>\n配合全院將醫療量能轉移至地下一樓（B1），工務室必須在極短時間內，於臨時轉換的空間拉設維生基礎設施：</p>\n<ol>\n<li>\n<p><strong>機電與照明架設</strong>：迅速於約翰／馬可大樓 B1（檢傷行政區、臨時\n    ICU）、韓偉大樓 B1（臨時開刀房、恢復室）及路加大樓\n    B1（輕症病房）等五大功能區內，拉設臨時電源、照明設備與通風／空調設施。</p>\n</li>\n<li>\n<p><strong>醫療氣體與供水銜接</strong>：確保 B1 臨時開刀房與臨時 ICU\n    病房具備穩定的醫療氣體（如氧氣）供應與急救用水，以支撐地下微型戰地醫院的戰傷搶救需求。</p>\n</li>\n</ol>\n<p><strong>二、 執行「極限負載卸除（Load Shedding）」與死守紅區電力</strong>\n空襲極可能伴隨外部電網與自來水廠遭癱瘓，工務室必須啟動「黑堡（Black\nStart）」孤島應變：</p>\n<ol>\n<li>\n<p><strong>主動切斷非必要電源</strong>：依據指揮官命令，強制執行冷酷的「電力負載卸除」。主動手動切斷行政辦公區、一般病房、冷氣空調及高樓層（已撤離區）的電源迴路，以節約能源。</p>\n</li>\n<li>\n<p><strong>死守核心醫療電力</strong>：將緊急發電機的所有寶貴電力，絕對死守在 B1\n    臨時開刀房、臨時 ICU\n    及伺服器機房等紅區。持續監控發電機溫度與剩餘柴油儲量，確保在「最低維生耗能」下能撐過法定的\n    72 小時。</p>\n</li>\n</ol>\n<p><strong>三、 進駐地下專屬據點與維持搶修量能</strong></p>\n<ol>\n<li>\n<p><strong>進駐 B1\n    工務基地</strong>：工務人員須依據備援空間配置，確實於<strong>「約翰／馬可大樓\n    B1\n    工務室」</strong>就位，以此作為工務、醫工支援及搶修銜接的地下前進指揮所。</p>\n</li>\n<li>\n<p><strong>醫工設備轉置協助</strong>：協助醫療單位將急救所需的重大醫療儀器設備，從高樓層移轉並重新佈設於\n    B1 備援功能區。</p>\n</li>\n</ol>\n<p><strong>四、 災後損害控制與危險排除（防範二次災害）</strong>\n若空襲震波導致院區建築物受損或管線破裂：</p>\n<ol>\n<li>\n<p><strong>隔離洩漏與阻斷</strong>：工務室須迅速進行分段、分區關閉受損區域的電力、供水與醫療氣體閥門，防範氧氣外洩引發火災爆炸或引發嚴重淹水等二次災害。</p>\n</li>\n<li>\n<p><strong>設施搶修與評估</strong>：會同相關編組進行建築物結構與設備的損害評估，啟動備用系統並決定搶修的優先順序，確保地下醫療避難空間的絕對安全。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨關鍵基礎設施嚴重受損的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>工務室</strong>主任擔任執行部門的<strong>「設施運作主管（O2）」</strong>，負責全院電力、供水、空調、建築物結構及醫療氣體的維護與管制。在災難發生時，工務室是決定醫院存亡的<strong>「生命線（Lifelines）保衛者」</strong>。</p>\n<p>面對此極端狀況，工務室的具體因應作為如下：</p>\n<p><strong>一、 應對電力瞬斷與執行「極限負載卸除」（電力搶修）</strong></p>\n<ol>\n<li>\n<p><strong>確認發電機啟動</strong>：發生電力瞬斷時，工務人員須立即確認\n    ATS（自動切換開關）是否在 12\n    秒內自動切換由發電機供電；若自動啟動失敗，須立即派員至機房執行「強制啟動」。</p>\n</li>\n<li>\n<p><strong>啟動 10 分鐘停電應變</strong>：若停電達 10\n    分鐘仍無法正常供電，須通知總機廣播各單位啟動應變措施，並要求各單位關閉非必要設備的電源。</p>\n</li>\n<li>\n<p><strong>殘酷負載卸除（Load\n    Shedding）與死守紅區</strong>：若遭遇外部電網全毀的「孤島（Black\n    Start）」狀態，工務室須依指揮官命令，強制手動切斷所有行政辦公區、一般病房、冷氣空調與非維生醫療儀器的電源。將緊急發電機的寶貴電力，絕對死守在開刀房、ICU、急診室、伺服器機房與血庫等「紅區」。</p>\n</li>\n<li>\n<p><strong>精算燃料</strong>：工程師須每小時精算剩餘儲油量並監控發電機溫度，確保在最低維生耗能下，醫院能撐過法定的\n    72 小時極限運作。</p>\n</li>\n</ol>\n<p><strong>二、 應對管線漏水與停水危機（水源搶修）</strong></p>\n<ol>\n<li>\n<p><strong>隔離洩漏</strong>：針對震波引起的管線破裂與漏水，工務人員須迅速進行分段、分區關閉開關，以隔離洩漏區域，防止水患波及機房或引發漏電。</p>\n</li>\n<li>\n<p><strong>啟用地下水與水塔互補</strong>：若自來水主幹管斷裂導致全院停水，工務室須立即啟動院內地下水（戰備水塔）供水系統，並將頂樓五座水塔的連結管路打開，使其互補供水。</p>\n</li>\n<li>\n<p><strong>水資源分級配給與求援</strong>：實施極度嚴格的管制，最乾淨的水源僅保留供開刀房刷手、器械消毒與飲用，禁止一般盥洗與沖馬桶；若地下水亦失效，須立刻向消防隊或外部廠商（如山泉水車）請求緊急水源支援。</p>\n</li>\n</ol>\n<p><strong>三、 應對空調與醫療氣體異常（氣體搶修）</strong></p>\n<ol>\n<li>\n<p><strong>醫療氣體切換</strong>：若中央液氧槽、壓縮空氣或真空系統因震動受損而供氣異常，工務室須現場確認原因，並立即切換至備用系統。若\n    30\n    分鐘內無法正常供氣，須通知各臨床單位自行啟動應變（如改用氧氣鋼瓶）。</p>\n</li>\n<li>\n<p><strong>空調維持</strong>：儘速搶修受損的空調主機，優先確保手術室、加護病房與資訊機房的恆溫與無菌環境。</p>\n</li>\n</ol>\n<p><strong>四、 應對電梯停用與受困救援</strong></p>\n<ol>\n<li>\n<p>震波或停電導致電梯停用時，工務室須優先派員巡視確認車廂內是否有病患或員工受困。</p>\n</li>\n<li>\n<p>立即聯絡電梯維護廠商，並由工務人員協同警衛（安全管制組）執行受困人員的緊急救援作業。在極端限電下，工務室須將\n    80% 的電梯電源切斷，僅保留必要之維生與運輸電梯。</p>\n</li>\n</ol>\n<p><strong>五、 應對消防警報與建物震損評估</strong></p>\n<ol>\n<li>\n<p><strong>火警確認與斷電</strong>：若爆炸或震動引發消防警報，工務人員須確認受信總機位置，若現場發生真實火災，須配合「危害控制組」執行初期滅火，並視情況切斷該區電源與空調，避免火煙透過管線蔓延。</p>\n</li>\n<li>\n<p><strong>結構災損評估</strong>：地震與爆炸後，工務室須全面巡查建築物主體結構是否有倒塌、龜裂之虞，將損害評估、搶修情形與復原的優先順序，彙整回報給\n    HICS 指揮中心，以供指揮官作為是否執行病房疏散的決策依據。</p>\n</li>\n</ol>\n<p>工務室如何處理管線漏水？</p>\n<p>若備用電力失效有哪些替代方案？</p>\n<p>如何向外部單位請求消防或修繕支援？</p>"}]}, {"role": "環保室", "entries": [{"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況 2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用 B1\n備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭威脅，必須將核心醫療量能轉移至地下室以進行「空間降階防護」。</p>\n<p>在\nHICS（醫院事故指揮系統）與演習架構下，<strong>環保室</strong>不僅是環境衛生的維護者，更是提供地下備援空間的關鍵單位，並身兼執行部<strong>「安全管制組（O4）」</strong>的核心成員。其具體因應作為如下：</p>\n<p><strong>一、 極速清空本部空間，配合開設「戰時恢復室」</strong></p>\n<ol>\n<li>\n<p><strong>讓出指定備援空間</strong>：依據院方逃生圖與備援空間規劃，<strong>「韓偉大樓 B1\n    環保室」「恢復室」</strong>。</p>\n</li>\n<li>\n<p><strong>空間戰術轉換</strong>：環保室人員在接獲空襲或空間轉置指令後，必須極速淨空該空間內非必要的清潔機具、推車與雜物。將空間完全讓給手術與麻醉團隊進駐，以利執行戰傷病患的術後觀察、恢復照護及轉送銜接。</p>\n</li>\n</ol>\n<p><strong>二、 擔任 HICS「安全管制組（O4）」：協同動線與秩序維護</strong></p>\n<ol>\n<li>\n<p><strong>執行安全管制</strong>：環保室組長作為「安全管制組」的主責/代理幹部之一，須協同醫勤室保安組，共同執行防空避難期間的安全維護與動線規劃。</p>\n</li>\n<li>\n<p><strong>地下層管制點防守</strong>：派員協助駐守 B1\n    的樓梯間、電梯口、主要通道及各醫療功能區（特別是環保室自身轉換的恢復室）的出入口。執行嚴格的出入管制與群眾控制，防範避難民眾誤闖醫療紅區，確保傷患轉送動線絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 維持地下「微型戰地醫院」之環境衛生與廢棄物清運</strong></p>\n<ol>\n<li>\n<p><strong>醫療廢棄物集中管控</strong>：隨著大量病患與戰傷搶救移轉至 B1\n    備援醫療空間（臨時\n    ICU、開刀房等），將瞬間產生大量沾血衛材與醫療廢棄物。環保室須會同外包清潔人員，於地下室建立臨時的感染性廢棄物收集與清運動線，妥善打包隔離，避免密閉空間內發生交叉感染。</p>\n</li>\n<li>\n<p><strong>地下避難區環境清消</strong>：在人潮擁擠且通風受限的地下避難空間內，環保室須持續進行環境清潔與消毒作業，防範因防空避難衍生的院內傳染病群聚感染。</p>\n</li>\n</ol>\n<p><strong>四、 災後 / 空襲後之現場清理與復原</strong>\n若空襲震波導致院區高樓層受損、玻璃碎裂或管線破裂，在空襲警報解除且經工務/職安單位確認結構安全後，環保室須會同清潔公司人員迅速投入災害現場的清理工作，排除積水、髒污與危險散落物，協助醫院盡速恢復基本運作。</p>"}]}, {"role": "資材組", "entries": [{"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，在\nHICS（醫院事故指揮系統）架構下，<strong>資材組</strong>隸屬於後勤部門，由資材組組長擔任<strong>「任務支援主管（L2）」</strong>，同時也是演習編組中「後勤物資與維生組」的核心單位。</p>\n<p>在面臨空襲威脅及核心醫療全數轉移至地下室時，資材組的具體因應作為如下：</p>\n<p><strong>一、 空間轉置與進駐「B1 戰略物資補給站」</strong></p>\n<ol>\n<li>\n<p><strong>進駐指定位置</strong>：依據院方逃生圖與備援空間規劃，資材組人員必須確實於<strong>「約翰／馬可大樓\n    B1\n    資材室」</strong>就位，將該處轉作為地下微型戰地醫院的後勤物資補給中樞。</p>\n</li>\n<li>\n<p><strong>物資地下化轉移</strong>：在空襲警報發布或接獲空間降階指令後，負責將高脆弱區域的重要醫療耗材、非醫療設備與戰備物資，緊急轉移至\n    B1 安全區取得並妥善保管。</p>\n</li>\n</ol>\n<p><strong>二、 支援 B1 五大功能區與啟動「盲派（Push）」物流</strong></p>\n<ol>\n<li>\n<p><strong>就近火力支援臨時 ICU</strong>：依據空間規劃，<strong>「臨時 ICU\n    病房」即開設於「約翰／馬可大樓 B1\n    資材組前方」</strong>。資材組具備地利之便，必須就近且最優先提供該重症暫置區所需的急救耗材與醫療監測支援物資。</p>\n</li>\n<li>\n<p><strong>戰鬥化推拉式物流（Push-Pull\n    Logistics）</strong>：戰時或斷網狀態下，平時的請領系統將完全失效。資材組須顛覆常規，主動出擊，不等待前線填單申請（Pull），直接將預先打包好的「戰傷急救箱（含戰術止血帶、骨針\n    IO、止血紗布、林格氏液等）」進行「盲派（Push）」推送至 B1\n    臨時開刀房、臨時 ICU\n    及檢傷行政區等前線紅區，確保搶救子彈與資源絕對不斷鏈。</p>\n</li>\n</ol>\n<p><strong>三、 執行 HICS「任務支援組（L2）」之核心職責</strong></p>\n<ol>\n<li>\n<p><strong>運輸載具與資源調度</strong>：取得並分配防空疏散及地下室醫療運作所需之運輸工具（如推床、輪椅），並將物資交由待命區管理者精準調度往\n    B1 的各醫療功能區使用。</p>\n</li>\n<li>\n<p><strong>員工庇護物資供應</strong>：協助照顧迫降於 B1\n    工作或防空避難的執行部門（醫護）人員，提供人員休息區、庇護站所需之基本維生物資與防護裝備，支援前線戰力的身心照護。</p>\n</li>\n</ol>\n<p><strong>四、 戰備物資極限盤點與缺口通報</strong></p>\n<ol>\n<li>\n<p><strong>72小時消耗精算</strong>：盤點 B1 備援空間內的簽證物資、急救耗材與 72\n    小時戰備物資清冊，精確掌握戰時高壓環境下的消耗速率。</p>\n</li>\n<li>\n<p><strong>緊急缺口調度</strong>：若因空襲導致外部交通受阻、常規供應鏈中斷而產生前線物資缺口，資材組須立即向後勤部長回報，並會同採購室緊急聯繫不受空襲影響的替代供應商，或向衛生局（EOC）、聯防醫院申請物資調撥支援。</p>\n</li>\n</ol>"}]}, {"role": "採購/倉儲", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，「採購與倉儲（資材）」分別隸屬於<strong>行政/財務部的「採購小組（F2，由採購室主任擔任）」後勤部的「任務支援組（L2，由資材組長擔任）」</strong>。面對外部供應鏈中斷，其具體因應作為如下：</p>\n<p><strong>一、 啟動緊急採購與外部跨院調用（採購小組）</strong></p>\n<ol>\n<li>\n<p><strong>停止常規作業</strong>：立即停止災害防救以外的所有常規採購及結報作業，將單位量能全數集中於應變所需之緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>啟動替代供應與聯防支援</strong>：面對既有物流配送延遲，採購人員須迅速電洽協力及替代供應商，並聯繫屏東縣市簽有支援協定之合作醫院，請求需求品項的緊急調度支援。同時向屏東縣衛生局請求協助調撥，並以攸關生命的藥材及衛材為最優先。</p>\n</li>\n</ol>\n<p><strong>二、 精算物資缺口與接收簽證物資（採購室／資材組）</strong></p>\n<ol>\n<li>\n<p><strong>確立優先順序與回報缺口</strong>：會同後勤物資與維生組，精算藥品、血液、氧氣、膳食及耗材的消耗速率與現存缺口，並與指揮官確認資源的「優先使用順序」，將有限資源集中於重症搶救。</p>\n</li>\n<li>\n<p><strong>簽證物資保管</strong>：負責確認任何突破交通阻礙運達的簽證物資、備品及乾糧飲水的接收與保管位置，並配合指揮中心進行調度。</p>\n</li>\n</ol>\n<p><strong>三、 顛覆常規，啟動戰略衛材「盲派（Push）」物流（資材組/倉儲）</strong></p>\n<ol>\n<li>\n<p><strong>切換推拉式物流</strong>：在聯外交通阻斷、系統可能當機的極端情況下，平時為了降低庫存成本而採用的「有申請才領用（Pull）」常規物流系統將完全失效。資材室人員必須切換為「推拉式物流（Push-Pull\n    Logistics）」。</p>\n</li>\n<li>\n<p><strong>主動推進救命物資</strong>：將預先打包好的標準化「戰傷急救箱（Trauma Kits\n    /\n    Go-Kits）」（內含大量戰術止血帶、骨針、含止血劑紗布等戰備物資），不等待前線急診發出領料單或表單申請，直接以「盲派（Push）」方式主動推至急診紅區與開刀房門口，確保前線醫護人員伸手就能取得救命物資，維持戰鬥力不斷鏈。</p>\n</li>\n</ol>\n<p><strong>四、 執行全院子庫緊急調度與急補通報（資材組）</strong></p>\n<ol>\n<li>\n<p><strong>院內子庫重分配</strong>：針對災害搶救現場急需之物資品項，資材組人員須主動對全院各單位的「子庫」備量進行緊急盤點與調度集中。</p>\n</li>\n<li>\n<p><strong>通報急補</strong>：密切監控前線耗材的消耗狀況，一旦發現消耗突增及需求量極大的品項，資材組人員應即時通知採購人員，啟動緊急補充程序。</p>\n</li>\n</ol>"}]}, {"role": "資訊室", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報各項量能並進入戰時醫療整備。資訊室在\nHICS（醫院事故指揮系統）中扮演確保通訊暢通、系統穩定與資訊備援的神經中樞。其具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌「機構運作主管」與「資通簡報組」</strong></p>\n<ol>\n<li>\n<p><strong>納入 HICS 編組</strong>：資訊室主任將擔任 HICS\n    執行部轄下的<strong>「機構運作主管（O5）」</strong>，負責協助醫院功能持續運作，減少中斷必要的資訊服務。同時主責演習任務編組中的<strong>「資通簡報組」</strong>。</p>\n</li>\n<li>\n<p><strong>應變中心開設與通訊構聯</strong>：迅速協助臨災應變中心（指揮所）的軟硬體開設，負責架設網路、投影與音響設備。更重要的是確認<strong>多元備援通訊</strong>（如衛星電話、無線電或\n    Meshtastic\n    等）的測試與暢通，確保院方能順利與衛生局等外部主管機關對接，完成限時初報與續報。</p>\n</li>\n</ol>\n<p><strong>二、 維持核心系統運作並協助量能數據撈取</strong></p>\n<ol>\n<li>\n<p><strong>確保核心系統穩定</strong>：確保\n    HIS（醫療資訊系統）、EMR（電子病歷）、PACS（醫療影像）、檢驗及掛號批價等核心系統的穩定運作，避免因系統當機影響臨床作業。</p>\n</li>\n<li>\n<p><strong>協助數據撈取與情資看板</strong>：協助計畫部與統籌呈報組（危管會），從資訊系統中即時撈取精確的「全院空床數、當班人力名冊、急診留觀與手術排程」等數據。透過系統化的應變儀表板或\n    AI\n    知識庫快速彙整資訊，以利醫院能於主管機關規定的時限內完成各項量能的回報。</p>\n</li>\n</ol>\n<p><strong>三、 啟動資安防禦與核心資料備份</strong></p>\n<ol>\n<li>\n<p><strong>資安攻防與監控</strong>：因應戰前階段敵方資訊作戰、假訊息及網路攻擊風險升高，資訊室須加強網路流量監控，防堵疑似釣魚郵件、異常登入與惡意連線，防範駭客（如勒索軟體）癱瘓醫療系統。</p>\n</li>\n<li>\n<p><strong>極限資料備份</strong>：立即執行全院核心資料庫、電子病歷與重要營運檔案的備份作業（含離線與異地備份），確保戰時醫療紀錄與關鍵資料的保密性與可用性。</p>\n</li>\n</ol>\n<p><strong>四、 整備「紙本降級（Downtime）」與斷網應變機制</strong></p>\n<ol>\n<li>\n<p><strong>整備無網作業環境</strong>：戰時極可能面臨聯外網路中斷、斷電或基礎設施遭摧毀的「資訊全黑」情境，資訊室必須配合啟動並測試<strong>「紙本降級（Downtime）極限模式」</strong>。</p>\n</li>\n<li>\n<p><strong>確保當機備援物資</strong>：確認各護理站、急診與 B1\n    備援醫療空間皆已備妥<strong>「當機緊急箱（Downtime\n    Box）」</strong>，內含每日離線列印的最新住院名單、紙本病歷、手寫處方箋與檢傷單。確保在資訊系統完全癱瘓時，全院醫療核心功能與量能盤點仍能無縫切換至人工紙本方式持續運作。</p>\n</li>\n</ol>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」之複合性危機，資訊室在\nHICS（醫院事故指揮系統）中擔任<strong>「機構運作主管（O5）」</strong>與<strong>「資通簡報組」</strong>的核心角色，負責確保前線分流的軟硬體運作及資訊通訊暢通。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 支援戶外分流站與臨時救護站之資訊設備架設</strong></p>\n<ol>\n<li><strong>緊急架設前線設備</strong>：因應急診為應付大量傷患與慢性病搶藥人潮所啟動的極限分流，本院臨時救護站與分流區的開設須由工務室及<strong>資訊室負責</strong>。資訊人員必須迅速前往「戶外慢性病處方籤領藥區」或「臨時大量傷患檢傷區」，緊急架設電腦、網路連線、讀卡機與印表機，確保戶外醫療分流與掛號批價作業能順利連線運作。</li>\n</ol>\n<p><strong>二、 維持核心醫療系統穩定與數據撈取（支援闢謠與決策）</strong></p>\n<ol>\n<li>\n<p><strong>防範系統超載當機</strong>：面對短時間內大量湧入的掛號、檢傷登錄與領藥需求，資訊室必須嚴密監控\n    HIS（醫療資訊系統）、EMR（電子病歷）與\n    PACS（醫療影像）等核心系統的負載狀況，避免因流量過載而發生當機，確保急重症搶救之資訊系統維持運作。</p>\n</li>\n<li>\n<p><strong>即時數據撈取與儀表板支援</strong>：協助計畫部（資源控管組）與發言官，透過「醫療應變儀表板」或\n    AI\n    知識庫，即時撈取全院精確的病床空床數、急診留觀人數及慢性病藥品庫存量。這些正確數據將作為指揮官實施醫療降載的決策依據，並提供給發言官作為對外發布新聞稿、反制假訊息的客觀證據。</p>\n</li>\n</ol>\n<p><strong>三、 確保全院通訊網路與家屬查詢專線暢通</strong></p>\n<ol>\n<li>\n<p><strong>維持總機與通訊韌性</strong>：面對恐慌家屬大量湧入的查詢電話，資訊室須確保總機系統與內外部電話線路的穩定。若一般電信網路因交通事故或擠斷而異常，資訊室須立即啟用多元備援通訊（如衛星電話、Meshtastic\n    等），確保院內指揮中心與外部衛生局、消防局的通報聯絡不中斷。</p>\n</li>\n<li>\n<p><strong>支援家屬尋人系統</strong>：確保「病人動向管理」與大量傷患登錄系統的穩定傳輸，讓社工室與家屬接待區能透過電腦系統即時查詢交通事故傷患的收治位置，加速家屬尋人效率並安撫情緒。</p>\n</li>\n</ol>\n<p><strong>四、 協助數位管道發布闢謠與就醫管制訊息</strong></p>\n<ol>\n<li><strong>數位管道即時推播</strong>：配合公共事務/發言官的決策，資訊室須協助將「醫院真實收治量能、戶外領藥動線管制及闢謠聲明」等重要訊息，迅速更新至醫院官方網站、APP，並透過院內各候診區的資訊系統與跑馬燈進行輪播宣導，藉由公開透明的數位資訊降低現場民眾的恐慌與不理性闖入。</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3（社群媒體流傳不實訊息，且掛號、批價、藥局、檢驗或影像系統出現延遲），此為典型的「資安攻擊（資訊戰）」與「假訊息（輿論戰）」複合危機。資訊室在\nHICS（醫院事故指揮系統）中擔任<strong>「機構運作主管（O5）」</strong>及演習編組中的<strong>「資通簡報組」</strong>核心角色，負責維持醫療系統持續運作、資安防禦與通訊韌性。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 災情評估與啟動「全院當機處理機制」（Downtime）</strong></p>\n<ol>\n<li>\n<p><strong>下達紙本降級決策</strong>：資訊室主任（資訊長）須迅速評估系統延遲狀況。若判定系統遭受惡意攻擊或無法於短時間內修復，應立即向指揮官報告，並下達啟動「全院當機處理機制」。</p>\n</li>\n<li>\n<p><strong>通知前線切換離線作業</strong>：透過總機（如使用 *9\n    緊急通報）或備援通訊，緊急通知醫務部、急診、護理部、檢驗、藥局與批掛等受影響單位，全面改採人工作業（啟動\n    Downtime Box\n    當機緊急箱，使用紙本病歷、手寫處方箋與檢驗單），以確保醫療核心服務不中斷。</p>\n</li>\n</ol>\n<p><strong>二、 執行資安事件阻斷與病毒排除（網路攻擊防禦）</strong></p>\n<ol>\n<li>\n<p><strong>流量監控與實體隔離</strong>：針對疑似釣魚郵件、異常登入或惡意連線，資訊室網路組人員需透過網路流量監控，查出遭大量病毒感染之網段。並立即將該網段之交換器與核心交換器拔除連線，執行實體隔離與阻斷，避免災情擴大癱瘓核心的\n    HIS 或 PACS 系統。</p>\n</li>\n<li>\n<p><strong>資安分級與法定通報</strong>：依據事件嚴重程度進行資安事件分級，並迅速向院內指揮中心及外部主管機關（如衛福部）完成法定的「資安通報」。</p>\n</li>\n<li>\n<p><strong>病毒排除</strong>：增派資訊室各組人力支援，針對受感染之電腦進行病毒排除與修復工作。</p>\n</li>\n</ol>\n<p><strong>三、 啟動備援系統與排定復原順序</strong></p>\n<ol>\n<li>\n<p><strong>異地備援接管</strong>：若主機或資料庫受損，危機應變分組應立即啟動備援系統（例如啟用位於瑞光院區\n    7F 具備獨立防護環境的 PACS、HIS\n    異地備援機房），確保資料庫安全不遺失。</p>\n</li>\n<li>\n<p><strong>排定復原優先順序</strong>：與指揮中心確認核心系統的復原優先順序，優先搶修急診、掛號批價、藥局、檢驗及影像等攸關病患生命安全之系統。</p>\n</li>\n<li>\n<p><strong>測試與重新上線</strong>：在確認病毒排除或系統修復後，先由程式設計人員與使用單位進行連線測試，測試無誤後再通知各單位結束當機機制，恢復正常電子資訊作業。</p>\n</li>\n</ol>\n<p><strong>四、 維持通訊韌性與備援通訊網</strong></p>\n<ol>\n<li><strong>確保備援通訊暢通</strong>：在內部網路系統癱瘓或不穩期間，資訊室須確保院內指揮指令傳遞順暢，緊急啟用備援通訊設備（如\n    UHF/VHF\n    無線電對講機、低軌衛星系統等），建立抗干擾的異質性戰術通訊網，以利各樓層指揮官與前線溝通。</li>\n</ol>\n<p><strong>五、 數據撈取支援闢謠與佐證紀錄保存</strong></p>\n<ol>\n<li>\n<p><strong>支援發言官闢謠</strong>：面對社群媒體流傳「停診、缺藥、拒收病人」之假訊息，資訊室須協助從未受損的備援資料庫中，撈取全院實際的病床數、物資與藥品庫存等正確數據。將這些真實資訊提供給公共事務/發言官，作為對外發布澄清新聞稿、反制假訊息的客觀依據。</p>\n</li>\n<li>\n<p><strong>保存佐證紀錄</strong>：妥善備份並保存系統當機期間的各項應變紀錄、通聯紀錄與資安通報資料，以利後續系統資料回補、檢討改善及應對潛在的醫療爭議。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭與空襲威脅，不僅實體空間可能受損，更極易伴隨敵方的國家級駭客攻擊或電信基礎設施癱瘓。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>資訊室</strong>主任擔任執行部門的<strong>「機構運作主管（O5）」</strong>，同時主導演習編組中的<strong>「資通簡報組」</strong>。資訊室的最高任務是建構戰時的「通訊韌性」，並在資訊系統癱瘓時引導全院切換至降級作業。</p>\n<p>面對防空疏散與 B1 備援空間的緊急開設，資訊室的具體因應作為如下：</p>\n<p><strong>一、 建立 B1 地下微型戰地醫院之資訊與通訊網</strong></p>\n<ol>\n<li>\n<p><strong>備援設備轉置</strong>：配合醫療空間降階防護，資訊室必須迅速將必要的電腦終端設備與網路設施，移轉並重新佈設於\n    B1 的五處備援功能區（檢傷行政區、臨時 ICU\n    病房、臨時開刀房、恢復室及輕症病房），以維持急診、檢驗、放射及病歷查詢等核心服務持續運作。</p>\n</li>\n<li>\n<p><strong>建構異質性戰術通訊網</strong>：地下室極易成為訊號死角，資訊室須協助建立備援通訊管道。若對外網路與市話中斷，須啟動備援通訊設備（如低軌衛星\n    OneWeb/Starlink 接收器），建立與外部主管機關（如衛福部）的關鍵連線。</p>\n</li>\n</ol>\n<p><strong>二、 斷網斷電下的「紙本降級（Downtime）」作業</strong>\n若空襲震波摧毀機房，或伴隨敵方網路攻擊（如 DDoS、勒索軟體）導致 HIS/PACS\n系統癱瘓，資訊室將面臨「資訊全黑」的極端危機：</p>\n<ol>\n<li>\n<p><strong>宣告系統當機與切換</strong>：資訊室須立即向指揮官回報，並對全院宣告進入「紙本降級模式（Downtime）」，通知各單位停止依賴電腦系統，改採人工作業。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：指導前線醫療與行政單位砸破並取出預先整備的<strong>「當機緊急箱（Downtime\n    Box）」</strong>，使用內含的三聯式紙本病歷、手寫處方箋、紙本檢傷單，並依靠離線列印的病患名冊維持醫療運作。</p>\n</li>\n<li>\n<p><strong>啟用傳令兵（Runner）機制</strong>：在通訊全斷的狀態下，配合行政單位啟動人工傳遞機制，以徒步方式在\n    B1 各醫療區之間精準遞送緊急開刀醫囑與檢驗危險值。</p>\n</li>\n</ol>\n<p><strong>三、 執行資安防禦與異地備援監控</strong></p>\n<ol>\n<li>\n<p><strong>防禦資安攻擊</strong>：戰時極可能伴隨惡意連線或異常登入。資訊室須監控網路流量，若發現疑似駭客攻擊，應立即執行資安事件分級、將受感染的網段進行物理隔離與阻斷，防止災情擴散至核心醫療系統。</p>\n</li>\n<li>\n<p><strong>啟動瑞光異地備援</strong>：確保設置於<strong>瑞光院區 7F</strong> 的異地備援機房（包含\n    PACS、HIS\n    主機與備份的儲存媒體）維持運作。若大連主院區機房遭戰火波及損毀，隨時準備由異地備援主機接手資料儲存與運算功能。</p>\n</li>\n</ol>\n<p><strong>四、 核心系統之資料備份與災後重置</strong></p>\n<ol>\n<li>\n<p><strong>機密資料保護</strong>：確保所有醫療系統最新資料皆已妥善完成離線備份，將備份硬碟交由指揮中心（如指揮官避難包）或存放於安全防護區，防範戰火中發生病歷資料遺失。</p>\n</li>\n<li>\n<p><strong>規劃復原順序</strong>：待空襲威脅解除或硬體修復後，資訊室須依據急診、藥局、檢驗、放射及掛號等核心業務的優先順序，逐步進行資訊系統的重置、網路搶修與離線紙本資料的電腦回補作業。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨震波破壞與關鍵基礎設施（CI）受損，可能導致全院陷入「又盲又啞」的資訊癱瘓危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>資訊室</strong>主任擔任執行部門的<strong>「機構運作主管（O5）」</strong>，其首要任務是維持資訊系統與必要通訊服務的不中斷或重置。</p>\n<p>面對電力瞬斷、通訊中斷與系統異常，資訊室的具體因應作為如下：</p>\n<p><strong>一、 應對電力瞬斷與死守機房備援電力（UPS 監控與安全關機）</strong></p>\n<ol>\n<li>\n<p><strong>監控備援電力</strong>：發生電力瞬斷時，資訊室值班人員須立即監控機房的不斷電系統（UPS）。電腦主機至少可依靠\n    UPS 供應 15 至 30 分鐘的運轉電力。</p>\n</li>\n<li>\n<p><strong>機房環境監控</strong>：配合工務室確認緊急發電機是否於 10至12\n    秒內成功供電給資訊機房，並密切檢查機房空調溫度是否有異常竄高的情形。</p>\n</li>\n<li>\n<p><strong>執行系統安全關機</strong>：若台電無法復電，且緊急發電機亦無法供電，當 UPS\n    電量低於 30%\n    時，為避免硬體毀損或資料遺失，資訊室須依序針對網路設備、醫療資訊系統（HIS）、影像儲傳系統（PACS）等主機執行緊急安全關機作業。</p>\n</li>\n</ol>\n<p><strong>二、 應對通訊中斷與建構「異質性戰術通訊網」</strong></p>\n<ol>\n<li>\n<p><strong>備援通訊架設</strong>：若常規電信網路或院內分機癱瘓，資訊室須協助架設與啟用異質性備援通訊設備（如低軌衛星電話、UHF/VHF\n    獨立頻段無線電），以維持指揮中心對內與對外的微弱但關鍵的連線。</p>\n</li>\n<li>\n<p><strong>總機人力支援</strong>：若發生重大通訊災情，資訊室人員應立即返院，增加臨時總機人力，負責協助電話轉接、回覆詢問及檢測各樓層電話線路是否正常。</p>\n</li>\n</ol>\n<p><strong>三、 宣告系統癱瘓並啟動「紙本降級（Downtime）」作業</strong>\n若伺服器或網路設備因震動受損，或面臨斷電超過半小時無法恢復，資訊室必須採取極限手段：</p>\n<ol>\n<li>\n<p><strong>宣告 Downtime\n    模式</strong>：由資訊室評估受影響範圍後，通知急診、門診、藥局、檢驗科、放射科及病歷室等單位，全面啟動「電腦當機應變機制」，改採人工作業。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：協助各單位轉入「紙本降級模式」，取出當機緊急箱（Downtime\n    Box）內的紙本病歷、手寫處方箋與離線列印的住院名單維持醫療運作。</p>\n</li>\n<li>\n<p><strong>配合傳令機制</strong>：在網路與通訊全斷下，配合計畫部啟動「傳令兵（Runner）」制度，以人工徒步方式遞送醫囑與檢驗報告。</p>\n</li>\n</ol>\n<p><strong>四、 防範複合型駭客攻擊與確保資料異地備援安全</strong></p>\n<ol>\n<li>\n<p><strong>資安隔離阻斷</strong>：戰時震波與爆炸可能伴隨敵方的網路攻擊（如分散式阻斷服務攻擊\n    DDoS、惡意程式或勒索軟體）。資訊室須透過網路流量監控，若發現異常連線或大量病毒感染，應立即將受感染網段之交換器拔除隔離，阻斷災情擴大。</p>\n</li>\n<li>\n<p><strong>異地資料保全</strong>：與狀況分析小組（P2）合作，確保所有現有的重要醫療數據與病歷資料，皆已安全備份至位於<strong>瑞光院區\n    7F 的異地備援電腦機房</strong>，維護資訊安全的核心機密性與完整性。</p>\n</li>\n</ol>\n<p><strong>五、 災後核心系統復原與歸建</strong></p>\n<ol>\n<li>\n<p><strong>系統開機與測試</strong>：待工務室恢復穩定供電或設備搶修完成後，資訊室復原分組須依據核心優先順序，逐一將核心交換器、網路設備、IBM\n    HIS 醫療資訊主機、PACS 主機及掛號系統重新開機。</p>\n</li>\n<li>\n<p><strong>通知復原</strong>：經過系統管理人員與使用單位代表測試無誤後，正式通知各臨床單位結束全院當機處理機制，恢復資訊化作業模式。</p>\n</li>\n</ol>\n<p>工務室如何確保醫療氣體與負載卸除的優先順序？</p>\n<p>資訊室在斷網時如何協助紙本降級與資料保全？</p>\n<p>若電力與水資源同時中斷，工務室有哪些極限替代方案？</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨大量病患的轉出與重置，確保「醫療資訊與病歷紀錄」的正確傳遞是病患安全接軌的命脈。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>病歷室</strong>與<strong>資訊室</strong>分別支援「計畫部門」與「執行部門」，肩負著病患動向追蹤、醫療文件隨行保全與資訊系統維持的核心任務。</p>\n<p>這兩個單位的具體因應作為如下：</p>\n<p><strong>一、 病歷室（支援計畫部門：文件紀錄小組 P3 / 狀況分析小組 P2）</strong></p>\n<p>面對病患的極速出院與大量轉院，病歷室必須確保醫療紀錄不中斷，其具體作為包含：</p>\n<ol>\n<li>\n<p><strong>執行病人動向登錄與追蹤</strong>：由病歷室依醫療科主任（或指揮中心）指示，負責大規模撤離下的病人動向登錄作業，確保病患不管是提早返家、下轉安置或轉送聯防醫院，皆能確認其確實完成重置，並與社工室及家屬保持資訊同步。</p>\n</li>\n<li>\n<p><strong>確保醫療紀錄與病歷「隨車轉移」</strong>：在病患離院重置時，病歷室（或由各單位書記）須統籌準備病人原先的相關醫療文件，包含病歷摘要、轉診單、藥物治療紀錄及檢驗報告，並確保這些資料確實與轉運的病人搭配，隨車移出交接給接收醫院，避免接收端發生醫療資訊斷鏈。</p>\n</li>\n<li>\n<p><strong>建立轉運文件與歷史紀錄保全</strong>：病歷室須確保每個轉運病患皆留下完整的轉出紀錄，包含：病人姓名、病歷號碼、接收醫院名稱、運送車輛資料，以及<strong>「病歷是否隨同運送的紀錄」</strong>。同時，須妥善保存留院病人的病歷及所有事件過程文件，確保其正確性與完整性，作為日後復原分析與法律備查的參考。</p>\n</li>\n</ol>\n<p><strong>二、 資訊室（支援執行部門：機構運作主管 O5）</strong></p>\n<p>資訊室主任在 HICS\n中擔任<strong>「機構運作主管（O5）」</strong>，在撤離行動中必須維持醫院的「數位神經系統」運作，其具體作為包含：</p>\n<ol>\n<li>\n<p><strong>維持核心系統不中斷以支援極速降載</strong>：在 4\n    小時內要極速清空並辦理大量病患出院、轉院，將產生極大的系統與列印負荷（如列印轉診單、病歷摘要與結帳單）。資訊室須全力維持\n    HIS（醫療資訊系統）、PACS（影像系統）及網路掛號批價系統的穩定運作，減少必要服務的中斷。</p>\n</li>\n<li>\n<p><strong>協調資訊與通訊設備的轉移</strong>：若醫院本體面臨重大危險需要將核心醫療服務外移重置，資訊室須協助評估並處理有關資訊主機、通訊設備的拆裝、遷移與重新架設申請。</p>\n</li>\n<li>\n<p><strong>確保資料異地備援與資安防護</strong>：與狀況分析組（計畫部門）合作，確保在撤離的混亂中，所有現有的重要醫療數據與系統資料都有安全備份與適當的異地保存，維護資訊安全（機密性、完整性、可用性）。</p>\n</li>\n<li>\n<p><strong>防範斷網並準備「紙本降級（Downtime）作業」</strong>：若撤離行動伴隨周邊基礎設施（如電信基地台）損毀或遭逢資安攻擊導致斷網，資訊室必須立即宣告啟動「當機應變措施」。通知各病房與急診單位砸破「當機緊急箱（Downtime\n    Box）」，全面改採人工紙本病歷、手寫處方箋與離線列印名單，確保在無電腦系統輔助下，病患的撤離分流與醫療交接依然能順利推進。</p>\n</li>\n</ol>\n<p>如何判定病人可返家或需高度照護？</p>\n<p>撤離時如何確保病歷與用藥紀錄隨行？</p>\n<p>急診室若同時湧入大量傷患該如何分流？</p>"}]}, {"role": "管理部", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報各項醫療與後勤量能。管理部在\nHICS（醫院事故指揮系統）中扮演穩定醫院營運、資金調度與人力／物資行政支援的關鍵後盾。其具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌「行政/財務部」指揮權</strong></p>\n<ol>\n<li>\n<p><strong>擔任行政/財務部長</strong>：管理部部長將擔任 HICS\n    編組下的<strong>「行政/財務部長（F0）」</strong>，負責統籌緊急應變所需之預算、行政、採購、保險、法律及紀錄等工作。</p>\n</li>\n<li>\n<p><strong>督導資金與行政業務</strong>：全面監督財務管理及資金進出的業務，確保戰時醫療整備有充足的經費與行政後盾。</p>\n</li>\n</ol>\n<p><strong>二、 執行人力盤點與召回調度（對接「人力」量能回報）</strong></p>\n<ol>\n<li>\n<p><strong>盤點與動員人力</strong>：由管理部轄下的人資室擔任<strong>「人事小組（F1）」</strong>，負責盤點全院現有員工狀況，並協調人員召回機制、輪替班表，以及志工與支援人力的集合調度。</p>\n</li>\n<li>\n<p><strong>提交人力數據</strong>：人事小組須將盤點完畢的精確人力數據，迅速提交給計畫部（資源控管組）與統籌呈報組（危管會），以利醫院於時限內向主管機關完成「人力量能」的初報與續報。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與供應商聯繫（對接「藥材、氣體」量能整備）</strong></p>\n<ol>\n<li>\n<p><strong>執行緊急採購</strong>：由轄下的採購室擔任<strong>「採購小組（F2）」</strong>，負責辦理戰時應變所需的緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>協調外部供應鏈</strong>：針對主管機關要求回報的醫療氣體、藥品與衛材量能，採購小組必須立即聯繫現有供應商與<strong>替代供應商</strong>，確認戰備物資的供貨穩定度及緊急調用機制，協助後勤部彌補物資缺口。</p>\n</li>\n</ol>\n<p><strong>四、 啟動緊急經費調度與法務支援</strong></p>\n<ol>\n<li>\n<p><strong>經費與加班結算</strong>：由轄下的會計室擔任<strong>「會計小組（F4）」</strong>，辦理緊急經費調度、各項應變費用支付，並確實記錄員工的加班給與及財務狀況。</p>\n</li>\n<li>\n<p><strong>法務與保密工作</strong>：由轄下的職安室擔任<strong>「法律訴求小組（F3）」</strong>，協助處理災時可能產生的法務問題、損害求償、申訴，並確保演習與戰時機密資料的保密工作。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息及掛號、批價、藥局、檢驗或影像系統出現延遲（疑似遭受資安攻擊大當機）」，<strong>管理部</strong>在\nHICS（醫院事故指揮系統）架構下扮演著後勤行政與資金的堅實後盾。由管理部部長擔任<strong>「行政／財務部長（F0）」</strong>，負責全面監督財務管理及資金進出業務，並統籌緊急應變所需之預算、行政、人事、採購、法律及紀錄等工作。</p>\n<p>面對此複合型危機，管理部及其統籌之轄下單位的具體因應作為如下：</p>\n<p><strong>一、 統籌行政與財務指揮（管理部部長）</strong></p>\n<ol>\n<li>\n<p><strong>接掌指揮權</strong>：管理部部長擔任行政/財務部長，參與應變行動計畫的準備與會議，確保所有行動計畫在財務預算範圍內，並訂立相關合約或協定。</p>\n</li>\n<li>\n<p><strong>緊急經費支持</strong>：在批價與帳務系統因大當機而癱瘓的狀況下，提供緊急災變必要之經費，並定時（每八小時）確認財務支出狀況，確保前線搶修與備援運作的資金不斷鏈。</p>\n</li>\n</ol>\n<p><strong>二、 緊急人力召回與輪替（人事小組／人資室）</strong></p>\n<ol>\n<li>\n<p><strong>支援紙本降級作業</strong>：因應各項資訊系統延遲，醫療前線必須全面啟動「紙本降級（Downtime）」與離線人工作業。人事小組須立即協調人員召回，並招募員工及志工至人力集合點報到。</p>\n</li>\n<li>\n<p><strong>儲備與強制輪替</strong>：將召回之人力交由待命區管理者運用，儲備足夠的醫療與非醫療人員（例如支援人工掛號或擔任傳遞紙本醫囑的「傳令兵」），並安排必要的人員輪替，避免前線同仁因高壓人工作業而過勞。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與替代方案（採購小組／採購室）</strong></p>\n<ol>\n<li>\n<p><strong>突破電子採購癱瘓</strong>：面對系統當機無法使用常規電子系統訂貨的困境，採購小組須立即辦理各項應變所需之緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>聯繫替代供應商</strong>：針對假訊息可能引發的民眾搶藥潮與物資消耗，迅速聯繫替代供應商，確保醫院的關鍵藥品、衛材與紙本表單等資源能維持穩定補給。</p>\n</li>\n</ol>\n<p><strong>四、 醫療爭議處理與個資保密（法律訴求小組／職安室）</strong></p>\n<ol>\n<li>\n<p><strong>處理申訴與求償</strong>：面對系統延遲造成的病患久候，以及假訊息（如拒收病人）引發的家屬不滿，法律訴求小組須協助處理法務問題、病人申訴，並接受與調查所有因事件引發的損害求償申請。</p>\n</li>\n<li>\n<p><strong>資安與機密保護</strong>：在疑似遭受資安攻擊，且全院大量啟用紙本病歷與手工檢驗單的混亂期間，必須協助確保病人個資及機密資料的保密工作，嚴防資料外洩。</p>\n</li>\n</ol>\n<p><strong>五、 經費調度與出勤紀錄（會計小組／會計室）</strong></p>\n<ol>\n<li>\n<p><strong>維持資金運作</strong>：辦理災變期間緊急必要之經費調度與各項應變費用之支付，確保醫院在帳務系統異常時仍能維持採購與營運。</p>\n</li>\n<li>\n<p><strong>人事成本與加班紀錄</strong>：確實記錄災變應變期間，所有被召回與留守支援「紙本降級作業」員工的出勤、差假與加班給與，並維護財務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透偵蒐、資源搶奪與群眾失控的安全危機。</p>\n<p>在\nHICS（醫院事故指揮系統）與演習架構下，<strong>管理部</strong>扮演著後勤行政支援、爭議防範與紀錄保全的決策樞紐。管理部部長擔任<strong>「行政/財務部長（F0）」</strong>，同時身兼演習編組中的<strong>「紀錄檢討與改善追蹤組」</strong>組長。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 統籌行政財務與防護物資調度（行政/財務部長 F0）</strong></p>\n<ol>\n<li>\n<p><strong>指揮應變行政中樞</strong>：管理部部長負責統籌緊急應變所需之預算、行政、採購、保險、法律及紀錄等所有行政財務工作。</p>\n</li>\n<li>\n<p><strong>督導緊急採購與付款</strong>：面對外部群眾推擠與防暴需求，管理部須督導轄下之採購小組（F2，採購室）與會計小組（F4，會計室），立即辦理實體阻絕設施（如拒馬、護欄）及封鎖期間留守人員所需緊急物資的採購與經費調度支付，確保防護行動的資金不斷鏈。</p>\n</li>\n</ol>\n<p><strong>二、 嚴防滲透與督導人力戰力保存（督導人事小組 F1）</strong></p>\n<ol>\n<li>\n<p><strong>嚴格查核支援人力</strong>：針對周邊不明人車與潛在的滲透威脅，管理部須督導人事小組（人資室）在協調人員召回、志工與支援人力集合時，落實極嚴格的身分查核，防範有心人士偽裝混入院區。</p>\n</li>\n<li>\n<p><strong>戰力保存與輪替</strong>：因應醫院實施門禁升級或防暴封鎖，督導人事室協調儲備足夠的醫療與非醫療人員，並安排被迫滯留院內人員的強制輪替與休息，避免前線員工因高壓威脅而身心崩潰。</p>\n</li>\n</ol>\n<p><strong>三、 防範醫療爭議與提供法務協助（督導法律訴求小組 F3）</strong></p>\n<ol>\n<li>\n<p><strong>處理拒絕庇護之衍生爭議</strong>：面對避難人潮，醫院為保全核心醫療量能勢必面臨拒絕非醫療需求民眾進入的艱難抉擇。管理部須督導法律訴求小組（職安室），協助處理因門禁管制或拒絕收容所引發的民眾申訴、衝突與潛在的損害求償。</p>\n</li>\n<li>\n<p><strong>機密資料保密與協助蒐證</strong>：協助確保應變期間各項機密資料的保密防護，避免遭外部無人機或有心人士偵蒐利用，並協助將蒐證資料妥善保全以利後續檢警調查。</p>\n</li>\n</ol>\n<p><strong>四、 執行現場蒐證保全與紀錄檢討（紀錄檢討與改善追蹤組長）</strong></p>\n<ol>\n<li>\n<p><strong>彙整蒐證與處置紀錄</strong>：管理部作為紀錄檢討與改善追蹤的主責單位，必須督導妥善保存所有通報紀錄、可疑無人機與不明人車的影像照片，以及各項處置的演習文件。</p>\n</li>\n<li>\n<p><strong>事後檢討與缺失追蹤</strong>：將事件發展過程、指揮中心的決策詳實記錄，並於事件或演習後彙整評核表、檢討報告及缺失改善追蹤表。針對門禁防護、巡守警戒與警消協防機制的執行概況進行檢討，以作為精進防護機制的依據。</p>\n</li>\n</ol>"}]}, {"role": "職安室", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與交通受阻的「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>職安室</strong>身兼二職，其主任同時擔任指揮組的<strong>「安全官（A2）」</strong>與財務/行政部的<strong>「法律訴求小組長（F3）」</strong>。面對資源短缺與就醫民眾可能產生的恐慌，職安室必須確保院內人員安全並防範潛在的醫療法律爭議。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 擔任「安全官（A2）」，監控危害與確保實體安全</strong></p>\n<ol>\n<li>\n<p><strong>評估物資匱乏之危害</strong>：安全官須持續監控因缺水、缺氧、缺藥及斷糧等極端狀況，對留守員工、病人及訪客所造成的潛在健康與安全危害。</p>\n</li>\n<li>\n<p><strong>監控留守人員安全與過勞</strong>：因外部交通受阻導致員工無法換班，安全官須密切監控第一線應變人員的身心負荷與安全狀況。若發現留守人員因過勞而出現嚴重的安全風險，必要時得隨時建議指揮官停止任何可能造成應變人員危害之行動。</p>\n</li>\n<li>\n<p><strong>提供安全決策建議</strong>：隨時向指揮官報告危害情況，並針對「孤島狀態」下的緊急替代方案（如無網作業、無電搬運等）提供安全上的專業建議。</p>\n</li>\n</ol>\n<p><strong>二、 防範醫療暴力與危機處理</strong></p>\n<ol>\n<li><strong>防範暴力滋擾</strong>：因物資短缺及病人轉送不確定性提高，極易引發病患及家屬的焦慮、恐慌，甚至演變為搶奪資源或醫療暴力。職安室須與負責安全管制的保安組密切合作，若發生暴力滋擾事件，職安室主管將編入關懷組，負責提供法律諮詢與協助處理。</li>\n</ol>\n<p><strong>三、 擔任「法律訴求小組（F3）」，處理爭議與求償</strong></p>\n<ol>\n<li>\n<p><strong>處理醫療爭議與申訴</strong>：因藥材、血液配送延遲或病人無法順利轉送，可能導致醫療處置遞延與病情變化，進而引發家屬不滿與醫療糾紛。法律訴求小組須協助處理相關法務問題與內部及外部的病人申訴。</p>\n</li>\n<li>\n<p><strong>損害求償調查</strong>：接受並調查所有因本次物資短缺或轉送延宕事件所引發的損害賠償申請。</p>\n</li>\n<li>\n<p><strong>資料保密與佐證保全</strong>：協助確保演習或真實應變期間各項機密資料、醫療處置紀錄的保密與保全，以利作為後續法律訴訟、調解或理賠之佐證依據。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨震波波及與基礎設施受損，可能引發火災、人員受困或傷亡等複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>職安室</strong>扮演著維護全院人員安全底線與處理後續法務理賠的關鍵角色。職安室主任身兼指揮組的<strong>「安全官（A2）」</strong>以及財務/行政部門的<strong>「法律訴求小組長（F3）」</strong>。</p>\n<p>面對此極端狀況，職安室的具體因應作為如下：</p>\n<p><strong>一、 擔任「安全官（A2）」：執行環境危害監控與擁有「中止權」</strong></p>\n<ol>\n<li>\n<p><strong>人員安全確認與危害監控</strong>：災難發生當下，職安室須第一時間確認員工、病人及訪客的安全，並持續監控因震波、漏水或電力異常可能引發的衍生危害（如漏電、墜落物或火勢擴大）。</p>\n</li>\n<li>\n<p><strong>提供安全建議與終止危險行動</strong>：負責給予指揮官安全上的專業建議；若評估現場的搶修或醫療行動（如涉水進行管線搶修、在結構受損區救援）可能對應變人員造成嚴重危害，安全官有權隨時建議停止該項危險行動，確保「救災人員自身安全」為最高原則。</p>\n</li>\n<li>\n<p><strong>安全檢核與管制區監測</strong>：完成應變期間的安全檢核、管制區劃分、中止條件設定，並對第一線參與應變的人員進行安全監測。</p>\n</li>\n</ol>\n<p><strong>二、 初期災情掌控與事故/火災調查協助</strong></p>\n<ol>\n<li>\n<p><strong>進駐中控室掌控災情</strong>：若遭遇等同五級以上有感地震之強烈震波，職安室主任應即至中控室掌控災情，向院長報告，並協同醫勤室、工務室指示全面巡邏院區。</p>\n</li>\n<li>\n<p><strong>火災原因調查</strong>：若周邊爆炸或震動引發院內真實火災，在火勢撲滅後，職安室須會同工務室派員，協助消防機關調查起火原因。</p>\n</li>\n<li>\n<p><strong>職業傷病登錄</strong>：若有員工因突發的震波跌倒、遭掉落物砸傷或於搶修過程中受傷，職安室在接獲發生單位通報後，須立即登錄通報職業傷病系統。</p>\n</li>\n</ol>\n<p><strong>三、 擔任「法律訴求小組長（F3）」：處理法務、申訴與損害求償</strong></p>\n<ol>\n<li>\n<p><strong>災損理賠與求償調查</strong>：負責接受並調查因震動、電梯停用受困或設施受損所引發之所有損害賠償申請。</p>\n</li>\n<li>\n<p><strong>法務與糾紛處理</strong>：協助處理災變期間內部及外部的申訴案件與衍生之法律問題。若事件涉及人員傷亡引發之爭議，職安室（法務）須協助後續的和解談判、調解與法律訴訟事宜。</p>\n</li>\n<li>\n<p><strong>機密資料防護</strong>：協助確保演習與真實災變應變過程中的資料保密作業，防止醫院的機敏災損資訊外洩。</p>\n</li>\n</ol>\n<p>若遭遇敵方駭客攻擊造成資訊系統癱瘓，該如何處理？</p>\n<p>說明在極端斷水斷電下，醫院如何執行負載卸除？</p>\n<p>若血庫存量見底，如何啟動走動式血庫進行活體捐血？</p>"}]}, {"role": "批價", "entries": [{"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息，且掛號、批價等各項資訊系統出現延遲（疑似遭受資安攻擊大當機）」，此為輿論恐慌與資訊癱瘓的複合危機。在\nHICS（醫院事故指揮系統）架構下，<strong>批價／掛號組</strong>在醫療前線分流、帳務應變與家屬安撫中扮演著關鍵的守門員角色。</p>\n<p>批價單位的具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」人工作業</strong></p>\n<ol>\n<li>\n<p><strong>切換離線作業</strong>：當接獲資訊室通知啟動「全院當機處理機制」後，門診批掛櫃檯與急診批掛櫃檯必須立即停止依賴癱瘓或延遲的電腦系統，全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：配合醫療前線啟用預先整備的「當機緊急箱（Downtime\n    Box）」，使用紙本表單、條碼貼紙與計算機進行人工掛號、批價與開立各項紙本檢驗欠繳紀錄單，以確保醫療程序能離線進行。</p>\n</li>\n</ol>\n<p><strong>二、 啟動「戰時記帳豁免機制」支援極速降載</strong>\n面對系統當機導致的流程嚴重阻塞，以及假訊息引發的就醫亂象，批價單位必須配合醫務部執行醫療服務降載，以騰出病床給急重症病患：</p>\n<ol>\n<li>\n<p><strong>極速結帳與離院</strong>：針對病房內評估可提早出院的穩定病患，批價組須協助於\n    4 小時內完成結帳與辦理出院手續。</p>\n</li>\n<li>\n<p><strong>記帳豁免（事後收費）</strong>：在資訊系統嚴重癱瘓或進入極端戰備狀態時，為求快速疏散輕症病患以騰出空間（Surge\n    Capacity），批價單位可配合指揮中心決策啟動<strong>「戰時記帳豁免機制，事後再收費」</strong>，讓病患能不因帳務卡關而迅速離院。</p>\n</li>\n</ol>\n<p><strong>三、 執行人工「病人動向資訊追蹤與登記」</strong>\n資訊系統當機將導致電子看板與追蹤系統失效，病患容易在混亂的急診與病房中失去蹤影。</p>\n<ol>\n<li>\n<p><strong>紙本登記與掛號</strong>：批價掛號組（在編組中亦隸屬於計畫部之狀況分析小組）須調派人員以人工方式詢問病人資料、製作紙本病歷、掛號並確實為病人戴上識別手圈。</p>\n</li>\n<li>\n<p><strong>人工動向追蹤</strong>：將病人的去向與動態確實登記於紙本名冊上，確保在無網狀態下，病人動向的訊息傳遞依然正確可靠，同時須遵照個資法規範進行必要的查證與個資保護。</p>\n</li>\n</ol>\n<p><strong>四、 第一線病人家屬詢答與闢謠溝通</strong></p>\n<ol>\n<li>\n<p><strong>安撫久候與恐慌情緒</strong>：面對因系統延遲而大排長龍的不滿民眾，以及受「停診、拒收病人」假訊息影響而焦急詢問的家屬，批價掛號櫃檯人員身處第一線，須肩負起家屬詢答的責任。</p>\n</li>\n<li>\n<p><strong>對接正確情資</strong>：主動向民眾說明當前的紙本降級替代流程，並透過人工動向追蹤系統協助家屬尋找病患。若遇到情緒極端激動的家屬，須立即協同社工人員介入安撫並聯繫警衛，防範急診或大廳發生醫療暴力衝突。</p>\n</li>\n</ol>"}]}]}, {"id": "safety_external", "name": "安全與對外聯繫", "roles": [{"role": "醫勤室保安組", "entries": [{"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之複合性危機（民眾恐慌湧入急診、搶購藥品、交通事故大量傷患及家屬施壓等），醫勤室保安組在\nHICS（醫院事故指揮系統）中擔任<strong>「安全管制組」</strong>（或安全防護與固守組）的關鍵角色。其首要任務是確保醫療核心區域不被恐慌群眾癱瘓，並保障前線醫護與傷患的人身安全。具體因應作為如下：</p>\n<p><strong>一、 實施嚴格門禁與出入管制</strong></p>\n<ol>\n<li>\n<p><strong>升級門禁管制</strong>：立即針對急診及院區非必要出入口實施嚴格的門禁管制措施，防止未配戴識別證之人員或恐慌民眾任意闖入醫療區域。</p>\n</li>\n<li>\n<p><strong>限制家屬與陪病人數</strong>：急診室為高風險場所，保安人員須嚴格執行出入管制與人員識別，限制家屬及陪病人數（原則上每床病人以\n    2\n    人為限），將要求住院或查詢資訊的無關家屬隔離於搶救區之外，避免急診動線遭癱瘓。</p>\n</li>\n</ol>\n<p><strong>二、 維持交通管制與救護車動線暢通</strong></p>\n<ol>\n<li>\n<p><strong>確保搶救動線</strong>：面對交通事故湧入的大量傷患及民眾搶購藥品引發的車潮，保安組必須強勢執行院區周邊與急診前方的交通管制。</p>\n</li>\n<li>\n<p><strong>引導救護車進出</strong>：驅離違停或閒雜車輛，專責引導救護車與外部支援單位車輛進出，確保重症傷患的運輸與急救通道絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 執行群眾秩序維護與防暴應變</strong></p>\n<ol>\n<li>\n<p><strong>現場秩序與高風險監控</strong>：加強急診室各區域的巡視（如每半小時巡邏），並透過中控室\n    24\n    小時監控全院各公共區域，隨時掌握現場安全狀況，辨識具有安全顧慮或情緒不穩的對象。</p>\n</li>\n<li>\n<p><strong>防暴與保護員工</strong>：若家屬或民眾因無法提早領藥、被拒絕住院而產生語言或肢體暴力，警衛應立即趕至現場，警告並制止其強暴脅迫行為，以保護醫護與員工安全。如遇滋事者發動實體攻擊，警衛得使用防衛工具進行適當防護與行動控制，但不得過當。</p>\n</li>\n</ol>\n<p><strong>四、 對接外部警力支援</strong></p>\n<ol>\n<li>\n<p><strong>啟動警民連線報案</strong>：若現場恐慌群眾滋擾嚴重、發生毆鬥或破壞行為，且抗爭無法立即平息時，保安組須立即啟動警民連線或撥打\n    110 報案，請求轄區警方（如民和派出所）前來支援。</p>\n</li>\n<li>\n<p><strong>警力接引與協同</strong>：負責接引前來支援的警消人員，並協助警方維持秩序、控制現場，確保正常醫療行為能持續運作。</p>\n</li>\n</ol>\n<p><strong>五、 現場蒐證與紀錄保存</strong></p>\n<ol>\n<li>\n<p><strong>即時蒐證</strong>：警衛在處理暴力滋擾或異常事件時，務必注意錄影、拍照與蒐證，以維護現場完整性不被破壞，並提供後續警方調查、損害求償或法律訴訟之舉證依據。</p>\n</li>\n<li>\n<p><strong>通報與紀錄備查</strong>：事件處理過程與處置情形，須詳細登記於當班的「警衛執勤紀錄簿」及「處理醫安事件報告表」中，並依院方規定向上通報。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況\n2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透偵蒐、資源遭搶奪與群眾失控的複合型安全危機。</p>\n<p>在\nHICS（醫院事故指揮系統）與城鎮韌性（CI）演習架構下，<strong>醫勤室保安組</strong>擔任<strong>「安全管制主管（O4）」</strong>及<strong>「安全防護與固守組」</strong>的核心主力。面對此嚴峻狀況，醫勤室保安組將啟動「駐警反制破壞演練」，其具體因應作為如下：</p>\n<p><strong>一、 啟動「硬邊界防護」與極限門禁管制（應對避難人潮與尋求物資者）</strong>\n為防範避難人潮湧入癱瘓醫療運作或搶奪物資，保安組必須阻絕非醫療需求的群眾：</p>\n<ol>\n<li>\n<p><strong>實體封鎖與動線縮減</strong>：立即封閉院區 80%\n    的出入口與側門，拉下防火鐵捲門，並架設充水式紐澤西護欄、蛇籠、拒馬，甚至以院方工程車橫停作為防衝撞的實體阻絕物。</p>\n</li>\n<li>\n<p><strong>設立單一檢傷武裝通道</strong>：全院僅保留急診車道作為唯一出入口，並設立由武裝警力與高階護理師共同站哨的「聯合檢查站（Check-point）」。執行嚴格的身分核對與武器搜查，強勢驅離非傷患或無關人員進入核心醫療區。</p>\n</li>\n</ol>\n<p><strong>二、 可疑目標辨識、攔查與反制（應對無人機與不明人車）</strong>\n針對疑似敵方或有心人士的偵蒐行為，保安組將提升巡守警戒級別：</p>\n<ol>\n<li>\n<p><strong>目標辨識與通報</strong>：落實可疑人車與無人機的辨識、攔查及通報機制，並隨時透過遠端監視系統掌握院區周邊動態。</p>\n</li>\n<li>\n<p><strong>反破壞武裝巡邏</strong>：針對醫院心臟地帶等關鍵基礎設施（CI），如地下室緊急發電機房、伺服器資訊機房、頂樓水塔及戶外液氧槽等，增設\n    24 小時雙人武裝與防暴裝備巡邏哨。</p>\n</li>\n<li>\n<p><strong>盤查與防爆防毒</strong>：巡邏哨配備金屬探測器與防爆毯，嚴格盤查院內可疑人士（包含穿著白袍的偽裝者），防範敵方第五縱隊（在地協力者）放置爆裂物、剪斷電纜或於水源投毒等破壞作為。</p>\n</li>\n</ol>\n<p><strong>三、 執行防暴鎖定（Lockdown）與現場蒐證（防範群眾暴動）</strong>\n若社區群眾因恐慌或欲搶奪物資（如抗生素、麻醉藥品）而演變為暴動衝闖：</p>\n<ol>\n<li>\n<p><strong>內部極速封鎖</strong>：保安組將迅速啟動內部封鎖（Lockdown），瞬間降下急診室防暴門並關閉全院電梯控制權。</p>\n</li>\n<li>\n<p><strong>死守安全隔離區</strong>：將急診醫護人員與重症病
