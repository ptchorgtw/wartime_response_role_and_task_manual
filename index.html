>\n<ol>\n<li>\n<p><strong>拒絕非醫療物資釋出</strong>：面對社區避難人潮索求物資，後勤部長須貫徹指揮官「資源優先保留給急重症與核心醫療」的決策。嚴格管制院內現有的飲水、膳食與備品，防範資源被非醫療需求耗竭。</p>\n</li>\n<li>\n<p><strong>保障前線員工供糧</strong>：勤務組須確保院內工作人員及現有病患的飲食與飲水供應。在極端防護狀態下，將高熱量補給與熱食絕對優先供應給身處高壓搶救前線的醫護及保安人員。</p>\n</li>\n</ol>\n<p><strong>四、 嚴格執行人員辨識與待命區管制（後勤部長 L0 / 任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>防範第五縱隊滲透</strong>：針對可疑無人機與不明人車的偵蒐行為（可能為敵方特工或在地協力者），後勤部長必須嚴格落實「人力資源召募與辨識」。所有被召回的員工、支援人力或志工，必須經過極其嚴格的身分核對與配發專屬識別（如反光背心、臂章），杜絕偽裝者混入破壞伺服器或發電機等關鍵設施。</p>\n</li>\n<li>\n<p><strong>待命區安全管理</strong>：任務支援組須將經過辨識的支援人力集中於安全的待命區，依據前線（如檢傷區或防暴區）的需求，精準且安全地進行人力與物資的配送調度。</p>\n</li>\n</ol>\n<p><strong>五、 設立「安全庇護所」與員工身心照顧（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>建置絕對安全的休息區</strong>：面對群眾暴動壓力與外部武裝威脅，前線醫護人員極易面臨心理崩潰與生理耗竭。任務支援組負責執行部門人員的身心照顧。須於大連院區結構最安全、最深層的地下室區域，設立「員工專屬庇護站」。</p>\n</li>\n<li>\n<p><strong>提供防護與恢復環境</strong>：在庇護所內提供熱食、飲水、行軍床等後勤資源，並會同安全管制組實施嚴格門禁。確保強制輪替下班的醫護人員能擁有一個「聽不到哀嚎聲、看不到鮮血」的絕對安靜環境，以利其恢復體力並接受心理急救（PFA），維持長期的醫療戰鬥力。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，此時醫院面臨極端的戰爭威脅，防空疏散與空間地下化成為首要任務。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）「後勤部長（L0）」</strong>，轄下包含<strong>「勤務組（L1）」</strong>與<strong>「任務支援組（L2）」</strong>。後勤部門必須在防空警報發布的極短時間內，將維持醫療運作的「糧草、彈藥與通訊」全數轉移至安全的地下空間。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 統籌物資地下化與開設「B1 戰略物資補給站」（後勤部長 L0 /\n任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>緊急轉移重要物資</strong>：任務支援主管（資材組長）須立即取得並儲存所有重要的醫療及非醫療設備、物資與藥品，將其由高脆弱區域轉移至安全的地下室。</p>\n</li>\n<li>\n<p><strong>開設 B1\n    專屬補給點</strong>：依據院方備援空間規劃，確實於<strong>「約翰／馬可大樓 B1\n    資材室」</strong>開設後勤物資補給點；並於<strong>「馬太大樓 B1\n    藥庫」</strong>開設藥品補給、緊急用藥調度與配送支援區，以支撐微型戰地醫院的運作。</p>\n</li>\n</ol>\n<p><strong>二、 支援 B1 五大醫療功能區之衛材與血品供應（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>急救物資與藥品配送</strong>：任務支援組必須主動將急救耗材、戰備物資及藥品，分派並推進至剛開設的\n    B1 五處功能區（包含檢傷行政區、臨時 ICU\n    病房、臨時開刀房、恢復室及輕症病房），以確保前線醫療量能不斷鏈。</p>\n</li>\n<li>\n<p><strong>血液與無菌器械支援</strong>：協調血庫進行緊急用血支援；並聯絡維持於韓偉大樓\n    3F 的供應室，進行中央無菌器械的緊急調度與配送說明。</p>\n</li>\n</ol>\n<p><strong>三、 確保地下室備援通訊與運輸調度（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>建立地下通訊網</strong>：地下室極易發生訊號死角。勤務主管（醫勤室/事務組長）須檢查所有手持與備援通訊設備，評估並分配無線電頻道給進入\n    B1\n    各功能區的指揮官與醫護人員，提供獨立雙向通訊系統，確保防空避難期間的指揮通訊暢通。</p>\n</li>\n<li>\n<p><strong>運輸載具調度</strong>：調度院內輪椅、擔架與推床，並向資源控管小組請求支援人員，協助將重症病患、維生儀器及物資從高樓層垂直疏散至\n    B1 避難區。</p>\n</li>\n</ol>\n<p><strong>四、 維持地下避難期間之膳食與飲水供應（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>啟動緊急供膳</strong>：在人員與病患大量疏散至地下室與大廳避難區的混亂狀態下，勤務組（會同營養室）必須確保工作人員、避難病患及家屬的飲食與飲水供應。</p>\n</li>\n<li>\n<p><strong>戰備存糧動用</strong>：視狀況動用營養室儲備之 3 至 7\n    天緊急乾糧與飲水，穩定避難區的人心與員工體力。</p>\n</li>\n</ol>\n<p><strong>五、 設立庇護所與員工身心照顧（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>防空避難下的人力調度</strong>：評估並管理待命區的支援人力，依據各 B1\n    醫療功能區的需求進行精準配送。</p>\n</li>\n<li>\n<p><strong>設立員工休息區</strong>：在防空威脅的高壓環境下，任務支援組負責執行部門人員的身心照顧。需依計畫於指定安全區域（如建議的恩慈\n    2F 運動中心或安全的 B1\n    空間）設立人員休息及生活支援區，提供輪班、用餐、飲水及待命的庇護環境，防範戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，此時醫院面臨極端的戰爭威脅，必須在極短時間內將核心醫療量能轉移至地下室以進行「空間降階防護」。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）「後勤部長（L0）」</strong>，其核心任務是確保防空疏散期間「糧草、彈藥與通訊」能全數安全轉移並支撐地下微型戰地醫院的運作。</p>\n<p>後勤部門及其轄下「勤務組（L1）」與「任務支援組（L2）」的具體因應作為如下：</p>\n<p><strong>一、 開設 B1 戰略物資與藥品補給站（任務支援組 L2 / 後勤部長 L0）</strong></p>\n<ol>\n<li>\n<p><strong>物資地下化與配置</strong>：任務支援主管（資材組長）須立即將重要醫療及非醫療設備、藥品，由高脆弱區域轉移至地下室安全區。依據院方備援空間規劃，確實於<strong>「約翰／馬可大樓\n    B1 資材室」</strong>開設後勤物資補給點；並於<strong>「馬太大樓 B1\n    藥庫」</strong>開設藥品補給、緊急用藥調度與配送支援區。</p>\n</li>\n<li>\n<p><strong>中央供應維持</strong>：聯繫維持於<strong>韓偉大樓 3F\n    的供應室</strong>，進行中央無菌器械的緊急調度與配送協調，以支援 B1\n    的手術需求。</p>\n</li>\n</ol>\n<p><strong>二、 支援 B1 五大醫療功能區之衛材與血品（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>前線急救物資推送</strong>：任務支援組必須主動將急救耗材、72小時戰備物資及藥品，分派並推進至剛開設的\n    B1 五處功能區（包含：約翰/馬可 B1 的檢傷行政區與臨時 ICU、韓偉 B1\n    的臨時開刀房與恢復室、路加 B1 的輕症病房），確保前線醫療量能不斷鏈。</p>\n</li>\n<li>\n<p><strong>血液調度</strong>：協調血庫進行緊急用血支援及血液資源調度，支撐臨時開刀房的戰傷搶救。</p>\n</li>\n</ol>\n<p><strong>三、 確保地下室備援通訊與運輸載具調度（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>建立地下通訊網</strong>：地下室極易發生訊號死角，勤務主管（事務組長/醫勤室）須檢查所有手持與備援通訊設備，分配無線電頻道給進入\n    B1\n    各功能區的指揮官與醫護人員，提供獨立雙向通訊系統，確保防空避難期間指揮通訊暢通。</p>\n</li>\n<li>\n<p><strong>垂直疏散運輸調度</strong>：盤點並調度院內推床、輪椅與軟擔架，協助醫療照護組將重症病患、維生儀器從高樓層安全且快速地垂直疏散至\n    B1 避難區。</p>\n</li>\n</ol>\n<p><strong>四、 維持防空避難期間之膳食與飲水供應（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>戰備存糧動用</strong>：在人員與病患大量疏散至地下室與大廳避難區的混亂狀態下，勤務組須會同營養室，動用預先儲備的\n    <strong>3 至 7 天緊急乾糧與飲水</strong>，穩定避難區的人心與員工體力。</p>\n</li>\n<li>\n<p><strong>供膳分配</strong>：確保所有迫降於 B1\n    工作的人員、避難病患及家屬能獲得基本的飲食與飲水供應。</p>\n</li>\n</ol>\n<p><strong>五、 設立「員工庇護所」與身心照顧（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>防空避難下的人力調度</strong>：評估並管理待命區的支援人力，依據各 B1\n    醫療功能區的搶救需求進行精準的人力配送。</p>\n</li>\n<li>\n<p><strong>設立員工休息與生活區</strong>：在防空威脅與地下室高壓環境下，任務支援組必須負責執行部門人員的身心照顧。依據計畫於指定區域（如建議的<strong>恩慈\n    2F 運動中心</strong>或安全的 B1\n    空間）設立人員休息及生活支援區，提供輪班、用餐、飲水及待命的庇護環境，防範醫護人員發生戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨戰傷病患洪流，醫療物資與後勤支援的消耗將達到極限。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>後勤部門（Logistics\nSection）「後勤部長（L0）」</strong>，其轄下的「勤務組（L1）」與「任務支援組（L2）」是支撐前線醫療搶救的「彈藥庫」與「生命線」。</p>\n<p>面對大量戰傷病患與急重症需求的暴增，後勤部門的具體因應作為如下：</p>\n<p><strong>一、 顛覆常規，啟動戰傷物資「主動盲派（Push）」（任務支援組 L2 /\n藥劑科 / 資材組）</strong></p>\n<ol>\n<li>\n<p><strong>推拉式物流（Push-Pull\n    Logistics）</strong>：在大量傷患湧入、急診與開刀房極度混亂的狀態下，平時的「填單申請（Pull）」與「及時供貨」模式將完全失效。藥劑科與供應中心必須化被動為主動，啟動戰鬥化物流。</p>\n</li>\n<li>\n<p><strong>戰備急救箱直送紅區</strong>：任務支援組（資材組）與藥局人員須將預先打包好的「戰傷急救箱（Trauma\n    Kits）」，內含戰術止血帶（CAT）、骨內血管通路設備（IO針）、止血紗布、廣效抗生素、大量林格氏液及強效麻醉鎮痛藥劑（如\n    Ketamine），不待前線申請，直接「盲派（Push）」推送至急診紅區與臨時開刀房門口，確保搶救醫師伸手就能拿到「救命子彈」。</p>\n</li>\n</ol>\n<p><strong>二、 支援極限輸血需求與啟動「走動式血庫」（任務支援組 L2 / 血庫）</strong></p>\n<ol>\n<li>\n<p><strong>緊急調度與求援</strong>：面對手術與急救暴增的用血需求，協助檢驗科血庫向捐血中心或緊急醫療網請求血液運補；若遇交通阻斷，則啟動與南部軍醫院的緊急血液橫向調度。</p>\n</li>\n<li>\n<p><strong>啟動院內活體血庫</strong>：若血庫 O\n    型血與血小板瞬間見底且面臨斷援絕境，須配合啟動北約軍醫常用的<strong>「走動式血庫（Walking\n    Blood\n    Bank）」</strong>。透過廣播緊急召集符合條件的院內同仁至指定地點，現場抽取全血、進行極簡快篩，並由傳令兵（Runner）以百米衝刺送入開刀房或急診紅區，直接輸入瀕死傷患體內。</p>\n</li>\n</ol>\n<p><strong>三、 執行戰術空間重構與載具調度（勤務組 L1 / 總務部）</strong></p>\n<ol>\n<li>\n<p><strong>大廳瞬間轉換為戰地急診</strong>：為應對急診空間爆滿，總務部須在 30\n    分鐘內迅速清空一樓門診大廳的候診椅與雜物，依紅、黃、綠、黑四色動線，將大廳轉換為「大量傷患檢傷區」與「輕傷縫合區」，有效阻絕恐慌的輕傷患進入重症區。</p>\n</li>\n<li>\n<p><strong>運輸載具集中</strong>：勤務組須迅速盤點並集中院內所有的救護車推床、輪椅和擔架，交由待命區管理者統一派發，以利將大量傷患從檢傷區快速推送至各治療區。</p>\n</li>\n<li>\n<p><strong>車輛調派</strong>：統籌調派院內救護車及行政運輸車（如中巴），支援輕症病患的疏散或重症病患的轉院後送。</p>\n</li>\n</ol>\n<p><strong>四、 建立備援通訊網（勤務組 L1）</strong>\n在大量傷患應變的混亂中，勤務組須檢查所有手持通訊設備，並分配專屬的無線電（UHF/VHF）頻道給急診、手術室及各樓層指揮官，提供獨立的雙向通訊系統，確保指揮體系在網路可能壅塞或中斷時仍能暢通。</p>\n<p><strong>五、 前線戰力之膳食供應與強制輪替庇護（任務支援組 L2 / 勤務組 L1 /\n營養室）</strong></p>\n<ol>\n<li>\n<p><strong>緊急供膳與飲水</strong>：由營養室會同勤務組，精算各急救區的工作人員數量，提供熱食、高熱量補給與飲水，維持急診與開刀房醫護人員的高強度戰鬥體力。</p>\n</li>\n<li>\n<p><strong>設立「安全庇護所」</strong>：在院內最安全的區域（如地下室）設立員工專屬庇護站，嚴格管制非工作人員進入。配合人事室執行「軍事化強制輪班機制」（如\n    12 小時一班），確保下班的醫護人員能在絕對安靜的環境中休息。</p>\n</li>\n<li>\n<p><strong>心理急救（PFA）支援</strong>：針對剛處理完大量血肉模糊傷患、面臨巨大壓力與道德撕裂的醫護團隊，配合「心理韌性特遣隊」在庇護站提供心理除頻（Debriefing）與情緒支持，防範醫療團隊爆發創傷後壓力症候群（PTSD）與戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，雖然基礎設施的實際搶修由執行部門（工務室、資訊室）負責，但<strong>後勤部門（Logistics\nSection）</strong>必須在背後提供所有必要的物資、通訊設備與民生支援，確保前線搶修與醫療運作不斷鏈。</p>\n<p>在本院\nHICS（醫院事故指揮系統）架構下，後勤部門由總務部部長擔任<strong>「後勤部長（L0）」</strong>，轄下分為<strong>「勤務組（L1）」</strong>與<strong>「任務支援組（L2）」</strong>。面對此複合型設施受損危機，其具體因應作為如下：</p>\n<p><strong>一、 統籌全院後勤支援與資源調度（後勤部長 L0）</strong></p>\n<ol>\n<li>\n<p><strong>整體物資與支援調度</strong>：由總務部部長擔任，負責管理並參與應變行動計畫中所有維持服務及事件所需支援之相關設備、物資、器材及人力之調度。</p>\n</li>\n<li>\n<p><strong>跨部門協調</strong>：與指揮官保持密切聯繫，配合工務室（設施運作主管）與資訊室（機構運作主管）的搶修需求，指示轄下小組全力提供支援。</p>\n</li>\n</ol>\n<p><strong>二、 因應通訊中斷與電梯停用之應變（勤務主管 L1）</strong>\n由醫勤室主任擔任，統籌事務組、運輸組與營養室，針對通訊與運輸癱瘓展開行動：</p>\n<ol>\n<li>\n<p><strong>分配備援通訊設備</strong>：面對電話與網路中斷，勤務主管須立即檢查所有手持通訊及對內/對外通訊設備，並負責分配專屬的無線電對講機（UHF/VHF）頻道給各樓層指揮官、急診與搶修團隊，提供獨立的雙向通訊系統。</p>\n</li>\n<li>\n<p><strong>緊急運輸與載具集中</strong>：因電力瞬斷導致電梯停用時，病患無法進行常規的垂直移動。勤務組須迅速盤點並集中院內所有的輪椅、擔架與救護推床，並向資源控管小組申請人力支援，以便在需要時以純人力方式透過樓梯搬運病患或搶修物資。</p>\n</li>\n</ol>\n<p><strong>三、 停水停電下之膳食與飲水維持（勤務主管 L1 / 營養室）</strong>\n面對可能因震動造成的管線破裂（漏水/停水）或電力異常，營養室必須啟動「膳食危機應變」：</p>\n<ol>\n<li>\n<p><strong>緊急飲水調度</strong>：若發生停水事件導致無乾淨水源可用，須立即對外購買或調度礦泉水與山泉水，以解決全院病患與前線搶修人員的基本飲水與膳食製備需求。</p>\n</li>\n<li>\n<p><strong>啟動緊急供餐機制</strong>：若停電無法立即恢復，導致廚房烹調設備與冷藏設備無法使用，營養室須聯絡緊急供應商（如嘉軒美食等）負責供膳，或啟用儲備之備用乾糧，確保工作人員與病患的飲食不斷炊。</p>\n</li>\n</ol>\n<p><strong>四、 緊急物資取得與支援調度（任務支援主管 L2）</strong>\n由資材組組長擔任，統籌資材、藥局與人力調度：</p>\n<ol>\n<li>\n<p><strong>應急物資與設備發配</strong>：針對停電、漏水與搶修需求，資材組須迅速取得並發配所有重要的醫療與非醫療物資（例如：緊急照明設備、手電筒、電池、沙包或吸水耗材）給各單位使用。</p>\n</li>\n<li>\n<p><strong>紙本降級下之物資盲派</strong>：在通訊與資訊系統癱瘓下，停止依賴電腦填單領物資。資材與藥庫人員須配合前線的緊急需求，主動將所需物資與急救箱推送（盲派）至需要的醫療區或待命區。</p>\n</li>\n<li>\n<p><strong>身心照顧與備援人力</strong>：協同人資與心理師，提供搶修人員與前線醫療人員的飲水、後勤補給及身心照顧，並協助調度待命人力投入搬運或跑腿傳令（Runner）任務。</p>\n</li>\n</ol>\n<p>保安室如何應對敵方破壞或投毒？</p>\n<p>在通訊中斷時，如何執行傳令兵機制？</p>\n<p>B1 備援醫療空間的具體配置與用途</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，在面臨大量病患撤離與轉院的極限挑戰下，HICS\n架構中的<strong>後勤部門（Logistics\nSection）</strong>扮演著確保疏散行動不斷鏈的關鍵支撐角色。</p>\n<p>後勤部門由總務部部長擔任<strong>「後勤部長（L0）」</strong>，轄下分為<strong>「勤務組（L1）」</strong>與<strong>「任務支援組（L2）」</strong>，負責統籌全院物資、器材、人力、交通、藥品支援與維生物資調度。其具體因應作為如下：</p>\n<p><strong>一、 啟動緊急運輸調度與設立接運區（勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>車輛徵用與調度</strong>：統籌本院所有運輸車輛（包含救護車、中型巴士及行政車輛）的調派作業，安排交通工具協助病人疏散與重置。若院內車輛不足，須配合聯絡官向外部聯合應變中心請求救護車或大眾運輸工具（接駁車）支援。</p>\n</li>\n<li>\n<p><strong>規劃接運疏散區</strong>：配合安全管制組與醫療照護組，建立明確的車輛轉運接駁點，例如：救護車以急診室大門出口為接運疏散區，私人車輛以恩慈大樓旁車道為接運區，接駁車以門診大廳出口為接運區，以分流不同嚴重程度的病患。</p>\n</li>\n</ol>\n<p><strong>二、 集中搬運載具與人力支援（後勤部長 L0 / 勤務組 L1）</strong></p>\n<ol>\n<li>\n<p><strong>集結搬運載具</strong>：迅速盤點並集中院內所有的輪椅、擔架、救護推床與樓梯疏散滑墊（軟擔架），將這些運輸設備統一送至病房區或急診待命區，供前線醫護人員調度使用。</p>\n</li>\n<li>\n<p><strong>投入搬運人力</strong>：在大量病患移出的過程中，總務部等後勤編組人員必須親自投入前線，協助護理人員執行病患的平行轉移或樓梯垂直搬運作業。</p>\n</li>\n</ol>\n<p><strong>三、 整備「隨車醫療物資」與藥品補給（任務支援組 L2）</strong></p>\n<ol>\n<li>\n<p><strong>戰備物資隨行</strong>：針對被判定為「高度照護」或「一般住院」的轉院病患，任務支援主管（資材與藥庫主管）必須準備足夠量的急救藥物、靜脈輸液、血液製品及相關衛材。這些物資<strong>必須與病人一起運送</strong>到重置區或接收醫院，以避免在轉送過程中或剛抵達接收醫院時，發生醫藥存量短時間內耗竭的致命危機。</p>\n</li>\n<li>\n<p><strong>裝備轉移支援</strong>：協助評估與提供病患離院重置時所必需的醫療裝備（如可攜式生理監視器、氧氣鋼瓶等），確保高風險病患轉運過程的維生需求。</p>\n</li>\n</ol>\n<p><strong>四、 維護疏散行動之通訊韌性（勤務組 L1）</strong>\n在撤離的混亂過程中，通訊暢通是車輛調度與病患交接的命脈。勤務主管須檢查所有手持對內與對外通訊設備，並分配專屬的無線電對講機與頻道給疏散指揮官、車輛調度人員、各樓層及急診轉送區，提供獨立的雙向通訊系統，並隨時向後勤組長報告通訊狀況。</p>\n<p><strong>五、 提供膳食與維生支援（任務支援組 L2 / 營養室）</strong>\n在撤離行動期間，負責為等候撤離的病人、家屬，以及執行高強度疏散與搬運任務的醫療和後勤員工，提供基本的飲用水、乾糧及膳食補給，維持應變人員的體力與病患的基本生理需求。</p>\n<p>高度照護病人如何執行垂直疏散？</p>\n<p>撤離時的「反向檢傷」判斷標準為何？</p>\n<p>如何協調聯防醫院接收轉診病人？</p>"}]}, {"role": "財務/行政部門（Finance/Administration Section）", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，接獲主管機關要求限時回報各項量能並進入戰時醫療整備之指令後，<strong>行政/財務部（Finance/Administration\nSection）</strong>在\nHICS（醫院事故指揮系統）中扮演穩定醫院營運、資金調度、人力召募與物資行政採購支援的關鍵後盾。其具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌「行政/財務部」指揮權</strong></p>\n<ol>\n<li>\n<p><strong>成立行政/財務部</strong>：由管理部部長擔任 HICS\n    編組下的<strong>「行政/財務部長（F0）」</strong>。</p>\n</li>\n<li>\n<p><strong>統籌應變業務</strong>：行政/財務部長負責統籌緊急應變所需之財務、預算、行政、採購、保險、法律及紀錄等工作，並全面監督財務管理及資金進出的業務，確保醫院戰時醫療整備有充足的經費與行政資源作為後盾。</p>\n</li>\n</ol>\n<p><strong>二、 執行人力盤點與召回調度（對接主管機關「人力」量能回報）</strong></p>\n<ol>\n<li>\n<p><strong>盤點與動員人力</strong>：由人力資源室主任擔任轄下的<strong>「人事小組長（F1）」</strong>。人事小組負責協調全院人員的召回機制、輪替班表，以及志工與支援人力的集合調度。</p>\n</li>\n<li>\n<p><strong>對接量能回報與前線支援</strong>：人事小組須精確掌握全院現有與可動員之人力數據，協調招募員工及志工至人力集合點，並儲備足夠的醫療及非醫療人員以供「待命區管理者」調度運用，確保前線有必要的人員輪替。相關人力盤點數據也須對接給統籌呈報組（危管會）及計畫部，以利於時限內向主管機關完成「人力」量能的呈報。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與供應鏈聯繫（對接「藥材、醫療氣體」量能整備）</strong></p>\n<ol>\n<li>\n<p><strong>執行緊急採購</strong>：由採購室主任擔任轄下的<strong>「採購小組長（F2）」</strong>。負責辦理戰時應變期間所需的各項緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>確保戰備物資供應鏈</strong>：針對主管機關要求回報的醫療氣體與藥材等物資，採購小組必須立即聯繫現有供應商與<strong>替代供應商</strong>，協調廠商緊急調度所需要的資材。透過建立多元供應管道，協助後勤部彌補戰略物資的缺口。</p>\n</li>\n</ol>\n<p><strong>四、 啟動緊急經費調度與法務支援</strong></p>\n<ol>\n<li>\n<p><strong>經費調度與加班結算</strong>：由會計室主任擔任轄下的<strong>「會計小組長（F4）」</strong>。負責辦理緊急災變必要之經費調度、各項應變費用支付，並確實記錄災變期間員工的出勤、差假、加班給與及財務狀況。</p>\n</li>\n<li>\n<p><strong>法務與保密工作</strong>：由職安室主任擔任轄下的<strong>「法律訴求小組長（F3）」</strong>。負責協助處理災時可能產生的法務問題、申訴，並接受與調查所有損害賠償之申請，同時須確保演習與戰時機密資料的保密工作。</p>\n</li>\n</ol>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」等複合性危機，急診與醫療前線面臨極大的人力與物資耗損。在\nHICS（醫院事故指揮系統）架構下，<strong>行政/財務部門（Finance/Administration\nSection）</strong>作為穩定醫院營運與後勤支援的關鍵後盾，須迅速啟動以下具體因應作為：</p>\n<p><strong>一、 統籌行政與財務應變指揮（行政/財務部長）</strong></p>\n<ol>\n<li>\n<p><strong>接掌指揮權：</strong>\n    由管理部部長擔任行政/財務部長（F0），統籌緊急應變所需之預算、行政、採購、保險、法律及紀錄等工作。</p>\n</li>\n<li>\n<p><strong>監督資金與行政支援：</strong>\n    全面監督財務管理及資金進出業務，確保前線應對大量傷患與恐慌人潮時，擁有充足的經費與行政資源作為後盾。</p>\n</li>\n</ol>\n<p><strong>二、 啟動緊急人力召回與輪替（人事小組）</strong>\n面對急診癱瘓危機，前線急需大量醫療與行政人力支援：</p>\n<ol>\n<li>\n<p><strong>執行緊急召回：</strong>\n    由人資室主任擔任人事小組長（F1），立即協調全院人員的召回機制，並啟動志工與外部支援人力的集合調度。</p>\n</li>\n<li>\n<p><strong>調派人力至待命區：</strong>\n    將召回之醫師、護理師、保全與行政人員，迅速派往「待命區（由行政支援中心管理）」，以供執行部調度至急診檢傷區、戶外領藥區或家屬安置區進行支援。</p>\n</li>\n<li>\n<p><strong>安排強制輪替班表：</strong>\n    針對面臨極大壓力的急診前線人員，規劃與協調足夠的輪替班表，避免醫護人員因過度負荷而發生戰鬥疲勞或崩潰。</p>\n</li>\n</ol>\n<p><strong>三、 執行緊急採購與供應商調度（採購小組）</strong>\n針對民眾搶購慢性病藥品及交通事故造成急救耗材大量消耗：</p>\n<ol>\n<li>\n<p><strong>啟動物資緊急調用：</strong>\n    由採購室主任擔任採購小組長（F2），立即辦理戰時或災變期間所需的各項緊急採購。</p>\n</li>\n<li>\n<p><strong>聯繫替代供應商：</strong>\n    針對庫存告急的慢性病藥物及戰傷急救耗材，迅速聯繫現有供應商與替代供應鏈，協調廠商緊急調度並加速運補，以彌補後勤物資缺口。</p>\n</li>\n</ol>\n<p><strong>四、 處理申訴與醫療爭議（法律訴求小組）</strong>\n面對家屬因無法提早領藥或被拒絕住院（因反向檢傷）而產生的不滿與恐慌：</p>\n<ol>\n<li>\n<p><strong>協助法務與申訴處理：</strong>\n    由職安室主任擔任法律訴求小組長（F3），協助處理災時可能產生的法務問題、家屬申訴及潛在的醫療糾紛。</p>\n</li>\n<li>\n<p><strong>損害求償調查：</strong>\n    若恐慌群眾在急診引發暴力滋擾，導致人員受傷或設備毀損，法律訴求小組須接受並調查所有損害賠償之申請，保障醫院與員工的合法權益。</p>\n</li>\n</ol>\n<p><strong>五、 緊急經費調度與加班結算（會計小組）</strong></p>\n<ol>\n<li>\n<p><strong>確保緊急資金：</strong>\n    由會計室主任擔任會計小組長（F4），辦理緊急災變必要之經費調度與各項應變費用支付，確保採購與後勤調度不受資金卡關影響。</p>\n</li>\n<li>\n<p><strong>記錄員工出勤與財務：</strong>\n    確實記錄災變期間所有被召回與留守加班員工的出勤、差假與加班給與，並維持醫院財務狀況之正確紀錄。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息及掛號、批價、藥局、檢驗或影像系統出現延遲」，此危機涉及假訊息引發的恐慌以及醫療資訊系統大當機（疑似遭受資安攻擊）。在\nHICS（醫院事故指揮系統）架構下，<strong>行政/財務部（Finance/Administration\nSection）</strong>由管理部部長擔任行政/財務部長（F0），負責全面監督財務管理及資金進出業務，並統籌緊急應變所需之預算、行政、採購、保險、法律及紀錄等工作，為前線切換至無網作業提供後盾。</p>\n<p>其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 人事小組（F1 / 人力資源室主任擔任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急人力召回與調度</strong>：因應各項資訊系統延遲或癱瘓，醫療前線必須全面啟動「紙本降級（Downtime）」與離線人工作業，人事小組須立即協調人員召回機制，並協調招募員工及志工至人力集合點報到。</p>\n</li>\n<li>\n<p><strong>儲備前線人力與強制輪替</strong>：將召回之人力交由「待命區管理者」調度，儲備足夠的醫療與非醫療人員以支援前線繁重的人工掛號、批價與擔任「傳令兵（Runner）」傳遞紙本醫囑。同時須安排必要的人員強制輪替，避免員工因高壓作業而過勞。</p>\n</li>\n</ol>\n<p><strong>二、 採購小組（F2 / 採購室主任擔任）</strong></p>\n<ol>\n<li>\n<p><strong>啟動緊急採購與物資調用</strong>：針對假訊息（如缺藥）可能引發的民眾搶藥潮，以及系統當機期間無法使用常規電子系統訂貨的困境，採購小組須立即辦理緊急採購與各項行政物資調用。</p>\n</li>\n<li>\n<p><strong>聯繫替代供應商</strong>：迅速聯繫現有及替代供應商，確保在資通訊系統異常時，醫院的關鍵藥品、衛材與紙本表單等資源仍能維持穩定補給。</p>\n</li>\n</ol>\n<p><strong>三、 法律訴求小組（F3 / 職安室主任擔任）</strong></p>\n<ol>\n<li>\n<p><strong>處理醫療爭議與申訴</strong>：面對系統延遲造成的病患久候、醫療處置遞延，以及假訊息（如拒收病人）可能引發的家屬不滿與衝突，法律訴求小組須協助處理法務問題、病人申訴，並接受與調查所有因事件引發的損害賠償申請。</p>\n</li>\n<li>\n<p><strong>確保機密與個資保護</strong>：在疑似遭受資安網路攻擊，且全院大量啟用紙本病歷與手寫檢驗單的混亂期間，必須協助確保病人個資及演習/機密資料的保密工作，防範資料外洩。</p>\n</li>\n</ol>\n<p><strong>四、 會計小組（F4 / 會計室主任擔任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急經費調度與支付</strong>：在批價與帳務系統出現延遲甚至癱瘓的狀況下，會計小組須設法辦理緊急災變必要之經費調度、各項應變費用之支付，確保緊急採購與後勤運作不受資金卡關影響。</p>\n</li>\n<li>\n<p><strong>記錄員工出勤與加班</strong>：確實記錄災變應變期間，所有被召回與留守支援「紙本降級作業」員工的出勤、差假與加班給與，並確保醫院財務與帳務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨物資極度匱乏與交通受阻的「孤島效應」危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）</strong>由管理部部長擔任行政/財務部長（F0），負責統籌緊急應變所需之預算、行政、採購、人事、保險、法律及紀錄等工作，為前線撐過物資與人力危機提供堅實後盾。</p>\n<p>其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 人事小組（F1 / 人資室主任擔任）：因應員工到勤受交通影響</strong></p>\n<ol>\n<li>\n<p><strong>就近緊急召回與志工招募</strong>：面對員工因交通受阻無法到勤的人力缺口，人事小組須啟動緊急召回機制，<strong>優先召回居住於屏東市區附近、未受交通阻斷影響的同仁</strong>回院支援。同時協調招募員工及志工至人力集合點報到，以供待命區管理者運用。</p>\n</li>\n<li>\n<p><strong>滯留人力管理與強制輪替</strong>：針對受困院內、無法下班的醫護與行政人員，人事小組須與後勤部協調，儲備足夠的醫療與非醫療人力，並<strong>安排必要的人員強制輪替與休息</strong>，避免前線人員因長期高壓與無法換班而發生戰鬥疲勞。</p>\n</li>\n</ol>\n<p><strong>二、 採購小組（F2 / 採購室主任擔任）：突破物資配送延遲</strong></p>\n<ol>\n<li>\n<p><strong>啟動緊急採購與在地調用</strong>：面對燃油、醫療氣體、藥材、膳食及飲水等常規配送延遲或中斷，採購小組必須立即辦理緊急採購與各項應變物資之調用。</p>\n</li>\n<li>\n<p><strong>緊急聯繫替代供應商</strong>：迅速<strong>聯繫替代供應商或在地廠商</strong>，尋求不受長途交通中斷影響的資源補給（例如就近向本院便利商店或周邊合約廠商調度飲水、膳食），確保醫院的基本維生與醫療物資能維持供給。</p>\n</li>\n</ol>\n<p><strong>三、 會計小組（F4 / 會計室主任擔任）：資金支持與超時紀錄</strong></p>\n<ol>\n<li>\n<p><strong>緊急經費調度與支付</strong>：為了支持採購小組向替代廠商購買緊急物資、糧食或備用器材，會計小組須負責辦理災變期間緊急必要之<strong>經費調度與各項應變費用之支付</strong>，確保醫院的搶修與採購資金不斷鏈。</p>\n</li>\n<li>\n<p><strong>記錄員工出勤與加班</strong>：確實記錄應變期間所有被緊急召回、以及因交通受阻而被迫留守院內超時工作之員工的<strong>出勤、差假與加班給與</strong>，維護財務與帳務紀錄的正確性。</p>\n</li>\n</ol>\n<p><strong>四、 法律訴求小組（F3 / 職安室主任擔任）：應對轉送延遲衍生之爭議</strong></p>\n<ol>\n<li>\n<p><strong>處理申訴與醫療爭議</strong>：因物資匱乏及病人轉送不確定性提高（重症病患可能被迫滯留院內），極易引發病患及家屬的焦慮、不滿與醫療糾紛。法律訴求小組須<strong>協助處理法務問題、接受病人申訴</strong>，並防範可能引發的醫療暴力與衝突。</p>\n</li>\n<li>\n<p><strong>處理損害求償</strong>：接受並調查所有因物資短缺或轉送延遲等事件引發的損害求償申請。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨極高的實體安全威脅（如敵方滲透破壞）、資源搶奪風險以及群眾恐慌失控的危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）</strong>由管理部部長擔任「行政/財務部長（F0）」，負責統籌緊急應變所需之預算、行政、採購、人事、保險、法律及紀錄等工作。面對此等混亂與封鎖狀態，財務/行政部門的具體因應作為如下：</p>\n<p><strong>一、 處理拒絕庇護之醫療爭議與證據保全（法律訴求小組 F3 /\n職安室主任）</strong>\n面對避難人潮湧入，醫院為保全急重症醫療量能，勢必面臨「拒絕非醫療需求民眾進入」的艱難抉擇，這極易引發群眾不滿與後續的法律糾紛。</p>\n<ol>\n<li>\n<p><strong>處理申訴與法務問題</strong>：法律訴求小組須協助處理因門禁管制、拒絕收容或資源分配所引發的民眾申訴與潛在法律損害求償。</p>\n</li>\n<li>\n<p><strong>機密保全與蒐證協助</strong>：針對周邊可疑無人機或不明人車的偵蒐行為，必須協助確保院內機密資料（如病患個資、戰備物資清單）的保密防護。同時，指導或協助保全人員妥善保存相關影像與蒐證資料，以利後續提供給警政、檢調單位作為防諜與刑事調查之佐證。</p>\n</li>\n</ol>\n<p><strong>二、 嚴格身分辨識與封鎖下的人力輪替（人事小組 F1 / 人資室主任）</strong>\n面對不明人車與潛在的「第五縱隊（在地協力者）」滲透威脅，人員進出的身分管制將提升至最高級別。</p>\n<ol>\n<li>\n<p><strong>嚴格查核支援人力</strong>：在協調人員召回與志工招募至人力集合點時，人事小組必須實施極其嚴格的身分辨識與核對，防範有心人士偽裝成醫護或志工混入機房等關鍵設施進行破壞。</p>\n</li>\n<li>\n<p><strong>強制輪替與戰力保存</strong>：因應醫院實施「硬邊界」或內部封鎖（Lockdown），大量員工可能被迫滯留院內無法下班。人事小組須與後勤部協調，儲備足夠的醫療與非醫療人力，並安排滯留人員的強制輪班與輪替，避免前線員工因高壓防護與暴動威脅而身心崩潰。</p>\n</li>\n</ol>\n<p><strong>三、 啟動防護阻絕物資之緊急採購（採購小組 F2 / 採購室主任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急採購防護設備</strong>：面對外部群眾推擠與不明車輛威脅，執行部（保安組）急需實體阻絕設施。採購小組須立即辦理緊急採購，獲取防衝撞紐澤西護欄、蛇籠、鐵馬或相關防暴物資。</p>\n</li>\n<li>\n<p><strong>留守物資調用</strong>：在群眾包圍導致常規物流無法進入時，緊急聯繫替代供應商，就近調用能支撐留守員工與病患的緊急膳食與飲水。</p>\n</li>\n</ol>\n<p><strong>四、 緊急經費調度與超時紀錄（會計小組 F4 / 會計室主任）</strong></p>\n<ol>\n<li>\n<p><strong>經費調度與支付</strong>：為支援採購小組獲取防暴物資或緊急膳食，會計小組須辦理災變期間緊急必要之經費調度與費用支付，確保防護行動資金不斷鏈。</p>\n</li>\n<li>\n<p><strong>加班與出勤紀錄</strong>：確實記錄因醫院封鎖而被迫超時留守、或被緊急召回參與防護與醫療應變員工的出勤、差假與加班給與，以維護同仁權益及財務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，此時醫院面臨極端的戰爭威脅，必須在極短時間內進行大面積的「空間降階防護」，將核心醫療轉移至地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）「行政/財務部長（F0）」</strong>，負責統籌緊急應變所需之預算、行政、採購、保險、法律及紀錄等工作。面對防空疏散與\nB1 備援空間的緊急開設，財務/行政部門的具體因應作為如下：</p>\n<p><strong>一、 統籌防空避難之行政與資金支援（行政/財務部長 F0）</strong></p>\n<ol>\n<li>\n<p><strong>指揮應變行政中樞</strong>：管理部部長負責監督與統籌防空避難期間所需的所有行政與財務工作。</p>\n</li>\n<li>\n<p><strong>確保地下醫療運作資金</strong>：督導轄下採購與會計小組，確保 B1\n    備援醫療空間（檢傷行政區、臨時\n    ICU、臨時開刀房、恢復室及輕症病房）開設與運作所需的緊急資金調度無虞。</p>\n</li>\n</ol>\n<p><strong>二、 防空疏散下的人力盤點與強制輪替（人事小組 F1 / 人資室主任）</strong></p>\n<ol>\n<li>\n<p><strong>地下室人力集結與調度</strong>：在防空警報發布後，人事小組須協調招募員工、支援人力與志工至指定的\n    B1 人力集合點，以供待命區管理者（行政支援中心）精準派往 B1\n    的五大功能區運用。</p>\n</li>\n<li>\n<p><strong>戰力保存與輪休管理</strong>：在防空威脅與封鎖的高壓環境下，為維持「微型戰地醫院」的運作，人事小組須儲備足夠的醫療與非醫療人員，並安排滯留於\n    B1 避難區人員的強制輪替與休息，防範員工因恐慌與過勞而產生戰鬥疲勞。</p>\n</li>\n</ol>\n<p><strong>三、 B1 備援空間防護與維生物資之緊急採購（採購小組 F2 / 採購室主任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急採購與調用</strong>：為支援 B1\n    備援空間的開設，若發現防護設備、臨時照明、備用行軍床或急救衛材不足，採購小組須立即辦理緊急採購，或聯繫不受空襲影響的替代供應商與聯防醫院進行物資調用。</p>\n</li>\n<li>\n<p><strong>確保資源不斷鏈</strong>：在空襲威脅下，常規物流極可能中斷，採購小組須會同後勤部，設法取得能支撐\n    B1 員工與病患躲避空襲所需之緊急乾糧與飲水。</p>\n</li>\n</ol>\n<p><strong>四、 疏散意外之醫療爭議處理與機密保全（法律訴求小組 F3 /\n職安室主任）</strong></p>\n<ol>\n<li>\n<p><strong>處理疏散衍生之爭議</strong>：在緊急垂直疏散重症病患至\n    B1（尤其是無動力搬運）的混亂過程中，極易發生病患病情惡化或意外受傷。法律訴求小組須協助處理因疏散、降載或資源排擠所引發的家屬申訴與損害求償。</p>\n</li>\n<li>\n<p><strong>演習與機密資料保密</strong>：協助確保防空疏散期間，各項病歷資料與醫院機密文件的保密與安全，防範混亂中發生個資外洩。</p>\n</li>\n</ol>\n<p><strong>五、 災變期間之緊急經費調度與出勤紀錄（會計小組 F4 / 會計室主任）</strong></p>\n<ol>\n<li>\n<p><strong>緊急費用支付</strong>：辦理因應空襲避難與開設 B1\n    功能區所衍生之各項緊急經費調度與費用支付。</p>\n</li>\n<li>\n<p><strong>超時與危險出勤紀錄</strong>：確實記錄因防空警報而被迫滯留於 B1\n    空間超時工作，或被緊急召回參與地下醫療搶救員工的出勤、差假與加班給與，以確保員工權益與財務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況 2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用 B1\n備援醫療空間及五處功能區」，此時醫院面臨戰時醫療整備與防空疏散的極端壓力。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）</strong>由管理部部長擔任行政/財務部長（F0）。其主要任務是確保在防空避難與備援醫療空間開設期間，醫院的行政、人力、資金與法務支援能維持運作。</p>\n<p>其轄下各組的具體因應作為如下：</p>\n<p><strong>一、 統籌防空避難之行政與資金支援（行政/財務部長 F0）</strong>\n由管理部部長擔任，負責統籌防空疏散與啟用 B1\n備援醫療空間期間，所需之緊急應變預算、行政、採購、保險、法律及紀錄等全般事務。確保地下微型戰地醫院在運作時，財務與行政後勤不斷鏈。</p>\n<p><strong>二、 疏散人力集結與戰力輪休管理（人事組 F1）</strong> 由人資室主任負責。</p>\n<ol>\n<li>\n<p><strong>人力召回與集結</strong>：協調人員召回、志工與支援人力集合，以便後續將人力精準派往\n    B1 的五大功能區（檢傷行政區、臨時 ICU\n    病房、臨時開刀房、恢復室、輕症病房）進行醫療救援與行政作業。</p>\n</li>\n<li>\n<p><strong>戰力輪替</strong>：在防空威脅與地下室高壓環境下，強制安排醫療與非醫療人員的輪替與休息，防範員工因恐慌與高壓而產生戰鬥疲勞。</p>\n</li>\n</ol>\n<p><strong>三、 備援空間防護物資之緊急採購（採購組 F2）</strong> 由採購室主任負責。</p>\n<ol>\n<li>\n<p><strong>緊急採購與調用</strong>：為支援 B1\n    備援空間的開設，若發現醫療耗材或防空避難物資不足，須立即辦理緊急採購及物資調用。</p>\n</li>\n<li>\n<p><strong>替代供應商聯繫</strong>：在空襲威脅下，常規物流極可能受阻，採購組須負責替代供應商之聯繫，確保\n    B1 醫療運作與避難物資供應無虞。</p>\n</li>\n</ol>\n<p><strong>四、 疏散爭議處理與資料保密（法律訴求組 F3）</strong> 由職安室主任負責。</p>\n<ol>\n<li>\n<p><strong>處理衍生爭議</strong>：在緊急垂直疏散重症病患至\n    B1，或執行醫療降載的混亂過程中，極易發生意外或引發家屬不滿。法律訴求組須協助處理相關之法務、申訴及損害求償問題。</p>\n</li>\n<li>\n<p><strong>機密資料保全</strong>：協助確保防空疏散期間，各項病歷資料與演習／醫院機密文件的保密防護，防範混亂中發生個資外洩。</p>\n</li>\n</ol>\n<p><strong>五、 災變期間之緊急經費調度與出勤紀錄（會計組 F4）</strong>\n由會計室主任負責。</p>\n<ol>\n<li>\n<p><strong>緊急費用支付</strong>：辦理因應空襲避難與開設 B1\n    各功能區所衍生之經費調度與費用支付。</p>\n</li>\n<li>\n<p><strong>加班與出勤紀錄</strong>：確實記錄因防空警報而被迫滯留於院內，或被緊急召回參與地下醫療搶救員工的加班與出勤狀況，並維持財務紀錄之正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨極端的大量戰傷病患（MCI）與核心醫療資源的極限負荷。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）「行政/財務部長（F0）」</strong>，其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 統籌緊急應變之財務與行政決策（行政/財務部長 F0）</strong>\n由管理部部長擔任，負責監督大量傷患災變期間的財務管理及資金進出業務，並統籌整體的緊急應變預算、行政、採購、保險、法律及紀錄等工作，確保前線醫療搶救的資金與行政資源不斷鏈。</p>\n<p><strong>二、 執行緊急人力召回與出勤管制（人事組 F1）</strong>\n由人資室主任擔任，面對急診、手術室與加護病房暴增的醫護人力需求：</p>\n<ol>\n<li>\n<p><strong>人力招募與集結</strong>：負責協調人員緊急召回，招募休假員工、支援人力與志工至人力集合點，以供待命區管理者進行前線調度。</p>\n</li>\n<li>\n<p><strong>戰力輪替與儲備</strong>：必須儲備足夠的醫療及非醫療人員，以便將高壓環境下的前線人員進行必要之輪替。</p>\n</li>\n<li>\n<p><strong>工時統計與出勤管制</strong>：根據人員簽到與簽退時間，統計工時以利後續報報加班；若有應到卻未到者，人資室須統計分析，若無正當理由將報請院方依相關辦法懲處。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與替代供應鏈（採購組 F2）</strong> 由採購室主任擔任：</p>\n<ol>\n<li>\n<p><strong>緊急採購與調用</strong>：面對大量戰傷病患瞬間消耗殆盡的藥品、輸血衛材、戰備急救箱與儀器設備，採購組須立即辦理應變所需之緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>替代供應商聯繫</strong>：若常規物流因戰事、交通壅塞或供應鏈受阻，採購組須主動聯繫替代供應商，確保搶救物資穩定輸入醫院。</p>\n</li>\n</ol>\n<p><strong>四、 爭議處理與損害求償調查（法律訴求組 F3）</strong> 由職安室主任擔任：</p>\n<ol>\n<li>\n<p><strong>法務與申訴處理</strong>：在大量傷患湧入、醫療降載與執行「反向檢傷」的混亂過程中，極易引發家屬焦慮不滿或醫療衍生爭議。法律訴求組須協助處理相關法務、申訴，並接受與調查所有損害賠償之申請。</p>\n</li>\n<li>\n<p><strong>資料保密</strong>：協助確保戰時大量傷患機密資料與演習文件的保密與防護。</p>\n</li>\n</ol>\n<p><strong>五、 災變期間之經費調度與帳務處理（會計組 F4）</strong> 由會計室主任擔任：</p>\n<ol>\n<li>\n<p><strong>緊急費用支付</strong>：辦理因應大量戰傷搶救與緊急採購所衍生之經費調度與費用支付，並維持財務紀錄之正確性。</p>\n</li>\n<li>\n<p><strong>加班費給與</strong>：辦理被緊急召回與參與高強度搶救員工之加班給與事宜。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨基礎設施受損與環境維安的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>財務/行政部門（Finance/Administration\nSection）「行政/財務部長（F0）」</strong>。雖然該部門不直接參與第一線的水電搶修或傷患救護，但卻是支撐全院人力調度、緊急採購物資、災損理賠與復原重建的關鍵後盾。</p>\n<p>其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 統籌緊急應變之財務與行政決策（行政/財務部長 F0）</strong>\n由管理部部長擔任，負責統籌此次基礎設施受損危機下的緊急應變預算、行政、採購、保險、法律及紀錄等工作，確保搶修與醫療應變行動有充足的行政與資金支持。</p>\n<p><strong>二、 緊急人力調度與出勤管制（人事組 F1）</strong>\n由人力資源室主任擔任。面對電梯停用需大量人力進行病患的水平/垂直搬運，以及通訊中斷需啟動「傳令兵（Runner）」傳遞訊息的狀況：</p>\n<ol>\n<li>\n<p><strong>後續人力支援與集結</strong>：負責協調人員緊急召回、安排輪替，並招募志工與支援人力至集合點，以供待命區管理者統一派發至前線協助搬運、搶修或傳令任務。</p>\n</li>\n<li>\n<p><strong>工時與差假紀錄</strong>：確實做好災變期間被緊急召回與參與高強度搶修員工的出勤、差假及加班紀錄。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與替代供應鏈（採購組 F2）</strong>\n由採購室主任擔任。面對停電、漏水與空調異常等搶修需求：</p>\n<ol>\n<li>\n<p><strong>緊急物資與零件採購</strong>：辦理應變所需之緊急採購與物品徵集（例如：緊急照明設備、手電筒、電池、沙包、吸水耗材或機電緊急修繕零件）。</p>\n</li>\n<li>\n<p><strong>替代供應商聯繫</strong>：若因周邊爆炸或通訊中斷導致常規供應鏈受阻，須主動聯繫替代供應商，確保搶修物資穩定輸入醫院。</p>\n</li>\n</ol>\n<p><strong>四、 災損求償與法律爭議處理（法律訴求組 F3）</strong> 由職安室主任擔任。</p>\n<ol>\n<li>\n<p><strong>損害求償調查</strong>：若震波或電梯突然停用導致員工、病患受困受傷，或造成醫院重大財產損失，該組負責接受並調查所有損害賠償之申請，協助處理相關法務與申訴。</p>\n</li>\n<li>\n<p><strong>保險理賠</strong>：協助總務部會同保險公司，辦理後續財損或人員傷亡之理賠相關事宜。</p>\n</li>\n<li>\n<p><strong>資料保密</strong>：協助確保演習與災情相關機密資料的保密與防護。</p>\n</li>\n</ol>\n<p><strong>五、 經費調度與帳務處理（會計組 F4）</strong> 由會計室主任擔任。</p>\n<ol>\n<li>\n<p><strong>緊急費用支付</strong>：辦理因應設施搶修與緊急採購所衍生之經費調度與費用支付，維持財務紀錄之正確性。</p>\n</li>\n<li>\n<p><strong>加班費給與</strong>：辦理參與搶修與應變員工之加班給與事宜。</p>\n</li>\n</ol>\n<p><strong>六、 災後復原階段之經費籌措與重建</strong>\n在應變後期與復原階段，財務/行政部門須配合災損鑑定小組的結果，編列「災害復原預算表」，陳報院長室及董事會以籌措經費，支援硬體設施（如漏水管線、空調與受損電梯）的復原與重建工作。</p>\n<p>在 B2 開設指揮所，有哪些具體的安全措施？</p>\n<p>如何與瑞光院區啟動「雙盲備援連線」？</p>\n<p>若指揮官失聯，自動順位繼承機制的執行細節為何？</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，在面臨大量病患需要極速結帳出院、轉院移出以及大規模人力調度的極端挑戰下，HICS（醫院事故指揮系統）中的<strong>財務/行政部門（Finance/Administration\nSection）</strong>是確保行政流程不卡關、人力與資金能應付突發狀況的關鍵支柱。</p>\n<p>財務/行政部門由管理部部長擔任<strong>「行政/財務部長（F0）」</strong>，負責統籌緊急應變所需之財務、行政、人事、採購及法律工作。其轄下各小組的具體因應作為如下：</p>\n<p><strong>一、 啟動極速結帳與「戰時記帳豁免機制」（會計組 F4 / 行政/財務部長\nF0）</strong>\n面對「反向檢傷」分類出的大量「可返家/提早出院」病患，若依循平時的結帳流程，將導致門診大廳與批掛櫃檯嚴重壅塞，延誤疏散黃金時間。</p>\n<ol>\n<li>\n<p><strong>極速結帳與疏散</strong>：資源控管組會將疏散報告轉交財務行政部門，以協助病患帳務之處理。</p>\n</li>\n<li>\n<p><strong>戰時記帳豁免機制</strong>：為求於 4\n    小時內將輕症或穩定病患極速清空，會計組與批掛人員須啟動「戰時記帳豁免機制」。讓病患優先辦理離院手續並安全疏散返家，將醫療費用改為「事後再行收費」或記帳處理，確保行政手續絕不阻礙救命的疏散動線。</p>\n</li>\n<li>\n<p><strong>緊急經費調度</strong>：辦理因撤離行動衍生之緊急車輛徵用、車資、安置費用或緊急採購所需之經費調度與支付。</p>\n</li>\n</ol>\n<p><strong>二、 支援搬運與撤離之「緊急人力調度」（人事組 F1）</strong>\n疏散高度照護與臥床病患需要極大的搬運與照護人力（如無動力垂直搬運需5人一組）。</p>\n<ol>\n<li>\n<p><strong>緊急人力集結</strong>：由人資室主任擔任人事小組長，負責協調人員的緊急召回與輪替。招募並集結院內休假員工、志工與外部支援人力至「人力待命點」。</p>\n</li>\n<li>\n<p><strong>交由待命區派發</strong>：將集結到的人力，統一交由「待命區管理者（行政支援中心）」運用，精準派發至各病房協助前線護理人員進行病患的平行轉移或樓梯搬運。</p>\n</li>\n<li>\n<p><strong>出勤與工時紀錄</strong>：確實記錄參與高強度疏散任務員工的出勤與加班狀況，並協助後續的員工關懷與差假安排。</p>\n</li>\n</ol>\n<p><strong>三、 啟動撤離所需之「緊急採購」（採購組 F2）</strong>\n由採購室主任擔任小組長。在撤離行動中，若前線回報運輸輔具或醫療隨行物資不足：</p>\n<ol>\n<li>\n<p><strong>物資徵集與調用</strong>：立即辦理應變所需的緊急採購（例如：急購或徵用額外的輪椅、樓梯疏散滑墊/軟擔架、攜帶式氧氣鋼瓶、轉院隨車急救包材等）。</p>\n</li>\n<li>\n<p><strong>替代供應商聯繫</strong>：主動聯繫交通運輸業者、救護車公司或替代供應商，協助後勤部獲取必要的撤離資源。</p>\n</li>\n</ol>\n<p><strong>四、 撤離過程中之「法律風險管控與機密防護」（法律訴求組 F3）</strong>\n由職安室主任擔任小組長。撤離行動極度混亂，伴隨極高的爭議風險：</p>\n<ol>\n<li>\n<p><strong>防範醫療與疏散爭議</strong>：協助處理病患在撤離、轉院途中因病情變化、設備不足或推擠所可能引發的損害賠償調查、申訴與衍生法律問題。</p>\n</li>\n<li>\n<p><strong>病患隱私與個資保護</strong>：在病患名冊造冊、病歷資料隨車轉移及向外部機構（衛生局、接收醫院）交接的過程中，協助確保符合個人資料保護法及相關法規，保護當事人名譽及病人隱私，防止機敏資料外洩。</p>\n</li>\n</ol>\n<p>社工室如何協助戰傷病患的家屬安撫與動向查詢？</p>\n<p>若醫院通訊完全中斷，社工與行政人力如何執行傳令任務？</p>\n<p>說明 HICS 體系下各部門如何協同執行病人的分級與撤離。</p>"}]}]}, {"id": "clinical", "name": "臨床醫療單位", "roles": [{"role": "醫務部", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，醫務部在HICS（醫院事故指揮系統）架構下扮演第一線醫療應變的核心角色，具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌「執行部」指揮權</strong></p>\n<ol>\n<li>\n<p><strong>擔任執行部長</strong>：醫務部部長將擔任HICS編組下的<strong>「執行部長（Operations\n    Section\n    Chief）」</strong>，負責執行指揮官（院長）交付的技術性工作，並管理、計畫與指揮所有的醫療行動及災害控制。</p>\n</li>\n<li>\n<p><strong>跨組整合</strong>：醫務部須統籌轄下的醫療照護組，並橫向整合設施運作、安全管制、危害控制及機構持續運作等編組，確保戰時醫療整備工作同步展開。</p>\n</li>\n</ol>\n<p><strong>二、 執行醫療降載與病床/空間盤點</strong>\n為騰出戰備所需之床位與量能，醫務部須立即啟動第一階段「動員降載與能量整備」：</p>\n<ol>\n<li>\n<p><strong>限時降載目標</strong>：必須規劃並執行醫療功能降載，目標於<strong>48小時內將住院病人降載至30%</strong>。</p>\n</li>\n<li>\n<p><strong>擬定疏散計畫</strong>：明確定義戰時必須維持的核心醫療功能，並擬定現有住院病人的出院及轉院計畫，其中必須包含<strong>評估轉送所需的載具（如救護車）與隨車照護人力</strong>。</p>\n</li>\n<li>\n<p><strong>盤點核心量能</strong>：醫務部（作為醫療應變與傷患搶救組的主責單位）須迅速盤點急診、手術室、加護病房（ICU）的空間與設備，撰擬臨時醫療區開設及醫療核心功能維持的說明資料。</p>\n</li>\n</ol>\n<p><strong>三、 盤點與調度醫療人力</strong>\n打破平時科室建制，醫務部須盤點全院可動員的醫師與臨床人力，制定<strong>「醫療人力調度表」</strong>。將平時負責門診或常規手術的人力，重新編組至檢傷分類區、重傷治療區、輕傷病房或協助傷患後送流程。</p>\n<p><strong>四、 對接統籌呈報組完成限時回報</strong></p>\n<ol>\n<li>\n<p><strong>指派聯繫窗口</strong>：醫務部必須指派專責人員，擔任<strong>「統籌呈報組」的對內聯繫窗口</strong>。</p>\n</li>\n<li>\n<p><strong>提交彙整數據</strong>：將醫務部盤點完畢的「床位、人力、急診、手術、加護量能與降載名冊」等資料，迅速且正確地提交給統籌呈報組（危管會），以利其彙整全院資訊，於主管機關規定的時限內完成<strong>臨災應變中心的初報與續報</strong>。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息及掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊）」，此危機同時衝擊了醫院的資訊系統與醫療量能。在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部</strong>扮演著前線作戰的核心角色，由醫務部部長擔任<strong>「執行部長（O0）」</strong>，負責統籌醫療照護與維持機構持續運作。</p>\n<p>醫務部因應系統癱瘓與假訊息的具體作為如下：</p>\n<p><strong>一、 接掌執行部指揮權，統籌前線醫療行動</strong></p>\n<ol>\n<li>\n<p><strong>最高技術執行</strong>：醫務部部長擔任執行部長，負責執行指揮官交付之技術性工作，並管理、參與應變行動計畫中所有的醫療行動與災害控制。</p>\n</li>\n<li>\n<p><strong>跨組資源整合</strong>：整合轄下的醫療照護、設施運作、安全管制與機構持續運作等單位，確保各分組在系統癱瘓的混亂中能維持步調一致。</p>\n</li>\n</ol>\n<p><strong>二、 全面啟動「紙本降級（Downtime）」與離線人工作業</strong></p>\n<ol>\n<li>\n<p><strong>切換人工模式</strong>：接獲資訊室啟動「全院當機處理機制」通知後，醫務部及轄下單位須立即停止依賴電腦系統，全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：指示各臨床單位與急診砸破封條，取出預先整備的「當機緊急箱（Downtime\n    Box）」，無縫切換使用三聯式紙本病歷、手寫處方箋與紙本檢傷單等離線表單，確保核心醫療處置不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 執行醫療服務降載與門急診分流替代流程</strong></p>\n<ol>\n<li>\n<p><strong>服務降載與分流</strong>：因系統延遲將大幅拉長看診與批掛時間，醫務部須評估醫療量能，暫停部分非急迫性醫療或排程手術，將醫療資源絕對集中於急重症搶救。</p>\n</li>\n<li>\n<p><strong>啟動替代流程</strong>：面對因假訊息與系統當機而壅塞的就醫人潮，醫務部須主導建立紙本掛號、門急診分流等「就醫替代流程」，並將處置方式通告全院醫師配合執行。</p>\n</li>\n</ol>\n<p><strong>四、 執行紙本的病人分級、轉送與交接準備</strong>\n若系統癱瘓時間過長或醫療量能受限，醫務部必須為「醫療後撤或擴充量能」預作準備：</p>\n<ol>\n<li>\n<p><strong>紙本醫療交接</strong>：在無法使用電子病歷的狀況下，醫務部須主導病人分級，並以人工方式準備病患名冊、紙本醫療摘要與用藥交接紀錄。</p>\n</li>\n<li>\n<p><strong>轉送與合作聯繫</strong>：針對需要後撤、轉送或擴充收治的病患，醫務部須與衛生局或區域聯防之合作醫院聯繫，確保病患轉銜過程的醫療安全。</p>\n</li>\n</ol>\n<p><strong>五、 支援異質通訊與傳令兵（Runner）遞送</strong></p>\n<ol>\n<li><strong>維持醫囑傳遞</strong>：在資訊網路與 PACS/LIS\n    系統延遲下，醫務部須配合啟動「傳令兵（Runner）」制度。透過專人徒步穿梭於各樓層，精準遞送手寫的緊急開刀醫囑、檢驗單與實體\n    X 光片，克服斷網危機。</li>\n</ol>\n<p><strong>六、 穩定醫患關係與防範第一線衝突</strong></p>\n<ol>\n<li>\n<p><strong>前線溝通與安撫</strong>：面對假訊息（如缺藥、拒收病人）以及因系統延遲而久候不滿的病患與家屬，醫務部須要求第一線看診醫師與醫療人員加強溝通，耐心說明當前的「紙本降級」流程。</p>\n</li>\n<li>\n<p><strong>通報防暴機制</strong>：若發現病患或家屬情緒失控、極端抱怨，甚至出現暴力徵象，醫務部人員須立即通報護理主管、社工室及醫勤室保安組介入處理，保護醫療人員的安全。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部</strong>扮演著前線醫療作戰的最核心角色。由醫務部部長擔任<strong>「執行部長（O0）」</strong>，負責統籌並執行指揮官交付之所有技術性工作與醫療照護行動。</p>\n<p>醫務部的具體因應作為如下：</p>\n<p><strong>一、 統籌前線醫療行動與接掌指揮</strong></p>\n<ol>\n<li>\n<p><strong>接掌執行部指揮權</strong>：醫務部部長負責管理並參與應變行動計畫中所有的醫療行動與災害控制，整合轄下的醫療照護、設施運作、危害控制與安全管制等單位。</p>\n</li>\n<li>\n<p><strong>評估醫療量能與任務編派</strong>：與後勤部共同合作並回報前線物資需求，決定任務編派並評估急診、門診、住院與手術等各項服務的殘存能量。</p>\n</li>\n</ol>\n<p><strong>二、 執行極限醫療降載與「反向檢傷（Reverse Triage）」</strong>\n因外部轉送不確定性提高（病患無法後送），且各項維生藥材配送延遲，醫務部必須強行騰出院內收治量能並節約資源：</p>\n<ol>\n<li>\n<p><strong>極速清空與服務降載</strong>：立即下令取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術，將有限的醫療氣體、藥材與資源絕對集中於急重症搶救。</p>\n</li>\n<li>\n<p><strong>反向檢傷與提早出院</strong>：由資深主治醫師組成「反向檢傷小組」，進入一般病房甚至加護病房，強制評估並篩選出生命徵象穩定的病患，辦理緊急下轉或提早出院，極速騰出「彈性擴充量能（Surge\n    Capacity）」以因應滯留院內與湧入的重症病患。</p>\n</li>\n</ol>\n<p><strong>三、 啟動血庫危機應變與極限替代方案</strong></p>\n<ol>\n<li>\n<p><strong>啟動「走動式血庫（Walking Blood\n    Bank）」</strong>：面對血液運補延遲且血庫見底的絕境，醫務部須會同檢驗科/血庫，緊急啟動院內活體捐血計畫。召集符合血型條件的院內員工現場抽血、快篩，直接送入急診或開刀房搶救瀕死傷患，突破外部斷血危機。</p>\n</li>\n<li>\n<p><strong>極限維生替代</strong>：若醫療氣體（氧氣）耗竭，須指示並配合護理與後勤人員啟動人工替代方案（如動員捏球大隊，以手動甦醒球維持重症病患呼吸）。</p>\n</li>\n</ol>\n<p><strong>四、 病患轉送受阻之就地收治與轉銜準備</strong></p>\n<ol>\n<li>\n<p><strong>啟用備援醫療空間</strong>：針對無法順利轉送的病患，醫務部須評估啟用地下室（B1）的備援醫療空間（如臨時\n    ICU 病房、臨時開刀房與恢復室），執行就地收治與戰傷處置。</p>\n</li>\n<li>\n<p><strong>病患分級與交接整備</strong>：針對滯留院內準備後撤或轉送的病患，醫務部須確實完成病人分級，並備妥病患名冊、醫療摘要與用藥交接紀錄。一旦交通稍有恢復或有救護車輛抵達，即可立即進行安全轉銜與異地持續照護。</p>\n</li>\n</ol>\n<p><strong>五、 醫療人力之極限調度與重分配</strong>\n面對員工到勤受交通影響產生的人力缺口，醫務部須進行殘存戰力的最大化運用：</p>\n<ol>\n<li>\n<p><strong>成立各區治療站與指派指揮醫師</strong>：急診部主任或當班資深醫師須建立病人照護分區（如檢傷區、重傷區、中傷區、輕傷區及留觀區），並調派留守之內、外科或急診醫師擔任各區的指揮醫師，維持醫療秩序。</p>\n</li>\n<li>\n<p><strong>跨科支援與在地召回</strong>：將停診之門診醫師調派至急診或重症區支援。若需啟動緊急召回機制，則優先召回居住於屏東市區附近（一公里內）、受交通阻斷影響較小的醫師回院支援，以最快速度彌補前線人力。</p>\n</li>\n</ol>\n<p>今天 • 上午8:33</p>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭與空襲威脅，必須將核心醫療量能全數轉移至地下防空避難空間。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部</strong>是全院醫療搶救的核心骨幹。醫務部部長擔任<strong>「執行部長（O0）」</strong>，同時身兼演習編組中的<strong>「醫療應變與傷患搶救組」</strong>組長。面對防空疏散與\nB1 備援空間的啟用，醫務部的具體因應作為如下：</p>\n<p><strong>一、 統籌戰時醫療行動與空間轉置（執行部長 O0）</strong></p>\n<ol>\n<li>\n<p><strong>指揮醫療戰術轉換</strong>：由醫務部部長（執行部長）率領執行部相關人員，組織與建立各種醫療行動策略，完成將高樓層核心醫療（如加護病房、手術室）轉移至\n    B1 地下室備援空間的技術性與醫療工作。</p>\n</li>\n<li>\n<p><strong>評估與編派任務</strong>：決定各臨時醫療區的任務編派，評估服務能量，並與後勤部門協調，回報地下微型戰地醫院運作所需的物資與照護需求。</p>\n</li>\n</ol>\n<p><strong>二、 執行「極限醫療降載」與「反向檢傷（Reverse Triage）」</strong></p>\n<ol>\n<li>\n<p><strong>停止常規醫療</strong>：接獲戰備或空襲指令後，醫務部須立即下令，無限期取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術，極限縮減非必要醫療消耗。</p>\n</li>\n<li>\n<p><strong>反向檢傷與極速清空</strong>：組織各科主任與資深主治醫師組成「反向檢傷小組」，進入一般病房甚至加護病房，強制評估並篩選出生命徵象穩定的病患。辦理緊急提早出院或下轉至基層診所及長照機構。目標在時限內（如\n    48 小時內）將住院病人降載至 30%，強行騰出急重症病床與擴充量能（Surge\n    Capacity）以準備接收戰傷病患。</p>\n</li>\n</ol>\n<p><strong>三、 調派醫師人力與維持 B1 五大醫療功能區運作</strong></p>\n<ol>\n<li>\n<p><strong>專科醫師重分配</strong>：醫務部必須打破平時的科室編制，將全院內科、外科、婦兒科等專科醫師人力，調度並編派至剛開設的\n    B1 五大功能區（檢傷行政區、臨時\n    ICU、臨時開刀房、恢復室、輕症病房）進行醫療搶救。</p>\n</li>\n<li>\n<p><strong>督導核心醫療不中斷</strong>：督導轄下之急診部、內外科主任（醫療照護主管\n    O1），在 B1\n    備援空間內排定傷患治療之優先順序，執行黃金時間內的戰傷處置（如損傷控制復甦）與緊急手術。</p>\n</li>\n</ol>\n<p><strong>四、 整合醫療輔助量能與轉送/後送協調</strong></p>\n<ol>\n<li>\n<p><strong>醫療輔助人力調度</strong>：醫務部須調度與整合放射科、檢驗科、血庫與藥劑科等輔助單位，確保\n    B1 臨時急救區的影像檢查、檢驗報告與緊急用藥能夠持續支援前線醫師。</p>\n</li>\n<li>\n<p><strong>病患後送與轉診協調</strong>：針對院內無法負荷之重症或戰傷病患，醫務部醫師須與聯絡官及衛生局（或高屏區\n    EOC）協調，安排病患的轉送與後送事宜，並負責與接收醫院進行醫療交班。</p>\n</li>\n</ol>\n<p><strong>五、 啟動「無頭狀態」自動順位繼承機制</strong>\n若空襲或戰火導致院長及副院長（指揮官階層）失聯或無法視事，醫務部轄下的當值最高層級臨床主管（依序為：急診部主任、重症醫學部主任、外科部主任等），必須依法在\n5\n分鐘內啟動「自動順位繼承機制」接管全院指揮權，穿上指揮官背心，下達最高戰略目標，確保醫院在戰火中絕不陷入群龍無首的癱瘓狀態。</p>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨關鍵基礎設施受損、維生系統異常，甚至可能伴隨周邊群眾傷亡的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）與演習架構下，<strong>醫務部</strong>扮演著第一線戰術指揮的核心角色，醫務部部長擔任<strong>「執行部長（O0）」</strong>，同時也是演習編組中的<strong>「醫療應變與傷患搶救組」</strong>組長。</p>\n<p>面對此極端狀況，醫務部的具體因應作為如下：</p>\n<p><strong>一、 擔任「執行部長（O0）」，統籌全院醫療行動與災害控制</strong></p>\n<ol>\n<li>\n<p><strong>最高戰術指揮</strong>：由醫務部部長負責執行指揮官交付之技術性工作，管理並參與應變行動，計畫及指揮全院所有的醫療行動或災害控制任務。</p>\n</li>\n<li>\n<p><strong>督導轄下分支</strong>：統合轄下的醫療照護主管（O1）、設施運作主管（O2，如工務室搶修）、危害控制主管（O3，如滅火與外洩處理）、安全管制主管（O4）及機構運作主管（O5），確保搶修行動與醫療救護同步進行。</p>\n</li>\n<li>\n<p><strong>設立臨時醫療區</strong>：若震動或爆炸造成傷患，醫務部須視狀況啟動大量傷病患機制，並指揮設立緊急救護站（如利用門診區或\n    B1 備援空間），執行檢傷、救護與臨時醫療區銜接。</p>\n</li>\n</ol>\n<p><strong>二、 執行醫療降載與維持「核心醫療不中斷」</strong>\n面對電力瞬斷、漏水與空調異常，醫療量能將大幅受限，醫務部必須果斷進行醫療資源取捨：</p>\n<ol>\n<li>\n<p><strong>醫療降載與分流</strong>：依據院內決策與現場設施損害程度，評估並執行醫療降載。盤點可提早出院、可延後排程手術/檢查及可調整門診的病人，將資源釋出。</p>\n</li>\n<li>\n<p><strong>確保核心功能</strong>：將有限的水電、備援電力與醫療物資，優先保留給急診、急重症、手術、加護病房、血液與檢驗等核心醫療服務，確保維生底線不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 啟動病患疏散、轉院重置與醫療後撤</strong>\n若漏水、消防警報或電梯停用導致原病房（尤其是高樓層）已不安全，或維生設施無法支持重症病患：</p>\n<ol>\n<li>\n<p><strong>決策與病人分級</strong>：醫務部須統籌病患的疏散動向，進行病人分級、造冊，並決定後撤轉送的優先順序。</p>\n</li>\n<li>\n<p><strong>跨院轉銜與交接</strong>：由醫務部視病人實際狀況，與聯絡官及多元合作推動中心（轉診中心）協調，確認外部合作接收醫院的可容納人數。</p>\n</li>\n<li>\n<p><strong>醫療摘要隨行</strong>：在轉送過程中，確保病歷摘要、用藥紀錄與相關檢驗報告能與病患同步交接至接收醫院。</p>\n</li>\n</ol>\n<p><strong>四、 孤島狀態下的「醫療人力調度」</strong>\n若周邊震波與爆炸導致聯外交通阻絕或中斷，外部醫療人員無法進入醫院支援，醫院陷入孤島運作：</p>\n<ol>\n<li>\n<p><strong>彈性班表與強制輪替</strong>：醫務部須統一指揮規劃全院的醫療人力調度，實施彈性班表及延長值班等事宜，確保醫療戰力得以延續直到狀況解除。</p>\n</li>\n<li>\n<p><strong>緊急人力補充</strong>：必要時緊急動用住宿於院區宿舍內的醫護人員，作為第一波補充支援人力。</p>\n</li>\n</ol>\n<p><strong>五、 配合通訊中斷之「紙本降級（Downtime）」作業</strong>\n若震波或斷電導致資訊系統、網路與通訊癱瘓：</p>\n<ol>\n<li>\n<p><strong>切換人工作業</strong>：接獲資訊室宣告當機後，醫務部須指示轄下所有臨床科別與醫師，立即啟動電腦停止作業應變措施，全面改採紙本病歷、手寫處方箋與人工作業流程。</p>\n</li>\n<li>\n<p><strong>替代流程與紀錄保存</strong>：在無資訊系統輔助下，維持醫療處置與給藥的安全，並妥善保存所有紙本醫療紀錄，待通訊與系統修復後再行回補與復原。</p>\n</li>\n</ol>\n<p>醫療照護主管如何調度醫護人力以因應戰傷大量傷患？</p>\n<p>在通訊與資訊中斷下，如何具體執行傳令兵與紙本作業？</p>\n<p>若血庫用罄，走動式血庫與員工捐血的具體執行流程為何？</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨極限的醫療降載與病患大規模重置挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部部長</strong>擔任最高戰術指揮的<strong>「執行部長（O0）」</strong>，同時主導<strong>「醫療應變與傷患搶救組」</strong>。醫務部是將指揮官撤離決策化為實際醫療行動的最前線，其具體因應作為如下：</p>\n<p><strong>一、 統籌全院醫療行動與疏散計畫</strong></p>\n<ol>\n<li>\n<p><strong>最高醫療指揮</strong>：醫務部負責計畫及指揮所有的醫療行動與災害控制，執行指揮官交付之技術性工作。</p>\n</li>\n<li>\n<p><strong>啟動疏散統籌</strong>：在病患疏散與重置作業中，由院長或副院長指揮，醫務部負責統籌協調，並交由各編組擬定與執行後續撤離計畫。</p>\n</li>\n</ol>\n<p><strong>二、 執行「病人分級」與「反向檢傷（Reverse Triage）」</strong>\n面對有限的運輸資源與撤離時間，醫務部必須打破平時的收治邏輯，冷酷且迅速地對留院病人進行分級與檢傷：</p>\n<ol>\n<li>\n<p><strong>設立反向檢傷小組</strong>：由資深主治醫師（為避免醫患情感影響判斷，可由平時不負責該病房之醫師擔任）組成「反向檢傷特別小組」進入病房進行強勢評估。</p>\n</li>\n<li>\n<p><strong>病患精準分級</strong>：依據撤離需求與病患狀況，將病人分為四大類：</p>\n<ul>\n<li>\n<p><strong>行動方便的病人（可返家）</strong>：拔除靜脈點滴或提早出院，在 72\n    小時內不會立即危及生命者，安排提早出院。</p>\n</li>\n<li>\n<p><strong>需扶持但有家屬照顧的病人（安置）</strong>：可暫時由家人帶回照顧，或轉銜至基層診所與長照機構。</p>\n</li>\n<li>\n<p><strong>一般臥床病人（一般住院）</strong>：需持續醫療照護，考量移至院內安全病房，或轉送至其他醫院。</p>\n</li>\n<li>\n<p><strong>危急病人（高度照護）</strong>：依賴維生設備或加護病房之重症患者，需優先評估轉送風險，並安排具備重症收治能力之醫院進行重置。</p>\n</li>\n</ul>\n</li>\n</ol>\n<p><strong>三、 執行「極速醫療降載」</strong></p>\n<ol>\n<li>\n<p><strong>取消常規醫療</strong>：依據降載指令，醫務部須協助無限期取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術。</p>\n</li>\n<li>\n<p><strong>騰出彈性擴充量能</strong>：針對穩定且可出院之病患，配合行政部門辦理極速結帳疏散；目標於\n    24 小時內強行騰出大連院區至少 30% 至 40%\n    的急重症病床與開刀房空間，以利後續的醫療資源重分配。</p>\n</li>\n</ol>\n<p><strong>四、 協調外部接收醫院與「醫療後撤重置」</strong></p>\n<ol>\n<li>\n<p><strong>確認外部接收量能</strong>：由醫務部視病人實際狀況與嚴重度，與聯絡官及多元合作推動中心（轉診中心）協調，確定外部接收醫院可容納的病人數，確保轉出病患有安全的去向。</p>\n</li>\n<li>\n<p><strong>重置先遣作業</strong>：在啟動病人重置計畫時，醫務部須指示帶領或委任一小組的護理及管理人力作為先遣團隊，與接收醫院安排相關醫療與行政交接事宜。</p>\n</li>\n</ol>\n<p><strong>五、 確保隨車「醫療物資、病歷摘要與用藥」之無縫交接</strong>\n在病患後撤與轉送的過程中，醫務部與護理部必須確保醫療照護不中斷：</p>\n<ol>\n<li>\n<p><strong>醫療文件隨行</strong>：確實完成病人分級造冊，並確認每位轉院病患的轉診單、病歷摘要、用藥紀錄與檢驗報告皆隨同病患轉移交接。</p>\n</li>\n<li>\n<p><strong>救急物資隨車</strong>：針對高度照護與一般住院的轉運病患，必須確保有足夠量的急救藥物、靜脈輸液或血液製品與病人一起運送到重置區或接收醫院，避免在轉送途中或剛抵達時發生醫藥耗竭的致命危機。</p>\n</li>\n</ol>\n<p><strong>六、 孤島與極端狀態下的「醫療人力調度」</strong>\n若遭遇聯外交通阻絕或需長時間維持大量病患轉運與照護，醫務部須統一指揮並規劃全院的醫療人力調度。透過實施彈性班表、延長值班等措施維持醫療戰力；必要時，緊急動用住宿於宿舍區的醫護人員作為補充支援，確保醫療行動持續推進直到狀況解除。</p>\n<p>指揮官如何查核撤離命令真實性？</p>\n<p>後勤部如何準備隨車醫療物資？</p>\n<p>反向檢傷小組由哪些醫師組成？</p>"}]}, {"role": "護理部", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，護理部在HICS（醫院事故指揮系統）中同時扮演「計畫樞紐」與「醫療照護骨幹」的雙重關鍵角色，具體因應作為如下：</p>\n<p><strong>一、 進駐HICS指揮體系，接掌「計畫部」與關鍵情資</strong></p>\n<ol>\n<li>\n<p><strong>擔任計畫部長</strong>：護理部部長（護理副院長）將擔任HICS編組下的<strong>「計畫部長（Planning\n    Section\n    Chief）」</strong>，負責綜觀全局、綜整全院情資，建立應變方案，並為每個執行週期建立行動計畫。</p>\n</li>\n<li>\n<p><strong>掌握資源與病人動向</strong>：護理部督導長將分別接掌<strong>「資源控管組」</strong>與<strong>「狀況分析組」</strong>。資源控管組負責清點全院人力、床位、設備與物資位置，建立詳細的資源清單；狀況分析組則負責追蹤現有病人動向、蒐集分析災情資訊，以提供指揮官準確的決策依據。</p>\n</li>\n</ol>\n<p><strong>二、 執行病床極限降載與空間轉置</strong></p>\n<ol>\n<li>\n<p><strong>執行病床清空與降載</strong>：護理部需配合醫務部（執行部）展開第一階段的「動員降載與能量整備」，明確定義核心醫療功能，並執行病人出院及轉院計畫，目標於<strong>48小時內將住院病人降載至30%</strong>。</p>\n</li>\n<li>\n<p><strong>整備戰備擴充空間</strong>：執行病床清空計畫，將一般病房轉換為戰傷病房，並負責盤點與調度呼吸器、點滴幫浦等關鍵維生設備，為後續可能湧入的傷患騰出擴充病床（Surge\n    Beds）。</p>\n</li>\n</ol>\n<p><strong>三、 護理人力重分配與極限調度</strong></p>\n<ol>\n<li>\n<p><strong>跨單位人力調派</strong>：護理部掌握全院最多的醫療人力，戰時必須打破平時的科室本位主義，將原本在門診、健檢中心等非緊急單位的護理師，迅速調派至急診前線、開刀房或\n    B1 備援醫療空間（如檢傷區、臨時ICU、輕症病房）進行支援。</p>\n</li>\n<li>\n<p><strong>維持極限照護底線</strong>：在戰時資源極度匱乏（如斷水、斷電）的情況下，護理團隊需準備以人工或紙本降級方式（如手捏甦醒球人工呼吸、紙本給藥與病歷紀錄）維持病患的基本生命徵象與照護。</p>\n</li>\n</ol>\n<p><strong>四、 彙整量能數據並對接限時回報</strong>\n由護理部轄下的「資源控管組」與「狀況分析組」將限時盤點完畢的<strong>「全院護理人力總數與班表、各區可用空床數、病人動向與降載名冊、以及現有醫療設備清單」</strong>等精確數據，迅速提供給「統籌呈報組（危管會）」。透過準確的資訊對接，確保醫院能於主管機關規定的時限內，順利完成臨災應變中心的初報與各項量能續報作業。</p>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之複合性危機（民眾因假訊息與恐慌大量湧入急診、搶購慢性病藥品、交通事故大量傷患，以及家屬急迫的各項要求），護理部在HICS（醫院事故指揮系統）中同時肩負「計畫部決策中樞」與「第一線醫療照護骨幹」的雙重重任。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 接掌計畫部指揮權：反制假訊息與精確掌控病人動向</strong>\n面對假訊息與家屬查詢撤離資訊的混亂，護理部高階主管必須坐鎮大腦中樞：</p>\n<ol>\n<li>\n<p><strong>綜整情資與闢謠支援：</strong>\n    護理部部長擔任「計畫部長（P0）」。轄下的「狀況分析小組（P2，由護理部督導長擔任）」須迅速蒐集急診壅塞情況與各病房真實收治數據，每四小時發布最新狀況報告。這些精確資訊將提供給發言官，作為對外發布新聞稿、反制假訊息與平息民眾恐慌的客觀依據。</p>\n</li>\n<li>\n<p><strong>家屬詢答與病人動向管理：</strong>\n    面對家屬急尋交通事故傷患或查詢撤離資訊，狀況分析小組必須精確執行「病人動向追蹤」。確認病患在各區（檢傷、治療區、留觀、病房）的訊息傳遞正確可靠，並與社工室及院牧部合作，針對病人家屬進行正確的詢答與情緒安撫。</p>\n</li>\n</ol>\n<p><strong>二、 啟動大量傷患（333）與護理人力極限調度</strong>\n交通事故造成大量傷患瞬間湧入，急診人力必然崩潰，護理部須立即啟動極限調度：</p>\n<ol>\n<li>\n<p><strong>緊急召回與跨科支援：</strong>\n    配合急診啟動大量傷患機制（代號333），護理部須依據事件規模啟動人力召回。例如內科系重度/中度事件，第一波需召回47名護理人員，第二波可能需召回高達87名護理人員。</p>\n</li>\n<li>\n<p><strong>白/夜班機動調度：</strong>\n    若發生於假日或夜間，值班護理長須暫代指揮官或協同急診調派全院病房護理人力（如從6A、5A、加護病房等單位抽調人力）至急診紅、黃、綠區進行支援。</p>\n</li>\n</ol>\n<p><strong>三、 第一線檢傷分流與戶外領藥支援（醫療照護組）</strong></p>\n<ol>\n<li>\n<p><strong>極限分流慢性病患：</strong>\n    面對恐慌搶購慢性病藥品的群眾，護理人員需配合急診與藥劑科，於急診室外或大廳設立「戶外慢性病處方籤領藥區」或「戶外防疫門診」。護理人員在此進行快速檢傷與衛教分流，將單純領藥的民眾阻絕於急診搶救區外。</p>\n</li>\n<li>\n<p><strong>大量傷患照護分區：</strong>\n    急診護理長或資深護理師將擔任「護理師組長」，指揮被召回或調派來的護理人員，進駐檢傷分類區、重傷區（紅區）、中傷區（黃區）及輕傷區（綠區），執行急救處置、給藥與建立靜脈輸液，並將病患動態登錄於大量傷患動向表。</p>\n</li>\n</ol>\n<p><strong>四、 配合「反向檢傷」與病床資源控管（資源控管組）</strong></p>\n<ol>\n<li>\n<p><strong>拒絕非緊急住院：</strong>\n    面對家屬因恐慌而「要求住院」的龐大壓力，護理部督導長領導的「資源控管小組（P1）」必須嚴格監控全院可用空床數。護理團隊需配合醫師執行「反向檢傷（Reverse\n    Triage）」，堅守原則，拒絕輕症與非緊急病患住院。</p>\n</li>\n<li>\n<p><strong>騰出戰傷病床：</strong>\n    對於院內現有穩定或可提早出院的病患，護理部須協助辦理極速結帳與出院手續，強制騰出病床，將寶貴的醫療量能與急重症病房絕對保留給交通事故的重傷患。</p>\n</li>\n</ol>\n<p><strong>五、 確保前線護理人員安全與心理防護</strong></p>\n<ol>\n<li>\n<p><strong>配合實體防護（Lockdown）：</strong>\n    若恐慌群眾或家屬引發暴力滋擾，急診護理人員須立即通報警衛啟動防暴應變（按*9通報），配合安全官退入預先規劃的「安全隔離區」，確保自身人身安全。</p>\n</li>\n<li>\n<p><strong>強制輪替與心理支持：</strong>\n    護理部主管須密切關注前線護理人員的身心狀態。在面對大量血肉模糊的交通事故傷患與家屬的強大壓力下，必須安排強制輪替班表，並配合「關懷小組」提供心理除頻（Debriefing）與情緒支持，避免護理團隊爆發戰鬥疲勞或心理崩潰。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息，且掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊/大當機）」，這是一場資訊癱瘓與輿論恐慌的複合性危機。在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>同時肩負「計畫部決策與情資中樞」以及「第一線醫療照護骨幹」的雙重重任。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 第一線病房與急診：全面啟動「紙本降級（Downtime）」作業</strong>\n面對各項資訊系統延遲或癱瘓，護理人員身處第一線，必須立刻切換為「無網作業」以維持醫療照護底線：</p>\n<ol>\n<li>\n<p><strong>啟用當機緊急箱</strong>：各護理站須依據當機應變機制（或砸破封條），立刻取出預先整備的「當機緊急箱（Downtime\n    Box）」。</p>\n</li>\n<li>\n<p><strong>無縫切換人工作業</strong>：全面改用三聯式紙本病歷、手寫處方箋、紙本檢傷單與條碼貼紙，並以人工方式（如白板、紙本名冊）進行病人交班與醫囑核對，確保在無電腦輔助下的給藥與醫療處置安全。</p>\n</li>\n</ol>\n<p><strong>二、 接掌計畫部指揮權：人工彙整情資與支援反制假訊息</strong>\n在系統當機期間，電子儀表板失效，護理部高階主管必須坐鎮大腦中樞，以人工方式穩住全院情資：</p>\n<ol>\n<li>\n<p><strong>計畫部長統籌</strong>：由護理部部長擔任「計畫部長（P0）」，綜觀所有事件相關資訊，建立替代執行方案，並為下一個執行週期建立事故行動計畫（IAP）。</p>\n</li>\n<li>\n<p><strong>人工盤點資源（支援闢謠）</strong>：由護理部督導長擔任「資源控管小組長（P1）」，在無網狀態下，以無線電或傳令兵回報等人工方式，精確清點全院實際的護理人力、病床空床數及物資位置，建立實體資源清單。</p>\n</li>\n<li>\n<p><strong>對接發言官闢謠</strong>：將上述精確盤點的真實醫療量能與收治數據交由「狀況分析小組（P2，亦由護理部督導長擔任）」，產出狀況報告，迅速提供給發言官，作為對外澄清「停診、缺藥或拒收病人」等假訊息的客觀依據。</p>\n</li>\n</ol>\n<p><strong>三、 執行紙本化的「病人動向管理」與家屬溝通</strong>\n掛號與批價系統延遲會導致大當機，病患容易在各部門間失去蹤影，或家屬因等候產生恐慌：</p>\n<ol>\n<li>\n<p><strong>人工掌握病人動向</strong>：護理部（狀況分析小組轄下之病人動向組）須啟動人工追蹤機制，確實記錄病人在各區（門急診、留觀、病房）的動向，確認病人動向訊息在各區傳遞正確可靠。</p>\n</li>\n<li>\n<p><strong>前線醫病溝通與安撫</strong>：面對因系統延遲而久候不滿，或受假訊息影響而焦急的病人及家屬，第一線護理人員需耐心解釋當前的紙本替代流程。若觀察到家屬有極端抱怨或異樣，應即時通報護理主管及社工師介入安撫，防範醫療暴力衝突發生。</p>\n</li>\n</ol>\n<p><strong>四、 護理人力之極限調度與支援</strong>\n系統當機將導致日常的掛號、開單、給藥與傳遞檢體流程轉為極度耗時的人工作業，護理部必須迅速應對人力缺口：</p>\n<ol>\n<li>\n<p><strong>人力重分配</strong>：護理部部長（計畫部長）須與執行部協調，盤點並評估各單位的工作量。將暫停非緊急服務（如常規健檢）所釋出的護理人力，迅速調派至急診或病房，支援繁重的紙本紀錄、人工跑單與臨床照護工作。</p>\n</li>\n<li>\n<p><strong>確保前線輪替</strong>：在紙本降級的高壓作業下，必須關注護理同仁的身心負荷，協調人事小組安排必要的輪替，避免前線護理人員發生戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與交通受阻的「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>身兼「計畫部的大腦」與「第一線醫療照護（執行部）的骨幹」雙重關鍵角色，必須在極限狀態下進行人力調度、資源分配與維持照護底線。其具體因應作為如下：</p>\n<p><strong>一、 接掌計畫部大腦，精算資源與擬定替代方案</strong></p>\n<ol>\n<li>\n<p><strong>計畫部長統籌（P0）</strong>：由護理部部長擔任計畫部長，綜觀員工無法到勤與物資短缺的嚴峻情勢，建立替代執行方案，並為每個執行週期建立與發布「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>資源控管精算（P1）</strong>：由護理部督導長擔任資源控管小組長，精確盤點全院殘存的護理人力、病床空床數及關鍵醫療物資的位置與供應情況，確保事件應變時有足夠之供應，並建立清單以利向後勤或外部請求支援。</p>\n</li>\n<li>\n<p><strong>滯留病人動向追蹤與家屬安撫（P2）</strong>：因病人轉送不確定性提高，由護理部督導長擔任的狀況分析小組長須透過轄下之病人動向組，嚴密追蹤滯留院內之病患動向，並針對因物資匱乏或無法轉送而焦慮的病患家屬，給予正確的詢答與情緒安撫。</p>\n</li>\n</ol>\n<p><strong>二、 護理人力之極限調度與重分配（執行部醫療照護骨幹）</strong></p>\n<ol>\n<li>\n<p><strong>護理人力重分配</strong>：面對員工受交通影響無法到勤的人力缺口，護理部掌握全院最多的醫療人力，必須迅速將取消的非緊急門診、健檢中心的護理師，全面調派至急診、開刀房或臨時設立的大量傷患區，維持基本照護底線。</p>\n</li>\n<li>\n<p><strong>病房降載與擴充量能</strong>：執行病床清空計畫，將一般病房轉換為戰備/戰傷病房，並負責調度呼吸器、點滴幫浦等關鍵設備，為無法轉出及瞬間湧入的急重症病患騰出「擴充病床（Surge\n    Beds）」量能。</p>\n</li>\n</ol>\n<p><strong>三、 啟動極限替代方案，維持生命照護底線</strong></p>\n<ol>\n<li>\n<p><strong>無動力/極限醫療替代</strong>：在醫療氣體配送延遲或耗竭的極端狀況下，護理人員須演練在3分鐘內，將重症病患的中央氧氣管線拔除，快速且精準地切換至床邊備用的氧氣鋼瓶。</p>\n</li>\n<li>\n<p><strong>人工維生操作</strong>：若資源極度匱乏（如備用氧氣鋼瓶耗盡、無電），護理部須領導團隊以人工方式維持病患基本生命徵象，例如動員組建「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持重症病患呼吸，或執行紙本降級的人工給藥作業。</p>\n</li>\n</ol>\n<p><strong>四、 強制輪休與護理戰力保存</strong></p>\n<ol>\n<li>\n<p><strong>軍事化強制輪班</strong>：因交通受阻導致員工無法正常換班，為避免留守的護理團隊因高壓與過勞而發生戰鬥疲勞，護理部須與人事室協調，啟動「軍事化強制輪班機制」（如嚴格執行12小時一班）。</p>\n</li>\n<li>\n<p><strong>強制撤離火線休息</strong>：制定鐵律，時間一到無論前線多麼急迫，接班人員必須強行接手，下班護理人員強制撤離火線，並送至指定的「安全庇護所（Safe\n    Haven）」進行休息與心理修復，確保醫療戰鬥力的長期續航。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況\n2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透破壞、資源搶奪與群眾恐慌的極端實體安全威脅。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>身兼「計畫部（大腦）」與「執行部醫療照護（骨幹）」的雙重核心角色。面對外部群眾包圍與內部封鎖警戒，護理部的具體因應作為如下：</p>\n<p><strong>一、 擔任「計畫部門」大腦：極限資源盤點與情資控管</strong></p>\n<ol>\n<li>\n<p><strong>計畫部長統籌（P0）</strong>：由護理部部長擔任計畫部長，必須綜觀無人機威脅與避難群眾包圍的情勢，配合院方實施的「硬邊界防護」與「內部封鎖（Lockdown）」，建立醫療持續運作的替代執行方案，並發布事故行動計畫（IAP）。</p>\n</li>\n<li>\n<p><strong>封鎖狀態下的資源精算（P1）</strong>：由護理部督導長擔任資源控管小組長。因應外部群眾包圍可能導致運補中斷，必須精確盤點院內殘存的護理人力、病床空床數及關鍵醫療物資，重新精算在「孤島/封鎖狀態」下的消耗速率，以確保重症搶救供應無虞。</p>\n</li>\n<li>\n<p><strong>病人動向追蹤與家屬安撫（P2）</strong>：由護理部督導長擔任狀況分析小組長。在啟動防暴封鎖或空間轉換時，轄下的「病人動向組」必須嚴密追蹤病患在各安全隔離區的正確位置；同時針對因外部威脅或醫院實施封鎖而感到恐慌的住院病患與家屬，給予正確的詢答與情緒安撫，穩定院內民心。</p>\n</li>\n</ol>\n<p><strong>二、 執行「醫療照護」骨幹：死守防線與極限檢傷分流</strong></p>\n<ol>\n<li>\n<p><strong>協同把守「單一檢傷武裝通道」</strong>：面對大量湧入欲尋求庇護或物資的社區群眾，急診高階護理師必須與武裝警力共同於「聯合檢查站（Check-point）」站哨。執行嚴格的醫療需求核對，強勢阻絕僅為了尋求庇護或索購物資的非緊急群眾，確保核心醫療資源不被癱瘓。</p>\n</li>\n<li>\n<p><strong>退守「安全隔離區（Safe\n    Haven）」</strong>：若社區群眾因恐慌或企圖搶奪物資（如抗生素、麻醉藥品）而演變為暴動衝闖，護理人員須配合急診室降下防暴門（內部封鎖），將重症病患緊急推入並鎖入預先規劃的「安全隔離區」，在保全防暴盾牌掩護下維持醫療處置，保護醫患免受暴徒傷害。</p>\n</li>\n<li>\n<p><strong>護理人力重分配與「反向檢傷」</strong>：護理部掌握全院最多醫療人力，必須迅速將停診的門診、健檢中心護理師調派至急診或重症區支援。同時配合醫師執行「反向檢傷（Reverse\n    Triage）」，將病房內生命徵象穩定的輕症病患快速辦理出院或轉出，強行騰出病床與擴充量能（Surge\n    Capacity）。</p>\n</li>\n</ol>\n<p><strong>三、 護理戰力保存與強制輪替（心理與生理防護）</strong></p>\n<ol>\n<li>\n<p><strong>軍事化強制輪班</strong>：面對群眾暴動壓力與外部武裝威脅，前線護理人員極易面臨心理崩潰與生理耗竭。護理部須與人事室協調，啟動「軍事化強制輪班機制」（如嚴格執行\n    12\n    小時一班）。時間一到，接班人員必須強行接手，強制下班護理人員撤離火線。</p>\n</li>\n<li>\n<p><strong>強制撤離至「安全庇護所」與心理急救（PFA）</strong>：下班的護理人員必須強制送至大連院區結構最安全、最深層地下室的「員工專屬庇護站」休息。在聽不到哀嚎聲、看不到鮮血的絕對安全環境中，由心理韌性特遣隊（含精神科醫師、臨床心理師與院牧）提供心理除頻（Debriefing）與心理急救（PFA），預防戰鬥疲勞與急性壓力崩潰，確保醫療戰鬥力的長期續航。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭與空襲威脅，必須進行大面積的「空間降階防護」，將高樓層的醫療量能轉移至地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>身兼全院的<strong>「計畫部門（大腦）」</strong>與<strong>「執行部門醫療照護（骨幹）」</strong>的雙重核心角色。面對防空疏散與\nB1 備援空間的緊急開設，護理部的具體因應作為如下：</p>\n<p><strong>一、 擔任「計畫部門」大腦：統籌疏散情資與追蹤病人動向</strong></p>\n<ol>\n<li>\n<p><strong>擬定疏散行動計畫（計畫部長\n    P0）</strong>：由護理部部長擔任計畫部長。必須綜觀空襲威脅與空間轉置的情勢，配合執行部建立醫療持續運作的替代方案，並為防空疏散與\n    B1 備援空間啟用的執行週期，發布「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>極限資源盤點與控管（資源控管小組\n    P1）</strong>：由護理部督導長負責。在向地下室疏散的混亂過程中，精確盤點全院殘存的護理人力、設施與物資，並針對即將啟用的\n    B1 五處功能區建立資源清單，確保重症搶救供應無虞。</p>\n</li>\n<li>\n<p><strong>嚴密追蹤病人動向與家屬安撫（狀況分析小組\n    P2）</strong>：由護理部督導長負責。轄下的「病人動向組」必須在垂直疏散的混亂過程中，嚴密追蹤病患由高樓層轉移至\n    B1\n    各安全功能區的正確位置，確保無人遺漏；同時針對因防空警報而恐慌的住院病患與家屬，給予正確的資訊發布與情緒安撫。</p>\n</li>\n</ol>\n<p><strong>二、 擔任「執行部門」骨幹：執行垂直疏散與進駐 B1 醫療區</strong></p>\n<ol>\n<li>\n<p><strong>無動力垂直疏散與就地掩蔽</strong>：當空襲警報響起，若高樓層受損或面臨斷電，護理人員須利用軟擔架（滑墊）與可攜式蓄電池設備，將重症病患經由安全梯，以人力接力的方式垂直疏散至\n    B1 避難區。若 ICU\n    病患無法立即下樓，則迅速將病床推離靠窗區域，移至建築物的「核心內筒（如梯廳、無窗走廊）」進行防爆掩蔽。</p>\n</li>\n<li>\n<p><strong>執行反向檢傷與極限降載</strong>：配合醫師執行「反向檢傷（Reverse\n    Triage）」，將病房內生命徵象穩定的病患快速辦理出院或引導至 B1\n    輕症病房（路加 B1 停車場），極速騰出病床與擴充量能。</p>\n</li>\n<li>\n<p><strong>進駐 B1\n    五大備援功能區</strong>：護理部掌握全院最多醫療人力，必須打破平時的科室編制，將護理師重分配並調派至剛開設的\n    B1 功能區（檢傷行政區、臨時 ICU\n    病房、臨時開刀房、恢復室及輕症病房），在戰火與資源受限下維持重症照護底線。</p>\n</li>\n</ol>\n<p><strong>三、 心理防護與護理戰力強制輪替</strong></p>\n<ol>\n<li>\n<p><strong>軍事化強制輪班</strong>：在防空威脅與地下室高壓環境下，前線護理人員極易面臨心理崩潰與生理耗竭。護理部須與人事室協調，啟動「軍事化強制輪班機制」（如嚴格執行\n    12 小時一班），時間一到強制交接，將下班人員撤離火線。</p>\n</li>\n<li>\n<p><strong>安全庇護與心理急救（PFA）</strong>：確保下班的護理人員強制撤離至「員工專屬庇護站」休息。在絕對安靜、安全的環境中，配合心理韌性特遣隊進行心理除頻（Debriefing）與心理急救（PFA），預防戰鬥疲勞與創傷後壓力症候群（PTSD），確保醫療戰鬥力的長期續航。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨極端的戰災與大量傷患（MCI）考驗。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>扮演著雙重核心角色：其高層主管擔任大腦中樞的<strong>「計畫部（Planning\nSection）」</strong>，而前線的廣大護理人員則是<strong>「執行部（Operations\nSection）」</strong>中維持醫療運作與戰傷搶救的最大宗主力。</p>\n<p>面對大量戰傷病患的湧入，護理部的具體因應作為如下：</p>\n<p><strong>一、 統籌計畫部門（Planning Section）：情報大腦與資源調控</strong></p>\n<ol>\n<li>\n<p><strong>擔任計畫部長（P0）</strong>：由護理部部長擔任，負責綜觀所有災情資訊，與指揮官研商並建立替代執行方案，為每個運作週期制定「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>人力與資源控管（P1）</strong>：由護理部督導長擔任資源控管小組長，精確掌握與盤點全院現有的醫護人力、空床數及關鍵設備（如呼吸器、點滴幫浦）的分佈，並與後勤部門密切協調資源調度。</p>\n</li>\n<li>\n<p><strong>狀況分析與病人追蹤（P2）</strong>：由護理部督導長擔任狀況分析小組長，設立情報專區以追蹤大量湧入傷患的動向，並負責病人家屬的詢答與情緒安撫，確保混亂中名單與去向的正確性。</p>\n</li>\n</ol>\n<p><strong>二、 極限人力抽調與響應「急診 333」</strong></p>\n<ol>\n<li>\n<p><strong>打破建制，人力重分配</strong>：護理部掌握全院最多的醫療人力。面對戰傷洪流，護理部必須迅速打破平時的科室本位，將門診、健檢中心及非緊急單位的護理師，緊急抽調並派往急診、開刀房或臨時設立的大量傷患區支援。</p>\n</li>\n<li>\n<p><strong>病房急援前線</strong>：當總機廣播「急診 333」大量傷患代號時，各病房（如\n    6A、5A、MICU、SICU 等）須依據院內人力支援配置，立即抽出 1 至 2\n    名護理人員前往急診現場，接受急診護理師組長的指揮，直接投入紅、黃、綠區的戰傷搶救與檢傷分類。</p>\n</li>\n</ol>\n<p><strong>三、 執行病房極限降載與「反向檢傷」</strong></p>\n<ol>\n<li>\n<p><strong>病床擴充與轉銜（Surge\n    Capacity）</strong>：護理部須配合資深醫師執行的「反向檢傷（Reverse\n    Triage）」，針對一般病房甚至加護病房內相對穩定的病患，迅速辦理提早出院或轉銜下轉至基層診所與長照機構。</p>\n</li>\n<li>\n<p><strong>病房戰術轉換</strong>：極速清空現有的病房空間，將一般病房轉換為戰傷病房，並換上戰備床單，強行騰出急重症病床，準備迎接由急診或臨時開刀房轉上的大量戰傷病患。</p>\n</li>\n</ol>\n<p><strong>四、 維持戰時照護底線與紙本降級作業</strong></p>\n<ol>\n<li>\n<p><strong>死守維生底線</strong>：在資源極度匱乏或遭遇斷水、斷電、斷氧的極端孤島狀態下，護理團隊必須堅守照護底線，例如在氧氣與電動呼吸器耗盡時，領導行政人員或家屬組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）人工接力維持重症病患的呼吸。</p>\n</li>\n<li>\n<p><strong>紙本降級（Downtime）作業</strong>：若遭遇戰火或駭客攻擊導致資訊系統癱瘓，各護理站須立即砸破封條取出「當機緊急箱（Downtime\n    Box）」，全面切換為紙本病歷、手寫處方箋與紙本檢傷單，確保戰傷搶救與給藥不因斷網而停擺。</p>\n</li>\n</ol>\n<p><strong>五、 實施強制輪替與心理急救防護</strong></p>\n<ol>\n<li>\n<p><strong>軍事化強制輪班</strong>：面對大量血肉模糊的傷患與極高壓的戰傷搶救環境，護理部須配合人事室嚴格執行「軍事化強制輪班機制」（如嚴格執行\n    12\n    小時一班）。無論前線多麼急迫，時間一到強制要求護理人員交接並撤離火線，嚴禁連續超時工作。</p>\n</li>\n<li>\n<p><strong>員工庇護與心理除頻</strong>：強制安排下班的護理人員至地下室安全的「員工專屬庇護站」輪休，並由心理韌性特遣隊針對剛經歷高壓搶救的護理人員進行心理急救（PFA）與心理除頻（Debriefing），防範護理團隊爆發創傷後壓力症候群（PTSD）與戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨基礎設施嚴重受損的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>扮演著雙重核心角色：高層主管擔任大腦中樞的<strong>「計畫部門（Planning\nSection）」</strong>，而前線廣大的護理人員則是<strong>「執行部門（Operations\nSection）」</strong>中維持病患防護與維生底線的骨幹。</p>\n<p>面對此極端狀況，護理部及其轄下人員的具體因應作為如下：</p>\n<p><strong>一、 統籌災情情報與資源控管（計畫部門 P0、P1、P2）</strong></p>\n<ol>\n<li>\n<p><strong>擔任計畫中樞</strong>：由護理部部長擔任計畫部長（P0），綜觀漏水、停電與通訊中斷等災情資訊，與指揮官研商建立替代執行方案，並為每個運作週期發布「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>資源與動向監控</strong>：由護理部督導長擔任資源控管小組長（P1）與狀況分析小組長（P2），在基礎設施受損下，嚴密監控病床空床數、待處理傷患數、醫護人力數及關鍵設備（如備用電源、手電筒）的供應情況，並追蹤混亂中的病患動向。</p>\n</li>\n</ol>\n<p><strong>二、 應對電力瞬斷與電梯停用之「病患防護與垂直疏散」</strong></p>\n<ol>\n<li>\n<p><strong>就地掩蔽（Defend in\n    Place）</strong>：當遭遇空襲震波或爆炸且無法下樓時，加護病房（ICU）與病房護理人員須在不斷開呼吸器與維生儀器的情況下，將病床迅速推離靠窗區域，移至建築物的「核心內筒（如電梯梯廳、無窗戶的內部走廊）」進行防爆掩蔽。</p>\n</li>\n<li>\n<p><strong>無動力垂直疏散</strong>：若因電力瞬斷導致電梯停用，且高樓層面臨火災或倒塌風險，護理人員須利用可攜式蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，以純人力接力將重症病患經安全梯垂直疏散至低樓層或地下室。</p>\n</li>\n</ol>\n<p><strong>三、 應對通訊中斷與系統當機之「紙本降級（Downtime）作業」</strong>\n若震波或斷電導致 HIS 醫療資訊系統及網路癱瘓：</p>\n<ol>\n<li>\n<p><strong>啟用當機緊急箱</strong>：各護理站須立即砸破封條取出「當機緊急箱（Downtime\n    Box）」，全面切換為紙本降級模式。</p>\n</li>\n<li>\n<p><strong>回歸人工紙本作業</strong>：護理人員須改用三聯式紙本病歷、手寫處方箋與紙本檢傷單來維持醫療運作。在通訊全斷下，配合「傳令兵（Runner）」制度，以人工徒步方式精準遞送緊急醫囑與檢驗報告。</p>\n</li>\n</ol>\n<p><strong>四、 應對漏水與維生管線中斷之「極限節流與人工替代」</strong></p>\n<ol>\n<li>\n<p><strong>死守維生底線</strong>：若中央氧氣管線因震動受損失去壓力，護理人員須在 3\n    分鐘內將重症病患切換至備用氧氣鋼瓶；若鋼瓶與電動呼吸器皆因斷電耗盡，須領導行政人員或家屬組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持病患呼吸。</p>\n</li>\n<li>\n<p><strong>水資源極限管制</strong>：若遭遇停水，護理部須配合實施極其嚴格的水資源配給，要求全院使用乾洗手液，最乾淨的水源僅保留供基本維生與必要醫療處置，嚴禁一般盥洗。</p>\n</li>\n</ol>\n<p><strong>五、 應對消防警報之「初期滅火與疏散引導」</strong></p>\n<ol>\n<li>\n<p><strong>確認與初期滅火</strong>：若震動或爆炸引發真實火災，病房護理人員（作為單位自衛消防編組）須立即進行初期滅火，並高聲呼喊或以對講機通報。</p>\n</li>\n<li>\n<p><strong>病房疏散管制</strong>：火勢擴大時，護理人員須協助將病患及家屬移出病房，優先執行「水平疏散（移至防火區劃另一側或鄰近安全棟別）」，並關閉防火門以侷限火煙。待清查人員完畢後，配合指揮中心指示進行後續的垂直疏散點名。</p>\n</li>\n</ol>\n<p>工務室如何執行極限負載卸除以確保紅區供電？</p>\n<p>資訊室在斷網時如何啟動紙本降級與傳令機制？</p>\n<p>護理部如何進行高樓層重症病患的垂直避難引導？</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨將醫療量能外移與大批病患疏散的極限挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>扮演著雙重核心角色：高階主管擔任大腦中樞的<strong>「計畫部門」</strong>，而廣大的前線護理人員則是<strong>「執行部門」</strong>中執行醫療降載、病患疏散與照護的骨幹。</p>\n<p>面對此撤離與分流指令，護理部及其轄下人員的具體因應作為如下：</p>\n<p><strong>一、 擔任計畫中樞，統籌疏散量能與資源控管</strong></p>\n<ol>\n<li>\n<p><strong>計畫決策與資源監控</strong>：由護理部部長擔任計畫部長（P0），護理部督導長分別擔任資源控管小組長（P1）與狀況分析小組長（P2）。在撤離行動中，護理部高層須嚴密監控全院的病床空床數、醫護人力數、可用物資與運輸設備。</p>\n</li>\n<li>\n<p><strong>評估最大疏散能量</strong>：護理部（計畫組）須精算並評估在現有固定的工作人員情況下，醫院的「最大疏散病人數量」，交由指揮官統籌分配撤離與運輸資源。</p>\n</li>\n<li>\n<p><strong>啟動病人追蹤管理</strong>：一旦啟動疏散，護理部轄下的狀況分析小組須立即啟動「撤離時病人追蹤管理機制」，確保在混亂中正確記錄病患的去向（如提早出院、轉送他院），並確保動向資訊傳遞正確。</p>\n</li>\n</ol>\n<p><strong>二、 配合執行「反向檢傷」與病患精準分級</strong></p>\n<ol>\n<li>\n<p><strong>協助反向檢傷（Reverse\n    Triage）</strong>：護理人員須配合由資深醫師組成的「反向檢傷特別小組」，進入一般病房與加護病房，針對留院病患進行強勢評估與病情分類造冊。</p>\n</li>\n<li>\n<p><strong>病患四級分類</strong>：依據撤離需求，協助將病患精準分級為：行動方便可提早出院者（可返家）、需扶持但有家屬照顧者（安置）、一般臥床病人（一般住院）、以及依賴維生設備的重症患者（高度照護）。</p>\n</li>\n</ol>\n<p><strong>三、 執行極速病房降載與人力重分配</strong></p>\n<ol>\n<li>\n<p><strong>極速清空空間</strong>：針對評估為可提早出院或下轉的輕症及穩定病患，護理站須迅速協助辦理緊急出院手續，目標在\n    24 小時內強行騰出大連院區至少 30% 至 40%\n    的急重症病床空間，換上戰備床單以迎接戰傷洪流。</p>\n</li>\n<li>\n<p><strong>護理人力重分配</strong>：護理部主任須將被取消常規醫療的單位（如門診、健檢中心）的護理人力，迅速調派支援至急診、開刀房、或臨時設立的大量傷患處理區。</p>\n</li>\n</ol>\n<p><strong>四、 執行無動力病患疏散與搬運</strong>\n病患的實體運送行動<strong>以護理人員為主</strong>，並搭配行政與清潔人力協助。</p>\n<ol>\n<li>\n<p><strong>疏散原則與防護</strong>：疏散原則為「先平行、再垂直」。行動方便的病人於房間內疏散時，護理人員須發給被單一條予以保暖；若病人因故無法行走或昏迷，則利用被單包裹拖曳移動。</p>\n</li>\n<li>\n<p><strong>重症垂直搬運</strong>：若電梯停用且高樓層需撤離，護理人員須利用蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，以純人力接力將插滿管路的重症病患經安全梯垂直疏散。</p>\n</li>\n<li>\n<p><strong>留置區清點與排序</strong>：將病患移至暫時留置區（或接運疏散區）後，護理人員必須立刻清查所有病人，確保其動向，並根據病人情況列出處理與轉運的先後順序。</p>\n</li>\n</ol>\n<p><strong>五、 確保護理紀錄與救急物資「隨車轉移」</strong>\n在病患後撤與轉送的過程中，護理人員是確保醫療照護不中斷的最後防線：</p>\n<ol>\n<li>\n<p><strong>醫療文件隨行</strong>：護理人員必須確認每位轉運病患皆留下轉診單，並確保病患的「病歷摘要、藥物治療紀錄及檢驗報告」確實隨著病人移出，交接給接收醫院。</p>\n</li>\n<li>\n<p><strong>戰備物資隨行</strong>：針對高度照護與一般住院的轉運病患，護理人員需確保有足夠量的急救藥物、靜脈輸液或血液製品<strong>與病人一起運送</strong>到接收醫院，避免轉送途中或剛抵達時發生醫藥耗竭的危機。</p>\n</li>\n</ol>\n<p>指揮官如何決定撤離與轉送的優先順序？</p>\n<p>在撤離行動中，聯絡官如何與外部醫院對接？</p>\n<p>若執行撤離時通訊中斷，如何追蹤病患動向？</p>"}]}, {"role": "急診部", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，急診部作為戰火與災難應變的最前線，在HICS（醫院事故指揮系統）中扮演守護生命與檢傷樞紐的關鍵角色，具體因應作為如下：</p>\n<p><strong>一、 擔任「醫療照護主管」並執行急診量能盤點</strong></p>\n<ol>\n<li>\n<p><strong>進駐HICS指揮體系</strong>：急診部主任將擔任執行部的副部長兼<strong>「醫療照護主管（O1）」</strong>，同時主責「醫療應變與傷患搶救組」。</p>\n</li>\n<li>\n<p><strong>限時盤點與回報</strong>：急診部須迅速盤點急診室現有的留觀床位、急救設備（如推床、急救車、甦醒球）與急診醫護人力，撰擬「檢傷救護流程」及「傷患後送表」，並將急診量能數據迅速提交給「統籌呈報組（危管會）」，以利彙整並於時限內向主管機關呈報。</p>\n</li>\n</ol>\n<p><strong>二、 執行「反向檢傷」與急診清空降載</strong></p>\n<ol>\n<li>\n<p><strong>實施反向檢傷（Reverse\n    Triage）</strong>：為應對戰時可能瞬間湧入的大量傷患，急診部必須打破平時的收治邏輯，快速評估急診現有病患。將生命徵象穩定者快速辦理出院或轉出至輕症區，將有限的急救資源留給最有機會存活的多數人。</p>\n</li>\n<li>\n<p><strong>騰出擴充量能</strong>：透過極速清空急診大門與搶救區，為隨時到來的戰傷病患騰出「彈性擴充量能（Surge\n    Capacity）」與戰傷病床。</p>\n</li>\n</ol>\n<p><strong>三、 整備臨時檢傷區與大量傷患動線</strong></p>\n<ol>\n<li>\n<p><strong>建立大量傷患分區</strong>：啟動大量傷患緊急醫療救護機制（代號333），急診部須規劃並建立明確的病人照護分區，包含：檢傷分類區、重傷治療區（紅區）、中傷治療區（黃區）、輕傷治療區（綠區）及留觀區，並調派各科支援醫師進駐對應區域。</p>\n</li>\n<li>\n<p><strong>整備 B1\n    備援檢傷區</strong>：因應戰時防空疏散或設施受損風險，急診部需配合演練地下備援空間轉換，確認<strong>「約翰／馬可大樓\n    B1\n    工務室前方」</strong>的檢傷行政區動線，確保傷病患登記、檢傷分類及轉送紀錄流程順暢。</p>\n</li>\n</ol>\n<p><strong>四、 確保急診核心功能持續運作與物資對接</strong></p>\n<ol>\n<li>\n<p><strong>維持核心醫療</strong>：戰時情境下，「急診與急重症收治」是全院必須優先維持的核心醫療功能（CI核心功能），急診部必須確保此服務不中斷。</p>\n</li>\n<li>\n<p><strong>戰備物資對接</strong>：急診部作為前線，須與藥劑科、資材組及血庫等後勤單位確認「推拉式物流（Push\n    Logistics）」機制。確保戰傷急救箱（含戰術止血帶、骨針、止血紗布、強效鎮痛藥劑）及大量輸血資源能不待申請（盲派）直接送達急診紅區，確保搶救前線物資充足。</p>\n</li>\n</ol>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」之複合性危機，急診部身處衝突與搶救的最前線，必須迅速啟動大量傷患應變、極限分流與防暴機制，其具體因應作為如下：</p>\n<p><strong>一、 評估災情啟動「大量傷患機制（Code 333）」與初步清空</strong></p>\n<ol>\n<li>\n<p><strong>啟動機制</strong>：當交通事故傷患瞬間湧入，若達到「內科系同時間1-2級病人超過8人或3級病人超過20人，外科系同時間1-2級病人超過3人或3級病人超過15人」之門檻，急診部主任或當班資深醫師須立即通報院長，啟動院內大量傷患機制（代號：急診333）。</p>\n</li>\n<li>\n<p><strong>急診初步清空</strong>：急診人員須立即將原有之急診病人集中移至「留觀區」，並將其餘空床集中於檢傷入口處，以騰出搶救空間準備接收新傷患。</p>\n</li>\n<li>\n<p><strong>前線指揮與任務分配</strong>：急診部主任擔任醫療照護主管，負責主持急診運作，向各科前來支援的醫師進行「3分鐘簡報」，告知病人類型與處理原則，並調派醫師至各分區進行救護。</p>\n</li>\n</ol>\n<p><strong>二、 執行極限醫療分流與「反向檢傷（Reverse Triage）」</strong>\n面對恐慌人潮與要求住院的家屬，急診部必須打破平時收治邏輯，實施極限分流：</p>\n<ol>\n<li>\n<p><strong>戶外分流與領藥</strong>：針對因恐慌而大量湧入要求提早領取慢性病藥品的民眾，急診部應協調設立「戶外慢性病處方籤領藥區」或戶外防疫門診，將單純領藥與輕症民眾阻絕於急診搶救區外。</p>\n</li>\n<li>\n<p><strong>反向檢傷與拒絕非緊急住院</strong>：面對家屬強烈要求住院的壓力，急診部須會同資深主治醫師組成小組執行「反向檢傷」。強制評估並篩選出生命徵象穩定的現有病患，辦理緊急出院或下轉至基層診所，將寶貴的急重症病床與擴充量能（Surge\n    Capacity）絕對保留給交通事故的重傷患。</p>\n</li>\n</ol>\n<p><strong>三、 戰術空間轉換與設立大量傷患照護分區</strong></p>\n<ol>\n<li>\n<p><strong>設立標準照護分區</strong>：針對交通事故傷患，嚴格執行檢傷分類，並劃定明確的照護分區：檢傷分類區、重傷治療區（紅區）、中傷治療區（黃區）、輕傷治療區（綠區）及留觀區。</p>\n</li>\n<li>\n<p><strong>大廳空間轉換（阻絕輕傷患）</strong>：為避免急診室被恐慌的輕傷患癱瘓，急診可協同總務部門，於30分鐘內清空一樓門診大廳的候診椅，利用四色動線將大廳瞬間轉換為「大量傷患一線檢傷區」與「輕傷縫合包紮區」，有效將佔比極高的恐慌與輕傷民眾阻絕於重症急診室之外。</p>\n</li>\n</ol>\n<p><strong>四、 啟動防暴封鎖（Lockdown）與硬邊界防護</strong></p>\n<ol>\n<li>\n<p><strong>建立實體硬邊界</strong>：面對假訊息引發的恐慌與潛在的群眾暴動，急診部須會同警衛與安全管制組，封閉多餘出入口，僅保留一處作為武裝警力與高階護理師共同站哨的「單一檢傷武裝通道」，執行嚴格身分核對。</p>\n</li>\n<li>\n<p><strong>內部封鎖與防護</strong>：若暴民或不理性家屬企圖衝闖急診室搶奪藥品，急診部須配合啟動「內部封鎖（Lockdown）」。迅速降下防暴門，將急診醫護人員與重症病患鎖入預先規劃的「安全隔離區（Safe\n    Haven）」，由保全死守並等待優勢警力支援。</p>\n</li>\n</ol>\n<p><strong>五、 跨部門對接物資盲派與家屬安置</strong></p>\n<ol>\n<li>\n<p><strong>戰備物資「盲派（Push）」接收</strong>：急診前線不待開立常規領料單，直接接收由藥庫與資材室以「盲派（Push\n    Logistics）」方式推進急診紅區的「戰傷急救箱」（含止血帶、點滴、強效鎮痛藥劑），確保搶救物資隨手可得。</p>\n</li>\n<li>\n<p><strong>家屬尋人與撤離資訊詢答</strong>：急診部須將登錄完成的傷患動向與名冊，迅速交由計畫組與「社工室/院牧部」。由社工人員在專屬的家屬接待區負責家屬聯繫、安撫與撤離資訊的說明，避免家屬在急診搶救區內徘徊干擾醫療動線。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況\n2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨極高的實體安全威脅（如敵方滲透破壞）以及群眾恐慌引發的資源搶奪危機。</p>\n<p>急診部作為醫院面臨外部衝擊的「最前線」，首當其衝會遭遇避難人潮的推擠與壓力。在\nHICS（醫院事故指揮系統）架構下，急診部主任擔任執行部的「醫療照護主管（O1）」，必須在維持重症搶救與保護同仁安全之間取得平衡。其具體因應作為如下：</p>\n<p><strong>一、 配合「硬邊界」防護與設立「單一武裝檢傷通道」</strong>\n面對大量湧入欲尋求庇護或物資的社區群眾，急診部必須配合保安組將醫療資源絕對保留給真正的傷病患：</p>\n<ol>\n<li>\n<p><strong>聯合檢查站檢傷</strong>：全院實施物理封鎖後，急診車道將成為唯一的出入口。急診部的高階護理師必須與武裝警力共同於「聯合檢查站（Check-point）」站哨。</p>\n</li>\n<li>\n<p><strong>強勢阻絕非醫療需求者</strong>：在通道口執行嚴格的身分與醫療需求核對，強勢阻絕僅為了尋求庇護、索購物資或非緊急醫療需求的群眾，確保急診的核心醫療資源與空間不被癱瘓。</p>\n</li>\n</ol>\n<p><strong>二、 啟動防暴「內部封鎖（Lockdown）」與死守「安全隔離區」</strong>\n若社區群眾因恐慌，或企圖搶奪急診室的抗生素、麻醉藥品而演變為暴動衝闖，急診部須採取極限自保措施：</p>\n<ol>\n<li>\n<p><strong>極速內部封鎖</strong>：急診部須配合院方迅速啟動「內部封鎖（Lockdown）」，瞬間降下急診室防暴門並關閉全院電梯控制權。</p>\n</li>\n<li>\n<p><strong>退守安全隔離區（Safe\n    Haven）</strong>：將急診醫護人員與現場的重症病患，緊急鎖入預先規劃的「安全隔離區（Safe\n    Haven）」中。由保全持防暴盾牌結陣死守，維持急診檢傷區的秩序，並保護醫護人員與病患免受暴徒傷害，等待優勢警力支援。</p>\n</li>\n</ol>\n<p><strong>三、 維持核心搶救與執行「反向檢傷（Reverse Triage）」</strong>\n在實施硬邊界防護與封鎖的狀態下，急診部仍須確保醫療戰鬥力：</p>\n<ol>\n<li>\n<p><strong>維持重症醫療底線</strong>：確保留在院內及剛通過武裝檢傷通道的急重症傷患，能持續獲得黃金時間內的救命處置與救治。</p>\n</li>\n<li>\n<p><strong>執行極限降載與分流</strong>：若面臨大量傷患湧入，急診部須將佔比極高的恐慌輕傷患引導至大廳綠區（輕傷縫合區）或\n    B1\n    備援空間的輕症病房，並將穩定病患快速辦理出院或轉出（反向檢傷），為真正的戰傷或重症病患騰出搶救空間。</p>\n</li>\n</ol>\n<p><strong>四、 「無頭狀態」下的指揮權極限接管</strong>\n若周邊的不明人車、無人機偵蒐伴隨著敵方對聯外交通網的實體破壞（如斬首襲擾或炸毀橋樑），導致院長及副院長等核心高層被困於院外無法抵達：</p>\n<ol>\n<li>\n<p><strong>自動順位繼承</strong>：急診部主任作為當值最高層級的臨床主管，必須啟動「HICS\n    自動順位繼承機制」。</p>\n</li>\n<li>\n<p><strong>接管全院指揮權</strong>：急診部主任須在 5\n    分鐘內依法自動接管全院指揮權，穿上紅色的「Incident\n    Commander（事故指揮官）」背心，並於 10\n    分鐘內透過全院廣播發布動員令與最高戰略目標，避免群龍無首。</p>\n</li>\n</ol>\n<p><strong>五、 啟動紙本降級（Downtime）與防範滲透</strong></p>\n<ol>\n<li>\n<p><strong>紙本降級作業</strong>：若外部偵蒐伴隨網路攻擊導致系統當機，急診護理站須立即砸破「當機緊急箱（Downtime\n    Box）」封條，取出三聯式紙本病歷、紙本檢傷單與手寫處方箋，強制進入「紙本降級極限模式」以維持醫療運作。</p>\n</li>\n<li>\n<p><strong>防範偽裝滲透</strong>：急診醫護人員需提高警覺，若在混亂中發現穿著白袍的可疑偽裝人士，或不明物品，應立即通報巡邏哨盤查，防範爆裂物放置或人為破壞。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況\n2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，急診部在\nHICS\n架構下擔任執行部門的<strong>「醫療照護主管（O1）」</strong>，是面對大量戰傷與災難應變的「最前線」。</p>\n<p>面對空襲疏散與地下空間啟用，急診部的具體因應作為如下：</p>\n<p><strong>一、 進駐 B1 備援空間與設立「檢傷行政區」</strong>\n配合全院的空間降階防護，急診部必須將急救與檢傷量能轉移至地下安全的替代空間：</p>\n<ol>\n<li>\n<p><strong>開設 B1 檢傷站</strong>：於<strong>約翰／馬可大樓 B1\n    工務室前方</strong>確實開設「檢傷行政區」，辦理傷病患登記、檢傷分類行政作業與傷票紀錄。</p>\n</li>\n<li>\n<p><strong>極限檢傷分流</strong>：迅速依紅、黃、綠、黑四色進行大量傷患的檢傷分流。將輕傷病患引導至<strong>路加大樓\n    B1 停車場（輕症病房）</strong>進行分流安置，以維持候診與搶救動線的秩序。</p>\n</li>\n</ol>\n<p><strong>二、 執行「極限醫療降載」與「反向檢傷（Reverse Triage）」</strong>\n戰時醫療倫理將轉變為將有限資源留給最有機會存活的多數人，急診部須主動清空量能：</p>\n<ol>\n<li>\n<p><strong>反向檢傷</strong>：由資深主治醫師強制評估急診留觀區與一般病房的現有病患，篩選出生命徵象穩定者，快速辦理提早出院或下轉至基層診所與長照機構。</p>\n</li>\n<li>\n<p><strong>擴充戰備量能</strong>：透過極速降載，強行騰出大連院區的急重症病床與「擴充量能（Surge\n    Capacity）」，準備迎接戰傷病患洪流。</p>\n</li>\n</ol>\n<p><strong>三、 維持戰傷救命處置與核心醫療不中斷</strong></p>\n<ol>\n<li>\n<p><strong>損傷控制復甦</strong>：急診部醫師與創傷團隊須在黃金時間內，於 B1\n    空間（如約翰/馬可 B1 臨時 ICU）執行戰傷救護與「損傷控制復甦（Damage\n    Control Resuscitation）」，並視情況將病患安全轉送銜接至韓偉大樓 B1\n    的臨時開刀房。</p>\n</li>\n<li>\n<p><strong>守住醫療底線</strong>：確保急診、重症等核心醫療服務在戰火威脅下仍能於地下室持續運作不中斷。</p>\n</li>\n</ol>\n<p><strong>四、 斷網斷訊下的「紙本降級（Downtime）」作業</strong>\n若空襲伴隨敵方網路攻擊、斷電或摧毀基地台，導致 HIS\n系統癱瘓，急診部將瞬間面臨資訊全黑的危機：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機箱</strong>：急診護理站須立即砸破封條，取出預先整備的<strong>「當機緊急箱（Downtime\n    Box）」</strong>。</p>\n</li>\n<li>\n<p><strong>回歸類比作業</strong>：強制進入「紙本降級模式」，使用三聯式紙本病歷、手寫處方箋與紙本檢傷單，並運用無線電或傳令兵（Runner）傳遞緊急醫囑，確保急診醫療運作不受電磁破壞干擾。</p>\n</li>\n</ol>\n<p><strong>五、 「無頭狀態」下的指揮權自動繼承</strong>\n若空襲震波或戰火導致聯外交通中斷，院長與副院長等核心高層失聯或無法視事：</p>\n<ol>\n<li>\n<p><strong>啟動順位繼承</strong>：<strong>急診部主任</strong>作為當值最高層級的臨床主管，必須在 5\n    分鐘內依法啟動「HICS 自動順位繼承機制」。</p>\n</li>\n<li>\n<p><strong>接管全院決策</strong>：急診部主任須自動接管全院指揮權，穿上紅色的指揮官（Incident\n    Commander）背心，並迅速透過廣播下達全院最高戰略目標，避免醫院陷入群龍無首而導致黃金搶救期流失。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨極端的戰災大量傷患（MCI）考驗。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>急診部</strong>（協同創傷外科與重症醫學部）隸屬於執行部門的<strong>「醫療照護分支」</strong>，由急診部主任或當班資深醫師擔任<strong>「醫療照護主管（O1）」</strong>，是迎擊戰傷洪流的最前線指揮官。</p>\n<p>急診部的具體因應作為如下：</p>\n<p><strong>一、 啟動「急診 333」大量傷患應變與緊急召回</strong></p>\n<ol>\n<li>\n<p><strong>確認與通報</strong>：急診人員接獲大量傷患即將到院的通知（或現場湧入超出負荷之傷患）後，急診部主任或當班資深醫師須立即向院長（指揮官）報告，並下令啟動院內大量傷患應變機制。</p>\n</li>\n<li>\n<p><strong>廣播與召回</strong>：通知總機透過廣播系統發布<strong>「急診\n    333」</strong>代號三次，並以簡訊或群呼方式，緊急召回內、外、婦、兒科等各科值班醫師與護理人力至急診室報到支援。</p>\n</li>\n</ol>\n<p><strong>二、 執行戰術空間重構與「檢傷分類（Triage）」</strong>\n急診室必須瞬間從常規看診模式切換為戰地急救模式：</p>\n<ol>\n<li>\n<p><strong>極速清空與分區</strong>：將原有的急診病人集中移至留觀區，將空床集中於檢傷入口處。迅速建立病人照護分區，包含：<strong>檢傷分類區、重傷治療區（紅區）、中傷治療區（黃區）、輕傷治療區（綠區）及留觀區</strong>。</p>\n</li>\n<li>\n<p><strong>掛號與傷票作業</strong>：傷患到達後不需先掛號即可直接入內救治，由檢傷護理人員依傷情分流，並為病患掛上「傷票（傷病卡）」，指派輸送人員將傷患精準推送至對應的治療區。</p>\n</li>\n</ol>\n<p><strong>三、 統籌醫療搶救與人力調度</strong></p>\n<ol>\n<li>\n<p><strong>戰前簡報與派任</strong>：急診部主任（醫療照護主管）須向趕來支援的各科醫師進行\n    3 分鐘簡報，說明病人類型與處理原則，並將醫師調派至各區進行醫療救護。</p>\n</li>\n<li>\n<p><strong>損傷控制復甦</strong>：急診與創傷團隊於黃金時間內，在重傷區執行「損傷控制復甦（Damage\n    Control Resuscitation）」與救命處置。</p>\n</li>\n<li>\n<p><strong>量能評估與對外求援</strong>：急診主任須隨時整合各區傷患人數與變化。若重傷患超過\n    5 名、一般傷患超過 15\n    名，或整體超出醫院負荷，須評估並透過高屏區緊急醫療應變中心（EOC）或衛生局，請求協助將傷患轉院疏散。</p>\n</li>\n</ol>\n<p><strong>四、 啟動「反向檢傷（Reverse Triage）」與極限降載</strong> 面對急診與後續\nICU、開刀房需求的暴增，急診部須會同資深主治醫師組成特別小組，執行極限醫療降載：</p>\n<ol>\n<li>\n<p><strong>反向檢傷</strong>：進入一般病房甚至加護病房，強制評估現有病患，篩選出拔除點滴或提早出院不會立即危及生命的穩定病患。</p>\n</li>\n<li>\n<p><strong>騰出擴充量能</strong>：快速辦理出院或轉銜至基層診所及長照機構，強行騰出急重症病床與「擴充量能（Surge\n    Capacity）」，以接收由急診轉上的戰傷病患。</p>\n</li>\n</ol>\n<p><strong>五、 橫向協調後勤、輔助與安全支援</strong></p>\n<ol>\n<li>\n<p><strong>主動盲派物流（Push\n    Logistics）</strong>：急診前線極度混亂時，不等待填單申請，直接要求藥劑科與資材中心將「戰備急救箱（含止血帶、骨針、麻醉藥等）」盲派推送至急診紅區。</p>\n</li>\n<li>\n<p><strong>大量輸血協調</strong>：協調血庫提供大量急救用血；若血庫見底，隨時準備配合啟動院內「走動式血庫（Walking\n    Blood Bank）」，現場抽血即刻送入急診搶救。</p>\n</li>\n<li>\n<p><strong>安全與防暴防護</strong>：面臨大量恐慌群眾湧入，急診室極易發生推擠或搶奪醫療物資。急診須會同保安組（安全管制主管\n    O4）實施嚴格的門禁與動線管制；若遇暴徒衝闖，須迅速啟動「內部封鎖（Lockdown）」，降下防暴門，將醫護與重症病患鎖入安全區死守。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨將醫療量能外移、重症病患後撤以及極速降載的重大挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>急診部</strong>是全院檢傷分類、重症維生與車輛轉運的「最前線樞紐」。急診部主任擔任執行部門的<strong>「醫療照護主管（O1）」</strong>，負責統籌傷患的檢傷、分流、救護與後送轉院事宜。</p>\n<p>面對此撤離與分流指令，急診部的具體因應作為如下：</p>\n<p><strong>一、 擔任「醫療照護主管（O1）」，統籌檢傷分類與醫療分區</strong></p>\n<ol>\n<li>\n<p><strong>最高檢傷指揮</strong>：由急診部主任（或當班資深醫師）擔任醫療照護主管，負責排定病人治療與撤離的優先順序，確保混亂中病患有明確的動向。</p>\n</li>\n<li>\n<p><strong>配合反向檢傷（Reverse\n    Triage）與極速降載</strong>：面對大量病患疏散需求，急診部須配合將留觀區與急診現有病患進行強勢評估。將穩定輕症病患快速辦理出院或轉出，極速清空急診空間，騰出作為後續重症病患等待後撤轉運的「彈性擴充量能（Surge\n    Beds）」集結區。</p>\n</li>\n</ol>\n<p><strong>二、 設立與管理「救護車接運疏散區」</strong>\n在病患實體撤離行動中，急診室扮演著運輸動線的核心咽喉：</p>\n<ol>\n<li>\n<p><strong>建立接運樞紐</strong>：依據疏散計畫，除特殊考量外，<strong>「醫院急診室大門出口」將被設立為救護車的專屬「接運疏散區」</strong>。</p>\n</li>\n<li>\n<p><strong>動線分流管制</strong>：急診部須配合安全管制組（警衛），嚴格管制急診前車道僅限救護車進入，並將「可提早出院/返家」的輕症病患引導至門診大廳大門出口搭乘接駁車，避免與需要高度照護病患的救護車動線發生交岔與壅塞。</p>\n</li>\n</ol>\n<p><strong>三、 執行重症後撤轉院與「醫療交接」</strong>\n對於被分類為「高度照護（如依賴維生設備的危急病患）」與「一般住院」且必須轉院的病患：</p>\n<ol>\n<li>\n<p><strong>協助跨院交接</strong>：當病患被送至急診轉運區等待救護車時，急診醫師須協助原主治醫師與接收端醫院進行電話交班，並確認轉診事宜。</p>\n</li>\n<li>\n<p><strong>戰備物資與病歷隨行</strong>：急診護理人員須嚴格確認，每位準備上救護車轉運的病患，其轉診單、病歷摘要等醫療紀錄皆已備妥；同時必須確保有足夠的急救藥物、靜脈輸液等物資<strong>與病人一起運送</strong>至接收醫院，防止轉送途中發生醫療斷鏈。</p>\n</li>\n</ol>\n<p><strong>四、 評估疏散量能與啟動「大量傷患機制（急診 333）」</strong></p>\n<ol>\n<li>\n<p><strong>量能監控與通報</strong>：在撤離過程中，若同時伴隨外部大量傷患湧入，導致急診無法負荷（如一般傷患超過十五名、重傷患超過五名），急診部主任須立即評估並向指揮官報告，啟動「急診\n    333（大量傷患緊急醫療救護應變計畫）」。</p>\n</li>\n<li>\n<p><strong>請求外部疏散支援</strong>：當傷患超過本院收置與運輸能力範圍時，急診部須透過聯絡官或自行通報衛生局緊急醫療網（EOC），請求外部協助調度救護車與安排轉院疏散。</p>\n</li>\n</ol>\n<p><strong>五、 執行急診服務降載與死守「紅區」維生底線</strong></p>\n<ol>\n<li>\n<p><strong>急診降載管制</strong>：在執行大規模撤離與分流期間，急診部須執行降載。將輕症病人轉至門診或基層院所，必要時暫停收治新的非緊急住院病人（只出不入），以集中火力處理重症病患的維生與後撤。</p>\n</li>\n<li>\n<p><strong>死守維生資源</strong>：急診搶救區（紅區）是醫院的生命線。在撤離的混亂甚至可能伴隨停電的孤島狀態下，急診部須死守備用電力與醫療氣體，確保那些「因高度依賴維生設備而尚在等待救護車」的重症病患，在急診室內能獲得持續且不中斷的生命支持。</p>\n</li>\n</ol>\n<p>後勤部如何維持停水停電下的膳食與飲水？</p>\n<p>後勤部長在緊急物資與通訊調度上有哪些具體權責？</p>\n<p>若醫療氣體配送受阻，後勤部門如何接收與保管物資？</p>"}]}, {"role": "病房", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報各項量能。病房作為醫院收治與留置病患的核心區域，必須配合HICS（醫院事故指揮系統）體系，迅速執行量能盤點與極限醫療降載，以騰出戰時所需的擴充量能。病房的具體因應作為如下：</p>\n<p><strong>一、 迅速盤點病房量能並提交回報數據</strong>\n病房單位須立即清點現有住院病患人數、空床數及當班/可動用的護理人力，並確實編製「床位名冊」與「病人動向資料」。相關數據需迅速通報給護理部與HICS計畫部轄下的「資源控管組」及「狀況分析組」，以利統籌呈報組（危管會）能精確彙整，於時限內向主管機關完成量能初報與續報。</p>\n<p><strong>二、 配合執行「反向檢傷」與極限病床降載</strong>\n戰時必須將有限資源留給多數戰傷病患，病房需立即啟動極限醫療降載（Surge\nDischarge）：</p>\n<ol>\n<li>\n<p><strong>4小時極速清空：</strong>\n    針對病房內原本預計1至3天內出院的輕症病患或穩定待觀察病患，啟動極速結帳（或戰時記帳豁免），目標於4小時內完成安全疏散返家。</p>\n</li>\n<li>\n<p><strong>配合反向檢傷（Reverse Triage）：</strong>\n    配合由平時不負責該病房的資深主任級醫師所組成之「反向檢傷特別小組」進入病房，強制評估並篩選出「拔除靜脈點滴或提早出院，在72小時內不會立即危及生命」的病患，辦理緊急下轉至基層診所或長照機構。</p>\n</li>\n<li>\n<p><strong>達成降載目標：</strong>\n    必須於24小時內強行騰出至少30%至40%的急重症病床空間，並配合全院於<strong>48小時內將住院病人降載至30%</strong>的總目標。</p>\n</li>\n</ol>\n<p><strong>三、 執行病人轉送與出院安置計畫</strong>\n對於無法立即出院且需要持續醫療照護的病患，病房需會同主治醫師擬定「病人出院及轉院計畫」。</p>\n<ol>\n<li>\n<p>護理人員需盤點轉送這些病人所需的交通載具（如救護車）與隨車照護的醫護人力需求。</p>\n</li>\n<li>\n<p>確實準備病人的病歷摘要、用藥紀錄與交接資料，協助病患分級與轉銜，以利後撤與異地持續照護的順利進行。</p>\n</li>\n</ol>\n<p><strong>四、 戰備病床轉換與空間降階防護整備</strong></p>\n<ol>\n<li>\n<p><strong>戰傷病房轉換：</strong>\n    病房內所有被清空出來的病床，必須立即換上戰備床單，將一般病房迅速轉換為戰傷病房，準備迎接隨時湧入的大量傷病患。</p>\n</li>\n<li>\n<p><strong>預備就地掩蔽（Defend in Place）：</strong>\n    針對高脆弱區的病房，需演練在空襲警報響起時，將病床迅速推離玻璃帷幕與靠窗區域，移至建築物的「核心內筒」（如無窗戶的內部走廊、梯廳、浴室等）進行防爆掩蔽。</p>\n</li>\n<li>\n<p><strong>因應維生資源限縮：</strong>\n    病房團隊必須準備應對戰時的「電力負載卸除（Load\n    Shedding）」，屆時一般病房的電源迴路與冷氣空調將被強制切斷以保留給重症紅區；同時需配合極限節流，實施嚴格的水資源配給（如嚴禁病患盥洗、使用化學便器袋等）。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨戰災破壞與基礎設施中斷的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>病房單位（各護理站）</strong>位處於保護住院病患生命安全的最前線。面對停電、停水、斷氣、當機與火警等多重威脅，病房單位的具體因應作為如下：</p>\n<p><strong>一、 應對震波、火警之「初期應變與就地掩蔽」</strong></p>\n<ol>\n<li>\n<p><strong>就地防爆掩蔽（Defend in\n    Place）</strong>：若遭遇空襲震波或爆炸且無法立即下樓，加護病房與一般病房人員須迅速將病床推離靠窗區域，移至建築物的「核心內筒（如無窗戶的內部走廊、浴室）」進行防爆掩蔽，並拉下所有防爆窗簾。</p>\n</li>\n<li>\n<p><strong>火警初期滅火與侷限</strong>：若震動引發火警，發現者須大喊「失火了」並按下消防警鈴，就近使用滅火器（操作口訣：拉、瞄、壓、掃）進行初期滅火。</p>\n</li>\n<li>\n<p><strong>病房淨空與防煙</strong>：若火勢無法控制，應立即協助將病患及家屬移出病房，並將病房門關上（必要時以布單塞住門縫）以侷限火煙。確認房間（含浴室、櫥櫃）皆已淨空後，在門口設置打叉標示，防止人員誤闖。</p>\n</li>\n</ol>\n<p><strong>二、 應對電梯停用之「極限病患疏散與搬運」</strong>\n當高樓層病房面臨結構受損或火勢威脅，且電梯因電力瞬斷停用時：</p>\n<ol>\n<li>\n<p><strong>水平與垂直疏散</strong>：疏散原則為「先平行、再垂直」。優先將病患水平疏散至防火門另一側的鄰近安全棟別，若仍不安全再往低樓層或一樓門診大廳疏散。</p>\n</li>\n<li>\n<p><strong>無動力人工搬運</strong>：病房護理與支援人員須以純人力進行搬運（人力搬運原則為\n    5\n    人一組）。行動不便或昏迷的病患，可利用被單包覆拖曳移動；重症病患則須利用可攜式蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，經安全梯接力垂直疏散。</p>\n</li>\n<li>\n<p><strong>集結點名與動向追蹤</strong>：到達指定安全集結區後，病房單位須立即進行第一時間點名，清查病患與員工數量，並向指揮官回報病患動向。</p>\n</li>\n</ol>\n<p><strong>三、 應對水、電、氣中斷之「死守維生底線」</strong></p>\n<ol>\n<li>\n<p><strong>極限人工給氧（捏球大隊）</strong>：若中央氧氣系統因震損失去壓力，病房人員須在\n    3\n    分鐘內將重症病患切換至備用氧氣鋼瓶。若鋼瓶與電動呼吸器皆因斷電耗盡，病房須立即組織護理人員、行政人員或輕傷家屬成立「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持重症病患呼吸。</p>\n</li>\n<li>\n<p><strong>醫療降載與反向檢傷</strong>：配合資深醫師組成的「反向檢傷特別小組」，快速評估病房內「拔除點滴或提早出院不會立即危及生命」的穩定病患，強行辦理出院或下轉，極速騰出病床資源。</p>\n</li>\n<li>\n<p><strong>水資源極度管制</strong>：停水期間，病房須嚴格執行水資源管制。最乾淨的水僅供基本維生飲用與器械消毒，嚴禁一般盥洗，全面改用乾洗手液維持手部衛生。</p>\n</li>\n</ol>\n<p><strong>四、 應對通訊與系統當機之「紙本降級（Downtime）」作業</strong>\n若震波或駭客攻擊導致醫院 HIS 系統及網路全面癱瘓：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機緊急箱</strong>：各護理站須立即砸破封條，取出預先準備的「當機緊急箱（Downtime\n    Box）」，全單位強制作業模式轉換。</p>\n</li>\n<li>\n<p><strong>回歸人工紙本</strong>：停止依賴電腦，全面改用三聯式紙本病歷、手寫處方箋與離線列印的住院名單進行醫療紀錄與給藥，確保給藥與治療不中斷。</p>\n</li>\n<li>\n<p><strong>傳令兵（Runner）機制</strong>：在對講機與電話皆失效的狀態下，配合院內啟動的「傳令兵」制度，將緊急醫囑、檢驗需求以手寫紙本交由穿著反光背心的傳令兵，以徒步方式精準遞送至藥局、檢驗科或備援開刀房。</p>\n</li>\n</ol>\n<p>地下室備援醫療空間如何配置？</p>\n<p>資訊室如何應對紙本降級作業？</p>\n<p>工務室如何分配緊急發電機電力？</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>在\nHICS（醫院事故指揮系統）架構下，面對主管機關要求進行部分撤離與病患分流的極限挑戰，<strong>病房單位（包含各病房護理站、病房主治醫師與支援人員）</strong>位處於執行醫療降載、病患防護與實體疏散的最前線。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 配合執行「反向檢傷（Reverse Triage）」與病患精準分級</strong></p>\n<ol>\n<li>\n<p><strong>強勢評估與分類</strong>：病房醫護人員須配合由資深醫師組成的「反向檢傷特別小組」，進入病房對現有住院病患進行強勢評估，並將病人精準分類造冊。</p>\n</li>\n<li>\n<p><strong>落實四級分流</strong>：</p>\n<ul>\n<li>\n<p><strong>可返家（行動方便者）</strong>：拔除靜脈點滴，評估在 72\n    小時內不會立即危及生命的穩定病患，安排提早出院。</p>\n</li>\n<li>\n<p><strong>安置（需扶持者）</strong>：無立即危險但需照護，暫時由家屬帶回照顧，或辦理下轉至基層診所與長照機構。</p>\n</li>\n<li>\n<p><strong>一般住院（臥床者）</strong>：需持續醫療照護，考量移至院內安全病房，或轉送至其他醫院。</p>\n</li>\n<li>\n<p><strong>高度照護（危急病人）</strong>：依賴維生設備或加護病房之重症患者，優先評估轉送風險，並安排具備重症收治能力之醫院進行重置。</p>\n</li>\n</ul>\n</li>\n</ol>\n<p><strong>二、 執行「極速醫療降載」與提早出院辦理</strong></p>\n<ol>\n<li>\n<p><strong>極速清空病床</strong>：針對被判定為「可返家」或「安置」的輕症與穩定病患，病房單位須協助病患與家屬迅速辦理緊急出院手續。配合行政部門的戰時記帳豁免機制，目標在\n    24 小時內強行騰出大連院區至少 30% 至 40%\n    的急重症病床空間，並換上戰備床單。</p>\n</li>\n<li>\n<p><strong>動線分流</strong>：引導提早出院的病患使用醫院大廳出口離院，將急診室大門出口保留給需要救護車轉運的重症病患，避免動線交岔與壅塞。</p>\n</li>\n</ol>\n<p><strong>三、 執行病房疏散、房間淨空與無動力搬運</strong></p>\n<ol>\n<li>\n<p><strong>疏散原則與保暖</strong>：疏散時遵循「先平行、再垂直」的原則，方向必須一致以防衝突。行動方便的病人於房間內疏散時，病房須發給每人被單一條予以保暖。</p>\n</li>\n<li>\n<p><strong>無動力人工搬運</strong>：若電梯停用且病患無法行走或昏迷，病房人員可利用被單包裹拖曳移動；針對插滿管路的重症病患，則利用可攜式蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，以純人力接力（通常為\n    5 人一組）經安全梯進行垂直疏散。</p>\n</li>\n<li>\n<p><strong>嚴格執行房間淨空（Room\n    Clearance）</strong>：病患移出後，病房人員必須徹底清查房間內的其他空間（如浴室、櫥櫃）是否皆已淨空。確定淨空後，必須在門口設置標示（如打叉）或關閉房門，防止人員在混亂中誤闖或遺漏。</p>\n</li>\n</ol>\n<p><strong>四、 暫時留置區安置與清點排序</strong></p>\n<ol>\n<li>\n<p><strong>分區留置與管制</strong>：將病患移出病房後，送至指定的暫時留置區（如門診大廳或安全棟別），並依據狀況分為「穩定/家屬留置區」與「需要醫療處理區」，由醫護人員在現場持續提供照護，並防止病患進入危險區域或阻礙救護車道。</p>\n</li>\n<li>\n<p><strong>全面清點與轉運排序</strong>：在留置區內，病房護理人員必須立刻清查所有病人的數量與動向，確保無人遺漏。並根據病人的緊急情況，列出處理與轉運的清單及「先後順序」，以便當後送救護車或接駁車到達時，能有條不紊地將病患送上車。</p>\n</li>\n</ol>\n<p><strong>五、 確保「醫療紀錄與戰備物資」隨車無縫交接</strong>\n在病患後撤與轉送的過程中，病房護理人員是確保醫療照護不中斷的最後防線：</p>\n<ol>\n<li>\n<p><strong>醫療文件隨行與造冊</strong>：護理人員必須確認每位轉運病患皆有留下完整的文件紀錄（包含：病人姓名、病歷號碼、疾病分類、接收醫院名稱、運送車輛資料及隨行人員）。並確保病患的「轉診單、病歷摘要、藥物治療紀錄及檢驗報告」確實與病人搭配，隨車移出交接給接收醫院。</p>\n</li>\n<li>\n<p><strong>救急物資隨車</strong>：針對「高度照護」與「一般住院」的轉運病患，病房單位需與後勤資材組協調，確保有足夠量的急救藥物、靜脈輸液或血液製品<strong>與病人一起運送</strong>到接收醫院，避免在轉送途中或剛抵達接收端時發生醫藥存量耗竭的致命危機。</p>\n</li>\n</ol>\n<p>本院如何執行反向檢傷以評估哪些病患需優先撤離？</p>\n<p>若通訊中斷，指揮組如何與主管機關維持必要聯繫？</p>\n<p>撤離過程中如何確保高度照護病患的維生設備不中斷？</p>"}]}, {"role": "手術室", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報量能並進入戰時醫療整備。手術室作為戰時搶救重症與戰傷病患的核心樞紐，具體因應作為如下：</p>\n<p><strong>一、 納入HICS編組與限時量能盤點</strong></p>\n<ol>\n<li>\n<p><strong>加入醫療應變團隊</strong>：手術室同仁需納入HICS「執行部」轄下的<strong>「醫療應變與傷患搶救組」</strong>。</p>\n</li>\n<li>\n<p><strong>限時盤點與回報</strong>：必須迅速盤點現有手術室間數、麻醉設備、急救器械與當班/備援可用之醫護人力，並將精確數據迅速提交給「統籌呈報組」及「資源控管組」，以利全院彙整並於時限內向主管機關完成各項量能初報與續報。</p>\n</li>\n</ol>\n<p><strong>二、 執行醫療降載與停止常規手術</strong></p>\n<ol>\n<li>\n<p><strong>停止非緊急醫療</strong>：配合全院第一階段「動員降載與能量整備」目標，手術室必須立即<strong>取消所有非急迫性（Elective）與常規排程手術</strong>。</p>\n</li>\n<li>\n<p><strong>死守核心醫療功能</strong>：將有限的手術量能、麻醉資源與醫護人力，全數保留給戰傷與急重症病患的緊急手術，確保戰時最關鍵的核心醫療服務不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 整備地下備援空間（臨時開刀房與恢復室）</strong>\n因應戰時高樓層可能遭遇防空震波波及或設施受損，手術室團隊須配合啟動「空間轉置與地下運作」：</p>\n<ol>\n<li>\n<p><strong>空間轉換</strong>：確認將<strong>「韓偉大樓 B1\n    腹膜透析室」</strong>迅速轉換開設為戰時的<strong>「臨時開刀房」</strong>，負責緊急手術與戰傷處置；並將旁邊的<strong>「韓偉大樓\n    B1 環保室」</strong>設定為<strong>「恢復室」</strong>，負責術後觀察與轉送銜接。</p>\n</li>\n<li>\n<p><strong>確保維生資源</strong>：手術室須與工務室確認，在面臨極限斷水斷電（負載卸除）的情況下，臨時開刀房的緊急發電機電力、氧氣供應及最低維生的淨水資源（如保留給開刀房刷手及器械基本消毒）必須列為絕對優先「死守的紅區」。</p>\n</li>\n</ol>\n<p><strong>四、 對接戰備物資「盲派」與「走動式血庫」</strong>\n戰時常規的叫料與領血系統可能癱瘓，手術室必須與後勤單位建立戰術對接：</p>\n<ol>\n<li>\n<p><strong>推拉式物流（Push\n    Logistics）</strong>：與藥庫及資材室確認機制，確保戰傷急救箱、大量林格氏液、廣效抗生素與強效麻醉鎮痛藥劑，能不待前線表單申請，直接以<strong>「盲派（Push）」</strong>方式推至臨時開刀房門口供醫療人員隨手取用。</p>\n</li>\n<li>\n<p><strong>緊急活體輸血對接</strong>：血庫若告竭，手術室需與檢驗科確認<strong>「走動式血庫（Walking\n    Blood\n    Bank）」</strong>的運作流程。確保在緊急抽取員工活體全血並快篩後，能由傳令兵以最快速度直接送入開刀房，立即輸入瀕死傷患體內進行搶救。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況 2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用 B1\n備援醫療空間及五處功能區」，手術與麻醉團隊面臨極端的戰爭威脅，必須立即將核心的手術與搶救量能轉移至地下安全的備援空間。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>手術/麻醉室</strong>隸屬於執行部門的<strong>醫療照護組（O1）</strong>，並為演習編組中<strong>「醫療應變與傷患搶救組」</strong>的關鍵成員。其具體因應作為如下：</p>\n<p><strong>一、 立即執行醫療降載與停止常規手術</strong>\n配合全院醫療功能降載政策，手術/麻醉團隊須立即暫停或延後所有非緊急、常規性的排程手術，將有限的手術室空間、麻醉藥品、醫療氣體與醫護人力資源，絕對保留給戰傷與急重症病患搶救使用。</p>\n<p><strong>二、 確實開設 B1「臨時開刀房」進行戰傷搶救</strong>\n配合大面積的「空間降階防護」，手術與麻醉團隊須將急救與手術儀器設備迅速轉移至地下備援空間。</p>\n<ol>\n<li>\n<p><strong>進駐指定位置</strong>：依據院方逃生圖與備援空間規劃，確實於<strong>韓偉大樓 B1\n    腹膜透析室</strong>開設「臨時開刀房」。</p>\n</li>\n<li>\n<p><strong>執行核心任務</strong>：在戰火威脅與資源受限的地下空間內，執行戰傷處置（如損傷控制手術）、緊急手術與麻醉支援，確保醫院的核心醫療（手術）功能持續運作不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 確實開設 B1「恢復室」維持術後照護</strong></p>\n<ol>\n<li>\n<p><strong>進駐指定位置</strong>：確實於<strong>韓偉大樓 B1 環保室</strong>開設戰時「恢
