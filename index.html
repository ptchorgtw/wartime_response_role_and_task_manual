<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>屏基大連院區・戰時應變角色任務手冊（完整版）</title>
<style>
  :root{
    --bg: #faf9f5;
    --panel: #ffffff;
    --panel-2: #f2f0e7;
    --line: #d9d5c5;
    --text: #201f18;
    --text-dim: #66655a;
    --amber: #8a5a00;
    --amber-dim: #9c6a1f;
    --red: #a1382c;
    --chip-text: #ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family: "Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 0 60px;}

  header{
    padding:30px 18px 20px;
    border-bottom:1px solid var(--line);
    position:relative;
    overflow:hidden;
  }
  header::before{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(135deg, rgba(212,160,23,0.04) 0 2px, transparent 2px 14px);
    pointer-events:none;
  }
  .eyebrow{
    font-size:16px; letter-spacing:.2em; color:var(--amber);
    text-transform:uppercase; font-weight:700; margin-bottom:10px;
  }
  h1{ font-size:24px; line-height:1.45; margin:0 0 8px; font-weight:900; }
  header p{ margin:0; font-size:16.5px; color:var(--text-dim); line-height:1.7; }

  .stats{ display:flex; gap:1px; background:var(--line); margin:18px 18px 22px; border:1px solid var(--line); }
  .stat{ flex:1; background:var(--panel); padding:10px 6px; text-align:center; }
  .stat b{display:block;font-size:22px;color:var(--amber);font-weight:900;}
  .stat span{font-size:14.5px;color:var(--text-dim);}

  .search-bar{ padding:0 18px 16px; }
  .search-bar input{
    width:100%; padding:11px 14px; background:var(--panel); border:1px solid var(--line);
    color:var(--text); font-size:17px; font-family:inherit;
  }
  .search-bar input::placeholder{color:var(--text-dim);}
  .search-bar input:focus{outline:none;border-color:var(--amber-dim);}

  .scenario-picker{ padding:16px 18px 0; }
  .scenario-picker label{
    display:block; font-size:14.5px; font-weight:700; color:var(--amber);
    letter-spacing:.04em; margin-bottom:6px;
  }
  .scenario-picker select{
    width:100%; padding:11px 14px; background:var(--panel); border:1px solid var(--amber-dim);
    color:var(--text); font-size:17px; font-family:inherit; font-weight:700;
  }
  .scenario-picker select:focus{outline:none;border-color:var(--amber);}

  .scenario-banner{
    margin:18px 18px 0; padding:14px 16px; background:var(--panel-2);
    border:1px solid var(--amber-dim); border-left:4px solid var(--amber);
  }
  .scenario-banner .tag{
    display:inline-block; font-size:14.5px; font-weight:900; color:var(--chip-text);
    background:var(--amber); padding:3px 9px; margin-bottom:8px;
  }
  .scenario-banner .title{ font-size:18px; font-weight:900; color:var(--text); margin-bottom:6px; }
  .scenario-banner .desc{ font-size:15.5px; color:var(--text-dim); line-height:1.6; }


  .cat{ padding:0 18px; }
  .cat-head{
    font-size:16px; font-weight:900; color:var(--amber);
    letter-spacing:.1em; margin:22px 0 8px; padding-bottom:6px;
    border-bottom:1px solid var(--line); display:flex; justify-content:space-between;
  }
  .cat-head .count{color:var(--text-dim); font-weight:400; letter-spacing:0;}

  .roles{display:flex;flex-direction:column;gap:8px;}

  /* Level 1: Role */
  .role{ background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--amber-dim); }
  .role.open{border-left-color:var(--amber);}

  .role-head{
    width:100%; display:flex; align-items:center; gap:10px;
    padding:13px 12px; background:none; border:none; color:var(--text);
    text-align:left; cursor:pointer; font-family:inherit;
  }
  .role-name{font-size:18px;font-weight:700;flex:1;}
  .role-count{
    font-size:14.5px; color:var(--amber-dim); border:1px solid var(--line);
    padding:2px 6px; flex-shrink:0;
  }
  .role.open .role-count{color:var(--amber);border-color:var(--amber-dim);}
  .role-head .chev{ font-size:15px; color:var(--amber); transition:transform .25s; flex-shrink:0; }
  .role.open > .role-head .chev{transform:rotate(180deg);}

  .role-body{ display:none; }
  .role.open > .role-body{ display:block; }
  .role-body-inner{ padding:6px 12px 10px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:6px; }

  /* Level 2: Scenario */
  .scenario{ background:var(--panel-2); border:1px solid var(--line); }
  .scenario.open{ border-color:var(--amber-dim); }

  .scenario-head{
    width:100%; display:flex; align-items:center; gap:8px;
    padding:9px 10px; background:none; border:none; color:var(--text);
    text-align:left; cursor:pointer; font-family:inherit;
  }
  .scenario-tag{
    display:inline-flex; align-items:center; justify-content:center;
    font-size:14.5px; font-weight:900; color:var(--chip-text); background:var(--amber-dim);
    padding:2px 7px; letter-spacing:.02em; flex-shrink:0; white-space:nowrap;
  }
  .scenario.open .scenario-tag{background:var(--amber);}
  .scenario-title-wrap{ flex:1; min-width:0; }
  .scenario-title{ font-size:16.5px; font-weight:700; color:var(--text); }
  .scenario-head .chev{ font-size:14px; color:var(--amber-dim); transition:transform .2s; flex-shrink:0; }
  .scenario.open .chev{transform:rotate(180deg); color:var(--amber);}

  .scenario-body{ display:none; }
  .scenario.open > .scenario-body{ display:block; }
  .scenario-body-inner{ padding:0 10px 12px; border-top:1px solid var(--line); }

  /* Level 3: content */
  .scenario-desc{ font-size:15.5px; color:var(--text-dim); line-height:1.6; margin:8px 0; }
  .answer{ font-size:16.5px; line-height:1.75; color:var(--text); }
  .answer p{ margin:0 0 8px; }
  .answer strong{ color:var(--amber); font-weight:700; }
  .answer ol, .answer ul{ margin:0 0 8px; padding-left:20px; }
  .answer li{ margin-bottom:4px; }
  .answer hr{ border:none; border-top:1px dashed var(--line); margin:10px 0; }

  .no-match{ padding:30px 18px; text-align:center; color:var(--text-dim); font-size:17px; display:none; }

  footer{ padding:24px 18px 0; font-size:15px; color:var(--text-dim); text-align:center; line-height:1.8; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">屏東基督教醫院・大連院區</div>
    <h1>戰時應變角色任務手冊<br>（完整版・依角色檢索）</h1>
    <p>整理自「大連院區平戰轉換白皮書」，依 HICS 指揮體系與院內單位分類。可依角色瀏覽其涉及之所有特別狀況，亦可於下方選單直接選擇特別狀況，查看該情境下所有角色的具體因應作為。</p>
  </header>

  <div class="scenario-picker">
    <label for="scenarioSelect">依情境查看（選擇後將顯示所有相關角色的因應作為）</label>
    <select id="scenarioSelect">
      <option value="">— 全部情境（依角色瀏覽）—</option>
    </select>
  </div>


  <div class="stats" id="stats"></div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜尋角色名稱，例如：藥劑部、急診部、資訊室…">
  </div>

  <div id="scenarioBanner"></div>
  <div id="content"></div>
  <div class="no-match" id="noMatch">找不到符合的角色，請換個關鍵字試試。</div>

  <footer>
    本手冊內容整理自院內平戰轉換白皮書問答，僅供職能單位演練與盤點參考。<br>
    實際執行細節請依院內最新版應變計畫與長官指示為準。
  </footer>
</div>

<script>
const CATEGORIES = [{"id": "command", "name": "指揮與HICS幕僚", "roles": [{"role": "指揮組", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，接獲主管機關要求進入戰時醫療整備並限時回報各項量能，本院<strong>指揮組（Command\nStaff / 總召集與決策組）</strong>作為\nHICS（醫院事故指揮系統）的最高決策中樞，其具體因應作為如下：</p>\n<p><strong>一、 啟動 HICS 並接掌最高指揮權（事故指揮官 / 院長）</strong></p>\n<ol>\n<li>\n<p><strong>宣告開設臨災應變中心</strong>：指揮官接獲主管機關狀況下達後，必須立即下令啟動\n    HICS\n    架構，成立臨災應變中心，並召集各部門（執行、計畫、後勤、行政/財務）幹部報到就位。</p>\n</li>\n<li>\n<p><strong>最高戰略決策下達</strong>：核定戰時醫療整備的整體方向、範圍與安全原則。設定如「優先維持急重症與戰傷收治、執行全院醫療降載」等最高戰略目標，並統籌跨部門之資源盤點與運作。</p>\n</li>\n</ol>\n<p><strong>二、 外部對接與協調呈報（聯絡官 / 行政副院長）</strong></p>\n<ol>\n<li>\n<p><strong>擔任唯一官方聯繫窗口</strong>：聯絡官必須擔任醫院與衛生局、警消、軍方、合作聯防醫院及各類設備物資供應商等外部機關的主要協調窗口。</p>\n</li>\n<li>\n<p><strong>督導限時回報作業</strong>：協同「統籌呈報組（危管會）」，確保計畫部與各組盤點出的「床位、人力、急診、手術、救護車、物資藥材」等精確數據，能順暢對接主管機關，並於規定的時限內完成初報與續報。</p>\n</li>\n</ol>\n<p><strong>三、 危機溝通與訊息發布（發言官 / 醫療副院長）</strong></p>\n<ol>\n<li>\n<p><strong>統一對內外發言</strong>：負責統一對內外的訊息發布，避免戰前因假訊息或資訊不對稱而引發社會大眾與院內員工的恐慌。</p>\n</li>\n<li>\n<p><strong>媒體與家屬溝通管理</strong>：制定媒體區的管制規範及家屬詢答原則。針對醫療功能降載、停止常規醫療排程或轉院安置等重大變革，迅速擬定新聞稿或說明資料並對外公布。</p>\n</li>\n</ol>\n<p><strong>四、 全院安全監測與風險防護（安全官 / 職安室主任）</strong></p>\n<ol>\n<li>\n<p><strong>風險評估與監控</strong>：負責確認員工、病人及訪客的安全，持續評估戰時整備期間人員、設施與環境可能遭受的危害，並向指揮官提出安全維護建議。</p>\n</li>\n<li>\n<p><strong>確保管制與演習安全</strong>：完成演習與整備期間的安全檢核、管制區劃定及中止條件設定；若發現有危及參演或應變人員安全之不當行動，隨時建議停止。</p>\n</li>\n</ol>\n<p><strong>五、 提供專業決策支援（醫療/技術專家）</strong></p>\n<ol>\n<li><strong>專業諮詢對接</strong>：聯繫院內外專家（如感染管制、放射、血庫、藥品及備援空間等領域專家），為指揮官提供戰備資源調度、醫療核心維持與設施轉置上的專業建議，確保醫療應變決策準確無誤。</li>\n</ol>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」等複合性危機，急診前線正面臨嚴重的癱瘓與安全威脅。HICS\n<strong>指揮組（Command Staff /\n總召集與決策組）</strong>作為最高決策中樞，必須迅速穩定局面、反制假訊息並確保醫療核心功能不中斷，其具體因應作為如下：</p>\n<p><strong>一、 事故指揮官（院長）：下達最高戰略決策與授權應變</strong></p>\n<ol>\n<li>\n<p><strong>最高決策下達</strong>：指揮官須立即核定戰略方向，下達「死守急診與急重症核心功能」之指令，並授權執行醫療降載與分流機制。</p>\n</li>\n<li>\n<p><strong>授權開設戶外分流站</strong>：針對恐慌搶藥的慢性病患，授權啟動分流機制，例如指示設置<strong>「戶外慢性病處方籤領藥區」</strong>或「戶外防疫門診」，將輕症與單純領藥的民眾阻絕於急診室外，以減輕急診壅塞。</p>\n</li>\n<li>\n<p><strong>授權實施院區封鎖</strong>：面對恐慌群眾湧入，授權啟動最高級別門禁管制或「內部封鎖（Lockdown）」，以保障前線醫護人員的安全。</p>\n</li>\n</ol>\n<p><strong>二、 發言官 / 醫療副院長：反制假訊息與統一危機溝通</strong></p>\n<ol>\n<li>\n<p><strong>闢謠與統一發布訊息</strong>：針對假訊息與心理恐慌，發言官須迅速擬定新聞稿或說明資料，統一對內外發言，說明醫院目前的真實收治量能、慢性病藥品庫存狀況及提早領藥之規範，避免謠言引發更大的社會恐慌。</p>\n</li>\n<li>\n<p><strong>建立媒體與家屬分流區</strong>：嚴格管制媒體與家屬進入急診搶救區。指示將家屬引導至專屬的「家屬休息區（如轉診中心）」或「家屬接待區」進行安撫與撤離資訊詢答；同時於指定地點（如簡報室或恩慈大樓一樓）開設媒體接待區並定時召開記者會，防堵不當消息傳播。</p>\n</li>\n</ol>\n<p><strong>三、 聯絡官 / 行政副院長：對接外部支援與公權力介入</strong></p>\n<ol>\n<li>\n<p><strong>請求警力與交管支援</strong>：面對急診大門的大量人車湧入與潛在的群眾滋擾，聯絡官須立即聯繫轄區警察機關（如派出所、保警中隊），請求優勢警力支援現場秩序維護與交通節點壅塞疏導，確保救護車動線暢通。</p>\n</li>\n<li>\n<p><strong>對接衛生局與聯防體系</strong>：針對大量傷患與藥品搶購潮，迅速與屏東縣衛生局或高屏區緊急醫療網（EOC）聯繫，確認慢性病藥物調撥政策、通報急診壅塞狀況，並協調周邊基層診所或聯防醫院協助接收非緊急病患。</p>\n</li>\n</ol>\n<p><strong>四、 安全官 / 職安室主任：確保院區安全與實體防護</strong></p>\n<ol>\n<li>\n<p><strong>下達「硬邊界防護（Hard\n    Perimeter）」指令</strong>：安全官須評估群眾恐慌衝擊醫院的安全風險，並建議/指示安全管制組（保安組）立即封閉非必要出入口，拉下鐵捲門或架設阻絕物，實施嚴格的身分核對與門禁管制，僅保留單一檢傷武裝通道。</p>\n</li>\n<li>\n<p><strong>監控暴力與維安風險</strong>：監控急診現場是否發生因家屬要求遭拒而衍生的醫療暴力事件。若發生暴力滋擾，立即指導啟動防暴應變（如\n    Code Black/Silver），確保醫護團隊的人身安全不受恐慌群眾侵害。</p>\n</li>\n</ol>\n<p><strong>五、 醫療/技術專家：提供醫療降載與處置專業建議</strong></p>\n<ol>\n<li><strong>專業諮詢支援</strong>：針對家屬要求提早領藥或緊急住院之需求，提供戰備時期「危機護理標準（Crisis\n    Standards of\n    Care）」的專業指引，協助指揮官判定哪些常規醫療可立即停止，並指導前線實施「反向檢傷（Reverse\n    Triage）」，將資源保留給真正的戰傷與急重症病患。</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息及各項資訊系統出現延遲（疑似資安攻擊）」，HICS\n<strong>指揮組（Command Staff / 總召集與決策組）</strong>\n作為最高決策中樞，必須同時應對「輿論戰（假訊息反制）」與「資訊戰（系統降級應變）」，確保醫院營運與醫療核心功能不受影響。其具體因應作為如下：</p>\n<p><strong>一、 事故指揮官（院長）：下達最高決策與啟動備援機制</strong></p>\n<ol>\n<li>\n<p><strong>下達系統降級（Downtime）決策</strong>：接獲資訊系統異常（如掛號、批價、檢驗系統延遲）之回報後，指揮官須迅速評估狀況。若判定為系統超載或遭受惡意網路攻擊，應立即下達決策，<strong>啟動「全院當機處理機制」與「紙本降級（Downtime）作業」</strong>，指示各單位全面改採紙本與離線流程，以確保核心醫療服務持續運作。</p>\n</li>\n<li>\n<p><strong>統籌跨部門資安應處</strong>：指揮並授權資訊室與各部門，進行資安事件分級、隔離阻斷與資料保護作業，並核定核心系統（如\n    HIS、PACS）的復原優先順序。</p>\n</li>\n</ol>\n<p><strong>二、 發言官（醫療副院長）：反制假訊息與統一危機溝通</strong></p>\n<ol>\n<li>\n<p><strong>即時闢謠與發布澄清聲明</strong>：針對社群媒體流傳之「停診、缺藥、遭攻擊或拒收病人」等不實謠言，發言官須立即彙整院內真實的醫療量能與藥品庫存數據，撰擬澄清新聞稿。經指揮官核定後，<strong>作為唯一官方窗口統一對外發布，積極反制假訊息</strong>，以穩定民心並防堵不當消息蔓延。</p>\n</li>\n<li>\n<p><strong>輿情監測與就醫資訊引導</strong>：督導公關及資源發展中心，持續監測電視、網路社群及民眾回應之輿情。同時，針對系統延遲造成的影響，對外公告「就醫替代流程（如紙本掛號、門急診分流）」，降低民眾因等待或資訊不透明產生的恐慌。</p>\n</li>\n</ol>\n<p><strong>三、 聯絡官（行政副院長）：對接主管機關與外部支援</strong></p>\n<ol>\n<li>\n<p><strong>落實法定通報與外部協調</strong>：針對遭遇的資安異常與假訊息事件，聯絡官須將狀況迅速通報衛生局及相關主管機關（如資安通報），並擔任院外聯繫的單一窗口。</p>\n</li>\n<li>\n<p><strong>協調協力廠商與聯防資源</strong>：緊急聯繫外部資訊廠商或資安專家到院協助搶修與鑑識。若因資訊癱瘓導致部分檢查或處置受限，須與區域聯防醫院或\n    EOC（緊急醫療應變中心）協調必要的病患轉銜或支援事宜。</p>\n</li>\n</ol>\n<p><strong>四、 安全官（職安室主任）：防範實體與資安複合危害</strong></p>\n<ol>\n<li>\n<p><strong>監控實體安全與防範滋擾</strong>：評估假訊息與系統大當機是否引發候診區病患與家屬的焦躁不滿，甚至引發群眾滋擾或醫療暴力。必要時，<strong>建議指揮官與安全管制組（保安組）提升門禁級別</strong>，以保護前線員工與病患的人身安全。</p>\n</li>\n<li>\n<p><strong>督導資訊保護與適法性</strong>：在系統異常與大量啟用紙本作業的混亂期間，確保病患個資與機密資料未遭外洩，並協同法律訴求小組，準備因系統延遲可能衍生的醫療爭議或求償問題的應對。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院正面臨國家級駭客的嚴峻挑戰，可能瞬間淪為「又盲又啞」的癱瘓巨人。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>指揮組（Command Staff）</strong>\n作為全院應變的最高決策與大腦中樞，必須迅速將醫院從高度依賴數位系統的環境，切換為極限實體運作模式。指揮組各成員的具體因應作為如下：</p>\n<p><strong>一、\n事故指揮官（由院長擔任）：統籌決策與正式宣告「紙本降級（Downtime）」</strong></p>\n<ol>\n<li>\n<p><strong>果斷隔離與宣告當機應變</strong>：面對勒索軟體與 APT 攻擊，指揮官必須立即聽取資訊室的情資報告，並授權資訊室從物理層面切斷網路，防止惡意程式進一步在院內擴散。同時，指揮官須<strong>正式向全院宣告進入「Downtime 紙本降級」極限模式</strong>。</p>\n</li>\n<li>\n<p><strong>啟動紙本備援機制</strong>：下令全院各醫療單位砸破「當機緊急箱（Downtime Box）」，全面改用預先準備的三聯式紙本病歷、手寫處方箋與離線列印名單來維持核心醫療不中斷。</p>\n</li>\n<li>\n<p><strong>拒絕勒索與確立最高目標</strong>：秉持國家關鍵基礎設施（CI）防護原則，拒絕向境外敵對勢力支付贖金；並確立在斷網期間，「維持急重症搶救與病患安全」為醫院的最高戰略目標。</p>\n</li>\n</ol>\n<p><strong>二、 發言人 / 公關官（由醫務副院長擔任）：危機溝通與防範「認知作戰」</strong></p>\n<ol>\n<li>\n<p><strong>防堵社會恐慌與假訊息</strong>：境外勢力的駭客攻擊往往伴隨著網路攻擊與假訊息的認知作戰，意圖製造社會混亂。發言人肩負危機溝通的重任，必須迅速設立新聞簡報中心，統一對外發布聲明。</p>\n</li>\n<li>\n<p><strong>傳遞「醫療不中斷」的安定訊息</strong>：主動向大眾與媒體說明醫院正遭遇網路攻擊但已全面啟動備援機制，保證急診、手術等核心醫療照護並未停擺，藉此安撫病患家屬，反制可能引發恐慌的不實謠言。</p>\n</li>\n</ol>\n<p><strong>三、 聯絡官（由行政副院長擔任）：跨部會對接與外部求援</strong></p>\n<ol>\n<li>\n<p><strong>緊急通報主管機關</strong>：聯絡官是醫院對外的生命線。在遭受 APT 與 DDoS 攻擊當下，必須第一時間向行政院國家資通安全會報、衛福部資訊處以及在地衛生局（EOC）進行重大資安事件通報。</p>\n</li>\n<li>\n<p><strong>建立異質備援通訊</strong>：若 DDoS 攻擊伴隨外部基礎電信網路中斷，聯絡官須啟動異質性戰術通訊網，透過院區頂樓架設的低軌衛星（如 OneWeb/Starlink）或無線電，死守與中央衛福部的微弱連線。</p>\n</li>\n<li>\n<p><strong>請求國家級資安支援</strong>：協調外部資源，請求國家資安院或具備專業資安防護能力的應變團隊介入，協助院方資訊室進行資安攻防監控、系統清洗與資料復原評估。</p>\n</li>\n</ol>\n<p><strong>四、 安全官（由職安室主任擔任）：極限狀態下的醫療安全監控</strong></p>\n<ol>\n<li>\n<p><strong>嚴防人工降級衍生之醫療錯誤</strong>：在失去 HIS 系統（包含自動給藥安全警示、電子核對）與 PACS 影像系統的輔助下，醫療出錯的風險將急遽升高。安全官必須嚴密監控各單位轉為「人工作業」時的流程安全，確認人工跑單、對講機口頭回報檢驗危險值時，是否有<strong>嚴格執行覆誦確認（Read-back）機制</strong>。</p>\n</li>\n<li>\n<p><strong>行使「危險行動中止權」</strong>：安全官隨時掌握演習或真實應變中的中止權。若評估在缺乏電腦系統輔助下，某項常規醫療或搶救行動的失誤風險過高，恐對病患造成直接生命危害，安全官有權介入並隨時建議指揮官終止該項醫療行動。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨物資匱乏與「孤島效應」的嚴峻考驗。在\nHICS（醫院事故指揮系統）架構下，<strong>指揮組（Command Staff /\n總召集與決策組）</strong>作為最高決策與內外協調中樞，必須迅速定奪資源分配、啟動外部求援並穩定軍心。</p>\n<p>指揮組內各關鍵角色的具體因應作為如下：</p>\n<p><strong>一、 事故指揮官（院長）：下達最高決策與資源分配指令</strong></p>\n<ol>\n<li>\n<p><strong>盤點缺口與確立優先序</strong>：召開緊急指揮會議，聽取計畫部與後勤部對於燃油、醫療氣體、藥品、血液及飲水膳食的「消耗速率與缺口」報告。隨即下達<strong>「資源優先使用順序與配給」</strong>的最高決策，例如指示將緊急發電機的寶貴電力死守於急診、ICU與開刀房等核心醫療紅區，並下令實施嚴格的水電與氧氣節流配給。</p>\n</li>\n<li>\n<p><strong>應對人力與轉送危機</strong>：針對員工到勤受交通影響而短缺，指示啟動留守員工的「軍事化強制輪班與就地庇護」機制，確保現有戰力不崩潰；針對病人轉送不確定性提高，需決策是否暫緩轉送改為「就地安置」，或授權執行部啟動反向檢傷及備援醫療空間以騰出院內收治量能。</p>\n</li>\n</ol>\n<p><strong>二、 聯絡官（行政副院長）：啟動外部求援與跨機關協調</strong></p>\n<ol>\n<li>\n<p><strong>請求物資與血品運補</strong>：擔任單一對外聯繫窗口，針對物資與血液配送延遲，立即聯繫地方政府衛生局、EOC（緊急醫療應變中心）及縣市聯合應變中心。協調調度徵用車輛，或請求軍方、消防局及供應商（如捐血中心、氣體廠商）進行緊急運補與支援。</p>\n</li>\n<li>\n<p><strong>協調病人轉銜與交通</strong>：面對病人轉送困難與不確定性，聯絡官須與\n    EOC、區域聯防合作醫院密切協調，請求提供具備隨車照護能量的特殊轉送載具或救護車支援，確保重症病患後送路線的安全與可行性。</p>\n</li>\n</ol>\n<p><strong>三、 發言官（醫療副院長）：統一對外發言與穩定民心</strong></p>\n<ol>\n<li>\n<p><strong>危機溝通與發布聲明</strong>：物資匱乏與轉送受阻極易引發病患、家屬及社會的恐慌與猜疑。發言官須立即彙整醫院真實的物資存量、處置現況及資源控管原則（如因缺血、缺氣暫停所有常規手術），撰擬並發布緊急事件新聞稿。</p>\n</li>\n<li>\n<p><strong>安撫家屬與防堵謠言</strong>：統一對外公告本院的應變配套措施（如膳食替代方案、病人轉送延遲的留置與安全說明），透過公開透明的資訊穩定家屬情緒，並防堵不實謠言與假訊息擴散。</p>\n</li>\n</ol>\n<p><strong>四、 安全官（職安室主任）：評估危害與防範衝突</strong></p>\n<ol>\n<li>\n<p><strong>實體安全與風險控管</strong>：評估因斷水、斷電、缺藥或停糧對院內留守員工與病人造成的潛在健康與安全危害，並隨時向指揮官提出矯正或安全防護建議。</p>\n</li>\n<li>\n<p><strong>防範資源搶奪與滋擾</strong>：嚴密監控院內秩序，防範因物資、藥品匱乏或家屬因轉送延宕焦慮而引發的非理性行為或醫療暴力。必要時建議指揮官協調安全管制組（保安組）提升門禁管制級別或實施內部封鎖（Lockdown），以保護前線員工與殘存的核心資源。</p>\n</li>\n</ol>\n<p><strong>五、 醫療/技術專家（行政支援中心主任）：提供極限替代方案建議</strong></p>\n<ol>\n<li>\n<p><strong>會同專家擬定對策</strong>：聯繫並會同院內外感染、重症、血庫與藥劑科專家，針對物資與血液極度匱乏的情境，向指揮官提供「危機護理標準」或極限替代方案的專業建議。</p>\n</li>\n<li>\n<p><strong>啟動緊急備援機制</strong>：例如在血品運補完全中斷時，建議並指導啟動「走動式血庫（Walking\n    Blood\n    Bank，院內活體捐血）」；在中央氧氣耗竭且鋼瓶不敷使用時，指導啟動人工甦醒球（Ambu\n    bag）捏球大隊等極限維生替代作業。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨極高的實體安全威脅（如敵方滲透破壞）、資源搶奪風險以及群眾恐慌失控的危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>指揮組（Command\nStaff）</strong>作為全院的最高決策與內外協調中樞，必須迅速下達防護指令、尋求外部武裝支援並進行危機溝通。指揮組各關鍵角色的具體因應作為如下：</p>\n<p><strong>一、 事故指揮官（院長）：下達最高防護決策與戰略目標</strong></p>\n<ol>\n<li>\n<p><strong>提升安全警戒級別</strong>：面對可疑偵蒐與避難人潮湧入，指揮官須立即下令全院進入最高安全警戒狀態，授權執行部（保安組）啟動「內部封鎖（Lockdown）」與「建立硬邊界（Hard\n    Perimeter）」機制，以保護院內醫護人員、急重症病患及殘存的醫療資源。</p>\n</li>\n<li>\n<p><strong>決策資源分配與庇護原則</strong>：依據計畫部回報的醫院容載量與物資現況，指揮官須做出是否收容一般避難民眾的艱難決策。若醫院資源僅能維持核心醫療，必須下令拒絕非醫療需求的庇護，將有限空間與物資絕對集中於急重症與戰傷搶救。</p>\n</li>\n</ol>\n<p><strong>二、 安全官（職安室主任）：監控現場危害與指導防禦部署</strong></p>\n<ol>\n<li>\n<p><strong>評估實體威脅與防護</strong>：安全官須持續評估無人機、不明人車及推擠人潮對醫院建築與人員的潛在危害（如爆裂物、破壞維生管線等），並向指揮官提出防禦建議。</p>\n</li>\n<li>\n<p><strong>督導實施防暴與反滲透</strong>：指導醫勤室保安組強勢落實門禁管制，將出入口縮減至單一通道（如設立聯合檢查站進行身分與武器核對）；並針對地下室發電機房、資訊機房、液氧槽等關鍵基礎設施（CI），增設\n    24 小時武裝/防暴巡邏哨，防範敵方第五縱隊（在地協力者）的滲透破壞。</p>\n</li>\n</ol>\n<p><strong>三、 聯絡官（行政副院長）：請求外部武裝支援與人潮疏導</strong></p>\n<ol>\n<li>\n<p><strong>請求警政與軍方支援</strong>：擔任單一對外聯繫窗口，立即與屏東縣警察局、保二總隊、消防局及在地民防中隊聯繫，請求派遣優勢警力到院協防，反制無人機偵蒐，並協助維持院區周邊的交通與治安。</p>\n</li>\n<li>\n<p><strong>協調人潮轉移</strong>：針對湧入醫院尋求庇護與物資的社區民眾，聯絡官須與地方政府應變中心（EOC）或村里長協調，請求增派接駁車或引導人員，將避難人潮轉移至政府指定的正規災民收容所或社區避難空間。</p>\n</li>\n</ol>\n<p><strong>四、 發言官（醫療副院長）：執行危機溝通與群眾安撫</strong></p>\n<ol>\n<li>\n<p><strong>發布聲明與防堵謠言</strong>：面對假訊息或群眾恐慌，發言官須迅速彙整正確資訊，統一對外發布新聞稿或聲明，遏止「醫院有無限物資」等不實謠言擴散，避免更多人潮湧入。</p>\n</li>\n<li>\n<p><strong>前線溝通與安撫</strong>：指派專人（如社工人員或公關人員）前往院區外圍，透過擴音設備向聚集的群眾明確說明醫院目前的極限降載狀況與醫療優先原則，並引導民眾前往正確的避難所，以降低群眾因被拒絕而產生的憤怒與暴力衝突風險。</p>\n</li>\n</ol>\n<p><strong>五、 醫療/技術專家（行政支援中心主任）：提供特殊危害諮詢</strong></p>\n<ol>\n<li><strong>評估特種威脅</strong>：針對不明無人機的偵蒐或可疑車輛，醫療/技術專家可協助聯繫外部國安、軍事或毒化災專家，評估是否可能攜帶爆裂物或生化輻核（CBRNE）武器，並及早建議指揮官採取相應的預防與除汙準備。</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端戰爭威脅，高樓層與玻璃帷幕建築極易受飛彈震波波及而成為致命弱點。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>指揮組（Command\nStaff）</strong>作為全院的決策與指揮中樞，必須立即啟動「空間降階防護」、「指揮中樞地下化」及「備援醫療空間開設」等平戰轉換戰略。指揮組各關鍵角色的具體因應作為如下：</p>\n<p><strong>一、 事故指揮官（院長）：下達防空指令與指揮權地下化</strong></p>\n<ol>\n<li>\n<p><strong>下達防空與空間轉換指令</strong>：接獲空襲或遠距火力威脅通知後，指揮官須立即發布國家級防空警報（Code\n    Black）或動員令，並下令執行部門全面啟用逃生圖內地下一樓（B1）備援醫療空間。</p>\n</li>\n<li>\n<p><strong>指揮中樞極速地下化轉移</strong>：為確保「指揮權絕對不中斷」，指揮官必須在發布警報的\n    10 至 30\n    分鐘內，帶領核心幕僚抓起預先整備的「指揮官避難包（Go-Bag，內含衛星電話、無線電、院區實體藍圖等）」，循無窗戶的內側安全梯，迅速從高樓層轉移至大連院區地下結構最強固的防空避難核心區（如恩慈大樓\n    B1 會議室）設立指揮中心。</p>\n</li>\n<li>\n<p><strong>啟動異地雙盲備援</strong>：同步與瑞光院區（或簽署協定之外部機構）啟動「雙盲備援連線」。約定若大連主院區指揮所遭直接摧毀或失聯達\n    15 分鐘，備援應變中心須立即無縫接管全院外聯與資源調度權。</p>\n</li>\n<li>\n<p><strong>決策啟用五處 B1\n    功能區</strong>：指示各部門確實依計畫於指定位置開設五大功能區：檢傷行政區（約翰、馬可\n    B1）、臨時 ICU（約翰、馬可 B1）、臨時開刀房（韓偉 B1）、恢復室（韓偉\n    B1）及輕症病房（路加 B1），並確保醫療核心功能持續運作。</p>\n</li>\n</ol>\n<p><strong>二、 安全官（職安室主任）：監控疏散安全與就地掩蔽</strong></p>\n<ol>\n<li>\n<p><strong>確認避難安全與管制</strong>：安全官須確認 B1\n    備援醫療空間的安全條件是否充足，並監督疏散動線、集結區以及樓梯間、電梯口等關鍵通道的管制點是否落實。</p>\n</li>\n<li>\n<p><strong>指導高樓層「就地掩蔽（Defend in\n    Place）」</strong>：針對高樓層加護病房（ICU）或洗腎中心等因維生儀器無法立即下樓的重症病患，指導醫護人員迅速將病床推離靠窗區域，移至建築物的「核心內筒」（如電梯梯廳、無窗戶內部走廊）進行防爆掩蔽，並拉下防爆窗簾。</p>\n</li>\n<li>\n<p><strong>監控無動力垂直疏散</strong>：若高樓層受損，須監控醫護人員利用蓄電池設備及軟擔架，將重症病患經由安全梯以人力垂直疏散至\n    B1 空間的安全狀況。</p>\n</li>\n</ol>\n<p><strong>三、 聯絡官（行政副院長）：外部通聯與備援協調</strong></p>\n<ol>\n<li>\n<p><strong>主管機關與外部通報</strong>：於地下指揮中心透過備援通訊設備（如衛星電話），向地方政府災害應變中心（EOC）及衛生局回報本院已啟動防空疏散，並更新本院\n    B1 五處備援醫療空間的開設進度與殘存醫療量能。</p>\n</li>\n<li>\n<p><strong>外部資源請求與轉送協調</strong>：針對遭受空襲可能導致的傷患湧入或院內無法負荷的重症病患，聯絡官須與消防局、區域聯防醫院或軍方協調救護車輛動線與後送/撤離資源。</p>\n</li>\n</ol>\n<p><strong>四、 發言官（醫療副院長）：危機溝通與安定民心</strong></p>\n<ol>\n<li>\n<p><strong>發布避難與降載訊息</strong>：統一對外發布聲明，說明醫院因應防空威脅已進入戰備狀態，並公告取消所有非緊急門診與常規排程的醫療降載政策。</p>\n</li>\n<li>\n<p><strong>安撫病患與家屬恐慌</strong>：針對疏散至 B1 避難區或輕症病房（路加大樓 B1\n    停車場）的病患與家屬，提供明確的指引與資訊，安定群眾情緒，避免因防空避難產生的推擠或失序影響醫療動線。</p>\n</li>\n</ol>\n<p><strong>五、 醫療/技術專家（行政支援中心主任）：提供備援運作建議</strong></p>\n<ol>\n<li><strong>地下設施極限運作評估</strong>：協助指揮官與設施運作組評估 B1\n    各臨時醫療功能區（如腹膜透析室轉換的臨時開刀房）的極限運作條件。針對地下室通風、臨時拉設的電力、照明與醫療氣體供應等技術問題提供專業諮詢，確保「微型戰地醫院」能發揮應有功能。</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨極端的大量傷患與戰災考驗。在\nHICS（醫院事故指揮系統）架構下，<strong>指揮組（Command\nStaff）</strong>作為全院的最高決策與大腦中樞，由事故指揮官、發言人、聯絡官、安全官及醫療/技術專家組成，其具體因應作為如下：</p>\n<p><strong>一、 事故指揮官（由院長擔任）：統籌最高決策與戰略目標</strong></p>\n<ol>\n<li>\n<p><strong>啟動應變與設定戰略目標</strong>：接獲大量傷患通報後，指揮官須立即啟動\n    HICS 應變機制（如發布「急診\n    333」大量傷患代號或全院動員令）。並迅速下達最高戰略目標，例如「放棄所有常規醫療，全面準備接收戰傷病患」，指示執行部極速清空病床進行醫療降載，將有限資源全數集中於急診、手術與加護病房的搶救。</p>\n</li>\n<li>\n<p><strong>聽取匯報與資源分配</strong>：聽取四大部門（執行、計畫、後勤、財務/行政）組長報告，精確掌握當下的空床數、可用開刀房數、醫護人力及血液庫存等最新狀況，並針對擬定之事故行動計畫（IAP）進行決策與任務指派。</p>\n</li>\n<li>\n<p><strong>指揮中樞防護與接管機制</strong>：視戰火威脅情況，指揮官須帶領核心幕僚轉移至地下安全區（如\n    B2\n    防空避難核心區）開設戰時指揮所，並確保「自動順位繼承機制」生效；若指揮系統遭戰火波及中斷，當值最高層級臨床主管將依法自動接管指揮權，確保決策鏈不中斷。</p>\n</li>\n</ol>\n<p><strong>二、 聯絡官（由行政副院長擔任）：外部資源協調與求援</strong></p>\n<ol>\n<li>\n<p><strong>擔任對外單一窗口</strong>：作為指揮中心與外部機關（如衛福部、國防部、衛生局、消防局、高屏區\n    EOC、軍方戰情中心）的唯一官方聯繫管道。</p>\n</li>\n<li>\n<p><strong>關鍵物資與血液求援</strong>：面對手術、輸血與影像需求暴增的極限壓力，聯絡官須將院內資源缺乏情形與傷亡報告向外部反映，緊急請求外部的血液運補、救護車調度、外部醫護人力支援，或協調與南部軍醫院、區域聯防醫院的物資橫向調度。</p>\n</li>\n</ol>\n<p><strong>三、 發言人 / 公關官（由醫療副院長擔任）：危機溝通與媒體管制</strong></p>\n<ol>\n<li>\n<p><strong>統一對外發言</strong>：適時蒐集戰情資訊，統一對社會大眾與媒體發布醫院傷患收治情形、醫療服務降載與門禁管制聲明，安定民心並防堵戰時假訊息與恐慌蔓延。</p>\n</li>\n<li>\n<p><strong>媒體區域管制</strong>：成立獨立的媒體採訪區與新聞簡報中心，向大眾媒體說明開放與限制採訪的區域，並請安全官與執行組長協助嚴格管制，避免媒體或未授權人員干擾急診與手術的搶救動線。</p>\n</li>\n</ol>\n<p><strong>四、 安全官（由職安室主任擔任）：院區安全與風險控管</strong></p>\n<ol>\n<li>\n<p><strong>督導硬邊界與門禁防護</strong>：面臨大量戰傷病患湧入及可能伴隨的恐慌群眾，安全官須評估院區安全需求，督導安全管制組（保安室）落實「硬邊界防護（Hard\n    Perimeter）」與極限門禁管制，死守急診室與醫療紅區的絕對安全，防範暴民搶奪醫療物資。</p>\n</li>\n<li>\n<p><strong>評估危害與終止危險行動</strong>：持續監控並評估事件對全體員工、醫院設施的延伸風險。若發現戰傷搶救現場有未爆彈、生化武器污染風險或暴動等極端威脅，有權給予指揮官安全建議，甚至直接終止不安全的醫療行動。</p>\n</li>\n</ol>\n<p><strong>五、 醫療/技術專家（由院長室主任或指定專家擔任）：提供戰傷專業建議</strong>\n協助聯繫內外部專家（如疾管署防疫醫師、感染科專家或國軍軍醫），針對大量戰傷處置（如損傷控制復甦）、特定武器傷害或衍生的感染風險，提供指揮官與執行部長專業的戰術醫療建議，以利緊急手術與搶救順利執行。</p>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，這代表醫院可能遭受空襲震波波及或周邊發生重大爆炸，導致關鍵基礎設施（CI）受損。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>指揮組（Command\nStaff）</strong>由事故指揮官、發言人、聯絡官、安全官及醫療/技術專家組成，作為大腦中樞，其具體因應作為如下：</p>\n<p><strong>一、 事故指揮官（由院長擔任）：統籌決策與指揮所轉置</strong></p>\n<ol>\n<li>\n<p><strong>緊急啟動與開設指揮中心</strong>：立即啟動 HICS\n    機制。若評估高樓層的指揮所（如院長室）面臨震波或空襲的極高風險，指揮官須迅速抓起「指揮官避難包（Go-Bag）」，帶領核心幕僚轉移至地下室（如恩慈\n    B1 或防空避難核心區）開設戰時備援指揮所。</p>\n</li>\n<li>\n<p><strong>聽取災情與下達戰略指令</strong>：迅速聽取執行部門（特別是設施運作主管/工務室）關於漏水、停電、電梯受困及消防警報的災情回報。視損害程度下達「局部疏散」、「就地掩蔽」或「優先死守紅區（急診、ICU、開刀房）備用電力」等最高戰略決策。</p>\n</li>\n</ol>\n<p><strong>二、 安全官（由職安室主任擔任）：環境危害監控與中止權</strong></p>\n<ol>\n<li>\n<p><strong>災損與風險評估</strong>：針對震動與爆炸造成的漏水、空調異常及消防警報，安全官須持續監控並評估延伸風險（例如漏水是否會引發感電、火警是否擴大、電梯受困的救援風險）。</p>\n</li>\n<li>\n<p><strong>終止危險行動</strong>：確認員工、病患與訪客的安全，若研判現場環境極度危險（如結構有倒塌之虞或火勢失控），安全官有權直接向指揮官提出安全建議，甚至立刻中止任何可能危害應變人員的搶修或醫療行動。</p>\n</li>\n</ol>\n<p><strong>三、 聯絡官（由行政副院長擔任）：啟動備援通訊與外部求援</strong></p>\n<ol>\n<li>\n<p><strong>建立異質性備援通訊</strong>：面對電力瞬斷與通訊中斷，聯絡官須確保指揮中樞的通訊韌性。立即指示啟用備援通訊設備（如無線電對講機、低軌衛星電話），並啟動「傳令兵（Runner）機制」，以人工徒步方式在各樓層與地下指揮所間傳遞災情與指令。</p>\n</li>\n<li>\n<p><strong>外部資源協調</strong>：擔任單一對外聯繫管道。針對超出院方搶修能力的設施損壞（如台電跳電、電梯停擺、火災警報），迅速通報\n    119 勤務中心、台電、自來水公司或電梯維護廠商請求緊急支援。</p>\n</li>\n</ol>\n<p><strong>四、 發言人 / 公關官（由醫務副院長擔任）：危機溝通與防堵恐慌</strong></p>\n<ol>\n<li>\n<p><strong>內部安撫與廣播</strong>：巨大的爆炸聲、警報大作與電力瞬斷極易引起院內病患與員工的集體恐慌。發言人須透過總機廣播或可用之通訊管道，向全院說明當前狀況與院方的搶修進度，安定內部人心。</p>\n</li>\n<li>\n<p><strong>外部對接與媒體說明</strong>：統一對外發布本院的受損情形、醫療服務降載狀況及應變措施。同時密切監控社群媒體與網路輿情，迅速澄清因通訊中斷或震波引發的錯假訊息，防堵社會恐慌。</p>\n</li>\n</ol>\n<p><strong>五、 醫療/技術專家（由院長室主任或指定專家擔任）：提供專業評估</strong>\n協助聯繫內外部的結構技師、機電專家或災防專家，針對管線漏水、空調異常及設備搶修，提供指揮官與設施運作主管（工務室）專業的技術建議，以利最快速度恢復核心設施運作。</p>\n<p>工務室如何搶修受損電力與水管？</p>\n<p>資訊室如何處理通訊中斷與資安攻擊？</p>\n<p>消防警報響起時，各棟大樓如何進行疏散？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院同時面臨敵方實體攻擊（恐攻/戰爭行為）、維生電力中斷以及極高爆炸風險的複合型毀滅性危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>指揮組（Command\nStaff）</strong>是大腦中樞，由事故指揮官、發言人、聯絡官、安全官及醫療/技術專家組成。面對此等極端狀況，其具體因應作為如下：</p>\n<p><strong>一、 事故指揮官（由院長擔任）：統籌最高決策與啟動孤島應變</strong></p>\n<ol>\n<li>\n<p><strong>指揮中樞轉移與啟動應變</strong>：遭遇無人機爆裂物攻擊後，高樓層與鄰近窗戶的區域極度危險。指揮官須立即抓起「指揮官避難包（Go-Bag）」，帶領核心幕僚迅速轉移至地下結構最強固的防空避難核心區（如 B2），開設戰時地下指揮所。</p>\n</li>\n<li>\n<p><strong>下達維生戰略指令</strong>：針對主發電機受損與氧氣外洩，指揮官須立即下達最高戰略目標，指示工務室執行「極限負載卸除（Load Shedding）」，將僅存的備援電力絕對死守於開刀房、ICU與急診等紅區；同時下令全院重症區立即切換為備用氧氣鋼瓶。</p>\n</li>\n<li>\n<p><strong>裁定疏散與封鎖</strong>：依據安全官回報的液氧洩漏爆炸風險與火勢狀況，決策是否對鄰近機電棟的病房進行緊急水平或垂直疏散，並下令全院進入最高級別的門禁封鎖（Lockdown）。</p>\n</li>\n</ol>\n<p><strong>二、 安全官（由職安室主任擔任）：危害監控與行使危險行動中止權</strong></p>\n<ol>\n<li>\n<p><strong>爆炸與火災風險評估</strong>：液態氧外洩若遇火源將引發災難性爆炸。安全官須立即督導保安組與工務室拉起警戒線，絕對封鎖後方機電棟與液氧槽周邊區域，嚴禁任何人（包含未著防護裝備的搶修人員）靠近。</p>\n</li>\n<li>\n<p><strong>防範無人機二次攻擊</strong>：持續監控天空與院區周邊，防範無人機進行第二波投彈襲擊。</p>\n</li>\n<li>\n<p><strong>行使「危險行動中止權」</strong>：在消防防爆單位未確認現場環境安全之前，安全官有權直接中止工務人員進入機電棟進行主發電機或氧氣槽搶修的危險行動，確保員工生命安全為最高原則。</p>\n</li>\n</ol>\n<p><strong>三、 聯絡官（由行政副院長擔任）：緊急外部求援與武裝通報</strong></p>\n<ol>\n<li>\n<p><strong>通報國安與警消武裝支援</strong>：遭遇無人機爆裂物攻擊屬重大國安與恐怖攻擊事件。聯絡官須立即撥打 110 與 119，向警察局、消防局及保二總隊報案，明確告知「遭遇無人機攻擊與液氧洩漏」，請求派遣防爆小組、特種武裝警力及化災消防隊到院支援。</p>\n</li>\n<li>\n<p><strong>請求緊急維生物資運補</strong>：主發電機受損與主氧氣槽洩漏將導致醫院維生資源迅速耗竭。聯絡官須緊急聯繫地方衛生局（EOC）、台電及氧氣供應商（如信光氧氣行、台北氧氣公司），請求緊急調度「移動式發電車」與「大量備用氧氣鋼瓶」至院區安全地帶支援。</p>\n</li>\n</ol>\n<p><strong>四、 發言人 / 公關官（由醫務副院長擔任）：安定內部與防堵外部恐慌</strong></p>\n<ol>\n<li>\n<p><strong>院內緊急廣播</strong>：爆炸聲與無人機攻擊極易在院內引發踩踏與群體恐慌。發言人須透過院內廣播系統（或備援廣播），安撫病患與員工，明確指示人員遠離後方機電棟窗邊，並就地進行防爆掩蔽。</p>\n</li>\n<li>\n<p><strong>統一對外說明與闢謠</strong>：攻擊事件必定引發媒體關注與網路謠言（如醫院全毀）。發言人須撰擬緊急新聞稿，統一對外發布醫院的實際受損狀況、傷亡情形以及已經啟動的備援維生機制，防堵社會恐慌與假訊息的蔓延。</p>\n</li>\n</ol>\n<p><strong>五、\n醫療/技術專家（由院長室主任或指定機電/重症專家擔任）：提供極限應變建議</strong></p>\n<ol>\n<li>\n<p><strong>評估維生系統極限</strong>：會同工務室與呼吸治療師，精算全院剩餘的氧氣鋼瓶與不斷電系統（UPS）還能支撐加護病房與開刀房多久。</p>\n</li>\n<li>\n<p><strong>指導極限替代方案</strong>：向指揮官與前線醫療主管提供專業建議。若備用氧氣鋼瓶即將耗盡，立即指導動員行政人員組成「捏球大隊」，以手動甦醒球（Ambu bag）接力維持重症病患呼吸，作為等待外部氧氣運補期間的最終替代手段。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>在面臨<strong>機電棟爆炸</strong>且造成兩名工務巡檢同仁遭到砸傷、其中一人<strong>嚴重骨折且大出血</strong>的複合型緊急危機時，本院將立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>，打破科室本位，由 <strong>HICS\n指揮組（指揮中心幕僚）</strong> 協同執行部，採取以下具體應變與生存救護作為：</p>\n<p>一、 HICS 指揮組（幕僚）之核心決策與分工處置</p>\n<p>1. 事故指揮官 A0（吳榮州院長）</p>\n<ul>\n<li>\n<p><strong>啟動緊急訊號與開設地下指揮所</strong>：指揮官接獲通報後，立即啟動 HICS 機制，指示總機對全院廣播<strong>「紅色訊號（爆炸火災）」</strong>及<strong>「院內急救 999 訊號」</strong>。若評估高樓層行政區面臨危險，立即帶領幕僚攜帶「指揮官避難包（Go-Bag）」，於 <strong>10 分鐘內轉移至地下避難核心區（恩慈大樓 B1 會議室）</strong> 開設戰時指揮所。</p>\n</li>\n<li>\n<p><strong>下達最高搶救指令</strong>：聽取災情彙整後，下達最高決策：<strong>「救人第一、死守維生電力、防範二次爆炸」</strong>，授權執行部長 O0（醫務部陳志文部長）調派急診創傷小組攜帶戰傷急救箱趕往現場，同時由工務及保安組執行現場危害排除。</p>\n</li>\n<li>\n<p><strong>外部支援授權</strong>：指示聯絡官立即向 119 消防局、110 警察局通報，並向高屏區 EOC 進行法定災害初報。</p>\n</li>\n</ul>\n<p>2. 安全官 A2（職安室杜傳榮主任）</p>\n<ul>\n<li>\n<p><strong>執行現場環境危害監控</strong>：立即進駐中控室，評估爆炸現場是否伴隨<strong>高壓電感電、瓦斯/氧氣管線洩漏、結構物二次坍塌</strong>等延伸危害，並督導保安組拉起警戒線實施現場封鎖。</p>\n</li>\n<li>\n<p><strong>行使「危險行動中止權」</strong>：若評估爆炸現場環境極度危險、可能危及搜救及搶修同仁生命時，<strong>安全官有權當場命令中止任何不安全的搶修或醫療行動</strong>，死守「救災人員安全為最高原則」之底線。</p>\n</li>\n<li>\n<p><strong>登錄職業傷病與後續理賠</strong>：對受創的兩名工務同仁，主動通報職業安全衛生室並登錄<strong>職業傷病系統</strong>，協助後續勞保給付及法律諮詢。</p>\n</li>\n</ul>\n<p>3. 聯絡官 A3（行政副院長黃雅芳）</p>\n<ul>\n<li>\n<p><strong>啟動消防與警政求援</strong>：擔任單一對外聯繫窗口，撥打 119 通報機電棟爆炸與人員重創傷情，撥打 110 請求警力協助維持周邊交通與現場秩序；同步向屏東縣衛生局與高屏區 EOC 通報受災狀況。</p>\n</li>\n<li>\n<p><strong>緊急協調機電維護廠商進場</strong>：立即致電合約發電機廠商（明威）、高壓設備維護商（隆安機電：0988-187315）及氣體管路維修商（豫和村：07-3608638），協請專業專家進院評估受損狀況與協助搶修。</p>\n</li>\n</ul>\n<p>4. 發言人 A1（醫療副院長劉思源）</p>\n<ul>\n<li>\n<p><strong>即時闢謠與輿情管控</strong>：針對巨大的爆炸聲，迅速彙整「受傷同工共 2 人、已由急診極速救治、機電棟損害正由工務與廠商搶修中」等真實情資。</p>\n</li>\n<li>\n<p><strong>防堵社會恐慌</strong>：統一撰擬權威澄清稿，透過臉書與數位管道澄清假訊息，向外界說明「本院十一大核心醫療功能完全正常運作，並未遭到實體攻擊或停診」。</p>\n</li>\n<li>\n<p><strong>媒體專區動線管制</strong>：於指定地點開設媒體接待區，嚴禁記者進入急診搶救紅區或爆炸管制區內拍攝病患隱私及流血畫面。</p>\n</li>\n</ul>\n<p>5. 醫療/技術專家 A4（行政支援中心主任）</p>\n<ul>\n<li>協助評估機電棟高壓電及氣體管線受損後的技術性安全。針對砸傷同工之大出血與嚴重骨折傷情，提供戰傷搶救調度（如骨科、創傷外科會診及血庫備血）之專業諮詢。</li>\n</ul>\n<p>二、 指揮組下達之跨部門協同搶救指令（實兵行動）</p>\n<p>在指揮組的統一協調下，執行部及後勤部將立即開展以下搶救作為：</p>\n<ol>\n<li>\n<p><strong>醫療應變與傷患搶救（執行部醫療照護組）</strong>： -   <strong>現場損傷控制復甦（DCR）</strong>：在安全官確認環境安全的前提下，急診與創傷醫療團隊迅速奔赴爆炸現場，使用<strong>戰術止血帶（CAT）控制大出血</strong>、建立骨內血管通路（IO 針）並注射強效鎮痛劑，對骨折部位進行包紮與簡易固定夾板處置。 -   <strong>垂直/水平轉運送醫</strong>：利用擔架與推床迅速將傷患移出爆炸區域。若地面急診受損，將傷患移至地下一樓（B1）備援醫療區；若大出血傷患需要緊急手術，立刻送入 <strong>B1 臨時開刀房（韓偉大樓 B1 腹膜透析室）</strong> 進行急診開刀與緊急配血輸血。</p>\n</li>\n<li>\n<p><strong>電力死守與極限負載卸除（設施運作組/工務室）</strong>： -   機電棟爆炸極易引發市電瞬斷，工務人員立即確認柴油發電機是否於 10 秒內啟動並由 ATS 自動切換供電。 -   <strong>負載卸除（Load Shedding）</strong>：若發電機供電受限，手動切斷全院行政辦公區、一般病房空調等非必要迴路，將備用電力<strong>百分之百死守在開刀房、ICU、急診急救區與血庫冰箱</strong>。 -   <strong>管路隔離洩漏</strong>：針對受損之電力與氣體管路，實施分段、分區關閉，防止二次爆炸或氧氣洩漏火災。</p>\n</li>\n<li>\n<p><strong>現場封鎖與外部救災引導（安全管制組/保安組）</strong>： -   警衛人員攜帶滅火器趕赴現場進行初期滅火，並<strong>隨身佩戴密錄器進行現場蒐證</strong>。 -   立即用紐澤西護欄或警戒線<strong>封鎖機電棟爆炸現場</strong>，嚴禁無關人員靠近。派警衛至大連路與莊敬街交叉口巷口，<strong>引導 119 消防車與 110 警車進入事故地點</strong>。</p>\n</li>\n<li>\n<p><strong>後勤藥衛材盲派（任務支援組/資材組/藥劑科）</strong>： -   不待前線申請，資材與藥局人員主動將預先打包之「戰備急救箱（Go-Kits）」（含止血帶、骨針、止血紗布、點滴）直接<strong>盲派（Push）</strong>推送至急診紅區與臨時手術室口，確保搶救資源不斷鏈。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>當屏東基督教醫院（屏基）大連院區面臨「兩名喬裝成外包維修人員之特工（第五縱隊），企圖潛入醫院核心機房與頂樓水塔投放燃燒劑與不明化學物質」的實體破壞與生化污染（CBRN）複合型維安危機時，醫院將立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>。</p>\n<p>本院 <strong>HICS 指揮組（Command Staff，即指揮中樞）</strong>\n將打破平時行政科室的本位主義，由吳榮州院長率領核心幕僚，採取垂直化的軍事指揮鏈，並協同執行部、計畫部、後勤部與行政/財務部，採取以下<strong>五大防禦、控制、反制與臨床不中斷之具體因應作為</strong>：</p>\n<p>一、 事故指揮官 A0（吳榮州院長）：下達最高防護決策與指揮權地下化</p>\n<ol>\n<li>\n<p><strong>下達全院緊急動員與封鎖令</strong>： -   指揮官接獲中控室或警衛通報後，確認院區遭受實體滲透與化學破壞威脅，立即指示總機對全院發布緊急廣播，啟動<strong>「黑色訊號（暴力/維安）」</strong>、<strong>「黃色訊號（化災）」</strong>與預備<strong>「紅色訊號（火災及爆炸）」</strong>。 -   宣告全院即刻進入「戰時警戒狀態」，下達最高戰略目標：<strong>「實施全院內部封鎖、死守維生水電、力保臨床核心醫療不中斷」</strong>。</p>\n</li>\n<li>\n<p><strong>指揮中樞 10 分鐘極速地下化轉移</strong>： -   為防止行政區高樓層因燃燒彈波及或電訊中斷，指揮官與核心幕僚（安全官、聯絡官、發言人）立即攜帶預先整備定檢的<strong>「指揮官避難包（Go-Bag）」</strong>（內含 Iridium 衛星電話、加密 UHF 無線電、萬用主鑰匙、全院實體藍圖、高階員工名冊及 USB 備份硬碟）。 -   循無窗戶之內側安全梯，於 <strong>10 分鐘內迅速轉移至地下結構最強固的恩慈大樓 B1 會議室（或地下 EOC 備援指揮所）</strong>，於 3 分鐘內啟動獨立不斷電系統（UPS），架設實體情資看板，接管全院資源調度。</p>\n</li>\n<li>\n<p><strong>啟動「雙盲備援」與自動順位繼承防呆</strong>： -   同步與<strong>瑞光院區 7F 備援機房與指揮所</strong>啟動連線。 -   明確宣告：若大連主院區指揮所因爆炸或毒氣直接受創失聯達 15 分鐘，依法由瑞光院區副指揮官（或當值最高階臨床主管，依序為急診部主任、重症醫學部主任、外科部主任）自動穿上指揮官背心繼承指揮權，確保決策鏈絕不斷鏈。</p>\n</li>\n</ol>\n<p>二、 安全官 A2（職安室主任\n杜傳榮）：環境危害監控與行使「危險行動中止權」</p>\n<ol>\n<li>\n<p><strong>實施實體與毒化複合危害評估</strong>： -   安全官立即進駐地下指揮所，會同保安組與工務室，利用中控監視系統評估核心機房與頂樓水塔受破壞的程度。 -   針對「燃燒劑」可能引發的火災，以及「不明化學物質」對醫院自來水系統投毒的致命風險，進行毒化災與結構安全評估。</p>\n</li>\n<li>\n<p><strong>行使「危險行動中止權」</strong>： -   若不明化學物質在頂樓或機房內有氣體擴散、高度感電或爆炸危險，<strong>安全官有權當場下令中止任何第一線工務同仁的搶修，或中止不安全的傷患搜救行動</strong>，死守「應變同工生命安全為最高原則」之底線。</p>\n</li>\n<li>\n<p><strong>督導安全管制組實施「硬邊界防護（Perimeter Control）」</strong>： -   安全官指導醫勤室保安組立即封閉院區 <strong>80% 的出入口</strong>，拉下各區域防火鐵捲門。 -   指示於急診車道架設拒馬、充水式紐澤西護欄與蛇籠，設立由<strong>「武裝警力與高階護理師」共同站哨的單一聯檢通道</strong>，對所有進出人員執行極其嚴格的身分辨識、金屬探測與隨身包包武器搜查，防範敵方其他特工（第五縱隊）趁亂擴大滲透。</p>\n</li>\n</ol>\n<p>三、 聯絡官 A3（行政副院長\n黃雅芳）：外部警政/消防/毒災求援與跨院聯防對接</p>\n<ol>\n<li>\n<p><strong>極速撥打 110 與 119 啟動外部武裝/救災接引</strong>： -   聯絡官立即向屏東縣警察局、保二總隊及機動防暴中隊報警，通報「本院遭遇恐怖滲透破壞，不明份子企圖對機房與水源縱火投毒」，請求<strong>派遣優勢武裝警力進院制服歹徒並進行防爆偵檢</strong>。 -   同步撥打 119 通報消防局，派水車於院外大連路與莊敬街交叉口巷口待命，隨時準備因應核心機房可能爆發的燃燒劑大火。</p>\n</li>\n<li>\n<p><strong>對接衛生局、環境部毒災應變隊與毒物專家</strong>： -   通報高屏區 EOC、地方衛生局與環保局毒災應變隊，請求專家攜帶專業檢測儀器進院，針對頂樓水塔受不明化學物質投毒事件實施<strong>水質採樣、污染物定性定量檢測與除污指導</strong>。</p>\n</li>\n<li>\n<p><strong>啟動跨院重置與供水調撥協定</strong>： -   若水塔受毒害導致全院面臨「斷水孤島」危機，聯絡官立即與自來水廠及外部水車廠商（或消防局）調度緊急乾淨水源車。 -   若化學物質擴散威脅臨床安全，立即啟動與屏東醫院、屏東榮總及寶建醫院之「相互支援協定」，預劃重症病患之緊急轉院分流。</p>\n</li>\n</ol>\n<p>四、 發言人/新聞官 A1（醫療副院長 劉思源）：闢謠與危機溝通（認知防禦）</p>\n<ol>\n<li>\n<p><strong>接掌單一官方發言權，防範內部洩密</strong>： -   發言人立即向全院重申「單一官方窗口發言原則」，嚴禁任何一線醫護、工務或保安同仁私自向媒體發表評論，或將核心機房、水塔受損之照片上傳至 Line 等私人社群，防止院內安全弱點外洩。</p>\n</li>\n<li>\n<p><strong>橫向獲取鋼性數據，撰擬權威澄清稿</strong>： -   在系統大當機或混亂期間，以無線電或徒步傳令兵向計畫部（資源控管組 P1、狀況分析組 P2）獲取真實數據。 -   撰擬新聞稿，公開向社會說明：<strong>「兩名意圖破壞之不明份子已被保全與警力迅速制服逮捕；醫院核心機房並未受損；水塔受污染威脅後已瞬間分段隔離，改用地下備用水源，水質安全無虞；醫院十一大核心照護功能完整，醫療服務不中斷」</strong>，強力反制敵方利用社群媒體製造「屏基遭攻擊癱瘓、供水中毒」之認知戰謠言。</p>\n</li>\n<li>\n<p><strong>開設地下新聞簡報中心，實施媒體動線管制</strong>： -   迅速於結構安全、與臨床及警戒區（機房、水塔）物理隔絕的 <strong>恩慈大樓地下一樓員工運動中心</strong> 開設新聞發布會。 -   指派警衛守住地下通道與電梯，嚴禁記者進入急診、病房或危險管制區內拍攝或窺探，死守病患肖像權與就醫尊嚴。</p>\n</li>\n</ol>\n<p>五、 醫療/技術專家 A4（行政支援中心主任 曾士香）：提供 CBRN\n毒化災與維生水質安全評估</p>\n<ol>\n<li>\n<p><strong>提供化學物質毒性與除污專業諮詢</strong>： -   專家立即對接感染管制組（李忠成主任）與放射科總技師，針對不明份子投放的燃燒劑與不明化學物質，提供臨床急救（如解毒劑使用優先序、灼傷病人除污程序）之專業戰術建议。</p>\n</li>\n<li>\n<p><strong>指導自來水塔與管線安全「隔離防護」</strong>： -   指導設施運作組（工務室）評估頂樓水塔受毒害管線的「物理隔離閥門控制」，防止任何受污染水源流入洗腎中心、開刀房等高耗水重症紅區，並提出「替代水資源配給」安全量化分析。</p>\n</li>\n</ol>\n<p>協同指令：指揮組下達之跨部門實兵應變行動（HICS 跨組協同）</p>\n<p>在 HICS\n指揮組的統一決策與授權下，執行部門與後勤部門將立即啟動以下一線實兵反制行動：</p>\n<ol>\n<li>\n<p><strong>武裝制服歹徒與現場蒐證（執行部安全管制組 O4 / 保安組）</strong>： -   警衛同仁攜帶防暴裝備、密錄器，會同進院之武裝警力，奔赴機房與頂樓水塔現場，<strong>強勢將兩名喬裝之不明份子進行武裝攔查、制服、限制其行動，並隨身啟動密錄器實行第一手現場安全蒐證</strong>，隨後移交警方，絕不破壞破壞物（如燃燒劑罐體）之鑑識現場。</p>\n</li>\n<li>\n<p><strong>關閉水源總閥與毒化污水隔離（執行部危害控制主管 O3 / 感管組）</strong>： -   危害控制主管（感管組主任）與工務人員密切配合，立即奔赴頂樓水塔，<strong>實施水管閥門之「分段、分區關閉」</strong>，封鎖受污染水塔之輸出管道。 -   通知全院停止使用水龍頭，<strong>啟動院內地下備用自來水塔互補供水系統</strong>。</p>\n</li>\n<li>\n<p><strong>殘酷執行「水資源紅區分級配給」（執行部設施運作組 O2 / 工務室）</strong>： -   工務室啟動最嚴格的「水資源紅區管制」：備用地下水塔之淨水<strong>百分之百優先且僅供應給開刀房刷手、ICU 與急診重症病患維生使用</strong>。 -   <strong>手動封閉全院一般洗手間，嚴禁一般盥洗與沖洗馬桶</strong>，後勤勤務組（L1）立即向各病房與避難區發放「化學便器袋」與乾洗手液，實施防禦空置。</p>\n</li>\n<li>\n<p><strong>資安事件隔離阻斷與資料異地同步（執行部機構運作組 O5 / 資訊室）</strong>： -   資訊室網路組立即進行全院網路流量監控，防範特工物理入侵核心機房時實施同步的 APT 駭客攻擊。 -   若判定核心伺服器面臨物理或資安威脅，立即<strong>拔除受威脅網段連線實施實體隔離</strong>；並確保所有 HIS、PACS 核心資料已安全同步至<strong>瑞光院區 7F 的異地備援機房</strong>。 -   各病房與護理站做好最壞準備，隨時準備砸開<strong>「當機緊急箱 (Downtime Box)」</strong>，改採紙本類比手工作業。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨將醫療量能外移與重症病患後撤的重大決策。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>指揮組（Command\nStaff）</strong>作為全院的最高決策與內外部協調中樞，其具體因應作為如下：</p>\n<p><strong>一、 事故指揮官（由院長擔任）：統籌決策與下達撤離指令</strong></p>\n<ol>\n<li>\n<p><strong>查核命令與啟動計畫</strong>：接獲主管機關（如衛生局）的撤離或分流要求後，指揮官須優先查核撤離命令的真實性。確認無誤後，正式下達啟動本院的「病人疏散計畫」與「病人重置計畫」。</p>\n</li>\n<li>\n<p><strong>下達病人分級指令</strong>：指示執行部門（醫務部與護理部）立即依據病情對全院病人進行分級造冊（如：行動方便可提早出院者、需扶持安置者、一般臥床病人、以及需高度照護的危急/ICU病人），並裁定撤離與轉送的優先順序。</p>\n</li>\n<li>\n<p><strong>指揮整體撤離行動</strong>：明確指揮各分組執行人員與隨行物資（含病歷摘要、急救藥品與裝備）的撤離任務，確保在轉送過程中醫療照護不中斷。</p>\n</li>\n</ol>\n<p><strong>二、 聯絡官（由行政副院長擔任）：外部協調與病床轉銜</strong></p>\n<ol>\n<li>\n<p><strong>對接主管機關與接收端</strong>：擔任本院與縣市政府應變中心、衛生局（EOC）、警消機關及區域聯防醫院的單一聯繫窗口。</p>\n</li>\n<li>\n<p><strong>確認轉送量能（控制病床協調）</strong>：配合醫務部，負責協調並確認各個外部合作接收醫院的可容納人數與病床量能，確保分流的病患有明確、安全的接收去向。</p>\n</li>\n<li>\n<p><strong>請求外部交通支援</strong>：若本院救護車與接駁車輛不足以應付大量病患撤離，聯絡官須立即向縣市聯合應變中心請求車輛徵用與交通路線的支援調度。</p>\n</li>\n</ol>\n<p><strong>三、 發言人/公關官（由醫務副院長擔任）：危機溝通與防堵恐慌</strong></p>\n<ol>\n<li>\n<p><strong>統一對外說明</strong>：針對醫院實施的部分撤離與病患分流狀況，迅速撰擬新聞稿，並向大眾媒體統一說明撤離原因與進度，防堵假訊息與社會恐慌蔓延。</p>\n</li>\n<li>\n<p><strong>督導家屬通知原則</strong>：配合社工室與醫療照護組，確立病患轉院、出院或安置去向的家屬通知與詢答原則，確保家屬能正確且安心地掌握病患動向。</p>\n</li>\n</ol>\n<p><strong>四、 安全官（由職安室主任擔任）：撤離動線與安全監控</strong></p>\n<ol>\n<li>\n<p><strong>評估疏散路線安全</strong>：全面檢視預定的疏散路線、病患集結區及上車轉運點的環境安全，確保撤離過程不受周邊攻擊威脅、結構損壞或推擠危害影響。</p>\n</li>\n<li>\n<p><strong>行使安全中止權</strong>：若在撤離過程中外部威脅突然加劇（例如發生飛彈襲擊或暴動），安全官須立即向指揮官提出警告，必要時建議暫停撤離行動，改為就地掩蔽或退回安全區。</p>\n</li>\n</ol>\n<p><strong>五、 醫療/技術專家（由指定專家擔任）：提供轉送風險評估</strong>\n協助聯繫外部專家或院內重症團隊，針對「高度照護病患」（如依賴呼吸器、洗腎或\nICU\n病患）的撤離風險提供專業建議。評估轉送過程中必須隨行的維生設備、轉送載具條件及護理人力配置，確保高風險病患的移動安全。</p>\n<p>病患分級的具體標準為何？</p>\n<p>轉運過程中如何確保照護不中斷？</p>\n<p>聯絡官如何協調外部收容病床？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）通報，預警本院所在區域即將成為「主戰區」，並下達進行<strong>醫療核心能量的預防性撤離</strong>（對應\nHICS 第三階段：全面撤離與量能重置）指令時：</p>\n<p>本院 <strong>HICS 指揮組（Command Staff / 總召集與決策組）</strong>\n將立即啟動最高級別的防禦與撤離決策機制。由事故指揮官率領核心幕僚，採取垂直化、軍事化的管制作為，與衛生局、作戰區及區域聯防醫院無縫對接，採取以下<strong>五大核心成員之具體因應作為與跨部門協同指令</strong>，確保在戰火迫近前，安全、有序地將本院的核心救治能量轉移至安全重置區，死守高屏醫療韌性底線：</p>\n<p>一、 事故指揮官 A0（院長\n吳榮州）：撤離命令真實性查核、戰略部署與權限地下化</p>\n<ol>\n<li>\n<p><strong>查核命令真實性與宣布啟動計畫</strong>： -   指揮官接獲撤離通知後，必須立即透過專用 UHF/VHF 無線電或衛星電話，與國防部、衛生局及 LJEOC 進行二度安全金鑰核對，<strong>絕對查核撤離命令的真實性</strong>，防範敵方以假訊息實施「心理戰」逼迫我方自行崩潰。 -   確認真實後，正式宣布本院進入「戰時全面撤離狀態」，下達啟動<strong>「病人疏散計畫」與「病人重置計畫」</strong>之最高戰略指令。</p>\n</li>\n<li>\n<p><strong>主持「撤離行動會議」與組織戰術重構</strong>： -   立即在地下最強固的防空避難核心區（恩慈大樓 B1 會議室或 B2 指揮中心）召開緊急會議。 -   <strong>重構 HICS 執行部門（Operations）編組</strong>，當場將一線人員劃分為<strong>「撤離準備組」與「持續照護組」</strong>： -   <em>撤離準備組</em>：負責病患分級造冊、與目標醫院交接，並調配撤離載具。 -   <em>持續照護組</em>：負責死守在院病患（特別是尚在等待轉運之重症患者）的醫療照護，直到最後一人安全上車。</p>\n</li>\n<li>\n<p><strong>核定「反資敵」資產封存與銷毀政策</strong>： -   針對因體積過大、高度依賴水電而「無法搬運重置」的重要維生或醫療設備（如大型洗腎機、高階 CT、MRI），指揮官核定實施<strong>戰時安全封鎖、實體斷電鎖固或必要時之銷毀程序</strong>，防止核心醫療科技與敏感資料落入敵手（防資敵）。</p>\n</li>\n</ol>\n<p>二、 聯絡官 A3（行政副院長 黃雅芳 / 管理部部長\n張隆鐘）：跨院聯防對接與交通載具極限爭取</p>\n<p>聯絡官是本院與外部 LJEOC、作戰區、衛生局及接收醫院的唯一官方聯繫咽喉：</p>\n<ol>\n<li>\n<p><strong>實施「分散風險式」的病床轉銜協調</strong>： -   立即與屏東縣衛生局及高屏區 EOC 緊密對接。本院作為「重度級急救責任醫院」，為避免撤往單一重度責任醫院造成該院量能崩潰，聯絡官依據指引，協調將病患<strong>分散後送至安全重置區的中度級、一般級急救責任醫院（如協定聯防之衛生福利部屏東醫院、寶建醫院、安泰醫院）或臨時開設之第二型急救站</strong>，保留區域重大創傷處置量能。</p>\n</li>\n<li>\n<p><strong>爭取「簽證車輛」與特殊通行證</strong>： -   向 LJEOC 及交通局通報本院需轉運之重症與輕症病患總數、醫療器材體積。 -   緊急調度院內現有的 <strong>4 輛救護車</strong>、<strong>4 輛 15 人座中巴</strong>與 <strong>6 輛行政車</strong>；同時請求縣市應變中心<strong>增派外部救護車（2 輛支援）及大眾接駁載具</strong>，並為所有撤離車隊申請「軍事管制區特殊通行證」與規劃專用綠色無障礙交通路線。</p>\n</li>\n<li>\n<p><strong>異地重置之醫療核心任務與對方指揮官對接</strong>： -   在撤離前，代表本院與目標安全區重置醫院之指揮官（院長）完成電話對接，確立本院醫護團隊進駐該院後，轉置之「臨時醫療區」空間、核心診療任務與物資存放位置，確保到院後能「即刻開診」。</p>\n</li>\n</ol>\n<p>三、 安全官 A2（職安室主任 杜傳榮）：疏散動線維安與「安全中止權」行使</p>\n<p>安全官全權負責撤離動線上的環境危害監控與應變人員的安全維護：</p>\n<ol>\n<li>\n<p><strong>撤離轉運區（集結點）安全勘查與管制</strong>： -   實地檢視預定的三大接運疏散區：<strong>「醫院急診室大門出口（重症救護車專區）」</strong>、<strong>「恩慈大樓旁車道（家屬私人車轉運區）」</strong>、<strong>「門診大廳大門出口（輕症接駁車專區）」</strong>，確保路面無障礙、照明充足、動線完全分流，防範推擠踩踏。 -   督導安全管制組（保安組）實施最嚴格的院區邊界封鎖（Lockdown），僅准許已編碼的簽證撤離車隊進入轉運區，驅離在周邊窺伺的可疑人車。</p>\n</li>\n<li>\n<p><strong>執行「安全中止權（Safety Halt）」</strong>： -   撤離過程中，若遇到空襲威脅突然迫近（如防空警報大作）、遭到敵方無人機蜂群鎖定襲擾或發生周邊化災洩漏，安全官須立刻向指揮官提出「暫停撤離」建議，行使中止權。 -   強制下令撤離團隊與病患立即就地避難，移入最近的無窗「核心內筒」或 B1/B2 地下高防護區，待威脅解除後始得重啟疏散。</p>\n</li>\n</ol>\n<p>四、 發言人/新聞官 A1（醫療副院長\n劉思源）：防堵恐慌、家屬詢答說帖與媒體管制</p>\n<p>面對撤離引發的社會恐慌與敵方假訊息，發言人是本院的認知防衛中樞：</p>\n<ol>\n<li>\n<p><strong>發布權威性新聞稿以正視聽</strong>： -   迅速撰擬官方新聞稿，由指揮官核定後發布：<strong>「因應軍方防空預警，本院正有序實施核心醫療能量之預防性轉移。本院非停診，而是將重症照護、急診功能點對點轉置於安全聯防醫院，目前所有在院病患生命徵象穩定，已獲妥善安排。」</strong>，強力粉碎敵方利用社群媒體散布「屏基遭擊毀、拒收棄置病人」之不實認知戰。</p>\n</li>\n<li>\n<p><strong>制定「家屬通知說帖」並交底一線</strong>： -   會同社工室迅速擬定標準化、溫和且具撫慰效果的<strong>「家屬詢答與通知說帖」</strong>。 -   將病患轉院名冊、轉送之合作醫院名稱、隨車醫護名單及防護配置，同步給急診檢傷櫃檯、病房護理長及家屬安撫區（轉診中心），確保院內同工對外的解釋標準百分之百一致，平息家屬焦慮。</p>\n</li>\n<li>\n<p><strong>實施新聞媒體「硬性物理管制」</strong>： -   在醫院外圍拉起黃色警戒線。嚴格規定媒體記者僅能於<strong>「急診室前救護車停車場外圍之指定區域」</strong>或「 新聞簡報中心（恩慈 B1）」進行採訪。 -   嚴厲告誡媒體禁止進入救護車裝載區、病房區，<strong>嚴禁拍攝血腥、暴露或重症病患之肖像隱私</strong>，死守醫療倫理尊嚴。</p>\n</li>\n</ol>\n<p>五、 醫療/技術專家 A4（行政支援中心主任\n曾士香）：高脆弱重症轉運評估與先遣對接</p>\n<ol>\n<li>\n<p><strong>提供「高度照護病患」之轉運風險評估</strong>： -   針對加護病房（ICU）內依賴呼吸器、葉克膜或洗腎之「高度照護病患」，專家與醫療主管（O1）共同評估其醫療可轉移性（Transportability）。 -   精算每位重症病患轉運過程中所需的<strong>可攜式蓄電池呼吸器、隨車氧氣小鋼瓶消耗速率（精算 72 小時存量）及靜脈林格氏液數量</strong>，並與轉運醫護人力進行精準配對。</p>\n</li>\n<li>\n<p><strong>督導並派遣「先遣對接團隊」</strong>： -   在主力撤離車隊出發前 1 小時，指派一組由資深護理師、資材管理人員組成的<strong>「先遣團隊（Relocation Advance Team）」</strong>，攜帶通訊設備與首批管制藥耗材，先行趕往目標安全區接收醫院。 -   先遣隊負責在現場打通行政掛號批價動線、完成病房與臨時開刀房空間之物理勘查，準備無縫接收隨後抵達的本院病患。</p>\n</li>\n</ol>\n<p>HICS 指揮組下達之跨部門「實兵撤離」協同指令</p>\n<p>在 HICS\n指揮組的統一決策與授權下，執行、計畫、後勤與財務部門將立即啟動以下一線實兵撤離作為：</p>\n<ul>\n<li>\n<p><strong>執行部（Operations - 醫務部長陳志文、護理部長朱淑媛）</strong>： 1.  <strong>病人四級分類與名冊登錄</strong>：病房與急診立即依「反向檢傷」落實病患分類，辦理輕症提早出院，並將需轉院之重症、一般臥床病人詳細造冊。 2.  <strong>醫事與病人「一對一（A與 B）配對」</strong>：計畫部將撤離之醫護人員（功能編組 A）與需撤離之病人（分組 B）依病情嚴重度進行配對，指派主治醫師與隨車護理師，隨車維持病患的<strong>持續醫療照護</strong>。 3.  <strong>病歷摘要與用藥紀錄隨車</strong>：病歷室與書記確保病患原有的「紙本轉診單、病歷摘要、藥物處方箋及檢驗報告」裝入防潮資料袋，確實與病人搭配，隨同救護車交接至接收端。</p>\n</li>\n<li>\n<p><strong>後勤部（Logistics - 總務部長許慧莉）</strong>： 1.  <strong>戰略物資「打包編碼（Tagging &amp; Numbering）」上車</strong>：資材組與藥劑科將救命之戰傷急救箱、抗生素、管制麻醉藥、破傷風疫苗、林格氏液及血庫備用 O 型血，進行<strong>分類編碼列冊</strong>。依編碼順序裝上指定運輸貨車，由專人隨同送往異地存放，確保到院後 10 分鐘內可完成開箱調劑。 2.  <strong>車輛編碼集結與動線引導</strong>：勤務組將現有車輛進行編碼，於急診前車道依序裝載，並指派 Runner 徒步引導警車、消防車及簽證救護車快速切入指定路網。</p>\n</li>\n<li>\n<p><strong>行政/財務部（Finance/Admin - 管理部長張隆鐘）</strong>： 1.  <strong>暴力啟動「戰時記帳豁免機制」</strong>：指示所有掛號批價櫃檯，對於評估為「可返家/提早出院」之病患，免除常規繁瑣的核銷結帳手續，一律採取離線紙本登記、蓋「戰時豁免」戳記後直接令其出院，事後再行追溯補結帳，在 4 小時內騰出 30% 至 40% 的急重症空間。 2.  <strong>召回人員身分辨識與工時記錄</strong>：人資室在人力集結點建立聯合安檢站，使用金屬探測器嚴格查驗身分證，配發<strong>防偽專屬螢光識別背心與任務卡</strong>，防範間諜與破壞者（第五縱隊）混入撤離車隊中進行滲透。</p>\n</li>\n</ul>"}]}, {"role": "指揮官", "entries": [{"scenario": "1-5", "title": "48小時降載至30%目標", "desc": "接獲屏東縣聯合應變管制中心通知，請以30%為目標，48小時內完成降載作業，並進行醫療量能盤點與資料彙整。", "html": "<p>針對接獲屏東縣聯合應變管制中心「48 小時內完成降載至 30%\n目標」之緊急指令，在\nHICS（醫院事故指揮系統）架構下，<strong>事故指揮官（由院長擔任）</strong>是全院應變機制的最高決策中樞。</p>\n<p>面對主推官提問的三大重點，指揮官的具體因應作為如下：</p>\n<p><strong>一、 於 30 分鐘內極速確認指令、啟動 HICS 與完成院內通報（因應提問\nI）</strong></p>\n<ol>\n<li>\n<p><strong>查核命令真實性與啟動應變</strong>：接獲主管機關（如屏東縣聯合應變管制中心或衛生局）的降載或撤離要求後，指揮官必須優先查核該命令的真實性，確認無誤後，正式下達啟動本院的應變計畫與「病人疏散/重置計畫」。</p>\n</li>\n<li>\n<p><strong>宣告開設臨災應變中心</strong>：立即下令啟動 HICS 架構，成立臨災應變中心，並召集各部門（包含執行部、計畫部、後勤部、行政/財務部）首長與指揮幕僚報到就位。</p>\n</li>\n<li>\n<p><strong>設定最高戰略目標與通報</strong>：於接管指揮權後，透過全院緊急廣播或內部通報系統發布全院動員令，確立當下的最高戰略目標（例如：「優先維持急重症與戰傷收治、執行全院醫療降載」），杜絕群龍無首的狀況，並統籌跨部門之資源盤點與運作。</p>\n</li>\n</ol>\n<p><strong>二、 決策與授權「極限醫療降載」作業（因應提問 II）</strong>\n雖然實質的病患篩選與公告由執行部（醫療照護主管）操作，但指揮官必須賦予明確的戰略授權與指令：</p>\n<ol>\n<li>\n<p><strong>下達病人分級與降載指令</strong>：指揮官須明確指示執行部門（醫務部與護理部）立即展開病患分級造冊作業。</p>\n</li>\n<li>\n<p><strong>授權執行「反向檢傷」與停診</strong>：授權前線醫療團隊打破平時的收治邏輯，實施「反向檢傷（Reverse Triage）」，將病患依據行動能力與照護需求進行分類（如可返家、需安置、一般住院、高度照護）。同時，正式授權並裁示無限期取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術，將資源絕對集中於核心醫療。</p>\n</li>\n<li>\n<p><strong>確立資源運用優先順序</strong>：聽取計畫部門對於「最大疏散病人數量」的精算評估後，指揮官須親自裁定各類別病患的撤離與轉送優先順序，並統籌分配全院的撤離與運輸資源。</p>\n</li>\n</ol>\n<p><strong>三、 統籌 SWEAT-M 關鍵資源盤點、戰情上板與外部呈報（因應提問 III）</strong></p>\n<ol>\n<li>\n<p><strong>督導 SWEAT-M 關鍵資源盤點</strong>：指揮官須要求計畫部、後勤部與資訊室等單位，針對醫院的 <strong>SWEAT-M</strong> 狀態（包含：<strong>S</strong> 安全保障、<strong>W</strong> 水與廢水、<strong>E</strong> 備援電力與能源、<strong>A</strong> 交通可達性與疏散路線、<strong>T</strong> 電信通訊，以及 <strong>M</strong> 醫療物資）進行全面性的盤點與評估。</p>\n</li>\n<li>\n<p><strong>掌握戰情面板與核定 IAP</strong>：召開行動計畫會議，聽取計畫部（狀況分析小組與資源控管小組）對於全院空床數、降載出院人數、殘存醫護人力及物資缺口的匯報。審視並掌握即時更新的「戰情面板（Status Board）」，據此核定下一個執行週期的「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>核定對外呈報與緊急求援</strong>：確認各項醫療量能與 SWEAT-M 數據無誤後，督導並授權「聯絡官」或「統籌呈報組」，於規定時限內向屏東縣聯合應變管制中心與衛生局完成量能的初報與續報。若盤點發現關鍵資源（如救護車、血液或醫療氣體）存在嚴重缺口，立即指示聯絡官向外部請求緊急調度與支援。</p>\n</li>\n</ol>\n<p><strong>四、 授權危機溝通與安定民心（指揮官額外關鍵作為）</strong>\n醫療極速降載與強制出院極易引發家屬與民眾恐慌。指揮官須授權「發言人（醫務副院長）」統一對內外發布醫院降載政策、門禁管制及替代就醫流程的聲明，以安定院內病患與社會大眾的民心，並防堵戰時假訊息與恐慌蔓延。</p>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，在\nHICS（醫院事故指揮系統）架構下，<strong>指揮官（由院長擔任）</strong>作為全院的最高決策與指揮中樞，必須迅速下達防空指令並確保指揮體系在戰火下持續運作。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 查核威脅情資並下達防空與空間轉換指令</strong></p>\n<ol>\n<li>\n<p><strong>確認與發布警報</strong>：接獲主管機關的空襲或遠距火力威脅通知後，指揮官須先查核撤離與威脅命令的真實性，隨即正式發布國家級防空警報（Code\n    Black）與全院動員令。</p>\n</li>\n<li>\n<p><strong>設定最高戰略目標</strong>：下達「空間降階防護」指令，明確定義戰時核心醫療功能，並發布最高戰略目標（例如：放棄所有常規醫療、全面準備接收戰傷病患、啟動極限醫療降載與反向檢傷）。</p>\n</li>\n</ol>\n<p><strong>二、 執行「指揮中樞極速地下化」</strong></p>\n<ol>\n<li>\n<p><strong>攜帶避難包（Go-Bag）轉移</strong>：為確保「指揮權絕對不中斷」，指揮官必須在發布警報的\n    10 至 30\n    分鐘內，帶領核心幕僚（安全官、聯絡官、發言官）抓起預先整備的「指揮官避難包」（內含衛星電話、加密無線電、全院實體藍圖及備份硬碟等），循無窗戶的內側安全梯迅速撤離高脆弱區。</p>\n</li>\n<li>\n<p><strong>開設戰時指揮所</strong>：將指揮中心轉移至大連院區地下結構最強固的防空避難核心區（如恩慈大樓\n    B1 會議室或 B2\n    空間），並在最短時間內啟動不斷電系統與通訊設備，重新建立指揮與控制（C2）能力。</p>\n</li>\n</ol>\n<p><strong>三、 督導 B1 備援空間與五大功能區之開設</strong></p>\n<ol>\n<li>\n<p><strong>下令執行空間轉置</strong>：指揮官須指示執行部與後勤部，將高樓層的醫療功能與物資緊急轉移至安全的地下替代空間。</p>\n</li>\n<li>\n<p><strong>確認功能區落實</strong>：確保地下室五大功能區依計畫確實開設，包含：檢傷行政區（約翰/馬可\n    B1）、臨時 ICU（約翰/馬可 B1）、臨時開刀房（韓偉 B1）、恢復室（韓偉\n    B1）及輕症病房（路加 B1 停車場），以維持微型戰地醫院的運作量能。</p>\n</li>\n</ol>\n<p><strong>四、 啟動異地備援與防範「無頭狀態」</strong></p>\n<ol>\n<li>\n<p><strong>雙盲備援連線</strong>：指揮官須同步與瑞光院區（或預先簽定協定之外部備援機構）啟動「雙盲備援連線」。約定若大連主院區指揮所不幸遭直接摧毀或失聯達\n    15\n    分鐘，備援應變中心須立即無縫接管全院的資源調度與外聯指揮權，避免群龍無首。</p>\n</li>\n<li>\n<p><strong>授權自動繼承</strong>：若指揮官自身因戰火阻斷無法視事，須確保院內「自動順位繼承機制」生效，由當值最高層級的臨床主管自動接管指揮權。</p>\n</li>\n</ol>\n<p><strong>五、 統籌外部資源協調與危機溝通</strong></p>\n<ol>\n<li>\n<p><strong>外部通聯與求援</strong>：透過聯絡官與地方政府災害應變中心（EOC）、衛生局及聯合應變指揮中心保持密切聯繫，回報本院撤離進度、備援空間量能，並協調提供所需的軍警防護、車輛及交通路線引導。</p>\n</li>\n<li>\n<p><strong>授權訊息發布</strong>：授權發言官（醫療副院長）統一對外發布醫院降載、防空避難及門禁管制的聲明，以安定院內病患與社會大眾的民心，防堵戰時假訊息與恐慌蔓延。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，在\nHICS（醫院事故指揮系統）架構下，<strong>指揮官（由院長擔任）</strong>作為全院的最高決策與指揮中樞，必須迅速下達防空指令並確保指揮體系在戰火下持續運作。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 發布防空警報與確立最高戰略目標</strong></p>\n<ol>\n<li>\n<p><strong>下達警報與動員</strong>：接獲主管機關的空襲或遠距火力威脅通知後，指揮官須立即發布國家級防空警報（Code\n    Black）或動員令。</p>\n</li>\n<li>\n<p><strong>設定戰略目標</strong>：於接管指揮權的10分鐘內，透過全院緊急廣播發布第一道動員令，確立當下的最高戰略目標（例如：「放棄所有常規醫療，全面準備接收戰傷病患」），杜絕群龍無首導致的黃金搶救期流失。</p>\n</li>\n</ol>\n<p><strong>二、 執行「指揮中樞瞬間地下化」</strong></p>\n<ol>\n<li>\n<p><strong>攜帶避難包（Go-Bag）極速轉移</strong>：為確保「指揮權絕對不中斷」，指揮官必須在發布警報的\n    10 分鐘內，帶領 HICS\n    核心幕僚（安全官、聯絡官、發言官），抓起預先整備定檢的「指揮官避難包」（內含衛星電話、加密無線電、全院實體藍圖及備份硬碟等），循無窗戶的內側安全梯，迅速轉移至地下防空避難核心區（如大連院區地下二樓\n    B2 或恩慈大樓 B1 會議室）開設戰時指揮所。</p>\n</li>\n<li>\n<p><strong>指揮所硬體瞬間啟動</strong>：抵達地下指揮所後，須於 3\n    分鐘內啟動獨立不斷電系統（UPS），架設白板與情資看板（Status\n    Board），確保通訊天線延伸至無遮蔽區，重新建立指揮與控制（C2）能力。</p>\n</li>\n</ol>\n<p><strong>三、 督導 B1 備援空間與五大功能區開設</strong>\n下令指示執行部與後勤部執行「空間降階防護」，將高樓層核心醫療轉移至地下室，並確保地下一樓（B1）的五大備援醫療功能區確實開設運作。包含：約翰/馬可大樓\nB1 的檢傷行政區與臨時 ICU 病房、韓偉大樓 B1\n的臨時開刀房與恢復室，以及路加大樓 B1\n的輕症病房，以維持微型戰地醫院的醫療量能。</p>\n<p><strong>四、 啟動網狀異地備援與防範「無頭狀態」</strong></p>\n<ol>\n<li>\n<p><strong>雙盲備援連線</strong>：同步與瑞光院區（或預先簽定協定之外部備援機構）啟動「雙盲備援連線」。明確約定若大連主院區指揮所不幸遭直接摧毀或失聯達\n    15 分鐘，備援應變中心須立即無縫接管全院的外聯與資源調度權。</p>\n</li>\n<li>\n<p><strong>自動順位繼承機制</strong>：若指揮官自身因戰火阻斷或遇襲無法視事，須授權啟動院內「HICS\n    自動順位繼承機制」，由當值最高層級的臨床主管（如急診部主任、重症醫學部主任或外科部主任）在\n    5 分鐘內依法自動接管指揮權，確保決策鏈不中斷。</p>\n</li>\n</ol>\n<p><strong>五、 統籌外部資源協調與授權危機溝通</strong></p>\n<ol>\n<li>\n<p><strong>外部對接與求援</strong>：作為醫院與外部（如衛福部、國防部、衛生局、消防局）的唯一官方聯繫窗口，透過聯絡官請求必要的外部資源支援（如協調軍方運補車輛或血液調度）。</p>\n</li>\n<li>\n<p><strong>授權訊息發布</strong>：授權發言官（公關官/醫療副院長）統一對外及對媒體發布醫院降載、防空避難及門禁管制的聲明，以安定院內病患與社會大眾的民心，並防堵戰時假訊息與恐慌蔓延。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨將醫療量能外移與大批病患疏散的重大戰略決策。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>事故指揮官（由院長擔任）</strong>作為應變機制的大腦與最高決策者，必須承上啟下、領導應變團隊並下達決策。其具體因應作為如下：</p>\n<p><strong>一、 查核撤離命令真實性與啟動應變機制</strong></p>\n<ol>\n<li>\n<p><strong>查核與啟動</strong>：接獲主管機關（如衛生局）的撤離或分流要求後，指揮官必須優先<strong>查核撤離命令的真實性</strong>，確認無誤後，正式下達啟動本院的「病人疏散計畫」與「病人重置計畫」。</p>\n</li>\n<li>\n<p><strong>確立最高戰略目標</strong>：評估事件種類與影響範圍，宣告醫院進入緊急狀態，並為此次撤離行動制定最高戰略目標與安全原則。同時，評估是否需要啟動適當的醫療或技術專家來協助事件評估。</p>\n</li>\n</ol>\n<p><strong>二、 召開決策會議與下達病人分級指令</strong></p>\n<ol>\n<li>\n<p><strong>召開行動計畫會議</strong>：迅速召集指揮幕僚（安全官、聯絡官、發言人）及四大部門組長（執行、計畫、後勤、行政/財務）召開危機決策小組會議，聽取各組長報告以掌握最新狀況，並核定「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>下達病人分級與降載指令</strong>：明確指示執行部門（醫務部與護理部等）立即展開病患分級造冊作業。依據病情將病人分類為：行動方便可提早出院者、需扶持安置者、一般臥床病人、以及需高度照護的危急/加護病患，並下令優先辦理輕症病患的緊急出院以快速降載。</p>\n</li>\n</ol>\n<p><strong>三、 確立資源運用優先順序與統籌疏散量能</strong></p>\n<ol>\n<li>\n<p><strong>裁定疏散優先順序</strong>：根據醫療照護組的回報與反向檢傷結果，指揮官須親自裁定各類別病患的撤離與轉送優先順序。</p>\n</li>\n<li>\n<p><strong>分配撤離資源</strong>：聽取計畫部門（狀況分析組）對於「最大疏散病人數量」的精算與評估報告後，指揮官負責統籌並分配全院的撤離與運輸資源（包含救護車、搬運人力與隨車醫療物資），確保資源分配符合最高效益。</p>\n</li>\n</ol>\n<p><strong>四、 對外協調聯繫與危機溝通</strong></p>\n<ol>\n<li>\n<p><strong>對接主管機關與接收醫院</strong>：指揮官須透過「聯絡官（行政副院長）」與外部機關（如縣市聯合應變中心、衛生局及區域聯防醫院）保持密切溝通，確認外部接收量能與支援協定，甚至請求大眾運輸車輛或救護車的外部支援。</p>\n</li>\n<li>\n<p><strong>授權對外發言與防堵恐慌</strong>：授權「發言人（醫務副院長）」或公關官統一對大眾與媒體發布醫院的疏散現況、撤離原因與轉送安置進度。確保正確的訊息傳達給媒體，防堵假訊息與家屬恐慌。</p>\n</li>\n</ol>\n<p><strong>五、 監控事態發展、損害控管與安全裁決</strong></p>\n<ol>\n<li>\n<p><strong>維護人員安全與損害控管</strong>：配合「安全官」持續檢視疏散路線與集結點的安全性，防止事態擴大。若撤離過程中遭遇外部攻擊威脅加劇或環境極度危險，指揮官需依據安全官建議，行使「中止權」，暫停撤離行動或改為就地掩蔽。</p>\n</li>\n<li>\n<p><strong>決定任務終止與復原</strong>：在所有指定病患安全撤離、醫療量能重置完成後，由指揮官視狀況解除特別狀態，決定災難救援或撤離行動的終止，並指示各部門轉入災後復原與歸建階段。</p>\n</li>\n</ol>\n<p>指揮官如何決定優先疏散名單？</p>\n<p>戰時血液短缺時，如何啟動「活體血庫」？</p>\n<p>在斷網狀態下，傳令兵機制如何運作？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認醫院所在區域即將進入「主戰區」，且指揮中心下達啟動\n<strong>HICS 第三階段「全面撤離與量能重置」</strong> 的預防性撤離命令時 ：</p>\n<p>本院 <strong>HICS 事故指揮官 A0（吳榮州院長）</strong>\n將作為全院應變機制的「最高決策大腦」 ，打破承平時期的常規行政程序，採取極具軍事化與扁平化的應變決策\n。指揮官將立即攜手核心幕僚（安全官、聯絡官、發言人、醫療專家）\n，採取以下<strong>七大範疇之具體生存應變與戰略裁決作為</strong>，死守高屏醫療韌性底線：</p>\n<p>一、 第一階段：查核命令真實性，發布全院動員令</p>\n<p>在戰爭迷霧與灰色地帶衝突中，敵方極易利用「假訊息」或「電子戰」散布假撤離命令以瓦解我方防線\n。因此，指揮官接獲通知後的首要任務是核實情資：</p>\n<ol>\n<li>\n<p><strong>實施指令真實性金鑰核對</strong>： 指揮官（吳榮州院長）必須立即指示聯絡官（黃雅芳行政副院長） ，透過加密之備援通訊設備（如低軌衛星電話或專用 UHF/VHF 無線電） ，與中央聯合應變中心（CJEOC）、衛福部、縣市衛生局及作戰區進行安全金鑰雙重核對，<strong>絕對核實預防性撤離指令的真實性</strong> 。</p>\n</li>\n<li>\n<p><strong>發布最高安全警戒與啟動應變</strong>： 確認指令無誤後，正式下達啟動本院「病人疏散計畫」與「病人重置計畫」 。指示總機（直撥※9）對全院發布緊急廣播與動員令 ，宣告本院進入戰時極限應變狀態 。</p>\n</li>\n</ol>\n<p>二、 執行「指揮中樞瞬間地下化」與落實 command 繼承防呆</p>\n<p>為防範大連院區常規行政大樓（高樓層及玻璃帷幕脆弱區）在撤離初期遭遇直接火力打擊\n，指揮官必須親自帶隊實施「狡兔三窟」的指揮轉移：</p>\n<ol>\n<li>\n<p><strong>10分鐘極速垂直轉移</strong>： 指揮官與 HICS 核心幕僚攜帶預先整備定檢的<strong>「指揮官避難包（Go-Bag）」</strong>（內含衛星電話、加密無線電、全院實體藍圖、高階員工名冊及含有重要資料備份之加密硬碟） ，循無窗之內側安全梯，於 10 分鐘內轉移至結構最強固的地下避難核心區開設戰時 EOC（<strong>恩慈大樓 B1 會議室</strong>，必要時轉移至 B2 地下總指揮所） 。</p>\n</li>\n<li>\n<p><strong>啟動瑞光院區「雙盲異地備援」與自動順位繼承</strong>： -   在地下指揮所啟動 UPS 後，立即與<strong>瑞光院區 7F 備援指揮所</strong>啟動連線 。 -   明確宣告：若大連院區指揮所因不可抗力遭毀損或失聯達 15 分鐘，依法由瑞光院區副指揮官，或依序由當值最高臨床主管（急診部主任、重症醫學部主任、外科部主任，或夜間最高階護理督導）<strong>自動依法接管指揮權、穿上指揮官紅背心</strong>，確保決策鏈絕不斷鏈 。</p>\n</li>\n</ol>\n<p>三、 主持「撤離行動會議」，重組戰術編組與分散風險重置</p>\n<p>指揮官立即在地下前進指揮所召開緊急會議 ，對各部門下達戰術重構指令：</p>\n<ol>\n<li>\n<p><strong>重組執行部門為雙軌戰術編組</strong>： 下令將執行部長 O0（醫務部陳志文部長）  麾下的一線醫事與後勤力量，當場拆分為兩大專責班子 ： -   <strong>【撤離準備組】</strong>：主導病患反向檢傷、分級造冊、與目標醫院交接，並調配撤離交通載具 。 -   <strong>【持續照護組】</strong>：死守留在院內尚未登車之重症患者，維持生命跡象直至其坐上轉運車 。</p>\n</li>\n<li>\n<p><strong>貫徹「分散風險原則」點對點轉銜</strong>： 指揮官指示聯絡官，配合地方衛生局與高屏區 EOC 規劃，將本院（重度級急救責任醫院）撤出之病患 ，<strong>分散後送至安全重置區的中度級、一般級急救責任醫院（如協定聯防之衛生福利部屏東醫院、寶建醫院、安泰醫院）或臨時開設之第二型急救站進行重置</strong> ，避免撤往單一重度責任醫院造成該院量能瞬間崩潰，死守區域重大傷病患處置能量 。</p>\n</li>\n</ol>\n<p>四、 簽發最冷酷之「反資敵（Denial of Assets）」封存與銷毀命令</p>\n<p>在主戰區炮火逼近、且撤離時間極為有限的情況下，大型、高耗能且無法在數小時內物理拆裝轉移的精密醫療設備（如大型中央血液透析機、高階多切面\nCT、MRI 及核心伺服器主機），極易在撤離後落入敵手 。</p>\n<ol>\n<li>\n<p><strong>下達實體斷電與物理鎖固令</strong>： 指揮官會同工務室（設施運作 O2）與資訊室（機構運作 O5） ，對大連院區內無法搬運的精密醫療設備下達<strong>強制斷電、切斷維生管線及機械物理鎖固</strong>之命令 。</p>\n</li>\n<li>\n<p><strong>簽署「戰時資產反資敵銷毀法律簽證書」</strong>： 由指揮官及法律訴求小組長 F3（職安室主任 杜傳榮）共同簽署法律簽證 ，授權資通人員<strong>對核心硬碟、高機密患者個資晶片執行「物理實體砸毀/銷毀」</strong> 。此法律簽證書將妥善放入指揮官 Go-Bag 隨身攜帶，作為災後向國家申報戰損與保險理賠之法定唯一憑證 。</p>\n</li>\n</ol>\n<p>五、 協調跨部會後勤動員與三大轉運區分流管制</p>\n<ol>\n<li>\n<p><strong>極限動員本院與外部簽證載具</strong>： 指揮官下令後勤部長 L0（總務部 許慧莉）  啟動全車隊徵用，動員本院現有救護車 4 輛、中巴 4 輛、行政車 6 輛 ；同時指示聯絡官向縣市聯合應變中心（LJEOC）<strong>爭取外部簽證支援救護車 2 輛與大眾中巴接駁載具</strong> 。</p>\n</li>\n<li>\n<p><strong>核定實施「三大接運疏散區」動線硬管制</strong>： 為避免上百名撤離人員在院外發生致命踩踏，指揮官核定實施嚴格的車道與人流分流 ： -   <strong>【救護車專區（急診室大門出口）】</strong>：專供第四類高度照護（危急/ICU）及第三類臥床病患垂直轉移上車 。 -   <strong>【私人車專區（恩慈大樓旁車道）】</strong>：專供第二類有家屬接送之需扶持安置病患 。 -   <strong>【大眾接駁車專區（醫院門診大廳大門出口）】</strong>：供大眾中巴集結轉運第一類輕症及可返家病患 。 -   指示安全管制組（保安組）實施「硬邊界防護」 ，驅離任何阻礙上述生命通道的違停車輛，必要時請武裝警察協防 。</p>\n</li>\n</ol>\n<p>六、 指導計畫部死守「人藥一對一隨行」與「病歷隨車轉移」</p>\n<p>指揮官必須確保病患在轉運至接收醫院時不會發生醫療資訊斷鏈 ：</p>\n<ol>\n<li>\n<p><strong>命令病歷與藥物防水綁定</strong>： 督導計畫部長 P0（朱淑媛護理部部長）與文件紀錄組（P3） ，強制要求各病房與藥師，將病患專屬之 72 小時用藥、手工轉診單、病歷摘要、用藥處方箋及檢驗報告，<strong>統一裝入密封防水、防潮之病歷夾鏈袋中，並強制物理綁定（如貼上或綁好）於病患之擔架或推床旁</strong>，實施「人藥隨行一對一配對」上車 。</p>\n</li>\n<li>\n<p><strong>不帶單盲派（Push Logistics）補給</strong>： 指示資材組與藥劑科不等待前線醫師開單 ，直接將大量「戰備急救箱（Go-Kits）」、管制麻醉藥、破傷風疫苗與血庫 O 型全血隨隨車運送 ，充實接收點初期之戰鬥庫存 。</p>\n</li>\n</ol>\n<p>七、 授權官方發言人實施「輿論認知防禦」，確保撤離途中「安全中止權」</p>\n<ol>\n<li>\n<p><strong>發布權威澄清，反制認知戰</strong>： 授權發言人 A1（醫療副院長 劉思源） 統一官方發言窗口 。迅速發布澄清新聞稿：<em>「本院因應軍事預警，正與衛生局點對點實施核心醫療能量之預防性轉置，所有在院重症病患皆由隨車醫師護理師妥善守護，本院非停診，請家屬與社會大眾勿聽信敵方癱瘓之錯假訊息」</em> 。</p>\n</li>\n<li>\n<p><strong>授權安全官行使「安全中止權（Safety Halt）」</strong>： 指揮官明確授權安全官 A2（職安室主任 杜傳榮） ：在撤離實體轉運過程中，若突然遭遇敵方無人機蜂群襲擾、防空警報大作或周邊爆炸，安全官有權<strong>立即叫停撤離行動</strong>，強令前線人員就地進入無窗「核心內筒」或 B1 避難空間，待威脅排除後方能恢復轉運 。</p>\n</li>\n</ol>"}]}, {"role": "指揮中心幕僚", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對衛生主管機關通知進入戰時醫療整備並要求限時回報各項量能，此情境對應本院城鎮韌性演習中的<strong>「特別狀況1-1：臨災應變中心開設與運作」</strong>。指揮中心幕僚（HICS編組）應迅速啟動應變機制，其具體因應作為如下：</p>\n<p><strong>一、 迅速開設應變中心與啟動通訊 (HICS啟動)</strong></p>\n<ol>\n<li>\n<p><strong>成立指揮中心與人員到位</strong>：接獲主管機關下達狀況後，立即依HICS（醫院事故指揮系統）架構啟動臨災應變中心，召集各編組人員報到就位。</p>\n</li>\n<li>\n<p><strong>通訊構聯與任務分工</strong>：確保院內外通訊暢通，由指揮官下達重大決策，並由統籌呈報組（危管會）進行任務分工。聯絡官（LNO）則須擔任醫院與衛生局等外部機關的唯一官方聯繫窗口。</p>\n</li>\n</ol>\n<p><strong>二、 幕僚分工與各項量能盤點作業</strong>\n在HICS架構下，各部幕僚須打破平時科室本位，依功能分組限時完成量能盤點：</p>\n<ol>\n<li>\n<p><strong>計畫部（資訊彙整雷達）</strong>：</p>\n<ul>\n<li>\n<p>計畫部負責收集與評估災情資訊，維持「情資看板（Status\n    Board）」，隨時掌握全院空床數、可用開刀房數、醫護人力數等資訊，提供給指揮官做決策。</p>\n</li>\n<li>\n<p>轄下的「資源控管組」須監控所有員工、設施、物資、設備的供應情況，並建立資源清單。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>醫療照護量能（床位、急診、手術、加護）</strong>：</p>\n<ul>\n<li>醫療照護主管（醫務部、急診部、護理部）須盤點急診、病房、手術室與ICU空間，並進行醫療降載準備。依據第一階段整備目標，需擬定病人出院及轉院計畫，目標於<strong>48小時內將住院病人降載至30%</strong>，以騰出戰備與急重症收治空間。</li>\n</ul>\n</li>\n<li>\n<p><strong>人力與後勤維生量能（人力、救護車、醫療氣體、血液、藥材）</strong>：</p>\n<ul>\n<li>\n<p><strong>人力</strong>：由人事組及資源控管組盤點現有醫護與行政人力，安排召回機制與輪替班表。</p>\n</li>\n<li>\n<p><strong>救護車與運輸</strong>：後勤部轄下之勤務組（運輸組）負責評估運輸工具與救護車的調度分配。</p>\n</li>\n<li>\n<p><strong>醫療氣體</strong>：由設施運作主管（工務室）盤點醫療氣體與公用系統的穩定度及備援能量。</p>\n</li>\n<li>\n<p><strong>血液與藥材</strong>：任務支援組與後勤物資組（藥劑科、資材組、血庫）盤點戰備藥品、耗材與血液庫存，評估消耗速率並建立<strong>至少維持72小時</strong>的物資儲備清冊。</p>\n</li>\n</ul>\n</li>\n</ol>\n<p><strong>三、 統一回報與紀錄保存</strong></p>\n<ol>\n<li>\n<p><strong>統整數據與限時初報/續報</strong>：由<strong>統籌呈報組（危管會）</strong>作為統一收斂窗口，將計畫部與各組盤點完畢的「床位名冊、手術/加護調度、72小時物資與醫療氣體缺口」等綜合狀況進行彙整。</p>\n</li>\n<li>\n<p><strong>向主管機關呈報</strong>：透過聯絡官或統籌呈報組，於主管機關規定的時限內，完成限時初報與後續的續報作業，提出目前的醫療量能與外部支援需求（如請求調撥藥材、血液或救護車支援）。</p>\n</li>\n<li>\n<p><strong>文件與紀錄保存</strong>：由文件記錄組及統籌呈報組負責保存通報與回報的佐證紀錄，以利後續的追蹤與評核。</p>\n</li>\n</ol>"}]}, {"role": "執行部門（Operations Section）", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報各項量能。在\nHICS（醫院事故指揮系統）架構下，<strong>執行部（Operations\nSection）</strong>是將醫院切換為「戰鬥模式」並執行第一線技術性工作的核心部門。</p>\n<p>接獲戰時整備與量能盤點指令後，執行部的具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌執行指揮權</strong></p>\n<ol>\n<li>\n<p><strong>成立執行部</strong>：由醫務部部長擔任「執行部長（Operations Section\n    Chief）」，負責管理、計畫與指揮所有的醫療行動及災害控制，並執行指揮官交付的技術性工作。</p>\n</li>\n<li>\n<p><strong>跨組指揮與協調</strong>：執行部長須立即指揮轄下的「醫療照護、設施運作、危害控制、安全管制、機構運作」等次級主管，以及「待命區管理者」就位，針對主管機關要求的各項量能展開前線盤點與處置。</p>\n</li>\n</ol>\n<p><strong>二、 醫療照護組：盤點醫療量能與極限降載（床位、急診、手術、加護）</strong>\n由急診部主任及內外科主任擔任醫療照護主管，主責前線作戰與醫療空間盤點。</p>\n<ol>\n<li>\n<p><strong>盤點與回報</strong>：迅速盤點急診、加護病房、開刀房的現有空床數與收治量能，評估現有住院與門診病患的狀況，將量能與動向數據提交給計畫部與統籌呈報組。</p>\n</li>\n<li>\n<p><strong>極限醫療降載與反向檢傷</strong>：立即取消非緊急門診與常規排程手術。由資深主治醫師組成小組執行「反向檢傷（Reverse\n    Triage）」，篩選出生命徵象穩定的病患辦理緊急出院或下轉，配合全院目標於<strong>48小時內將住院病人降載至30%</strong>，以騰出戰時所需的擴充病床（Surge\n    Beds）與搶救空間。</p>\n</li>\n<li>\n<p><strong>戰術空間轉換</strong>：指揮將大廳或地下室等非醫療空間，迅速轉換開設為臨時檢傷區、臨時開刀房、恢復室及輕症病房。</p>\n</li>\n</ol>\n<p><strong>三、 設施運作組：盤點與確保維生量能（醫療氣體、水電）</strong>\n由工務室主任擔任設施運作主管，負責生命線的保衛與盤點。</p>\n<ol>\n<li>\n<p><strong>醫療氣體與公用系統盤點</strong>：迅速盤點中央醫療氣體（如液氧槽）、備用氧氣鋼瓶、緊急發電機及燃料存量，評估是否能維持法定的72小時運作。</p>\n</li>\n<li>\n<p><strong>準備負載卸除（Load\n    Shedding）</strong>：因應戰時可能面臨的斷電孤島情境，預先規劃切斷行政區或一般病房的電源，將備用電力與淨水資源「死守」在開刀房、加護病房與急診等紅區。</p>\n</li>\n</ol>\n<p><strong>四、 安全管制組：確保救護車動線與實施硬邊界防護</strong>\n由醫勤室保安組長擔任安全管制主管。</p>\n<ol>\n<li>\n<p><strong>救護車與交通管制</strong>：盤點並確保救護車進出動線順暢，驅離違停或閒雜車輛，並設立救護車運輸區。</p>\n</li>\n<li>\n<p><strong>硬邊界防護（Hard\n    Perimeter）</strong>：戰時為防止群眾恐慌衝擊醫院，須立即封閉非必要出入口，拉下鐵捲門並架設阻絕物，僅保留單一檢傷武裝通道進行嚴格的門禁管制（Lockdown），確保前線醫療團隊的安全。</p>\n</li>\n</ol>\n<p><strong>五、 待命區管理者：前線人力、物資、血液與藥材之接收調度</strong>\n由行政支援中心組長擔任待命區管理者。</p>\n<ol>\n<li>\n<p><strong>評估與接收後勤支援</strong>：評估執行部前線（急診、手術室）所需的物資，向後勤部提出需求。</p>\n</li>\n<li>\n<p><strong>前線資源配送</strong>：負責管理由後勤部送達待命區的資源，包含支援人力、運輸工具、戰傷藥品與血液，透過「盲派（Push）」等物流機制，迅速調度並配送至最前線的醫療照護組手中。</p>\n</li>\n</ol>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」等複合性危機，HICS<strong>執行部門（Operations\nSection）</strong>作為第一線作戰與技術執行的核心，必須迅速啟動醫療分流、安全防護與資源調度，以確保急診不被癱瘓。</p>\n<p>由醫務部部長擔任的「執行部長」將統籌轄下各組，其具體因應作為如下：</p>\n<p><strong>一、 醫療照護組：極限分流、反向檢傷與情緒照護</strong></p>\n<ol>\n<li>\n<p><strong>設立戶外分流與領藥區</strong>：針對因恐慌而大量湧入搶購慢性病藥品的民眾，醫療照護主管（急診部主任）應指示設立「戶外慢性病處方籤領藥區」或「戶外防疫門診」，將單純領藥與輕症民眾阻絕於急診搶救區之外，進行快速分流。</p>\n</li>\n<li>\n<p><strong>執行檢傷分類與反向檢傷</strong>：面對交通事故傷患與湧入的人潮，急診須落實嚴格的檢傷分類（紅、黃、綠、黑區）。同時，針對家屬「要求住院」的壓力，必須啟動「反向檢傷（Reverse\n    Triage）」，不但拒絕非緊急住院，還要將院內現有穩定病患快速辦理出院或轉出，將有限的急重症資源保留給交通事故等真正需要搶救的傷患。</p>\n</li>\n<li>\n<p><strong>家屬安置與心理情緒照護</strong>：針對要求查詢撤離資訊或極度恐慌的家屬，醫療照護組須協同社工或院牧人員，將家屬引導至專屬的「家屬休息區（如轉診中心）」或接待區集中安撫，提供心理與情緒照護，避免其在急診現場干擾醫療動線。</p>\n</li>\n</ol>\n<p><strong>二、 安全管制組：實施硬邊界防護與群眾/交通管制</strong></p>\n<ol>\n<li>\n<p><strong>實施硬邊界與門禁封鎖（Lockdown）</strong>：面對恐慌群眾與潛在的醫療暴力，安全管制主管（醫勤室保安組長）必須立即下令實施「硬邊界防護（Hard\n    Perimeter）」。封閉急診與院區非必要出入口，拉下鐵捲門或架設阻絕物，僅保留單一且有武裝警力/保全駐守的檢傷通道，執行嚴格的身分核對與進出管制。</p>\n</li>\n<li>\n<p><strong>維持急診交通與救護車動線</strong>：針對大量湧入的人車，必須強勢進行交通引導與群眾控制。驅離違停或閒雜車輛，確保交通事故的救護車運輸動線絕對暢通。</p>\n</li>\n<li>\n<p><strong>防暴與秩序維護</strong>：在急診檢傷區維持強勢秩序，防範家屬或暴徒因恐慌而搶奪醫療資源或慢性病藥品，必要時聯繫聯絡官請求外部警力支援。</p>\n</li>\n</ol>\n<p><strong>三、 待命區管理者：前線資源與人力之緊急調度</strong></p>\n<ol>\n<li>\n<p><strong>評估前線需求</strong>：待命區管理者（行政支援中心組長）須隨時評估執行部前線（如急診檢傷區、戶外領藥區）因應大量人潮所急需的資源。</p>\n</li>\n<li>\n<p><strong>即時配送支援</strong>：將後勤部準備好的支援人力（如增派的醫師、護理師、保全）、運輸工具、以及前線急需的慢性病藥品與物資，從待命區迅速調度並配送至前線，確保醫療分流與防護網的運作不中斷。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息及各項資訊系統出現延遲（疑似資安攻擊）」，在\nHICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）</strong>作為第一線維持醫療照護與實體安全的核心，必須立即啟動「無網作業」與「實體防護」機制，以應對資訊癱瘓與假訊息帶來的混亂。</p>\n<p>由醫務部部長擔任的「執行部長」將統籌轄下各組，其具體因應作為如下：</p>\n<p><strong>一、 醫療照護組：極限啟動「紙本降級（Downtime）」與替代醫療流程</strong>\n面對掛號、批價、藥局、檢驗及影像系統的全面延遲或癱瘓，醫療前線必須瞬間切換為無網作業模式：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機緊急箱</strong>：各護理站與急診應立即砸破封條，取出預先印製的<strong>「當機緊急箱（Downtime\n    Box）」</strong>。全面改用三聯式紙本病歷、手寫處方箋、紙本檢傷單與條碼貼紙，無縫切換至人工紙本作業以維持醫療核心功能。</p>\n</li>\n<li>\n<p><strong>檢驗與影像替代流程</strong>：檢驗科停止電腦傳輸，改以人工跑單或對講機口頭回報危險值（Panic\n    Value），並嚴格執行「Read-back（覆誦確認）」機制；放射科在無法傳輸數位影像時，回歸沖洗實體\n    X 光片，或由臨床醫師以數位相機翻拍螢幕傳遞影像。</p>\n</li>\n<li>\n<p><strong>門急診分流與服務降載</strong>：配合系統降級，實施醫療服務降載與替代流程，暫停非急迫性醫療，將醫療資源與人力集中於急重症搶救，並安撫現場因系統延遲而久候的病患。</p>\n</li>\n</ol>\n<p><strong>二、 跨組協調：建構異質通訊與「傳令兵（Runner）」制度</strong>\n資訊系統延遲往往伴隨院內通訊障礙，執行部必須確保前線指令下達與醫囑傳遞不中斷：</p>\n<ol>\n<li>\n<p><strong>啟用戰術通訊</strong>：各樓層指揮官與前線主管改配發獨立頻段的 UHF/VHF\n    無線電進行溝通。</p>\n</li>\n<li>\n<p><strong>啟動傳令兵制度</strong>：指定體能良好之行政人員或志工穿著螢光背心，擔任<strong>「傳令兵（Runner）」</strong>。以徒步方式在各樓層、急診與指揮所間穿梭，透過嚴格的「口令覆誦」與「簽收簿」，精準遞送緊急開刀醫囑與檢驗單，克服斷網危機。</p>\n</li>\n</ol>\n<p><strong>三、 安全管制組：實施硬邊界防護與防暴鎖定</strong>\n假訊息（如停診、缺藥、拒收病人）極易引發民眾恐慌，導致大量不理性群眾湧入急診查證或引發衝突：</p>\n<ol>\n<li>\n<p><strong>實施門禁升級與硬邊界（Hard\n    Perimeter）</strong>：安全管制主管（醫勤室保安組長）須立即封閉非必要出入口，僅保留單一檢傷通道，執行嚴格的身分核對與進出管制，防範因假訊息引來的人潮癱瘓醫療動線。</p>\n</li>\n<li>\n<p><strong>防暴與內部封鎖（Lockdown）</strong>：若群眾因系統當機久候或受假訊息煽動而企圖滋擾、搶奪藥品，保全須持防暴裝備結陣死守，並啟動內部封鎖，降下防暴門，將醫護人員與重症病患保護於「安全隔離區（Safe\n    Haven）」內，同時聯繫警方支援。</p>\n</li>\n</ol>\n<p><strong>四、 機構運作組：系統隔離與資安搶修</strong>\n由資訊室主任/醫工組員擔任的機構運作主管，須立即針對系統延遲展開技術性反制：</p>\n<ol>\n<li>\n<p><strong>資安事件阻斷</strong>：針對疑似的釣魚郵件、異常登入或惡意連線進行網路流量監控。必要時拔除受感染網段的交換器連線，執行實體隔離與阻斷，避免災情擴大至核心的\n    HIS 或 PACS 系統。</p>\n</li>\n<li>\n<p><strong>備援系統切換</strong>：加速執行核心系統與資料庫的備援復原作業，協助全院在安全的網段下逐步恢復掛號、批價與檢驗之電子作業，減少中斷必要的醫療服務。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這意味著醫院的「數位神經系統」遭到全面癱瘓，面臨又盲又啞的極端危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）</strong>作為第一線維持醫療照護與實體安全的核心，必須立即啟動「無網作業」與「資安阻斷」機制。由醫務部部長擔任的「執行部長（O0）」將統籌轄下各組，其具體因應作為如下：</p>\n<p><strong>一、 機構運作主管（O5 / 資訊室主任）：資安阻斷、實體隔離與系統備援</strong>\n資訊室主任在執行部中擔任機構運作主管（O5），負責維持資訊系統與必要服務不中斷或重置。面對\nAPT 滲透與勒索軟體攻擊，必須採取極限反制：</p>\n<ol>\n<li>\n<p><strong>實體隔離與阻斷擴散</strong>：透過網路流量監控查出遭大量病毒或惡意程式感染之網段，立即拔除受感染網段的交換器連線，執行物理層面的「實體隔離」與阻斷，避免勒索軟體災情擴大至核心的 HIS 或 PACS 系統資料庫。</p>\n</li>\n<li>\n<p><strong>宣告當機與紙本降級</strong>：確認系統遭駭客攻擊癱瘓後，資訊室須立即向指揮官回報，並透過廣播或備援通訊向全院各單位宣告正式進入「Downtime（紙本降級）極限模式」。</p>\n</li>\n<li>\n<p><strong>啟動異地備援接管</strong>：緊急啟動設置於瑞光院區 7F 具備獨立防護環境的異地備援機房（包含 PACS、HIS 主機與備份資料）。確保未受感染的乾淨資料庫能接手資料儲存，並排定急診、檢驗、放射及批掛等攸關生命安全的系統復原優先順序。</p>\n</li>\n</ol>\n<p><strong>二、 執行部長（O0 / 醫務部部長）：統籌前線「無網醫療」與服務降載</strong>\n醫務部部長負責指揮所有的醫療行動與災害控制。在資訊全黑的狀態下：</p>\n<ol>\n<li>\n<p><strong>切換人工模式</strong>：接獲資訊室宣告當機後，醫務部須指示轄下所有臨床科別與醫師，立即停止依賴電腦系統，全面改採紙本與人工作業流程。</p>\n</li>\n<li>\n<p><strong>醫療服務降載</strong>：因系統癱瘓將大幅拉長看診與處置時間，執行部長須主導實施醫療服務降載，暫停非急迫性醫療與排程手術，將有限的醫療資源與人力絕對集中於急重症搶救。</p>\n</li>\n</ol>\n<p><strong>三、 醫療照護主管（O1 /\n急診、內外科、護理部）：極限啟動「紙本降級（Downtime）」</strong>\n前線醫護人員必須瞬間適應沒有電腦輔助的戰地醫療環境：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機緊急箱</strong>：各護理站與急診單位應立即砸破封條，取出預先整備的「當機緊急箱（Downtime Box）」。</p>\n</li>\n<li>\n<p><strong>回歸類比（Analog）作業</strong>：全面改用內附的三聯式紙本病歷、手寫處方箋、紙本檢傷單與條碼貼紙，依賴每日離線列印的最新住院名單來維持基本醫療運作。</p>\n</li>\n<li>\n<p><strong>人工檢驗與影像傳遞</strong>： -   <strong>檢驗科</strong>：停止電腦傳輸，改以人工跑單遞送，或透過對講機、電話向臨床口頭回報危險值（Panic Value）。為防範無網狀態下的醫療錯誤，必須嚴格執行「Read-back（覆誦確認）」機制。 -   <strong>放射科</strong>：在 PACS 無法傳輸數位影像時，回歸沖洗實體 X 光片，或由臨床醫師直接跑至放射機房，以數位相機或拍立得翻拍螢幕來傳遞影像。</p>\n</li>\n</ol>\n<p><strong>四、 跨組協調：建構異質通訊與「傳令兵（Runner）」制度</strong> DDoS\n攻擊與網路癱瘓通常會導致院內常規通訊障礙，執行部必須確保前線指令下達不中斷：</p>\n<ol>\n<li>\n<p><strong>啟用戰術通訊</strong>：各樓層指揮官與前線主管改配發獨立頻段的 UHF/VHF 無線電進行雙向溝通。</p>\n</li>\n<li>\n<p><strong>啟動傳令兵制度</strong>：指定體能良好之行政人員或志工穿著螢光反光背心，擔任「傳令兵（Runner）」。以徒步衝刺方式在各樓層、急診與指揮所間穿梭，透過嚴格的「口令覆誦」與「簽收簿（Logbook）」，精準遞送緊急開刀醫囑、血液配對單與手寫檢驗報告，徹底克服斷網危機。</p>\n</li>\n</ol>\n<p><strong>五、 安全管制主管（O4 / 醫勤室保安組）：防範恐慌與實體維安</strong>\n駭客攻擊導致的系統大當機，極易引發候診區病患與家屬的焦躁不滿，甚至引發群眾滋擾：</p>\n<ol>\n<li>\n<p><strong>防暴與秩序維護</strong>：保安人員須在急診與門診大廳加強巡邏，安撫因系統當機而久候的民眾。若群眾因假訊息或久候企圖滋擾，保全須持防暴裝備結陣死守，防範醫療暴力。</p>\n</li>\n<li>\n<p><strong>實體防護（Lockdown）</strong>：必要時，安全管制組須封閉非必要出入口，實施門禁升級與「內部封鎖」，將醫護人員與重症病患保護於安全隔離區內，確保駭客的虛擬攻擊不會演變為院內的實體暴動。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與「孤島效應」。在\nHICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）</strong>作為第一線戰術行動的骨幹，由醫務部部長擔任「執行部長（O0）」，負責統籌轄下各醫療與設施運作單位，執行極限狀況下的資源分配與醫療照護。</p>\n<p>其轄下各組的具體因應作為如下：</p>\n<p><strong>一、\n醫療照護組：極限醫療降載與戰備醫療處置（因應轉送受阻與藥血短缺）</strong>\n由急診、內外科主任及護理部督導長共同主導，面對病人轉送困難與藥材、血液匱乏，必須採取「危機護理標準（Crisis\nStandards of Care）」：</p>\n<ol>\n<li>\n<p><strong>極限醫療降載與反向檢傷（Reverse\n    Triage）</strong>：因外部轉送不確定性提高，院內必須強行騰出收治量能。醫療照護組須執行「反向檢傷」，由資深主治醫師強制評估並篩選出生命徵象穩定的病患，辦理緊急下轉或出院；同時全面取消非緊急門診與常規排程手術，將寶貴的藥材與床位絕對集中於急重症搶救。</p>\n</li>\n<li>\n<p><strong>啟動院內「走動式血庫（Walking Blood\n    Bank）」</strong>：面對血品運補延遲且庫存見底，醫療照護組須會同檢驗科/血庫，緊急啟動「走動式血庫」。透過預先建檔的員工血型名冊，召集符合條件的同仁現場抽血、快篩，直接送入急診或開刀房輸注，突破外界斷血危機。</p>\n</li>\n<li>\n<p><strong>護理人力重分配</strong>：針對員工因交通受阻無法到勤的缺口，將停診之門診、健檢單位的護理師調派至急診、加護病房等高需求重症區，維持基本照護底線。</p>\n</li>\n</ol>\n<p><strong>二、 設施運作組：極限節流與「黑堡（Black\nStart）」應變（因應水電、氣體、燃油與膳食短缺）</strong>\n由工務室主任擔任主管，面對維生管線與燃油運補中斷，必須冷酷執行資源配給：</p>\n<ol>\n<li>\n<p><strong>電力負載卸除（Load\n    Shedding）</strong>：因應燃油配送延遲，為確保緊急發電機的續航力，工務室必須主動手動切斷行政辦公區、一般病房、冷氣空調與非維生儀器的電源迴路。將所有寶貴電力死守於開刀房、ICU、急診搶救區與血庫冰箱，確保撐過黃金救援期。</p>\n</li>\n<li>\n<p><strong>水資源與醫療氣體配給</strong>：</p>\n<ul>\n<li>\n<p><strong>供水配給</strong>：啟動院內地下水塔，實施最嚴格的水資源分級配給（如最乾淨的水僅供開刀房刷手與病患飲用，嚴禁盥洗與沖馬桶，改發化學便器袋）。</p>\n</li>\n<li>\n<p><strong>氧氣耗竭應變</strong>：若中央醫療氣體耗盡，須快速切換至備用氧氣鋼瓶；若鋼瓶亦告罄，設施運作與醫療照護組須動員行政人員或輕傷家屬組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持重症病患呼吸。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>膳食應變</strong>：協同營養室執行緊急供膳機制，若烹調設備或食材因運補延遲受限，改發放儲備之乾糧、應急口糧，並優先供應前線高耗能的醫護人員與重症病患。</p>\n</li>\n</ol>\n<p><strong>三、 待命區管理：殘存資源與人力的極限調度</strong>\n由行政支援中心組長擔任管理者，負責管理受困院內或突破交通阻礙抵達的有限資源：</p>\n<ol>\n<li>\n<p><strong>待命人力與物資管理</strong>：將突破交通障礙到院的員工集中至待命區，依據前線執行部門的需求，精準調度人力。接收並點交任何運達的零星簽證物資、藥品或衛材，立即盲派（Push）至最危急的紅區。</p>\n</li>\n<li>\n<p><strong>強制輪班與戰力保存</strong>：協同後勤部門，針對留守院內無法換班的醫護人員，實施軍事化強制輪休。將人員安置於「安全庇護所（Safe\n    Haven）」，保障基本的熱食與睡眠，避免前線醫療戰力因過勞而全面崩潰。</p>\n</li>\n</ol>\n<p><strong>四、 安全管制組：硬邊界防護與資源保衛</strong>\n由醫勤室保安組長擔任主管，面對物資匱乏極易引發的群眾恐慌，必須採取強勢防護：</p>\n<ol>\n<li>\n<p><strong>實施內部封鎖與硬邊界（Lockdown）</strong>：嚴格封鎖非必要出入口，針對殘存的戰略藥品、燃油儲槽與備用水源進行重兵看守（如增設\n    24 小時巡邏哨），防範因恐慌引發的物資搶奪或醫療暴力。</p>\n</li>\n<li>\n<p><strong>交通引導與救援動線確保</strong>：儘管交通受阻，安全管制組仍須強勢驅離院區周邊的違停或閒雜車輛，確保任何突破萬難抵達的救護車、血液運補車或燃油車，能第一時間進入卸補區。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨極高的實體安全威脅（敵方滲透或恐怖攻擊）、資源搶奪風險以及群眾恐慌失控的危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）</strong>由醫務部部長擔任執行部長，負責統籌並執行第一線的戰術防護與醫療行動。面對此等外部威脅與群眾推擠，執行部門轄下的<strong>「安全管制組（保安組／駐衛警）」</strong>將成為核心應變主力，並會同醫療照護與設施運作組採取以下具體作為：</p>\n<p><strong>一、 實施「硬邊界防護」與極限進出管制（安全管制組）</strong>\n面對避難人潮與不明人車，必須立即阻絕非醫療需求的群眾，以保護院內有限的醫療資源：</p>\n<ol>\n<li>\n<p><strong>物理封鎖與動線縮減</strong>：接獲指令後，安全管制組會同支援警力，<strong>立即封閉院區\n    80%\n    的出入口與側門</strong>，拉下鐵捲門，並架設充水式紐澤西護欄、蛇籠、拒馬，甚至以院方工程車橫停作為防衝撞阻絕物。</p>\n</li>\n<li>\n<p><strong>單一檢傷武裝通道</strong>：全院僅保留急診車道作為唯一出入口，並設立由<strong>「武裝警力與院方高階護理師」共同站哨的聯合檢查站（Check-point）</strong>。執行嚴格的武器搜查與身分核對，強勢驅離違停或閒雜車輛，杜絕非傷患、無關家屬或武裝人員進入醫療區。</p>\n</li>\n</ol>\n<p><strong>二、\n啟動防暴鎖定與「內部封鎖（Lockdown）」（安全管制組／醫療照護組）</strong>\n若社區避難群眾因恐慌或欲搶奪物資（如抗生素、麻醉藥品等）而演變為暴動衝闖：</p>\n<ol>\n<li>\n<p><strong>防暴鎖定（Lockdown）</strong>：迅速啟動內部封鎖，<strong>瞬間降下急診室防暴門及各區域防火鐵捲門，並關閉全院電梯控制權</strong>。</p>\n</li>\n<li>\n<p><strong>死守安全隔離區</strong>：將急診醫護人員與重症病患鎖入預先規劃的「安全隔離區（Safe\n    Haven）」，由保全持防暴盾牌結陣死守，維持急診檢傷區的秩序，防範暴徒搶奪醫療資源，並等待優勢警力支援。</p>\n</li>\n</ol>\n<p><strong>三、 執行反破壞武裝巡邏與反滲透（安全管制組／設施運作組）</strong>\n針對可疑無人機偵蒐與不明人車，可能為敵方第五縱隊（在地協力者）進行破壞前兆：</p>\n<ol>\n<li>\n<p><strong>重兵看守關鍵基礎設施（CI）</strong>：針對醫院的心臟地帶------<strong>地下室緊急發電機房、伺服器資訊機房、頂樓水塔、戶外液氧槽等，增設\n    24 小時雙人武裝/防暴裝備巡邏哨</strong>。</p>\n</li>\n<li>\n<p><strong>盤查與防爆</strong>：巡邏哨配備金屬探測器與防爆毯，嚴格盤查院內可疑人士（包括穿著白袍的可疑偽裝人士），防範爆裂物放置、電纜剪斷或水源投毒等毀滅性人為破壞作為。對於無人機或可疑人車，落實辨識、攔查及通報機制。</p>\n</li>\n</ol>\n<p><strong>四、 維持核心醫療與設施運作（醫療照護組／機構運作組）</strong></p>\n<ol>\n<li>\n<p><strong>醫療照護持續</strong>：醫療照護主管（急診/內外/護理部督導）在硬邊界與封鎖狀態下，確保留在院內及剛通過武裝檢傷通道的急重症傷患能持續獲得救治，並保護現有住院病患的安全。</p>\n</li>\n<li>\n<p><strong>系統防禦</strong>：機構運作主管（資訊室/醫工）需防範與實體偵蒐同步發生的網路攻擊，隨時準備切斷外部網路或啟動資訊系統降級（離線）作業，保護醫院電子病歷與核心系統。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端戰爭威脅，高樓層與玻璃帷幕建築在飛彈震波下將成為致命弱點。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）「執行部長（O0）」</strong>，負責將平時的醫療空間瞬間轉變為戰地大量傷患處理站（微型戰地醫院），執行大面積的「空間降階防護」與「戰術轉換」。</p>\n<p>執行部門轄下各組的具體因應作為如下：</p>\n<p><strong>一、 統籌醫療空間轉置與極限降載（執行部長 O0）</strong></p>\n<ol>\n<li>\n<p><strong>執行戰術空間轉換</strong>：執行部長須統籌所有的技術性工作與醫療行動，帶領醫療照護、設施運作、危害控制及安全管制等分支，在時限內將高樓層的核心醫療量能轉移至最安全的地下室。</p>\n</li>\n<li>\n<p><strong>極速降載與疏散</strong>：配合防空指令，立即指示醫療照護組進行「反向檢傷」，將生命徵象穩定的病患快速辦理出院或疏散，極速騰出量能並淨空高脆弱區域。</p>\n</li>\n</ol>\n<p><strong>二、 開設 B1 備援醫療空間及五處功能區（醫療照護組 O1）</strong>\n由急診部/內外科主任及護理部督導長領導，執行垂直疏散並於地下一樓（B1）確實開設五大醫療功能區，維持核心醫療不中斷：</p>\n<ol>\n<li>\n<p><strong>無動力垂直疏散</strong>：若面臨斷電或高樓層受損，醫護人員須利用軟擔架（滑墊）或蓄電池設備，將\n    ICU 及重症病患經由安全梯，以人力垂直疏散至 B1 避難區。</p>\n</li>\n<li>\n<p><strong>檢傷行政區（約翰／馬可大樓 B1\n    工務室前方）</strong>：設立檢傷站，辦理傷病患登記、檢傷分類行政作業、傷票紀錄與家屬初步查詢。</p>\n</li>\n<li>\n<p><strong>臨時 ICU 病房（約翰／馬可大樓 B1\n    資材組前方）</strong>：重症病患的暫置與銜接區，集中佈設呼吸器與醫療監測設備，維持重症照護底線。</p>\n</li>\n<li>\n<p><strong>臨時開刀房（韓偉大樓 B1\n    腹膜透析室）</strong>：執行緊急手術、戰傷處置與麻醉支援（如損傷控制復甦）。</p>\n</li>\n<li>\n<p><strong>恢復室（韓偉大樓 B1 環保室）</strong>：負責術後觀察、恢復照護及轉送銜接。</p>\n</li>\n<li>\n<p><strong>輕症病房（路加大樓 B1\n    停車場）</strong>：將地下停車場淨空，收治輕症傷患並進行分流安置，維持候診秩序。</p>\n</li>\n</ol>\n<p><strong>三、 建立地下生命線與系統重置（設施運作組 O2 / 機構運作組 O5）</strong></p>\n<ol>\n<li>\n<p><strong>維生管線極限轉換（工務室 O2）</strong>：工務人員須迅速在 B1\n    臨時轉換的空間內，拉設臨時電源、照明設備與通風設施。確保緊急發電機的電力與備用醫療氣體（氧氣鋼瓶）能優先且穩定地供應給\n    B1 的臨時開刀房與臨時 ICU 病房。</p>\n</li>\n<li>\n<p><strong>醫療與資訊設備備援（醫工/資訊室\n    O5）</strong>：協助醫院功能持續運作，將急救所需的醫療儀器移轉至 B1\n    功能區；架設備援資訊網路，若遭逢斷網，則立即砸破「當機緊急箱（Downtime\n    Box）」，啟動紙本降級作業（手寫病歷與處方箋）以維持運作。</p>\n</li>\n</ol>\n<p><strong>四、 執行地下層動線管制與防護（安全管制組 O4）</strong>\n防空避難極易引發推擠與恐慌，由醫勤室保安組擔任安全管制，實施嚴格的動線維護：</p>\n<ol>\n<li>\n<p><strong>設立地下層管制點</strong>：派駐警衛與防護人員死守 <strong>B1\n    樓梯間、電梯口、主要通道、車道出入口以及五大功能區（如臨時\n    ICU、開刀房）的出入口</strong>，防範閒雜人等誤闖醫療紅區。</p>\n</li>\n<li>\n<p><strong>動線分流與秩序維護</strong>：嚴格劃分「疏散避難動線」與「急重症救護動線」，引導一般民眾至路加大樓門診大廳或恩慈大樓停車場等指定避難區，確保運送戰傷病患及物資至\n    B1 功能區的通道保持絕對暢通。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，在\nHICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）</strong>扮演將平時醫療空間轉換為地下戰地醫院的核心角色。</p>\n<p>執行部門由醫務部部長擔任<strong>「執行部長（O0）」</strong>，負責管理並參與應變行動，指揮所有的醫療行動與災害控制。其轄下各組因應防空疏散與地下空間啟用的具體作為如下：</p>\n<p><strong>一、 統籌醫療降載與空間轉置（執行部長 O0）</strong></p>\n<ol>\n<li>\n<p><strong>執行地下空間轉置</strong>：執行部長負責統籌指揮，於48小時內（或防空警報發布時）帶領醫療照護、設施運作、安全管制等分組，將核心醫療功能轉移至地下安全替代空間。</p>\n</li>\n<li>\n<p><strong>啟動醫療降載</strong>：指示醫療照護組執行醫療功能降載，明確定義核心醫療功能，並擬定病人出院及轉院疏散計畫，以快速騰出醫療量能。</p>\n</li>\n</ol>\n<p><strong>二、 確實開設 B1 五大備援醫療功能區（醫療照護組 O1）</strong>\n由急診、內外科主任及護理部督導長領導，負責病人分級、床位調度及核心醫療維持。必須於地下一樓（B1）確實開設五處功能區並維持運作：</p>\n<ol>\n<li>\n<p><strong>檢傷行政區（開設於約翰／馬可大樓 B1\n    工務室前方）</strong>：負責傷病患登記、檢傷分類行政作業、傷票與轉送紀錄，以及家屬初步查詢。</p>\n</li>\n<li>\n<p><strong>臨時 ICU 病房（開設於約翰／馬可大樓 B1\n    資材組前方）</strong>：作為重症病患暫置與 ICU\n    銜接區，集中醫療設備與監測支援。</p>\n</li>\n<li>\n<p><strong>臨時開刀房（開設於韓偉大樓 B1\n    腹膜透析室）</strong>：執行緊急手術、戰傷處置與麻醉支援。</p>\n</li>\n<li>\n<p><strong>恢復室（開設於韓偉大樓 B1\n    環保室）</strong>：負責術後觀察、恢復照護及轉送銜接。</p>\n</li>\n<li>\n<p><strong>輕症病房（開設於路加大樓 B1\n    停車場）</strong>：收治輕症傷患，進行分流安置以維持候診秩序。</p>\n</li>\n</ol>\n<p><strong>三、 執行地下層動線管制與防護（安全管制組 O4）</strong>\n由醫勤室保安組擔任，負責防空避難期間的秩序維持與動線管制：</p>\n<ol>\n<li>\n<p><strong>設立地下管制點</strong>：嚴格派員防守 <strong>B1\n    的樓梯間、電梯口、主要通道、車道出入口以及各功能區（如臨時\n    ICU、開刀房）的出入口</strong>，防範閒雜人等誤闖醫療核心紅區。</p>\n</li>\n<li>\n<p><strong>病人與群眾分流</strong>：執行病人、員工與家屬的避難引導與分流清點，確保運送戰傷病患及物資至\n    B1 醫療區的動線絕對暢通，並確認 B1 功能區的安全防護狀況。</p>\n</li>\n</ol>\n<p><strong>四、 建立地下醫療維生與備援系統（設施運作組 O2 / 機構運作組 O5）</strong></p>\n<ol>\n<li>\n<p><strong>維生管線與設施支援（工務室 O2）</strong>：工務人員負責現場維護，確保 B1\n    臨時轉換空間內的電力與照明、空調、供水、緊急發電機及醫療氣體（如氧氣）能穩定供應給臨時開刀房與\n    ICU 等單位。</p>\n</li>\n<li>\n<p><strong>資訊與醫工設備重置（醫工/資訊室\n    O5）</strong>：協助將必要的醫療儀器移轉至地下備援空間；若遭遇資安攻擊或網路中斷，需立即啟動紙本/離線流程與備援通訊，維持急診、檢驗、放射及病歷等核心服務不中斷。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>面對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，在\nHICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）</strong>是應變災難的最前線，負責實際的醫療搶救、戰術轉換與災損控制。</p>\n<p>執行部門由醫務部部長擔任<strong>「執行部長（O0）」</strong>，負責指揮所有前線醫療行動，並依據指揮官設定的戰略目標，統籌轄下各主管（O1\\~O5）與待命區展開以下具體作為：</p>\n<p><strong>一、 開設檢傷分流與極限戰傷搶救（醫療照護主管 O1）</strong>\n由急診、內外科主任及護理部督導長領導，面對大量傷患湧入，必須打破平時編制，切換為戰鬥模式：</p>\n<ol>\n<li>\n<p><strong>啟動大量傷患機制</strong>：急診部主任（或當班資深醫師）確認狀況後，請總機廣播「急診\n    333」代號，啟動院內各科醫師與護理人力的緊急召回與抽調。</p>\n</li>\n<li>\n<p><strong>設立檢傷分類與治療分區</strong>：迅速在急診外或門診大廳設立檢傷站，依「紅、黃、綠、黑」四色將傷患進行檢傷分流，並將病患精準指派至重傷治療區、中傷治療區、輕傷治療區及留觀區。</p>\n</li>\n<li>\n<p><strong>戰傷救命處置</strong>：由外科與急診創傷團隊針對重傷病患，執行黃金時間內的「損傷控制復甦（Damage\n    Control Resuscitation）」與緊急手術。</p>\n</li>\n</ol>\n<p><strong>二、 執行「反向檢傷」與病床極速擴充（醫療照護主管 O1）</strong>\n為了應對急診、手術室與加護病房的爆量需求，護理部與醫療科必須強行騰出空間：</p>\n<ol>\n<li>\n<p><strong>反向檢傷（Reverse\n    Triage）</strong>：由資深主治醫師組成特別小組，強制評估院內現有的一般病房甚至中度加護病房的病患。</p>\n</li>\n<li>\n<p><strong>極限降載與擴充量能（Surge\n    Capacity）</strong>：將拔除點滴或提早出院不會立即危及生命的穩定病患，迅速辦理出院或轉銜至基層診所、長照機構。目標在時限內強行騰出急重症病床，作為接收戰傷病患的擴充病床。</p>\n</li>\n</ol>\n<p><strong>三、 整合暴增之醫療輔助需求：輸血、影像與給藥（醫療照護主管 O1）</strong>\n針對暴增的後勤醫療需求，醫療照護主管須迅速調度檢驗科、放射科與藥劑科量能：</p>\n<ol>\n<li>\n<p><strong>輸血與檢驗支援</strong>：檢驗科血庫需立即向指揮官回報現有血液與各血型存量，並視需求向外請求支援（或啟動院內活體走動式血庫）；同時必須主動且快速地向急診醫療人員提供各項緊急檢驗報告。</p>\n</li>\n<li>\n<p><strong>影像支援</strong>：放射科須派員負責緊急病人的 X 光或 CT\n    檢查，並盡快將正確的影像資料傳送至閱片系統，以利醫師迅速判斷戰傷情形。</p>\n</li>\n<li>\n<p><strong>推拉式主動供藥</strong>：藥劑科與供應中心須顛覆平時的申請流程，啟動「推拉式物流（Push-Pull\n    Logistics）」，主動將大量戰備急救箱、止血帶、點滴與麻醉藥品「盲派（Push）」至急診前線與開刀房。</p>\n</li>\n</ol>\n<p><strong>四、 執行急診秩序維持與「硬邊界防護」（安全管制主管 O4）</strong>\n由醫勤室保安組擔任，面對群眾恐慌與資源搶奪風險，必須死守醫療紅區的安全：</p>\n<ol>\n<li>\n<p><strong>交通與動線引導</strong>：確保救護車的進出動線絕對順暢，迅速驅離急診前車道的違停或閒雜車輛。</p>\n</li>\n<li>\n<p><strong>硬邊界與門禁封鎖</strong>：立即封閉非必要出入口，實施嚴格的門禁管制（Lockdown）。派駐重兵於急診檢傷區維持秩序，防範恐慌的家屬或暴徒搶奪醫療資源或藥品，確保救護人員的人身安全。</p>\n</li>\n</ol>\n<p><strong>五、 確保高耗能搶救設施運作（設施運作主管 O2 / 機構運作主管 O5）</strong></p>\n<ol>\n<li>\n<p>工務室、醫工組與資訊室人員必須確保急診、開刀房及加護病房的電力、供水、醫療氣體與資訊網路，在超負荷的搶救狀態下依然能持續運作。</p>\n</li>\n<li>\n<p>若設備發生異常，須立即執行緊急搶修或切換至備援系統，防止搶救中斷。</p>\n</li>\n</ol>\n<p><strong>六、 家屬安撫與醫護心理急救（心理與家屬支援分支）</strong></p>\n<ol>\n<li>\n<p><strong>家屬安置</strong>：社工室與院牧部必須在急診搶救區外設立獨立的「家屬接待區」，負責安撫焦急家屬的情緒，並協助確認傷亡名單與代辦手續。</p>\n</li>\n<li>\n<p><strong>員工心理急救（PFA）</strong>：針對面臨巨大壓力、目睹慘烈傷亡的急診與手術室醫護人員，適時提供心理除頻（Debriefing）與心理支持，防止醫療團隊發生戰鬥疲勞與崩潰。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，在\nHICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）</strong>作為災難應變的最前線，負責實際的設施搶修、危害控制、秩序維護與醫療行動。</p>\n<p>執行部門由醫務部部長擔任<strong>「執行部長（O0）」</strong>，負責計畫及指揮所有的醫療行動或災害控制。面對此複合型基礎設施受損危機，其轄下各主管的具體因應作為如下：</p>\n<p><strong>一、 設施運作主管（O2 / 工務室主任）：死守維生系統與基礎設施搶修</strong>\n負責全院電力、供水、空調、建築物結構的維護及管制。</p>\n<ol>\n<li>\n<p><strong>電力瞬斷搶修</strong>：遭遇停電時，工務室須立即確認\n    ATS（自動切換開關）是否自動切換。若緊急發電機啟動失敗，工務人員須立即執行「強制啟動」。若停電\n    10\n    分鐘仍無法正常供電，須請總機通知各單位啟動應變措施，並關閉非必要設備的電源。</p>\n</li>\n<li>\n<p><strong>漏水與空調異常處置</strong>：針對震動造成的管線破裂漏水，須迅速進行分段、分區關閉以隔離洩漏區域，並視情況啟動地下水或備用水源互相支援供水,。同步搶修受損的空調系統，確保醫院核心區域環境穩定。</p>\n</li>\n<li>\n<p><strong>電梯停用救援</strong>：若因電力瞬斷或震波導致電梯停擺，須優先確認是否有病患或員工受困，聯絡維護廠商並由工務與安全人員執行受困救援。</p>\n</li>\n</ol>\n<p><strong>二、 機構運作主管（O5 / 資訊室主任、醫工組長）：通訊中斷與系統備援</strong>\n負責協助醫院功能持續運作或重置，減少必要服務的中斷。</p>\n<ol>\n<li>\n<p><strong>通訊中斷應變</strong>：若院內分機與常規網路癱瘓，須立即改用公務手機、全院無線電對講機（由保安組統一管理）或私人手機進行對內聯絡；若對外通訊亦中斷，則利用行動手機\n    GSM 系統撥打 112 進行求救。</p>\n</li>\n<li>\n<p><strong>資通訊降級（Downtime）作業</strong>：若伺服器或網路設備因震動或停電受損且無法短時間排除，資訊室須依受影響範圍，通知急診、門診、藥局及檢驗科等相關單位改採人工作業，全面啟動「電腦當機應變機制」與紙本降級流程。</p>\n</li>\n<li>\n<p><strong>醫療儀器備援</strong>：醫工人員須確保急救與維生醫療設備在電力異常下仍能透過\n    UPS 或備用電池正常運作。</p>\n</li>\n</ol>\n<p><strong>三、 危害控制主管（O3 /\n感染科、放射科、核醫科主任）：危害偵檢與初期滅火</strong></p>\n<ol>\n<li>\n<p><strong>危害偵檢與外洩處理</strong>：評估爆炸與震動是否造成院內危險化學品、醫療氣體或放射性物質的管線破裂洩漏。若發生洩漏，須立即執行危害偵檢、隔離及除污作業,。</p>\n</li>\n<li>\n<p><strong>兼任滅火班職責</strong>：在消防與地震的對應編組中，危害控制主管兼任「滅火班」。若消防警報確認為真實火災，須全力執行初期滅火任務，防範火勢因空調異常或漏電而進一步擴大。</p>\n</li>\n</ol>\n<p><strong>四、 安全管制主管（O4 / 環保室主任、保安組長）：現場封鎖與避難引導</strong></p>\n<ol>\n<li>\n<p><strong>現場管制與交通引導</strong>：警衛與保安人員須立即封鎖受損或發生警報的區域，進行水電設備管制並禁止閒雜人等進入。同時維持救護車與消防車的外部支援動線暢通，並派員引導消防隊至現場協助救災,。</p>\n</li>\n<li>\n<p><strong>執行防護與疏散避難</strong>：若建物出現損壞斷裂且有倒塌或火勢擴大之虞，須依據指揮官指令，擔任「避難引導班」，協助病患與員工進行「水平疏散（平行移至鄰近安全棟別）」或「垂直疏散（移至低樓層或門診大廳）」,。</p>\n</li>\n</ol>\n<p><strong>五、 醫療照護主管（O1 /\n急診、內外科主任、護理部督導長）：傷患搶救與病患防護</strong></p>\n<ol>\n<li>\n<p><strong>緊急傷患搶救</strong>：若爆炸或震波造成院內人員受傷，或周邊產生大量傷病患，醫療照護組須立即於安全區設立臨時救護站，進行傷患檢傷分類、緊急醫療救護及後送轉院事宜,。</p>\n</li>\n<li>\n<p><strong>住院病患防護</strong>：確保住院病患（尤其是手術室或加護病房內依賴維生儀器的重症病患）在電力瞬斷、空調異常的過程中安全無虞；並配合安全管制組，將病患安全疏散至預定集合點,。</p>\n</li>\n</ol>\n<p>資訊室應對通訊中斷與系統損壞的具體措施</p>\n<p>工務室如何處理漏水、停電與消防警報狀況</p>\n<p>震動與爆炸後，安全管制組如何引導病患避難</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院同時面臨敵方實體攻擊（戰爭/恐攻行為）、電力中斷與高度爆炸/火災風險的複合型毀滅性危機。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>執行部門（Operations\nSection）</strong>作為第一線戰術行動的骨幹，必須在爆炸發生的瞬間，同時展開「災害搶修、現場封鎖、危害控制與極限醫療維生」。由醫務部部長擔任的<strong>「執行部長（O0）」</strong>將統籌轄下各主管，其具體因應作為如下：</p>\n<p><strong>一、 設施運作主管（O2 / 工務室主任）：死守維生系統與極限搶修</strong>\n主發電機與液氧槽是醫院的兩大生命線，工務室必須冒著極大風險進行損害控制：</p>\n<ol>\n<li>\n<p><strong>液氧洩漏隔離與阻斷</strong>：液態氧外洩若遇爆炸火源將引發災難性大火。工務人員須在確保自身安全的前提下，迅速進行分段、分區關閉液氧槽與輸氣管路閥門，物理隔離洩漏區域。</p>\n</li>\n<li>\n<p><strong>氧氣備援切換</strong>：確認主供氣異常後，立即切換至備用系統或通知全院各臨床單位，中央供氧已中斷，須立刻自行啟動應變措施（切換氧氣鋼瓶）。</p>\n</li>\n<li>\n<p><strong>主發電機受損之「極限負載卸除（Load Shedding）」</strong>：若主發電機遭炸毀導致全院斷電，工務室須立即確認院內是否有其他備用電源（或次級發電機、UPS）可用。若電力極度匱乏，必須強制手動切斷行政區、一般病房與空調的電源，將僅存的微弱電力絕對死守於開刀房、ICU與急診等搶救紅區。</p>\n</li>\n</ol>\n<p><strong>二、 安全管制主管（O4 / 醫勤室保安組長）：災區封鎖與反滲透防護</strong>\n面對無人機攻擊與爆炸，保安組必須建立堅固的防禦防線，防止二次傷害與敵人滲透：</p>\n<ol>\n<li>\n<p><strong>災區絕對封鎖</strong>：爆炸發生後，警衛與保安人員須立即拉起警戒線，絕對封鎖後方機電棟與液氧槽周邊區域。嚴禁任何閒雜人等或未穿戴防護裝備之人員靠近，防範爆炸倒塌與液氧助燃的致命危險。</p>\n</li>\n<li>\n<p><strong>防範二次攻擊與防暴鎖定</strong>：持續監控天空與院區周邊，防範敵方無人機進行第二波投彈襲擊。必要時啟動「內部封鎖（Lockdown）」，降下全院防暴門，保護核心醫療區。</p>\n</li>\n<li>\n<p><strong>引導外部武裝與救災支援</strong>：派員至院區外圍大門與重要路口，主動接引並引導外部的消防車、防爆小組與特種武裝警力快速抵達機電棟現場，並維持外部車道與救災動線的絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 危害控制主管（O3 / 感染、放射等主管兼任）：外洩監控與初期滅火</strong></p>\n<ol>\n<li>\n<p><strong>火災與危害偵檢</strong>：配合工務室監控液氧外洩濃度與發電機燃油外洩狀況。若爆炸引發初期火災，在消防隊抵達前，危害控制組（滅火班）須使用適當的滅火器材進行初期滅火與火勢侷限，防止火煙透過管線蔓延至醫療大樓。</p>\n</li>\n<li>\n<p><strong>特殊武器防範</strong>：若懷疑無人機攜帶生化或輻射物質（CBRNE），須立即執行危害偵檢，並準備啟動人員除污作業。</p>\n</li>\n</ol>\n<p><strong>四、 醫療照護主管（O1 / 急診、內外科、護理部）：傷患搶救與極限維生</st
