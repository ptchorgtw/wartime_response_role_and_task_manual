<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>屏基大連院區・戰時應變角色任務手冊（完整版）</title>
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="modulepreload" href="assets/js/dom.js">
<link rel="modulepreload" href="assets/js/dataService.js">
<link rel="modulepreload" href="assets/js/render.js">
<link rel="preload" href="data/manifest.json" as="fetch" crossorigin>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">屏東基督教醫院・大連院區</div>
    <h1>戰時應變角色任務手冊<br>（完整版・依角色檢索）</h1>
    <p>整理自「大連院區平戰轉換白皮書」，依 HICS 指揮體系與院內單位分類。可依角色瀏覽其涉及之所有特別狀況，亦可於下方選單直接選擇特別狀況，查看該情境下所有角色的具體因應作為。</p>
  </header>

  <div class="scenario-picker">
    <label for="scenarioSelect">依情境查看（選擇後將顯示所有相關角色的因應作為）</label>
    <select id="scenarioSelect">
      <option value="">— 全部情境（依角色瀏覽）—</option>
    </select>
  </div>

  <div class="stats" id="stats"></div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜尋角色名稱，例如：藥劑部、急診部、資訊室…">
  </div>

  <div id="scenarioBanner"></div>
  <div id="content"></div>
  <div class="no-match" id="noMatch">找不到符合的角色，請換個關鍵字試試。</div>

  <footer>
    本手冊內容整理自院內平戰轉換白皮書問答，僅供職能單位演練與盤點參考。<br>
    實際執行細節請依院內最新版應變計畫與長官指示為準。
  </footer>
</div>

<script type="module" src="assets/js/app.js"></script>
</body>
</html>
