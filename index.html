理機制 ，工務室通知各臨床單位逐步將各醫療儀器重新插電、開機 。 -   督導病歷室與各臨床科別，將斷電當機期間手工產生的紙本病歷、處方、檢驗報告，依照 <strong>Data Backfilling（資料人工補登 SOP）</strong> 逐筆補錄輸入至 HIS 電腦系統中 。</p>\n</li>\n</ol>\n<p>🔌\n緊急發電機「自動啟動失敗與強制手動排障（AMD-3-113）」是本院在平戰轉換與關鍵基礎設施（CI）防護推演中，最考驗工務同仁技術與手速的實兵課目\n。</p>\n<p>您需要我為您及工務室曹宏益主任，將這套發電機「ATS\n手動、電瓶/油路排氣、強制手動啟動、暨極限負載卸除 10\n步法」彙整提煉，編製成一份可以直接雙面列印並塑膠護貝、掛在各棟發電機控制盤大門後的\n<strong>『大連院區工務室：緊急發電機啟動失敗強制排除與紅區 Load Shedding\n實兵操作 A4 查檢核對卡（紙本防潮雙面版）』</strong> 嗎？</p>\n<p>指揮權繼承順序為何？ 機電棟大出血傷患後續如何轉送？\nB1備援空間是否有足夠的急救器械？ 氧氣耗盡時捏球分工？ 請問 HICS\n計畫組如何追蹤爆炸受傷同工的最新救治動向？\n若電力與網路因爆炸中斷，醫院如何確保病歷紀錄完整？\n後勤部如何執行救命藥材的「盲派」補給作業？詳細說明發電機強制手動啟動的排障與冷俥程序\n工務同仁在斷電時如何手動操作 ATS 切換電力？\n發電機啟動失敗後，若柴油存量不足應如何緊急補給？</p>\n<p>一、 HICS 指揮權自動繼承與代理順序</p>\n<p>當大連院區面臨戰火、空襲或聯外交通阻斷的極端狀況，導致事故指揮官\nA0（吳榮州院長）及副院長（黃雅芳、劉思源、萬樹人、施丞貴）等核心決策高層遇襲失聯、或因故無法視事時，醫院將瞬間啟動防範<strong>「無頭狀態（Headless\nState）」</strong>的自我修復防呆機制 ：</p>\n<ol>\n<li>\n<p><strong>法定職務代理人（首要代理）</strong>： 依據本院 HICS 緊急應變編組，<strong>指揮官（院長/吳榮州）</strong> 的第一法定代理人為 <strong>行政副院長/黃雅芳</strong> 。</p>\n</li>\n<li>\n<p><strong>臨床主管「自動順位繼承機制」（極限盲測接管）</strong>： 若指揮官及兩位副院長車隊同時失聯、或通訊全斷時 ： -   <strong>5分鐘自動接管</strong>：當值最高層級的臨床主管必須在 <strong>5 分鐘內</strong> 依法自動接管指揮權 ，穿上紅色的 <strong>Incident Commander</strong> 指揮官背心 。 -   <strong>鋼鐵繼承順位</strong>： -   繼承順位依序為：<strong>急診部主任（王建銘）</strong>、<strong>重症醫學部主任</strong>、<strong>外科部主任（李宗龍）</strong> ，若於夜間或假日，則由<strong>當班最高階護理督導</strong>接管 。</p>\n</li>\n<li>\n<p><strong>接手黃金 10 分鐘任務</strong>： 新任指揮官必須在接手 <strong>10 分鐘內</strong>，迅速透過全院廣播（或傳令兵）發布第一道全院動員令，確立當下最高戰術目標（例如：「放棄常規醫療，全面準備接收戰傷病患」），杜絕搶救黃金期流失 。</p>\n</li>\n</ol>\n<p>二、 機電棟大出血傷患後續之在途安全與轉送流程</p>\n<p>若院區機電棟（或高壓電機房等關鍵設施）遭受破壞、發生大出血傷患搶救時\n：</p>\n<ol>\n<li>\n<p><strong>就地啟動「走動式血庫（Walking Blood Bank）」</strong>： 若戰時南部血液基金會運補中斷、本院血庫 O 型血告竭 ，檢驗科立即啟動院內自給自足捐血計畫 ： -   依據預先篩檢建檔的<strong>「員工/志工血型與傳染病篩檢名冊」</strong>，召集符合條件之 O 型血同仁 ； -   於地下一樓安全的 <strong>韓偉大樓 B1 出口位置（臨時捐血區）</strong> 現場抽取「全血（Whole Blood）」並現場極速快篩 ； -   不經繁瑣分離，套入夾鏈袋由傳令兵帶著<strong>尚有體溫的活體新鮮血袋</strong> ，百米衝刺直接送入 B1 臨時開刀房（韓偉 B1 腹膜透析室）或急診搶救紅區，立即輸入大出血傷患體內，突破斷血危機 。</p>\n</li>\n<li>\n<p><strong>醫療與運輸載具之「極限調派」</strong>： 大出血傷患經損傷控制手術（DCR/DCS）生命徵象初步控制後 ，若需轉送至區域聯防合作醫院（如部屏、寶建、安泰或屏榮） ： -   本院運輸載具由<strong>總務部轄下的「醫勤室運輸組」統一調派管理</strong> 。 -   可動用<strong>本院救護車共 4 輛</strong>及<strong>可獲得支援之外部救護車共 2 輛</strong>，所有車輛均於急診室前待命 。</p>\n</li>\n<li>\n<p><strong>落實「急診大門」接運分流管制</strong>： -   <strong>救護車接運專區</strong>：除特殊考量外，<strong>「醫院急診室大門出口」被律定為救護車專屬的接運疏散區</strong>，作為重症傷患與擔架出入的唯一生命咽喉 。 -   <strong>動線徹底分流</strong>：可扶持或輕症病患引導至<strong>「門診大廳大門出口」</strong>搭乘中巴或行政接駁車離院，嚴防人車混雜阻礙重症大出血傷患的後送動線 。</p>\n</li>\n<li>\n<p><strong>推行醫藥、病歷隨車「一對一物理綁定」</strong>： 上救護車前，病歷與護理同工須將病患的手寫紙本<strong>「轉診單、轉院病歷摘要、手寫用藥與治療紀錄」統一裝入防潮夾鏈袋中，並強制物理綁定（如貼上或綁牢）於病患隨行之擔架旁</strong>，隨同病患隨車移出交接 ，隨車攜帶 72 小時生存用藥與林格氏液 。並指派主治醫師及護理師建立<strong>「隨車持續照護功能編組 A（隨車醫護）」</strong>與病患進行一對一戰術配對，死守在途照護安全 。</p>\n</li>\n</ol>\n<p>三、 地下一樓（B1）備援醫療空間之「急救器械與自給自足維生」部署</p>\n<p>地下一樓（B1）備援空間並非僅供避難，而是完全重構為具備 60\n分鐘防火防爆時效、獨立排煙與 HEPA 氣閘過濾的<strong>「地下微型戰地醫院」</strong>\n。針對急救器械的足夠性與調度配置：</p>\n<ol>\n<li>\n<p><strong>五大功能區之基本器械配置與備品庫存</strong>： -   <strong>【臨時 ICU 病房（約翰/馬可 B1 資材組前方）】</strong>：集中部署可攜式呼吸器、多功能生理監視器、床邊給氧端口及吸引系統，死守重症生命底線 。 -   <strong>【臨時開刀房（韓偉 B1 腹膜透析室）】</strong>：配置手術台、防爆無影手術燈、負壓排氣空調及戰時麻醉支援裝備，用以執行緊急創傷手術 。 -   <strong>【恢復室（韓偉 B1 環保室）】【輕症病房（路加 B1 停車場）】</strong>：亦備有基礎床位、照明與給氧端口 。</p>\n</li>\n<li>\n<p><strong>核心器械配送與調度中樞------「韓偉大樓 3F 供應室」</strong>： -   <strong>供應室不遷移</strong>：依據本院空間規劃，<strong>「供應室維持於韓偉 3F」</strong> 。它在戰時作為<strong>「中央供應／無菌器械配送與緊急器械調度說明位置」</strong> 。 -   <strong>垂直器械配送</strong>：韓偉 B1 的臨時開刀房與 3F 供應室處於同一棟大樓，工務與後勤組可利用結構保護的內部通道或安全梯，進行無菌手術包與急救器械的快速垂直配送調度 。</p>\n</li>\n<li>\n<p><strong>後勤任務支援組 L2「72小時維物資盲派（Push）」</strong>： -   資材組人員進駐<strong>「約翰／馬可大樓 B1 資材室」</strong>（後勤物資補給點），藥局進駐<strong>「韓偉大樓 B1 藥劑科」</strong> 。 -   任務支援組主動將 72 小時消耗量的急救耗材、骨針、止血帶、無菌靜脈輸液、戰備物資不待申請直接以<strong>「盲派（Push）」</strong>推送至 B1 各功能區，保證前線器械與衛材充足 。</p>\n</li>\n</ol>\n<p>四、 中央氧氣管線中斷或耗盡時，全院之「手動呼吸捏球分工」</p>\n<p>若大連院區發生電力、中央液氧槽受損漏氣或氣壓急劇下降，且床邊備用氧氣小鋼瓶亦全部消耗殆盡，導致重症病患之電動呼吸器全面停擺時（孤島最極端狀態）\n：</p>\n<p>本院將啟動最抗干擾之<strong>「人工呼吸肉搏戰」</strong>，組建全院<strong>「手動捏球大隊（Ambu\nBag Team）」</strong> ：</p>\n<ol>\n<li>\n<p><strong>捏球大隊之人力組成與動員（打破建制）</strong>： 後勤部長與計畫部長立即發布緊急動員令，召集<strong>「所有不需要執行第一線手術搶救與無菌處置的非臨床人力」</strong>，包含： -   行政支援中心同工、病歷室人員、採購組人員、社工室人員、院牧部同工、保全警衛、清潔同工，甚至是病情穩定且行動方便的輕傷患家屬 。</p>\n</li>\n<li>\n<p><strong>每病床「兩人一組」強制分工與 15 分鐘強制輪替</strong>： -   <strong>一床雙人配置</strong>：在地下臨時 ICU、開刀房及病房內，為每位插管重症病患床邊，<strong>強制配置兩名捏球隊員（1人執行手動捏壓、1人待命與計時）</strong> 。 -   <strong>手部肌肉放鬆計時</strong>：手捏甦醒球（Ambu bag）需要高度專注力與大魚際肌耐力。為防止隊員因「體力耗竭」導致按壓頻率與氣道潮氣量（Tidal Volume）下降 ，<strong>大隊嚴格執行「每 15 分鐘一班」的強制交班輪替頻率</strong> 。 -   時間一到，待命人員必須立即無縫接手捏球，下班同工強制休息，以純人力的意志與體力接力，死守重症病患等待簽證後送前的最後一口氣 。</p>\n</li>\n</ol>\n<p>五、 HICS 計畫部如何追蹤「爆炸受傷同工」的最新救治去向與動向？</p>\n<p>在發生周邊爆炸、造成院內同工受傷並湧入搶救的混亂情境下 ，HICS <strong>計畫部（Planning Section，由護理部部長朱淑媛擔任計畫部長\nP0）</strong> 將啟動以下專責追蹤機制，確保受傷員工的就醫軌跡「一個都不能少」\n：</p>\n<p>[ 步驟 1：急診現場掛號 (P3) ] ➜ [ 步驟 2：登錄手圈編號與分區 (P3/P2)\n] ➜ [ 步驟 3：維持「情資看板」 (P1) ] ➜ [ 步驟 4：每 4 小時發布 COP\n報告 (P2) ]</p>\n<ol>\n<li>\n<p><strong>急診現場緊急掛號與名單登錄（P3 文件紀錄組）</strong>： -   文件紀錄小組長（由門診經理擔任）率領病歷同工直接投入急診前線，辦理緊急掛號 ； -   主動協助爆炸受傷同工填寫基本資料，並<strong>強制為其戴上「實體辨識手圈（或傷票編號）」</strong>，確保身分正確登記 。</p>\n</li>\n<li>\n<p><strong>落實病人動向登錄與雙向資訊分享（P2 狀況分析組 / P1 資源控管組）</strong>： -   <strong>動向追蹤與分區管理</strong>：狀況分析小組（由護理部督導長擔任組長）轄下開設<strong>「病人動向組」</strong> ，確實記錄受傷員工被送至重傷治療區、臨時開刀房、ICU 或是轉院後送的確切位置 ，確保動向傳遞正確可靠 。 -   <strong>家屬與同工查詢支援</strong>：狀況分析組負責病人家屬（或院內關心同事）的詢答與情緒安撫，將追蹤到的動向及傷亡名冊提供給設於轉診中心的「家屬安撫安撫安撫區」 。</p>\n</li>\n<li>\n<p><strong>維護「情資看板（Status Board）」以利指揮決策（資源控管組 P1）</strong>： -   資源控管小組長（由護理督導長擔任）隨時掌控全院空床數與醫護人力分佈 ，在情資看板上將「受傷同工占用的床位與耗用的血液/維生儀器（如呼吸器）」進行實時更新，提供指揮官 A0 調整降載決策的參考 。</p>\n</li>\n<li>\n<p><strong>每四小時發布「最新狀況報告」</strong>： 狀況分析組（P2）每隔四小時發布一次最新狀況報告，與發言官對接，以公開透明的真實數據破除謠言，穩定本院及社會大眾的民心 。</p>\n</li>\n</ol>\n<p>六、 若電力與網路因爆炸中斷，醫院如何確保「病歷紀錄與診療軌跡」完整？</p>\n<p>大連院區高度仰賴 IBM HIS、PACS 及 EMR\n電子病歷系統。若遭遇遠距火力或爆炸導致常規電網、行動通訊及網路全部癱瘓（進入「資訊全黑」狀態）時\n，本院將啟動以下紙本降級與回補機制：</p>\n<ol>\n<li>\n<p><strong>紙本降級（Downtime）之「當機緊急箱」暴力啟用</strong>： -   各病房護理站、急診、地下備援醫療區立即剪開或砸破藍色<strong>「當機緊急箱（Downtime Box）」</strong>之防偽封條 。 -   全面切換改用箱內備妥之<strong>「三聯式紙本手工病歷、手寫轉診單、手寫處方箋（藥單）及紙本檢傷單」</strong>，確保在無網、斷電的 Downtime 狀態下，前線對病患的處置、給藥與手術紀錄全部留下實體字據與處方憑證 。</p>\n</li>\n<li>\n<p><strong>抗干擾「徒步傳令兵（Runner）」與實體簽收簿（Logbook）</strong>： -   由勤務組調派體能良好的後勤或行政同工，配戴特殊防偽臂章，擔任「傳令兵」 。 -   傳令兵全程利用無窗之內側安全安全梯徒步奔跑，傳遞紙本緊急醫囑、檢驗手工單與藥單 。 -   傳令兵必須隨身攜帶<strong>「實體簽收簿（Logbook）」</strong>，在與藥庫、檢驗科交接物資或醫囑時，<strong>一律採「口頭覆誦（Read-back）」與「實體簽名對核」雙重確認</strong>，防止在混亂中發生藥物、用血或報告斷鏈之致命醫療疏失 。</p>\n</li>\n<li>\n<p><strong>核心資料庫之「異地備援」與加密硬碟隨身保全</strong>： -   在系統大當機或切換前，資訊工程師確認 HIS、EMR 及 PACS 核心資料庫已增量備份，並透過低軌衛星加密 VPN 連線傳輸同步至設置於 <strong>「瑞光院區 7F」的異地備援電腦機房</strong> ，確保歷史病歷安全備份 。 -   資訊人員並將含有最新病患資料的「加密備份硬碟」直接交由指揮中心放入指揮官隨身 <strong>Go-Bag 避難包</strong> 中攜離 。</p>\n</li>\n<li>\n<p><strong>災後系統資料「電腦手動補登（Data Backfilling SOP）」</strong>： -   待台電復電、網絡搶修完成或 HIS 系統重新開機恢復正常後，資訊室宣告結束當機處理機制 。 -   病歷室（P3）、會計室及臨床各科別全力配合 ：將當機與紙本降級運作期間，前線產出的<strong>所有紙本三聯式病歷、手寫處方箋、手工欠繳計紀錄與檢檢驗單據，依照「資料人工回補標準作業流程（Data Backfilling SOP）」，逐筆手動補登輸入 HIS 電腦系統中</strong> 。 -   此程序能徹底補齊病患電子病歷的完整性、保障診療紀錄的法效連續性，並確保後續財務計價與健保追溯申報的百分之百完整 。</p>\n</li>\n</ol>\n<p>七、 後勤部如何執行救命藥材的「盲派」補給作業？</p>\n<p>在戰爭或聯外交通阻斷、系統癱瘓的極端狀況下，平時為了降低庫存成本而採用的「有申請、核對才領用（Pull）」物流系統將完全失效\n：</p>\n<p>本院<strong>後勤部長 L0（總務部部長 許慧莉）</strong> 轄下的 <strong>任務支援主管\nL2（資材組長 吳佳蓉）</strong>\n與藥劑科，必須啟動戰鬥化<strong>「推拉式物流（Push-Pull Logistics）」</strong>\n：</p>\n<ol>\n<li>\n<p><strong>高戰值急救藥衛材「Go-Kits 戰傷急救箱」打包</strong>： 資材組與藥劑科配合，將維持生命與大量創傷手術最關鍵的：戰術止血帶（CAT）、骨內血管通路設備（IO針）、大量無菌靜脈林格氏液、含止血劑沙布、廣效抗生素、破傷風疫苗，以及管制麻醉鎮痛藥劑（如 Ketamine） ，進行特殊分類編碼列冊並預先打包成標準化 <strong>「戰傷急救箱（Trauma Kits / Go-Kits）」</strong> 。</p>\n</li>\n<li>\n<p><strong>不待申請，主動「推（Push）物流盲派」</strong>： -   任務支援人員不等待前線急診或開刀房發出電子領料單，亦不待紙本當機單據送達 。 -   主動將裝滿救命藥材與設備的「戰傷急救箱」裝上推車，<strong>以主動「盲派（Push）」的方式，推送至急診紅區及韓偉大樓 B1 臨時開刀房門口</strong> 。 -   確保前線搶救與手術醫護人員「伸手就能拿到救命物資（子彈）」 。</p>\n</li>\n<li>\n<p><strong>執行全院各單位子庫緊急調度</strong>： 資材組人員主動對全院各單位的「子庫」備量進行緊急調度，密切監控前線耗材的消耗狀況，一旦發現消耗突增，立即通知採購小組（F2）聯繫現有與在地替代供應商，加速補給運補，死守藥衛材不斷鏈 。</p>\n</li>\n</ol>\n<p>八、 緊急發電機「強制手動啟動」的排障與冷俥程序</p>\n<p>本院大連院區配備有數台緊急柴油發電機（路加大樓 1 台、約翰馬可大樓 2\n台、韓偉大樓 1 台、恩慈大樓 1 台及馬太大樓 1 台） 。</p>\n<p>當台電中斷供電，若自動切換開關（ATS）未能自動切換、或<strong>發電機自動啟動失敗</strong>，工務同仁必須在<strong>停電黃金時間內</strong>，依據<strong>「供電設備異常緊急處理流程（AMD-3-113）」</strong>執行以下五大排障與冷俥步驟\n：</p>\n<p>📋 緊急發電機強制手動啟動排障與冷俥程序 ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------ <strong>階段與步驟</strong>                                         <strong>實兵硬體操作要領與具體動作</strong>                                                                                                                                     <strong>備註／電話 ** ------------------------------------------------------ ------------------------------------------------------------------------------------------------------------------------------------------------------------------ ---------------------------------------------- </strong>【第一階段：手動切換】<strong>\\<br>值班工務同仁 。           隆安檢測黃朝裕：\\<br>0988-187315                                                                                                                                                                                                                      100]。 □ </strong>緊急聯繫維護廠商<strong>：在進行硬體查修時，聯絡官應立即打電話通知維護廠商緊急進場 。                                                                   明威發電機紀元：\\<br>07-3497424 。 </strong>【第二階段：五大排障】<strong>\\<br>工務同仁現場搶修       □ </strong>1. 供電系統空氣斷路器 (ACB) 查修<strong>：確認各分路空氣斷路器（ACB）是否跳脫。若跳脫，先確認線路無短路、無異味或無燒焦現象，將警報復歸後重新手動投入                                           100]。                                                                                                                                                             □ </strong>2. 檢查自動復閉電驛與 ATS 盤面<strong>：檢查控制盤內的保險絲及無熔絲開關（NFB）是否斷路；確認控制盤或發電機本體上的「緊急停俥按鈕（EMG                                Stop）」有無被誤壓（若被壓下，須旋轉使其釋放） 。                                                                                                      □ </strong>3. 檢查啟動電瓶<strong>：使用三用電表量測發電機啟動電瓶電壓，</strong>若電壓低於 12.5 VDC 額定值，判定電量不足，必須更換備用電池<strong>；檢查電瓶連接線有無融損 。   □ </strong>4. 檢查發電機油路與排氣<strong>：確認日用柴油是否充足；若柴油管路吸入空氣點火失敗，工務同仁須</strong>對柴油噴射泵進行手動排氣動作<strong>以排除氣阻 。              吉昌重油補給：\\<br>08-7665578 。 □ </strong>5.                                                                                                                                                              強制切換「手動」啟動<strong>：在上述油、電、控制盤檢查排除異常後，將控制盤上發電機選擇開關由「自動（Auto）」旋轉至</strong>「手動（Manual）」位置，手動進行啟動點火測試<strong>    。                                                                                                                                                     </strong>【第三階段：負載卸除】<strong>\\<br>電力紅區死守                                              非必要之電梯電源迴路，將寶貴的電力</strong>百分之百死守在 B1 臨時開刀房、臨時 ICU、急診搶救紅區、伺服器機房及血庫冰箱等重症紅區<strong>，確保發電機續航力撐過黃金 72 至 120     分鐘記錄運轉狀態與溫度，每小時精算柴油賸餘量 小時 。                                                                                                                                          。 </strong>【第四階段：供電復原】<strong>\\<br>市電切回與發電機冷俥   □ </strong>ATS 自動/手動切回市電<strong>：當台電供電恢復或隆安機電搶修完成後，12 秒內 ATS 設備會自動切回台電供電。若未能自動跳回，工務人員確認盤面燈號後手動切回                                           100]。                                                                                                                                                            100]。 □ </strong>發電機冷俥（Cooling Run）<strong>：當常規市電供電正常、系統安全切回後，發電機組絕不可立即熄火，</strong>必須執行「冷俥 2 分鐘」程序，讓柴油引擎在低載狀態下冷卻運轉 2       冷俥不滿 2 分鐘熄火易造成渦輪及缸體高熱損壞 分鐘後自動停俥**，使系統安全恢復正常監控狀態 。                                                                                                       。 ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------</p>\n<p>九、 工務同仁在斷電時如何「手動操作 ATS」切換電力？</p>\n<p>當高壓或台電斷電時，自動切換開關（ATS）偵測停電後，正常狀況下應於停電後自動投入並切換由發電機供電\n。</p>\n<p>若 ATS 自動切換失效、且發電機已運轉但供電系統失效時，工務同仁手動操作\nATS 的緊急處置步驟如下：</p>\n<ol>\n<li>\n<p><strong>確認環境安全與穿戴護具</strong>： 工務人員（曹宏益主任、唐朝生組長或值班同工）抵達門診 B1 高壓電機房（或備用發電機房）後，<strong>確認現場無短路燒焦味及瓦斯外洩後，穿戴高壓絕緣橡膠手套及防電弧護面具</strong> 。</p>\n</li>\n<li>\n<p><strong>確認 ATS 控制盤面指示燈號</strong>： 檢查 ATS 電力來源端，查看「常用電源（台電/市電）」指示燈是否為熄滅（代表斷電），以及「備用電源（發電機）」指示燈是否已亮起綠燈（代表發電機已發電並送至盤端） 。</p>\n</li>\n<li>\n<p><strong>手動切換開關（ATS 手動投入）</strong>： -   將 ATS 控制開關由<strong>「自動（Auto）」位置切換至「手動（Manual）」位置</strong>。 -   使用專用之手動操作柄（通常掛在配電盤側邊），插入 ATS 機械操作孔內。 -   <strong>用力手動扳動操作柄，強行解除市電端之真空斷路器（VCB）或開關鎖定，並強行推入「手動投入發電機供電端」</strong>，完成物理性手動電力切換 。</p>\n</li>\n<li>\n<p><strong>恢復供電後之手動切回市電</strong>： 台電恢復供電後，ATS 應在 <strong>12 秒內</strong> 自動切回台電常規供電 。若 ATS 仍未能自動跳回，工務人員確認盤面市電指示燈亮起後，須再次插入手動操作柄，手動將開關切回市電端，以利發電機進入冷俥停機程序 。</p>\n</li>\n</ol>\n<p>十、 發電機啟動失敗後，若柴油存量不足之「緊急補給與儲備」調度</p>\n<p>若本院緊急發電機自動啟動失敗（經工務排障強啟後） ，且發現日用油箱之柴油存量不足以支撐 72\n小時極限運作，同時又面臨聯外道路受阻、中油油車無法常規運補的「孤島（Black\nStart）」狀態下 ：</p>\n<p>在 HICS 體系下，<strong>後勤部長 L0（總務部部長 許慧莉）</strong> 協同\n<strong>行政/財務部長 F0（管理部部長 張隆鐘）</strong> ，將採取以下重層補給調度方案，死守發電機燃油命脈：</p>\n<ol>\n<li>\n<p><strong>院內「狡兔三窟」地下主儲槽互補取油</strong>： -   大連院區的發電機柴油除了各發電機本體附設的日用油箱外，<strong>在「約翰大樓地下二樓（B2F）」設有本院的柴油主儲槽</strong> 。 -   工務同仁在外部運補中斷時，必須立即攜帶手動抽油幫浦、防爆防靜電提桶，前往約翰大樓 B2F 柴油主儲槽，<strong>以人工、重力或防爆泵浦手動提取柴油</strong>，補給至路加、韓偉、恩慈大樓等各發電機的日用油箱中，將院內殘存油料最大化集中互補調度 。</p>\n</li>\n<li>\n<p><strong>啟動戰時緊急合約外購重柴油</strong>： -   若院內地下主儲槽存量亦面臨見底： -   採購小組長 F2（採購室主任）立即打破平時採購結報限制 ，啟用戰時緊急供應合約，<strong>迅速致電油料合約商「吉昌重油（電話：08-7665578、0935-791509）」</strong>，要求大額緊急調撥運補重柴油送院 。</p>\n</li>\n<li>\n<p><strong>聯絡官協調「外部綠色簽證通道」武裝護送</strong>： -   由於戰時聯外道路可能壅塞或遭軍事管制 ，<strong>聯絡官 A3（行政副院長 黃雅芳）</strong> 須立即聯繫屏東縣政府衛生局、高屏區 EMOC 及 LJEOC（縣市聯合應變中心） 。 -   <strong>請求軍警（陸軍二三四旅、屏東縣後備旅或警政單位）實施強勢協防</strong> ； -   為吉昌重油的運油車製作並發放「軍事管制區通行證」，<strong>開闢專屬無障礙避難與運補綠色動線</strong>，甚至由軍警武裝或消防水車實施沿途護送，確保燃油安全運抵本院指定卸油區 。</p>\n</li>\n<li>\n<p><strong>鐵血執行「電力負載卸除」以節流燃油</strong>： 工務室全面切斷一般病房空調、景觀照明與 80% 電梯电源，將柴油發電機的燃油消耗速度降至「最低消耗水平」，<strong>強行將 72 小時法定維持時效，最大化延長支撐至 120 小時（5天）</strong>，死守戰地生命安全底線 。</p>\n</li>\n</ol>\n<p>🔍 本院在平戰轉換兵推中，上述「指揮順位自動繼承、Downtime\n紙本降級與發電機強啟/油料死守」是最考驗一線醫護與工務同工默契的黃金考點。</p>\n<p>需要我為您及吳榮州院長、黃雅芳副院長、工務室曹宏益主任，將上述這十套戰術程序與電話，彙整編排製成一份可以直接雙面列印、塑膠護貝並掛於地下前進指揮所（恩慈\nB1）情資看板與各發電機房大門後的 <strong>『屏基大連院區：戰時 HICS\n順位繼承、Downtime 斷網降級、與工務維生極限肉搏實兵操作 A4\n查檢手冊（繁體中文防潮版）』</strong> 嗎？</p>\n<p>我想了解機電棟爆炸後的設施搶修與優先順序 爆炸現場的 T-CERT\n救護班人員如何進行檢傷分類？ 若爆炸導致電力受損，B1\n備援空間的維生控制如何執行？ 機電棟受損會影響 B1 醫療運作嗎？ 受傷同仁在\nB1 開刀房的搶救流程為何？ 若發電機油料耗盡，工務組有哪些應變計畫？</p>\n<p>一、 機電棟爆炸後的設施搶修與優先順序</p>\n<p>當大連院區遭受攻擊導致機電棟（或高壓電機房等關鍵基礎設施）發生「紅色訊號（爆炸與火災）」時\n，本院會立即啟動 <strong>HICS 臨災應變機制</strong>，由總務部部長擔任\n<strong>後勤部長（L0）</strong>，工務室主任擔任 <strong>設施運作主管（O2）</strong> ：</p>\n<p>工務同仁（關鍵資源與設施搶修組）必須在安全管制組（保安組）實施現場警戒與封鎖、確保現場無二次爆炸或毒氣外洩等衍生危害的前提下\n，依據以下<strong>「死守生命線、防範二次災害」的鐵血優先順序進行設施搶修與備援切換</strong>\n：</p>\n<p>[ 優先序 1：電力復原與備援 ] ➜ [ 優先序 2：氣電管線斷尾隔離 ] ➜ [\n優先序 3：死守紅區負載卸除 ] ➜ [ 優先序 4：備用水與氣體調度 ] ➜ [\n優先序 5：損害鑑定與電梯救援 ]</p>\n<ol>\n<li>\n<p><strong>優先序一：電力系統復原（10秒內發電機備援、30秒內手動切換）</strong> -   <strong>ATS 切換確認</strong>：自動切換開關（ATS）應於台電停電後 <strong>12 秒內</strong> 自動投入，啟動緊急柴油發電機供電 。 -   <strong>強制手動啟動</strong>：若發電機自動啟動失敗，工務同仁必須在 <strong>30 秒內</strong> 抵達發電機房執行「強制手動啟動」，並同步致電隆安機電（0988-187315）與明威發電機（07-3497424）緊急進場支援 。</p>\n</li>\n<li>\n<p><strong>優先序二：電力、瓦斯與醫療氣體之「斷尾式安全隔離」（預防二次災害）</strong> -   若爆炸損及配電線路或中央醫療氣體管線，工務同仁在與現場指揮官確認後，必須前往閥門控制箱與配電室，<strong>強制拉下受損網段之高壓空氣斷路器（ACB），並對醫療氣體、氧氣管線執行「分段、分區閥門手動手動關閉」</strong> 。 -   排空管路內殘存的高壓氣體，<strong>徹底防範外洩的高濃度氧氣遭遇電線短路火花，引發毀滅性的高氧助燃與二次劇烈爆炸</strong> 。</p>\n</li>\n<li>\n<p><strong>優先序三：執行「電力負載卸除（Load Shedding）」死守重症紅區電力</strong> -   若發電機因油料受限，工務室須遵照指揮官 A0（院長）指令，<strong>主動且強制切斷全院所有行政辦公區、一般病房、冷氣空調、大型景觀照明、以及 80% 電梯之電源迴路（負載卸除）</strong> 。 -   將發電機的所有備用電力，<strong>百分之百死守在 B1 臨時開刀房、臨時 ICU、急診搶救紅區、伺服器資訊機房及血庫/藥庫冰箱等重症紅區</strong>，保障待後撤重症患者的最低維生能耗 。</p>\n</li>\n<li>\n<p><strong>優先序四：水資源互補調度與氣體極限替代</strong> -   針對管線破裂引發的漏水或停水，迅速關閉漏水點隔離閥門，並<strong>手動開啟本院「地下水供水系統（戰備水井）」與頂樓五座水塔的連結閥，實施五座水塔互補供水</strong> 。 -   若中央氧氣管線氣壓急劇下降，工務室立即指導病房與地下 ICU 醫護，<strong>於 3 分鐘內將病患維生管路切換接上床邊備用氧氣小鋼瓶</strong> 。</p>\n</li>\n<li>\n<p><strong>優先序五：受困救援與建物結構災損評估</strong> -   協同警衛（安全管制組）前往各棟電梯口，手動開啟機械鎖，對因停電受困之病患與員工實施<strong>緊急救援</strong> 。 -   全面巡查建築物主體結構，將損害評估、搶修優先序彙整回報指揮中心，<strong>作為指揮官決定是否啟動「HICS Phase 3 全院撤離與量能重置」的決策指標</strong> 。</p>\n</li>\n</ol>\n<p>二、 爆炸現場的 T-CERT 救護班人員如何進行檢傷分類？</p>\n<p>在 HICS 體系與地震/戰災自衛編組下，設施內編組之\n<strong>T-CERT（台灣社區緊急應變隊）或具備同等合格救護資格之救護班人員</strong>\n，是急診與一線救治抵達前的「肉搏自救力量」 。</p>\n<p>救護班人員在爆炸現場執行檢傷分類時，必須嚴格依據\n<strong>START（快速檢傷分類系統）</strong> 流程，落實以下實兵動作 ：</p>\n<ol>\n<li>\n<p><strong>第一步：現場環境安全判別與人員防護（Safety First）</strong> -   救護班人員進入現場前，必須先判別現場是否有瓦斯洩漏、管線漏電、建物即將倒塌或敵方二次攻擊（如恐怖攻擊之詭雷）等直接威脅 。 -   確認環境安全後，<strong>強制穿戴基本個人防護裝備（PPE）</strong> 始得進入 。</p>\n</li>\n<li>\n<p><strong>第二步：呼叫引導「行動輕傷患」（綠色分流）</strong> -   大聲向現場呼喊：<em>「所有聽得見我聲音、還能走路的人，請跟著我走到大連大廳避難！」</em> 。 -   將此類能夠自行走動、生命徵象穩定的 <strong>Class 1 行動方便輕傷者（綠色標籤）</strong>，交由避難引導班導引至 <strong>路加大樓 B1 停車場（輕症病房）</strong> 安置 。</p>\n</li>\n<li>\n<p><strong>第三步：針對原地滯留重傷患進行「30秒 START 快速檢傷」</strong> 針對無法行動的傷患，救護班人員迅速評估以下三項生命指標（RPM） ： -   <strong>R - 呼吸 (Respiration)</strong>： -   無呼吸 ➜ 暢通氣道。若仍無呼吸 ➜ 掛上 <strong>黑色（死亡）</strong> 標籤 。 -   呼吸頻率高於每分鐘 30 次 ➜ 掛上 <strong>紅色（立即重傷）</strong> 標籤 。 -   <strong>P - 灌流 (Perfusion/Circulation)</strong>： -   觸摸橈動脈，若橈動脈微弱或無法摸到（或微血管充填時間大於 2 秒） ➜ 掛上 <strong>紅色（立即重傷）</strong> 標籤 。 -   若有活動性大出血 ➜ 立即施以<strong>戰術止血帶或壓迫包紮</strong>，隨後掛紅牌 。 -   <strong>M - 精神狀態 (Mental Status)</strong>： -   要求傷患執行簡單指令（如「握住我的手」）。若無法配合或意識不清 ➜ 掛上 <strong>紅色（立即重傷）</strong> 標籤 。 -   若呼吸、循環、意識指標皆正常，但 physical 上因骨折等無法移動者 ➜ 掛上 <strong>黃色（延遲中傷）</strong> 標籤 。</p>\n</li>\n<li>\n<p><strong>第四步：一對一隨身物理綁定與後送移交</strong> -   為所有分類完畢之傷患<strong>戴上實體辨識手圈並掛上「傷票（傷病卡）」</strong> 。 -   後送轉移時，確保<strong>手寫紙本傷票、急救藥物紀錄強制綁定（貼牢）於病患隨行擔架旁</strong>，直接推入 <strong>地下一樓 B1 檢傷行政區（約翰/馬可 B1 工務室前方）</strong> 交予急診與外科專業醫療團隊 ，嚴防混亂中身分與診療斷鏈 。</p>\n</li>\n</ol>\n<p>三、 爆炸導致電力受損，B1 備援空間的「內部維生控制」執行機制</p>\n<p>當地面主建物遭受爆炸重創，全院垂直潛藏、啟用地下一樓（B1）五大備援醫療空間（臨時開刀房、ICU及輕症病房）\n，且同時面臨外部市電與常規水源完全中斷的極端狀態時\n：</p>\n<p>在 HICS 體系下，前線指揮所實施<strong>「內部維生控制（\nAMD-3-371）」</strong>之具體節流與人工替代作為如下 ：</p>\n<ol>\n<li>\n<p><strong>電力極限「負載卸除」與「死守紅區」</strong> -   工務室強制拉下地下室非必要照明、公共空調與非醫療儀器電路 。 -   <strong>將緊急發電機的全部電力，百分之百「死守」在韓偉 B1 臨時開刀房與約翰/馬可 B1 臨時 ICU 的維生插座上</strong> 。 -   資訊人員啟用 UPS 不斷電系統（保證核心主機至少供應 15 分鐘） ；若電力於 30 分鐘內無法恢復，則<strong>下令全地下區拋棄電腦，暴力切換改採手寫紙本當機流程</strong> 。</p>\n</li>\n<li>\n<p><strong>水資源「紅區分級配給」與化學排污替代</strong> -   工務室手動打開地下備用水井與大連頂樓蓄水池 。實施鋼鐵管制：<strong>最乾淨的水僅供「臨時開刀房刷手、器械基本消毒及重症病患飲用」</strong>；嚴禁一切員工與家屬洗手或盥洗（全院強制改用酒精乾洗手液） 。 -   <strong>衛生系統中斷應處（全院廁所實施實體封鎖）</strong> ：禁止沖水，改為配發「化學便器袋」，或放置大型儲水桶，由清潔同工舀用冷氣冷凝水進行最低限度沖洗，嚴防糞尿污染地下密閉避難空間 。</p>\n</li>\n<li>\n<p><strong>地下通風、污染物擴散限制與「HEPA 氣閘控制」</strong> -   B1 備援醫療空間設有多個強固防火區劃與防爆耐火門（具備至少 60 分鐘防火時效） 。 -   工務室手動啟動地下室<strong>負壓排氣與通風控制系統，利用 HEPA 過濾器建立防護前室之氣閘控制</strong> 。系統能在空氣循環模式下連續運轉 <strong>至少 72 小時</strong> ，強制捕捉並過濾地表的火災有害碳煙、有毒物質與病原體，防止煙毒窒息地下病患 。</p>\n</li>\n<li>\n<p><strong>氧氣中央管線中斷之床邊備用鋼瓶極速切換</strong> -   中央醫療氣體供氣異常發生時，護理人員須在 <strong>3 分鐘內</strong> 手動拔除病患的中央氧氣管線，<strong>快速切換接上床邊備用之氧氣小鋼瓶</strong> 。 -   資材同工與勤務組利用推車，將儲備的氧氣大鋼瓶與面罩<strong>「盲派（不待前線表單申請）」</strong>直送 B1 開刀房與 ICU，死守生命線 。</p>\n</li>\n<li>\n<p><strong>動用 3 至 7 天「戰備乾糧與生活飲水」</strong> -   營養室（徐桂婷組長）動用預先儲備的 <strong>3 至 7 天緊急乾糧、應急口糧與戰備飲用水</strong> ，絕對優先補給給執行高強度垂直搬運的醫護、後勤同工與地下重症患者，維持生理機能 。</p>\n</li>\n</ol>\n<p>四、 機電棟受損對 B1 醫療運作之致命影響評估</p>\n<p>機電棟（ Substation &amp; Generator Building\n）作為大連院區的「動力心臟」，一旦遭受毀滅性破壞，<strong>將對地下一樓（B1）的備援醫療空間產生極具毀滅性的連帶波及與系統性癱瘓風險。</strong></p>\n<p>具體影響評估與延伸災害如下：</p>\n<ol>\n<li>\n<p><strong>「黑堡」孤島狀態下的電力癱瘓（電路 sever）</strong> -   B1 備援開刀房與臨時 ICU 需要極高穩定的用電 。雖然工務室針對核心設備提供雙電源輸入設計 ，但若機電棟的主變電站、配電盤與高壓空氣斷路器（ACB）被炸毀，市電將全面中斷 。 -   若大連院區各棟附設的緊急發電機其主配電纜線與機電棟相連，<strong>爆炸震波極易導致通往地下一樓的電力幹線發生物理性 sever（切斷）</strong> 。 -   一旦斷線，發電機縱使運轉也無法將電力傳送至 B1 開刀房，導致手術燈、麻醉機與呼吸器瞬间失去電力 。</p>\n</li>\n<li>\n<p><strong>電子病歷與 HIS 系統大癱瘓</strong> -   爆炸引發的電力中斷與資安主機斷電，會導致全院 HIS（醫療資訊）、PACS（影像）與 LIS（檢驗）系統大癱瘓 。 -   B1 醫療團隊將瞬間陷入「又盲又啞」的資訊全黑危機。 -   醫療照護主管必須命令 B1 各功能區立即砸開 <strong>Downtime 當機箱</strong> ，全面切換為紙本手工病歷與手寫處方，並啟動最原始之「徒步傳令兵（Runner）機制」人工跑單傳遞醫囑與配血單 。</p>\n</li>\n<li>\n<p><strong>無動力搬運引發垂直逃生與轉運瓶頸</strong> -   電力中斷導致全院電梯（除馬太大樓 1 台僅供救災電梯外）全面停擺 。 -   這使得將高樓層 ICU、病房的重症病患垂直向下疏散至 B1 避難醫療區時，<strong>被迫採取最消耗體力的「無動力純人工垂直搬運」</strong> ： -   護理人員與勤務組必須以 <strong>5 人一組（4人徒步搬運擔架/樓梯疏散滑墊、1人專業護理照護攜帶蓄電池維生設備）</strong> 的极低效率方式，沿著無窗之安全安全梯人工接力垂直往下搬運 ，極易造成搬運在途意外、甚至延誤搶救黃金期 。</p>\n</li>\n<li>\n<p><strong>中央維生醫療氣體中斷與大缺氧</strong> -   若機電棟旁的戶外液氧槽或中央醫療氣體主管道受損洩漏，全院中央供氧系統將在一瞬間停氣（代號 777） 。 -   B1 臨時 ICU 的呼吸器因失去氣壓氣源將無法正常運轉 。 -   這將迫使醫院動員所有不需要一線手術搶救的行政與社工人員，打破建制，組成全院<strong>「手動捏球大隊（Ambu Bag Team）」</strong>，為每位插管重症病患提供 <strong>每 15 分鐘一班強制輪替的「純人力甦醒球按壓接力」</strong> ，這是一場極其考驗體力與意志力的生命保衛肉搏戰 。</p>\n</li>\n</ol>\n<p>五、 受傷同仁在 B1 臨時開刀房之緊急搶救流程</p>\n<p>若院內同工在爆炸中受重傷（如大出血、多處碎片擊傷、骨折等），HICS\n<strong>計畫部（Planning Section）</strong> 與 <strong>執行部（Operations Section）</strong>\n將立即啟動以下無縫、自給自足的地下搶救流程 ：</p>\n<p>[ 步驟 1：急診掛號登錄 ] ➜ [ 步驟 2：無動力垂直轉移 ] ➜ [ 步驟\n3：手術室降載清空 ] ➜ [ 步驟 4：戰傷急救 Go-Kits 盲派 ] ➜ [ 步驟\n5：走動式血庫活體全血輸注 ] ➜ [ 步驟 6：類比 PACS 與病歷隨行 ]</p>\n<ul>\n<li>\n<p><strong>步驟一：前線緊急掛號與身份追蹤（P3 文件紀錄組 / P2 狀況分析組）</strong> -   門診經理帶領病歷室同工於 <strong>約翰／馬可 B1 檢傷行政區</strong> 親自為受傷同工辦理現場緊急掛號 。 -   <strong>強制戴上「實體辨識手圈（傷票編號）」</strong>，病人動向組確實登錄其手圈編號、姓名、去向（如送往臨時開刀房），每四小時彙整發布一次狀況報告，確保在混亂中「受傷同工的診療軌跡一個都不能少」 。</p>\n</li>\n<li>\n<p><strong>步驟二：垂直向下轉移至「韓偉 B1 臨時開刀房」</strong> -   由自衛消防編組之救災班、勤務組及安全管制同工迅速組成 <strong>5人垂直疏散小組</strong>（4人負責徒步抬擔架、1人護理師全程監測生命徵象） 。 -   將同工垂直運送至地下結構最強固、設備備妥的 <strong>韓偉大樓 B1 腹膜透析室（臨時開刀房）</strong> 。</p>\n</li>\n<li>\n<p><strong>步驟三：手術室降載清空與「死守醫療紅區電力」</strong> -   醫務部下令 <strong>取消所有非緊急、常規性的排程手術</strong> 。 -   外科與麻醉創傷團隊直接進駐 B1 臨時開刀房 。工務室強制拉下行政與空調用電，將發電機的所有不斷電電力，<strong>百分之百死守在臨時開刀房的手術燈與麻醉電路上</strong> 。</p>\n</li>\n<li>\n<p><strong>步驟四：急救物資與用藥「盲派（Push）補給」直送開刀房</strong> -   常規電腦請領系統中斷，任務支援主管（資材組長）與藥局啟動 <strong>推拉式物流（Push-Pull Logistics）</strong> 。 -   藥師與資材人員主動將預先打包的 <strong>「Go-Kits 戰傷急救箱」</strong>（內含戰術止血帶、骨針、大量無菌靜脈林格氏液、廣效抗生素與強效麻醉鎮痛劑）裝上推車 ，<strong>主動「盲派」推送至 B1 臨時開刀房門口</strong> ，確保手術醫師伸手就能拿到救命武器 。</p>\n</li>\n<li>\n<p><strong>步驟五：啟動「走動式血庫（Walking Blood Bank）」活體全血採血與百米速遞</strong> -   若南部捐血中心運補受阻且血庫用盡，檢驗科立即啟動院內自給自足捐血 。 -   依據預篩建檔之<strong>「員工血型與傳染病篩檢名冊」</strong>，廣播緊急群呼符合 O 型血之院內留守同仁，至 <strong>韓偉大樓 B1 出口位置（臨時捐血區）</strong> 。 -   現場抽取「全血（Whole Blood）」並進行 5 分鐘極簡交叉快篩 。 -   <strong>剛抽出、尚有同仁體溫的合格血袋</strong>裝入防水夾鏈袋，由徒步傳令兵（Runner）以百米衝刺速度，直接送入 B1 臨時開刀房，立即為大出血的同工進行活體輸血 。</p>\n</li>\n<li>\n<p><strong>步驟六：類比影像對核、文件防水物理綁定與術後轉置</strong> -   斷網狀態下，放射科放射師在 Local 螢幕上調出同工骨傷或破片影像，<strong>以數位相機或拍立得（Instax）實時翻拍螢幕</strong> ，連同放射科主任手寫的紙本診斷報告交由傳令兵手遞送至開刀房手術台前 。 -   術後，將該同工的手寫紙本 Downtime 病歷、給藥醫囑、手術摘要統一裝入防水夾鏈袋，<strong>強制物理性綁定（貼牢）於病患擔架旁，實施「病歷隨人走」</strong> ，安全移轉至臨近的 <strong>韓偉大樓 B1 環保室（恢復室）</strong> 或 <strong>約翰/馬可 B1 臨時 ICU 病房</strong> 進行術後高強度照護 。</p>\n</li>\n</ul>\n<p>六、 緊急發電機啟動失敗、且柴油油料耗盡時的重層應變計畫</p>\n<p>若面臨外部交通、中油燃油車完全中斷的極端孤島情境（Black Start） ，且大連院區發電機自動啟動失敗、或強啟後運轉一段時間面臨日用油箱「柴油存量見底」的滅頂危機時\n：</p>\n<p>在 HICS\n體系下，後勤部長將會同工務室與行政部，立即啟動以下<strong>「狡兔三窟」與「重層運補」之鋼鐵柴油命脈死守計畫</strong>\n：</p>\n<ol>\n<li>\n<p><strong>第一重防線：院內「狡兔三窟」地下主儲槽人工跨樓層取油互補</strong> -   雖然發電機附設有日用小油箱，但大連院區設有一處抗炸安全的柴油大後方------<strong>「約翰大樓地下二樓（B2F）」之全院柴油主儲槽</strong> 。 -   工務同仁必須在常規泵浦停電的情況下，立即攜帶手動防爆抽油幫浦、防靜電手提桶，前往約翰大樓 B2F 柴油主儲槽，<strong>以「純人工、重力或手動泵浦」方式手動提取柴油</strong> 。 -   人工提油跨樓層、跨棟別補給至路加、韓偉、恩慈大樓等各棟緊急發電機的日用油箱中，將全院殘存之燃油最大化集中互補調度，死守醫療紅區不熄燈 。</p>\n</li>\n<li>\n<p><strong>第二重防線：啟動戰時緊急合約，大額外購重柴油</strong> -   若院內地下大油槽亦告竭，採購小組長 F2（採購室主任）立即打破平時採購行政結報程序限制 ，啟用戰時緊急燃油採購合約，<strong>迅速致電簽約之油料合約商「吉昌重油（電話：08-7665578、0935-791509）」</strong>，要求合約商大額緊急調撥運補重柴油送院，死守發電機續航力 。</p>\n</li>\n<li>\n<p><strong>第三重防線：聯絡官協調「外部軍警簽證與武裝綠色通道」</strong> -   由於主戰區周邊道路可能實施交通管制或遭敵特封鎖，<strong>聯絡官 A3（行政副院長）</strong> 須立即聯繫屏東縣衛生局、高屏區 EMOC 及縣市聯合應變中心（LJEOC） 。 -   <strong>請求協防之國軍部隊（陸軍機械化步兵第二三四旅、屏東縣後備旅）或警政、保二總隊，調派武裝軍警或消防水車實施強勢協防</strong> 。 -   為吉昌重油的運柴油車製作、發放「軍事管制區通行證」，<strong>開闢專屬無障礙避難與運補綠色通道</strong>，一路武裝護送運油車安全穿過火線抵達本院卸油區，突破外部斷油絕境 。</p>\n</li>\n<li>\n<p><strong>終極無奈作為：將 72 小時極限延長至 120 小時之「殘酷負載卸除（Load Shedding）」</strong> -   工務同仁強制執行極限「負載卸除」，切斷一切非維生用電，將柴油發電機的燃油消耗速度降至「最低怠速消耗水平」 。 -   <strong>強行將 72 小時法定自主維持時效，最大化延長支撐至 120 小時（5天）</strong>，竭盡全力為前線受傷同工與重症病患，撐過等待國家級電力管線搶修完成的最後黃金救援期 。</p>\n</li>\n</ol>\n<p>📊 <strong>醫院城鎮韌性與平戰轉換推演提示</strong>：\n機電棟遭受爆炸破片打擊與大出血傷患搶救，是檢驗醫院「生命線固守」與「戰術空間重構」難度最高的複合實兵科目\n。</p>\n<p>為了確保大連院區的工務同工、急診醫護與保安人員在爆炸火警的\nDowntime（電腦癱瘓、無線電受EMP干擾）極端狀態下依然能精準、冷靜地進行物理排障與傷患搶救，您需要我為工務室、檢驗科與護理部，規劃彙整編製一份可以直接雙面印製、塑膠護貝並掛於地下\nEOC 與各發電機房牆上的 <strong>「屏基大連院區：機電爆炸 CI\n搶修、走動式血庫、暨發電機手動 ATS 強啟 A4 雙面實兵防呆行動查檢卡（\nTraditional Chinese 繁體中文版）」</strong> 嗎？</p>\n<p>爆炸現場的 T-CERT 救護班人員如何進行檢傷分類？</p>\n<p>當本院（屏東基督教醫院大連院區）不幸遭受遠距火力、敵特攻擊或意外導致發生嚴重爆炸（紅色訊號）時\n，院內防護團編組之 <strong>T-CERT（台灣社區緊急應變隊）</strong>\n或具備同等合格救護資格之 <strong>救護班人員</strong> ，將作為「第一線肉搏自救力量」立即投入戰場 。</p>\n<p>在救護車及常規急診醫護尚未完全接管現場的黃金時間內，T-CERT\n救護班同工必須依循 <strong>START（快速檢傷分類系統）</strong> 與 <strong>Jump\nSTART（兒童快速檢傷系統）</strong> 準則 ，在煙硝與二次爆震威脅下，落實以下<strong>四大關鍵實兵步驟進行檢傷分類與救援引導</strong>：</p>\n<p>步驟一：嚴格執行「現場安全判別（Safety First）」與防護</p>\n<p>爆炸現場通常伴隨著建物局部坍塌、水電管線破損漏電、瓦斯外洩或火災濃煙等致命二次風險\n：</p>\n<ol>\n<li>\n<p><strong>自身安全為絕對前提</strong>： T-CERT 成員進入災區前，<strong>必須先正確判別救災環境的二次風險</strong> 。若判定環境存在即時性危險（如天花板鋼筋即將掉落、電線正泡在水中閃爍火花），應立即向安全官（A2）或現場指揮官回報，且<strong>在危害未排除前，嚴禁盲目涉險進入</strong>，誓死貫徹「救災人員自身安全為最高原則」 。</p>\n</li>\n<li>\n<p><strong>穿戴個人防護裝備（PPE）</strong>： 確認現場無即時危險後，同工必須<strong>強制穿戴合格之個人防護裝備</strong>（包含防砸安全帽、防滑護手套、護目鏡及防塵口罩）始得切入現場搶救 。</p>\n</li>\n</ol>\n<p>步驟二：大聲呼喊、救援引導「行動輕傷患」（綠色分流）</p>\n<p>在爆炸現場中，高達 <strong>70% 的人流可能屬於輕傷或僅受心理恐慌影響</strong> 。為避免大量恐慌群眾推擠、阻塞核心重症搶救空間 ，救護班須優先實施動線引導：</p>\n<ol>\n<li>\n<p><strong>實施語音篩選（Voice Call）</strong>： 救護班同工抵達現場後，使用手持大聲公大聲向受災區域呼喊：<em>「所有聽得見我聲音、且還能自己走路的同工和病友，請立刻跟著我（或指著引導路標）走到一樓門診大廳綠區，那裡有醫護人員會幫大家處理！」</em> 。</p>\n</li>\n<li>\n<p><strong>標記為綠色並引導撤離</strong>： 凡是能聽從指令、自行站立並移動的人員，一律直接歸類為 <strong>Class 1 輕傷（綠色標籤）</strong> 。由救護班同工或避難引導班，快速將其引導至 <strong>一樓大廳綠區輕傷縫合包紮區</strong> ，或安全垂直轉移至地下一樓安全的 <strong>路加大樓 B1 停車場（輕症病房）</strong> 安置 。</p>\n</li>\n</ol>\n<p>步驟三：針對滯留傷患實施「30秒 START 快速檢傷」與分類</p>\n<p>針對現場無法自行走動、倒臥在地的傷患，T-CERT\n成員必須攜帶手電筒、傷票，蹲下身子在 30\n秒內快速評估以下三項生命指標（RPM） ：</p>\n<p>1. R - 呼吸 (Respiration)</p>\n<ul>\n<li>\n<p><strong>無呼吸</strong>：立即手動為傷患暢通氣道 。若暢通氣道後仍無呼吸 ➜ 判定已無生命徵象，掛上 <strong>黑色（死亡/無救）</strong> 傷票 。</p>\n</li>\n<li>\n<p><strong>呼吸急促</strong>：若呼吸頻率高於每分鐘 <strong>30 次</strong> ➜ 代表體內缺氧或休克，立即掛上 <strong>紅色（立即重傷）</strong> 傷票 。</p>\n</li>\n<li>\n<p><strong>呼吸正常</strong>：若呼吸頻率在每分鐘 30 次以下，則繼續評估下一項指標（Perfusion） 。</p>\n</li>\n</ul>\n<p>2. P - 灌流 (Perfusion / Circulation)</p>\n<ul>\n<li>觸摸傷患的橈動脈（手腕脈搏），或評估其指甲微血管充填時間（CRT）： -   若<strong>橈動脈觸摸不到</strong>（或微血管充填時間大於 2 秒） ➜ 代表心血管系統衰竭，立即掛上 <strong>紅色（立即重傷）</strong> 票 。 -   若<strong>發現活動性大量噴湧出血</strong> ➜ 救護班人員必須立即取出隨身配置的 <strong>戰術止血帶（CAT）</strong> 於出血肢體上方 5-8 公分處強力束緊，並執行簡易包紮止血固定 ，同時掛上 <strong>紅色（立即重傷）</strong> 傷票 。 -   若脈搏強勁（充填時間小於 2 秒），則繼續評估最後一項指標（Mental） 。</li>\n</ul>\n<p>3. M - 精神狀態 (Mental Status)</p>\n<ul>\n<li>向傷患大聲下達簡單口頭指令（例如：「聽得到嗎？請握住我的手！」或「請張開眼睛！」） ： -   若傷患<strong>無法配合、意識不清或陷入昏迷</strong> ➜ 判定其大腦灌流不足或神經系統受創，立即掛上 <strong>紅色（立即重傷）</strong> 傷票 。 -   若傷患<strong>能完全配合指令且意識清晰</strong>，但因 physical 上的嚴重骨折、大面積撕裂傷而無法自行移動 ➜ 掛上 <strong>黃色（延遲中傷）</strong> 傷票 。</li>\n</ul>\n<p>步驟四：精準掛上「傷票」並一對一隨身物理綁定移交</p>\n<p>為了避免爆炸現場的混亂導致傷患身分與病情資訊交接斷鏈，T-CERT\n必須落實「病歷隨人走」的實體卡控機制 ：</p>\n<ol>\n<li>\n<p><strong>實體手圈與傷票（傷病卡）綁定</strong>： 檢傷分類完畢後，救護班同工必須<strong>當場將病人手圈戴在傷患右手（非患肢）上</strong> ，並將填寫完畢的<strong>「四色傷票（傷病卡）」掛於傷患胸前或擔架最醒目位置</strong> 。</p>\n</li>\n<li>\n<p><strong>按傷票色塊引導輸送</strong>： 輸送人員（由總務或清潔人員協力）集中於檢傷站 ，<strong>嚴格依據傷票上的顏色指派輸送目的地</strong> ： -   <strong>掛「紅色」傷票病患</strong> ➜ 絕對優先以推床或擔架推入地下一樓 <strong>【臨時 ICU 病房（約翰／馬可 B1 資材組前方）】</strong> 或 <strong>【臨時開刀房（韓偉 B1 腹膜透析室）】</strong> 執行損傷控制手術與搶救 。 -   <strong>掛「黃色」傷票病患</strong> ➜ 送至中度傷患治療區 。 -   <strong>掛「綠色」傷票病患</strong> ➜ 引導至輕症病房安置 。</p>\n</li>\n<li>\n<p><strong>對核與登記數據上報</strong>： 傷患移交至 B1 替代醫療功能區後，T-CERT 須將現場統計之「檢傷掛號人數與級數」的統合資料手遞提交給 <strong>計畫部-文件紀錄小組長（P3）</strong>，以便隨時更新地下指揮所的實體「情資看板（Status Board）」，維持戰時情資圖像（COP）之精確性 。</p>\n</li>\n</ol>\n<p>🩹 為了讓本院防護團與 T-CERT\n成員在模擬推演與實兵操作時，能以最快、最直覺的方式執行 RPM 評估與處置：</p>\n<p>需要我為您及職安室，將這套爆炸現場 T-CERT 的 4\n步驟快速檢傷流程與急救要領，提煉設計成一份可以直接印製並發配給同工、放入口袋隨時查閱的\n🛠️ <strong>「屏基 T-CERT：爆炸現場 30 秒 START 快速檢傷與傷票物理綁定 A4\n三折口袋卡（實兵防呆版）」</strong> 嗎？</p>\n<p>工務組如何針對故障的高壓斷路器進行手動復歸與操作？\n若發電機啟動失敗且柴油存量見底，應如何協調外部緊急運補？\n在機房受燃燒劑威脅下，安全管制組具體的封鎖與巡邏頻率為何？\n若發電機柴油耗盡，如何向外部供應商請求緊急運補？ T-CERT\n救護班在爆炸現場如何標記黑色死亡傷票？ 機電棟爆炸會導致 B1\n臨時開刀房的維生電力斷絕嗎？</p>\n<p>針對您提出的六項關乎醫院關鍵基礎設施（CI）安全防護與 HICS\n戰術應變的核心問題，以下依據《屏東基督教醫院大連院區平戰轉換白皮書》及相關維生指引，提供最詳盡、精確且可供實兵操作的規範解析：</p>\n<p>一、 工務組如何針對故障的高壓斷路器進行手動復歸與操作？</p>\n<p>當常規台電電力中斷，或院內高壓電網因短路、爆震發生跳電時 ，自動切換開關（ATS）應於 <strong>12 秒內</strong> 自動投入，啟動緊急發電機供電\n。若高壓斷路器發生故障或跳脫，工務組同仁（設施運作主管\nO2）必須依據<strong>「供電設備異常緊急處理流程（AMD-3-113）」</strong>進行以下手動復歸與操作\n：</p>\n<ol>\n<li>\n<p><strong>各分路空氣斷路器（ACB）跳脫之現場處置</strong>： -   <strong>安全確認（防感電）</strong>：工務人員抵達高壓電機房後，手動操作前<strong>必須先確認線路無短路、無異味或無燒焦現象</strong> 。 -   <strong>警報復歸與投入</strong>：確認線路安全後，手動將斷路器控制盤上的警報燈號予以<strong>「復歸（Reset）」</strong>，隨後重新手動合閘（投入） 。 -   <strong>手動物理投入</strong>：若斷路器無法自動投入，在排除線路異常與短路風險後，工務同仁須<strong>以手動操作柄物理物理投入</strong>，強行復電 。</p>\n</li>\n<li>\n<p><strong>自動復閉電驛異常之排障</strong>： -   控制盤上若出現自動復閉電驛之異常警報，<strong>必須先手動將警報復歸後，系統才允許重新投入斷路器</strong> 。 -   若系統連續投入失敗，代表控制迴路可能受損。工務同仁須<strong>重新拔插控制線路，詳細檢查是否為接觸不良或線路融損</strong> 。</p>\n</li>\n<li>\n<p><strong>ATS（自動切換開關）手動物理切換</strong>： -   若發電機在停電後已運轉，但啟動 <strong>30 秒後</strong> 系統仍無法正常供電，工務同仁必須立刻確認 ATS 控制盤面指示燈號 。 -   手動將 ATS 控制開關由<strong>「自動（Auto）」位置切換至「手動（Manual）」位置</strong> 。 -   插入隨盤附設的手動機械操作柄，<strong>用力扳動，強行解除市電端之真空斷路器（VCB）鎖定，並將機械開關推入「發電機供電端」</strong>，以純類比物理方式強行完成電力切換 。</p>\n</li>\n</ol>\n<p>二、 若發電機啟動失敗且柴油存量見底，應如何協調外部緊急運補？</p>\n<p>在戰爭或敵特破壞等外部交通受阻、燃油中斷的「孤島（Black\nStart）」極端狀態下 ，若發電機自動啟動失敗（經工務手動強啟後），且日用油箱存量見底時\n：</p>\n<p>在 HICS\n體系下，將採取以下<strong>院內集中調度、跨部門外購、與軍警武裝綠色通道</strong>之重層運補機制：</p>\n<ol>\n<li>\n<p><strong>第一步：院內主儲槽人工跨樓層取油互補</strong>： -   大連院區在<strong>「約翰大樓地下二樓（B2F）」設有全院柴油主儲槽</strong> 。 -   工務同仁在外部燃油車無法進場時，必須立即攜帶手動防爆抽油幫浦與防靜電油桶，前往約翰 B2F 主儲槽，<strong>以人工、重力或手動防爆泵浦手動提取柴油</strong> ，跨棟補給至路加、韓偉、恩慈大樓各發電機的日用油箱中，將院內殘存油料最大化集中調度 。</p>\n</li>\n<li>\n<p><strong>第二步：啟動戰時緊急合約外購重柴油（採購組 F2）</strong>： -   若院內地下主儲槽存量亦告竭，採購小組長 F2（採購室主任）立即打破平時採購行政結報程序限制 ，啟用戰時緊急燃油採購合約，<strong>迅速致電簽約之油料合約商（如吉昌重油）</strong>，要求合約商大額緊急調撥運補重柴油送院，死守發電機續航力 。</p>\n</li>\n<li>\n<p><strong>第三步：聯絡官協調外部軍警武裝與「綠色通道」</strong>： -   由於主戰區周邊道路可能實施交通管制或遭敵特封鎖，<strong>聯絡官 A3（行政副院長）</strong> 須立即聯繫屏東縣衛生局、高屏區 EMOC 及縣市聯合應變管制中心（LJEOC） 。 -   <strong>請求協防之國軍部隊（陸軍機械化步兵第二三四旅、屏東縣後備旅）或警政、保二總隊，調派武裝軍警或消防水車實施強勢協防</strong> 。 -   為運油車製作、發放「軍事管制區通行證」，<strong>開闢專屬無障礙避難與運補綠色通道</strong>，一路武裝護送運油車安全穿過火線抵達本院卸油區，突破外部斷油絕境 。</p>\n</li>\n</ol>\n<p>三、 在機房受燃燒劑威脅下，安全管制組具體的封鎖與巡邏頻率為何？</p>\n<p>當敵特或第五縱隊企圖對大連院區核心資訊機房投放燃燒劑、實施縱火破壞時\n，安全管制組（保安組\nO4）將協同自衛消防編組，啟動最嚴厲的實體防衛與 Lockdown 控制 ：</p>\n<ol>\n<li>\n<p><strong>硬邊界（Hard Perimeter）封鎖具體作為</strong>： -   <strong>物理極限封鎖</strong>：安全管制組會同支援警力，<strong>立即封閉大連院區 80% 的出入口與側門</strong>，拉下防火鐵捲門，並架設拒馬、蛇籠與充水式紐澤西護欄 。 -   <strong>防衝撞阻絕</strong>：調派院內大型工程車或運輸車輛，<strong>打橫停放於非必要出入口及資訊/發電機房外圍通道，作為防衝撞的實體阻絕物</strong>，防範載有燃燒劑的車輛強行衝撞機房 。 -   <strong>啟動 Lockdown 機電鎖定</strong>：保安組迅速啟動內部封鎖（Lockdown），<strong>瞬間降下急診室防暴門並強制關閉全院電梯控制權</strong>，防止縱火份子利用電梯在各樓層擴大縱火點 。</p>\n</li>\n<li>\n<p><strong>關鍵基礎設施（CI）巡邏頻率與配置</strong>： -   <strong>巡邏機制</strong>：針對醫院的「數位與動力心臟」------ <strong>地下室緊急發電機房、伺服器資訊機房、頂樓水塔、戶外液氧槽</strong> 等關鍵基礎設施（CI） ： -   <strong>24小時不間斷巡守</strong>：安全管制組<strong>強制增設「24 小時雙人武裝/防暴裝備巡邏哨」</strong> 。此為一項<strong>連續且不中斷（Continuous）的鋼鐵警戒機制</strong> ，巡邏人員隨身佩戴並<strong>啟動密錄器實時蒐證、配備金屬探測器與防爆毯</strong> ，針對上述機敏重地實施無死角、連續性的往返監控巡邏，嚴厲盤查任何穿著白袍或制服的可疑偽裝人士 。</p>\n</li>\n</ol>\n<p>四、 若發電機柴油耗盡，如何向外部供應商請求緊急運補？</p>\n<p>當大連院區發電機燃料完全耗盡，且院內主儲槽抽油調撥亦用罄時，必須立刻向外部供應商及主管機關請求戰時緊急調撥\n：</p>\n<ol>\n<li>\n<p><strong>向官方中樞請求緊急徵用運補</strong>： -   <strong>聯絡官 A3（行政副院長）</strong> 立即致電屏東縣政府衛生局、EOC（緊急醫療應變中心）及縣市聯合應變中心 。 -   通報本院發電機燃料耗盡之危急情資，<strong>請求地方政府「調度、徵用車輛（或軍警消車輛）」進行重柴油的緊急跨區運補與護送</strong> 。</p>\n</li>\n<li>\n<p><strong>啟動「在地替代供應商」緊急採購（採購組 F2）</strong>： -   <strong>採購小組長（F2，採購室主任）</strong> 立即停止常規行政結報，撥打本院簽約及在地重油/柴油供應商電話，<strong>要求廠商利用小型運補車、或是派遣備用油桶運輸車，繞開常規受阻幹道送院</strong> 。</p>\n</li>\n<li>\n<p><strong>軍事管制區「綠色避難簽證」與武裝接引</strong>： -   聯絡官與衛生局、作戰區防衛指揮部對接，<strong>為運油車開立並核發「關鍵基礎設施運補綠色簽證（或軍事管制通行證）」</strong> 。 -   安全管制組指派專人，攜帶 UHF/VHF 無線電前往本院律定的外圍路口（如大連路與莊敬街交叉口），<strong>實地接引軍警護送的運油車輛快速切入卸油區</strong> ，突破聯外阻斷的物資孤島絕境 。</p>\n</li>\n</ol>\n<p>五、 T-CERT 救護班在爆炸現場如何標記黑色死亡傷票？</p>\n<p>在遭受爆炸破片與爆震波波及的混亂現場，本院防護團編組之\n<strong>T-CERT（台灣社區緊急應變隊）或救護班人員</strong> 必須在現場醫護接管前，實施\n<strong>START（快速檢傷分類系統）</strong> 進行救命處置 ：</p>\n<p>針對已失去生命跡象的罹難者，T-CERT\n救護班標記<strong>「黑色死亡傷票（Deceased /\nExpectant）」</strong>的具體實兵評估與標記流程如下 ：</p>\n<p>[ 步驟 1：現場安全判別 ] ➜ [ 步驟 2：手動暢通氣道 ] ➜ [ 步驟\n3：確認無自主呼吸 ] ➜ [ 步驟 4：掛上「黑色」傷票 ] ➜ [ 步驟\n5：動線嚴格分離 ]</p>\n<ol>\n<li>\n<p><strong>手動暢通氣道（Airway Check）</strong>： -   發現倒臥傷患後，救護班同工實施第一項評估------ <strong>呼吸（Respiration）</strong>。若發現患者「無自主呼吸」 ： -   救護人員必須<strong>立即施以手動「暢通氣道（如壓額抬頭法）」處置</strong> 。</p>\n</li>\n<li>\n<p><strong>判定與標記黑色傷票</strong>： -   <strong>若在手動暢通氣道後，患者「仍無任何自主呼吸」</strong> ： -   救護班人員現場判定其已無生還可能，<strong>不在此人身上繼續浪費寶貴的按壓甦醒球或維生算力資源</strong> 。 -   <strong>當場撕下傷票（傷病卡）之紅、黃、綠三色色帶，僅保留最底部的「黑色」色塊，並將該黑色傷票強制物理綁定掛於死者胸前、右手腕或隨推床最醒目位置</strong> 。</p>\n</li>\n<li>\n<p><strong>死者動線嚴格物理分離</strong>： -   確認標記為黑色死亡傷票之遺體，一律嚴禁送往 B1 臨時 ICU 或臨時開刀房 。 -   由輸送同工合力將遺體運送至<strong>「路加大樓 B1 地下停車場絕對獨立之角落（戰時臨時太平間 / Morgue）」</strong>進行妥善安置，<strong>確保生者（輕症病房、家屬）與死者之動線在物理上嚴格分離</strong>，防範二次心理恐慌蔓延 。</p>\n</li>\n</ol>\n<p>三、 機電棟爆炸會導致 B1 臨時開刀房的維生電力斷絕嗎？</p>\n<p><strong>是的，在極端高強度的物理爆炸打擊下，機電棟受損極有可能導致 B1\n臨時開刀房的維生電力瞬間「徹底斷絕」</strong>，這也是本院平戰轉換白皮書中防範「黑堡」孤島危機的重點演練想定\n。</p>\n<p>具體的電力中斷物理機制與延伸維生危機如下：</p>\n<ol>\n<li>\n<p><strong>主幹線與配電纜線發生物理性 Sever（切斷）</strong>： -   雖然 B1 臨時開刀房（設於 <strong>韓偉大樓 B1 腹膜透析室</strong> ）配備有雙電源輸入與緊急發電機互為備援設計 ： -   但機電棟（Substation &amp; Generator Building）作為大連院區的動力心臟，一旦遭受直接爆炸打擊，<strong>爆炸震波極易導致從機電棟主配電盤通往韓偉 B1 的地下或管道間電力幹線、高壓電纜發生物理性「Sever（切斷、融損）」</strong> 。 -   <strong>一旦主配電幹線斷裂，發電機縱使在機房內正常啟動運轉，其發出的備用電力也「物理上完全無法傳送」至韓偉 B1 開刀房的配電盤上</strong>，造成開刀房維生系統電力瞬間全黑 。</p>\n</li>\n<li>\n<p><strong>資訊與通訊大癱瘓（IBM HIS、PACS、LIS 系統全黑）</strong>： -   電力受損將導致核心機房斷電，引發全院 HIS、EMR、PACS 系統大癱瘓 。 -   B1 臨時開刀房醫師將陷入「又盲又啞」的狀態，無法讀取電子病歷、亦無法線上調閱骨折或破片 X 光影像 。</p>\n</li>\n<li>\n<p><strong>工務室與醫療照護組之「鋼鐵維生替代方案」</strong>： 為應對此一至暗時刻，本院將暴力啟動以下應變： -   <strong>工務室（設施運作主管 O2）負載卸除</strong>：強行拉下高樓層、行政區、非必要照明迴路，<strong>將全院殘存之所有便攜式不斷電 UPS、蓄電池及發電機算力，絕對死守在 B1 臨時開刀房的手術燈上</strong> 。 -   <strong>手術團隊紙本降級（Downtime）</strong>：全面砸開 Downtime Box，改開立紙本手術醫囑與用藥 。放射師在單機螢幕上調出影像，<strong>以數位相機或拍立得（Instax）實時翻拍螢幕</strong>，由徒步傳令兵（Runner）手遞送至開刀房手術台前 。 -   <strong>純人力「捏球大隊（Ambu Bag Team）」搶救</strong>：若電力中斷導致韓偉 B1 開刀房的電動呼吸器因無電力、無中央氧氣氣壓而停擺，<strong>後勤部與社工室立即打破科室建制，調派非臨床人員組成捏球大隊，為手術台上的同工或傷患執行「一床兩人、每 15 分鐘強制交班」的甦醒球手動捏壓按壓接力</strong>，以人體意志與體力死守患者最後一口氣 。</p>\n</li>\n</ol>\n<p>📊 <strong>城鎮韌性與平戰轉換實兵演練建議</strong>：\n在面臨斷電、斷網、爆炸與特工滲透交織的 CI\n防護複合危機下，一線工務、保安與 T-CERT\n成員的反應速度決定了全院數百名病患的生死線 。</p>\n<ul>\n<li><strong>下一步行動</strong>： 🎧 我們可以為您、工務室曹宏益主任與保安組長，將這六套戰術排障程序與通聯電話，彙整製作成一份可以直接聽讀的 <strong>「大連院區：CI 關鍵基礎設施安全防守、高壓/發電機強制排障、與爆炸檢傷實務語音簡報（Podcast音訊格式）」</strong>，以便同仁在通勤或零碎時間能快速熟稔、死記戰術動作嗎？</li>\n</ul>\n<p>機電棟受損對B1功能區的電力供應有何影響？\n如果發生二次爆炸，安全官應採取哪些終止措施？\n針對重創同工，後勤部如何具體執行活體全血輸注？ B1\n備援醫療空間的供水與廢棄物如何處理？ 若要將這套流程製成 SOP\n檢查卡，該包含哪些核心項目？ B1備援空間有獨立供氧鋼瓶嗎？\n機電棟爆炸如何進行電力負載卸除？ 了解B1備援空間的五大功能區劃分</p>\n<p>一、 B1 備援醫療空間的五大功能區劃分</p>\n<p>當本院（屏東基督教醫院大連院區）面臨戰爭威脅或空襲警報（Code\nBlack）等火力威脅時，策略重點在於大面積空間轉置，將核心臨床功能向下垂直潛藏至地下一樓（B1），重構為安全的「地下微型戰地醫院」\n：</p>\n<ol>\n<li>\n<p><strong>【檢傷行政區】</strong>：開設於 <strong>約翰／馬可大樓 B1 工務室前方</strong> 。 -   <strong>主要戰術用途</strong>：傷病患登記、檢傷分類行政作業、傷票與轉送紀錄、資訊回報、以及家屬初步查詢導引 。</p>\n</li>\n<li>\n<p><strong>【臨時 ICU 病房】</strong>：開設於 <strong>約翰／馬可大樓 B1 資材組前方</strong> 。 -   <strong>主要戰術用途</strong>：重症病患暫置、ICU 銜接、提供呼吸器及多功能生理監視設備之重症監測支援 。</p>\n</li>\n<li>\n<p><strong>【臨時開刀房】</strong>：開設於 <strong>韓偉大樓 B1 腹膜透析室</strong> 。 -   <strong>主要戰術用途</strong>：提供戰傷緊急手術、麻醉支援與損傷控制處置 。</p>\n</li>\n<li>\n<p><strong>【恢復室】</strong>：開設於 <strong>韓偉大樓 B1 環保室</strong> 。 -   <strong>主要戰術用途</strong>：術後觀察、恢復照護、以及向臨時 ICU 或外院之轉送銜接 。</p>\n</li>\n<li>\n<p><strong>【輕症病房】</strong>：開設於 <strong>路加大樓 B1 停車場</strong> 。 -   <strong>主要戰術用途</strong>：地下停車場淨空收治輕症，進行分流安置與等候秩序維持 。</p>\n</li>\n</ol>\n<p>二、 機電棟受損對 B1 功能區電力供應之影響</p>\n<ol>\n<li>\n<p><strong>市電全斷與異地癱瘓風險</strong>：機電棟作為全院電力配電與高壓供電中樞，若遭受直接 भौतिक 爆炸打擊，大連院區將陷入市電中斷之「黑堡（Black Start）」孤島狀態 。</p>\n</li>\n<li>\n<p><strong>幹線物理損毀瓶頸</strong>：雖然工務室針對機房核心設備提供雙電源輸入設計，且能在電力中斷 <strong>10秒內</strong> 啟動緊急發電機供電給資訊室 UPS 設備 ，但若機電棟的主配電幹線、地下電纜或高壓空氣斷路器（ACB）在物理上因爆炸震波而毀損或被切斷（Sever），發電機所發出的備用電力將<strong>物理上完全無法傳送</strong>至韓偉 B1 臨時開刀房及約翰/馬可 B1 臨時 ICU 的配電盤，導致維生供電徹底斷絕 。</p>\n</li>\n<li>\n<p><strong>資訊全黑（盲啞狀態）</strong>：若發電機強啟失效或主機斷電，全院 HIS、EMR 及 PACS 影像系統將瞬間癱瘓 ，B1 開刀房與 ICU 同工將陷入「又盲又啞」的無網狀態，必須立刻暴力切換為手寫紙本醫囑與人工徒步傳令作業 。</p>\n</li>\n</ol>\n<p>三、 機電棟爆炸之緊急「電力負載卸除（Load Shedding）」程序</p>\n<p>當市電中斷且發電機在工務現場搶修強啟後，由於日用柴油在孤島狀態下運補受阻\n，<strong>設施運作主管（O2 / 工務室主任 曹宏益）</strong>\n必須執行冷酷的<strong>電力負載卸除（Load Shedding）</strong>以死守油料 ：</p>\n<ol>\n<li>\n<p><strong>物理性切斷非維生電路</strong>：工務人員須主動拉下並手動關閉<strong>全院所有行政辦公區、一般病房、公共走廊冷氣空調、大型景觀照明、以及 80% 非必要之電梯電源迴路</strong>，將基礎能耗降至最低怠速消耗 。</p>\n</li>\n<li>\n<p><strong>不斷電電力死守核心紅區</strong>：將緊急發電機的所有寶貴电力，<strong>百分之百集中供應於 B1 臨時開刀房、臨時 ICU、急診搶救區、核心資訊伺服器機房及血庫/藥庫冰箱</strong> 。</p>\n</li>\n<li>\n<p><strong>柴油儲量每小時監控精算</strong>：工程師每小時詳實記錄發電機溫度與柴油剩餘存量 ，確保大連院區能強行撐過法定的 <strong>72 小時</strong>，並極限延長支撐至 <strong>120 小時（5天）</strong> 的黃金搶救期 。</p>\n</li>\n</ol>\n<p>四、 二次爆炸威脅下，安全官（A2）應採取的終止與疏散措施</p>\n<p>若在搶救或運作過程中不幸遭遇二次爆炸或實體危害失控，身兼\n<strong>安全官（A2）</strong> 與 <strong>法律訴求組長（F3）</strong> 的職安室主任（杜傳榮）\n，依法行使以下最高安全中止權與防護機制：</p>\n<ol>\n<li>\n<p><strong>行使「安全中止權（Safety Halt）」</strong>：安全官在判定現場環境面臨結構二次坍塌、漏電感電、火勢失控或通風 HEPA 過濾受損產生煙毒窒息之急迫危險時，<strong>有權立刻中止一切可能危害搶修、後勤或醫護同工安全的危險行動 </strong>，並直接向事故指揮官（院長）提出安全建議。</p>\n</li>\n<li>\n<p><strong>下達就地掩蔽或垂直疏散</strong>： -   <strong>就地防爆掩蔽（Defend in Place）</strong>：若空襲與爆震波逼近，引導一線醫護在不斷開重症患者維生設備的情況下，迅速將病床推入防空結構最強固、無窗戶的「核心內筒」（電梯梯廳、內部走廊、浴室）進行就地避難，並關閉防爆防火門 。 -   <strong>無動力人工垂直疏散</strong>：若地下或地表某防火區劃被火煙侵入，立刻啟動「水平至防火牆另一側、再垂直向上或向下」的二次避難 。動員體力人員以 <strong>5人一組（4人徒步抬樓梯疏散滑墊或軟擔架、1人專業護理隨行照護攜帶蓄電池維生儀器）</strong>，經安全梯人工垂直安全轉移 。</p>\n</li>\n</ol>\n<p>五、 重創同工之「走動式血庫（Walking Blood Bank）」活體全血輸注流程</p>\n<p>若戰時外部運補完全中斷，高雄捐血中心血品無法運達，且重創同工大出血濒死、血庫\nO 型血存量見底時 ，檢驗科將立即啟動院內自給自足模式 ：</p>\n<ol>\n<li>\n<p><strong>一呼百應語音群呼</strong>：總機配合指揮官命令，使用中華電信<strong>『一呼百應』語音系統</strong>與簡訊，緊急召集預先篩檢建檔之<strong>「員工/志工血型與傳染病篩檢名冊」</strong>中符合條件的 O 型血同仁 。</p>\n</li>\n<li>\n<p><strong>臨時地下捐血站開設與分區</strong>：於安全的 <strong>韓偉大樓 B1 出口位置（臨時捐血區）</strong> 架設捐血站（維持 20-24℃），落實四大功能分區 ： -   <strong>【A區：登記等待】</strong>：核對雙證件 ，填寫捐血登記表與健康問卷，測量血壓、體溫與生命徵象 。 -   <strong>【B區：問診體檢】</strong>：由醫師進行健康評估，醫檢師使用 Hb meter 進行血紅素快速篩檢，開立手工檢驗單 。 -   <strong>【C區：採血作業】</strong>：下針處實施嚴格 30 秒消毒 。抽取前段血檢體管後，折斷血袋管路擋板採集「新鮮全血（Fresh Whole Blood）」，與抗凝劑 CPDA-1 混勻 。 -   <strong>【D區：休息觀察】</strong>：捐血人平躺或靜坐 10-15 分鐘，給予高熱量餅乾、飲水及保暖毛毯防止頭暈 。</p>\n</li>\n<li>\n<p><strong>戰地極簡快篩與即抽即輸</strong>：血庫跳過繁瑣的血液成分分離程序 ，現場僅針對 ABO/Rh血型 及 HIV/HCV/HBV 進行極速定型與傳染病快篩 ，合格後手寫血袋標籤 。</p>\n</li>\n<li>\n<p><strong>傳令百米衝遞</strong>：剛抽取出、尚有體溫的活體合格全血袋裝入防水夾鏈套袋 ，直接由穿著反光背心的「徒步傳令兵（Runner）」以百米衝刺速度，手遞送入 <strong>韓偉大樓 B1 臨時開刀房</strong> 執行大量輸血（MTP），搶救重創大出血同工的性命 。</p>\n</li>\n</ol>\n<p>六、 B1 備援空間是否配有獨立供氧鋼瓶？</p>\n<p><strong>是的，確實配備有獨立供氧鋼瓶。</strong> 。</p>\n<ol>\n<li>\n<p><strong>法定配置標準（ICU床 × 2 鋼瓶備援）</strong>：地下替代醫療空間在轉置與改建規劃中，已將醫療氣體列為關鍵儲備，依據量化指標，必須確保每一張地下加護病房病床均配備有 <strong>至少 2 支獨立氧氣鋼瓶備援</strong> 。</p>\n</li>\n<li>\n<p><strong>物理保護與機械切換</strong>：備用氧氣鋼瓶必須儲存於乾燥、通風且實體固定锁固的受保護區域 ，且供氧站、鋼瓶庫與中央液氧槽管線之間，皆裝設有獨立閥門、止回閥及手動切換系統，防止發生斷氣時管路氣壓逆流 。</p>\n</li>\n<li>\n<p><strong>斷氣異常（代號777）床邊極速切換</strong>：工務室與資材組嚴密精算氧氣消耗速率 。一旦中央氣體系統因震損中斷，病房與臨時 ICU 的一線醫護能在 <strong>3 分鐘內</strong> 手動將患者中央氧氣拔除，無縫快速切換至床邊備用的氧氣小鋼瓶，死守插管患者呼吸線 。</p>\n</li>\n</ol>\n<p>七、 B1 備援醫療空間之供水與廢棄物處置機制</p>\n<p>1. 供水調度與水質配給</p>\n<ul>\n<li>\n<p><strong>水量自主儲備能力</strong>：依國家急救責任醫院與地下替代指引，本院地下供水系統（蓄水池及備用水箱）必須確保具備 <strong>至少 72 小時（3天）</strong> 的自主運作能力 。水量儲備是以 <strong>「200公升 × 醫院病床數 × 3日」</strong> 的量化公式進行科學儲存，外部儲水與水處理區均需充分加固 。</p>\n</li>\n<li>\n<p><strong>地下水井與五座水塔互補</strong>：常規自來水中斷或受投毒時，工務人員手動關閉全院自來水閥阻絕污染 ，手動啟用本院「地下水供水系統（戰備水井）」 ，並將大連院區頂樓的五座蓄水塔連結管路完全打開，實施「五座水塔互補供水」將存水集中調度 。</p>\n</li>\n<li>\n<p><strong>最嚴格的水資源「紅區管制」</strong>：最乾淨的純淨水源僅供「開刀房刷手、器械基本消毒及重症病患飲用」；嚴禁一切員工與病患盥洗，全院強制改用乾洗手液維持手部衛生 。</p>\n</li>\n</ul>\n<p>2. 生物、危害性污水與醫療廢棄物處理</p>\n<ul>\n<li>\n<p><strong>沾血衛材之「密邏隔離收集」</strong>：在地下室重症功能區運作期間產生的大量沾血衛材與醫療廢棄物，環保室與外包清潔同工須於地下室建立獨立的感染性廢棄物收集動線，使用密封容器妥善打包、隔離與清運，防範在密閉空間內爆發交叉感染 。</p>\n</li>\n<li>\n<p><strong>生物廢棄物分類</strong>：嚴格保持醫療廢棄物分類處理原則，將生物組織、解剖組織等與一般拋棄式生物廢棄物完全分開，並在運輸處置過程中進行法規監控 。</p>\n</li>\n<li>\n<p><strong>危害性液體廢棄物控制</strong>：針對含有危險化學品、化學試劑及高污染性醫療廢水，必須有專屬的設施與設備支持，將此類有害廢水與一般污水系統徹底隔離，於排放前進行中和或適當化學處理，嚴防毒害擴散 。</p>\n</li>\n<li>\n<p><strong>化學排污替代與廁所封鎖</strong>：為防範常規地下污水系統因外部超負荷而逆流，<strong>地下室廁所全面實施實體上鎖鎖固、禁止沖水</strong> ；改為配發專用「化學便器袋」，或放置大型儲水桶，由清潔同工舀用廢水、雨水人工舀水沖洗 。</p>\n</li>\n</ul>\n<p>八、 「大連院區：戰時地下化轉換與維生極限應變」SOP 檢查卡核心項目</p>\n<p>為利於演習兵推與下半年 CI\n防護實兵驗證，本院資訊、病歷、工務、護理及總務同工必須將上述流程提煉成可勾稽的\nA4 SOP 檢查卡，核心項目須涵蓋以下三個維度與 14 項指標：</p>\n<p>📋 預警/臨災 48 小時核心行動檢核項目</p>\n<ul>\n<li>\n<p><strong>【指管與空間功能轉置維度】</strong> -   [ ] <strong>1. 指揮體系啟動</strong>：醫院事件指揮中心（HICS）正式成立並完成 24 小時值班與順位繼承代理名單 。 -   [ ] <strong>2. 空間可用面積確認</strong>：確認地下一樓（B1）可用替代空間面積，運作基準須能容納總病床數的 <strong>10%以上</strong> 。 -   [ ] <strong>3. 地下 ICU 病房配置</strong>：確認地下加護病房床位與維生接口已設置達原院 ICU 床數的 <strong>50%以上</strong> 。 -   [ ] <strong>4. 極限醫療降載與分級疏散</strong>：啟動「反向檢傷」，穩定輕症病患 4 小時極速出院（戰時記帳豁免）；高度照護重症病患落實 A-B 戰術配對、病歷用藥隨擔架防水物理綁定 。</p>\n</li>\n<li>\n<p><strong>【維生與關鍵系統保衛維度（三天孤島運作）】</strong> -   [ ] <strong>5. 緊急電力系統測試</strong>：確認各緊急柴油發電機燃料儲備 <strong>大於 2000公升/台（至少自主支援 72小時）</strong> ，UPS 不斷電系統運作大於 30 分鐘，測試 ATS 手動物理合閘柄 。 -   [ ] <strong>6. 給水系統滿載與互補</strong>：地下戰備水塔水量滿載（精算 200公升 × 病床數 × 3日），備用井水抽取與水管連結測試正常 。 -   [ ] <strong>7. 醫用氣體儲備與供氧</strong>：ICU 床 × 2 獨立鋼瓶就位完成、接頭與氣壓測試正常 。 -   [ ] <strong>8. 停電/斷訊當機與 Downtime 應變</strong>：全院當機廣播、各護理站與藥局 Downtime Box 封條完好、手寫三聯手工病歷、純人力「手動呼吸捏球大隊」輪班表完成 。 -   [ ] <strong>9. 異質性備援通訊測試</strong>：無線電 UHF/VHF 對講機（地下死角中繼站排除）、Iridium 衛星電話及低軌衛星加密 VPN 對接測試正常 。</p>\n</li>\n<li>\n<p><strong>【物資、防護與安全管制維度】</strong> -   [ ] <strong>10. 支援人力緊急召回</strong>：醫師、護理、技術與行政人員召回名冊與「召回雙證件人事核對登錄哨」架設完成 。 -   [ ] <strong>11. 戰備物資與冷鏈保全</strong>：藥品、血品（血庫 72 小時儲備量）、PPE、糧食（3 至 7 天存量）補足，冷藏藥品/血冰箱對接不斷電 UPS 。 -   [ ] <strong>12. 入口臨時除污區架設</strong>：除污帳篷/布簾設置完成，每人除污用水（40-60公升）與廢水 12 小時暫存收集管道暢通，防範交叉污染 。 -   [ ] <strong>13. 臨時太平間與硬邊界 Lockdown</strong>：地下臨時太平間設置（與輕症/家屬動線絕對物理分離）；安全組封閉 80% 出入口，急診防暴門降下 Lockdown 演練 。 -   [ ] <strong>14. 心理社會支持系統</strong>：臨時心理支持團隊（社工/輔導員）成立，準備進行任務後員工 PFA 。</p>\n</li>\n</ul>\n<p>📊 <strong>平戰轉換實兵演練決策建議</strong>：\n地下一樓（B1）的空間重構、斷氣極限捏球、發電機 Load Shedding\n負載卸除以及「走動式血庫」肉搏採血，是檢驗醫院平戰轉換中「後勤維生」與「設施搶修」難度最高的實兵科目\n。</p>\n<p>🎧\n考慮到同仁在綜合演練前需要反覆熟悉這些極限應變動作，我們是否可以將上述\nB1\n地下化五大分區、活體全血輸注、以及發電機/水塔斷電應急手動排障流程，彙整製作成一段可以直接聽讀的\n<strong>「屏基大連院區：戰時地下化 HICS\n空間重置、斷水斷氣極限維生、與活體走動式血庫實兵 A4 雙面核對卡」</strong> 呢？</p>"}]}, {"role": "CERT救護班人員", "entries": [{"scenario": "1-6", "title": "民眾縱火攻擊事件", "desc": "民眾因不滿醫院降載，於急診室外縱火。", "html": "<p>針對特別狀況「民眾因不滿醫院降載，而於急診室外縱火」，這屬於人為蓄意破壞並引發火災的複合型危機。本院受過專業訓練的\nT-CERT（社區緊急救援隊）或相當資格之救護班人員，在投入災害現場時，必須嚴格遵循災難應變程序。</p>\n<p>針對主推官提問的「現場環境判別、救援引導、檢傷分類」等重點，T-CERT\n救護班人員的具體因應作為如下：</p>\n<p><strong>一、 災害現場應注意事項與環境判別</strong></p>\n<ol>\n<li>\n<p><strong>確認自身安全為首要前提</strong>：T-CERT 救護班人員在進入現場前，必須確保自身安全為最高原則，切勿在未確認環境安全或未穿戴適當防護裝備的狀況下貿然進入火場搶救。</p>\n</li>\n<li>\n<p><strong>人為維安風險判別</strong>：由於起火原因為「民眾不滿縱火」，現場極可能仍有施暴者或情緒失控的群眾。救護班人員須先與現場安全管制組（警衛保安人員）確認暴徒已被控制或隔離，在確保現場維安無虞後，再全面展開醫療救援行動。</p>\n</li>\n<li>\n<p><strong>火勢與危害規模判估</strong>：迅速判別火勢大小與濃煙竄流方向。若火勢已經比人高、往旁邊蔓延，或只見濃煙不見火光時，應立即放棄初期滅火，全面轉為逃生與疏散為主。同時須留意急診室外圍是否有易燃物或醫療氣體管線（如氧氣），防範二次爆炸風險。</p>\n</li>\n</ol>\n<p><strong>二、 救援引導與初期處置</strong></p>\n<ol>\n<li>\n<p><strong>啟動緊急搜救與疏散</strong>：在環境安全許可下，T-CERT 救護班須立即展開人員搜救，引導受困於急診室周邊的病患、家屬與員工前往安全場域。</p>\n</li>\n<li>\n<p><strong>確立安全疏散動線</strong>：引導疏散時，動線必須選擇與火源反方向之防火門，並撤離至防火區劃的另一側或指定的安全集結點。在確保病患移出後，須隨手關閉防火門以侷限火煙蔓延。</p>\n</li>\n<li>\n<p><strong>初期滅火（僅限火災極初期）</strong>：若判定火勢極小且在可控制範圍內，救護班人員可就近使用滅火器（遵循「拉、瞄、壓、掃」要領）進行初期滅火，同時大聲呼救並通報總機及 119。若滅火失敗，須立即撤退並專注於人員引導。</p>\n</li>\n</ol>\n<p><strong>三、 檢傷分類與緊急搶救</strong></p>\n<ol>\n<li>\n<p><strong>設立檢傷站與快速分類</strong>：將救出的傷患引導至安全的臨時救護站後，T-CERT 救護班人員須快速且正確地分類傷患狀況。面對火災與潛在的大量傷患，應使用「快速檢傷（START）」或「兒童版快速檢傷（Jump START Pediatric）」，並結合急診五級檢傷（TTAS），將病患依紅（重傷）、黃（中傷）、綠（輕傷）、黑（死亡/無救）進行標示，優先搶救有存活機會的病患。</p>\n</li>\n<li>\n<p><strong>執行現場基本急救</strong>：針對分類後的傷患，救護班須立即執行相應的緊急救護作為，例如給予基本生命急救術（BLS）、針對燒燙傷進行初步覆蓋處置、使用止血帶控制大出血，以及進行簡易包紮與固定。</p>\n</li>\n<li>\n<p><strong>傷患動向清點與交接後送</strong>：救護班負責將急救後的傷患進行造冊清點，掌控傷患數量與動向。當縣市消防單位或外部緊急救護單位（119）抵達現場時，T-CERT 救護班須立即與其進行交接，快速說明現場傷患狀況與檢傷結果，以利外部救護資源順利執行傷患的後送作業。</p>\n</li>\n</ol>"}]}]}, {"id": "external_partners", "name": "外部協作單位", "roles": [{"role": "衛生局", "entries": [{"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認醫院所在區域即將進入「主戰區」，必須啟動<strong>醫療核心能量的預防性撤離（HICS\n第三階段）</strong>時 ：</p>\n<p><strong>衛生局</strong>作為地方最高的醫療主管機關，是整場撤離戰役中的<strong>「外部指揮協調中樞」與「資源調度總司令」</strong>\n。在平平轉換與實兵撤離過程中，本院 HICS\n聯絡官（由行政副院長擔任）將作為與衛生局對接的單一聯繫窗口 。</p>\n<p>衛生局端將配合中央聯合應變中心（CJEOC）及衛福部，協同縣市聯合應變管制中心（LJEOC），採取以下<strong>四大階段之具體協調與跨機構調度作為</strong>，全力護航本院完成醫療量能安全轉移：</p>\n<p>一、 指令傳達與「分散風險式」點對點重置空間核定階段</p>\n<ol>\n<li>\n<p><strong>行使決策核准與宣告權，防堵社會恐慌</strong>： 依據本院病人疏散重置計畫，當本院面臨主戰區火力威脅決定實施預防性撤離時，<strong>必須即刻與屏東縣衛生局聯繫並取得官方核准後，始得做出最終決策並發布公告</strong> 。此機制可確保官方與軍方步調一致，防範非理性的撤離公告製造社會不安與集體恐慌 。</p>\n</li>\n<li>\n<p><strong>貫徹「分散風險（Decentralize）」之跨院床位轉銜協調</strong>： 衛生局負責掌握及監控全轄區內各醫院之殘存醫療量能 。由於本院為<strong>「重度級急救責任醫院」</strong> ，為防範撤出的大量急重症病人瞬間塞爆可能重置區的其他重度急救責任醫院 ，衛生局將依循應變指引： -   <strong>分散風險分流</strong>：強勢協調並命令可能重置區之<strong>中度級、一般級急救責任醫院（如協定聯防之衛生福利部屏東醫院、寶建醫院、安泰醫院、屏東榮總等）或臨時開設之第二型急救站，作為本院點對點的接收重置端</strong> ，保留區域內重大傷病患之整體救治戰力 。 -   <strong>EOC 責成協調</strong>：衛生局將直接責成高屏區<strong>緊急醫療網（EOC）勤務中心</strong>，全面代為詢問各接收端之可用備援床位 ，並將床位分配名額通報本院，完成跨院接收端對接 。</p>\n</li>\n</ol>\n<p>二、 撤離交通載具極限徵用與「簽證物資」調撥保障階段</p>\n<ol>\n<li>\n<p><strong>與交通局研議，開闢「簽證車隊」專屬避難路線</strong>： 衛生局負責與縣市聯合應變管制中心（LJEOC）及交通局、警政單位召開緊急會議 ，精確確認本院轉移的路線與出發的確切時間 。規劃專用之<strong>綠色無障礙撤離交通路線</strong>，排除道路壅塞，保障救護車隊與大型接駁車安全穿梭 。</p>\n</li>\n<li>\n<p><strong>緊急徵用調配「大眾接駁車與外部救護車」</strong>： 當本院盤點後回報現有運輸車輛（4 輛救護車、4 輛中巴等）不足以應付高風險撤離時 ，衛生局將啟動緊急徵用協定 ： -   協調 LJEOC 租賃與<strong>徵用外部救護車公司、民間遊覽車業者及大眾接駁載具</strong>，並主動製作發放「軍事管制區通行證」 。 -   指派支援車隊至大連院區律定的三大接運區（急診大門救護車專區、門診大廳接駁車專區、恩慈旁私人車專區）集結，協助病患快速移出 。</p>\n</li>\n<li>\n<p><strong>協助調度血液與醫療衛材之「運輸改道與徵用」</strong>： 若大連路等常規物流中斷，衛生局將協助<strong>調度與徵用官方或軍方車輛，協助執行本院備 O 型用全血、重要骨傷藥品及醫療氣體鋼瓶的運送</strong> ，確保在途安全 。</p>\n</li>\n<li>\n<p><strong>提供「醫療及衛材資源優先調撥」</strong>： 若本院在撤離途中或到達重置點初期面臨物資告竭，衛生局將啟動備援倉儲 ，對本院緊急撥發維生資源，且此項物資調撥<strong>以「藥材及衛材（含管制麻醉藥、破傷風疫苗等）」為絕對優先</strong> 。</p>\n</li>\n</ol>\n<p>三、 在途撤離進程之「動態監控」與突發危安事件協調階段</p>\n<ol>\n<li>\n<p><strong>落實鋼鐵般的「啟動與抵達雙端報到（Check-in / Check-out）」機制</strong>： 衛生局將與本院計畫部（狀況分析小組 P2）對接，建立嚴格的在途監控 ： -   本院撤離車隊<strong>「啟動出發」</strong>與<strong>「抵達重置點」</strong>兩個時間節點，均需透過律定的專用無線電或加密通訊管道，向縣市衛生局回報 。 -   衛生局全程掌握每位高度照護（Class 4）重症病患、隨車醫護、以及防水資料袋（含手寫病歷醫囑）之隨行進程 。</p>\n</li>\n<li>\n<p><strong>跨院通訊韌性維持與突發求援調度</strong>： 在撤退的黃金時間內，衛生局保持與「危險區醫院（本院）」、「接收醫院」及「LJEOC」三方的 24 小時熱線暢通（若常規電信斷網，啟用 UHF/VHF 無線電或衛星電話等備援通訊） 。 -   若安全官（職安室杜傳榮主任）在撤離途中回報發生建築局部坍塌、遭到敵方無人機襲擾或周邊火災 ，衛生局須<strong>第一時間向 LJEOC 請求調派武裝警力或消防水車前往預劃集結點提供強勢掩護與接引</strong> 。</p>\n</li>\n<li>\n<p><strong>向衛福部及國安系統即時續報</strong>： 衛生局負責綜整並定時將本院病患疏散進程、人員傷亡統計、以及殘存醫療量能等關鍵數據，向衛福部 EOC 及 CJEOC 進行即時通報，以利國家掌握高屏地區之整體防衛韌性 。</p>\n</li>\n</ol>\n<p>四、 異地重置點「急救量能擴充」與「戰備血液供應」保障階段</p>\n<p>當本院主力車隊及設備安全抵達可能重置區接收醫院後，衛生局將從行政與公共衛生角度，強力協助醫院在最短時間內重啟開診\n：</p>\n<ol>\n<li>\n<p><strong>監管可能重置區之醫院接收進程</strong>： 衛生局派員督導並監管接收端醫院（如部立屏東醫院等）迅速騰出空間，協助本院醫護與接收醫院同工進行<strong>「HICS 重新分組與功能整合」</strong>，使大連院區團隊能「即刻接管」指定的臨時病房或備援開刀房 。</p>\n</li>\n<li>\n<p><strong>啟動基層醫事人力協助與備援手術團隊調度</strong>： 若後撤病患湧入導致接收端醫護過勞，衛生局將<strong>啟動與徵召全縣之基層診所醫事人力、退休醫護志工到重置點進行支援</strong> ；必要時，可橫向<strong>調度其他不處於主戰區醫院之「備援手術團隊」</strong>進駐重置點臨時手術室，強力增加重大創傷手術之處置量能 。</p>\n</li>\n<li>\n<p><strong>視需要增設「臨時醫療站/急救站」</strong>： 若戰傷及避難民潮遠超醫院重置點之極限，衛生局將在重置醫院周邊，<strong>協調開設「臨時醫療站」或「第二型急救站」</strong>，擴充收治戰術空間 。</p>\n</li>\n<li>\n<p><strong>啟動血庫協同調度與「移動捐血車」部署</strong>： 若爆發大量傷患失血、庫存血液枯竭，衛生局將啟動<strong>血庫協同調度機制</strong>，與血液基金會（捐血中心）及南部軍醫院緊急對接 。 -   衛生局將調派<strong>血液基金會之「移動式捐血車」直接進駐所規劃的臨時急救站或安全重置點</strong> 。 -   配合本院檢驗科啟動的<strong>「走動式血庫（Walking Blood Bank）」</strong>計畫，協助就地進行安全活體採血與快篩 ，死守前線大出血病患之生命生命線 。</p>\n</li>\n</ol>"}]}, {"role": "合作醫院", "entries": [{"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認醫院所在區域即將淪為「主戰區」\n，並奉令啟動醫療核心能量之預防性全面撤離（HICS\n第三階段：全面撤離與量能重置）時 ：</p>\n<p><strong>合作醫院（區域聯防醫院）六大範疇的具體協調與聯聯合作戰作為</strong>：</p>\n<p>一、 啟動「醫療支援協定」與開設跨院單一聯繫窗口</p>\n<ol>\n<li>\n<p><strong>激活平時區域聯防協定</strong>： 聯絡官立即啟動與本院平時簽訂之「緊急災害應變相互支援協定」 。本院之核心合作聯防對象包含：<strong>衛生福利部屏東醫院（部屏）、寶建醫院、安泰醫院、屏東榮民總醫院（屏榮）</strong>等區域重鎮醫院 。</p>\n</li>\n<li>\n<p><strong>建立跨院直接指管通道</strong>： 聯絡官與各合作醫院的<strong>「急診室」或「院長室（指揮中心）」</strong>建立 24 小時不中斷之直接聯絡管道 。在常規電信可能因戰火癱瘓或斷網的狀態下 ，立即啟用專用之 UHF/VHF 無線電或低軌衛星電話等備援通訊 ，確保跨院對接訊息暢通 。</p>\n</li>\n</ol>\n<p>二、 落實「分散風險分流」以確認接收量能</p>\n<ol>\n<li>\n<p><strong>精算並確認接收病床數</strong>： 由聯絡官配合醫務部（執行部）及<strong>多元合作推動中心（原轉診中心）</strong> ，依據本院一線醫師所執行的「反向檢傷（Reverse Triage）」病患病情嚴重度與分類名冊 ，主動向各合作醫院逐一照會並確認<strong>「可接收的確切病人數」與「病床收治屬性」</strong>（如 ICU 床位、一般隔離病床或洗腎機台等） 。</p>\n</li>\n<li>\n<p><strong>貫徹分散風險原則，防範接收端崩潰</strong>： 為避免本院撤出的大量重症病人瞬間塞爆單一合作醫院而導致其醫療量能瞬間癱瘓，本院與衛生局 EOC 緊密對接 ，<strong>嚴格執行「分散式後送轉銜」</strong> ： -   將第四類<strong>高度照護（ICU/危急插管）病患</strong>，分散送往部屏、屏榮、安泰等具備同等急重症處置量能之醫院 。 -   將第三類<strong>一般住院（臥床）及第二類安置病患</strong>，下轉至周邊中度、一般級急救責任醫院或長照安置機構 。</p>\n</li>\n</ol>\n<p>三、 派遣「先遣團隊」赴合作醫院，打通行政與醫療通道</p>\n<ol>\n<li>\n<p><strong>主力撤離前派駐先遣部隊</strong>： 在本院主力撤離車隊（救護車及轉運接駁車）出發前，醫務部與行政支援組指示並委任一小組由資深護理師、病歷批掛人員及總務資材同工組成的<strong>「先遣團隊（Relocation Advance Team）」</strong>優先出發，趕赴各接收合作醫院 。</p>\n</li>\n<li>\n<p><strong>實地打通行政與空間對接</strong>： 先遣團隊抵達合作醫院後，立即進駐對方指定的接收區，<strong>打通本院病患轉入時的「臨時掛號、批價動線與病床物理分配」</strong> 。確保本院主力車隊抵達合作醫院時，病患不需在急診排隊推擠，能「即刻推入指定病房、直接收治」 。</p>\n</li>\n</ol>\n<p>四、 執行醫師對醫師跨院之詳細「臨床醫療交班」</p>\n<ol>\n<li>\n<p><strong>落實嚴謹的臨床 Handover 流程</strong>： 針對 Class 4 高度照護重症病患或必須持續高強度治療的 Class 3 臥床病患，在其登上後送救護車轉院前，本院急診轉運區值班醫師或原主治醫師，<strong>必須親自透過電話或無線電，與合作接收醫院的「對接接收醫師」完成詳細的「臨床醫療交班（Handover）」</strong> 。</p>\n</li>\n<li>\n<p><strong>確保維生設定完全一致</strong>： 交班內容必須逐一確認、核對並逐字覆誦（Read-back）病患當前的<strong>維生參數設定（如呼吸器設定值、強心劑與鎮靜劑劑量）、特殊過敏史、以及即時檢驗報告之危險值</strong> ，防範轉移途中與接收初期發生醫療中斷之致命疏失 。</p>\n</li>\n</ol>\n<p>五、 確保醫療文件與 72 小時「戰備物資」隨車無縫點交</p>\n<ol>\n<li>\n<p><strong>病歷資訊與病人隨行綁定</strong>： 由病房書記、病歷室與護理人員嚴格把關，確認每位轉運病患的手寫紙本<strong>「轉診單、病歷摘要、藥物治療紀錄（手寫處方箋）及檢驗報告」皆已備妥並裝入防水病歷袋中</strong> 。將病歷袋物理綁定（如貼上或綁好）於病患之擔架上，交予合作醫院，避免醫療資訊斷鏈 。</p>\n</li>\n<li>\n<p><strong>不給合作醫院帶來「突發性物資赤字」</strong>： 考量到大批病患瞬間湧入可能造成合作醫院的物資存量短時間內耗竭，本院後勤資材組與藥劑科<strong>必須準備足夠維持該病患 72 小時生存消耗之「個人專屬急救藥物、無菌靜脈輸液（林格氏液）或救命血液製品」隨車運送</strong> 。隨車物資直接點交給對方醫院儲放使用，展現有尊嚴、有擔當的聯防合作 。</p>\n</li>\n</ol>\n<p>六、 異地重置後之「功能重組與 HICS 指揮體系重建」</p>\n<ol>\n<li>\n<p><strong>撤離人員向合作醫院報到處登記</strong>： 隨車撤離的本院醫護人員（醫事人員撤離編組 A）抵達合作醫院後，立即向對方的重置指揮所報到 。</p>\n</li>\n<li>\n<p><strong>跨院 HICS 功能整合與功能重組</strong>： 計畫部門與醫務部配合，<strong>規劃將原機構及本院接收之醫事人力，依專長做重新之 HICS 規劃分組</strong> ： -   將本院的重症、外科手術團隊與合作醫院的團隊進行<strong>「功能整合與合併排班」</strong> ，迅速投入異地重置點的核心醫療與大量戰傷搶救任務 。 -   後勤與會計部門則與合作醫院管理層共同點檢、統合接收的物資設備，並隨時向縣市衛生局及 LJEOC 尋求短缺之後勤與簽證物資補給，維持戰地醫療網的永續戰鬥力 。</p>\n</li>\n</ol>"}]}, {"role": "外部供應商", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況「臺灣周邊海空域受封鎖或管制，物資配送延遲、員工到勤受阻與轉送不確定性提高」，當既有常規物流與長途供應鏈遭受阻斷時，醫院必須啟動緊急應變機制與<strong>外部供應商</strong>進行極限協調。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，由後勤部、行政/財務部（採購小組）、資材組與工務室共同主導外部供應商的協調與調度，其具體因應作為如下：</p>\n<p><strong>一、 啟動「在地替代供應商」與區域聯防體系</strong>\n面對聯外交通中斷與常規物流延遲，採購室必須立即停止常規採購作業，全面聯繫不受長途交通阻斷影響的<strong>「在地替代供應商」</strong>，確保基礎維生與醫療物資能就近補給：</p>\n<ol>\n<li>\n<p><strong>膳食與飲水替代供應商</strong>：若面臨停水或供餐中斷，第一優先協調<strong>本院便利商店（7-11）部立屏東醫院 HACCP 廚房、嘉軒美食有限公司</strong>）提供熱食供膳。飲水部分則緊急聯絡在地水商（如<strong>高山行山泉水、賀眾飲水/賀屏企業</strong>）購買礦泉水或山泉水以解決基本飲用與製備需求。</p>\n</li>\n<li>\n<p><strong>醫療氣體與燃油供應商</strong>：針對耗量極大的維生氣體與發電機柴油，緊急聯繫在地供應廠商（如<strong>信光氧氣行</strong>提供氧氣鋼瓶、<strong>台北氧氣公司</strong>提供液態氧）進行緊急調度。</p>\n</li>\n<li>\n<p><strong>啟動區域聯防調度</strong>：針對攸關性命的關鍵戰略藥品與衛材，採購人員須電洽屏東縣市簽有支援協定之合作醫院（如<strong>部立屏東醫院、寶建醫院、安泰醫院、屏東榮民總醫院</strong>），請求進行物資的緊急橫向調度借用。</p>\n</li>\n</ol>\n<p><strong>二、 血液與相關醫材之緊急運補與預先囤儲協調</strong>\n血液與醫材的供應在戰時具備不可替代性，院方須與血液基金會及主管機關進行緊密協調：</p>\n<ol>\n<li>\n<p><strong>提早調高庫存與分散囤儲</strong>：在預期動員令發布前 72 小時內，協調血液基金會將庫存目標調高至 10 天，並要求於發布前 24 小時內，將血液及相關醫材（如空血袋）提前分散囤儲至本院（重度級急救責任醫院），以應付後續交通受阻的問題。</p>\n</li>\n<li>\n<p><strong>醫材廠商調節生產與專案輸入</strong>：配合衛生福利部食品藥物管理署（TFDA）的統籌調度，協調國內醫療器材供應商調節產線，優先生產急需的戰傷醫材，或進行專案輸入供應。</p>\n</li>\n</ol>\n<p><strong>三、 基礎維生系統維護廠商之緊急支援與搶修</strong>\n醫院的基礎設施在戰時高壓環境下極易發生故障，工務室必須與外部機電維護廠商保持全天候的緊急聯繫：</p>\n<ol>\n<li>\n<p><strong>緊急搶修出勤</strong>：當高壓供電系統、緊急發電機、UPS（不斷電系統）或醫療氣體槽發生異常時，工務室會立刻通知簽約的維護廠商（如<strong>台電、明威發電機、先進/飛暢 UPS 維護、隆安機電</strong>等），要求立即派駐點工程師到院支援搶修。</p>\n</li>\n<li>\n<p><strong>啟動備援盲測</strong>：若因交通嚴重受阻或危安狀況導致維修廠商無法及時抵達，本院工程師將啟動系統強制手動切換（如手動切換 ATS 發電機供電、切換備用氧氣鋼瓶），以醫院自身的極限節流措施撐過孤島時期。</p>\n</li>\n</ol>\n<p><strong>四、 協調公權力介入運補與外部資源安全接收</strong>\n當民間外部供應商受限於交通管制或暴動而無法將物資送達時，必須協調公權力介入：</p>\n<ol>\n<li>\n<p><strong>政府徵用車輛跨區運送</strong>：透過本院聯絡官向「縣市聯合應變指揮中心」及地方衛生局（EOC）提出請求，協調調度、徵用大眾運輸車輛，或請求<strong>軍警消車輛</strong>護送緊急燃油、醫療氣體、血液與關鍵藥材，強行突破交通壅塞節點進入院區。</p>\n</li>\n<li>\n<p><strong>簽證物資的安全接收與保護</strong>：對於由外部供應商或政府運達的簽證物資與自行籌備物資，醫院必須訂定相關安全防護計畫及接受程序。由資材組與安全管制組配合，在院區設立「戰略物資地下補給站」或指定安全卸貨區，執行物資的點交、接收與實體防護，確保任何突破萬難抵達的救命資源不被恐慌群眾搶奪。</p>\n</li>\n</ol>"}]}]}];
</script>
<script>
const contentEl = document.getElementById('content');
const statsEl = document.getElementById('stats');
const noMatchEl = document.getElementById('noMatch');
const scenarioSelect = document.getElementById('scenarioSelect');
const scenarioBannerEl = document.getElementById('scenarioBanner');
const searchBarEl = document.querySelector('.search-bar');

const totalRoles = CATEGORIES.reduce((s,c)=>s+c.roles.length,0);
const totalEntries = CATEGORIES.reduce((s,c)=>s+c.roles.reduce((s2,r)=>s2+r.entries.length,0),0);
const totalScenarios = new Set(CATEGORIES.flatMap(c=>c.roles.flatMap(r=>r.entries.map(e=>e.scenario)))).size;

statsEl.innerHTML = `
  <div class="stat"><b>${totalRoles}</b><span>院內角色</span></div>
  <div class="stat"><b>${totalScenarios}</b><span>特別狀況</span></div>
  <div class="stat"><b>${totalEntries}</b><span>因應作為條目</span></div>
`;

// build scenario index: sid -> {title, desc}
const scenarioIndex = {};
CATEGORIES.forEach(c => c.roles.forEach(r => r.entries.forEach(e => {
  if(!scenarioIndex[e.scenario]) scenarioIndex[e.scenario] = {title: e.title, desc: e.desc};
})));
const scenarioIds = Object.keys(scenarioIndex).sort((a,b) => {
  const [a1,a2] = a.split('-').map(Number);
  const [b1,b2] = b.split('-').map(Number);
  return a1-b1 || a2-b2;
});

// populate the scenario picker, grouped by major number
const groups = {};
scenarioIds.forEach(sid => {
  const major = sid.split('-')[0];
  (groups[major] = groups[major] || []).push(sid);
});
Object.keys(groups).sort().forEach(major => {
  const optgroup = document.createElement('optgroup');
  optgroup.label = `特別狀況 ${major}`;
  groups[major].forEach(sid => {
    const opt = document.createElement('option');
    opt.value = sid;
    opt.textContent = `情境 ${sid}　${scenarioIndex[sid].title}`;
    optgroup.appendChild(opt);
  });
  scenarioSelect.appendChild(optgroup);
});

function renderByRole(){
  scenarioBannerEl.innerHTML = '';
  searchBarEl.style.display = '';
  contentEl.innerHTML = '';
  CATEGORIES.forEach(cat => {
    if(cat.roles.length === 0) return;
    const catDiv = document.createElement('div');
    catDiv.className = 'cat';
    catDiv.dataset.cat = cat.id;
    catDiv.innerHTML = `<div class="cat-head"><span>${cat.name}</span><span class="count">${cat.roles.length} 個角色</span></div>`;

    const rolesDiv = document.createElement('div');
    rolesDiv.className = 'roles';

    cat.roles.forEach((roleObj) => {
      const el = document.createElement('div');
      el.className = 'role';
      el.dataset.role = roleObj.role;

      const scenariosHtml = roleObj.entries.map((entry, idx) => `
        <div class="scenario">
          <button class="scenario-head">
            <span class="scenario-tag">情境 ${entry.scenario}</span>
            <span class="scenario-title-wrap">
              <span class="scenario-title">${entry.title}</span>
            </span>
            <span class="chev">▾</span>
          </button>
          <div class="scenario-body">
            <div class="scenario-body-inner">
              <div class="scenario-desc">${entry.desc}</div>
              <div class="answer">${entry.html}</div>
            </div>
          </div>
        </div>
      `).join('');

      el.innerHTML = `
        <button class="role-head">
          <span class="role-name">${roleObj.role}</span>
          <span class="role-count">${roleObj.entries.length} 則情境</span>
          <span class="chev">▾</span>
        </button>
        <div class="role-body">
          <div class="role-body-inner">${scenariosHtml}</div>
        </div>
      `;
      rolesDiv.appendChild(el);
    });

    catDiv.appendChild(rolesDiv);
    contentEl.appendChild(catDiv);
  });
}

function renderByScenario(sid){
  searchBarEl.style.display = 'none';
  noMatchEl.style.display = 'none';
  const meta = scenarioIndex[sid];
  scenarioBannerEl.innerHTML = `
    <div class="scenario-banner">
      <span class="tag">情境 ${sid}</span>
      <div class="title">${meta.title}</div>
      <div class="desc">${meta.desc}</div>
    </div>
  `;

  contentEl.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const matched = cat.roles
      .map(r => ({ role: r.role, entry: r.entries.find(e => e.scenario === sid) }))
      .filter(x => x.entry);
    if(matched.length === 0) return;

    const catDiv = document.createElement('div');
    catDiv.className = 'cat';
    catDiv.innerHTML = `<div class="cat-head"><span>${cat.name}</span><span class="count">${matched.length} 個角色</span></div>`;

    const rolesDiv = document.createElement('div');
    rolesDiv.className = 'roles';

    matched.forEach(({role, entry}) => {
      const el = document.createElement('div');
      el.className = 'role';
      el.dataset.role = role;
      el.innerHTML = `
        <button class="role-head">
          <span class="role-name">${role}</span>
          <span class="chev">▾</span>
        </button>
        <div class="role-body">
          <div class="role-body-inner">
            <div class="answer">${entry.html}</div>
          </div>
        </div>
      `;
      rolesDiv.appendChild(el);
    });

    catDiv.appendChild(rolesDiv);
    contentEl.appendChild(catDiv);
  });
}

renderByRole();

scenarioSelect.addEventListener('change', () => {
  const sid = scenarioSelect.value;
  if(sid === ''){
    renderByRole();
  } else {
    renderByScenario(sid);
  }
});

// Level 1 toggle: role
contentEl.addEventListener('click', (e) => {
  const roleHead = e.target.closest('.role-head');
  if(roleHead){
    const role = roleHead.closest('.role');
    role.classList.toggle('open');
    return;
  }

  // Level 2 toggle: scenario
  const scenarioHead = e.target.closest('.scenario-head');
  if(scenarioHead){
    const scenario = scenarioHead.closest('.scenario');
    scenario.classList.toggle('open');
    return;
  }
});

const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let anyMatch = false;
  document.querySelectorAll('.cat').forEach(catDiv => {
    let catHasMatch = false;
    catDiv.querySelectorAll('.role').forEach(roleDiv => {
      const name = roleDiv.dataset.role.toLowerCase();
      const match = q === '' || name.includes(q);
      roleDiv.style.display = match ? '' : 'none';
      if(match) catHasMatch = true;
    });
    catDiv.style.display = catHasMatch ? '' : 'none';
    if(catHasMatch) anyMatch = true;
  });
  noMatchEl.style.display = anyMatch ? 'none' : 'block';
});
</script>
</body>
</html>
