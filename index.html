大門出口」將被設立為救護車的專屬「接運疏散區」</strong>。</p>\n</li>\n<li>\n<p><strong>動線分流管制</strong>：急診部須配合安全管制組（警衛），嚴格管制急診前車道僅限救護車進入，並將「可提早出院/返家」的輕症病患引導至門診大廳大門出口搭乘接駁車，避免與需要高度照護病患的救護車動線發生交岔與壅塞。</p>\n</li>\n</ol>\n<p><strong>三、 執行重症後撤轉院與「醫療交接」</strong>\n對於被分類為「高度照護（如依賴維生設備的危急病患）」與「一般住院」且必須轉院的病患：</p>\n<ol>\n<li>\n<p><strong>協助跨院交接</strong>：當病患被送至急診轉運區等待救護車時，急診醫師須協助原主治醫師與接收端醫院進行電話交班，並確認轉診事宜。</p>\n</li>\n<li>\n<p><strong>戰備物資與病歷隨行</strong>：急診護理人員須嚴格確認，每位準備上救護車轉運的病患，其轉診單、病歷摘要等醫療紀錄皆已備妥；同時必須確保有足夠的急救藥物、靜脈輸液等物資<strong>與病人一起運送</strong>至接收醫院，防止轉送途中發生醫療斷鏈。</p>\n</li>\n</ol>\n<p><strong>四、 評估疏散量能與啟動「大量傷患機制（急診 333）」</strong></p>\n<ol>\n<li>\n<p><strong>量能監控與通報</strong>：在撤離過程中，若同時伴隨外部大量傷患湧入，導致急診無法負荷（如一般傷患超過十五名、重傷患超過五名），急診部主任須立即評估並向指揮官報告，啟動「急診\n    333（大量傷患緊急醫療救護應變計畫）」。</p>\n</li>\n<li>\n<p><strong>請求外部疏散支援</strong>：當傷患超過本院收置與運輸能力範圍時，急診部須透過聯絡官或自行通報衛生局緊急醫療網（EOC），請求外部協助調度救護車與安排轉院疏散。</p>\n</li>\n</ol>\n<p><strong>五、 執行急診服務降載與死守「紅區」維生底線</strong></p>\n<ol>\n<li>\n<p><strong>急診降載管制</strong>：在執行大規模撤離與分流期間，急診部須執行降載。將輕症病人轉至門診或基層院所，必要時暫停收治新的非緊急住院病人（只出不入），以集中火力處理重症病患的維生與後撤。</p>\n</li>\n<li>\n<p><strong>死守維生資源</strong>：急診搶救區（紅區）是醫院的生命線。在撤離的混亂甚至可能伴隨停電的孤島狀態下，急診部須死守備用電力與醫療氣體，確保那些「因高度依賴維生設備而尚在等待救護車」的重症病患，在急診室內能獲得持續且不中斷的生命支持。</p>\n</li>\n</ol>\n<p>後勤部如何維持停水停電下的膳食與飲水？</p>\n<p>後勤部長在緊急物資與通訊調度上有哪些具體權責？</p>\n<p>若醫療氣體配送受阻，後勤部門如何接收與保管物資？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認醫院所在區域即將進入「主戰區」，且指揮中心下達啟動\n<strong>HICS 第三階段「全面撤離與量能重置」</strong>的最高預防性全面撤離命令時\n：</p>\n<p>在\nHICS（醫院事故指揮系統）體系下，<strong>急診部主任將擔任執行部門（Operations\nSection）的副部長兼「醫療照護主管（O1）」</strong>，同時主責「醫療應變與傷患搶救組」\n。急診部作為全院檢傷分類、重症生命支持與後送車輛轉運的「最前線指揮咽喉」，必須立刻由常規診療模式切換至<strong>「戰地撤離與轉運模式」</strong>\n，採取以下<strong>六大範疇之具體生存抗擊與實兵撤離作為</strong>，死守高屏醫療韌性底線：</p>\n<p>一、 執行強勢「反向檢傷（Reverse Triage）」，極速降載清空急診</p>\n<p>為迎擊大批撤離病患的集結，以及預防因戰火衍生之大量戰傷病患，急診部必須迅速排除醫患情感，強力執行降載清空\n：</p>\n<ol>\n<li>\n<p><strong>急診留觀病患「極速清空」</strong>：急診部主任（O1）指示一線醫師強制評估急診留觀區病患，將生命徵象穩定、可改口服藥或門診追蹤的病患，迅速辦理出院 。配合會計組啟動<strong>「戰時記帳豁免機制」</strong>，病患免排隊、零元結帳，迅速在 <strong>4 小時內</strong> 疏散離院，極速清空急診空間 。</p>\n</li>\n<li>\n<p><strong>騰出「彈性擴充量能（Surge Beds）」集結區</strong>：將急診搶救室、觀察室清空出來的病床全部鋪上<strong>戰備床單</strong>，使急診前廳與入口處重構為<strong>「重症病患等待後撤轉運之集結紅區」</strong>，確保病患在被送上轉運車前，能獲得不中斷的生命支持 。</p>\n</li>\n</ol>\n<p>二、 開設並鋼鐵管制「救護車接運疏散區」，實施動線絕對分流</p>\n<p>大批病患撤離極易引發院區周邊交岔壅塞與群眾恐慌，急診部必須協同安全管制組（保安組）實施最嚴格的物理邊界與動線管制\n：</p>\n<ol>\n<li>\n<p><strong>守護重症通道（急診室大門出口）</strong>：急診部配合工務與保安組，將<strong>「醫院急診室大門出口（急診車道）」設立為簽證救護車的專屬「接運疏散區」</strong> ，嚴禁任何家屬私人車或一般載具進入，確保高度照護病患的擔架與隨車氧氣設備能暢通無阻地上車 。</p>\n</li>\n<li>\n<p><strong>輕症與一般安置病患引導分流</strong>：急診高階護理師進駐<strong>「聯合檢查站」</strong> ，將被判定為「第一類（可返家）」或「第二類（安置）」的輕症及行動方便者，一律引導向<strong>「醫院門診大廳大門出口」搭乘行政接駁中巴</strong> ，實施鋼鐵般的動線分流 ，徹底防範急診車道在戰火迫近時癱瘓 。</p>\n</li>\n</ol>\n<p>三、 執行重症後撤轉院，死守「跨院醫療交班」與「人藥一對一隨行」</p>\n<p>急診部必須確保高度照護重症病患（如加護病房病患、插管使用可攜式呼吸器者）在轉運至目標合作醫院途中，資訊、藥物與血液絕不斷鏈\n：</p>\n<ol>\n<li>\n<p><strong>落實醫師對醫師「跨院醫療交班（Handover）」</strong>：重症病患被送入急診轉運區等待救護車時，急診值班醫師必須親自透過電話或備援無線電，與衛生局緊急醫療網（EOC）排定接收之合作醫院醫師（如屏醫、寶建、安泰、屏榮）完成詳細的<strong>「醫療交班」</strong> ，逐一交代病患之危管數據、所需隨車維生設備（如氧氣、精密幫浦）及轉診接收細節 。</p>\n</li>\n<li>\n<p><strong>死守隨車病歷與「72小時戰備藥耗材」綁定隨行</strong>： -   <strong>醫療文件隨車隨行</strong>：急診護理人員與病房書記嚴格查驗，確認病患的手寫轉診單、紙本病歷摘要、藥物治療與用藥處方箋<strong>裝入防水夾鏈袋，確實與病人手圈綁定，隨同救護車出發</strong> 。 -   <strong>72小時生存物資盲派</strong>：急診部必須向後勤資材組（L2）與藥劑科確認，隨同高度照護與一般住院轉院病患的救護車上，<strong>必須與病人同車運送足量林格氏液、強效麻醉鎮痛藥劑（如 Ketamine）及血庫 O 型全血</strong> ，徹底防範因路途塞車、戰火阻斷而使病患在抵達接收端前陷入維生耗材見底的瀕死絕境 。</p>\n</li>\n</ol>\n<p>四、 預備「無頭狀態（Headless State）」下之指揮權自動繼承與決策</p>\n<p>由于本院即將成為主戰區，若在撤退初期發生突發空襲、聯外高屏大橋炸毀，導致院長與副院長等核心指揮官遇襲、受困或與院內完全失去聯絡時，急診部主任必須承擔起本院防衛的「最高兵符」\n：</p>\n<ol>\n<li>\n<p><strong>依法 5 分鐘自動順位繼承</strong>：急診部主任作為全院當值最高層級的臨床主管 ，一旦判定指揮中心失聯達 15 分鐘，必須立即克服恐懼，<strong>於 5 分鐘內自動接管全院指揮權，披上紅色的事故指揮官（Incident Commander）背心</strong> 。</p>\n</li>\n<li>\n<p><strong>黃金 10 分鐘決策下達</strong>：繼任指揮官後，立即進駐地下指揮所（恩慈大樓 B1 會議室或 B2 指揮中心） ，於 10 分鐘內透過全院廣播（或派傳令兵）發布第一道指揮官動員令 ：<em>「本院高層失聯，即刻由急診部接管兵符。全院暫停所有非緊急常規業務，執行部 O1 立即協同後勤 L1 優先實施高度照護病患與戰略用血之預防性轉移！」</em> 。</p>\n</li>\n</ol>\n<p>五、 戰時資訊全黑與斷訊下，暴力降級啟動「Downtime作業」</p>\n<p>若預防性撤退期間伴隨著駭客 APT 攻擊、大停電或基地台毀損，導致院內 IBM\nHIS、PACS 及電子病歷系統全面大癱瘓，急診部立即切換至「類比無網作業」\n：</p>\n<ol>\n<li>\n<p><strong>暴力砸開「當機緊急箱（Downtime Box）」</strong>：急診護理站不等待修復，立即砸破封條 ，取出預印的三聯式紙本病歷、紙本檢傷分類單、手寫處方箋及每日離線下列印之最新住院病人名單，全面實施人工紙本作業 。</p>\n</li>\n<li>\n<p><strong>嚴格執行危險值口頭覆誦「Read-back」機制</strong>：在系統當機、檢驗資訊系統（LIS）中斷下，急診護理師接獲 4F 檢驗科以對講機、分機電話通報病患配血快篩或 Hb（血紅素）危險值時，<strong>必須大聲唸出「病患姓名、病歷號碼與檢驗數據」向通報者進行 Read-back（逐字口頭覆誦雙重確認）</strong> ，經雙重核對無誤後始得給藥、用血，嚴防混亂中的給藥與用血錯誤 。</p>\n</li>\n<li>\n<p><strong>啟用「徒步傳令兵（Runner）機制」</strong>：若院內電話與通訊完全阻斷，急診部配合總務部派出的穿著反光背心的行政傳令兵（Runner），持「實體簽收簿（Logbook）」，以徒步人手傳遞、人工口令覆誦的方式 ，在急診、馬太 B1 藥庫與 B1 臨時手術室（韓偉 B1 腹膜透析室）之間精準遞送緊急處方、配血單與疏散災情報告 。</p>\n</li>\n</ol>\n<p>六、 撤退中遭遇突發大量傷患，即刻宣告「急診 333」應變</p>\n<p>若在預防性撤離病患之混亂過程中，周邊突遭主戰區之波擊，救護車送入大量因爆震、破片受傷之軍民，超出急診原有負荷時\n：</p>\n<ol>\n<li>\n<p><strong>啟動「急診 333」與跨科召回</strong>：當大量戰傷病患瞬間湧入急診（達到內科系同時間 1-2 級病人超過 8 人，或外科系同時間 1-2 級病人超過 3 人之門檻時） ，急診當班資深醫師必須立即報告指揮官，請總機廣播「急診 333」三次 ，群呼緊急召回居住本院 1 公里內（第一波召回 47 名護理、31 名醫務同工）之醫護戰力至急診紅區、黃區報到支援 。</p>\n</li>\n<li>\n<p><strong>大廳與地下功能區之「空間戰術轉置」</strong>：急診創傷團隊配合總務部，於 30 分鐘內清空一樓門診大廳的所有候診椅，將其轉換為「大量傷患一線檢傷區（Triage Area）」與「綠區輕傷縫合包紮區」 ，強勢將大量恐慌之輕傷患阻絕於核心搶救區外 ；重症轉送至 <strong>約翰／馬可大樓 B1 備援 ICU</strong> 或 <strong>韓偉大樓 B1 臨時開刀房</strong> 執行損傷控制手術 ，死守前線生命線。</p>\n</li>\n</ol>"}]}, {"role": "病房", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報各項量能。病房作為醫院收治與留置病患的核心區域，必須配合HICS（醫院事故指揮系統）體系，迅速執行量能盤點與極限醫療降載，以騰出戰時所需的擴充量能。病房的具體因應作為如下：</p>\n<p><strong>一、 迅速盤點病房量能並提交回報數據</strong>\n病房單位須立即清點現有住院病患人數、空床數及當班/可動用的護理人力，並確實編製「床位名冊」與「病人動向資料」。相關數據需迅速通報給護理部與HICS計畫部轄下的「資源控管組」及「狀況分析組」，以利統籌呈報組（危管會）能精確彙整，於時限內向主管機關完成量能初報與續報。</p>\n<p><strong>二、 配合執行「反向檢傷」與極限病床降載</strong>\n戰時必須將有限資源留給多數戰傷病患，病房需立即啟動極限醫療降載（Surge\nDischarge）：</p>\n<ol>\n<li>\n<p><strong>4小時極速清空：</strong>\n    針對病房內原本預計1至3天內出院的輕症病患或穩定待觀察病患，啟動極速結帳（或戰時記帳豁免），目標於4小時內完成安全疏散返家。</p>\n</li>\n<li>\n<p><strong>配合反向檢傷（Reverse Triage）：</strong>\n    配合由平時不負責該病房的資深主任級醫師所組成之「反向檢傷特別小組」進入病房，強制評估並篩選出「拔除靜脈點滴或提早出院，在72小時內不會立即危及生命」的病患，辦理緊急下轉至基層診所或長照機構。</p>\n</li>\n<li>\n<p><strong>達成降載目標：</strong>\n    必須於24小時內強行騰出至少30%至40%的急重症病床空間，並配合全院於<strong>48小時內將住院病人降載至30%</strong>的總目標。</p>\n</li>\n</ol>\n<p><strong>三、 執行病人轉送與出院安置計畫</strong>\n對於無法立即出院且需要持續醫療照護的病患，病房需會同主治醫師擬定「病人出院及轉院計畫」。</p>\n<ol>\n<li>\n<p>護理人員需盤點轉送這些病人所需的交通載具（如救護車）與隨車照護的醫護人力需求。</p>\n</li>\n<li>\n<p>確實準備病人的病歷摘要、用藥紀錄與交接資料，協助病患分級與轉銜，以利後撤與異地持續照護的順利進行。</p>\n</li>\n</ol>\n<p><strong>四、 戰備病床轉換與空間降階防護整備</strong></p>\n<ol>\n<li>\n<p><strong>戰傷病房轉換：</strong>\n    病房內所有被清空出來的病床，必須立即換上戰備床單，將一般病房迅速轉換為戰傷病房，準備迎接隨時湧入的大量傷病患。</p>\n</li>\n<li>\n<p><strong>預備就地掩蔽（Defend in Place）：</strong>\n    針對高脆弱區的病房，需演練在空襲警報響起時，將病床迅速推離玻璃帷幕與靠窗區域，移至建築物的「核心內筒」（如無窗戶的內部走廊、梯廳、浴室等）進行防爆掩蔽。</p>\n</li>\n<li>\n<p><strong>因應維生資源限縮：</strong>\n    病房團隊必須準備應對戰時的「電力負載卸除（Load\n    Shedding）」，屆時一般病房的電源迴路與冷氣空調將被強制切斷以保留給重症紅區；同時需配合極限節流，實施嚴格的水資源配給（如嚴禁病患盥洗、使用化學便器袋等）。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨戰災破壞與基礎設施中斷的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>病房單位（各護理站）</strong>位處於保護住院病患生命安全的最前線。面對停電、停水、斷氣、當機與火警等多重威脅，病房單位的具體因應作為如下：</p>\n<p><strong>一、 應對震波、火警之「初期應變與就地掩蔽」</strong></p>\n<ol>\n<li>\n<p><strong>就地防爆掩蔽（Defend in\n    Place）</strong>：若遭遇空襲震波或爆炸且無法立即下樓，加護病房與一般病房人員須迅速將病床推離靠窗區域，移至建築物的「核心內筒（如無窗戶的內部走廊、浴室）」進行防爆掩蔽，並拉下所有防爆窗簾。</p>\n</li>\n<li>\n<p><strong>火警初期滅火與侷限</strong>：若震動引發火警，發現者須大喊「失火了」並按下消防警鈴，就近使用滅火器（操作口訣：拉、瞄、壓、掃）進行初期滅火。</p>\n</li>\n<li>\n<p><strong>病房淨空與防煙</strong>：若火勢無法控制，應立即協助將病患及家屬移出病房，並將病房門關上（必要時以布單塞住門縫）以侷限火煙。確認房間（含浴室、櫥櫃）皆已淨空後，在門口設置打叉標示，防止人員誤闖。</p>\n</li>\n</ol>\n<p><strong>二、 應對電梯停用之「極限病患疏散與搬運」</strong>\n當高樓層病房面臨結構受損或火勢威脅，且電梯因電力瞬斷停用時：</p>\n<ol>\n<li>\n<p><strong>水平與垂直疏散</strong>：疏散原則為「先平行、再垂直」。優先將病患水平疏散至防火門另一側的鄰近安全棟別，若仍不安全再往低樓層或一樓門診大廳疏散。</p>\n</li>\n<li>\n<p><strong>無動力人工搬運</strong>：病房護理與支援人員須以純人力進行搬運（人力搬運原則為\n    5\n    人一組）。行動不便或昏迷的病患，可利用被單包覆拖曳移動；重症病患則須利用可攜式蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，經安全梯接力垂直疏散。</p>\n</li>\n<li>\n<p><strong>集結點名與動向追蹤</strong>：到達指定安全集結區後，病房單位須立即進行第一時間點名，清查病患與員工數量，並向指揮官回報病患動向。</p>\n</li>\n</ol>\n<p><strong>三、 應對水、電、氣中斷之「死守維生底線」</strong></p>\n<ol>\n<li>\n<p><strong>極限人工給氧（捏球大隊）</strong>：若中央氧氣系統因震損失去壓力，病房人員須在\n    3\n    分鐘內將重症病患切換至備用氧氣鋼瓶。若鋼瓶與電動呼吸器皆因斷電耗盡，病房須立即組織護理人員、行政人員或輕傷家屬成立「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持重症病患呼吸。</p>\n</li>\n<li>\n<p><strong>醫療降載與反向檢傷</strong>：配合資深醫師組成的「反向檢傷特別小組」，快速評估病房內「拔除點滴或提早出院不會立即危及生命」的穩定病患，強行辦理出院或下轉，極速騰出病床資源。</p>\n</li>\n<li>\n<p><strong>水資源極度管制</strong>：停水期間，病房須嚴格執行水資源管制。最乾淨的水僅供基本維生飲用與器械消毒，嚴禁一般盥洗，全面改用乾洗手液維持手部衛生。</p>\n</li>\n</ol>\n<p><strong>四、 應對通訊與系統當機之「紙本降級（Downtime）」作業</strong>\n若震波或駭客攻擊導致醫院 HIS 系統及網路全面癱瘓：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機緊急箱</strong>：各護理站須立即砸破封條，取出預先準備的「當機緊急箱（Downtime\n    Box）」，全單位強制作業模式轉換。</p>\n</li>\n<li>\n<p><strong>回歸人工紙本</strong>：停止依賴電腦，全面改用三聯式紙本病歷、手寫處方箋與離線列印的住院名單進行醫療紀錄與給藥，確保給藥與治療不中斷。</p>\n</li>\n<li>\n<p><strong>傳令兵（Runner）機制</strong>：在對講機與電話皆失效的狀態下，配合院內啟動的「傳令兵」制度，將緊急醫囑、檢驗需求以手寫紙本交由穿著反光背心的傳令兵，以徒步方式精準遞送至藥局、檢驗科或備援開刀房。</p>\n</li>\n</ol>\n<p>地下室備援醫療空間如何配置？</p>\n<p>資訊室如何應對紙本降級作業？</p>\n<p>工務室如何分配緊急發電機電力？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，此時醫院面臨敵方實體攻擊、高爆炸火災風險以及維生系統（電力與氧氣）雙重中斷的極端毀滅性危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>病房單位（各護理站）</strong>位處於保護住院病患生命安全的最前線，面對停電、斷氣、爆炸威脅與潛在的通訊中斷，必須立刻切換為極限維生與防護模式。其具體因應作為如下：</p>\n<p><strong>一、 應對液氧洩漏與中斷：執行「極限人工給氧」</strong></p>\n<ol>\n<li>\n<p><strong>緊急切換備用鋼瓶</strong>：若機電棟中央液氧槽受損導致供氧管線失去壓力，病房人員必須在 3 分鐘內，將重症病患迅速切換至床邊的備用氧氣鋼瓶。</p>\n</li>\n<li>\n<p><strong>成立「捏球大隊」肉搏戰</strong>：若備用氧氣鋼瓶與電動呼吸器皆因斷電耗盡，病房須立即動員護理人員、行政人員或輕傷家屬組成<strong>「捏球大隊」</strong>。以手動甦醒球（Ambu bag）進行人工捏球接力，以純人力維持重症病患的呼吸與生命徵象，這將是一場體力與意志力的極限肉搏戰。</p>\n</li>\n</ol>\n<p><strong>二、 應對爆炸威脅：啟動「就地防爆掩蔽」與「無動力疏散」</strong></p>\n<ol>\n<li>\n<p><strong>就地防爆掩蔽（Defend in Place）</strong>：若遭遇無人機爆炸震波、火警威脅且無法立即下樓，病房人員須在不斷開呼吸器等維生儀器的情況下，將病床迅速推離靠窗區域與玻璃帷幕。移至建築物的<strong>「核心內筒」</strong>（如無窗戶的內部走廊、電梯梯廳或浴室）進行防爆掩蔽，並拉下所有防爆窗簾，以防碎玻璃造成二次殺傷。</p>\n</li>\n<li>\n<p><strong>無動力垂直疏散</strong>：若機電棟火勢蔓延或高樓層結構受損，且電梯因發電機受損停用，病房護理與支援人員須以純人力進行搬運（原則為 5 人一組）。針對插滿管路的重症病患，利用可攜式蓄電池呼吸器及<strong>「樓梯疏散滑墊（軟擔架）」</strong>，經由安全梯接力垂直疏散至低樓層或地下室避難。</p>\n</li>\n<li>\n<p><strong>集結點名與動向追蹤</strong>：到達指定安全集結區後，病房單位須立即進行第一時間點名，清查病患與員工數量，並向指揮中心回報病患動向，確保無人在混亂中遺漏。</p>\n</li>\n</ol>\n<p><strong>三、 應對發電機受損：配合「極限負載卸除」與資源管制</strong></p>\n<ol>\n<li>\n<p><strong>承受電源強制切斷</strong>：因主發電機受損，工務室將執行冷酷的<strong>「電力負載卸除（Load Shedding）」</strong>。病房單位必須配合並接受一般病房、行政區與冷氣空調的電源迴路被強制手動切斷，將全院僅存的寶貴備用電力，絕對保留給開刀房、ICU 與急診等重症紅區。</p>\n</li>\n<li>\n<p><strong>水資源極度管制</strong>：若爆炸波及自來水管線伴隨停水危機，病房須嚴格執行水資源管制。最乾淨的水僅供基本維生飲用與必要醫療處置，嚴禁一般盥洗，全面改用乾洗手液維持手部衛生，以防院內感染。</p>\n</li>\n</ol>\n<p><strong>四、 應對伴隨之通訊中斷：全面轉入「紙本降級（Downtime）」作業</strong></p>\n<ol>\n<li>\n<p><strong>暴力啟用當機箱</strong>：若爆炸或駭客攻擊導致 HIS 系統及網路全面癱瘓，各護理站須立即砸破封條，取出預先準備的<strong>「當機緊急箱（Downtime Box）」</strong>，全單位強制作業模式轉換。</p>\n</li>\n<li>\n<p><strong>回歸人工紙本</strong>：停止依賴電腦，全面改用三聯式紙本病歷、手寫處方箋與每日離線列印的住院名單進行醫療紀錄與給藥，確保核心治療不中斷。</p>\n</li>\n<li>\n<p><strong>傳令兵（Runner）機制</strong>：在對講機與電話皆失效的狀態下，配合院內啟動的最古老抗干擾通訊------「傳令兵」制度。將緊急醫囑、檢驗需求以手寫紙本交由穿著反光背心的傳令兵，以徒步方式精準遞送至藥局或備援開刀房。</p>\n</li>\n</ol>\n<p><strong>五、 配合醫療極速降載：執行「反向檢傷（Reverse Triage）」</strong></p>\n<ol>\n<li>\n<p><strong>強制評估與極速騰出空床</strong>：配合由平時不負責該病房的資深醫師所組成的「反向檢傷特別小組」，快速評估病房內「拔除點滴或提早出院不會立即危及生命」的穩定病患。</p>\n</li>\n<li>\n<p><strong>辦理下轉與出院</strong>：將這些輕症病患強行辦理提早出院或下轉至基層診所，極速騰出病床資源與擴充量能（Surge Capacity），準備迎接無人機攻擊與戰火所產生的大量急重症戰傷病患。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>在\nHICS（醫院事故指揮系統）架構下，面對主管機關要求進行部分撤離與病患分流的極限挑戰，<strong>病房單位（包含各病房護理站、病房主治醫師與支援人員）</strong>位處於執行醫療降載、病患防護與實體疏散的最前線。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 配合執行「反向檢傷（Reverse Triage）」與病患精準分級</strong></p>\n<ol>\n<li>\n<p><strong>強勢評估與分類</strong>：病房醫護人員須配合由資深醫師組成的「反向檢傷特別小組」，進入病房對現有住院病患進行強勢評估，並將病人精準分類造冊。</p>\n</li>\n<li>\n<p><strong>落實四級分流</strong>：</p>\n<ul>\n<li>\n<p><strong>可返家（行動方便者）</strong>：拔除靜脈點滴，評估在 72\n    小時內不會立即危及生命的穩定病患，安排提早出院。</p>\n</li>\n<li>\n<p><strong>安置（需扶持者）</strong>：無立即危險但需照護，暫時由家屬帶回照顧，或辦理下轉至基層診所與長照機構。</p>\n</li>\n<li>\n<p><strong>一般住院（臥床者）</strong>：需持續醫療照護，考量移至院內安全病房，或轉送至其他醫院。</p>\n</li>\n<li>\n<p><strong>高度照護（危急病人）</strong>：依賴維生設備或加護病房之重症患者，優先評估轉送風險，並安排具備重症收治能力之醫院進行重置。</p>\n</li>\n</ul>\n</li>\n</ol>\n<p><strong>二、 執行「極速醫療降載」與提早出院辦理</strong></p>\n<ol>\n<li>\n<p><strong>極速清空病床</strong>：針對被判定為「可返家」或「安置」的輕症與穩定病患，病房單位須協助病患與家屬迅速辦理緊急出院手續。配合行政部門的戰時記帳豁免機制，目標在\n    24 小時內強行騰出大連院區至少 30% 至 40%\n    的急重症病床空間，並換上戰備床單。</p>\n</li>\n<li>\n<p><strong>動線分流</strong>：引導提早出院的病患使用醫院大廳出口離院，將急診室大門出口保留給需要救護車轉運的重症病患，避免動線交岔與壅塞。</p>\n</li>\n</ol>\n<p><strong>三、 執行病房疏散、房間淨空與無動力搬運</strong></p>\n<ol>\n<li>\n<p><strong>疏散原則與保暖</strong>：疏散時遵循「先平行、再垂直」的原則，方向必須一致以防衝突。行動方便的病人於房間內疏散時，病房須發給每人被單一條予以保暖。</p>\n</li>\n<li>\n<p><strong>無動力人工搬運</strong>：若電梯停用且病患無法行走或昏迷，病房人員可利用被單包裹拖曳移動；針對插滿管路的重症病患，則利用可攜式蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，以純人力接力（通常為\n    5 人一組）經安全梯進行垂直疏散。</p>\n</li>\n<li>\n<p><strong>嚴格執行房間淨空（Room\n    Clearance）</strong>：病患移出後，病房人員必須徹底清查房間內的其他空間（如浴室、櫥櫃）是否皆已淨空。確定淨空後，必須在門口設置標示（如打叉）或關閉房門，防止人員在混亂中誤闖或遺漏。</p>\n</li>\n</ol>\n<p><strong>四、 暫時留置區安置與清點排序</strong></p>\n<ol>\n<li>\n<p><strong>分區留置與管制</strong>：將病患移出病房後，送至指定的暫時留置區（如門診大廳或安全棟別），並依據狀況分為「穩定/家屬留置區」與「需要醫療處理區」，由醫護人員在現場持續提供照護，並防止病患進入危險區域或阻礙救護車道。</p>\n</li>\n<li>\n<p><strong>全面清點與轉運排序</strong>：在留置區內，病房護理人員必須立刻清查所有病人的數量與動向，確保無人遺漏。並根據病人的緊急情況，列出處理與轉運的清單及「先後順序」，以便當後送救護車或接駁車到達時，能有條不紊地將病患送上車。</p>\n</li>\n</ol>\n<p><strong>五、 確保「醫療紀錄與戰備物資」隨車無縫交接</strong>\n在病患後撤與轉送的過程中，病房護理人員是確保醫療照護不中斷的最後防線：</p>\n<ol>\n<li>\n<p><strong>醫療文件隨行與造冊</strong>：護理人員必須確認每位轉運病患皆有留下完整的文件紀錄（包含：病人姓名、病歷號碼、疾病分類、接收醫院名稱、運送車輛資料及隨行人員）。並確保病患的「轉診單、病歷摘要、藥物治療紀錄及檢驗報告」確實與病人搭配，隨車移出交接給接收醫院。</p>\n</li>\n<li>\n<p><strong>救急物資隨車</strong>：針對「高度照護」與「一般住院」的轉運病患，病房單位需與後勤資材組協調，確保有足夠量的急救藥物、靜脈輸液或血液製品<strong>與病人一起運送</strong>到接收醫院，避免在轉送途中或剛抵達接收端時發生醫藥存量耗竭的致命危機。</p>\n</li>\n</ol>\n<p>本院如何執行反向檢傷以評估哪些病患需優先撤離？</p>\n<p>若通訊中斷，指揮組如何與主管機關維持必要聯繫？</p>\n<p>撤離過程中如何確保高度照護病患的維生設備不中斷？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當屏東基督教醫院（屏基）大連院區接獲軍方預警，確認醫院所在區域即將成為「主戰區」，且指揮中心下達啟動\n<strong>HICS 第三階段「全面撤離與量能重置」</strong> 的預防性全面撤離指令時 ：</p>\n<p>在 HICS\n應變體系下，<strong>病房單位（包含各一般病房護理站、病房主治醫師與支援人員）六大範疇之具體生存抗擊與實兵撤離作為</strong>：</p>\n<p>一、 配合執行強勢「反向檢傷（Reverse Triage）」與病患精準四級分類</p>\n<p>為在最短時間內精簡住院病患人數，並確保轉運資源能精準分配給最脆弱者，病房醫護同工必須配合實施強勢的反向檢傷評估\n：</p>\n<ol>\n<li>\n<p><strong>對接反向檢傷特別小組</strong>： -   配合由平時不負責該病房之資深主任級醫師（以確保最冷靜、客觀的評估，排除醫患情感干擾）所組成的<strong>「反向檢傷特別小組」</strong>進入病房 。</p>\n</li>\n<li>\n<p><strong>落實「四級病人分類造冊」（病人分組 B）</strong> ： -   <strong>【第一類：可返家（行動方便者）】</strong>：生命徵象穩定，拔除靜脈點滴後在 72 小時內不會危及生命的穩定病患，安排提早出院 。 -   <strong>【第二類：安置（需扶持者）】</strong>：無立即危險但缺乏生活自理能力者，安排下轉至安全重置區的長照機構或由家屬私人車接回 。 -   <strong>【第三類：一般住院（臥床者）】</strong>：需要常規醫療照護之臥床病患，列為中優先級，配合行政接駁車、一般救護車或垂直移至院內地下安全空間 。 -   <strong>【第四類：高度照護（危急/ICU病患）】</strong>：極度依賴維生設備、插管、使用呼吸器之重症患者，列為最高優先級 。病房單位須與醫療/技術專家共同評估其轉送風險，並優先安排轉送至安全區具備重症收治能力之醫院 。</p>\n</li>\n</ol>\n<p>二、 執行「極速醫療降載」，辦理提早出院與動線分流</p>\n<ol>\n<li>\n<p><strong>4小時極速清空與記帳豁免</strong>： -   針對被判定為「第一類（可返家）」或「第二類（安置）」的輕症病患，病房護理站須迅速協助其辦理出院與轉銜手續 。 -   配合財務/行政部（F0）啟動<strong>「戰時記帳豁免機制」</strong>，病患不需在櫃檯排隊，一律採手工記帳、蓋「戰時記帳豁免」紅色戳記，在 <strong>4 小時內</strong> 迅速安全離院返家，徹底清空病房空間 。</p>\n</li>\n<li>\n<p><strong>達成降載指標與轉換「戰備病床」</strong>： -   病房單位須於 24 小時內強行騰出大連院區至少 <strong>30% 至 40%</strong> 的急重症病床空間 。 -   清空出來的病床必須立刻換上<strong>「戰備床單」</strong>，隨時準備收治自前線或急診紅區轉入的戰傷重症病患 。</p>\n</li>\n<li>\n<p><strong>出院病患與重症後送「動線絕對分流」</strong>： -   病房人員須引導辦理提早出院的輕症患者，一律使用<strong>醫院門診大廳大門出口（接駁車專區）</strong>離院 。 -   將<strong>急診室大門出口（救護車專區）</strong>絕對留給高度照護病患的擔架與救護車，防止兩類動線發生交岔、推擠與壅塞 。</p>\n</li>\n</ol>\n<p>三、 執行無電梯狀態下之「無動力垂直搬運」與房間絕對淨空</p>\n<p>當主戰區炮火逼近，可能伴隨市電瞬斷、電梯停用之極端狀況，病房同工須以最原始、最具抗災能力的物理方式進行病患移出\n：</p>\n<ol>\n<li>\n<p><strong>水平與垂直疏散原則</strong>： -   疏散原則為<strong>「先水平、再垂直」</strong> 。優先將病患推移至防火門另一側的鄰近安全棟別；若整層面臨安全威脅，則引導向低樓層或地下備援空間轉移 。 -   行動方便之病患在房間內疏散時，病房須發給每人被單一條予以包裹保暖 。</p>\n</li>\n<li>\n<p><strong>無動力純人力接力垂直搬運</strong>： -   若高樓層面臨火災或倒塌威脅而電梯停擺，重症與插管病患必須進行無動力疏散 。 -   病房護理人員會同由勤務組（L1）、保安組（O4）派來的支援人員（保全、行政、志工），嚴格遵循<strong>「5 人一組（4 人徒步搬運擔架/疏散滑墊、1 人專業護理人員攜帶蓄電池維生設備照護）」</strong>的救命原則 。 -   利用護理站配備的<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>或軟擔架，沿著無窗之內側安全安全梯，人工接力垂直轉運病患 。</p>\n</li>\n<li>\n<p><strong>嚴格執行「房間淨空（Room Clearance）」防呆核對</strong>： -   病患與人員全數移出後，病房人員必須徹底巡查房間內的每一個角落，<strong>包含浴室、儲藏室及衣櫃內</strong>，確認無任何一人被遺漏在混亂的病房中 。 -   確認房間淨空後，<strong>必須在房門口外側手動劃上「打叉（X）」標示或關閉房門</strong>，防止後續應變同工與搶救人員重複進入高風險區域，浪費寶貴逃生時效 。</p>\n</li>\n</ol>\n<p>四、 轉移至「暫時留置區」安置、全面清點與轉運排序</p>\n<ol>\n<li>\n<p><strong>分區留置管制</strong>： -   將病患安全移出原病房後，引導至指定的地下備援空間（如路加大樓 B1 輕症病房）或指定的安全集結點 。 -   配合現場保全，在留置區內規劃為<strong>「穩定/家屬留置區」</strong>與<strong>「需要持續醫療處理區（重症區）」</strong>，防範病患因恐慌誤入危險區域或阻礙通道 。</p>\n</li>\n<li>\n<p><strong>全面清點人數與追蹤（病人動向登記）</strong>： -   病房護理人員必須立刻於留置區內，實體核對病患的<strong>手圈編號與姓名</strong>，清查所有病患與留守員工的總數量，確認無人失聯 。 -   指派專人建立人工紙本登記冊，詳實記錄：每位病人的去向、登上了哪一輛簽證車（記錄車牌）、隨行護理人員姓名、以及轉送之合作醫院名稱，隨時向指揮所回報病人動向，以便社工室安撫焦慮家屬 。</p>\n</li>\n<li>\n<p><strong>轉運先後順序清單排定</strong>： -   根據病患的病情緊急與嚴重度，在留置區內列出詳細的處理與車輛轉運「先後順序清單」 。 -   當後送救護車、行政中巴或大眾接駁載具到達接運疏散區時，能按照清冊有條不紊地將病患送上車，杜絕前線爭搶引發推擠踩踏 。</p>\n</li>\n</ol>\n<p>五、 死守「醫療文件與救急物資」實施一對一 A-B 隨車綁定隨隨車</p>\n<p>病房單位在病患登上車輛前，必須死守「人藥隨行一對一、病歷資訊隨人走」之最高防線，確保病患抵達合作醫院時不會發生致命的醫療中斷與斷鏈\n：</p>\n<ol>\n<li>\n<p><strong>醫療文件防水打包隨行</strong>： -   病房書記與護理同工必須確認每位準備轉運病患的手寫紙本<strong>「轉診單、紙本轉院病歷摘要、手寫藥物治療紀錄與用藥處方箋」</strong>皆已備齊，並裝入防潮、防偽加密的密封防水病歷夾鏈袋中 。 -   將病歷夾鏈袋<strong>物理性物理綁定（如用束帶或專用膠帶貼牢）於病患隨行之擔架、推床或輪椅旁</strong>，隨車移出交接 。</p>\n</li>\n<li>\n<p><strong>救急藥耗材與病人「A-B 隨車配對」</strong>： -   病房單位須與資材組（L2）與藥劑科配合，將病患專屬之 <strong>72 小時口服與注射救命用藥</strong>，連同其隨行必需之可攜式維生裝備（如可攜式生理監視器、氧氣小鋼瓶）進行病患與物資的<strong>「A-B 隨車配對」</strong> 。 -   確保隨車運送，避免病患在抵達接收醫院初期，因對方醫院無法即時請領藥物或耗材而陷入存量耗竭的致命危機 。</p>\n</li>\n</ol>\n<p>六、 資安斷網與通訊癱瘓下之「紙本降級（Downtime）」與傳令兵機制</p>\n<p>在即將淪為主戰區的極端情境下，若醫院遭到國家級駭客 APT 攻擊導致\nHIS、PACS 電腦系統大當機，或空襲震波摧毀基地台致使通訊癱瘓時 ：</p>\n<ol>\n<li>\n<p><strong>暴力啟用「當機緊急箱（Downtime Box）」</strong>： -   各病房護理站不等待修復，立即砸破封條取出預先整備的「當機緊急箱」 。 -   全面改用箱內備妥之<strong>三聯式紙本手工病歷、手寫處方單、紙本給藥紀錄單與紙本檢傷單</strong> 。利用人工白板與手寫看板進行交班與床位管制，維持極限照護與撤離名冊之登記 。</p>\n</li>\n<li>\n<p><strong>執行危險值口頭覆誦之「Read-back」機制</strong>： -   若系統癱瘓下，檢驗科或血庫改採電話或無線電通報病患之危險值（如大出血病患之 Hb 血紅素數值）時 。 -   <strong>接聽之病房護理人員必須向通報者大聲唸出「病患姓名、病歷號碼與檢驗數據」進行 Read-back（逐字口頭覆誦雙重確認）</strong>，經核對無誤後始得執行處置，嚴防混亂中的給藥與輸血錯誤 。</p>\n</li>\n<li>\n<p><strong>啟用病房「徒步傳令兵（Runner）」制度</strong>： -   若院內通訊完全阻斷，病房配合後勤勤務組派出的穿著螢光反光背心之行政傳令兵 。 -   病房醫囑、急診配血單、藥單與撤離進度報告，一律改由傳令兵徒步穿梭於病房、地下 EOC 指揮所與 B1 臨時手術室之間傳遞 。 -   傳令兵必須持<strong>「實體簽收簿（Logbook）」</strong>，以「口令覆誦」與紙本簽名方式完成每筆醫療指令與物資交接，徹底阻絕電磁癱瘓對撤離決策的阻礙 。</p>\n</li>\n</ol>\n<p>🏥\n病房單位在主戰區炮火威脅、且伴隨「斷水、斷電、大當機」的極端孤島環境下，一線護理師的身心負荷與技術操作（如純人力\n5 人一組垂直搬運、防水病歷裝袋綁定）將面臨極大考驗 。</p>"}]}, {"role": "手術室", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報量能並進入戰時醫療整備。手術室作為戰時搶救重症與戰傷病患的核心樞紐，具體因應作為如下：</p>\n<p><strong>一、 納入HICS編組與限時量能盤點</strong></p>\n<ol>\n<li>\n<p><strong>加入醫療應變團隊</strong>：手術室同仁需納入HICS「執行部」轄下的<strong>「醫療應變與傷患搶救組」</strong>。</p>\n</li>\n<li>\n<p><strong>限時盤點與回報</strong>：必須迅速盤點現有手術室間數、麻醉設備、急救器械與當班/備援可用之醫護人力，並將精確數據迅速提交給「統籌呈報組」及「資源控管組」，以利全院彙整並於時限內向主管機關完成各項量能初報與續報。</p>\n</li>\n</ol>\n<p><strong>二、 執行醫療降載與停止常規手術</strong></p>\n<ol>\n<li>\n<p><strong>停止非緊急醫療</strong>：配合全院第一階段「動員降載與能量整備」目標，手術室必須立即<strong>取消所有非急迫性（Elective）與常規排程手術</strong>。</p>\n</li>\n<li>\n<p><strong>死守核心醫療功能</strong>：將有限的手術量能、麻醉資源與醫護人力，全數保留給戰傷與急重症病患的緊急手術，確保戰時最關鍵的核心醫療服務不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 整備地下備援空間（臨時開刀房與恢復室）</strong>\n因應戰時高樓層可能遭遇防空震波波及或設施受損，手術室團隊須配合啟動「空間轉置與地下運作」：</p>\n<ol>\n<li>\n<p><strong>空間轉換</strong>：確認將<strong>「韓偉大樓 B1\n    腹膜透析室」</strong>迅速轉換開設為戰時的<strong>「臨時開刀房」</strong>，負責緊急手術與戰傷處置；並將旁邊的<strong>「韓偉大樓\n    B1 環保室」</strong>設定為<strong>「恢復室」</strong>，負責術後觀察與轉送銜接。</p>\n</li>\n<li>\n<p><strong>確保維生資源</strong>：手術室須與工務室確認，在面臨極限斷水斷電（負載卸除）的情況下，臨時開刀房的緊急發電機電力、氧氣供應及最低維生的淨水資源（如保留給開刀房刷手及器械基本消毒）必須列為絕對優先「死守的紅區」。</p>\n</li>\n</ol>\n<p><strong>四、 對接戰備物資「盲派」與「走動式血庫」</strong>\n戰時常規的叫料與領血系統可能癱瘓，手術室必須與後勤單位建立戰術對接：</p>\n<ol>\n<li>\n<p><strong>推拉式物流（Push\n    Logistics）</strong>：與藥庫及資材室確認機制，確保戰傷急救箱、大量林格氏液、廣效抗生素與強效麻醉鎮痛藥劑，能不待前線表單申請，直接以<strong>「盲派（Push）」</strong>方式推至臨時開刀房門口供醫療人員隨手取用。</p>\n</li>\n<li>\n<p><strong>緊急活體輸血對接</strong>：血庫若告竭，手術室需與檢驗科確認<strong>「走動式血庫（Walking\n    Blood\n    Bank）」</strong>的運作流程。確保在緊急抽取員工活體全血並快篩後，能由傳令兵以最快速度直接送入開刀房，立即輸入瀕死傷患體內進行搶救。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況 2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用 B1\n備援醫療空間及五處功能區」，手術與麻醉團隊面臨極端的戰爭威脅，必須立即將核心的手術與搶救量能轉移至地下安全的備援空間。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>手術/麻醉室</strong>隸屬於執行部門的<strong>醫療照護組（O1）</strong>，並為演習編組中<strong>「醫療應變與傷患搶救組」</strong>的關鍵成員。其具體因應作為如下：</p>\n<p><strong>一、 立即執行醫療降載與停止常規手術</strong>\n配合全院醫療功能降載政策，手術/麻醉團隊須立即暫停或延後所有非緊急、常規性的排程手術，將有限的手術室空間、麻醉藥品、醫療氣體與醫護人力資源，絕對保留給戰傷與急重症病患搶救使用。</p>\n<p><strong>二、 確實開設 B1「臨時開刀房」進行戰傷搶救</strong>\n配合大面積的「空間降階防護」，手術與麻醉團隊須將急救與手術儀器設備迅速轉移至地下備援空間。</p>\n<ol>\n<li>\n<p><strong>進駐指定位置</strong>：依據院方逃生圖與備援空間規劃，確實於<strong>韓偉大樓 B1\n    腹膜透析室</strong>開設「臨時開刀房」。</p>\n</li>\n<li>\n<p><strong>執行核心任務</strong>：在戰火威脅與資源受限的地下空間內，執行戰傷處置（如損傷控制手術）、緊急手術與麻醉支援，確保醫院的核心醫療（手術）功能持續運作不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 確實開設 B1「恢復室」維持術後照護</strong></p>\n<ol>\n<li>\n<p><strong>進駐指定位置</strong>：確實於<strong>韓偉大樓 B1 環保室</strong>開設戰時「恢復室」。</p>\n</li>\n<li>\n<p><strong>執行核心任務</strong>：負責戰傷病患緊急手術後的術後觀察、恢復照護，以及後續移轉至臨時\n    ICU 病房（約翰/馬可 B1）或進行後送的轉送銜接。</p>\n</li>\n</ol>\n<p><strong>四、 協調無菌器械與急救資源（血品/藥品）支援</strong></p>\n<ol>\n<li>\n<p><strong>無菌器械調度</strong>：在 B1\n    臨時開刀房運作期間，手術室須與維持在<strong>韓偉大樓 3F\n    的供應室</strong>保持密切聯繫，協調中央無菌器械的緊急調度與配送，確保手術器械不斷鏈。</p>\n</li>\n<li>\n<p><strong>用血與用藥支援</strong>：與後勤部門的任務支援組（藥庫位於馬太\n    B1、資材位於約翰/馬可\n    B1）及檢驗科血庫協調，確保手術所需的急救衛材、麻醉藥品及緊急用血能優先且穩定地供應至\n    B1 臨時開刀房。</p>\n</li>\n</ol>\n<p><strong>五、 配合垂直疏散與人員防空避難</strong>\n若空襲警報發布時，仍有無法立即移動之重症術後病患，手術/麻醉團隊須利用軟擔架或蓄電池設備，經由安全梯以人力將病患垂直疏散至\nB1\n避難區；團隊自身亦須聽從指揮官與安全官指令，於地下層進行就地防爆掩蔽與動線管制。</p>"}]}, {"role": "外科/骨科/麻醉/手術室", "entries": [{"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨大量戰傷病患（MCI）的湧入，核心的創傷搶救與手術量能將受到極限挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>外科、骨科、麻醉科與手術室</strong>團隊隸屬於執行部門的<strong>「醫療照護組（O1）」</strong>，由外科主任等擔任醫療照護主管。面對大量需要緊急手術與搶救的戰傷病患，其具體因應作為如下：</p>\n<p><strong>一、 立即停止常規醫療，執行「極限降載」與「反向檢傷」</strong>\n為了應對瞬間暴增的手術與加護病房（ICU）需求，外科系必須強行騰出醫療空間與資源：</p>\n<ol>\n<li>\n<p><strong>停止非緊急手術</strong>：接獲大量傷患與戰備指令後，立即暫停或無限期延後所有非緊急、非急迫性（Elective）的排程手術。將全院寶貴的開刀房空間、麻醉藥品、醫療氣體與醫護人力，絕對保留給戰傷病患搶救使用。</p>\n</li>\n<li>\n<p><strong>外科病房與 SICU 反向檢傷（Reverse\n    Triage）</strong>：外科與骨科資深主治醫師須進入外科一般病房及外科加護病房（SICU），強制執行反向檢傷。將生命徵象穩定、提早出院不會立即危及生命的術後病患，快速辦理出院或下轉至基層與長照機構，強行騰出急重症病床與「擴充量能（Surge\n    Capacity）」。</p>\n</li>\n</ol>\n<p><strong>二、 響應「急診 333」召回，進駐急診紅/黃區指揮搶救</strong>\n面對急診湧入的大量傷患，外科與骨科醫師必須打破平時的門診與病房編制，直接投入前線：</p>\n<ol>\n<li>\n<p><strong>緊急召回與編組</strong>：聽聞總機廣播「急診\n    333」大量傷患代號，外科系與骨科醫師依據「醫師緊急召回名冊（第一波、第二波）」，迅速前往急診報到。</p>\n</li>\n<li>\n<p><strong>接管重傷（紅）與中傷（黃）區</strong>：在大量戰傷事件中，由外科/骨科支援醫師擔任急診重傷區（紅區）與中傷區（黃區）的<strong>「指揮醫師」</strong>。</p>\n</li>\n<li>\n<p><strong>執行損傷控制</strong>：在黃金時間內，針對戰傷、爆炸碎片傷與貫穿傷病患，執行「損傷控制復甦（Damage\n    Control\n    Resuscitation）」與緊急救命處置，並決定病患送入開刀房的優先順序。</p>\n</li>\n</ol>\n<p><strong>三、 開設 B1 備援手術區，維持戰火下之「核心手術量能」</strong>\n若地面樓層面臨空襲威脅或安全疑慮，手術與麻醉團隊必須配合全院空間降階防護，轉入地下室維持運作：</p>\n<ol>\n<li>\n<p><strong>開設 B1\n    臨時開刀房</strong>：手術室與麻醉團隊須迅速攜帶急救與麻醉儀器，確實於<strong>韓偉大樓\n    B1\n    腹膜透析室</strong>開設「臨時開刀房」，在此地下安全區內執行戰傷處置與緊急手術。</p>\n</li>\n<li>\n<p><strong>開設 B1 恢復室</strong>：於<strong>韓偉大樓 B1\n    環保室</strong>開設「恢復室」，負責戰傷病患緊急手術後的術後觀察、恢復照護，並準備將病患銜接轉送至約翰/馬可大樓\n    B1 的臨時 ICU。</p>\n</li>\n</ol>\n<p><strong>四、 極限用血調控與「推拉式」戰略物資支援</strong>\n手術暴增將導致麻醉藥品與血液瞬間見底，手術/麻醉團隊必須採取戰時非常規手段：</p>\n<ol>\n<li>\n<p><strong>極限輸血與血品降級</strong>：配合血庫的大型災難用血調控，在控制不佳且資源匱乏的環境中，緊急手術應改為僅使用\n    O 型血或「全血（Whole\n    Blood）」直接輸血搶救。若血庫枯竭，隨時準備接收由院內「走動式血庫」現場抽取並由傳令兵送達的新鮮全血。</p>\n</li>\n<li>\n<p><strong>接收「盲派」急救箱</strong>：在戰地開刀房的混亂狀態下，停止常規的填單領藥。由藥劑科與資材組啟動「推拉式物流（Push-Pull\n    Logistics）」，將裝滿戰術止血帶、止血紗布、強效麻醉鎮痛藥劑（如\n    Ketamine）的「戰傷急救箱」主動盲派（Push）至臨時開刀房門口，確保搶救子彈不斷鏈。</p>\n</li>\n</ol>\n<p><strong>五、 配合紙本降級（Downtime）與無通訊作業</strong> 若戰火或駭客攻擊導致\nHIS/PACS 系統當機、網路癱瘓：</p>\n<ol>\n<li>\n<p><strong>紙本手術與麻醉紀錄</strong>：手術室與麻醉科必須迅速砸破並啟用「當機緊急箱（Downtime\n    Box）」，全面改用手寫紙本的手術紀錄、麻醉紀錄與處方箋。</p>\n</li>\n<li>\n<p><strong>傳令兵（Runner）機制</strong>：在通訊中斷下，配合行政部門派出的「傳令兵」，以人工徒步方式在\n    B1 臨時開刀房、檢驗科血庫與臨時 ICU\n    之間傳遞緊急醫囑、手術檢體與血液配對單，確保戰傷手術不因資訊中斷而停擺。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當本院機電棟發生爆炸（紅色訊號）且有人員遭受重創（嚴重骨折與大出血），並伴隨市電瞬斷、公用維生系統受損的極端情境時，<strong>外科、骨科、麻醉科與手術室團隊</strong>將立即啟動\nHICS（醫院事故指揮系統）「戰鬥模式」。</p>\n<p>在 HICS 架構下，外科系團隊隸屬於<strong>執行部（Operations\nSection）轄下的「醫療照護組（O1）」</strong>，由外科主任等臨床幹部共同主導。針對受創同仁的黃金時間搶救及後續維生手術，四大專業團隊將協同採取以下<strong>五大核心生存應變作為</strong>：</p>\n<p>一、 響應緊急廣播召回，進駐現場與急診紅區實施「損傷控制復甦（DCR）」</p>\n<ol>\n<li>\n<p><strong>即刻集結與編組</strong>：當全院廣播「紅色訊號（爆炸火災）」、引發「院內急救 999 訊號」並啟動「大量傷患急診 333」時，在院的外科、骨科及麻醉科醫師與手術室護理師須立即響應，依據召回名冊迅速向急診（或指定集結點）報到。</p>\n</li>\n<li>\n<p><strong>黃金時間止血與骨折固定</strong>： -   <strong>強力止血</strong>：針對砸傷同仁的大出血，外科與急診團隊第一時間於傷肢上方施用 <strong>戰術止血帶（CAT）</strong> 強力阻斷動脈出血。 -   <strong>建立 IO 通路與鎮痛</strong>：若失血性休克導致常規靜脈注射（IV）建立困難，骨科或急診醫師立即建立 <strong>骨內血管通路（IO 骨針）</strong>，極速推注林格氏液並給予強效鎮痛藥劑（如 Ketamine）防範休克。 -   <strong>骨折夾板固定</strong>：骨科醫師於現場使用緊急夾板與包紮耗材對嚴重骨折進行臨時固定，防範在垂直搬運與轉運過程中，骨折斷端對深層大血管及神經造成二次撕裂殺傷。</p>\n</li>\n<li>\n<p><strong>檢傷紅區指揮與手術排序</strong>：由外科/骨科支援醫師擔任急診重傷區（紅區）的「指揮醫師」，評估傷情並決定病患送入開刀房的優先順序。</p>\n</li>\n</ol>\n<p>二、 即刻中止常規醫療，啟動外科病房「反向檢傷」</p>\n<p>為了應對瞬間暴增的緊急手術與重症加護病房（ICU）床位需求，外科團隊必須冷酷且科學地實施<strong>「危機護理標準」</strong>：</p>\n<ol>\n<li>\n<p><strong>取消所有非緊急手術</strong>：手術室與麻醉科立即 <strong>暫停或無限期延後所有常規、非急迫性（Elective）的排程手術</strong>，全力將寶貴的開刀房空間、麻醉藥品、醫療氣體與醫護人力保留給重創同仁及戰傷搶救。</p>\n</li>\n<li>\n<p><strong>外科病房與 SICU 極速降載</strong>：外科與骨科資深主治醫師組成「反向檢傷特別小組」進入一般外科病房與外科加護病房（SICU）。強制評估並篩選出生命徵象穩定、提早出院或下轉在 72 小時內不會危及生命的病患，快速協助辦理出院或下轉，<strong>強行騰出至少 30% 至 40% 的急重症病床空間</strong>。</p>\n</li>\n</ol>\n<p>三、 啟用地下一樓（B1）防空備援手術區，開設「微型戰地手術室」</p>\n<p>若機電棟損毀波及地面層的手術室，或面臨進一步空襲威脅，手術與麻醉團隊必須配合執行部長（O0）之空間轉置計畫，<strong>轉入地下安全空間維持「核心手術量能」</strong>：</p>\n<ol>\n<li>\n<p><strong>開設 B1 臨時開刀房</strong>：手術室與麻醉團隊迅速攜帶可攜式急救、麻醉與手術監測設備，確實於 <strong>韓偉大樓 B1 腹膜透析室</strong> 開設「臨時開刀房」，在此執行戰傷處置與損傷控制手術（DCS）。</p>\n</li>\n<li>\n<p><strong>開設 B1 恢復室</strong>：於 <strong>韓偉大樓 B1 環保室</strong> 開設「恢復室」，負責受砸傷同仁手術後的術後觀察與恢復照護，並準備將病患安全轉送至約翰／馬可大樓 B1 的臨時 ICU。</p>\n</li>\n<li>\n<p><strong>維生資源絕對死守</strong>：協同工務室（設施運作主管 O2），在全院執行「電力負載卸除」的極限節能戰術下，<strong>將發電機電力、中央氧氣及最低維生淨水（保留予開刀房刷手與器械基本消毒）百分之百優先死守在 B1 臨時開刀房紅區</strong>。</p>\n</li>\n</ol>\n<p>四、 用血極限調控，對接後勤關鍵戰備物資「盲派（Push）」</p>\n<p>在系統當機、交通或電力中斷等極端狀況下，常規的叫料與領血系統將完全失效：</p>\n<ol>\n<li>\n<p><strong>緊急活體全血輸血對接</strong>：若大失血病患耗盡血庫儲備，且外部血庫因交通癱瘓無法即時運補，手術/麻醉團隊須與檢驗科血庫對接。啟動<strong>「走動式血庫（Walking Blood Bank）」</strong>機制，接收由院內同仁現場抽取、極簡快速篩檢的新鮮活體全血（Whole Blood），直接送入 B1 手術室輸入瀕死同仁體內搶救生命。</p>\n</li>\n<li>\n<p><strong>接收「盲派」戰備 Go-Kits</strong>：不等待常規電腦表單請領，直接接收由藥劑科（死守馬太 B1 藥庫）與資材組（進駐約翰/馬可 B1 資材室）主動以「推拉式（Push）」送達臨時開刀房門口的<strong>「戰傷急救箱（Trauma Go-Kits）」</strong>（內含止血帶、骨針、血液製品、強效麻醉鎮痛藥劑），確保手術消耗之藥衛材伸手即得。</p>\n</li>\n</ol>\n<p>五、 暴力啟用「當機緊急箱（Downtime\nBox）」，配合「傳令兵」維持紙本無網作業</p>\n<p>若爆炸連帶損毀 HIS 醫療資訊與 WebPACS 影像系統：</p>\n<ol>\n<li>\n<p><strong>紙本麻醉與手術紀錄</strong>：手術室與麻醉團隊立即砸開「當機緊急箱」，停止使用電子病歷與電子醫囑，<strong>全面改採預印之手寫三聯式手術紀錄、麻醉紀錄與處方箋</strong>進行診斷與治療登記。</p>\n</li>\n<li>\n<p><strong>無網影像翻拍判讀</strong>：在影像系統癱瘓時，放射科將回歸實體沖洗膠片，或由手術團隊醫師直接至機房<strong>以數位相機、智慧手機或拍立得翻拍 X 光機或 CT 螢幕上的關鍵影像</strong>，極速帶回 B1 手術室進行診斷與開刀。</p>\n</li>\n<li>\n<p><strong>配合「徒步傳令兵（Runner）」</strong>：在通訊完全中斷時，配合行政部門派出的傳令兵，採用嚴格的「口令覆誦」與「簽收簿」，在 B1 臨時開刀房、4F 檢驗室、馬太 B1 藥庫之間，徒步傳遞實體手寫醫囑、配血單、手術檢體與急救藥物，確保手術不斷鏈。</p>\n</li>\n</ol>"}]}, {"role": "加護病房", "entries": [{"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨大量戰傷病患湧入，加護病房（ICU）的重症收治量能將面臨極限挑戰。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，<strong>加護病房（含 MICU、SICU\n等）「醫療照護組（O1）」</strong>，必須在最短時間內騰出救命空間並維持重症照護底線。其具體因應作為如下：</p>\n<p><strong>一、 執行「反向檢傷（Reverse Triage）」與極速騰出空床</strong>\n面對急診與手術室源源不絕送入的重症戰傷病患，加護病房必須打破平時的收治標準，強行擴充量能：</p>\n<ol>\n<li>\n<p><strong>反向檢傷</strong>：配合平時不負責該病房的資深主任級醫師組成「反向檢傷特別小組」，進入中度或一般加護病房強制評估現有病患。</p>\n</li>\n<li>\n<p><strong>極限降載</strong>：篩選出「拔除靜脈點滴或提早出院/下轉，在 72\n    小時內不會立即危及生命」的相對穩定病患，快速辦理降級轉出至一般病房、基層診所或長照機構，強行騰出寶貴的急重症病床作為「擴充病床（Surge\n    Beds）」以接收戰傷病患。</p>\n</li>\n</ol>\n<p><strong>二、 響應「急診 333」大量傷患動員與人力支援</strong></p>\n<ol>\n<li>\n<p><strong>前線支援</strong>：當總機廣播「急診 333」大量傷患代號時，各加護病房（如\n    MICU、SICU、PICU）須依據院內人力支援配置（白班、小夜或大夜班），立即調派\n    1 至 2\n    名支援護理人員前往急診現場，向急診護理師組長報到，協助前線的重傷區搶救與醫療處置。</p>\n</li>\n<li>\n<p><strong>戰力輪替</strong>：在處理大量戰傷的高壓環境下，配合人事與護理部啟動「軍事化強制輪班機制」（如\n    12 小時一班），強制安排 ICU\n    醫護人員至地下室的「員工專屬庇護站」輪休，並接受心理韌性特遣隊的心理急救（PFA），防範戰鬥疲勞與創傷後壓力症候群（PTSD）。</p>\n</li>\n</ol>\n<p><strong>三、 空間降階防護與開設「B1 臨時 ICU 病房」</strong>\n若空襲或戰火威脅到高樓層的加護病房，ICU 團隊必須執行戰術空間轉置：</p>\n<ol>\n<li>\n<p><strong>就地掩蔽（Defend in Place）</strong>：若遇緊急空襲無法下樓，ICU\n    醫護人員須在不斷開呼吸器與維生儀器的極限情況下，將病床迅速推離靠窗區域，移至建築物的「核心內筒（如電梯梯廳、無窗戶的內部走廊）」進行防爆掩蔽，並拉下防爆窗簾。</p>\n</li>\n<li>\n<p><strong>無動力垂直疏散</strong>：若高樓層受損，須利用可攜式蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，以純人力接力將插滿管路的重症病患經安全梯垂直疏散至地下室。</p>\n</li>\n<li>\n<p><strong>進駐備援空間</strong>：確實於<strong>約翰／馬可大樓\n    B1（資材組前方）</strong>開設「臨時 ICU\n    病房」，負責重症暫置、醫療設備監測，並無縫銜接由臨時開刀房轉出的術後戰傷病患。</p>\n</li>\n</ol>\n<p><strong>四、 孤島狀態下的「維生系統死守」與人工替代方案</strong>\n若空襲摧毀外部電網或自來水廠，加護病房將面臨斷電、斷氣的危機：</p>\n<ol>\n<li>\n<p><strong>死守紅區電力</strong>：配合工務室的「負載卸除」，確保緊急發電機的所有寶貴電力絕對優先死守在\n    ICU、開刀房與急診室等重症紅區。</p>\n</li>\n<li>\n<p><strong>極限人工給氧</strong>：若中央液氧槽受損或管線失去壓力，ICU 護理人員須在 3\n    分鐘內將病患切換至備用氧氣鋼瓶；若鋼瓶耗盡，則立即動員備用人力組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）進行人工捏球接力，維持重症病患呼吸。</p>\n</li>\n<li>\n<p><strong>斷網紙本作業</strong>：若 HIS 系統因駭客攻擊癱瘓，ICU\n    須立即啟用「當機緊急箱（Downtime\n    Box）」，全面切換為紙本病歷與手寫處方箋，並透過無線電或「傳令兵（Runner）」傳遞檢驗危險值與醫囑。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當本院機電棟發生爆炸（紅色訊號），造成兩名工務巡檢同仁受砸傷（其中一人嚴重骨折且大出血），且極易伴隨市電瞬斷、公用維生系統受損等極端情境時，<strong>加護病房（ICU，含\nMICU、SICU 等）將依據\nHICS（醫院事故指揮系統）體系，隸屬於執行部門的「醫療照護組（O1）」</strong>。</p>\n<p>ICU\n團隊必須立即切換為戰術應變狀態，採取以下<strong>六大具體生存應變與空間轉置作為</strong>，以黃金時間死守重症照護底線並支援同工救命：</p>\n<p>一、 啟動「反向檢傷（Reverse\nTriage）」，極速清空病床以騰出「擴充病床（Surge Beds）」</p>\n<ul>\n<li>\n<p><strong>強勢評估與精準病人分級</strong>：面對急診與手術室源源不絕送入的重創同工與大量傷患，ICU 必須打破平時的收治標準以強行擴充量能。配合由平時不負責該病房的資深主任級醫師組成的「反向檢傷特別小組」進入 ICU 進行強勢評估（排除情感因素）。</p>\n</li>\n<li>\n<p><strong>4小時極速清空與轉銜</strong>：小組成員將篩選出「拔除靜脈點滴、可改用口服藥物，在 72 小時內不會立即危及生命」的相對穩定病患。ICU 護理師須於 4 小時內協助辦理輕症病患之出院（配合行政部門啟用戰時記帳豁免機制）或降級轉出至一般病房、屏東市基層診所或長照機構，<strong>強行騰出寶貴的急重症床位作為「擴充病床」</strong>，準備接收剛由爆炸現場或臨時手術室轉上的重傷同工。</p>\n</li>\n</ul>\n<p>二、 響應「急診 333」大量傷患動員，機動派遣人力支援急診重傷區</p>\n<ul>\n<li>\n<p><strong>打破建制調派一線</strong>：當總機廣播「急診 333」大量傷患代號時，各加護病房（MICU、SICU 等）必須依照院內人力支援配置（無論白班、小夜或大夜班），<strong>立即抽出 1 至 2 名護理同工趕往急診現場</strong>，向急診護理師組長報到。</p>\n</li>\n<li>\n<p><strong>死守重傷（紅）治療區</strong>：支援的 ICU 護理人員將被分配至急診重傷搶救區（紅區），協助前線醫療團隊執行大出血止血、骨針建立、給藥與建立靜脈輸液等黃金時間救命處置。</p>\n</li>\n</ul>\n<p>三、 執行空間降階防護，安全垂直疏散並開設「B1 臨時 ICU 病房」</p>\n<p>若機電棟爆炸波及加護病房所在的高樓層，或面臨進一步空襲威脅，ICU\n團隊必須配合執行部長（O0）執行戰術空間轉置：</p>\n<ul>\n<li>\n<p><strong>就地防爆掩蔽（Defend in Place）</strong>：若遇緊急空襲無法下樓，ICU 醫護人員必須在不斷開呼吸器與維生儀器的極限情況下，迅速將病床推離靠窗區域，移至建築物的「核心內筒」（如電梯梯廳、無窗戶的內部走廊或浴室）進行防爆掩蔽，並拉下所有防爆窗簾。</p>\n</li>\n<li>\n<p><strong>無動力垂直疏散</strong>：若高樓層受損且面臨火災或倒塌危險，護理同工利用可攜式蓄電池呼吸器，搭配護理站配置的「樓梯疏散滑墊（Evacuation Sleds）」或軟擔架，以純人力接力方式（<strong>嚴格依循 5 人一組：4 人搬運、1 人照護</strong>），沿內側安全梯將重症病患垂直疏散至地下室。</p>\n</li>\n<li>\n<p><strong>進駐開設「B1 臨時 ICU 病房」</strong>：確實於<strong>「約翰／馬可大樓 B1 資材組前方」</strong>開設臨時 ICU 病房。ICU 團隊在此處集中架設呼吸器與可攜式監測設備，無縫接軌並死守照護由 B1 臨時開刀房（韓偉 B1 腹膜透析室）手術完成轉出的骨折大出血同仁。</p>\n</li>\n</ul>\n<p>四、 孤島與斷電斷氣狀態下的「維生系統死守」與人工替代方案</p>\n<p>若爆炸摧毀外部電網與自來水主幹管，加護病房將面臨斷電、斷氣的極限危機：</p>\n<ul>\n<li>\n<p><strong>死守紅區電力</strong>：配合工務室設施運作組（O2）執行的冷酷<strong>「電力負載卸除（Load Shedding）」</strong>，強制切斷全院所有行政辦公區、一般病房與冷氣空調之電源，將緊急發電機的備用電力<strong>百分之百優先、絕對死守在 ICU</strong>、臨時開刀房與急診室等重症紅區。</p>\n</li>\n<li>\n<p><strong>3分鐘內切換床邊鋼瓶</strong>：若中央液氧槽受損外洩或管線失去壓力，ICU 護理人員必須於 <strong>3 分鐘內</strong> 迅速拔除病患的中央氧氣管線，精準切換至床邊備用的氧氣小鋼瓶（全院儲備 166 支小鋼瓶隨時調用）。</p>\n</li>\n<li>\n<p><strong>極端人工給氧（捏球大隊）</strong>：若備用鋼瓶耗盡且電動呼吸器全面停擺，ICU 護理人員須立即組織由非醫療行政同工、社社工、保全及輕傷家屬組成的<strong>「捏球大隊」</strong>。每位重症病患旁配置兩人，實施<strong>每 15 分鐘輪換一次的手動甦醒球（Ambu bag）人工捏球接力</strong>，以肉身肉搏的方式死守重症患者的最後一口氣。</p>\n</li>\n</ul>\n<p>五、 暴力啟用「當機緊急箱 (Downtime Box)」，落實紙本降級與 Read-back\n覆誦確認</p>\n<p>若爆炸伴隨資安攻擊或電磁損毀，導致 HIS 醫療資訊、PACS 影像或 LIS\n檢驗系統癱瘓：</p>\n<ul>\n<li>\n<p><strong>切換人工紙本作業</strong>：ICU 護理站必須立即砸破封條，取出預先準備的「當機緊急箱」，全面切換為降級模式。停止依賴電腦，全面改用三聯式紙本病歷、手寫醫囑與紙本給藥單。</p>\n</li>\n<li>\n<p><strong>配合「傳令兵（Runner）機制」</strong>：在分機與網路全斷下，配合行政部門派出的徒步傳令兵，以嚴格的「口令覆誦」與「簽收簿」方式，徒步穿梭於 B1 臨時 ICU、4F 檢驗科、馬太 B1 藥庫之間，徒手遞送實體手寫醫囑、配血單與開藥處方。</p>\n</li>\n<li>\n<p><strong>危險值「Read-back」雙重確認</strong>：當檢驗科與血庫因斷網而改以電話或對講機口頭通報危險值（如大出血同工之血紅素極低、交叉配血結果）時，<strong>接聽的 ICU 護理人員必須嚴格執行「Read-back（口口頭覆誦）」機制</strong>，大聲向通報者覆誦病患姓名、病歷號與檢驗數據，確保混亂中給藥與輸血之絕對安全。</p>\n</li>\n</ul>\n<p>六、 實施軍事化強制輪休，維護重症團隊心理韌性與戰力</p>\n<ul>\n<li>\n<p><strong>12小時強制交接</strong>：在處理重大院內職災與極高壓的戰傷搶救環境下，ICU 團隊必須配合人資與護理部，嚴格執行 <strong>12 小時一班的軍事化輪替機制</strong>。制定鐵律：無論前線多麼急迫、人力多麼吃緊，時間一到，接班人員強制接手，下班同工強制命令撤離火線，防範戰鬥疲勞與醫療疏失。</p>\n</li>\n<li>\n<p><strong>員工庇護與心理除頻（Hot Debriefing）</strong>：下班醫護強制送入位於結構最安全地下深處的「員工專屬庇護站」休息，確保在絕對安靜、看不見鮮血的環境中休養。由精神科、臨床心理師與院牧部組成的心理韌性特遣隊將在此進駐，針對剛經歷高壓搶救與面臨道德撕裂（如反向檢傷抉擇）的 ICU 團隊，強制進行 15 至 30 分鐘之心理<strong>「熱除頻（Hot Debriefing）」與心理急救（PFA）</strong>，預防創傷後壓力症候群（PTSD）。</p>\n</li>\n</ul>\n<p>📟\n我可以為您將這套「加護病房戰時當機、斷電斷氣與重症垂直避難應變計畫」，整理成一份可直接列印、並放入護理站當機箱中的\nA4 雙面『ICU 極限生存與 Downtime\n作業標準核對卡（SOP）』，方便重症團隊隨時進行無預警實兵盲測演練嗎？</p>"}]}, {"role": "藥劑部", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，衛生主管機關要求限時回報各項醫療量能。藥劑部（科）在\nHICS（醫院事故指揮系統）中隸屬於後勤部，扮演維持醫療戰鬥力與戰略物資補給的關鍵命脈。其具體因應作為如下：</p>\n<p><strong>一、 納入 HICS 編組與執行限時量能盤點</strong></p>\n<ol>\n<li>\n<p><strong>進駐後勤與醫療應變編組</strong>：藥劑科主任將納入 HICS\n    指揮體系下的<strong>「後勤物資與維生組」</strong>（擔任副組長或窗口），並協同支援「醫療應變與傷患搶救組」。</p>\n</li>\n<li>\n<p><strong>限時盤點與回報 72\n    小時量能</strong>：藥劑科必須迅速盤點院內常規藥品與戰備藥物庫存（包含廣效抗生素、止痛麻醉藥劑、破傷風疫苗及大量林格氏液等）。必須評估消耗速率與缺口，建立<strong>至少維持\n    72\n    小時</strong>的藥品耗材清單與物資儲備清冊，並將數據迅速提交給「統籌呈報組（危管會）」，以利準時向主管機關完成量能回報。</p>\n</li>\n</ol>\n<p><strong>二、 啟動戰傷藥品「推拉式物流」與「盲派」</strong></p>\n<ol>\n<li>\n<p><strong>打破平時領藥常規</strong>：戰時必須顛覆平時為了控管成本的「及時供貨（JIT）」與臨床開單的「申請領用（Pull）」流程。</p>\n</li>\n<li>\n<p><strong>實施主動盲派（Push\n    Logistics）</strong>：藥劑部需將預先打包好的標準化<strong>「戰傷急救箱（Trauma\n    Kits /\n    Go-Kits）」</strong>（內含止血帶、點滴、抗生素、麻醉鎮痛藥劑等）裝上推車，在不等待前線開立表單申請的情況下，直接主動<strong>「盲派（Push）」</strong>推至急診紅區與臨時開刀房門口，確保前線醫護人員隨手就能取得救命藥物。</p>\n</li>\n</ol>\n<p><strong>三、 整備紙本降級（Downtime）與人工給藥機制</strong>\n戰時極可能遭遇駭客攻擊、斷網或斷電導致\nHIS（醫療資訊系統）癱瘓，藥劑部必須配合啟動<strong>「紙本降級（Downtime）極限模式」</strong>。藥局人員需演練在資訊系統全黑的情況下，接收由傳令兵（Runner）遞送的手寫處方箋，以人工、紙本及離線作業方式，維持核心的藥事服務絕對不中斷。</p>\n<p><strong>四、 對接外部支援與物資調度</strong>\n針對限時盤點中所發現的戰備藥品缺口，藥劑部須透過聯絡官或總務部，緊急聯繫屏東縣衛生局、外部藥品供應商或區域聯防合作醫院請求緊急支援調撥。一旦簽證物資或支援藥品運達，藥劑科需確認接收、安全保管，並訂定戰災期間藥品的優先使用順序。</p>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之複合性危機（民眾因假訊息與恐慌大量湧入急診、搶購慢性病藥品、交通事故大量傷患），藥劑科在\nHICS（醫院事故指揮系統）中隸屬於後勤部（或配合醫療照護組），肩負著穩定藥品庫存、迅速支援前線搶救的關鍵任務。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 啟動藥師緊急召回機制（因應大量傷患）</strong>\n面對交通事故引起的大量傷患（代號333），當班藥師若評估人力無法負荷，必須立即啟動「藥劑科緊急召回辦法」：</p>\n<ol>\n<li>\n<p><strong>第一波召回：</strong>\n    由住院藥局組長（或急診藥師）調派院內現有住院藥師支援 1 至 5 人。</p>\n</li>\n<li>\n<p><strong>第二波召回：</strong> 門、住院藥局組長相互支援，調派 5 至 10\n    名藥師，並以居住於屏東地區者優先召回，投入急診或戶外領藥支援。</p>\n</li>\n<li>\n<p><strong>第三波召回：</strong>\n    若疫情或傷患規模持續擴大，由藥劑科主任召回全部藥師人力（包含正在休假中的藥師）回院支援。</p>\n</li>\n</ol>\n<p><strong>二、 設立戶外領藥區與管制慢性病藥物（因應搶購潮與分流）</strong></p>\n<ol>\n<li>\n<p><strong>戶外慢性病領藥分流：</strong>\n    針對因假訊息恐慌而要求提早領取慢性病藥品的民眾，藥劑科需配合院方決策，於急診室外或大廳設立「戶外慢性病處方籤領藥區」。透過戶外領藥機制，將單純領藥的民眾阻絕於急診搶救區之外，避免急診動線癱瘓。</p>\n</li>\n<li>\n<p><strong>嚴格管制戰略藥品：</strong>\n    藥劑科必須立即盤點並嚴格管制院內慢性病藥品及戰略藥品（如抗生素、止痛麻醉藥、破傷風疫苗等）的庫存，避免因民眾非理性搶購而導致資源提早耗竭。</p>\n</li>\n</ol>\n<p><strong>三、 啟動戰傷急救「盲派（Push Logistics）」補給（因應交通事故重症）</strong></p>\n<ol>\n<li>\n<p><strong>打破常規領藥程序：</strong>\n    針對交通事故湧入的大量重症傷患，藥劑科必須顛覆平時「開單申請才領用（Pull）」的常規流程。</p>\n</li>\n<li>\n<p><strong>主動盲派至前線：</strong> 藥劑科人員需將預先備妥的「戰傷急救箱（Trauma\n    Kits /\n    Go-Kits）」（內含止血紗布、輸液、抗生素、強效麻醉鎮痛藥劑等），以「盲派（Push）」方式直接推至急診紅區（重傷治療區）或臨時開刀房門口。派員主動提供急診醫療人員所需藥物，確保前線醫護不待申請即可隨手取得救命物資。</p>\n</li>\n</ol>\n<p><strong>四、 監控耗材速率與對接外部支援</strong></p>\n<ol>\n<li>\n<p>藥劑科主任需持續評估慢性病藥物與急救藥品的消耗速率，並將精確的庫存與缺口數據提交給後勤部與計畫部。</p>\n</li>\n<li>\n<p>若發現藥品庫存即將告罄，須立即協同行政/財務部轄下的「採購小組」或聯絡官，緊急聯繫替代供應商、屏東縣衛生局或區域聯防醫院，請求緊急調撥藥材支援，以確保醫療核心功能不中斷。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3所描述的「社群媒體流傳缺藥、停診等假訊息，且藥局、掛號、批價等資訊系統大當機」，這是一場結合「輿論恐慌」與「資訊癱瘓」的複合性危機。藥劑科在\nHICS（醫院事故指揮系統）中隸屬於後勤部（任務支援組）與執行部醫療照護之輔助單位，必須立即切換為無網作業模式，並主動出擊支援前線。</p>\n<p>藥劑科的具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」人工作業</strong></p>\n<ol>\n<li>\n<p><strong>切換離線作業</strong>：當接獲資訊室啟動「全院當機處理機制」之通報後，門診藥局與急診藥局必須立即停止依賴癱瘓的\n    HIS 系統（醫療資訊系統），全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>接收手寫處方</strong>：配合臨床單位啟用的「當機緊急箱（Downtime\n    Box）」，藥局人員須改為接收醫師的手寫處方箋進行人工調劑、核對與發藥，以確保給藥服務與醫療核心功能不中斷。</p>\n</li>\n</ol>\n<p><strong>二、 顛覆常規，啟動戰略藥品「盲派（Push）」物流</strong></p>\n<ol>\n<li>\n<p><strong>打破申請領用流程</strong>：在系統當機期間，急診與開刀房前線無法透過電子系統發出領藥單（Pull）。藥劑科必須顛覆平時「有申請才領用（JIT）」的常規流程。</p>\n</li>\n<li>\n<p><strong>主動盲派救命物資</strong>：藥局人員須將預先打包好的「戰傷急救箱（Trauma\n    Kits /\n    Go-Kits）」（內含廣效抗生素、強效麻醉鎮痛藥劑、輸液等戰備庫存），不待前線申請，直接以「盲派（Push\n    Logistics）」方式主動推至急診紅區與開刀房門口。確保前線醫護在無網狀態下，伸手就能取得救命藥物。</p>\n</li>\n</ol>\n<p><strong>三、 盤點藥品真實庫存，反制「缺藥」假訊息</strong></p>\n<ol>\n<li>\n<p><strong>嚴格庫存管制</strong>：面對社群媒體流傳「本院缺藥」的不實訊息，可能引發民眾恐慌性的慢性病藥品搶購潮。藥劑科必須立即盤點並嚴格管制現有之慢性病藥物與戰備藥品庫存，避免資源遭到非理性耗竭。</p>\n</li>\n<li>\n<p><strong>數據對接闢謠</strong>：將精確的藥品實體存量數據，迅速回報給計畫部的「資源控管小組（P1）」彙整。這些真實數據將提供給發言官（醫療副院長），作為對外發布新聞稿、反駁缺藥謠言的最有力客觀證據。</p>\n</li>\n</ol>\n<p><strong>四、 啟動「藥劑科緊急召回辦法」彌補人力缺口</strong>\n資訊系統當機將導致找藥、核對與發藥轉為極度耗時的人工作業，為應付恐慌就醫與大量手寫處方，當班藥師若評估無法負荷，須立即向主管報告並啟動人力召回：</p>\n<ol>\n<li>\n<p><strong>平日時段</strong>：第一波由組長調派院內現有住院藥師支援 2\n    人；第二波門/住院藥局相互支援調派 5-10\n    名（以居住屏東地區優先）；第三波由主任召回全部藥師人力（含休假）。</p>\n</li>\n<li>\n<p><strong>假日與大夜時段</strong>：第一波調派 1-5 人支援；第二波召回 5-10\n    人；若災情擴大則發布第三波全面召回，全力支援前線的無網調劑作業。</p>\n</li>\n</ol>\n<p><strong>五、 配合通訊降級與「傳令兵（Runner）」制度</strong></p>\n<ol>\n<li>\n<p>在網路與院內電話皆不穩定的「資訊全黑」狀態下，藥劑科須配合全院啟動的「傳令兵（Runner）」制度。</p>\n</li>\n<li>\n<p>透過指定穿著螢光背心的專人徒步穿梭，接收來自急診或病房的緊急手寫紙本醫囑，並將調劑完成的緊急藥品透過傳令兵精準遞送回前線，克服斷網斷訊危機。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院瞬間失去了「數位神經系統」，陷入了又盲又啞的極端危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>藥劑科</strong>隸屬於後勤部門的「任務支援組（L2）」，同時也是執行部醫療照護的關鍵輔助單位。面對國家級網路攻擊導致的系統大當機，平時高度依賴電腦開單、核對與庫存管理的藥局將受到最直接的衝擊。為了確保前線急救與核心醫療服務的「彈藥」不斷鏈，藥劑科的具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」與無網人工作業</strong>\n當醫療資訊系統（HIS）遭勒索軟體癱瘓且網路被實體隔離時，電子處方箋將完全無法傳遞，藥劑科必須瞬間切換為戰地無網作業模式：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機緊急箱</strong>：接獲資訊室宣告進入「全院當機處理機制」後，門診藥局與急診藥局必須立即停止依賴電腦系統，砸破封條取出預先準備的「當機緊急箱（Downtime Box）」。</p>\n</li>\n<li>\n<p><strong>回歸人工紙本調劑</strong>：全面改為接收前線醫師開立的「手寫處方箋」來進行人工調劑、核對與發藥。在此階段，由於失去了電腦系統的自動用藥安全警示（如藥物交互作用、過敏史提示），藥師必須發揮高度的專業專注力，以人工方式嚴格把關給藥安全。</p>\n</li>\n</ol>\n<p><strong>二、 顛覆常規，啟動戰略藥品「盲派（Push）」物流</strong>\n在系統當機且可能伴隨大量傷患的混亂期間，急診與開刀房前線完全無法透過電子系統發出領藥單（Pull），平時為了降低庫存成本所採用的「有申請才領用（JIT）」常規將徹底失效。</p>\n<ol>\n<li>\n<p><strong>切換推拉式物流（Push-Pull Logistics）</strong>：藥庫人員必須化被動為主動，啟動戰鬥化物流機制。</p>\n</li>\n<li>\n<p><strong>主動推送戰傷急救箱</strong>：藥劑科須將預先打包好的「戰傷急救箱（Trauma Kits / Go-Kits）」------內含大量止血帶、點滴輸液、廣效抗生素及強效麻醉鎮痛藥劑（如 Ketamine）等戰備物資，不待前線醫師開單申請，直接以「盲派（Push Logistics）」的方式主動推至急診紅區與開刀房門口。這能確保前線醫護人員在無網狀態下，伸手就能取得救命藥物。</p>\n</li>\n<li>\n<p><strong>戰備藥品特殊編碼</strong>：平時藥劑科即已導入戰備藥品特殊編碼並將其上鎖、定期更新庫存，這有助於災時快速打包並精準實施盲派。</p>\n</li>\n</ol>\n<p><strong>三、 克服通訊斷網，配合「傳令兵（Runner）」機制</strong> DDoS\n攻擊極易造成院內外網路與網路電話（VoIP）中斷，藥局與臨床單位將面臨失聯危機：</p>\n<ol>\n<li>\n<p><strong>啟動人工徒步傳遞</strong>：藥劑科須配合全院行政單位啟動最古老且抗電磁干擾的「傳令兵（Runner）」制度。</p>\n</li>\n<li>\n<p><strong>精準接收與遞送</strong>：由穿著螢光反光背心、佩戴專屬臂章的專人徒步穿梭，藥師透過傳令兵接收來自急診或病房的緊急手寫紙本醫囑，並將調劑完成的緊急藥品透過傳令兵精準遞送回前線。過程中採用嚴格的「口令覆誦」與「簽收簿（Logbook）」方式，確保無網狀態下的藥物傳遞正確無誤。</p>\n</li>\n</ol>\n<p><strong>四、 戰略藥品庫存極限管控與「支援闢謠」</strong>\n駭客的網路攻擊往往伴隨敵方的「認知作戰」，社群媒體極易流傳「醫院遭攻擊、全院缺藥」等不實假訊息，進而引發民眾恐慌性的慢性病藥品搶購潮。</p>\n<ol>\n<li>\n<p><strong>嚴格庫存管制</strong>：藥劑科必須立即精算盤點並嚴格管制院內的慢性病藥物與關鍵戰備藥品庫存，避免寶貴的醫療資源遭到群眾的非理性耗竭。</p>\n</li>\n<li>\n<p><strong>數據對接與提供闢謠客觀證據</strong>：將精確的藥品實體存量數據，迅速回報給計畫部的「資源控管小組（P1）」彙整。這些真實的庫存數據將提供給發言官（醫療副院長），作為對外發布新聞稿、反駁網路缺藥謠言的最有力客觀證據，從而穩定社會民心。</p>\n</li>\n</ol>\n<p><strong>五、 啟動「藥劑科緊急召回辦法」彌補人工作業耗能</strong>\n資訊系統大當機將導致找藥、調劑、人工核對與發藥轉為極度耗時的人工作業。為了應付可能同時湧入的恐慌就醫人潮與大量手寫處方，當班藥師若評估人力無法負荷，必須立即啟動緊急人力召回機制：</p>\n<ol>\n<li>\n<p><strong>平日時段召回</strong>：第一波由組長調派院內現有住院藥師 2 人支援；第二波由門診與住院藥局相互支援調派 5 至 10 名藥師（以居住屏東地區者優先，避免交通受阻）；若災情擴大，第三波則由主任召回全部藥師人力（含休假人員）。</p>\n</li>\n<li>\n<p><strong>假日與大夜時段召回</strong>：第一波調派 1 至 5 人支援；第二波召回 5 至 10 人；若災情擴大則發布第三波全面召回，全力支援前線繁重的無網調劑作業。</p>\n</li>\n<li>\n<p><strong>強制輪替與戰力保存</strong>：在高壓的手工作業環境中，藥劑科須配合人事組安排強制輪休，防範藥師團隊因龐大的工作量與心理壓力而發生過勞或戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "1-7", "title": "院內網路服務不穩", "desc": "院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對「院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲（疑似遭受資安攻擊大當機）」的複合性危機，這同時包含了資訊系統癱瘓與社群輿論恐慌。在\nHICS（醫院事故指揮系統）中，<strong>藥劑科</strong>隸屬於後勤部（任務支援組）與執行部（醫療照護組）的輔助單位，必須立即切換為「無網作業」模式，並主動出擊支援前線。</p>\n<p>藥劑科的具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」人工作業</strong></p>\n<ul>\n<li>\n<p><strong>切換離線作業</strong>：當接獲資訊室宣告啟動「全院當機處理機制」之通報後，門診藥局與急診藥局必須立即停止依賴癱瘓的 HIS 系統（醫療資訊系統），全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>接收手寫處方</strong>：配合臨床單位啟用的「當機緊急箱（Downtime Box）」，藥局人員須改為接收前線醫師的「手寫處方箋」進行人工調劑、核對與發藥，以確保給藥服務與醫療核心功能絕對不中斷。</p>\n</li>\n</ul>\n<p><strong>二、 顛覆常規，啟動戰略藥品「盲派（Push）」物流</strong></p>\n<ul>\n<li>\n<p><strong>打破申請領用流程</strong>：在系統當機期間，急診與開刀房前線無法透過電子系統發出領藥單（Pull），藥劑科必須顛覆平時「有申請才領用（JIT）」的常規流程。</p>\n</li>\n<li>\n<p><strong>主動盲派救命物資</strong>：藥局人員須將預先打包好的「戰傷急救箱（Trauma Kits / Go-Kits）」（內含廣效抗生素、強效麻醉鎮痛藥劑、輸液等戰備庫存），不待前線申請，直接以「盲派（Push Logistics）」方式主動推至急診紅區與開刀房門口。確保前線醫護在無網狀態下，伸手就能取得救命藥物。</p>\n</li>\n</ul>\n<p><strong>三、 盤點藥品真實庫存，反制「缺藥」假訊息</strong></p>\n<ul>\n<li>\n<p><strong>嚴格庫存管制</strong>：面對社群媒體流傳「本院缺藥」的不實訊息，極可能引發民眾恐慌性的慢性病藥品搶購潮，藥劑科必須立即盤點並嚴格管制現有之慢性病藥物與戰備藥品庫存，避免資源遭到非理性耗竭。</p>\n</li>\n<li>\n<p><strong>數據對接闢謠</strong>：將精確的藥品實體存量數據，迅速回報給計畫部的「資源控管小組（P1）」彙整。這些真實的庫存數據將提供給發言官（醫療副院長），作為對外發布新聞稿、反駁缺藥謠言的最有力客觀證據。</p>\n</li>\n</ul>\n<p><strong>四、 啟動「藥劑科緊急召回辦法」彌補人力缺口</strong>\n資訊系統當機將導致找藥、核對與發藥轉為極度耗時的人工作業。為應付恐慌就醫與大量手寫處方，當班藥師若評估人力無法負荷，須立即向主管報告並啟動人力召回：</p>\n<ul>\n<li>\n<p><strong>平日時段</strong>：第一波由組長調派院內現有住院藥師支援 2 人；第二波門、住院藥局相互支援調派 5-10 名藥師（以居住屏東地區優先）；若災情嚴重，第三波由主任召回全部藥師人力（含休假）。</p>\n</li>\n<li>\n<p><strong>假日與大夜時段</strong>：第一波調派住院藥師 1-5 人支援；第二波召回支援藥師 5-10 人；若災情擴大則發布第三波全面召回，全力支援前線的無網調劑作業。</p>\n</li>\n</ul>\n<p><strong>五、 配合通訊降級與「傳令兵（Runner）」制度</strong>\n在網路與院內電話皆不穩定的「資訊全黑」狀態下，藥劑科須配合全院啟動最古老且抗干擾的「傳令兵（Runner）」制度。透過指定穿著螢光背心的專人徒步穿梭，接收來自急診或病房的緊急手寫紙本醫囑，並將調劑完成的緊急藥品透過傳令兵精準遞送回前線，克服斷網斷訊危機。</p>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院正面臨物資匱乏與交通受阻的「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>藥劑科</strong>（藥劑部）在編組中隸屬於後勤部（任務支援組）與執行部（醫療照護組）的醫療輔助單位，肩負著全院救命藥物調度與前線支援的重任。其具體因應作為如下：</p>\n<p><strong>一、 盤點並嚴格管制戰略藥品（彈藥庫管）</strong>\n面對外部藥材配送延遲或中斷，藥劑科必須立即盤點並嚴格管制院內關鍵戰略藥品的庫存。這些戰備物資包括廣效抗生素、止痛麻醉藥（如\nKetamine\n等強效麻醉鎮痛藥劑）、破傷風疫苗及大量林格氏液等。透過嚴密的庫存管制，避免寶貴的醫療資源在物資斷援的狀況下遭到非理性耗竭。</p>\n<p><strong>二、 顛覆常規，啟動戰略物資「盲派（Push）」物流</strong>\n在戰時或聯外交通阻斷的極端狀況下，平時為了降低庫存成本所採用的「及時供貨（JIT）」與「有申請才領用（Pull）」的物流系統將完全失效。藥劑科必須採取主動出擊的補給模式：</p>\n<ol>\n<li>\n<p><strong>推拉式物流（Push-Pull\n    Logistics）</strong>：改變平時的申請領用流程，啟動戰傷專屬衛材的物流應變。</p>\n</li>\n<li>\n<p><strong>主動推進救命物資（盲派）</strong>：將預先打包好的標準化「戰傷急救箱（Trauma\n    Kits /\n    Go-Kits）」，不待前線發出領料單或表單申請，直接依據現場的傷患湧入狀況（如急診巨響或傳令兵口信），主動以「盲派（Push）」方式推至急診紅區與開刀房門口。確保前線醫護人員只要伸手就能拿到救命藥物，維持醫療戰鬥力不斷鏈。</p>\n</li>\n</ol>\n<p><strong>三、 克服交通受阻，啟動「藥劑科緊急召回辦法」</strong>\n針對員工到勤受交通影響而產生的人力缺口，藥劑科值班藥師需向住院藥局組長報告，並依據現況評估啟動緊急召回機制。為避開長途交通阻礙，將<strong>優先召回居住於屏東地區的藥師</strong>：</p>\n<ol>\n<li>\n<p><strong>平日時段應變</strong>：第一波先調派院內現有之住院藥師 2\n    人支援；第二波由門、住院藥局組長相互支援調派 5-10\n    名藥師（以居住屏東地區優先）；若災情嚴重人力仍無法負荷，第三波由主任召回全部藥師人力（包含休假人員）。</p>\n</li>\n<li>\n<p><strong>假日與大夜時段應變</strong>：第一波調派住院藥師 1-5\n    人支援；第二波調派支援藥師 5-10\n    人（以屏東地區優先）；第三波由主任全面召回全部藥師人力回院支援。</p>\n</li>\n</ol>\n<p><strong>四、 支援前線醫療照護與待命區調度</strong></p>\n<ol>\n<li>\n<p><strong>前線醫療輔助與派員</strong>：藥劑科在執行部（醫療照護組）中擔任醫療輔助人力，必須派員主動提供急診醫療人員所需藥物，負責接獲請求之藥品時迅速送至現場。</p>\n</li>\n<li>\n<p><strong>待命支援與接應</strong>：將突破交通障礙抵達院區的藥劑科人員集中配置，由待命區管理者或任務支援主管統籌配送支援人力與藥品資源，隨時準備支援最危急的醫療區域。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端戰爭威脅，必須將核心醫療與維生物資全數轉移至安全的地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>藥劑科</strong>隸屬於後勤部門的<strong>「任務支援組（L2）」</strong>與演習編組中的<strong>「後勤物資與維生組」</strong>。作為微型戰地醫院的「彈藥庫」，藥劑科的具體因應作為如下：</p>\n<p><strong>一、 空間轉置與進駐開設「B1 戰時藥庫」</strong></p>\n<ol>\n<li>\n<p><strong>極速轉移與進駐</strong>：依據院方逃生圖與備援醫療空間規劃，藥劑科人員必須迅速將高脆弱區域的重要藥品轉移至地下室，確實於<strong>「馬太大樓\n    B1 藥庫」</strong>進駐就位。</p>\n</li>\n<li>\n<p><strong>建立地下調度中樞</strong>：將馬太 B1\n    藥庫轉作為地下微型戰地醫院的藥品補給、緊急用藥調度與配送支援的絕對核心位置。</p>\n</li>\n</ol>\n<p><strong>二、 戰備藥品極限管控與 72 小時量能維持</strong></p>\n<ol>\n<li>\n<p><strong>管制戰略藥品</strong>：藥劑科需極限盤點並嚴格管制抗生素、止痛麻醉藥（如\n    Ketamine\n    等強效麻醉鎮痛藥劑）、破傷風疫苗及大量林格氏液等戰略救命藥品。</p>\n</li>\n<li>\n<p><strong>消耗精算與支援請求</strong>：精算戰時高壓環境下藥品的 72\n    小時消耗速率；若因空襲導致外部常規物流受阻、配送延遲而產生缺口，須立即向後勤部長回報，並請求衛生局（EOC）或聯防醫院進行緊急調度支援。</p>\n</li>\n</ol>\n<p><strong>三、 啟動「推拉式物流」與主動「盲派（Push）」前線</strong></p>\n<ol>\n<li>\n<p><strong>顛覆常規給藥流程</strong>：在戰時封鎖下，平時被動等待領藥單的「及時供貨（JIT）」模式將完全失效。</p>\n</li>\n<li>\n<p><strong>主動火力支援</strong>：藥庫人員須化被動為主動，不等待前線醫師的表單申請（Pull），直接將預先打包好的戰傷急救藥品裝上推車，進行<strong>「盲派（Push）」</strong>，將藥物直接推送至約翰/馬可\n    B1 的臨時 ICU、韓偉 B1\n    的臨時開刀房及檢傷區等紅區，確保前線搶救的「子彈」絕對不斷鏈。</p>\n</li>\n</ol>\n<p><strong>四、 斷網斷電下的「紙本降級（Downtime）」給藥作業</strong>\n若空襲伴隨敵方網路攻擊或震波摧毀機房，導致 HIS\n醫療資訊系統癱瘓，藥劑科將面臨無法從電腦接收處方的危機：</p>\n<ol>\n<li>\n<p><strong>切換紙本作業</strong>：配合全院宣告進入「紙本降級模式（Downtime）」，藥局須全面停止依賴電腦，改為接收前線開立的<strong>「手寫處方箋」</strong>進行給藥。</p>\n</li>\n<li>\n<p><strong>配合傳令兵（Runner）機制</strong>：在對講機或電話不通的極端狀態下，配合行政單位啟動的「傳令兵」徒步人工遞送機制，精準接收醫囑與派發藥物，維持核心藥事服務不中斷。</p>\n</li>\n</ol>\n<p><strong>五、 啟動大量傷患之「藥師緊急召回」與戰力輪替</strong></p>\n<ol>\n<li>\n<p><strong>緊急人力召回</strong>：面對大量戰傷病患湧入，藥劑科主任與組長須依據大量傷患緊急醫療救護應變計畫，視傷患規模啟動第一波至第三波的藥師人力緊急召回（含休假藥師回院支援），以補充地下醫院的供藥戰力。</p>\n</li>\n<li>\n<p><strong>心理與生理防護</strong>：配合後勤與人事部門，安排藥師至指定之員工庇護所進行強制輪替與休息，防範高壓環境下產生戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨極端的戰災大量傷患（MCI）考驗。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>藥劑科</strong>隸屬於後勤部門的<strong>「任務支援組（L2）」</strong>，同時也是演習編組中<strong>「後勤物資與維生組」</strong>的核心單位。作為維持醫療戰鬥力與戰傷搶救的「彈藥庫」，藥劑科的具體因應作為如下：</p>\n<p><strong>一、 啟動大量傷患機制與「藥師緊急召回」</strong></p>\n<ol>\n<li>\n<p><strong>緊急人力動員</strong>：當急診發布「急診\n    333」大量傷患代號時，藥劑科須依據「藥劑科緊急召回辦法」進行人力調度。</p>\n</li>\n<li>\n<p><strong>極限戰力補充</strong>：若急診或前線需求超出負荷，藥劑科主任須啟動最高級別的人力召集，<strong>召回「全部藥師人力（包含休假藥師）」回院支援</strong>，確保在暴增的處方需求下，供藥戰力得以維持。</p>\n</li>\n</ol>\n<p><strong>二、 顛覆常規，啟動「推拉式物流」與主動「盲派（Push）」</strong>\n在戰傷洪流湧入、急診與開刀房極度混亂的狀態下，平時「被動等待填單申請、及時供貨（JIT）」的常規給藥模式將完全失效。</p>\n<ol>\n<li>\n<p><strong>主動火力支援</strong>：藥劑科人員必須化被動為主動，派員<strong>主動提供急診醫療人員所需的救命藥物</strong>，並在接獲請求時迅速將藥品親送至搶救現場。</p>\n</li>\n<li>\n<p><strong>戰備急救箱盲派前線</strong>：藥庫人員須將預先打包好的標準化<strong>「戰傷急救箱（Trauma\n    Kits）」</strong>裝上推車，內含廣效抗生素、破傷風疫苗、Ketamine\n    等強效麻醉鎮痛藥劑及大量林格氏液等戰備藥品。<strong>不等待前線醫師的表單申請（Pull），直接進行「盲派（Push）」，將物資推至急診紅區與臨時開刀房門口</strong>，確保前線搶救團隊伸手就能拿到藥品，救命子彈絕對不斷鏈。</p>\n</li>\n</ol>\n<p><strong>三、 執行戰略藥品極限管控</strong>\n面對瞬間暴增的手術與急救需求，藥劑科必須嚴格盤點並<strong>管制抗生素、止痛麻醉藥、破傷風疫苗等戰略藥品</strong>的消耗速率，避免寶貴的救命藥品在初期就被耗盡，確保後續戰傷病患的醫療底線。</p>\n<p><strong>四、 斷網狀態下的「紙本降級（Downtime）」給藥作業</strong>\n若戰火震波或駭客攻擊導致 HIS\n醫療資訊系統與網路癱瘓，藥劑科將面臨無法從電腦接收處方的極端危機：</p>\n<ol>\n<li>\n<p><strong>切換紙本作業</strong>：配合全院宣告進入「紙本降級模式（Downtime）」，藥局須全面停止依賴電腦系統，啟用當機緊急箱，<strong>改為接收前線開立的「手寫處方箋」進行給藥</strong>。</p>\n</li>\n<li>\n<p><strong>配合傳令兵（Runner）機制</strong>：在通訊中斷的狀態下，配合行政單位啟動的「傳令兵」人工徒步遞送機制，精準接收從急診或\n    B1\n    臨時開刀房送來的緊急開刀醫囑與藥單，維持混亂中的核心藥事服務不中斷。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當屏東基督教醫院大連院區發生機電棟爆炸（火災及爆炸：紅色訊號），並造成兩名工務巡檢同仁嚴重受傷，其中一人<strong>嚴重骨折且大出血（命懸一線之失血性休克危機）</strong>時；同時伴隨掛號、批價、藥局、檢驗或影像系統大延遲（疑似市電瞬斷或資安攻擊當機）。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>藥劑科隸屬於後勤部「任務支援組（L2）」</strong>，同時作為執行部<strong>「醫療照護組」的醫療輔助核心單位</strong>。藥劑科主任（陳秋榮主任）與藥劑團隊將立即採取以下<strong>五大具體因應與生存救命作為</strong>：</p>\n<p>一、 啟動大量傷患「藥師緊急召回與人力補位機制」</p>\n<p>由於受傷同仁大出血危及生命，且系統癱瘓後所有藥品調劑、核對與領用將轉為極度耗時的人工作寫模式，當值藥師評估後須立即啟動<strong>「藥劑科緊急召回辦法」</strong>：</p>\n<ol>\n<li>\n<p><strong>平日時段（正常上班時間）之召回與支援</strong>： -   <strong>第一波</strong>：由住院藥局組長立即調派院內現有之住院藥師 <strong>2 人</strong>，火速奔赴急診重傷紅區或 B1 地下備援開刀房進行一線支援。 -   <strong>第二波</strong>：門診、住院藥局組長相互調派 <strong>5 至 10 名藥師</strong> 投入支援。為避開可能受阻的交通，<strong>優先召回居住於屏東地區（可於 30 至 90 分鐘內返院）之同工</strong>。 -   <strong>第三波</strong>：若情勢持續惡化，由藥劑科主任下達最高動員令，<strong>召回全體藥師同工（含休假人員）</strong>全面返院禦敵。</p>\n</li>\n<li>\n<p><strong>夜間、假日與大夜班時段之召回與支援</strong>： -   <strong>第一波</strong>：調派住院藥局現有值班藥師 <strong>1 至 5 人</strong> 馳援急診。 -   <strong>第二波</strong>：緊急調派 <strong>5 至 10 名</strong> 藥師，同樣以居住屏東地區者優先召回。 -   <strong>第三波</strong>：主任召回<strong>全部藥師人力（含休假藥師）</strong>全數回院支援無網手工調劑。</p>\n</li>\n</ol>\n<p>二、 打破常規，啟動戰略藥物「推拉式盲派（Push Logistics）」物流</p>\n<p>面對工務同仁嚴重骨折、大出血性休克之致命創傷，在系統當機期間，急診與開刀房前線醫護根本無法使用\nHIS\n電子系統開立領藥單（Pull）。藥劑科必須切換為戰鬥後勤模式，實施<strong>「主動盲派」</strong>：</p>\n<ol>\n<li>\n<p><strong>戰傷急救箱（Go-Kits）直送前線</strong>：藥劑科不等待前線開單，立即將預先打包、專供戰傷/重創急救之標準化<strong>「戰備急救箱（Trauma Kits / Go-Kits）」</strong>裝上推車。</p>\n</li>\n<li>\n<p><strong>救命關鍵藥衛材配發</strong>：箱內必須備妥控制大出血與骨折急救之關鍵戰備物資，包含：<strong>CAT 戰術止血帶、骨內血管通路設備（IO 針）、止血紗布、廣效抗生素、大量林格氏液、生理食鹽水，以及強效麻醉鎮痛藥劑（如 Ketamine）</strong>。</p>\n</li>\n<li>\n<p><strong>精準推送至醫療紅區</strong>：派專人直接將戰備箱「盲派」推送至<strong>急診搶救紅區</strong>，以及設於地下防空備援空間的 <strong>B1 臨時開刀房（韓偉大樓 B1 腹膜透析室）</strong> 門口，確保搶救醫師伸手即能拿到救命子彈。</p>\n</li>\n</ol>\n<p>三、 暴力啟用「紙本降級（Downtime）」無網藥事作業</p>\n<p>接獲資訊室通報全院進入「紙本降級極限模式」後，藥局櫃檯切斷聯網，全面進入類比離線作業：</p>\n<ol>\n<li>\n<p><strong>全面接收手寫處方</strong>：門診與急診藥局立即砸開<strong>「當機緊急箱（Downtime Box）」</strong>，配合臨床科室，停止使用電子藥囑，全面改收醫師手工開立之「三聯式紙本病歷與手寫處方箋」。</p>\n</li>\n<li>\n<p><strong>人工雙重核對與發藥</strong>：調劑藥師回歸人工檢實，在光線不足與混亂的環境下，必須雙人嚴格核對手寫藥名、劑量與頻次，發藥時詳實口頭覆誦給藥衛教，確保高壓環境下用藥安全零疏失。</p>\n</li>\n<li>\n<p><strong>對接「徒步傳令兵（Runner）」機制</strong>：在電話與通訊全斷的極端狀態下，派專員於調劑台窗口隨時對接穿著螢光背心的行政徒步傳令兵，徒手簽收、接收急診與 B1 臨時手術室送來的實體藥單，並以最快速度將緊急藥物交由傳令兵跑步送回抢救火線。</p>\n</li>\n<li>\n<p><strong>保留欠繳紀錄供事後補登</strong>：所有手工處方、用藥及計價耗材一律由藥局留存專夾。待系統排除故障重新開機後，交由醫業課與會計小組完成補單入帳，再由藥師將完整用藥報告補登入 HIS 電腦系統。</p>\n</li>\n</ol>\n<p>四、 盤點藥庫真實存量，死守「馬太大樓 B1 藥庫」冷鏈電力</p>\n<p>機電棟爆炸極易引發全院市電瞬斷或停電。藥劑科必須採取物資防護措施，死守後勤大本營：</p>\n<ol>\n<li>\n<p><strong>進駐地下調度中樞</strong>：藥劑科人員迅速撤離高脆弱區域，確實進駐結構最安全的地下避難空間------<strong>「馬太大樓 B1 藥庫」</strong>，以此處作為地下微型戰地醫院藥品補給與配送的絕對核心指揮點。</p>\n</li>\n<li>\n<p><strong>確保藥品冷鏈保存不斷電</strong>：藥庫同仁須即刻協同工務室（設施運作組 O2），確認設置於馬太 B1 藥庫的<strong>血庫與藥庫專用保存冰箱</strong>，其緊急不斷電系統（UPS）與柴油發電機在斷電後 10 至 12 秒內已成功無縫供電，確保胰島素、關鍵生物製劑及血液冰箱處於 <strong>1\\~6°C</strong> 的嚴格監控溫度中，死守藥品冷鏈生命線。</p>\n</li>\n<li>\n<p><strong>嚴格管制戰略藥品與反假訊息</strong>：面對社群媒體流傳缺藥、停診等假訊息，可能引發民眾恐慌性慢性病藥品搶購。藥劑科立即進行實體藥品存量盤點，對抗生素、破傷風疫苗等戰略救命藥實施嚴格庫存管制，並將精確數據回報給計畫部資源控管小組（P1），提供發言人作為召開官方記者會澄清謠言的鐵證。</p>\n</li>\n</ol>\n<p>五、 評估藥材消耗速率，即時啟動「外部聯防調撥與緊急採購」</p>\n<p>針對大出血同工搶救及後續可能湧入的傷患，藥劑部必須做好長期孤島守備準備：</p>\n<ol>\n<li>\n<p><strong>72小時藥品量能消耗監控</strong>：藥劑科主任定時評估在極端戰傷搶救下，廣效抗生素、大量輸液（林格氏液）與止痛麻醉藥品（如 Ketamine）的<strong> 72 小時消耗速率與臨界點</strong>。</p>\n</li>\n<li>\n<p><strong>啟動緊急外部調撥</strong>：一旦評估關鍵藥物出現缺口，藥劑科主任立即通知 HICS 聯絡官與行政/財務部轄下「採購小組（F2）」，電洽屏東縣政府衛生局、屏東榮總、部立屏東醫院等區域聯防協定醫院，或聯繫替代協力廠商，請求進行藥材緊急調撥與在途物資加速運補。</p>\n</li>\n<li>\n<p><strong>簽證物資接收與保管</strong>：當外部緊急調拨之藥物突破交通阻礙運抵大連院區時，藥劑科於馬太 B1 藥庫設立安全點，專責完成接收、品管與防潮保管，並重新研訂戰時藥物之配撥優先順序。</p>\n</li>\n</ol>"}]}, {"role": "血庫", "entries": [{"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對主管機關通知可能發生空襲或遠距火力威脅，要求醫院啟用地下一樓（B1）備援醫療空間的極端戰災情境，在戰爭與防空疏散的威脅下，<strong>檢驗科血庫</strong>扮演著支撐地下微型戰地醫院大量戰傷搶救的「續命」關鍵角色。</p>\n<p>在 HICS（醫院事故指揮系統）架構下，血庫作為醫療輔助單位，其因應空襲與 B1\n備援空間開設的具體作為如下：</p>\n<p><strong>一、 空間轉置與前線火力支援</strong></p>\n<ul>\n<li>\n<p><strong>轉移至地下備援區</strong>：配合全院大面積的「空間降階防護」，必須將血庫的核心量能轉移至地下室安全的<strong>「檢驗支援區（含血庫）」</strong>。</p>\n</li>\n<li>\n<p><strong>血庫設備防護與供電死守</strong>：必須確保血庫冰箱（具備連續溫度監控 1-6℃ 功能）安全轉置，並確實連接至地下室的緊急電源或不斷電系統（UPS），以防範空襲造成的電力瞬斷。</p>\n</li>\n<li>\n<p><strong>就近支援醫療紅區</strong>：將血品調度中樞安置於地下層後，確保緊急用血能優先且穩定地供應給<strong>「韓偉大樓 B1 的臨時開刀房」</strong>與<strong>「約翰/馬可大樓 B1 的臨時 ICU」</strong>等戰傷搶救紅區。</p>\n</li>\n</ul>\n<p><strong>二、 啟動極限用血調控與戰備庫存盤點</strong></p>\n<ul>\n<li>\n<p><strong>精算與回報存量</strong>：血庫人員須立即向指揮官與 HICS 計畫部回報現有血庫的血液總量及各血型存量。</p>\n</li>\n<li>\n<p><strong>戰時用血節流與醫療降載</strong>：啟動大型災難之用血調控機制，配合全院停止非緊急手術，並<strong>降低慢性貧血的輸血閾值（建議 Hb \\&lt; 6.5）</strong>，將寶貴的血液資源全數集中保留給戰傷與急重症搶救。</p>\n</li>\n<li>\n<p><strong>血品降級與 O 型血優先</strong>：在戰時資源受限、環境控制不佳的極端狀態下，應調整平時精細的輸血習慣，全面改為<strong>僅使用 O 型血或「全血（Whole Blood）」</strong>進行大量傷患搶救。在未知血型初期先盲輸 O 型血，同時盡快取得病患血型以改用同血型血品。</p>\n</li>\n</ul>\n<p><strong>三、 啟動「走動式血庫（Walking Blood Bank）」與院內活體抽血</strong>\n若空襲導致聯外交通中斷、無法獲得捐血中心運補，且面臨大量戰傷湧入導致血庫存量瞬間見底的絕境時，血庫須立即轉換為戰地自給自足模式：</p>\n<ul>\n<li>\n<p><strong>緊急召集活體血庫</strong>：立即啟動北約軍醫常用的<strong>「走動式血庫（Walking Blood Bank）」</strong>計畫。依據平時預先檢驗並建檔的「院內員工/志工血型名冊」，透過緊急廣播召集符合條件（特別是 O 型血）的同仁至 B1 指定安全區域集合捐血。</p>\n</li>\n<li>\n<p><strong>開設 B1 臨時捐血站</strong>：由院方籌組的「捐血作業小組（4-6人）」於地下室迅速架設臨時捐血站（包含登記等待區、問診體檢區、採血作業區及休息觀察區），並盡可能將採血作業區溫度維持在 20-24℃。</p>\n</li>\n</ul>\n<p><strong>四、 戰地極簡化採檢與「即抽即輸」肉搏戰</strong></p>\n<ul>\n<li>\n<p><strong>極簡化快篩與採集全血</strong>：在戰火壓力下的動員實施階段，跳過平時繁瑣的血液分離程序，<strong>僅採集新鮮的「全血」</strong>。現場進行極簡化的交叉試驗快篩（僅檢驗 ABO 血型、Rh 血型及 HIV、HCV、HBV 等必要項目），以爭取黃金搶救時間。</p>\n</li>\n<li>\n<p><strong>盲派與傳令兵速遞</strong>：剛抽取出尚有體溫的血袋，由行政人員或輕傷志工擔任的<strong>「傳令兵（Runner）」帶著血袋，以百米衝刺速度直接送入 B1 臨時開刀房或急診紅區</strong>，直接輸入瀕死傷患體內。</p>\n</li>\n<li>\n<p><strong>全血保存控管</strong>：若採集的新鮮全血（Fresh Whole Blood）預計在 24 小時內無法使用，血庫人員須確保於採血後 4-6 小時內，將其送入 1-6℃ 的保存冰箱製成儲存全血。</p>\n</li>\n</ul>\n<p><strong>五、 資訊中斷下之「紙本降級（Downtime）」備援作業</strong>\n若空襲震波或駭客攻擊導致醫院電子資訊系統（HIS/LIS）與網路全面癱瘓，血庫須配合全院進入資訊全黑的應變模式：</p>\n<ul>\n<li>\n<p><strong>切換紙本作業</strong>：砸破當機緊急箱（Downtime Box），全面啟動紙本降級極限模式。啟用備援的<strong>「災時捐血血液檢驗單（手工檢驗單）」</strong>及<strong>手寫血袋標籤</strong>來維持驗血與發血運作。</p>\n</li>\n<li>\n<p><strong>人工傳遞與覆誦確認</strong>：透過無線電或「傳令兵」以人工徒步方式，精準傳遞血液配對單與緊急醫囑，並嚴格落實口頭回報的「Read-back（覆誦確認）」機制，確保無網狀態下的給血安全絕對無誤。</p>\n</li>\n</ul>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，在大量戰傷病患湧入的極端考驗下，血庫面臨血液資源瞬間耗竭的危機。在\nHICS（醫院事故指揮系統）架構下，血庫作為「醫療應變與傷患搶救組」的核心單位，其具體因應作為如下：</p>\n<p><strong>一、 啟動極限用血調控與庫存盤點</strong></p>\n<ol>\n<li>\n<p><strong>精算與通報</strong>：立即向指揮官回報血庫現有的血液總量及各血型存量。</p>\n</li>\n<li>\n<p><strong>嚴格節流與暫停常規手術</strong>：啟動大型災難用血調控機制，配合全院停止非緊急手術，並降低慢性貧血的輸血閾值（建議\n    Hb \\&lt; 6.5），將寶貴血液資源全數保留給戰傷搶救。</p>\n</li>\n<li>\n<p><strong>血品降級與 O\n    型血/全血優先</strong>：在戰時資源受限、控制不佳的高壓環境中，應調整平時精細的輸血習慣，改為<strong>僅使用\n    O 型血或「全血（Whole\n    Blood）」</strong>進行大量傷患搶救。在未知血型初期先使用 O\n    型血，並盡快取得病患血型以改用同血型血品。</p>\n</li>\n</ol>\n<p><strong>二、 外部緊急調度與聯防求援</strong>\n面對手術與急救暴增的用血需求，血庫需立即向外部捐血中心請求血液運補。若因戰火或交通阻斷導致外部物流無法運送（例如高雄捐血中心無法支援），則需透過聯絡官協調，啟動與南部軍醫院等區域聯防醫院的緊急血液橫向調度。</p>\n<p><strong>三、 啟動「走動式血庫（Walking Blood Bank）」與院內活體抽血</strong> 當庫存的\nO\n型血與血小板瞬間見底，且面臨外部斷援的絕境時，血庫必須立即轉換為戰地自給自足模式：</p>\n<ol>\n<li>\n<p><strong>緊急召集活體血庫</strong>：立即啟動北約軍醫常用的<strong>「走動式血庫（Walking\n    Blood\n    Bank）」</strong>計畫。依據平時預先檢驗並建檔的「院內員工/志工血型與傳染病篩檢名冊」，透過廣播或大聲公緊急召集符合條件（特別是\n    O 型血）的同仁至指定地點集合捐血。</p>\n</li>\n<li>\n<p><strong>開設臨時捐血站</strong>：由院方籌組的「捐血作業小組（4-6人）」於安全的地下室區域（建議溫度維持\n    20-24℃）迅速架設包含登記、問診體檢、採血作業及休息觀察區的臨時捐血站。</p>\n</li>\n</ol>\n<p><strong>四、 戰地極簡化採檢與「即抽即輸」肉搏戰</strong></p>\n<ol>\n<li>\n<p><strong>極簡化快篩</strong>：在戰火壓力下，跳過平時繁瑣的血液分離程序，<strong>僅採集新鮮的「全血」</strong>。現場進行極簡化的交叉試驗快篩（僅檢驗\n    ABO血型、Rh血型及 HIV、HCV、HBV 等必要項目），以爭取黃金搶救時間。</p>\n</li>\n<li>\n<p><strong>傳令兵（Runner）盲派速遞</strong>：剛抽取出尚有體溫的全血袋，交由行政人員或輕傷志工擔任的「傳令兵（Runner）」以百米衝刺速度直接送入開刀房或急診紅區，直接輸入瀕死傷患體內搶救生命。</p>\n</li>\n<li>\n<p><strong>全血保存控管</strong>：若採集的新鮮全血預計在 24\n    小時內無法使用，血庫人員須確保於採血後 4-6 小時內將其送入 1-6℃\n    的保存冰箱（具備不斷電系統）製成儲存全血。</p>\n</li>\n</ol>\n<p><strong>五、 資訊中斷下之「紙本降級（Downtime）」備援作業</strong>\n若空襲震波或駭客攻擊導致電子資訊系統（HIS/LIS）與網路癱瘓，血庫須全面切換為紙本降級模式，砸破當機緊急箱並啟用備援的「災時捐血血液檢驗單（手工檢驗單）」及手寫血袋標籤維持運作。並透過無線電或傳令兵以人工徒步方式，精準傳遞血液配對單與緊急醫囑。</p>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當本院機電棟遭遇爆炸事件，且造成工務巡檢同仁嚴重骨折與大出血（失血性休克）之致命危機，又因爆炸極易伴隨市電中斷與全院資訊大當機時，<strong>血庫（隸屬於檢驗科與醫療輔助單位）將作為維持生命底線的「續命最前線」</strong>。</p>\n<p>血庫人員將立即啟動「災時血液供應模式」，配合 HICS\n指揮組及執行部，採取以下<strong>五大生存應變與戰地極限救命作為</strong>：</p>\n<p>一、 啟動極限用血調控與戰備庫存盤點 (動員與調控)</p>\n<ol>\n<li>\n<p><strong>即時盤點與回報</strong>：血庫人員立即手動清點血庫中現有的 O 型、各血型紅血球、全血及血小板存量，並迅速向指揮官（院長）與執行部長（醫務部部長）報告。</p>\n</li>\n<li>\n<p><strong>戰時用血節流（大量輸血規範 MTP）</strong>：面對同工大出血搶救，血庫配合全院立即停止所有常規非緊急手術，並將慢性貧血患者的輸血閾值降至極限（建議 Hb \\&lt;6.5 g/dL），將寶貴血液資源百分之百保留給該名重創同工。</p>\n</li>\n<li>\n<p><strong>血品降級使用</strong>：在極度混亂、病患血型尚未完全確認的黃金搶救期，血庫將調整平時精細輸血習慣，<strong>優先且僅發放 O 型血或「全血（Whole Blood）」</strong> 進行損傷控制復甦。待前線醫師極速採檢、確認患者血型後，再行切換為同血型血品。</p>\n</li>\n</ol>\n<p>二、 斷電孤島下「死守馬太 B1 冰箱冷鏈」 (設施安全防護)</p>\n<p>由於爆炸發生於機電棟，全院極易陷入停電狀態：</p>\n<ol>\n<li>\n<p><strong>確認備援電力成功切換</strong>：血庫人員必須協同工務室（O2），確認設置於 <strong>馬太 B1 藥庫冰箱</strong> 的血庫專用保存冰箱，其緊急 UPS 不斷電系統與柴油發電機在電力中斷 10 秒內已成功無縫供電，確保血品持續處於 <strong>1\\~6°C</strong> 的嚴格連續溫度監控中。</p>\n</li>\n<li>\n<p><strong>極限溫度物理維持</strong>：若發電機切換出現短暫異常，血庫冰箱在電力中斷期間應<strong>嚴禁非必要開關</strong>，以物理被動保溫方式死守冷鏈；若電力長時間無法恢復，立即啟用移動式冷藏血庫箱並置入冰寶轉移。</p>\n</li>\n</ol>\n<p>三、 極端斷援絕境下，實兵啟動「走動式血庫 (Walking Blood Bank)」\n(活體抽血肉搏)</p>\n<p>若爆炸引發城鎮封鎖、交通中斷，且高雄捐血中心因全台缺血無法即時運補，而庫存血品即將用罄時，血庫立即轉為自給自足的「走動式血庫」：</p>\n<ol>\n<li>\n<p><strong>緊急活體召集</strong>：經指揮官核准後，血庫會同後勤任務支援組（L2）啟用平時已預先篩檢、建檔之<strong>「院內員工/志工血型與傳染病篩檢名冊」</strong>，透過緊急廣播召集符合血型（以 O 型為優先）的在院同仁。</p>\n</li>\n<li>\n<p><strong>架設臨時採血站</strong>：於結構安全且通風的地下避難空間（建議維持在 <strong>20\\~24°C</strong>，如恩慈大樓 B2 運動中心或韓偉大樓 B1 臨時捐血區）極速架設登記、問診、採集與休息四區。</p>\n</li>\n<li>\n<p><strong>戰地極簡化採檢與安全篩檢</strong>： -   由 4\\~6 人組成的捐血作業小組引導同仁手寫填報「捐血登記表與健康問卷」。 -   現場進行面談問診與血紅素（Hb）極簡快篩，死守供血與受血安全。 -   <strong>一律僅採集新鮮「全血（Whole Blood）」</strong>，跳過耗時的成分分離程序，直接進行 ABO/Rh 血型與三病（HIV, HBV, HCV）快速篩檢，以百米衝刺的速度搶奪救命時間。</p>\n</li>\n</ol>\n<p>四、 HIS / LIS 無網當機下，全面切換「紙本降級 (Downtime)」</p>\n<p>若爆炸伴隨資訊機房癱瘓或資安異常：</p>\n<ol>\n<li>\n<p><strong>啟用手工表單</strong>：血庫人員立即砸開「當機緊急箱（Downtime Box）」，停止電子發血及計價。全面切換改用預印之紙本<strong>「災時捐血血液檢驗單（手工檢驗單）」</strong>及手寫血袋標籤維持運作。</p>\n</li>\n<li>\n<p><strong>口頭危險值「Read-back」覆誦確認</strong>：血庫與臨時開刀房、檢驗科之間若無法傳輸電子數據，所有的血液配對、交叉試驗結果一律改以無線電、電話或人工持單口頭回報。<strong>通報者與接聽的護理師必須強制執行「Read-back（口頭覆誦雙重確認）」機制</strong>，大聲唸出「病患姓名、病歷號、血袋號碼與血型」，嚴防在震動與噪音中發生致命的給錯血、輸錯血醫療疏失。</p>\n</li>\n</ol>\n<p>五、 實施「推拉式盲派 (Push Logistics)」與傳令兵速遞</p>\n<ol>\n<li>\n<p><strong>打破常規盲派</strong>：不等待前線醫師在混亂中填單申請（Pull），血庫配合資材組與藥劑科，主動將備妥之第一波救命 O 型血品直接<strong>「盲派（Push）」</strong>送往戰傷最火線。</p>\n</li>\n<li>\n<p><strong>傳令兵（Runner）體溫速遞</strong>：對於剛採集完成、尙有同工體溫之新鮮全血（Fresh Whole Blood，若採集後預計 24 小時內使用則不需冷藏，超過 24 小時則須於 4~~6 小時內送回 1~~6°C 冰箱），直接交由行政同仁或輕傷志工組成的<strong>「傳令兵（Runner）」以徒步衝刺方式直達韓偉 B1 臨時開刀房</strong>，直接輸入重創瀕死同工體內。</p>\n</li>\n</ol>\n<p>🔬\n走動式血庫在極限狀態下的運作需要全院同仁高度默契，我可以為您將這套「血庫當機、斷電與員工活體捐血（Walking\nBlood Bank）標準流程」，整理成一張可放置於馬太 B1 藥庫冰箱旁的實體 A4\n雙面防水平戰轉換操作 SOP 卡嗎？</p>"}]}, {"role": "檢驗科", "entries": [{"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊/大當機）」，此危機同時涵蓋了輿論恐慌與資訊系統癱瘓。</p>\n<p>檢驗科（含血庫）在\nHICS（醫院事故指揮系統）中隸屬於<strong>執行部（醫療照護組）</strong>之醫療輔助單位。面對電腦當機與混亂，檢驗科必須立即切換為「無網作業」模式，確保攸關性命的檢驗數據與血品供應不中斷。其具體因應作為如下：</p>\n<p><strong>一、 啟動「紙本降級（Downtime）」與人工檢驗通報機制</strong></p>\n<ol>\n<li>\n<p><strong>切換手工單據作業</strong>：當檢驗系統（LIS/HIS）出現延遲或失效時，檢驗科必須立即停止依賴電腦系統。醫師無法開立電腦檢查單時，全面改為接收「手工單」與「災時捐血血液檢驗單」進行檢驗作業。</p>\n</li>\n<li>\n<p><strong>人工跑單與危險值覆誦（Read-back）</strong>：檢驗科停止電腦傳輸報告，改以「人工跑單（傳令兵）」方式遞送，或透過對講機、電話向臨床口頭回報危險值（Panic\n    Value）。在口頭回報過程中，必須嚴格執行「Read-back（覆誦確認）」機制，確保在無網狀態下的醫療數據傳遞絕對正確。</p>\n</li>\n<li>\n<p><strong>系統復原後之資料回補</strong>：當機期間的手寫報告雖無法由電腦查閱，但檢驗科必須妥善留存所有檢驗單據。待事件過後資訊系統恢復，先由相關單位入帳，檢驗室再將檢驗報告人工補輸入電腦系統中，以維持病歷完整性。</p>\n</li>\n</ol>\n<p><strong>二、 啟動血庫應變與「走動式血庫（Walking Blood Bank）」</strong></p>\n<ol>\n<li>\n<p><strong>盤點並回報血品存量</strong>：檢驗科須立即清點血庫中現有之血液及各血型存量，並迅速向指揮官（或計畫部）報告。這些精確的存量數據也可提供給發言官，作為反制社群媒體流傳「本院缺藥/缺血」假訊息的客觀闢謠證據。若血庫缺血，需立即向捐血中心請求支援。</p>\n</li>\n<li>\n<p><strong>極限啟動活體血庫</strong>：若遭遇聯外交通中斷或全台缺血，無法獲得高雄捐血中心運補，且血庫庫存見底時，檢驗科須配合啟動北約軍醫常用的「走動式血庫（Walking\n    Blood Bank）」計畫。緊急召集院內名冊上符合條件的 O\n    型血員工與志工，跳過平時繁瑣的血液分離程序，現場抽取「全血（Whole\n    Blood）」並進行極簡化的交叉試驗快篩，交由傳令兵極速送往急診紅區或開刀房搶救瀕死傷患。</p>\n</li>\n</ol>\n<p><strong>三、 啟動「檢驗科緊急召回辦法」與支援急診前線</strong>\n系統當機將導致檢驗流程大幅變慢，若現場同時伴隨恐慌人潮或大量傷患，檢驗科必須迅速彌補人力缺口：</p>\n<ol>\n<li>\n<p><strong>評估與緊急召回</strong>：依據急診的傷患人數與發生時段啟動召回機制。例如：平日急診大量傷患人數大於\n    10 人，或星期六下午、星期日及大夜班人數大於 20\n    人時，檢驗科值班人員須立即通知主任。由主任進行人力調度，通知醫檢師回院支援。</p>\n</li>\n<li>\n<p><strong>派員前線抽血與主動回報</strong>：由檢驗科組長安排被召回的醫檢師，直接前往急診室協助護理人員進行抽血採檢作業，減輕急診前線的高壓負擔。檢體送至檢驗科後，必須主動、快速地將各項檢驗報告提供給急診醫療人員，確保搶救流程順暢。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院的「數位神經系統」與檢驗資訊系統（LIS）遭到全面癱瘓，陷入「又盲又啞」的極端危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>檢驗科（含血庫）</strong>作為執行部醫療照護的關鍵輔助單位，必須立即切換為「無網作業」與「實體降級」模式，確保攸關性命的檢驗數據與血品供應不因駭客攻擊而中斷。其具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」與手工單據作業</strong></p>\n<ol>\n<li>\n<p><strong>切換離線作業</strong>：接獲資訊室宣告當機後，檢驗科必須立即停止依賴電腦系統，砸破封條取出「當機緊急箱（Downtime Box）」。</p>\n</li>\n<li>\n<p><strong>接收手工檢驗單</strong>：前線醫師無法開立電腦檢查單時，檢驗科全面改為接收「手工檢驗單」及「災時捐血血液檢驗單」進行檢驗與備血作業。</p>\n</li>\n</ol>\n<p><strong>二、 啟動人工傳遞與危險值「覆誦確認（Read-back）」機制</strong></p>\n<ol>\n<li>\n<p><strong>傳令兵（Runner）機制</strong>：停止電腦傳輸報告，配合院內啟動的最古老且抗電磁干擾的「傳令兵」制度。由穿著反光背心的專人以徒步方式，在檢驗科與急診、開刀房之間穿梭，精準遞送手寫的檢驗報告與血液配對單。</p>\n</li>\n<li>\n<p><strong>嚴格執行 Read-back</strong>：針對檢驗危險值（Panic Value），改以對講機或人工電話向臨床醫師或護理人員口頭回報。為防範無網狀態下失去電腦警示的醫療錯誤，必須嚴格要求雙方執行「Read-back（覆誦確認）」機制，確保數據傳遞絕對正確。</p>\n</li>\n</ol>\n<p><strong>三、 血庫無網應變與整備「走動式血庫（Walking Blood Bank）」</strong></p>\n<ol>\n<li>\n<p><strong>紙本備血與發血</strong>：血庫須全面切換為紙本降級模式，依賴備援的手寫血袋標籤與手工檢驗單維持發血作業，並確實核對傳令兵送來的實體配對單。</p>\n</li>\n<li>\n<p><strong>盤點與闢謠支援</strong>：在系統當機期間，以人工方式盤點血庫現有血液及各血型存量，並迅速向指揮官或計畫部報告，以利發言官反制社群媒體上可能流傳的「醫院遭攻擊缺血」等不實假訊息。</p>\n</li>\n<li>\n<p><strong>活體血庫啟動準備</strong>：若網路攻擊伴隨實體戰火導致外部捐血中心無法運補且血庫見底，檢驗科須準備啟動「走動式血庫」。緊急召集建檔的 O 型血員工現場抽血，進行極簡化的交叉試驗快篩（如僅檢驗 ABO、Rh 及 HIV、HCV、HBV 等）後，由傳令兵百米衝刺送往前線搶救。</p>\n</li>\n</ol>\n<p><strong>四、 災後「資料回補」與病歷完整性保全</strong></p>\n<ol>\n<li>\n<p><strong>實體單據保全</strong>：當機與系統遭勒索期間，所有的手寫檢驗報告與配血單據雖無法上傳電腦，但檢驗科必須妥善集中與留存所有實體紙本單據。</p>\n</li>\n<li>\n<p><strong>系統復原後回補</strong>：待資訊室完成資安事件阻斷、病毒排除並恢復 LIS/HIS 系統上線後，檢驗室人員須將離線作業期間的檢驗報告，以人工方式補輸入電腦系統中，確保病患電子病歷的完整性與後續醫療接軌。</p>\n</li>\n</ol>\n<p><strong>五、 視傷患規模啟動緊急召回與「前線抽血支援」</strong></p>\n<ol>\n<li>\n<p><strong>人力召回與調度</strong>：若此次 APT/DDoS 攻擊同時伴隨大量傷病患湧入，系統當機將導致檢驗流程大幅變慢。檢驗科須依據急診傷患人數啟動緊急召回辦法，通知休假醫檢師回院支援。</p>\n</li>\n<li>\n<p><strong>前線主動支援</strong>：由檢驗科組長安排被召回的醫檢師，直接前往急診室現場，協助護理人員進行抽血採檢作業。並在完成檢驗後，化被動為主動，快速將各項檢驗報告遞交給急診醫療人員，減輕前線高壓負擔。</p>\n</li>\n</ol>"}, {"scenario": "1-7", "title": "院內網路服務不穩", "desc": "院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對「院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊/大當機）」的複合性危機，這同時涵蓋了輿論恐慌與資訊系統癱瘓。在\nHICS（醫院事故指揮系統）中，檢驗科（含血庫）隸屬於執行部（醫療照護組）之醫療輔助單位。面對電腦當機與混亂，檢驗科必須立即切換為「無網作業」模式，確保攸關性命的檢驗數據與血品供應不中斷。</p>\n<p>檢驗科的具體因應作為如下：</p>\n<p><strong>一、 啟動「紙本降級（Downtime）」與人工檢驗通報機制</strong></p>\n<ul>\n<li>\n<p><strong>切換手工單據作業</strong>：當檢驗系統（LIS）及醫療資訊系統（HIS）出現嚴重延遲或失效時，檢驗科必須立即停止依賴電腦系統。在前線醫師無法開立電腦檢查單的極端情況下，全面改為接收「手工單」與「災時捐血血液檢驗單」來進行後續的檢驗與給血作業。</p>\n</li>\n<li>\n<p><strong>人工跑單與危險值覆誦（Read-back）</strong>：檢驗科須停止依賴電腦傳輸報告，改以配合行政單位的「人工跑單（傳令兵）」方式進行遞送。若有檢驗危險值（Panic Value），則改透過對講機或人工電話向臨床單位口頭回報。在口頭回報過程中，必須嚴格要求雙方執行「Read-back（覆誦確認）」機制，確保在無網狀態下的醫療關鍵數據傳遞絕對正確，防止因通訊不良導致的醫療疏失。</p>\n</li>\n<li>\n<p><strong>系統復原後之資料回補</strong>：雖然當機期間的手寫報告無法即時由電腦系統查閱，但檢驗科必須妥善留存所有的檢驗單據與紙本紀錄。待資安事件排除、資訊系統恢復正常運作後，先由相關單位將醫療費用入帳，檢驗室再將檢驗報告以人工方式補輸入至電腦系統中，以維持病歷的完整性與法效性。</p>\n</li>\n</ul>\n<p><strong>二、 啟動血庫應變與「走動式血庫（Walking Blood Bank）」極限調度</strong></p>\n<ul>\n<li>\n<p><strong>盤點並回報血品存量（支援闢謠）</strong>：檢驗科須立即清點血庫中現有之血液及各血型的實際存量，並迅速向指揮官或計畫部報告。這些精確的存量數據可以提供給發言官（醫療副院長），作為反制社群媒體上流傳「本院缺血/拒收病人」等假訊息的客觀闢謠證據。若血庫確實面臨缺血危機，則需立即向捐血中心請求緊急支援。</p>\n</li>\n<li>\n<p><strong>極限啟動活體血庫</strong>：若遭遇聯外交通中斷、全台缺血，或無法獲得捐血中心運補且血庫庫存見底時，檢驗科須配合啟動北約軍醫常用的「走動式血庫（Walking Blood Bank）」計畫。緊急召集院內名冊上符合條件的 O 型血員工與志工，跳過平時繁瑣的血液分離程序，現場直接抽取「全血（Whole Blood）」並進行極簡化的交叉試驗快篩，交由傳令兵極速送往急診紅區或開刀房，搶救瀕死傷患。</p>\n</li>\n</ul>\n<p><strong>三、 啟動「檢驗科緊急召回辦法」與支援急診前線</strong>\n系統當機將導致所有檢驗流程大幅變慢，若現場同時伴隨恐慌人潮或大量傷患，檢驗科必須迅速彌補人力缺口以應付暴增的需求：</p>\n<ul>\n<li>\n<p><strong>評估與緊急召回</strong>：依據急診的傷患人數與發生時段啟動緊急召回機制。例如：平日急診大量傷患人數大於 10 人，或星期六下午、星期日及大夜班人數大於 20 人時，檢驗科值班人員須立即通知主任，由主任進行全科的人力調度，並通知醫檢師回院支援。</p>\n</li>\n<li>\n<p><strong>派員前線抽血與主動回報</strong>：由檢驗科組長安排被召回的醫檢師，直接前往急診室現場協助護理人員進行戰傷或急重症病患的採檢與抽血作業，減輕急診前線的高壓負擔。檢體送至檢驗科完成檢驗後，檢驗科必須化被動為主動，快速地將各項檢驗報告提供給急診醫療人員，確保前線搶救流程順暢無阻。</p>\n</li>\n</ul>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨戰傷病患洪流，醫療輔助的診斷與輸血量能將面臨極限挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>檢驗科（含血庫）「醫療照護組（O1）」</strong>，並為演習編組中<strong>「醫療應變與傷患搶救組」</strong>的關鍵輔助單位。</p>\n<p>面對大量傷患與檢驗、輸血需求的暴增，檢驗科的具體因應作為如下：</p>\n<p><strong>一、 啟動「急診 333」大量傷患召回與前線抽血支援</strong> 接獲總機廣播「急診\n333」後，檢驗科必須立即打破常規排班，進行緊急人力召回與前線支援：</p>\n<ol>\n<li>\n<p><strong>依傷患規模啟動召回</strong>：</p>\n<ul>\n<li>\n<p><strong>平日</strong>：急診室評估大量傷患人數（以 10\n    人為界線），檢驗科值班人員通知主任，由主任進行人力調度與通知回院支援。</p>\n</li>\n<li>\n<p><strong>假日與大夜班</strong>：急診室評估大量傷患人數（以 20\n    人為界線），由主任進行人力調度與通知回院支援。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>前線抽血支援</strong>：由組長安排醫檢師直接前往急診室現場，協助急診護理人員進行戰傷病患的緊急採檢與抽血作業。</p>\n</li>\n</ol>\n<p><strong>二、 執行緊急檢驗與「主動式」報告發布</strong></p>\n<ol>\n<li>\n<p><strong>專責處理緊急檢驗</strong>：急診前線採集完成的檢體，須迅速送至 <strong>4F\n    檢驗科</strong>，並派專員全責處理各項緊急戰傷檢驗工作。</p>\n</li>\n<li>\n<p><strong>主動回報機制</strong>：在戰傷搶救的高壓環境下，檢驗科人員必須化被動為主動，快速且主動向急診前線醫療人員提供各項檢驗報告，以確保創傷團隊能迅速判斷傷情與後續處置。</p>\n</li>\n</ol>\n<p><strong>三、 血庫極限調控與啟動「走動式血庫（活體捐血）」</strong>\n面對大量戰傷手術與急救暴增的用血需求，檢驗科（血庫）須採取非常規的血液調度機制：</p>\n<ol>\n<li>\n<p><strong>庫存回報與外部求援</strong>：檢驗科負責立即向指揮官報告現有血庫血液總量及各血型存量；若血庫面臨缺血危機，需立即向外部捐血中心請求緊急運補支援。</p>\n</li>\n<li>\n<p><strong>啟動走動式血庫</strong>：若因戰火封鎖導致血液枯竭、外部運補中斷，檢驗科需配合啟動院內員工的<strong>「活體捐血（走動式血庫）」</strong>計畫。</p>\n</li>\n<li>\n<p><strong>戰地極簡化採檢</strong>：在動員實施階段的臨時捐血作業中，<strong>僅採集「全血」</strong>以供前線急救，並執行極簡化的快篩項目（僅檢驗\n    ABO 血型、Rh 血型，以及 HIV、HCV、HBV），以爭取黃金搶救時間。</p>\n</li>\n</ol>\n<p><strong>四、 資訊中斷下之「紙本降級（Downtime）」檢驗作業</strong>\n若戰火震波或駭客攻擊導致醫院檢驗資訊系統（LIS）與網路癱瘓，檢驗科將面臨無法從電腦接收醫囑或發布報告的極端危機：</p>\n<ol>\n<li>\n<p><strong>切換人工紙本作業</strong>：檢驗科須配合全院轉入紙本降級模式，全面改採手寫檢驗單與紙本報告維持運作。</p>\n</li>\n<li>\n<p><strong>危險值口頭回報與傳令速遞</strong>：檢驗科改以對講機或人工電話回報檢驗危險值（Panic\n    Value），並嚴格執行「Read-back（覆誦確認）」機制以防錯誤；同時配合行政單位的「傳令兵（Runner）」制度，以徒步衝刺方式在\n    4F 檢驗科與 B1 臨時開刀房、臨時 ICU\n    之間精準傳遞檢驗報告與血液配對單。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>在機電棟爆炸且造成兩名工務同仁砸傷、其中一人<strong>嚴重骨折且大出血</strong>的極端院內危機下，醫院可能同時面臨電力瞬斷、自來水與網路中斷、以及常規資訊系統（HIS/LIS）大當機（Downtime）。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>檢驗科（含血庫）隸屬於執行部「醫療照護組（O1）」</strong>，同時是演習與實災編組中「醫療應變與傷患搶救組」的最核心臨床輔助單位。面對受創同工命懸一線的「失血性休克」威脅，檢驗科將採取以下<strong>五大具體生存應變作為</strong>，全力搶救同仁生命：</p>\n<p>一、 啟動「333/999」緊急召回，派員進駐急診現場協助抽血</p>\n<ol>\n<li>\n<p><strong>即時判定與人力召回</strong>：聽聞總機因爆炸與工務同仁重創廣播「紅色訊號（爆炸火災）」、「院內急救 999 訊號」與「大量傷患 333」後，檢驗科主任立即啟動<strong>「檢驗科緊急召回機制」</strong>： -   <em>平日 normal hours</em>：急診 333 評估人數 &gt;10 人時，主任進行人力調度召回支援；但此時雖僅有 2 名工務同仁受傷，但因涉及嚴重爆震創傷與骨折大出血，檢驗科應<strong>依據創傷急救之緊急特殊性，破格召回休假與院外人員</strong>。 -   <em>夜間/假日大夜班</em>：急診 333 評估人數 &gt;20 人時召回，此極端事件中值班人員應立刻通知組長與主任，展開緊急調度。</p>\n</li>\n<li>\n<p><strong>派員前線抽血肉搏</strong>：由檢驗科組長指派被召回或在科內的醫檢師，迅速攜帶採檢耗材<strong>親自奔赴急診室現場（或 B1 地下檢傷行政區），直接協助護理同工進行戰傷病患的緊急採檢與抽血作業</strong>，節省急診醫護搶救大出血的寶貴時間。</p>\n</li>\n</ol>\n<p>二、 暴力啟用「紙本降級（Downtime）」作業，死守無網檢驗底線</p>\n<p>機電棟損毀極易導致全院市電瞬斷或網路癱瘓。一旦資訊室（O5）因當機宣告 LIS\n資訊系統癱瘓：</p>\n<ol>\n<li>\n<p><strong>切換手工單據收單</strong>：檢驗科立即<strong>停止依賴 LIS 自動傳輸系統，全面接收醫師手寫之「三聯式紙本手工檢驗單」與「災時捐血血液檢驗單」</strong>，手工登錄檢體編號。</p>\n</li>\n<li>\n<p><strong>檢體安全人工配送</strong>：由於停電或電網不穩，<strong>檢驗科絕對禁用氣送系統（Pneumatic Tubes）傳遞檢體，所有血液及生化檢體一律使用專用夾鏈袋與傳送箱，由臨床派出的「徒步傳令兵（Runner）」以跑步方式送達 4 樓檢驗科</strong>，防止檢體遺失或溶血。</p>\n</li>\n<li>\n<p><strong>實體手寫報告與「主動化」回報</strong>：醫檢師完成化驗後，一律發出「實體手寫檢驗報告」。檢驗科人員必須化被動為主動，派專員全責處理該受創同工之各項檢驗。</p>\n</li>\n<li>\n<p><strong>強制執行危險值「Read-back」覆誦確認</strong>：因系統全黑，檢驗科必須改用電話或全院無線電，口頭向急診紅區或 B1 臨時手術室通報關鍵危險值（如 Hb 血紅素極低、交叉配血結果）。<strong>接聽的護理同工與通報的醫檢師，必須嚴格執行「口頭覆誦雙重確認（Read-back）」，逐字唸出「病患姓名、病歷號及檢驗數據」</strong>，防範因混亂或爆震噪音導致給藥或輸血錯誤。</p>\n</li>\n</ol>\n<p>三、 血庫極限調控與「走動式血庫（活體捐血）」孤島備援</p>\n<p>針對工務同仁「大出血與失血性休克」之致命危急，血庫必須採取非常規血液調度：</p>\n<ol>\n<li>\n<p><strong>即時庫存陳報與外部求援</strong>：血庫負責人第一時間向指揮官報告現有血庫血液總量及 O 型、各血型存量。若預估大出血同工手術用血將瞬間耗盡庫存，立即透過聯絡官（A3）向高雄捐血中心或國軍聯防醫院請求緊急運補。</p>\n</li>\n<li>\n<p><strong>極端斷援下啟用「走動式血庫（Walking Blood Bank）」</strong>：若因聯外道路炸平、交通中斷導致外部血庫無法及時送達： -   <strong>緊急廣播活體召集</strong>：配合 L2 任務支援組（資材組），立即啟用平時已預先建檔並簽署同意書之<strong>「院內員工/志工血型與傳染病篩檢名冊」</strong>，廣播召集符合血型條件之同仁至安全的地下室臨時抽血站。 -   <strong>健康問卷與標準登記</strong>：即便在極速搶救中，依然透過標準化<strong>「捐血登記表與健康問卷」</strong>實施面談與血紅素（Hb）篩檢，死守受血者與供血者的安全底線。 -   <strong>戰地極簡化採檢與直達前線</strong>：<strong>僅採集 O 型「全血（Whole Blood）」極簡交叉配血與三病（HIV, HBV, HCV）快速篩檢</strong>。快篩一過，直接由傳令兵將保有體溫的活體新鮮全血極速送入 B1 臨時開刀房（韓偉 B1 腹膜透析室），輸入瀕死同工體內。</p>\n</li>\n</ol>\n<p>四、 關鍵儀器防毀損、備援電力死守與廠商連繫</p>\n<ol>\n<li>\n<p><strong>發電機與 UPS 電力確認</strong>：機電棟爆炸可能導致全院停電。檢驗科必須會同工務人員（O2），確保<strong>血庫冰箱、離心機、血液鑑定儀及關鍵分析儀器之不斷電系統（UPS）與備用發電機迴路成功切換</strong>，百分之百死守血庫冷鏈電力。</p>\n</li>\n<li>\n<p><strong>異常排除與關鍵廠商連繫</strong>：若因電力瞬斷造成關鍵檢驗儀器故障，值班同仁須即刻聯繫合約廠商緊急搶修，防止診斷中斷： -   <strong>血庫血型抗體鑑定系統</strong>：聯繫力暘方先生（0975186026）。 -   <strong>檢驗科 CO2 培養箱</strong>：聯繫承洺科技張勝致（0933308018）。 -   <strong>分生室生物安全櫃保養</strong>：聯繫圓哲科技鄭益昇（0931260379）。</p>\n</li>\n</ol>\n<p>五、 災後系統復原與紙本資料補登</p>\n<ol>\n<li>\n<p><strong>妥善留存紙本與計價</strong>：當機與搶救期間，所有手工檢驗欠繳單、紙本檢驗單及實體手寫報告，均須由檢驗科專夾妥善保存。</p>\n</li>\n<li>\n<p><strong>人工補登回補（Data Backfilling）</strong>：待市電恢復、資訊室宣告HIS/LIS系統完全排除故障並重新開機後，檢驗科醫檢師必須<strong>手動將當機期間的所有檢驗數值、配血紀錄與輸血報告人工補登至HIS/LIS電腦系統中</strong>，以維持病歷的完整性與後續醫業計價。</p>\n</li>\n</ol>"}]}, {"role": "放射科", "entries": [{"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊/大當機）」，此危機同時涵蓋了輿論恐慌與資訊系統癱瘓。</p>\n<p>放射科在\nHICS（醫院事故指揮系統）中隸屬於<strong>執行部（醫療照護組）</strong>之重要醫療輔助單位。面對影像系統（PACS）與醫療資訊系統（HIS）的癱瘓或嚴重延遲，放射科必須立即切換為「無網/離線作業」模式，確保攸關性命的緊急影像檢查不中斷。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 啟動「紙本降級（Downtime）」與離線影像傳遞機制</strong></p>\n<ol>\n<li>\n<p><strong>切換紙本手工單作業</strong>：當 HIS\n    系統出現延遲或失效，醫師無法開立電腦檢查單時，放射科必須立即停止依賴電腦系統，全面改為接收醫師手寫的「紙本手工單（當機緊急箱內表單）」來執行\n    X 光或電腦斷層等影像檢查。</p>\n</li>\n<li>\n<p><strong>實體影像與翻拍傳遞</strong>：在 PACS 系統當機、無法透過 WEB\n    傳輸數位影像供臨床醫師閱片時，放射科須回歸古老的作業模式，沖洗實體 X\n    光片交由傳令兵遞送；或者協調臨床醫師直接前往放射機房，以數位相機或拍立得直接翻拍螢幕，透過人工方式將影像帶回前線，克服斷網危機以爭取搶救時效。</p>\n</li>\n<li>\n<p><strong>系統復原後之資料回補</strong>：當機期間的所有紙本檢查單據必須妥善集中保管。待資安事件排除、資訊系統恢復正常運作後，放射科人員須事後補開單，並將離線作業期間的影像重新上傳至\n    WEB 與 PACS 系統中，確保病患電子病歷的完整性。</p>\n</li>\n</ol>\n<p><strong>二、 啟動「放射科緊急召回辦法」彌補作業延遲</strong>\n系統大當機將導致每位病患的報到、檢查與影像傳遞時間大幅拉長。若現場同時伴隨恐慌就醫人潮或大量傷患，放射科必須迅速啟動人力召回以應付急重症需求：</p>\n<ol>\n<li>\n<p><strong>平日時段應變</strong>：若遇突發狀況致當班人員無法負荷（如接獲急診 333\n    廣播），值班人員須立即通報放射科組長，由組長機動調派門診放射人力前往支援急診與重症影像檢查，直至全數檢查完成。</p>\n</li>\n<li>\n<p><strong>假日與夜間召回</strong>：若於非上班時間發生系統癱瘓與大量需求，值班人員須通報組長，由組長啟動緊急召回機制，調派人員回院支援。</p>\n</li>\n<li>\n<p><strong>支援病患推送</strong>：在資訊當機且全院人力吃緊的混亂狀態下，放射科人員須主動協助需接受\n    X 光檢查之病患的推送與搬運作業，減輕急診前線的勤務負擔。</p>\n</li>\n</ol>\n<p><strong>三、 配合醫療降載與提供真實數據（支援闢謠）</strong></p>\n<ol>\n<li>\n<p><strong>暫停常規排檢</strong>：面對系統延遲與假訊息引發的就醫亂象，放射科須配合醫務部（執行部長）的決策，暫停非急迫性的常規影像排檢與健檢業務，將寶貴的檢查設備與人員量能絕對集中於急重症與戰傷搶救。</p>\n</li>\n<li>\n<p><strong>數據對接闢謠</strong>：放射科主管須精確盤點本科設備（如 X\n    光機、CT、MRI）的實際運作狀況與量能，迅速回報給計畫部的「資源控管組（P1）」。這些真實的運作數據將提供給發言官（醫療副院長），作為對外發布新聞稿、反駁社群媒體流傳「本院停診或遭攻擊癱瘓」等假訊息的客觀證據。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對特別狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院瞬間失去了「數位神經系統」，醫療影像儲傳系統（PACS）完全無法運作，前線醫師將面臨「看不見X光與CT影像」的極端危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>放射科</strong>隸屬於執行部門的<strong>「醫療照護組（O1）」</strong>，作為關鍵的醫療輔助單位，必須立即切換為「無網/離線作業」模式，確保攸關性命的緊急影像檢查不因駭客攻擊而中斷。其具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」與紙本手工單作業</strong></p>\n<ol>\n<li>\n<p><strong>切換紙本開單</strong>：當 HIS 系統遭勒索軟體癱瘓、醫師無法開立電腦檢查單時，放射科必須立即停止依賴電腦系統，啟動「當機緊急箱（Downtime Box）」，全面改為接收前線醫師手寫的「紙本手工單」來執行 X 光或電腦斷層（CT）等影像檢查。</p>\n</li>\n<li>\n<p><strong>停止常規排檢</strong>：配合全院醫療降載政策，放射科須立即暫停非急迫性的常規影像排檢與健檢業務，將寶貴的檢查設備與人員量能，絕對集中於戰傷與急重症搶救。</p>\n</li>\n</ol>\n<p><strong>二、 克服 PACS 癱瘓的「離線影像傳遞」極限應變</strong> 在網路中斷且 PACS\n系統遭癱瘓，無法透過 WEB\n傳輸數位影像供臨床醫師閱片時，放射科須採取極限替代方案：</p>\n<ol>\n<li>\n<p><strong>回歸實體膠片</strong>：放射科須回歸古老的作業模式，沖洗實體 X 光片（膠片），並交由傳令兵（Runner）遞送至急診或開刀房。</p>\n</li>\n<li>\n<p><strong>螢幕翻拍傳遞</strong>：若無法沖洗膠片，則協調臨床醫師直接前往放射科機房，以數位相機或拍立得直接翻拍螢幕上的醫學影像，透過人工方式將影像帶回前線作為診斷依據，克服斷網危機以爭取搶救時效。</p>\n</li>\n</ol>\n<p><strong>三、 配合「傳令兵（Runner）」機制與主動前線支援</strong></p>\n<ol>\n<li>\n<p><strong>人工徒步傳遞</strong>：在網路與院內電話皆癱瘓的「又盲又啞」狀態下，放射科須配合院內啟動的最古老且抗電磁干擾的「傳令兵（Runner）」制度。透過穿著反光背心的專人徒步穿梭，接收緊急手寫檢查單，並精準遞送實體影像報告。</p>\n</li>\n<li>\n<p><strong>主動協助推送搬運</strong>：在資訊當機且全院人力吃緊的混亂狀態下，放射科人員必須打破常規，主動協助需接受 X 光檢查之急重症病患的推送與搬運作業，減輕急診前線的勤務負擔。</p>\n</li>\n</ol>\n<p><strong>四、 視傷患規模啟動「緊急人力召回」</strong>\n系統大當機將導致每位病患的報到、檢查與影像產出時間大幅拉長。若駭客攻擊同時伴隨外部戰傷大量病患湧入，放射科必須迅速啟動人力召回以應付急重症需求：</p>\n<ol>\n<li><strong>機動調派與召回</strong>：平日時段由組長機動調派門診放射人力前往支援急診；若為假日或夜間發生系統癱瘓，值班人員須通報組長啟動緊急召回機制，調派休假人員回院支援，直至全數緊急檢查完成。</li>\n</ol>\n<p><strong>五、 災後「資料回補」與影像保全</strong></p>\n<ol>\n<li>\n<p><strong>單據與影像保全</strong>：當機與系統遭勒索期間，所有的紙本檢查單據及離線拍攝的影像檔案必須妥善集中保管。</p>\n</li>\n<li>\n<p><strong>系統復原後回補</strong>：待資訊室完成資安事件阻斷、病毒排除並恢復 PACS/HIS 系統正常上線後，放射科人員須事後補開單，並將離線作業期間的影像資料重新上傳至 WEB 與 PACS 系統中，確保病患電子病歷的完整性與後續醫療接軌。</p>\n</li>\n</ol>"}, {"scenario": "1-7", "title": "院內網路服務不穩", "desc": "院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況「院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊/大當機）」，此危機同時涵蓋了輿論恐慌與資訊系統癱瘓。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>放射科</strong>隸屬於執行部門的醫療輔助單位。面對影像系統（PACS）與醫療資訊系統（HIS）的癱瘓或嚴重延遲，放射科必須立即切換為「無網/離線作業」模式，確保攸關性命的緊急影像檢查與急診前線搶救不中斷。</p>\n<p>放射科的具體因應作為如下：</p>\n<p><strong>一、 啟動「紙本降級（Downtime）」與離線影像傳遞機制</strong></p>\n<ol>\n<li>\n<p><strong>切換紙本手工單作業</strong>：當 HIS 系統出現延遲或失效，導致醫師無法開立電腦檢查單時，放射科必須立即停止依賴電腦系統，全面改為接收前線醫師手寫的「紙本手工單」（取自當機緊急箱內的表單）來執行 X 光或電腦斷層（CT）等影像檢查。</p>\n</li>\n<li>\n<p><strong>實體膠片與人工傳遞影像</strong>：在 PACS 系統當機、無法透過 WEB 傳輸數位影像供臨床醫師閱片時，放射科須回歸類比的作業模式，改為沖洗實體 X 光片（膠片）並交由傳令兵遞送；或者協調臨床醫師直接前往放射機房，以數位相機或拍立得直接翻拍電腦螢幕，透過人工方式將影像帶回前線，克服斷網危機以爭取搶救時效。</p>\n</li>\n<li>\n<p><strong>系統復原後之資料回補</strong>：當機期間所有的紙本檢查單據必須妥善集中保管。待資安事件排除、資訊系統恢復正常運作後，放射科人員須事後補開單，並將離線作業期間產生的影像重新上傳至 WEB 與 PACS 系統中，確保病患電子病歷的完整性與法效性。</p>\n</li>\n</ol>\n<p><strong>二、 啟動「放射科緊急召回辦法」彌補人工降級之作業延遲</strong>\n系統大當機將導致每位病患的報到、檢查與影像傳遞時間大幅拉長。若現場同時伴隨恐慌就醫人潮或大量傷患，放射科必須迅速啟動人力支援以應付急重症需求：</p>\n<ol>\n<li>\n<p><strong>平日時段應變</strong>：若遇突發狀況致當班人員無法負荷，值班人員須立即通報放射科組長，由組長機動調派門診放射人力前往支援急診與重症影像檢查，直至全數檢查完成。</p>\n</li>\n<li>\n<p><strong>假日與夜間召回</strong>：若於非上班時間發生系統癱瘓與大量需求，值班人員須通報組長，由組長啟動緊急召回機制，調派人員回院支援。</p>\n</li>\n<li>\n<p><strong>主動協助病患推送</strong>：在資訊當機且全院人力吃緊的混亂狀態下，放射科人員須打破常規，主動協助需接受 X 光檢查之病患進行推床與搬運作業，以減輕急診前線的勤務負擔。</p>\n</li>\n</ol>\n<p><strong>三、 配合醫療降載與提供真實量能數據（支援闢謠）</strong></p>\n<ol>\n<li>\n<p><strong>暫停常規排檢</strong>：面對系統延遲與假訊息引發的就醫亂象，放射科須配合醫務部（執行部長）的決策，暫停非急迫性的常規影像排檢與健檢業務，將寶貴的檢查設備與人員量能絕對集中於急重症與急診搶救。</p>\n</li>\n<li>\n<p><strong>數據對接闢謠</strong>：放射科主管須精確盤點本科設備（如 X 光機、CT、MRI）的實際運作狀況與量能，迅速回報給計畫部的「資源控管組（P1）」。這些真實的運作數據將提供給發言官（醫療副院長），作為對外發布新聞稿、反駁社群媒體流傳「本院遭攻擊癱瘓或停診」等假訊息的最有力客觀證據。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨戰傷病患洪流，影像診斷需求將面臨極限挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>放射科</strong>隸屬於執行部門的<strong>「醫療照護組（O1）」</strong>作為關鍵的醫療輔助單位，同時放射科主任亦擔任<strong>「危害控制主管（O3）」</strong>之一。</p>\n<p>面對大量戰傷病患與暴增的影像需求，放射科的具體因應作為如下：</p>\n<p><strong>一、 響應「急診 333」大量傷患動員與緊急召回</strong> 當接獲總機廣播「急診\n333」大量傷患代號，或突發狀況值班人員無法負荷時，放射科必須立即啟動人力支援計畫：</p>\n<ol>\n<li>\n<p><strong>平日應變</strong>：經組長評估後調派人力，由放射科門診人員直接支援急診大量傷患的影像檢查，直至檢查完成，並回報組長及主任。</p>\n</li>\n<li>\n<p><strong>假日應變</strong>：經值班人員評估並通知組長，由組長緊急調派人力回院支援急診大量傷患，直至檢查完成，並落實「值班人員→組長→主任」的通報程序。</p>\n</li>\n</ol>\n<p><strong>二、 執行緊急影像檢查與「主動協助推送」</strong></p>\n<ol>\n<li>\n<p><strong>極速影像產出</strong>：負責執行緊急戰傷病患的 X 光或\n    CT（電腦斷層）檢查，並必須盡快將正確無誤的影像資料傳送至閱片系統，以利急診與創傷外科醫師迅速判斷傷情。</p>\n</li>\n<li>\n<p><strong>主動協助搬運</strong>：在急診前線人力極度吃緊的狀態下，放射科人員必須打破常規，主動協助需接受\n    X 光檢查的病患進行推床與推送作業。</p>\n</li>\n</ol>\n<p><strong>三、 斷網與資安攻擊下之「紙本降級（Downtime）」作業</strong>\n若戰火震波或敵方駭客攻擊導致 PACS（醫療影像儲傳系統）或 HIS\n系統癱瘓，放射科將面臨無法傳輸數位影像的極端危機：</p>\n<ol>\n<li>\n<p><strong>切換紙本手工單</strong>：若臨床醫師無法開立電腦檢查單，須全面改開立「手寫紙本檢查單」。</p>\n</li>\n<li>\n<p><strong>實體膠片與人工傳遞</strong>：在無法傳輸數位影像時，放射科須回歸古老的作業模式，改為沖洗實體\n    X\n    光片（膠片）；或由臨床醫師直接跑至放射科機房，以數位相機或拍立得翻拍螢幕上的影像來傳遞戰情。</p>\n</li>\n<li>\n<p><strong>災後回補</strong>：待事件過後或資訊系統恢復，放射科須事後補開單，並將影像重新上傳至\n    WEB 系統供後續病歷留存。</p>\n</li>\n</ol>\n<p><strong>四、 協助 HICS「危害控制組（O3）」與特殊輻傷處置</strong></p>\n<ol>\n<li>\n<p>放射科主任作為危害控制主管（O3），須協助統籌危害物質的偵檢、監控、洩漏處理與病人除污作業。</p>\n</li>\n<li>\n<p>若戰傷病患伴隨核生化或輻射污染，且病患須離開除污室至放射科執行電腦斷層（CT）檢查時，放射科人員必須嚴格依據本院「輻射污染病人送\n    CT 檢查作業流程」進行防護與管制，確保院內核心影像設備不被輻射污染。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當本院機電棟發生爆炸（紅色訊號），造成兩名工務巡檢同仁遭到砸傷、其中一人<strong>嚴重骨折且大出血</strong>，且伴隨全院停電、通訊或系統中斷之極端複合型危機時，<strong>放射科將在\nHICS（醫院事故指揮系統）中同時扮演「O1\n醫療照護組（輔助醫療核心功能）」與「O3 危害控制組」的雙重戰術要角</strong>。</p>\n<p>在放射科主任<strong>曾文盛</strong>與總技師<strong>江玫君</strong>的坐鎮指揮下，放射團隊將採取以下<strong>五大具體防禦、搶救與極限降級（Downtime）生存作為</strong>，配合急診與外科系全力搶救受創同工：</p>\n<p>一、 響應「紅色與333訊號」，啟動放射人員緊急召回與前線支援</p>\n<ol>\n<li>\n<p><strong>啟動緊急召回</strong>： 聽聞總機廣播「紅色訊號（爆炸火災）」、伴隨「院內急救 999」與「大量傷患急診 333」時，放射科值班同工立即依據<strong>《放射科緊急召回辦法》</strong>通報放射科組長，組長通報放射科主任，並依時段調度人力： -   <strong>平日時段</strong>：經組長評估後，立即調派放射科門診人員<strong>攜帶移動式/床邊 X 光機直奔急診重傷（紅）搶救區</strong>，或於科內待命執行緊急影像排檢。 -   <strong>假日與夜間大夜班</strong>：值班人員依災情通報組長，由<strong>組長緊急召回院外放射科同工回院支援急診與 B1 臨時開刀房</strong>，以彌補系統延遲造成的排檢時效拉長，確保骨折大出血同工之影像檢查不卡關。</p>\n</li>\n<li>\n<p><strong>主動投入病患無動力垂直搬運</strong>： 若爆炸震波導致院區高樓層病房或急診電梯停擺、且面臨火災或倒塌風險，放射科留守人員須打破常規編制，<strong>攜帶樓梯疏散滑墊（Evacuation Sleds）或軟擔架，主動投入急診前線與病房</strong>。配合護理人員，嚴格遵循<strong>「5 人一組（4 人搬運、1 人護理照護）」</strong>原則，協助將重创同仁及病患以人工徒步方式，垂直疏散轉運至最安全的 <strong>地下一樓（B1）備援醫療空間</strong>。</p>\n</li>\n</ol>\n<p>二、 啟用 B1 地下備援影像，死守紅區電力供應</p>\n<ol>\n<li>\n<p><strong>B1 地下影像功能轉置</strong>： 若地面放射科室受損，放射團隊須配合空間轉置計畫，協助將可攜式超音波與移動式 X 光設備，移轉並重新佈設於 <strong>B1 的輔助醫療區（位於路加大樓 B1 停車場或指派位置）</strong>，維持核心影像功能運作。</p>\n</li>\n<li>\n<p><strong>與工務室死守發電機電力</strong>： 機電棟爆炸極易引發市電中斷。放射科須會同工務室（設施運作主管 O2），在全院執行「電力負載卸除（Load Shedding）」的極限能源管理下，<strong>確保將緊急發電機的電力百分之百優先死守在正在搶救重創同仁的 B1 臨時開刀房（韓偉 B1 腹膜透析室）、臨時 ICU 區，以及維生影像設備上</strong>。</p>\n</li>\n</ol>\n<p>三、 網路與系統癱瘓下，啟動「紙本降級（Downtime）」與 Console 翻拍機制</p>\n<p>若爆炸波及伺服器，導致醫療資訊系統（HIS）與 PACS\n影像系統嚴重延遲或全面當機，放射科立即切換為最抗電磁干擾的「類比無網作業」：</p>\n<ol>\n<li>\n<p><strong>全面接收紙本手工單</strong>： 停止等待電子醫囑，全面接收臨床醫師手寫開立之「紙本手工檢查單（Downtime Box 預印表單）」，以人工登記與安排 X 光、CT 檢查。</p>\n</li>\n<li>\n<p><strong>沖洗實體膠片或實施「相機/拍立得翻拍技術」</strong>： 在 PACS 影像系統癱瘓、無法將數位影像傳輸至診間 WEB 供臨床醫師閱片時，放射科將<strong>回歸古老沖洗實體膠片（X 光片）</strong>方式；若實體沖片受限或耗時，放射師將導引急診創傷團隊與開刀房醫師直接跑至放射科機房，<strong>以數位相機、智慧型手機或拍立得直接翻拍 X 光機或 CT（電腦斷層）控制台螢幕上的關鍵影像，極速帶回 B1 手術室</strong>，讓骨科與外科醫師在第一時間確認「严重骨折」的位置並進行緊急損傷控制手術（DCS）。</p>\n</li>\n<li>\n<p><strong>配合「
