第一時間提供給前線醫護人員調度使用。</p>\n</li>\n<li>\n<p><strong>通報車輛與人力缺口</strong>：若待命區內的運輸工具或搬運人力不足以應付前線需求，須立即向計畫部（資源控管小組）與後勤部回報缺口，以利聯絡官向外部主管機關（如衛生局 EOC 或聯合應變中心）請求救護車或大眾運輸車輛支援。</p>\n</li>\n</ol>\n<p><strong>三、 擔任「醫療/技術專家聯絡人」：提供極限替代方案建議</strong>\n當常規替代供應商因交通中斷無法運達，物資與生命線面臨 72\n小時斷鏈危機時，行政支援中心主任須發揮專家幕僚功能：</p>\n<ol>\n<li>\n<p><strong>會商內外部專家</strong>：協助聯繫並會同院內外感染、重症、血庫、藥劑及機電專家，針對醫療氣體、血液及藥品極度匱乏的困境進行專業評估。</p>\n</li>\n<li>\n<p><strong>提出危機標準（Crisis Standards of Care）替代方案</strong>：當常規供應與外部求援皆無效時，向指揮官提供「極限替代方案」的戰術建議。例如：當血液無法運補時，指導與建議啟動「走動式血庫（Walking Blood Bank）」進行院內活體捐血；當氧氣槽見底且鋼瓶不敷使用時，建議動員非醫療人員組成「捏球大隊」以手動甦醒球（Ambu bag）維持重症病患呼吸。</p>\n</li>\n</ol>\n<p><strong>四、 確保支援人員之安全與身心照護</strong></p>\n<ol>\n<li>\n<p><strong>落實人員辨識與防護</strong>：在外部可能存在威脅與假訊息的混亂中，待命區管理者須對所有前來報到的支援人力實施嚴格的身分核對與職稱辨識，記錄其工作內容，防範有心人士滲透破壞。</p>\n</li>\n<li>\n<p><strong>強制輪替與休息安排</strong>：面對因交通受阻無法下班的醫護人員，行政支援組須會同人事室與任務支援組，安排並調度待命人力去替換前線人員。確保撤下火線的同仁能前往「員工安全庇護所」獲得充足的膳食、飲水與休息，維持長期的醫療戰鬥力。</p>\n</li>\n</ol>"}]}]}, {"id": "clinical", "name": "臨床醫療單位", "roles": [{"role": "醫務部", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，醫務部在HICS（醫院事故指揮系統）架構下扮演第一線醫療應變的核心角色，具體因應作為如下：</p>\n<p><strong>一、 迅速就位並接掌「執行部」指揮權</strong></p>\n<ol>\n<li>\n<p><strong>擔任執行部長</strong>：醫務部部長將擔任HICS編組下的<strong>「執行部長（Operations\n    Section\n    Chief）」</strong>，負責執行指揮官（院長）交付的技術性工作，並管理、計畫與指揮所有的醫療行動及災害控制。</p>\n</li>\n<li>\n<p><strong>跨組整合</strong>：醫務部須統籌轄下的醫療照護組，並橫向整合設施運作、安全管制、危害控制及機構持續運作等編組，確保戰時醫療整備工作同步展開。</p>\n</li>\n</ol>\n<p><strong>二、 執行醫療降載與病床/空間盤點</strong>\n為騰出戰備所需之床位與量能，醫務部須立即啟動第一階段「動員降載與能量整備」：</p>\n<ol>\n<li>\n<p><strong>限時降載目標</strong>：必須規劃並執行醫療功能降載，目標於<strong>48小時內將住院病人降載至30%</strong>。</p>\n</li>\n<li>\n<p><strong>擬定疏散計畫</strong>：明確定義戰時必須維持的核心醫療功能，並擬定現有住院病人的出院及轉院計畫，其中必須包含<strong>評估轉送所需的載具（如救護車）與隨車照護人力</strong>。</p>\n</li>\n<li>\n<p><strong>盤點核心量能</strong>：醫務部（作為醫療應變與傷患搶救組的主責單位）須迅速盤點急診、手術室、加護病房（ICU）的空間與設備，撰擬臨時醫療區開設及醫療核心功能維持的說明資料。</p>\n</li>\n</ol>\n<p><strong>三、 盤點與調度醫療人力</strong>\n打破平時科室建制，醫務部須盤點全院可動員的醫師與臨床人力，制定<strong>「醫療人力調度表」</strong>。將平時負責門診或常規手術的人力，重新編組至檢傷分類區、重傷治療區、輕傷病房或協助傷患後送流程。</p>\n<p><strong>四、 對接統籌呈報組完成限時回報</strong></p>\n<ol>\n<li>\n<p><strong>指派聯繫窗口</strong>：醫務部必須指派專責人員，擔任<strong>「統籌呈報組」的對內聯繫窗口</strong>。</p>\n</li>\n<li>\n<p><strong>提交彙整數據</strong>：將醫務部盤點完畢的「床位、人力、急診、手術、加護量能與降載名冊」等資料，迅速且正確地提交給統籌呈報組（危管會），以利其彙整全院資訊，於主管機關規定的時限內完成<strong>臨災應變中心的初報與續報</strong>。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息及掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊）」，此危機同時衝擊了醫院的資訊系統與醫療量能。在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部</strong>扮演著前線作戰的核心角色，由醫務部部長擔任<strong>「執行部長（O0）」</strong>，負責統籌醫療照護與維持機構持續運作。</p>\n<p>醫務部因應系統癱瘓與假訊息的具體作為如下：</p>\n<p><strong>一、 接掌執行部指揮權，統籌前線醫療行動</strong></p>\n<ol>\n<li>\n<p><strong>最高技術執行</strong>：醫務部部長擔任執行部長，負責執行指揮官交付之技術性工作，並管理、參與應變行動計畫中所有的醫療行動與災害控制。</p>\n</li>\n<li>\n<p><strong>跨組資源整合</strong>：整合轄下的醫療照護、設施運作、安全管制與機構持續運作等單位，確保各分組在系統癱瘓的混亂中能維持步調一致。</p>\n</li>\n</ol>\n<p><strong>二、 全面啟動「紙本降級（Downtime）」與離線人工作業</strong></p>\n<ol>\n<li>\n<p><strong>切換人工模式</strong>：接獲資訊室啟動「全院當機處理機制」通知後，醫務部及轄下單位須立即停止依賴電腦系統，全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：指示各臨床單位與急診砸破封條，取出預先整備的「當機緊急箱（Downtime\n    Box）」，無縫切換使用三聯式紙本病歷、手寫處方箋與紙本檢傷單等離線表單，確保核心醫療處置不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 執行醫療服務降載與門急診分流替代流程</strong></p>\n<ol>\n<li>\n<p><strong>服務降載與分流</strong>：因系統延遲將大幅拉長看診與批掛時間，醫務部須評估醫療量能，暫停部分非急迫性醫療或排程手術，將醫療資源絕對集中於急重症搶救。</p>\n</li>\n<li>\n<p><strong>啟動替代流程</strong>：面對因假訊息與系統當機而壅塞的就醫人潮，醫務部須主導建立紙本掛號、門急診分流等「就醫替代流程」，並將處置方式通告全院醫師配合執行。</p>\n</li>\n</ol>\n<p><strong>四、 執行紙本的病人分級、轉送與交接準備</strong>\n若系統癱瘓時間過長或醫療量能受限，醫務部必須為「醫療後撤或擴充量能」預作準備：</p>\n<ol>\n<li>\n<p><strong>紙本醫療交接</strong>：在無法使用電子病歷的狀況下，醫務部須主導病人分級，並以人工方式準備病患名冊、紙本醫療摘要與用藥交接紀錄。</p>\n</li>\n<li>\n<p><strong>轉送與合作聯繫</strong>：針對需要後撤、轉送或擴充收治的病患，醫務部須與衛生局或區域聯防之合作醫院聯繫，確保病患轉銜過程的醫療安全。</p>\n</li>\n</ol>\n<p><strong>五、 支援異質通訊與傳令兵（Runner）遞送</strong></p>\n<ol>\n<li><strong>維持醫囑傳遞</strong>：在資訊網路與 PACS/LIS\n    系統延遲下，醫務部須配合啟動「傳令兵（Runner）」制度。透過專人徒步穿梭於各樓層，精準遞送手寫的緊急開刀醫囑、檢驗單與實體\n    X 光片，克服斷網危機。</li>\n</ol>\n<p><strong>六、 穩定醫患關係與防範第一線衝突</strong></p>\n<ol>\n<li>\n<p><strong>前線溝通與安撫</strong>：面對假訊息（如缺藥、拒收病人）以及因系統延遲而久候不滿的病患與家屬，醫務部須要求第一線看診醫師與醫療人員加強溝通，耐心說明當前的「紙本降級」流程。</p>\n</li>\n<li>\n<p><strong>通報防暴機制</strong>：若發現病患或家屬情緒失控、極端抱怨，甚至出現暴力徵象，醫務部人員須立即通報護理主管、社工室及醫勤室保安組介入處理，保護醫療人員的安全。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對特別狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院瞬間失去了「數位神經系統」，面臨極端的高壓與混亂。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部</strong>是全院醫療作戰的核心，由醫務部部長擔任<strong>「執行部長（Operations\nSection Chief,\nO0）」</strong>。面對此國家級網路攻擊與系統癱瘓，醫務部的具體因應作為如下：</p>\n<p><strong>一、 接掌執行部指揮權，統籌前線「無網醫療」行動</strong>\n醫務部部長作為執行部長，負責管理、參與應變行動計畫中所有的醫療行動與災害控制，並執行指揮官交付的技術性工作。在確認系統遭受駭客攻擊癱瘓後，醫務部須立即統合轄下的醫療照護、設施運作、安全管制等分支，確保各臨床單位在資訊全黑的狀態下，能維持步調一致，死守急診、手術與加護病房等核心醫療功能。</p>\n<p><strong>二、 全面啟動「紙本降級（Downtime）」與離線人工作業</strong>\n接獲資訊室宣告當機與網路實體隔離後，醫務部須立即指示轄下所有臨床科別與醫師，停止依賴電腦系統，全面改採紙本與人工作業流程。</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機箱</strong>：指示各臨床單位與急診砸破封條，取出預先整備的「當機緊急箱（Downtime Box）」。</p>\n</li>\n<li>\n<p><strong>回歸類比作業</strong>：無縫切換使用三聯式紙本病歷、手寫處方箋、紙本檢傷單與條碼貼紙，並依賴每日離線列印的最新住院名單來維持核心醫療處置不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 執行醫療服務降載與資源重分配</strong>\n因系統癱瘓將大幅拉長看診、批掛與醫療處置的時間，醫務部必須果斷進行醫療資源取捨與降載：</p>\n<ol>\n<li>\n<p><strong>暫停常規醫療</strong>：下令無限期取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術。</p>\n</li>\n<li>\n<p><strong>集中搶救資源</strong>：將因此釋出的醫療資源與人力，絕對集中於急重症搶救與維持住院病患的生命安全，確保在無資訊系統輔助下，最關鍵的醫療服務依然能運作。</p>\n</li>\n</ol>\n<p><strong>四、 建立影像與檢驗的「離線替代流程」</strong> 針對 PACS（影像系統）與\nLIS（檢驗系統）被勒索軟體鎖死或癱瘓，醫務部須指導臨床醫師採取極限替代方案：</p>\n<ol>\n<li>\n<p><strong>檢驗危險值回報</strong>：停止依賴電腦傳輸報告，改以電話或對講機接收檢驗科的口頭危險值（Panic Value）回報，並嚴格要求醫師執行「Read-back（覆誦確認）」機制，防範無網狀態下的醫療錯誤。</p>\n</li>\n<li>\n<p><strong>影像實體傳遞</strong>：指示臨床醫師在必要時直接前往放射機房，以數位相機或拍立得翻拍螢幕上的 X 光影像，或回歸沖洗實體膠片，以人工方式將影像帶回前線作為診斷依據。</p>\n</li>\n</ol>\n<p><strong>五、 配合異質通訊與「傳令兵（Runner）」機制</strong> DDoS 攻擊極可能伴隨院內\nVoIP 網路電話與常規通訊癱瘓。醫務部須確保前線指令與醫囑下達不中斷：</p>\n<ol>\n<li>\n<p><strong>使用獨立通訊</strong>：各樓層醫療指揮官改配發獨立頻段的 UHF/VHF 無線電進行雙向溝通。</p>\n</li>\n<li>\n<p><strong>依賴傳令兵遞送</strong>：配合行政部門啟動「傳令兵（Runner）」制度，由穿著反光背心的專人徒步穿梭於各樓層。醫師須將手寫的緊急開刀醫囑、血液配對單與檢驗單交由傳令兵，透過嚴格的「口令覆誦」與「簽收簿」進行實體遞送，徹底克服斷網危機。</p>\n</li>\n</ol>\n<p><strong>六、 穩定醫病關係與防範第一線衝突</strong>\n系統大當機必然造成病患久候、看診延誤或醫療處置嚴重遞延，極易引發民眾焦躁甚至醫療暴力。</p>\n<ol>\n<li>\n<p><strong>前線溝通與安撫</strong>：醫務部須要求第一線看診醫師與醫療人員加強溝通，耐心向病患與家屬說明醫院正遭遇網路異常，目前已啟動「紙本降級」替代流程，安撫其恐慌情緒。</p>\n</li>\n<li>\n<p><strong>通報防暴機制</strong>：若發現病患或家屬情緒失控、極端抱怨，甚至出現暴力徵象，醫師及醫療人員須立即通報護理主管、社工室及醫勤室保安組介入處理，啟動實體防護，保護醫療團隊的人身安全。</p>\n</li>\n</ol>"}, {"scenario": "1-7", "title": "院內網路服務不穩", "desc": "院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況「院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊）」，此危機同時衝擊了醫院的資訊系統與醫療量能。在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部</strong>扮演著前線作戰的核心角色，由醫務部部長擔任<strong>「執行部長（O0）」</strong>，負責統籌醫療照護與維持機構持續運作。</p>\n<p>面對資訊系統延遲及潛在的資安威脅，醫務部確保優先維持急診、藥局、檢驗等核心服務的具體因應作為如下：</p>\n<p><strong>一、 接掌執行部指揮權，統籌前線醫療行動</strong></p>\n<ol>\n<li>\n<p><strong>最高技術執行</strong>：醫務部部長擔任執行部長，負責執行指揮官交付之技術性工作，並管理、參與應變行動計畫中所有的醫療行動與災害控制。</p>\n</li>\n<li>\n<p><strong>跨組資源整合</strong>：整合轄下的醫療照護、設施運作、安全管制與機構持續運作等單位，確保各分組在系統癱瘓的混亂中能維持步調一致。</p>\n</li>\n</ol>\n<p><strong>二、 全面啟動「紙本降級（Downtime）」與離線人工作業</strong></p>\n<ol>\n<li>\n<p><strong>切換人工模式</strong>：接獲資訊室啟動「全院當機處理機制」通知後，醫務部及轄下單位須立即停止依賴電腦系統，全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：指示各臨床單位與急診砸破封條，取出預先整備的「當機緊急箱（Downtime Box）」，無縫切換使用三聯式紙本病歷、手寫處方箋與紙本檢傷單等離線表單，確保核心醫療處置不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 執行醫療服務降載與門急診分流替代流程</strong></p>\n<ol>\n<li>\n<p><strong>服務降載與分流</strong>：因系統延遲將大幅拉長看診與批掛時間，醫務部須評估醫療量能，暫停部分非急迫性醫療或排程手術，將醫療資源絕對集中於急重症搶救。</p>\n</li>\n<li>\n<p><strong>啟動替代流程</strong>：面對因假訊息與系統當機而壅塞的就醫人潮，醫務部須主導建立紙本掛號、門急診分流等「就醫替代流程」，並將處置方式通告全院醫師配合執行。</p>\n</li>\n</ol>\n<p><strong>四、 執行紙本的病人分級、轉送與交接準備</strong>\n若系統癱瘓時間過長或醫療量能受限，醫務部必須為「醫療後撤或擴充量能」預作準備：</p>\n<ol>\n<li>\n<p><strong>紙本醫療交接</strong>：在無法使用電子病歷的狀況下，醫務部須主導病人分級，並以人工方式準備病患名冊、紙本醫療摘要與用藥交接紀錄。</p>\n</li>\n<li>\n<p><strong>轉送與合作聯繫</strong>：針對需要後撤、轉送或擴充收治的病患，醫務部須與衛生局或區域聯防之合作醫院聯繫，確保病患轉銜過程的醫療安全。</p>\n</li>\n</ol>\n<p><strong>五、 支援異質通訊與傳令兵（Runner）遞送</strong></p>\n<ol>\n<li><strong>維持醫囑傳遞</strong>：在資訊網路與 PACS/LIS 系統延遲下，醫務部須配合啟動「傳令兵（Runner）」制度。透過專人徒步穿梭於各樓層，精準遞送手寫的緊急開刀醫囑、檢驗單與實體 X 光片，克服斷網危機。</li>\n</ol>\n<p><strong>六、 穩定醫患關係與防範第一線衝突</strong></p>\n<ol>\n<li>\n<p><strong>前線溝通與安撫</strong>：面對假訊息（如缺藥、拒收病人）以及因系統延遲而久候不滿的病患與家屬，醫務部須要求第一線看診醫師與醫療人員加強溝通，耐心說明當前的「紙本降級」流程。</p>\n</li>\n<li>\n<p><strong>通報防暴機制</strong>：若發現病患或家屬情緒失控、極端抱怨，甚至出現暴力徵象，醫務部人員須立即通報護理主管、社工室及醫勤室保安組介入處理，保護醫療人員的安全。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部</strong>扮演著前線醫療作戰的最核心角色。由醫務部部長擔任<strong>「執行部長（O0）」</strong>，負責統籌並執行指揮官交付之所有技術性工作與醫療照護行動。</p>\n<p>醫務部的具體因應作為如下：</p>\n<p><strong>一、 統籌前線醫療行動與接掌指揮</strong></p>\n<ol>\n<li>\n<p><strong>接掌執行部指揮權</strong>：醫務部部長負責管理並參與應變行動計畫中所有的醫療行動與災害控制，整合轄下的醫療照護、設施運作、危害控制與安全管制等單位。</p>\n</li>\n<li>\n<p><strong>評估醫療量能與任務編派</strong>：與後勤部共同合作並回報前線物資需求，決定任務編派並評估急診、門診、住院與手術等各項服務的殘存能量。</p>\n</li>\n</ol>\n<p><strong>二、 執行極限醫療降載與「反向檢傷（Reverse Triage）」</strong>\n因外部轉送不確定性提高（病患無法後送），且各項維生藥材配送延遲，醫務部必須強行騰出院內收治量能並節約資源：</p>\n<ol>\n<li>\n<p><strong>極速清空與服務降載</strong>：立即下令取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術，將有限的醫療氣體、藥材與資源絕對集中於急重症搶救。</p>\n</li>\n<li>\n<p><strong>反向檢傷與提早出院</strong>：由資深主治醫師組成「反向檢傷小組」，進入一般病房甚至加護病房，強制評估並篩選出生命徵象穩定的病患，辦理緊急下轉或提早出院，極速騰出「彈性擴充量能（Surge\n    Capacity）」以因應滯留院內與湧入的重症病患。</p>\n</li>\n</ol>\n<p><strong>三、 啟動血庫危機應變與極限替代方案</strong></p>\n<ol>\n<li>\n<p><strong>啟動「走動式血庫（Walking Blood\n    Bank）」</strong>：面對血液運補延遲且血庫見底的絕境，醫務部須會同檢驗科/血庫，緊急啟動院內活體捐血計畫。召集符合血型條件的院內員工現場抽血、快篩，直接送入急診或開刀房搶救瀕死傷患，突破外部斷血危機。</p>\n</li>\n<li>\n<p><strong>極限維生替代</strong>：若醫療氣體（氧氣）耗竭，須指示並配合護理與後勤人員啟動人工替代方案（如動員捏球大隊，以手動甦醒球維持重症病患呼吸）。</p>\n</li>\n</ol>\n<p><strong>四、 病患轉送受阻之就地收治與轉銜準備</strong></p>\n<ol>\n<li>\n<p><strong>啟用備援醫療空間</strong>：針對無法順利轉送的病患，醫務部須評估啟用地下室（B1）的備援醫療空間（如臨時\n    ICU 病房、臨時開刀房與恢復室），執行就地收治與戰傷處置。</p>\n</li>\n<li>\n<p><strong>病患分級與交接整備</strong>：針對滯留院內準備後撤或轉送的病患，醫務部須確實完成病人分級，並備妥病患名冊、醫療摘要與用藥交接紀錄。一旦交通稍有恢復或有救護車輛抵達，即可立即進行安全轉銜與異地持續照護。</p>\n</li>\n</ol>\n<p><strong>五、 醫療人力之極限調度與重分配</strong>\n面對員工到勤受交通影響產生的人力缺口，醫務部須進行殘存戰力的最大化運用：</p>\n<ol>\n<li>\n<p><strong>成立各區治療站與指派指揮醫師</strong>：急診部主任或當班資深醫師須建立病人照護分區（如檢傷區、重傷區、中傷區、輕傷區及留觀區），並調派留守之內、外科或急診醫師擔任各區的指揮醫師，維持醫療秩序。</p>\n</li>\n<li>\n<p><strong>跨科支援與在地召回</strong>：將停診之門診醫師調派至急診或重症區支援。若需啟動緊急召回機制，則優先召回居住於屏東市區附近（一公里內）、受交通阻斷影響較小的醫師回院支援，以最快速度彌補前線人力。</p>\n</li>\n</ol>\n<p>今天 • 上午8:33</p>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭與空襲威脅，必須將核心醫療量能全數轉移至地下防空避難空間。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部</strong>是全院醫療搶救的核心骨幹。醫務部部長擔任<strong>「執行部長（O0）」</strong>，同時身兼演習編組中的<strong>「醫療應變與傷患搶救組」</strong>組長。面對防空疏散與\nB1 備援空間的啟用，醫務部的具體因應作為如下：</p>\n<p><strong>一、 統籌戰時醫療行動與空間轉置（執行部長 O0）</strong></p>\n<ol>\n<li>\n<p><strong>指揮醫療戰術轉換</strong>：由醫務部部長（執行部長）率領執行部相關人員，組織與建立各種醫療行動策略，完成將高樓層核心醫療（如加護病房、手術室）轉移至\n    B1 地下室備援空間的技術性與醫療工作。</p>\n</li>\n<li>\n<p><strong>評估與編派任務</strong>：決定各臨時醫療區的任務編派，評估服務能量，並與後勤部門協調，回報地下微型戰地醫院運作所需的物資與照護需求。</p>\n</li>\n</ol>\n<p><strong>二、 執行「極限醫療降載」與「反向檢傷（Reverse Triage）」</strong></p>\n<ol>\n<li>\n<p><strong>停止常規醫療</strong>：接獲戰備或空襲指令後，醫務部須立即下令，無限期取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術，極限縮減非必要醫療消耗。</p>\n</li>\n<li>\n<p><strong>反向檢傷與極速清空</strong>：組織各科主任與資深主治醫師組成「反向檢傷小組」，進入一般病房甚至加護病房，強制評估並篩選出生命徵象穩定的病患。辦理緊急提早出院或下轉至基層診所及長照機構。目標在時限內（如\n    48 小時內）將住院病人降載至 30%，強行騰出急重症病床與擴充量能（Surge\n    Capacity）以準備接收戰傷病患。</p>\n</li>\n</ol>\n<p><strong>三、 調派醫師人力與維持 B1 五大醫療功能區運作</strong></p>\n<ol>\n<li>\n<p><strong>專科醫師重分配</strong>：醫務部必須打破平時的科室編制，將全院內科、外科、婦兒科等專科醫師人力，調度並編派至剛開設的\n    B1 五大功能區（檢傷行政區、臨時\n    ICU、臨時開刀房、恢復室、輕症病房）進行醫療搶救。</p>\n</li>\n<li>\n<p><strong>督導核心醫療不中斷</strong>：督導轄下之急診部、內外科主任（醫療照護主管\n    O1），在 B1\n    備援空間內排定傷患治療之優先順序，執行黃金時間內的戰傷處置（如損傷控制復甦）與緊急手術。</p>\n</li>\n</ol>\n<p><strong>四、 整合醫療輔助量能與轉送/後送協調</strong></p>\n<ol>\n<li>\n<p><strong>醫療輔助人力調度</strong>：醫務部須調度與整合放射科、檢驗科、血庫與藥劑科等輔助單位，確保\n    B1 臨時急救區的影像檢查、檢驗報告與緊急用藥能夠持續支援前線醫師。</p>\n</li>\n<li>\n<p><strong>病患後送與轉診協調</strong>：針對院內無法負荷之重症或戰傷病患，醫務部醫師須與聯絡官及衛生局（或高屏區\n    EOC）協調，安排病患的轉送與後送事宜，並負責與接收醫院進行醫療交班。</p>\n</li>\n</ol>\n<p><strong>五、 啟動「無頭狀態」自動順位繼承機制</strong>\n若空襲或戰火導致院長及副院長（指揮官階層）失聯或無法視事，醫務部轄下的當值最高層級臨床主管（依序為：急診部主任、重症醫學部主任、外科部主任等），必須依法在\n5\n分鐘內啟動「自動順位繼承機制」接管全院指揮權，穿上指揮官背心，下達最高戰略目標，確保醫院在戰火中絕不陷入群龍無首的癱瘓狀態。</p>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨關鍵基礎設施受損、維生系統異常，甚至可能伴隨周邊群眾傷亡的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）與演習架構下，<strong>醫務部</strong>扮演著第一線戰術指揮的核心角色，醫務部部長擔任<strong>「執行部長（O0）」</strong>，同時也是演習編組中的<strong>「醫療應變與傷患搶救組」</strong>組長。</p>\n<p>面對此極端狀況，醫務部的具體因應作為如下：</p>\n<p><strong>一、 擔任「執行部長（O0）」，統籌全院醫療行動與災害控制</strong></p>\n<ol>\n<li>\n<p><strong>最高戰術指揮</strong>：由醫務部部長負責執行指揮官交付之技術性工作，管理並參與應變行動，計畫及指揮全院所有的醫療行動或災害控制任務。</p>\n</li>\n<li>\n<p><strong>督導轄下分支</strong>：統合轄下的醫療照護主管（O1）、設施運作主管（O2，如工務室搶修）、危害控制主管（O3，如滅火與外洩處理）、安全管制主管（O4）及機構運作主管（O5），確保搶修行動與醫療救護同步進行。</p>\n</li>\n<li>\n<p><strong>設立臨時醫療區</strong>：若震動或爆炸造成傷患，醫務部須視狀況啟動大量傷病患機制，並指揮設立緊急救護站（如利用門診區或\n    B1 備援空間），執行檢傷、救護與臨時醫療區銜接。</p>\n</li>\n</ol>\n<p><strong>二、 執行醫療降載與維持「核心醫療不中斷」</strong>\n面對電力瞬斷、漏水與空調異常，醫療量能將大幅受限，醫務部必須果斷進行醫療資源取捨：</p>\n<ol>\n<li>\n<p><strong>醫療降載與分流</strong>：依據院內決策與現場設施損害程度，評估並執行醫療降載。盤點可提早出院、可延後排程手術/檢查及可調整門診的病人，將資源釋出。</p>\n</li>\n<li>\n<p><strong>確保核心功能</strong>：將有限的水電、備援電力與醫療物資，優先保留給急診、急重症、手術、加護病房、血液與檢驗等核心醫療服務，確保維生底線不中斷。</p>\n</li>\n</ol>\n<p><strong>三、 啟動病患疏散、轉院重置與醫療後撤</strong>\n若漏水、消防警報或電梯停用導致原病房（尤其是高樓層）已不安全，或維生設施無法支持重症病患：</p>\n<ol>\n<li>\n<p><strong>決策與病人分級</strong>：醫務部須統籌病患的疏散動向，進行病人分級、造冊，並決定後撤轉送的優先順序。</p>\n</li>\n<li>\n<p><strong>跨院轉銜與交接</strong>：由醫務部視病人實際狀況，與聯絡官及多元合作推動中心（轉診中心）協調，確認外部合作接收醫院的可容納人數。</p>\n</li>\n<li>\n<p><strong>醫療摘要隨行</strong>：在轉送過程中，確保病歷摘要、用藥紀錄與相關檢驗報告能與病患同步交接至接收醫院。</p>\n</li>\n</ol>\n<p><strong>四、 孤島狀態下的「醫療人力調度」</strong>\n若周邊震波與爆炸導致聯外交通阻絕或中斷，外部醫療人員無法進入醫院支援，醫院陷入孤島運作：</p>\n<ol>\n<li>\n<p><strong>彈性班表與強制輪替</strong>：醫務部須統一指揮規劃全院的醫療人力調度，實施彈性班表及延長值班等事宜，確保醫療戰力得以延續直到狀況解除。</p>\n</li>\n<li>\n<p><strong>緊急人力補充</strong>：必要時緊急動用住宿於院區宿舍內的醫護人員，作為第一波補充支援人力。</p>\n</li>\n</ol>\n<p><strong>五、 配合通訊中斷之「紙本降級（Downtime）」作業</strong>\n若震波或斷電導致資訊系統、網路與通訊癱瘓：</p>\n<ol>\n<li>\n<p><strong>切換人工作業</strong>：接獲資訊室宣告當機後，醫務部須指示轄下所有臨床科別與醫師，立即啟動電腦停止作業應變措施，全面改採紙本病歷、手寫處方箋與人工作業流程。</p>\n</li>\n<li>\n<p><strong>替代流程與紀錄保存</strong>：在無資訊系統輔助下，維持醫療處置與給藥的安全，並妥善保存所有紙本醫療紀錄，待通訊與系統修復後再行回補與復原。</p>\n</li>\n</ol>\n<p>醫療照護主管如何調度醫護人力以因應戰傷大量傷患？</p>\n<p>在通訊與資訊中斷下，如何具體執行傳令兵與紙本作業？</p>\n<p>若血庫用罄，走動式血庫與員工捐血的具體執行流程為何？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p><strong>Analyzing the Situation</strong></p>\n<p>I\\'m currently focused on dissecting the user\\'s query about the\nhospital incident. The core elements I\\'ve identified are: an attack on\na hospital\\'s electrical infrastructure (specifically the generator) by\na drone, and damage to the liquid oxygen storage. I'm zeroing in on the\nprecise nature of the damage and its potential consequences.</p>\n<p>今天 • 清晨7:50</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院瞬間面臨了實體恐怖攻擊（或戰爭行為）、全院維生電力中斷，以及液態氧洩漏引發的極高爆炸與火災風險，屬於極端嚴峻的複合型毀滅性危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部</strong>是第一線戰術行動與醫療搶救的核心大腦。由醫務部部長擔任<strong>「執行部長（Operations\nSection Chief,\nO0）」</strong>，其必須在爆炸發生的瞬間，統合轄下的醫療、工務、保安與危害控制等單位，同步展開「災害搶修、現場封鎖、危害控制與極限醫療維生」。</p>\n<p>醫務部因應此極端狀況的具體作為如下：</p>\n<p><strong>一、 接掌前線最高戰術指揮，統合複合災害應變</strong></p>\n<ol>\n<li>\n<p><strong>最高戰術統籌</strong>：醫務部部長（執行部長）須負責管理、計畫與指揮應變行動計畫中所有的醫療行動與災害控制任務。</p>\n</li>\n<li>\n<p><strong>跨組協同作戰</strong>：在面臨爆炸與維生系統雙重中斷的絕境下，醫務部必須確保各分組不各自為政。統合轄下的設施運作主管（工務室，負責極限斷電與氣體閥門搶修）、安全管制主管（保安組，負責防爆封鎖與防範無人機二次攻擊）、危害控制主管（負責外洩偵檢與初期滅火）以及醫療照護主管（急診與內外科），確保災害搶修與病患維生同步進行。</p>\n</li>\n</ol>\n<p><strong>二、 果斷下令「極限醫療降載」與「反向檢傷」</strong>\n主發電機受損與中央氧氣中斷意味著醫院的醫療量能已達崩潰邊緣，醫務部必須採取最殘酷但理性的醫療資源取捨（危機護理標準）：</p>\n<ol>\n<li>\n<p><strong>全面停止常規醫療</strong>：立即下令無限期取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術，將所有殘存的醫療氣體、備用電力與人力，絕對集中於急重症搶救與爆炸傷患處置。</p>\n</li>\n<li>\n<p><strong>啟動反向檢傷（Reverse Triage）</strong>：指示資深主治醫師組成「反向檢傷特別小組」，進入一般病房甚至中度加護病房，強制評估並篩選出「拔除靜脈點滴或提早出院，在 72 小時內不會立即危及生命」的相對穩定病患。</p>\n</li>\n<li>\n<p><strong>極速清空量能</strong>：將這些穩定病患極速辦理出院或緊急下轉至基層診所與長照機構，強行騰出院內收治空間，保留所有殘存資源給無法移動的重症維生病患。</p>\n</li>\n</ol>\n<p><strong>三、 指揮前線「極限維生」與人工給氧（捏球大隊）</strong>\n在面臨斷電與斷氧的「黑堡（Black\nStart）」孤島狀態下，醫務部必須指導臨床科室死守病患的生命底線：</p>\n<ol>\n<li>\n<p><strong>緊急氣體切換</strong>：接獲工務室中央供氧中斷的通報後，醫務部須督導加護病房（ICU）與重症區的醫療人員，在 3 分鐘內將重症病患的管線切換至床邊的備用氧氣鋼瓶。</p>\n</li>\n<li>\n<p><strong>啟動極限人工維生</strong>：若備用氧氣鋼瓶耗盡，且電動呼吸器因緊急發電機受損而停擺，醫務部須立即統籌動員行政人員、社工、志工或輕傷家屬組成<strong>「捏球大隊」</strong>。以兩人一組、定時換班的方式，使用手動甦醒球（Ambu bag）進行人工捏球接力，以純人力維持重症病患的呼吸與生命徵象。</p>\n</li>\n</ol>\n<p><strong>四、 應對爆炸威脅之「就地掩蔽」與「無動力疏散」</strong>\n機電棟的液氧洩漏與火勢帶來極高的二次爆炸風險，若威脅到鄰近病房或建築結構，醫務部須配合安全官指揮病患防護：</p>\n<ol>\n<li>\n<p><strong>就地防爆掩蔽（Defend in Place）</strong>：若爆炸威脅迫在眉睫且病患無法立即下樓（如依賴維生儀器之 ICU 病患），指示醫療團隊在不斷開儀器的極限情況下，將病床迅速推離玻璃帷幕與靠窗區域，移至建築物的「核心內筒（如無窗戶的內部走廊、電梯梯廳）」進行防爆掩蔽，並拉下防爆窗簾。</p>\n</li>\n<li>\n<p><strong>無動力垂直疏散</strong>：若火勢蔓延且電梯因發電機損毀而停擺，醫務部須指揮醫護與後勤支援人員，利用可攜式蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，以純人力接力的方式將重症病患經安全梯垂直疏散至低樓層或地下避難區。</p>\n</li>\n<li>\n<p><strong>爆炸傷患搶救</strong>：若機電棟有工務搶修人員或警衛因爆裂物波及受傷，醫務部須指揮急診團隊立即設立臨時救護站，執行戰傷檢傷分類、損傷控制復甦與緊急處置。</p>\n</li>\n</ol>\n<p><strong>五、 防範「無頭狀態（Headless State）」之自動順位接管</strong>\n無人機攻擊極可能伴隨敵方對指揮中樞的斬首襲擾，或因爆炸導致通訊全斷。\n若此次攻擊導致院長及副院長（指揮官階層）受困、失聯或無法視事，醫務部部長（或當值最高層級的臨床主管，如急診部主任、外科部主任）必須克服心理恐懼，依法在\n5 分鐘內啟動「HICS\n自動順位繼承機制」接管全院指揮權。穿上紅色的「事故指揮官（Incident\nCommander）」背心，並迅速下達最高維生與疏散戰略目標，確保醫院在戰火毀滅危機中絕不陷入群龍無首的癱瘓狀態。</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨極限的醫療降載與病患大規模重置挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫務部部長</strong>擔任最高戰術指揮的<strong>「執行部長（O0）」</strong>，同時主導<strong>「醫療應變與傷患搶救組」</strong>。醫務部是將指揮官撤離決策化為實際醫療行動的最前線，其具體因應作為如下：</p>\n<p><strong>一、 統籌全院醫療行動與疏散計畫</strong></p>\n<ol>\n<li>\n<p><strong>最高醫療指揮</strong>：醫務部負責計畫及指揮所有的醫療行動與災害控制，執行指揮官交付之技術性工作。</p>\n</li>\n<li>\n<p><strong>啟動疏散統籌</strong>：在病患疏散與重置作業中，由院長或副院長指揮，醫務部負責統籌協調，並交由各編組擬定與執行後續撤離計畫。</p>\n</li>\n</ol>\n<p><strong>二、 執行「病人分級」與「反向檢傷（Reverse Triage）」</strong>\n面對有限的運輸資源與撤離時間，醫務部必須打破平時的收治邏輯，冷酷且迅速地對留院病人進行分級與檢傷：</p>\n<ol>\n<li>\n<p><strong>設立反向檢傷小組</strong>：由資深主治醫師（為避免醫患情感影響判斷，可由平時不負責該病房之醫師擔任）組成「反向檢傷特別小組」進入病房進行強勢評估。</p>\n</li>\n<li>\n<p><strong>病患精準分級</strong>：依據撤離需求與病患狀況，將病人分為四大類：</p>\n<ul>\n<li>\n<p><strong>行動方便的病人（可返家）</strong>：拔除靜脈點滴或提早出院，在 72\n    小時內不會立即危及生命者，安排提早出院。</p>\n</li>\n<li>\n<p><strong>需扶持但有家屬照顧的病人（安置）</strong>：可暫時由家人帶回照顧，或轉銜至基層診所與長照機構。</p>\n</li>\n<li>\n<p><strong>一般臥床病人（一般住院）</strong>：需持續醫療照護，考量移至院內安全病房，或轉送至其他醫院。</p>\n</li>\n<li>\n<p><strong>危急病人（高度照護）</strong>：依賴維生設備或加護病房之重症患者，需優先評估轉送風險，並安排具備重症收治能力之醫院進行重置。</p>\n</li>\n</ul>\n</li>\n</ol>\n<p><strong>三、 執行「極速醫療降載」</strong></p>\n<ol>\n<li>\n<p><strong>取消常規醫療</strong>：依據降載指令，醫務部須協助無限期取消所有非緊急門診、醫美排程、常規健檢與非急迫性（Elective）手術。</p>\n</li>\n<li>\n<p><strong>騰出彈性擴充量能</strong>：針對穩定且可出院之病患，配合行政部門辦理極速結帳疏散；目標於\n    24 小時內強行騰出大連院區至少 30% 至 40%\n    的急重症病床與開刀房空間，以利後續的醫療資源重分配。</p>\n</li>\n</ol>\n<p><strong>四、 協調外部接收醫院與「醫療後撤重置」</strong></p>\n<ol>\n<li>\n<p><strong>確認外部接收量能</strong>：由醫務部視病人實際狀況與嚴重度，與聯絡官及多元合作推動中心（轉診中心）協調，確定外部接收醫院可容納的病人數，確保轉出病患有安全的去向。</p>\n</li>\n<li>\n<p><strong>重置先遣作業</strong>：在啟動病人重置計畫時，醫務部須指示帶領或委任一小組的護理及管理人力作為先遣團隊，與接收醫院安排相關醫療與行政交接事宜。</p>\n</li>\n</ol>\n<p><strong>五、 確保隨車「醫療物資、病歷摘要與用藥」之無縫交接</strong>\n在病患後撤與轉送的過程中，醫務部與護理部必須確保醫療照護不中斷：</p>\n<ol>\n<li>\n<p><strong>醫療文件隨行</strong>：確實完成病人分級造冊，並確認每位轉院病患的轉診單、病歷摘要、用藥紀錄與檢驗報告皆隨同病患轉移交接。</p>\n</li>\n<li>\n<p><strong>救急物資隨車</strong>：針對高度照護與一般住院的轉運病患，必須確保有足夠量的急救藥物、靜脈輸液或血液製品與病人一起運送到重置區或接收醫院，避免在轉送途中或剛抵達時發生醫藥耗竭的致命危機。</p>\n</li>\n</ol>\n<p><strong>六、 孤島與極端狀態下的「醫療人力調度」</strong>\n若遭遇聯外交通阻絕或需長時間維持大量病患轉運與照護，醫務部須統一指揮並規劃全院的醫療人力調度。透過實施彈性班表、延長值班等措施維持醫療戰力；必要時，緊急動用住宿於宿舍區的醫護人員作為補充支援，確保醫療行動持續推進直到狀況解除。</p>\n<p>指揮官如何查核撤離命令真實性？</p>\n<p>後勤部如何準備隨車醫療物資？</p>\n<p>反向檢傷小組由哪些醫師組成？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方預警，確認院區即將編入「主戰區」，並由主管機關下達啟動\n<strong>HICS 第三階段「全面撤離與量能重置」</strong> 的預防性撤離命令時：</p>\n<p>本院 <strong>HICS 執行部門（Operations Section）將由執行部長 O0（醫務部部長\n陳志文／代理人為急診部主任\n王建銘）坐鎮指揮</strong>。醫務部作為全院戰時醫療搶救與戰術執行的核心骨幹，將立即終止所有常規非緊急業務，實施組織與空間重構，全力採取以下<strong>六大生存抗擊與量能外移之具體因應作為</strong>，死守高屏地區之醫療韌性生命線：</p>\n<p>一、 第一階段：迅速進駐 HICS 體系並重構「執行部」戰術指揮</p>\n<ol>\n<li>\n<p><strong>指揮地下化與人員到位</strong>： 醫務部部長陳志文立即接掌 <strong>執行部長（O0）</strong> 指揮權，配合事故指揮官 A0（院長）垂直轉移至地下結構最強固的戰時前進指揮所------<strong>恩慈大樓 B1 會議室（戰時 EOC）</strong>，召集轄下各組主管迅速到位。</p>\n</li>\n<li>\n<p><strong>執行部戰術組織重構</strong>： 執行部長立即打破平日科室矩陣建制，當場將一線醫事與照護同工重組拆編為<strong>「撤離準備組」</strong>與<strong>「持續照護組」</strong>兩大戰術班子： -   <strong>【撤離準備組】</strong>：主導反向檢傷、病患分級造冊、與目標醫院交接，並調派轉運交通載具。 -   <strong>【持續照護組】</strong>：死守在院尚未登車之重症病人，維持其維生設備與醫療照護，直至病患順利坐上轉運車。</p>\n</li>\n<li>\n<p><strong>宣告臨床指揮權繼承防呆</strong>： 若指揮中樞在撤離途中不幸受創或失聯，醫務部依法宣告「自動順位繼承機制」即刻生效，由當值最高層級之臨床主管（依序為：急診部主任、重症醫學部主任、外科部主任，或夜間最高階護理督導）自動接掌指揮權，穿上紅色的「Incident Commander」背心。</p>\n</li>\n</ol>\n<p>二、 第二階段：執行殘酷的「反向檢傷（Reverse Triage）」與全院極速降載</p>\n<p>為將有限的維生與運輸資源絕對保留給重症及等待後撤的傷患，醫務部必須強力執行「斷尾求生」的降載：</p>\n<ol>\n<li>\n<p><strong>設立反向檢傷特別小組</strong>： 由醫務部（O0）協同醫療照護主管 O1（急診、內外科主任及護理部督導長），調派平時不負責該病房之資深主任級醫師組成特別小組，強制進入一般病房與中度加護病房，排除醫患情感干擾，執行最理性的強勢檢傷評估。</p>\n</li>\n<li>\n<p><strong>落實病人四級分類造冊（分組 B）</strong>： -   <strong>【第一類：可返家/提早出院】</strong>：生命徵象穩定、已拔除靜脈點滴、於72小時內無立即致命危險者。醫務部迅速開立出院處方，配合財務/行政部（F0）啟用<strong>「戰時記帳豁免機制」</strong>，病患免排隊、零元結帳，於 <strong>4小時內極速離院</strong>。 -   <strong>【第二類：需扶持安置者】</strong>：無立即生命危險但缺乏生活自理能力者，安排下轉至安全重置區的長照機構或由家屬私人車接回。 -   <strong>【第三類：一般住院（臥床者）】</strong>：需要常規照護之臥床患者，列為中優先級，配合行政中巴或大眾接駁載具撤離。 -   <strong>【第四類：高度照護（危急/ICU病患）】</strong>：極度依賴維生設備、插管、使用呼吸器之重症患者，列為最高優先級。</p>\n</li>\n<li>\n<p><strong>指標達成與戰備病床轉換</strong>： 醫務部督導全院於 24 小時內騰出至少 30% 至 40% 的急重症床位與開刀房；所有清空病床立即鋪上<strong>戰備床單</strong>，並配合全院於 <strong>48小時內將住院病人降載至30%</strong> 的戰略總目標。</p>\n</li>\n</ol>\n<p>三、 第三階段：執行醫護-病人「一對一 A-B 戰術配對」與持續照護</p>\n<ol>\n<li>\n<p><strong>編組隨車持續照護功能編組 A</strong>： 醫務部會同計畫部（護理部資源控管組 P1），打破科室建制，將全院現有的醫師、護理師及專科醫檢/藥事人員詳細造冊，建立<strong>「醫事隨車撤離功能編組 A（隨車醫護）」</strong>與「暫時留守醫事編組」。</p>\n</li>\n<li>\n<p><strong>實施 A-B 一對一戰術配對</strong>： 持續照護組依據病情複雜度將病患進行分組 B，迅速將<strong>醫事編組 A 與病人分組 B 進行「一對一（A與 B）配對」</strong>。指派主治醫師及專責護理師全程隨同救護車及轉送載具，死守病患在垂直疏散（純人力5人一組無動力垂直疏散）及車輛轉運途中的醫療不中斷。</p>\n</li>\n</ol>\n<p>四、 第四階段：派遣「異地重置先遣團隊」與跨院醫療交接</p>\n<ol>\n<li>\n<p><strong>派遣醫療先遣裝設小組</strong>： 在主力撤離車隊出發前 1 小時，醫務部部長指派由資深護理師、資材管理人員組成的<strong>「先遣團隊（Relocation Advance Team）」</strong>，先行趕往指定的接收聯防責任醫院（如協定支援之福利部屏東醫院、寶建醫院、安泰醫院或屏東榮總）。</p>\n</li>\n<li>\n<p><strong>打通異地重置空間與行政動線</strong>： 先遣團隊抵達接收端後，立即會同對接醫院之指揮官，勘查物理空間，規設本院進駐之「臨時開刀房、ICU與急診醫療區」，確認備援水電與網路接口分配，準備即刻開診。</p>\n</li>\n<li>\n<p><strong>落實跨院之「醫療交班」</strong>： 在送上救護車轉院前，急診轉運區的醫師必須協助原主治醫師，透過電話或備援無線電與合作接收醫院的醫師進行詳細的<strong>「醫療交班（Handover）」</strong>，確認病患的病況、所需維生設備及轉診接收細節。</p>\n</li>\n</ol>\n<p>五、 第五階段：死守隨行「醫療紀錄、用藥與救命物資」不中斷</p>\n<ol>\n<li>\n<p><strong>實體病歷袋隨車攜帶（防範斷網）</strong>： 醫務部督導前線病房書記，確保每位轉運病患的手寫紙本<strong>「轉診單、病歷摘要、用藥處方箋及治療紀錄」裝入防潮防水夾鏈袋，強制物理綁定於病人擔架上</strong>，隨同病人移出交接，嚴防接收端發生醫療資訊斷鏈。</p>\n</li>\n<li>\n<p><strong>救急藥物與血品隨車移出</strong>： 任務支援組（L2）配合醫務部，精算並在轉運車上配置足夠維持 72 小時之「戰備急救箱、備用血液、靜脈輸液（林格氏液）與管制麻醉止痛藥（如 Ketamine）」，避免轉送途中及抵達初期發生醫藥存量耗竭的致命危機。</p>\n</li>\n<li>\n<p><strong>「走動式血庫（Walking Blood Bank）」備用機制</strong>： 醫務部協同檢驗科血庫，盤點預先建檔的員工血型名冊，隨時準備於重置點啟動活體抽血及快篩程序，死守大出血病患之用血不中斷。</p>\n</li>\n</ol>\n<p>六、 第六階段：簽發最冷酷的「反資敵（Denial of Assets）」封存與銷毀指令</p>\n<p>針對體積龐大、高度仰賴大連院區常規電網、且在數小時內「物理上絕對無法搬運重置」的精密維生與醫療資產（如大型中央洗腎機、高階多切面\nCT、MRI 及核心伺服器主機）：</p>\n<ol>\n<li>\n<p><strong>下達實體斷電與物理鎖固令</strong>： 醫務部長（執行部長）會同工務室（設施 O2）與資訊室（機構 O5），對上述設備執行<strong>強制斷電、切斷維生氣體管線及機械物理鎖固</strong>。</p>\n</li>\n<li>\n<p><strong>硬體關鍵晶片與高機密硬碟之實體銷毀</strong>： 授權資通人員<strong>對核心資料庫硬碟、高機密患者個資晶片執行「物理實體砸毀/銷毀」</strong>。並由法律訴求小組 F3（職安室主任 杜傳榮）簽發<strong>「戰時資產反資敵封存銷毀法律簽證書」</strong>，隨身攜帶至地下備援指揮所，作為災後向國家申報戰損之唯一憑證。</p>\n</li>\n</ol>\n<p>七、 第七階段：災後復原與安全有序歸建</p>\n<ol>\n<li>\n<p><strong>異地醫療功能重組</strong>： 在重置點完成接收後，醫務部指導撤離醫事人力與接收醫院人員進行功能整合，快速投入重置後之核心醫療與戰傷收治任務。</p>\n</li>\n<li>\n<p><strong>環境安全鑑定與有序歸建</strong>： 戰火解除或警報解除後，醫務部協同總務部、管理部、工務室勘查大連院區建築結構安全與水質毒物偵檢。經衛生局與安全官評估無虞後，制定病患及醫護有序返回大連主院區歸建的流程與指示。</p>\n</li>\n</ol>"}]}, {"role": "護理部", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，護理部在HICS（醫院事故指揮系統）中同時扮演「計畫樞紐」與「醫療照護骨幹」的雙重關鍵角色，具體因應作為如下：</p>\n<p><strong>一、 進駐HICS指揮體系，接掌「計畫部」與關鍵情資</strong></p>\n<ol>\n<li>\n<p><strong>擔任計畫部長</strong>：護理部部長（護理副院長）將擔任HICS編組下的<strong>「計畫部長（Planning\n    Section\n    Chief）」</strong>，負責綜觀全局、綜整全院情資，建立應變方案，並為每個執行週期建立行動計畫。</p>\n</li>\n<li>\n<p><strong>掌握資源與病人動向</strong>：護理部督導長將分別接掌<strong>「資源控管組」</strong>與<strong>「狀況分析組」</strong>。資源控管組負責清點全院人力、床位、設備與物資位置，建立詳細的資源清單；狀況分析組則負責追蹤現有病人動向、蒐集分析災情資訊，以提供指揮官準確的決策依據。</p>\n</li>\n</ol>\n<p><strong>二、 執行病床極限降載與空間轉置</strong></p>\n<ol>\n<li>\n<p><strong>執行病床清空與降載</strong>：護理部需配合醫務部（執行部）展開第一階段的「動員降載與能量整備」，明確定義核心醫療功能，並執行病人出院及轉院計畫，目標於<strong>48小時內將住院病人降載至30%</strong>。</p>\n</li>\n<li>\n<p><strong>整備戰備擴充空間</strong>：執行病床清空計畫，將一般病房轉換為戰傷病房，並負責盤點與調度呼吸器、點滴幫浦等關鍵維生設備，為後續可能湧入的傷患騰出擴充病床（Surge\n    Beds）。</p>\n</li>\n</ol>\n<p><strong>三、 護理人力重分配與極限調度</strong></p>\n<ol>\n<li>\n<p><strong>跨單位人力調派</strong>：護理部掌握全院最多的醫療人力，戰時必須打破平時的科室本位主義，將原本在門診、健檢中心等非緊急單位的護理師，迅速調派至急診前線、開刀房或\n    B1 備援醫療空間（如檢傷區、臨時ICU、輕症病房）進行支援。</p>\n</li>\n<li>\n<p><strong>維持極限照護底線</strong>：在戰時資源極度匱乏（如斷水、斷電）的情況下，護理團隊需準備以人工或紙本降級方式（如手捏甦醒球人工呼吸、紙本給藥與病歷紀錄）維持病患的基本生命徵象與照護。</p>\n</li>\n</ol>\n<p><strong>四、 彙整量能數據並對接限時回報</strong>\n由護理部轄下的「資源控管組」與「狀況分析組」將限時盤點完畢的<strong>「全院護理人力總數與班表、各區可用空床數、病人動向與降載名冊、以及現有醫療設備清單」</strong>等精確數據，迅速提供給「統籌呈報組（危管會）」。透過準確的資訊對接，確保醫院能於主管機關規定的時限內，順利完成臨災應變中心的初報與各項量能續報作業。</p>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之複合性危機（民眾因假訊息與恐慌大量湧入急診、搶購慢性病藥品、交通事故大量傷患，以及家屬急迫的各項要求），護理部在HICS（醫院事故指揮系統）中同時肩負「計畫部決策中樞」與「第一線醫療照護骨幹」的雙重重任。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 接掌計畫部指揮權：反制假訊息與精確掌控病人動向</strong>\n面對假訊息與家屬查詢撤離資訊的混亂，護理部高階主管必須坐鎮大腦中樞：</p>\n<ol>\n<li>\n<p><strong>綜整情資與闢謠支援：</strong>\n    護理部部長擔任「計畫部長（P0）」。轄下的「狀況分析小組（P2，由護理部督導長擔任）」須迅速蒐集急診壅塞情況與各病房真實收治數據，每四小時發布最新狀況報告。這些精確資訊將提供給發言官，作為對外發布新聞稿、反制假訊息與平息民眾恐慌的客觀依據。</p>\n</li>\n<li>\n<p><strong>家屬詢答與病人動向管理：</strong>\n    面對家屬急尋交通事故傷患或查詢撤離資訊，狀況分析小組必須精確執行「病人動向追蹤」。確認病患在各區（檢傷、治療區、留觀、病房）的訊息傳遞正確可靠，並與社工室及院牧部合作，針對病人家屬進行正確的詢答與情緒安撫。</p>\n</li>\n</ol>\n<p><strong>二、 啟動大量傷患（333）與護理人力極限調度</strong>\n交通事故造成大量傷患瞬間湧入，急診人力必然崩潰，護理部須立即啟動極限調度：</p>\n<ol>\n<li>\n<p><strong>緊急召回與跨科支援：</strong>\n    配合急診啟動大量傷患機制（代號333），護理部須依據事件規模啟動人力召回。例如內科系重度/中度事件，第一波需召回47名護理人員，第二波可能需召回高達87名護理人員。</p>\n</li>\n<li>\n<p><strong>白/夜班機動調度：</strong>\n    若發生於假日或夜間，值班護理長須暫代指揮官或協同急診調派全院病房護理人力（如從6A、5A、加護病房等單位抽調人力）至急診紅、黃、綠區進行支援。</p>\n</li>\n</ol>\n<p><strong>三、 第一線檢傷分流與戶外領藥支援（醫療照護組）</strong></p>\n<ol>\n<li>\n<p><strong>極限分流慢性病患：</strong>\n    面對恐慌搶購慢性病藥品的群眾，護理人員需配合急診與藥劑科，於急診室外或大廳設立「戶外慢性病處方籤領藥區」或「戶外防疫門診」。護理人員在此進行快速檢傷與衛教分流，將單純領藥的民眾阻絕於急診搶救區外。</p>\n</li>\n<li>\n<p><strong>大量傷患照護分區：</strong>\n    急診護理長或資深護理師將擔任「護理師組長」，指揮被召回或調派來的護理人員，進駐檢傷分類區、重傷區（紅區）、中傷區（黃區）及輕傷區（綠區），執行急救處置、給藥與建立靜脈輸液，並將病患動態登錄於大量傷患動向表。</p>\n</li>\n</ol>\n<p><strong>四、 配合「反向檢傷」與病床資源控管（資源控管組）</strong></p>\n<ol>\n<li>\n<p><strong>拒絕非緊急住院：</strong>\n    面對家屬因恐慌而「要求住院」的龐大壓力，護理部督導長領導的「資源控管小組（P1）」必須嚴格監控全院可用空床數。護理團隊需配合醫師執行「反向檢傷（Reverse\n    Triage）」，堅守原則，拒絕輕症與非緊急病患住院。</p>\n</li>\n<li>\n<p><strong>騰出戰傷病床：</strong>\n    對於院內現有穩定或可提早出院的病患，護理部須協助辦理極速結帳與出院手續，強制騰出病床，將寶貴的醫療量能與急重症病房絕對保留給交通事故的重傷患。</p>\n</li>\n</ol>\n<p><strong>五、 確保前線護理人員安全與心理防護</strong></p>\n<ol>\n<li>\n<p><strong>配合實體防護（Lockdown）：</strong>\n    若恐慌群眾或家屬引發暴力滋擾，急診護理人員須立即通報警衛啟動防暴應變（按*9通報），配合安全官退入預先規劃的「安全隔離區」，確保自身人身安全。</p>\n</li>\n<li>\n<p><strong>強制輪替與心理支持：</strong>\n    護理部主管須密切關注前線護理人員的身心狀態。在面對大量血肉模糊的交通事故傷患與家屬的強大壓力下，必須安排強制輪替班表，並配合「關懷小組」提供心理除頻（Debriefing）與情緒支持，避免護理團隊爆發戰鬥疲勞或心理崩潰。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息，且掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊/大當機）」，這是一場資訊癱瘓與輿論恐慌的複合性危機。在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>同時肩負「計畫部決策與情資中樞」以及「第一線醫療照護骨幹」的雙重重任。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 第一線病房與急診：全面啟動「紙本降級（Downtime）」作業</strong>\n面對各項資訊系統延遲或癱瘓，護理人員身處第一線，必須立刻切換為「無網作業」以維持醫療照護底線：</p>\n<ol>\n<li>\n<p><strong>啟用當機緊急箱</strong>：各護理站須依據當機應變機制（或砸破封條），立刻取出預先整備的「當機緊急箱（Downtime\n    Box）」。</p>\n</li>\n<li>\n<p><strong>無縫切換人工作業</strong>：全面改用三聯式紙本病歷、手寫處方箋、紙本檢傷單與條碼貼紙，並以人工方式（如白板、紙本名冊）進行病人交班與醫囑核對，確保在無電腦輔助下的給藥與醫療處置安全。</p>\n</li>\n</ol>\n<p><strong>二、 接掌計畫部指揮權：人工彙整情資與支援反制假訊息</strong>\n在系統當機期間，電子儀表板失效，護理部高階主管必須坐鎮大腦中樞，以人工方式穩住全院情資：</p>\n<ol>\n<li>\n<p><strong>計畫部長統籌</strong>：由護理部部長擔任「計畫部長（P0）」，綜觀所有事件相關資訊，建立替代執行方案，並為下一個執行週期建立事故行動計畫（IAP）。</p>\n</li>\n<li>\n<p><strong>人工盤點資源（支援闢謠）</strong>：由護理部督導長擔任「資源控管小組長（P1）」，在無網狀態下，以無線電或傳令兵回報等人工方式，精確清點全院實際的護理人力、病床空床數及物資位置，建立實體資源清單。</p>\n</li>\n<li>\n<p><strong>對接發言官闢謠</strong>：將上述精確盤點的真實醫療量能與收治數據交由「狀況分析小組（P2，亦由護理部督導長擔任）」，產出狀況報告，迅速提供給發言官，作為對外澄清「停診、缺藥或拒收病人」等假訊息的客觀依據。</p>\n</li>\n</ol>\n<p><strong>三、 執行紙本化的「病人動向管理」與家屬溝通</strong>\n掛號與批價系統延遲會導致大當機，病患容易在各部門間失去蹤影，或家屬因等候產生恐慌：</p>\n<ol>\n<li>\n<p><strong>人工掌握病人動向</strong>：護理部（狀況分析小組轄下之病人動向組）須啟動人工追蹤機制，確實記錄病人在各區（門急診、留觀、病房）的動向，確認病人動向訊息在各區傳遞正確可靠。</p>\n</li>\n<li>\n<p><strong>前線醫病溝通與安撫</strong>：面對因系統延遲而久候不滿，或受假訊息影響而焦急的病人及家屬，第一線護理人員需耐心解釋當前的紙本替代流程。若觀察到家屬有極端抱怨或異樣，應即時通報護理主管及社工師介入安撫，防範醫療暴力衝突發生。</p>\n</li>\n</ol>\n<p><strong>四、 護理人力之極限調度與支援</strong>\n系統當機將導致日常的掛號、開單、給藥與傳遞檢體流程轉為極度耗時的人工作業，護理部必須迅速應對人力缺口：</p>\n<ol>\n<li>\n<p><strong>人力重分配</strong>：護理部部長（計畫部長）須與執行部協調，盤點並評估各單位的工作量。將暫停非緊急服務（如常規健檢）所釋出的護理人力，迅速調派至急診或病房，支援繁重的紙本紀錄、人工跑單與臨床照護工作。</p>\n</li>\n<li>\n<p><strong>確保前線輪替</strong>：在紙本降級的高壓作業下，必須關注護理同仁的身心負荷，協調人事小組安排必要的輪替，避免前線護理人員發生戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院的「數位神經系統」瞬間癱瘓，面臨又盲又啞的極端危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>同時肩負「第一線醫療照護的骨幹（執行部）」與「全院情資大腦（計畫部）」的雙重重任。面對資訊系統全面大當機，護理部的具體因應作為如下：</p>\n<p><strong>一、 第一線護理站：極速啟動「紙本降級（Downtime）」作業</strong>\n面對依賴已久的電腦系統癱瘓，第一線護理人員必須瞬間適應「無網醫療」的戰地環境：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機箱</strong>：接獲資訊室宣告當機後，各病房護理站、急診與門診單位的護理人員，必須立即砸破封條，取出預先整備的<strong>「當機緊急箱（Downtime Box）」</strong>。</p>\n</li>\n<li>\n<p><strong>回歸人工類比作業</strong>：全面停止依賴電腦，無縫切換使用內附的三聯式紙本病歷、手寫處方箋、紙本檢傷單與條碼貼紙。</p>\n</li>\n<li>\n<p><strong>離線名單維持運作</strong>：依賴每日（或定期）預先離線列印的最新住院病人名單，核對病患身分與用藥，確保給藥與核心醫療處置不中斷。</p>\n</li>\n</ol>\n<p><strong>二、 配合無網通訊與落實「覆誦確認（Read-back）」機制</strong> DDoS\n攻擊極可能伴隨院內 VoIP\n網路電話與常規通訊癱瘓，護理人員必須改變醫囑與檢驗傳遞方式：</p>\n<ol>\n<li>\n<p><strong>配合傳令兵（Runner）遞送</strong>：將緊急開立的手寫開刀醫囑、血液配對單與檢驗單，交由穿著螢光反光背心的「傳令兵」，透過嚴格的「口令覆誦」與「簽收簿（Logbook）」進行實體遞送，徹底克服斷網危機。</p>\n</li>\n<li>\n<p><strong>檢驗危險值覆誦</strong>：在無法透過電腦查看檢驗報告時，護理人員接收來自檢驗科透過對講機或人工電話口頭回報的危險值（Panic Value）時，必須嚴格執行<strong>「Read-back（覆誦確認）」</strong>機制，防範無網狀態下發生給藥或處置的醫療錯誤。</p>\n</li>\n</ol>\n<p><strong>三、 擔任計畫部門大腦：啟動人工情資與「病人動向追蹤」</strong> 在 HIS\n系統遭勒索軟體癱瘓下，原有的電子看板與追蹤系統完全失效，護理部高階主管必須以人工方式穩住全院情資：</p>\n<ol>\n<li>\n<p><strong>計畫部長統籌（P0）</strong>：由護理部部長擔任計畫部長，與指揮官研商並發布「事故行動計畫（IAP）」，統籌全院切換至紙本降級模式的步調。</p>\n</li>\n<li>\n<p><strong>人工追蹤病人動向（P2）</strong>：由護理部督導長擔任的「狀況分析小組長」，必須立即啟動人工追蹤機制。以紙本確實記錄病人在各區（門急診、留觀、病房、開刀房）的最新動態，確保無網狀態下病人動向訊息傳遞正確可靠。</p>\n</li>\n<li>\n<p><strong>維持實體情資看板（P1）</strong>：護理部督導長轄下的「資源控管小組」，須在指揮中心架設實體白板或看板。透過人工回報，隨時更新全院空床數、可用開刀房數、醫護人力等關鍵數據，提供指揮官決策參考。</p>\n</li>\n</ol>\n<p><strong>四、 穩定醫病關係與防範急診/病房衝突</strong>\n系統大當機必然造成病患久候、領藥與醫療處置嚴重遞延，極易引發家屬焦躁甚至醫療暴力：</p>\n<ol>\n<li>\n<p><strong>前線溝通與安撫</strong>：護理人員須配合醫師，耐心向病患與家屬說明醫院正遭遇網路異常，目前已啟動「紙本降級」替代流程，給予正確的資訊說明以安撫恐慌情緒。</p>\n</li>\n<li>\n<p><strong>通報防暴機制</strong>：若發現病患或家屬情緒失控、極端抱怨，甚至出現暴力徵象，護理人員須立即通報護理主管、社工室及醫勤室保安組介入處理，啟動實體防護，保護醫療團隊的人身安全。</p>\n</li>\n</ol>"}, {"scenario": "1-7", "title": "院內網路服務不穩", "desc": "院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況「院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲（疑似遭受資安攻擊或網路異常）」，這屬於演習特別狀況\n3-3 之資安攻防演練與資訊系統備援危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>身兼全院的<strong>「計畫部門（大腦）」</strong>與<strong>「第一線醫療照護（執行部骨幹）」</strong>雙重核心角色。面對網路不穩與系統當機，護理部必須迅速引導前線切換至無網作業，並以人工方式維持情報中樞的運作。其具體因應作為如下：</p>\n<p><strong>一、 第一線異常通報與配合「資安事件分級」</strong></p>\n<ol>\n<li>\n<p><strong>異常察覺與即時通報</strong>：第一線護理人員若在操作 HIS（醫療資訊系統）、給藥系統或 PACS（影像系統）時發現嚴重延遲、異常登入或疑似釣魚郵件，須立即向護理長或值班護理督導報告。</p>\n</li>\n<li>\n<p><strong>對接資訊室啟動應變</strong>：護理部主管接獲通報後，須立即聯繫資訊室（機構運作主管 O5），協助資訊室進行「資安通報與事件分級」，以利資訊部門及早執行實體隔離與阻斷，防範災情擴大癱瘓全院醫療系統。</p>\n</li>\n</ol>\n<p><strong>二、 前線病房與急診全面啟動「紙本降級（Downtime）」離線流程</strong>\n在接獲資訊室或指揮中心宣告進入系統當機狀態後，護理部必須引導全院護理站瞬間切換作業模式：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機緊急箱</strong>：各病房護理站與急診單位須立即砸破封條，取出預先整備的<strong>「當機緊急箱（Downtime Box）」</strong>。</p>\n</li>\n<li>\n<p><strong>無縫切換人工作業</strong>：全面停止依賴電腦系統，改用當機箱內的三聯式紙本病歷、手寫處方箋、紙本檢傷單與條碼貼紙。</p>\n</li>\n<li>\n<p><strong>離線名單運用</strong>：依靠每日常規離線列印的「最新住院名單」來核對病患身分，並以人工白板進行病人交班與醫囑核對，確保在無電腦輔助下的給藥與醫療處置安全。</p>\n</li>\n</ol>\n<p><strong>三、\n優先維持急診、藥局、檢驗、放射運作：配合「傳令兵（Runner）」機制</strong>\n在斷網狀態下，為確保攸關性命的核心單位（急診、藥局、檢驗、放射科）能優先維持運作，護理團隊必須改變平時的電子傳輸習慣：</p>\n<ol>\n<li>\n<p><strong>啟動人工徒步遞送</strong>：配合行政單位啟用的<strong>「傳令兵（Runner）制度」</strong>，將急診與重症病患的手寫緊急開刀醫囑、紙本檢驗單及實體檢體，交由穿著反光背心的專人，以徒步衝刺方式精準遞送至藥局、檢驗科或放射科。</p>\n</li>\n<li>\n<p><strong>人工回報與危險值覆誦</strong>：接收檢驗科或放射科以無線電對講機或人工電話口頭回報的檢驗危險值（Panic Value）時，護理人員必須嚴格執行<strong>「覆誦確認（Read-back）」</strong>機制，確保無網狀態下的醫療數據傳遞絕對正確。</p>\n</li>\n</ol>\n<p><strong>四、 接掌計畫部指揮權：執行紙本化的「病人動向追蹤」與情資彙整</strong>\n系統當機將導致電子儀表板與床位管理系統失效，護理部高階主管必須坐鎮大腦中樞，以人工方式穩住全院情資：</p>\n<ol>\n<li>\n<p><strong>人工盤點資源（資源控管小組 P1）</strong>：由護理部督導長在無網狀態下，以無線電或傳令兵回報等人工方式，精確清點全院實際的護理人力、病床空床數及急救物資位置，建立實體的資源清單。</p>\n</li>\n<li>\n<p><strong>人工追蹤病人動向（狀況分析小組 P2）</strong>：護理部須啟動人工追蹤機制，確實記錄病人在各區（門急診、留觀、病房）的動向，確認病人動態訊息在各區傳遞正確可靠，防止病患在當機混亂中失去蹤影。</p>\n</li>\n</ol>\n<p><strong>五、 人力重分配與前線醫病情緒安撫</strong></p>\n<ol>\n<li>\n<p><strong>護理人力極限調度</strong>：系統當機將導致日常的掛號、開單、找藥與給藥轉為極度耗時的人工作業。護理部須與指揮中心協調，將暫停非緊急服務（如常規門診、健檢）所釋出的護理人力，迅速調派至急診或病房，支援繁重的紙本紀錄與人工跑單工作。</p>\n</li>\n<li>\n<p><strong>醫病溝通與防範衝突</strong>：面對因系統延遲而久候不滿的病人及家屬，第一線護理人員需耐心解釋當前的「紙本降級」替代流程。若觀察到家屬有極端抱怨或情緒失控，應即時通報護理主管及社工師介入安撫，並通知警衛防範醫療暴力衝突發生。</p>\n</li>\n</ol>"}, {"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與交通受阻的「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>身兼「計畫部的大腦」與「第一線醫療照護（執行部）的骨幹」雙重關鍵角色，必須在極限狀態下進行人力調度、資源分配與維持照護底線。其具體因應作為如下：</p>\n<p><strong>一、 接掌計畫部大腦，精算資源與擬定替代方案</strong></p>\n<ol>\n<li>\n<p><strong>計畫部長統籌（P0）</strong>：由護理部部長擔任計畫部長，綜觀員工無法到勤與物資短缺的嚴峻情勢，建立替代執行方案，並為每個執行週期建立與發布「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>資源控管精算（P1）</strong>：由護理部督導長擔任資源控管小組長，精確盤點全院殘存的護理人力、病床空床數及關鍵醫療物資的位置與供應情況，確保事件應變時有足夠之供應，並建立清單以利向後勤或外部請求支援。</p>\n</li>\n<li>\n<p><strong>滯留病人動向追蹤與家屬安撫（P2）</strong>：因病人轉送不確定性提高，由護理部督導長擔任的狀況分析小組長須透過轄下之病人動向組，嚴密追蹤滯留院內之病患動向，並針對因物資匱乏或無法轉送而焦慮的病患家屬，給予正確的詢答與情緒安撫。</p>\n</li>\n</ol>\n<p><strong>二、 護理人力之極限調度與重分配（執行部醫療照護骨幹）</strong></p>\n<ol>\n<li>\n<p><strong>護理人力重分配</strong>：面對員工受交通影響無法到勤的人力缺口，護理部掌握全院最多的醫療人力，必須迅速將取消的非緊急門診、健檢中心的護理師，全面調派至急診、開刀房或臨時設立的大量傷患區，維持基本照護底線。</p>\n</li>\n<li>\n<p><strong>病房降載與擴充量能</strong>：執行病床清空計畫，將一般病房轉換為戰備/戰傷病房，並負責調度呼吸器、點滴幫浦等關鍵設備，為無法轉出及瞬間湧入的急重症病患騰出「擴充病床（Surge\n    Beds）」量能。</p>\n</li>\n</ol>\n<p><strong>三、 啟動極限替代方案，維持生命照護底線</strong></p>\n<ol>\n<li>\n<p><strong>無動力/極限醫療替代</strong>：在醫療氣體配送延遲或耗竭的極端狀況下，護理人員須演練在3分鐘內，將重症病患的中央氧氣管線拔除，快速且精準地切換至床邊備用的氧氣鋼瓶。</p>\n</li>\n<li>\n<p><strong>人工維生操作</strong>：若資源極度匱乏（如備用氧氣鋼瓶耗盡、無電），護理部須領導團隊以人工方式維持病患基本生命徵象，例如動員組建「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持重症病患呼吸，或執行紙本降級的人工給藥作業。</p>\n</li>\n</ol>\n<p><strong>四、 強制輪休與護理戰力保存</strong></p>\n<ol>\n<li>\n<p><strong>軍事化強制輪班</strong>：因交通受阻導致員工無法正常換班，為避免留守的護理團隊因高壓與過勞而發生戰鬥疲勞，護理部須與人事室協調，啟動「軍事化強制輪班機制」（如嚴格執行12小時一班）。</p>\n</li>\n<li>\n<p><strong>強制撤離火線休息</strong>：制定鐵律，時間一到無論前線多麼急迫，接班人員必須強行接手，下班護理人員強制撤離火線，並送至指定的「安全庇護所（Safe\n    Haven）」進行休息與心理修復，確保醫療戰鬥力的長期續航。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況\n2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透破壞、資源搶奪與群眾恐慌的極端實體安全威脅。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>身兼「計畫部（大腦）」與「執行部醫療照護（骨幹）」的雙重核心角色。面對外部群眾包圍與內部封鎖警戒，護理部的具體因應作為如下：</p>\n<p><strong>一、 擔任「計畫部門」大腦：極限資源盤點與情資控管</strong></p>\n<ol>\n<li>\n<p><strong>計畫部長統籌（P0）</strong>：由護理部部長擔任計畫部長，必須綜觀無人機威脅與避難群眾包圍的情勢，配合院方實施的「硬邊界防護」與「內部封鎖（Lockdown）」，建立醫療持續運作的替代執行方案，並發布事故行動計畫（IAP）。</p>\n</li>\n<li>\n<p><strong>封鎖狀態下的資源精算（P1）</strong>：由護理部督導長擔任資源控管小組長。因應外部群眾包圍可能導致運補中斷，必須精確盤點院內殘存的護理人力、病床空床數及關鍵醫療物資，重新精算在「孤島/封鎖狀態」下的消耗速率，以確保重症搶救供應無虞。</p>\n</li>\n<li>\n<p><strong>病人動向追蹤與家屬安撫（P2）</strong>：由護理部督導長擔任狀況分析小組長。在啟動防暴封鎖或空間轉換時，轄下的「病人動向組」必須嚴密追蹤病患在各安全隔離區的正確位置；同時針對因外部威脅或醫院實施封鎖而感到恐慌的住院病患與家屬，給予正確的詢答與情緒安撫，穩定院內民心。</p>\n</li>\n</ol>\n<p><strong>二、 執行「醫療照護」骨幹：死守防線與極限檢傷分流</strong></p>\n<ol>\n<li>\n<p><strong>協同把守「單一檢傷武裝通道」</strong>：面對大量湧入欲尋求庇護或物資的社區群眾，急診高階護理師必須與武裝警力共同於「聯合檢查站（Check-point）」站哨。執行嚴格的醫療需求核對，強勢阻絕僅為了尋求庇護或索購物資的非緊急群眾，確保核心醫療資源不被癱瘓。</p>\n</li>\n<li>\n<p><strong>退守「安全隔離區（Safe\n    Haven）」</strong>：若社區群眾因恐慌或企圖搶奪物資（如抗生素、麻醉藥品）而演變為暴動衝闖，護理人員須配合急診室降下防暴門（內部封鎖），將重症病患緊急推入並鎖入預先規劃的「安全隔離區」，在保全防暴盾牌掩護下維持醫療處置，保護醫患免受暴徒傷害。</p>\n</li>\n<li>\n<p><strong>護理人力重分配與「反向檢傷」</strong>：護理部掌握全院最多醫療人力，必須迅速將停診的門診、健檢中心護理師調派至急診或重症區支援。同時配合醫師執行「反向檢傷（Reverse\n    Triage）」，將病房內生命徵象穩定的輕症病患快速辦理出院或轉出，強行騰出病床與擴充量能（Surge\n    Capacity）。</p>\n</li>\n</ol>\n<p><strong>三、 護理戰力保存與強制輪替（心理與生理防護）</strong></p>\n<ol>\n<li>\n<p><strong>軍事化強制輪班</strong>：面對群眾暴動壓力與外部武裝威脅，前線護理人員極易面臨心理崩潰與生理耗竭。護理部須與人事室協調，啟動「軍事化強制輪班機制」（如嚴格執行\n    12\n    小時一班）。時間一到，接班人員必須強行接手，強制下班護理人員撤離火線。</p>\n</li>\n<li>\n<p><strong>強制撤離至「安全庇護所」與心理急救（PFA）</strong>：下班的護理人員必須強制送至大連院區結構最安全、最深層地下室的「員工專屬庇護站」休息。在聽不到哀嚎聲、看不到鮮血的絕對安全環境中，由心理韌性特遣隊（含精神科醫師、臨床心理師與院牧）提供心理除頻（Debriefing）與心理急救（PFA），預防戰鬥疲勞與急性壓力崩潰，確保醫療戰鬥力的長期續航。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，這代表醫院正面臨極端的戰爭與空襲威脅，必須進行大面積的「空間降階防護」，將高樓層的醫療量能轉移至地下室。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>身兼全院的<strong>「計畫部門（大腦）」</strong>與<strong>「執行部門醫療照護（骨幹）」</strong>的雙重核心角色。面對防空疏散與\nB1 備援空間的緊急開設，護理部的具體因應作為如下：</p>\n<p><strong>一、 擔任「計畫部門」大腦：統籌疏散情資與追蹤病人動向</strong></p>\n<ol>\n<li>\n<p><strong>擬定疏散行動計畫（計畫部長\n    P0）</strong>：由護理部部長擔任計畫部長。必須綜觀空襲威脅與空間轉置的情勢，配合執行部建立醫療持續運作的替代方案，並為防空疏散與\n    B1 備援空間啟用的執行週期，發布「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>極限資源盤點與控管（資源控管小組\n    P1）</strong>：由護理部督導長負責。在向地下室疏散的混亂過程中，精確盤點全院殘存的護理人力、設施與物資，並針對即將啟用的\n    B1 五處功能區建立資源清單，確保重症搶救供應無虞。</p>\n</li>\n<li>\n<p><strong>嚴密追蹤病人動向與家屬安撫（狀況分析小組\n    P2）</strong>：由護理部督導長負責。轄下的「病人動向組」必須在垂直疏散的混亂過程中，嚴密追蹤病患由高樓層轉移至\n    B1\n    各安全功能區的正確位置，確保無人遺漏；同時針對因防空警報而恐慌的住院病患與家屬，給予正確的資訊發布與情緒安撫。</p>\n</li>\n</ol>\n<p><strong>二、 擔任「執行部門」骨幹：執行垂直疏散與進駐 B1 醫療區</strong></p>\n<ol>\n<li>\n<p><strong>無動力垂直疏散與就地掩蔽</strong>：當空襲警報響起，若高樓層受損或面臨斷電，護理人員須利用軟擔架（滑墊）與可攜式蓄電池設備，將重症病患經由安全梯，以人力接力的方式垂直疏散至\n    B1 避難區。若 ICU\n    病患無法立即下樓，則迅速將病床推離靠窗區域，移至建築物的「核心內筒（如梯廳、無窗走廊）」進行防爆掩蔽。</p>\n</li>\n<li>\n<p><strong>執行反向檢傷與極限降載</strong>：配合醫師執行「反向檢傷（Reverse\n    Triage）」，將病房內生命徵象穩定的病患快速辦理出院或引導至 B1\n    輕症病房（路加 B1 停車場），極速騰出病床與擴充量能。</p>\n</li>\n<li>\n<p><strong>進駐 B1\n    五大備援功能區</strong>：護理部掌握全院最多醫療人力，必須打破平時的科室編制，將護理師重分配並調派至剛開設的\n    B1 功能區（檢傷行政區、臨時 ICU\n    病房、臨時開刀房、恢復室及輕症病房），在戰火與資源受限下維持重症照護底線。</p>\n</li>\n</ol>\n<p><strong>三、 心理防護與護理戰力強制輪替</strong></p>\n<ol>\n<li>\n<p><strong>軍事化強制輪班</strong>：在防空威脅與地下室高壓環境下，前線護理人員極易面臨心理崩潰與生理耗竭。護理部須與人事室協調，啟動「軍事化強制輪班機制」（如嚴格執行\n    12 小時一班），時間一到強制交接，將下班人員撤離火線。</p>\n</li>\n<li>\n<p><strong>安全庇護與心理急救（PFA）</strong>：確保下班的護理人員強制撤離至「員工專屬庇護站」休息。在絕對安靜、安全的環境中，配合心理韌性特遣隊進行心理除頻（Debriefing）與心理急救（PFA），預防戰鬥疲勞與創傷後壓力症候群（PTSD），確保醫療戰鬥力的長期續航。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨極端的戰災與大量傷患（MCI）考驗。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>扮演著雙重核心角色：其高層主管擔任大腦中樞的<strong>「計畫部（Planning\nSection）」</strong>，而前線的廣大護理人員則是<strong>「執行部（Operations\nSection）」</strong>中維持醫療運作與戰傷搶救的最大宗主力。</p>\n<p>面對大量戰傷病患的湧入，護理部的具體因應作為如下：</p>\n<p><strong>一、 統籌計畫部門（Planning Section）：情報大腦與資源調控</strong></p>\n<ol>\n<li>\n<p><strong>擔任計畫部長（P0）</strong>：由護理部部長擔任，負責綜觀所有災情資訊，與指揮官研商並建立替代執行方案，為每個運作週期制定「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>人力與資源控管（P1）</strong>：由護理部督導長擔任資源控管小組長，精確掌握與盤點全院現有的醫護人力、空床數及關鍵設備（如呼吸器、點滴幫浦）的分佈，並與後勤部門密切協調資源調度。</p>\n</li>\n<li>\n<p><strong>狀況分析與病人追蹤（P2）</strong>：由護理部督導長擔任狀況分析小組長，設立情報專區以追蹤大量湧入傷患的動向，並負責病人家屬的詢答與情緒安撫，確保混亂中名單與去向的正確性。</p>\n</li>\n</ol>\n<p><strong>二、 極限人力抽調與響應「急診 333」</strong></p>\n<ol>\n<li>\n<p><strong>打破建制，人力重分配</strong>：護理部掌握全院最多的醫療人力。面對戰傷洪流，護理部必須迅速打破平時的科室本位，將門診、健檢中心及非緊急單位的護理師，緊急抽調並派往急診、開刀房或臨時設立的大量傷患區支援。</p>\n</li>\n<li>\n<p><strong>病房急援前線</strong>：當總機廣播「急診 333」大量傷患代號時，各病房（如\n    6A、5A、MICU、SICU 等）須依據院內人力支援配置，立即抽出 1 至 2\n    名護理人員前往急診現場，接受急診護理師組長的指揮，直接投入紅、黃、綠區的戰傷搶救與檢傷分類。</p>\n</li>\n</ol>\n<p><strong>三、 執行病房極限降載與「反向檢傷」</strong></p>\n<ol>\n<li>\n<p><strong>病床擴充與轉銜（Surge\n    Capacity）</strong>：護理部須配合資深醫師執行的「反向檢傷（Reverse\n    Triage）」，針對一般病房甚至加護病房內相對穩定的病患，迅速辦理提早出院或轉銜下轉至基層診所與長照機構。</p>\n</li>\n<li>\n<p><strong>病房戰術轉換</strong>：極速清空現有的病房空間，將一般病房轉換為戰傷病房，並換上戰備床單，強行騰出急重症病床，準備迎接由急診或臨時開刀房轉上的大量戰傷病患。</p>\n</li>\n</ol>\n<p><strong>四、 維持戰時照護底線與紙本降級作業</strong></p>\n<ol>\n<li>\n<p><strong>死守維生底線</strong>：在資源極度匱乏或遭遇斷水、斷電、斷氧的極端孤島狀態下，護理團隊必須堅守照護底線，例如在氧氣與電動呼吸器耗盡時，領導行政人員或家屬組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）人工接力維持重症病患的呼吸。</p>\n</li>\n<li>\n<p><strong>紙本降級（Downtime）作業</strong>：若遭遇戰火或駭客攻擊導致資訊系統癱瘓，各護理站須立即砸破封條取出「當機緊急箱（Downtime\n    Box）」，全面切換為紙本病歷、手寫處方箋與紙本檢傷單，確保戰傷搶救與給藥不因斷網而停擺。</p>\n</li>\n</ol>\n<p><strong>五、 實施強制輪替與心理急救防護</strong></p>\n<ol>\n<li>\n<p><strong>軍事化強制輪班</strong>：面對大量血肉模糊的傷患與極高壓的戰傷搶救環境，護理部須配合人事室嚴格執行「軍事化強制輪班機制」（如嚴格執行\n    12\n    小時一班）。無論前線多麼急迫，時間一到強制要求護理人員交接並撤離火線，嚴禁連續超時工作。</p>\n</li>\n<li>\n<p><strong>員工庇護與心理除頻</strong>：強制安排下班的護理人員至地下室安全的「員工專屬庇護站」輪休，並由心理韌性特遣隊針對剛經歷高壓搶救的護理人員進行心理急救（PFA）與心理除頻（Debriefing），防範護理團隊爆發創傷後壓力症候群（PTSD）與戰鬥疲勞。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨基礎設施嚴重受損的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>扮演著雙重核心角色：高層主管擔任大腦中樞的<strong>「計畫部門（Planning\nSection）」</strong>，而前線廣大的護理人員則是<strong>「執行部門（Operations\nSection）」</strong>中維持病患防護與維生底線的骨幹。</p>\n<p>面對此極端狀況，護理部及其轄下人員的具體因應作為如下：</p>\n<p><strong>一、 統籌災情情報與資源控管（計畫部門 P0、P1、P2）</strong></p>\n<ol>\n<li>\n<p><strong>擔任計畫中樞</strong>：由護理部部長擔任計畫部長（P0），綜觀漏水、停電與通訊中斷等災情資訊，與指揮官研商建立替代執行方案，並為每個運作週期發布「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>資源與動向監控</strong>：由護理部督導長擔任資源控管小組長（P1）與狀況分析小組長（P2），在基礎設施受損下，嚴密監控病床空床數、待處理傷患數、醫護人力數及關鍵設備（如備用電源、手電筒）的供應情況，並追蹤混亂中的病患動向。</p>\n</li>\n</ol>\n<p><strong>二、 應對電力瞬斷與電梯停用之「病患防護與垂直疏散」</strong></p>\n<ol>\n<li>\n<p><strong>就地掩蔽（Defend in\n    Place）</strong>：當遭遇空襲震波或爆炸且無法下樓時，加護病房（ICU）與病房護理人員須在不斷開呼吸器與維生儀器的情況下，將病床迅速推離靠窗區域，移至建築物的「核心內筒（如電梯梯廳、無窗戶的內部走廊）」進行防爆掩蔽。</p>\n</li>\n<li>\n<p><strong>無動力垂直疏散</strong>：若因電力瞬斷導致電梯停用，且高樓層面臨火災或倒塌風險，護理人員須利用可攜式蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，以純人力接力將重症病患經安全梯垂直疏散至低樓層或地下室。</p>\n</li>\n</ol>\n<p><strong>三、 應對通訊中斷與系統當機之「紙本降級（Downtime）作業」</strong>\n若震波或斷電導致 HIS 醫療資訊系統及網路癱瘓：</p>\n<ol>\n<li>\n<p><strong>啟用當機緊急箱</strong>：各護理站須立即砸破封條取出「當機緊急箱（Downtime\n    Box）」，全面切換為紙本降級模式。</p>\n</li>\n<li>\n<p><strong>回歸人工紙本作業</strong>：護理人員須改用三聯式紙本病歷、手寫處方箋與紙本檢傷單來維持醫療運作。在通訊全斷下，配合「傳令兵（Runner）」制度，以人工徒步方式精準遞送緊急醫囑與檢驗報告。</p>\n</li>\n</ol>\n<p><strong>四、 應對漏水與維生管線中斷之「極限節流與人工替代」</strong></p>\n<ol>\n<li>\n<p><strong>死守維生底線</strong>：若中央氧氣管線因震動受損失去壓力，護理人員須在 3\n    分鐘內將重症病患切換至備用氧氣鋼瓶；若鋼瓶與電動呼吸器皆因斷電耗盡，須領導行政人員或家屬組成「捏球大隊」，以手動甦醒球（Ambu\n    bag）接力維持病患呼吸。</p>\n</li>\n<li>\n<p><strong>水資源極限管制</strong>：若遭遇停水，護理部須配合實施極其嚴格的水資源配給，要求全院使用乾洗手液，最乾淨的水源僅保留供基本維生與必要醫療處置，嚴禁一般盥洗。</p>\n</li>\n</ol>\n<p><strong>五、 應對消防警報之「初期滅火與疏散引導」</strong></p>\n<ol>\n<li>\n<p><strong>確認與初期滅火</strong>：若震動或爆炸引發真實火災，病房護理人員（作為單位自衛消防編組）須立即進行初期滅火，並高聲呼喊或以對講機通報。</p>\n</li>\n<li>\n<p><strong>病房疏散管制</strong>：火勢擴大時，護理人員須協助將病患及家屬移出病房，優先執行「水平疏散（移至防火區劃另一側或鄰近安全棟別）」，並關閉防火門以侷限火煙。待清查人員完畢後，配合指揮中心指示進行後續的垂直疏散點名。</p>\n</li>\n</ol>\n<p>工務室如何執行極限負載卸除以確保紅區供電？</p>\n<p>資訊室在斷網時如何啟動紙本降級與傳令機制？</p>\n<p>護理部如何進行高樓層重症病患的垂直避難引導？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院瞬間面臨實體攻擊（恐攻／戰爭行為）、維生電力中斷以及極高爆炸風險的複合型毀滅性危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>身兼「第一線醫療照護的骨幹（執行部）」與「全院情資與決策大腦（計畫部）」的雙重重任。面對此斷電、斷氧與爆炸威脅的孤島絕境，護理部的具體因應作為如下：</p>\n<p><strong>一、 擔任計畫部門大腦：精算極限資源與擬定應變計畫（計畫部 P0/P1/P2）</strong>\n護理部高階主管必須在混亂中坐鎮大腦中樞，綜整災情並精算殘存資源：</p>\n<ol>\n<li>\n<p><strong>計畫部長統籌（P0）</strong>：由護理部部長擔任計畫部長。須迅速綜觀無人機攻擊、發電機毀損與液氧外洩的全面情資，與指揮官研商醫療持續運作與防爆避難的替代方案，並為接下來的搶救與疏散週期發布「事故行動計畫（IAP）」。</p>\n</li>\n<li>\n<p><strong>精算殘存維生資源（資源控管小組 P1）</strong>：由護理部督導長擔任組長。在主發電機受損與中央氧氣中斷的狀態下，須立即精確盤點全院殘存的<strong>備用氧氣鋼瓶數量、手動甦醒球（Ambu bag）、手電筒等緊急照明物資，以及不斷電系統（UPS）的可用時間</strong>。</p>\n</li>\n<li>\n<p><strong>追蹤疏散動向與安撫恐慌（狀況分析小組 P2）</strong>：由護理部督導長擔任組長。面對機電棟周邊病房可能進行的緊急疏散，轄下的「病人動向組」必須在停電與混亂的狀態下，嚴密進行病人動向追蹤，確保每位病患轉移至安全區的資訊正確，絕不遺漏任何人員於高爆炸風險區。同時，安撫因爆炸聲與停電而極度恐慌的病患及家屬。</p>\n</li>\n</ol>\n<p><strong>二、\n第一線病房與加護病房：啟動「極限維生」與人工給氧（執行部／醫療照護組）</strong>\n面對主發電機受損與中央液態氧外洩的雙重斷絕，前線護理人員必須死守病患的生命底線：</p>\n<ol>\n<li>\n<p><strong>緊急氧氣切換與「捏球大隊」</strong>：中央供氧異常或中斷時，加護病房與病房護理人員須在 <strong>3 分鐘內</strong>將重症病患切換至床邊備用氧氣鋼瓶。若鋼瓶耗盡且電動呼吸器因斷電停擺，須立即動員行政人員、社工或家屬組成<strong>「捏球大隊」</strong>，以手動甦醒球（Ambu bag）人工接力維持重症病患呼吸。</p>\n</li>\n<li>\n<p><strong>斷電下的護理與紙本作業</strong>：配合工務室的「極限負載卸除（Load Shedding）」，在缺乏照明與維生儀器電力的情況下，回歸人工生命徵象監測。若資訊系統因斷電停擺，立即砸破「當機緊急箱（Downtime Box）」，切換為紙本病歷與手寫給藥紀錄，維持基本醫療運作。</p>\n</li>\n</ol>\n<p><strong>三、\n應對爆炸與洩漏威脅：執行就地掩蔽與無動力疏散（執行部／醫療照護組）</strong>\n機電棟的爆炸與液氧洩漏帶來極高的火災與二次爆炸風險，鄰近病房的護理人員必須迅速應變：</p>\n<ol>\n<li>\n<p><strong>就地防爆掩蔽（Defend in Place）</strong>：若爆炸威脅迫在眉睫且無法下樓，護理人員須在不斷開維生儀器的情況下，將病床迅速推離靠窗區域，移至建築物的<strong>「核心內筒（如無窗戶的內部走廊、電梯梯廳）」</strong>進行防爆掩蔽，並拉下防爆窗簾。</p>\n</li>\n<li>\n<p><strong>無動力垂直疏散</strong>：若鄰近機電棟的病房面臨火勢蔓延風險，且電梯因主發電機受損而停用。護理人員須利用可攜式蓄電池呼吸器及<strong>「樓梯疏散滑墊（軟擔架）」</strong>，以純人力接力（通常為 5 人一組）將重症病患經安全梯垂直搬運疏散至安全樓層或地下避難區。</p>\n</li>\n</ol>\n<p><strong>四、 強制輪休與護理戰力保存（心理與生理防護）</strong>\n在高壓的極限維生（如人工捏球）、無動力搬運與防爆掩蔽中，護理人員將面臨極大的體力與心理消耗：</p>\n<ol>\n<li>\n<p><strong>軍事化強制輪班</strong>：護理部須與人事單位協調，啟動軍事化強制輪休機制（如嚴格執行 12 小時一班），時間一到強制交接，將下班護理人員撤離高壓火線。</p>\n</li>\n<li>\n<p><strong>庇護與心理急救（PFA）</strong>：將撤離的護理人員送至安全的「員工專屬庇護站」休息，並配合心理韌性特遣隊進行心理除頻（Debriefing）與心理急救（PFA），防範戰鬥疲勞與急性壓力崩潰，確保護理團隊的戰鬥力得以長期延續。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當本院機電棟發生爆炸（紅色訊號），導致兩名在場工務同仁遭受砸傷（其中一人嚴重骨折且大出血），且面臨電力、通訊、醫療氣體或系統可能受損的極端危機時，<strong>護理部</strong>在\nHICS（醫院事故指揮系統）中扮演著<strong>「計畫部門決策大腦」</strong>與<strong>「第一線醫療照護核心骨幹」</strong>的雙重戰術重任。</p>\n<p>針對受傷同工的黃金搶救時間以及後續可能發生的斷電、大當機（Downtime）及垂直避難，護理部將協同執行部門與後勤部門，採取以下<strong>七大具體生存救護與照護重置作為</strong>：</p>\n<p>一、 啟動 HICS 計畫部運作、緊急召回與護理人力極限調配</p>\n<ol>\n<li>\n<p><strong>接掌計畫部門大腦（P0、P1、P2）</strong>： -   <strong>計畫部長（P0）</strong>：由護理部部長（朱淑媛）或督導（曾瑞慧）第一時間進駐地下前進指揮所（主要設於護理部一樓會議室，若受損則移至恩慈 B1 會議室）擔任計畫部長，統籌並發布各運作週期之<strong>「事故行動計畫（IAP）」</strong>。 -   <strong>資源控管（P1）</strong>：由護理部督導長（蕭麗萍、曾瑞慧）擔任資源控管小組長，精確盤點全院護理總人力、可用空床數、隨車維生物資及呼吸器等關鍵設備。 -   <strong>狀況分析與病人追蹤（P2）</strong>：由護理部督導長（李春綢、莊詩蘋）主導，負責在混亂中嚴密追蹤病人與受傷同仁的位置、檢傷分級及動向。</p>\n</li>\n<li>\n<p><strong>啟動護理人員「急診 333」波次召回</strong>： -   若事件發生於夜間或假日，由當班值班護理長第一時間確認現場災情並暫代指揮官，立刻通報院長並下達護理人員 recall 召回令。 -   啟動「就近召回」機制：<strong>第一波</strong>召回居住 1 公里內（30 分鐘內到院）的 <strong>47 名</strong>護理人員；<strong>第二波</strong>召回 3 公里內（90 分鐘內到院）的 <strong>87 名</strong>護理同工。 -   指派急診護理長或資深護理師擔任現場<strong>「護理師組長（Nurse Leader）」</strong>，負責急診現場護理工作指揮與各治療區護理人員調派。</p>\n</li>\n<li>\n<p><strong>打破建制人力重分配</strong>： -   計畫部長（P0）與資源控管（P1）立即<strong>取消非緊急之門診、健檢中心及原鄉支援</strong>，將全數護理師抽調派往急診紅區、開刀房、ICU 或 B1 地下備援醫療照護區支援。</p>\n</li>\n</ol>\n<p>二、 奔赴廢墟現場實施「損傷控制復甦（DCR）」與傷處緊急固定</p>\n<p>在安全官（職安室主任）確認爆炸現場無二次坍塌或高壓漏電感電危險的前提下，急診與病房支援護理同工迅速攜帶急救器材配合創傷醫師趕赴現場：</p>\n<ol>\n<li>\n<p><strong>CAT戰術止血帶強力止血</strong>：針對砸傷同仁骨折大出血之致命傷情，護理師立即於傷肢上方施用 <strong>戰術止血帶（CAT）</strong> 強力止血，死守大失血之黃金 3 分鐘。</p>\n</li>\n<li>\n<p><strong>建立 IO 骨針通路與給藥</strong>：若失血性休克導致常規靜脈注射（IV）建立困難，護理師配合醫師立即建立 <strong>骨內血管通路（IO 骨針）</strong>，極速推注林格氏液並給予強效鎮痛藥劑防範休克。</p>\n</li>\n<li>\n<p><strong>嚴重骨折夾板固定</strong>：使用緊急夾板與包紮耗材對同工嚴重骨折部位進行包紮與簡易固定，防範在轉運過程中骨折斷端對深層血管與神經造成二次撕裂殺傷。</p>\n</li>\n<li>\n<p><strong>快速檢傷與掛戴傷票</strong>：執行現場檢傷，為重創大出血同仁掛上<strong>「紅色重傷票」</strong>與右手識別手圈。</p>\n</li>\n</ol>\n<p>三、 執行無電梯狀態下「無動力純人力垂直疏散」</p>\n<p>若機電棟損毀導致電梯停擺、高樓層常規開刀房與病房不安全或面臨進一步威脅時，護理部立即啟動垂直疏散：</p>\n<ol>\n<li>\n<p><strong>就地防爆掩蔽（Defend in Place）</strong>：若暫時無法下樓，ICU 及病房護理人員須在不斷開呼吸器與維生儀器的情況下，迅速將病床推離窗戶，移至電梯梯廳、無窗戶之內部走廊或浴室等<strong>「核心內筒（Core Barrel）」</strong>安全區域，並拉下所有防防爆窗簾。</p>\n</li>\n<li>\n<p><strong>無動力安全梯垂直疏散</strong>： -   護理人員利用可攜式蓄電池設備，搭配護理站配置的<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>或軟擔架。 -   嚴格依循<strong>「5人一組（4 人搬運、1 人護理照護）」</strong>的原則，以人工徒手接力方式，沿內側安全安全梯將重創同仁及病患安全轉移至最穩固的 <strong>地下一樓（B1）備援醫療空間</strong>。</p>\n</li>\n</ol>\n<p>四、 開設 B1 地下重症醫療區，無縫銜接術後生命維持</p>\n<p>配合執行部長（O0）之空間轉置，護理部人員進駐並協助開設 B1 備援功能區：</p>\n<ol>\n<li>\n<p><strong>臨時 ICU 護理進駐（約翰／馬可大樓 B1 資材組前方）</strong>： -   護理同工在此集中架設可攜式呼吸器與重症監測設備。 -   無縫接軌並死守照護由 B1 臨時開刀房（韓偉 B1 腹膜透析室）手術完成轉出之骨折大出血同仁，維持重症照護底線。</p>\n</li>\n<li>\n<p><strong>檢傷行政區與輕症安置</strong>： -   指派護理師於<strong>約翰／馬可大樓 B1 工務室前方（檢傷行政區）</strong>辦理病患登記、分流及傷票紀錄。 -   將另一名輕傷同仁及輕症民眾引流至<strong>路加大樓 B1 停車場（輕症病房）</strong>進行安置，阻絕人群擠爆重症區。</p>\n</li>\n</ol>\n<p>五、 暴力啟用護理站「當機緊急箱（Downtime Box）」，落實危險值 Read-back</p>\n<p>若爆炸引發全院市電瞬斷、公用系統癱瘓或遭到駭客病毒攻擊，導致 HIS\n醫療系統、PACS 影像或 LIS 檢驗系統大當機：</p>\n<ol>\n<li>\n<p><strong>全面回歸紙本類比手工作業</strong>： -   各護理站即刻砸破封條，取出預先印製之<strong>「當機緊急箱（Downtime Box）」</strong>。 -   停止使用電子病歷，全面改採預印之<strong>三聯式紙本病歷、手寫處方箋與手寫給藥紀錄單</strong>記錄同工與病患之照護軌跡。 -   配合行政部啟動之<strong>「徒步傳令兵（Runner）制度」</strong>，派員穿著螢光背心，以實體手寫單在指揮所、病理檢驗科、藥劑科與 B1 臨時手術室間徒步傳遞緊急開刀醫囑與藥單。</p>\n</li>\n<li>\n<p><strong>落實危險值「Read-back（口頭覆誦）」機制</strong>： -   由於斷網，4F 檢驗科、血庫與放射科改以電話、對講機或人工持單方式通報危險值（如 Hb 血紅素極低、交叉配血結果）或影像異常。 -   <strong>接聽之護理人員必須嚴格執行「Read-back（口頭覆誦雙重確認）」</strong>，向通報者大聲覆誦病患姓名、病歷號與檢驗數據，防範混亂中發生給藥或輸血錯誤。</p>\n</li>\n</ol>\n<p>六、 配合「反向檢傷」與病床量能極限控管（資源控管組 P1）</p>\n<p>為了應對源源不絕湧入的戰傷同仁及交通事故病患，護理部必須騰出急重症收治空間：</p>\n<ol>\n<li>\n<p><strong>4 小時內極速出院與下轉</strong>： -   配合醫務部之「反向檢傷特別小組」，針對留院病患進行強勢評估。 -   護理同工迅速協助評估為「生命徵象穩定，拔除靜脈點滴在 72 小時內不會危及生命」的輕症病患（可返家者、安置者）辦理出院或緊急下轉至基層長照機構。</p>\n</li>\n<li>\n<p><strong>鋪換戰備床單</strong>： -   空出的急重症床位立刻鋪換上<strong>戰備床單</strong>，強行騰出至少 <strong>30% 至 40% 的空床量能</strong>，百分之百死守戰傷救命資源。</p>\n</li>\n</ol>\n<p>七、 受創同仁之「強制輪休」與心理韌性防護（戰力保存）</p>\n<p>受砸傷、嚴重骨折大出血者為「朝夕相處的本院執勤同工」，一線醫護同仁極易因高壓搶救與面臨道德撕裂（如反向檢傷排除）而爆發集體精神崩潰或戰鬥疲勞：</p>\n<ol>\n<li>\n<p><strong>鐵血執行「12小時強制輪班機制」</strong>： -   護理部與人資室緊密協調，嚴格執行 <strong>12 小時一班的軍事化強制交接</strong>。 -   時間一到，接班人員強制接手，下班人員強制命令撤離火線，嚴禁任何英雄主義式連續超時工作導致醫療疏失。</p>\n</li>\n<li>\n<p><strong>退入地下最安全深處「同工專屬庇護站」</strong>： -   強制下班的護理人員必須撤離一線，送入位於地下結構最安全、最深層的<strong>「員工專屬庇護站」</strong>（如恩慈 2F 運動中心或安全的 B1 空間）。 -   在此絕對安靜、聽不到哀嚎與看不見鮮血的庇護所中休息、睡眠與用餐。</p>\n</li>\n<li>\n<p><strong>強制執行心理「熱除頻（Hot Debriefing）」與心理急救（PFA）</strong>： -   由精神科、臨床心理師與院牧部組成的<strong>「心理韌性特遣隊」</strong>進駐庇護站，在醫護退下火線 15 分鐘內執行 Hot Debriefing 與心理急救（PFA）。 -   引導壓抑的悲傷與恐慌宣洩，預防創傷後壓力症候群（PTSD），維持醫護戰力的長期續航。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>在喬裝成外包維修人員的特工對醫院「核心機房」進行縱火（引發電力中斷與資訊大當機），並對「頂樓水塔」投放不明化學物質（引發全院水源中斷與毒化威脅）的複合型實體維安、資安與化災（CBRN）極端危機中，<strong>護理部</strong>在\nHICS（醫院事故指揮系統）中扮演著<strong>「計畫部門決策大腦」</strong>與<strong>「第一線醫療照護與人力調度核心骨幹」</strong>的雙重戰術重任。</p>\n<p>在<strong>計畫部長 P0（護理副院長兼護理部部長 朱淑媛 / 代理人\n曾瑞慧督導）六大核心生存抗擊、水電中斷替代與照護空間重構之具體作為</strong>：</p>\n<p>一、 啟動 HICS 計畫部運作、緊急波次召回與護理人力重分配</p>\n<ol>\n<li>\n<p><strong>接掌計畫部指揮權與情資綜整（計畫部長 P0）</strong>： -   護理部部長（朱淑媛）第一時間進駐設於 <strong>恩慈大樓 B1 會議室（戰時前進指揮所）</strong> 的大腦中樞，綜觀機房縱火災損與水塔污染情資，為下一個 12 小時執行週期建立與發布 <strong>「事故行動計畫（IAP）」</strong>。</p>\n</li>\n<li>\n<p><strong>極限資源控管與缺口精算（資源控管組 P1）</strong>： -   由護理部督導長（蕭麗萍、曾瑞慧）擔任資源控管小組長，在網路大當機狀態下，以無線電或傳令兵人工回報方式，<strong>精確清點全院實際的護理人力、病床空床數及關鍵設備（如呼吸器、移動式監視器、小氧氣筒）的即時位置</strong>。</p>\n</li>\n<li>\n<p><strong>無網狀態下病人動向追蹤（狀況分析組 P2）</strong>： -   由護理部督導長（李春綢、莊詩蘋）主導狀況分析，因 HIS 系統癱瘓，立即啟動<strong>「紙本人工追蹤機制」</strong>，嚴密記錄住院、門急診病人在各病區與地下避難空間的最新動向，並與社工室及院牧部合作安撫家屬。</p>\n</li>\n<li>\n<p><strong>啟動護理人員「波次召回」與打破建制調配</strong>： -   若事件發生於夜間或假日，由當班值班護理長第一時間通報院長並下達護理人員召回令。 -   <strong>第一波</strong>召回居住 1 公里內（30 分鐘內到院）的 <strong>47 名</strong>護理人員；<strong>第二波</strong>召回 3 公里內（90 分鐘內到院）的 <strong>87 名</strong>護理同工。 -   立即<strong>取消非緊急之門診與健檢中心護理業務</strong>，將全數人力抽派往急診紅區、備援開刀房、ICU 或 B1 地下替代醫療照護區支援。</p>\n</li>\n</ol>\n<p>二、 配合「反向檢傷」與病房極速降載以擴充戰備量能</p>\n<p>為了將有限的維生水、電資源絕對保留給即將湧入的嚴重爆震與中毒傷患，護理部必須冷酷地執行降載清空：</p>\n<ol>\n<li>\n<p><strong>實施「反向檢傷（Reverse Triage）」強勢評估</strong>： -   配合由資深主治醫師組成的「反向檢傷特別小組」進入各病房與加護病房（ICU）進行評估。 -   篩選出「生命徵象穩定，拔除靜脈點滴，在 72 小時內不會危及生命」的輕症與穩定病患，<strong>於 4 小時內協助辦理極速出院（啟用戰時記帳豁免）或緊急下轉</strong>至基層長照機構。</p>\n</li>\n<li>\n<p><strong>轉換戰備病床</strong>： -   空出的床位立刻鋪換上 <strong>「戰備床單」</strong>，迅速將一般病房重構為戰傷病房，配合全院於 <strong>48 小時內將住院病人降載至 30%</strong> 的戰略總目標。</p>\n</li>\n</ol>\n<p>三、 伺服器資訊大當機下，暴力啟用「當機箱」與 Read-back 機制</p>\n<p>特工放火核心機房引發台電市電中斷、網路斷線或主機防護性安全關機，護理人員必須立刻切換至「類比無網作業」：</p>\n<ol>\n<li>\n<p><strong>暴力啟用「當機緊急箱（Downtime Box）」</strong>： -   各病房護理站立即砸破封條，取出預先整備之「當機緊急箱」。 -   全面改用<strong>三聯式紙本手工病歷、手寫處方單與紙本給藥紀錄單</strong>，以人工白板進行交班，確保無電腦狀態下的用藥安全。</p>\n</li>\n<li>\n<p><strong>配合「徒步傳令兵（Runner）機制」</strong>： -   配合後勤勤務組（L1）派出的穿著螢光背心的行政傳令兵。 -   採用嚴格的<strong>「口令覆誦」與「簽收簿」</strong>方式，徒步穿梭於 B1 備援開刀房、藥庫、檢驗科之間，手動傳遞實體醫囑、手術檢體與配血單。</p>\n</li>\n<li>\n<p><strong>強制執行危險值「Read-back」口頭覆誦</strong>： -   由於 HIS/LIS 電腦系統癱瘓，檢驗科或血庫通報之危險值（如失血同工之血紅素極低）改採無線電或電話口頭回報。 -   <strong>接聽之護理同工必須大聲唸出「病患姓名、病歷號及檢驗數據」</strong>，經雙重核對無誤後始得執行處置，杜絕混亂中的給藥與輸血錯誤。</p>\n</li>\n</ol>\n<p>四、 頂樓水塔化學投毒威脅下之「臨床用水物理隔離」與「乾照護」防禦</p>\n<p>特工投毒自來水塔將嚴重威脅透析中心、開刀房及病房安全，護理部立即啟動極限水源節流與乾衛生處置：</p>\n<ol>\n<li>\n<p><strong>全院停用自來水與常規水源</strong>： -   接獲工務室（O2）通報水源受化學投毒威脅後，護理部立即下令<strong>禁止全院病房與急診啟用任何自來水龍頭</strong>，防範化學污水流入臨床無菌程序。</p>\n</li>\n<li>\n<p><strong>全面落實「乾手部衛生」與「化學便器袋」</strong>： -   護理人員與病患全面改用酒精與免用水乾洗手液維持無菌手部衛生，杜絕院內交叉感染。 -   手動鎖死病房常規洗手間，<strong>向病患發放「化學便器袋」替代常規沖洗馬桶</strong>，死守地下水塔有限的備用淨水。</p>\n</li>\n<li>\n<p><strong>無菌沖洗液極限配給</strong>： -   病房傷口沖洗與臨床醫療處置，一律僅能使用後勤任務支援組（L2）主動盲派配發之瓶裝生理食鹽水或滅菌注射用水。</p>\n</li>\n</ol>\n<p>五、 實施空間降階防護、內部封鎖與「無動力垂直疏散」</p>\n<p>特工滲透與機房火災爆震可能危及高樓層病房安全，護理部立即執行就地避難與疏散：</p>\n<ol>\n<li>\n<p><strong>高脆弱區就地防爆掩蔽（Defend in Place）</strong>： -   當空襲或鄰近爆炸威脅加劇且暫時無法下樓時，一般病房與 ICU 護理同工須迅速將病床推離大片玻璃帷幕與窗戶，<strong>移至無窗之「核心內筒」（如電梯梯廳、內部走廊或浴室）進行掩蔽</strong>，並拉下所有防爆窗簾。</p>\n</li>\n<li>\n<p><strong>無電網狀態下「無動力純人力垂直疏散」</strong>： -   若火煙蔓延或結構受損必須進行垂直轉移，而電梯因斷電停擺時，護理部啟動無動力搬運機制。 -   護理人員利用可攜式蓄電池維生設備，搭配護理站配置的 <strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong> 或軟擔架。 -   <strong>嚴格遵循「5 人一組（4 人搬運、1 人護理照護）」原則</strong>，以人工接力方式將重症病患垂直疏散至結構最穩固的 <strong>地下一樓（B1）備援醫療空間</strong>。</p>\n</li>\n<li>\n<p><strong>配合實體門禁封鎖（Lockdown）</strong>： -   若暴徒或其餘特工企圖強闖急診搶奪藥品，護理部立即配合保安組降下防暴捲門，<strong>將醫護人員與重症病患鎖入預先規劃的「安全隔離區（Safe Haven）」</strong> 避難。 -   執行嚴格之病人家屬實聯登記或陪病證查對。</p>\n</li>\n</ol>\n<p>六、 醫護「12小時強制輪休」與心理韌性防護（戰力保存）</p>\n<p>面對熟識的工務同仁可能在壓制歹徒時受創，或是在高壓斷水斷網環境下搶救病患，護理團隊極易產生「道德撕裂」與心理耗竭：</p>\n<ol>\n<li>\n<p><strong>鐵血執行「12 小時一班」軍事化強制輪替</strong>： -   護理部主任制定鐵律，任一單位無論前線多麼急迫、人力多麼吃緊，<strong>時間一到強制交接撤離火線</strong>，命令下班人員強制下線，預防戰鬥疲勞與醫療疏失。</p>\n</li>\n<li>\n<p><strong>退入地下安全深處「員工專屬庇護站」</strong>： -   強制下班的護理師必須撤離一線，送入位於地下結構最安全的 <strong>「員工專屬庇護站」（如恩慈大樓 2 樓員工運動中心）</strong>。 -   在絕對安靜、看不見鮮血、聽不到哀鳴的環境中休息、用餐與睡眠。</p>\n</li>\n<li>\n<p><strong>實施任務後「心理急救（PFA）」與「熱除頻」</strong>： -   由精神科、臨床心理師與院牧部組成的心理韌性特遣隊全天候進駐庇護站，在護理同工退下火線 15 分鐘內，<strong>強制執行 15 至 30 分鐘之心理「熱除頻（Hot Debriefing）」與心理急救（PFA）</strong>，引導壓抑的恐慌宣洩，保存護理戰力的長期續航。</p>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨將醫療量能外移與大批病患疏散的極限挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>護理部</strong>扮演著雙重核心角色：高階主管擔任大腦中樞的<strong>「計畫部門」</strong>，而廣大的前線護理人員則是<strong>「執行部門」</strong>中執行醫療降載、病患疏散與照護的骨幹。</p>\n<p>面對此撤離與分流指令，護理部及其轄下人員的具體因應作為如下：</p>\n<p><strong>一、 擔任計畫中樞，統籌疏散量能與資源控管</strong></p>\n<ol>\n<li>\n<p><strong>計畫決策與資源監控</strong>：由護理部部長擔任計畫部長（P0），護理部督導長分別擔任資源控管小組長（P1）與狀況分析小組長（P2）。在撤離行動中，護理部高層須嚴密監控全院的病床空床數、醫護人力數、可用物資與運輸設備。</p>\n</li>\n<li>\n<p><strong>評估最大疏散能量</strong>：護理部（計畫組）須精算並評估在現有固定的工作人員情況下，醫院的「最大疏散病人數量」，交由指揮官統籌分配撤離與運輸資源。</p>\n</li>\n<li>\n<p><strong>啟動病人追蹤管理</strong>：一旦啟動疏散，護理部轄下的狀況分析小組須立即啟動「撤離時病人追蹤管理機制」，確保在混亂中正確記錄病患的去向（如提早出院、轉送他院），並確保動向資訊傳遞正確。</p>\n</li>\n</ol>\n<p><strong>二、 配合執行「反向檢傷」與病患精準分級</strong></p>\n<ol>\n<li>\n<p><strong>協助反向檢傷（Reverse\n    Triage）</strong>：護理人員須配合由資深醫師組成的「反向檢傷特別小組」，進入一般病房與加護病房，針對留院病患進行強勢評估與病情分類造冊。</p>\n</li>\n<li>\n<p><strong>病患四級分類</strong>：依據撤離需求，協助將病患精準分級為：行動方便可提早出院者（可返家）、需扶持但有家屬照顧者（安置）、一般臥床病人（一般住院）、以及依賴維生設備的重症患者（高度照護）。</p>\n</li>\n</ol>\n<p><strong>三、 執行極速病房降載與人力重分配</strong></p>\n<ol>\n<li>\n<p><strong>極速清空空間</strong>：針對評估為可提早出院或下轉的輕症及穩定病患，護理站須迅速協助辦理緊急出院手續，目標在\n    24 小時內強行騰出大連院區至少 30% 至 40%\n    的急重症病床空間，換上戰備床單以迎接戰傷洪流。</p>\n</li>\n<li>\n<p><strong>護理人力重分配</strong>：護理部主任須將被取消常規醫療的單位（如門診、健檢中心）的護理人力，迅速調派支援至急診、開刀房、或臨時設立的大量傷患處理區。</p>\n</li>\n</ol>\n<p><strong>四、 執行無動力病患疏散與搬運</strong>\n病患的實體運送行動<strong>以護理人員為主</strong>，並搭配行政與清潔人力協助。</p>\n<ol>\n<li>\n<p><strong>疏散原則與防護</strong>：疏散原則為「先平行、再垂直」。行動方便的病人於房間內疏散時，護理人員須發給被單一條予以保暖；若病人因故無法行走或昏迷，則利用被單包裹拖曳移動。</p>\n</li>\n<li>\n<p><strong>重症垂直搬運</strong>：若電梯停用且高樓層需撤離，護理人員須利用蓄電池呼吸器及「樓梯疏散滑墊（軟擔架）」，以純人力接力將插滿管路的重症病患經安全梯垂直疏散。</p>\n</li>\n<li>\n<p><strong>留置區清點與排序</strong>：將病患移至暫時留置區（或接運疏散區）後，護理人員必須立刻清查所有病人，確保其動向，並根據病人情況列出處理與轉運的先後順序。</p>\n</li>\n</ol>\n<p><strong>五、 確保護理紀錄與救急物資「隨車轉移」</strong>\n在病患後撤與轉送的過程中，護理人員是確保醫療照護不中斷的最後防線：</p>\n<ol>\n<li>\n<p><strong>醫療文件隨行</strong>：護理人員必須確認每位轉運病患皆留下轉診單，並確保病患的「病歷摘要、藥物治療紀錄及檢驗報告」確實隨著病人移出，交接給接收醫院。</p>\n</li>\n<li>\n<p><strong>戰備物資隨行</strong>：針對高度照護與一般住院的轉運病患，護理人員需確保有足夠量的急救藥物、靜脈輸液或血液製品<strong>與病人一起運送</strong>到接收醫院，避免轉送途中或剛抵達時發生醫藥耗竭的危機。</p>\n</li>\n</ol>\n<p>指揮官如何決定撤離與轉送的優先順序？</p>\n<p>在撤離行動中，聯絡官如何與外部醫院對接？</p>\n<p>若執行撤離時通訊中斷，如何追蹤病患動向？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>在屏東地區即將面臨「成為主戰區」的極端戰爭威脅下 ，指揮中心下令對本院（屏東基督教醫院大連院區）進行核心醫療能量之預防性全面撤離（對應\nHICS 第三階段：全面撤離與量能重置） 。</p>\n<p>在 HICS 應變體系中，<strong>護理部將同時肩負「計畫部門（Planning\nSection）之情報決策大腦（P0）」與「執行部門（Operations\nSection）之醫療照護核心骨幹」的雙重戰術重任</strong> 。在<strong>計畫部長 P0（護理副院長兼護理部部長 朱淑媛 / 代理人\n曾瑞慧督導）五大生存、救命、病患轉運與護理戰力保存之具體因應作為</strong>：</p>\n<p>一、 接掌計畫部大腦，精算最大撤離量能並啟動「病人動向追蹤管理」</p>\n<ol>\n<li>\n<p><strong>開設地下計畫中樞情資看板（Status Board）</strong>： -   護理部部長（計畫部長 P0）及各督導長進駐設於 <strong>恩慈大樓 B1 會議室</strong>（戰時前進指揮所）。 -   在斷網斷訊的「類比無網作業」狀態下 ，護理高層利用獨立頻道之 UHF/VHF 無線電及徒步傳令兵（Runner），橫向對接工務、資材與急診 ，即時於實體白板動態更新「在院總人數」、「已清空/可用病床數」與「護理人員報到數」。</p>\n</li>\n<li>\n<p><strong>精算最大撤離量能（狀況分析組 P2）</strong>： -   由護理部督導長（莊詩蘋）擔任狀況分析組長 ，根據當班與緊急召回之護理人力、備用可攜式維生設備（如可攜式蓄電池呼吸器、床邊生理監視器、小氧氣筒），精算在指定時限內本院能安全撤離的<strong>「最大疏散病人數量」</strong>，提報指揮官（院長）做車輛調度 。</p>\n</li>\n<li>\n<p><strong>暴力啟動「撤離時病人追蹤管理機制」</strong>： -   在系統大當機或斷網時 ，狀況分析小組（病人動向組）立即啟用人工紙本病人登記 。 -   指派專人於三大轉運區（急診室大門救護車專區、恩慈大樓旁私人車專區、門診大廳接駁中巴專區） 設立實體登錄哨，<strong>嚴密記錄每位病人的手圈編號、姓名、上了哪一輛簽證車（記錄車牌）、隨車隨行醫護姓名、以及轉送之合作醫院名稱</strong> ，確保「病患一個都不能少」，並將情資交予社工室以便安撫焦慮家屬 。</p>\n</li>\n</ol>\n<p>二、 配合執行殘酷「反向檢傷」，極速病房降載與戰傷病床轉換</p>\n<p>為了將有限的維生水、電資源與簽證救護車輛絕對留給危急患者，護理部必須協同一線醫師強制執行降載清空\n：</p>\n<ol>\n<li>\n<p><strong>配合執行「反向檢傷（Reverse Triage）」強勢評估</strong>： -   配合由資深主治醫師組成的「反向檢傷特別小組」進入病房評估 ，將住院及急診病患依據病情嚴重度進行<strong>「四級病人分類造冊」（病人分組 B）</strong> ： -   <strong>【第一類：可返家/提早出院】</strong>：生命徵象穩定，拔除靜脈點滴，在 72 小時內不會危及生命者 。護理站立即協助辦理極速出院，<strong>配合會計組啟用「戰時記帳豁免機制」</strong>，使其零元離院免排隊，於 4 小時內極速清空空間 。 -   <strong>【第二類：需扶持/安置】</strong>：無立即危險但缺乏生活自理能力者，安排下轉至安全重置區的長照機構或由家屬私人車接回 。 -   <strong>【第三類：一般住院（臥床）】</strong>：需要常規照護之臥床患者，列為中優先級轉運 。 -   <strong>【第四類：高度照護（危急）】</strong>：極度依賴維生設備、插管、使用呼吸器之重症患者，列為最高優先級 。</p>\n</li>\n<li>\n<p><strong>轉換戰備病床</strong>： -   空出的床位立刻鋪換上 <strong>「戰備床單」</strong> ，迅速將一般病房重構為戰傷臨時收治病房，配合全院於 <strong>48 小時內將住院病人降載至 30%</strong> 的戰略總目標 。</p>\n</li>\n</ol>\n<p>三、 執行無電梯電網癱瘓下之「無動力垂直疏散」與「捏球大隊」極限照護</p>\n<p>若市電因爆炸瞬斷、燃油車無法補給，且高樓層電梯因斷電停擺時 ，護理部將動用最抗干擾的物理救援方式 ：</p>\n<ol>\n<li>\n<p><strong>無電網下「無動力純人力垂直疏散」</strong>： -   護理人員利用可攜式蓄電池維生設備，搭配護理站配置的 <strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>  或軟擔架。 -   <strong>嚴格遵循「5 人一組（4 人徒步搬運擔架、1 人專業護理照護）」原則</strong> ，以人工接力垂直搬運方式，沿無窗之內側安全梯，將插滿管路的重症及臥床病患安全垂直疏散至一樓或地下車道接運區 。</p>\n</li>\n<li>\n<p><strong>氧氣耗竭下「手動甦醒球人工呼吸」肉搏戰</strong>： -   若戶外大型液氧槽遭流彈擊中破裂洩漏 ，重症病患之中央氧氣管線壓力瞬降，護理人員須於 <strong>3 分鐘內</strong> 將重症病患管線拔除，快速切換至床邊備用氧氣鋼瓶 。 -   若備用鋼瓶耗盡、電動呼吸器全面停擺 ，護理部立即指揮非臨床行政人員與輕傷家屬組成 <strong>「捏球大隊」</strong> 。每位重症病患旁配置兩人，實施每 15 分鐘換班的<strong>「手動甦醒球（Ambu bag）」人工捏球接力</strong> ，維持重症病患最後一口氣 。</p>\n</li>\n</ol>\n<p>四、 確保護理紀錄與救急物資「一對一 A-B 戰術配對」隨車轉移</p>\n<p>在病患登上簽證車隊移出前，護理同工必須死守「人藥一對一、病歷隨人走」之最高安全紅線\n：</p>\n<ol>\n<li>\n<p><strong>實施 A-B 一對一戰術配對</strong>： -   資源控管小組（P1）與醫務部配合，打破科室建制 ，將院內醫師、護理師造冊建立<strong>「隨車持續照護功能編組 A（隨車醫護）」</strong> ；狀況分析組（P2）則建立<strong>「需撤離病人分組 B」</strong> 。 -   將編組 A 與病人 B 進行<strong>「A-B 戰術配對」</strong> ，指派主治醫師及專責護理師全程隨同救護車及轉送載具，死守病患在垂直疏散及轉運途中的醫療不中斷 。</p>\n</li>\n<li>\n<p><strong>死守「醫療文件、處方與救命物資」防水綁定隨車</strong>： -   護理人員與病房書記嚴格查驗 ，確保每位準備上車轉院的病患，其原有之手寫紙本<strong>「轉診單、紙本轉院病歷摘要、手寫藥物治療紀錄與用藥處方箋」統一裝入防潮防水、防偽加密的密封病歷夾鏈袋中</strong> 。 -   <strong>強制將防水病歷袋物理綁定（如貼上或綁牢）於病患之擔架或推床旁</strong> ，並協調後勤資材組將足夠消耗 72 小時之「戰備救命藥物、無菌靜脈林格氏液」隨車運送 ，徹底防範重症或臥床病患在抵達接收醫院初期因資訊斷鏈或無藥可用而發生致命錯誤 。</p>\n</li>\n</ol>\n<p>五、 鐵血執行「12小時強制輪休」與心理除頻，死守護理隊伍戰鬥力</p>\n<p>面對即將淪為主戰區的高壓環境，護理人員目睹慘烈傷亡，且面臨反向檢傷放棄救治某些傷患的巨大「道德撕裂（Moral\nInjury）」，心理防線極易崩溃：</p>\n<ol>\n<li>\n<p><strong>鐵血執行「12 小時一班」軍事化強制輪替</strong>： -   護理部部長與人資室共同制定鐵律：任一單位無論前線多麼急迫、人力多麼吃緊，<strong>時間一到強制交接並撤離火線</strong> 。 -   嚴禁任何「英雄主義式」的連續超時工作，用鋼鐵般的排班紀律預防員工因過勞和戰鬥疲勞（Combat Fatigue）造成醫療和決策疏失 。</p>\n</li>\n<li>\n<p><strong>垂直撤離至地下安全深處「員工專屬庇護站」</strong>： -   強制交接下班的護理人員必須撤離一線，由保全護送進入位於地下結構最安全、最深層之 <strong>恩慈大樓 2 樓員工運動中心（員工專屬庇護站）</strong> 。 -   庇護站內提供熱食、高熱量物資補給、行軍床、耳塞與眼罩 ，並派駐警衛實施嚴格門禁 ，確保同工在<strong>「聽不到哀嚎聲、看不到鮮血」</strong>的絕對安全與安靜環境中進行生理修復 。</p>\n</li>\n<li>\n<p><strong>強制執行任務後「心理急救（PFA）」與心理除頻</strong>： -   由精神科醫師、臨床心理師與院牧部組成的心理韌性特遣隊全天候進駐庇護站 。 -   護理同工在退下火線的 15 分鐘內，<strong>強制執行 15 至 30 分鐘之心理「熱除頻（Hot Debriefing）」與心理急救（PFA）</strong> 。提供安全的情緒引流空間 ，協助隊員卸下沉重的道德包袱 ，確保她們在 12 小時的睡眠與修復後，能再次冷靜、堅定地重返異地醫療點的開診任務 。</p>\n</li>\n</ol>"}]}, {"role": "急診部", "entries": [{"scenario": "1-1", "title": "戰時整備量能回報", "desc": "衛生主管機關通知進入戰時醫療整備，要求限時回報床位、人力、急診、手術、加護、救護車、醫療氣體、血液及藥材量能。", "html": "<p>針對特別狀況1-1「臨災應變中心開設與運作」，急診部作為戰火與災難應變的最前線，在HICS（醫院事故指揮系統）中扮演守護生命與檢傷樞紐的關鍵角色，具體因應作為如下：</p>\n<p><strong>一、 擔任「醫療照護主管」並執行急診量能盤點</strong></p>\n<ol>\n<li>\n<p><strong>進駐HICS指揮體系</strong>：急診部主任將擔任執行部的副部長兼<strong>「醫療照護主管（O1）」</strong>，同時主責「醫療應變與傷患搶救組」。</p>\n</li>\n<li>\n<p><strong>限時盤點與回報</strong>：急診部須迅速盤點急診室現有的留觀床位、急救設備（如推床、急救車、甦醒球）與急診醫護人力，撰擬「檢傷救護流程」及「傷患後送表」，並將急診量能數據迅速提交給「統籌呈報組（危管會）」，以利彙整並於時限內向主管機關呈報。</p>\n</li>\n</ol>\n<p><strong>二、 執行「反向檢傷」與急診清空降載</strong></p>\n<ol>\n<li>\n<p><strong>實施反向檢傷（Reverse\n    Triage）</strong>：為應對戰時可能瞬間湧入的大量傷患，急診部必須打破平時的收治邏輯，快速評估急診現有病患。將生命徵象穩定者快速辦理出院或轉出至輕症區，將有限的急救資源留給最有機會存活的多數人。</p>\n</li>\n<li>\n<p><strong>騰出擴充量能</strong>：透過極速清空急診大門與搶救區，為隨時到來的戰傷病患騰出「彈性擴充量能（Surge\n    Capacity）」與戰傷病床。</p>\n</li>\n</ol>\n<p><strong>三、 整備臨時檢傷區與大量傷患動線</strong></p>\n<ol>\n<li>\n<p><strong>建立大量傷患分區</strong>：啟動大量傷患緊急醫療救護機制（代號333），急診部須規劃並建立明確的病人照護分區，包含：檢傷分類區、重傷治療區（紅區）、中傷治療區（黃區）、輕傷治療區（綠區）及留觀區，並調派各科支援醫師進駐對應區域。</p>\n</li>\n<li>\n<p><strong>整備 B1\n    備援檢傷區</strong>：因應戰時防空疏散或設施受損風險，急診部需配合演練地下備援空間轉換，確認<strong>「約翰／馬可大樓\n    B1\n    工務室前方」</strong>的檢傷行政區動線，確保傷病患登記、檢傷分類及轉送紀錄流程順暢。</p>\n</li>\n</ol>\n<p><strong>四、 確保急診核心功能持續運作與物資對接</strong></p>\n<ol>\n<li>\n<p><strong>維持核心醫療</strong>：戰時情境下，「急診與急重症收治」是全院必須優先維持的核心醫療功能（CI核心功能），急診部必須確保此服務不中斷。</p>\n</li>\n<li>\n<p><strong>戰備物資對接</strong>：急診部作為前線，須與藥劑科、資材組及血庫等後勤單位確認「推拉式物流（Push\n    Logistics）」機制。確保戰傷急救箱（含戰術止血帶、骨針、止血紗布、強效鎮痛藥劑）及大量輸血資源能不待申請（盲派）直接送達急診紅區，確保搶救前線物資充足。</p>\n</li>\n</ol>"}, {"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」之複合性危機，急診部身處衝突與搶救的最前線，必須迅速啟動大量傷患應變、極限分流與防暴機制，其具體因應作為如下：</p>\n<p><strong>一、 評估災情啟動「大量傷患機制（Code 333）」與初步清空</strong></p>\n<ol>\n<li>\n<p><strong>啟動機制</strong>：當交通事故傷患瞬間湧入，若達到「內科系同時間1-2級病人超過8人或3級病人超過20人，外科系同時間1-2級病人超過3人或3級病人超過15人」之門檻，急診部主任或當班資深醫師須立即通報院長，啟動院內大量傷患機制（代號：急診333）。</p>\n</li>\n<li>\n<p><strong>急診初步清空</strong>：急診人員須立即將原有之急診病人集中移至「留觀區」，並將其餘空床集中於檢傷入口處，以騰出搶救空間準備接收新傷患。</p>\n</li>\n<li>\n<p><strong>前線指揮與任務分配</strong>：急診部主任擔任醫療照護主管，負責主持急診運作，向各科前來支援的醫師進行「3分鐘簡報」，告知病人類型與處理原則，並調派醫師至各分區進行救護。</p>\n</li>\n</ol>\n<p><strong>二、 執行極限醫療分流與「反向檢傷（Reverse Triage）」</strong>\n面對恐慌人潮與要求住院的家屬，急診部必須打破平時收治邏輯，實施極限分流：</p>\n<ol>\n<li>\n<p><strong>戶外分流與領藥</strong>：針對因恐慌而大量湧入要求提早領取慢性病藥品的民眾，急診部應協調設立「戶外慢性病處方籤領藥區」或戶外防疫門診，將單純領藥與輕症民眾阻絕於急診搶救區外。</p>\n</li>\n<li>\n<p><strong>反向檢傷與拒絕非緊急住院</strong>：面對家屬強烈要求住院的壓力，急診部須會同資深主治醫師組成小組執行「反向檢傷」。強制評估並篩選出生命徵象穩定的現有病患，辦理緊急出院或下轉至基層診所，將寶貴的急重症病床與擴充量能（Surge\n    Capacity）絕對保留給交通事故的重傷患。</p>\n</li>\n</ol>\n<p><strong>三、 戰術空間轉換與設立大量傷患照護分區</strong></p>\n<ol>\n<li>\n<p><strong>設立標準照護分區</strong>：針對交通事故傷患，嚴格執行檢傷分類，並劃定明確的照護分區：檢傷分類區、重傷治療區（紅區）、中傷治療區（黃區）、輕傷治療區（綠區）及留觀區。</p>\n</li>\n<li>\n<p><strong>大廳空間轉換（阻絕輕傷患）</strong>：為避免急診室被恐慌的輕傷患癱瘓，急診可協同總務部門，於30分鐘內清空一樓門診大廳的候診椅，利用四色動線將大廳瞬間轉換為「大量傷患一線檢傷區」與「輕傷縫合包紮區」，有效將佔比極高的恐慌與輕傷民眾阻絕於重症急診室之外。</p>\n</li>\n</ol>\n<p><strong>四、 啟動防暴封鎖（Lockdown）與硬邊界防護</strong></p>\n<ol>\n<li>\n<p><strong>建立實體硬邊界</strong>：面對假訊息引發的恐慌與潛在的群眾暴動，急診部須會同警衛與安全管制組，封閉多餘出入口，僅保留一處作為武裝警力與高階護理師共同站哨的「單一檢傷武裝通道」，執行嚴格身分核對。</p>\n</li>\n<li>\n<p><strong>內部封鎖與防護</strong>：若暴民或不理性家屬企圖衝闖急診室搶奪藥品，急診部須配合啟動「內部封鎖（Lockdown）」。迅速降下防暴門，將急診醫護人員與重症病患鎖入預先規劃的「安全隔離區（Safe\n    Haven）」，由保全死守並等待優勢警力支援。</p>\n</li>\n</ol>\n<p><strong>五、 跨部門對接物資盲派與家屬安置</strong></p>\n<ol>\n<li>\n<p><strong>戰備物資「盲派（Push）」接收</strong>：急診前線不待開立常規領料單，直接接收由藥庫與資材室以「盲派（Push\n    Logistics）」方式推進急診紅區的「戰傷急救箱」（含止血帶、點滴、強效鎮痛藥劑），確保搶救物資隨手可得。</p>\n</li>\n<li>\n<p><strong>家屬尋人與撤離資訊詢答</strong>：急診部須將登錄完成的傷患動向與名冊，迅速交由計畫組與「社工室/院牧部」。由社工人員在專屬的家屬接待區負責家屬聯繫、安撫與撤離資訊的說明，避免家屬在急診搶救區內徘徊干擾醫療動線。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況\n2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨極高的實體安全威脅（如敵方滲透破壞）以及群眾恐慌引發的資源搶奪危機。</p>\n<p>急診部作為醫院面臨外部衝擊的「最前線」，首當其衝會遭遇避難人潮的推擠與壓力。在\nHICS（醫院事故指揮系統）架構下，急診部主任擔任執行部的「醫療照護主管（O1）」，必須在維持重症搶救與保護同仁安全之間取得平衡。其具體因應作為如下：</p>\n<p><strong>一、 配合「硬邊界」防護與設立「單一武裝檢傷通道」</strong>\n面對大量湧入欲尋求庇護或物資的社區群眾，急診部必須配合保安組將醫療資源絕對保留給真正的傷病患：</p>\n<ol>\n<li>\n<p><strong>聯合檢查站檢傷</strong>：全院實施物理封鎖後，急診車道將成為唯一的出入口。急診部的高階護理師必須與武裝警力共同於「聯合檢查站（Check-point）」站哨。</p>\n</li>\n<li>\n<p><strong>強勢阻絕非醫療需求者</strong>：在通道口執行嚴格的身分與醫療需求核對，強勢阻絕僅為了尋求庇護、索購物資或非緊急醫療需求的群眾，確保急診的核心醫療資源與空間不被癱瘓。</p>\n</li>\n</ol>\n<p><strong>二、 啟動防暴「內部封鎖（Lockdown）」與死守「安全隔離區」</strong>\n若社區群眾因恐慌，或企圖搶奪急診室的抗生素、麻醉藥品而演變為暴動衝闖，急診部須採取極限自保措施：</p>\n<ol>\n<li>\n<p><strong>極速內部封鎖</strong>：急診部須配合院方迅速啟動「內部封鎖（Lockdown）」，瞬間降下急診室防暴門並關閉全院電梯控制權。</p>\n</li>\n<li>\n<p><strong>退守安全隔離區（Safe\n    Haven）</strong>：將急診醫護人員與現場的重症病患，緊急鎖入預先規劃的「安全隔離區（Safe\n    Haven）」中。由保全持防暴盾牌結陣死守，維持急診檢傷區的秩序，並保護醫護人員與病患免受暴徒傷害，等待優勢警力支援。</p>\n</li>\n</ol>\n<p><strong>三、 維持核心搶救與執行「反向檢傷（Reverse Triage）」</strong>\n在實施硬邊界防護與封鎖的狀態下，急診部仍須確保醫療戰鬥力：</p>\n<ol>\n<li>\n<p><strong>維持重症醫療底線</strong>：確保留在院內及剛通過武裝檢傷通道的急重症傷患，能持續獲得黃金時間內的救命處置與救治。</p>\n</li>\n<li>\n<p><strong>執行極限降載與分流</strong>：若面臨大量傷患湧入，急診部須將佔比極高的恐慌輕傷患引導至大廳綠區（輕傷縫合區）或\n    B1\n    備援空間的輕症病房，並將穩定病患快速辦理出院或轉出（反向檢傷），為真正的戰傷或重症病患騰出搶救空間。</p>\n</li>\n</ol>\n<p><strong>四、 「無頭狀態」下的指揮權極限接管</strong>\n若周邊的不明人車、無人機偵蒐伴隨著敵方對聯外交通網的實體破壞（如斬首襲擾或炸毀橋樑），導致院長及副院長等核心高層被困於院外無法抵達：</p>\n<ol>\n<li>\n<p><strong>自動順位繼承</strong>：急診部主任作為當值最高層級的臨床主管，必須啟動「HICS\n    自動順位繼承機制」。</p>\n</li>\n<li>\n<p><strong>接管全院指揮權</strong>：急診部主任須在 5\n    分鐘內依法自動接管全院指揮權，穿上紅色的「Incident\n    Commander（事故指揮官）」背心，並於 10\n    分鐘內透過全院廣播發布動員令與最高戰略目標，避免群龍無首。</p>\n</li>\n</ol>\n<p><strong>五、 啟動紙本降級（Downtime）與防範滲透</strong></p>\n<ol>\n<li>\n<p><strong>紙本降級作業</strong>：若外部偵蒐伴隨網路攻擊導致系統當機，急診護理站須立即砸破「當機緊急箱（Downtime\n    Box）」封條，取出三聯式紙本病歷、紙本檢傷單與手寫處方箋，強制進入「紙本降級極限模式」以維持醫療運作。</p>\n</li>\n<li>\n<p><strong>防範偽裝滲透</strong>：急診醫護人員需提高警覺，若在混亂中發現穿著白袍的可疑偽裝人士，或不明物品，應立即通報巡邏哨盤查，防範爆裂物放置或人為破壞。</p>\n</li>\n</ol>"}, {"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況\n2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，急診部在\nHICS\n架構下擔任執行部門的<strong>「醫療照護主管（O1）」</strong>，是面對大量戰傷與災難應變的「最前線」。</p>\n<p>面對空襲疏散與地下空間啟用，急診部的具體因應作為如下：</p>\n<p><strong>一、 進駐 B1 備援空間與設立「檢傷行政區」</strong>\n配合全院的空間降階防護，急診部必須將急救與檢傷量能轉移至地下安全的替代空間：</p>\n<ol>\n<li>\n<p><strong>開設 B1 檢傷站</strong>：於<strong>約翰／馬可大樓 B1\n    工務室前方</strong>確實開設「檢傷行政區」，辦理傷病患登記、檢傷分類行政作業與傷票紀錄。</p>\n</li>\n<li>\n<p><strong>極限檢傷分流</strong>：迅速依紅、黃、綠、黑四色進行大量傷患的檢傷分流。將輕傷病患引導至<strong>路加大樓\n    B1 停車場（輕症病房）</strong>進行分流安置，以維持候診與搶救動線的秩序。</p>\n</li>\n</ol>\n<p><strong>二、 執行「極限醫療降載」與「反向檢傷（Reverse Triage）」</strong>\n戰時醫療倫理將轉變為將有限資源留給最有機會存活的多數人，急診部須主動清空量能：</p>\n<ol>\n<li>\n<p><strong>反向檢傷</strong>：由資深主治醫師強制評估急診留觀區與一般病房的現有病患，篩選出生命徵象穩定者，快速辦理提早出院或下轉至基層診所與長照機構。</p>\n</li>\n<li>\n<p><strong>擴充戰備量能</strong>：透過極速降載，強行騰出大連院區的急重症病床與「擴充量能（Surge\n    Capacity）」，準備迎接戰傷病患洪流。</p>\n</li>\n</ol>\n<p><strong>三、 維持戰傷救命處置與核心醫療不中斷</strong></p>\n<ol>\n<li>\n<p><strong>損傷控制復甦</strong>：急診部醫師與創傷團隊須在黃金時間內，於 B1\n    空間（如約翰/馬可 B1 臨時 ICU）執行戰傷救護與「損傷控制復甦（Damage\n    Control Resuscitation）」，並視情況將病患安全轉送銜接至韓偉大樓 B1\n    的臨時開刀房。</p>\n</li>\n<li>\n<p><strong>守住醫療底線</strong>：確保急診、重症等核心醫療服務在戰火威脅下仍能於地下室持續運作不中斷。</p>\n</li>\n</ol>\n<p><strong>四、 斷網斷訊下的「紙本降級（Downtime）」作業</strong>\n若空襲伴隨敵方網路攻擊、斷電或摧毀基地台，導致 HIS\n系統癱瘓，急診部將瞬間面臨資訊全黑的危機：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機箱</strong>：急診護理站須立即砸破封條，取出預先整備的<strong>「當機緊急箱（Downtime\n    Box）」</strong>。</p>\n</li>\n<li>\n<p><strong>回歸類比作業</strong>：強制進入「紙本降級模式」，使用三聯式紙本病歷、手寫處方箋與紙本檢傷單，並運用無線電或傳令兵（Runner）傳遞緊急醫囑，確保急診醫療運作不受電磁破壞干擾。</p>\n</li>\n</ol>\n<p><strong>五、 「無頭狀態」下的指揮權自動繼承</strong>\n若空襲震波或戰火導致聯外交通中斷，院長與副院長等核心高層失聯或無法視事：</p>\n<ol>\n<li>\n<p><strong>啟動順位繼承</strong>：<strong>急診部主任</strong>作為當值最高層級的臨床主管，必須在 5\n    分鐘內依法啟動「HICS 自動順位繼承機制」。</p>\n</li>\n<li>\n<p><strong>接管全院決策</strong>：急診部主任須自動接管全院指揮權，穿上紅色的指揮官（Incident\n    Commander）背心，並迅速透過廣播下達全院最高戰略目標，避免醫院陷入群龍無首而導致黃金搶救期流失。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院面臨極端的戰災大量傷患（MCI）考驗。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>急診部</strong>（協同創傷外科與重症醫學部）隸屬於執行部門的<strong>「醫療照護分支」</strong>，由急診部主任或當班資深醫師擔任<strong>「醫療照護主管（O1）」</strong>，是迎擊戰傷洪流的最前線指揮官。</p>\n<p>急診部的具體因應作為如下：</p>\n<p><strong>一、 啟動「急診 333」大量傷患應變與緊急召回</strong></p>\n<ol>\n<li>\n<p><strong>確認與通報</strong>：急診人員接獲大量傷患即將到院的通知（或現場湧入超出負荷之傷患）後，急診部主任或當班資深醫師須立即向院長（指揮官）報告，並下令啟動院內大量傷患應變機制。</p>\n</li>\n<li>\n<p><strong>廣播與召回</strong>：通知總機透過廣播系統發布<strong>「急診\n    333」</strong>代號三次，並以簡訊或群呼方式，緊急召回內、外、婦、兒科等各科值班醫師與護理人力至急診室報到支援。</p>\n</li>\n</ol>\n<p><strong>二、 執行戰術空間重構與「檢傷分類（Triage）」</strong>\n急診室必須瞬間從常規看診模式切換為戰地急救模式：</p>\n<ol>\n<li>\n<p><strong>極速清空與分區</strong>：將原有的急診病人集中移至留觀區，將空床集中於檢傷入口處。迅速建立病人照護分區，包含：<strong>檢傷分類區、重傷治療區（紅區）、中傷治療區（黃區）、輕傷治療區（綠區）及留觀區</strong>。</p>\n</li>\n<li>\n<p><strong>掛號與傷票作業</strong>：傷患到達後不需先掛號即可直接入內救治，由檢傷護理人員依傷情分流，並為病患掛上「傷票（傷病卡）」，指派輸送人員將傷患精準推送至對應的治療區。</p>\n</li>\n</ol>\n<p><strong>三、 統籌醫療搶救與人力調度</strong></p>\n<ol>\n<li>\n<p><strong>戰前簡報與派任</strong>：急診部主任（醫療照護主管）須向趕來支援的各科醫師進行\n    3 分鐘簡報，說明病人類型與處理原則，並將醫師調派至各區進行醫療救護。</p>\n</li>\n<li>\n<p><strong>損傷控制復甦</strong>：急診與創傷團隊於黃金時間內，在重傷區執行「損傷控制復甦（Damage\n    Control Resuscitation）」與救命處置。</p>\n</li>\n<li>\n<p><strong>量能評估與對外求援</strong>：急診主任須隨時整合各區傷患人數與變化。若重傷患超過\n    5 名、一般傷患超過 15\n    名，或整體超出醫院負荷，須評估並透過高屏區緊急醫療應變中心（EOC）或衛生局，請求協助將傷患轉院疏散。</p>\n</li>\n</ol>\n<p><strong>四、 啟動「反向檢傷（Reverse Triage）」與極限降載</strong> 面對急診與後續\nICU、開刀房需求的暴增，急診部須會同資深主治醫師組成特別小組，執行極限醫療降載：</p>\n<ol>\n<li>\n<p><strong>反向檢傷</strong>：進入一般病房甚至加護病房，強制評估現有病患，篩選出拔除點滴或提早出院不會立即危及生命的穩定病患。</p>\n</li>\n<li>\n<p><strong>騰出擴充量能</strong>：快速辦理出院或轉銜至基層診所及長照機構，強行騰出急重症病床與「擴充量能（Surge\n    Capacity）」，以接收由急診轉上的戰傷病患。</p>\n</li>\n</ol>\n<p><strong>五、 橫向協調後勤、輔助與安全支援</strong></p>\n<ol>\n<li>\n<p><strong>主動盲派物流（Push\n    Logistics）</strong>：急診前線極度混亂時，不等待填單申請，直接要求藥劑科與資材中心將「戰備急救箱（含止血帶、骨針、麻醉藥等）」盲派推送至急診紅區。</p>\n</li>\n<li>\n<p><strong>大量輸血協調</strong>：協調血庫提供大量急救用血；若血庫見底，隨時準備配合啟動院內「走動式血庫（Walking\n    Blood Bank）」，現場抽血即刻送入急診搶救。</p>\n</li>\n<li>\n<p><strong>安全與防暴防護</strong>：面臨大量恐慌群眾湧入，急診室極易發生推擠或搶奪醫療物資。急診須會同保安組（安全管制主管\n    O4）實施嚴格的門禁與動線管制；若遇暴徒衝闖，須迅速啟動「內部封鎖（Lockdown）」，降下防暴門，將醫護與重症病患鎖入安全區死守。</p>\n</li>\n</ol>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>在機電棟發生爆炸並導致兩名巡檢工務同仁受傷（其中一人嚴重骨折且大出血）的複合型院內災難中，<strong>急診部（Emergency\nDepartment）身處搶救的第一線</strong>。在\nHICS（醫院事故指揮系統）架構下，<strong>急診部主任將擔任執行部的「醫療照護主管（O1）」</strong>，同時主責「醫療應變與傷患搶救組」。</p>\n<p>急診部醫療與護理團隊將採取以下<strong>五大具體生存救護與空間轉置作為</strong>，以黃金時間死守同工生命：</p>\n<p>一、 啟動「院內 999 急救」與「333 大量傷患」緊急動員</p>\n<ol>\n<li>\n<p><strong>發布院內急救訊號</strong>：急診部接獲機電棟爆炸與同仁重創之通報後，立即指示總機對全院廣播<strong>「紅色訊號（火災及爆炸）」</strong>及<strong>「院內急救 999 訊號（院內急救應變）」</strong>。</p>\n</li>\n<li>\n<p><strong>評估啟動 333 大量傷患</strong>：若現場評估因爆炸引發多名工務、保全或周邊民眾波及傷亡，達到外科系同時間 1-2 級重症 &gt;3 人之動員門檻，急診當班醫師立即通報院長，啟動<strong>「急診 333 大量傷患應變機制」</strong>，迅速召回第一波與第二波醫護同工到急診檢傷處報到支援。</p>\n</li>\n<li>\n<p><strong>現場急救裝備出動</strong>：急診醫護人員迅速推派推床、擔架，並攜帶「急救藥車」、「隨車小氧氣筒」、「氧氣面罩」與「戰傷急救箱（Go-Kits）」全速奔赴爆炸現場救援。</p>\n</li>\n</ol>\n<p>二、 現場執行「損傷控制復甦（DCR）」與傷處緊急固定</p>\n<p>在安全官（職安室主任）確認爆炸現場環境安全、無二次坍塌或高壓漏電感電危害後，急診創傷小組立即在現場對兩名受傷同工進行<strong>損傷控制復甦（Damage\nControl Resuscitation）</strong>：</p>\n<ol>\n<li>\n<p><strong>大出血強力止血</strong>：針對砸傷同仁的大出血，醫護人員第一時間於傷肢上方（非患肢）施用<strong>戰術止血帶（CAT）骨內血管通路（IO 骨針）</strong>，極速補液（林格氏液）並給予強效鎮痛藥物（Ketamine）防範休克。</p>\n</li>\n<li>\n<p><strong>嚴重骨折夾板固定</strong>：使用緊急夾板與包紮耗材對嚴重骨折部位進行臨時固定，防範在無動力轉運與垂直搬運過程中，骨折斷端對深層血管與神經造成二次撕裂殺傷。</p>\n</li>\n<li>\n<p><strong>檢傷傷票掛戴</strong>：迅速進行檢傷分類，為重創大出血同仁掛上<strong>「紅色重傷票」</strong>與右手識別手圈；另一名砸傷同仁依傷情掛上「黃色中傷票」或「綠色輕傷票」。</p>\n</li>\n</ol>\n<p>三、 電梯停擺下之「無動力純人力垂直轉運」</p>\n<p>爆炸可能連帶損毀機電棟並引發全院市電瞬斷、高樓層常規開刀房與急診室電梯停擺：</p>\n<ol>\n<li>\n<p><strong>純人力安全梯搬運</strong>：急診團隊配合總務部非醫療同工（保全、行政、清潔），立即啟用護理站配備之<strong>「樓梯疏散滑墊（Evacuation Sleds）」</strong>或軟擔架。</p>\n</li>\n<li>\n<p><strong>5人一組垂直運送</strong>：嚴格依循<strong>「5 人一組（4 人搬運、1 人照護）」</strong>原則，以無動力人工接力方式，沿內側安全安全梯將重創同仁垂直轉移至地下避難空間。</p>\n</li>\n</ol>\n<p>四、 啟用 B1 備援醫療空間與五處功能區銜接</p>\n<p>若地面層常規急診室因爆炸震波、水管破裂或結構受損而無法使用，急診部（醫療照護主管\nO1）將配合執行部長，立即將醫療功能垂直轉置於地下一樓（B1）備援醫療空間：</p>\n<ol>\n<li>\n<p><strong>地下重症手術與 ICU 銜接</strong>： -   <strong>臨時開刀房（韓偉大樓 B1 腹膜透析室）</strong>：將大出血且骨折的同仁極速送入臨時開刀房，由召回之骨科、外科與麻醉團隊進行緊急損傷控制手術（DCS）。 -   <strong>恢復室（韓偉大樓 B1 環保室）</strong>：手術完成後，於恢復室進行術後密切觀察與恢復照護。 -   <strong>臨時 ICU 病房（約翰／馬可大樓 B1 資材組前方）</strong>：穩定後轉入臨時 ICU，由醫護人員配合呼吸器與可攜式監測設備，死守維生生命支持。</p>\n</li>\n<li>\n<p><strong>輕中症安置</strong>：將另一名輕中傷工務同仁送至<strong>約翰／馬可大樓 B1 工務室前方之「檢傷行政區」</strong>辦理手續，或引導至<strong>路加大樓 B1 停車場之「輕症病房」</strong>進行後續處置與分流安置。</p>\n</li>\n</ol>\n<p>五、 通訊與系統癱瘓下之「紙本降級（Downtime）」與 Read-back 機制</p>\n<p>爆炸若伴隨電網或伺服器受損，導致院內掛號、HIS、PACS 影像或 LIS\n檢驗系統延遲與癱瘓：</p>\n<ol>\n<li>\n<p><strong>暴力啟用當機箱</strong>：急診護理站與醫師立即砸破封條，取出預先整備之<strong>「當機緊急箱（Downtime Box）」</strong>。</p>\n</li>\n<li>\n<p><strong>全面回歸手工作業</strong>：全面改用<strong>三聯式紙本病歷、手寫處方單、手寫檢驗單與紙本檢傷單</strong>進行登記與處置，耗用之麻醉與止血藥物確實手工記錄，交由批掛組以「就醫費用欠繳單」形式事後入帳補單。</p>\n</li>\n<li>\n<p><strong>檢驗危險值 Read-back 口頭覆誦</strong>：由於斷網，急診與檢驗科（4F）、血庫之間無法傳輸電子數據。急診人員在接獲檢驗科以電話或對講機口頭通報重創同仁的危險值（如 Hb 血紅素極低、交叉配血結果）時，<strong>接聽之急診護理人員必須嚴格執行「Read-back（口頭覆誦雙重確認）」機制</strong>，向通報者大聲覆誦病患姓名、病歷號與數據，確保輸血與緊急處置安全無誤。</p>\n</li>\n<li>\n<p><strong>接收「盲派」救命藥衛材</strong>：急診不需進行電腦填單申請，第一時間直接接收由地下藥庫（馬太 B1）與資材組以「推拉式（Push）」主動推入 B1 臨時開刀房與急診搶救區的「戰傷急救箱」（含戰術止血帶、骨針、血液製品、生理食鹽水）。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>當本院大連院區面臨「兩名喬裝成外包人員的特工企圖在核心機房縱火、並於頂樓自來水塔投放不明化學物質」的實體破壞、資安癱瘓與生化污染（CBRN）複合型維安危機時，醫院將立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>。</p>\n<p>在 HICS\n體系下，<strong>急診部</strong>身處衝突與搶救的最前線。<strong>急診部主任將擔任執行部（Operations\nSection）的副部長兼「醫療照護主管（O1）」</strong>，同時主責「醫療應變與傷患搶救組」。針對此極端危機，急診部將協同安全管制組（保安組\nO4）、危害控制組（感管科 O3）及設施運作組（工務室\nO2），採取以下<strong>六大核心生存抗擊與應變作為</strong>，死守醫療防線：</p>\n<p>一、 配合「硬邊界防護」，守護「單一武裝檢傷通道」</p>\n<p>由於特工採取「喬裝外包維修人員」之滲透手段，代表院區隨時面臨第二波襲擊或恐慌民眾衝闖的維安風險：</p>\n<ol>\n<li>\n<p><strong>實施 ED 門禁升級與鎖定</strong>：急診部配合保安組（O4）實施全院「內部封鎖（Lockdown）」，迅速封閉大連院區 80% 的出入口與側門。全院僅保留「急診車道」作為唯一出入口。</p>\n</li>\n<li>\n<p><strong>派員把守聯合檢查站</strong>：急診部指派<strong>高階護理師，與前來協防的武裝警力及保全共同於聯合檢查站（Check-point）站哨</strong>。醫護人員在通道口執行嚴格的醫療需求核對，強勢阻絕僅為了尋求庇護、索購物資或非緊急醫療需求的群眾，確保急診核心空間不被癱瘓。</p>\n</li>\n<li>\n<p><strong>嚴格限制陪病人數</strong>：保安與急診人員共同執行嚴格的人員識別，<strong>限制每床病人陪同家屬以 2 人為限</strong>，將無關人員隔離於搶救區之外，保障前線安全。</p>\n</li>\n</ol>\n<p>二、 啟動「CBRN 毒化災應變」，開設「戶外臨時除污站」</p>\n<p>特工在頂樓水塔投放不明化學物質，屬於核生化（CBRN）特殊災害範疇，全院發布<strong>「黃色訊號（化災）」</strong>：</p>\n<ol>\n<li>\n<p><strong>架設戶外除污區</strong>：急診部配合危害控制主管（O3/感管科主任），立即於急診室外（如救護車停車區或急診室外左側空間）架設<strong>「臨時除污設備與除汙帳篷」</strong>。</p>\n</li>\n<li>\n<p><strong>穿著防護裝備（PPE）</strong>：急診第一線救護人員與看診醫師迅速穿戴指定等級之個人防護裝備（PPE）進入除污與搶救狀態。</p>\n</li>\n<li>\n<p><strong>執行戰地除污與隔離</strong>：若巡檢同工、保全或病患接觸到不明化學物質，急診醫護須引導其至除污區進行<strong>徹底的溫水沖洗、受污染衣物剝除、廢水收集隔離，隨後才能將傷患送入急診淨區</strong>，防範化學毒物在急診室密閉空間內發生交叉二次污染。</p>\n</li>\n</ol>\n<p>三、 自來水投毒之「臨床用水物理隔離」與「乾衛生」防禦</p>\n<ol>\n<li>\n<p><strong>物理隔離與停用常規水源</strong>：接獲頂樓水塔受投毒威脅通知後，急診部必須<strong>立即停止使用急診室內的所有水龍頭與自來水管線</strong>，防止可能遭受污染的毒水流入透析、洗腎、沖洗及傷口處置等高危臨床程序。</p>\n</li>\n<li>\n<p><strong>全面啟用「乾手部衛生」</strong>：急診醫護人員全面改用酒精、乾洗手液維持手部衛生與無菌操作。</p>\n</li>\n<li>\n<p><strong>調配備用無菌生理食鹽水</strong>：傷口沖洗一律改採瓶裝生理食鹽水或後勤部（L2）主動盲派送達之無菌清洗液，死守臨床用水安全。</p>\n</li>\n</ol>\n<p>四、 伺服器機房燃燒當機，暴力啟用「當機緊急箱（Downtime Box）」</p>\n<p>若核心機房因燃燒劑起火、電力異常或防護性關機，導致掛號、批價、藥局、檢驗及影像系統全面大當機，急診部立即切換為最抗干擾的「類比無網作業」：</p>\n<ol>\n<li>\n<p><strong>砸破封條啟用 Downtime Box</strong>：急診護理站即刻砸破封條，取出預先印製的<strong>「當機緊急箱（Downtime Box）」</strong>，無縫改採紙本病歷、手寫處方箋、紙本檢傷單與手寫檢驗單。</p>\n</li>\n<li>\n<p><strong>落實危險值「Read-back（口頭覆誦）」機制</strong>：在系統全黑、LIS 無法傳輸數據時，急診護理人員接獲 4F 檢驗科以電話或無線電口頭回報危險值（如 Hb 血紅素、交叉配血）時，<strong>必須大聲向通報者「Read-back（逐字口頭覆誦雙重確認）」病患姓名、病歷號與檢驗數值</strong>，確保混亂中給藥與用血安全。</p>\n</li>\n<li>\n<p><strong>配合「徒步傳令兵（Runner）」</strong>：在通訊延遲或中斷時，配合行政部派出的傳令兵，徒手簽收並遞送紙本處方與檢體，確保生命通道不斷鏈。</p>\n</li>\n</ol>\n<p>五、 高樓層威脅蔓延，啟動「地下一樓（B1）備援空間」轉換</p>\n<p>若地面層常規急診室因大火蔓延、有倒塌之虞，或面臨進一步空襲轟炸，急診部必須配合執行部長（O0）進行戰術空間轉置：</p>\n<ol>\n<li>\n<p><strong>無動力垂直疏散</strong>：利用蓄電池設備及「樓梯疏散滑墊（Evacuation Sleds）」或軟擔架，以純人力接力方式（<strong>5人一組：4人搬運、1人護理照護</strong>），沿內側安全安全梯將急診重症、插管病患安全垂直疏散至 B1。</p>\n</li>\n<li>\n<p><strong>啟用 B1 備援五處功能區</strong>： -   <strong>檢傷行政區（約翰／馬可大樓 B1 工務室前方）</strong>：急診部在此重新開設檢傷站，辦理傷病患登記、四色檢傷分類及傷票/轉送紀錄。 -   將需要緊急損傷控制手術（DCS）之傷患，極速銜接轉送至 <strong>韓偉大樓 B1 腹膜透析室（臨時開刀房）</strong>；重症轉入 <strong>約翰／馬可大樓 B1 資材組前方（臨時 ICU）</strong>。 -   將輕症傷患分流安置於 <strong>路加大樓 B1 停車場（輕症病房）</strong>，徹底實施人流物理阻絕，防範輕症人潮擠爆重症搶救紅區。</p>\n</li>\n</ol>\n<p>六、 實施急診「反向檢傷（Reverse Triage）」，極速清空騰出擴充量能</p>\n<ol>\n<li>\n<p><strong>極限清空與醫療降載</strong>：為了迎擊因縱火、大火或安防對抗可能衍生的大量戰傷與傷患，急診創傷醫師立即執行強勢評估的「反向檢傷」。</p>\n</li>\n<li>\n<p><strong>4小時極速出院與下轉</strong>：將原急診留觀區內生命徵象穩定、拔除點滴改口服藥的病患快速辦理出院，或轉銜至基層診所、長照機構，<strong>極速騰出急診搶救床位與彈性擴充量能（Surge Capacity）</strong>。</p>\n</li>\n<li>\n<p><strong>接收後勤戰備物資「盲派（Push）」</strong>：不等待常規 HIS 電腦系統填單，直接接收由藥劑科與資材組以「推拉式物流（Push Logistics）」主動推入 B1 臨時急診區的「戰傷急救箱 (Trauma Go-Kits / Go-Kits)」（內含戰術止血帶、骨針、血液製品），保障前線急救彈藥源源不斷。</p>\n</li>\n</ol>\n<p>🚨\n面對此極端「特工物理滲透、機房縱火、頂樓自來水投毒（CBRN）」複合危機，我是否需要為急診部與創傷、護理團隊，將這套在斷水斷網當機下的「戶外化災除污、單一武裝檢傷篩查、與\nB1 空間轉置手工作業」程序，整合製成一份放置於急診檢傷台當機箱中的 A4\n實體 <strong>「急診部：CBRN 化災除污與 Downtime\n實兵操作查檢卡（SOP）」</strong>，方便同仁在實兵演練時手動勾稽、確實執行？</p>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨將醫療量能外移、重症病患後撤以及極速降載的重大挑戰。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>急診部</strong>是全院檢傷分類、重症維生與車輛轉運的「最前線樞紐」。急診部主任擔任執行部門的<strong>「醫療照護主管（O1）」</strong>，負責統籌傷患的檢傷、分流、救護與後送轉院事宜。</p>\n<p>面對此撤離與分流指令，急診部的具體因應作為如下：</p>\n<p><strong>一、 擔任「醫療照護主管（O1）」，統籌檢傷分類與醫療分區</strong></p>\n<ol>\n<li>\n<p><strong>最高檢傷指揮</strong>：由急診部主任（或當班資深醫師）擔任醫療照護主管，負責排定病人治療與撤離的優先順序，確保混亂中病患有明確的動向。</p>\n</li>\n<li>\n<p><strong>配合反向檢傷（Reverse\n    Triage）與極速降載</strong>：面對大量病患疏散需求，急診部須配合將留觀區與急診現有病患進行強勢評估。將穩定輕症病患快速辦理出院或轉出，極速清空急診空間，騰出作為後續重症病患等待後撤轉運的「彈性擴充量能（Surge\n    Beds）」集結區。</p>\n</li>\n</ol>\n<p><strong>二、 設立與管理「救護車接運疏散區」</strong>\n在病患實體撤離行動中，急診室扮演著運輸動線的核心咽喉：</p>\n<ol>\n<li>\n<p><strong>建立接運樞紐</strong>：依據疏散計畫，除特殊考量外，<strong>「醫院急診室
