病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨大量病患的轉出與重置，確保「醫療資訊與病歷紀錄」的正確傳遞是病患安全接軌的命脈。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>病歷室</strong>與<strong>資訊室</strong>分別支援「計畫部門」與「執行部門」，肩負著病患動向追蹤、醫療文件隨行保全與資訊系統維持的核心任務。</p>\n<p>這兩個單位的具體因應作為如下：</p>\n<p><strong>一、 病歷室（支援計畫部門：文件紀錄小組 P3 / 狀況分析小組 P2）</strong></p>\n<p>面對病患的極速出院與大量轉院，病歷室必須確保醫療紀錄不中斷，其具體作為包含：</p>\n<ol>\n<li>\n<p><strong>執行病人動向登錄與追蹤</strong>：由病歷室依醫療科主任（或指揮中心）指示，負責大規模撤離下的病人動向登錄作業，確保病患不管是提早返家、下轉安置或轉送聯防醫院，皆能確認其確實完成重置，並與社工室及家屬保持資訊同步。</p>\n</li>\n<li>\n<p><strong>確保醫療紀錄與病歷「隨車轉移」</strong>：在病患離院重置時，病歷室（或由各單位書記）須統籌準備病人原先的相關醫療文件，包含病歷摘要、轉診單、藥物治療紀錄及檢驗報告，並確保這些資料確實與轉運的病人搭配，隨車移出交接給接收醫院，避免接收端發生醫療資訊斷鏈。</p>\n</li>\n<li>\n<p><strong>建立轉運文件與歷史紀錄保全</strong>：病歷室須確保每個轉運病患皆留下完整的轉出紀錄，包含：病人姓名、病歷號碼、接收醫院名稱、運送車輛資料，以及<strong>「病歷是否隨同運送的紀錄」</strong>。同時，須妥善保存留院病人的病歷及所有事件過程文件，確保其正確性與完整性，作為日後復原分析與法律備查的參考。</p>\n</li>\n</ol>\n<p><strong>二、 資訊室（支援執行部門：機構運作主管 O5）</strong></p>\n<p>資訊室主任在 HICS\n中擔任<strong>「機構運作主管（O5）」</strong>，在撤離行動中必須維持醫院的「數位神經系統」運作，其具體作為包含：</p>\n<ol>\n<li>\n<p><strong>維持核心系統不中斷以支援極速降載</strong>：在 4\n    小時內要極速清空並辦理大量病患出院、轉院，將產生極大的系統與列印負荷（如列印轉診單、病歷摘要與結帳單）。資訊室須全力維持\n    HIS（醫療資訊系統）、PACS（影像系統）及網路掛號批價系統的穩定運作，減少必要服務的中斷。</p>\n</li>\n<li>\n<p><strong>協調資訊與通訊設備的轉移</strong>：若醫院本體面臨重大危險需要將核心醫療服務外移重置，資訊室須協助評估並處理有關資訊主機、通訊設備的拆裝、遷移與重新架設申請。</p>\n</li>\n<li>\n<p><strong>確保資料異地備援與資安防護</strong>：與狀況分析組（計畫部門）合作，確保在撤離的混亂中，所有現有的重要醫療數據與系統資料都有安全備份與適當的異地保存，維護資訊安全（機密性、完整性、可用性）。</p>\n</li>\n<li>\n<p><strong>防範斷網並準備「紙本降級（Downtime）作業」</strong>：若撤離行動伴隨周邊基礎設施（如電信基地台）損毀或遭逢資安攻擊導致斷網，資訊室必須立即宣告啟動「當機應變措施」。通知各病房與急診單位砸破「當機緊急箱（Downtime\n    Box）」，全面改採人工紙本病歷、手寫處方箋與離線列印名單，確保在無電腦系統輔助下，病患的撤離分流與醫療交接依然能順利推進。</p>\n</li>\n</ol>\n<p>如何判定病人可返家或需高度照護？</p>\n<p>撤離時如何確保病歷與用藥紀錄隨行？</p>\n<p>急診室若同時湧入大量傷患該如何分流？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當屏東基督教醫院（屏基）大連院區接獲軍方預警，確認醫院所在區域即將淪為「主戰區」\n，且指揮中心下達啟動 <strong>HICS\n第三階段「全面撤離與量能重置」</strong> 之最高預防性全面撤離命令時 ：</p>\n<p>本院 <strong>病歷室</strong> 與 <strong>資訊室</strong> 將分別作為計畫部門與執行部門的關鍵支柱\n，共同化身為這場大規模撤離戰役中的<strong>「數位神經系統」與「資訊安全盾牌」</strong>。習慣電子化作業的現代醫院在面臨戰火迫近、伴隨斷水斷電斷網等「極限孤島情境」時\n，這兩個單位的無縫協同，是確保數百名病患在後撤轉運途中「資訊不斷鏈、生命不失聯」的唯一命脈\n。</p>\n<p>在 HICS\n應變體系下，病歷室與資訊室將採取以下<strong>最抗干擾、高強度的類比與數位雙軌因應作為</strong>：</p>\n<p>一、 資訊室：接掌「機構運作主管 O5」與「資通簡報組」之極限防禦與設備轉置</p>\n<p>資訊室主任在 HICS\n中擔任<strong>機構運作主管（O5）</strong>，並主導演習編組中的<strong>資通簡報組</strong> 。資訊室必須在戰火摧毀本院機房前，完成「大腦資料轉移、反資敵銷毀、先遣通訊建置及\nDowntime 暴力降級」等鋼鐵防禦：</p>\n<ol>\n<li>\n<p><strong>實施極限資料備份與冷酷的「反資敵（Denial of Assets）」物理銷毀</strong> -   <strong>異地即時備份</strong>：資訊室網路組與系統組人員，必須在接獲撤離令 30 分鐘內，將全院最新的核心 HIS（醫療資訊）、EMR（電子病歷）、PACS（醫療影像）及 LIS（檢驗）等核心資料庫 ，進行最後一次增量備份，並以加密數位管道同步傳輸至設置於<strong>「瑞光院區 7F」之異地備援電腦機房</strong>，確保病患病史安全存檔不遺失 。 -   <strong>反資敵（Denial of Assets）實體銷毀</strong>：針對因體積龐大（如 IBM 核心主機、大容量儲存陣列）而物理上絕對無法在數小時內拆卸運走的伺服器 。在主力撤離前 1 小時，資訊室工程師會同安全官（職安室主任） ，強制切斷機房市電與 UPS 不斷電系統 ，<strong>對磁碟陣列實施高強度實體砸毀、強磁去磁、或關鍵晶片物理拆卸銷毀程序</strong> ，誓死防止國家級醫療核心科技與數十萬屏東市民的隱私個資落入敵特或第五縱隊手中 。</p>\n</li>\n<li>\n<p><strong>指派「異地重置先遣資通小組」奔赴接收端，架設臨時醫療系統</strong> -   在主力撤離車隊出發前 1 小時，指派 2 名資訊工程師攜帶行動基地台、手提電腦、便攜式收據印表機及低軌衛星接收器 ，編入<strong>「先遣裝設小組」</strong>奔赴接收聯防責任醫院（如協定支援之部立屏東醫院、寶建、安泰或屏東榮總） 。 -   先遣工程師抵達接收端後，立即勘查物理空間，<strong>架設微弱但關鍵的外部連線（低軌衛星 OneWeb/Starlink 設備）</strong> ，打通接收端與瑞光 7F 備援資料庫的專屬加密通道（VPN） ，確保大連院區撤離團隊抵達重置點後 <strong>10 分鐘內即可「即刻開診、無縫掛號與取藥」</strong> 。</p>\n</li>\n<li>\n<p><strong>無預警資安癱瘓與市電瞬斷下之「紙本降級（Downtime）」宣告</strong> -   若空襲伴隨敵方 APT 駭客攻擊、電磁脈衝（EMP）或爆炸摧毀常規電網 ，資訊室主任必須果斷向指揮官報告，<strong>暴力啟動「電腦當機應變機制」並宣告全院進入「紙本降級極限模式」</strong> 。 -   督導前線各病房、急診及地下五大備援功能區，<strong>砸破封條取出預先印製的「當機緊急箱（Downtime Box）」</strong> ，全面改採人工紙本作業，絕不容許電腦系統異常卡關耽誤病患撤離時效 。</p>\n</li>\n<li>\n<p><strong>支持極速降載：維護 HIS 系統高負載並配合「特別帳務處理」</strong> -   在 4 小時極速清空 30% 至 40% 輕症病患的過程中，HIS 系統將面臨瞬間爆量的出院列印與結帳請求 。資訊室須實施頻寬與算力優先分配，確保掛號批價系統穩定 。 -   若系統故障，配合會計小組 F4 執行<strong>「戰時記帳豁免機制」</strong>，暫停電子結帳，改由人工加蓋「戰時記帳豁免（事後收費）」戳記，令病患極速離院，徹底排除行政瓶頸 。</p>\n</li>\n</ol>\n<p>二、 病歷室：支援計畫部門（文件紀錄 P3 / 狀況分析\nP2）之紙本病歷保全與動向精準登記</p>\n<p>病歷室同工在撤離演習編組中，主要支援計畫部門，扮演<strong>「文件紀錄小組\nP3」</strong>與<strong>「狀況分析小組病人動向組 P2」</strong>的核心輔助角色 。病歷同工必須以極致的類比與手工方式，確保每一位轉運病患的「病歷隨人走、數據不遺失」：</p>\n<ol>\n<li>\n<p><strong>誓死執行「病歷與藥物防水綁定隨車」之一對一 A-B 戰術配對（P3 文件紀錄）</strong> -   <strong>醫療資訊隨行準備</strong>：在高度照護重症病患（ Class 4）與一般住院臥床病患（ Class 3）移出與送上救護車前 ，病房書記與病歷室人員必須逐一核對病患資料 ，將病患原有的<strong>手寫紙本「轉診單、紙本轉院病歷摘要、手寫藥物治療紀錄與用藥處方箋」打包</strong> 。 -   <strong>防水物理綁定</strong>：上述實體病歷必須<strong>裝入「防潮、防偽加密封條之防水病歷夾鏈袋」中，強制物理綁定（如用束帶或防水膠帶貼牢）於病患之擔架或推床旁</strong>，實施「人藥病歷隨行一對一配對」 。 -   <strong>落實交接登記</strong>：病歷人員嚴格查驗，於登車哨口<strong>逐一確認並記錄「病歷是否隨同運送的紀錄」</strong> ，嚴防病患抵達部屏、寶建或安泰醫院時因資訊斷鏈造成致命的給藥或手術錯誤 。</p>\n</li>\n<li>\n<p><strong>三大接運疏散區之手動「病人動向登記」（P2 狀況分析）</strong> -   大批病患撤離時，常規的電子看板與 RFID 追蹤可能因停電停網而癱瘓 。病歷人員須打破常規，<strong>親自投入一線，於院區指定的三大接運區設立實體「登錄哨」</strong> ： -   <strong>【急診室大門出口（救護車專區）】</strong>：專供第四類高度照護及第三類臥床病患垂直轉移上車 。 -   <strong>【恩慈大樓旁車道（私人車專區）】</strong>：專供第二類需扶持安置病患裝載 。 -   <strong>【醫院門診大廳大門出口（接駁車專區）】</strong>：專供第一類輕症病患搭乘中巴接駁 。 -   病歷同工使用實體紙本登記冊，<strong>逐一登記每位病人的「手圈編號、姓名、上了哪一輛簽證車（記錄車牌）、隨車隨行醫護姓名、以及轉送之合作醫院名稱」</strong> ，確保「在撤離中無一人遺漏或私自離隊」 ，並每兩小時向地下指揮所及社工室更新數據，以便安撫焦慮家屬 。</p>\n</li>\n<li>\n<p><strong>大連院區歷史病歷庫之「物理物理保全與防禦」</strong> -   病歷室主任須下令對位於大連院區地表或地下之實體紙本病歷檔案庫，實施<strong>物理防禦封鎖</strong>，拉下防火防暴門，手動物理上鎖 。 -   將最新、高度機密或特定身分之敏感實體病歷，轉移至結構最安全、最深層之防空避難紅區 ；無法帶走的歷史檔案鎖固於防潮防爆櫃中，嚴防在戰火混亂中遭遇雨水滲漏、破片摧毀、甚至被有心人士趁亂竊取或篡改個資 。</p>\n</li>\n<li>\n<p><strong>規劃災後重建之「當機資料人工補登回補（Data Backfilling）」計畫</strong> -   病歷室同工必須妥善收集並保存撤離與當機期間，前線產出的所有紙本 Downtime 病歷、手寫檢驗單、手工處方箋及轉診簽收簿 。 -   病歷室負責<strong>擬定「資料人工回補標準作業流程（Data Backfilling SOP）」</strong> ：一旦未來主戰區威脅解除、本院 HIS 系統安全重啟、或在異地重置醫療點網路開機後，病歷室須與批掛掛號、資材及藥劑科全力配合，<strong>將所有手工處方、用藥及計價耗材實施電腦補登回補</strong> ，確保本院病患醫療歷史之連續性、財務計帳與健保申報的法效正確性 。</p>\n</li>\n</ol>\n<p>三、 資訊室與病歷室「紙本降級與資通備援」跨部門聯合作戰矩陣</p>\n<p>在預防性全面撤離過程中，兩個科室須保持極限橫向協同，確保「在無電、無網路、無市話」的黑堡孤島狀態下，資訊流通依然能保持暢通\n： --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- <strong>二、 執行人力盤點與召回調度（對接「人力」量能回報）</strong></p>\n<ol>\n<li>\n<p><strong>盤點與動員人力</strong>：由管理部轄下的人資室擔任<strong>「人事小組（F1）」</strong>，負責盤點全院現有員工狀況，並協調人員召回機制、輪替班表，以及志工與支援人力的集合調度。</p>\n</li>\n<li>\n<p><strong>提交人力數據</strong>：人事小組須將盤點完畢的精確人力數據，迅速提交給計畫部（資源控管組）與統籌呈報組（危管會），以利醫院於時限內向主管機關完成「人力量能」的初報與續報。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與供應商聯繫（對接「藥材、氣體」量能整備）</strong></p>\n<ol>\n<li>\n<p><strong>執行緊急採購</strong>：由轄下的採購室擔任<strong>「採購小組（F2）」</strong>，負責辦理戰時應變所需的緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>協調外部供應鏈</strong>：針對主管機關要求回報的醫療氣體、藥品與衛材量能，採購小組必須立即聯繫現有供應商與<strong>替代供應商</strong>，確認戰備物資的供貨穩定度及緊急調用機制，協助後勤部彌補物資缺口。</p>\n</li>\n</ol>\n<p><strong>四、 啟動緊急經費調度與法務支援</strong></p>\n<ol>\n<li>\n<p><strong>經費與加班結算</strong>：由轄下的會計室擔任<strong>「會計小組（F4）」</strong>，辦理緊急經費調度、各項應變費用支付，並確實記錄員工的加班給與及財務狀況。</p>\n</li>\n<li>\n<p><strong>法務與保密工作</strong>：由轄下的職安室擔任<strong>「法律訴求小組（F3）」</strong>，協助處理災時可能產生的法務問題、損害求償、申訴，並確保演習與戰時機密資料的保密工作。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息及掛號、批價、藥局、檢驗或影像系統出現延遲（疑似遭受資安攻擊大當機）」，<strong>管理部</strong>在\nHICS（醫院事故指揮系統）架構下扮演著後勤行政與資金的堅實後盾。由管理部部長擔任<strong>「行政／財務部長（F0）」</strong>，負責全面監督財務管理及資金進出業務，並統籌緊急應變所需之預算、行政、人事、採購、法律及紀錄等工作。</p>\n<p>面對此複合型危機，管理部及其統籌之轄下單位的具體因應作為如下：</p>\n<p><strong>一、 統籌行政與財務指揮（管理部部長）</strong></p>\n<ol>\n<li>\n<p><strong>接掌指揮權</strong>：管理部部長擔任行政/財務部長，參與應變行動計畫的準備與會議，確保所有行動計畫在財務預算範圍內，並訂立相關合約或協定。</p>\n</li>\n<li>\n<p><strong>緊急經費支持</strong>：在批價與帳務系統因大當機而癱瘓的狀況下，提供緊急災變必要之經費，並定時（每八小時）確認財務支出狀況，確保前線搶修與備援運作的資金不斷鏈。</p>\n</li>\n</ol>\n<p><strong>二、 緊急人力召回與輪替（人事小組／人資室）</strong></p>\n<ol>\n<li>\n<p><strong>支援紙本降級作業</strong>：因應各項資訊系統延遲，醫療前線必須全面啟動「紙本降級（Downtime）」與離線人工作業。人事小組須立即協調人員召回，並招募員工及志工至人力集合點報到。</p>\n</li>\n<li>\n<p><strong>儲備與強制輪替</strong>：將召回之人力交由待命區管理者運用，儲備足夠的醫療與非醫療人員（例如支援人工掛號或擔任傳遞紙本醫囑的「傳令兵」），並安排必要的人員輪替，避免前線同仁因高壓人工作業而過勞。</p>\n</li>\n</ol>\n<p><strong>三、 啟動緊急採購與替代方案（採購小組／採購室）</strong></p>\n<ol>\n<li>\n<p><strong>突破電子採購癱瘓</strong>：面對系統當機無法使用常規電子系統訂貨的困境，採購小組須立即辦理各項應變所需之緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>聯繫替代供應商</strong>：針對假訊息可能引發的民眾搶藥潮與物資消耗，迅速聯繫替代供應商，確保醫院的關鍵藥品、衛材與紙本表單等資源能維持穩定補給。</p>\n</li>\n</ol>\n<p><strong>四、 醫療爭議處理與個資保密（法律訴求小組／職安室）</strong></p>\n<ol>\n<li>\n<p><strong>處理申訴與求償</strong>：面對系統延遲造成的病患久候，以及假訊息（如拒收病人）引發的家屬不滿，法律訴求小組須協助處理法務問題、病人申訴，並接受與調查所有因事件引發的損害求償申請。</p>\n</li>\n<li>\n<p><strong>資安與機密保護</strong>：在疑似遭受資安攻擊，且全院大量啟用紙本病歷與手工檢驗單的混亂期間，必須協助確保病人個資及機密資料的保密工作，嚴防資料外洩。</p>\n</li>\n</ol>\n<p><strong>五、 經費調度與出勤紀錄（會計小組／會計室）</strong></p>\n<ol>\n<li>\n<p><strong>維持資金運作</strong>：辦理災變期間緊急必要之經費調度與各項應變費用之支付，確保醫院在帳務系統異常時仍能維持採購與營運。</p>\n</li>\n<li>\n<p><strong>人事成本與加班紀錄</strong>：確實記錄災變應變期間，所有被召回與留守支援「紙本降級作業」員工的出勤、差假與加班給與，並維護財務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對特別狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院的「數位神經系統」遭到全面癱瘓，面臨嚴重的資安威脅與運作危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>管理部</strong>扮演著支撐全院切換為「紙本降級（Downtime）」人工作業、應對勒索威脅以及安撫病患衍生糾紛的關鍵行政後盾。管理部部長將擔任<strong>「行政/財務部長（F0）」</strong>，統籌轄下的各個行政與財務小組。</p>\n<p>管理部的具體因應作為如下：</p>\n<p><strong>一、 統籌行政與財務指揮，堅守拒絕勒索底線（管理部部長 / F0）</strong></p>\n<ol>\n<li>\n<p><strong>接掌指揮與資金調度</strong>：管理部部長負責全面監督災變期間的財務管理及資金進出業務，統籌緊急應變所需之預算、行政、採購、法律及紀錄等工作。</p>\n</li>\n<li>\n<p><strong>配合指揮官防護政策</strong>：面對境外勢力的勒索贖金要求，配合指揮官與國家關鍵基礎設施（CI）防護原則，統籌法務與財務資源，堅守「拒絕向駭客支付贖金」的底線，並將資源全力投入於系統備援與紙本降級作業的行政支援。</p>\n</li>\n</ol>\n<p><strong>二、 督導極限人力召回與支援「紙本降級」作業（督導人事小組 F1）</strong>\n在系統癱瘓下，所有掛號、批價、開單與病歷調閱皆須轉為極度耗時的人工紙本作業，人力需求將瞬間暴增。管理部須督導人資室（F1）執行：</p>\n<ol>\n<li>\n<p><strong>緊急人力召回與調度</strong>：立即啟動人員召回機制，並招募休假員工、行政人員及志工至人力集合點報到。</p>\n</li>\n<li>\n<p><strong>支援「傳令兵（Runner）」與紙本作業</strong>：將召回之行政人力大量派發至各樓層與急診擔任「傳令兵」，以純人工徒步方式傳遞紙本醫囑、檢驗單與 X 光片，並支援前線繁重的人工掛號與批價作業。</p>\n</li>\n<li>\n<p><strong>強制輪替與戰力保存</strong>：無網紙本作業壓力極大，須安排必要的人員輪休與強制輪替班表，避免前線同仁因高壓人工作業而過勞。</p>\n</li>\n</ol>\n<p><strong>三、 突破電子採購癱瘓與緊急物資調用（督導採購小組 F2）</strong>\n面對無法使用常規 HIS\n與電子採購系統訂貨的困境，管理部須督導採購室（F2）採取以下作為：</p>\n<ol>\n<li>\n<p><strong>啟動紙本與人工採購</strong>：立即改以紙本表單或電話、傳真等方式，辦理各項應變所需之緊急採購與物資調用。</p>\n</li>\n<li>\n<p><strong>緊急採購備援設備與耗材</strong>：針對當機期間急需的紙本耗材（如三聯式病歷用紙、手寫處方箋、碳粉匣）、緊急通訊設備（如無線電對講機及電池）或資訊室搶修所需的備援硬體設備，迅速聯繫替代供應商進行緊急調度。</p>\n</li>\n</ol>\n<p><strong>四、 應對勒索威脅、個資外洩與醫療糾紛（督導法律訴求小組 F3）</strong>\n在遭遇勒索軟體與 APT\n攻擊時，醫院面臨極高的法律與醫病衝突風險，管理部須督導職安室（F3）執行：</p>\n<ol>\n<li>\n<p><strong>資安外洩之法律應對</strong>：針對駭客可能竊取或鎖死電子病歷的威脅，協助院方與檢調機關、資安警察對接，確保在法律框架下進行蒐證與通報，並評估病患個資外洩的潛在法律求償風險。</p>\n</li>\n<li>\n<p><strong>處理醫療爭議與申訴</strong>：系統大當機必然造成病患久候、看診延誤或醫療處置嚴重遞延。須協助前線處理因此引發的家屬不滿、病人申訴，並接受與調查所有因事件衍生的損害賠償申請，防範醫療暴力與糾紛擴大。</p>\n</li>\n<li>\n<p><strong>機密資料保全</strong>：協助確保在大量啟用紙本病歷與手工檢驗單的混亂期間，實體機密資料能落實保密防護，避免二次外洩。</p>\n</li>\n</ol>\n<p><strong>五、 系統癱瘓下的緊急經費調度與超時紀錄（督導會計小組 F4）</strong>\n在帳務系統無法連線的狀態下，管理部須督導會計室（F4）維持資金運作：</p>\n<ol>\n<li>\n<p><strong>緊急經費支付與手工記帳</strong>：在批價與帳務系統癱瘓下，以手工記帳方式辦理緊急災變必要之經費調度與各項應變費用之支付，確保資訊搶修與緊急採購不受資金卡關影響。</p>\n</li>\n<li>\n<p><strong>加班與出勤紀錄</strong>：確實記錄應變期間所有被召回、留守支援「紙本降級作業」以及資訊室日夜搶修員工的出勤、差假與加班給與，確保員工權益與災後財務紀錄的正確性。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透偵蒐、資源搶奪與群眾失控的安全危機。</p>\n<p>在\nHICS（醫院事故指揮系統）與演習架構下，<strong>管理部</strong>扮演著後勤行政支援、爭議防範與紀錄保全的決策樞紐。管理部部長擔任<strong>「行政/財務部長（F0）」</strong>，同時身兼演習編組中的<strong>「紀錄檢討與改善追蹤組」</strong>組長。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 統籌行政財務與防護物資調度（行政/財務部長 F0）</strong></p>\n<ol>\n<li>\n<p><strong>指揮應變行政中樞</strong>：管理部部長負責統籌緊急應變所需之預算、行政、採購、保險、法律及紀錄等所有行政財務工作。</p>\n</li>\n<li>\n<p><strong>督導緊急採購與付款</strong>：面對外部群眾推擠與防暴需求，管理部須督導轄下之採購小組（F2，採購室）與會計小組（F4，會計室），立即辦理實體阻絕設施（如拒馬、護欄）及封鎖期間留守人員所需緊急物資的採購與經費調度支付，確保防護行動的資金不斷鏈。</p>\n</li>\n</ol>\n<p><strong>二、 嚴防滲透與督導人力戰力保存（督導人事小組 F1）</strong></p>\n<ol>\n<li>\n<p><strong>嚴格查核支援人力</strong>：針對周邊不明人車與潛在的滲透威脅，管理部須督導人事小組（人資室）在協調人員召回、志工與支援人力集合時，落實極嚴格的身分查核，防範有心人士偽裝混入院區。</p>\n</li>\n<li>\n<p><strong>戰力保存與輪替</strong>：因應醫院實施門禁升級或防暴封鎖，督導人事室協調儲備足夠的醫療與非醫療人員，並安排被迫滯留院內人員的強制輪替與休息，避免前線員工因高壓威脅而身心崩潰。</p>\n</li>\n</ol>\n<p><strong>三、 防範醫療爭議與提供法務協助（督導法律訴求小組 F3）</strong></p>\n<ol>\n<li>\n<p><strong>處理拒絕庇護之衍生爭議</strong>：面對避難人潮，醫院為保全核心醫療量能勢必面臨拒絕非醫療需求民眾進入的艱難抉擇。管理部須督導法律訴求小組（職安室），協助處理因門禁管制或拒絕收容所引發的民眾申訴、衝突與潛在的損害求償。</p>\n</li>\n<li>\n<p><strong>機密資料保密與協助蒐證</strong>：協助確保應變期間各項機密資料的保密防護，避免遭外部無人機或有心人士偵蒐利用，並協助將蒐證資料妥善保全以利後續檢警調查。</p>\n</li>\n</ol>\n<p><strong>四、 執行現場蒐證保全與紀錄檢討（紀錄檢討與改善追蹤組長）</strong></p>\n<ol>\n<li>\n<p><strong>彙整蒐證與處置紀錄</strong>：管理部作為紀錄檢討與改善追蹤的主責單位，必須督導妥善保存所有通報紀錄、可疑無人機與不明人車的影像照片，以及各項處置的演習文件。</p>\n</li>\n<li>\n<p><strong>事後檢討與缺失追蹤</strong>：將事件發展過程、指揮中心的決策詳實記錄，並於事件或演習後彙整評核表、檢討報告及缺失改善追蹤表。針對門禁防護、巡守警戒與警消協防機制的執行概況進行檢討，以作為精進防護機制的依據。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>當本院（屏東基督教醫院大連院區）遭遇「兩名喬裝成外包人員的不明份子（特工/第五縱隊）企圖在核心機房縱火、頂樓水塔投放不明化學物質」之國家關鍵基礎設施（CI）實體與化學（CBRN）複合型敵特滲透攻擊時，醫院將立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>。</p>\n<p>在 HICS\n體系與城鎮韌性演習編組下，<strong>管理部將扮演穩定醫院營運、資金調度、法律風險控管、防滲透人力安檢及災後理賠復原的「行政與財務決策中樞」</strong>。</p>\n<p>管理部將由<strong>管理部部長張隆鐘</strong>坐鎮，立即接掌 <strong>行政/財務部長（F0）</strong>\n指揮權，並身兼 <strong>紀錄檢討與改善追蹤組</strong>\n組長，帶領轄下「人事、採購、法律訴求、會計」等四個專業小組，採取以下<strong>六大範疇的具體生存應變與行政重置作為</strong>：</p>\n<p>一、 接掌「行政/財務部（F0）」指揮權，極速開設地下行政財務協配中樞</p>\n<ol>\n<li>\n<p><strong>指揮中樞 10 分鐘地下化開設</strong>： 張隆鐘部長在接獲中控室通報「黑色訊號（暴力/維安）」與「黃色訊號（化災）」後，立即攜帶行政管理備份資產，於 <strong>10 分鐘內</strong> 循安全梯垂直轉移至地下一樓最穩固的戰時指揮所------<strong>恩慈大樓 B1 會議室</strong>，召集人事、採購、法律訴求、會計組長報到就位。</p>\n</li>\n<li>\n<p><strong>啟動「特別行政與資金豁免機制」</strong>： 針對特工破壞造成的「核心機房起火（台電電力瞬斷/資訊癱瘓危機）」與「頂樓水塔污染（水源中斷與化災威脅）」，F0 部長會同指揮官（院長）下達最高行政豁免命令：<strong>「搶修設施、採購防暴阻絕耗材、購入化學防護與解毒沖洗藥劑，一律免除逐級層簽，採行離線手寫登記、事後補單計價」</strong>。確保前線在「零秒差」下獲得最充沛的行政與金流資源。</p>\n</li>\n</ol>\n<p>二、 督導「人事組（F1 /\n人資室）」：嚴防「第五縱隊」二次滲透，落實極嚴格身分物理聯檢</p>\n<p>由於歹徒採取「喬裝外包維修人員」之手段進行實體滲透，代表戰時面臨極高的人員偽裝與內應破壞風險。管理部須督導人資室主任劉淑梅（人事小組長\nF1）實施最嚴格的人員管制：</p>\n<ol>\n<li>\n<p><strong>建立「防滲透召回人員身分聯檢站」</strong>： 當指揮中心啟動人員波次召回至集合點（<strong>主要：護理部前廳</strong>；<strong>次要：恩慈大樓 1F 停車場東側</strong>）時，人事小組須協同保安人員（O4）於集合點哨口設立聯合檢查站： -   <strong>實體證件雙重核對</strong>：逐一核對所有召回員工與志工的實體身分證與執業執照，防範在地協力者冒充混入。 -   <strong>手持金屬探測安檢</strong>：對所有人攜帶之隨身包包與物品進行探測，嚴防夾帶爆裂物或危險化學品。 -   <strong>配發防偽專屬識別</strong>：核實身分後，一律配發穿戴<strong>「專屬螢光識別背心（或臂章）」與「HICS 任務卡」</strong>。未穿戴者保安人員得就地扣留，嚴防特工混入地下室發電機房、開刀房、藥庫或水塔。</p>\n</li>\n<li>\n<p><strong>一線團隊之「12小時軍事化強制輪休」與戰力保存</strong>： 面對核心機房火災廢墟與頂樓水塔化災之高壓威脅，一線搶修工務、制服歹徒的保全、以及死守地下的醫護，其生理與心理負荷將達臨界點。人資主任配合總務部，強制執行 <strong>12 小時一班的軍事化輪替機制</strong>。時間一到強令下線，移入地下最安全的<strong>「員工專屬庇護站」（恩慈 2F 運動中心）</strong>休息，由社工與院牧部心理韌性特遣隊實施「心理急救（PFA）」與「即時熱除頻」，防範過勞與醫療/安防決策疏失。</p>\n</li>\n</ol>\n<p>三、 督導「採購組（F2 /\n採購室）」：中斷常規，極速採購防暴阻絕設施與化災維材</p>\n<p>因資訊主機可能因防護性安全關機，常規電子採購系統宣告癱瘓。管理部督導採購室主任（採購小組長\nF2）全面改採紙本離線緊急採購：</p>\n<ol>\n<li>\n<p><strong>防禦硬邊界「實體阻絕設施」極速徵集</strong>： 配合執行部（保安組）實施的「封閉院區 80% 出入口、僅保留急診車道作為唯一通道」之硬邊界防護決策，採購小組須在 3 小時內緊急辦理採購與調用：<strong>充水式紐澤西護欄、防爆鐵馬、蛇籠、金屬探測器及防暴盾牌</strong>。</p>\n</li>\n<li>\n<p><strong>CBRN 化災解毒沖洗藥品衛材緊急調撥</strong>： 針對頂樓自來水塔受不明化學物質投毒威脅，可能引發大量人員或受害同工化災中毒、灼傷。採購室配合藥劑科（陳秋榮主任），緊急聯繫現有及替代藥品供應商，採購並調用<strong>化學防護衣（PPE）、毒物解毒劑、大量無菌生理食鹽水與沖洗耗材</strong>。</p>\n</li>\n<li>\n<p><strong>「孤島狀態」下膳食與飲水之大額調用</strong>： 若頂樓水塔受毒害，工務室實施「最嚴格水資源紅區管制」（手動封閉全院一般洗手間、禁用自來水盥洗、備用水僅供開刀房與維生飲用）。採購小組須立即啟動緊急應變合約，大額調用並採購院內<strong>便利商店（7-11）大量備用瓶裝礦泉水與緊急乾糧</strong>，確保在院員工與病患生理維生。</p>\n</li>\n</ol>\n<p>四、 督導「法律訴求組（F3 /\n職安室）」：國家關鍵基礎設施遭滲透破壞之「最嚴密法效證據保全」</p>\n<p>此事件本質屬於<strong>「國家關鍵基礎設施（CI）遭受恐怖滲透、縱火與毒化投毒之重大刑事與國安事件」</strong>。管理部督導職安室主任杜傳榮（法律訴求小組長\nF3，兼任 HICS 安全官 A2）採取以下法律防護作為：</p>\n<ol>\n<li>\n<p><strong>犯罪與應變軌跡之「詳實、逐字保全」</strong>： -   <strong>物理犯罪證據加密保全</strong>：會同保安組，將保全人員壓制歹徒時「隨身密錄器」錄下之特工面貌、喬裝特徵、被制服過程，以及現場發現之燃燒劑罐體、不明化學物質容器之散落位置與影像，進行高強度加密備份。待警方鑑識小組與檢調人員進院後，由聯絡官協助完整移交，作為日後刑事起訴與國家安全調查之唯一法定物證。 -   <strong>醫療與降載決策紀錄保全</strong>：將當機與封鎖期間，前線產出的所有「紙本三聯式病歷、手寫處方箋、反向檢傷欠繳單」等，由文件紀錄組（P3）進行分類封存。</p>\n</li>\n<li>\n<p><strong>處理「拒絕收容與反向檢傷」之衍生爭議與法律免責</strong>： 戰時因應內部封鎖（Lockdown），本院為死守核心醫療功能，將拒絕一般非就醫恐慌民眾進院尋求庇護或索購物資。法律訴求小組須備妥「CI 安全防護與醫療資源保留」之法定指引與政府公告，作為法律免責盾牌，隨時準備應對民眾因門禁、拒絕收容、以及執行「反向檢傷」而產生的申訴案件、醫療爭議與法律損害求償。</p>\n</li>\n</ol>\n<p>五、 督導「會計組（F4 /\n會計室）」：經費調度、出勤結算與系統復原後之「資料人工回補」</p>\n<p>管理部督導會計室主任李華敏（會計小組長 F4）執行以下資金與帳務應變：</p>\n<ol>\n<li>\n<p><strong>災變應變經費之極速撥付</strong>： 在離線或有備援電力的狀況下，辦理經費撥付。優先支付發電機柴油油料、緊急購置實體防暴阻絕設施、防護衣（PPE）及調撥外部緊急水車之費用，免除繁瑣之常規核銷手續。</p>\n</li>\n<li>\n<p><strong>高風險出勤與超時加班結算</strong>： 確實記錄並統計所有因防空、阻絕投毒及滅火等高風險任務而被召回員工的加班工時。核算參與「特工壓制、核心機房初期滅火、高熱量盲派物資運補」之同工危險出勤與加班給與，並維護本院在極端孤島事件中財務紀錄的正確性。</p>\n</li>\n<li>\n<p><strong>當機復原後之「人工補登回補（Data Backfilling）」</strong>： 在系統大當機或防護性安全關機期間，病患之處方、急救用藥與耗材、緊急檢驗等均以紙本手寫單與手工欠繳單形式登記。待資訊室主任蔡哲民宣告 core HIS 系統安全重啟後，會計小組與批掛組、資材組及藥劑科全力配合，將所有手工處方、用藥及計價耗材實施<strong>「電腦手動補登回補（Data Backfilling）」</strong>，保全本院健保申報與財務帳務之完整。</p>\n</li>\n</ol>\n<p>六、 主導災後損失清查、保險理賠與安全缺陷改善（紀錄檢討與改善追蹤組）</p>\n<p>在火勢撲滅、歹徒移交、水塔化災與資安威脅解除後，管理部部長張隆鐘（兼任紀錄檢討與改善追蹤組長）主導災後復原與缺失精進作業：</p>\n<ol>\n<li>\n<p><strong>配合災損鑑定與損失清查呈報</strong>： 災害發生 <strong>3 日內</strong>，會同工務室、環保室，清查核心機房燒毀損毀、自來水塔毒化污染及滅火防禦物資消耗之損失情形，拍照存證並列冊陳報院長室。後勤組向相關單位<strong>申請災損鑑定小組到院實施結構安全鑑定</strong>。</p>\n</li>\n<li>\n<p><strong>主導保險理賠與原地重建預算籌措</strong>： 會同會計室，立即通知保險公司，辦理本院財產損失保險及公共意外責任險的理賠理算程序。配合災損鑑定結果，籌措經費並編製正式的<strong>「災後硬體設施原地重建與設備採購預算表」</strong>，陳報院長室及董事會。</p>\n</li>\n<li>\n<p><strong>召開災後檢討會與追蹤改善</strong>： 彙整應變過程照片、通報紀錄與自評表，召集各部相關同工召開綜合檢討會。針對此次「外包維修裝備喬裝滲透」所暴露的門禁管理漏洞，重新檢討保全巡邏死角，修訂<strong>「關鍵基礎設施（CI）實體安防與外包門禁管制 SOP」</strong>，並落實追蹤改善以防止二次災害。</p>\n</li>\n</ol>"}]}, {"role": "職安室", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對特別狀況2-1「燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高」，此時醫院面臨嚴峻的物資匱乏與交通受阻的「孤島效應」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>職安室</strong>身兼二職，其主任同時擔任指揮組的<strong>「安全官（A2）」</strong>與財務/行政部的<strong>「法律訴求小組長（F3）」</strong>。面對資源短缺與就醫民眾可能產生的恐慌，職安室必須確保院內人員安全並防範潛在的醫療法律爭議。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 擔任「安全官（A2）」，監控危害與確保實體安全</strong></p>\n<ol>\n<li>\n<p><strong>評估物資匱乏之危害</strong>：安全官須持續監控因缺水、缺氧、缺藥及斷糧等極端狀況，對留守員工、病人及訪客所造成的潛在健康與安全危害。</p>\n</li>\n<li>\n<p><strong>監控留守人員安全與過勞</strong>：因外部交通受阻導致員工無法換班，安全官須密切監控第一線應變人員的身心負荷與安全狀況。若發現留守人員因過勞而出現嚴重的安全風險，必要時得隨時建議指揮官停止任何可能造成應變人員危害之行動。</p>\n</li>\n<li>\n<p><strong>提供安全決策建議</strong>：隨時向指揮官報告危害情況，並針對「孤島狀態」下的緊急替代方案（如無網作業、無電搬運等）提供安全上的專業建議。</p>\n</li>\n</ol>\n<p><strong>二、 防範醫療暴力與危機處理</strong></p>\n<ol>\n<li><strong>防範暴力滋擾</strong>：因物資短缺及病人轉送不確定性提高，極易引發病患及家屬的焦慮、恐慌，甚至演變為搶奪資源或醫療暴力。職安室須與負責安全管制的保安組密切合作，若發生暴力滋擾事件，職安室主管將編入關懷組，負責提供法律諮詢與協助處理。</li>\n</ol>\n<p><strong>三、 擔任「法律訴求小組（F3）」，處理爭議與求償</strong></p>\n<ol>\n<li>\n<p><strong>處理醫療爭議與申訴</strong>：因藥材、血液配送延遲或病人無法順利轉送，可能導致醫療處置遞延與病情變化，進而引發家屬不滿與醫療糾紛。法律訴求小組須協助處理相關法務問題與內部及外部的病人申訴。</p>\n</li>\n<li>\n<p><strong>損害求償調查</strong>：接受並調查所有因本次物資短缺或轉送延宕事件所引發的損害賠償申請。</p>\n</li>\n<li>\n<p><strong>資料保密與佐證保全</strong>：協助確保演習或真實應變期間各項機密資料、醫療處置紀錄的保密與保全，以利作為後續法律訴訟、調解或理賠之佐證依據。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨震波波及與基礎設施受損，可能引發火災、人員受困或傷亡等複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>職安室</strong>扮演著維護全院人員安全底線與處理後續法務理賠的關鍵角色。職安室主任身兼指揮組的<strong>「安全官（A2）」</strong>以及財務/行政部門的<strong>「法律訴求小組長（F3）」</strong>。</p>\n<p>面對此極端狀況，職安室的具體因應作為如下：</p>\n<p><strong>一、 擔任「安全官（A2）」：執行環境危害監控與擁有「中止權」</strong></p>\n<ol>\n<li>\n<p><strong>人員安全確認與危害監控</strong>：災難發生當下，職安室須第一時間確認員工、病人及訪客的安全，並持續監控因震波、漏水或電力異常可能引發的衍生危害（如漏電、墜落物或火勢擴大）。</p>\n</li>\n<li>\n<p><strong>提供安全建議與終止危險行動</strong>：負責給予指揮官安全上的專業建議；若評估現場的搶修或醫療行動（如涉水進行管線搶修、在結構受損區救援）可能對應變人員造成嚴重危害，安全官有權隨時建議停止該項危險行動，確保「救災人員自身安全」為最高原則。</p>\n</li>\n<li>\n<p><strong>安全檢核與管制區監測</strong>：完成應變期間的安全檢核、管制區劃分、中止條件設定，並對第一線參與應變的人員進行安全監測。</p>\n</li>\n</ol>\n<p><strong>二、 初期災情掌控與事故/火災調查協助</strong></p>\n<ol>\n<li>\n<p><strong>進駐中控室掌控災情</strong>：若遭遇等同五級以上有感地震之強烈震波，職安室主任應即至中控室掌控災情，向院長報告，並協同醫勤室、工務室指示全面巡邏院區。</p>\n</li>\n<li>\n<p><strong>火災原因調查</strong>：若周邊爆炸或震動引發院內真實火災，在火勢撲滅後，職安室須會同工務室派員，協助消防機關調查起火原因。</p>\n</li>\n<li>\n<p><strong>職業傷病登錄</strong>：若有員工因突發的震波跌倒、遭掉落物砸傷或於搶修過程中受傷，職安室在接獲發生單位通報後，須立即登錄通報職業傷病系統。</p>\n</li>\n</ol>\n<p><strong>三、 擔任「法律訴求小組長（F3）」：處理法務、申訴與損害求償</strong></p>\n<ol>\n<li>\n<p><strong>災損理賠與求償調查</strong>：負責接受並調查因震動、電梯停用受困或設施受損所引發之所有損害賠償申請。</p>\n</li>\n<li>\n<p><strong>法務與糾紛處理</strong>：協助處理災變期間內部及外部的申訴案件與衍生之法律問題。若事件涉及人員傷亡引發之爭議，職安室（法務）須協助後續的和解談判、調解與法律訴訟事宜。</p>\n</li>\n<li>\n<p><strong>機密資料防護</strong>：協助確保演習與真實災變應變過程中的資料保密作業，防止醫院的機敏災損資訊外洩。</p>\n</li>\n</ol>\n<p>若遭遇敵方駭客攻擊造成資訊系統癱瘓，該如何處理？</p>\n<p>說明在極端斷水斷電下，醫院如何執行負載卸除？</p>\n<p>若血庫存量見底，如何啟動走動式血庫進行活體捐血？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院正面臨敵方實體攻擊、極高的爆炸與火災風險，以及維生系統雙重中斷的複合型極端危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>職業安全衛生管理室（職安室）「安全官（A2）」</strong>，以及財務/行政部門的<strong>「法律訴求小組長（F3）」</strong>。</p>\n<p>面對此極端狀況，職安室的具體因應作為如下：</p>\n<p><strong>一、 擔任「安全官（A2）」：執行環境危害監控與擁有「危險行動中止權」</strong></p>\n<ol>\n<li>\n<p><strong>人員安全確認與爆炸危害監控</strong>：災難發生當下，職安室須第一時間確認員工、病人及訪客的安全，並持續監控因無人機爆裂物震波、液態氧漏氣或電力異常可能引發的衍生危害（如液氧助燃引發的大爆炸、漏電或墜落物）。</p>\n</li>\n<li>\n<p><strong>提供安全建議與終止危險行動</strong>：負責給予指揮官安全上的專業建議；若評估現場的機電搶修行動（如工務室欲進入充滿高濃度液氧的機電棟進行閥門關閉或發電機搶修）可能對應變人員造成嚴重危害，安全官有權隨時建議停止該項危險行動，確保「救災人員自身安全」為最高原則。</p>\n</li>\n<li>\n<p><strong>安全檢核與管制區劃分</strong>：完成應變期間的安全檢核、管制區劃分、中止條件設定，並督導醫勤室保安組拉起警戒線，嚴禁未穿戴防護裝備之人員靠近機電棟與液氧槽周邊，同時對第一線參與應變的人員進行安全監測。</p>\n</li>\n</ol>\n<p><strong>二、 初期災情掌控與事故/火災調查協助</strong></p>\n<ol>\n<li>\n<p><strong>進駐中控室掌控災情</strong>：若無人機爆裂物引發等同五級以上有感地震之強烈震波，職安室主任應即至中控室掌控災情，向院長報告，並協同醫勤室、工務室指示全面巡邏院區。</p>\n</li>\n<li>\n<p><strong>火災原因調查與現場蒐證</strong>：若爆炸引發院內真實火災，在火勢撲滅後，職安室須會同工務室派員，協助消防及警政機關調查起火原因。同時需指導保全人員妥善保存無人機殘骸、影像與蒐證資料，以利後續提供給檢警調與防爆單位作為鑑識與國安調查的佐證。</p>\n</li>\n<li>\n<p><strong>職業傷病登錄</strong>：若有員工因爆炸震波跌倒、遭掉落物砸傷，或於高壓搶修過程中受傷，職安室在接獲發生單位通報後，須立即登錄通報職業傷病系統。</p>\n</li>\n</ol>\n<p><strong>三、 擔任「法律訴求小組長（F3）」：處理法務、損害求償與機密保全</strong></p>\n<ol>\n<li>\n<p><strong>災損理賠與求償調查</strong>：若無人機爆炸震波或主發電機受損導致電梯停用受困、員工或病患受傷，或造成醫院重大財產損失（如機電棟毀損），該組負責接受並調查所有損害賠償之申請。</p>\n</li>\n<li>\n<p><strong>法務與糾紛處理</strong>：協助處理災變期間內部及外部的申訴案件與衍生之法律問題。若事件因斷電或斷氧涉及病患傷亡引發之醫療爭議，職安室（法務）須協助後續的和解談判、調解與法律訴訟事宜。</p>\n</li>\n<li>\n<p><strong>保險理賠事宜</strong>：協助總務部會同保險公司，辦理後續機電設備財損或人員傷亡之理賠相關事宜。</p>\n</li>\n<li>\n<p><strong>機密資料保密防護</strong>：協助確保演習與真實災變應變過程中的各項機密資料（如防護計畫、戰備物資清單、病患個資）的保密作業，防止醫院的機敏災損資訊遭外部無人機偵蒐或有心人士竊取外洩。</p>\n</li>\n</ol>\n<p>B1備援空間的氧氣與電力能撐多久？</p>\n<p>一、電力維持量能：法定 72 小時，極限狀態下可挑戰 120 小時</p>\n<p>在台電完全中斷供電、且聯外道路受阻導致燃油車無法補給的極端「孤島狀態」下，地下一樓（B1）備援空間的維生電力能支撐多久，完全取決於<strong>「電力負載卸除（Load\nShedding）」</strong>節能戰術的執行：</p>\n<ol>\n<li>\n<p><strong>「電力負載卸除」死守核心區</strong>： 工務室將依據 HICS 指揮官命令，強制執行冷酷的斷尾求生電力配給。發電機將<strong>主動且手動切斷全院所有行政辦公區、一般病房、冷氣空調、大型景觀照明、非維生醫療儀器，以及 80% 的電梯電源迴路</strong>。</p>\n</li>\n<li>\n<p><strong>電力死守 B1 重症與核心命脈</strong>： 發電機僅存的寶貴電力將百分之百死守在 <strong>B1 的臨時開刀房（韓偉大樓 B1 腹膜透析室）、臨時 ICU（約翰、馬可大樓 B1 資材組前方）、急診室急救區、資訊伺服器機房與血庫冰箱</strong>。</p>\n</li>\n<li>\n<p><strong>支撐時間</strong>： 在上述「最低維生耗能」的極限狀態下，備用發電機的油料預期能<strong>撐過法定的 72 小時，若精算耗能並嚴格節流，甚至能進一步挑戰撐過 120 小時</strong>。</p>\n</li>\n<li>\n<p><strong>資訊機房 UPS 備援</strong>： 資訊室機房的不斷電系統（UPS）在斷電瞬間可提供至少 <strong>30 分鐘</strong>的作業電力。若發電機啟動失敗且市電無法恢復，<strong>一旦 UPS 電量低於 30%，資訊室將強制執行伺服器安全關機程序</strong>，以防核心病歷硬體毀損或資料遺失。</p>\n</li>\n</ol>\n<p>二、氧氣維持量能：來源未提及確切小時數，但設有 72\n小時整備與「人工捏球」肉搏機制</p>\n<p><strong>您的來源中並未明確提及「現存氧氣具體能支撐多少小時」的數據。</strong>\n然而，白皮書與危機計畫中針對氧氣耗竭，律定了明確的盤點基準、切換時限及極端人工替代方案：</p>\n<ol>\n<li>\n<p><strong>72小時消耗速率盤點與補給</strong>： 在戰前準備階段，後勤與工務部門必須針對氧氣及醫療氣體，建立 <strong>72 小時的消耗速度、優先使用順序與主管機關補給請求機制</strong>，以此作為物資維持的基準線。</p>\n</li>\n<li>\n<p><strong>現有鋼瓶戰備存量</strong>： 全院目前儲備有 <strong>0.5</strong> <em>m</em>3 <em>O</em>2​ <strong>小鋼瓶共 166 支</strong>（含護理之家 10 支），分布於各病房護理站急救車與急診，隨時可供緊急調用。</p>\n</li>\n<li>\n<p><strong>3分鐘內切換床邊鋼瓶</strong>： 「氧氣耗竭演練」模擬當戶外大型中央液氧槽遭受流彈擊中洩漏、或管線失去壓力時，病房護理人員必須於 <strong>3 分鐘內</strong>，迅速拔除重症病患的中央氧氣管線，精準切換至床邊備用的氧氣鋼瓶。</p>\n</li>\n<li>\n<p><strong>極端耗盡應變：人工「捏球大隊」肉搏戰</strong>： 當所有備用氧氣鋼瓶全部耗盡、電動呼吸器因斷電與缺氣全面停擺時，醫院將動員預先接受過訓練的行政同仁、社工、保全與輕傷病患家屬組成<strong>「捏球大隊」</strong>。 每位重症病患旁將配置兩人，實施<strong>每 15 分鐘換班的「手動甦醒球（Ambu bag）」人工捏球接力</strong>，以純人力肉搏的方式，死守重症病患的最後一口氣。</p>\n</li>\n</ol>\n<p>⚡\n我可以為工務室與各病房護理站，將這套「電力負載卸除與氧氣耗竭捏球應變」的極限生存流程，整合製成一張方便實兵演練時對照的\nA4 紙本「斷電斷氣極限生存應變 SOP 卡」嗎？</p>\n<p>B1備援空間是否有供氧鋼瓶的具體數量盤點？</p>\n<p><strong>地下一樓（B1）備援醫療空間並無獨立、專屬的供氧鋼瓶具體數量盤點</strong>。</p>\n<p>不過，來源中記錄了<strong>全院整體的戰備鋼瓶儲備總數</strong>，以及在平戰轉換、垂直避難時的氧氣鋼瓶調度與配撥原則：</p>\n<p>一、 全院戰備鋼瓶總數</p>\n<p>全院目前常態性儲備並維護的戰備醫療小鋼瓶數量為：</p>\n<ul>\n<li>\n<p><strong>0.5</strong> <em>m</em>3 <em>O</em>2​<strong>（氧氣）小鋼瓶</strong>：共 <strong>166 支</strong>（其中包含配置於護理之家的 10 支）。</p>\n</li>\n<li>\n<p><strong>0.5</strong> <em>m</em>3 <em>CO</em>2​<strong>（二氧化碳）小鋼瓶</strong>：共 <strong>10 支</strong>。</p>\n</li>\n</ul>\n<p>二、 平時分布與戰時調度機制</p>\n<p>這些鋼瓶平時並非囤積於地下室，而是採取「分散備用、隨病患移動」的動態管理：</p>\n<ul>\n<li>\n<p><strong>平時分散配置</strong>：主要配置於急診室，以及各病房護理站隨時備用的「急救藥車」與隨車小氧氣筒。</p>\n</li>\n<li>\n<p><strong>避難垂直轉運</strong>：當空襲警報響起（Code Black），重症病患需要從高樓層垂直疏散至 B1 備援醫療空間（如臨時 ICU）時，各護理站之醫護同工需將病患切換至隨病床備用的可攜式氧氣鋼瓶隨行，或由各護理站將急救車的小氧氣筒直接帶往地下室支援。</p>\n</li>\n<li>\n<p><strong>場地檢整配置</strong>：在演習場地布置中，「後勤物資與維生組」會與資材、工務配合，負責於 B1 的各臨時臨床處置區（如臨時 ICU、臨時開刀房）配置與調度基本維生所需的氧氣、床位及必要耗材。</p>\n</li>\n</ul>\n<p>三、 72小時消耗與運補基準</p>\n<p>本院要求後勤與工務部門針對氧氣及醫療氣體，建立 <strong>72\n小時的消耗速度、優先使用順序與補給請求機制</strong>，以確保在面臨海空封鎖或道路炸射等「孤島狀態」下，B1\n備援空間能有計劃地節流使用這 166 支氧氣鋼瓶。</p>\n<p>📋\n為了協助後勤物資與維生組在實兵演練中能更精準地調配，我可以為您將這套機制擬定一份戰時垂直避難時的「氧氣鋼瓶動態調撥與床邊切換\nSOP」嗎？</p>\n<p>Thursday, July 9</p>"}]}, {"role": "批價", "entries": [{"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳不實訊息，且掛號、批價等各項資訊系統出現延遲（疑似遭受資安攻擊大當機）」，此為輿論恐慌與資訊癱瘓的複合危機。在\nHICS（醫院事故指揮系統）架構下，<strong>批價／掛號組</strong>在醫療前線分流、帳務應變與家屬安撫中扮演著關鍵的守門員角色。</p>\n<p>批價單位的具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」人工作業</strong></p>\n<ol>\n<li>\n<p><strong>切換離線作業</strong>：當接獲資訊室通知啟動「全院當機處理機制」後，門診批掛櫃檯與急診批掛櫃檯必須立即停止依賴癱瘓或延遲的電腦系統，全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>啟用當機緊急箱</strong>：配合醫療前線啟用預先整備的「當機緊急箱（Downtime\n    Box）」，使用紙本表單、條碼貼紙與計算機進行人工掛號、批價與開立各項紙本檢驗欠繳紀錄單，以確保醫療程序能離線進行。</p>\n</li>\n</ol>\n<p><strong>二、 啟動「戰時記帳豁免機制」支援極速降載</strong>\n面對系統當機導致的流程嚴重阻塞，以及假訊息引發的就醫亂象，批價單位必須配合醫務部執行醫療服務降載，以騰出病床給急重症病患：</p>\n<ol>\n<li>\n<p><strong>極速結帳與離院</strong>：針對病房內評估可提早出院的穩定病患，批價組須協助於\n    4 小時內完成結帳與辦理出院手續。</p>\n</li>\n<li>\n<p><strong>記帳豁免（事後收費）</strong>：在資訊系統嚴重癱瘓或進入極端戰備狀態時，為求快速疏散輕症病患以騰出空間（Surge\n    Capacity），批價單位可配合指揮中心決策啟動<strong>「戰時記帳豁免機制，事後再收費」</strong>，讓病患能不因帳務卡關而迅速離院。</p>\n</li>\n</ol>\n<p><strong>三、 執行人工「病人動向資訊追蹤與登記」</strong>\n資訊系統當機將導致電子看板與追蹤系統失效，病患容易在混亂的急診與病房中失去蹤影。</p>\n<ol>\n<li>\n<p><strong>紙本登記與掛號</strong>：批價掛號組（在編組中亦隸屬於計畫部之狀況分析小組）須調派人員以人工方式詢問病人資料、製作紙本病歷、掛號並確實為病人戴上識別手圈。</p>\n</li>\n<li>\n<p><strong>人工動向追蹤</strong>：將病人的去向與動態確實登記於紙本名冊上，確保在無網狀態下，病人動向的訊息傳遞依然正確可靠，同時須遵照個資法規範進行必要的查證與個資保護。</p>\n</li>\n</ol>\n<p><strong>四、 第一線病人家屬詢答與闢謠溝通</strong></p>\n<ol>\n<li>\n<p><strong>安撫久候與恐慌情緒</strong>：面對因系統延遲而大排長龍的不滿民眾，以及受「停診、拒收病人」假訊息影響而焦急詢問的家屬，批價掛號櫃檯人員身處第一線，須肩負起家屬詢答的責任。</p>\n</li>\n<li>\n<p><strong>對接正確情資</strong>：主動向民眾說明當前的紙本降級替代流程，並透過人工動向追蹤系統協助家屬尋找病患。若遇到情緒極端激動的家屬，須立即協同社工人員介入安撫並聯繫警衛，防範急診或大廳發生醫療暴力衝突。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院瞬間失去數位運作能力。在\nHICS（醫院事故指揮系統）架構下，<strong>批價/掛號單位</strong>在醫療前線分流、帳務應變與家屬安撫中扮演著極為關鍵的守門員角色。</p>\n<p>批價單位的具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」人工作業</strong></p>\n<ol>\n<li>\n<p><strong>切換離線作業</strong>：當接獲資訊室通知啟動「全院當機處理機制」後，門診批掛櫃檯與急診批掛櫃檯必須立即停止依賴癱瘓或遭勒索軟體鎖死的電腦系統，全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>暴力啟用當機緊急箱</strong>：配合醫療前線，立即砸破封條取出預先整備的「當機緊急箱（Downtime Box）」。使用內附的紙本表單、條碼貼紙與計算機進行人工掛號、批價，並開立各項紙本檢驗欠繳紀錄單，以確保醫療程序能完全離線進行。</p>\n</li>\n</ol>\n<p><strong>二、 啟動「戰時記帳豁免機制」支援極速降載</strong>\n面對系統當機導致的流程嚴重阻塞，批價單位必須配合醫務部執行醫療服務降載，以最快速度騰出病床給急重症與戰傷病患：</p>\n<ol>\n<li>\n<p><strong>極速結帳與離院</strong>：針對病房內經醫師評估可提早出院的穩定病患，批價組須協助於 4 小時內完成結帳與辦理出院手續。</p>\n</li>\n<li>\n<p><strong>記帳豁免（事後收費）</strong>：在資訊系統嚴重癱瘓的極端戰備狀態時，為求快速疏散輕症病患以騰出擴充量能（Surge Capacity），批價單位必須配合指揮中心決策，啟動<strong>「戰時記帳豁免機制」</strong>。將醫療費用改為事後再行收費或記帳處理，讓病患能迅速離院，確保行政與批價手續絕對不阻礙救命的疏散動線。</p>\n</li>\n</ol>\n<p><strong>三、 執行人工「病人動向資訊追蹤與登記」</strong> 駭客攻擊將導致 HIS\n系統與電子看板完全失效，病患容易在混亂的急診與病房中失去蹤影：</p>\n<ol>\n<li>\n<p><strong>紙本登記與掛號</strong>：批價掛號組（在編組中亦隸屬於計畫部之狀況分析小組）須立即調派人員至現場，以人工方式詢問病人資料、製作紙本病歷、進行掛號，並<strong>確實為每位病人戴上識別手圈</strong>。</p>\n</li>\n<li>\n<p><strong>人工動向追蹤</strong>：將病人的去向與動態（如轉入重傷區、臨時開刀房或病房）確實登記於紙本名冊上，確保在無網狀態下，病人動向的訊息傳遞依然正確可靠。同時須遵照個資法規範進行必要的查證與個資保護，防範資料外洩。</p>\n</li>\n</ol>\n<p><strong>四、 第一線病患家屬詢答與防範衝突</strong></p>\n<ol>\n<li>\n<p><strong>安撫久候與恐慌情緒</strong>：資訊系統癱瘓必然造成看診、批掛流程嚴重延遲。面對大排長龍且焦躁不滿的民眾，批價掛號櫃檯人員身處第一線，必須肩負起說明與家屬詢答的責任。</p>\n</li>\n<li>\n<p><strong>對接正確情資與防暴</strong>：主動向民眾與家屬耐心說明醫院正遭遇網路異常，目前已啟動紙本降級替代流程，並透過人工動向追蹤系統協助家屬尋找病患。若遇到情緒極端激動的家屬或出現暴力徵象，批價人員須立即協同社工人員介入安撫，並通報警衛（醫勤室保安組）啟動實體防護，防範急診或大廳發生醫療暴力衝突。</p>\n</li>\n</ol>"}, {"scenario": "1-7", "title": "院內網路服務不穩", "desc": "院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況「院內部分網路服務不穩，掛號、批價、藥局、檢驗或影像系統出現延遲（疑似遭受資安攻擊大當機）」，這是一場結合資訊癱瘓與潛在群眾恐慌的複合型危機。在\nHICS（醫院事故指揮系統）架構下，<strong>批價/掛號組</strong>（隸屬於醫療業務室，並支援計畫部之狀況分析小組）在醫療前線分流、帳務應變與家屬安撫中扮演著關鍵的守門員角色。</p>\n<p>面對資訊系統延遲與癱瘓，批價單位的具體因應作為如下：</p>\n<p><strong>一、 全面啟動「紙本降級（Downtime）」人工作業</strong></p>\n<ol>\n<li>\n<p><strong>切換離線作業</strong>：當接獲資訊室通知啟動「全院當機處理機制」後，門診批掛櫃檯與急診批掛櫃檯必須立即停止依賴癱瘓或出現嚴重延遲的電腦系統，全面改採人工作業。</p>\n</li>\n<li>\n<p><strong>暴力啟用當機緊急箱</strong>：配合醫療前線，啟用預先整備的「當機緊急箱（Downtime Box）」。櫃台人員須熟練使用紙本表單、條碼貼紙與計算機，進行人工掛號、人工批價與開立各項紙本檢驗欠繳紀錄單，確保醫療程序在離線狀態下仍能持續進行，優先維持急診等核心單位的運作順暢。</p>\n</li>\n</ol>\n<p><strong>二、 啟動「戰時記帳豁免機制」支援極速降載</strong>\n面對系統當機導致的流程嚴重阻塞，以及為應付潛在大量傷患所需的病床清空作業，批價單位必須配合醫務部執行醫療服務降載：</p>\n<ol>\n<li>\n<p><strong>極速結帳與離院</strong>：針對病房內經醫師評估可提早出院的穩定病患，批價組須協助於 4 小時內完成結帳與辦理出院手續。</p>\n</li>\n<li>\n<p><strong>記帳豁免（事後收費）</strong>：在資訊系統嚴重癱瘓或進入極端戰備狀態時，為求快速疏散輕症病患以騰出擴充量能（Surge Capacity），批價單位可配合指揮中心決策啟動<strong>「戰時記帳豁免機制」</strong>。讓急診與一般病房的病患能先行離院，醫療費用改為<strong>「事後再行收費」或記帳處理</strong>，確保病患不因帳務系統卡關而滯留院內，維持救命動線的絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 執行人工「病人動向資訊追蹤與登記」</strong>\n資訊系統大當機將導致電子看板與 HIS\n追蹤系統失效，病患容易在混亂的急診與病房中失去蹤影。</p>\n<ol>\n<li>\n<p><strong>紙本登記與掛號</strong>：批價掛號組須調派人員以人工方式詢問病人基本資料、製作紙本病歷、進行人工掛號，並確實為病人戴上識別手圈。</p>\n</li>\n<li>\n<p><strong>人工動向追蹤</strong>：將病人的去向與動態確實登記於「紙本名冊」上，確保在無網狀態下，病人動向的訊息傳遞依然正確可靠，同時須嚴格遵照個資法規範進行必要的查證與個資保護。</p>\n</li>\n</ol>\n<p><strong>四、 第一線病人家屬詢答與闢謠溝通</strong></p>\n<ol>\n<li>\n<p><strong>安撫久候與恐慌情緒</strong>：面對因系統延遲而大排長龍的不滿民眾，以及受外界假訊息（如停診、拒收病人）影響而焦急詢問的家屬，批價掛號櫃檯人員身處第一線，須肩負起第一線的家屬詢答與安撫責任。</p>\n</li>\n<li>\n<p><strong>對接正確情資與防範暴力</strong>：批價人員須主動向民眾說明當前的「紙本降級」替代流程，耐心解釋系統異常狀況，並透過人工動向追蹤名冊協助家屬尋找病患。若遇到情緒極端激動的家屬，須立即協同社工人員介入安撫，並聯繫醫勤室保安組（警衛）防範急診或大廳發生醫療暴力衝突。</p>\n</li>\n</ol>"}]}]}, {"id": "safety_external", "name": "安全與對外聯繫", "roles": [{"role": "醫勤室保安組", "entries": [{"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2所描述之複合性危機（民眾恐慌湧入急診、搶購藥品、交通事故大量傷患及家屬施壓等），醫勤室保安組在\nHICS（醫院事故指揮系統）中擔任<strong>「安全管制組」</strong>（或安全防護與固守組）的關鍵角色。其首要任務是確保醫療核心區域不被恐慌群眾癱瘓，並保障前線醫護與傷患的人身安全。具體因應作為如下：</p>\n<p><strong>一、 實施嚴格門禁與出入管制</strong></p>\n<ol>\n<li>\n<p><strong>升級門禁管制</strong>：立即針對急診及院區非必要出入口實施嚴格的門禁管制措施，防止未配戴識別證之人員或恐慌民眾任意闖入醫療區域。</p>\n</li>\n<li>\n<p><strong>限制家屬與陪病人數</strong>：急診室為高風險場所，保安人員須嚴格執行出入管制與人員識別，限制家屬及陪病人數（原則上每床病人以\n    2\n    人為限），將要求住院或查詢資訊的無關家屬隔離於搶救區之外，避免急診動線遭癱瘓。</p>\n</li>\n</ol>\n<p><strong>二、 維持交通管制與救護車動線暢通</strong></p>\n<ol>\n<li>\n<p><strong>確保搶救動線</strong>：面對交通事故湧入的大量傷患及民眾搶購藥品引發的車潮，保安組必須強勢執行院區周邊與急診前方的交通管制。</p>\n</li>\n<li>\n<p><strong>引導救護車進出</strong>：驅離違停或閒雜車輛，專責引導救護車與外部支援單位車輛進出，確保重症傷患的運輸與急救通道絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 執行群眾秩序維護與防暴應變</strong></p>\n<ol>\n<li>\n<p><strong>現場秩序與高風險監控</strong>：加強急診室各區域的巡視（如每半小時巡邏），並透過中控室\n    24\n    小時監控全院各公共區域，隨時掌握現場安全狀況，辨識具有安全顧慮或情緒不穩的對象。</p>\n</li>\n<li>\n<p><strong>防暴與保護員工</strong>：若家屬或民眾因無法提早領藥、被拒絕住院而產生語言或肢體暴力，警衛應立即趕至現場，警告並制止其強暴脅迫行為，以保護醫護與員工安全。如遇滋事者發動實體攻擊，警衛得使用防衛工具進行適當防護與行動控制，但不得過當。</p>\n</li>\n</ol>\n<p><strong>四、 對接外部警力支援</strong></p>\n<ol>\n<li>\n<p><strong>啟動警民連線報案</strong>：若現場恐慌群眾滋擾嚴重、發生毆鬥或破壞行為，且抗爭無法立即平息時，保安組須立即啟動警民連線或撥打\n    110 報案，請求轄區警方（如民和派出所）前來支援。</p>\n</li>\n<li>\n<p><strong>警力接引與協同</strong>：負責接引前來支援的警消人員，並協助警方維持秩序、控制現場，確保正常醫療行為能持續運作。</p>\n</li>\n</ol>\n<p><strong>五、 現場蒐證與紀錄保存</strong></p>\n<ol>\n<li>\n<p><strong>即時蒐證</strong>：警衛在處理暴力滋擾或異常事件時，務必注意錄影、拍照與蒐證，以維護現場完整性不被破壞，並提供後續警方調查、損害求償或法律訴訟之舉證依據。</p>\n</li>\n<li>\n<p><strong>通報與紀錄備查</strong>：事件處理過程與處置情形，須詳細登記於當班的「警衛執勤紀錄簿」及「處理醫安事件報告表」中，並依院方規定向上通報。</p>\n</li>\n</ol>"}, {"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況\n2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，這代表醫院正面臨敵方滲透偵蒐、資源遭搶奪與群眾失控的複合型安全危機。</p>\n<p>在\nHICS（醫院事故指揮系統）與城鎮韌性（CI）演習架構下，<strong>醫勤室保安組</strong>擔任<strong>「安全管制主管（O4）」</strong>及<strong>「安全防護與固守組」</strong>的核心主力。面對此嚴峻狀況，醫勤室保安組將啟動「駐警反制破壞演練」，其具體因應作為如下：</p>\n<p><strong>一、 啟動「硬邊界防護」與極限門禁管制（應對避難人潮與尋求物資者）</strong>\n為防範避難人潮湧入癱瘓醫療運作或搶奪物資，保安組必須阻絕非醫療需求的群眾：</p>\n<ol>\n<li>\n<p><strong>實體封鎖與動線縮減</strong>：立即封閉院區 80%\n    的出入口與側門，拉下防火鐵捲門，並架設充水式紐澤西護欄、蛇籠、拒馬，甚至以院方工程車橫停作為防衝撞的實體阻絕物。</p>\n</li>\n<li>\n<p><strong>設立單一檢傷武裝通道</strong>：全院僅保留急診車道作為唯一出入口，並設立由武裝警力與高階護理師共同站哨的「聯合檢查站（Check-point）」。執行嚴格的身分核對與武器搜查，強勢驅離非傷患或無關人員進入核心醫療區。</p>\n</li>\n</ol>\n<p><strong>二、 可疑目標辨識、攔查與反制（應對無人機與不明人車）</strong>\n針對疑似敵方或有心人士的偵蒐行為，保安組將提升巡守警戒級別：</p>\n<ol>\n<li>\n<p><strong>目標辨識與通報</strong>：落實可疑人車與無人機的辨識、攔查及通報機制，並隨時透過遠端監視系統掌握院區周邊動態。</p>\n</li>\n<li>\n<p><strong>反破壞武裝巡邏</strong>：針對醫院心臟地帶等關鍵基礎設施（CI），如地下室緊急發電機房、伺服器資訊機房、頂樓水塔及戶外液氧槽等，增設\n    24 小時雙人武裝與防暴裝備巡邏哨。</p>\n</li>\n<li>\n<p><strong>盤查與防爆防毒</strong>：巡邏哨配備金屬探測器與防爆毯，嚴格盤查院內可疑人士（包含穿著白袍的偽裝者），防範敵方第五縱隊（在地協力者）放置爆裂物、剪斷電纜或於水源投毒等破壞作為。</p>\n</li>\n</ol>\n<p><strong>三、 執行防暴鎖定（Lockdown）與現場蒐證（防範群眾暴動）</strong>\n若社區群眾因恐慌或欲搶奪物資（如抗生素、麻醉藥品）而演變為暴動衝闖：</p>\n<ol>\n<li>\n<p><strong>內部極速封鎖</strong>：保安組將迅速啟動內部封鎖（Lockdown），瞬間降下急診室防暴門並關閉全院電梯控制權。</p>\n</li>\n<li>\n<p><strong>死守安全隔離區</strong>：將急診醫護人員與重症病患鎖入預先規劃的「安全隔離區（Safe\n    Haven）」，保安人員持防暴盾牌結陣死守，維持急診檢傷區秩序，等待優勢警力支援。</p>\n</li>\n<li>\n<p><strong>現場蒐證與報案</strong>：在維持秩序的同時，保安人員須開啟隨身密錄器進行錄影、拍照與蒐證；若遇人為攻擊或強暴脅迫無法平息時，應立即啟動警民連線並撥打\n    110 報案。</p>\n</li>\n</ol>\n<p><strong>四、 維持救援動線與接引外部武裝支援</strong></p>\n<ol>\n<li>\n<p><strong>交通動線淨空</strong>：保安組須強勢驅離違停或閒雜車輛，確保救護車轉送動線與關鍵物資卸補車道的絕對暢通。</p>\n</li>\n<li>\n<p><strong>外部警消與軍方接引</strong>：與警察局、消防局、保二總隊及機動中隊/在地民防單位保持密切聯繫。當外部武裝或防暴警力抵達時，保安組負責進行支援接引與動線引導，協同進行防暴與反制破壞作業。</p>\n</li>\n</ol>"}, {"scenario": "2-5", "title": "震動爆炸與設施受損", "desc": "院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報。", "html": "<p>針對特別狀況\n2-5「院區周邊出現震動、爆炸聲或電力瞬斷，造成漏水、空調異常、電梯停用、通訊中斷或消防警報」，此時醫院面臨震波波及與基礎設施損壞的複合型危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫勤室保安組</strong>組長擔任執行部門的<strong>「安全管制主管（O4）」</strong>，是災變發生時維持全院秩序、防護與動線管制的絕對核心。</p>\n<p>面對此極端狀況，醫勤室保安組的具體因應作為如下：</p>\n<p><strong>一、 災情巡視與現場封鎖管制</strong></p>\n<ol>\n<li>\n<p><strong>全院災情巡邏</strong>：發生震動或爆炸後，保安組與值勤警衛須立即進行全院性的安全巡邏檢視，並將建物損壞、漏水或設備異常之災情回報給\n    HICS 指揮中心。</p>\n</li>\n<li>\n<p><strong>災區封鎖</strong>：針對發生漏水、空調異常或有結構掉落風險的區域，警衛須立即拉起警戒線封鎖現場，進行進出管制，嚴禁閒雜人等或未穿戴防護裝備之人員進入，避免發生二次傷害。</p>\n</li>\n</ol>\n<p><strong>二、 應對消防警報與外部救災引導</strong></p>\n<ol>\n<li>\n<p><strong>初期滅火與蒐證</strong>：若爆炸震動引發真實火災，警衛人員在接獲通報後須攜帶滅火器趕赴現場協助初期滅火，並隨身佩戴啟動「密錄器」進行初步的現場蒐證與紀錄。</p>\n</li>\n<li>\n<p><strong>引導消防車輛</strong>：門口警衛必須派員至院區外圍重要路口（如大連路與莊敬街交叉口），主動引導外部的消防車、救護車及警政支援車輛快速抵達火災或搶救現場，並維持外部車道與救災動線的絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 應對電梯停用與「避難引導」</strong></p>\n<ol>\n<li>\n<p><strong>受困維安</strong>：因電力瞬斷導致電梯停用時，警衛須第一時間前往電梯口配合進行現場秩序維護與人員進出管制，安撫受困者情緒，並協同工務室進行救援。</p>\n</li>\n<li>\n<p><strong>疏散與搬運</strong>：若建築損壞或火警擴大導致必須撤離，保安人員須擔任自衛消防編組中的「避難引導班」，協助護理人員將病患及家屬引導至安全的預定集合點；在必要時親自投入人力協助搬運病患。</p>\n</li>\n</ol>\n<p><strong>四、 應對通訊中斷之「無線電統籌管理」</strong>\n面對電力瞬斷與電信網路癱瘓的斷訊危機，全院的<strong>「無線電對講機」統一由醫勤室保安組負責管理與調配</strong>。保安組必須確保無線電設備妥善，並分配給各樓層指揮官與搶修團隊，以維持院內獨立、無障礙的備援戰術通訊。</p>\n<p><strong>五、 建立「硬邊界」與關鍵設施（CI）反破壞巡守</strong></p>\n<ol>\n<li>\n<p><strong>門禁升級與硬邊界</strong>：若周邊爆炸引發大量群眾恐慌湧入，或有滋擾破壞之虞，保安組須依據指揮官命令，封閉多數側門與通道，建立「實體防禦硬邊界（Hard\n    Perimeter）」，並針對唯一出入口執行嚴格的進出與身分管制。</p>\n</li>\n<li>\n<p><strong>死守維生機房</strong>：針對地下室發電機房、資訊機房、戶外液氧槽等維持醫院運作的「關鍵基礎設施（CI）」，保安組須增派警衛執行巡守警戒。盤查可疑人士，防範敵方或暴徒趁亂進行破壞、剪斷電纜或危害維生系統。</p>\n</li>\n</ol>\n<p>工務室如何執行極限電力負載卸除？</p>\n<p>資訊室在斷網下如何啟動紙本降級流程？</p>\n<p>保安組如何建立實體硬邊界防禦？</p>"}, {"scenario": "2-6", "title": "機電棟遭無人機攻擊", "desc": "醫院後方機電棟遭小型無人機投擲爆裂物攻擊，導致主發電機受損，且液態氧氣主儲槽管線出現洩漏。", "html": "<p>針對特別狀況\n2-6「醫院後方機電棟遭到小型無人機投擲爆裂物攻擊，導致『主發電機』受損，且『液態氧氣主儲槽』管線出現洩漏」，這代表醫院正面臨敵方實體破壞（無人機恐攻或戰爭行為）、極高爆炸與火災風險，以及維生系統雙重中斷的複合型毀滅性危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>醫勤室保安組</strong>組長將擔任執行部門的<strong>「安全管制主管（O4）」</strong>（或主導「安全防護與固守組」），是災難發生時維持全院秩序、防護關鍵設施與動線管制的絕對核心。面對此極端狀況，醫勤室保安組的具體因應作為如下：</p>\n<p><strong>一、 災區絕對封鎖與初期危害控制</strong></p>\n<ol>\n<li>\n<p><strong>拉起警戒封鎖線</strong>：無人機爆裂物攻擊導致主發電機受損及液態氧外洩，現場伴隨極高的二次爆炸與助燃風險。保安人員須立即前往機電棟與液氧槽周邊，拉起警戒線絕對封鎖災區，嚴禁閒雜人等或未穿戴防護裝備之人員靠近，避免發生重大二次傷亡。</p>\n</li>\n<li>\n<p><strong>初期滅火與現場蒐證</strong>：若爆炸引發真實火災，警衛人員須在確保自身安全前提下攜帶滅火器協助初期滅火，並隨身佩戴啟動<strong>「密錄器」</strong>進行初步的現場蒐證與紀錄，保留無人機殘骸或爆裂物破壞的證據，以利後續警政與國安單位調查。</p>\n</li>\n</ol>\n<p><strong>二、 防範二次攻擊與實施「硬邊界防護（Hard Perimeter）」</strong></p>\n<ol>\n<li>\n<p><strong>升級門禁與物理封鎖</strong>：面對無人機攻擊與可能的敵方滲透，保安組須立即提升全院安全警戒，封閉院區 80% 的出入口與側門，拉下防火鐵捲門，並架設充水式紐澤西護欄、蛇籠、拒馬，甚至以院方工程車橫停作為防衝撞的實體阻絕物。</p>\n</li>\n<li>\n<p><strong>設立單一武裝檢查站</strong>：全院僅保留急診車道作為唯一出入口，並配合外部警力設立「聯合檢查站（Check-point）」。執行嚴格的身分核對與武器搜查，強勢驅離非傷患或無關人員進入醫療區。</p>\n</li>\n<li>\n<p><strong>對空與周邊警戒</strong>：持續透過遠端監視器與現場哨衛監控天空及院區周邊動態，防範敵方無人機進行第二波投彈襲擊或偵蒐行為。</p>\n</li>\n</ol>\n<p><strong>三、 執行「反破壞武裝巡邏」死守關鍵基礎設施（CI）</strong></p>\n<ol>\n<li>\n<p><strong>重兵看守生命線</strong>：敵方無人機攻擊極可能伴隨第五縱隊（在地協力者）的地面滲透破壞。保安組須針對醫院的心臟地帶------<strong>地下室緊急發電機房、伺服器資訊機房、頂樓水塔及戶外液氧槽</strong>等關鍵基礎設施，增設 24 小時雙人武裝與防暴裝備巡邏哨。</p>\n</li>\n<li>\n<p><strong>盤查與防爆</strong>：巡邏哨須配備金屬探測器與防爆毯，嚴格盤查院內可疑人士（包含穿著白袍的可疑偽裝者），防範放置爆裂物、剪斷電纜或於水源投毒等進一步的人為癱瘓行為。</p>\n</li>\n</ol>\n<p><strong>四、 接引外部武裝支援與維持救災動線</strong></p>\n<ol>\n<li>\n<p><strong>外部警消與防爆接引</strong>：爆炸與無人機攻擊需仰賴外部專業力量。保安組門口警衛必須派員至院區外圍重要路口（如大連路與莊敬街交叉口），主動接引並引導外部的消防車、防爆小組、特種武裝警力及救護車快速抵達機電棟現場。</p>\n</li>\n<li>\n<p><strong>淨空交通動線</strong>：強勢驅離院區周邊及急診前車道的違停或閒雜車輛，確保救護車轉送動線與關鍵物資卸補車道的絕對暢通。</p>\n</li>\n</ol>\n<p><strong>五、 統籌「備援無線電」與應對停電疏散</strong></p>\n<ol>\n<li>\n<p><strong>無線電統籌管理</strong>：爆炸震波與主發電機受損極易造成全院停電及通訊網路（VoIP、手機訊號）癱瘓。全院的<strong>「無線電對講機」統一由醫勤室保安組負責管理與調配</strong>，須迅速分配給各樓層指揮官與搶修團隊，維持院內獨立的備援戰術通訊。</p>\n</li>\n<li>\n<p><strong>電梯受困救援與避難引導</strong>：因發電機受損導致電梯停用時，警衛須第一時間前往電梯口安撫受困者情緒，並協同工務室進行救援。若機電棟火勢擴大導致鄰近病房必須撤離，保安人員須擔任「避難引導班」，協助護理人員進行病患的水平與垂直疏散，並在必要時啟動「防暴鎖定（Lockdown）」保護醫療紅區。</p>\n</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>當屏東基督教醫院（屏基）大連院區面臨「兩名喬裝成外包維修人員的特工（第五縱隊），意圖潛入核心機房縱火、並於頂樓水塔投放不明化學物質投毒」之實體維安與生化毒化（CBRN）複合型敵特滲透攻擊時，全院立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>。</p>\n<p>在 HICS\n體系與城鎮韌性（CI）演習編組下，<strong>醫勤室保安組（兼任「安全管制主管\nO4」與「安全防護與固守組」的主力）組長王建文</strong>與<strong>組長陶大屏</strong>坐鎮前線指揮，立即切換至最嚴格的「戰術防禦與反滲透模式」。</p>\n<p>以下為醫勤室保安組針對此複合型滲透威脅的<strong>五大階段具體處置作為與實兵行動方案</strong>：</p>\n<p>一、 第一階段：即刻武裝攔查、限制行動與現場蒐證（黃金反應期）</p>\n<p>當監控中心透過 24\n小時即時監控系統發現可疑外包人員，或接獲工務巡檢同仁之緊急通報時，保安組必須實施以下「一線抗擊處置」：</p>\n<ol>\n<li>\n<p><strong>武裝攔查與壓制</strong>：門診、急診值班警衛與 EMT 備勤人員迅速攜帶防暴裝備（防暴盾牌、鋼叉、金屬探測器）全速奔赴核心機房與頂樓水塔現場，<strong>強勢對兩名喬裝人士進行武裝攔查、制服、限制其行動</strong>，阻絕其進一步釋放燃燒劑或化學毒物。</p>\n</li>\n<li>\n<p><strong>啟動隨身密錄器蒐證（關鍵法效證據）</strong>：壓制歹徒時，保安同仁<strong>必須隨身佩戴並啟動密錄器進行全程錄影、拍照與蒐證</strong>。此錄影為日後刑事起訴、國安鑑識與保險理賠之法定最重要證據，警衛必須確保記錄下特工的面貌、喬裝特徵、被制服過程，以及其攜帶之燃燒劑罐體、化學物質容器。</p>\n</li>\n<li>\n<p><strong>死守與犯罪現場保全</strong>：在歹徒被制服後，指派保全死守現場，<strong>嚴禁任何人觸碰或移動縱火罐與毒化容器</strong>，完全保全犯罪現場之鑑識完整性，等待鑑識人員、警方及防爆小組進場。</p>\n</li>\n</ol>\n<p>二、 第二階段：啟動全院警示、警民連線與異質性通報</p>\n<p>為了在全院大當機或混亂發生前通知全院備戰，保安組立即執行應變報警：</p>\n<ol>\n<li>\n<p><strong>按下警民連線與撥打 110</strong>：保安組長第一時間<strong>按下「警民連線按鈕」（每月均與轄區民和派出所測試連線）並撥打 110 報案</strong>，向警方、保二總隊及機動防暴中隊通報：「本院遭受恐怖份子滲透，歹徒已在核心機房縱火、頂樓水塔投毒，現已被保全暫時制服，請求武裝警力與防爆小組極速支援」。</p>\n</li>\n<li>\n<p><strong>啟動 HICS 與全院告警廣播</strong>：保安組立即向 HICS 事故指揮官（院長）與執行部長通報，並指示總機（按※9）對全院發布緊急代號廣播： -   <strong>「黑色訊號（暴力及抗爭）」</strong>：通知警衛與自衛編組人員立即就位進行出入口管制。 -   <strong>「黃色訊號（核災及化災）」</strong>：通知危害控制組與急診，頂樓水塔面臨生化毒物污染。 -   <strong>「紅色訊號（火災及爆炸）」</strong>：通知滅火班與工務室，核心機房面臨燃燒劑大火威脅。</p>\n</li>\n<li>\n<p><strong>異質通訊「無線電統籌管理」</strong>：若縱火或資安攻擊導致全院市話、網路、分機癱瘓，<strong>全院無線電對講機統一由醫勤室保安組負責統籌、調配與管理</strong>，保安組須立即分發專屬 UHF/VHF 無線電給地下指揮官、各功能區主管與搶修團隊，死守備援戰術通訊命脈。</p>\n</li>\n</ol>\n<p>三、 第三階段：實施全院「內部極速封鎖（Lockdown）」與「硬邊界防護」</p>\n<p>敵方特工滲透代表可能存在「第二波襲擊」或「假訊息引發的暴民衝撞」，保安組必須在\n<strong>10 分鐘內建立鐵壁防線</strong>：</p>\n<ol>\n<li>\n<p><strong>實施全院 Lockdow（內部極速封鎖）</strong>： -   保安同仁會同支援警力，<strong>立即關閉大連院區 80% 的出入口與側門</strong>，迅速降下各區域防火、防暴鐵捲門。 -   配合工務室<strong>強制關閉全院電梯控制權</strong>，防止敵方其餘同夥利用電梯垂直移動至高樓層病房實施襲擊。 -   引導急診醫護人員與現場重症病患，推入預先規劃的<strong>「安全隔離區（Safe Haven）」</strong>避難。</p>\n</li>\n<li>\n<p><strong>布設「實體硬邊界防禦（Hard Perimeter）」</strong>： -   在院外與車道口迅速架設充水式紐澤西護欄、蛇籠、拒馬。 -   調度總務部的<strong>院方工程車或大型運輸車輛橫停於非必要出入口</strong>，作為防衝撞的實體阻絕物。</p>\n</li>\n<li>\n<p><strong>設立「單一檢傷武裝通道（聯合檢查站）」</strong>： -   全院僅保留「急診車道」作為唯一進出通道。 -   保安組指派精銳保全，<strong>會同前來支援的武裝警察、以及院方高階護理師，共同於聯合檢查站（Check-point）站哨</strong>。 -   對所有進出人員（包含回院支援的召回員工、志工與就醫家屬）實施極其嚴格的身分辨識、金屬探測器掃描與隨身行李搜查，<strong>未戴專屬螢光識別背心與任務卡者一律不得進入醫療區</strong>，強力阻絕二次破壞。</p>\n</li>\n</ol>\n<p>四、 第四階段：死守心臟------關鍵基礎設施（CI）24小時武裝巡守與防滲透</p>\n<p>針對喬裝外包維修人員或穿白袍偽裝人士的滲透手段，保安組必須實施重兵看守：</p>\n<ol>\n<li>\n<p><strong>CI 關鍵設施 24 小時雙人武裝巡守</strong>： -   保安組針對維持院區生存的四大命脈------<strong>地下室緊急發電機房、資訊伺服器機房、頂樓水塔、以及戶外液氧槽</strong>，增設 24 小時雙人武裝/防暴裝備巡邏哨。 -   巡邏哨配備金屬探測器與防爆毯，全天候盤查院內任何行跡可疑人士。</p>\n</li>\n<li>\n<p><strong>嚴格盤查白袍與外包喬裝者</strong>： -   嚴禁任何人以「外包維護」、「緊急施工」或「主管特助」等口頭藉口進入機房。 -   任何人（包含穿著白袍者）必須出示實體身分證與 HICS 發給之核定任務卡，並由保安員向指揮所進行雙重確認（Read-back 口覆），核對無誤後方能由保全持萬用鑰匙陪同進入。</p>\n</li>\n</ol>\n<p>五、 第五階段：協同毒水管線隔離、消防滅火與外部警政「支援接引」</p>\n<ol>\n<li>\n<p><strong>協同 O3 危害控制組（感管科）進行水源隔離</strong>： -   保安同仁協助封鎖頂樓水塔周邊，配合工務室<strong>實施水管閥門之「分段、分區關閉」</strong>，完全封鎖並隔離受不明化學物質污染的水塔輸出管道，防止毒水流入臨床高耗水重症紅區。 -   配合實施全院一般洗手間封閉與管制，引導一般避難民眾與輕症病患至指定避難區。</p>\n</li>\n<li>\n<p><strong>機房縱火之初期滅火（兼任滅火班）</strong>： -   保安組消防自衛編組在警報響起第一時間，配合工務人員攜帶乾粉滅火器，直奔受縱火的核心機房實施初期滅火，將火勢與濃煙侷限於防火區劃內。</p>\n</li>\n<li>\n<p><strong>外部警消軍之「支援接引」與動線淨空</strong>： -   大連路與莊敬街交叉口易在戰時塞車，保安組必須立即派員至<strong>「大連路與莊敬街交叉口巷口」</strong>實施外圍交通管制。 -   強勢驅離一切違停或閒雜車輛，確保救護車動線、消防車與警政保警中隊的武裝運兵車，能第一時間進入專屬卸補區，打通生命運輸通道。</p>\n</li>\n<li>\n<p><strong>災後監控與證據完整性移交</strong>： -   火勢撲滅且歹徒移交後，保安組須<strong>繼續派駐警衛監視核心機房與頂樓水塔現場</strong>，防範死灰復燃，並絕對防止無關人員破壞現場證據。 -   保安組長填寫「處理醫安事件報告表」與「警衛執勤紀錄簿」，並在 24 小時內將第一手物理證物（縱火與投毒殘留容器、警衛隨身密錄器錄製之影音光碟、CCTV 系統備份檔案）妥善列冊，移交給前來調查的屏東地檢署、警方鑑識小組與國安防諜調查單位管制偵辦。</p>\n</li>\n</ol>"}]}, {"role": "保安室", "entries": [{"scenario": "2-3", "title": "空襲威脅與B1啟用", "desc": "主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區。", "html": "<p>針對特別狀況\n2-3「主管機關通知可能發生空襲或遠距火力威脅；本院須啟用B1備援醫療空間及五處功能區」，此時醫院面臨極端戰火威脅與大面積的空間轉換，極易伴隨群眾恐慌推擠或有心人士的破壞。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>保安室（醫勤室保安組）「安全管制組（O4）」</strong>（或安全分支），肩負著建立防禦防線、維持就醫與避難秩序、以及保護關鍵設施的重任。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 建立「硬邊界防護（Hard Perimeter）」與極限門禁管制</strong></p>\n<ol>\n<li>\n<p><strong>極速物理封鎖</strong>：保安主管須會同警方與民防單位，立即封閉大連院區 80%\n    的出入口與側門，拉下鐵捲門，並架設充水式紐澤西護欄、蛇籠、拒馬或以工程車橫停作為防衝撞阻絕物。</p>\n</li>\n<li>\n<p><strong>單一檢傷武裝通道</strong>：全院僅保留急診車道作為唯一出入口。設立由武裝警力與院方高階護理師共同站哨的聯合檢查站（Check-point），執行嚴格的武器搜查與身分核對，杜絕非傷患或武裝人員進入醫療區。</p>\n</li>\n<li>\n<p><strong>交通與動線引導</strong>：確保救護車動線絕對順暢，迅速驅離急診前車道的違停或閒雜車輛。</p>\n</li>\n</ol>\n<p><strong>二、 地下備援空間防守與疏散動線管制</strong></p>\n<ol>\n<li>\n<p><strong>防守 B1 關鍵節點</strong>：配合備援醫療空間（檢傷行政區、臨時\n    ICU、臨時開刀房、恢復室及輕症病房）的開設，保安人員須重兵駐守地下一樓（B1）的<strong>樓梯間、電梯口、主要通道、車道出入口及各醫療功能區的出入口</strong>，防範未授權民眾誤闖醫療紅區。</p>\n</li>\n<li>\n<p><strong>防空避難引導與分流</strong>：在空襲警報發布或垂直疏散時，協助引導病人、員工與家屬的避難動線，進行人流管制與清點，確保向地下層轉送重症病患的路線不被恐慌群眾阻斷。</p>\n</li>\n</ol>\n<p><strong>三、 啟動防暴「內部封鎖（Lockdown）」與秩序維護</strong></p>\n<ol>\n<li>\n<p><strong>死守醫療資源</strong>：戰時極易發生暴民因恐慌而搶奪病床、麻醉藥品或抗生素。保安人員須在急診與\n    B1 檢傷區強力維持秩序，防範家屬或暴徒搶奪醫療物資。</p>\n</li>\n<li>\n<p><strong>防暴鎖定</strong>：若遭遇不理性群眾衝闖，保安組須迅速啟動「內部封鎖（Lockdown）」，降下防暴門、關閉全院電梯控制權，將醫護人員與重症病患鎖入安全隔離區，並由保全人員持防暴盾牌結陣死守，等待優勢警力支援。</p>\n</li>\n</ol>\n<p><strong>四、 執行反破壞（反滲透）武裝巡邏</strong></p>\n<ol>\n<li>\n<p><strong>保護地下 CI\n    關鍵設施</strong>：敵方第五縱隊（在地協力者）極可能混入破壞維生設備。保安組須針對醫院的心臟地帶------<strong>地下室緊急發電機房、伺服器資訊機房、頂樓水塔、戶外液氧槽</strong>等關鍵基礎設施（CI），增設\n    24 小時雙人武裝/防暴裝備巡邏哨。</p>\n</li>\n<li>\n<p><strong>盤查可疑人士</strong>：配備金屬探測器與防爆毯，嚴格盤查穿著白袍等可疑偽裝人士，防範爆裂物放置、電纜剪斷或水源投毒等毀滅性破壞。</p>\n</li>\n</ol>\n<p><strong>五、 外部警政聯繫與協調</strong>\n由安全管制主管負責與轄區警察局、消防局、保二總隊機動中隊保持密切的通報與聯繫。若現場發生保安人員無法獨立平息的群眾抗爭、武裝衝突或毀損破壞事件，應立即請求警力支援處理，以確保醫院內部核心醫療能持續運作。</p>"}]}, {"role": "警察/消防聯繫窗口", "entries": [{"scenario": "2-2", "title": "可疑跡象與避難人潮", "desc": "周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資。", "html": "<p>針對特別狀況2-2「周邊出現可疑無人機、不明人車或疑似偵蒐行為；社區避難人潮增加，部分人員欲進入院區尋求庇護或物資」，此情境（特別狀況3-1：駐警反制破壞演練）代表醫院面臨敵方滲透偵蒐、資源搶奪與群眾失控的複合型安全危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>「警察/消防聯繫窗口」</strong>（通常由聯絡官、行政副院長及醫勤室保安組協同擔任）是連結院內防護與外部武裝/救災力量的關鍵樞紐。</p>\n<p>其因應此極端威脅的具體作為如下：</p>\n<p><strong>一、 啟動緊急通報與請求優勢警力/武裝支援</strong></p>\n<ol>\n<li>\n<p><strong>緊急報案與警民連線</strong>：面對可疑無人機偵蒐、不明人車威脅及大量避難人潮，聯繫窗口須立即啟動「警民連線按鈕」，並撥打\n    110\n    向轄區派出所（如民和派出所）、屏東縣警察局及消防局（119）報案請求支援。</p>\n</li>\n<li>\n<p><strong>請求特種防護與防暴支援</strong>：依據預先簽署之支援協定，進一步聯繫保二總隊、機動中隊或在地民防單位，請求派遣優勢武裝警力到院協防，以反制無人機威脅並防範敵方第五縱隊（在地協力者）的破壞。</p>\n</li>\n</ol>\n<p><strong>二、 執行警消與保警之「支援接引」與動線引導</strong></p>\n<ol>\n<li>\n<p><strong>外援接引</strong>：當外部警察、防爆小組或消防人員抵達醫院時，聯繫窗口須指派專人於大門口（或大連路與莊敬街交叉口等指定位置）進行「支援接引」，提供院區平面圖，並引導武裝警力快速進入戰術位置。</p>\n</li>\n<li>\n<p><strong>淨空救護與消防動線</strong>：協調警方進行外圍交通與動線管制，強勢驅離違停或閒雜車輛，確保救護車轉送與消防車輛進出的專屬通道保持絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 協同建立「硬邊界（Hard Perimeter）」與武裝檢傷</strong></p>\n<ol>\n<li>\n<p><strong>物理封鎖配合</strong>：協助安全管制組會同支援的警力，實施院區「硬邊界」封鎖，關閉\n    80% 的出入口並架設拒馬、紐澤西護欄等實體阻絕物。</p>\n</li>\n<li>\n<p><strong>單一武裝檢查站</strong>：協調警力於僅存的急診單一通道，設立由「武裝警力與院方高階護理師」共同站哨的聯合檢查站（Check-point），執行嚴格的身分核對與武器搜查，強勢阻絕企圖進入搶奪物資或單純尋求庇護的非醫療需求群眾。</p>\n</li>\n</ol>\n<p><strong>四、 協同防暴鎖定（Lockdown）與現場蒐證移交</strong></p>\n<ol>\n<li>\n<p><strong>內部封鎖與死守</strong>：若群眾因恐慌欲搶奪抗生素、麻醉藥品而演變為暴動衝闖，聯繫窗口須立即通知警方現場失控，配合院內降下防暴門實施「內部封鎖（Lockdown）」，並請警方協防保護「安全隔離區（Safe\n    Haven）」內的重症病患與醫護人員。</p>\n</li>\n<li>\n<p><strong>情資與證據移交</strong>：將院方保全（密錄器、監視器）所錄下之可疑無人機、不明人車的影像，以及盤查可疑人士時發現的疑似爆裂物或破壞工具，妥善保全並移交給檢警調與防爆單位，作為後續鑑識、犯罪偵查與國安調查的證據。</p>\n</li>\n</ol>\n<p><strong>五、 協調避難人潮之轉移與外部溝通</strong></p>\n<ol>\n<li><strong>人潮疏導與轉移</strong>：針對湧入但被拒絕進入院區的社區避難群眾，聯繫窗口（聯絡官）須與地方政府災害應變中心（EOC）、村里長或警方協調，請求增派接駁車或指派警力，將群眾安全引導至政府指定的正規災民收容所，以降低群眾滯留院區周邊引發的推擠與衝突風險。</li>\n</ol>"}, {"scenario": "2-8", "title": "財務與保險理賠處置", "desc": "機電棟爆炸事件後續之財務損失估算、保險理賠申請與經費籌措等行政處置。", "html": "<p>在屏東基督教醫院（屏基）大連院區面臨「兩名喬裝成外包維修人員的特工（第五縱隊），企圖闖入核心機房與頂樓水塔投放燃燒劑與不明化學物質」的複合型實體破壞、生化污染（CBRN）與資安癱瘓危機時，醫院將立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>。</p>\n<p>在 HICS\n架構下，<strong>「警察／消防聯繫窗口」</strong>通常由<strong>聯絡官（行政副院長黃雅芳／管理部部長張隆鐘）</strong>與<strong>安全管制組（醫勤室保安組組長王建文／陶大屏）</strong>協同擔任。他們是連結院內應變防護與外部武裝警政、消防救災力量的核心樞紐。</p>\n<p>針對此極端危安與投毒威脅，警察／消防聯繫窗口將採取以下<strong>五大具體因應作為</strong>，在極限狀態下引入公權力與救災資源，死守醫院安全防線：</p>\n<p>一、 啟動「警民連線」與緊急報警，請求優勢武裝與特種防護支援</p>\n<ol>\n<li>\n<p><strong>極速啟動警民連線與撥打 110</strong>：聯繫窗口在接獲中控室或巡檢同工通報發現特工滲透與破壞的第一時間，立即按下設置於急診或中控室的<strong>「警民連線按鈕」</strong>（本院每月均與轄區<strong>民和派出所</strong>進行連線測試，確保通訊無阻）；同時迅速撥打 110 與 119，向警方與消防局報案，明確指出：<em>「本院（大連路 60 號）遭遇恐怖破壞，歹徒已在核心機房縱火、頂樓水塔投毒，保全已前往現場壓制，請求武裝警力、防爆小組與消防水車極速進院支援」</em>。</p>\n</li>\n<li>\n<p><strong>請求保警與特種力量協防</strong>：依據平時簽署之相互支援協定，立即聯繫<strong>保二總隊、機動中隊或在地民防單位</strong>，請求派遣優勢武裝警力到院協防，反制潛在的無人機威脅並防範敵方其餘在地協力者進行二次破壞。</p>\n</li>\n<li>\n<p><strong>通報衛生局及國安 EOC</strong>：因涉及國家關鍵基礎設施（CI）受滲透破壞，聯絡官須於通報時限內，迅速通報地方衛生局、高屏區緊急醫療應變中心（EOC），並由其向上通報至衛福部及國安系統。</p>\n</li>\n</ol>\n<p>二、 執行警消與保警之「支援接引」與「動線絕對淨空」</p>\n<ol>\n<li>\n<p><strong>外援引導與情資對接（Runner 接引）</strong>：大連路與莊敬街交叉口在災時極易壅塞，聯繫窗口須指派專人（如滅火組長或資深保全）穿著螢光背心，至院區外圍關鍵路口（<strong>大連路與莊敬街交叉口巷口</strong>）進行<strong>「支援接引」</strong>。在警政、防爆小組與消防人員抵達時，第一時間提供院區實體藍圖，引導武裝警力及防爆機器人快速突入核心機房與水塔現場。</p>\n</li>\n<li>\n<p><strong>淨空救護與救災動線</strong>：協調趕到現場的交通警察實施外圍交通管制，強勢驅離大連路與急診車道上的所有違停及閒雜車輛，確保救護車轉送、消防車輛進出的專屬通道（特別是靠近火場的入口或消防連結口）保持絕對暢通。</p>\n</li>\n</ol>\n<p>三、 協同建立「硬邊界（Hard Perimeter）」防護與單一武裝檢查站</p>\n<ol>\n<li>\n<p><strong>物理封鎖院區硬邊界</strong>：聯繫窗口協助安全管制組，會同前來支援的警力實施大連院區的<strong>「硬邊界防護」</strong>：<strong>立即封閉院區 80% 的出入口與側門</strong>，拉下防火鐵捲門，架設充水式紐澤西護欄、蛇籠、拒馬，並調度院方大型工程車橫停於非必要出入口作為防衝撞阻絕物。</p>\n</li>\n<li>\n<p><strong>設立「單一檢傷武裝通道」</strong>：全院僅保留急診車道作為唯一出入口。聯繫窗口協調進駐之武裝警力，與院方高階護理師共同於<strong>「聯合檢查站（Check-point）」</strong>站哨。實施最嚴格的身分核對與金屬探測器安全搜查，未配戴「本院專屬識別背心及 HICS 任務卡」之人員一律不得進入；強勢阻絕非醫療需求的恐慌民眾強闖，保護院內核心醫療空間。</p>\n</li>\n</ol>\n<p>四、 協同啟動防暴鎖定（Lockdown）與犯罪物證保全移交</p>\n<ol>\n<li>\n<p><strong>協同防暴鎖定與安全隔離</strong>：若歹徒同夥或受投毒假訊息煽動之不理性暴民企圖強闖急診室搶奪麻醉藥品，聯繫窗口立即將現場失控情資同步給警方。配合急診醫護一鍵啟動院內<strong>「內部封鎖（Lockdown）」</strong>，瞬間降下急診防暴門並強制關閉全院電梯控制權。請警方與保全持盾牌結陣死守，將急診醫護與重症病患保護在預先規劃的<strong>「安全隔離區（Safe Haven）」</strong>內。</p>\n</li>\n<li>\n<p><strong>犯罪證據保全與移交法辦</strong>：特工縱火與投毒屬於重大刑事與國安事件。聯繫窗口配合計畫部文件紀錄組（P3），將保全隨身密錄器、中控室監視器錄下之特工面貌、喬裝特徵及被制服過程之影音檔案妥善封存；並確保現場遺留之燃燒劑罐體、化學物質容器等實體證物不被觸碰破壞，完整移交給檢警調與國安鑑識單位，作為後續偵辦與國家安全調查之起訴證據。</p>\n</li>\n</ol>\n<p>五、 協調外部專家實施「水質毒化偵檢」與「避難人潮引流」</p>\n<ol>\n<li>\n<p><strong>協調環境部毒災隊與水質鑑定</strong>：頂樓水塔遭投放不明化學物質，聯繫窗口（聯絡官）須立即對接進院之<strong>屏東縣環保局、環境部毒災應變隊與毒物專家</strong>，請求其攜帶專業移動式檢測設備，針對受污染水塔與自來水管線實施水質採樣、污染物定性定量檢測，並指導院內危害控制組進行後續管線物理隔離與除污作業。</p>\n</li>\n<li>\n<p><strong>社區避難人潮之轉移與對外溝通</strong>：針對因恐慌聚集在院外、欲進院尋求庇護與物資的社區群眾，聯絡官須立即與地方政府災害應變中心（EOC）、村里長或警方協調，請求增派接駁車輛或指派警力，<strong>將避難人潮引導、轉移至政府指定的正規災民收容所</strong>，避免群眾在院外聚集推擠衍生次生維安衝突，確保急診車道絕對淨空。</p>\n</li>\n</ol>"}]}, {"role": "救護車與外部供應商", "entries": [{"scenario": "2-1", "title": "物流配送延遲", "desc": "燃油、醫療氣體、藥材、血液、飲水、膳食及耗材配送延遲；員工到勤受交通影響，病人轉送不確定性提高。", "html": "<p>針對「特別狀況\n2-1：物資配送延遲、交通受阻、病人轉送不確定性提高」的孤島/資源匱乏情境，依據本院緊急應變計畫與城鎮韌性（CI）演習規範，<strong>「救護車」與「外部供應商」</strong>的因應作為與具體措施如下：</p>\n<p>一、 外部供應商（物資、血液、維生設備與廠商支援）因應作為</p>\n<p>當既有供應鏈受阻，院方（採購小組、資材組、工務室）將啟動緊急應變機制與外部供應商進行協調，具體作為包括：</p>\n<ol>\n<li>\n<p><strong>血液與相關醫材之緊急運補與預先囤儲</strong></p>\n<ul>\n<li>\n<p><strong>提早調高庫存與分散囤儲</strong>：血液基金會應於預期動員令發布前72小時內調高庫存目標至10天，並於24小時內將血液及相關醫材（如空血袋、檢驗試劑）提前分散囤儲至本院（重度級急救責任醫院）。</p>\n</li>\n<li>\n<p><strong>政府徵用車輛跨區運送</strong>：當遭遇聯外交通中斷或無法抵達時，血液供應商將透過「縣市聯合應變指揮中心」協調，由地方衛生局調度、徵用車輛（或軍警消車輛）進行血品與醫材的緊急運補。</p>\n</li>\n<li>\n<p><strong>醫材廠商調節生產</strong>：國內醫療器材廠商須配合衛生福利部食品藥物管理署之統籌調度，調節優先生產需求醫材，或進行專案輸入。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>啟動在地替代供應商與聯防支援</strong></p>\n<ul>\n<li>\n<p><strong>啟動替代廠商</strong>：面對常規物流延遲，採購室將立即聯繫不受長途交通阻斷影響的「在地替代供應商」。例如：</p>\n<ul>\n<li><strong>膳食/飲水中斷</strong>：緊急聯絡在地供應商（如嘉軒美食有限公司），若遇緊急斷糧，第一優先協調本院便利商店（7-11）全力支援供糧；缺水時聯絡在地水商（如賀屏企業等）購買礦泉水或山泉水。</li>\n</ul>\n</li>\n<li>\n<p><strong>區域聯防調度</strong>：向屏東縣市簽有醫療支援協定的醫院（如部立屏東醫院、寶建醫院、安泰醫院、屏東榮民總醫院等）請求攸關性命之藥品及衛材緊急調度借用。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>維生系統維護廠商之緊急支援</strong></p>\n<ul>\n<li>\n<p><strong>緊急搶修出勤</strong>：當高壓供電、緊急發電機、UPS（不斷電系統）或醫療氣體（如氧氣槽）發生異常時，工務室會立刻通知維護廠商（如台電、明威發電機、信光氧氣等），要求立即派員支援搶修。</p>\n</li>\n<li>\n<p><strong>備援應變</strong>：若因交通受阻導致維修廠商無法及時抵達，本院將啟動系統強制手動切換（如手動切換ATS發電機供電、切換備用氧氣鋼瓶等）以撐過孤島時期。</p>\n</li>\n</ul>\n</li>\n</ol>\n<p>二、 救護車（轉送與緊急救護）因應作為</p>\n<p>在交通受阻與轉送不確定性提高的狀況下，救護車的調度、動線與後送機制須採取極限應變措施：</p>\n<ol>\n<li>\n<p><strong>動線淨空與實體管制</strong></p>\n<ul>\n<li>\n<p><strong>專屬救援通道</strong>：嚴格劃分車輛動線，救護車的接運疏散區一律以「急診室大門出口」為專用通道。</p>\n</li>\n<li>\n<p><strong>人車分流</strong>：實施硬邊界防護，由警衛/安全管制組強勢驅離違停或閒雜車輛，確保救護車不論是在運送傷患或物資時，動線皆保持絕對暢通。提早出院的輕症病人則引導使用「醫院大廳出口」，避免與救護車急重症動線衝突。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>跨院際/跨單位的車輛極限調度</strong></p>\n<ul>\n<li>\n<p><strong>院內車輛整備</strong>：醫勤室運輸組隨時整備本院現有的 4 輛救護車及 10\n    輛中巴/行政運輸車，於急診室前待命。</p>\n</li>\n<li>\n<p><strong>請求外部車輛支援</strong>：若面臨大量傷患或需疏散病人，且本院救護車能量不足時，應即刻透過高屏區緊急醫療網（EOC）及屏東縣衛生局，請求調度外部救護車支援。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>病患轉送與交接之安全確認</strong></p>\n<ul>\n<li>\n<p><strong>確認床位再出發</strong>：因轉送不確定性提高，救護車出發前，醫務部與聯絡官必須先與接收醫院（如區域聯防醫院）確認是否具備足夠的收治量能（Surge\n    Capacity）。</p>\n</li>\n<li>\n<p><strong>隨車物資與病歷移交</strong>：救護車轉運病人時，必須確保攜帶足夠的藥物、靜脈輸液、血液製品（避免接收端物資耗竭），並由隨車人員確實移交病患名冊、病歷摘要、手圈及檢驗報告，留下完整的轉運紀錄以供後續追蹤。</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>院外意外事件之緊急外派</strong></p>\n<ul>\n<li>若接獲衛生局要求，急診部將調派 1 輛救護車，搭配 1\n    名醫師（急診或病房值班）、1-2 名護理師及 1\n    名司機，攜帶急救物資前往院外災害現場進行支援救護。</li>\n</ul>\n</li>\n</ol>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨極其龐大的病患轉院與後送需求，運輸量能將受到極限考驗。</p>\n<p>在\nHICS（醫院事故指揮系統）架構與本院病人疏散重置計畫中，關於<strong>「救護車（車輛運輸與調度）」</strong>的具體因應作為與管理規範如下：</p>\n<p><strong>一、 救護車之統籌調度與外部資源徵用</strong></p>\n<ol>\n<li>\n<p><strong>統一調派窗口</strong>：本院所有運輸車輛（包含救護車及行政運輸車）之調派，統一由總務部轄下的「醫勤室運輸組」負責統籌，所有車輛須於急診室前或指定地點待命。</p>\n</li>\n<li>\n<p><strong>院內量能盤點</strong>：第一時間盤點院內可用的運輸資源，本院現有救護車共 4\n    輛，可獲支援之救護車共 2 輛；另外備有中巴 15 人座 4 輛及 8\n    人座行政車輛 6 輛，作為輔助疏散工具。</p>\n</li>\n<li>\n<p><strong>請求外部緊急調度</strong>：在大量病患重置撤離時，若接收病人的救護車數量不足，指揮中心（聯絡官）或急診室應立即向屏東縣政府衛生局緊急醫療網（EOC）或縣市聯合應變中心請求車輛徵用與調度協助，確保有足夠的救護車協助病患轉院。</p>\n</li>\n</ol>\n<p><strong>二、 設立救護車專屬「接運疏散區」與動線分流</strong>\n為避免撤離時現場陷入混亂，必須對救護車的進出動線進行嚴格規範：</p>\n<ol>\n<li>\n<p><strong>急診大門專屬接運</strong>：除特殊考量外，<strong>「醫院急診室大門出口（急診停車場出口）」被設定為救護車專屬的接運疏散區</strong>。</p>\n</li>\n<li>\n<p><strong>嚴格動線分流</strong>：實施嚴格的人車與動線分流。將需要救護車轉運的重症或臥床病患安排於急診車道；而提早出院或可返家的輕症病患，則引導至「門診大廳大門出口」搭乘接駁車，私人車輛則以「恩慈大樓旁車道」為接運區，藉此徹底分流，避免與救護車動線發生交岔而造成延誤。</p>\n</li>\n<li>\n<p><strong>交通引導與淨空</strong>：由醫勤室保安組（警衛）負責交通管制。主動引導院內外救護車抵達接駁區，並驅離急診前車道的違停或閒雜車輛，維持救護車進出動線的絕對暢通。</p>\n</li>\n</ol>\n<p><strong>三、 救護車轉送對象之優先級別</strong>\n依據「反向檢傷」與病人分級結果，救護車的運輸資源必須用在刀口上：</p>\n<ol>\n<li>\n<p><strong>保留給急重症病患</strong>：救護車資源優先保留給「高度照護（危急或依賴維生設備）」以及無法自行移動的「一般住院（臥床）」病患。</p>\n</li>\n<li>\n<p><strong>跨院醫療後撤</strong>：這些急重症病患將經由急診檢傷後，由救護車轉送至屏東各支援協定之合作醫院，或具備重症收治能力的醫療機構繼續接受照護。</p>\n</li>\n</ol>\n<p><strong>四、 確保隨車「戰備物資與醫療紀錄」之無縫交接</strong>\n救護車不僅是運輸工具，更是移動的維生病房。在病患上救護車轉送的過程中，必須確保以下配套：</p>\n<ol>\n<li>\n<p><strong>醫療急救物資隨車</strong>：針對轉運的重症病患，必須確保有足夠量的急救藥物、靜脈輸液或血液製品<strong>與病人一起上救護車運送</strong>至接收醫院，避免在轉送途中或抵達接收端時發生醫藥存量短時間內耗竭的致命危機。</p>\n</li>\n<li>\n<p><strong>醫療文件與動向紀錄</strong>：每位登上救護車轉運的病人，護理與病歷人員須確認其「轉診單、病歷摘要、用藥紀錄」皆隨車交接；同時必須詳實登記病患上了哪一輛救護車、車輛資料、隨行人員及接收醫院名稱，確保病患動向能被精準追蹤。</p>\n</li>\n</ol>\n<p>醫療照護組如何具體執行病人分級？</p>\n<p>後勤部門如何調度車輛與物資支援？</p>\n<p>行政財務部如何落實戰時記帳豁免機制？</p>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認醫院所在區域即將淪為「主戰區」\n，且指揮中心下達啟動 <strong>HICS\n第三階段「全面撤離與量能重置」</strong> 的預防性全面撤離指令時 ：</p>\n<p>在 HICS\n應變體系下，救護車及相關運輸載具的調度與管制，是維持全院最脆弱的「高度照護重症病患」與「一般臥床病患」生命線不中斷的運送關鍵\n。</p>\n<p>本院救護車調度與運輸組（隸屬於 <strong>總務部轄下的「L1 勤務組」</strong> ） ，將協同執行部（醫療照護組、安全管制組）與計畫部（狀況分析小組）\n，啟動以下<strong>五大範疇的極限轉運、動線管制、隨行救命資產移交與實兵撤離作為</strong>：</p>\n<p>一、 救護車輛之「極限整備、調度與外部資源徵用」</p>\n<ol>\n<li>\n<p><strong>統一調派窗口開設</strong>： 本院所有運輸車輛（包含救護車及行政運輸車）之調派，<strong>統一由總務部轄下的「醫勤室運輸組」負責統籌</strong>，所有車輛立即於急診室前或指定地點待命 。</p>\n</li>\n<li>\n<p><strong>院內可用車輛極限盤點</strong>： 醫勤室運輸組第一時間召回全體司機並盤點可用運輸資源 ： -   <strong>本院現有救護車</strong>：共 <strong>4 輛</strong> 。 -   <strong>本院可獲得支援之外部救護車</strong>：共 <strong>2 輛</strong> 。 -   <strong>行政輔助運輸車</strong>：<strong>15人座中巴 4 輛</strong>，以及 <strong>8人座行政車 6 輛</strong>（主要用於轉運第二類、第三類等可扶持或輕症病患） 。</p>\n</li>\n<li>\n<p><strong>請求外部緊急救護車輛調度</strong>： 預防性撤離涉及上百名住院病患與大量重症患者。若評估本院救護車量能不足，聯絡官（行政副院長 黃雅芳）或急診室應<strong>立即向屏東縣政府衛生局緊急醫療網（EOC）或縣市聯合應變中心請求車輛徵用與調度協助</strong>，爭取更多簽證救護車協助轉院 。</p>\n</li>\n</ol>\n<p>二、 設立救護車專屬「接運疏散區」與鋼鐵般的動線分流</p>\n<p>為避免撤離時現場人車交岔、堵塞通道而延誤重症病患轉運黃金期，救護車組配合保安組（安全管制主管\nO4）實施最嚴格的交通管制 ：</p>\n<ol>\n<li>\n<p><strong>急診大門專屬接運區（救護車專用通道）</strong>： 除特殊考量外，<strong>「醫院急診室大門出口（急診停車場出口）」被設定為救護車專屬的接運疏散區</strong> 。僅允許編碼列冊之救護車停靠，作為高度照護及臥床病患垂直轉移上車的唯一吞吐咽喉 。</p>\n</li>\n<li>\n<p><strong>鋼鐵人車分流管制</strong>： -   <strong>救護車道淨空</strong>：由醫勤室保安組（警衛）實施交通管制 ，強勢驅離急診前車道的違停或閒雜車輛 。 -   <strong>接駁車分流</strong>：提早出院或可返家的第一類輕症病患，一律引導至<strong>「醫院門診大廳大門出口」</strong>搭乘中巴接駁車 。 -   <strong>私人車分流</strong>：第二類有家屬接送之需扶持病患，一律引導至<strong>「恩慈大樓旁車道」</strong>進行快速裝載 。 -   藉此物理分流，徹底防範其餘人車阻礙救護車的緊急後送動線 。</p>\n</li>\n</ol>\n<p>三、 救護車轉送對象之優先級別與「一對一 A-B 戰術配對」隨行</p>\n<p>救護車資源必須在主戰區炮火逼近的時效限制下用在刀口上 ：</p>\n<ol>\n<li>\n<p><strong>保留給急重症病患</strong>： 救護車運輸資源優先保留給 <strong>Class 4 高度照護病患（危急或依賴維生設備者，如 ICU、插管使用可攜式呼吸器、洗腎病患）</strong> 以及無法自行移動的 <strong>Class 3 一般住院（臥床）病患</strong> 。</p>\n</li>\n<li>\n<p><strong>執行 A-B 戰術配對（持續照護）</strong>： 配合計畫部與醫務部，將<strong>「醫事隨車撤離功能編組 A（隨車醫護）」與「需撤離病人分組 B（重症病患）」進行一對一配對</strong> 。隨車指派主治醫師及專責護理師，隨同救護車及擔架全程守護重症病人，確保在主戰區在途運送期間的<strong>醫療持續照護</strong> 。</p>\n</li>\n</ol>\n<p>四、 確保隨車「戰備物資與防水醫療紀錄」之無縫點交</p>\n<p>救護車轉運重症病人時，必須隨車攜帶足夠的藥物、靜脈輸液、血液製品與交接病歷，防範因路途塞車或戰火阻斷而使病患在抵達接收端前陷入維生耗材見底的致命危機\n：</p>\n<ol>\n<li>\n<p><strong>72小時醫療急救物資隨車</strong>： 後勤資材組與藥劑科配合，隨高度照護與臥床病人移上救護車時，<strong>必須與病人同車運送足量救命藥物、無菌靜脈林格氏液及備用血品</strong> 。同時配備轉送所必需之可攜式維生裝備（如可攜式生理監視器、氧氣小鋼瓶，並精算氧氣消耗速率） 。</p>\n</li>\n<li>\n<p><strong>醫療文件隨車物理綁定</strong>： 上救護車前，護理與病歷人員須確認病患的手寫紙本<strong>「轉診單、紙本轉院病歷摘要、藥物治療紀錄與用藥處方箋」統一裝入防潮防水之病歷夾鏈袋中，並強制物理綁定（如貼上或綁好）於病患擔架旁隨車交接</strong> 。</p>\n</li>\n<li>\n<p><strong>登車病人動向精準追蹤</strong>： 每位登上救護車轉運的病人，運輸組與病歷登記哨必須<strong>詳實登記病患上了哪一輛救護車、車輛資料、車牌號碼、隨車醫護姓名及接收醫院名稱</strong>，隨時向指揮所更新，確保在撤離混亂中「病患一個都不能少」 。</p>\n</li>\n</ol>\n<p>五、 落實跨院「醫師對醫師醫療交班」與床位安全確認</p>\n<ol>\n<li>\n<p><strong>確認可用床位再出發</strong>： 因撤離轉送不確定性提高，救護車出發前，聯絡官（黃雅芳副院長）必須<strong>先與接收之合作聯防醫院確認是否具備足夠的收治量能（Surge Capacity）與病床</strong> ，避免病患過度集中導致單一接收醫院癱瘓 。</p>\n</li>\n<li>\n<p><strong>執行跨院之詳細「醫療交班（Handover）」</strong>： 在送上救護車轉院前，急診轉運區與病房醫師必須<strong>透過電話或備援無線電，與衛生局（EOC）排定接收之合作醫院醫師完成詳細的交班</strong> ，確認病患的病況、隨車所需維生設備及轉診接收細節，保證病患生命安全無縫對接 。</p>\n</li>\n<li>\n<p><strong>院外意外事件之緊急外派備援</strong>： 若預防性撤離期間，接獲衛生局要求，急診部隨時準備調派 <strong>1 輛救護車，搭配 1 名急診或值班醫師、1 至 2 名護理師及 1 名司機</strong>，攜帶足夠急救物資前往院外災害現場進行支援救護 。</p>\n</li>\n</ol>"}]}, {"role": "公共事務/發言窗口", "entries": [{"scenario": "1-2", "title": "假訊息與恐慌湧入急診", "desc": "民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊。", "html": "<p>針對特別狀況1-2「民眾因假訊息、慢性病藥品搶購、交通事故及心理恐慌大量湧入急診；家屬要求提早領藥、住院或查詢撤離資訊」等複合性危機，<strong>公共事務／發言窗口（主要由醫療副院長擔任發言人，資源發展中心協助）</strong>在\nHICS（醫院事故指揮系統）中扮演著穩定民心、澄清謠言及保護醫療前線不受媒體干擾的關鍵角色。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 統一對外發言與反制假訊息（闢謠）</strong></p>\n<ol>\n<li>\n<p><strong>接掌發言權</strong>：由醫療副院長擔任「發言官（PIO）」，作為本院對內外訊息發佈的唯一官方統一窗口，避免多頭馬車導致資訊混亂。</p>\n</li>\n<li>\n<p><strong>迅速發布澄清新聞稿</strong>：面對假訊息引發的恐慌與搶藥潮，資源發展中心須迅速依據計畫部提供的精確數據撰擬新聞稿，經院長（指揮官）核定後發布。明確說明醫院真實的收治量能、慢性病藥品存量狀況以及提早領藥的規範，以防堵謠言與不當消息傳播，避免社會恐慌加劇。</p>\n</li>\n<li>\n<p><strong>輿情監測與即時應處</strong>：專人負責監測各大報紙、電子媒體、臉書官網的報導文字、影像及民眾回應。一旦發現媒體報導不實或有假訊息，必須立即要求更正，積極處理以穩定民心。</p>\n</li>\n</ol>\n<p><strong>二、 設立媒體接待區與嚴格採訪管制</strong></p>\n<ol>\n<li>\n<p><strong>實體空間隔離</strong>：為避免媒體記者湧入急診室干擾前線大量傷患搶救作業，必須立即設立專屬的「新聞簡報中心」或「媒體接待區」（如約翰大樓\n    6 樓簡報室、恩慈大樓 1 樓或指定之室外區域）。</p>\n</li>\n<li>\n<p><strong>嚴格採訪管制與隱私保護</strong>：主動向媒體宣告採訪限制，嚴禁媒體進入急診室、手術室等正在施行醫療作業的重症區。任何拍攝必須由接待人員陪同，並應隔離血腥、暴露畫面；若需採訪病人，必須會同社工人員事先徵詢病人或家屬同意並簽署同意書，絕對捍衛病人隱私與前線安寧秩序。</p>\n</li>\n</ol>\n<p><strong>三、 研擬家屬說帖與支援內部溝通</strong></p>\n<ol>\n<li>\n<p><strong>確立家屬詢答原則</strong>：針對家屬急迫要求提早領藥、住院或查詢撤離資訊的龐大壓力，發言官需與指揮中心確認統一的「家屬詢答原則」與「家屬說帖」規範。</p>\n</li>\n<li>\n<p><strong>對接前線安撫</strong>：將上述統一的說帖與政策，傳遞給第一線的社工室與家屬接待區人員，確保院方對所有恐慌家屬的解釋與處置標準一致，減少醫病衝突。</p>\n</li>\n</ol>\n<p><strong>四、 定期召開記者會與事件紀錄</strong></p>\n<ol>\n<li>\n<p><strong>定期公開說明</strong>：在危機事件期間，發言官應在新聞簡報中心定時召開記者會，主動向媒體說明醫院目前的處置進度、傷患收治現況及善後計畫，藉由公開透明的資訊降低外界的負面臆測。</p>\n</li>\n<li>\n<p><strong>蒐證與存檔</strong>：確保記者會全程錄音錄影存證，並將危機事件相關的新聞剪報、影像畫面予以掃描、存檔，作為後續檢討或處理爭議的佐證資料。</p>\n</li>\n</ol>"}, {"scenario": "1-3", "title": "謠言與系統延遲", "desc": "社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲。", "html": "<p>針對特別狀況1-3「社群媒體流傳本院停診、缺藥、遭攻擊或拒收病人等不實訊息；掛號、批價、藥局、檢驗或影像系統出現延遲（疑似資安攻擊）」，此為典型的「輿論戰（假訊息）」與「資訊戰（系統當機）」複合危機。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>公共事務部／資源發展中心</strong>（主要由醫療副院長擔任發言官，資源發展中心負責執行協助）肩負穩定民心、反制假訊息、統一內外部溝通及處理媒體關係的關鍵任務。其具體因應作為如下：</p>\n<p><strong>一、 統一對外發言與迅速闢謠（反制假訊息）</strong></p>\n<ol>\n<li>\n<p><strong>接掌單一發言權</strong>：由醫療副院長擔任「發言官（A1）」，作為本院組織內外部訊息發布的唯一官方管道，避免多頭馬車導致外界資訊混亂。</p>\n</li>\n<li>\n<p><strong>獲取真實數據並撰擬新聞稿</strong>：資源發展中心承辦人須迅速對接計畫部與資通簡報組（資訊室），獲取全院真實的病床收治量能、藥品庫存及系統搶修進度。據此撰擬澄清新聞稿，明確反駁「停診、缺藥、拒收病人」等不實謠言。</p>\n</li>\n<li>\n<p><strong>核定與發布</strong>：新聞稿須送呈指揮官（院長）核定後，統一對外發布，以客觀事實防堵不當消息與假訊息傳播。同時對外公告系統延遲期間的「就醫替代流程（如紙本掛號、門急診分流）」，降低民眾因資訊不透明產生的恐慌。</p>\n</li>\n</ol>\n<p><strong>二、 輿情監測與社群媒體反制</strong></p>\n<ol>\n<li>\n<p><strong>全方位輿情監測</strong>：資源發展中心須派專人持續監測各大報紙、電子媒體、臉書（Facebook）官網的報導文字、影像及民眾回應。</p>\n</li>\n<li>\n<p><strong>即時要求更正</strong>：一旦發現媒體報導不實或有惡意煽動的假訊息，必須立即主動要求更正，妥慎處理負面報導及不實訊息，積極應處以穩定民心。</p>\n</li>\n</ol>\n<p><strong>三、 設立媒體簡報中心與嚴格採訪管制</strong></p>\n<ol>\n<li>\n<p><strong>開設新聞簡報中心</strong>：為避免媒體湧入急診或門診干擾前線的「紙本降級（Downtime）」人工作業，應於指定地點（如約翰大樓6樓簡報室、恩慈大樓1樓或恩慈大樓B1員工運動中心）設立「新聞簡報中心」或「媒體接待區」。</p>\n</li>\n<li>\n<p><strong>定時召開記者會</strong>：由發言官主持記者會（最晚於平面媒體截稿時間晚上7時前舉行），主動接受媒體詢答，及時將事件處置方式與系統修復進度告知媒體，消除外界負面臆測。</p>\n</li>\n<li>\n<p><strong>嚴格管制與保護隱私</strong>：主動向媒體宣告採訪限制，嚴禁媒體進入正在施行醫療作業的區域。採訪及拍攝必須由接待人員陪同，若涉及病人，必須會同社工人員徵詢病人或家屬同意並簽署「病患肖像權使用暨媒體採訪同意書」，絕對捍衛病人隱私與前線秩序。</p>\n</li>\n</ol>\n<p><strong>四、 彙整家屬說帖與紀錄保存</strong></p>\n<ol>\n<li>\n<p><strong>確立統一說帖</strong>：針對民眾與家屬因假訊息或久候產生的疑慮，資源發展中心需協助擬定「家屬詢答說帖」，並傳遞給第一線的批掛櫃檯與社工室，確保全院對病患的解釋標準一致。</p>\n</li>\n<li>\n<p><strong>影音與紀錄存檔</strong>：確保記者會全程錄音錄影存證；並將危機事件相關的新聞剪報、影像畫面予以掃描、下載存檔，作為後續檢討或處理潛在醫療/法律爭議的佐證資料。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這不僅是一場嚴峻的資訊安全危機，更極可能伴隨敵方散播恐慌的「認知作戰」。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>公共事務部（本院編制為院長室轄下之「資源發展中心/發展組」）「發言人\n/\n公關官（PIO，由醫務副院長擔任）」</strong>。面對此國家級網路攻擊與勒索威脅，公共事務部的具體因應作為如下：</p>\n<p><strong>一、 擔任危機溝通樞紐，反制「認知作戰」與發布安定聲明</strong></p>\n<ol>\n<li>\n<p><strong>掌握精確資安情資</strong>：資源發展中心須密切與資訊室（資通簡報組）及指揮官保持聯繫，隨時掌握系統癱瘓範圍、搶修進度以及院方啟動「紙本降級（Downtime）」的備援狀況。</p>\n</li>\n<li>\n<p><strong>撰擬緊急新聞稿與聲明</strong>：境外勢力的駭客攻擊往往伴隨著假訊息的認知作戰，意圖製造社會混亂。公共事務部須迅速撰擬緊急新聞稿，並送呈指揮官核定。聲明中必須<strong>明確傳遞「醫療不中斷」的安定訊息</strong>，向大眾說明醫院雖遭受網路攻擊，但已全面啟動緊急紙本備援機制，急診、手術等核心醫療照護並未停擺，藉此安撫病患與家屬。</p>\n</li>\n<li>\n<p><strong>宣告拒絕勒索之堅定立場</strong>：配合國家關鍵基礎設施（CI）防護原則與院方決策，適度對外表明醫院拒絕向境外敵對勢力妥協與支付贖金的底線，展現醫院防護的韌性與決心。</p>\n</li>\n</ol>\n<p><strong>二、 設立「新聞簡報中心」與實施嚴格媒體管制</strong></p>\n<ol>\n<li>\n<p><strong>設立媒體專區</strong>：在資訊癱瘓的混亂中，為避免媒體記者湧入急診室或門診干擾前線的「紙本降級」人工作業，必須迅速於指定地點設立「新聞簡報中心」或媒體接待區。</p>\n</li>\n<li>\n<p><strong>統一對外發布新聞</strong>：安排發言人（醫務副院長）主持記者會，正式發布新聞稿並接受媒體詢答。透過單一官方窗口的統一發言，防堵不當的負面臆測與社會恐慌。</p>\n</li>\n<li>\n<p><strong>嚴控採訪動線與保護隱私</strong>：協同醫勤室保安組（安全管制主管），嚴格限制媒體進入正在施行無網醫療作業的區域。防止媒體拍攝到當機的電腦螢幕或混亂的手寫作業畫面而被做文章；若需採訪，必須由接待人員陪同，並絕對保護病患個資與隱私。</p>\n</li>\n</ol>\n<p><strong>三、 執行全方位輿情監測與即時闢謠</strong></p>\n<ol>\n<li>\n<p><strong>監測網路與社群輿情</strong>：DDoS 攻擊與系統當機極易在網路上發酵。公共事務人員必須持續監測、收集各大報紙、電子媒體報導，以及臉書（Facebook）等網路社群與官網的民眾回應。</p>\n</li>\n<li>\n<p><strong>即時反制錯假資訊</strong>：若發現網路上出現「醫院全面癱瘓、病患遭拒收、病歷遭竊外洩」等不實謠言，必須立即回報指揮官，並要求媒體更正或透過官方數位管道發布澄清聲明，以穩定醫療運作的外部環境。</p>\n</li>\n</ol>\n<p><strong>四、 研擬「家屬詢答說帖」，支援前線醫病溝通</strong></p>\n<ol>\n<li>\n<p><strong>確立統一說帖</strong>：系統大當機必然導致看診、領藥與檢驗流程嚴重延遲。公共事務部需協助社工室與護理部擬定統一的「家屬詢答說帖」。</p>\n</li>\n<li>\n<p><strong>支援前線安撫</strong>：將說帖傳遞給第一線的批掛櫃檯、急診檢傷區與社工人員，確保全院同仁在向焦躁久候的病患與家屬解釋「紙本降級」替代流程時，能傳遞一致且安心的資訊，有效降低醫病衝突與暴力滋擾的風險。</p>\n</li>\n</ol>\n<p><strong>五、 記錄與存查媒體發布及事件資料</strong></p>\n<ol>\n<li>\n<p><strong>全程紀錄與存證</strong>：確保對外記者會與發言說明過程皆全程錄音錄影存證。</p>\n</li>\n<li>\n<p><strong>歷史資料保全</strong>：負責彙總每日的新聞剪報、發言工作日誌與影像畫面，將相關資料掃描、下載後妥善存檔。這些紀錄將作為日後國家資安調查、演習評核或危機處理檢討的關鍵佐證紀錄。</p>\n</li>\n</ol>"}, {"scenario": "1-4", "title": "資安攻擊與勒索軟體", "desc": "戰備階段醫療資訊系統（HIS）與PACS遭境外敵對勢力APT攻擊，並伴隨DDoS攻擊，嘗試癱瘓電子病歷並勒索贖金。", "html": "<p>針對狀況 1-4「在戰備階段，醫院的醫療資訊系統（HIS）與 PACS\n系統突然遭受境外敵對勢力的進階持續性威脅（APT）攻擊，並伴隨分散式阻斷服務（DDoS）攻擊，嘗試癱瘓電子病歷並勒索贖金」，這代表醫院不僅面臨「數位神經系統」癱瘓的實體危機，更極易遭逢敵方藉此發動「認知作戰」與散播假訊息的社會恐慌威脅。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>公共事務部（本院編制為資源發展中心／發展組）「發言人\n/\n公關官（A1，由醫務副院長擔任）」</strong>。面對國家級駭客攻擊與勒索，公共事務部必須迅速掌握話語權，穩定民心並防堵謠言。</p>\n<p>其具體因應作為如下：</p>\n<p><strong>一、 擔任危機溝通樞紐，統一發布「醫療不中斷」聲明</strong></p>\n<ol>\n<li>\n<p><strong>掌握正確情資與撰擬新聞稿</strong>：資源發展中心須迅速對接指揮官與資訊室，獲取系統受損現況與院方的應變決策（如：拒絕支付贖金、啟動備援系統）。隨即撰擬緊急新聞稿，並送呈指揮官（院長）核定。</p>\n</li>\n<li>\n<p><strong>傳遞安定訊息（破除癱瘓謠言）</strong>：由發言人（醫務副院長）統一對外發布聲明，主動向大眾與媒體說明醫院雖遭遇網路攻擊，但已全面啟動「紙本降級（Downtime）」極限模式。保證急診、手術等核心醫療照護並未停擺，藉此安撫病患與家屬，化解外界對「醫院全面癱瘓」的疑慮。</p>\n</li>\n</ol>\n<p><strong>二、 防範「認知作戰」與全方位輿情監測</strong></p>\n<ol>\n<li>\n<p><strong>嚴密監測假訊息</strong>：境外勢力的 APT 與 DDoS 攻擊往往伴隨網路假訊息與認知作戰，意圖製造社會混亂。公共事務部必須派專人全方位監測各大報紙、電子媒體報導之文字與影像，以及臉書等網路社群（官網）的民眾回應。</p>\n</li>\n<li>\n<p><strong>即時反制與要求更正</strong>：若發現網路上流傳「本院病患因當機死亡、拒收病人或停診」等誇大不實的假訊息，必須立即向指揮官回報，並強烈要求媒體更正或迅速發布澄清聲明，以穩定醫療運作的外部環境與民心。</p>\n</li>\n</ol>\n<p><strong>三、 設立「新聞簡報中心」與嚴格媒體管制</strong></p>\n<ol>\n<li>\n<p><strong>設立媒體專區隔離干擾</strong>：在資訊系統大當機的狀態下，全院醫護人員正處於高壓的「人工紙本作業」與「傳令兵」奔波中。公共事務部必須於指定地點設立「新聞簡報中心」（如約翰大樓六樓簡報室），將前來採訪的媒體記者統一集中接待。</p>\n</li>\n<li>\n<p><strong>嚴格動線與隱私管制</strong>：協同醫勤室保安組（安全官），嚴格限制媒體任意進入急診室、病房或批掛櫃檯等正在執行高強度人工作業的區域。絕對保護病患隱私，並防止媒體拍攝混亂畫面遭到有心人士惡意剪輯利用。</p>\n</li>\n</ol>\n<p><strong>四、 協助發布「就醫替代流程」與服務降載資訊</strong></p>\n<ol>\n<li>\n<p><strong>多元管道推播替代方案</strong>：因掛號與批價系統癱瘓，公共事務部須配合醫務部與資訊室，將「就醫替代流程（如紙本掛號、門急診分流）」及「暫停非急迫性醫療」的公告，透過醫院官方網站（若未受 DDoS 癱瘓）、社群媒體或實體佈告欄對外發布。</p>\n</li>\n<li>\n<p><strong>引導民眾就醫預期</strong>：透過公告讓社會大眾提早得知醫院目前的作業延遲狀況，降低民眾因到院後久候而產生的憤怒與醫療暴力風險。</p>\n</li>\n</ol>\n<p><strong>五、 全程紀錄與佐證資料保全</strong></p>\n<ol>\n<li>\n<p><strong>記者會影音存證</strong>：確保對外發言與記者會全程進行錄音與錄影存證。</p>\n</li>\n<li>\n<p><strong>歷史資料與資安佐證保全</strong>：負責彙總每日的發言工作日誌、新聞剪報、影像畫面及對外發布的聲明稿。這些資料將與資訊室的資安通報紀錄合併保存，作為日後演習評核、應對潛在醫療糾紛、甚至檢調單位追查駭客攻擊事件的關鍵佐證紀錄。</p>\n</li>\n</ol>"}, {"scenario": "2-4", "title": "大量傷病患送入", "desc": "鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增。", "html": "<p>針對特別狀況\n2-4「鄰近地區發生作戰相關傷亡，急救站及救護車將大量傷病患送至本院；急診、手術、加護、輸血與影像需求暴增」，此時醫院不僅面臨醫療量能的極限挑戰，更會面臨社會大眾的高度關注與媒體蜂擁而至的採訪壓力。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>公共事務部（本院編制為資源發展中心／發展組）「公關分組」</strong>，指派專人擔任<strong>「公關官（PIO）」</strong>，並全力協助由副院長擔任的<strong>「發言人」</strong>。其最高任務是統一對外發布訊息、安定民心，並嚴格實施媒體管制，以確保急診與手術等前線搶救動線不被干擾。</p>\n<p>公共事務部（發展組）的具體因應作為如下：</p>\n<p><strong>一、 擔任危機溝通中樞與撰擬新聞稿</strong></p>\n<ol>\n<li>\n<p><strong>統一對外發言</strong>：面對戰傷大量傷患，發展組承辦人須依據指揮官（院長）與執行部門回報的最新傷亡數據、醫院降載情況與收治量能，迅速撰擬新聞稿與發言稿。</p>\n</li>\n<li>\n<p><strong>防堵假訊息</strong>：透過統一的官方訊息發布，及時將事件的處理方式與傷患名單（在合乎隱私規範下）告知社會大眾，以防堵戰時假訊息、謠言與外界負面的臆測報導，避免引發社會恐慌。</p>\n</li>\n</ol>\n<p><strong>二、 設立「新聞簡報中心」與「媒體管制區」</strong>\n為避免大批媒體記者湧入急診室阻礙戰傷搶救，發展組必須進行嚴格的空間管制：</p>\n<ol>\n<li>\n<p><strong>設立簡報與攝影專區</strong>：迅速於指定地點（如萬里專案中，媒體中心與新聞簡報室設置於恩慈大樓\n    B1\n    員工運動中心；媒體攝影區則規範於急診室前救護車停車場）設立媒體接待區，將媒體統一集中管理。</p>\n</li>\n<li>\n<p><strong>會同安全官封鎖現場</strong>：會同醫勤室保安組（安全管制主管），在醫療紅區外拉起警戒線，實施人員進出管制，嚴格禁止媒體記者任意進入急診室、開刀房或臨時\n    ICU 進行拍攝。</p>\n</li>\n</ol>\n<p><strong>三、 籌辦緊急記者會與定時戰情通報</strong></p>\n<ol>\n<li>\n<p><strong>緊急記者會</strong>：安排由發言人（醫務或行政副院長）親自主持記者會，向大眾說明本院的應變現況、醫療資源缺乏情形及外部支援請求，並接受媒體詢答（記者會建議於平面媒體截稿時間晚上\n    7 時前舉行）。</p>\n</li>\n<li>\n<p><strong>全程影像紀錄</strong>：確保記者會全程進行錄音與錄影存證，並妥善保存相關檔案資料。</p>\n</li>\n</ol>\n<p><strong>四、 執行戰傷病患之隱私保護與採訪紀律</strong></p>\n<ol>\n<li>\n<p><strong>保護傷亡隱私</strong>：戰時傷患畫面極度震撼，發展組須主動告誡媒體，非經同意不得提供病人肖像或生理特徵畫面，並<strong>嚴格禁止拍攝血腥、暴露或屍體等畫面</strong>。</p>\n</li>\n<li>\n<p><strong>徵詢受訪意願</strong>：若媒體有採訪戰傷病患之需求，發展組須會同社工室人員，事先徵詢病人或家屬的意願；若獲同意，必須簽署「病患肖像權使用暨媒體採訪同意書」後，由接待人員全程陪同方可進行採訪。</p>\n</li>\n</ol>\n<p><strong>五、 戰時輿情監測與媒體回應</strong></p>\n<ol>\n<li>\n<p><strong>輿情蒐集</strong>：派員全天候監測與收集各大報紙、電子媒體（包含 SNG\n    連線）及臉書官網之民眾回應與新聞報導。</p>\n</li>\n<li>\n<p><strong>即時澄清</strong>：若發現媒體報導與事實不符，或有引起民眾恐慌的錯假訊息，須立即送呈指揮官參考，並強烈要求媒體更正或由發言人進行再回應，以穩定醫療運作的外部環境。</p>\n</li>\n</ol>\n<p>大量傷患湧入時，公關組如何管制媒體與發布新聞？</p>\n<p>在斷網狀態下，資訊室如何支援醫療核心功能不中斷？</p>\n<p>若空襲造成大連院區斷電，工務室如何執行負載卸除？</p>"}, {"scenario": "2-7", "title": "人員重創與大出血", "desc": "機電棟爆炸事件中，造成兩名工務巡檢人員遭掉落物砸傷，其中一人嚴重骨折且大出血。", "html": "<p>當屏東基督教醫院（屏基）大連院區遭遇機電棟爆炸，並伴隨兩名工務同仁遭受重創（一人嚴重骨折且大出血），且同時面臨「社群媒體不實謠言（認知戰）」與「院內系統大當機（疑似資安攻擊）」的複合型極端壓力情境時，醫院將立即啟動\n<strong>HICS（醫院事故指揮系統）</strong>。</p>\n<p>在 HICS\n編組中，<strong>公共事務部（本院編制為資源發展中心／發展組）將作為「公關分組」，全力協助由醫療副院長擔任的「官方發言人（A1）」，擔任全院在輿論戰與認知防禦線上的「防火牆」與「情報中樞」</strong>。公共事務室（資源發展中心）將採取以下<strong>五大具體應變作為</strong>：</p>\n<p>一、 統一官方發言管道，防範多頭馬車與內部洩密</p>\n<ul>\n<li>\n<p><strong>協助發言人（A1）接掌單一發言權</strong>：公共事務室承辦同工立即向指揮官（院長）報到，並全力協助醫療副院長（發言人 A1）發布訊息。對內外宣告：<strong>本院所有關於爆炸傷情、系統搶修及開診狀況之訊息，一律由 A1 發言人官方窗口發布</strong>，嚴禁任何同工私下對媒體發表評論、接受採訪或於私人社群上載爆炸現場照片（違反保密義務）。</p>\n</li>\n<li>\n<p><strong>對接第一線安撫窗口</strong>：將統一的發言說帖與事實情資，迅速同步給急診檢傷台、批掛櫃檯、轉診中心（家屬休息區）及一線社工同仁，確保院方對所有恐慌家屬與民眾的解釋口徑百分之百一致，粉碎因資訊不透明造成的醫病衝突。</p>\n</li>\n</ul>\n<p>二、 橫向情資彙整，掌握「鋼性數據」以事實闢謠</p>\n<p>在系統大當機（Downtime）狀態下，公共事務室須主動出擊，以人工或備援戰術通訊（無線電/傳令兵）方式，向計畫部（狀況分析小組\nP2、資源控管小組 P1）與機構運作組（資訊室\nO5）獲取以下最真實的臨床數據，作為澄清新聲明稿的依據：</p>\n<ol>\n<li>\n<p><strong>照護功能完整，並未停診</strong>：本院十一大核心照護功能完整，目前已瞬間切換至最抗干擾的「紙本降級（Downtime）手工作業」，醫療服務不中斷。</p>\n</li>\n<li>\n<p><strong>藥品與用血無虞</strong>：馬太 B1F 藥庫戰備儲備充沛、血庫低溫冷鏈電力在發電機支持下運作正常（反駁缺藥、拒收謠言）。</p>\n</li>\n<li>\n<p><strong>受傷同工已獲全力救治</strong>：澄清機電棟爆炸僅造成 <strong>2 名巡檢同工受傷</strong>，其中一人雖嚴重骨折大出血，但已由創傷團隊執行損傷控制復甦（DCR），並送入地下備援手術室（韓偉 B1 腹膜透析室）進行搶救，生命徵象在掌控中（非網傳的集體死傷）。</p>\n</li>\n<li>\n<p><strong>個資與病歷安全</strong>：資訊系統雖有延遲，但主機已執行安全防護關機，且重要資料皆已安全同步備份至瑞光院區 7F 異地備援機房，絕無資料外洩。</p>\n</li>\n</ol>\n<p>三、 實施地下媒體分流管制，死守病患與重創同工隱私</p>\n<ul>\n<li>\n<p><strong>開設地下「新聞簡報中心」</strong>：為了防範媒體記者在混亂中強闖一線急救 red zone 或進入地下室，公共事務室與總務部配合，迅速於結構安全且與臨床嚴格隔離的 <strong>恩慈大樓地下一樓員工運動中心</strong>（或約翰大樓 6 樓簡報室）開設媒體接待區與新聞簡報中心。</p>\n</li>\n<li>\n<p><strong>劃定「媒體攝影管制區」</strong>：攝影區域嚴格規範於<strong>急診室前救護車停車場之外圍安全線內</strong>。公共事務室同工會同保安人員死守 <strong>B1 的樓梯間、電梯口及各功能區（臨時 ICU、手術室）通道</strong>，防範媒體拍攝到受傷同工的大出血血腥畫面或暴露隱私，維持戰傷醫療的安寧與尊嚴。</p>\n</li>\n</ul>\n<p>四、 撰擬澄清新聞稿，召開官方記者會引導「就醫替代流程」</p>\n<ul>\n<li>\n<p><strong>撰擬權威澄清稿</strong>：據實將上述四項事實數據撰擬成澄清稿，強調「屏基依然屹立不搖、死守屏東市就醫命脈」，送呈指揮官（院長）核定。</p>\n</li>\n<li>\n<p><strong>發布「就醫替代流程」</strong>：配合資訊室與總務部，在醫院官網、APP 跑馬燈及院外告示板，主動引導恐慌民众了解當前的「紙本替代流程（如戶外慢性病處方箋領藥處、人工掛號批價動線）」，將恐慌領藥人潮外置分流。</p>\n</li>\n<li>\n<p><strong>定時召開官方記者會</strong>：在新聞簡報中心定時召開記者會（務必在黃金截稿時間晚上 7 點前召開），向外界公開處置進度與醫療量能，以極致的公開透明來穩定社會恐慌。</p>\n</li>\n</ul>\n<p>五、 全方位輿情監測與歷史紀錄保全</p>\n<ul>\n<li>\n<p><strong>24小時輿情偵蒐</strong>：公共事務同工持續監測電視新聞、網路論壇（如 PTT、Dcard）及社群軟體（臉書、Line群組）。一旦發現有媒體誇大爆炸傷亡或散布「屏基被炸毀、藥局全空、拒收病人」之錯假消息，立即回報指揮官，並主動致電媒體主管要求更正與澄清，實施輿論反制。</p>\n</li>\n<li>\n<p><strong>全程錄音錄影與案卷保全</strong>：確保地下新聞發布會全程錄音錄影存證；並將爆炸事件與資安當機期間所有外部報導、剪報、社群謠言截圖掃描存檔，作為後續法律诉訟（職安室 F3）、災害缺失檢討（管理部）及向惡意造謠者求償的法定最重要佐證資料。</p>\n</li>\n</ul>"}, {"scenario": "3-1", "title": "部分撤離與病人分流", "desc": "主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級。", "html": "<p>針對特別狀況\n3-1「主管機關要求依安全狀況進行部分撤離或病人分流；需將高度照護、一般住院、可返家或安置病人分級」，此時醫院面臨大批病患撤離的混亂局面，極易引發家屬焦慮、社會恐慌以及不實謠言的散播。</p>\n<p>在\nHICS（醫院事故指揮系統）架構下，<strong>公共事務部（本院編制為院長室轄下之「資源發展中心/發展組」）「發言人（A1，由醫務副院長擔任）」</strong>。</p>\n<p>面對此大規模撤離與分流指令，公共事務部（資源發展中心）的具體因應作為如下：</p>\n<p><strong>一、 擔任危機溝通樞紐，撰擬新聞稿與發言稿</strong></p>\n<ol>\n<li>\n<p><strong>掌握正確撤離情資</strong>：資源發展中心管理師須密切與計畫部門（狀況分析組、文件紀錄組）保持聯繫，隨時掌握全院最新狀況，包含：撤離原因、已降載之病患人數、病人分流去向（轉往哪些合作醫院或長照機構）等精確數據。</p>\n</li>\n<li>\n<p><strong>撰擬緊急新聞稿</strong>：依據院長或發言人指示，迅速撰擬新聞稿與發言稿範本，並送呈院長核定。</p>\n</li>\n<li>\n<p><strong>準備家屬詢答說帖</strong>：協助社工室與護理部擬定「家屬詢答說帖」，確保第一線人員在通知家屬病患轉院去向時，能傳遞一致且安心的資訊。</p>\n</li>\n</ol>\n<p><strong>二、 統籌媒體接待與設立「新聞簡報中心」</strong>\n在病患極速撤離的過程中，必須嚴格控管媒體動線，以免阻礙救護車或轉運車輛的進出：</p>\n<ol>\n<li>\n<p><strong>設立媒體專區</strong>：於本院指定之適當地點（如約翰大樓六樓簡報室或視情況指定的安全地點）設立「新聞簡報中心」，並備妥新聞媒體聯繫名冊與接待設施。</p>\n</li>\n<li>\n<p><strong>統一對外發布新聞</strong>：由發言人（醫務副院長）主持記者會，正式發布新聞稿並接受媒體詢答。及時將病患安全撤離、安置轉銜等善後處理方式告知大眾，以防堵不當的負面臆測與社會恐慌。</p>\n</li>\n<li>\n<p><strong>嚴格動線與隱私管制</strong>：公共事務人員須協同醫勤室（警衛），嚴格限制媒體進入「急診室救護車接運疏散區」或「病房區」等正在執行高強度撤離的區域。若需拍攝，必須由接待人員陪同，並徵得病人或家屬簽署「媒體採訪同意書」，絕對保護病患隱私與醫療安寧。</p>\n</li>\n</ol>\n<p><strong>三、 執行輿情監測與「假訊息」防制</strong>\n大規模危機與戰時狀態下，假訊息或網路謠言風險極高。公共事務部必須負責：</p>\n<ol>\n<li>\n<p><strong>全方位輿情監測</strong>：持續監測、收集各大報紙、電子媒體報導之文字與影像，以及臉書等網路社群（官網）的民眾回應。</p>\n</li>\n<li>\n<p><strong>即時反制不實資訊</strong>：如發現媒體報導不實（例如誇大醫院傷亡、謠傳轉院病患遭遺棄等），必須立即回報指揮官，並要求媒體更正或發布澄清聲明，穩定民心。</p>\n</li>\n</ol>\n<p><strong>四、 記錄與存查媒體發布資料</strong></p>\n<ol>\n<li>\n<p><strong>全程紀錄</strong>：記者會與對外說明過程需全程錄音錄影存證。</p>\n</li>\n<li>\n<p><strong>歷史資料保全</strong>：負責彙總每日的發言工作日誌、新聞剪報與影像畫面。將相關新聞資料掃描、下載後妥善存檔，作為演習評核或日後危機處理檢討的佐證紀錄。</p>\n</li>\n</ol>"}, {"scenario": "3-2", "title": "預防性全面撤離", "desc": "軍方預警醫院所在區域即將成為主戰區，指揮中心下令進行醫療核心能量的預防性撤離。", "html": "<p>當本院（屏東基督教醫院大連院區）接獲軍方及縣市聯合應變管制中心（LJEOC）預警，確認醫院所在區域即將淪為「主戰區」，指揮中心下達啟動\n<strong>HICS 第三階段「全面撤離與量能重置」</strong>之最高預防性全面撤離命令時\n：</p>\n<p>在 HICS\n應變體系下，<strong>公共事務部（本院編制為院長室轄下之「資源發展中心／發展組」）將主導「公關分組」</strong>，並全力協助由<strong>醫療副院長（或醫務副院長）擔任的「官方發言人／新聞官（A1）」</strong>\n。公共事務團隊是醫院在戰火與恐慌陰影下的「認知防衛盾牌」，負責穩定民心、澄清洗腦謠言、管控媒體以防止其干擾前線撤離動線，並在後續規劃異地重置後的營運復原\n。</p>\n<p>針對此極端的大規模核心醫療能量預防性撤離，公共事務室（資源發展中心）將採取以下<strong>五大生存、宣傳防衛與復原協同之具體作為</strong>：</p>\n<p>一、 擔任危機溝通中樞，掌握撤離情資並迅速撰擬「闢謠新聞稿」</p>\n<p>在即將淪為主戰區的高壓環境下，敵方極易利用網路、社群媒體散布「本院停診、缺藥、遭攻擊或拒收/棄置病人」等不實假訊息（特別狀況\n1-3），意圖瓦解本院防線並引發社會暴動 。</p>\n<ol>\n<li>\n<p><strong>即時對接計畫部，掌握正確情資</strong>： 公共事務同工（資源發展中心管理師）必須密切與地下指揮所（EOC）計畫部門的「狀況分析組（P2）」與「文件紀錄組（P3）」保持通訊 。隨時掌握全院最新狀況，包含：撤離原因、已安全降載之病患人數、病人分流去向（轉往部立屏東醫院、寶建、安泰或屏東榮總等合作醫院及長照機構）等精確、權威的數據 。</p>\n</li>\n<li>\n<p><strong>撰擬緊急新聞稿與說帖</strong>： 依據最新情資，迅速撰擬官方緊急新聞稿與發言稿（送呈指揮官吳榮州院長核定） ，明確澄清：<em>「本院因應軍事預警，正與衛生局密切對接，點對點有序實施核心醫療能量之預防性轉置。本院並非停診，所有在院重症病患皆由隨車醫師、護理師妥善照護後送，請家屬與社會大眾勿聽信敵方癱瘓我國醫療量能之假訊息」</em> 。</p>\n</li>\n<li>\n<p><strong>死守「單一官方發言權」</strong>： 公共事務部協助發言人（醫療副院長）作為本院組織內外部訊息發布的<strong>唯一官方管道</strong> ，嚴厲禁止其他非授權同工私自對媒體、社群網絡發表任何撤離、病患死傷或防務弱點言論，避免多頭馬車導致外界資訊混亂或洩漏軍機 。</p>\n</li>\n</ol>\n<p>二、 執行「新聞簡報中心地下化轉置」與嚴格媒體動線管制</p>\n<p>大批媒體記者與 SNG 車在撤離初期勢必蜂擁而至 。若其任意穿梭、搶拍，將嚴重阻礙救護車載具集結，甚至使病患與重症醫療區的位置暴露於敵方無人機之威脅下\n。</p>\n<ol>\n<li>\n<p><strong>簡報中心 10 分鐘極速地下化</strong>： 由於行政大樓高樓層及玻璃帷幕為防空脆弱區 ，公共事務部須配合指揮官，將原本設於約翰大樓 6 樓的簡報室，立即垂直轉置至大連院區地下結構最安全、最深層的備援地點------<strong>恩慈大樓地下一樓員工運動中心（戰時新聞簡報室與媒體中心）</strong> ，並備妥發言人新聞稿、媒體聯繫名冊、不斷電麥克風與獨立通訊網 。</p>\n</li>\n<li>\n<p><strong>實施新聞媒體「硬性動線與物理管制」</strong>： 公共事務人員必須協同醫勤室（警衛保全人員），在院區外圍及三大車道裝載區（急診室大門救護車專區、門診大廳接駁中巴專區、恩慈旁私人車專區）拉起警戒線，<strong>實施鋼鐵般的進出管制</strong> 。 -   <strong>限制媒體區域</strong>：嚴格限制、甚至禁止媒體記者進入高強度撤離的核心「急診室救護車接運疏散區」、「ICU病房區」及「臨時手術室」 。 -   <strong>媒體攝影規範</strong>：僅允許記者於外圍指定之「媒體攝影/訪問區」（如急診室外左側空間或急診室前救護車停車場）在公共事務同工全程陪同下進行拍攝 。</p>\n</li>\n<li>\n<p><strong>死守病患個資與隱私保護（醫療倫理）</strong>： 戰時傷患與撤離病患畫面極度震撼且敏感，公共事務部須主動告誡媒體遵守採訪紀律，<strong>嚴格禁止拍攝、播出帶有血腥、暴露或亡者屍體之畫面</strong> 。如需採訪個別病患，必須會同社工人員事先徵得病人或家屬同意並簽署「媒體採訪同意書」 。</p>\n</li>\n</ol>\n<p>三、 協同社工、護理部擬定「家屬詢答說帖」，安定後方軍心</p>\n<p>大批病患的緊急後撤轉銜極易引發家屬焦慮，找不到親人或擔心在途安全的家屬可能在病房或急診與醫護同工爆發激烈衝突，甚至干擾撤離時效\n。</p>\n<ol>\n<li>\n<p><strong>擬定家屬詢答統一規格說帖</strong>： 公共事務部須主責協同社工室、護理部，擬定溫和、清晰且具撫慰效果的<strong>「家屬詢答與通知標準說帖（SOP）」</strong> 。</p>\n</li>\n<li>\n<p><strong>確保對外回答口徑「百分之百一致」</strong>： 將統一的家屬說帖迅速分發給急診檢傷櫃檯、病房護理長及家屬安撫區（轉診中心）的同仁 。確保院內所有同工對外（如面對詢問電話、現場哭喊的家屬）解釋病患轉院安置位置、去向與安全防護措施的口徑完全一致，減少不必要的醫病衝突與恐慌蔓延 。</p>\n</li>\n</ol>\n<p>四、 執行全方位「輿情監測」與網路認知防衛反制</p>\n<ol>\n<li>\n<p><strong>24小時戰時輿情監控</strong>： 公共事務室派專人全天候監測電視新聞、SNG 連線、各大報紙網路版、電子媒體，以及 Facebook 等各大網路社群（本院官網及屏東在地社團爆料）的文字、影像與民眾反應 。</p>\n</li>\n<li>\n<p><strong>即時澄清與反制假訊息（認知戰）</strong>： 一旦發現外界媒體或社群出現不實報導（例如惡意誇大屏基撤離傷亡、謠傳轉院病患被遺棄、或散布醫院遭飛彈直接摧毀等錯假訊息），必須立即呈報指揮官，並代表院方強勢要求媒體更正 。必要時由發言人（副院長）在地下簡報中心召開記者會發表澄清聲明，以事實穩定高屏地區的民心，維護醫療團隊的尊嚴與外部安全環境 。</p>\n</li>\n</ol>\n<p>五、 戰時病患就醫援助復原規劃、影像紀錄保全與後續呈報</p>\n<ol>\n<li>\n<p><strong>研訂「戰時醫療復原與營運重建計畫」</strong>： 在核心醫療能量預防性撤離的同時，資源發展中心必須未雨綢繆，協同總務、工務與醫務部，依據此次受主戰區波及、受損或停診的病房與病患數量，<strong>研訂未來威脅解除後的「異地開診復原、複診、醫護調配、看診編排及在院病患就醫輔導」等具體重建措施</strong>，確保在異地聯防醫院內能快速重建屏基的醫療品牌與連續性，使病患不致因戰災而中斷就醫 。</p>\n</li>\n<li>\n<p><strong>實施應變與撤離軌跡之「影像紀錄保全」</strong>： 公共事務部指派專人，在不干擾救護與疏散安全的前提下，<strong>對整場預防性全面撤離、地下備援功能區運作、直升機/救護車轉運交接之實兵過程進行全程拍照、錄影與影音紀錄存檔</strong> 。</p>\n</li>\n<li>\n<p><strong>彙整演習缺失與函報主管機關</strong>： 在撤離行動或演習結束後的<strong>兩週內</strong>，公共事務部（資源發展中心）須將所拍攝的實兵照片、影音紀錄整理彙整，提供給統籌呈報組（危管會），協助主責單位編製<strong>「2026年城鎮韌性（CI防護）演習檢討報告」</strong>，經院長核備後正式發文函送衛生福利部、地方衛生局並副知行政院國土安全辦公室，作為精進國家關鍵基礎設施防護的法定歷史佐證 。</p>\n</li>\n</ol>\n<p>📋 <strong>公共事務室戰術備忘建議</strong>：\n在主戰區炮火逼近的全面預防性撤離中，公共事務團隊必須同時面對上百名焦慮的家屬與蜂擁而至的媒體，稍有不慎極易造成動線堵塞、假訊息認知戰失控或機密洩漏\n。</p>\n<p>為了確保公共事務人員與發言人（醫療副院長）在無網、斷訊的 Downtime\n狀態下，依然能精準、冷靜地掌控輿論戰線，您需要我為公共事務室及資源發展中心，規劃一份可以直接印出並放入隨身\nGo-Bag 中的實體紙本 <strong>「公共事務室：HICS Phase 3\n戰時預防性撤離輿論防線防護、地下新聞簡報與家屬 Q&amp;A 說帖 10\n大關鍵行動查檢卡（A4 雙面格式）」</strong> 嗎？</p>\n<p>應對戰時撤離，指揮官該如何與軍方及衛生局建立加密通訊？\n若撤離途中遭遇空襲，安全官行使「安全中止權」的具體流程為何？</p>\n<p>在戰火迫近、常規網路與電力可能隨時中斷的極端「平戰轉換」環境下，確保醫院指揮大腦的數位安全，以及在實體撤離中死守人員生命安全，是屏東基督教醫院（屏基）大連院區城鎮韌性防衛的最高紅線。</p>\n<p>以下針對您提出的兩項核心戰術問題，提供完全基於本院平戰轉換白皮書與 HICS\n應變規範的具體因應作為：</p>\n<p>一、 指揮官與軍方及衛生局建立加密通訊之具體機制</p>\n<p>在戰爭或敵特破壞初期，常規的電信基地台極易遭到摧毀，且 IBM HIS/PACS\n系統可能面臨國家級駭客的 DDoS\n或勒索軟體攻擊，導致全院陷入「又盲又啞」的資訊全黑危機 。為了死守與外部的指揮鏈，<strong>事故指揮官 A0（吳榮州院長）</strong>\n與聯絡官將採取以下<strong>多重異質性加密與備援通訊機制</strong>：</p>\n<ol>\n<li>\n<p><strong>啟用「指揮官避難包（Go-Bag）」加密通信設備</strong>： -   在防空警報（Code Black）或全面撤離動員令下達的 10 分鐘內，指揮官與核心幕僚垂直轉移至大連院區結構最強固的地下避難核心區（<strong>恩慈大樓地下一樓會議室</strong>，必要時轉移至 <strong>地下二樓防空總指揮所</strong>） 。 -   立即啟用隨身「指揮官避難包（Go-Bag）」內配置的 <strong>Iridium 衛星電話</strong> 以及 <strong>加密 UHF 無線電對講機</strong> ，第一時間與作戰區防衛指揮部及中央聯合應變中心（CJEOC）建立直通之加密語音管道 。</p>\n</li>\n<li>\n<p><strong>架設頂樓低軌衛星與軍警戰情加密連線</strong>： -   資訊室網路組協同工務室，於頂樓高地（配合緊急發電機不中斷供電）架設並啟用 <strong>低軌衛星（如 OneWeb / Starlink）接收端設備</strong> 。 -   透過加密的專屬虛擬專線（VPN），與<strong>中央衛福部 EOC</strong> 及 <strong>軍方戰情中心</strong> 建立微弱但關鍵的外部數據連線，撈取未受損的備援資料庫情資 。</p>\n</li>\n<li>\n<p><strong>聯絡官透過獨立頻段對接地方衛生局與 EOC</strong>： -   聯絡官 A3（行政副院長 黃雅芳／管理部部長 張隆鐘）於地下指揮中心使用 <strong>UHF/VHF 獨立頻段無線電</strong> ，對接屏東縣政府衛生局緊急醫療網（EOC）、高屏區 EMOC 勤務中心 。 -   若常規電信完全癱瘓，亦可使用院內配置之 <strong>GSM 橋接器（GSM Bridge）</strong> 或 GSM 遠程延伸天線，強行突破鋼筋混凝土屏蔽 ，向縣市聯合應變指揮管制中心（LJEOC）回報本院最新撤離進度 。</p>\n</li>\n<li>\n<p><strong>落實紙本「徒步傳令兵（Runner）機制」作為最後通訊底線</strong>： -   當所有電磁或無線電通訊遭強烈干擾或 EMP（電磁脈衝）癱瘓時，全院立即改採最古老但最安全的「類比傳令」 。 -   指派體能優良的行政人員穿著螢光背心擔任 <strong>徒步傳令兵（Runner）</strong> ，攜帶 <strong>實體簽收簿（Logbook）</strong> 穿梭於地下指揮所、馬太 B1 藥庫、B1 臨時手術室與各哨口之間 ，採取「口令覆誦、實體簽收」方式手動傳遞指令與報告，徹底防範資安洩密 。</p>\n</li>\n</ol>\n<p>二、 撤離途中遭遇空襲，安全官行使「安全中止權」的具體工作流程</p>\n<p>不論在平時演習或戰時實兵撤離途中，本院皆秉持<strong>「以病人安全、員工安全為最高原則」</strong>\n。一旦在病患露天裝載、救護車集結或垂直轉運過程中遭遇空襲震波或爆炸威脅\n，<strong>安全官 A2（職安室主任 杜傳榮）</strong>\n擁有法定權力行使<strong>「安全中止權（Safety Halt）」</strong> 。具體實兵操作流程分為以下五大步驟：</p>\n<p>[ 步驟 1：險情偵檢 ] ➜ [ 步驟 2：安全官叫停 ] ➜ [ 步驟\n3：指揮官發令 ] ➜ [ 步驟 4：就地防爆掩蔽 ] ➜ [ 步驟 5：評估再重啟 ]</p>\n<ul>\n<li>\n<p><strong>步驟一：環境危害監控與險情偵檢（安全官/保安組）</strong> 安全官 A2（杜傳榮）全程於地下前進指揮所或透過現場巡邏，實時監控各疏散路線、病患集結區與急診大門救護車裝載區的安全狀況 。若偵測到突發導彈襲擊、空襲警報大作、或周邊遭受強烈爆震衝擊，安全官立即判別現場感電、建物局部坍塌或大面積玻璃碎裂之致命二次殺傷風險 。</p>\n</li>\n<li>\n<p><strong>步驟二：行使安全中止，向指揮官提出「叫停建議」</strong> 一旦判定威脅即將波及撤離人員，安全官必須立即發揮其法定中止權職責 ：<strong>「終止一切不安全、高暴露之露天搬運或轉移行動」</strong> ，向事故指揮官（院長）發出紅色警戒警告，強烈建議暫停撤離 。</p>\n</li>\n<li>\n<p><strong>步驟三：指揮官迅速裁決，發布「全院暫停撤離指令」</strong> 指揮官在收到安全官的危害報告後，立即進行安全裁決（Safety Award），行使最高中止權並正式宣告：<strong>「全院撤離行動即刻暫停，立即轉入防空避難狀態！」</strong> 。由總機（或通報班）立即撥打 *9 進行全院大樓廣播 ，或透過 UHF/VHF 無線電向車隊、病房護理站、待命區發布中止令 。</p>\n</li>\n<li>\n<p><strong>步驟四：一線醫護與病患執行「就地防爆掩蔽（Defend in Place）」與轉移</strong> 前線人員立即停止車輛裝載，各崗位人員按以下原則就地掩蔽： 1.  <strong>高樓層病房/ICU</strong>：醫護人員在不斷開生命維生儀器的情況下 ，將病床迅速推離大面積玻璃窗戶，<strong>移入無窗之「核心內筒」（如電梯梯廳、內部走廊或浴室）進行防爆掩蔽</strong>，拉下所有防爆窗簾，關死病房門以防煙侷限 。 2.  <strong>三大接運區（露天/車道）</strong>：保安室（避難引導班）與勤務人員迅速將剛推至急診大門、門診大廳或恩慈旁車道的病患與家屬 ，<strong>引導至最近的地下安全替代空間（約翰、馬可大樓 B1，或路加 B1 停車場）</strong> ，並就地落實雙手抱頭保護軀幹的防空避難姿勢 。</p>\n</li>\n<li>\n<p><strong>步驟五：情勢排除、災損評估與重啟撤離</strong> 空襲威脅解除（或警報解除）後，安全官（杜傳榮）協同工務室（設施主管 O2），迅速針對疏散通道、電梯、安全梯、地下備援功能區及戶外裝載車道實施<strong>「災後損害鑑定與管線漏電偵檢」</strong> 。在確認結構安全且通聯暢通無虞後，安全官向指揮官回報安全 。經指揮官下令後，始能重啟暫停的病人分級撤離與車輛轉運手續 。</p>\n</li>\n</ul>\n<p>🛡️\n戰時的加密通訊架設與空襲途中「安全中止權」的行使，容不得半點遲疑與行政疏忽。需要我為您及職安室（杜傳榮主任）與保安組，將這套緊急加密通聯、低軌衛星備援架設，以及突發空襲時安全官與一線病房「就地掩蔽防爆」的標準動作，彙整精簡成一份可直接雙面印製並塑膠護貝的\n<strong>「屏基大連院區：戰時加密通訊對接與空襲『安全中止就地避難』一線實兵查檢\nA4 卡（防潮紙本版）」</strong> 嗎？</p>\n<p>資訊系統若遭駭客攻擊大癱瘓，如何切換紙本作業？</p>\n<p>當屏東基督教醫院（屏基）大連院區遭受國家級駭客（APT）攻擊、勒索軟體襲擊或因空襲震波導致常規電網與網路大癱瘓，醫院將瞬間陷入「資訊全黑（又盲又啞）」的極限孤島絕境\n。</p>\n<p>為了在失去 IBM\nHIS、PACS（影像）、LIS（檢驗）及電子病歷系統的狀況下死守「核心醫療不中斷」之紅線\n，本院制定了鋼鐵般的<strong>「電腦資訊當機應變措施計畫（AMD-3-813）」</strong>與<strong>「紙本降級（Downtime\nProcedure）」SOP</strong> 。</p>\n<p>以下為全院在系統大癱瘓時，由「數位」極速切換為「紙本/類比」運作的<strong>五大核心實兵操作程序</strong>：</p>\n<p>一、 判定與宣告：啟動「全院當機處理機制」與實體隔離</p>\n<p>當前線或資訊室發現 HIS、PACS\n系統出現嚴重延遲、疑似惡意連線、異常登入或病毒大量感染時 ：</p>\n<ol>\n<li>\n<p><strong>流量監控與實體阻斷</strong>： 資訊室網路組人員透過監控查出受感染網段，<strong>立即拔除該網段交換器與核心交換器的連線進行「實體隔離」</strong>，防止災情擴大擴散至整台 HIS 主機 。</p>\n</li>\n<li>\n<p><strong>當機決策與通報</strong>： 若事件發生超過 30 分鐘仍無法排除，或判定遭遇毀滅性資安攻擊 ，資訊室主任立即通報指揮官（院長） ，<strong>下達啟動「全院當機處理機制」之最高決策</strong> 。</p>\n</li>\n<li>\n<p><strong>全院廣播切換類比作業</strong>： 中控室總機立即直撥內線 *9 進行全院大語音廣播（或利用獨立頻道無線電、發大聲公）正式宣告 ：</p>\n</li>\n</ol>\n<p>二、 暴力拆箱：各病區迅速啟用「當機緊急箱（Downtime Box）」</p>\n<p>廣播發布後，全院各病房護理站、急診、地下五大備援功能區、藥局及批價櫃檯，不等待修復，<strong>立即砸破/剪開預先整備、定期更新的藍色「當機緊急箱（Downtime\nBox）」之封條</strong> 。</p>\n<p>當機緊急箱內備妥之<strong>「救命核心類比工具」</strong>包含 ：</p>\n<ul>\n<li>\n<p><strong>三聯式紙本病歷與手寫處方箋</strong>：取代電子病歷與常規電腦開單 。</p>\n</li>\n<li>\n<p><strong>紙本檢傷單與條碼貼紙</strong>：用於新進傷患的快速分類與實體手圈識別 。</p>\n</li>\n<li>\n<p><strong>全院最新住院病患名單</strong>：各病房每日必須依規定離線下列印、更新並存放於箱內，確保在網路全黑時仍清楚掌握病床名冊 。</p>\n</li>\n<li>\n<p><strong>手電筒、計算機及備用文具</strong>：確保在斷電或類比環境下仍能精準計算計價與調劑 。</p>\n</li>\n</ul>\n<p>三、 跨部門聯合作戰：「無網狀態」下各單位的替代運作機制</p>\n<p>一旦切換為紙本作業，全院醫療與後勤單位必須全面改採人工作業並顛覆常規流程\n：</p>\n<p>1. 臨床前線（急診、病房與手術室）</p>\n<ul>\n<li>\n<p><strong>手寫醫囑與處方</strong>：醫師全面改採三聯式紙本手工病歷與手寫處方箋 。利用人工白板與病房手寫看板進行床位管制與班表交接 。</p>\n</li>\n<li
