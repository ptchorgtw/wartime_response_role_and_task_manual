性的官方數據和溫和行動消除大眾恐慌。</li></ul>"}]}, {"role": "執行部醫療照護處／住院及重症照護組", "entries": [{"stage": 2, "scenario_id": "08", "scenario_title": "關鍵基礎設施異常", "datetime": "8月9日 08:00", "summary": "高屏地區天然氣輸配與能源監控系統出現異常警示，部分壓力調節與輸送數據波動，遠端連線紀錄出現非常態來源及通訊中斷；初步研判為控制系統異常或疑似資訊干擾，致南部供氣壓力下降約15%至20%，影響區域能源穩定。", "detail": "由蕭麗萍督導長與陳素華督導長共同執行", "html": "<p>供氣壓力下降及區域電力受威脅。醫療照護組長（徐禮平副部長）下令住院及重症照護組（蕭麗萍督導長/ 陳素華督導長，簡碼 69236）立即執行「維生設備安全檢校」。加護病房護理人員逐床校驗重症病人插管呼吸器與點滴幫浦之不斷電系統（UPS）蓄電狀態。</p><p>本院不斷電系統在負載 10% 下可自撐 100 分鐘，負載 30% 可自撐 30分鐘。護理人員確保各床備用可攜式氧氣小鋼瓶壓力大於 100 bar。若外部電網因天然氣中斷爆發大限電，且發電機 ATS起動出現延遲，護理長立即組織「捏球小隊」，由現場待命之醫護與勤務同工守護病床，隨時準備以人工手動操作甦醒球（AmbuBag）維持患者人工呼吸，並手動抄錄生命徵象，以肉搏戰防範重症病人因能源危機發生生命威脅。</p>"}, {"stage": 2, "scenario_id": "PTCH-10", "scenario_title": "電力基礎受損", "datetime": "", "summary": "【電網波動與設備燒毀】變電所遭滲透破壞，外部供電呈現頻繁跳電與極端電壓不穩（突波）。儘管院內發電機啟動，但瞬間突波導致加護病房（ICU）部分精密維生設備（如高階呼吸器）主機板燒毀，重症照護量能受損。", "detail": "主責人：重症加護組陳素華督導長，公務機簡碼69236", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：極端電壓波動不穩（突波）導致加護病房（ICU）內部分高階呼吸器主機板瞬間燒毀，危及插管重症病人生命支持。重症加護組組長（陳素華督導長，公務機簡碼69236；代理人：專師部副部長陳素華，公務機簡碼69236）必須立即啟動<strong>「維生設備燒毀、不斷電系統（UPS）核檢與人工甦醒（捏球）極限救援SOP」</strong>。</p><p>重症主護護理師逐床檢查、核對重症病人的生命體徵：在呼吸器死機瞬間，護理人員必須在 <strong>30秒內</strong>，手動將病人呼吸器管路取下，物理連接至備用之<strong>攜帶式氧氣鋼瓶及手動甦醒球（AmbuBag）</strong>，並手動抄錄生命徵象。 為因應 ICU 內 23床危急重症病人生命保障，陳素華督導長立即向 HICS指揮中心回報，要求調撥人力：迅速召集病區內行政人員、待命同工及輕傷家屬，組成<strong>「人工捏球小隊」</strong>，進駐病人床端，以「人工接力捏球」方式物理性維持患者人工通氣支持。</p><p>醫工組（林良哲主任）技術員迅速推來院內儲備之備用氣動式（免電控）呼吸器及不斷電系統（UPS，容量100 kVA）。技術員對受損呼吸器進行物理隔離與快篩，重新啟用備用設備並連接至 UPS機箱中。護理人員逐一核對病人防偽手圈與紙本 Downtime病歷，在斷電與設備毀損廢墟中以「臨床肉搏戰」死守重症病人生命安全與呼吸支持不中斷。</p><p><strong>2. 實際確實數據與資源盤點</strong>： 重症加護組精算維生設備及人力配比數據：臨時 ICU（B1 共 23 床）配置護理師 <strong>24 人</strong>（採護病比 1:2\\~1:3彈性排班，每班 8 人），呼吸治療師 2 名。 不斷電系統（UPS）蓄電池在負載10% 下可支撐 <strong>100 分鐘</strong>，負載 30% 支撐 30 分鐘。護理同工確保各床備用可攜式氧氣小鋼瓶壓力大於 <strong>100 bar</strong>，自撐時數高於<strong>2 小時</strong>。 招募並訓練 <strong>30 名「人工捏球大隊」</strong> 同工及志工預置於 ICU病房，一旦突波燒毀設備或完全斷電，立即提供一對一人工人工呼吸生命支持。</p>"}, {"stage": 3, "scenario_id": "09", "scenario_title": "能源設施爆炸事故", "datetime": "", "summary": "屏南地區能源轉運及輸配電設施疑遭無人機攻擊，部分設備受損並引發局部爆炸與火勢，造成作業人員2人重傷、6人輕傷、另有3人失聯；能源與輸配電作業中斷，造成東港、林邊、佳冬、枋寮、潮州及屏東市部分區域停電，衝擊交通號誌、ATM、醫療與民生用電。", "detail": "由蕭麗萍督導長與陳素華督導長共同執行，簡碼69272 / 69236", "html": "<p>停電直接波及普通病房與加護病房之臨床維生。醫療照護處住院及重症照護組（蕭麗萍督導長/ 陳素華督導長，簡碼69236）立即進駐病區，啟動<strong>「臨床維生設備不斷電系統（UPS）核檢與應急捏球SOP」</strong>。 主護護理師逐床檢查插管重症病人呼吸器、高劑量升壓劑點滴幫浦之UPS 蓄電池蓄電狀態。</p><p>不斷電系統在負載 10% 下可自撐 100 分鐘，負載 30% 可自撐 30分鐘。護理人員確保各床備用氧氣小鋼瓶壓力大於 <strong>100 bar</strong>。 若發電機 ATS送電出現空窗，或 UPS電池即將耗盡，護理長立即通報待命處，召集行政待命同工及志工組成<strong>「人工捏球大隊」</strong>進駐病床端。捏球同工在醫護指揮下，手動擠壓甦醒球（AmbuBag）維持患者通氣，並手動抄錄生命徵象，以「臨床肉搏戰」死守重症病患之呼吸安全與生命支持。</p>"}, {"stage": 3, "scenario_id": "PTCH-14", "scenario_title": "核災威脅與掩蔽", "datetime": "", "summary": "【核災外洩與空調關閉】恆春核三廠（或遭戰術核武攻擊）受損，輻射塵警告發布。屏基被迫啟動「就地掩蔽（Shelter-in-place）」，全面強制關閉中央空調與對外通風。在南台灣高溫下，密閉病房內多名重症患者與穿戴防護衣的醫護出現熱衰竭。", "detail": "主責人：重症加護組陳素華督導長，公務機簡碼69236", "html": "<p><strong>1. 狀況概述與面臨挑戰</strong>：當就地掩蔽啟動、全院對外通風及中央空調全面強制關閉後，在南台灣 D日晴朗高溫（達 34 至 35度）之嚴酷高溫烘烤下，地下一樓（B1）避難醫療空間及密閉病房內之溫度將急劇升高，造成多名重症插管病人及在無網高溫下穿戴厚重防護衣之醫護同工，面臨集體急性中暑、低血糖及熱衰竭之致命威脅。重症加護組長（陳素華督導長，公務機簡碼69236）必須立即組織臨床團隊執行高溫熱衰竭應急與生命徵象手動監控，保全患者安全。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：陳素華督導長立即召集各護理站護理長與資深主護護理師，啟動<strong>「高溫密閉掩蔽下重症病人與同工熱衰竭應急處置SOP」</strong>。臨床團隊在無空調、極端悶熱之地下密閉環境中，執行<strong>「臨床高溫物理減壓與生命監控程序」</strong>：</p><p>1.  *同工防護分級與輪替*：在無中央空調下穿戴厚重 CBRN    防護衣極易脫水。護理長立即拍板「縮短班次、頻繁交替」：一線同工在污染紅區穿戴防護衣連續工作時間<strong>強制不得高於    2    小時</strong>，時間一到強制下班，退往結構最強固、設有通風與備用水源之約翰大樓    B1 員工休憩站休息，進行強迫補水、冰敷降溫。</p><p>2.  *病患高溫物理減緩*：護理同工使用備用無菌生理食鹽水、冰袋（從血庫及藥劑冰箱取出，不影響冷鏈前提下），放置於重症病人與發熱同工之頸部、腋下、股動脈處實施實體物理冰敷；使用溫水或濕毛巾為插管病人實施溫水拭浴、物理散熱，嚴密防止急性熱射病。</p><p>3.  *手寫生命徵象監控*：在 HIS/EMR 系統異常狀態下，主護護理師每 <strong>30    分鐘</strong>    必須手動監測並手寫記錄插管病患之體溫、心跳、呼吸及尿量，一旦發現患者核心體溫高於    38.5℃    或出現少尿，立即由重症醫師開立處方進行血管活性藥與低溫輸液點滴靜脈灌注。</p><p><strong>3. 實際確實數據與資源規劃</strong>： 重症加護組（陳素華督導長）精算 ICU高溫運行資源： 臨時 ICU（B1 共 23 床，設於韓偉 B1 腹膜透析與 MRI室）配置護理師 <strong>24 人</strong>，實施 12 小時雙班制輪班（每班配置 8人，每班次內細分 4 個 2 小時輪替週期）。主護護理師確保各病床備用之攜帶式氧氣鋼瓶壓力大於 <strong>100 bar</strong>，自撐 2小時。資材組緊急調撥無菌冰袋 50 個、退燒解熱劑 100 劑、電解質口服鹽 200包預置於護理站，以人工肉搏戰死守高溫掩蔽下之病患生命線。</p><p><strong>4. 指揮與管制（HICS 對接）</strong>： 陳素華督導長每 1小時定時與執行部醫療照護處長（徐禮平處長）進行有線電話或定頻無線電構聯，通報在院重症患者體溫、尿量監測讀數及同工熱衰竭人次，以便HICS 指揮中心協調外部調撥冰水物資。</p>"}, {"stage": 1, "scenario_id": "08", "scenario_title": "能源供應中斷", "datetime": "", "summary": "受國際能源情勢緊張、海運受限及區域軍事活動升溫影響，天然氣供應波動加劇；南部燃氣機組配合調度降載運轉，區域發電出力下修約15%，部分地區採分段限電及輪替供電，進一步波及工業生產、醫療與民生用電。", "detail": "由蕭麗萍督導長與陳素華督導長共同執行", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    市電限電直接威脅普通病房、洗腎室（血液透析組）與重症加護病房（ICU）內仰賴維生儀器的危急病人生命。住院及重症照護組（住院照護組蕭麗萍督導長，簡碼    69272；重症加護組陳素華督導長，簡碼    69236；血液透析組組長）立即進駐病區，執行<strong>「維生設備安全核檢與人工甦醒（捏球）應急    SOP」</strong>。</li><li>主護護理師逐床校驗重症病人插管呼吸器、高劑量升壓劑點滴幫浦之不斷電系統（UPS）蓄電狀態，確保其在市電切換發電機的空窗期維持正常生命支持。</li><li>洗腎中心與重症醫師評估病人病況，實施戰時「血液透析降載與純水節約程序」：針對非危急洗腎腎友，彈性調整將一週    3 次透析降至一週 2 次，以極限節約血液透析每日高達 <strong>126 噸的 RO    淨水</strong>。</li><li>若發電機 ATS 送電延遲或不斷電系統即將耗盡，護理長立即通報 HICS    指揮中心調撥人力，組織現場待命醫護及勤務志工成立<strong>「人工捏球小隊」</strong>進駐病床端，手動擠壓甦醒球（Ambu    Bag）維持患者人工呼吸，並手動抄錄生命徵象，以肉搏戰死守病患呼吸安全。</li><li><strong>實際確實數據</strong>： 護理人員確保各床備用可攜式氧氣小鋼瓶壓力大於    <strong>100 bar</strong>，可自撐 2 小時。不斷電系統在負載 10% 下可自撐 100    分鐘，負載 30% 可自撐 30 分鐘。護理組召集 <strong>30 名行政同工與志工</strong>    預置於加護病房，一旦發生完全斷電，立即提供一對一人工捏球支持，死守重症病人生命。</li></ul>"}, {"stage": 1, "scenario_id": "13", "scenario_title": "醫療機構停電危機", "datetime": "", "summary": "屏東地區主要變電設備突發故障，致屏東基督教醫院雙迴路受電中斷，全院無預警停電，嚴重威脅手術中病人及ICU維生系統；備援發電機即時投入，惟1小時後其中一台出現高溫預警，整體供電能力降至約五成，院內燃油存量降至50%以下，急重症照護風險升高。", "detail": "由蕭麗萍督導長與陳素華督導長共同執行", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    大限電與發電機故障極易導致在院普通病房、加護病房及正在進行手術之患者面臨核心儀器斷電危機。住院及重症照護組（蕭麗萍督導長，簡碼    69272；陳素華督導長，簡碼    69236）立即進駐病區，啟動<strong>「維生設備不斷電系統（UPS）核檢與人工甦醒（捏球）應急    SOP」</strong>。</li><li>普通病房及 ICU    護理人員逐床檢查插管重症病人呼吸器、高警訊點滴幫浦之不斷電系統（UPS）蓄電池蓄電狀態，確保在供電受限期間維持正常運作。</li><li>若發電機故障高溫停機，或 UPS 電池即將耗盡，護理長立即通報 HICS    待命處調撥人員，召集行政同工及志工組成<strong>「人工捏球小隊」</strong>進駐病床端，手動擠壓甦醒球（Ambu    Bag）維持患者人工呼吸，並手動抄錄生命徵象，以「臨床肉搏戰」死守重症病患之呼吸安全與生命支持。</li><li>手術室莊詩蘋督導長立即暫停非急迫性之手術排程，通知門診及住院病人，手術無限期延後，準備將手術耗材及麻醉藥劑向    B1 臨時手術室轉置。</li><li><strong>實際確實數據</strong>： 護理人員確保各床備用可攜式氧氣小鋼瓶壓力大於    <strong>100 bar</strong>，可自撐 2 小時。不斷電系統在負載 10% 下可自撐 100    分鐘，負載 30% 可自撐 30 分鐘。護理組召集 <strong>30 名行政同工與志工</strong>    預置於加護病房，一旦發生完全斷電，立即提供一對一人工捏球支持，死守重症病人生命。</li></ul>"}]}, {"role": "執行部醫療照護處／血液透析與重症加護組", "entries": [{"stage": 2, "scenario_id": "09", "scenario_title": "天然氣管線異常", "datetime": "8月9日", "summary": "連接永安液化天然氣接收站與南部供氣網之管線傳出異常警示，監測系統顯示壓力快速下降及流量波動，天然氣輸送能力受限，造成高屏地區燃氣發電、工業及重要民生用氣調度困難。", "detail": "由李羽仁主任與陳素華督導長帶領", "html": "<p>天然氣及燃氣電力調度極度困難。洗腎中心與重症加護組（李羽仁主任 /陳素華督導長，簡碼69236）立即盤點核心臨床耗能與水電極限存量。洗腎（血液透析組，分機12）每日需要高達 <strong>126 噸 RO 淨水</strong>。重症加護組與洗腎中心在醫師評估下，針對非危急病人，實施戰時「透析彈性降載與節約程序」：將常規「一週洗腎3 次」彈性降至<strong>「一週 2次」</strong>，以在維持腎友基本生命徵象下，最大程度節約 RO 純水與電力消耗。</p><p>同時，洗腎與重症護理人員檢查 RO水處理主機與備用配電迴路，確保其連接至發電機優先供電之核心配電盤。若遭遇空襲斷電或設備損毀，醫護人員熟稔執行<strong>「不拔針極速脫離SOP」</strong>（使用雙止血鉗夾閉剪斷管路，穿刺針不拔出並套上無菌注射帽固定），指引病人沿指定樓梯快速疏散至地下避難所，死守病患安全。</p>"}]}, {"role": "執行部醫療業務室暨病歷組", "entries": [{"stage": 2, "scenario_id": "11", "scenario_title": "通信基礎設施異常", "datetime": "8月9日", "summary": "屏東、潮州及東港地區電信機房出現系統異常與網路延遲，並伴隨部分基地台通訊負載異常升高；部分區域出現訊號不穩與通話中斷，影響政府通報、金融交易、醫療聯繫及核心資料處理能力。", "detail": "由醫療業務室主任馬事佐帶領，分機1022", "html": "<p>通信與掛號系統嚴重延遲。醫療業務室（馬事佐主任 /住院組櫃檯）立即啟動<strong>「Downtime掛號批價紙本程序」</strong>。櫃檯同工關閉異常電腦，拿出預置之「手工收據存根」、「現金收付日報表」與「紙本掛號登記簿」。對前來就醫之傷患，一律手寫病歷號，實施「先看診救治、後記帳補登」之戰時寬限程序，病歷組同工改以人工手動調閱庫存之實體病歷。</p><p>針對出院之病患，住院組全面改用手工結算或填寫「未結費用列管單」，允許家屬簽署欠據或預繳部分押金後即刻辦理快速出院離院，不允許因通訊延遲造成掛號大廳人潮積壓。病歷室同工用紙本夾鏈袋裝妥病患之紙本 EMR摘要與手寫給藥單，隨病床由徒步傳令兵（Runner）送往病房或 B1替代空間，維持醫療資訊流。</p>"}, {"stage": 2, "scenario_id": "12", "scenario_title": "通信服務中斷", "datetime": "8月9日", "summary": "受通訊服務異常影響，屏東市、潮州鎮、東港鎮、枋寮鄉及恆春鎮等地區出現通訊不穩與網路中斷，波及政府通報與金融交易系統；坊間流傳即將「全縣斷網」等訊息，引發集中查詢並進一步加重系統負載。", "detail": "由醫療業務室主任馬事佐帶領，分機1022", "html": "<p>外部公網中斷，HIS/NIS 等核心資訊系統全面陷入 Downtime狀態。醫療業務室（馬事佐主任）立即動員全體住院組、批價組及病歷組行政同工，轉為<strong>「手工行政與傳令兵（Runner）機制」<strong>。行政組與計畫部配合，編組大批返院召回之同工擔任徒步傳令兵，傳令同工必須強制穿戴</strong>紅色專屬Runner 臂章</strong>。</p><p>傳令兵穿梭於地下各管制區，攜帶紙本掛號單、手寫處方箋、交叉配血報告與手寫檢驗單。傳令同工與醫護人員大聲執行「口令覆誦（Read-back）」，親自將藥品、檢體與血袋送達臨時開刀房或急診。系統恢復前，病歷組同工在病歷庫手動將所有就醫軌跡登錄至實體「當機期間就醫造冊簿」，待系統通訊恢復後，再由專人補登錄至HIS 系統，防範病歷及行政檔案缺失。</p>"}, {"stage": 3, "scenario_id": "10", "scenario_title": "電力基礎設施攻擊", "datetime": "", "summary": "屏東市、潮州及東港地區多處一次變電所疑遭敵特工滲透破壞，設備異常並引發饋線跳脫，造成屏東市大範圍停電與電壓不穩，並波及麟洛、內埔、萬丹及潮州；縣府機關、屏東基督教醫院、產業園區與主要交通號誌均受影響。", "detail": "由醫療業務室主任馬事佐帶領，分機1022", "html": "<p>全院大停電波及 HIS 掛號、批價與電子病歷。醫療業務室（馬事佐主任 /住院組櫃檯）立即向指揮官呈報，宣告全院進入<strong>Downtime（系統當機）紙本降級作業流程</strong>。櫃檯收費同工關閉異常電腦，物理砸開「當機緊急箱」封條，取出實體紙本病歷夾、手工收據存根、現金收付日報表及紙本掛號登記簿。</p><p>面對大批湧入之病患，掛號、批價與住院組一律手工手寫開立開單、填寫三聯式處方單及未結費用列管單。實施戰時<strong>「先就醫看診、後手工記帳、事後補登錄」</strong>之寬限程序。病歷室同工改以人工手動調閱庫存實體紙本病歷與 EMR 快照摘要。病歷同工用紙本夾鏈袋裝妥處方，交由徒步傳令兵（Runner）送往病房及 B1備援醫療區，傳令同工與醫護大聲覆誦口令（Read-backMechanism）確認醫囑，在無網無電下維持資訊流。</p>"}, {"stage": 1, "scenario_id": "07", "scenario_title": "網路攻擊／通信中斷", "datetime": "", "summary": "灰色地帶騷擾持續升高，敵對勢力針對南部通信節點展開系統性攻擊，中華電信屏東、潮州及東港地區機房遭滲透與網攻，部分核心資料節點受損，造成行動通信、市話及網路服務不穩，線上交易與行動支付驗證異常。", "detail": "由醫療業務室主任馬事佐帶領，分機1022", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    外部公網及掛號、收費電腦系統中斷。醫療業務室（馬事佐主任；代理人為住院組長，分機    1022）立即向指揮官呈報，宣告全院進入<strong>「Downtime    紙本降級與傳令兵（Runner）機制」</strong>。</li><li>櫃檯收費與住院同工關閉異常電腦，拿出預置之<strong>「當機緊急箱」<strong>，物理砸開箱體封條，取出實體紙本病歷夾、手工收據存根、現金收付日報表及紙本掛號登記簿。對前來就醫之傷患，一律手工手寫開立單據，給予臨時病歷號，實施</strong>「先看診救治、後手工記帳、事後補登錄」</strong>之戰時寬限程序。</li><li>病歷室同工改以人工手動調閱庫存實體紙本病歷與 EMR    歷史快照摘要。病歷組指派返院召回之同工擔任徒步傳令兵（Runner，強制穿戴<strong>紅色    Runner 臂章</strong>），用紙本夾鏈袋裝妥處方箋與檢驗單，穿梭於急診、藥局與    B1 替代醫療空間，與醫護大聲執行<strong>「口令覆誦（Read-back    Mechanism）」</strong>確認醫囑，在零網路下維持診療資訊流。</li><li><strong>實際確實數據</strong>：    病歷組與住院櫃檯整備手工紙本掛號單及三聯式處方箋共 <strong>1,500    份</strong>（可自撐至少 72 小時 Downtime 運作），派駐 <strong>10 名專責 Runner</strong>    穿戴紅色臂章，每小時往返各病區 4    次，以肉搏戰防範病歷及醫療資訊斷鏈。</li></ul>"}, {"stage": 1, "scenario_id": "PTCH-02", "scenario_title": "資訊中斷/網攻", "datetime": "", "summary": "【醫療系統遭勒索癱瘓】院內HIS（醫療資訊系統）與PACS（影像系統）突遭境外惡意程式與DDoS攻擊，電子病歷無法存取、掛號系統死機。院方被迫緊急啟動「紙本盲運作」機制，大幅拖延看診與急救效率。", "detail": "主責人：醫療業務室主任馬事佐，公務機簡碼69115", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當電子病歷與掛號死機，常規醫療流程中斷時，醫療業務室暨病歷組（醫療業務室主任馬事佐，公務機簡碼69115；代理人住院組長）必須在 <strong>15 分鐘內</strong> 宣告全院進入<strong>「Downtime系統當機紙本降級運作SOP」</strong>。病歷組及收費櫃檯同工立即關閉異常終端機，砸開診間與急診櫃檯之<strong>「當機緊急箱」</strong>封條，取出預置之實體紙本掛號登記簿、三聯式處方箋、手工收據存根及手寫紙本病歷夾。</p><p>在零聯網情境下，病歷管理組同工立即啟動<strong>「紙本病歷提領與手寫病歷號造冊程序」</strong>：病歷室同工戴上安全帽，親至實體檔案庫房，以人工手動調閱庫存之實體紙本病歷；若HIS 當機但局部內網可用，則指派同工至「備份病歷伺服器」印出紙本 EMR摘要快照，與手寫處方箋一同彙整。為保障患者就醫與辨識安全，急診與病房批掛同工改採手寫臨時病歷登記，核發配戴<strong>實體防偽識別手圈</strong>（手圈上標註唯一的臨時紙本病歷號），並配合檢檢掛號結果，在病患胸前掛上明顯之<strong>紅、黃、綠、黑四色「視覺分類牌」</strong>，以便醫護及傳令Runner 在黑暗或混亂中能直接視覺辨識病患動向與所在位置。</p><p>病房書記與病歷管理同工轉任之傳令兵（Runner，必須強制佩戴<strong>專屬紅色Runner臂章</strong>），以防潮防水夾鏈袋裝妥紙本醫囑與檢驗單，徒步穿梭於病區、藥局、檢驗科與開刀房。Runner在傳遞紙本時，必須與接收端醫護大聲實施<strong>「口頭醫囑/危急值雙重覆誦（Read-backMechanism）」</strong>，核實後由主治醫師手寫簽章，確保在勒索軟體網攻下診療法效性與病人安全100% 完好性。</p><p><strong>2. 確實數據與資源規劃</strong>：醫療業務室（馬事佐主任）精算人力配置：急診檢傷櫃檯配置批價掛號同工 <strong>5名</strong>；一般病房配住院組 <strong>9 名</strong>（含瑞光院區）；加護病房與手術室配住院組<strong>3 名</strong>。病房書記及病歷組整備手工掛號單、紙本三聯處方箋及手工病歷夾共計<strong>1,500 份</strong>（可完全自撐至少 72 小時極限 Downtime 看診量）。病歷室指派<strong>10 名專責 Runner</strong> 每小時往返各診區 4次，以肉搏戰防範病歷與臨床給藥斷鏈。</p>"}]}, {"role": "執行部醫療照護處／急診照護組", "entries": [{"stage": 2, "scenario_id": "PTCH-06", "scenario_title": "通信服務中斷", "datetime": "", "summary": "【院外斷訊與內部通訊降級】高屏地區電信機房遭破壞，對外市話與行動網路全面中斷。病患家屬無法聯繫院內，消防局119救護車無法進行到院前通報；院內跨科室溝通僅能仰賴預備的無線電對講機，通訊陷入混亂。", "detail": "主責人：急診照護組長陳美錚護理長，公務機簡碼69113", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>： 當 119無法到院前通報，且掛號系統與掛號批價系統因網路斷鏈死機時，急診照護組（急診組長陳美錚護理長，公務機簡碼69113；代理人：急診資深護理師）必須立即宣告急診進入<strong>「斷網當機Downtime 降級收治與徒步傳令兵（Runner）運作 SOP」</strong>。急診團隊在 <strong>10分鐘內</strong> 物理重構檢傷空間，停止一切常規電子開單與刷卡掛號程序。</p><p>檢傷護理師取出預置於急診櫃檯的<strong>「當機緊急箱」<strong>，砸開箱體封條，拿出紙本「大量傷患檢傷單」、手工手寫病歷夾及三聯式處方箋。新入院傷患一律手工分配唯一之「臨時病歷號」，並為病患配戴實體</strong>防偽手圈</strong>。檢傷人員依據 <strong>START 快速檢傷分類原則</strong>，對病患實施 30秒極速檢傷，並在其胸前掛上明顯之<strong>紅（重傷）、黃（中傷）、綠（輕傷）、黑（死亡）四色「視覺分類牌」</strong>，以便醫護人員在無電腦輔助之黑暗與混亂環境下直接視覺辨識病患動向與所在位置。</p><p>在零聯網與呼叫系統中斷狀態下，急診照護組啟動本院<strong>「徒步傳令兵（Runner）機制」</strong>：指派由行政、志工及非臨床同工轉任、穿戴<strong>紅色 Runner專屬識別臂章</strong>之傳令兵，用紙本防水夾鏈袋裝妥手寫醫囑、紙本檢驗單及交叉配血檢體，徒步穿梭於急診紅區、B1地下手術室、血庫及藥局。傳令兵與接收端醫護在移交紙本醫囑與藥品、血品時，必須落實最嚴格的<strong>「口頭醫囑/危急值雙重覆誦機制（Read-backMechanism）」</strong>：雙方大聲覆誦患者临时病歷號、藥物名稱、劑量與最後給藥時間，確認無誤後由主治醫師手寫簽章，以臨床肉搏戰確保在資訊全黑狀態下的診療安全與醫囑法效性。</p><p><strong>2. 實際確實數據與資源盤點</strong>：急診照護組（陳美錚護長）與病歷管理組協同整備手工紙本掛號登記簿、大量傷患手寫病歷表、三聯式處方箋共計<strong>1,500 份</strong>（以每日看診需求精算，可自撐至少 <strong>72 小時</strong>極限當機運作量）。 急診組第一波召回並調派 <strong>10 名專責 Runner</strong>穿戴紅色臂章在急診哨口與各樓層間待命，每小時往返各病區、血庫與藥庫至少 4次，以肉搏物流確保重症救治之病歷與給藥數據絕不斷鏈。</p>"}, {"stage": 2, "scenario_id": "PTCH-09", "scenario_title": "生化威脅與封鎖", "datetime": "", "summary": "【不明生化包裹攻擊】急診檢傷台收到疑似含有「炭疽桿菌（或不明致病粉末）」的惡意包裹，數名護理師接觸後出現急性紅腫與呼吸急促。院方需緊急拉起封鎖線，將急診室「就地隔離」，並啟動B級防護衣穿戴與通報應變。", "detail": "主責人：急診科主任、陳美錚護理長，公務機簡碼69113", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：面對疑似炭疽桿菌惡意包裹襲擊急診，數名暴露護理師出現症狀，急診照護組（陳美錚護理長，公務機簡碼69113；代理人：急診資深護理師）與感染管制小組必須立即宣告急診進入<strong>「生化防禦與暴露人員就地洗消隔離程序」</strong>。急診大門鐵捲門下拉鎖閉後，急診醫護立即執行戰術空間分劃，建立臨時「生化污染隔離區（HotZone）」與「無菌醫療安全區」。</p><p>感管小組與 T-CERT救護班人員立即在急診前方指定防區架設<strong>「戶外生化淋浴洗消裝置」</strong>。急診醫護同工全面換裝 B級防護衣（戴防毒面具、防化學手套、耐酸鹼水鞋）。對於 3名出現急性紅腫、咳嗽與呼吸急促之受污染暴露護理同工，洗消人員實施「現場溫水淋浴沖洗、剪除污染衣物、高浓度消殺與抗敏中和處置」，並引導其進入就地隔離區隔離觀察。對於生化污染產生之大量污水，由環保清潔工引流導入<strong>「地下緊急污水隔離暫存池」</strong>，進行密閉中和，嚴防病原體排入外網。</p><p>急診醫師依據 <strong>CBRN生化傷患處置指引</strong>，手寫紙本醫囑，立即給予暴露人員及懷疑吸入粉末之病患預防性給藥（如強效抗生素Ciprofloxacin 或Doxycycline，不待電子開單、實施推拉式盲派物流，直接運送發放），全力搶救生命，以化學與生化防禦戰術死守本院感控生命線。</p><p><strong>2. 實際確實數據與資源盤點</strong>：急診組（陳美錚護長）與感管小組盤點生化消殺物資： 本院備有專用 B 級防護衣<strong>50 套</strong>、一次性 C 級防護衣 <strong>100 套</strong>、防化學手套 200雙、強效備用抗生素 <strong>300 劑</strong>，均由專人看守存放於 B1 管制防護庫中。洗消同工每 2 小時巡檢消殺漂白水活性及污水池儲水量（50 噸，72小時內不爆倉），確保生化化災處置 100%完好性，保護在院其餘住院病人與同工安全。</p>"}, {"stage": 3, "scenario_id": "12", "scenario_title": "警察局遭無人機攻擊", "datetime": "", "summary": "屏東縣警察局民防管制中心及屏東、潮州、東港、枋寮、恆春等分局同步遭多波次無人機攻擊，致防情通報與防空警報發布功能部分中斷；執勤警力出現傷亡，影響現場應變、治安與交通管制能力。", "detail": "由急診主任、陳美錚護理長帶領，簡碼69113", "html": "<p>警察分局遭攻擊造成大量警力與民眾傷亡，大批爆炸撕裂傷、粉碎性骨折傷患由救護車與私人車載運陸續送達。急診主任與護理長（陳美錚，公務機簡碼69113）評估就醫人數瞬間飽和後，立即通報指揮官，由總機發布<strong>「急診333」大量傷患廣播三次</strong>。</p><p>急診團隊立即實施「急診 333」大量傷患動員流程：</p><ul><li><strong>跨科人力緊急召回</strong>：透過「一呼百應」系統，緊急召回居住於<strong>醫院 1    公里內（30 分鐘內可到院）之醫護戰力（第一波預計召回 47 名護理人員及    31 名醫務同工）</strong>至急診紅區、黃區報到支援。</li><li><strong>空間戰術重構</strong>：工務與勤務同工於 30    分鐘內清空一樓門診大廳候診椅，將其重構為「大量傷患一線檢傷區」與「綠區輕傷處置區」，強勢將綠區輕症患者與恐慌群眾阻絕於核心搶救區外。</li><li><strong>START 快速檢傷</strong>：檢傷護理師依據 START    原則，快速對傷患之呼吸、循環及意識進行評估，在傷患胸前掛上明顯的<strong>紅、黃、綠、黑四色視覺分類牌</strong>。重傷患推送至「急診紅區」（工務室前方3床），由資深醫師與呼吸治療師執行插管與    DCR 搶救。</li></ul>"}, {"stage": 3, "scenario_id": "15", "scenario_title": "油品廠火災事故", "datetime": "", "summary": "屏南產業園區某油品儲運廠疑遭不明來源破壞，儲槽設施受損並引發火勢，造成油品外洩與濃煙；事故影響台1線枋寮段、周邊產業與工程物料供應，並對交通維修能量及民生物資配送體系造成壓力。", "detail": "由急診主任、陳美錚護理長帶領，簡碼69113", "html": "<p>油品廠大火與外洩，極易造成大批化學灼傷、吸入性有毒煙霧嗆傷之病患後送。急診主任與護理長陳美錚立即啟動「化災大量傷患收治與實體除污SOP」。 急診團隊於急診前方指定車道或恩慈 D棟旁，迅速架設<strong>「臨時除污區（Decontamination Zone）」</strong>。</p><p>所有遭受油品及化學有毒煙霧污染之傷患，進入急診硬邊界前，強制在此由穿戴 B級防護衣之醫護執行溫水淋浴沖洗、剪除污染衣物及中和除污，避免化學毒物被帶入內部地下醫療空間造成二次中毒。急診主任召回兒科、外科主治醫師，投入急診紅區。 護理人員依 <strong>START 原則</strong>實施紅、黃、綠、黑四級檢傷，掛上四色視覺分類牌。對吸入性呼吸窘迫之紅區病患，優先執行DCR 氣管插管、高濃度氧氣治療與解毒抗敏輸液，死守前線生命線。</p>"}, {"stage": 4, "scenario_id": "03", "scenario_title": "灘岸戰鬥傷亡", "datetime": "", "summary": "東港至枋寮沿海爆發灘岸戰鬥，部分建物及漁港設施受砲火波及，造成大量民眾傷亡；初步統計死亡28人、重傷36人、輕傷188人。另重要能源與通信設施遭敵特工滲透破壞，引發駐警與其對抗。", "detail": "由急診科主任、陳美錚護理長帶領，公務機簡碼69113", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：灘岸戰鬥爆發，部分建物及港口受波及，大量民眾傷亡（死亡 28人、重傷36人、輕傷188人），大批重創、撕裂傷、爆炸傷及骨折患者陸續由救護車與私人載具送達。急診主任評估就醫人數瞬間飽和、醫療量能超載後，立即向指揮官報告，指示總機發布<strong>「急診333」大量傷患廣播三次</strong>。急診照護組（陳美錚護長）立即啟動<strong>「急診333 大量傷患極限召回與空間重構程序」</strong>。</p><p>急診團隊於 <strong>30分鐘內</strong>執行戰術空間重構：工務與庶務人員迅速清空一樓門診大廳之候診椅，將其轉換為「大量傷患一線檢傷區」與「綠區輕傷縫合包紮區」，強勢將大批恐慌之輕傷民眾（約188人）阻絕於核心急救區外，確保重症紅區不受干擾。檢傷護理師依據 <strong>START快速檢傷分類原則</strong>，對傷患之呼吸、循環與意識實施30秒極速評估，在傷患胸前掛上明顯之<strong>紅（重傷）、黃（中傷）、綠（輕傷）、黑（死亡）四色視覺分類牌</strong>。對送入「急診紅區」（共3床）之 36名重傷患，由急診創傷團隊執行損傷控制復甦（DCR），並隨即送往 B1臨時開刀房（韓偉大樓 B1 腹膜透析室，配置無菌手術床 1張） 執行救命之DCS（損傷控制手術）。</p><p><strong>2. 確實數據與資源規劃</strong>：急診組（陳美錚護長）啟動一呼百應簡訊系統，緊急召回居住於<strong>醫院1公里內（30分鐘內可到院）之核心醫護戰力，預計第一波召回 47名護理人員及31名醫務同工</strong>，並從 MICU、SICU 及各病房抽調 1至2名護理同工支援。急診組協同血庫幸良蘭副主任（公務機簡碼 61417），精算戰傷輸血速率，一旦RBC（紅血球）庫存低於 48小時警戒（小於 41Units），立即呈報指揮官，做好隨時啟動院內同工「走動式活體血庫」之準備。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：急診組與文件記錄處（吳瑞敏經理）對接，指派行政人員於急診檢傷櫃檯進行手工手寫紙本登記，核發防偽手圈並編給臨時病歷號，病患動向由Runner 每 30分鐘抄送狀況分析處彙整。</p>"}, {"stage": 4, "scenario_id": "PTCH-19", "scenario_title": "轉診後送癱瘓", "datetime": "", "summary": "【救護車斷油與孤島效應】高屏大橋遭炸毀，且院內救護車因「斷油」完全無法發動。屏基無法將超出處置能量的神經外科、嚴重燒燙傷病患後送至高雄醫學中心。重症病患只能滯留急診走廊等死，醫療系統實質上成為「孤島」。", "detail": "主責人：急診照護組長陳美錚護理長，公務機簡碼69113", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：當跨溪轉診完全癱瘓、重症病患被迫滯留在地下一樓（B1）急診走廊及臨時加護病房內等待外部救援時，病患之失血、水鈉失衡、感染與高燒將急劇惡化，極易在短時間內發生多重器官衰竭、急性腎損傷而大批死傷，對一線醫護同工與在院家屬造成巨大的防衛心理崩潰與道德撕裂。急診科主任與護理長陳美錚（公務機簡碼69113）必須在孤島絕境下，實施極限創傷保守支持、止痛及床邊關懷，死守病患生存尊嚴。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：急診護理長陳美錚立即宣布急診紅區轉入<strong>「醫療孤島極限保守支持與姑息減痛照護SOP」</strong>。急診醫護同工在零外送、零轉診的廢墟中，執行以下最剛性的物理照護步驟：</p><ul><li>*床邊重症損傷控制支持（DCR）*：對於無法轉送之神經外科嚴重顱內出血、顱骨破片貫穿病患，急診專科醫師與護理同工使用備用之攜帶式氧氣鋼瓶及降腦壓藥劑（如    Mannitol 靜脈重力點滴灌注），將病患頭部手動抬高 30    度，嚴密手動監測瞳孔大小與對光反射。</li><li>*大面積燒燙傷極限創傷敷料處置*：對於大面積（＞50%    BSA）燒傷患者，在斷水狀態下，護理人員嚴禁使用污染自來水沖洗。一律使用資材組盲派運送之<strong>「瓶裝無菌生理食鹽水」</strong>進行定點濕敷；使用無菌凡士林紗布或本院儲備之「燒傷專用無菌生物敷料」對創面實施實體覆蓋、手動包紮，嚴防體液蒸發與低體溫症，並手動每    1 小時精算其手動滴注生理食鹽水之滴數（維持每小時尿量在 30-50 mL    滴速紅線）。</li><li>*重度止痛與床邊心理安撫（PFA）*：在無網無機、等待直升機後送之極高壓煎熬下，病患常伴隨嚴重的肉體劇痛與精神崩潰。主治醫師立即手動開立麻醉管制藥品（如    Morphine    靜脈注射），由主護護理師與病房護理長雙人核對防偽識別手圈，手動注射。社工人員與護理同工一對一蹲在病床旁，緊握病患雙手、進行溫和拍肩、實施床邊心理第一輔助（PFA），大聲給予安撫，保障其生存信念。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>： 急診照護組精算孤島留滯病人照護資源數據：地下一樓臨時急診紅區（配置 3張急救床，設於工務室前方安全區）與加護病房（23 床）全面投入收治。</p><ul><li>主護護理師確保各病床備用之<strong>攜帶式氧氣鋼瓶壓力大於 100 bar</strong>，自撐 2    小時。</li><li>資材組緊急盲派調撥生理食鹽水點滴 10 箱（240 瓶）、無菌外傷包 50    組、管制止痛劑 100 劑、以及無菌生物敷料 30 套至急診紅區。    護理同工改採紙本手寫病歷，每 30    分鐘手動登記生命徵象，以人道光輝死守醫療防線。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>：急診護理長隨時將留滯急診走廊重症患者之體徵惡化狀況、敷料與氧氣鋼瓶消耗餘量，以定頻對講機向執行部醫療照護處長（徐禮平副部長）報告，以便聯絡官精準向空勤總隊回報撤離優先波次。</p>"}, {"stage": 1, "scenario_id": "11", "scenario_title": "化學災害事故", "datetime": "", "summary": "（通勤尖峰）屏東科技產業園區某食品冷鏈廠之無水氨系統發生外洩，現場出現刺鼻氣味，多名人員頭暈、嘔吐及呼吸不適，初估約50餘人受影響，其中5人重症、15人需住院；氣體受西南風影響向東北擴散，波及園區周邊道路、台1線及縣道189線。", "detail": "由急診科主任、陳美錚護理長帶領，公務機簡碼69113", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    屏東科技產業園區某冷鏈廠無水氨（Ammonia）外洩，約 50 餘人受影響（5    人重症、15 人住院），氣體向東北擴散波及台 1 線與縣道 189    線。大批吸入有害氣體發生頭暈、嘔吐、呼吸窘迫及皮膚灼傷之化災患者陸續由救護車與私人載具送達本院。急診科主任評估就醫人數瞬間飽和後，立即向指揮官呈報，由總機發布<strong>「急診    333」大量傷患廣播三次</strong>。急診組（陳美錚護理長，公務機簡碼    69113）立即啟動<strong>「化災大量傷患極限召回、實體除污與 START 檢傷分類    SOP」</strong>。</li><li>急診團隊在 <strong>30 分鐘內</strong>    執行戰術空間重構：工務與庶務人員迅速清空一樓門診大廳，將其轉換為「化災大量傷患一線檢傷區」與「綠區輕傷處置區」。</li><li>檢傷護理師穿戴 B    級防護衣，於急診前方指定車道設立<strong>「臨時除污區（Decontamination    Zone）」</strong>：所有受無水氨污染之傷患，強制在此由溫水淋浴沖洗、剪除污染衣物、實施中和除污後，方得進入內部醫療紅區，嚴防化學毒物帶入大樓密閉地下空間造成二次污染。</li><li>護理人員依據 <strong>START 快速檢傷分類原則</strong>，對傷患實施 30    秒評估，掛上紅、黃、綠、黑四色視覺分類牌。重症紅區 5    名重傷患送入急救紅區，由資深醫師與呼吸治療師執行損傷控制復甦（DCR），給予氣管插管、高濃度氧氣吸入與解毒抗敏輸液，死守搶救生命線。</li><li><strong>實際確實數據</strong>： 急診組啟動一呼百應簡訊召回：召回居住於<strong>本院 1    公里內（30 分鐘內到院）之核心急診與創傷醫護共 47 名護理人員及 31    名醫務同工</strong>投入搶救。血庫幸良蘭副主任（簡碼    61417）備妥備備血製血量能，確保 RBC 庫存維持高於警戒線 41 Units。</li></ul>"}, {"stage": 1, "scenario_id": "15", "scenario_title": "醫療量能衝擊", "datetime": "", "summary": "傷患陸續送往屏東基督教醫院等急救責任醫院，短時間內約40餘人就醫，院方啟動毒化災與大量傷患應變機制；同時醫療資訊系統遭勒索軟體及DDoS攻擊，電子病歷與掛號系統運作異常，影響急診收治、手術調度及病人辨識。", "detail": "由急診科主任、陳美錚護理長帶領，公務機簡碼69113", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    傷患陸續送往本院等急救責任醫院，短時間內約 40    餘人就醫，本院啟動毒化災大量傷患應變機制。同時醫療資訊系統（HIS）遭勒索軟體及    DDoS    攻擊癱瘓，電子病歷與掛號異常，影響急診收治與病人辨識。急診主任與護理長陳美錚（公務機簡碼    69113）立即啟動<strong>「Downtime 狀況大量傷患收治與實體手寫病歷    SOP」</strong>。</li><li>急診團隊在 <strong>30 分鐘內</strong>    執行戰術空間重構：工務與庶務人員迅速清空一樓門診大廳，將其轉換為「大量傷患一線檢傷區」與「綠區輕傷處置區」。</li><li>急診護理師在無電腦聯網、HIS    當機狀態下，全面降級改採<strong>紙本「大量傷患檢傷單」與手寫處方箋</strong>。檢傷護理師依據    <strong>START 快速檢傷分類原則</strong>，快速對傷患實施 30    秒評估，在傷患胸前掛上紅、黃、綠、黑四色視覺分類牌。</li><li>為確保病人辨識安全，急診組為每位入院傷患手動核發配戴具有「唯一隨機病歷號」之防偽手圈。</li><li>指派配戴紅色專屬 Runner    臂章之徒步傳令同工，以夾鏈袋裝妥紙本醫囑與檢體，送往藥局及檢驗血庫；藥師與護理同工大聲執行<strong>「口令覆誦（Read-back    Mechanism）」</strong>核對處方，在網攻癱瘓下維持醫療品質。</li><li><strong>實際確實數據</strong>： 急診組啟動一呼百應簡訊召回：召回居住於<strong>本院 1    公里內（30 分鐘內到院）之核心急診與創傷醫護共 47 名護理人員及 31    名醫務同工</strong>投入搶救。血庫幸良蘭副主任（簡碼    61417）備妥備備血製血量能，確保 RBC 庫存維持高於警戒線 41 Units。</li></ul>"}, {"stage": 1, "scenario_id": "PTCH-05", "scenario_title": "院外化災波及", "datetime": "", "summary": "【鄰近工業區毒氣外洩】屏東科技產業園區因人為破壞發生無水氨氣體外洩，毒氣隨風向朝市區飄散。急診室瞬間湧入數十名呼吸道灼傷病患，院方需立即啟動毒化災（HAZMAT）戶外除污機制。", "detail": "主責人：急診照護組長陳美錚護理長，公務機簡碼69113", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當鄰近之屏東科技產業園區因人為破壞發生無水氨（Ammonia）化學氣體外洩，受西南風影響向市區擴散，導致大批吸入毒氣發生呼吸道灼傷、劇烈咳嗽、眼部刺痛及皮膚化學灼傷之化災患者瞬間湧入本院急診室時，急診科主任立即向指揮官呈報，由總機發布<strong>「急診333」大量傷患廣播三次</strong>。急診照護組（陳美錚護理長，公務機簡碼69113；代理人急診資深護理師）立即啟動最高規格之<strong>「毒化災（HAZMAT）大量傷患極限召回、實體戶外洗消除污與START 檢傷分類 SOP」</strong>。</p><p>急診護理人員立即穿戴 B 級或 C級化學防護衣、防毒面具及耐酸鹼手套，於急診前方指定車道與空地迅速架設<strong>「臨時戶外洗消除污區（DecontaminationZone）」</strong>。 洗消護理同工與 T-CERT救護班人員配合，強制所有受無水氨污染之化災傷患在此接受溫水全身淋浴沖洗、剪除污染衣物、實施中和除污，<strong>「病患未經徹底除污洗消前，絕對禁止送入大樓內部及B1避難醫療空間」</strong>，嚴防劇毒氣體帶入地下密閉空間造成大範圍醫護及重症病患之二次化學中毒與交叉感染。除污完畢後，檢傷護理師依據 <strong>START 快速檢傷分類原則</strong>，在 30秒內快速評估傷患之呼吸、意識與循環，在傷患胸前掛上<strong>紅（重傷）、黃（中傷）、綠（輕傷）、黑（死亡）四色視覺分類牌</strong>，重症5名吸入性呼吸窘迫傷患送入急救紅區，由資深醫師與呼吸治療師立即執行損傷控制復甦（DCR）及氣管插管給氧。</p><p><strong>2. 確實數據與資源規劃</strong>：急診組（陳美錚護長）啟動一呼百應簡訊系統，緊急召回居住於<strong>醫院 1公里內之核心急診醫護同工共計 78 名</strong>（含護理人員 47 名、醫檢與行政骨幹31 名）於 30分鐘內到院報到投入化災搶救。急診組協同血庫幸良蘭副主任（公務機簡碼61417）精算，確保 RBC 備血量高於警戒線 <strong>41Units</strong>，隨時因應化災合併爆炸傷患者之緊急輸血救命手術。</p>"}]}, {"role": "執行部醫療照護處／開刀房暨感染管制組", "entries": [{"stage": 2, "scenario_id": "PTCH-08", "scenario_title": "能源供應中斷", "datetime": "", "summary": "【斷氣與滅菌系統停擺】天然氣管線全面中斷。屏基中央廚房停擺，無法供應病患餐食；更嚴重的是，高壓蒸氣滅菌鍋（Autoclave）因無蒸汽無法運作，手術室與各病房之醫療器械面臨無法消毒的感控危機。", "detail": "主責人：開刀房莊詩蘋督導長，公務機簡碼65311", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：天然氣中斷導致本院高壓蒸氣滅菌鍋（Autoclave）因無蒸汽無法運作，手術室與各病房面臨無菌醫療器械斷供之致命感控危機。開刀房（莊詩蘋督導長，公務機簡碼65311；代理人：手術室護理長）必須立即向執行部長報告，啟動<strong>「高壓滅菌中斷應急與無菌器械戰時節流SOP」</strong>。</p><p>莊詩蘋督導長立即下令，全院<strong>無限期暫停</strong>所有非急迫性（Elective）常規手術、物理治療及門診檢查，將開刀房耗材及無菌包存量<strong>100% 絕對保留給急診化災、灘岸戰傷等需執行DCS（損傷控制手術）之危急重症病人</strong>，從源頭扼制無菌包之消耗速率。</p><p>針對急需滅菌之救命手術器械，開刀房技術員手動切斷已停機的高壓蒸氣鍋管路，手動啟動備用之<strong>「低溫等離子氣體滅菌鍋」或「化學浸泡快速消毒程序」</strong>：護理人員使用高濃度化學消毒劑（如 2%戊二醛溶液）對手術剪、持針器、止血鉗進行實體物理浸泡，並手動印發「化學浸泡滅菌計時與查檢表」，嚴格記錄浸泡時間（強制浸泡10 小時以上以達到滅菌效果）。無水可用時，開刀房護理師術前刷手改採<strong>「免用水乾式酒精消毒液」<strong>，手術傷口沖洗一律改以資材組配發之</strong>「瓶裝無菌生理食鹽水」</strong>進行極限物理沖洗，手動手寫雙簽記錄每班器械感控狀態，死守戰時無菌感控紅線，防止痢疾與院內院內感染爆發。</p><p><strong>2. 實際確實數據與資源盤點</strong>：開刀房莊詩蘋督導長會同供應室精算無菌資材：本院目前儲備之一次性拋棄式無菌手術包共計 <strong>120 套</strong>、一次性無菌手套 <strong>15箱</strong>，在常規耗用降載模式下，可<strong>自撐至少 72 小時核心創傷手術需求</strong>。開刀房技術員每 <strong>2 小時</strong>實施一次化學浸泡液濃度快篩檢測（確保有效濃度高於2.0%），並將備用低溫滅菌鍋 UPS 電池（自撐 30分鐘）與柴油發電機配電迴路鎖定在優先供電之核心配電盤，確保無蒸汽狀態下感控不崩潰。</p>"}, {"stage": 3, "scenario_id": "PTCH-12", "scenario_title": "物流與衛材斷鏈", "datetime": "", "summary": "【醫療耗材與藥品見底】聯外橋樑封閉，北部及高雄物流中心無法南下。院內拋棄式耗材（空針、無菌手套、紗布）、點滴（生理食鹽水）及廣效抗生素庫存告罄。被迫重啟早期「煮沸/化學浸泡消毒」模式重複使用耗材。", "detail": "主責人：開刀房莊詩蘋督導長，公務機簡碼65311", "html": "<p><strong>1. 狀況概述與面臨挑戰</strong>：當拋棄式無菌耗材、抗生素與無菌生理食鹽水徹底斷鏈且面臨見底威脅時，手術室與各病房面臨嚴重的無菌器械斷供與大範圍院內交叉感染、痢疾爆發之致命感控危機。感染管制組與開刀房莊詩蘋督導長（公務機簡碼65311；代理人：手術室護理長）必須在極限物資匱乏下，重啟早期防線，執行無菌器械之極限節流、重複使用與嚴格化學消殺感控。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：莊詩蘋督導長在接獲資材組「拋棄式無菌包僅存 3 日儲量」之通報後，必須在<strong>15 分鐘內</strong>協同感染管制組，啟動最高規格之<strong>「無菌耗材與器械戰時節流、重複使用及化學浸泡快速消毒SOP」</strong>。開刀房立即執行最嚴格之醫療節流：<strong>全面取消並無限期暫停全院所有非急迫性（Elective）常規手術、物理治療及侵入性門診檢查</strong>。將全院殘存的無菌手術包與耗材，<strong>100%絕對優先且僅保留給急診化災、灘岸戰傷等必須執行損傷控制手術（DCS）之危急重症病人使用</strong>，從源頭極限壓低無菌資材之消耗速率。</p><p>針對急需滅菌之救命鋼製手術器械，由於天然氣斷氣導致高壓蒸氣鍋停擺，工務與消毒技術員必須立即重啟早期備援程序，切換採用<strong>「化學浸泡與煮沸快速消毒程序」</strong>：</p><p>1.  *煮沸消毒*：技術員在結構強固的約翰大樓 B1    安全區利用備用發電機電源之電熱爐，將手術鉗、持針器、止血鉗置於無菌不銹鋼器皿內，手動計時<strong>「強制持續煮沸    20 分鐘以上」</strong>以達到高水平消毒標準。</p><p>2.  *化學浸泡消毒*：使用備用高濃度化學消毒劑（如 2%    戊二醛強效化學消殺漂白水）對精細手術剪、光學鏡頭進行實體浸泡。護理同工必須手動手寫雙簽「化學浸泡滅菌計時與查檢表」，<strong>嚴格記錄並雙人核對浸泡時間（強制在室溫下持續浸泡    10 小時以上）</strong>，確保達到實質無菌效果。    臨床醫護在無水無菌洗手下，術前刷手全面改採<strong>「免用水乾式酒精消毒液」<strong>，手術傷口沖洗一律關閉自來水開關，改用資材組配發之</strong>「瓶裝無菌生理食鹽水」</strong>進行定點極限沖洗，死守戰時無菌感控紅線。</p><p><strong>3. 實際確實數據與資源規劃</strong>：開刀房技術員會同感管組，每日上午與下午兩次定時對化學消殺浸泡液進行定性定量快速篩檢（確保其有效化學濃度維持在高於<strong>2.0%</strong> 的安全紅線）。 感管組同工配備醫療用酒精 30 箱、高濃度消殺漂白水15 桶、一次性 B 級防護衣 100 套。 開刀房確保 B1 地下替代空間內無菌手術床1 張、麻醉機及備用氣動式（免電控）呼吸器各 1 台隨時處於 100%可用狀態，以紙本手寫方式記錄每班器械之消毒軌跡，保全醫療品質。</p><p><strong>4. 指揮與管制（HICS 對接）</strong>：開刀房莊詩蘋督導長將每班化學消毒測試結果、器械重複使用套數及感控查檢讀數，由傳令兵手動呈交執行部醫療照護處長（徐禮平處長）核簽，隨時掌握感染控制安全狀態。</p>"}, {"stage": 4, "scenario_id": "PTCH-17", "scenario_title": "極端斷水應處", "datetime": "", "summary": "【水源枯竭與糞水溢流】院內蓄水池徹底見底。不僅洗手台無水可用，全院廁所因無法沖水導致排泄物溢流至走廊。手術室無法進行術前刷手，傷口沖洗只能使用極少量的瓶裝純水，院內爆發嚴重的院內感染與痢疾風險。", "detail": "主責人：開刀房莊詩蘋督導長，公務機簡碼65311", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：在無水狀態下，外科醫生、麻醉師與開刀房護理同工面臨無法進行術前手部刷手（SurgicalScrubbing）的重大感控瓶頸，且手術傷口之生理沖洗、手術器械之基本清洗與高壓滅菌全面斷擺，極易導致接受損傷控制手術（DCS）之傷患術後爆發致命的氣性壞疽、多重耐藥菌感染、敗血性休克及群聚感染，使手術室淪為感染交叉污染源。開刀房與感管小組必須立即執行戰時極限感控SOP，使用免用水消毒及瓶裝純水沖洗，死守外科手術安全紅線。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：開刀房莊詩蘋督導長（公務機簡碼65311；代理人：手術室護理長）在接獲環保室「全院斷水、水井禁用」通知 <strong>5分鐘內</strong>，必須啟動<strong>「無水手術感控、乾式刷手與無菌生理食鹽水極限沖洗SOP」</strong>。開刀房護理人員立即執行以下剛性步驟：</p><ul><li>*術前乾式刷手替代程序*：外科醫師、護理師術前嚴禁使用自來水洗手。刷手護理同工一律改採<strong>「免用水乾式酒精消毒液（含    Chlorhexidine 消毒成分之乾式刷手劑）」</strong>：</li></ul><p>1.  *第一步*：取 5 mL        消毒液手動均勻塗抹於雙手、手腕及前臂至肘關節上方 5 公分處。</p><p>2.  *第二步*：實施實體物理摩擦揉搓 3        分鐘，直至液體完全蒸發、皮膚乾燥。</p><p>3.  *第三步*：重複此程序二次，並手寫記錄於「術前乾式刷手查檢表」中，確認皮膚完全無菌後，方得在主護護理師協助下穿戴一次性無菌手術衣及無菌手套，以化學防線替代物理刷手。</p><ul><li>*手術傷口之無菌瓶裝水極限沖洗*：手術傷口沖洗及腹腔洗滌，嚴禁使用任何常規水網水源。資材組主動盲派運送之<strong>「瓶裝無菌生理食鹽水」或「瓶裝無菌注射用水」</strong>列為唯一可用之沖洗資材。外科醫師在術中手動傾倒瓶裝食鹽水實施定點、定量之極限沖洗，手寫記錄每瓶沖洗液規格與連續編號（如：<strong>PTCH-W-001    至 PTCH-W-020</strong>），不予浪費任何一滴救命水。</li><li>*器械浸泡快速消殺*：損毀及使用過之鋼製手術剪、骨科器械，立即在韓偉大樓    B1 臨時開刀房（腹膜透析室）內使用備用之 <strong>2%    戊二醛強效化學消毒劑進行高濃度實體浸泡消毒</strong>，手動登記浸泡計時表，確保浸泡時間強制維持在    <strong>10 小時以上</strong>，以化學滅菌替代高壓蒸氣滅菌，死守器械感控紅線。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>：開刀房莊詩蘋督導長與供應室同工清點並精算無菌沖洗與消殺資材：</p><ul><li>本院在庫儲備之一次性拋棄式無菌手術包共計 <strong>120 套</strong>、一次性無菌手套    <strong>15 箱</strong>。</li><li>資材組（吳佳蓉組長）必須每 4    小時主動盲派運送<strong>瓶裝無菌生理食鹽水（500 mL/瓶）共計 10 箱（240    瓶）</strong>至臨時開刀房門口。 開刀房值班技術員每 2    小時對化學消殺浸泡液進行定性定量快速篩檢（確認化學有效濃度高於    <strong>2.0%</strong>），確保在零自來水狀態下無菌感控不崩潰，保護手術病人生命安全。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>：開刀房莊詩蘋督導長隨時將無菌手術包賸餘量、無菌沖洗水消耗瓶數、以及器械化學消殺浸泡數據，以VHF/UHF 對講機向執行部醫療照護處長（徐禮平副部長，公務機簡碼69231）報告，以便狀況分析處即時評估本院在極端斷水下的戰傷手術自撐天數。</p>"}, {"stage": 5, "scenario_id": "PTCH-23", "scenario_title": "傳染病群聚爆發", "datetime": "", "summary": "【院內避難所傳染病爆發】由於長時間斷水、無法維持手部衛生，且地下避難空間高度擁擠通風不良，滯留於院內的難民與輕傷患中爆發了疑似新型變種病毒（或霍亂、傷寒）群聚感染。因缺乏檢驗試劑與抗生素，疫情有向醫護人員蔓延的趨勢。", "detail": "主責人：開刀房莊詩蘋督導長，公務機簡碼65311；檢驗科幸良蘭副主任，公務機簡碼 61417", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：在長時間停水、備用井水受污染被禁用、且地下一樓（B1）停車場及 MRI室高度擁擠、通風不良之極限狀態下，滯留於院內的難民、輕傷患與同工中極易爆發新型變種病毒（呼吸道）或霍亂、傷寒（消化道）之急性傳染病群聚感染。在檢驗科自動化LIS系統斷電、診斷試劑與強效抗生素嚴重枯竭之廢墟中，疫情一旦向核心醫護團隊蔓延，將導致本院殘存的30% 核心醫療戰力面臨徹底癱瘓與減員崩潰。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：開刀房莊詩蘋督導長（公務機簡碼 65311）協同檢驗科幸良蘭副主任（公務機簡碼61417）及感管組同工，立即啟動最高規格之<strong>「地下避難所急性群聚感染實體隔離、Downtime手工鏡檢篩檢與限制性給藥 SOP」</strong>。</p><ul><li>*地下空間實體單向隔離劃分*：感管組立即下令將 <strong>路加大樓 B1    一般病房（36床）最內側 5 間病房</strong>    手動隔離，拉起紅色「傳染病高度污染警戒線」，拉下防火排煙隔封，建立實體「戰時隔離觀察病區」。</li><li>*手工鏡檢與定性篩檢（LIS 離線流程）*：幸良蘭副主任率領 3    名醫檢師，手動砸開檢驗科 Downtime 應急箱，中斷自動化分析儀：</li></ul><p>1.  *革蘭氏染色與顯微鏡檢*：醫檢師在約翰 B1        臨時檢驗室內，使用免電式手動反射光光學顯微鏡或備用 UPS        連配的簡易顯微鏡，對腹瀉患者糞便及呼吸道檢體實施「人工革蘭氏染色與定性塗片鏡檢」。</p><p>2.  *快速抗原定性試紙篩檢*：在 20        分鐘內手寫出具「疑似霍亂/傷寒定性陽性報告單」，指派 Runner        徒步送達前線。</p><ul><li>*寬限期限制性給藥與手寫雙簽*：一線醫師接報後，立即給予隔離病患本院儲備之廣效抗生素（如    Ciprofloxacin、Doxycycline）或退燒、止瀉耗材。藥劑同工降級改採紙本記帳，藥品與病人防偽手圈    1:1    物理核對，雙人手寫雙簽實施「推拉式盲派配發」，全力阻斷疫情向一線醫護擴散。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>：檢驗科幸良蘭副主任盤點並管制傳染病篩檢與藥品資材：</p><ul><li>本院在 B1 備用資材庫內確保儲備有<strong>急性霍亂/呼吸道定性快速篩檢試紙    150 劑</strong>、手動顯微鏡鏡檢耗材 3 箱。</li><li>隔離病區調配專責護理師 <strong>3 名</strong>，採 12 小時 A-B 強制雙班輪替。    感管組同工每 2 小時巡檢隔離區，確保其與普通病房區、臨時    ICU（23床）之間實施 <strong>100% 物理性屏障隔離</strong>，死守臨床感控红線。</li></ul>"}]}, {"role": "執行部醫療照護處／血液供應組（檢驗科血庫）", "entries": [{"stage": 4, "scenario_id": "PTCH-18", "scenario_title": "大量傷患/血庫", "datetime": "", "summary": "【血庫歸零與活體捐血】沿海灘岸激戰導致超過百名遭砲擊、破片貫穿的重度創傷軍民湧入。高雄捐血中心血袋無法送達，院內血庫歸零。急診室被迫啟動戰時「活體捐血機制（Walking Blood Bank）」，現場號召醫護與輕傷民眾捲袖抽血，立即進行克難輸注。", "detail": "主責人：檢驗科幸良蘭副主任，公務機簡碼61417", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>： 沿海灘岸激戰導致超過百名（初估約 120餘名）遭砲擊、破片貫穿及大出血之重度創傷軍民與 T-CERT救護班人員湧入本院急診室。與此同時，由於屏東聯外道路封鎖、高屏大橋炸毀，高雄捐血中心之救命血袋與血品運輸車完全無法南下運補，導致本院血庫庫存血袋在短時間內急劇消耗、<strong>庫存直接歸零</strong>。面對失血性休克、瀕臨死亡的戰傷患者，血庫必須立即宣告啟動戰時<strong>「活體捐血機制（WalkingBloodBank）」</strong>，在院內自設安全採血區，號召健康醫護同工與輕傷民眾現場採血，實施克難輸注，死守失血病人的救命防線。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：檢驗科幸良蘭副主任（公務機簡碼61417；代理人：血庫組長）在接獲指揮官下達「血庫告罄、活體採血」最高指令之<strong>10 分鐘內</strong>，必須帶領血庫醫檢師，在<strong>韓偉大樓地下一樓（B1）血庫旁安全避難區</strong>，執行最嚴格之<strong>「戰時活體捐血（WalkingBlood Bank）與實體八區劃分SOP」</strong>。血庫同工迅速手動重構地下空間，物理隔離為以下八大功能分區，確保動線單向流動、防止交叉污染：</p><ul><li>*第一區：登記等待區*：由病歷同工協助，要求志願捐血者出示身分卡，手寫登記其基本資料與健康聲明。</li><li>*第二區：問診體檢區*：由臨床醫師現場問診，手動測量血壓、脈搏，並使用手持針刺採血針，快速篩檢血紅素（Hb    必須大於 12.5 g/dL）及 ABO/Rh 血型。</li><li>*第三區：採血作業區*：醫檢師穿戴一次性無菌手套，使用備用之空血袋及手動採血秤，對核確健康之捐血者現場採集    250 mL 或 500 mL 全血。</li><li>*第四區：休息觀察區*：捐血完畢者在此平躺休息 15    分鐘，由社工師發放高熱量乾糧及補水，嚴防低血糖與迷走神經昏厥。</li><li>*第五區：血袋暫存與庫備品區*、*第六區：廢棄物處理區*、*第七區：檢驗區*（進行肝炎、HIV    快速抗原定性篩檢）、*第八區：血品保存區*（O型血品絕對優先保留給急診與開刀房救命手術，維持    1-6℃ 冷鏈）。 在 LIS（檢驗資訊系統）癱瘓之 Downtime    狀態下，配血與交叉試驗全面降級改採<strong>紙本手寫交叉配血單</strong>，結果必須由雙人醫檢師在實體紙本單上「雙人手寫簽名核實」後，始得開箱發放血品，嚴防輸血錯誤。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>：檢驗科血庫幸良蘭副主任盤點並管制採血及檢驗資材：</p><ul><li>本院在 B1 備援庫房內儲備之<strong>無菌空血袋（附抗凝劑CPDA-1，容量 250/500    mL）共計 150 袋</strong>、快速肝炎/梅毒/HIV 定性篩檢試劑 <strong>200 組</strong>。</li><li>活體血庫採血作業區配置<strong>專責醫檢師 6 名</strong>、<strong>採血椅 4 張</strong>。    幸良蘭精算：第一波募集健康的在勤 A-B 班醫護同工及家屬 <strong>50    名</strong>，單波次最大採血量可達 <strong>12,500 mL（約 50 袋全血）</strong>，確保 RBC    庫存維持高於 <strong>41 Units</strong>    之最低安全警戒線，全力搶救瀕死失血同工與國軍官兵。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>： 檢驗科幸良蘭副主任（簡碼61417）每日上午與下午兩次將活體採血袋數、檢驗結果、以及 O 型 RBC賸餘存量，以定頻對講機向執行部醫療照護處長（徐禮平副部長）報告，以便指揮官劉思源隨時向第四作戰區衛勤官協調軍方後送補給。</p>"}]}]}, {"id": "log", "name": "08　後勤部長", "roles": [{"role": "後勤部任務支援組／採購資材組", "entries": [{"stage": 2, "scenario_id": "03", "scenario_title": "軍事動員演習", "datetime": "8月8日 12:00", "summary": "因應敵情發展，屏東地區國軍常備及後備部隊奉令實施「動員演習」，依計畫進入戰術位置並進行兵力、裝備整備與戰場經營；惟部分未完成簽證之物資（如阻絕器材、工程材料及偽裝資材）出現缺口，縣府協調民間通路緊急採購及調度現貨，並由第四作戰區統籌分配。", "detail": "由採購室主任邱芬娟與採購組長包淑惠、資材組長吳佳蓉共同執行", "html": "<p>因應敵情發展，國軍實施「動員演習」，部分未完成簽證之物資（如阻絕器材、工程材料及偽裝資材）出現缺口。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）必須主動啟動「戰時緊急採購與資材安全防護計畫」。採購組立即啟動本院預先備妥之「在地替代供應商與合約商名冊」，全力協助作戰區進行現貨調撥與採購協調。</p><p>資材組（吳佳蓉組長）會同藥劑科及血庫，精算院內 72小時耗用之核心維生物資。資材組人員迅速將無菌生理食鹽水、外傷縫合包、可攜式點滴幫浦、化學便器袋等衛材，以盲派形式由地面脆弱庫房打包，物理遷移至地下一樓（B1）資材補給站。所有打包物資均黏貼「防水且唯一之箱體編號」（例如：<strong>PTCH-L2-A001 至PTCH-L2-A050</strong>），並附上裝箱明細，落實「後裝先卸」原則，確保抵達接收點時可在10 分鐘內極速投入戰救，防範供應鏈中斷風險。</p>"}, {"stage": 2, "scenario_id": "19", "scenario_title": "物資供應短缺", "datetime": "8月11日 08:00", "summary": "部分奶粉與民生物資經銷商受市場短缺預期及價格波動影響，傾向保留庫存，進一步影響物流調度與通路補貨；屏東市、東港鎮等地受「嬰兒奶粉即將斷供」不實訊息影響，搶購與囤積行為擴大。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行", "html": "<p>部分民生物資經銷商傾向保留庫存影響物流調度，且屏東市受「嬰兒奶粉即將斷供」假訊息影響，引發瘋狂搶購與囤積。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）立即啟動<strong>「戰時嬰兒奶粉與核心物資緊急補給計畫」</strong>。本院二B兒科病房與新生兒加護病房（PNICU）對配方奶粉、嬰兒尿布及無菌衛材有剛性需求。</p><p>資材組（吳佳蓉組長）立即實施兒科維生物資盤點，精算 72小時消耗速率與補給缺口。採購組（邱芬娟主任）立即繞過斷鏈之大盤商，啟用不受長途交通阻斷的「屏東在地替代合約商與大型藥妝通路」名冊。採購組與在地通路商簽訂戰時緊急調撥備忘錄（MOU），緊急外購、調撥嬰兒配方奶粉<strong>50 箱（約 600 罐）</strong> 與無菌兒科衛材至本院地下資材倉庫保管。資材組派專人看守並核對實體「戰時庫存表」，確保本院 PNICU及住院嬰幼兒之維生營養 72 小時絕對不斷鏈。</p>"}, {"stage": 2, "scenario_id": "21", "scenario_title": "民生物資管制", "datetime": "8月13日", "summary": "屏東縣政府依緊急命令對食米、食用油、食用鹽、液化石油氣及嬰兒奶粉等法定必需品實施管制，盤點轄內存量並要求各通路配合限購，另優先保障醫療、收容、偏鄉及離島地區基本需求。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行", "html": "<p>政府依緊急命令對食米、食用油、液化石油氣、嬰兒奶粉等實施管制並限購，優先保障醫療與收容機構需求。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）立即啟動<strong>「管制物資簽證申報與庫存保全計畫」</strong>。資材組迅速清點院內大米、食用油、鹽及液化石油氣等關鍵民生存量，製成「管制物資申報單」。</p><p>採購組（邱芬娟主任）立即向屏東縣政府聯合應變指揮管制中心、社會處及經濟發展處提出「醫療關鍵基礎設施優先保障物資申請」。採購組取得政府簽發之「法定物資調撥簽證與配給通行證」。後勤同工憑通行證前往指定聯合徵集場與配售據點，優先接收保障調撥之民生管制糧食與液化石油氣。所有接收物資必須由資材組與會計組人員執行<strong>雙人雙簽點收</strong>，物理入庫至約翰大樓B1 物資倉庫與馬大 B1藥庫，由安全管制組保全加鎖看守，嚴格防止在管制期間發生盜竊或資敵，死守可自撐72 小時之能源與生存底線。</p>"}, {"stage": 3, "scenario_id": "03a", "scenario_title": "動員物資延遲", "datetime": "", "summary": "原定報到之在地營造廠商重型機具（挖土機7部、裝載機5部及傾卸卡車10部）未於時限內抵達指定地點或徵集場；因部分機具仍在外地，且受高屏主要幹道壅塞與交通管制影響，無法如期轉運，致動員進度延滯。", "detail": "由採購室主任邱芬娟與採購組長包淑惠共同執行，分機3932", "html": "<p>因交通管制及壅塞，原定報到之在地營造廠商重型機具（挖土機7部、裝載機5部及傾卸卡車10部）未於時限內抵達本院或指定徵集場，致防空避難室（B1地下醫療空間）改造與阻絕器材佈建進度延滯。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）必須立即啟動<strong>「戰時緊急安全採購與物資緊急調用預案」</strong>。</p><p>採購組立即中斷常規、非急迫性之行政採購。改採人工降級與實體手寫單、電話方式，聯繫本院預先簽訂戰時優先供應意向書之在地替代供應商與工程機具合約廠商。採購組致電備援機電與工程廠商：<strong>「明威紀元（0933-310332）或隆安機電（高壓維護）」</strong>，請求緊急調配庫存之工程阻絕鐵馬、紐澤西護欄、防爆沙包、蛇籠及輕型鏟裝機至本院恩慈大樓1 樓卸補點。</p><p>同時，資材組會同採購組，緊急清點在途工程耗材，填寫「戰時物資調用簽證申報單」。透過聯絡官向屏東縣政府聯合應變中心（LJMOC）和經濟發展處發出「關鍵基礎設施防護工程物資緊急調撥申請」，請求公權力介入，徵用鄰近市區之民營營造機具及砂石車，強行突破交通管制節點送抵本院，確保B1 避難醫療空間與實體防線之工期不被延誤。</p>"}, {"stage": 3, "scenario_id": "04", "scenario_title": "民生物資配給管制", "datetime": "", "summary": "行政院核定公告實施配給配售，中央供應站於公告起48小時內、地方配售站於72小時內完成開設。屏東縣政府成立民生必需品配售執行委員會，各鄉鎮市公所成立配售執行小組，並納入偏鄉與原住民族地區配送規劃。", "detail": "由資材組長吳佳蓉共同執行，分機3932", "html": "<p>行政院公告實施民生物資配給，屏東縣政府成立民生必需品配售執行委員會。本院收治之住院病患與召回之1,479名同工之食米、食用油、鹽、液化氣及配方奶粉等剛性物資，必須納入保障調配體系。後勤部任務支援組長（資材組長吳佳蓉，分機3932）立即啟動<strong>「戰時配給物資申報與庫存保全計畫」</strong>。</p><p>資材組同工迅速清點院內現有大米、食油、鹽之存量，精算 72小時消耗速率與缺口，編製實體「物資需求清冊」。採購組配合向屏東縣政府配售執行委員會出示本院「國家關鍵基礎設施優先保障證書」，並領取「法定管制必需品調撥簽證通行證」。資材組派專人攜帶通行證，前往指定地方配售站，優先接收配給調撥之米、油、鹽與液化石油氣。</p><p>所有接收之管制民生物資，一律運往約翰大樓 B1資材室備援庫房中妥善存放，由安全管制組保全實施專用門鎖加鎖看守，嚴防在管制期間發生盜竊、哄搶或資敵，確保可自撐72 小時之生存物資安全。</p>"}, {"stage": 3, "scenario_id": "11", "scenario_title": "糧食儲備設施縱火", "datetime": "", "summary": "萬丹、竹田、麟洛、潮州及崁頂等地多處碾米、糧食與物資儲存據點在短時間內同步發生縱火事件，造成部分倉儲設施受損與物資損失，影響區域糧食供應與物流調度，並引發市場恐慌。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行，分機3932", "html": "<p>多處碾米、糧食倉儲同步發生縱火事件，造成部分物資損失，糧食供應與物流調度受阻，市場爆發恐慌搶購。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）立即啟動<strong>「戰時管制糧食儲備與採購調撥緊急計畫」</strong>。採購組立即中斷常規、非急迫性之採購與行政招標。</p><p>採購同工改採人工手工降級模式，聯繫預備之屏東在地民生與糧食合約廠商，繞過受損之大盤商，與大型量販通路直接簽訂緊急調撥备忘錄（MOU）。採購組緊急調配購入大米 <strong>30 箱（約 500公斤）</strong>、備用食用油及病患流質營養品至本院恩慈大樓 1 樓停車場。</p><p>會計同工（李華敏主任）會同資材組，於卸補點執行現場雙人雙簽核對，將物資入庫至B1 備援資材室，由保全加鎖看守，確保本院 1,479名同工與在院重症、一般病床病患之 72 小時糧食自撐極限無缺口。</p>"}, {"stage": 3, "scenario_id": "14", "scenario_title": "社會秩序惡化", "datetime": "", "summary": "因不實訊息持續擴散，群眾恐慌情緒升高，屏東市、潮州鎮及東港鎮陸續發生搶劫商家、藥局及配售站等案件；警方執勤能量受牽制，對社會治安與公共秩序造成嚴重衝擊。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行，分機3932", "html": "<p>社會治安惡化與搶劫藥局案爆發。藥劑科主任（陳秋榮）會同資材組（吳佳蓉組長），針對第一至三級管制麻醉藥品、高價抗生素及昂貴醫材，啟動<strong>「戰時管制藥品安全保管與雙簽交接SOP」</strong>。 管制藥品（如 Ketamine 等強效麻醉劑）一律放置於 B1備援藥庫之專用鋼製專櫃，強制加鎖，由指定的管制藥品管理人專責保管。</p><p>在 HIS系統當機、無電子醫囑狀態下，藥師依據主治醫師手寫處方箋進行人工調劑，調劑發藥一律採取<strong>「藥師與病房護理長雙人覆核與手寫雙簽交接點交」</strong>。雙簽程序絕對不可因混亂而簡化，確保管制藥品在運送轉運與抵達接收端時「手寫帳物完全一致」。所有出庫之管制藥箱，一律由勤務同工使用紮帶物理綁定於擔架車或隨行Go-Bag，由傳令兵盲派運送，落實「人藥隨行一對一物理移交」。</p>"}, {"stage": 3, "scenario_id": "PTCH-11", "scenario_title": "燃料補給中斷", "datetime": "", "summary": "【斷油與發電機危機】戰備用油遭軍方與政府徵用，且交通管制導致中油油罐車無法駛入市區。屏基地下室備用發電機的柴油存量跌破20%，若不停供非緊急區域用電，全院將在12小時後陷入全黑。", "detail": "主責人：採購室主任邱芬娟，分機3932", "html": "<p><strong>1. 狀況概述與面臨挑戰</strong>：當戰備用油遭軍方與政府徵用，且交通管制導致常規供應鏈斷絕時，本院無法透過常規管道採購柴油。採購組必須中斷所有常態行政採購，切換為「戰時降級手工記帳與特別付款豁免機制」，利用本院預置之在地備援機制及公權力協調流程，在<strong>12小時的黃金救援空窗期內</strong>，為路加及韓偉大樓之緊急發電機召集、籌措並補足救命之柴油，防止醫院陷入全黑孤島狀態。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：採購室主任邱芬娟（分機 3932；代理人：採購組長包淑惠，分機19）在接獲工務室上報之「發電機柴油低於 20% 預警」後，必須在 <strong>15分鐘內</strong>開設戰時特別採購櫃檯，物理砸開保密保險箱，啟用<strong>紙本特別採購派令與特別現金支票</strong>，全面豁免常規之科室電子審核、層簽與招標流程。採購組同工立即啟動「在地替代能源供應商熱線」，聯繫本院簽約之在地備援柴油廠商<strong>「全盛卓詩凱（0912-125515）」</strong>，手動開立特別購油單，直接調撥戰備柴油。</p><p>為防範送油罐車受阻於外圍之軍事管制哨，聯絡官（萬樹人副院長，公務機簡碼60315）必須立即對接屏東縣聯合應變管制中心（LJMOC）與交控應變組，向主管機關正式通報：「本院作為屏東地區重度級急救責任醫院，發電機柴油面臨斷供威脅，請公權力介入，為本院簽約加油車開闢『綠色物資運送通道』並申請免徵用證書」。當加油車抵達本院時，採購同工會同安全管制處保全，在指定的安全卸貨點（<strong>恩慈大樓1 樓停車場</strong>） 實施<strong>「簽證物資安全接收程序」</strong>。會計同工（李華敏主任）親至現場進行「雙人雙簽點收核對」，核實柴油公升數無誤後現場簽發支票，保全同工全程築起物理警戒線，防範在混亂中發生油料被哄搶或資敵，死守物資接收邊界。</p><p><strong>3. 實際確實數據與資源規劃</strong>： 採購組精算本院發電機在 72小時自撐計畫下之最低補油缺口：</p><ul><li><strong>路加大樓最低補油量</strong>：必須在 D+2 日（115年8月9日）第 12    小時前補足至少 <strong>4,000 L</strong> 柴油。</li><li><strong>韓偉大樓最低補油量</strong>：必須在第 12 小時前補足至少 <strong>3,000 L</strong>    柴油。</li><li><strong>恩慈大樓最低補油量</strong>：必須在第 20 小時前補足至少 <strong>800 L</strong> 柴油。    採購組必須在 3 小時內完成上述共計 <strong>7,800 L 柴油</strong>    之採購簽證、款項撥付、車輛調派與路線核確，造冊登記於「戰時採購與會計結算日報表」中，確保資金與帳物相符。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>：採購組長隨時將柴油採購成功之噸數、預估到院時間以定頻無線電向後勤部長許慧莉報告，由狀況分析處即時登錄更新至內網戰情面板，維持指揮官對全院能源自撐之全局視野。</p>"}, {"stage": 3, "scenario_id": "PTCH-12", "scenario_title": "物流與衛材斷鏈", "datetime": "", "summary": "【醫療耗材與藥品見底】聯外橋樑封閉，北部及高雄物流中心無法南下。院內拋棄式耗材（空針、無菌手套、紗布）、點滴（生理食鹽水）及廣效抗生素庫存告罄。被迫重啟早期「煮沸/化學浸泡消毒」模式重複使用耗材。", "detail": "主責人：資材組長吳佳蓉", "html": "<p><strong>1. 狀況概述與面臨挑戰</strong>：當聯外橋梁封閉，北部及高雄物流中心無法南下運補，導致本院拋棄式醫療耗材（如空針、無菌手套、紗布）、點滴輸液及廣效抗生素庫存告罄時，臨床診療面臨無醫療物資可用之剛性斷鏈危局。資材組必須在孤島通信與網絡異常狀態下，主動進行物資盤點、分級碼放及戰術配送，死守72 小時臨床搶救生命線。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：資材組長吳佳蓉（協同鄭酪緯同工）在接獲物流斷鏈通報之 <strong>10 分鐘內</strong>宣布啟動<strong>「72 小時核心維生物資盤點、Category 分級與盲派配送SOP」</strong>。資材組動員所有到勤行政同工及志工，攜帶手動照明設備進駐儲備庫房，關閉對外不穩定路由，切換為「紙本離線倉儲管理模式」。</p><p>資材同工將庫存之拋棄式無菌衛材與輸液進行<strong>「Category A、B、C級別分級碼放」</strong>：</p><ul><li><strong>Priority    A（急救物資）</strong>：外傷縫合包、無菌手套、生理食鹽水、廣效注射型抗生素、止血帶。</li><li><strong>Priority B（高週轉消耗品）</strong>：拋棄式空針、膠帶、紗布、化學便器袋。</li><li><strong>Priority C（可延後補給品）</strong>：一般常規健檢與非急迫門診耗材。    資材組立即將 Priority A 級別之關鍵急救衛材，以 10    套為一箱進行防水、防震封箱包裝，黏貼唯一且連續之防水編碼貼紙（如：<strong>PTCH-MAT-A001    至 PTCH-MAT-A100</strong>），並隨附實體手寫裝箱明細。</li></ul><p>為提高臨床使用效率並防止資訊延遲，資材組實施<strong>「主動盲派物資物流程序」</strong>：不待前線臨床科室以電子系統送出請領表單，資材組與運輸同工直接將打包好的「戰傷急救箱」及大量生理食鹽水，以推車或人工物理方式，<strong>直接主動盲派推送至急診急救紅區、地下一樓（B1）臨時手術室、臨時ICU的大門口</strong>。確保一線醫師與護理同工「只要一伸手順手就能拿到救命衛材」，以肉搏物流死守搶救戰線。</p><p><strong>3. 實際確實數據與資源規劃</strong>： 資材組盤點並精算本院在降載 30%目標（留院住院 107 床、臨時加護 23 床）下之 72小時最低消耗速率與自撐缺口： 全院每日無菌生理食鹽水及輸液最低消耗量為<strong>15 箱（共 360 袋）</strong>、外傷救治拋棄式手套 <strong>3 箱（共 300 雙）</strong>。資材組必須在 2 小時內將儲備庫房內的 <strong>120 套一次性拋棄式手術包、15箱無菌手套、以及 30 箱生理食鹽水點滴</strong>物理移置移防至地下一樓既有之備援資材室中，實施 24小時加鎖派人看守。每日定時將殘存數據抄報計畫部状况分析處登錄，做好隨時向衛生局調用空血袋及拋棄式針筒之通聯準備。</p><p><strong>4. 指揮與管制（HICS 對接）</strong>： 資材組長隨時將各 Category物資之消耗餘額讀數，以 VHF/UHF對講機向後勤部長許慧莉報告，以便計畫部評估本院自撐天數之黃綠紅警戒狀態。</p>"}, {"stage": 4, "scenario_id": "04", "scenario_title": "關鍵設施撤離", "datetime": "", "summary": "因戰線逼近，屏南地區能源、油料、通信與交通關鍵設施進入緊急應變階段，依計畫執行人員分批撤離、資料備援、關鍵設備停機保護及反資敵作為。", "detail": "由採購室主任邱芬娟與會計室主任李華敏共同執行，分機24", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：當戰線逼近、關鍵基礎設施進入預防性全面撤離階段時，後勤部任務支援組與會計組立即啟動<strong>「關鍵醫藥資材打包撤離與戰時特別付款特別派令SOP」</strong>。採購室主任邱芬娟會同資材組長吳佳蓉，將本院備用之貴重醫療衛材、第一至三級管制麻醉藥品、備用血袋及重要病歷資料進行物理裝箱。所有撤離箱體一律使用防水、耐磨材料，並黏貼防水且唯一之箱體編號（如：<strong>PTCH-L2-B001至 PTCH-L2-B100</strong>），附上實體裝箱明細，以便在物資集合點（恩慈大樓 1樓停車場） 進行極速裝載。</p><p>會計室主任李華敏（分機24）依據指揮官特別授權，宣告全院財務轉入<strong>「戰時特別預算特別支付程序」</strong>。凍結承平時期繁瑣的行政審核與電子簽核，改用實體紙本簽收簿、手工開立特別派令。針對緊急雇用的撤離載具（如調用之大巴與貨車）與外購之72小時備用藥品，會計同工親至恩慈 1樓停車場卸補點，實施「現場簽證物資雙人雙簽核對」，核實後立即以實體支票或現金撥付特別預算。</p><p>同時，資安人員將存放核心電子病歷（EMR）、HIS 及關鍵資料之加密備份 USB硬碟取出，妥善置入隨身<strong>「指揮官避難包（Go-Bag）」</strong>中，由保全人員看守，死守全院病患之歷史數據資產。</p><p><strong>2. 確實數據與資源規劃</strong>：會計組與資材組精算撤離物資之實體資產價值，針對本院馬太大樓 B1藥庫內之高價麻醉強心劑、管制藥品及檢驗血庫內之 60袋 O型RBC，實施「人藥同步移交機制」。藥劑科主任陳秋榮為107床住院病患及待撤離病患，每人調配準備至少<strong>72小時之必要備用藥與管制藥品</strong>；所有管制藥品裝入專用防爆冷藏箱（維持1-6℃冷鏈），物理綁定於擔架車旁，由專人隨行核對簽收，嚴防高價值藥品流失或資敵。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>： 會計組與人資室劉淑梅主任（分機3977）對接，現場記錄並統計所有參與關鍵設施打包、高危物資搬運、Downtime傳令同工之「戰時危險出勤加給、差假與加班費」。</p>"}, {"stage": 5, "scenario_id": "04", "scenario_title": "醫療後撤機制啟動", "datetime": "", "summary": "台17線以西戰況持續惡化，屏東基督教醫院評估院區安全與供應鏈風險升高，啟動分級後撤與病人分流：高度照護病人及隨行醫護轉送至其他急救責任醫院；可下轉或出院後仍需照護者送至來義高中第2型急救站，並同步撤收關鍵設備、藥材、血品及資訊備援。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行，分機3932", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：大後撤機制啟動，後勤部任務支援組長（資材組長吳佳蓉；採購室主任邱芬娟 /採購組長包淑惠，分機 3932） 立即進駐恩慈 B1指揮所，啟動<strong>「關鍵醫藥資材打包、編碼裝車與反資敵資料 Go-Bag 保全SOP」<strong>。資材同工動員行政待命同工與志工，將可移動之高價值醫療儀器、無菌手術縫合包、點滴輸液及血庫冰箱執行</strong>「2小時快速下移與打包」</strong>。</p><p>所有後撤之醫藥箱體，一律使用防水耐磨箱裝載，黏貼唯一且連續之防水「撤離箱體編碼」（如：<strong>PTCH-L2-B001至PTCH-L2-B100</strong>），並隨附實體手寫裝箱明細，於指定的物資撤離動線集合點（<strong>恩慈大樓1 樓停車場</strong>） 進行裝載。 藥劑科主任陳秋榮（公務機簡碼 69141）指派藥師為每位後撤病人調配準備 <strong>72小時之必要備用用藥與管制藥品</strong>；第一至三級管制麻醉藥品一律裝入防爆保冷箱（維持1-6℃ 冷鏈），由專人隨病人同步移交。</p><p>同時，為防範核心病歷資料外洩，資通訊支援組系統管理同工對 core HIS資料庫執行最後一次增量備份，將病歷、人事快照之高強度加密備份硬碟，物理裝入<strong>「指揮官避難包（Go-Bag）」</strong>中，由保全人員嚴密看守撤離，死守全院病患病歷資產。</p><p><strong>確實數據與資源規劃</strong>： 勤務組（吳哲維主任 /運輸組陶大屏組長）極限整備並調撥本院 <strong>16輛戰備車輛</strong>，單一波次可承載並安全後撤 <strong>101 人</strong>：</p><p>1.  *救護車（共 3 輛）*：單波次共乘載 <strong>15 人</strong>（每輛載擔架 ICU 患者    1人、醫護家屬共 4人），優先派往急診紅區與 ICU，轉送第一級危急病患。</p><p>2.  *輪椅車（共 2 輛）*：單波次共乘載 <strong>12    人</strong>，轉送第二級需要輪椅扶持之病人（如洗腎腎友）。</p><p>3.  *中型巴士（共 4 輛）*：單波次共乘載 <strong>60 人</strong>，批量後送 Level 2、3    可坐姿病患及醫護同工。</p><p>4.  *廂型貨車（共 7 輛）*：不載人，專門裝載打包編碼好的 Category A、B、C    級醫療物資與移動維生儀器。</p><p><strong>指揮與管制（HICS 對接）</strong>：後勤部長許慧莉隨時與聯絡官及衛生局對接，回報車隊載具缺口與接收端床位，確保異地重置先遣裝設小組（4人） 於主力車隊抵達前 1 小時提前就位。</p>"}, {"stage": 5, "scenario_id": "06", "scenario_title": "物資配送受阻", "datetime": "", "summary": "部分沿海配售站與物流據點受砲火波及，縣府於戰火間隙清查受損情形、盤點可用物資並向內陸安全地區轉移；惟台17線及聯外道路受阻，配送動線受限，影響東港、林邊、佳冬及枋寮物資供應效率。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行，分機3932", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：部分沿海配售站遭砲火波及，縣府於戰火間隙將可用物資向內陸安全地區轉移，但台17線及聯外道路受阻，東港、林邊物資供應效率低下。本院面臨剛性維生物資斷鏈與配送延遲。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機 3932）立即啟動<strong>「內陸物資緊急調撥、簽證物資安全接收與盲派配送計畫」</strong>。</p><p>採購組立即中斷常規行政採購，改採人工手工降級模式，繞過癱瘓之沿海大盤商，與「屏東內陸安全地區（如九如、麟洛、潮州）在地替代合約商與大型通路」對接，與加油合約商<strong>「全盛卓詩凱（0912-125515）」</strong>保持定時熱線，調撥戰備柴油。</p><p>資材組（吳佳蓉組長）會同保全人員，在指定的物資安全卸貨區（<strong>恩慈大樓 1樓停車場</strong>） 實施<strong>「簽證物資安全接收程序」</strong>。物資車抵達後，資材組與會計組同工於哨位執行「現場雙人雙簽核對」，清點管制柴油、外傷縫合包及點滴等數量，造冊列管，並於2 小時內將救命資材快速搬運移置地下備援庫房。後勤同工將「戰傷急救箱」不待前線科室電子表單申請，直接以<strong>「推拉式盲派物流」</strong>主動推送至臨時急診、B1開刀房及病房，死守搶救物資不斷鏈。</p><p><strong>確實數據與資源規劃</strong>： 資材組精算 72小時消耗速率與儲備缺口：精算本院每日消耗生理食鹽水及輸液約 <strong>15 箱（360袋）</strong>、醫療乾糧 300 份。資材組確保備用抗生素、止血帶、破傷風疫苗等 72小時庫存高於安全警戒線；冷藏藥品一律使用保冷設備運送並由專人 2小時抄錄溫度監控卡，嚴格維持 1-6℃ 冷鏈，防範藥材因物流受阻變質。</p><p><strong>指揮與管制（HICS 對接）</strong>：資材組長吳佳蓉隨時將物資入庫數據、自撐天數監測表，以無線電向後勤部長許慧莉（公務機簡碼61658） 報告。</p>"}, {"stage": 1, "scenario_id": "03", "scenario_title": "能源與漁業供應風險", "datetime": "", "summary": "屏東沿海地區（東港、林邊、佳冬、枋寮及恆春半島）海域作業受限，漁船出港比例下降約3至5成；高雄永安液化天然氣接收站船舶靠泊風險升高，南部天然氣與電力調度壓力增加。", "detail": "由採購室主任邱芬娟與採購組長包淑惠、資材組長吳佳蓉共同執行", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    因應外部供應鏈不保證暢通及物流延遲之風險，後勤部任務支援組組長（資材組長吳佳蓉；採購室主任邱芬娟    / 採購組長包淑惠，分機 3932）立即啟動<strong>「72    小時核心維生物資盤點與緊急外購調撥計畫」</strong>。採購組同工立即停止所有非急迫性之行政採購與合約簽署，切換為「戰時降級手工記帳程序」，啟用「在地替代供應商與合約商名冊」。</li><li>資材組會同藥劑科、檢驗血庫，清點在院病人及 1,479 名同工 72    小時消耗之無菌衛材、外傷縫合包、可攜式點滴幫浦、化學便器袋、氧氣鋼瓶、血袋及大米、食用油存量，精算日消耗速率與補給缺口。資材組派專人攜帶    LJMOC    簽發之通行證，前往合約商據點，優先接收保障調撥之民生管制糧食與燃料。</li><li>所有調運抵院之物資，一律運送至大連院區指定的物資安全卸貨區（<strong>恩慈大樓    1    樓停車場</strong>），由資材組與會計組人員執行「現場雙人雙簽點收」，隨後搬運移置約翰大樓    B1    備援資材室，由安全管制組保全加鎖看守，嚴格防止在管制期間發生盜竊或哄搶，死守    72 小時營運物資底線。</li><li><strong>實際確實數據</strong>： 採購組與資材組精算 72    小時消耗缺口：緊急增購外傷縫合包 <strong>200 組</strong>、無菌生理食鹽水及輸液    <strong>30 箱（720 袋）</strong>、醫療乾糧 300    份及商業流質營養品，並對接氧氣合約商「信光氧氣」與「南屏氣體」，備妥高壓備用氧氣鋼瓶，確保氧氣存量在極限消耗下能自撐    72 小時以上。</li></ul>"}, {"stage": 1, "scenario_id": "PTCH-04", "scenario_title": "氣體供應異常", "datetime": "", "summary": "【醫用氣體物流延遲】由於社會恐慌引發物流業罷工及交通壅塞，原訂每週例行運補的「醫用液態氧槽車」與「高壓氣體鋼瓶」未能如期抵達，院內氧氣安全存量跌破72小時警戒線。", "detail": "主責人：資材組長吳佳蓉/ 採購室主任邱芬娟，分機 3932", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當南部地區因物流罷工與交通癱瘓，導致本院每週例行運補的「醫用液態氧槽車」與「高壓氣體鋼瓶」無法南下抵達，全院氧氣存量跌破72 小時警戒線時，後勤部任務支援組組長（資材組長吳佳蓉；採購室主任邱芬娟/ 採購組長包淑惠，分機 3932）必須立即進駐恩慈 B1 指揮所，啟動<strong>「72小時核心維生氧氣應急外購、氣體調撥與盲派配送SOP」</strong>。採購同工立即終止所有常態行政採購，改採戰時以降級手工記帳與特別付款豁免機制，避開受阻之高雄與北部常規供應鏈。</p><p>資材組（吳佳蓉組長）立即對接本院預置之<strong>在地備援氣體供應商（信光氧氣行、南屏氣體）</strong>，啟動「在地緊急調撥計畫」：採購人員不待前線科室電子表單申請，立即開立戰時特別派令與支票，向信光氧氣以現金直接調撥採購備用高壓氧氣鋼瓶及相關閥門零組件。為防範運補車輛受阻於交通管制哨，聯絡官（萬樹人）立即對接屏東縣聯合應變中心（LJMOC）及交通疏導組，協調軍警消調派車輛或為本院氣體運補車開闢「綠色物資運送通道」，強行突破壅塞節點進入院區。所有運抵之氧氣鋼瓶一律運往指定的安全卸貨區（<strong>恩慈大樓 1樓停車場</strong>），由資材組與會計組（李華敏主任，分機24）執行現場雙簽點收勾稽，隨即以推車物理性主動推送至臨床前線，死守醫療核心氣體命脈。</p><p><strong>2. 確實數據與資源規劃</strong>： 採購組與資材組精算消耗速率：全院在降載 30%目標（留院 107 床住院病患、23 床臨時加護病房、19床急診留觀病患）模式下，每日急救氧氣基本消耗量約 <strong>15瓶高壓鋼瓶</strong>。資材組緊急調配增購儲備氧氣鋼瓶 <strong>40 瓶</strong> 置於 B1備用氣體存放區，並由工務室同工每 2小時巡檢紀錄槽壓，確保氣體存量在極限消耗下能自行達標連續供氧 <strong>72小時以上</strong>。</p>"}]}, {"role": "後勤部膳食供應處／營養室", "entries": [{"stage": 2, "scenario_id": "19", "scenario_title": "物資供應短缺", "datetime": "8月11日 08:00", "summary": "部分奶粉與民生物資經銷商受市場短缺預期及價格波動影響，傾向保留庫存，進一步影響物流調度與通路補貨；屏東市、東港鎮等地受「嬰兒奶粉即將斷供」不實訊息影響，搶購與囤積行為擴大。", "detail": "由營養室組長徐桂婷帶領，分機20", "html": "<p>由於全縣爆發奶粉、大米搶購風潮，且外部物資配送延遲。營養室組長（徐桂婷組長，分機20；代理人蔡佳紋營養師）立即啟動<strong>「兒科與一般病患戰時特殊膳食調配預案」</strong>。營養室於 <strong>約翰大樓 B1 工務室入口後右側</strong> 設立臨時「膳食處理與補給點」。</p><p>營養師實施乾糧、米食及病患特殊營養品盤點，並精算消耗速率。針對「嬰兒奶粉斷供」之不實訊息與兒科奶粉受限之情境，營養師調配並儲備足夠72 小時之「商業流質配方與兒科替代腸道營養品」。在備援廚房停水停電下，膳食同工全面切換為免洗拋棄式餐具，並關閉耗水耗電之熱食加工，改以無需熱水或僅需極微量熱水的食材（如穀物、能量棒、常溫即食包）進行配膳。膳食供應處將高熱量、易存存之膳食，優先配給 B1 臨時手術室與 ICU高能消耗之醫護，死守生命線。</p>"}, {"stage": 2, "scenario_id": "21", "scenario_title": "民生物資管制", "datetime": "8月13日", "summary": "屏東縣政府依緊急命令對食米、食用油、食用鹽、液化石油氣及嬰兒奶粉等法定必需品實施管制，盤點轄內存量並要求各通路配合限購，另優先保障醫療、收容、偏鄉及離島地區基本需求。", "detail": "由營養室組長徐桂婷帶領，分機20", "html": "<p>在政府對食米、食用油及液化氣實施最嚴格管制下。膳食供應處（營養室徐桂婷組長，分機20）立即切換為<strong>「戰時管制物資限額配膳與無水供膳 SOP」</strong>。營養師根據庫存，調降全院常規精細伙食，全面關閉高耗水耗油之廚房煎炸、清洗作業，改採「低耗水、低耗油、高熱量」之戰時限額配膳。</p><p>膳食同工精算每日大米、食用油及液化氣消耗率，對一般病患及行政同工實施每餐精準定量配給，杜絕食物浪費。營養室將調撥配給之液化石油氣、嬰兒奶粉及食米等，優先且 100%保障提供給二B、PNICU 住院嬰幼兒，以及 B1臨時加護病房（23床）、一般病房（36床）和臨時開刀房刷手搶救之重症患者及前線醫護。膳食供應處每日製作「物資消耗及自撐時數監測表」，上報狀況分析處登錄戰情面板，確保本院在管制死局中以極限節流戰術自行撐過72 小時連續營運。</p>"}, {"stage": 2, "scenario_id": "PTCH-08", "scenario_title": "能源供應中斷", "datetime": "", "summary": "【斷氣與滅菌系統停擺】天然氣管線全面中斷。屏基中央廚房停擺，無法供應病患餐食；更嚴重的是，高壓蒸氣滅菌鍋（Autoclave）因無蒸汽無法運作，手術室與各病房之醫療器械面臨無法消毒的感控危機。", "detail": "主責人：營養室組長徐桂婷，分機20 / 代理人：蔡佳紋營養師", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當外部天然氣管線全面中斷，中央廚房停擺，且本院面臨交通壅塞與斷氣、斷水複合危機時，膳食供應處（營養室徐桂婷組長，分機20；代理人：蔡佳紋營養師）必須在接獲警報 <strong>15分鐘內</strong>，啟動<strong>「戰時膳食供應應變計畫與無水無電配膳SOP」</strong>。膳食供應小組立即於 <strong>約翰大樓 B1 工務室入口右側</strong>開設臨時「膳食補給點與物資配發站」。</p><p>因應限水及斷氣狀態，營養室執行<strong>「無水配膳應變程序」</strong>：廚房立即停止所有清洗、煎炸常規餐飲之製作，<strong>全面切換使用院內儲備之拋棄式免洗餐具</strong>，嚴禁洗滌餐具以極限節約淨水，並防止在地下避難空間內因餐具洗滌污水積聚造成次生感控危機。膳食同工全面分發免清洗、免烹煮或僅需微量熱水之常溫應急乾糧、即食真空包、常溫罐頭及軍用口糧。</p><p>針對病房內無法吞嚥之危急重症病人，營養師蔡佳紋帶領同工，手動清點、盤存本院儲備之<strong>「商業配方流質（管灌營養品）」</strong>與嬰幼兒配方奶粉。膳食同工降級改用實體紙本表單進行物資登記與配給，100%優先且足額保障供應給路加 B1 一般病房（36 床）、臨時 ICU（23床）之臥床重症患者，以及 2B兒科病房與新生兒加護病房（PNICU）住院嬰幼兒，以生命線之「腸道高熱量營養配給」保全患者與一線醫護基本體能。</p><p><strong>2. 實際確實數據與資源盤點</strong>：營養室徐桂婷組長精算全院基本熱量消耗與儲備： 本院現有 1,479 名同工、107床住院病患及 19 床急診留觀患者，每日基本應急膳食總需求量為 <strong>3,200份</strong>。 營養室盤點確認儲備物資：備有高熱量即食乾糧 300份、常溫罐頭及即食包 500份，商業配方流質營養品及嬰兒配方奶粉存量，在無外部補給下可<strong>自撐至少 72小時極限配膳</strong>。營養師每日定時將配膳消耗手寫抄錄呈報後勤部長，做好隨時向屏東縣政府民生必需品配售委員會申請物資配額之準備。</p>"}, {"stage": 3, "scenario_id": "04", "scenario_title": "民生物資配給管制", "datetime": "", "summary": "行政院核定公告實施配給配售，中央供應站於公告起48小時內、地方配售站於72小時內完成開設。屏東縣政府成立民生必需品配售執行委員會，各鄉鎮市公所成立配售執行小組，並納入偏鄉與原住民族地區配送規劃。", "detail": "由營養室組長徐桂婷帶領，分機20", "html": "<p>在政府對米、油、鹽及液化石油氣等民生物資實施配給配售管制之極限想定下，營養室組長（徐桂婷，分機20；代理人蔡佳紋營養師）立即啟動<strong>「戰時管制物資限額配膳與極限節流SOP」</strong>。營養師依據配給存量與日消耗率，立即調整膳食配給。停止一切常規、精細餐飲製作，全面改採「低耗油、高熱量、低耗氣」之戰時限額配膳，杜絕任何食物與能源浪費。</p><p>膳食供應處（徐桂婷組長）於 <strong>約翰大樓 B1 工務室入口後右側</strong>設立臨時膳食處理點，實施無水配膳及免洗餐具分發。營養師將有限的大米、食用油與配給之液化石油氣、管灌營養品，<strong>100%絕對優先保障供應給 2B兒科病房、新生兒加護病房（PNICU）住院嬰幼兒</strong>，以及 B1 臨時ICU（23床）、臨時手術室、路加一般病房（36床）進行搶救之急重症病人與高能消耗之值班醫護。</p><p>膳食同工每日記錄管制物資之實際結存與自撐時數，彙整呈報至計畫部登錄戰情面板，在配給管制死局下死守全院同工與病患之最低生存防線。</p>"}, {"stage": 3, "scenario_id": "11", "scenario_title": "糧食儲備設施縱火", "datetime": "", "summary": "萬丹、竹田、麟洛、潮州及崁頂等地多處碾米、糧食與物資儲存據點在短時間內同步發生縱火事件，造成部分倉儲設施受損與物資損失，影響區域糧食供應與物流調度，並引發市場恐慌。", "detail": "由營養室組長徐桂婷帶領，分機20", "html": "<p>在糧食儲備點遭縱火、外部供應斷鏈且市場恐慌之情勢下，營養室組長（徐桂婷，分機20）立即啟動<strong>「戰時糧食限額配膳與無水供膳 SOP」</strong>。 營養室於<strong>約翰大樓 B1 工務室入口後右側</strong>開設臨時「膳食處理與補給點」，營養師實施糧食與飲用水庫存精算，並將自撐時數登錄戰情面板。</p><p>營養師制定「戰時定量限額配膳標準」，杜絕任何糧食浪費。膳食同工全面關閉耗水耗電之熱食洗滌與加工，改以无需熱水或僅需極微量熱水之大米、穀物、常溫即食包與營養餐進行配膳，一律發放拋棄式餐具。營養室將配給之熟食、高熱量能量棒及管灌流質配方，<strong>100%絕對優先保障供應給 2B兒科病房與新生兒加護病房（PNICU）住院嬰幼兒</strong>，以及 B1臨時加護病房、手術室與急診搶救之值班醫護，在物資短缺下死守醫療續航力。</p>"}, {"stage": 4, "scenario_id": "05", "scenario_title": "水產冷鏈設施受損", "datetime": "", "summary": "東港及枋寮地區水產冷凍、製冰與物流設施遭砲火波及，冷凍庫、製冰設備及關鍵管線受損，部分廠區起火，造成水產冷鏈與民生食品供應中斷。", "detail": "由營養室組長徐桂婷帶領，分機20 / 代理人：蔡佳紋營養師", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：沿海地區冷凍與冷鏈設施遭砲火波及受損、起火，導致南部地區水產冷鏈與民生食品供應大範圍中斷，本院面臨嚴重膳食原料斷鏈與保存危機。膳食供應處（營養室徐桂婷組長）立即啟動<strong>「戰時管制必需品限額配膳與非冷鏈膳食供應預案」</strong>。營養室於<strong>約翰大樓 B1 工務室入口後右側</strong>設立臨時「膳食補給點與物資配發站」，營養師蔡佳紋帶領同工，對院內儲備大米、食用油及乾糧存量實施盤點，精算72小時消耗速率。</p><p>針對冷鏈中斷、新鮮食材無法冷藏之想定，營養室實施<strong>「戰時無水無電配膳SOP」</strong>：全面停止清洗、煎炸常規餐飲，改以無水、免煮或僅需微量熱水之乾糧、即食真空包、常溫罐頭為主。膳食同工全面切換為<strong>拋棄式免洗餐具</strong>，嚴防在密閉地下空間中因餐具洗滌不當造成水源污染與感控危機。營養室調配儲備足夠72小時之「商業配方流質（管灌營養品）」與嬰兒配方奶粉，優先且 100%保障供應給 2B 兒科病房與新生兒加護病房（PNICU）住院嬰幼兒，以及 B1臨時加護病房、開刀房抢救重症病人與前線醫護，死守生命線之高熱量營養支持。</p><p><strong>2. 確實數據與資源規劃</strong>：營養室精算在院病患與到勤同工之每日基本熱量需求：本院現有1,479名同工、107床住院病患 及 19床急診留觀患者，每日需要至少3,200份應急膳食。在冷鏈受損死局下，採購組啟用在地合約商名冊，優先向屏東縣政府民生必需品配售委員會出示通行證，優先領取配給調撥之食米及常溫罐頭。膳食同工將每日大米（約500公斤）、配方奶粉及燃料消耗數據手寫登錄，由傳令兵送往狀況分析處，確保庫存可自撐72小時以上。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：徐桂婷組長直接對接後勤部長許慧莉（公務機簡碼61658），隨時回報膳食儲備缺口與燃料需求，以便後勤部長向 LJMOC申請民生管制必需品之配額。</p>"}, {"stage": 5, "scenario_id": "PTCH-24", "scenario_title": "飲水與糧食枯竭", "datetime": "", "summary": "【醫護人員失溫與脫水】醫院儲備的口糧與瓶裝水耗盡。連續高壓工作超過72小時的醫護人員面臨嚴重脫水、低血糖與體力透支，甚至出現值班醫師在執行手術時因虛脫暈厥的情況，醫院內部維運人力瀕臨崩潰。", "detail": "主責人：營養室組長徐桂婷，分機20；採購室主任邱芬娟，分機 3932", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：當本院儲備的應急口糧、瓶裝水消耗殆盡，且連續高壓工作超過 72小時的核心醫護、工務及行政同工面臨嚴重脫水、低血糖與體力透支，甚至出現值班醫師在執行急診開刀時因虛脫暈厥時，本院面臨全院營運人力瀕臨崩潰之致命危機。任務支援組與營養室必須在極限物資匱乏下，實施剛性物資調配、腸道流質保障與外部現金緊急採購。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：總務部長許慧莉（公務機簡碼 61658）帶領營養室徐桂婷組長（分機20；代理人：蔡佳紋營養師）與採購主任邱芬娟（分機 3932），進駐恩慈 B1前進指揮中心，啟動<strong>「戰時極限飲水糧食調配、重症流質保障與現金外購SOP」</strong>。</p><ul><li>*B1 膳食補給點開設與無水配膳*：營養室立即在 <strong>約翰大樓 B1    工務室入口右側</strong>    開設臨時「膳食物資配發站」。為極限節約淨水，廚房<strong>全面中斷常規餐具清洗，100%    換用拋棄式免洗餐具</strong>，停止耗水菜餚之製作。</li><li>*重症及兒科「商業配方流質」剛性配給*：營養師手動清點、盤存本院儲備之<strong>「商業配方流質（管灌營養品）」</strong>與嬰幼兒配方奶粉，降級改用實體紙本登記，100%    絕對優先、足額配給供應給路加 B1 一般病房（36 床）、臨時 ICU（23 床）    之重症患者，以及 2B 兒科病房，死守重症患者之基本代謝生命線。</li><li>*高能量口糧外購與盲派分發*：採購主任邱芬娟立即砸開保險箱，啟用<strong>紙本特別現金支票與購糧令</strong>，避開受阻的外網，直接熱線對接在地備援飲水商<strong>「高山行山泉水（0910-788388）」</strong>及簽約糧食大宗商，調撥高能量能量棒、即食真空口糧、瓶裝水共計    30 箱。</li><li>*送補綠色生命通道建立*：聯絡官萬樹人（60315）向縣府聯合應變中心（LJMOC）申請「糧食飲水免徵用與綠色物資通道證書」，指派保全全程持盾護送糧食車隊進院。物資運抵指定的安全卸貨點（<strong>恩慈大樓    1    樓停車場</strong>）後，資材組與會計組（李華敏主任）進行雙人雙簽點收，隨後立即分發給連續值班    72 小時、出現虛脫之核心臨床同工，保全醫護體能。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>： 營養室組長徐桂婷精算全院基本自撐數據：</p><ul><li>本院在院 1,479 名同工及留院 107    床住院病人，每日基本應急膳食總需求量為 <strong>3,200 份</strong>。</li><li>採購組必須在 2 小時內完成對備援商高山行之 <strong>30 箱瓶裝飲用水</strong>    採購簽證，並向 B1 護理站「盲派」推送 <strong>300 份</strong> 高熱量乾糧。    營養師每日手寫抄報餘量，保障在院重症及嬰幼兒流質配給天數自撐達 72    小時以上。</li></ul>"}]}, {"role": "後勤部勤務組／運輸組", "entries": [{"stage": 2, "scenario_id": "20", "scenario_title": "緊急命令／全國動員", "datetime": "8月13日 08:00", "summary": "總統依局勢發展於國安會議後發布緊急命令並實施全國動員，受徵用之人員與物資依通知向指定地點或聯合徵集場報到。屏東縣各警察分局完成召集令送達，縣府相關業管單位及屏東監理站同步執行物力動員徵購徵用書送達。", "detail": "由醫勤室庶務組長陶大屏與組長吳哲維共同執行", "html": "<p>全國物力動員徵購徵用書送達，本院面臨部分車輛、設備與擔架資源被國家強制徵用與調配之情境。後勤部勤務組（醫勤室庶務組長陶大屏，簡碼69400）立即執行<strong>「戰時運輸載具極限盤點與轉運管制」</strong>。勤務組指派專人，於恩慈大樓 1樓停車場（物資撤離動線集結點）實施車輛點名。</p><p>勤務組極限盤點本院可直接支配及徵用之車輛載具共計 <strong>16 輛</strong>：</p><ul><li><strong>救護車（共 3 輛）</strong>：其中 1 輛停於路加地下 1 樓，2 輛停於約翰地下    1 樓。每輛單波次可承載擔架重症病患 1 人、醫護與家屬 4 人（合計 5    人），3 輛合計單波次可載運 <strong>15    人</strong>。救護車列為重症轉院第一波次，絕對優先配給 MICU、SICU    及急診紅區。</li><li><strong>輪椅車（共 2 輛）</strong>：2 輛單波次共乘載 <strong>12    人</strong>，專用於運送需要輪椅扶持之第二、三級病患（如洗腎病人）。</li><li><strong>中型巴士（共 4 輛）</strong>：乘載容量各為 22 人座 2 輛、15 人座 2 輛，4    輛合計單波次乘載 <strong>74 人</strong>，專用於批量轉送 Level 2、3    輕中度病人及撤離醫護同工。</li><li><strong>廂型貨車（共 7 輛）</strong>：專門負責裝載打包編號之 Category A    救命醫療器材與藥材。 勤務組長陶大屏將上述 16    輛車進行車牌登記與實體編碼，發配專通行證，並派司機 24    小時備命，死守本院在物力動員下的生命運輸網。</li></ul>"}, {"stage": 3, "scenario_id": "01", "scenario_title": "軍事機動管制", "datetime": "", "summary": "第四作戰區聯合運輸指揮處協調屏東縣聯合應變指揮管制中心及交通控制中心，管制國道3號九如、長治、麟洛、竹田、崁頂及南州交流道，以及台88線萬丹端、台17線雙園大橋屏東端等節點，建立軍事機動優先通行機制。", "detail": "由醫勤室庶務組長陶大屏與組長吳哲維共同執行，簡碼69400", "html": "<p>後勤部勤務組（庶務組長陶大屏，簡碼69400；運輸組長陶大屏）在接獲軍事機動管制通報後，必須立即在 <strong>15分鐘內</strong>開設「戰時車輛與轉運調配中心」，並將全院運輸載具進入一級整備。勤務組立即盤點並整備本院列管之<strong>16 輛戰備運輸車輛</strong>（包含救護車 3 輛、輪椅車 2 輛、中型巴士 4輛及廂型貨車 7 輛）。司機全員召回在車上待命，確保車輛油箱儲量大於 100%。</p><p>陶大屏組長指揮運輸組針對交流道與橋樑管制，實施「救護動線變更與替代路由導引SOP」。司機與隨車醫護改採 VHF/UHF定頻無線電對講機通聯，避開受管制之國道與台88線主線，改由台27線、縣道189線等地方平面避難路由進行轉運。在院區登車哨口，勤務組協同保全，在大連路及恩慈大門口劃設實體管制邊界，實施「三大接運疏散區」動線絕對分流（急診大門救護車專區、門診大廳接駁車專區、恩慈大樓私人車專區），派出Runner站在轉折點以大聲公引導，確保後送救護車能以「一車進、一車出」的流暢波次快速駛入。</p><p>此外，針對可能因管制而延遲抵達的外部簽證物資車，勤務組預先派遣 2名引導人員攜帶對講機至大連路與瑞光路交叉口（距本院約 1.1 公里，車程 3分鐘）設立接引哨，配合民防隊伍實施物理交管，確保物資車能排除車流、直接對接至恩慈大樓1 樓停車場卸補集結點，死守醫院物資生命線。</p>"}, {"stage": 5, "scenario_id": "01", "scenario_title": "交通幹道遭打擊", "datetime": "", "summary": "敵軍為阻止國軍兵力機動，針對高屏縱深運輸要道實施火力打擊，高屏大橋、雙園大橋及台鐵高屏溪橋梁受損，並波及屏東產業園區部分化學儲槽，造成交通中斷與複合災害；救援車流壅塞，影響搶救與後勤運補。", "detail": "由醫勤室庶務組長陶大屏與組長吳哲維共同執行，簡碼69400", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：當高屏主要幹道遭火力打擊受損中斷，且產業園區複合化災造成道路極度擁堵、後勤運補車流嚴重受阻時，後勤部勤務組長（醫勤室庶務組長陶大屏，簡碼69400；協同運輸組長吳哲維）必須立即啟動<strong>「縱深防禦階段物資車隊應急接運與替代路由導引SOP」</strong>。勤務組在接獲橋梁中斷警報 <strong>10 分鐘內</strong>，將全院 16輛戰備車輛移置於地下強固之車庫（其中路加大樓地下 1 樓停放 1輛救護車，約翰大樓地下 1 樓停放 2 輛救護車），防止砲火破片波及。</p><p>針對外部運送備用燃油、高壓氧氣鋼瓶及生理食鹽水之簽證物資車受阻於橋梁端之想定，陶大屏組長立即召回全班司機，切換使用獨立頻段之VHF/UHF 定頻無線電對講機（避開受干擾之外部公網），派出 <strong>2 輛廂型貨車</strong>組成「前進接運特遣隊」，經由台27線、縣道189線等地方平面避難便道，繞行開闢一條無障礙之替代路由，前往軍方浮橋或交界集結點，與外部供應商執行「浮橋端人工無縫物資接力移交」。</p><p>在院區卸補哨位管制上，勤務組協同保全人員，在 <strong>恩慈大樓 1樓停車場（物資撤離與接收點）</strong>築起實體警戒線與防爆沙包牆，嚴防恐慌人群在交通中斷、物資匱乏之際哄搶救命物資。勤務同工指派紅色Runner（專屬臂章徒步傳令兵）站在莊敬街與瑞光路等聯外交叉路口，實施人工交通導引，清理所有違停與擁堵車流，開闢一條寬度不小於<strong>3.5公尺之緊急醫療救護通道</strong>，保障轉運與補給車隊能以最快速度切入恩慈大樓，死守物資生命線。</p><p><strong>確實數據與資源規劃</strong>： 勤務組每日定時精算並向 HICS指揮中心回報「車輛物資消耗與續航能力」：本院現有 3 輛救護車單波次可載運15 人，4 輛中巴單波次可批量轉送 74人。為因應持久作戰，勤務組將備用柴油存量、水資源狀態（地下戰備水井日產1,958 噸）及生活乾糧消耗速率進行精準庫存控管，確保本院在無外部物資補充之「資訊與物理孤島狀態」下，車隊與後勤運補能自撐至少<strong>72 小時</strong> 以上。</p><p><strong>指揮與管制（HICS 對接）</strong>：勤務組長陶大屏隨時將車輛出勤狀態、備用柴油及氧氣運補缺口數據，以有線電話或定頻無線電向後勤部長許慧莉（公務機簡碼61658） 報告，隨時更新至 HICS 戰情面板（https://ci-board.ptch.org.tw）。</p>"}]}, {"role": "後勤部任務支援組／藥劑科", "entries": [{"stage": 3, "scenario_id": "PTCH-15", "scenario_title": "輻傷民眾擠兌", "datetime": "", "summary": "【恐慌性索取碘片】核災警報發布後，上千名未受輻射暴露但極度恐慌的民眾包圍醫院，強烈要求發放「碘片」及進行輻射洗消。民眾阻擋救護車通道，導致真正受重創的傷患無法送達急診。", "detail": "主責人：藥劑科主任陳秋榮，公務機簡碼69141", "html": "<p><strong>1. 狀況概述與面臨挑戰</strong>：大批恐慌民眾強烈要求配給碘片，極易造成藥局、急診檢傷台被衝擊，且碘片儲備若遭盲目發放將迅速歸零，使真正受落塵侵害之高危病患與同工面臨防護空窗。藥劑科主任陳秋榮（公務機簡碼69141；代理人：藥劑科組長）與任務支援組資材組長吳佳蓉，必須立即啟動碘片安全管制配給、實體發放窗口外置分流與手工帳物勾稽，死守藥事安全紅線。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：藥劑科主任陳秋榮在接獲警報 <strong>10 分鐘內</strong> 下令封鎖位於 <strong>馬太大樓地下 1樓</strong>之常規藥庫與藥局。藥庫同工立即關閉密閉鐵門加鎖，除配戴防偽識別背心（資訊技術同工戴<strong>粉紅色識別背心</strong>、傳令兵戴<strong>紅色Runner 臂章</strong>）之同工外，其餘無關之避難群眾、暴民一律強勢阻絕於藥庫 50公尺警戒線外。</p><p>藥劑科與資材組實施<strong>「碘片發放站外置分流與限量紙本配給程序」</strong>：</p><p>1.  *架設戶外篩檢發放哨*：藥劑同工與保全配合，立即於 <strong>恩慈大樓 1    樓大門外避風空地或指定安全區</strong> 架設實體隔離護欄與 4    個「臨時戶外碘片篩檢發放哨」，將搶藥人潮徹底外置於大樓臨床核心紅區之外。</p><p>2.  *實施受落塵威脅身份核對*：發放哨同工改採 Downtime    紙本手工模式，一律要求前來領藥民眾出示身分卡、手寫登記基本資料與聯絡電話，經臨床醫師或檢傷人員核實其「確有核三廠周邊輻射暴露威脅與暴露軌跡」後，始得發給。</p><p>3.  *限額限量發放*：對於核實有暴露風險者，藥師一律實施現場定量、限額發放（每人僅配給    1 日或最大 2    日之法定保護劑量），由領用人手寫雙簽，嚴禁重複領取或代領。</p><p>4.  *雙人雙簽物理點交*：藥師從 B1    管制藥庫提取碘片時，必須由管制藥管理藥師與接收端藥師執行「現場手寫雙簽點收與實體物理移交」，帳物核實無誤後，裝入專用防潮袋發放，死守本院關鍵管制藥品之完好性。</p><p><strong>3. 實際確實數據與資源規劃</strong>： 藥劑科與資材組精算核災防護資材與存量：藥庫備有法定儲備之<strong>碘片（Potassium Iodide）共計 10,000錠</strong>，均鎖閉存放於 B1 管制藥庫安全不銹鋼專用櫃中。 戶外發放哨配置 <strong>8名專責藥師</strong>（每哨配置 2 名）、<strong>4名保全人員</strong>。藥師每日定時精算碘片之消耗量、賸餘公升與可自撐天數，以紙本抄錄，由Runner 每 2 小時向計畫部回報一次數據，確保庫存不致盲目見底。</p><p><strong>4. 指揮與管制（HICS 對接）</strong>： 藥劑科主任陳秋榮（公碼69141）隨時將碘片發放份數、庫存警報讀數、以及發放哨現場秩序，以有線電話或定頻無線電向後勤部長許慧莉及執行部長報告，做好隨時向衛生局上報清點紀錄之行政整備。</p>"}, {"stage": 4, "scenario_id": "05", "scenario_title": "水產冷鏈設施受損", "datetime": "", "summary": "東港及枋寮地區水產冷凍、製冰與物流設施遭砲火波及，冷凍庫、製冰設備及關鍵管線受損，部分廠區起火，造成水產冷鏈與民生食品供應中斷。", "detail": "由資材組長吳佳蓉帶領） &藥劑部（由藥劑科主任陳秋榮帶領", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：水產冷鏈與電力中斷，直接威脅本院馬大 B1藥庫內大量溫度敏感藥品（如冷藏胰島素、高警訊藥物及疫苗）之保存安全。藥劑科主任陳秋榮會同資材組長吳佳蓉，立即啟動<strong>「高警訊藥品與冷鏈藥材備援保溫及轉運SOP」</strong>。資材組同工立即物理砸開備援資材箱，取出儲備之大批「低溫蓄冷片」與「可攜式保冷保溫箱」。</p><p>藥庫技術員將大批冷藏藥品自脆弱的地面冷藏冰箱中取出，依據藥品之特定保存溫度（2\\~8℃）進行分類打包，每箱放入2至4片蓄冷片，並隨箱附上實體手寫溫度監控紀錄卡。藥師將調配好之72小時病患備用藥與冷鏈藥材，以「盲派推拉式物流」，主動物理推送至 B1臨時加護病房與手術室，藥箱與轉送的病人同步物理綁定移交，確保生命線藥物冷鏈不斷鏈。對於不需冷藏之高耗用外傷縫合包及點滴，資材組人員將其以箱體編號打包，搬運至路加大樓B1 安全避難倉儲，落實盲派形式。</p><p><strong>2. 確實數據與資源規劃</strong>： 藥劑部（陳秋榮主任）精算本院72小時高耗用急救藥品、升壓劑與管制藥品之存量與日消耗率。藥劑部盤點核心麻醉藥（Ketamine 等第一至三級管制藥物），將其集中存放於 B1地下血庫旁之專用鋼製管制櫃中，強制上鎖並指派專人保管，每班實施「藥師與病房護理長雙人覆核與手寫雙簽交接」。核對程序絕對不可因大限電而簡化，帳物必須百分之百相符，防止貴重麻醉藥品在混亂中發生遺失、被搶或資敵之重大事故。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：藥劑科主任陳秋榮隨時將冷鏈藥物保溫狀態、管制藥品存量數據，以有線電話或定頻無線電向執行部長報告，動態更新於戰情面板上。</p>"}, {"stage": 1, "scenario_id": "PTCH-01", "scenario_title": "藥品擠兌與恐慌", "datetime": "", "summary": "【民眾恐慌囤積藥品】受網路假訊息「外商藥廠撤資、慢性病藥品即將斷貨」影響，大量民眾湧入門診及藥局，強烈要求提前領取或自費購買3至6個月以上的慢性病用藥（降血壓、胰島素等）。民眾因遭拒絕與醫護發生肢體衝突，門診大廳癱瘓。", "detail": "主責人：藥劑科主任陳秋榮，公務機簡碼69141", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當受網路不實假訊息「外商藥廠撤資、慢性病藥品即將斷貨」影響，大量恐慌民眾湧入門診及藥局強烈要求囤積3 至 6 個月藥物時，藥劑科立即啟動<strong>「戰時藥事緊急備援與限額限量管制SOP」</strong>。藥劑科主任陳秋榮（公務機簡碼 69141；代理人：藥劑科組長）接獲HICS 指揮中心通報後，必須在 <strong>15 分鐘內</strong>協同門診護理與保全人員進行人潮物理性分流，並於大連院區門診大廳外或安全避難空地迅速架設<strong>「戶外慢性病處方箋領藥處與臨時藥品供應站」</strong>，以實體空間重構之戰術將搶藥人群有效外置隔離於大樓臨床核心紅區之外，確保急診與急重症病患就醫通道順暢無阻。</p><p>面對庫存小於 3日（三日）的極限危機，藥劑科同工立即中斷常規採購流程，降級改採手寫紙本模式，啟動戰時<strong>「藥品分級管制與限量發放機制」</strong>，對於慢性病領藥者一律限額限量發給（例如僅配發最大7天份之救命藥物），切勿因恐慌而發生盲目囤藥致使真正需要急救者無藥可用。藥師必須每日定時精算72小時內核心外傷藥、急救升壓劑、管制麻醉藥之平均消耗量、可支應天數與補給缺口；當庫存跌破安全警戒線時，不待完全耗盡，立即填具「緊急維物資請求單」，經後勤部長（總務部部長許慧莉，公務機簡碼61658）與執行部長核簽後，由聯絡官（萬樹人副院長，公務機簡碼60315）利用低軌衛星電話等 PACE備援通訊向屏東縣衛生局、合作醫院及簽有支援協定之區域聯防醫院（部立屏東醫院、寶建醫院、東港安泰醫院、屏東榮民總醫院）發出緊急物資調撥調度請求。</p><p>在無網 Downtime狀態下，藥師調劑與發藥時，針對高警訊、第一至三級管制麻醉藥品（如Ketamine、胰島素等）必須嚴格維持<strong>「藥師與病房護理長雙人手寫雙簽覆核與實體點交」</strong>，管制藥品一律鎖於B1備援藥庫之專用鋼櫃內並派專人保管，帳物必須百分之百相符，嚴防麻醉物資在混亂中流失、被搶或資敵。</p><p><strong>2. 確實數據與資源規劃</strong>： 藥劑科同工清點並精算：本院日常維持 1,479名同工運作及 635 床（一般病床 356 床、特殊病床 279床）之基本臨床用藥。在慢性病藥品庫存小於 3日的極限狀態下，採購組與藥庫立即對接在地長約替代藥物商，確保能於 12小時內橫向調撥儲備生理食鹽水及無菌輸液 <strong>30 箱（共 720袋）</strong>、慢性病基本替代藥物 <strong>2,000 份（7天份限量包）</strong>，並手動登錄於實體「藥品戰備庫存造冊簿」中，由傳令兵（Runner）每2 小時向計畫部狀況分析處（莊詩蘋督導長，公務機簡碼65311）抄報數據，以鋼性Facts（事實）穩住臨床戰線。</p>"}]}]}], "scenarioIndex": [{"stage": 2, "id": "01", "title": "軍事威脅升溫", "datetime": "8月7日 18:00", "summary": "中國東部戰區自福建、廣東沿海持續動員海、空及後勤部隊，逐步完成整備，並對臺南、高雄、屏東及臺東外海重要航道實施封控與威懾，同時配合心理戰傳達政治意志，南部地區安全情勢快速惡化。"}, {"stage": 2, "id": "02", "title": "軍事威脅／飛彈", "datetime": "8月8日 10:00", "summary": "國防部發布監測資訊，指出自大陸沿岸方向朝臺灣周邊海空域發射多枚飛彈，部分彈道飛越臺灣本島上空，另有飛彈落入周邊海域；相關訊息經媒體即時報導，引發民眾對戰爭風險之疑慮，影響社會穩定。"}, {"stage": 2, "id": "03", "title": "軍事動員演習", "datetime": "8月8日 12:00", "summary": "因應敵情發展，屏東地區國軍常備及後備部隊奉令實施「動員演習」，依計畫進入戰術位置並進行兵力、裝備整備與戰場經營；惟部分未完成簽證之物資（如阻絕器材、工程材料及偽裝資材）出現缺口，縣府協調民間通路緊急採購及調度現貨，並由第四作戰區統籌分配。"}, {"stage": 2, "id": "04", "title": "民力協調", "datetime": "8月8日 16:00", "summary": "第四作戰區因動員演習需求，透過屏東縣「動員暨民力協調組」協請縣政府提供200組水泥紐澤西護欄，並協力運送至台17線雙園大橋屏東端、東港大橋及台1線枋寮段等指定地點，執行交通阻絕與防護部署。"}, {"stage": 2, "id": "05", "title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "屏東縣政府內部通訊群組轉傳媒體與社群運用公開航情、船舶追蹤程式所呈現之資訊，並據以研判臺灣周邊海空域情勢；惟內容未經完整查證即快速擴散與再解讀，形成片面推論，加劇民眾對安全情勢之不安。"}, {"stage": 2, "id": "06", "title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "敵對勢力運用社群平台、網路直播、新聞流量及AI生成影像，密集操作「南部已被放棄」、「政府錯判情勢拖入戰爭」、「沿海居民將無法撤離」等敘事，企圖干擾政治與作戰準備節奏，造成屏東地區民眾恐慌。"}, {"stage": 2, "id": "07", "title": "縣政府先期整備", "datetime": "8月8日 12:00", "summary": "因應整體情勢升高及可能衝擊民生與社會穩定之風險，屏東縣政府啟動先期整備，完成聯合應變指揮管制中心、各鄉鎮市應變中心及防災協作中心之功能編組，並盤點人力、物資、避難空間與關鍵資源。"}, {"stage": 2, "id": "08", "title": "關鍵基礎設施異常", "datetime": "8月9日 08:00", "summary": "高屏地區天然氣輸配與能源監控系統出現異常警示，部分壓力調節與輸送數據波動，遠端連線紀錄出現非常態來源及通訊中斷；初步研判為控制系統異常或疑似資訊干擾，致南部供氣壓力下降約15%至20%，影響區域能源穩定。"}, {"stage": 2, "id": "09", "title": "天然氣管線異常", "datetime": "8月9日", "summary": "連接永安液化天然氣接收站與南部供氣網之管線傳出異常警示，監測系統顯示壓力快速下降及流量波動，天然氣輸送能力受限，造成高屏地區燃氣發電、工業及重要民生用氣調度困難。"}, {"stage": 2, "id": "10", "title": "通信干擾／假訊息", "datetime": "8月9日", "summary": "敵對勢力利用軟體定義無線電設備，於屏東火車站、潮州火車站及東港轉運站等人潮密集區架設偽裝行動基地台，干擾合法電信訊號並發送偽造緊急告警；另透過簡訊與社群誘導民眾下載不明應用程式，造成混淆與恐慌。"}, {"stage": 2, "id": "11", "title": "通信基礎設施異常", "datetime": "8月9日", "summary": "屏東、潮州及東港地區電信機房出現系統異常與網路延遲，並伴隨部分基地台通訊負載異常升高；部分區域出現訊號不穩與通話中斷，影響政府通報、金融交易、醫療聯繫及核心資料處理能力。"}, {"stage": 2, "id": "12", "title": "通信服務中斷", "datetime": "8月9日", "summary": "受通訊服務異常影響，屏東市、潮州鎮、東港鎮、枋寮鄉及恆春鎮等地區出現通訊不穩與網路中斷，波及政府通報與金融交易系統；坊間流傳即將「全縣斷網」等訊息，引發集中查詢並進一步加重系統負載。"}, {"stage": 2, "id": "13", "title": "軍事動員與社會反應", "datetime": "8月9日", "summary": "國軍依計畫進入戰術區域實施戰備整備，戰甲砲車及部隊機動畫面經民眾拍攝與媒體即時報導，引發社會關注並放大戰爭風險認知；第四作戰區協請屏東縣政府啟動資訊應處機制，共同發布事實訊息以穩定民心。"}, {"stage": 2, "id": "14", "title": "金融市場動盪", "datetime": "8月9日 09:00", "summary": "受地緣政治緊張局勢升高影響，臺灣股市出現恐慌性賣壓，外資大量賣超、資金外流，進一步加劇市場不安與民眾對資產安全之疑慮。"}, {"stage": 2, "id": "15", "title": "金融假訊息擠兌", "datetime": "8月9日 10:00", "summary": "社群平台散布「資金將遭凍結」、「金融系統不穩」及「特定族群提前轉移資產」等訊息，引發土地銀行屏東分行、第一銀行屏東分行及其他金融據點提領人潮；排隊與推擠造成民生路、中山路、廣東路等路段壅塞，影響救護與消防車輛通行。"}, {"stage": 2, "id": "16", "title": "金融擠兌擴大", "datetime": "8月9日 12:00", "summary": "擠兌情形經社群擴散後，帶動屏東市、潮州鎮、東港鎮及內埔鄉之農會、郵局與金融機構出現集中提領，造成現金調度壓力、營運負荷增加及周邊交通壅塞。"}, {"stage": 2, "id": "17", "title": "銀行擠兌應處", "datetime": "8月9日 13:00", "summary": "受金融交易系統異常影響，臺灣銀行屏東分行出現民眾集中提領情形，造成現金調度與營運壓力；警方即時派遣警力進駐，執行人潮疏導、秩序維護、重要設施警戒及交通管制作業。"}, {"stage": 2, "id": "18", "title": "認知作戰升溫", "datetime": "8月10日 12:00", "summary": "社群媒體流傳縣府官員與家屬優先撤離、重要物資已私下轉移等不實內容，並以截圖與短影音快速擴散，形塑權貴避險觀感，削弱民眾對政府信任，加劇恐慌並引發民眾質疑指揮體系運作。"}, {"stage": 2, "id": "19", "title": "物資供應短缺", "datetime": "8月11日 08:00", "summary": "部分奶粉與民生物資經銷商受市場短缺預期及價格波動影響，傾向保留庫存，進一步影響物流調度與通路補貨；屏東市、東港鎮等地受「嬰兒奶粉即將斷供」不實訊息影響，搶購與囤積行為擴大。"}, {"stage": 2, "id": "20", "title": "緊急命令／全國動員", "datetime": "8月13日 08:00", "summary": "總統依局勢發展於國安會議後發布緊急命令並實施全國動員，受徵用之人員與物資依通知向指定地點或聯合徵集場報到。屏東縣各警察分局完成召集令送達，縣府相關業管單位及屏東監理站同步執行物力動員徵購徵用書送達。"}, {"stage": 2, "id": "21", "title": "民生物資管制", "datetime": "8月13日", "summary": "屏東縣政府依緊急命令對食米、食用油、食用鹽、液化石油氣及嬰兒奶粉等法定必需品實施管制，盤點轄內存量並要求各通路配合限購，另優先保障醫療、收容、偏鄉及離島地區基本需求。"}, {"stage": 2, "id": "PTCH-06", "title": "通信服務中斷", "datetime": "", "summary": "【院外斷訊與內部通訊降級】高屏地區電信機房遭破壞，對外市話與行動網路全面中斷。病患家屬無法聯繫院內，消防局119救護車無法進行到院前通報；院內跨科室溝通僅能仰賴預備的無線電對講機，通訊陷入混亂。"}, {"stage": 2, "id": "PTCH-07", "title": "供水系統異常", "datetime": "", "summary": "【斷水與洗腎中心危機】屏東市區自來水管線遭破壞降壓，院內頂樓蓄水池水位快速下降。血液透析（洗腎）中心因缺乏RO純水面臨停機危機，近百名洗腎患者面臨無法透析的生命危險，急需調度外部水車支援。"}, {"stage": 2, "id": "PTCH-08", "title": "能源供應中斷", "datetime": "", "summary": "【斷氣與滅菌系統停擺】天然氣管線全面中斷。屏基中央廚房停擺，無法供應病患餐食；更嚴重的是，高壓蒸氣滅菌鍋（Autoclave）因無蒸汽無法運作，手術室與各病房之醫療器械面臨無法消毒的感控危機。"}, {"stage": 2, "id": "PTCH-09", "title": "生化威脅與封鎖", "datetime": "", "summary": "【不明生化包裹攻擊】急診檢傷台收到疑似含有「炭疽桿菌（或不明致病粉末）」的惡意包裹，數名護理師接觸後出現急性紅腫與呼吸急促。院方需緊急拉起封鎖線，將急診室「就地隔離」，並啟動B級防護衣穿戴與通報應變。"}, {"stage": 2, "id": "PTCH-10", "title": "電力基礎受損", "datetime": "", "summary": "【電網波動與設備燒毀】變電所遭滲透破壞，外部供電呈現頻繁跳電與極端電壓不穩（突波）。儘管院內發電機啟動，但瞬間突波導致加護病房（ICU）部分精密維生設備（如高階呼吸器）主機板燒毀，重症照護量能受損。"}, {"stage": 3, "id": "01", "title": "軍事機動管制", "datetime": "", "summary": "第四作戰區聯合運輸指揮處協調屏東縣聯合應變指揮管制中心及交通控制中心，管制國道3號九如、長治、麟洛、竹田、崁頂及南州交流道，以及台88線萬丹端、台17線雙園大橋屏東端等節點，建立軍事機動優先通行機制。"}, {"stage": 3, "id": "02", "title": "醫療降載危機", "datetime": "", "summary": "屏東基督教醫院於緊急命令發布後啟動醫療營運降載，暫緩非緊急門診、健檢與部分選擇性手術，以保全急重症核心量能；惟部分民眾無法接受措施，現場出現大量詢問、抱怨及情緒失控，院內外人潮聚集並影響就醫動線。"}, {"stage": 3, "id": "03a", "title": "動員物資延遲", "datetime": "", "summary": "原定報到之在地營造廠商重型機具（挖土機7部、裝載機5部及傾卸卡車10部）未於時限內抵達指定地點或徵集場；因部分機具仍在外地，且受高屏主要幹道壅塞與交通管制影響，無法如期轉運，致動員進度延滯。"}, {"stage": 3, "id": "03b", "title": "無人機偵察威脅", "datetime": "", "summary": "敵方初期運用多架次無人機對東港、大鵬灣、林邊、枋寮、枋山及恆春半島沿海實施偵察，並結合電子干擾誘發防空系統反應；屏東基督教醫院同步啟動院內防空避難機制，執行人員疏散、地下備援醫療空間轉換及急重症持續收治。"}, {"stage": 3, "id": "04", "title": "民生物資配給管制", "datetime": "", "summary": "行政院核定公告實施配給配售，中央供應站於公告起48小時內、地方配售站於72小時內完成開設。屏東縣政府成立民生必需品配售執行委員會，各鄉鎮市公所成立配售執行小組，並納入偏鄉與原住民族地區配送規劃。"}, {"stage": 3, "id": "05", "title": "水資源供應異常", "datetime": "", "summary": "屏東主要原水與供水系統受不明來源干擾，造成取水設施異常、輸水管線壓力波動及監控資料不一致，進一步影響屏北、內麟、林邊供水系統及牡丹水庫輸水調度；屏東市、麟洛、內埔、潮州、東港、林邊及佳冬部分地區出現間歇性停水。"}, {"stage": 3, "id": "06", "title": "停水民眾搶購", "datetime": "", "summary": "受停水影響，民眾大量湧入超市、加水站搶購瓶裝水與儲水容器；社群流傳「全縣即將全面停水」及「水源污染」等不實訊息，放大恐慌情緒，造成排隊人潮、交通壅塞及民眾對政府供水能力之疑慮。"}, {"stage": 3, "id": "07", "title": "恆春半島設施疏散評估", "datetime": "", "summary": "第四作戰區情資研判，恆春半島重要能源、輸電及通信設施可能成為優先攻擊目標，建議疏散周邊非必要人員，必要運轉與安全維持人員依計畫留守；同時調整恆春、車城及枋山地區配售站與救濟站物資配置。"}, {"stage": 3, "id": "08", "title": "無人機威脅關鍵設施", "datetime": "", "summary": "屏南地區重要能源與輸配電設施周邊出現不明來源無人機低空盤旋及定點停留，疑似進行設施偵查與目標標定，場站通報相關單位並加強警戒、反無人機與監控作業。"}, {"stage": 3, "id": "09", "title": "能源設施爆炸事故", "datetime": "", "summary": "屏南地區能源轉運及輸配電設施疑遭無人機攻擊，部分設備受損並引發局部爆炸與火勢，造成作業人員2人重傷、6人輕傷、另有3人失聯；能源與輸配電作業中斷，造成東港、林邊、佳冬、枋寮、潮州及屏東市部分區域停電，衝擊交通號誌、ATM、醫療與民生用電。"}, {"stage": 3, "id": "10", "title": "電力基礎設施攻擊", "datetime": "", "summary": "屏東市、潮州及東港地區多處一次變電所疑遭敵特工滲透破壞，設備異常並引發饋線跳脫，造成屏東市大範圍停電與電壓不穩，並波及麟洛、內埔、萬丹及潮州；縣府機關、屏東基督教醫院、產業園區與主要交通號誌均受影響。"}, {"stage": 3, "id": "11", "title": "糧食儲備設施縱火", "datetime": "", "summary": "萬丹、竹田、麟洛、潮州及崁頂等地多處碾米、糧食與物資儲存據點在短時間內同步發生縱火事件，造成部分倉儲設施受損與物資損失，影響區域糧食供應與物流調度，並引發市場恐慌。"}, {"stage": 3, "id": "12", "title": "警察局遭無人機攻擊", "datetime": "", "summary": "屏東縣警察局民防管制中心及屏東、潮州、東港、枋寮、恆春等分局同步遭多波次無人機攻擊，致防情通報與防空警報發布功能部分中斷；執勤警力出現傷亡，影響現場應變、治安與交通管制能力。"}, {"stage": 3, "id": "13", "title": "配售秩序混亂", "datetime": "", "summary": "受物資短缺與不實訊息影響，東港鎮、林邊鄉及佳冬鄉部分民生物資配售站因等候時間過長、民眾質疑分配不公而出現爭搶與推擠，導致配售秩序混亂，影響物資發放。"}, {"stage": 3, "id": "14", "title": "社會秩序惡化", "datetime": "", "summary": "因不實訊息持續擴散，群眾恐慌情緒升高，屏東市、潮州鎮及東港鎮陸續發生搶劫商家、藥局及配售站等案件；警方執勤能量受牽制，對社會治安與公共秩序造成嚴重衝擊。"}, {"stage": 3, "id": "15", "title": "油品廠火災事故", "datetime": "", "summary": "屏南產業園區某油品儲運廠疑遭不明來源破壞，儲槽設施受損並引發火勢，造成油品外洩與濃煙；事故影響台1線枋寮段、周邊產業與工程物料供應，並對交通維修能量及民生物資配送體系造成壓力。"}, {"stage": 3, "id": "16", "title": "廣播電視遭入侵", "datetime": "", "summary": "屏東地區有線電視播出系統與廣播電台遭不明人士入侵，部分播出系統被控制並持續插入異常訊號，內容涉及重塑國家認同及兩岸政治秩序等高度政治訊息，與正常節目交錯播出，造成資訊混淆與地方輿情升溫。"}, {"stage": 3, "id": "17", "title": "民生物資謠言與抗議", "datetime": "", "summary": "網路流傳嬰兒奶粉等民生物資短缺及縣府囤積物資之謠言，屏東縣政府前出現民眾群聚抗議並要求發放物資；另於內埔、潮州、東港等地出現不明傳單，宣稱可憑單領取物資或兌換貨幣，誘發錯誤期待與群聚行為。"}, {"stage": 3, "id": "PTCH-11", "title": "燃料補給中斷", "datetime": "", "summary": "【斷油與發電機危機】戰備用油遭軍方與政府徵用，且交通管制導致中油油罐車無法駛入市區。屏基地下室備用發電機的柴油存量跌破20%，若不停供非緊急區域用電，全院將在12小時後陷入全黑。"}, {"stage": 3, "id": "PTCH-12", "title": "物流與衛材斷鏈", "datetime": "", "summary": "【醫療耗材與藥品見底】聯外橋樑封閉，北部及高雄物流中心無法南下。院內拋棄式耗材（空針、無菌手套、紗布）、點滴（生理食鹽水）及廣效抗生素庫存告罄。被迫重啟早期「煮沸/化學浸泡消毒」模式重複使用耗材。"}, {"stage": 3, "id": "PTCH-13", "title": "避難秩序失控", "datetime": "", "summary": "【防空避難所暴動】空襲警報頻傳，大量非就醫的周邊社區民眾強制湧入屏基地下停車場尋求防空掩蔽。民眾隨地便溺、抽菸，並試圖搶奪醫院配給的飲用水與食物，與駐衛警爆發激烈衝突，威脅地下備援設施安全。"}, {"stage": 3, "id": "PTCH-14", "title": "核災威脅與掩蔽", "datetime": "", "summary": "【核災外洩與空調關閉】恆春核三廠（或遭戰術核武攻擊）受損，輻射塵警告發布。屏基被迫啟動「就地掩蔽（Shelter-in-place）」，全面強制關閉中央空調與對外通風。在南台灣高溫下，密閉病房內多名重症患者與穿戴防護衣的醫護出現熱衰竭。"}, {"stage": 3, "id": "PTCH-15", "title": "輻傷民眾擠兌", "datetime": "", "summary": "【恐慌性索取碘片】核災警報發布後，上千名未受輻射暴露但極度恐慌的民眾包圍醫院，強烈要求發放「碘片」及進行輻射洗消。民眾阻擋救護車通道，導致真正受重創的傷患無法送達急診。"}, {"stage": 4, "id": "01", "title": "敵軍登陸作戰", "datetime": "", "summary": "敵軍於東港、林邊及枋寮沿海展開登陸作戰，企圖突破沿岸防線並沿台17線、台1線向縱深推進；另於佳冬及枋山沿海發現登陸船團接近，並結合無人機偵察、火力打擊與電子干擾策應，顯示有擴大登陸規模之態勢。"}, {"stage": 4, "id": "02", "title": "敵前沿疏散決策", "datetime": "", "summary": "第四作戰區通報屏東縣聯合應變指揮管制中心，研判東港、林邊、佳冬及枋寮之台17線以西沿海聚落為敵我交戰前沿，居民滯留將面臨高度生命危險並影響部隊行動，建議立即分區疏散至內陸安全地區。"}, {"stage": 4, "id": "03", "title": "灘岸戰鬥傷亡", "datetime": "", "summary": "東港至枋寮沿海爆發灘岸戰鬥，部分建物及漁港設施受砲火波及，造成大量民眾傷亡；初步統計死亡28人、重傷36人、輕傷188人。另重要能源與通信設施遭敵特工滲透破壞，引發駐警與其對抗。"}, {"stage": 4, "id": "04", "title": "關鍵設施撤離", "datetime": "", "summary": "因戰線逼近，屏南地區能源、油料、通信與交通關鍵設施進入緊急應變階段，依計畫執行人員分批撤離、資料備援、關鍵設備停機保護及反資敵作為。"}, {"stage": 4, "id": "05", "title": "水產冷鏈設施受損", "datetime": "", "summary": "東港及枋寮地區水產冷凍、製冰與物流設施遭砲火波及，冷凍庫、製冰設備及關鍵管線受損，部分廠區起火，造成水產冷鏈與民生食品供應中斷。"}, {"stage": 4, "id": "06", "title": "供水系統遭破壞", "datetime": "", "summary": "屏北、內麟及林邊等供水系統疑遭敵特工滲透破壞，關鍵設備受損並造成供水異常，致屏東市、麟洛、內埔、東港、林邊及佳冬部分區域供水不穩或中斷；屏東基督教醫院啟動備援供水與用水分級管制。"}, {"stage": 4, "id": "07", "title": "收容與急救站衛生危機", "datetime": "", "summary": "東港臨海地區第1型急救站因戰線逼近撤離，出院後仍需照護之病人及醫護人力下轉至來義高中第2型急救站；因供水不穩、收容量快速增加及臨時儲水管理不當，出現群聚感染、環境衛生與情緒管理風險。"}, {"stage": 4, "id": "08", "title": "應變指揮中心受損", "datetime": "", "summary": "屏東縣聯合應變指揮管制中心遭無人機攻擊，建築物部分區域坍塌並起火，產生大量濃煙；研判指揮官及多名工作人員受困，傷亡不明，縣府立即啟動備援指揮所與跨區接替機制。"}, {"stage": 4, "id": "09", "title": "通信廣播設施摧毀", "datetime": "", "summary": "屏東地區主要廣播、無線電視及通信發射設施遭敵摧毀，造成大範圍訊號中斷、頻道停播與網路不穩；民眾無法正常接收新聞及官方訊息，資訊傳遞效能下降，不實訊息與社會不安進一步擴大。"}, {"stage": 4, "id": "PTCH-16", "title": "極端斷電應處", "datetime": "", "summary": "【發電機當機與徒手急救】由於連日超載運轉且缺乏機油潤滑，院內最後一部備用發電機縮缸當機。醫院進入「全黑狀態」，UPS電池在30分鐘後耗盡。ICU護理人員必須在黑暗中，使用甦醒球（BVM）對葉克膜與呼吸器病患進行「徒手捏擠」維持生命。"}, {"stage": 4, "id": "PTCH-17", "title": "極端斷水應處", "datetime": "", "summary": "【水源枯竭與糞水溢流】院內蓄水池徹底見底。不僅洗手台無水可用，全院廁所因無法沖水導致排泄物溢流至走廊。手術室無法進行術前刷手，傷口沖洗只能使用極少量的瓶裝純水，院內爆發嚴重的院內感染與痢疾風險。"}, {"stage": 4, "id": "PTCH-18", "title": "大量傷患/血庫", "datetime": "", "summary": "【血庫歸零與活體捐血】沿海灘岸激戰導致超過百名遭砲擊、破片貫穿的重度創傷軍民湧入。高雄捐血中心血袋無法送達，院內血庫歸零。急診室被迫啟動戰時「活體捐血機制（Walking Blood Bank）」，現場號召醫護與輕傷民眾捲袖抽血，立即進行克難輸注。"}, {"stage": 4, "id": "PTCH-19", "title": "轉診後送癱瘓", "datetime": "", "summary": "【救護車斷油與孤島效應】高屏大橋遭炸毀，且院內救護車因「斷油」完全無法發動。屏基無法將超出處置能量的神經外科、嚴重燒燙傷病患後送至高雄醫學中心。重症病患只能滯留急診走廊等死，醫療系統實質上成為「孤島」。"}, {"stage": 4, "id": "PTCH-20", "title": "戰火波及院區", "datetime": "", "summary": "【無人機/流彈誤擊建築】敵我交火過程中，不明無人機殘骸或流彈擊中屏基門診大樓高樓層，引發局部火災並造成氧氣管線破裂洩漏。院方需在缺乏消防隊支援（市區多處起火，消防癱瘓）的情況下，由醫護人員自行滅火並緊急疏散該樓層病患。"}, {"stage": 5, "id": "01", "title": "交通幹道遭打擊", "datetime": "", "summary": "敵軍為阻止國軍兵力機動，針對高屏縱深運輸要道實施火力打擊，高屏大橋、雙園大橋及台鐵高屏溪橋梁受損，並波及屏東產業園區部分化學儲槽，造成交通中斷與複合災害；救援車流壅塞，影響搶救與後勤運補。"}, {"stage": 5, "id": "02", "title": "軍事機動支援", "datetime": "", "summary": "因多點交通阻斷，南部國軍增援與補給路線受影響；第四作戰區協調屏東縣聯合應變指揮管制中心執行道路搶通、橋梁安全評估及交通疏導，優先恢復軍事機動、醫療後送與後勤運補路線，並提供替代路線情資。"}, {"stage": 5, "id": "03", "title": "後備動員困難", "datetime": "", "summary": "因應戰況需求，後續動員屏東地區後備軍人約3,600人，惟民眾配合疏散撤離、人口流動頻繁，召集對象行蹤不易掌握；警察局持續協助送達召集令，仍面臨通訊中斷與回覆延宕，影響動員時效。"}, {"stage": 5, "id": "04", "title": "醫療後撤機制啟動", "datetime": "", "summary": "台17線以西戰況持續惡化，屏東基督教醫院評估院區安全與供應鏈風險升高，啟動分級後撤與病人分流：高度照護病人及隨行醫護轉送至其他急救責任醫院；可下轉或出院後仍需照護者送至來義高中第2型急救站，並同步撤收關鍵設備、藥材、血品及資訊備援。"}, {"stage": 5, "id": "05", "title": "大量死亡遺體處理", "datetime": "", "summary": "屏東地區累計死亡人數達352人，既有殯葬設施量能迅速飽和，遺體辨識、冷藏、運送及家屬聯繫面臨嚴重壓力；另有外籍旅客與移工家屬要求協尋，增加行政、翻譯及國際聯繫負荷。"}, {"stage": 5, "id": "06", "title": "物資配送受阻", "datetime": "", "summary": "部分沿海配售站與物流據點受砲火波及，縣府於戰火間隙清查受損情形、盤點可用物資並向內陸安全地區轉移；惟台17線及聯外道路受阻，配送動線受限，影響東港、林邊、佳冬及枋寮物資供應效率。"}, {"stage": 5, "id": "07", "title": "社福及產業移工滯留", "datetime": "", "summary": "大量社福、農漁業及產業移工因雇主照護功能受限、工作場所受損或聯繫中斷，安置需求未能即時掌握，聚集於屏東、潮州及枋寮車站周邊，形成臨時滯留，衍生生活保障、語言溝通與秩序維持壓力。"}, {"stage": 5, "id": "08", "title": "戰後穩定", "datetime": "", "summary": "國軍反擊作戰持續推進，屏東地區敵軍約2,000餘人棄械投降，由國軍依戰俘處理程序集中收容、清點識別及安全管制；戰場態勢逐步穩定，政府持續發布查證訊息，民心士氣與社會運作逐步回穩。"}, {"stage": 5, "id": "09", "title": "民生復原啟動", "datetime": "", "summary": "整體態勢由作戰階段轉入復原階段，中央與地方同步啟動民生恢復及基礎設施修復，優先辦理交通搶通、醫療與供水供電復原、治安維護、受災民眾安置及心理支持；國軍完成傷亡官兵救治、通報關懷及撫卹，地方整合民間資源投入復原。"}, {"stage": 5, "id": "PTCH-21", "title": "醫療倫理危機", "datetime": "", "summary": "【啟動戰時醫療降級（CSC）】面對無電、無水、無藥且傷患持續湧入的極端困境，院方倫理委員會痛苦決定啟動「危機醫療照護指引（CSC）」。停止對存活率極低的重症病患（如大面積燒傷、末期癌症）進行心肺復甦（CPR），拔除其呼吸器以讓給前線搶救下來的年輕國軍。"}, {"stage": 5, "id": "PTCH-22", "title": "遺體處置危機", "datetime": "", "summary": "【太平間滿載與公衛危機】累計死亡人數破百，院內太平間冰櫃因斷電早已退冰，遺體快速腐敗散發惡臭。因外部殯葬系統崩潰，院方只能將遺體暫置於未受損的地下二樓角落，衍生嚴重的心理創傷與公共衛生（疫病）威脅。"}, {"stage": 5, "id": "PTCH-23", "title": "傳染病群聚爆發", "datetime": "", "summary": "【院內避難所傳染病爆發】由於長時間斷水、無法維持手部衛生，且地下避難空間高度擁擠通風不良，滯留於院內的難民與輕傷患中爆發了疑似新型變種病毒（或霍亂、傷寒）群聚感染。因缺乏檢驗試劑與抗生素，疫情有向醫護人員蔓延的趨勢。"}, {"stage": 5, "id": "PTCH-24", "title": "飲水與糧食枯竭", "datetime": "", "summary": "【醫護人員失溫與脫水】醫院儲備的口糧與瓶裝水耗盡。連續高壓工作超過72小時的醫護人員面臨嚴重脫水、低血糖與體力透支，甚至出現值班醫師在執行手術時因虛脫暈厥的情況，醫院內部維運人力瀕臨崩潰。"}, {"stage": 5, "id": "PTCH-25", "title": "孤島通訊重建", "datetime": "", "summary": "【衛星通訊受電子干擾】縣府配發的低軌衛星通訊設備（如Starlink等）架設於頂樓試圖恢復與中央的聯繫。但受敵軍強烈電子戰（EW）信號干擾，連線極度不穩，只能以純文字簡訊（Text-only）斷斷續續回報災情，無法進行視訊遠距醫療會診。"}, {"stage": 1, "id": "01", "title": "認知作戰／心理戰", "datetime": "", "summary": "中國持續升高對臺複合式壓力，藉聯合演訓掩護兵力前推部署，逐步壓縮戰略預警空間；散布「國際支援難以介入」、「政府決策失靈」及「南部防線即將失守」等論述，企圖削弱民心士氣、動搖政府威信並擴大社會不安。"}, {"stage": 1, "id": "02", "title": "軍事威脅升溫", "datetime": "", "summary": "中國突宣布實施「破勢行動－2026A」，陸、海、空及火箭軍兵力於臺灣周邊海空域展開多向抵近與聯合戰備警巡，並劃設多處操演區；同時實施灰色地帶騷擾與準封鎖行動，臺海對峙態勢持續升高。"}, {"stage": 1, "id": "03", "title": "能源與漁業供應風險", "datetime": "", "summary": "屏東沿海地區（東港、林邊、佳冬、枋寮及恆春半島）海域作業受限，漁船出港比例下降約3至5成；高雄永安液化天然氣接收站船舶靠泊風險升高，南部天然氣與電力調度壓力增加。"}, {"stage": 1, "id": "04", "title": "軍事整備", "datetime": "", "summary": "國防部同步開設應變中心，運用情監偵系統強化全時預警監控，持續掌握敵情發展，並維持部隊適度戰備狀態，實施「立即備戰操演」。"}, {"stage": 1, "id": "05", "title": "動員整備", "datetime": "", "summary": "屏東縣後備指揮部協調縣政府消防、警政及相關局處進駐，開設「動員暨民力協調組」實施演練；同時轄內常、後備部隊依令進入戰術位置，預置支援地方應變及後續作戰所需人力與資源。惟資訊未即時對外說明，造成部分單位及民眾誤解，並遭外部認知作戰放大疑慮。"}, {"stage": 1, "id": "06", "title": "網路攻擊／資訊安全", "datetime": "", "summary": "屏東縣政府對外資訊服務系統中斷，縣府全球資訊網並遭網頁置換，影響即時發布應變、疏散及協同作戰資訊；相關畫面經媒體與社群反覆轉載後，進一步擴大輿情波動。"}, {"stage": 1, "id": "07", "title": "網路攻擊／通信中斷", "datetime": "", "summary": "灰色地帶騷擾持續升高，敵對勢力針對南部通信節點展開系統性攻擊，中華電信屏東、潮州及東港地區機房遭滲透與網攻，部分核心資料節點受損，造成行動通信、市話及網路服務不穩，線上交易與行動支付驗證異常。"}, {"stage": 1, "id": "08", "title": "能源供應中斷", "datetime": "", "summary": "受國際能源情勢緊張、海運受限及區域軍事活動升溫影響，天然氣供應波動加劇；南部燃氣機組配合調度降載運轉，區域發電出力下修約15%，部分地區採分段限電及輪替供電，進一步波及工業生產、醫療與民生用電。"}, {"stage": 1, "id": "09", "title": "認知作戰／假訊息", "datetime": "", "summary": "網路社群大量流傳中國領導人對臺談話內容，並同步散布「臺灣已遭封鎖」、「屏東能源與民生物資即將斷供」及「政府應變失能」等不實訊息，透過認知作戰操作擾動民眾預期，製造社會不安。"}, {"stage": 1, "id": "10", "title": "社會秩序事件", "datetime": "", "summary": "屏東地區因假訊息與恐慌情緒擴散，於屏東縣政府周邊、屏東火車站及潮州轉運站等人潮聚集區出現對特定對象指認、圍觀與言語衝突，並伴隨推擠與秩序混亂；相關影像快速傳播後，對公共安全與社會秩序形成壓力。"}, {"stage": 1, "id": "11", "title": "化學災害事故", "datetime": "", "summary": "（通勤尖峰）屏東科技產業園區某食品冷鏈廠之無水氨系統發生外洩，現場出現刺鼻氣味，多名人員頭暈、嘔吐及呼吸不適，初估約50餘人受影響，其中5人重症、15人需住院；氣體受西南風影響向東北擴散，波及園區周邊道路、台1線及縣道189線。"}, {"stage": 1, "id": "12", "title": "化學災害應變", "datetime": "", "summary": "屏東縣政府接獲「屏東科技產業園區疑似無水氨外洩」通報後，立即開設災害應變中心，統合消防、環保、衛生、警政及園區管理單位進行應處，執行警戒、疏散、除污與醫療分流，防止災情擴大。"}, {"stage": 1, "id": "13", "title": "醫療機構停電危機", "datetime": "", "summary": "屏東地區主要變電設備突發故障，致屏東基督教醫院雙迴路受電中斷，全院無預警停電，嚴重威脅手術中病人及ICU維生系統；備援發電機即時投入，惟1小時後其中一台出現高溫預警，整體供電能力降至約五成，院內燃油存量降至50%以下，急重症照護風險升高。"}, {"stage": 1, "id": "14", "title": "假訊息攻擊醫療", "datetime": "", "summary": "網路流傳屏東科技產業園區化學物質外洩、屏東基督教醫院受資安攻擊及醫療院所大停電等事件，並散布「疑似人為蓄意破壞」、「敵對勢力已滲透醫療系統」等未經證實訊息，經媒體與社群放大後，影響醫療運作與社會信心。"}, {"stage": 1, "id": "15", "title": "醫療量能衝擊", "datetime": "", "summary": "傷患陸續送往屏東基督教醫院等急救責任醫院，短時間內約40餘人就醫，院方啟動毒化災與大量傷患應變機制；同時醫療資訊系統遭勒索軟體及DDoS攻擊，電子病歷與掛號系統運作異常，影響急診收治、手術調度及病人辨識。"}, {"stage": 1, "id": "16", "title": "假訊息持續擴散", "datetime": "", "summary": "網路持續流傳化學物質外洩、醫院資安受攻擊及大規模停電等事件，並以剪輯影像及AI生成內容渲染「政府隱匿災情」、「醫院拒收病人」等說法，持續影響醫療秩序與民眾就醫信心。"}, {"stage": 1, "id": "17", "title": "中央整備啟動", "datetime": "", "summary": "中國於軍演期間刻意在臺灣周邊及本島多點製造局部衝突與擾亂事件，行政院邀集情資研判及相關分組主責機關召開應變整備會議，啟動先期整備事項，並要求各項應變措施與屏東縣政府同步運作。"}, {"stage": 1, "id": "PTCH-01", "title": "藥品擠兌與恐慌", "datetime": "", "summary": "【民眾恐慌囤積藥品】受網路假訊息「外商藥廠撤資、慢性病藥品即將斷貨」影響，大量民眾湧入門診及藥局，強烈要求提前領取或自費購買3至6個月以上的慢性病用藥（降血壓、胰島素等）。民眾因遭拒絕與醫護發生肢體衝突，門診大廳癱瘓。"}, {"stage": 1, "id": "PTCH-02", "title": "資訊中斷/網攻", "datetime": "", "summary": "【醫療系統遭勒索癱瘓】院內HIS（醫療資訊系統）與PACS（影像系統）突遭境外惡意程式與DDoS攻擊，電子病歷無法存取、掛號系統死機。院方被迫緊急啟動「紙本盲運作」機制，大幅拖延看診與急救效率。"}, {"stage": 1, "id": "PTCH-03", "title": "醫護人力流失", "datetime": "", "summary": "【認知作戰致人力缺口】社群流傳「屏基將被軍方徵用為軍事據點，恐遭首波轟炸」，導致部分醫護人員與外包清潔、傳送人員心生恐懼，出現集體請假、曠職或攜帶家屬連夜撤離至外縣市，院內排班出現嚴重缺口。"}, {"stage": 1, "id": "PTCH-04", "title": "氣體供應異常", "datetime": "", "summary": "【醫用氣體物流延遲】由於社會恐慌引發物流業罷工及交通壅塞，原訂每週例行運補的「醫用液態氧槽車」與「高壓氣體鋼瓶」未能如期抵達，院內氧氣安全存量跌破72小時警戒線。"}, {"stage": 1, "id": "PTCH-05", "title": "院外化災波及", "datetime": "", "summary": "【鄰近工業區毒氣外洩】屏東科技產業園區因人為破壞發生無水氨氣體外洩，毒氣隨風向朝市區飄散。急診室瞬間湧入數十名呼吸道灼傷病患，院方需立即啟動毒化災（HAZMAT）戶外除污機制。"}], "contacts": {"聯絡官": {"lead": "醫療發展副院長／萬樹人", "deputy": "行政副院長／黃雅芳", "unit": "院長室", "phone": "公務機簡碼 60315（代理 61414）"}, "HICS指揮中心（事故指揮官）": {"lead": "醫務副院長／劉思源", "deputy": "醫教副院長／施丞貴", "unit": "院長室", "phone": "公務機簡碼 69086（代理 69181）"}, "公關發言組（資源發展中心）": {"lead": "醫教副院長／施丞貴（發言官）", "deputy": "行政副院長／黃雅芳", "unit": "資源發展中心", "phone": "簡碼 69181（代理 61414）"}, "社工室": {"lead": "社工室主任／葉秀芳", "deputy": "各病房資深社工師", "unit": "社工室", "phone": "分機 20"}, "計畫部狀況分析處": {"lead": "計畫部長／ const STAGE_SHORT = {
  '1': ['階段一', '狀況應處'],
  '2': ['階段二', '備戰部署'],
  '3': ['階段三', '戰力防護保存'],

};

const stageKeys = Object.keys(DATA.stageNames).sort((a,b)=>Number(a)-Number(b));
let currentStage = stageKeys[0];
let currentScenario = '';
let searchQuery = '';

function scenariosForStage(stage){
  return DATA.scenarioIndex.filter(s => String(s.stage) === String(stage))
    .sort((a,b)=> a.id.localeCompare(b.id, 'zh-Hant-u-kn-true'));
}

function renderStageTabs(){
  stageTabsEl.innerHTML = '';
  stageKeys.forEach(k=>{
    const list = scenariosForStage(k);
    const [main, sub] = STAGE_SHORT[k] || [DATA.stageNames[k], ''];
    const btn = document.createElement('button');
    btn.className = (k === currentStage) ? 'active' : '';
    btn.innerHTML = `<span class="tab-main">${main}</span><span class="tab-sub">${sub}（狀況${list[0]?.id}～${list[list.length-1]?.id}）</span>`;
    btn.addEventListener('click', ()=>{
      currentStage = k;
      currentScenario = '';
      searchQuery = '';
      searchInput.value = '';
      searchClearEl.style.display = 'none';
      renderAll();
    });
    stageTabsEl.appendChild(btn);
  });
}

function renderStageDesc(){
  const list = scenariosForStage(currentStage);
  const dts = list.map(s=>s.datetime).filter(Boolean);
  let range = '';
  if(dts.length){
    range = `演習期程：${dts[0]}${dts.length>1 ? ' ～ ' + dts[dts.length-1] : ''}。`;
  }
  const first = list[0];
  stageDescEl.innerHTML = `
    <div class="official-title">官方事件概述（${DATA.stageNames[currentStage]}）</div>
    <div class="official-body">${first ? `狀況${first.id}｜${first.title}：${first.summary}` : ''}</div>
    <div class="official-meta">本頁另涵蓋本階段全部 <b>${list.length}</b> 項狀況編號。${range}</div>
    <div class="official-source">資料來源：屏東縣城鎮韌性演習各階段狀況彙整20260721_各縣市整理版_.docx</div>`;
}

function renderScenarioSelect(){
  const list = scenariosForStage(currentStage);
  scenarioSelectEl.innerHTML = '<option value="">－ 依角色瀏覽本階段所有狀況 －</option>' +
    list.map(s=>`<option value="${s.id}">狀況${s.id}｜${s.title}</option>`).join('');
  scenarioSelectEl.value = currentScenario;
}

function highlightMatch(text, q){
  return text;

}

function escapeRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightText(text, q){
  if(!q || !text) return text;
  const re = new RegExp('('+escapeRegex(q)+')', 'ig');
  return String(text).replace(re, '<mark class="hl">$1</mark>');
}

function highlightHtml(html, q){
  if(!q || !html) return html;
  return html.split(/(<[^>]+>)/g).map(seg => seg.startsWith('<') ? seg : highlightText(seg, q)).join('');
}

function matchesSearch(role, entry, catName){
  if(!searchQuery) return true;
  const hay = (catName+' '+role+' '+entry.scenario_id+' '+entry.scenario_title+' '+entry.summary+' '+entry.detail+' '+entry.html).toLowerCase();
  return hay.includes(searchQuery);
}

function contactBoxHtml(role){
  const c = DATA.contacts && DATA.contacts[role];
  if(!c) return '';
  const rows = [];
  if(c.lead)   rows.push(`<dt>主管</dt><dd>${c.lead}</dd>`);
  if(c.deputy) rows.push(`<dt>代理</dt><dd>${c.deputy}</dd>`);
  if(c.unit)   rows.push(`<dt>單位</dt><dd>${c.unit}</dd>`);
  if(c.phone)  rows.push(`<dt>電話</dt><dd>${c.phone}</dd>`);
  return `<div class="contact-box">
    <div class="contact-title">人員單位窗口：${role}</div>
    <dl class="contact-grid">${rows.join('')}</dl>
    <div class="contact-source">資料來源：${DATA.contactsSource || ''}</div>
  </div>`;
}
