<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<meta name="theme-color" content="#f4f6fa">
<title>屏東縣政府2026城鎮韌性演習・屏基應變模擬知識庫</title>
<style>
  :root{
    --bg:#f4f6fa; --panel:#ffffff; --panel-2:#eef2f8; --line:#d8dce4;
    --text:#15171e; --text-dim:#5b6472;
    --accent:#1e3a5f; --accent-dim:#2c4d75; --accent-rgb:30,58,95; --danger:#b0402f; --chip-text:#ffffff;
    --tint:#e9f1fa; --radius:10px;
  }
  *{box-sizing:border-box;}
  html{background:var(--bg);color-scheme:only light;}
  body{margin:0;background:var(--bg);color:var(--text);min-height:100vh;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:760px;margin:0 auto;padding:0 0 60px;background:var(--bg);}
  .cat{padding:0 18px;background:var(--bg);}

  header{padding:26px 18px 20px;background:var(--panel);border-bottom:1px solid var(--line);}
  .eyebrow{font-size:16.5px;color:var(--text);font-weight:700;margin-bottom:10px;}
  h1{font-size:25.5px;line-height:1.4;margin:0 0 10px;font-weight:900;color:var(--text);}
  header p{margin:0;font-size:17px;color:var(--text-dim);line-height:1.7;}

  .stats{display:flex;gap:1px;background:var(--line);margin:16px 18px 18px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .stat{flex:1;background:var(--panel);padding:10px 6px;text-align:center;}
  .stat b{display:block;font-size:21.5px;color:var(--accent);font-weight:900;}
  .stat span{font-size:15px;color:var(--text-dim);}

  .stage-tabs{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 14px;}
  .stage-tabs button{flex:1 1 30%;padding:12px 8px;background:var(--panel-2);
    border:1.5px solid var(--line);border-radius:var(--radius);color:var(--text-dim);cursor:pointer;font-family:inherit;text-align:center;}
  .stage-tabs button .tab-main{display:block;font-size:16.5px;font-weight:900;color:var(--text);margin-bottom:4px;}
  .stage-tabs button .tab-sub{display:block;font-size:13.5px;color:var(--text-dim);line-height:1.4;}
  .stage-tabs button.active{background:var(--tint);border-color:var(--accent);border-width:2px;}
  .stage-tabs button.active .tab-main{color:var(--accent);}

  .stage-desc{margin:0 18px 14px;padding:16px 16px;background:var(--panel);
    border:1.5px dashed var(--accent-dim);border-radius:var(--radius);}
  .stage-desc .official-title{font-size:16.5px;font-weight:900;color:var(--accent);margin-bottom:8px;}
  .stage-desc .official-body{font-size:16px;color:var(--text);line-height:1.75;margin:0 0 10px;}
  .stage-desc .official-meta{font-size:14.5px;color:var(--text-dim);margin:0 0 6px;line-height:1.6;}
  .stage-desc .official-source{font-size:13.5px;color:var(--text-dim);}

  .search-bar{padding:0 18px 10px;}
  .search-bar input{width:100%;padding:11px 13px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);color:var(--text);font-size:17.5px;font-family:inherit;}
  .search-bar input:focus{outline:none;border-color:var(--accent-dim);}

  .scenario-picker{padding:0 18px 16px;}
  .scenario-picker label{display:block;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.03em;margin-bottom:5px;}
  .scenario-picker select{width:100%;padding:11px 13px;background:var(--panel);border:1.5px solid var(--accent-dim);
    border-radius:var(--radius);color:var(--text);font-size:16.5px;font-family:inherit;font-weight:700;}

  .scenario-banner{margin:0 18px 14px;padding:14px 16px;background:var(--panel);border-radius:var(--radius);
    border:1px solid var(--line);border-left:4px solid var(--danger);}
  .scenario-banner .tag{display:inline-block;font-size:15px;font-weight:900;color:var(--chip-text);
    background:var(--danger);border-radius:5px;padding:2px 8px;margin-bottom:7px;}
  .scenario-banner .title{font-size:18.5px;font-weight:900;color:var(--text);margin-bottom:5px;}
  .scenario-banner .dt{font-size:14.5px;color:var(--accent-dim);font-weight:700;margin-bottom:6px;}
  .scenario-banner .desc{font-size:16px;color:var(--text-dim);line-height:1.65;}

  .cat-head{font-size:16.5px;font-weight:900;color:var(--accent);margin:18px 0 8px;
    padding-bottom:6px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;cursor:pointer;user-select:none;}
  .cat-head .count{color:var(--text-dim);font-weight:400;}
  .cat.collapsed .roles{display:none;}
  .cat-head::before{content:"▾ ";color:var(--accent);}
  .cat.collapsed .cat-head::before{content:"▸ ";}

  .roles{display:flex;flex-direction:column;gap:8px;}

  .role{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent-dim);border-radius:var(--radius);overflow:hidden;}
  .role.open{border-left-color:var(--accent);}
  .role-head{width:100%;display:flex;align-items:center;gap:10px;padding:12px 12px;background:none;border:none;
    color:var(--text);text-align:left;cursor:pointer;font-family:inherit;}
  .role-name-wrap{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;}
  .role-name{font-size:18px;font-weight:700;}
  .role-count{font-size:15px;color:var(--accent-dim);border:1px solid var(--line);border-radius:6px;padding:2px 6px;flex-shrink:0;}
  .role.open .role-count{color:var(--accent);border-color:var(--accent-dim);}
  .role-head .chev{font-size:15.5px;color:var(--accent);transition:transform .2s;flex-shrink:0;}
  .role.open>.role-head .chev{transform:rotate(180deg);}
  .role-body{display:none;}
  .role.open>.role-body{display:block;}
  .role-body-inner{padding:4px 12px 10px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;}

  .contact-box{margin:4px 0 2px;padding:12px 14px;background:var(--tint);border:1px solid var(--line);
    border-left:4px solid var(--accent);border-radius:var(--radius);}
  .contact-title{font-size:16.5px;font-weight:900;color:var(--accent);margin-bottom:10px;}
  .contact-grid{display:grid;grid-template-columns:56px 1fr;gap:7px 10px;}
  .contact-grid dt{font-size:15px;color:var(--accent-dim);font-weight:700;margin:0;}
  .contact-grid dd{margin:0;font-size:15.5px;color:var(--text);line-height:1.5;}
  .contact-source{margin-top:10px;font-size:13.5px;color:var(--text-dim);font-style:italic;line-height:1.6;}

  .entry{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;}
  .entry-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .entry-tag{display:inline-flex;font-size:14.5px;font-weight:900;color:var(--chip-text);background:var(--accent-dim);
    border-radius:5px;padding:2px 7px;flex-shrink:0;}
  .entry-title{font-size:17px;font-weight:700;color:var(--text);}
  .entry-dt{font-size:14px;color:var(--text-dim);}
  .entry-summary{font-size:15px;color:var(--text-dim);line-height:1.6;margin:0 0 6px;font-style:italic;}
  .entry-detail{font-size:14px;color:var(--accent-dim);margin:0 0 6px;}
  .answer{font-size:17px;line-height:1.75;color:var(--text);}
  .answer p{margin:0 0 8px;}
  .answer strong{color:var(--accent);font-weight:700;}
  .answer ul{margin:0 0 8px;padding-left:20px;}
  .answer li{margin-bottom:4px;}

  .no-match{padding:40px 18px;text-align:center;color:var(--text-dim);font-size:16.5px;display:none;}
  .footer-note{padding:20px 18px 0;font-size:13.5px;color:var(--text-dim);line-height:1.7;border-top:1px solid var(--line);margin-top:20px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">屏東縣政府・大連院區聯防醫院</div>

    <p>屏東基督教醫院大連院區・五階段狀況應處模擬答案彙整。可依「角色」瀏覽跨階段任務，或依「想定」檢視單一狀況之全部參演／支援單位作為。</p>

  <div class="stats">

<script>
const DATA = {"stageNames": {"1": "一、狀況應處階段", "2": "二、備戰部署階段", "3": "三、戰力防護及保存階段", "4": "四、聯合反登陸、濱海打擊及灘岸戰鬥階段", "5": "五、縱深防禦暨持久作戰階段"}, "categories": [{"id": "cmd", "name": "01　指揮官", "roles": [{"role": "聯絡官", "entries": [{"stage": 2, "scenario_id": "01", "scenario_title": "軍事威脅升溫", "datetime": "8月7日 18:00", "summary": "中國東部戰區自福建、廣東沿海持續動員海、空及後勤部隊，逐步完成整備，並對臺南、高雄、屏東及臺東外海重要航道實施封控與威懾，同時配合心理戰傳達政治意志，南部地區安全情勢快速惡化。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>當中國東部戰區自福建、廣東沿海持續動員兵力前推，並對臺灣南部（臺南、高雄、屏東及臺東）外海重要航道實施封控與威懾時，南部地區安全情勢快速惡化。聯絡官（萬樹人副院長，公務機簡碼60315；代理人為行政副院長黃雅芳，公務機簡碼61414）作為本院與外部機構（如屏東縣政府聯合應變指揮管制中心、地方衛生局、高屏區EOC、陸軍第四作戰區、國防部等）之唯一協調與通聯窗口，必須在接獲可能發生軍事衝突或管制命令之情資時，立即啟動應變。</p><p>聯絡官必須在 <strong>15分鐘內</strong>，利用本院部署之低軌衛星電話或專用加密通訊設備（PACE備援通訊架構），向屏東地區聯合應變管制中心（LJMOC）及衛生局執行<strong>「安全金鑰雙向反求證」</strong>。此查證程序能有效排除敵特電子戰、干擾與虛假宣傳之灰色地帶衝突，確認軍事威脅命令之真實性與確切應變時限。一旦核實情資屬實，聯絡官立即將情資以紙本及口頭覆誦方式親自呈交事故指揮官（劉思源副院長/ 代理人：施丞貴副院長，劉副公務機簡碼69086），並向地方衛生局通報本院正式進入 HICS戰時緊急應變狀態，隨時準備接收後送之傷病患。同時，聯絡官橫向對接轄區警察局（民和派出所，距本院1.9 公里，常態車程約 6 分鐘）及消防分隊（距本院 1.1 公里，常態車程約 3分鐘），請求預置警戒與緊急救護動線之交管支援，防範恐慌車流癱瘓大連路。</p>"}, {"stage": 2, "scenario_id": "04", "scenario_title": "民力協調", "datetime": "8月8日 16:00", "summary": "第四作戰區因動員演習需求，透過屏東縣「動員暨民力協調組」協請縣政府提供200組水泥紐澤西護欄，並協力運送至台17線雙園大橋屏東端、東港大橋及台1線枋寮段等指定地點，執行交通阻絕與防護部署。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>第四作戰區協請縣府提供 200 組水泥紐澤西護欄執行台 17 線及台 1線之交通阻絕。聯絡官（萬樹人副院長，公務機簡碼60315）立即進駐縣府開設之「動員暨民力協調組」，作為軍、公、民醫療整合之核心通聯管道。聯絡官協助作戰區衛勤官精算本院因應交通管制與民力疏散之「救護車動線維持計畫」。</p><p>聯絡官向協調組提出申請：「第四作戰區於台17線雙園大橋及台1線枋寮段部署阻絕設施時，請務必保留一條寬度不小於<strong>3.5 公尺之緊急醫療救護通道</strong>，供本院及聯防責任醫院之救護車快速切入」。同時，聯絡官橫向對接轄區警察局與民防大隊，調派民防人員進駐本院大連路巷口，協助保全實施外圍交通管制，確保運送戰傷病人與物資補給之戰備專用道保持絕對暢通，防範民力動員中之車流阻塞。</p>"}, {"stage": 2, "scenario_id": "07", "scenario_title": "縣政府先期整備", "datetime": "8月8日 12:00", "summary": "因應整體情勢升高及可能衝擊民生與社會穩定之風險，屏東縣政府啟動先期整備，完成聯合應變指揮管制中心、各鄉鎮市應變中心及防災協作中心之功能編組，並盤點人力、物資、避難空間與關鍵資源。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>屏東縣政府啟動先期整備，完成聯合應變指揮管制中心功能編組並盤點資源。本院聯絡官（萬樹人副院長，公務機簡碼60315）立即與縣府聯合應變中心建立雙向直通聯絡，將本院之平戰轉換量能納入縣府先期整備體系。</p><p>聯絡官向應變中心通報：「本院已依 HICS組織架構完成醫療照護、危害控制、安全管制、後勤資源及行政財務等功能編組，並完成大連院區<strong>635床核心量能盤點</strong>；備援地下醫療空間（約翰、馬可、馬太、路加、韓偉大樓B1）已完成預置布置，可於 24 小時內隨時啟用開設」。聯絡官確認與縣府防空避難組、社會處收容安置組之對接窗口，確保平戰轉換動員期之資源協調無縫。</p>"}, {"stage": 2, "scenario_id": "13", "scenario_title": "軍事動員與社會反應", "datetime": "8月9日", "summary": "國軍依計畫進入戰術區域實施戰備整備，戰甲砲車及部隊機動畫面經民眾拍攝與媒體即時報導，引發社會關注並放大戰爭風險認知；第四作戰區協請屏東縣政府啟動資訊應處機制，共同發布事實訊息以穩定民心。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>聯絡官（萬樹人副院長，公務機簡碼60315）負責代表本院與第四作戰區、屏東縣警察局民和派出所建立直接聯通。聯絡官協調軍警單位：「為防範民眾因目睹部隊機動而在本院周邊大連路、瑞光路等節點發生驚慌推擠或交通事故，請警方立即派遣交警於瑞光路與莊敬街交叉口實施防空避難疏散引導與車流管制」。</p><p>同時，聯絡官橫向對接後備指揮部，協調進駐本院之民防隊伍與後備軍人（T-CERT支援人員）。引導民防同工預置於本院大連路大門及恩慈 D棟旁，主動對圍觀或驚慌之民眾發放本院「防空避難與降載就醫指南」紙本說帖，引導市民保持冷靜，配合軍民聯防，死守大連院區周邊之社會秩序與通道畅通。</p>"}, {"stage": 2, "scenario_id": "15", "scenario_title": "金融假訊息擠兌", "datetime": "8月9日 10:00", "summary": "社群平台散布「資金將遭凍結」、「金融系統不穩」及「特定族群提前轉移資產」等訊息，引發土地銀行屏東分行、第一銀行屏東分行及其他金融據點提領人潮；排隊與推擠造成民生路、中山路、廣東路等路段壅塞，影響救護與消防車輛通行。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>聯絡官（萬樹人副院長，公務機簡碼60315）針對土銀、一銀屏東分行周邊擠兌排隊人群癱瘓本院主要救護車路線之想定，立即透過衛星專線，向屏東縣警察局（民和派出所，距本院1.9 公里）及交通警察隊發出緊急求援通報。聯絡官通報警方：「金融擠兌造成中山路、廣東路及民生路交通癱瘓，嚴重阻斷本院急重症救護車後送動線，請警方立即增派武裝交警，於該等路段之關鍵交叉口實施強行交管制、強勢驅離推擠車輛，並為本院救護車進行警車開道引導」。</p><p>通報後，<strong>警力約 6 分鐘內</strong> 可抵達關鍵節點實施物理引導。聯絡官並橫向與周邊聯防醫院（寶建、屏榮、安泰）對接，啟動跨院救護車動線變更，引導後送車輛避開癱瘓路段，改走替代備用安全路線（如繞行瑞光路），確保病患生命支持。</p>"}, {"stage": 2, "scenario_id": "17", "scenario_title": "銀行擠兌應處", "datetime": "8月9日 13:00", "summary": "受金融交易系統異常影響，臺灣銀行屏東分行出現民眾集中提領情形，造成現金調度與營運壓力；警方即時派遣警力進駐，執行人潮疏導、秩序維護、重要設施警戒及交通管制作業。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>臺銀屏東分行爆發擠兌衝突，且武裝警察進駐。聯絡官（萬樹人副院長，公務機簡碼60315）立即透過定頻對講機及衛星電話，與屏東縣警察局民防組、交通警察隊及聯合應變中心（LJMOC）進行構聯。聯絡官向警方通報：「本院已啟動 HICS戰時一級警戒，臺銀周邊擠兌人群與警力衝突之交通管制，請務必配合將本院大連路60 號周邊 100 公尺內劃設為『醫療救護車專用安全路網緩衝區』」。</p><p>聯絡官請求警方於該緩衝區部署交警，禁止擠兌人群車輛駛入，優先保障本院救護車、消防車之迴轉空間。同時，聯絡官橫向與地方衛生局通報最新警戒狀態，掌握因銀行推擠可能產生之踩踏或暴力創傷傷患人數，協調急診（陳美錚護理長）加派檢傷人力、預留紅區床位，隨時準備救治後送之擠兌衝突傷患。</p>"}, {"stage": 3, "scenario_id": "01", "scenario_title": "軍事機動管制", "datetime": "", "summary": "第四作戰區聯合運輸指揮處協調屏東縣聯合應變指揮管制中心及交通控制中心，管制國道3號九如、長治、麟洛、竹田、崁頂及南州交流道，以及台88線萬丹端、台17線雙園大橋屏東端等節點，建立軍事機動優先通行機制。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>當第四作戰區聯合運輸指揮處管制國道3號多處交流道、台88線萬丹端及台17線雙園大橋屏東端等交通節點時，屏東基督教醫院大連院區（大連路60號）面臨嚴重的聯外交通受阻與救護車、物資運補車隊受阻之雙重危機。聯絡官萬樹人副院長必須在接獲管制通報後<strong>15分鐘內</strong>，啟用低軌衛星電話或有線專線等 PACE備援通訊系統，向屏東縣聯合應變指揮管制中心（LJMOC）及交通控制中心執行「安全金鑰雙向反求證」。</p><p>在核實管制命令與軍事機動優先通行機制後，聯絡官代表本院與第四作戰區、警察局及交通交控中心建立直通協調管道。聯絡官必須強勢向LJMOC 提出<strong>「緊急醫療救護路權優先通行申請」</strong>，確保本院共 4輛救護車（其中 1 輛平時停放於路加大樓地下 1 樓，另 2輛停放於約翰大樓地下 1樓）、簽約之民間合作救護車及外購戰備物資車輛在出示 HICS簽發之「軍事管制區特殊通行證」後，能獲得軍警引導、警車開道並豁免管制，優先通行國道3號及關鍵幹道，以確保高屏聯防责任醫院間的急重症轉診與72 小時維生物資運補不中斷。</p><p>同時，聯絡官需將外部管制動態、預期物資延遲及救護車替代路由，每<strong>30分鐘</strong> 定時回報給事故指揮官劉思源副院長（公務機簡碼 69086）與計畫部長陳志文（簡碼69120），以利計畫部即時滾動修正事故行動計畫（IAP）之交通與後送專章，並在戰情面板上動態登錄最新聯外路網狀態。</p>"}, {"stage": 3, "scenario_id": "07", "scenario_title": "恆春半島設施疏散評估", "datetime": "", "summary": "第四作戰區情資研判，恆春半島重要能源、輸電及通信設施可能成為優先攻擊目標，建議疏散周邊非必要人員，必要運轉與安全維持人員依計畫留守；同時調整恆春、車城及枋山地區配售站與救濟站物資配置。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>第四作戰區評估恆春半島設施可能遭襲，建議疏散非必要人員並調整配售物資。本院聯絡官（萬樹人副院長，公務機簡碼60315）立即與屏東縣政府聯合應變中心（LJMOC）、高屏區 EOC及國防部聯防窗口建立有線與低軌衛星之 PACE通訊對接。聯絡官主動向應變中心通報本院之先期整備狀態。</p><p>聯絡官向高屏區 EOC 提報：「本院急性一般病床 356 床、特殊病床 279床之戰備量能完整，B1避難醫療空間與臨時加護病房（23床）、臨時一般病房（36床）已預置就緒，本院與各聯防責任醫院（部屏、寶建、屏榮、安泰）已啟動相互支援協定」。聯絡官協調恆春、枋山地區之衛生所與醫療站，將非必要之慢性病臥床患者及一般住院病人，安全有序地下轉分流至本院或指定之安置區，並主動協調作戰區調配簽證救護車進行跨區接運，確保恆春半島疏散路網畅通。</p>"}, {"stage": 3, "scenario_id": "12", "scenario_title": "警察局遭無人機攻擊", "datetime": "", "summary": "屏東縣警察局民防管制中心及屏東、潮州、東港、枋寮、恆春等分局同步遭多波次無人機攻擊，致防情通報與防空警報發布功能部分中斷；執勤警力出現傷亡，影響現場應變、治安與交通管制能力。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>縣警局民防管制中心及多處分局遭無人機攻擊，防防情與防空警報發布中斷，執勤警力傷亡，治安與交通管制能力嚴重受挫。本院聯絡官（萬樹人副院長，公務機簡碼60315；代理人為行政副院長黃雅芳，公務機簡碼61414）立即啟用低軌衛星電話或專用加密通訊 PACE系統，直接與國防部第四作戰區、陸軍衛勤部隊及屏東縣政府聯合應變中心（LJMOC）進行對接。</p><p>聯絡官向 LJMOC及衛生局發出緊急通報：「本院轄區分局遭襲、民防網絡部分受損，大連路周邊面臨交通與治安失守危機；本院已啟動HICS安全管制，請第四作戰區指派在地後備軍人或武裝民防隊伍進駐本院大連路巷口協助交管，維持救護車綠色生命通道」。聯絡官定時將本院安全狀態與收治能量上報中央，並隨時與高屏區 EOC協調，引導外部救護車輛避開癱瘓路段，改走替代備用安全路由，死守軍民聯防救護網絡。</p>"}, {"stage": 3, "scenario_id": "15", "scenario_title": "油品廠火災事故", "datetime": "", "summary": "屏南產業園區某油品儲運廠疑遭不明來源破壞，儲槽設施受損並引發火勢，造成油品外洩與濃煙；事故影響台1線枋寮段、周邊產業與工程物料供應，並對交通維修能量及民生物資配送體系造成壓力。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p>產業園區油品儲運廠遭破壞引發大火，油品外洩與濃煙影響台1線枋寮段及民生物資配送。聯絡官萬樹人副院長立即啟用低軌衛星電話或加密專線，與屏東縣政府聯合應變中心（LJMOC）、交通交控中心及消防局毒災隊建立直通聯絡。</p><p>聯絡官向 LJMOC提報：「本院台1線枋寮段之急重症救護車後送動線因油品火災而嚴重受阻，且空氣中出現有害濃煙，請交控中心立即為本院救護車車隊開闢台17線、縣道189線等平面『綠色救護專用避難通道』；請消防局派水車在大連路巷口待命支援，並請毒災隊提供枋寮園區外洩毒煙之風向與化學監測數據，確保本院前線除污與污水廠排放安全」。聯絡官將風向數據每 30 分鐘通報急診，做好化學灼傷與嗆傷病患收治整備。</p>"}, {"stage": 4, "scenario_id": "01", "scenario_title": "敵軍登陸作戰", "datetime": "", "summary": "敵軍於東港、林邊及枋寮沿海展開登陸作戰，企圖突破沿岸防線並沿台17線、台1線向縱深推進；另於佳冬及枋山沿海發現登陸船團接近，並結合無人機偵察、火力打擊與電子干擾策應，顯示有擴大登陸規模之態勢。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：當敵軍於東港、林邊及枋寮沿海展開登陸作戰，企圖沿台17線、台1線向縱深推進時，南部防線進入最嚴峻之交戰狀態。聯絡官萬樹人副院長（代理人：黃雅芳副院長，公務機簡碼61414）必須在接獲登陸戰火警報之<strong>15分鐘內</strong>，切換為以低軌衛星電話與定頻無線電為核心的 <strong>PACE備援通訊架構</strong>，與屏東地區聯合應變指揮管制中心（LJMOC）、高屏區 EOC建立雙向加密連線，並立即執行「安全金鑰雙向反求證」，確認戰區界線、空襲管制動態及道路封鎖資訊。為了保障本院急重症轉診與72小時維生物資之實體運補通道，聯絡官必須橫向聯絡陸軍第四作戰區衛勤官與轄區警察局（民和派出所，簡碼60315），強勢為本院領有 HICS 特殊通行證之 3輛救護車（其中1輛停放於路加大樓地下 1 樓，2輛停放於約翰大樓地下 1 樓）申請<strong>「軍事管制區救護車綠色優先路權」</strong>，防範救護車在轉運瀕死戰傷官兵或接運血袋時被軍事管制阻斷。同時，聯絡官每<strong>30分鐘</strong>彙整作戰區情資，將沿海登陸部隊前推速度與道路受損狀態以紙本抄錄方式呈交事故指揮官劉思源副院長（公務機簡碼69086），提供計畫部隨時修正事故行動計畫（IAP）之交通控制與病患接收專章。</p><p><strong>2. 確實數據與資源規劃</strong>： 聯絡官確認本院救護與運輸載具共計 <strong>16輛</strong>的戰備出勤狀態。這包括 3輛救護車（單波次極限載運15人），2輛輪椅車（單波次載運 12人），4輛中型巴士（單波次載運74人），以及 7輛廂型貨車；聯絡官將此車輛清冊與司機 24小時待命簡碼回報給LJMOC。聯絡官同時啟動與南部地區責任醫院（屏東榮總、屏東醫院、寶建醫院、東港安泰醫院）之「相互支援協定」，精算自東港、林邊後送之台17線沿線戰傷患者之分流收治量能。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>： 聯絡官直接對接 HICS指揮中心，向狀況分析處（莊詩蘋督導長，簡碼65311）提供外部交通障礙與敵軍火線前推情資，確保戰情面板（https://ci-board.ptch.org.tw）即時更新「外部聯外道路通行燈號」（紅、黃、綠三色），防範後送救護車盲目駛入交戰交火管制區。</p>"}, {"stage": 4, "scenario_id": "07", "scenario_title": "收容與急救站衛生危機", "datetime": "", "summary": "東港臨海地區第1型急救站因戰線逼近撤離，出院後仍需照護之病人及醫護人力下轉至來義高中第2型急救站；因供水不穩、收容量快速增加及臨時儲水管理不當，出現群聚感染、環境衛生與情緒管理風險。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315 / 代理人：黃雅芳副院長，公務機簡碼 61414", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：東港臨海地區第1型急救站因戰線逼近撤離，下轉至來義高中第2型急救站。由於收容量快速增加、供水不穩，該收容站爆發嚴重群聚感染與衛生危機。本院作為南部醫療韌性重鎮，聯絡官萬樹人副院長（代理人：黃雅芳副院長，公務機簡碼61414）立即啟動<strong>「戰時跨區域急救站衛生應變與醫療物資支援協調程序」</strong>。</p><p>聯絡官立即使用低軌衛星電話或有線專線等 PACE 備援通訊，橫向聯絡高屏區EOC、屏東縣聯合應變管制中心（LJMOC）及地方衛生局，向其通報：「本院已掌握來義高中第2型急救站爆發之群聚感染與環境衛生危機，本院已啟動HICS感控特別支援小組，隨時準備指派專業醫護攜帶消毒備品及抗生素前往來義高中執行實體現場衛生查核與流行病學阻斷指導」。聯絡官協調陸軍第四作戰區指派化學兵或民防隊伍進駐來義高中實施全面環境消殺，並積極調度本院備用車輛（如1輛中巴），運送大批乾洗手、漂白水與無水化學便器至該急救站，從源頭控制傳染源，維護南部聯防防線安全。</p><p><strong>2. 確實數據與資源規劃</strong>：聯絡官彙整來義高中下轉之病患名冊（多為出院後仍需照護之慢性病患，計有40人），與本院状况分析處對接。聯絡官與衛生局精算：本院可調配支援來義高中之專業感控護理師2名、急診醫師 1名、社工人員 1名；調撥本院地下戰備水井淨水 50桶（每桶 20L，共計 1,000 L）、化學便器袋 500個支援該站，並於本院 B1備用一般病房（共 36床） 預留5至10床，隨時接收由來義高中下轉之重症感染與脫水患者，死守聯防機制。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>： 聯絡官萬樹人副院長每15分鐘將外部來義高中急救站之傷亡數據、感控缺口及收容狀態回報給事故指揮官劉思源（簡碼69086）與執行部長，保持完全同步。</p>"}, {"stage": 5, "scenario_id": "01", "scenario_title": "交通幹道遭打擊", "datetime": "", "summary": "敵軍為阻止國軍兵力機動，針對高屏縱深運輸要道實施火力打擊，高屏大橋、雙園大橋及台鐵高屏溪橋梁受損，並波及屏東產業園區部分化學儲槽，造成交通中斷與複合災害；救援車流壅塞，影響搶救與後勤運補。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：當敵軍針對高屏縱深運輸要道實施火力打擊，造成高屏大橋、雙園大橋及台鐵高屏溪橋梁受損中斷，並波及屏東產業園區化學儲槽引發複合災害時，南部地區的聯外交通與補給動線面臨全面癱瘓的極限狀態。聯絡官萬樹人副院長（代理人：行政副院長黃雅芳，公務機簡碼61414）必須在接獲警報之 <strong>15 分鐘內</strong>，迅速在強固的 <strong>恩慈大樓 B1備援指揮中心</strong> 啟用衛星電話、VHF/UHF 定頻無線電對講機等 <strong>PACE備援通訊架構</strong>，向屏東地區聯合應變指揮管制中心（LJMOC）及高屏區 EOC進行「安全金鑰雙向反求證」以排除電子戰干擾，並即時獲取高屏溪兩岸便道、浮橋架設進度與產業園區毒氣擴散風向等第一手關鍵情資。</p><p>為確保本院生命線不因聯外道路斷絕而窒息，聯絡官必須立刻協調陸軍第四作戰區、警政及消防單位，為本院簽約物資車與救護車申請<strong>「縱深防禦階段緊急路權優先通行證」</strong>，確保車隊在軍事管制區內獲得優先放行與武裝護送。同時，聯絡官橫向與環境部毒災應變隊及地方消防局對接，掌握屏東產業園區外洩化學有害物質的種類（如無水氨或工業氯氣），評估本院大連院區（大連路60 號）是否處於下風處之擴散紅區。若確有毒氣逼近威脅，聯絡官需立即向指揮官劉思源副院長（公務機簡碼69086） 與執行部長陳志文呈報，建議啟動全院空調轉為內部循環及急診室前方「實體除污區（DecontaminationZone）」 之最高級防護整備。聯絡官每 <strong>30 分鐘</strong> 動態向狀況分析處 P2莊詩蘋督長（公務機簡碼 65311）提供高屏大橋與雙園大橋搶通替代路由地圖，以便計畫部即時修正事故行動計畫（IAP）。</p><p><strong>確實數據與資源規劃</strong>： 聯絡官確認本院現有列管之 <strong>16輛戰備運輸車輛</strong>（包含救護車 3 輛、輪椅車 2 輛、中型巴士 4 輛及廂型貨車7 輛）、司機與隨車醫護人員的名冊已全額完成簽證，並向 LJMOC提報本院可立刻支援高屏跨溪轉運之單波次最大後撤載運量為 <strong>101人</strong>（其中救護車 3 輛共承載 15 人、輪椅車 2 輛共承載 12 人、中型巴士 4輛共承載 74人）。聯絡官同時啟動與高雄榮總、屏東榮總及衛福部屏東醫院的「跨溪醫療聯防機制」，精算在橋梁中斷下，利用軍方臨時浮橋或備用平原便道進行跨溪重症病患接駁的黃金時間（目標控制在<strong>45 分鐘內</strong> 完成點對點交接），死守南部防線之救護網絡。</p><p><strong>指揮與管制（HICS 對接）</strong>： 聯絡官萬樹人副院長（簡碼 60315） 直接對接HICS指揮中心，向指揮官及計畫部長每日上午與下午兩次定時回報，確保本院之外部物資運補與病患跨區分流計畫與中央、地方政府及第四作戰區之衛勤管制保持高度步調一致。</p>"}, {"stage": 5, "scenario_id": "02", "scenario_title": "軍事機動支援", "datetime": "", "summary": "因多點交通阻斷，南部國軍增援與補給路線受影響；第四作戰區協調屏東縣聯合應變指揮管制中心執行道路搶通、橋梁安全評估及交通疏導，優先恢復軍事機動、醫療後送與後勤運補路線，並提供替代路線情資。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：因應多點交通阻斷與南部國軍增援補給路線受阻，第四作戰區協調 LJMOC執行道路搶通及安全評估。本院聯絡官萬樹人副院長（公務機簡碼60315）必須立即進駐屏東縣政府開設之「動員暨民力協調組」，作為軍、公、民醫療整合與交管搶通之核心通聯管道。聯絡官的核心任務是將本院的<strong>「醫療後送生命通道優先級」</strong>強勢納入第四作戰區與工務段的搶通優先清單中。</p><p>聯絡官必須每 <strong>15 分鐘</strong> 向 LJMOC提報本院大連路、瑞光路、台3線及台24線等周邊核心救護動線之損毀與阻塞狀態，向作戰區工程兵、地方工務段提出請求：「請工務單位在搶通高屏縱深要道時，將本院瑞光路與莊敬街交叉口（距本院1.1 公里，車程 3 分鐘）列為『第一級醫療後送搶通優先路段』，並優先對本院周邊之民和橋等關鍵橋梁進行實體安全結構與防爆、防投毒評估，確保本院救護車能無阻礙地通行，接運大量由滩岸交戰前線後送之戰傷病患」。</p><p>同時，聯絡官積極協調地方警察局民防組，在交通疏導期間，指派 2名武裝警察及交通義警預置於本院急診通道兩端，協助保全人員阻絕無關之民間驚慌車流，強制將大連路劃設為「軍、警、消及救護簽證車輛專用綠色通道」，落實軍民聯防，死守後送生命線。</p><p><strong>確實數據與資源規劃</strong>：聯絡官彙整第四作戰區及工務段回傳之「道路搶通與便道承重數據」：確認台1線及台17線部分便道在搶通後，其承重限制是否高於本院中型巴士（共4 輛，單輛自重約 5 噸） 與 7 輛物資廂型貨車的滿載通行安全值。聯絡官將獲得的「最新安全搶通替代路由清單」以紙本形式抄錄，經雙人核對無誤後，即時派Runner（傳令兵）送往勤務組與急診照護組，供司機實施精準導引，確保重症病患跨溪或下轉之安全，防止盲目出車受阻。</p><p><strong>指揮與管制（HICS 對接）</strong>：聯絡官萬樹人副院長定時與事故指揮官劉思源（簡碼 69086）及安全官杜傳榮主任（簡碼 69170）對接，回報外部軍事機動搶通狀態與本院聯外道路之最新燈號。</p>"}, {"stage": 1, "scenario_id": "02", "scenario_title": "軍事威脅升溫", "datetime": "", "summary": "中國突宣布實施「破勢行動－2026A」，陸、海、空及火箭軍兵力於臺灣周邊海空域展開多向抵近與聯合戰備警巡，並劃設多處操演區；同時實施灰色地帶騷擾與準封鎖行動，臺海對峙態勢持續升高。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    當中國突宣布實施「破勢行動－2026A」，於臺灣周邊海空域展開聯合戰備警巡並劃設多處操演區，臺海對峙態勢急劇升高時，本院面臨平戰轉換之關鍵時刻。聯絡官萬樹人副院長（公務機簡碼    60315；代理人為行政副院長黃雅芳，公務機簡碼 61414）必須在接獲情資之    <strong>15    分鐘內</strong>，啟用低軌衛星電話或專用加密通訊等備援通訊設備，向屏東地區聯合應變指揮管制中心（LJMOC）及地方衛生局執行<strong>「安全金鑰雙向反求證」</strong>，排除電子戰、虛假宣傳等灰色地帶干擾，確認軍事威脅之真實性、操演波次與預警時限。</li><li>在核實指令後，聯絡官代表本院與第四作戰區、高屏區 EOC    建立直通連線，正式通報本院啟動    HICS（醫院事故指揮系統）以及戰時一級整備。聯絡官協調轄區警察局（民和派出所，1.9公里，車程約    6 分鐘）及消防分隊（1.1公里，車程約 3    分鐘），請求警方派遣交通警力進駐大連路、瑞光路等周邊關鍵交控路口，實施實體路網管制，優先為本院救護車、血品運輸車及戰備物資車申請<strong>「軍事管制區特殊優先路權」</strong>，嚴防後送車隊與物資運補被恐慌車流癱瘓阻斷。聯絡官每    <strong>30 分鐘</strong>    以紙本抄錄與口頭覆誦方式，將威脅動態呈交指揮官劉思源（簡碼    69086），以便計畫部即時滾動修正事故行動計畫（IAP）。</li><li><strong>實際確實數據</strong>： 聯絡官彙整本院 <strong>16 輛戰備運輸載具</strong>（含救護車 3    輛、輪椅車 2 輛、中型巴士 4 輛、廂型貨車 7 輛）與司機通聯名冊，向    LJMOC    與衛生局完成申報簽證，確保本院可隨時支援第四作戰區之跨溪與縱深救護轉運。</li></ul>"}, {"stage": 1, "scenario_id": "04", "scenario_title": "軍事整備", "datetime": "", "summary": "國防部同步開設應變中心，運用情監偵系統強化全時預警監控，持續掌握敵情發展，並維持部隊適度戰備狀態，實施「立即備戰操演」。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    國防部開設應變中心並實施「立即備戰操演」，國軍常、後備部隊依令進入戰術位置。聯絡官萬樹人副院長（公務機簡碼    60315）立即進駐縣府「動員暨民力協調組」窗口，作為軍、公、民醫療整合之唯一聯絡節點，將本院之醫療備戰規劃與國防部及第四作戰區之戰時衛勤管制計畫無縫對接。</li><li>聯絡官向作戰區衛勤官及縣府應變中心通報：「本院已依 HICS    組織架構完成醫療照護、設施運作、危害控制、安全管制、後勤資源及行政財務等功能編組，大連院區    635 床及 B1    地下替代醫療空間已完成預置，可隨時接收戰傷官兵與受災群眾」。</li><li>聯絡官橫向協調後備指揮部與民防大隊，確認當部隊機動通過大連路、瑞光路等重要交通節點時，請軍警單位務必保留一條寬度不小於    <strong>3.5    公尺之緊急醫療救護通道</strong>，供本院救護車快速切入，防範軍事整備車流與醫療後送動線發生實體衝突，確保生命運輸通道暢通。</li><li><strong>實際確實數據</strong>：    聯絡官通報第四作戰區：本院已與區域聯防醫院（寶建、屏榮、屏醫、高榮、安泰）簽訂「戰時相互支援協定」，可於    24 小時內協助分流收治輕中症患者，並向軍方申報本院可用之 <strong>3    輛簽證救護車</strong>，單波次最大重症後送量能為 <strong>15 人</strong>（含隨車醫護）。</li></ul>"}, {"stage": 1, "scenario_id": "12", "scenario_title": "化學災害應變", "datetime": "", "summary": "屏東縣政府接獲「屏東科技產業園區疑似無水氨外洩」通報後，立即開設災害應變中心，統合消防、環保、衛生、警政及園區管理單位進行應處，執行警戒、疏散、除污與醫療分流，防止災情擴大。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    屏東縣政府開設災害應變中心，統合各單位應處疑似無水氨外洩複合災害。本院聯絡官萬樹人副院長（公務機簡碼    60315；代理人行政副院長黃雅芳，簡碼    61414）立即進駐縣府應變中心窗口，作為軍、公、民醫療整合與毒災應變之核心通聯管道。</li><li>聯絡官使用衛星電話或加密有線專線等 PACE    備援通訊，橫向聯絡環境部毒災應變隊、衛生局與消防局毒災隊，確認園區外洩無水氨的風向與化學監測數據，並向應變中心通報：「本院已依    HICS    啟動大量傷患及化災應變機制，急診已成功開設實體『臨時除污區（Decontamination    Zone）』與 START 快速檢傷」。</li><li>聯絡官請求衛生局與交控中心配合：「本院台 1 線與縣道 189    線之急重症救護車後送動線因毒煙飄散與車流壅塞而受阻，請警方及消防局在大連路、瑞光路等節點為本院救護車開闢『綠色化災救護避難通道』，並指派消防水車至本院急診前備命支援，確保後送動線安全」。</li><li><strong>實際確實數據</strong>： 聯絡官向高屏區 EOC 及衛生局申報本院可用之 <strong>3    輛簽證救護車</strong> 與隨車醫護名冊，精算後送 5    名重症無水氨中毒、呼吸窘迫傷患之跨院轉銜時間，確保在 12    小時內無縫調度，死守高屏醫療聯防機制。</li></ul>"}, {"stage": 1, "scenario_id": "17", "scenario_title": "中央整備啟動", "datetime": "", "summary": "中國於軍演期間刻意在臺灣周邊及本島多點製造局部衝突與擾亂事件，行政院邀集情資研判及相關分組主責機關召開應變整備會議，啟動先期整備事項，並要求各項應變措施與屏東縣政府同步運作。", "detail": "由醫療發展副院長萬樹人擔任，公務機簡碼60315", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    中央整備啟動，行政院召開應變整備會議，啟動先期整備，並要求各項應變措施與屏東縣政府同步運作。聯絡官萬樹人副院長（公務機簡碼    60315；代理人行政副院長黃雅芳，簡碼    61414）立即啟用低軌衛星電話或專用加密有線專線等 PACE    備援通訊，與屏東縣政府聯合應變中心（LJMOC）、高屏區 EOC    及衛生局防情系統建立雙向加密連線。</li><li>聯絡官將本院完成之「醫療整備與降載進度、SWEAT-M    關鍵資源評估表」雙向核實，通報至衛生主管機關及第四作戰區。</li><li>聯絡官向中央 EOC 提報：「本院已依 HICS 開設實體指揮所，完成全院 635    床之量能盤點，降載 30% 目標已完成 100% 簽證；地下戰備水井（日產    1,958 噸）運轉良好，發電機組柴油可撐 77    小時，本院已啟動跨院相互支援協定，隨時配合中央進行南部防線之急重症轉診與戰備醫療物資調配，維持軍民聯防體系之高度暢通與完好」。</li><li><strong>實際確實數據</strong>： 聯絡官確認與高屏區 EOC 構聯之 PACE 通訊通道每    <strong>15 分鐘</strong>    自動執行一次握手協議測試，確認與外部主管機關之「紅區救護網絡」在通信中斷下依然保持    100% 數位連通。</li></ul>"}]}, {"role": "HICS指揮中心（事故指揮官）", "entries": [{"stage": 4, "scenario_id": "08", "scenario_title": "應變指揮中心受損", "datetime": "", "summary": "屏東縣聯合應變指揮管制中心遭無人機攻擊，建築物部分區域坍塌並起火，產生大量濃煙；研判指揮官及多名工作人員受困，傷亡不明，縣府立即啟動備援指揮所與跨區接替機制。", "detail": "事故指揮官由劉思源副院長擔任，簡碼69086 / 代理人：施丞貴副院長，簡碼 69181", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：當屏東縣聯合應變指揮管制中心（LJMOC）遭無人機直接攻擊坍塌起火，指揮官受困、防情通報與防空警報中斷，全縣防衛陷入失聯與癱瘓之最極端狀態時。本院作為國家關鍵基礎設施（醫療照護次領域）之重要節點，事故指揮官劉思源副院長立即啟動<strong>「指揮中樞垂直移轉、備援指揮所啟用與跨區醫療接替程序」</strong>。</p><p>指揮官立即下令：將本院HICS指揮中心自露天、脆弱的約翰大樓六樓簡報室，<strong>100%垂直遷移轉置至地下防空避難大本營「恩慈大樓 B1 會議室（或 B2指揮中心）」</strong>，此處具備最強固之結構混凝土防護力，能抵禦炸彈破片。指揮官隨即拍板「啟動平戰轉換跨區接替機制」：在LJMOC癱瘓期間，本院指揮中心自給自足，主動接管並執行高屏區急重症與戰傷後送之「地下微型戰地醫院」調配職責。指揮官指示聯絡官萬樹人副院長（簡碼60315）利用衛星電話直接與國防部第四作戰區、陸軍衛勤部隊建立構聯，接替外部已癱瘓之防情與救護調派通報鏈，死守南部防線。</p><p><strong>2. 確實數據與資源規劃</strong>：指揮官劉思源審查狀況分析處上報之全院自撐數據：</p><ul><li>急性一般一般病床 356床、特殊病床 279床（合計 635床）之佔床率降至    30%；</li><li>地下戰備水井（1,958噸/天）運轉正常，水質檢測安全；</li><li>備用發電機（2,800 kW）負載已卸除至 35%，核心大樓柴油可自撐    77小時連續供電。 指揮官拍板：本院主動在 B1    避難空間（約翰、馬可、馬太、路加、韓偉大樓 B1）    開設最大量能：臨時急診 19床、臨時開刀房 1間、臨時加護病房    23床、臨時一般病房    36床。將此最大收治量能數據透過衛星電話申報衛福部及南部各聯防醫院，隨時接納大批轉送病患。</li></ul><p><strong>3. 指揮與管制（HICS 對接）</strong>：指揮官直接向執行部長王建銘、後勤部長許慧莉、安全官杜傳榮下達「一級地下化戰備命令」，要求全院同工配戴防偽背心及臂章，嚴防特工物理滲透。</p>"}]}]}, {"id": "plan", "name": "02　計畫部長／發言官", "roles": [{"role": "計畫部狀況分析處", "entries": [{"stage": 2, "scenario_id": "01", "scenario_title": "軍事威脅升溫", "datetime": "8月7日 18:00", "summary": "中國東部戰區自福建、廣東沿海持續動員海、空及後勤部隊，逐步完成整備，並對臺南、高雄、屏東及臺東外海重要航道實施封控與威懾，同時配合心理戰傳達政治意志，南部地區安全情勢快速惡化。", "detail": "狀況分析小組長：蕭麗萍督導長，簡碼69272 / 莊詩蘋督導長，簡碼 65311", "html": "<p>計畫部部長（醫務部陳志文部長，公務機簡碼69120）在聽取聯絡官確證情報並經指揮官指示後，必須在 <strong>30 分鐘內</strong>召集會議，針對軍事威脅升高之情勢，為下一個執行週期制定並發布具體之「醫療整備與量能收縮事故行動計畫（IAP）」。計畫部轄下之狀況分析處（小組長：蕭麗萍督導長/ 莊詩蘋督導長）負責對應威脅情勢，於 <strong>30 分鐘內</strong>在應變中心（約翰大樓六樓簡報室，設有分機4617）架設「情報專區」與實體白板。</p><p>狀況分析處負責執行全院醫療量能之極限盤點。本院（大連院區）急性一般病床共<strong>356 床</strong>，特殊病床共 <strong>279 床</strong>（合計 <strong>635 床</strong>）。狀況分析處專責每<strong>2 小時</strong>定期向全院功能組追蹤佔床率。系統管理同工透過內網將數據登錄呈報至戰情面板（網址：<strong>https://ci-board.ptch.org.tw</strong>）；若遭遇斷網或網路受阻，狀況分析處立即改採人工手工抄錄與實體白板登記。狀況分析處精算可立即出院人數、可延後門診排程、以及ICU與開刀房之空床率，每日定時上報衛福部「緊急醫療管理系統」與衛生局，保留本院之急重症與戰傷收治量能。</p>"}, {"stage": 2, "scenario_id": "07", "scenario_title": "縣政府先期整備", "datetime": "8月8日 12:00", "summary": "因應整體情勢升高及可能衝擊民生與社會穩定之風險，屏東縣政府啟動先期整備，完成聯合應變指揮管制中心、各鄉鎮市應變中心及防災協作中心之功能編組，並盤點人力、物資、避難空間與關鍵資源。", "detail": "狀況分析小組長：蕭麗萍督導長，簡碼69272 / 莊詩蘋督導長，簡碼 65311", "html": "<p>計畫部狀況分析處（蕭麗萍督導長 /莊詩蘋督導長）負責彙整全院關鍵資源評估表（SWEAT-M），將本院之自撐數據情資，滾動更新並呈報縣府應變中心及衛生局。狀況分析處精算之關鍵自撐數據如下：</p><ul><li><strong>W - Water（水資源）</strong>：本院常規日用量 <strong>511.8 噸</strong>。自來水蓄水池    453.9 噸（可自撐 0.88 天）。若啟動地下戰備水井（日供水量 <strong>1,958    噸</strong>），可將自撐天數大幅提升至 <strong>3.82 天</strong>，優先死守血液透析每日所需    <strong>126 噸 RO 淨水</strong>。</li><li><strong>E - Energy（電能）</strong>：5 組緊急柴油發電機總容量 <strong>2,800    kW</strong>。在執行電氣負載卸除至 35%    以下之負載模式下，馬可／約翰大樓核心大樓<strong>可自撐連續發電 77    小時</strong>；路加、韓偉大樓備援發電 <strong>8.6 小時</strong>（需 12 小時內補油）。    上述精算數據將更新至戰情面板，作為指揮官決策與上報中央之鋼性基礎。</li></ul>"}, {"stage": 3, "scenario_id": "07", "scenario_title": "恆春半島設施疏散評估", "datetime": "", "summary": "第四作戰區情資研判，恆春半島重要能源、輸電及通信設施可能成為優先攻擊目標，建議疏散周邊非必要人員，必要運轉與安全維持人員依計畫留守；同時調整恆春、車城及枋山地區配售站與救濟站物資配置。", "detail": "狀況分析小組長：蕭麗萍督導長，簡碼69272 / 莊詩蘋督導長，簡碼 65311", "html": "<p>計畫部狀況分析處（蕭麗萍督導長 /莊詩蘋督導長）負責對應恆春半島疏散警報，動態調配全院之床位及醫護人力。狀況分析處每<strong>2 小時</strong> 追蹤各區之佔床率，將全院 635床之空床與可出院名冊即時更新至戰情面板（<strong>https://ci-board.ptch.org.tw</strong>）。</p><p>狀況分析處會同執行部醫療照護組長（徐禮平副部長），評估若恆春半島出現大批轉診病患，本院B1 備援醫療空間之「戰術功能擴編」：</p><ul><li><strong>約翰/馬可 B1 臨時急診區</strong>：預留 19 張急救床，並配置紅、黃、綠區。</li><li><strong>韓偉 B1 臨時 ICU</strong>：MRI室及通道預留 23 床。</li><li><strong>路加 B1 一般病房</strong>：停車場空地預留 36 床。    狀況分析處同工編製「恆春轉診病患收治清冊」，定時登錄衛福部「緊急醫療管理系統」，以便上級掌握南部醫療防禦韌性之最大餘量，提供指揮官最精準的調配決策。</li></ul>"}, {"stage": 4, "scenario_id": "01", "scenario_title": "敵軍登陸作戰", "datetime": "", "summary": "敵軍於東港、林邊及枋寮沿海展開登陸作戰，企圖突破沿岸防線並沿台17線、台1線向縱深推進；另於佳冬及枋山沿海發現登陸船團接近，並結合無人機偵察、火力打擊與電子干擾策應，顯示有擴大登陸規模之態勢。", "detail": "狀況分析小組長：蕭麗萍督導長，簡碼69272 / 莊詩蘋督導長，簡碼 65311", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：狀況分析處（小組長：蕭麗萍督導長 / 莊詩蘋督導長，簡碼 65311）在 HICS啟動後，立即在 <strong>30分鐘內</strong>於地下避難指揮所（約翰大樓六樓簡報室，設有分機 4617）架設「戰時醫療量能情報專區」與「實體戰情白板」。因應敵軍登陸與電子干擾，狀況分析處同工啟動「紙本與數位雙軌情報彙整機制」。在院內局域網路暢通時，透過「降載暨醫療量能戰情面板」（https://ci-board.ptch.org.tw）自動抓取HIS（醫療資訊系統）、NIS（護理系統）之臨床即時數據；若因網攻或電磁脈衝導致斷網，則立即指派佩戴<strong>紅色專屬臂章之傳令兵（Runner）</strong>，穿梭於 B1 臨時急診、B1 開刀房、ICU及各病房，手動抄錄臨床數據，每 <strong>2小時</strong>定期於實體白板上手寫更新，向指揮官提供最精確的決策情資。</p><p><strong>2. 確實數據與資源規劃</strong>： 狀況分析處精算全院 635床（急性一般一般病床356床、特殊病床 279床）之佔床率與空床數，執行強勢降載指標監控。狀況分析處嚴格盤點並登錄 SWEAT-M 關鍵資源評估數據：</p><ul><li><strong>W - Water（水資源）</strong>：常規耗用 511.8噸，自來水蓄水池 453.9    m³（可自撐    0.88天）。要求工務手動切換至醫慢大樓之<strong>地下戰備水井（日供水    1,958噸）</strong>，將自撐天數提升至    <strong>3.82天</strong>，優先確保血液透析（洗腎）每日 126噸    RO淨水與開刀房無菌刷手用水。</li><li><strong>E - Energy（電能）</strong>：5組緊急柴油發電機共 <strong>2,800 kW</strong>    狀態。精算在電氣負載卸除至 35%    模式下，馬可／約翰大樓可<strong>自撐連續發電    77小時</strong>；路加大樓及韓偉大樓可自撐 8.6小時（油箱 800 L）。</li><li><strong>M - Medical（醫療物資）</strong>：盤點 72小時核心維生藥品與備血庫存，將    RBC（紅血球）儲量（維持日用量加大量傷患預留量，維持高於警戒線 41    Units）每日動態登錄於面板。</li></ul><p><strong>3. 指揮與管制（HICS 對接）</strong>：狀況分析處與執行部醫療照護組長徐禮平副部長（公務機簡碼69231）密切構聯，隨時監控留院病患（30% 降載目標為107床住院患者）之疏散流向與後送交接狀態，並依「紅、黃、綠」三色燈號回報指揮官，作為啟動跨院轉診或申請外部資源調撥之依據。</p>"}, {"stage": 4, "scenario_id": "02", "scenario_title": "敵前沿疏散決策", "datetime": "", "summary": "第四作戰區通報屏東縣聯合應變指揮管制中心，研判東港、林邊、佳冬及枋寮之台17線以西沿海聚落為敵我交戰前沿，居民滯留將面臨高度生命危險並影響部隊行動，建議立即分區疏散至內陸安全地區。", "detail": "狀況分析小組長：蕭麗萍督導長，簡碼69272 / 莊詩蘋督導長，簡碼 65311", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：第四作戰區通報台17線以西沿海聚落為敵我交戰前沿，建議立即疏散至內陸。狀況分析處（蕭麗萍督導長/莊詩蘋督導長）立即啟動<strong>「交戰前沿病患與家屬緊急撤離與分流決策程序」</strong>。狀況分析處同工會同文件記錄處（吳瑞敏經理，簡碼69145），在 <strong>15分鐘內</strong>篩選出目前留院病患中，凡家屬或住址位於東港、林邊、佳冬、枋寮等台17線以西高風險管制區之病患名冊，編製「戰時高風險疏散對象追蹤表」。狀況分析處依據LJMOC指定之內陸安全收容點（高樹大新醫院、屏東榮總龍泉分院、高樹國中），規劃本院高風險家屬與病患之異地疏散路由。</p><p>狀況分析處會同後勤部，精算疏散此大批患者與隨行家屬所需之運輸載具與醫護人力配置配比，向指揮官呈報「預防性疏散事故行動計畫（IAP）臨時增補案」。在通訊受阻情境下，狀況分析處印製實體紙本撤離路線逃生指引地圖，由Runner（傳令兵）以徒步方式發放至各病房護理站與家屬安撫區，指導家屬配合分區疏散至安全內陸，嚴禁自行盲目往沿海管制區撤退。</p><p><strong>2. 確實數據與資源規劃</strong>： 狀況分析處評估大連院區在 30%降載目標下保留之 <strong>107床住院病患</strong>的即時撤離需求。經精算，其中屬於台17線沿線之病患家屬約佔25%（27床）。狀況分析處將這27床病患納入「最高優先疏散波次」，與後勤部勤務組調度中型巴士（共4輛，單波次極限載運 74人） 與3輛簽證救護車進行配對。狀況分析處登錄各撤離點之接收床位（高樹大新醫院預留30床、龍泉分院預留 20床、高樹國中收容所可安置50人），確保「床對床、人對車」之精準調配，不佔用稀缺的重症救護資源。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：狀況分析處直接與聯絡官萬樹人副院長（簡碼60315）對接，將本院預防性疏散名單及載具缺口回報至縣府聯合應變中心（LDCC），爭取軍方衛勤車隊及警察哨口交管協助。</p>"}, {"stage": 5, "scenario_id": "02", "scenario_title": "軍事機動支援", "datetime": "", "summary": "因多點交通阻斷，南部國軍增援與補給路線受影響；第四作戰區協調屏東縣聯合應變指揮管制中心執行道路搶通、橋梁安全評估及交通疏導，優先恢復軍事機動、醫療後送與後勤運補路線，並提供替代路線情資。", "detail": "狀況分析小組長：蕭麗萍督導長，簡碼69272 / 莊詩蘋督導長，簡碼 65311", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：計畫部狀況分析處（狀況分析小組長蕭麗萍督導長，公務機簡碼69272；莊詩蘋督導長，公務機簡碼65311）在接獲道路搶通與橋梁安全評估之軍事情資後，必須在 <strong>15 分鐘內</strong>將情資轉換為全院可直接套用之戰術決策。狀況分析處同工在<strong>地下一樓備援指揮中心（恩慈大樓 B1）</strong>啟動「路網動態與關鍵資源雙軌彙整機制」。</p><p>狀況分析處在內網暢通時，利用「降載暨醫療量能戰情面板」（https://ci-board.ptch.org.tw）即時登錄外部道路通行狀態，供指揮官、執行部長及後勤部長做決策參考；若遭受資安攻擊或電磁干擾斷網，狀況分析處立即改採實體白板，指派Runner（傳令兵） 每 15分鐘手動更新一次，以紅、黃、綠三色實體磁鐵標記周邊聯外交流道與橋梁的安全等級（紅色：交戰管制禁行；黃色：承重受限、單向通車；綠色：安全暢通）。</p><p>狀況分析處每 <strong>2 小時</strong>追蹤並精算全院之「資源自撐極限與後送缺口數據」：包含可用空床數（佔床率以30%為目標）、備用血液儲量、發電機燃油消耗速率等。若評估本院大連院區自撐時間因交通阻斷即將低於48小時黃色警戒，狀況分析處立即撰擬「緊急外部資源請求單」，由聯絡官向高屏區EOC 請求軍方調撥，發揮「戰時情報大腦與決策雷達」之最大综整功效。</p><p><strong>確實數據與資源規劃</strong>： 狀況分析處精算全院 635 床（一般病床 356床、特殊病床 279 床）之降載狀態，確保保留至少 <strong>20%的可用加護病房與開刀房床位</strong>。狀況分析處對工務室上報之 SWEAT-M數據進行精算：本院在市電斷絕下，緊急發電機在 35%最低負載模式下，柴油存量可確保馬可／約翰大樓核心大樓<strong>自撐連續發電 77小時</strong>；地下戰備水井每日日供水量達 <strong>1,958 噸</strong>，在節流模式下可自撐<strong>3.82 天</strong>，水質檢測 pH 值與餘氯維持安全，確保醫療水電生命線絕對安全。</p><p><strong>指揮與管制（HICS 對接）</strong>： 狀況分析處小組長蕭麗萍（簡碼 69272）直接對接計畫部長陳志文（公務機簡碼69120），以紙本雙人雙簽核實後呈呈報指揮官，確保情報與戰略完全合拍。</p>"}, {"stage": 5, "scenario_id": "08", "scenario_title": "戰後穩定", "datetime": "", "summary": "國軍反擊作戰持續推進，屏東地區敵軍約2,000餘人棄械投降，由國軍依戰俘處理程序集中收容、清點識別及安全管制；戰場態勢逐步穩定，政府持續發布查證訊息，民心士氣與社會運作逐步回穩。", "detail": "由醫務部部長陳志文帶領狀況分析處，簡碼69120", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：戰局逐步穩定，本院醫療核心功能必須安全有序地由「極限戰傷救治、大量傷病患處置、B1地下替代空間運作」之戰時狀態，平穩過渡轉換回「日常門診、住院、健檢及常規電子HIS 運作」之常態營運。計畫部部長（醫務部陳志文部長，公務機簡碼69120；代理人狀況分析處小組長莊詩蘋督導長，簡碼 65311）立即啟動<strong>「本院 HICS 事故指揮體系戰後復原、歸建與營運重建計畫」</strong>。</p><p>陳志文部長於恩慈 B1前進指揮所召開復原會議，召集狀況分析處與持續運作處，制定下一個執行週期之「營運重建與歸建事故行動計畫（IAP）」：</p><p>1.  *空間與資源歸建程序（歸建小組    P4）*：依據戰傷病患退潮速率，逐步縮編地下備援空間量能，手動清點地下    B1 開設之臨時急診、開刀房、ICU 之存量耗材。</p><p>2.  *不可搬運資產再盤點*：醫工組同工（林良哲主任）會同資訊室，對先前執行反資敵（Asset    Denial）處置、拆除關鍵晶片之 MRI核磁共振、移動式    X光機進行實體核對與晶片重新裝設、檢檢，填寫「資產復原與功能測試報告」，完成雙人手寫雙簽勾稽核實。</p><p>3.  *電子 HIS 與 LIS    系統逐步恢復*：資訊室網路同工在確認外部公網資安防範安全、DDoS    惡意流量清洗完畢後，手動重啟 HIS、NIS 伺服器，指導櫃檯同工將當機    Downtime    期間登記在實體「造冊簿」上之所有手工病歷、給藥、交叉配血與財務記帳單，有序補登錄至    HIS 電腦主機中，防範數據丟失。</p><p><strong>確實數據與資源規劃</strong>： 計畫部状况分析處精算：評估在院病患中，可從 B1備用一般病房（36床）及臨時 ICU（23床）搬遷回地面路加大樓與約翰大樓原常規病房之病患清單（計 40人），嚴格執行<strong>ISBAR 臨床班次交接</strong>，每班由主治醫師與護理長雙人雙簽。</p><p><strong>指揮與管制（HICS 對接）</strong>： 計畫部陳志文部長（簡碼 69120）彙整「戰後營運重建與歸建報告表」，雙人簽章核實後呈呈報事故指揮官，完成HICS 指揮之戰後轉折。</p>"}, {"stage": 1, "scenario_id": "02", "scenario_title": "軍事威脅升溫", "datetime": "", "summary": "中國突宣布實施「破勢行動－2026A」，陸、海、空及火箭軍兵力於臺灣周邊海空域展開多向抵近與聯合戰備警巡，並劃設多處操演區；同時實施灰色地帶騷擾與準封鎖行動，臺海對峙態勢持續升高。", "detail": "狀況分析小組長：蕭麗萍督導長，簡碼69272 / 莊詩蘋督導長，簡碼 65311", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    計畫部部長（醫務部陳志文部長，公務機簡碼    69120）在接獲聯絡官情資並經指揮官指示後，必須在 <strong>30 分鐘內</strong>    制定第一個週期的「醫療整備與量能降載事故行動計畫（IAP）」。狀況分析小組長（蕭麗萍督導長，簡碼    69272；莊詩蘋督導長，簡碼    65311）立即在實體指揮所（約翰大樓六樓簡報室，分機    4617）架設<strong>「戰時醫療量能情報專區」與「實體戰情白板」</strong>。</li><li>狀況分析處每 <strong>2 小時</strong> 定期追蹤各普通病房及 ICU    之佔床率與空床數，並在內網暢通下，將數據即時登錄至戰情面板（網址：<strong>https://ci-board.ptch.org.tw</strong>）；若遭受網路攻擊或斷電，則立即派佩戴<strong>紅色專屬    Runner（傳令兵）臂章</strong>之同工，以手工抄錄、實體白板手寫更新之方式維持雙軌情資運作，向指揮官提供最精確的決策情資。状况分析處會同執行部，啟動「住院病患反向檢傷篩選流程」，精算出可立即出院或下轉之人數，做好將普通病房病人降載、騰出戰備創傷收治空間之先期整備。</li><li><strong>實際確實數據</strong>： 狀況分析處精算全院 <strong>635 床總量能</strong>（一般病床 356    床、特殊病床 279 床）之降載比例。擬定於 48    小時內將住院病患強勢降載至 <strong>30% 為目標（即保留至少 70% 約 444    床之戰備空床）</strong>，並盤點關鍵物資，每日定期上報衛福部「緊急醫療管理系統」及地方衛生局，死守急重症收治紅線。</li></ul>"}, {"stage": 1, "scenario_id": "17", "scenario_title": "中央整備啟動", "datetime": "", "summary": "中國於軍演期間刻意在臺灣周邊及本島多點製造局部衝突與擾亂事件，行政院邀集情資研判及相關分組主責機關召開應變整備會議，啟動先期整備事項，並要求各項應變措施與屏東縣政府同步運作。", "detail": "狀況分析小組長：蕭麗萍督導長，簡碼69272 / 莊詩蘋督導長，簡碼 65311", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    計畫部部長（醫務部陳志文部長，公務機簡碼    69120）主持召開「中央整備同步與營運不中斷行動會議」。狀況分析小組長（蕭麗萍督導長，簡碼    69272；莊詩蘋督導長，簡碼    65311）立即在實體指揮所彙整全院關鍵資源評估表（SWEAT-M）之鋼性自撐數據。</li><li>状况分析處同工將數據動態呈現於獨立架設之戰情面板上（<strong>https://ci-board.ptch.org.tw</strong>），並每    <strong>2 小時</strong>    對臨床科別之降載進度實施剛性監控，確保全院住院病患降載、手術排程限縮等核心指標與中央應變整備進度完全同步。</li><li>状况分析處會同執行部長，編製實體「戰時醫療營運不中斷與功能區轉置計畫地圖」，為可能隨時爆發的實體空襲或登陸作戰做做好「B1    地下替代空間醫療重置」與「大後撤機制」之先期決策準備，死守南部戰地醫院救護之核心韌性。</li><li><strong>實際確實數據</strong>： 狀況分析處將本院    <strong>W（水）、E（電）、A（藥品/氧氣/血液）及 M（人力）</strong>    數據彙整呈報中央：自來水蓄水池與頂樓水塔容量 <strong>453.9 m³</strong>（0.88    天）；地下戰備水井日產水量 <strong>1,958 m³</strong>（3.82 天）；發電機（2,800    kW）柴油可撐 <strong>77 小時</strong>（Luke/Hanwei 8.6 小時）；O型 RBC    存量足夠自撐 72    小時以上。數據以紙本雙人手寫雙簽留痕核實，呈報指揮官劉思源完成狀況應處階段之最後簽證。</li></ul>"}]}, {"role": "公關發言組（資源發展中心）", "entries": [{"stage": 2, "scenario_id": "05", "scenario_title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "屏東縣政府內部通訊群組轉傳媒體與社群運用公開航情、船舶追蹤程式所呈現之資訊，並據以研判臺灣周邊海空域情勢；惟內容未經完整查證即快速擴散與再解讀，形成片面推論，加劇民眾對安全情勢之不安。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p>縣府內部群組轉傳未經查證之航情船舶資訊，形成片面推論，加劇民眾恐慌。發言人（施丞貴副院長，公務機簡碼69181；代理人黃雅芳副院長）立即啟動輿論防禦。由資源發展中心（杜環境師，分機3932 / 0929-140189）實施 <strong>24 小時戰時輿情監控</strong>，全面蒐集社群平台與LINE地方群組涉及本院「藥品中斷、大連院區停診、南部防線即將失守」之錯假謠言。</p><p>為防範洩密，發言人立即向全院 1,479名同工重申<strong>「單一官方發言原則」<strong>，嚴禁任何人私自向媒體發表評論或將院內備戰照片上傳至私人社群。公關組聯同計畫部，於1小時內撰擬權威新聞澄清稿發布，並於門診大廳與官網公告澄清。澄清貼文與公告一律使用固定模板，加置醫院官方Logo與浮水印，並於最顯眼處固定標註警語：</strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>主動建立病患與大眾之信任。</p>"}, {"stage": 2, "scenario_id": "06", "scenario_title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "敵對勢力運用社群平台、網路直播、新聞流量及AI生成影像，密集操作「南部已被放棄」、「政府錯判情勢拖入戰爭」、「沿海居民將無法撤離」等敘事，企圖干擾政治與作戰準備節奏，造成屏東地區民眾恐慌。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p>境外敵對勢力運用網路直播與 AI生成影像，密集操作「南部已被放棄、沿海居民無法撤離」之敘事，造成屏東地區民眾集體恐慌。公關發言人（施丞貴副院長）立即主動出擊，對接地方政府應變指揮中心與衛生局，獲取南部地區責任醫院聯防之確實量能數據。</p><p>資源發展中心於 <strong>1 小時內</strong>發布實體澄清影片與對外澄清稿。影片中以實景呈現大連院區急診、加護病房照護常態，並附上發言官之說明音檔，以「鋼性Facts（事實）」粉碎 AI 變造影像。所有發布管道（官網、LINE官方帳號、實體海報）均強制嵌入具有防偽特徵之醫院徽章，並大字體標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>迅速向社會大眾證實本院堅守崗位，全力守護高屏防線。</p>"}, {"stage": 2, "scenario_id": "13", "scenario_title": "軍事動員與社會反應", "datetime": "8月9日", "summary": "國軍依計畫進入戰術區域實施戰備整備，戰甲砲車及部隊機動畫面經民眾拍攝與媒體即時報導，引發社會關注並放大戰爭風險認知；第四作戰區協請屏東縣政府啟動資訊應處機制，共同發布事實訊息以穩定民心。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p>國軍戰備整備部隊機動畫面經民眾拍攝，引發戰爭恐慌並放大風險。作戰區協請縣府與本院啟動資訊應處機制，共同發布事實訊息以穩定民心。發言官（施丞貴副院長）立即對接第四作戰區新聞官與縣府公關組。資源發展中心（杜環境師）於 <strong>1 小時內</strong>配合軍方及縣府，召開實體或發布定型化新聞稿。</p><p>公關組向大眾澄明：「國軍戰甲車機動為例行性之國防動員整備演練，請民眾切勿恐慌；本院配合演演練調整量能，急診及急重症照護維持正常運作，重要醫用物資正常供應，醫療秩序一切安全穩定」。澄清公告一律附加醫院 Logo浮水印，並固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>迅速群發至各大新聞台與社群。</p>"}, {"stage": 2, "scenario_id": "18", "scenario_title": "認知作戰升溫", "datetime": "8月10日 12:00", "summary": "社群媒體流傳縣府官員與家屬優先撤離、重要物資已私下轉移等不實內容，並以截圖與短影音快速擴散，形塑權貴避險觀感，削弱民眾對政府信任，加劇恐慌並引發民眾質疑指揮體系運作。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p>社群媒體流傳縣府官員優先撤退、物資私下轉移之短影音，削弱民眾對政府信任，質疑指揮體系。公關發言人（施丞貴副院長）立即啟動「認知戰阻斷與權威闢謠機制」。由資源發展中心（杜環境師，公務機簡碼 69181）實施 24 小時戰時輿情監控。</p><p>發言人會同計畫部長陳志文，於 <strong>1 小時內</strong>撰擬權威澄清稿與新聞聲明。向媒體與社群澄明：「本院依國家關鍵基礎設施醫院安全防護計畫，與縣府、衛福部保持高度協調；所有醫療儲備、战備物資（如柴油、水及管制藥品）均100% 妥善保存於院內 B1備援庫房中，死守於急診與臨時病房抢救生命，絕無私下轉移情事，指揮官與核心醫護均堅守火線」。澄清貼文與實體公告海報均附加醫院 Logo浮水印，加大字體固定標註：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>迅速張貼於院區大廳，阻斷謠言發酵。</p>"}, {"stage": 3, "scenario_id": "02", "scenario_title": "醫療降載危機", "datetime": "", "summary": "屏東基督教醫院於緊急命令發布後啟動醫療營運降載，暫緩非緊急門診、健檢與部分選擇性手術，以保全急重症核心量能；惟部分民眾無法接受措施，現場出現大量詢問、抱怨及情緒失控，院內外人潮聚集並影響就醫動線。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p>面對民眾因降載引發的情緒失控與輿論危機，發言官施丞貴副院長（代理人：行政副院長黃雅芳，公務機簡碼61414）立即召開公關應變會議。發言官重申<strong>「單一官方窗口發言原則」</strong>，嚴禁任何一線醫護、外包清潔或保安人員私自向抗議民眾或媒體發表評論，防範院內安全弱點外洩。</p><p>資源發展中心同工（杜環境師，分機 3932）必須在 <strong>1 小時內</strong>撰擬權威新聞澄清稿，向各大媒體及社群平台發布。澄清新聞稿與公告貼文一律使用固定新聞稿模板（附加醫院Logo 浮水印，載明發言人、聯絡窗口及電話 08-7368686 分機3932）。公關組派專人於門診大廳、掛號批價櫃檯及大連路大門處部署，張貼加大字體之實體「醫療降載與分流就醫澄清公告海報」，海報上固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong></p><p>公關組協同門診經理，主動向聚集群眾發放紙本降載說明與基層聯防門診分流指引，安撫現場抱怨民眾，並引導輕症患者至適當之基層醫療院所，以「Facts（事實）與透明資訊」消除社會恐慌與不信任。</p>"}, {"stage": 3, "scenario_id": "06", "scenario_title": "停水民眾搶購", "datetime": "", "summary": "受停水影響，民眾大量湧入超市、加水站搶購瓶裝水與儲水容器；社群流傳「全縣即將全面停水」及「水源污染」等不實訊息，放大恐慌情緒，造成排隊人潮、交通壅塞及民眾對政府供水能力之疑慮。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p>屏東市發生間歇性停水，民眾瘋狂搶購瓶裝水，且社群媒體流傳「全縣即將全面停水、水源受污染」等假訊息，引發大量驚慌就醫與詢問。公關發言人（施丞貴副院長）立即啟動輿論防衛。公關同工（分機3932）與工務室主任曹宏益核實情資，掌握「本院已切換至地下戰備水井，水質檢測安全，供水及RO 洗腎用水 100% 運轉正常」之事實數據。</p><p>資源發展中心於 <strong>1 小時內</strong> 撰擬澄清新聞稿向媒體發布。澄清貼文、官方LINE、官方網站公告一律套用固定新聞稿模板（附加醫院 Logo浮水印，清楚載明發言人、聯絡人杜環境師及公務機簡碼 3932）。公關組印製實體澄清海報，加大字體固定標註：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong></p><p>海報張貼於門診大廳掛號台、急診入口、洗腎中心大門及各病房電梯口。以權威的事實數據，打擊認知作戰假訊息，引導民眾保持冷靜，避免驚慌民眾擠爆急診室。</p>"}, {"stage": 3, "scenario_id": "16", "scenario_title": "廣播電視遭入侵", "datetime": "", "summary": "屏東地區有線電視播出系統與廣播電台遭不明人士入侵，部分播出系統被控制並持續插入異常訊號，內容涉及重塑國家認同及兩岸政治秩序等高度政治訊息，與正常節目交錯播出，造成資訊混淆與地方輿情升溫。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p>有線電視播出系統與電台遭入侵，控制播送重塑認同之異常政治訊號，造成社會資訊極度混淆與地方輿情升溫。為防範此認知戰動搖本院1,479名同工之防衛信念與在院病人信心，發言官施丞貴副院長立即啟動「認知戰阻斷與院內權威輿情發布機制」。</p><p>發言官向全院重申單一窗口發言原則。資源發展中心同工（杜環境師）於 <strong>1小時內</strong> 撰擬澄清與安定聲明。由於外部媒體及有線系統被控制，公關組切換為「內部獨立發布渠道」：利用本院獨立備援配電之<strong>全院廣播大聲公系統、院內有線電視牆、Team+公告及實體紙本澄清海報</strong>，每天定時向院內同工及病患播發<strong>「屏基醫療韌性狀態」說明</strong>。</p><p>以真實的降載數據與在院照護照片，重申「醫院備用電力供水充足、醫療團隊持續堅守崗位、救護車照常運作」，以事實打擊政治干擾，穩住院內防禦信心。</p>"}, {"stage": 3, "scenario_id": "17", "scenario_title": "民生物資謠言與抗議", "datetime": "", "summary": "網路流傳嬰兒奶粉等民生物資短缺及縣府囤積物資之謠言，屏東縣政府前出現民眾群聚抗議並要求發放物資；另於內埔、潮州、東港等地出現不明傳單，宣稱可憑單領取物資或兌換貨幣，誘發錯誤期待與群聚行為。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p>網路流傳奶粉物資短缺及縣府囤積之謠言，縣府前出現抗議，且內埔、潮州、東港等地出現不明傳單誘發群聚。大批抗議民眾及企圖兌換之人群極易湧向本院。公關發言人（施丞貴副院長）立即啟動「認知戰反制與鋼性數據澄清SOP」。</p><p>資源發展中心與藥劑部、兒科主任橫向核實，掌握「本院新生兒加護病房（PNICU）與兒科配方奶粉、一般醫療耗材已外購儲備50 箱（約 600 罐），庫存充足、物資無虞」之鋼性事实數據。 發言官施丞貴於<strong>1 小時內</strong> 撰擬闢謠新聞澄清稿向社群及媒體發布。</p><p>公關組印製實體闢謠澄清海報，加大字體固定標註：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>海報張貼於大門、急診、兒科門診、掛號櫃檯。以事實數據打擊謠言，引導民眾配合醫療管制，阻斷不實傳單之擴散。</p>"}, {"stage": 4, "scenario_id": "09", "scenario_title": "通信廣播設施摧毀", "datetime": "", "summary": "屏東地區主要廣播、無線電視及通信發射設施遭敵摧毀，造成大範圍訊號中斷、頻道停播與網路不穩；民眾無法正常接收新聞及官方訊息，資訊傳遞效能下降，不實訊息與社會不安進一步擴大。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181 / 代理人：黃雅芳副院長，簡碼 61414", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：屏東地區主要廣播、有線電視及通信設施遭敵摧毀，大範圍訊號中斷，民眾無法接收官方訊息，不實訊息與社會不安恐慌急劇擴大，本院極易面臨謠言衝擊門禁之危機。公關發言人（施丞貴副院長，公務機簡碼69181）立即啟動<strong>「資訊斷鏈狀態下之實體認知防線與闢謠澄清SOP」</strong>。公關發言人會同計畫部長與安全管制處，實施最嚴格之<strong>「單一官方窗口發言原則」</strong>，嚴禁任何醫護或同工私自向外界透露院內备戰photos 與安全弱點。</p><p>針對「通訊全斷、本院停診缺藥」等虛假輿情，資源發展中心（杜環境師，分機3932）改採<strong>「非電子內部獨立發布渠道」</strong>：利用本院獨立備援發配電之<strong>全院廣播大聲公系統、院內獨立有線電視牆系統</strong>，每天定時播發「屏基醫療韌性狀態報告」。公關人員迅速印製大量加大字體之實體「澄清不實停診海報」，海報上固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>海報由 Runner 徒步張貼於大門口、急診、掛號櫃檯、發藥窗口及各樓電梯口，以Fact（事實）築起實體「認知防護牆」。</p><p><strong>2. 確實數據與資源規劃</strong>： 公關組（資源發展中心）與社工室對接，盤點在院1,479名同工 及住院家屬之詢答需求。公關人員印製500份實體「戰時就醫與醫療物資正常供應家屬說帖」，將其分發給各哨口保全及護理長。說帖中詳細列出：本院地下戰備水井（1,958噸/天）、發電機柴油儲量（連續77小時發電）、麻醉與急產救命藥物存量足夠72小時自撐之鋼性數據，全院同工的對外回答<strong>口徑「百分之百一致」</strong>，徹底阻斷外界恐慌滲透。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：施丞貴副院長直接向指揮官劉思源報告最新輿情。若媒體有採訪戰傷患者需求，公關組會同社工室實施一對一徵詢，簽署「病患肖像權使用同意書」，由接待人員全程陪同，嚴禁隨意拍攝受傷部位或屍體。</p>"}, {"stage": 5, "scenario_id": "07", "scenario_title": "社福及產業移工滯留", "datetime": "", "summary": "大量社福、農漁業及產業移工因雇主照護功能受限、工作場所受損或聯繫中斷，安置需求未能即時掌握，聚集於屏東、潮州及枋寮車站周邊，形成臨時滯留，衍生生活保障、語言溝通與秩序維持壓力。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：大量移工滯留車站並湧向本院，極易遭到境外敵對勢力利用，於網路流傳「屏東基督教醫院拒收外籍移工、醫院發生種族衝突、物資囤積不發」等AI生成假訊息，惡意形塑本院人道危機，削弱民眾信任。公關發言人（施丞貴副院長，公務機簡碼69181；代理人行政副院長黃雅芳，簡碼 61414）立即啟動<strong>「網路認知防禦、人道救援事實發布與媒體動線管制 SOP」</strong>。</p><p>發言官施丞貴重申<strong>「單一官方窗口發言原則」</strong>，嚴禁任何醫護或外包保安私自向媒體發表評論或將院內照片上傳社群。資源發展中心管理師杜環境（分機3932） 實施 <strong>24 小時戰時輿情監控</strong>：</p><p>1.  *撰擬權威闢謠聲明*：於 <strong>1 小時內</strong>    發布事實澄清稿及發言官說明影片，澄明：「本院秉持人道關懷，配合政府對滯留移工實施正常急診救治與物資安撫，急診在    Downtime Downtime 降級備援流程下正常收治，無人被拒，物資供應穩定」。</p><p>2.  *定型化闢謠海報實體部署*：公關組印製大量多國語言之闢謠澄清海報，附加醫院    Logo    浮水印，並於最顯眼處固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>    海報實體張貼於掛號櫃檯、藥局發藥窗口及急診入口，導引輕症分流、穩住人心。</p><p><strong>確實數據與資源規劃</strong>： 公關發言人（施丞貴）於 <strong>韓偉大樓一樓</strong>設置實體「媒體採訪接待區」，嚴格管制媒體記者動線，嚴禁媒體任意闖入 B1地下醫療替代空間或對正在接受 PFA之移工及死傷者進行無端拍攝。若媒體有採訪需求，公關組會同社工室，徵得當事人或其駐台辦事處同意並簽署「病患肖像權使用同意書」後，由接待人員全程陪同方可採訪，死守社會信任防禦線。</p><p><strong>指揮與管制（HICS 對接）</strong>： 發言官施丞貴（簡碼 69181）隨時向事故指揮官劉思源（簡碼 69086） 報告最新輿情動態與事實發布成果。</p>"}, {"stage": 5, "scenario_id": "08", "scenario_title": "戰後穩定", "datetime": "", "summary": "國軍反擊作戰持續推進，屏東地區敵軍約2,000餘人棄械投降，由國軍依戰俘處理程序集中收容、清點識別及安全管制；戰場態勢逐步穩定，政府持續發布查證訊息，民心士氣與社會運作逐步回穩。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：國軍反擊作戰持續推進，屏東地區敵軍約 2,000餘人棄械投降，戰場態勢逐步穩定，政府發布查證訊息，民心士氣與社會運作逐步回穩，但本院仍極易面臨「戰後復原、特工破壞、停診謠言與人心重建」之關鍵輿論危機。公關發言官施丞貴副院長（代理人：行政副院長黃雅芳，公務機簡碼61414）立即啟動<strong>「戰場態勢回穩、營運功能恢復與社會信心重建計畫」</strong>。</p><p>資源發展中心杜環境師（分機 3932） 實施 24小時輿情監控。發言人會同計畫部長陳志文，於 <strong>1 小時內</strong>撰擬權威新聞發布稿與復原公告：</p><p>1.  *發布營運正常化報告*：向大眾宣告：「本院大連院區安全無虞、備用水電儲備完好，正逐步從    Downtime 紙本手工程序轉入電子 HIS    系統備援運行，急門診與急重症照護、洗腎中心將逐步恢復常態，藥品衛材充足，請民眾安心就醫」。</p><p>2.  *澄清海報與官網更新*：於本院官方網站、LINE    官方帳號群發最新就醫指南，並於院內批價、發藥櫃檯張貼全新之「復原開診海報」，海報上固定標註：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>    以權威、透明的Facts（事實）穩住社會大眾就醫信心。</p><p><strong>確實數據與資源規劃</strong>： 公關組會同人資組，針對參與持久戰、堅守 B1地下替代空間、實施 A-B班 12小時強制輪替之核心醫護與同工，編製「戰時勇士榜與影像紀錄特輯」，每日定時於院內有線電視牆、廣播大聲公系統進行播發。</p><p><strong>指揮與管制（HICS 對接）</strong>： 公關發言官施丞貴（簡碼 69181）隨時與指揮官劉思源（簡碼 69086）及執行部長對接，回報最新社會輿情與媒體正面報導反饋。</p>"}, {"stage": 1, "scenario_id": "01", "scenario_title": "認知作戰／心理戰", "datetime": "", "summary": "中國持續升高對臺複合式壓力，藉聯合演訓掩護兵力前推部署，逐步壓縮戰略預警空間；散布「國際支援難以介入」、「政府決策失靈」及「南部防線即將失守」等論述，企圖削弱民心士氣、動搖政府威信並擴大社會不安。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    當中國持續升高複合式壓力，並於網路社群及媒體散布「國際支援難以介入」、「政府決策失靈」及「南部防線即將失守」等虛假論述，企圖瓦解前線軍民士氣時，公關發言組（發言官施丞貴副院長，公務機簡碼    69181；代理人黃雅芳副院長，簡碼 61414）必須在 <strong>30 分鐘內</strong>    啟動防禦機制。發言官立即向全院 1,479    名同工重申<strong>「單一官方窗口發言原則」</strong>，嚴禁任何一線臨床醫護、工務、保全及清潔人員私自對外發表評論或在私人    LINE 群組及社群平台（如    Facebook、Threads）轉傳未經證實之備戰照片，防止院內防護弱點與敏感醫療整備數據外洩。</li><li>資源發展中心管理師杜環境（分機 3932）立即進駐 HICS    地下指揮所，開啟<strong>「輿情 24    小時戰時監控系統」</strong>，密集鎖定主流媒體、SNG    連線、網路新聞、爆料公社及地方社群。一旦偵測到針對本院之不實停診、關閉或物資斷供之謠言，發言組必須在    <strong>1 小時內</strong> 撰擬權威澄清稿。</li><li>澄清新聞稿與實體海報一律套用本院「定型化防偽模板」，海報內必須加置本院    Logo    浮水印，並於版面最顯眼處以加大字體固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>    所有澄清稿均須經指揮官劉思源副院長（簡碼    69086）手寫簽章核可後，方得群發至各大媒體及院內 Team+    系統，並主動於大連院區門診大廳有線電視牆、官網及實體佈告欄進行同步播發，構築起鋼性「認知防禦線」。</li><li><strong>實際確實數據</strong>： 發言組針對全院 <strong>1,479 名在勤員工</strong> 實施 Team+    與簡訊群發，澄清率目標達到 <strong>100%    覆蓋</strong>。每日上午與下午定時發布「屏基醫療韌性狀態報告」，具體公開本院核心醫療量能（<strong>635    床總床位</strong>，含一般病床 356 床與特殊病床 279    床）運作一切正常，以理性、鋼性的數據粉碎虛假輿情，穩定院內醫護與社會大眾防衛信心。</li></ul>"}, {"stage": 1, "scenario_id": "05", "scenario_title": "動員整備", "datetime": "", "summary": "屏東縣後備指揮部協調縣政府消防、警政及相關局處進駐，開設「動員暨民力協調組」實施演練；同時轄內常、後備部隊依令進入戰術位置，預置支援地方應變及後續作戰所需人力與資源。惟資訊未即時對外說明，造成部分單位及民眾誤解，並遭外部認知作戰放大疑慮。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    屏東後備指揮部與縣府開設「動員暨民力協調組」演練，轄內部隊進入戰術位置。因動員整備資訊未即時對外說明，造成民眾誤解，並遭敵對勢力於網路社群及媒體擴大認知作戰、渲染「政府隱匿軍事衝突、屏基即將停診避難」之不實輿情。公關發言人（施丞貴副院長，公務機簡碼    69181）必須立即主動出擊，啟動<strong>「動員整備闢謠與權威發布    SOP」</strong>。</li><li>資源發展中心同工（杜環境，分機 3932）在 <strong>1 小時內</strong>    對接地方政府與後備指揮部新聞官，獲取確實數據，撰擬權威新聞澄清稿向各大媒體及社群平台發布。</li><li>闢謠澄清海報與官網公告一律使用固定模板，附加醫院 Logo    浮水印，並固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>    海報由 Runner    徒步張貼於大門口、急診掛號台、各病房電梯口，澄清「醫院並未關閉，急診與急重症照護照常運作，軍民動員整備旨在提升全社會防禦韌性」之    Facts（事實），迅速安定在院病人、家屬與社會大眾之恐慌情緒。</li><li><strong>實際確實數據</strong>： 發言組會同人資組，向全院 <strong>1,479 名同工</strong>    及在院住院患者家屬發送 Team+ 及官方 LINE 通報，澄清覆蓋率達    <strong>100%</strong>。發言人指出本院與軍方、地方政府同步運作，維持備戰常態，呼籲民眾勿轉傳任何未經證實之短影音或傳單。</li></ul>"}, {"stage": 1, "scenario_id": "06", "scenario_title": "網路攻擊／資訊安全", "datetime": "", "summary": "屏東縣政府對外資訊服務系統中斷，縣府全球資訊網並遭網頁置換，影響即時發布應變、疏散及協同作戰資訊；相關畫面經媒體與社群反覆轉載後，進一步擴大輿情波動。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    縣府官網遭置換的畫面經媒體及社群反覆轉載，引發群眾對「政府指揮癱瘓、本院亦遭網攻停診」之恐慌性傳播，大批驚慌民眾企圖衝入本院搶藥或查詢。發言官施丞貴副院長（代理人黃雅芳副院長，公務機簡碼    61414）立即啟動<strong>「資安事件輿情澄清與媒體管制 SOP」</strong>。</li><li>資源發展中心杜環境（分機 3932）在 <strong>1 小時內</strong>    對接資訊室，掌握「本院對外主動隔離網路、內部 HIS 及急診運作 100%    正常安全」之鋼性 Facts（事實）。</li><li>發言組迅速發布新聞稿及實體公告海報，一律附加醫院 Logo    浮水印並固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>    海報實體部署於掛號大廳、急診哨口。</li><li>發言官於韓偉大樓 1    樓設置實體「媒體採訪接待區」，嚴格管制媒體記者動線，嚴禁記者任意闖入機房或臨床區域拍攝。若有採訪需求，公關組會同社工室實施一對一徵詢，簽署「病患肖像權使用同意書」，由接待人員全程陪同，死守社會信任防禦線。</li><li><strong>實際確實數據</strong>： 發言組透過 Team+ 系統向全院 <strong>1,479 名同工</strong>    發送統一的「資安應變與澄清說帖」，指導一線櫃檯與病房同工，面對家屬詢問時，對外回答口徑百分之百一致，徹底杜絕謠言滋生。</li></ul>"}, {"stage": 1, "scenario_id": "09", "scenario_title": "認知作戰／假訊息", "datetime": "", "summary": "網路社群大量流傳中國領導人對臺談話內容，並同步散布「臺灣已遭封鎖」、「屏東能源與民生物資即將斷供」及「政府應變失能」等不實訊息，透過認知作戰操作擾動民眾預期，製造社會不安。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    網路社群大量散布中國領導人對臺談話及「臺灣已遭封鎖」、「屏東能源與民生物資即將斷供、政府應變失能」等錯假訊息，企圖製造本院就醫民眾的大範圍恐慌與擠兌藥物、物資風潮。公關發言人（施丞貴副院長，公務機簡碼    69181；代理人黃雅芳副院長，簡碼    61414）立即啟動<strong>「不實輿情澄清與防偽權威發布 SOP」</strong>。</li><li>資源發展中心同工（杜環境，分機 3932）實施 24    小時戰時輿情監控，與工務室、藥劑部及資材組橫向核實，掌握本院「戰備柴油可撐    77 小時、地下戰備水井日產 1,958 噸、備用藥品物資高於 72    小時自撐量」之鋼性自撐數據。</li><li>發言組在 <strong>1 小時內</strong>    撰擬澄清新聞稿向媒體發布，並印製實體「澄清物資充足與醫療正常公告海報」。海報一律使用本院防偽模板，附加醫院    Logo    浮水印，並固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>    海報張貼於門診大廳、急診大門口、批掛櫃檯及藥局發藥窗口，主動澄清、粉碎不實謠言，維護醫療秩序。</li><li><strong>實際確實數據</strong>： 發言組會同人資組，向全院 <strong>1,479 名同工</strong>    及在院住院患者家屬發送 Team+ 及官方 LINE 通報，澄清覆載率達    <strong>100%</strong>。發言人指出本院重要藥品及耗材庫存充足、水電自撐正常，呼籲民眾依處方正常領藥、切勿盲目囤藥。</li></ul>"}, {"stage": 1, "scenario_id": "14", "scenario_title": "假訊息攻擊醫療", "datetime": "", "summary": "網路流傳屏東科技產業園區化學物質外洩、屏東基督教醫院受資安攻擊及醫療院所大停電等事件，並散布「疑似人為蓄意破壞」、「敵對勢力已滲透醫療系統」等未經證實訊息，經媒體與社群放大後，影響醫療運作與社會信心。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    網路流傳屏東科技產業園區化學物質外洩、屏東基督教醫院受資安攻擊及大停電等事件，散布「疑似人為蓄意破壞、敵對勢力滲透醫療系統」等不實假訊息。此錯假訊息嚴重動搖社會大眾就醫信心，甚至造成院內同工之防衛信念動搖與家屬集體恐慌。公關發言人（施丞貴副院長，公務機簡碼    69181；代理人黃雅芳副院長，簡碼    61414）立即啟動<strong>「認知戰反制與鋼性數據闢謠澄清 SOP」</strong>。</li><li>資源發展中心同工（杜環境，分機 3932）實施 24    小時戰時輿情監控，與工務室、藥劑部及資材組橫向核實，掌握本院「戰備柴油可撐    77 小時、地下戰備水井日產 1,958 噸、備用藥品物資高於 72    小時自撐量」之鋼性自撐數據。</li><li>發言組在 <strong>1 小時內</strong>    撰擬澄清新聞稿向媒體發布，並印製實體「澄清物資充足與醫療正常公告海報」。海報一律使用本院防偽模板，附加醫院    Logo    浮水印，並固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>    海報張貼於門診大廳、急診大門口、批掛櫃檯及藥局發藥窗口，主動澄清、粉碎不實謠言，維護醫療秩序。</li><li><strong>實際確實數據</strong>： 發言組透過 Team+ 系統向全院 <strong>1,479 名同工</strong>    發送統一的「資安應變與澄清說帖」，指導一線櫃檯與病房同工，面對家屬詢問時，對外回答口徑百分之百一致，徹底杜絕謠言滋生。</li></ul>"}, {"stage": 1, "scenario_id": "16", "scenario_title": "假訊息持續擴散", "datetime": "", "summary": "網路持續流傳化學物質外洩、醫院資安受攻擊及大規模停電等事件，並以剪輯影像及AI生成內容渲染「政府隱匿災情」、「醫院拒收病人」等說法，持續影響醫療秩序與民眾就醫信心。", "detail": "由發言官施丞貴副院長帶領資源發展中心，簡碼69181", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    網路持續流傳化災外洩、大停電及網攻，並以剪輯影像與 AI    生成內容渲染「政府隱匿災情、醫院拒收病人」等說法，持續衝擊醫療秩序。發言官施丞貴副院長（公務機簡碼    69181；代理人黃雅芳副院長，簡碼 61414）立即啟動<strong>「AI    認知戰澄清與實體闢謠防線 SOP」</strong>。</li><li>資源發展中心同工（杜環境，分機    3932）與急診主任、住院組核實，掌握本院「急診未曾中斷、START    分流秩序良好、化災患者 100% 正常收治、床位資源充足」之鋼性 Facts    數據。</li><li>發言組在 <strong>1 小時內</strong>    發布澄清短影音，拍攝急診正常運作之實景實時畫面，以鋼性 facts    粉碎剪輯影像。</li><li>公關組印製實體「澄清拒收病人不實訊息公告海報」，海報一律附加醫院    Logo    浮水印，並固定標註警語：<strong>「請勿轉傳未經證實之網路訊息，所有資訊請以屏東基督教醫院官方公告為準。」</strong>    張貼於大門口、掛號櫃檯、發藥窗口。</li><li>發言官於韓偉大樓 1    樓設置實體「媒體採訪接待區」，嚴格管制媒體記者動線，嚴禁記者任意闖入機房或臨床區域拍攝。若有採訪需求，公關組會同社工室實施一對一誠意徵詢，簽署「病患肖像權使用同意書」，由接待人員全程陪同，死守社會信任防禦線。</li><li><strong>實際確實數據</strong>： 發言組透過 Team+ 系統向全院 <strong>1,479 名同工</strong>    發送統一的「資安應變與澄清說帖」，指導一線櫃檯與病房同工，面對家屬詢問時，對外回答口徑百分之百一致，徹底杜絕謠言滋生。</li></ul>"}]}]}, {"id": "fin", "name": "03　財務／行政部長", "roles": [{"role": "財務／行政部會計組", "entries": [{"stage": 2, "scenario_id": "03", "scenario_title": "軍事動員演習", "datetime": "8月8日 12:00", "summary": "因應敵情發展，屏東地區國軍常備及後備部隊奉令實施「動員演習」，依計畫進入戰術位置並進行兵力、裝備整備與戰場經營；惟部分未完成簽證之物資（如阻絕器材、工程材料及偽裝資材）出現缺口，縣府協調民間通路緊急採購及調度現貨，並由第四作戰區統籌分配。", "detail": "由會計室主任李華敏帶領，分機24", "html": "<p>動員演習情勢緊急，且外部供應鏈出現缺口。會計室主任（李華敏，代理人為管理部部長張隆鐘）立即依戰時行政授權，啟動<strong>「戰時特別預算與經費調度程序」</strong>。全面凍結承平時期繁瑣的行政結報與非緊急採購審核，將預算百分之百專款專用於動員防衛與緊急撤移。會計人員在恩慈大樓一樓或HICS 指揮所旁設立「臨時行政財務中心」。</p><p>會計組同工協同採購組，針對隨動員調撥之大批高價醫療儀器、昂貴藥品（如第一至三級管制麻醉藥品）及備用血袋，進行現場資產核對，填寫實體的「財產轉移紀錄」，執行<strong>雙人雙簽財務勾稽</strong>。這項程序能確保在混亂大動員期間，高價資產權屬完整、帳物相符，落實反資敵與戰時行政合規。</p>"}, {"stage": 3, "scenario_id": "03a", "scenario_title": "動員物資延遲", "datetime": "", "summary": "原定報到之在地營造廠商重型機具（挖土機7部、裝載機5部及傾卸卡車10部）未於時限內抵達指定地點或徵集場；因部分機具仍在外地，且受高屏主要幹道壅塞與交通管制影響，無法如期轉運，致動員進度延滯。", "detail": "由會計室主任李華敏帶領，分機24", "html": "<p>物資動員與重型機具延遲，極易導致本院防衛工程受阻。會計室主任（李華敏，代理人為管理部部長張隆鐘）立即進駐恩慈大樓B1臨時前進指揮所，啟動<strong>「戰時特別預算與特別支付授權」</strong>。會計組召開緊急會議，下達最高財務裁決：「全面凍結常規結報，全院資金百分之百專款專用於撤離與關鍵基礎設施防護緊急採購，豁免繁瑣審核程序，採取手工記帳、事後追溯審計」。</p><p>會計組同工在無網狀態下，改用實體紙本簽收簿、手工開立特別派令與支票。針對緊急外購或徵用之鏟裝機、阻絕器材、防爆沙包等現貨物資，執行「現場簽證物資雙人雙簽核對」。會計同工會同採購組人員親自至恩慈卸補點，逐項清點運抵之工程衛材與阻絕器械，完成實體「財產接收與資金撥付紀錄表」之雙人手寫簽名核對。</p><p>這項高效的手工財務核銷，能在供應鏈斷鏈的戰時極限狀態下，為採購組調撥機具提供強大的資金信用支持，防止因款項支付延遲導致防護工程斷鏈。</p>"}, {"stage": 5, "scenario_id": "06", "scenario_title": "物資配送受阻", "datetime": "", "summary": "部分沿海配售站與物流據點受砲火波及，縣府於戰火間隙清查受損情形、盤點可用物資並向內陸安全地區轉移；惟台17線及聯外道路受阻，配送動線受限，影響東港、林邊、佳冬及枋寮物資供應效率。", "detail": "由會計室主任李華敏帶領，分機24", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：外部道路管制與社會混亂，極易導致本院因外部供應商對「戰時延期給付」不信任而發生斷藥、斷柴油危機。會計室主任（李華敏，分機24；代理人張隆鐘管理部長）立即啟用<strong>「戰時記帳與採購特別付款豁免機制」</strong>。</p><p>會計組在 <strong>恩慈大樓 B1 備援指揮中心</strong>設立「臨時行政財務櫃檯」，全面凍結常規行政審核：</p><p>1.  *開立特別派令與支票*：在 HIS    電腦網絡癱瘓、無電子簽核狀態下，會計組啟用紙本手寫簽收簿、手工開立戰時特別派令與現金支票，豁免層簽。</p><p>2.  *現場簽證物資雙簽勾稽*：會計同工親至恩慈 1    樓卸補哨位，會同資材組對運抵之管制燃油、昂貴麻醉強心藥物及醫療設備進行現場勾稽，完成實體<strong>「物資造冊簽收表」與資金撥付紀錄</strong>，實施「雙人手寫簽名核對（手寫雙簽）」，確保帳物相符、不落入敵手。    會計組並向所有合作藥商及物流廠商發出「屏基財務健全及戰後特別核結補付鋼性保證書」，全力打消合作商之疑慮，維持戰備供應鏈之運作。</p><p><strong>確實數據與資源規劃</strong>： 會計組與人資組劉淑梅主任（分機 3977）緊密配合，每日現場登記、統計並核算所有參與關鍵設施打包撤離、Downtime傳令兵（Runner）高能耗出勤同工之「戰時危險出勤加給、差假與加班給付」，穩定全院1,479 名同工之民心士氣。</p><p><strong>指揮與管制（HICS 對接）</strong>： 會計室主任李華敏（分機 24）隨時向財務行政部長張隆鐘（簡碼 69496）回報特別預算支用進度與現金結存，以紙本留痕核銷。</p>"}]}, {"role": "財務／行政部管理部與會計組", "entries": [{"stage": 2, "scenario_id": "14", "scenario_title": "金融市場動盪", "datetime": "8月9日 09:00", "summary": "受地緣政治緊張局勢升高影響，臺灣股市出現恐慌性賣壓，外資大量賣超、資金外流，進一步加劇市場不安與民眾對資產安全之疑慮。", "detail": "由管理部部長張隆鐘與會計室主任李華敏共同執行", "html": "<p>地緣政治緊張致股市恐慌性賣壓，外資資金外流，加劇民眾對資產安全之疑慮，本院亦面臨員工與供應商對戰時財務結付之信任危機。管理部部長張隆鐘與會計室主任李華敏立即啟動<strong>「戰時資產保全與特別結付計畫」</strong>。會計組迅速向合作之土地銀行、第一銀行等屏東分行核對本院在行之戰備留存資金，確保戰時特別預算額度隨時可供調撥。</p><p>同時，管理部與會計室主任迅速向本院 1,479 名同工群發信件及 Team+公告，詳細說明：「醫院財務狀況健全、與各大合作金融據點通聯正常，所有薪資、戰時危險加給、差假補貼及採購款項，均會依常規或手工記帳進行雙人雙簽特別核發，請全體同工安心留院服勤，勿因外部金融動盪動搖防衛信心」。會計組並派專人於簡報室（或 B1指揮所）設立諮詢站，提供員工一對一財務答詢，穩定本院總體戰力與民心士氣。</p>"}, {"stage": 2, "scenario_id": "16", "scenario_title": "金融擠兌擴大", "datetime": "8月9日 12:00", "summary": "擠兌情形經社群擴散後，帶動屏東市、潮州鎮、東港鎮及內埔鄉之農會、郵局與金融機構出現集中提領，造成現金調度壓力、營運負荷增加及周邊交通壅塞。", "detail": "由管理部部長張隆鐘與會計室主任李華敏共同執行", "html": "<p>全縣爆發大範圍金融擠兌，現金調度壓力與供應商恐慌劇增。管理部部長張隆鐘與會計室主任李華敏立即召開跨部門緊急會議，啟動<strong>「平戰轉換現金與帳務應變SOP」</strong>。會計組精算本院每日零用金、急藥採購與膳食補給之現金消耗速率，確認本院保險櫃內之實體戰備現金庫存完整，並由安全官杜傳榮派人看守。</p><p>為安撫合作藥商與衛材供應商，採購與會計組迅速向各合作合約廠商發出書面保證說帖，說明：「本院財務資金已完成保全與鎖定，所有採購款項與危險出勤加給，在銀行通訊異常期間一律採『記帳、手工簽證、待戰後核結補付』之寬限程序，本院依合約完全承擔支付責任，請供應商正常供貨」。這項鋼性保證能有效避免本院因外部擠兌面臨斷藥或斷料危機，保障 72小時連續營運。</p>"}]}, {"role": "財務／行政部人資組", "entries": [{"stage": 2, "scenario_id": "20", "scenario_title": "緊急命令／全國動員", "datetime": "8月13日 08:00", "summary": "總統依局勢發展於國安會議後發布緊急命令並實施全國動員，受徵用之人員與物資依通知向指定地點或聯合徵集場報到。屏東縣各警察分局完成召集令送達，縣府相關業管單位及屏東監理站同步執行物力動員徵購徵用書送達。", "detail": "由人資室主任劉淑梅與戴雅佩組長帶領，分機22", "html": "<p>總統發布緊急命令實施全國動員，受徵用人員與物物資向指定地點報到，屏東監理站與縣府執行物力動員徵購徵用書送達。人資室（劉淑梅主任，分機3977；代理人戴雅佩組長）立即啟動<strong>「戰時緊急人力動員與強制輪班機制」</strong>。人資組配合政府召集令，對接後備指揮部與民力協調組。</p><p>人資室利用 Team+、簡訊（SMS）及 Line發布一呼百應動員通報，強制召回召集全院核心醫護（特別是外科、骨科、麻醉科、急診、ICU、病歷、藥劑、醫檢同工）及工務、保全技術人力。人資組於 <strong>恩慈大樓一樓</strong>開設「戰時動員報到站」，人資同工核對召回同工身分卡，對比人資召回名冊與排班表。人資長（劉淑梅）精算召回出勤率，為防範長期高壓之戰鬥疲勞，全院由三班制切換為<strong>12 小時雙班輪替制（A、B 雙班制）</strong>。人資組為報到同工發放防偽識別背心與任務臂章（資訊人員：粉紅色背心；Runner：紅色臂章），並建立第二線職務代理人名冊，確保核心醫療單位於極限動員下維持72 小時連續戰力。</p>"}, {"stage": 5, "scenario_id": "03", "scenario_title": "後備動員困難", "datetime": "", "summary": "因應戰況需求，後續動員屏東地區後備軍人約3,600人，惟民眾配合疏散撤離、人口流動頻繁，召集對象行蹤不易掌握；警察局持續協助送達召集令，仍面臨通訊中斷與回覆延宕，影響動員時效。", "detail": "由人資室主任劉淑梅與戴雅佩組長帶領，分機3977", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：因戰況惡化，後續動員屏東地區後備軍人約 3,600人，但民眾配合疏散人口流動頻繁，召集對象行蹤不易掌握，且伴隨通訊中斷與回覆延宕，影響動員時效。本院面臨嚴重的核心醫護與工務技術人力召回受阻、排班出現斷鏈之危機。人資室主任劉淑梅（分機3977；代理人戴雅佩組長，分機 3977）立即啟動<strong>「戰時極限人力動員、強制雙班輪替與職務代理 SOP」</strong>。</p><p>在外部行動網路與市話大範圍異常之極端情境下，人資組改用「非數位召回程序」：指派各棟大樓之Runner（徒步傳令兵，佩戴紅色專屬 Runner 臂章）攜帶實體「緊急召回令與排班派令」，直接步行或利用備用機車，至居住於<strong>本院1 公里內（30分鐘內可到院）的核心同工（包含外科、急診、加護病房醫護、血庫醫檢師、工務與保全技術同工，計召回47 名護理人員及 31 名醫務同工）</strong>住所，執行現場召集與通知。</p><p>人資組於 <strong>恩慈大樓一樓門大廳</strong>開設「戰時動員報到站」，由人資同工執行實體身分識別與防偽核對。為防範長期高壓之戰鬥疲勞，人資長（劉淑梅）立即拍板「12小時 A、B 雙班強制輪替排班制」：全院到勤同工強制實施 12小時一班、時間到強制下線退往地下避難休憩站（設於約翰 B1員工運動中心）休息，確保同工每 24 小時有 8小時之不被打擾睡眠時間，穩定醫院持久戰鬥力。</p><p><strong>確實數據與資源規劃</strong>：人資室（劉淑梅主任）根據持久作戰需求，精算最低安全照護護病比人力：</p><ul><li><strong>臨時一般病房（B1 共 36 床）</strong>：護理排班採護病比 <strong>1:9 至 1:16</strong>    彈性排班。</li><li><strong>臨時 ICU（B1 共 23 床）</strong>：配置護理師 <strong>24 人</strong>（護病比    1:21:3，每班配置 8 人，採上 23 天休 1\\~2 天）。</li><li><strong>臨時開刀房／恢復室</strong>：手術、麻醉與復甦團隊，每班配置 <strong>37 人</strong>。</li><li><strong>臨時檢驗科（血庫）</strong>：召回醫檢師以 30% 估算共 <strong>12 人</strong>（每班 12    小時配置 3 人，上 23 天休 12 天）。    上述精算之排班名冊與到勤出勤率每日手寫登記造冊，由人資組核算其戰時危險加給。</li></ul><p><strong>指揮與管制（HICS 對接）</strong>：劉淑梅主任隨時與財務行政部長管理部部長張隆鐘（公務機簡碼 69496）對接，手動計時並記錄 Downtime期間所有同工出勤工時計值，確保戰時行政合規。</p>"}, {"stage": 1, "scenario_id": "05", "scenario_title": "動員整備", "datetime": "", "summary": "屏東縣後備指揮部協調縣政府消防、警政及相關局處進駐，開設「動員暨民力協調組」實施演練；同時轄內常、後備部隊依令進入戰術位置，預置支援地方應變及後續作戰所需人力與資源。惟資訊未即時對外說明，造成部分單位及民眾誤解，並遭外部認知作戰放大疑慮。", "detail": "由人資室主任劉淑梅與戴雅佩組長帶領，分機3977", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    配合後備指揮部動員與民力協調組之演練，本院財務行政部人資組（人資室劉淑梅主任，分機    3977；代理人戴雅佩組長）立即啟動<strong>「戰時緊急人力召回、編班與強制輪班機制」</strong>。人資組利用    Team+ 內網通訊、簡訊（SMS）及 LINE    官方管道，向全院發布一呼百應緊急動員通知。</li><li>人資同工於 <strong>恩慈大樓一樓大廳</strong>    開設實體「戰時動員報到站」，人資同工現場核對召回人員之實體身分卡，對比人資召回名冊與排班表。</li><li>為防範長期高壓之戰鬥疲勞與防衛心理崩潰，人資長（劉淑梅）立即拍板「12    小時雙班強制輪替排班制（A、B 雙班制）」：全院到勤同工強制實施上 12    小時、強制下班休憩 12    小時，並預置第二線職職務代理人名冊。報到同工一律發配防偽背心及任務臂章（資訊人員佩戴<strong>粉紅色識別背心</strong>；傳令兵佩戴<strong>紅色    Runner 臂章</strong>），由保全嚴格查驗，確保在極限動員下維持 72    小時連續運作量能。</li><li><strong>實際確實數據</strong>： 人資組精算：本院全體同工共 <strong>1,479    人</strong>。依據第一波降載與動員整備計畫，緊急召回居住於<strong>本院 1    公里內（30 分鐘內可到院）之核心醫護與技術骨幹共計 78    人</strong>（含護理人員 47 名、醫檢與工務保全同工 31    名）至指定集結點報到，確保核心醫療單位於整備期維持 100% 戰力。</li></ul>"}]}]}, {"id": "ict", "name": "04　資通訊支援組", "roles": [{"role": "機構持續運作處／資通訊支援組（資訊室）", "entries": [{"stage": 2, "scenario_id": "10", "scenario_title": "通信干擾／假訊息", "datetime": "8月9日", "summary": "敵對勢力利用軟體定義無線電設備，於屏東火車站、潮州火車站及東港轉運站等人潮密集區架設偽裝行動基地台，干擾合法電信訊號並發送偽造緊急告警；另透過簡訊與社群誘導民眾下載不明應用程式，造成混淆與恐慌。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320", "html": "<p>當發現院內手機訊號出現異常告警與嚴重通信干擾時，資通訊支援組長（蔡哲民資訊長）立即向指揮官與安全官報告，並通報<strong>H-ISAC、刑事警察局、NCC 地方監理站及院內 HICS 指揮中心</strong>。資訊室軟硬體同工立即執行全院網路資安防禦。資訊長迅速下令：「立即對外切斷本院WiFi 及不穩定之公網連線，防止院內行動終端、HIS 及 LIS系統遭受偽裝基地台之惡意軟體橫向滲透與病毒感染」。</p><p>資訊同工在 30 分鐘內，於 HIS系統後台變更通訊參數，群發「本院未發出任何撤離、凍結或緊急移轉通知，請勿下載任何不明應用程式」之Team+ 內網警示。 同時，硬體組確認院內 core HIS 與 LIS電腦改採實體有線骨幹網路傳輸，並啟動獨立頻段之 VHF/UHF定頻無線電對講機，作為地下指揮所與各哨口、醫療紅區之主要語音備援，成功在電磁干擾中死守全院通訊。</p>"}, {"stage": 2, "scenario_id": "11", "scenario_title": "通信基礎設施異常", "datetime": "8月9日", "summary": "屏東、潮州及東港地區電信機房出現系統異常與網路延遲，並伴隨部分基地台通訊負載異常升高；部分區域出現訊號不穩與通話中斷，影響政府通報、金融交易、醫療聯繫及核心資料處理能力。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320", "html": "<p>電信機房系統異常與網路延遲，部分區域基地台通訊負載異常，訊號不穩影響醫療聯繫與金融交易。資通訊支援組長（蔡哲民資訊長，公務機簡碼62320；代理人硬體組長）立即啟動<strong>「有線與無線 PACE備援通訊架構」</strong>。硬體工程師關閉中華電信不穩定路由，切換通訊至本院預先拉設之「專用有線專線」或「微波備援鏈路」，全力維持HIS 與 LIS 之內部網路通訊。</p><p>若外部公網徹底中斷，系統管理組立即啟動全院 Wi-Fi AP 鎖定，<strong>僅允許具有WPA3 企業級安全認證之行動護理車（NIS）與醫用筆電存取封閉式內網</strong>。同時，網路組測試 Team+在本院「全封閉式內網環境」下之獨立語音與視訊通訊品質，確保指揮所可跨棟、跨樓層與B1 臨時病房維持數位通聯。系統組完成核心電子病歷（EMR）之增量備份，並存入專用 USB 存入指揮官Go-Bag，死守醫療核心數據。</p>"}, {"stage": 2, "scenario_id": "12", "scenario_title": "通信服務中斷", "datetime": "8月9日", "summary": "受通訊服務異常影響，屏東市、潮州鎮、東港鎮、枋寮鄉及恆春鎮等地區出現通訊不穩與網路中斷，波及政府通報與金融交易系統；坊間流傳即將「全縣斷網」等訊息，引發集中查詢並進一步加重系統負載。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320", "html": "<p>高屏地區通訊不穩與網路中斷，坊間謠傳即將「全縣斷網」，引發集中查詢，系統負載急劇過載當機。資通訊支援組長（蔡哲民資訊長）立即對指揮官發布「網路癱瘓Downtime 宣告」。 資訊室軟硬體同仁全面執行資安與通信硬阻斷，通知 SOC及調查局。資訊室工程師主動鎖死對外網路出口，全力清洗院內 DDoS 惡意流量。</p><p>在外部通訊完全斷絕之「資訊孤島狀態」下，資訊同工迅速啟用本院備置之<strong>獨立頻段定頻對講機（UHF/VHF）頻道</strong>，派人分發對講機至B1 指揮所、急診、普通病房、ICU、藥局、檢驗科及各保全哨口。同時，硬體組確認架設於頂樓並延伸至 B2備援指揮中心的低軌衛星電話運作良好，作為與地方災害應變中心（LDCC）唯一之法交通報管道，以科技硬防線抵抗資訊癱瘓。</p>"}, {"stage": 3, "scenario_id": "08", "scenario_title": "無人機威脅關鍵設施", "datetime": "", "summary": "屏南地區重要能源與輸配電設施周邊出現不明來源無人機低空盤旋及定點停留，疑似進行設施偵查與目標標定，場站通報相關單位並加強警戒、反無人機與監控作業。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320", "html": "<p>當無人機威脅並標定關鍵基礎設施時，極易伴隨高強度的電磁脈衝、射頻干擾及駭客攻擊。資通訊支援組長（蔡哲民資訊長，公務機簡碼62320）立即啟動「資安防範與 PACE 通訊防禦 SOP」。資訊同工（系統管理組）密切監控院內 WiFi、衛星通訊及內網流量，一旦發現射頻干擾或非常態來源連線，立即實施受感染網段實體隔離，關閉外部不穩定路由。</p><p>資訊室工程師主動關閉全院無線公網，切換HIS（醫療資訊系統）、NIS（護理系統）至專用有線乙太網路骨幹進行封閉式傳輸。同時，硬體組將全院通聯轉入 VHF/UHF定頻無線電對講機，作為指揮所與各哨口、臨床紅區主要語音備援。 資安人員將core HIS 重要病歷、人事快照之加密備份 USB硬碟取出，妥善置入隨身「指揮官避難包（Go-Bag）」中由安全官看守，死守本院核心數位數據資產。</p>"}, {"stage": 4, "scenario_id": "08", "scenario_title": "應變指揮中心受損", "datetime": "", "summary": "屏東縣聯合應變指揮管制中心遭無人機攻擊，建築物部分區域坍塌並起火，產生大量濃煙；研判指揮官及多名工作人員受困，傷亡不明，縣府立即啟動備援指揮所與跨區接替機制。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320 / 代理人：硬體組長", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：外部聯合應變中心受損癱瘓，全縣行動通信與廣播發射設施遭摧毀。資通訊支援組長（蔡哲民資訊長）立即啟動<strong>「資訊斷鏈孤島狀態下之通訊防干擾與PACE 語音備援SOP」</strong>。資訊室工程師主動物理關閉對外所有不穩定路由與網際網路出口，徹底隔離本院coreHIS（醫療資訊系統）、NIS（護理系統）與外部受損之網路節點，嚴防敵方特工藉此癱瘓期向院內系統橫向滲透。</p><p>資訊人員迅速於強固的 <strong>恩慈大樓 B1（或 B2 地下指揮中心）</strong>架設並測試低軌衛星電話與衛星天線設備，確保與衛福部應變中心（EOC）、高屏區EOC 保持唯一之數位數據通聯。 同時，網絡組技術員將備用之 VHF/UHF定頻無線電對講機頻道，精準分發至HICS地下指揮所、各哨口保全人員及臨時急診、開刀房、ICU。資訊長蔡哲民（簡碼62320）透過內網群發 Downtime Downtime宣告，要求全院臨床單位砸開「當機緊急箱」，全面轉入紙本手工病歷與處方流程，利用紅色Runner（傳令兵）傳遞醫囑與紙本檢驗危險值。</p><p><strong>2. 確實數據與資源規劃</strong>：資通訊支援組盤點院內備用通訊硬體：配備有線分機 700支、行動分機99支、手持 VHF/UHF 對講機 50支，低軌衛星電話1台，均完成電氣迴路校驗。硬體組將 core HIS核心伺服器主機，物理遷移至地下一樓既有機房，確保連接至UPS（不斷電系統，負載 10% 可維持 100分鐘）。資訊安全同工將72小時核心電子病歷（EMR）及關鍵人事檔案庫之高強度加密備份硬碟（Veracrypt檔案加密），置入指揮官避難 Go-Bag內，派保全嚴密看守，死守本院核心數位數據。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：資通訊支援組長蔡哲民隨時與計畫部長陳志文、會計組長李華敏對接，手動計時並記錄Downtime 期間所有手工帳務及計時計工，確保財務合規。</p>"}, {"stage": 1, "scenario_id": "06", "scenario_title": "網路攻擊／資訊安全", "datetime": "", "summary": "屏東縣政府對外資訊服務系統中斷，縣府全球資訊網並遭網頁置換，影響即時發布應變、疏散及協同作戰資訊；相關畫面經媒體與社群反覆轉載後，進一步擴大輿情波動。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    屏東縣政府對外資訊服務系統中斷、官網遭置換，本院面臨極高之橫向駭客攻擊與網攻滲透風險。資通訊支援組長（蔡哲民資訊長，公務機簡碼    62320；代理人硬體組長）立即宣告全院進入<strong>「資安防禦與網段緊急物理隔離程序」</strong>。</li><li>資訊室工程師主動鎖死對外所有不穩定路由與網際網路出口，徹底隔離本院    core    HIS（醫療資訊系統）、NIS（護理系統）與外部受損之政務網路節點，嚴防網頁置換或惡意代碼藉由共用骨幹橫向滲透院內網路。資安團隊在    30 分鐘內通報 <strong>H-ISAC、衛服部 EOC 及國家資安通報中心</strong>。</li><li>資訊同工利用安全內網及 Team+    系統，群發資安警示，變更後台通訊參數。硬體組技術員迅速檢查院內 core    伺服器主機運轉狀態，確認連接至 UPS（不斷電系統，在負載 10% 下可自撐    100 分鐘，在負載 30% 下可自撐 30 分鐘）。</li><li>網路同工確保院內 Wi-Fi AP 實施最嚴格之 WPA3    企業級安全鎖定，<strong>僅允許具有身份認證之行動護理車（NIS）與醫用筆電存取封閉式內網</strong>，阻斷外部不明射頻與惡意入侵。</li><li><strong>實際確實數據</strong>： 資訊安全同工將 72    小時核心電子病歷（EMR）、人事資料及財務結算庫之高強度加密備份硬碟，物理取出裝入「指揮官避難包（Go-Bag）」，派保全嚴密看守。在資安事件完全解決、流量清洗完畢前，不重啟外部公網，死守院內核心數位數據安全。</li></ul>"}, {"stage": 1, "scenario_id": "07", "scenario_title": "網路攻擊／通信中斷", "datetime": "", "summary": "灰色地帶騷擾持續升高，敵對勢力針對南部通信節點展開系統性攻擊，中華電信屏東、潮州及東港地區機房遭滲透與網攻，部分核心資料節點受損，造成行動通信、市話及網路服務不穩，線上交易與行動支付驗證異常。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    敵對勢力針對南部通信節點展開系統性攻擊，中華電信屏東、潮州機房遭網攻滲透，造成本院大連院區行動通信、市話及網路中斷，HIS/EMR/LIS    運作陷入癱瘓，線上交易與支付驗證異常。資通訊支援組長（蔡哲民資訊長，公務機簡碼    62320；代理人硬體組長）立即啟動<strong>「有線與無線 PACE    備援通訊架構與系統當機（Downtime）宣告」</strong>。</li><li>硬體工程師立即切換通訊至本院預先拉設之「專用有線專線」或「微波備援鏈路」，全力維持    HIS 與 LIS 之內部封閉式區域網路傳輸。</li><li>在外部通信完全斷絕之極端情境下，資訊室在 <strong>30 分鐘內</strong>    迅速啟用並分發本院備置之<strong>獨立頻段定頻對講機（UHF/VHF）</strong>至 B1    臨時指揮所、急診、各普通病房、ICU、藥局、檢驗科及各保全哨口，實施人工語音備援通聯。</li><li>系統組同工測試 Team+    在本院「全封閉式區域網路（Intranet）」下之獨立通訊品質，維持院內內部數位聯絡，並指派    Runner 以物理傳遞方式運送實體備份檔案，以科技硬防線抵抗通信中斷。</li><li><strong>實際確實數據</strong>： 資通訊支援組清點院內備用通訊硬體：配備有線分機    700 支、行動分機 99 支、手持 VHF/UHF 對講機 50 支，低軌衛星電話 1    台，均完成電氣迴路校驗。硬體組將 core HIS    核心伺服器主機，物理遷移至地下一樓既有機房，確保連接至    UPS（不斷電系統，負載 10% 可維持 100分鐘）。資訊安全同工將    72小時核心電子病歷（EMR）及關鍵人事檔案庫之高強度加密備份硬碟（Veracrypt    檔案加密），置入指揮官避難 Go-Bag    內，派保全嚴密看守，死守本院核心數位數據。</li></ul>"}, {"stage": 1, "scenario_id": "14", "scenario_title": "假訊息攻擊醫療", "datetime": "", "summary": "網路流傳屏東科技產業園區化學物質外洩、屏東基督教醫院受資安攻擊及醫療院所大停電等事件，並散布「疑似人為蓄意破壞」、「敵對勢力已滲透醫療系統」等未經證實訊息，經媒體與社群放大後，影響醫療運作與社會信心。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    針對謠傳本院遭受資安攻擊與滲透破壞，且通信、掛號、電子病歷部分延遲。資通訊支援組長（蔡哲民資訊長，公務機簡碼    62320；代理人硬體組長）立即對指揮官發布「資安防範與 core HIS    網路安全鎖定宣告」。</li><li>資訊工程師主動關閉本院與外部網路的所有不必要數據接口，切換為「封閉式區域網路環境（Intranet）」，對醫院核心    HIS、NIS、LIS 及病歷伺服器進行邏輯隔離。</li><li>硬體組技術員於 30    分鐘內，在實體指揮所架設獨立之「降載暨醫療量能戰情面板」（網址：<strong>https://ci-board.ptch.org.tw</strong>），自動抓取內網數據，並在後台設置具身份身份安全認證之手動輸入界面，供各部門指派專人定期登錄物資與床位數據，以鋼性數據向指揮部提供透明決策。</li><li>資安同工會同安全管制處，對機房終端機、實體網路線路、交換機房實施機械物理防護鎖閉，加派保全實體看守，嚴防第五縱隊特工進行實體物理植入或滲透破壞，死守醫療核心數據。</li><li><strong>實際確實數據</strong>： 網路組技術員完成 EMR    電子病歷、員工名冊及核心資產資料庫的增量備份，將加密備份 USB    硬碟（Veracrypt 檔案加密）交由指揮官避難包 Go-Bag    看管，確保在外部電信癱瘓與資安網攻時數據資產 100% 完好無缺。</li></ul>"}, {"stage": 1, "scenario_id": "15", "scenario_title": "醫療量能衝擊", "datetime": "", "summary": "傷患陸續送往屏東基督教醫院等急救責任醫院，短時間內約40餘人就醫，院方啟動毒化災與大量傷患應變機制；同時醫療資訊系統遭勒索軟體及DDoS攻擊，電子病歷與掛號系統運作異常，影響急診收治、手術調度及病人辨識。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    當醫院核心掛號、電子病歷（EMR）、藥局、檢驗、PACS（醫療影像系統）及掛號批價系統遭受高強度勒索軟體與    DDoS    攻擊、全面陷入異常延遲或癱瘓時，資通訊支援組長（蔡哲民資訊長，公務機簡碼    62320；代理人硬體組長）立即對指揮官發布「資安事件 DDoS/勒索軟體    Downtime 宣告」。</li><li>資訊室工程師立即關閉對外所有網路出口，<strong>實施受影響網段實體隔離，防止勒索軟體橫向擴散至其他未受感染的醫療大樓核心伺服器</strong>。資安組迅速通報    <strong>H-ISAC、衛福部 EOC 及國家資安應變中心</strong>。</li><li>為保障急診收治與手術調度，硬體組工程師立即重啟備用內網，採取「離線/Downtime    運作模式」：若 HIS 離線，啟用預先設計之精簡紙本表單；PACS    離線，拍攝手續改採紙本登記，醫療影像則手動拷貝至本院儲備之<strong>「PACS    離線專用筆電」</strong>進行數位顯示，並採人工物理傳遞。</li><li>LIS 離線，醫檢師全面改用手寫檢驗報告單並蓋章，由 Runner    徒步送達診間，確保臨床決策數據不中斷。</li><li><strong>實際確實數據</strong>： 資訊室工程師對 core HIS、EMR    及關鍵資料庫進行最後一次手動增量備份，將高強度加密硬碟裝入指揮官避難包中由保全嚴密看守。資安事件完全解決後，資訊室將組織專人，依當機處理程序，將紙本「造冊簿」上的處方與醫療軌跡，補登錄至    HIS 電腦主機中，確保病歷數據完整性。</li></ul>"}]}]}, {"id": "fac", "name": "05　設施維護暨持續運作處", "roles": [{"role": "後勤部設施設備維護處／工務室", "entries": [{"stage": 2, "scenario_id": "08", "scenario_title": "關鍵基礎設施異常", "datetime": "8月9日 08:00", "summary": "高屏地區天然氣輸配與能源監控系統出現異常警示，部分壓力調節與輸送數據波動，遠端連線紀錄出現非常態來源及通訊中斷；初步研判為控制系統異常或疑似資訊干擾，致南部供氣壓力下降約15%至20%，影響區域能源穩定。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>高屏地區天然氣輸配與能源監控系統異常警示，南部供氣壓力下降約 15% 至20%，區域能源穩定受威脅。設施設備維護處組長（工務室曹宏益主任，代理人唐朝生組長）立即啟動<strong>「天然氣中斷與全院供電調度預案」</strong>。為因應天然氣中斷可能伴隨之電力大範圍限電，工務技術員立即針對總容量<strong>2,800 kW 的緊急柴油發電機組</strong> 執行全功能電氣路網校驗。</p><p>工務同工手動切斷行政大樓、宿舍區、門診非必要空調、景觀照明及部分電梯電源，執行嚴酷之電氣負載卸除（卸至35% 以下負載）。確保發電機組能以極省油模式，<strong>100%絕對死守醫療核心紅區（臨時開刀房、加護病房、血庫冰箱與核心主機房）</strong>。工務同工每2小時巡查各棟發電機油位，確認備用柴油及機組運轉正常，防範電網頻率波動波及醫療精密儀器。</p>"}, {"stage": 2, "scenario_id": "09", "scenario_title": "天然氣管線異常", "datetime": "8月9日", "summary": "連接永安液化天然氣接收站與南部供氣網之管線傳出異常警示，監測系統顯示壓力快速下降及流量波動，天然氣輸送能力受限，造成高屏地區燃氣發電、工業及重要民生用氣調度困難。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>永安天然氣管線壓力下降，輸送能力受限，高屏地區燃氣發電、工業及重要民生用氣調度極度困難。工務室主任曹宏益立即下令全院停止一切常規天然氣耗能系統（如廚房、高壓無菌蒸氣滅菌鍋等），全面轉換為備用柴油、備用電氣或備援冷鏈運作。</p><p>針對滅菌鍋天然氣中斷，工務室切換為備用電熱蒸氣滅菌模式，並與開刀房協調降低非緊急手術器械之周轉。針對全院暖氣及熱水系統，工務室實施定時段限制供應，全力節省備用燃油。發電機工程師實施柴油儲槽油量盤點。目前路加、韓偉大樓之緊急柴油發電機（Cummins ONAN，500 kW）油箱僅 <strong>800L</strong>，在 35% 負載下僅能撐 <strong>8.6 小時</strong>。工務室於 12小時內聯絡柴油供應商<strong>「全盛卓詩凱」（0912-125515）</strong>派加油車前往恩慈1 樓卸補點補油，全力維持電力生命線。</p>"}, {"stage": 3, "scenario_id": "03b", "scenario_title": "無人機偵察威脅", "datetime": "", "summary": "敵方初期運用多架次無人機對東港、大鵬灣、林邊、枋寮、枋山及恆春半島沿海實施偵察，並結合電子干擾誘發防空系統反應；屏東基督教醫院同步啟動院內防空避難機制，執行人員疏散、地下備援醫療空間轉換及急重症持續收治。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>無人機低空偵察與定位威脅，極易對暴露在外的電力、供水及氣體關鍵基礎設施實施目標標定。工務室主任曹宏益立即啟動<strong>「戰時防空視覺遮蔽與機房物理防護計畫」</strong>。工務值班人員在接獲警報 10分鐘內，手動強制關閉全院外牆大型霓虹燈、廣告招牌、門診霓虹及大連路路燈，僅保留地下醫療避難區與臨床紅區之最低度暗光。</p><p>工務同工督導各病房拉下實體避難窗簾，實施嚴格之<strong>「防空燈火管制」</strong>，最大程度降低本院在無人機光學與熱成像鏡頭下的曝露與熱源特徵。同時，水電組同工迅速對緊急發電機房、高壓配電室、資訊伺服器機房及恩慈頂樓水塔之實體防護大門進行機械物理鎖固，加掛防爆掛鎖，配合保全加派實體看守哨，防範特工與無人機實施實體滲透與精準物理破壞。</p><p>針對可能伴隨之水質干擾，工務人員巡檢頂樓水塔安全防護網與封閉閥門，確保本院生命線設施在防空威脅下維持100% 完好性。</p>"}, {"stage": 3, "scenario_id": "05", "scenario_title": "水資源供應異常", "datetime": "", "summary": "屏東主要原水與供水系統受不明來源干擾，造成取水設施異常、輸水管線壓力波動及監控資料不一致，進一步影響屏北、內麟、林邊供水系統及牡丹水庫輸水調度；屏東市、麟洛、內埔、潮州、東港、林邊及佳冬部分地區出現間歇性停水。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>當供水系統受干擾，導致屏東市大範圍間歇性停水，且取水監控數據異常時，本院面臨嚴重斷水危機。工務室主任曹宏益立即啟動<strong>「戰備水井極速切換與維生用水調配計畫」</strong>。本院蓄水池與水塔容量共 <strong>453.9 m³</strong>，在日用量 511.8 m³ 模式下，僅能自撐<strong>0.88 天</strong>（不到一天）。工務人員必須在停水警報發出 10分鐘內，手動強制關閉常規自來水進水閥，防止受污染之外部原水湧入池中。</p><p>機電技術員隨即奔赴醫慢大樓，手動切換至本院地下戰備水井，該水井日供水量高達<strong>1,958 m³/天</strong>，可瞬間將全院供水自撐能力大幅拉升至 <strong>3.82 天</strong>。工務同工實施水資源限額管理：手動關閉全院所有行政、門診及宿舍區之生活用水。將地下水井純化之水，<strong>100%絕對死守供應給血液透析（洗腎）每日必需之 126 噸 RO淨水管路</strong>，此為「不得中斷」之感控紅線，並引導至 B1 臨時手術室與ICU，維持 72 小時關鍵維生用水。</p>"}, {"stage": 3, "scenario_id": "09", "scenario_title": "能源設施爆炸事故", "datetime": "", "summary": "屏南地區能源轉運及輸配電設施疑遭無人機攻擊，部分設備受損並引發局部爆炸與火勢，造成作業人員2人重傷、6人輕傷、另有3人失聯；能源與輸配電作業中斷，造成東港、林邊、佳冬、枋寮、潮州及屏東市部分區域停電，衝擊交通號誌、ATM、醫療與民生用電。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>屏南地區能源與輸配電設施遭攻擊引發局部爆炸，造成作業人員受傷，東港、林邊、屏東市大範圍停電。本院大連院區雙迴路受電無預警中斷。當市電斷絕，自動轉換開關（ATS）在<strong>10秒內自動起動發電機，並於15秒內送電</strong>。工務室主任曹宏益立即啟動<strong>「極限發電負載卸除計畫」</strong>。</p><p>全院緊急柴油發電機共 <strong>5 組（總容量 2,800kW）</strong>。值班工程師立即手動強制切斷行政辦公區、宿舍區、門診非必要空調、景觀照明及部分電梯迴路，將發電負載壓低至<strong>35%</strong> 以下。此卸載程序可確保發電機柴油燃料極限節流，馬可／約翰大樓核心配電盤<strong>在不補油情況下自撐發電達77 小時</strong>。</p><p>工務同工將備用電力 <strong>100% 絕對優先供應至 B1 臨時開刀房、臨時ICU、血庫冰箱及核心機房</strong>，確保維生系統不中斷。機電人員進駐發電機房，隨時監控冷卻水溫，防範其因高溫熱跳脫，死守電力生命線。</p>"}, {"stage": 3, "scenario_id": "10", "scenario_title": "電力基礎設施攻擊", "datetime": "", "summary": "屏東市、潮州及東港地區多處一次變電所疑遭敵特工滲透破壞，設備異常並引發饋線跳脫，造成屏東市大範圍停電與電壓不穩，並波及麟洛、內埔、萬丹及潮州；縣府機關、屏東基督教醫院、產業園區與主要交通號誌均受影響。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>屏東市多處一次變電所遭特工破壞，引發饋線跳脫，致大範圍停電。本院大連院區在市電大當機下，ATS在 10秒內起動柴油發電機送電。工務室主任曹宏益立即下令實施<strong>「戰時配電物理隔離與發電機高溫散熱應變」</strong>。為防範大限電時間延長，工務同工將一般病房、門診空調及不必要之用電插座實施物理切斷。</p><p>電力 100% 死守於 B1 臨時手術室（韓偉 B1腹膜透析室）、臨時加護病房、血庫冰箱（維持 1-6℃ 冷鏈）及核心伺服器。由於高負載發電機極易發生高溫跳脫，曹宏益主任調派 2名機電技術員進駐發電機房，手動啟用冷卻系統旁路水源，並利用臨時拉接的消防水管，對發電機組散熱片實施<strong>人工物理噴淋降溫</strong>，防止其過熱燒毀。</p><p>工務同工盤點發電機油位，路加、韓偉大樓油箱僅 <strong>800 L</strong>，發電時數僅 <strong>8.6小時</strong>，採購組於 12小時內聯繫備援柴油供應商<strong>「全盛卓詩凱（0912-125515）」</strong>派加油車前來緊急補油，全力維持電力防禦。</p>"}, {"stage": 4, "scenario_id": "04", "scenario_title": "關鍵設施撤離", "datetime": "", "summary": "因戰線逼近，屏南地區能源、油料、通信與交通關鍵設施進入緊急應變階段，依計畫執行人員分批撤離、資料備援、關鍵設備停機保護及反資敵作為。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658 / 62020） & 執行部 (王建銘部長", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：當指揮官正式下達關鍵基礎設施物理撤離與停機命令時，工務室主任曹宏益立即下令電氣、空調、氣體工程師，對本院暴露在外的脆弱基礎設施執行<strong>「實體機械鎖固與反資敵（AssetDenial）停機保護 SOP」</strong>。工務同工在 30分鐘內，對約翰大樓 B1核心配電房、工務發電機房、馬太 B1藥庫、資訊伺服器機房及頂樓水塔之實體防護大門進行物理鎖閉，加掛高強度防爆鋼鎖，並切斷台電市電進水與高壓進電開關。</p><p>針對無法移動之重要高價值精密醫療設備（如韓偉大樓 B1MRI核磁共振儀、移動式X光機、血液鑑定儀及核心伺服器主機），工務室會同資訊室、醫工組（林良哲主任），執行<strong>「不可移動資產特別反資敵處置流程」</strong>。在確證撤離指令且無法轉置設備時，工程師手動拆除控制系統之關鍵晶片與通訊介面，將固態硬碟（SSD）進行物理磁化或銷毀，抹除所有病患個資，並填寫「財產處置／毀損紀錄表」，由工務室主任與醫務部主管執行<strong>「雙人雙簽核實留痕」</strong>。這項程序能確保本院關鍵醫療硬體不被敵方徵用或利用，同時符合國家保險理賠與戰後復原重建之理賠佐證法規。</p><p><strong>2. 確實數據與資源規劃</strong>：工務技術員在執行全院大停機保護前，必須實施「發電機柴油儲量及負載最後分配」：為維持B1臨時加護病房（23床）及臨時手術室重症患者之最後生命支持，工務室啟動馬可／約翰大樓配電盤旁之發電機（容量500 kW），精算在 35%最低負載下，以每小時最低耗油率，死守核心大樓供電至最後一名重症患者安全抬上救護車為止（最大可自撐77小時連續發電）；完成最後撤離後，工程師關閉燃料總閥、手動排空儲油槽，完成全院大停機。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：工務室主任曹宏益將已完成鎖固機房、已停機設施、已處置反資敵設備清單製成實體報表，由Runner 上繳至 HICS 指揮中心。</p>"}, {"stage": 4, "scenario_id": "06", "scenario_title": "供水系統遭破壞", "datetime": "", "summary": "屏北、內麟及林邊等供水系統疑遭敵特工滲透破壞，關鍵設備受損並造成供水異常，致屏東市、麟洛、內埔、東港、林邊及佳冬部分區域供水不穩或中斷；屏東基督教醫院啟動備援供水與用水分級管制。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658 / 62020", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：當供水系統疑遭特工滲透破壞，造成大範圍停水時，本院面臨嚴重的斷水威脅。工務室主任曹宏益立即啟動<strong>「自來水切斷、地下戰備水井手動開拓與供水分級管制計畫」</strong>。工務技術員必須在停水警報發出<strong>10分鐘內</strong>，手動強制關閉常規自來水進水閥，嚴防受特工投毒或化學污染之外部水源湧入本院自來水蓄水池，確保院內既有水質之絕對完好性。</p><p>機電工程師隨即奔赴醫慢大樓，手動開啟本院專屬之<strong>地下戰備水井（日供水量高達1,958噸/天）</strong>，對井水之濁度、pH值實施快速化學檢測，確認安全後，將備用水源手動切換導入院內主要配水管路中，使本院供水自撐時數大幅提升至<strong>3.82天</strong>。 工務室立即執行極限之「水資源限額配給計畫」：手動強切全院所有門診、行政辦公區及宿舍生活用水，水壓 <strong>100%絕對優先且僅供應給血液透析（洗腎）每日必需之 126噸RO淨水管路</strong>，這是洗腎室腎友之生命支持紅線，並引導至 B1 臨時開刀房刷手及ICU 重症病患維生飲用，死守水資源生命線。</p><p><strong>2. 確實數據與資源規劃</strong>：工務室工程師精算：本院自來水蓄水池與水塔容量共 <strong>453.9m³</strong>。若在常規日用量 511.8噸 模式下，不開備用水井僅能自撐<strong>0.88天</strong>；而啟動地下戰備水井（1,958噸/天）後，能全額自撐全院72小時以上。曹宏益主任與在地替代飲用水供應商<strong>「高山行山泉水（0910-788388）」及「賀眾飲水」</strong>保持熱線對接，一旦水井設備受損，立即調派緊急飲用水罐車前往恩慈卸補點緊急注水，並向LJMOC 請求消防水車供水導入。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：工務室主任曹宏益將水質安全指標、水井運轉頻率數據每 2小時更新，由 Runner送往狀況分析處登錄戰情面板。</p>"}, {"stage": 5, "scenario_id": "09", "scenario_title": "民生復原啟動", "datetime": "", "summary": "整體態勢由作戰階段轉入復原階段，中央與地方同步啟動民生恢復及基礎設施修復，優先辦理交通搶通、醫療與供水供電復原、治安維護、受災民眾安置及心理支持；國軍完成傷亡官兵救治、通報關懷及撫卹，地方整合民間資源投入復原。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：中央與地方啟動民生恢復及基礎設施修復，優先辦理交通搶通、醫療與供電供水復原。本院必須在極短時間內完成「雙迴路市電進電重啟、外部供水接通、電氣負載恢復及院舍實體結構安全評估」。設施設備維護處組長（工務室曹宏益主任，公務機簡碼61658；代理人唐朝生組長）立即啟動<strong>「基礎設施市電、供水重啟與大樓實體結構安全盤點計畫」</strong>。</p><p>工務技術員協同台電及自來水廠駐點工程師投入搶修：</p><p>1.  *市電進電與配電盤測試*：在台電雙迴路市電進電開關修復後，工務同工重啟配電盤，逐步關閉運轉達數日、面臨高溫預警之緊急柴油發電機組（5組共    2,800 kW），解除「電氣負載卸除（Load    Shedding）」限制，逐步恢復全院各普通病房、行政、大廳之冷氣空調、霓虹燈與    100% 的電梯電源。</p><p>2.  *外部供水接通與水質檢驗*：自來水廠修復送水管路後，工務組關閉地下戰備水井（日供水    1,958 噸），手動重啟自來水主要進水閥，並對全院自來水蓄水池（容量    453.9 噸）    與頂樓水塔之餘氯、濁度、大腸桿菌群實施水質採樣快篩檢測，確保水質    100% 符合法定感控標準。</p><p>3.  *大樓實體結構安全盤點*：組長曹宏益帶領機電及結構技術工程師，對    Luka、Matthew、Mark、John、Hanwei、Enci    大樓等進行結構與關鍵管線（如液氧中央氣體管路、配電配氣管路）之實體查檢，填寫「震後與戰後基礎設施安全狀態核查表」，核實無虞後呈報執行部。</p><p><strong>確實數據與資源規劃</strong>：工務室（曹宏益主任）精算：市電恢復後，發電機組重回冷機待命狀態，工務同工會同採購組，與柴油廠商全盛卓詩凱辦理戰後柴油採購清結，將發電機備用燃油箱（路加、韓偉大樓Cummins ONAN 500 kW，容量 800 L） 與核心大樓主儲油箱重新注滿至 100%安全儲量，備戰下一次突發危機。</p><p><strong>指揮與管制（HICS 對接）</strong>： 工務室主任曹宏益（簡碼 61658）隨時向後勤部長許慧莉（公務機簡碼 61658）與執行部長回報市電、供水復原進度，以紙本留痕核銷。</p>"}, {"stage": 1, "scenario_id": "03", "scenario_title": "能源與漁業供應風險", "datetime": "", "summary": "屏東沿海地區（東港、林邊、佳冬、枋寮及恆春半島）海域作業受限，漁船出港比例下降約3至5成；高雄永安液化天然氣接收站船舶靠泊風險升高，南部天然氣與電力調度壓力增加。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    屏東沿海海域作業受限、漁船出港下降，且永安天然氣接收站船舶靠泊風險升高，導致南部天然氣與電力調度壓力劇增。本院大連院區雙迴路受電與天然氣管道供應隨時面臨中斷威脅。設施設備維護處組長（工務室曹宏益主任，公務機簡碼    61658；代理人唐朝生組長）立即啟動<strong>「燃油與公用系統緊急備援    SOP」</strong>。</li><li>工務組發電機技術員立即進駐發電機房，針對全院 <strong>5    組緊急柴油發電機組（總容量 2,800 kW）</strong>    進行全套電氣路網、機油、冷卻水箱及自動轉換開關（ATS）之實體查檢。工務同工手動切斷行政大樓、宿舍區、門診非必要空調、景觀照明及不必要之電梯迴路，執行嚴酷的<strong>「電氣負載卸除計畫（Load    Shedding）」</strong>，將用電負載強制壓低至 <strong>35%</strong> 以下。</li><li>工務技術員手動調整配電盤，確保發電機備用電力 <strong>100%    絕對優先且僅供應至開刀房、ICU、血庫冰箱、核心伺服器及急診紅區</strong>，以極省油模式死守本院電力生命線。同時，水電組巡檢頂樓自來水蓄水池，手動關閉不必要的生活用水迴路，全力儲水備戰。</li><li><strong>實際確實數據</strong>：    工務室精算柴油儲量：馬可／約翰大樓核心大樓主儲油槽之存量在 35%    最低負載模式下，可<strong>自撐連續發電 77    小時</strong>；而路加、韓偉大樓之備援油箱僅有 <strong>800 L</strong>，備援發電時數為    <strong>8.6 小時</strong>。曹宏益主任必須在 12    小時內聯繫備援柴油合約商<strong>「全盛卓詩凱」（0912-125515）</strong>派加油車前往恩慈    1 樓停車場卸補點，將路加大樓油箱補滿，防止發電中斷。</li></ul>"}, {"stage": 1, "scenario_id": "08", "scenario_title": "能源供應中斷", "datetime": "", "summary": "受國際能源情勢緊張、海運受限及區域軍事活動升溫影響，天然氣供應波動加劇；南部燃氣機組配合調度降載運轉，區域發電出力下修約15%，部分地區採分段限電及輪替供電，進一步波及工業生產、醫療與民生用電。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    受國際能源緊張及軍事活動影響，南部天然氣供應降載，區域發電下修，部分地區實施分段限電與輪替供電。本院大連院區面臨大範圍市電限電危機。設施設備維護處組長（工務室曹宏益主任，公務機簡碼    61658；代理人唐朝生組長）立即啟動<strong>「全院配電物理隔離與發電機高溫散熱應變計畫」</strong>。</li><li>當市電無預警切斷時，發電機自動轉換開關（ATS）在 <strong>10    秒內自動起動發電機，並於 15    秒內正常送電</strong>。工務同工立即手動強切全院一般病房、門診空調、非必要生活用電及景觀照明，將負載強行壓低至    <strong>35%</strong> 以下，將發電機備用電力 <strong>100% 絕對優先且僅供應給 B1    臨時手術室、臨時加護病房、血庫冰箱（維持 1-6℃ 冷鏈）及核心伺服器</strong>。</li><li>由於高負載發電機長時間運轉極易發生高溫跳脫，曹主任調派 2    名機電技術員進駐發電機房，手動啟用冷卻系統旁路水源，並利用臨時拉接的消防水管，對發電機組散熱片實施<strong>人工物理噴淋降溫</strong>，防止機組過熱燒毀，全力維持備用供電生命線。</li><li><strong>實際確實數據</strong>： 工務室精算柴油消耗：本院備用柴油容量在 35%    最低負載模式下，可<strong>自撐連續發電 77    小時</strong>；而路加、韓偉大樓備用柴油發電機（Cummins ONAN，500    kW）油箱僅有 <strong>800 L</strong>，發電時數僅 <strong>8.6 小時</strong>。工務室於 12    小時內聯繫備援柴油供應商<strong>「全盛卓詩凱（0912-125515）」</strong>派加油車前往恩慈    1 樓卸補點補油，確保發電不斷鏈。</li></ul>"}, {"stage": 1, "scenario_id": "13", "scenario_title": "醫療機構停電危機", "datetime": "", "summary": "屏東地區主要變電設備突發故障，致屏東基督教醫院雙迴路受電中斷，全院無預警停電，嚴重威脅手術中病人及ICU維生系統；備援發電機即時投入，惟1小時後其中一台出現高溫預警，整體供電能力降至約五成，院內燃油存量降至50%以下，急重症照護風險升高。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    屏東地區主要變電設備突發故障，致屏東基督教醫院雙迴路受電無預警中斷，全院陷入大停電。全院緊急柴油發電機組（5    組共 2,800 kW）在 <strong>10 秒內自動起動發電機，並於 15 秒內正常送電</strong>。1    小時後，其中一台 Cummins ONAN 500 kW    發電機因高溫發出異常預警，整體供電降至五成，且燃油降至 50%    以下。工務室主任曹宏益立即啟動<strong>「發電機高溫散熱、配電隔離與緊急外購補油    SOP」</strong>。</li><li>工務組發電機技術員立即進駐發電機房，手動啟用備援冷卻系統之旁路水源，並利用臨時拉接之高壓消防水管，對預警發電機之散熱水箱片實施<strong>人工物理噴淋降溫</strong>，防止機組因高溫熱跳脫而造成電網崩潰。</li><li>工務室執行極限的<strong>「二級電力負載強切計畫」</strong>：除原先已切斷的生活區外，手動切斷一般普通病房、行政辦公區及非必要之醫療儀器電源，將發電電力    <strong>100% 絕對死守供應給手術中開刀房（韓偉 B1）、ICU（韓偉    B1）重症病患維生系統及血庫冰箱</strong>，以「局部犧牲、集中防禦」確保重症生命支持。</li><li><strong>實際確實數據</strong>： 工務室精算柴油消耗：本院備用柴油容量在 35%    最低負載模式下，可<strong>自撐連續發電 77    小時</strong>；而路加、韓偉大樓備用柴油發電機（Cummins ONAN，500    kW）油箱僅有 <strong>800 L</strong>，發電時數僅 <strong>8.6 小時</strong>。工務室於 12    小時內聯繫備援柴油供應商<strong>「全盛卓詩凱（0912-125515）」</strong>派加油車前往恩慈    1 樓卸補點補油，確保發電不斷鏈。</li></ul>"}]}, {"role": "執行部設施運作組／環保室", "entries": [{"stage": 3, "scenario_id": "05", "scenario_title": "水資源供應異常", "datetime": "", "summary": "屏東主要原水與供水系統受不明來源干擾，造成取水設施異常、輸水管線壓力波動及監控資料不一致，進一步影響屏北、內麟、林邊供水系統及牡丹水庫輸水調度；屏東市、麟洛、內埔、潮州、東港、林邊及佳冬部分地區出現間歇性停水。", "detail": "由環保室組長林良哲共同執行", "html": "<p>間歇性停水將直接威脅醫院的環境感控與排泄物清運。環保室組長（林良哲）立即啟動「戰時乾式感控與廢棄物冷凍暫存SOP」。環保同工迅速封閉全院一般洗手間之馬桶，禁止沖水。環保室動員清潔同工，向全院普通病房、ICU 護理站及 B1地下醫療區，主動配發大批<strong>「化學便器袋」與乾洗手消毒液</strong>。</p><p>指導醫護及病患家屬一律使用化學便器袋包覆便器進行排泄。排泄完畢後，由家屬或清潔人員使用密封束帶物理紮緊袋口，防止異味與有毒病原菌擴散。環保室同工（林良哲組長）穿戴 B級防護衣，每班定期清運這些密封便器袋，並啟用地下低溫冷凍貨櫃（溫度維持-18℃以下）進行就地低溫封存，避免因外部垃圾清運中斷而引發地下密閉空間之交叉感染與爆倉風險，以「乾式感控戰術」死守醫院衛生防線。</p>"}, {"stage": 4, "scenario_id": "06", "scenario_title": "供水系統遭破壞", "datetime": "", "summary": "屏北、內麟及林邊等供水系統疑遭敵特工滲透破壞，關鍵設備受損並造成供水異常，致屏東市、麟洛、內埔、東港、林邊及佳冬部分區域供水不穩或中斷；屏東基督教醫院啟動備援供水與用水分級管制。", "detail": "由環保室組長林良哲共同執行", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：供水中斷且全院停水，極易導致密閉的地下避難空間及各病房在短時間內因排泄物無法清理而引發環境衛生崩潰及群聚感染危機。環保室組長（林良哲）立即啟動<strong>「戰時缺水乾式感控與廢棄物冷凍暫存SOP」</strong>。環保同工手動鎖死全院一般洗手間之抽水馬桶，嚴禁沖水，防止管路逆流污染。</p><p>環保室清潔同工穿戴 B級防護衣，向全院普通病房、ICU護理站及地下一樓（B1）避難醫療空間，主動分發大批儲備之<strong>「化學便器袋」與乾洗手消毒液</strong>。指導在院病患及醫護，排泄時一律使用化學便器袋包覆便器。排泄完畢後，由家屬或清潔同工倒入專用固化吸水劑，使用密封束帶物理紮緊袋口，嚴防病原體和化學氣味在地下密閉大樓內發生交叉感染。環保組（室）清潔人員每班定期清運這些密封便器袋，將其物理集中至 B1低溫冷凍貨櫃中（溫度維持 -18℃以下）就地冷凍封存，待戰後通水通電後再行統一無害化清運，以乾式感控戰術死守地下大本營。</p><p><strong>2. 確實數據與資源規劃</strong>：環保室（林良哲組長）盤點院內化學消殺物資與乾式感控資材之安全存量：儲備化學便器袋<strong>2,500個</strong>（以 1,479名員工及病患每日每人 2個消耗精算，可自撐至少5天）、醫療用酒精 30箱、高濃度漂白水15桶，並製成實體紙本庫存表由專人看守。環保同工每班巡檢垃圾暫存區，確保醫療廢棄物在外部清運中斷之「孤島防禦」期間，100%密封、無外洩、無異味，死守環境感控红線。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：林良哲組長將每日化學消殺衛材消耗率及冷凍清運數據，以無線電回報執行部設施運作組長曹宏益，隨時更新至HICS 戰情板。</p>"}, {"stage": 1, "scenario_id": "12", "scenario_title": "化學災害應變", "datetime": "", "summary": "屏東縣政府接獲「屏東科技產業園區疑似無水氨外洩」通報後，立即開設災害應變中心，統合消防、環保、衛生、警政及園區管理單位進行應處，執行警戒、疏散、除污與醫療分流，防止災情擴大。", "detail": "由環保室組長林良哲共同執行", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    化學災害事故發生後，急診臨時除污區清洗無水氨化災患者會產生大量含有毒化學物質之強鹼性化學污水。若直接排入常規管道，將造成本院污水處理廠爆倉崩潰或外部水體污染。環保室組長（林良哲）立即啟動<strong>「戰時化災污水廠緊急溢流隔離與污水池中和處置    SOP」</strong>。</li><li>環保同工穿戴 C    級防護衣物（含防毒面具、防化學手套、耐酸鹼水鞋），手動開啟急診洗消專用管路，將洗消產生的化災污水全數引流至本院<strong>「地下緊急污水隔離暫存池（溢流隔離區）」</strong>中暫存，切斷污水排向外部市政管道，嚴防化學毒物擴散。</li><li>環保技術員對隔離池內污水之 pH    值、氨氮濃度進行快速化學採樣篩檢，手動添加弱酸性中和藥劑及活性炭過濾耗材，對污水實施酸鹼中和與物理吸附定性除污。</li><li>同時，清潔同工對急診大門外之除污完畢車道、走廊、垃圾暫存區實施高濃度漂白水（有效餘氯大於    500    ppm）的實體化學消殺與刷洗，由專人填寫「化災消殺及污水中和紀錄表」，死守醫療核心環境感控紅線。</li><li><strong>實際確實數據</strong>：    環保室林良哲組長盤點消殺防護資材：緊急調撥化學消殺高濃度漂白水 15    桶、醫療用酒精 30 箱、一次性防護衣 100    套，確認污水隔離暫存池容量（最大可容納 <strong>50 噸</strong>    化災洗消污水，可確保本院 72 小時洗消作業不爆倉）安全，確保感控環境    100% 完好性。</li></ul>"}]}]}, {"id": "sec", "name": "06　安全管制處／安全官", "roles": [{"role": "執行部安全管制處（醫勤室保安組）", "entries": [{"stage": 2, "scenario_id": "02", "scenario_title": "軍事威脅／飛彈", "datetime": "8月8日 10:00", "summary": "國防部發布監測資訊，指出自大陸沿岸方向朝臺灣周邊海空域發射多枚飛彈，部分彈道飛越臺灣本島上空，另有飛彈落入周邊海域；相關訊息經媒體即時報導，引發民眾對戰爭風險之疑慮，影響社會穩定。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>國防部發布飛彈發射監測資訊，指出飛彈彈道飛越臺灣本島上空，媒體即時報導引發民眾極度恐慌。本院位於屏東市核心區，極易面臨避難人潮與驚慌群眾強行衝擊院區門禁之危機。安全管制處組長（保安組長王建文）立即下令全院保全與警衛<strong>由常態保全轉為「戰術防衛警備」狀態</strong>。</p><p>保全同工立即關閉全院所有側門、後門、員工地下通道等非必要常態動線，實施全面封閉式管理。</p><ul><li><strong>實體大門管制</strong>：<strong>僅開放「急診出入口」</strong>供員工、救護車傷患及必要公務進出。</li><li><strong>約翰停車場出入口</strong>：設置實體隔離護欄，並架設防撞桿、阻絕沙包與拒馬。除救護車、消防車、警車及持特定通行證之物資車外，<strong>其餘所有民間與家屬車輛一律禁止駛入醫院核心區域</strong>。    保全人員部署於僅開放的通道，手持<strong>金屬探測器進行武器、危險品與易燃物安檢</strong>，強勢阻絕非醫療就醫人員進入院區，死守醫院實體安全界線。</li></ul>"}, {"stage": 2, "scenario_id": "04", "scenario_title": "民力協調", "datetime": "8月8日 16:00", "summary": "第四作戰區因動員演習需求，透過屏東縣「動員暨民力協調組」協請縣政府提供200組水泥紐澤西護欄，並協力運送至台17線雙園大橋屏東端、東港大橋及台1線枋寮段等指定地點，執行交通阻絕與防護部署。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>安全管制處組長（保安組長王建文）針對第四作戰區於周邊關鍵交通節點拉起阻絕之想定，立即啟動院內「交通節點清空與接運區分流管制」。保全人員徹底清理大連路大門及院內車道所有違停車輛與實體障礙。配合到場之武裝民防與警力，保安組將集結點與卸補區實施最嚴格之<strong>「三大接運疏散區」動線絕對分流</strong>：</p><ul><li><strong>救護車專區（急診大門出口）</strong>：僅允許編碼之簽證救護車及軍方衛勤車停靠，作為重症（高度照護）病患之垂直移轉上車通道。</li><li><strong>接駁車專區（門診大廳出口）</strong>：供大巴、中巴集結，快速後送 Level    2、3 輕中症病患。</li><li><strong>私人車專區（恩慈大樓車道）</strong>：供家屬私人車輛接回出院患者。    保全同工指派傳令兵（Runner）站立於車道轉折點，以手勢及大聲公實施人工導引，死守醫院生命運輸動線之暢通。</li></ul>"}, {"stage": 2, "scenario_id": "10", "scenario_title": "通信干擾／假訊息", "datetime": "8月9日", "summary": "敵對勢力利用軟體定義無線電設備，於屏東火車站、潮州火車站及東港轉運站等人潮密集區架設偽裝行動基地台，干擾合法電信訊號並發送偽造緊急告警；另透過簡訊與社群誘導民眾下載不明應用程式，造成混淆與恐慌。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>敵對勢力於屏東、潮州火車站及東港轉運站架設偽裝基地台，發送偽造緊急告警並干擾電信訊號，誘導下載惡意軟體，造成民眾集體混亂與恐慌就醫。本院大連院區及急診入口出現大批受騙、恐慌並企圖衝入搶奪資源之人群。保安組長王建文立即指揮保全同工，於急診大門外拉起實體管制線與阻絕拒馬，封鎖主要通道。</p><p>保全人員實施<strong>「單向安全通道最小化管制」<strong>。所有人員必須在保全與到場之武裝警力監視下，依序接受</st
