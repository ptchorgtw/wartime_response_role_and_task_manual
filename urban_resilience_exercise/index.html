體網路線路、交換機房實施機械物理防護鎖閉，加派保全實體看守，嚴防第五縱隊特工進行實體物理植入或滲透破壞，死守醫療核心數據。</li><li><strong>實際確實數據</strong>： 網路組技術員完成 EMR    電子病歷、員工名冊及核心資產資料庫的增量備份，將加密備份 USB    硬碟（Veracrypt 檔案加密）交由指揮官避難包 Go-Bag    看管，確保在外部電信癱瘓與資安網攻時數據資產 100% 完好無缺。</li></ul>"}, {"stage": 1, "scenario_id": "15", "scenario_title": "醫療量能衝擊", "datetime": "", "summary": "傷患陸續送往屏東基督教醫院等急救責任醫院，短時間內約40餘人就醫，院方啟動毒化災與大量傷患應變機制；同時醫療資訊系統遭勒索軟體及DDoS攻擊，電子病歷與掛號系統運作異常，影響急診收治、手術調度及病人辨識。", "detail": "由資訊長蔡哲民帶領資訊室，公務機簡碼62320", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    當醫院核心掛號、電子病歷（EMR）、藥局、檢驗、PACS（醫療影像系統）及掛號批價系統遭受高強度勒索軟體與    DDoS    攻擊、全面陷入異常延遲或癱瘓時，資通訊支援組長（蔡哲民資訊長，公務機簡碼    62320；代理人硬體組長）立即對指揮官發布「資安事件 DDoS/勒索軟體    Downtime 宣告」。</li><li>資訊室工程師立即關閉對外所有網路出口，<strong>實施受影響網段實體隔離，防止勒索軟體橫向擴散至其他未受感染的醫療大樓核心伺服器</strong>。資安組迅速通報    <strong>H-ISAC、衛福部 EOC 及國家資安應變中心</strong>。</li><li>為保障急診收治與手術調度，硬體組工程師立即重啟備用內網，採取「離線/Downtime    運作模式」：若 HIS 離線，啟用預先設計之精簡紙本表單；PACS    離線，拍攝手續改採紙本登記，醫療影像則手動拷貝至本院儲備之<strong>「PACS    離線專用筆電」</strong>進行數位顯示，並採人工物理傳遞。</li><li>LIS 離線，醫檢師全面改用手寫檢驗報告單並蓋章，由 Runner    徒步送達診間，確保臨床決策數據不中斷。</li><li><strong>實際確實數據</strong>： 資訊室工程師對 core HIS、EMR    及關鍵資料庫進行最後一次手動增量備份，將高強度加密硬碟裝入指揮官避難包中由保全嚴密看守。資安事件完全解決後，資訊室將組織專人，依當機處理程序，將紙本「造冊簿」上的處方與醫療軌跡，補登錄至    HIS 電腦主機中，確保病歷數據完整性。</li></ul>"}, {"stage": 1, "scenario_id": "PTCH-02", "scenario_title": "資訊中斷/網攻", "datetime": "", "summary": "【醫療系統遭勒索癱瘓】院內HIS（醫療資訊系統）與PACS（影像系統）突遭境外惡意程式與DDoS攻擊，電子病歷無法存取、掛號系統死機。院方被迫緊急啟動「紙本盲運作」機制，大幅拖延看診與急救效率。", "detail": "主責人：資訊長蔡哲民，公務機簡碼62320", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>： 當本院核心HIS（醫療資訊系統）與 PACS（醫療影像系統）突遭境外惡意勒索軟體及 DDoS攻擊，導致電子病歷系統無法存取、掛號系統死機癱瘓時，資通訊支援組（資訊長蔡哲民，公務機簡碼62320；代理人硬體組長）必須在接獲警報之 <strong>10 分鐘內</strong>啟動<strong>「資安事件緊急防禦、網段物理隔離與通訊降級備援SOP」</strong>。資訊室硬體組工程師立即實施對外網路實體斷開，對受勒索軟體感染之大樓網段執行<strong>「實體隔離（拔除實體網線）」</strong>，阻止惡意程式在醫院內網主機間發生橫向滲透與大範圍擴散。</p><p>資訊安全工程師應在 <strong>30 分鐘內</strong> 依程序通報 <strong>H-ISAC、衛福部 EOC及國家資安通報中心</strong>，並將 core HIS 與 EMR核心資料庫關閉保護，手動將高強度加密備份硬碟（採用 Veracrypt等檔案加密）從伺服器物理取出，妥善置入隨身<strong>「指揮官避難Go-Bag」</strong>中，由保全人員嚴密看守撤離。</p><p>為確保醫院在資訊全黑下仍能指揮通聯，資通訊支援組立即啟動本院預置之<strong>PACE 語音備援架構</strong>： 在 <strong>恩慈大樓地下一樓備援指揮中心</strong>架設低軌衛星電話及衛星天線，確保與衛福部及作戰區保持唯一數據連線。網路技術員迅速將備用之 <strong>VHF/UHF獨立頻段無線電對講機</strong>（避開受網攻干擾之公網電信）分發至各哨口、急診、病房及工務室，開啟人工語音對講聯絡。資訊長蔡哲民（簡碼 62320）下達當機 Downtime宣告，指派資通訊同工穿戴<strong>粉紅色識別背心及授權臂章</strong>，與行政待命人員一同轉任「徒步傳令兵（Runner）」，以雙腳物理性傳遞紙本醫囑與報表，死守醫療核心通訊不中斷。</p><p><strong>2. 確實數據與資源規劃</strong>：資通訊支援組精算並調配院內備用通訊硬體：配備有線分機 700 支、行動分機 99支、手持 VHF/UHF 對講機 50 支，低軌衛星電話 1 台。硬體組確保核心 HIS伺服器主機已物理遷移至地下一樓既有機房，確保連接至UPS（不斷電系統）；UPS 備援蓄電量在系統 10% 低負載狀態下可<strong>自撐連續運作100 分鐘</strong>（在 30% 負載下可自撐 30分鐘）。資安工程師協助臨床單位在完全斷網狀態下，以紙本數據回補機制對後續復原開診進行備戰。</p>"}]}]}, {"id": "fac", "name": "05　設施維護暨持續運作處", "roles": [{"role": "後勤部設施設備維護處／工務室", "entries": [{"stage": 2, "scenario_id": "08", "scenario_title": "關鍵基礎設施異常", "datetime": "8月9日 08:00", "summary": "高屏地區天然氣輸配與能源監控系統出現異常警示，部分壓力調節與輸送數據波動，遠端連線紀錄出現非常態來源及通訊中斷；初步研判為控制系統異常或疑似資訊干擾，致南部供氣壓力下降約15%至20%，影響區域能源穩定。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>高屏地區天然氣輸配與能源監控系統異常警示，南部供氣壓力下降約 15% 至20%，區域能源穩定受威脅。設施設備維護處組長（工務室曹宏益主任，代理人唐朝生組長）立即啟動<strong>「天然氣中斷與全院供電調度預案」</strong>。為因應天然氣中斷可能伴隨之電力大範圍限電，工務技術員立即針對總容量<strong>2,800 kW 的緊急柴油發電機組</strong> 執行全功能電氣路網校驗。</p><p>工務同工手動切斷行政大樓、宿舍區、門診非必要空調、景觀照明及部分電梯電源，執行嚴酷之電氣負載卸除（卸至35% 以下負載）。確保發電機組能以極省油模式，<strong>100%絕對死守醫療核心紅區（臨時開刀房、加護病房、血庫冰箱與核心主機房）</strong>。工務同工每2小時巡查各棟發電機油位，確認備用柴油及機組運轉正常，防範電網頻率波動波及醫療精密儀器。</p>"}, {"stage": 2, "scenario_id": "09", "scenario_title": "天然氣管線異常", "datetime": "8月9日", "summary": "連接永安液化天然氣接收站與南部供氣網之管線傳出異常警示，監測系統顯示壓力快速下降及流量波動，天然氣輸送能力受限，造成高屏地區燃氣發電、工業及重要民生用氣調度困難。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>永安天然氣管線壓力下降，輸送能力受限，高屏地區燃氣發電、工業及重要民生用氣調度極度困難。工務室主任曹宏益立即下令全院停止一切常規天然氣耗能系統（如廚房、高壓無菌蒸氣滅菌鍋等），全面轉換為備用柴油、備用電氣或備援冷鏈運作。</p><p>針對滅菌鍋天然氣中斷，工務室切換為備用電熱蒸氣滅菌模式，並與開刀房協調降低非緊急手術器械之周轉。針對全院暖氣及熱水系統，工務室實施定時段限制供應，全力節省備用燃油。發電機工程師實施柴油儲槽油量盤點。目前路加、韓偉大樓之緊急柴油發電機（Cummins ONAN，500 kW）油箱僅 <strong>800L</strong>，在 35% 負載下僅能撐 <strong>8.6 小時</strong>。工務室於 12小時內聯絡柴油供應商<strong>「全盛卓詩凱」（0912-125515）</strong>派加油車前往恩慈1 樓卸補點補油，全力維持電力生命線。</p>"}, {"stage": 2, "scenario_id": "PTCH-07", "scenario_title": "供水系統異常", "datetime": "", "summary": "【斷水與洗腎中心危機】屏東市區自來水管線遭破壞降壓，院內頂樓蓄水池水位快速下降。血液透析（洗腎）中心因缺乏RO純水面臨停機危機，近百名洗腎患者面臨無法透析的生命危險，急需調度外部水車支援。", "detail": "主責人：工務室主任曹宏益，公務機簡碼61658 / 62020", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當屏東市區自來水管線遭敵特工破壞降壓、全院面臨斷水危機且頂樓蓄水池水位快速下降時，設施設備維護處（工務室曹宏益主任，公務機簡碼61658 / 62020；代理人：唐朝生組長）必須在接獲警報之 <strong>10分鐘內</strong>，啟動<strong>「自來水切斷、地下戰備水井手動開拓與水資源分級管制計畫」</strong>。工務技術員必須立即趕往總進水機房，<strong>手動關閉全院常規自來水總進水閥</strong>，徹底切斷外部水源，防止特工或敵對勢力在市區水網中投毒或化學污染源回流至院內蓄水池，確保院內殘存水質之絕對完好性。</p><p>工務機電工程師隨後奔赴醫慢大樓，<strong>手動重啟並切換至本院專屬之「地下戰備水井」</strong>。在確認水井抽水泵運轉正常後，化驗工程師立即對抽取之井水實施pH值、餘氯及濁度之化學快速篩檢，確認水質未受污染後，將井水手動導入全院備用水網配水管路中，使本院供水自撐天數大幅提升。</p><p>為因應血液透析（洗腎）中心與手術室的剛性用水，工務室實施嚴酷的<strong>「水資源紅區管制與限額配給計畫」</strong>：工務技術員手動強制關閉門診大樓、行政區、非必要病房之生活用水管道，將地下備用水源之水壓與流量<strong>100% 絕對優先且僅供應至洗腎中心（血液透析組）每日必需之 126 噸 RO淨水管路，以及 B1 臨時手術室（韓偉大樓 B1腹膜透析室）無菌刷手及器械清洗用水</strong>，以「局部犧牲、集中防禦」守住水資源生命線。</p><p><strong>2. 實際確實數據與資源盤點</strong>： 工務主任曹宏益精算水資源數據：本院地下自來水蓄水池與頂樓水塔總容量為 <strong>453.9 m³</strong>，在常規日耗水量<strong>511.8 m³</strong> 模式下，若無戰備井僅能自撐 <strong>0.88 天</strong>。手動切換至醫慢大樓地下戰備水井（日產水量高達 <strong>1,958m³</strong>）後，全院備援自撐天數可極速提升至 <strong>3.82 天</strong>，100%優先保障洗腎中心每日必需的 <strong>126 噸</strong> RO淨水及臨時開刀房刷手用水，死守透析病人生命紅線。</p>"}, {"stage": 2, "scenario_id": "PTCH-10", "scenario_title": "電力基礎受損", "datetime": "", "summary": "【電網波動與設備燒毀】變電所遭滲透破壞，外部供電呈現頻繁跳電與極端電壓不穩（突波）。儘管院內發電機啟動，但瞬間突波導致加護病房（ICU）部分精密維生設備（如高階呼吸器）主機板燒毀，重症照護量能受損。", "detail": "主責人：工務室主任曹宏益，公務機簡碼61658 / 62020", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當外部變電所遭滲透破壞，外部市電呈現頻繁跳電、極端電壓不穩（突波）且波及院內發電機配電網時，設施設備維護處（工務室主任曹宏益，公務機簡碼61658 / 62020；代理人：唐朝生組長）必須在 <strong>5分鐘內</strong>，啟動<strong>「高壓電網突波物理隔離與柴油發電機分級安全供電計畫」</strong>。工務發電機技術員立即奔赴發電機房與主要配電室。</p><p>為了防止不穩定的市電突波直接燒毀院內精密醫療設備，工務同工必須<strong>手動物理拉開「高壓市電進電空開（斷路器）」</strong>，切斷與外部受損電網的實體連接，徹底將本院電網與外界高壓突波實施物理隔離。發電機自動轉換開關（ATS）在 <strong>10 秒內自起動 5 組緊急柴油發電機組（總容量2,800 kW）並無縫送電</strong>。</p><p>針對部分突波導致 ICU與手術室配電盤波動之想定，曹主任親自指揮電氣工程師，手動強切全院非必要普通病房、行政區、宿舍、大廳及80% 的電梯電源迴路，將發電機組負載強制卸除、壓低至最低負載（<strong>發電負載35% 模式</strong>）。工務技術員手動調整配電櫃，將最穩定、無突波的發電機電能，<strong>100%絕對優先且僅供應至 B1 臨時手術室（韓偉 B1）、臨時加護病房（韓偉大樓 B1MRI室）及血庫冰箱、核心伺服器</strong>，並致電備援高壓維修商隆安機電或發電機廠商明威紀元（0933-310332）緊急到院排障，死守本院核心電能生命線。</p><p><strong>2. 實際確實數據與資源盤點</strong>：工務室主任曹宏益精算備用柴油發電續航能力： 全院 5 組柴油發電機總容量<strong>2,800 kW</strong>。在電力負荷卸載至 35%最省油模式下，馬可／約翰大樓（核心大樓）配電盤配有大容量儲油箱，不需補油即可<strong>自行達標連續發電77 小時</strong>。 路加大樓發電機油箱（容量 <strong>800 L</strong>，可撐 8.6小時）與韓偉大樓（油箱 <strong>1,000 L</strong>，可撐 7.6 小時），工務室必須在 <strong>8小時內</strong>協調柴油廠商全盛卓詩凱（0912-125515）派加油車補油，死守醫療紅區電能不中斷。</p>"}, {"stage": 3, "scenario_id": "03b", "scenario_title": "無人機偵察威脅", "datetime": "", "summary": "敵方初期運用多架次無人機對東港、大鵬灣、林邊、枋寮、枋山及恆春半島沿海實施偵察，並結合電子干擾誘發防空系統反應；屏東基督教醫院同步啟動院內防空避難機制，執行人員疏散、地下備援醫療空間轉換及急重症持續收治。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>無人機低空偵察與定位威脅，極易對暴露在外的電力、供水及氣體關鍵基礎設施實施目標標定。工務室主任曹宏益立即啟動<strong>「戰時防空視覺遮蔽與機房物理防護計畫」</strong>。工務值班人員在接獲警報 10分鐘內，手動強制關閉全院外牆大型霓虹燈、廣告招牌、門診霓虹及大連路路燈，僅保留地下醫療避難區與臨床紅區之最低度暗光。</p><p>工務同工督導各病房拉下實體避難窗簾，實施嚴格之<strong>「防空燈火管制」</strong>，最大程度降低本院在無人機光學與熱成像鏡頭下的曝露與熱源特徵。同時，水電組同工迅速對緊急發電機房、高壓配電室、資訊伺服器機房及恩慈頂樓水塔之實體防護大門進行機械物理鎖固，加掛防爆掛鎖，配合保全加派實體看守哨，防範特工與無人機實施實體滲透與精準物理破壞。</p><p>針對可能伴隨之水質干擾，工務人員巡檢頂樓水塔安全防護網與封閉閥門，確保本院生命線設施在防空威脅下維持100% 完好性。</p>"}, {"stage": 3, "scenario_id": "05", "scenario_title": "水資源供應異常", "datetime": "", "summary": "屏東主要原水與供水系統受不明來源干擾，造成取水設施異常、輸水管線壓力波動及監控資料不一致，進一步影響屏北、內麟、林邊供水系統及牡丹水庫輸水調度；屏東市、麟洛、內埔、潮州、東港、林邊及佳冬部分地區出現間歇性停水。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>當供水系統受干擾，導致屏東市大範圍間歇性停水，且取水監控數據異常時，本院面臨嚴重斷水危機。工務室主任曹宏益立即啟動<strong>「戰備水井極速切換與維生用水調配計畫」</strong>。本院蓄水池與水塔容量共 <strong>453.9 m³</strong>，在日用量 511.8 m³ 模式下，僅能自撐<strong>0.88 天</strong>（不到一天）。工務人員必須在停水警報發出 10分鐘內，手動強制關閉常規自來水進水閥，防止受污染之外部原水湧入池中。</p><p>機電技術員隨即奔赴醫慢大樓，手動切換至本院地下戰備水井，該水井日供水量高達<strong>1,958 m³/天</strong>，可瞬間將全院供水自撐能力大幅拉升至 <strong>3.82 天</strong>。工務同工實施水資源限額管理：手動關閉全院所有行政、門診及宿舍區之生活用水。將地下水井純化之水，<strong>100%絕對死守供應給血液透析（洗腎）每日必需之 126 噸 RO淨水管路</strong>，此為「不得中斷」之感控紅線，並引導至 B1 臨時手術室與ICU，維持 72 小時關鍵維生用水。</p>"}, {"stage": 3, "scenario_id": "09", "scenario_title": "能源設施爆炸事故", "datetime": "", "summary": "屏南地區能源轉運及輸配電設施疑遭無人機攻擊，部分設備受損並引發局部爆炸與火勢，造成作業人員2人重傷、6人輕傷、另有3人失聯；能源與輸配電作業中斷，造成東港、林邊、佳冬、枋寮、潮州及屏東市部分區域停電，衝擊交通號誌、ATM、醫療與民生用電。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>屏南地區能源與輸配電設施遭攻擊引發局部爆炸，造成作業人員受傷，東港、林邊、屏東市大範圍停電。本院大連院區雙迴路受電無預警中斷。當市電斷絕，自動轉換開關（ATS）在<strong>10秒內自動起動發電機，並於15秒內送電</strong>。工務室主任曹宏益立即啟動<strong>「極限發電負載卸除計畫」</strong>。</p><p>全院緊急柴油發電機共 <strong>5 組（總容量 2,800kW）</strong>。值班工程師立即手動強制切斷行政辦公區、宿舍區、門診非必要空調、景觀照明及部分電梯迴路，將發電負載壓低至<strong>35%</strong> 以下。此卸載程序可確保發電機柴油燃料極限節流，馬可／約翰大樓核心配電盤<strong>在不補油情況下自撐發電達77 小時</strong>。</p><p>工務同工將備用電力 <strong>100% 絕對優先供應至 B1 臨時開刀房、臨時ICU、血庫冰箱及核心機房</strong>，確保維生系統不中斷。機電人員進駐發電機房，隨時監控冷卻水溫，防範其因高溫熱跳脫，死守電力生命線。</p>"}, {"stage": 3, "scenario_id": "10", "scenario_title": "電力基礎設施攻擊", "datetime": "", "summary": "屏東市、潮州及東港地區多處一次變電所疑遭敵特工滲透破壞，設備異常並引發饋線跳脫，造成屏東市大範圍停電與電壓不穩，並波及麟洛、內埔、萬丹及潮州；縣府機關、屏東基督教醫院、產業園區與主要交通號誌均受影響。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p>屏東市多處一次變電所遭特工破壞，引發饋線跳脫，致大範圍停電。本院大連院區在市電大當機下，ATS在 10秒內起動柴油發電機送電。工務室主任曹宏益立即下令實施<strong>「戰時配電物理隔離與發電機高溫散熱應變」</strong>。為防範大限電時間延長，工務同工將一般病房、門診空調及不必要之用電插座實施物理切斷。</p><p>電力 100% 死守於 B1 臨時手術室（韓偉 B1腹膜透析室）、臨時加護病房、血庫冰箱（維持 1-6℃ 冷鏈）及核心伺服器。由於高負載發電機極易發生高溫跳脫，曹宏益主任調派 2名機電技術員進駐發電機房，手動啟用冷卻系統旁路水源，並利用臨時拉接的消防水管，對發電機組散熱片實施<strong>人工物理噴淋降溫</strong>，防止其過熱燒毀。</p><p>工務同工盤點發電機油位，路加、韓偉大樓油箱僅 <strong>800 L</strong>，發電時數僅 <strong>8.6小時</strong>，採購組於 12小時內聯繫備援柴油供應商<strong>「全盛卓詩凱（0912-125515）」</strong>派加油車前來緊急補油，全力維持電力防禦。</p>"}, {"stage": 3, "scenario_id": "PTCH-11", "scenario_title": "燃料補給中斷", "datetime": "", "summary": "【斷油與發電機危機】戰備用油遭軍方與政府徵用，且交通管制導致中油油罐車無法駛入市區。屏基地下室備用發電機的柴油存量跌破20%，若不停供非緊急區域用電，全院將在12小時後陷入全黑。", "detail": "主責人：工務室主任曹宏益，公務機簡碼61658", "html": "<p><strong>1. 狀況概述與面臨挑戰</strong>：當國家戰備用油遭軍方與政府徵用，且交通管制導致中油油罐車無法駛入市區時，屏東基督教醫院大連院區地下室備用發電機的柴油存量將會跌破<strong>20%的紅色警戒線</strong>。若不立即針對非緊急區域實施<strong>「電氣負載強制性極限卸除（LoadShedding）」</strong>，全院將在 <strong>12 小時內</strong>面臨全面黑燈跳電的極端困境，屆時手術室、加護病房維生設備將全面陷入停擺，嚴重威脅病患生命安全。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：工務室主任曹宏益（公務機簡碼 61658；代理人：唐朝生組長）在接獲燃料預警<strong>10分鐘內</strong>，必須進駐發電機房，並召集全班機電技術員啟動<strong>「二級電力負載強制性極限卸除與發電機降溫自撐SOP」</strong>。工務同工必須手動強切全院非醫療核心區域之配電開關（包括門診大樓、行政區、宿舍區、常規病房之中央空調、景觀照明、非必要霓虹燈、以及全院80% 的電梯迴路），將用電負載強制壓低至發電機最低額定輸出之 <strong>35%負載模式</strong>。</p><p>在配電盤強制卸載至 35% 後，工務技術員手動調整切換配電櫃，將最穩定的電能<strong>100%絕對優先且僅供應至地下一樓（B1）避難醫療空間之核心紅區（包括臨時開刀房、臨時加護病房、血庫冰冰箱、急診急救區及核心伺服器機房）</strong>。為防止柴油發電機在長時間、高溫、高負載運轉下發生縮缸或熱跳脫，工務室指派2 名機電同工攜帶手持式溫度測量槍，每 <strong>15 分鐘</strong>對發電機缸體實施溫度抄錄。一旦缸體溫度發出高溫預警，技術同工應手動開啟冷卻系統之備用旁路水源，並利用臨時拉接之高壓防空消防水管，對發電機組散熱片實施<strong>人工物理噴淋灌注降溫</strong>，以科技硬防線死守本院核心電能生命線。</p><p><strong>3. 實際確實數據與資源規劃</strong>：工務室依據本院設施設備管理一覽表進行柴油存量與發電時效之極限精算：本院全院（不含瑞光院區）共編配 <strong>5 組緊急柴油發電機組，總容量高達 2,800kW</strong>。</p><ul><li><strong>馬可／約翰大樓（核心醫療棟）</strong>：配電盤在強制卸除負載至 35%    模式下，不依賴任何外部補油即可<strong>自行達標連續供電 77 小時</strong>。</li><li><strong>路加大樓（輕症/門診）</strong>：配備 Cummins ONAN 500 kW    發電機，自備油箱僅 <strong>800 L</strong>，卸載後發電時數約 <strong>18    小時</strong>，扣除存量跌破 20% 狀態，必須在 <strong>12 小時內</strong>    完成外部柴油注補。</li><li><strong>韓偉大樓（ICU/開刀房備援）</strong>：自備油箱僅 <strong>1,000 L</strong>，卸載後可撐    <strong>15 小時</strong>，扣除 20% 警戒亦必須在 <strong>12 小時內</strong> 補油。    工務同工必須將殘存油料讀數與每小時消耗率，每 <strong>2 小時</strong>    手寫抄錄，指派    Runner（傳令兵）送往計畫部状况分析處進行戰情面板更新，以便決策。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>： 工務室主任曹宏益（簡碼61658）每日定時與後勤部長許慧莉（公務機簡碼61658）及執行部長進行無線電熱線構聯，核實發電機油壓、電壓與水溫讀數，並保留完整紙本運行紀錄，做好隨時向屏東縣政府聯合應變指揮管制中心請求油料徵用調撥之對接整備。</p>"}, {"stage": 3, "scenario_id": "PTCH-14", "scenario_title": "核災威脅與掩蔽", "datetime": "", "summary": "【核災外洩與空調關閉】恆春核三廠（或遭戰術核武攻擊）受損，輻射塵警告發布。屏基被迫啟動「就地掩蔽（Shelter-in-place）」，全面強制關閉中央空調與對外通風。在南台灣高溫下，密閉病房內多名重症患者與穿戴防護衣的醫護出現熱衰竭。", "detail": "主責人：工務室主任曹宏益，公務機簡碼61658 / 62020", "html": "<p><strong>1. 狀況概述與面臨挑戰</strong>：當恆春核三廠（或遭戰術核武攻擊）受損且輻射塵警告發布時，本院作為核三廠二級核災急救責任醫院，面臨嚴重的放射性落塵滲透威脅。為了防範具放射性的空氣粒子湧入，醫院必須在極短時間內完成全院實體密閉隔離與對外風道封鎖，啟動「就地掩蔽（Shelter-in-place）」，確保地下醫療大本營免受輻射塵物理滲透。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：工務室主任曹宏益（公務機簡碼 61658 /62020；代理人：唐朝生組長）在接獲輻射塵空襲警報 <strong>10分鐘內</strong>，必須啟動最高防護級別之<strong>「核災就地掩蔽與中央空調、新風系統物理性緊急鎖閉SOP」</strong>。工務機電與風控工程師立即奔赴全院各棟大樓頂樓風機房與空調主控室，執行<strong>「風道空調全面實體阻絕程序」</strong>：</p><p>1.  *手動關閉通風閥門*：工程師必須<strong>手動強制關閉馬可、約翰、路加、韓偉、恩慈大樓頂樓之對外新風引入閥、排風扇及通風窗</strong>，徹底切斷本院空氣與外部受污染大氣的循環，建立內部「氣體就地掩蔽硬阻絕」。</p><p>2.  *切斷中央空調*：手動關閉全院大型水冷式中央空調主機及氣冷式冰水主機，僅保留地下一樓（B1）避難醫療空間與核心伺服器機房之獨立內循環空調系統，防止大範圍空氣對流。</p><p>3.  *關鍵大門鎖固*：工務技術同工配合保全人員，趕赴頂樓水塔區、高壓配電室、液氧槽及發電機房，手動將所有實體防護門鎖死加固，利用密封條對縫隙實施實體黏貼阻絕。</p><p>4.  *發電機高溫監控*：由於發電機房在完全密閉掩蔽下運作極易高溫過熱，工務組派駐機電同工利用備用冷卻旁路水源及拉接的消防管，持續對發電機房散熱片實施人工物理噴淋散熱降溫，死守電力生命線。</p><p><strong>3. 實際確實數據與資源規劃</strong>： 工務室精算核災就地掩蔽物資與巡檢數據：水電同工手動切換至醫慢大樓<strong>地下戰備水井（日產水量 1,958m³）</strong>，關閉外部受落塵威脅之頂樓蓄水池總水閥，100%優先供應洗腎中心血液透析每日必需之 <strong>126 噸 RO純水</strong>，防止透析水網受輻射污染。工務同工備妥大容量耐高溫發電機機油、氣體密封隔絕膠帶50 捲，每 15 分鐘抄錄一次發電機缸體溫度、B1核心區正壓讀數，確保其高於外部大氣壓，防範輻射塵物理滲入。</p><p><strong>4. 指揮與管制（HICS 對接）</strong>：工務室主任隨時將全院中央空調關閉鎖閉狀態、B1 各區正壓監測數據，以VHF/UHF 對講機向後勤部長許慧莉報告，以便 HICS 指揮中心下達進一步決策。</p>"}, {"stage": 4, "scenario_id": "04", "scenario_title": "關鍵設施撤離", "datetime": "", "summary": "因戰線逼近，屏南地區能源、油料、通信與交通關鍵設施進入緊急應變階段，依計畫執行人員分批撤離、資料備援、關鍵設備停機保護及反資敵作為。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658 / 62020） & 執行部 (王建銘部長", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：當指揮官正式下達關鍵基礎設施物理撤離與停機命令時，工務室主任曹宏益立即下令電氣、空調、氣體工程師，對本院暴露在外的脆弱基礎設施執行<strong>「實體機械鎖固與反資敵（AssetDenial）停機保護 SOP」</strong>。工務同工在 30分鐘內，對約翰大樓 B1核心配電房、工務發電機房、馬太 B1藥庫、資訊伺服器機房及頂樓水塔之實體防護大門進行物理鎖閉，加掛高強度防爆鋼鎖，並切斷台電市電進水與高壓進電開關。</p><p>針對無法移動之重要高價值精密醫療設備（如韓偉大樓 B1MRI核磁共振儀、移動式X光機、血液鑑定儀及核心伺服器主機），工務室會同資訊室、醫工組（林良哲主任），執行<strong>「不可移動資產特別反資敵處置流程」</strong>。在確證撤離指令且無法轉置設備時，工程師手動拆除控制系統之關鍵晶片與通訊介面，將固態硬碟（SSD）進行物理磁化或銷毀，抹除所有病患個資，並填寫「財產處置／毀損紀錄表」，由工務室主任與醫務部主管執行<strong>「雙人雙簽核實留痕」</strong>。這項程序能確保本院關鍵醫療硬體不被敵方徵用或利用，同時符合國家保險理賠與戰後復原重建之理賠佐證法規。</p><p><strong>2. 確實數據與資源規劃</strong>：工務技術員在執行全院大停機保護前，必須實施「發電機柴油儲量及負載最後分配」：為維持B1臨時加護病房（23床）及臨時手術室重症患者之最後生命支持，工務室啟動馬可／約翰大樓配電盤旁之發電機（容量500 kW），精算在 35%最低負載下，以每小時最低耗油率，死守核心大樓供電至最後一名重症患者安全抬上救護車為止（最大可自撐77小時連續發電）；完成最後撤離後，工程師關閉燃料總閥、手動排空儲油槽，完成全院大停機。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：工務室主任曹宏益將已完成鎖固機房、已停機設施、已處置反資敵設備清單製成實體報表，由Runner 上繳至 HICS 指揮中心。</p>"}, {"stage": 4, "scenario_id": "06", "scenario_title": "供水系統遭破壞", "datetime": "", "summary": "屏北、內麟及林邊等供水系統疑遭敵特工滲透破壞，關鍵設備受損並造成供水異常，致屏東市、麟洛、內埔、東港、林邊及佳冬部分區域供水不穩或中斷；屏東基督教醫院啟動備援供水與用水分級管制。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658 / 62020", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：當供水系統疑遭特工滲透破壞，造成大範圍停水時，本院面臨嚴重的斷水威脅。工務室主任曹宏益立即啟動<strong>「自來水切斷、地下戰備水井手動開拓與供水分級管制計畫」</strong>。工務技術員必須在停水警報發出<strong>10分鐘內</strong>，手動強制關閉常規自來水進水閥，嚴防受特工投毒或化學污染之外部水源湧入本院自來水蓄水池，確保院內既有水質之絕對完好性。</p><p>機電工程師隨即奔赴醫慢大樓，手動開啟本院專屬之<strong>地下戰備水井（日供水量高達1,958噸/天）</strong>，對井水之濁度、pH值實施快速化學檢測，確認安全後，將備用水源手動切換導入院內主要配水管路中，使本院供水自撐時數大幅提升至<strong>3.82天</strong>。 工務室立即執行極限之「水資源限額配給計畫」：手動強切全院所有門診、行政辦公區及宿舍生活用水，水壓 <strong>100%絕對優先且僅供應給血液透析（洗腎）每日必需之 126噸RO淨水管路</strong>，這是洗腎室腎友之生命支持紅線，並引導至 B1 臨時開刀房刷手及ICU 重症病患維生飲用，死守水資源生命線。</p><p><strong>2. 確實數據與資源規劃</strong>：工務室工程師精算：本院自來水蓄水池與水塔容量共 <strong>453.9m³</strong>。若在常規日用量 511.8噸 模式下，不開備用水井僅能自撐<strong>0.88天</strong>；而啟動地下戰備水井（1,958噸/天）後，能全額自撐全院72小時以上。曹宏益主任與在地替代飲用水供應商<strong>「高山行山泉水（0910-788388）」及「賀眾飲水」</strong>保持熱線對接，一旦水井設備受損，立即調派緊急飲用水罐車前往恩慈卸補點緊急注水，並向LJMOC 請求消防水車供水導入。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：工務室主任曹宏益將水質安全指標、水井運轉頻率數據每 2小時更新，由 Runner送往狀況分析處登錄戰情面板。</p>"}, {"stage": 4, "scenario_id": "PTCH-16", "scenario_title": "極端斷電應處", "datetime": "", "summary": "【發電機當機與徒手急救】由於連日超載運轉且缺乏機油潤滑，院內最後一部備用發電機縮缸當機。醫院進入「全黑狀態」，UPS電池在30分鐘後耗盡。ICU護理人員必須在黑暗中，使用甦醒球（BVM）對葉克膜與呼吸器病患進行「徒手捏擠」維持生命。", "detail": "主責人：工務室主任曹宏益，公務機簡碼61658", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：當戰火蔓延至屏東市區，全院電力設施在連日超載運轉且因外部物流徹底中斷、缺乏機油與關鍵潤滑備件之極端狀態下，本院最後一部備用柴油發電機組（CumminsONAN發電機組）因長時間高負載運轉而發生急性物理縮缸與機械當機。此一狀況直接導致全院（包括約翰、馬可、路加、韓偉、恩慈大樓）瞬間進入<strong>「全黑狀態（Blackout）」</strong>，常規高壓配電系統徹底癱瘓。在沒有發電機發電的絕境下，全院僅存的維生希望僅剩下韓偉大樓（ICU/開刀房）與馬可/約翰大樓配置的<strong>100 kVA 不斷電系統（UPS）</strong>。然而，UPS 蓄電池在極限負載下預估將在 <strong>30分鐘內耗盡</strong>。工務室必須在 30分鐘的「黃金搶修空窗期」內，執行緊急排障、物理隔離、以及尋求外部技術與實體零件調撥。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：工務室主任曹宏益（公務機簡碼61658；代理人：唐朝生組長）在接獲主控室「發電機縮缸跳機」警報 <strong>2分鐘內</strong>，必須親率 2名高壓電力與機電技術員攜帶緊急照明設備進駐地下柴油發電機房。曹主任立即啟動<strong>「發電機縮缸搶修與配電路網極限隔離SOP」</strong>，執行以下剛性步驟：</p><ul><li>*高壓電網與突波物理隔離*：技術員立即手動強制拉下「主發電機並網空開（斷路器）」，切斷已損毀發電機的殘存線路，嚴防後續強行起動時產生的突波或反向電流燒毀其餘未受損大樓的變壓器與電氣路網。</li><li>*縮缸機械緊急處置*：發電機技術員在佩戴絕熱手套後，手動強制卸除缸體外罩，利用備用之高壓消防水管連接至自來水旁路，對發電機缸體實施<strong>人工物理噴淋灌注降溫</strong>，試圖進行物理冷縮復原；同時，手動檢查潤滑油箱，若機油存量跌破極限值，立即使用本院儲備之「備用耐高溫汽柴油機油」進行人工手動注補。</li><li>*尋求外部專家與聯絡排障*：工務室立即啟用低軌衛星電話或定頻無線電（VHF/UHF    頻道），向本院簽約之在地備援發電機與高壓維護合約廠商<strong>「明威紀元（0933-310332）」及「隆安機電」</strong>發出「紅色最優先搶修請求」，報告缸體縮缸受損參數，請求其工程師在交通寬限期內，攜帶汽缸修復備件、缸套與抗磨潤滑劑強行突破管制作戰區進院支援。</li><li>*二級電力負荷終極切斷*：為了配合即將到來的全黑狀態，技術同工在主要配電櫃中，<strong>手動拉閘切斷全院    100% 的行政、門診、一般病房、走廊照明及所有電梯、空調負載</strong>，僅保留    B1 臨時手術室與臨時加護病房內核心維生儀器之 UPS    連接迴路，將全院用電負載強制壓低至零，全力將殘存電能保留給重症生命支持。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>：工務技術員依據本院「72小時供電計畫書」進行電能數據與時效精算：本院全院發電機總容量為<strong>2,800 kW</strong>。</p><ul><li><strong>馬可／約翰大樓（核心醫療棟）</strong>配備之 100 kVA    不斷電系統（UPS），在電力負荷完全切除、僅保留核心伺服器與血庫冰箱（日需維持    1-6℃ 冷鏈）的 10% 極低負載模式下，<strong>可自行維持 100    分鐘之連續供電</strong>。</li><li><strong>韓偉大樓（ICU／開刀房備援）</strong>之 UPS 在 30%    臨床維生設備負載模式下，<strong>僅能自撐 30 分鐘</strong>。 工務室必須在 30    分鐘內將搶修狀態手寫抄錄，指派傳令兵（Runner，穿戴紅色 Runner    專屬識別臂章）每 15 分鐘向 HICS 指揮官劉思源（簡碼    69086）通報，由狀況分析處（莊詩蘋督導長，簡碼    65311）在實體戰情白板上登錄，以便決策。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>： 工務室主任隨時以 VHF/UHF對講機向後勤部長許慧莉（公務機簡碼61658）回報機組修復進度與預估斷電天數，以便 HICS指揮中心向屏東縣聯合應變管制中心（LJMOC）及第四作戰區請求軍方裝甲工兵或發電兵攜帶大功率戰用發電機車進駐大連院區卸補點支援。</p>"}, {"stage": 4, "scenario_id": "PTCH-20", "scenario_title": "戰火波及院區", "datetime": "", "summary": "【無人機/流彈誤擊建築】敵我交火過程中，不明無人機殘骸或流彈擊中屏基門診大樓高樓層，引發局部火災並造成氧氣管線破裂洩漏。院方需在缺乏消防隊支援（市區多處起火，消防癱瘓）的情況下，由醫護人員自行滅火並緊急疏散該樓層病患。", "detail": "主責人：工務室主任曹宏益，公務機簡碼61658", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：在敵我猛烈交火過程中，不明無人機殘骸或流彈直接擊中本院大連院區門診大樓高樓層，引發局部實體火災，並當場震碎、造成門診大樓中央氧氣管線破裂洩漏。高壓醫療氧氣（管道壓力4.0\\~5.0kg/cm²）具有極強的助燃性，管線破裂極易導致局部火勢在短時間內呈爆炸性蔓延，並釋放大量高熱與劇毒濃煙，嚴重威脅下方密閉地下一樓（B1）替代醫療空間之空氣安全與在院病人生命。在全市區多處起火、消防隊癱瘓無法到院支援之絕境下，工務室與自衛消防編組必須自行組織初期滅火、氣體切斷與火煙隔離，死守醫院實體完好性。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：工務室主任曹宏益（公務機簡碼61658；代理人：唐朝生組長）在接獲「門診高樓層起火、氧氣壓降」通報 <strong>1分鐘內</strong>，必須宣布全院啟動<strong>「紅色訊號（火災應變）與中央氧氣管線物理性緊急鎖閉SOP」</strong>。工務同工及自衛消防編組技術員立即執行以下最剛性的物理搶修步驟：</p><ul><li>*中央氧氣管路分級物理鎖閉*：工務氣體技術員立即奔赴大連院區中央氧氣主控室，<strong>手動強力拉下「門診大樓高壓氧氣輸送管道總分配手閥」及分支隔離閥門</strong>，徹底切斷通往受災高樓層的高壓氧氣流，從物理源頭阻斷助燃氣體持續洩漏。</li><li>*自衛消防編組初期滅火（滅火班）*：工務室機電值班人員會同大樓安全管制同工，迅速穿戴防煙防毒面具、攜帶手持式乾粉滅菌器與二氧化碳滅火器（30    支）衝赴火災現場高樓層。</li><li>*實施初期火災壓制*：滅火班同工利用牆壁既有之<strong>「實體室外防空消防栓」</strong>，接駁高壓消防水帶，對受災區域火頭實施大流量實體噴灑，手動拉下防火分區之「防火捲門」與防煙垂壁，將火勢與濃煙物理性侷限隔離在單一防火分區內，嚴防火煙向下方    B1 避難空間滲透。</li><li>*風機內循環切換（防煙作為）*：風控技術員立即關閉門診大樓之所有送風機與排風扇，手動切換為「完全內循環防煙模式」，鎖死地下替代空間之空氣閥門，防範劇毒火煙經由風道倒灌湧入地下紅區。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>：工務室主任曹宏益精算消防水與氣體閥門數據：</p><ul><li>本院自來水蓄水池容量為 <strong>453.9    m³</strong>。工務室確保其連接至消防專用管道之餘量大於 <strong>150    m³</strong>，可保障室內消防栓在極限噴淋下<strong>連續運轉 2 小時以上</strong>。</li><li>破裂之中央氧氣管線正常工作壓力維持於 <strong>4.0\\~5.0 kg/cm²</strong>。    氣體工程師於 3 分鐘內，手動關閉門診 1-5    樓分支隔離閥，將管線殘存壓力極速降至    0，成功阻斷助燃氧氣之噴射洩漏，保全醫院建築主體。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>：工務室主任曹宏益隨時將中央氧氣切斷狀態、初期滅火進度、以及消防水池殘存水量，以定頻無線電向後勤部長許慧莉報告，協調自衛消防班（通報班、避難引導班、安全管制班）全面投入現場處置。</p>"}, {"stage": 5, "scenario_id": "09", "scenario_title": "民生復原啟動", "datetime": "", "summary": "整體態勢由作戰階段轉入復原階段，中央與地方同步啟動民生恢復及基礎設施修復，優先辦理交通搶通、醫療與供水供電復原、治安維護、受災民眾安置及心理支持；國軍完成傷亡官兵救治、通報關懷及撫卹，地方整合民間資源投入復原。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：中央與地方啟動民生恢復及基礎設施修復，優先辦理交通搶通、醫療與供電供水復原。本院必須在極短時間內完成「雙迴路市電進電重啟、外部供水接通、電氣負載恢復及院舍實體結構安全評估」。設施設備維護處組長（工務室曹宏益主任，公務機簡碼61658；代理人唐朝生組長）立即啟動<strong>「基礎設施市電、供水重啟與大樓實體結構安全盤點計畫」</strong>。</p><p>工務技術員協同台電及自來水廠駐點工程師投入搶修：</p><p>1.  *市電進電與配電盤測試*：在台電雙迴路市電進電開關修復後，工務同工重啟配電盤，逐步關閉運轉達數日、面臨高溫預警之緊急柴油發電機組（5組共    2,800 kW），解除「電氣負載卸除（Load    Shedding）」限制，逐步恢復全院各普通病房、行政、大廳之冷氣空調、霓虹燈與    100% 的電梯電源。</p><p>2.  *外部供水接通與水質檢驗*：自來水廠修復送水管路後，工務組關閉地下戰備水井（日供水    1,958 噸），手動重啟自來水主要進水閥，並對全院自來水蓄水池（容量    453.9 噸）    與頂樓水塔之餘氯、濁度、大腸桿菌群實施水質採樣快篩檢測，確保水質    100% 符合法定感控標準。</p><p>3.  *大樓實體結構安全盤點*：組長曹宏益帶領機電及結構技術工程師，對    Luka、Matthew、Mark、John、Hanwei、Enci    大樓等進行結構與關鍵管線（如液氧中央氣體管路、配電配氣管路）之實體查檢，填寫「震後與戰後基礎設施安全狀態核查表」，核實無虞後呈報執行部。</p><p><strong>確實數據與資源規劃</strong>：工務室（曹宏益主任）精算：市電恢復後，發電機組重回冷機待命狀態，工務同工會同採購組，與柴油廠商全盛卓詩凱辦理戰後柴油採購清結，將發電機備用燃油箱（路加、韓偉大樓Cummins ONAN 500 kW，容量 800 L） 與核心大樓主儲油箱重新注滿至 100%安全儲量，備戰下一次突發危機。</p><p><strong>指揮與管制（HICS 對接）</strong>： 工務室主任曹宏益（簡碼 61658）隨時向後勤部長許慧莉（公務機簡碼 61658）與執行部長回報市電、供水復原進度，以紙本留痕核銷。</p>"}, {"stage": 1, "scenario_id": "03", "scenario_title": "能源與漁業供應風險", "datetime": "", "summary": "屏東沿海地區（東港、林邊、佳冬、枋寮及恆春半島）海域作業受限，漁船出港比例下降約3至5成；高雄永安液化天然氣接收站船舶靠泊風險升高，南部天然氣與電力調度壓力增加。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    屏東沿海海域作業受限、漁船出港下降，且永安天然氣接收站船舶靠泊風險升高，導致南部天然氣與電力調度壓力劇增。本院大連院區雙迴路受電與天然氣管道供應隨時面臨中斷威脅。設施設備維護處組長（工務室曹宏益主任，公務機簡碼    61658；代理人唐朝生組長）立即啟動<strong>「燃油與公用系統緊急備援    SOP」</strong>。</li><li>工務組發電機技術員立即進駐發電機房，針對全院 <strong>5    組緊急柴油發電機組（總容量 2,800 kW）</strong>    進行全套電氣路網、機油、冷卻水箱及自動轉換開關（ATS）之實體查檢。工務同工手動切斷行政大樓、宿舍區、門診非必要空調、景觀照明及不必要之電梯迴路，執行嚴酷的<strong>「電氣負載卸除計畫（Load    Shedding）」</strong>，將用電負載強制壓低至 <strong>35%</strong> 以下。</li><li>工務技術員手動調整配電盤，確保發電機備用電力 <strong>100%    絕對優先且僅供應至開刀房、ICU、血庫冰箱、核心伺服器及急診紅區</strong>，以極省油模式死守本院電力生命線。同時，水電組巡檢頂樓自來水蓄水池，手動關閉不必要的生活用水迴路，全力儲水備戰。</li><li><strong>實際確實數據</strong>：    工務室精算柴油儲量：馬可／約翰大樓核心大樓主儲油槽之存量在 35%    最低負載模式下，可<strong>自撐連續發電 77    小時</strong>；而路加、韓偉大樓之備援油箱僅有 <strong>800 L</strong>，備援發電時數為    <strong>8.6 小時</strong>。曹宏益主任必須在 12    小時內聯繫備援柴油合約商<strong>「全盛卓詩凱」（0912-125515）</strong>派加油車前往恩慈    1 樓停車場卸補點，將路加大樓油箱補滿，防止發電中斷。</li></ul>"}, {"stage": 1, "scenario_id": "08", "scenario_title": "能源供應中斷", "datetime": "", "summary": "受國際能源情勢緊張、海運受限及區域軍事活動升溫影響，天然氣供應波動加劇；南部燃氣機組配合調度降載運轉，區域發電出力下修約15%，部分地區採分段限電及輪替供電，進一步波及工業生產、醫療與民生用電。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    受國際能源緊張及軍事活動影響，南部天然氣供應降載，區域發電下修，部分地區實施分段限電與輪替供電。本院大連院區面臨大範圍市電限電危機。設施設備維護處組長（工務室曹宏益主任，公務機簡碼    61658；代理人唐朝生組長）立即啟動<strong>「全院配電物理隔離與發電機高溫散熱應變計畫」</strong>。</li><li>當市電無預警切斷時，發電機自動轉換開關（ATS）在 <strong>10    秒內自動起動發電機，並於 15    秒內正常送電</strong>。工務同工立即手動強切全院一般病房、門診空調、非必要生活用電及景觀照明，將負載強行壓低至    <strong>35%</strong> 以下，將發電機備用電力 <strong>100% 絕對優先且僅供應給 B1    臨時手術室、臨時加護病房、血庫冰箱（維持 1-6℃ 冷鏈）及核心伺服器</strong>。</li><li>由於高負載發電機長時間運轉極易發生高溫跳脫，曹主任調派 2    名機電技術員進駐發電機房，手動啟用冷卻系統旁路水源，並利用臨時拉接的消防水管，對發電機組散熱片實施<strong>人工物理噴淋降溫</strong>，防止機組過熱燒毀，全力維持備用供電生命線。</li><li><strong>實際確實數據</strong>： 工務室精算柴油消耗：本院備用柴油容量在 35%    最低負載模式下，可<strong>自撐連續發電 77    小時</strong>；而路加、韓偉大樓備用柴油發電機（Cummins ONAN，500    kW）油箱僅有 <strong>800 L</strong>，發電時數僅 <strong>8.6 小時</strong>。工務室於 12    小時內聯繫備援柴油供應商<strong>「全盛卓詩凱（0912-125515）」</strong>派加油車前往恩慈    1 樓卸補點補油，確保發電不斷鏈。</li></ul>"}, {"stage": 1, "scenario_id": "13", "scenario_title": "醫療機構停電危機", "datetime": "", "summary": "屏東地區主要變電設備突發故障，致屏東基督教醫院雙迴路受電中斷，全院無預警停電，嚴重威脅手術中病人及ICU維生系統；備援發電機即時投入，惟1小時後其中一台出現高溫預警，整體供電能力降至約五成，院內燃油存量降至50%以下，急重症照護風險升高。", "detail": "由工務室主任曹宏益帶領，公務機簡碼61658", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    屏東地區主要變電設備突發故障，致屏東基督教醫院雙迴路受電無預警中斷，全院陷入大停電。全院緊急柴油發電機組（5    組共 2,800 kW）在 <strong>10 秒內自動起動發電機，並於 15 秒內正常送電</strong>。1    小時後，其中一台 Cummins ONAN 500 kW    發電機因高溫發出異常預警，整體供電降至五成，且燃油降至 50%    以下。工務室主任曹宏益立即啟動<strong>「發電機高溫散熱、配電隔離與緊急外購補油    SOP」</strong>。</li><li>工務組發電機技術員立即進駐發電機房，手動啟用備援冷卻系統之旁路水源，並利用臨時拉接之高壓消防水管，對預警發電機之散熱水箱片實施<strong>人工物理噴淋降溫</strong>，防止機組因高溫熱跳脫而造成電網崩潰。</li><li>工務室執行極限的<strong>「二級電力負載強切計畫」</strong>：除原先已切斷的生活區外，手動切斷一般普通病房、行政辦公區及非必要之醫療儀器電源，將發電電力    <strong>100% 絕對死守供應給手術中開刀房（韓偉 B1）、ICU（韓偉    B1）重症病患維生系統及血庫冰箱</strong>，以「局部犧牲、集中防禦」確保重症生命支持。</li><li><strong>實際確實數據</strong>： 工務室精算柴油消耗：本院備用柴油容量在 35%    最低負載模式下，可<strong>自撐連續發電 77    小時</strong>；而路加、韓偉大樓備用柴油發電機（Cummins ONAN，500    kW）油箱僅有 <strong>800 L</strong>，發電時數僅 <strong>8.6 小時</strong>。工務室於 12    小時內聯繫備援柴油供應商<strong>「全盛卓詩凱（0912-125515）」</strong>派加油車前往恩慈    1 樓卸補點補油，確保發電不斷鏈。</li></ul>"}, {"stage": 1, "scenario_id": "PTCH-04", "scenario_title": "氣體供應異常", "datetime": "", "summary": "【醫用氣體物流延遲】由於社會恐慌引發物流業罷工及交通壅塞，原訂每週例行運補的「醫用液態氧槽車」與「高壓氣體鋼瓶」未能如期抵達，院內氧氣安全存量跌破72小時警戒線。", "detail": "主責人：工務室主任曹宏益，公務機簡碼61658 / 62020", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當醫用液氧槽車延遲、中央氧氣供應存量告急時，設施設備維護處（工務室主任曹宏益，公務機簡碼61658 /62020；代理人唐朝生組長）必須立即啟動<strong>「全院醫用氣體管路局部封鎖、減壓節流與鋼瓶備援配給計畫」</strong>。工務室氣體工程師與機電工程師立即進駐中央液氧槽機房與氣體分配室，執行最嚴格之<strong>「氧氣醫療氣體極限配給程序」</strong>。</p><p>工務技術員手動強制關閉門診大樓、行政區、非必要普通病房之中央氧氣管道閥門，阻斷非必要氣體損耗。工務主任曹宏益下令將全院中央管道氧氣壓力降至臨界維持值，並指示臨床護理同工：<strong>「將普通病房與急診輕症病患，全面切換使用床邊備用攜帶式高壓氧氣小鋼瓶供氧」</strong>；中央管道氧氣<strong>100% 絕對優先且僅供應給 B1 臨時開刀房、臨時加護病房（韓偉大樓 B1腹膜透析室與 MRI室）重症插管呼吸器患者</strong>，以「局部犧牲、集中防禦」確保重症生命維持。工務室同工配合臨床單位，每 1小時實施一次病床端氧氣鋼瓶壓力及液氧中央分配表讀數核檢，若發生中央管路破裂洩漏，技術員立即手動隔離該大樓分支閥門，切斷危險，死守氣體生命線。</p><p><strong>2. 確實數據與資源規劃</strong>：工務技術員在氣體節流模式下，精算全院備用資材：普通病房及 ICU護理站必須確保每床備用之攜帶式氧氣鋼瓶壓力高於 <strong>100bar</strong>，單瓶可自撐連續供氧 <strong>2 小時以上</strong>。工務技術員每 4小時定時與氧氣供應商（信光氧氣、南屏氣體）進行熱線構聯，確保一旦管路故障，能於1 小時內調撥 10 瓶高壓備用氣體進院，死守病患呼吸安全。</p>"}]}, {"role": "執行部設施運作組／環保室", "entries": [{"stage": 2, "scenario_id": "PTCH-07", "scenario_title": "供水系統異常", "datetime": "", "summary": "【斷水與洗腎中心危機】屏東市區自來水管線遭破壞降壓，院內頂樓蓄水池水位快速下降。血液透析（洗腎）中心因缺乏RO純水面臨停機危機，近百名洗腎患者面臨無法透析的生命危險，急需調度外部水車支援。", "detail": "由總務部部長許慧莉帶領，公務機簡碼61658；及環保室組長林良哲，分機 23 / 104", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：停水且井水供應受限，極易導致密閉的地下避難空間及普通病房在短時間內因排泄物無法清理而爆發嚴重的環境衛生崩潰及群聚感染危機。後勤部長許慧莉（公務機簡碼61658）會同環保室組長林良哲，立即啟動<strong>「戰時缺水乾式感控、外部水車運補與垃圾冷凍暫存SOP」</strong>。</p><p>勤務組（陶大屏組長）立即對接本院預置之<strong>在地替代飲用水及水車供應商「高山行山泉水（0910-788388）」</strong>，要求緊急派調運水車前往本院指定的物資卸補點（<strong>恩慈大樓1 樓停車場</strong>），手動將外部乾淨水導入院內戰用儲水箱中。</p><p>環保室清潔同工手動鎖死全院普通病房、行政區之常規抽水馬桶，嚴禁沖水，防止因水壓下降導致管路污水逆流。環保人員穿戴B 級防護裝備，向各病區、臨時ICU、急診檢傷大廳主動發放本院儲備之<strong>「防漏化學便器袋」與乾洗手消毒液</strong>，指導在院病患及醫護排泄時一律在便器內套用化學便器袋。排泄完畢後，由家屬或清潔人員倒入高分子固化吸水劑，使用密封束帶物理紮緊袋口。環保清潔人員每班定期巡檢，將清運出的密封排泄物袋，物理集中移置於 B1既有之<strong>「低溫冷凍貨櫃」</strong>中（溫度強制維持於 -18℃以下）就地冷凍封存，徹底切斷氣味與病原體在地下密閉空間之傳播，以「乾式感控戰術」死守環境感控紅線。</p><p><strong>2. 實際確實數據與資源盤點</strong>：後勤部與環保室（林良哲組長）盤點並管制化裝備與感控資材存量：本院儲備之防漏化學便器袋共計 <strong>2,500 個</strong>（以 1,479 名同工、107床住院病人及待命家屬每日每人 2 個消耗量精算，可自撐至少 <strong>5 天</strong>極限乾式運作）。 環保室備有醫療用酒精 30 箱、高濃度漂白水 15 桶、一次性B 級防護衣 100套，每日定時抄錄低溫冷凍貨櫃溫度（-18℃），確保發電機為低溫貨櫃優先供電，保全醫院基礎公衛環境安全。</p>"}, {"stage": 3, "scenario_id": "05", "scenario_title": "水資源供應異常", "datetime": "", "summary": "屏東主要原水與供水系統受不明來源干擾，造成取水設施異常、輸水管線壓力波動及監控資料不一致，進一步影響屏北、內麟、林邊供水系統及牡丹水庫輸水調度；屏東市、麟洛、內埔、潮州、東港、林邊及佳冬部分地區出現間歇性停水。", "detail": "由環保室組長林良哲共同執行", "html": "<p>間歇性停水將直接威脅醫院的環境感控與排泄物清運。環保室組長（林良哲）立即啟動「戰時乾式感控與廢棄物冷凍暫存SOP」。環保同工迅速封閉全院一般洗手間之馬桶，禁止沖水。環保室動員清潔同工，向全院普通病房、ICU 護理站及 B1地下醫療區，主動配發大批<strong>「化學便器袋」與乾洗手消毒液</strong>。</p><p>指導醫護及病患家屬一律使用化學便器袋包覆便器進行排泄。排泄完畢後，由家屬或清潔人員使用密封束帶物理紮緊袋口，防止異味與有毒病原菌擴散。環保室同工（林良哲組長）穿戴 B級防護衣，每班定期清運這些密封便器袋，並啟用地下低溫冷凍貨櫃（溫度維持-18℃以下）進行就地低溫封存，避免因外部垃圾清運中斷而引發地下密閉空間之交叉感染與爆倉風險，以「乾式感控戰術」死守醫院衛生防線。</p>"}, {"stage": 4, "scenario_id": "06", "scenario_title": "供水系統遭破壞", "datetime": "", "summary": "屏北、內麟及林邊等供水系統疑遭敵特工滲透破壞，關鍵設備受損並造成供水異常，致屏東市、麟洛、內埔、東港、林邊及佳冬部分區域供水不穩或中斷；屏東基督教醫院啟動備援供水與用水分級管制。", "detail": "由環保室組長林良哲共同執行", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：供水中斷且全院停水，極易導致密閉的地下避難空間及各病房在短時間內因排泄物無法清理而引發環境衛生崩潰及群聚感染危機。環保室組長（林良哲）立即啟動<strong>「戰時缺水乾式感控與廢棄物冷凍暫存SOP」</strong>。環保同工手動鎖死全院一般洗手間之抽水馬桶，嚴禁沖水，防止管路逆流污染。</p><p>環保室清潔同工穿戴 B級防護衣，向全院普通病房、ICU護理站及地下一樓（B1）避難醫療空間，主動分發大批儲備之<strong>「化學便器袋」與乾洗手消毒液</strong>。指導在院病患及醫護，排泄時一律使用化學便器袋包覆便器。排泄完畢後，由家屬或清潔同工倒入專用固化吸水劑，使用密封束帶物理紮緊袋口，嚴防病原體和化學氣味在地下密閉大樓內發生交叉感染。環保組（室）清潔人員每班定期清運這些密封便器袋，將其物理集中至 B1低溫冷凍貨櫃中（溫度維持 -18℃以下）就地冷凍封存，待戰後通水通電後再行統一無害化清運，以乾式感控戰術死守地下大本營。</p><p><strong>2. 確實數據與資源規劃</strong>：環保室（林良哲組長）盤點院內化學消殺物資與乾式感控資材之安全存量：儲備化學便器袋<strong>2,500個</strong>（以 1,479名員工及病患每日每人 2個消耗精算，可自撐至少5天）、醫療用酒精 30箱、高濃度漂白水15桶，並製成實體紙本庫存表由專人看守。環保同工每班巡檢垃圾暫存區，確保醫療廢棄物在外部清運中斷之「孤島防禦」期間，100%密封、無外洩、無異味，死守環境感控红線。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：林良哲組長將每日化學消殺衛材消耗率及冷凍清運數據，以無線電回報執行部設施運作組長曹宏益，隨時更新至HICS 戰情板。</p>"}, {"stage": 4, "scenario_id": "PTCH-17", "scenario_title": "極端斷水應處", "datetime": "", "summary": "【水源枯竭與糞水溢流】院內蓄水池徹底見底。不僅洗手台無水可用，全院廁所因無法沖水導致排泄物溢流至走廊。手術室無法進行術前刷手，傷口沖洗只能使用極少量的瓶裝純水，院內爆發嚴重的院內感染與痢疾風險。", "detail": "主責人：環保室組長林良哲，分機/簡碼同23, 104", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：當屏東市區因自來水總管線爆裂，導致本院自來水蓄水池與頂樓水塔徹底枯竭見底，且醫慢大樓地下戰備水井受落塵或化學污染源滲透、經環保化驗宣告「重度污染、即刻禁用」時，本院陷入極端的<strong>「零自來水與零備用井水」狀態</strong>。在長達數日的孤島狀態下，不僅洗手台與手術室刷手無水可用，全院廁所更因無法沖水而導致病患排泄物急劇積聚、糞水溢流至醫療走廊，極易在密閉的地下一樓（B1）避難醫療空間內引發大規模急性痢疾、霍亂等消化道傳染病及大範圍院內交叉感染，對醫院公共衛生安全構成致命威脅。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：環保室組長林良哲（分機 23 /104；代理人：清潔組長）在接獲水井禁用與蓄水池枯竭預警之 <strong>10分鐘內</strong>，必須啟動<strong>「戰時缺水乾式感控、糞尿溢流隔離與廢棄物冷凍暫存SOP」</strong>。環保室同工穿戴 C級防護衣物（含防毒面具、防化學手套、耐酸鹼水鞋），手動鎖死全院大連院區所有常規抽水馬桶，嚴禁任何人手動沖水，嚴防污水管道在無水壓狀態下發生糞水逆流倒灌，並執行以下剛性環境阻絕作為：</p><ul><li>*化學便器袋發放與物理鎖閉*：環保室立即派員向地下一樓（B1）臨時病房、臨時    ICU、急診檢傷大廳及各哨口，主動發放本院儲備之<strong>「防漏化學便器袋（乾式化學便器）」與乾洗手消毒液</strong>。一線病患與同工排泄時，一律要求在實體便器內套用化學便器袋，排泄完畢後，由家屬或清潔同工倒入「高分子吸水固化片」及    20    克消毒漂白粉，使用自鎖式尼龍束帶將袋口物理紮緊，徹底切斷氣味與病原體在密閉空間的蒸發。</li><li>*糞便物資冷凍暫存處置*：環保清潔人員每 2    小時巡檢各病區，將收集的密封排泄物袋，放置於不透光、加厚之雙層紅色醫療廢棄物袋內，以手推車物理性運送至地下一樓既有之備用<strong>「低溫冷凍貨櫃（專用低溫冷凍箱）」</strong>內就地冷凍封存（低溫強制維持在    -18℃ 以下），徹底抑制病原微生物繁殖與腐敗氣體釋放。</li><li>*溢流紅區消殺與隔離*：若部分病區已發生排泄物溢流污染，環保同工立即拉起黃色隔離線、實施物理性區域封鎖，使用本院儲備之高濃度消毒漂白水（有效餘氯大於    500 ppm 至 1,000    ppm）對受污染的牆面、走廊、地板實施大面積噴灑消殺與實體刷洗，填寫「戰時環境消毒查檢日報表」，死守本院地下避難所之公衛生命線。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>：環保室（林良哲組長）盤點並嚴格管制感控防護資材：</p><ul><li>本院目前在庫儲備之<strong>防漏化學便器袋共計 2,500 個</strong>（以 1,479    名同工、107 床住院病人及待命家屬每日每人平均消耗 2    個精算，可自撐至少 <strong>5 天</strong> 極限乾式感控運作）。</li><li>儲備高濃度消毒漂白水 15 桶、醫療用 75% 酒精 30 箱、一次性 B 級防護衣    100 套。 工務室確保為備用低溫冷凍貨櫃優先供電，每 4    小時由環保同工手動記錄冷凍櫃溫度，確保其維持於 <strong>-18℃    以下</strong>，防範公衛環境崩潰。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>：環保室組長林良哲每日將排泄物清運袋數、冷凍貨櫃運行溫度及化學消殺資材賸餘量，以定頻無線電向執行部設施運作組長曹宏益主任報告，做好隨時向屏東縣環保局及衛生局申報戰時感染性廢棄物緊急清運配額之行政準備。</p>"}, {"stage": 5, "scenario_id": "PTCH-22", "scenario_title": "遺體處置危機", "datetime": "", "summary": "【太平間滿載與公衛危機】累計死亡人數破百，院內太平間冰櫃因斷電早已退冰，遺體快速腐敗散發惡臭。因外部殯葬系統崩潰，院方只能將遺體暫置於未受損的地下二樓角落，衍生嚴重的心理創傷與公共衛生（疫病）威脅。", "detail": "主責人：環保室組長林良哲，分機23 / 104", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：當本院在灘岸戰鬥及空襲波及下，累計死亡人數破百，且院內主發電機及備用發電機因斷油和機械故障停擺，導致常規太平間冰櫃全部退冰時，大量遺體在南台灣高溫（室溫達34℃以上）下將快速腐敗、散發屍臭，極易在地下一樓（B1）和地下二樓（B2）密閉醫療空間內引發嚴重的院內霍亂、痢疾等公衛疫情，並造成全院同工毀滅性的視覺與心理衝擊。環保室必須立刻實施物理性遺體封存與低溫感控。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：環保室組長林良哲（分機 23 / 104；代理人：清潔組長）在接獲太平間滿載警報<strong>10 分鐘內</strong>，啟動<strong>「戰時大量遺體低溫消殺、物理性封存與地下殮房隔離SOP」</strong>。</p><ul><li>*地下臨時殮房（Locker    Zone）設置*：環保室同工配合工務室，將大連院區結構最安全、未受損且遠離臨床核心紅區之    <strong>地下二樓偏僻防空角落（約翰大樓 B2 機房旁通道）</strong>    手動隔離，拉起黃色「生化落塵與遺體管制警戒線」，建立實體「臨時地下殮房」。</li><li>*遺體雙層密封與漂白水高濃度消殺*：環保室清潔人員穿戴 A 級或 B    級防護衣，手動將腐敗遺體塞入本院儲備之<strong>「加厚防漏雙層醫療遺體袋」</strong>中。在拉上拉鍊密封前，手動向袋內撒入    100 克高濃度消殺漂白粉（有效餘氯大於 1,000    ppm）及乾燥除臭活性碳，隨後拉緊防水密封條。</li><li>*備用低溫冷凍貨櫃（-18℃）啟用與電力迴路鎖定*：環保技術員協同工務室，將地下一樓既有的備用<strong>「-18℃    低溫冷凍貨櫃（專用冷凍箱）」</strong>發電機配電線路調至最高優先級。手動將已密封的遺體袋，以手推車物理性運送、分層碼放於低溫冷凍貨櫃內，手動鎖死貨櫃門。工務同工每    2 小時巡檢並手寫記錄貨櫃溫度，確保其穩定維持於 <strong>-18℃    以下</strong>，以強硬之低溫冷凍技術徹底扼制屍體腐敗物資之傳播，死守環境感控紅線。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>：環保室（林良哲組長）盤點並管制大量遺體封存資材：</p><ul><li>本院在 B1 備用資材庫內確保有儲備的<strong>加厚防漏遺體袋共計 150    個</strong>、高濃度消毒漂白粉 20 箱。</li><li>確認專用低溫冷凍貨櫃最大容積可安全容納、堆疊<strong>高達 120 具    密封遺體袋</strong>。 環保室每日定時抄報貨櫃溫度，確保其在發電機 35%    負載節能模式下優先獲得 10 kW 電力供給，保全全院公衛環境完好性。</li></ul>"}, {"stage": 5, "scenario_id": "PTCH-23", "scenario_title": "傳染病群聚爆發", "datetime": "", "summary": "【院內避難所傳染病爆發】由於長時間斷水、無法維持手部衛生，且地下避難空間高度擁擠通風不良，滯留於院內的難民與輕傷患中爆發了疑似新型變種病毒（或霍亂、傷寒）群聚感染。因缺乏檢驗試劑與抗生素，疫情有向醫護人員蔓延的趨勢。", "detail": "主責人：環保室組長林良哲，分機23 / 104", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：在零自來水情境下，若任由傳染病腹瀉患者排泄物直接倒入常規污水管道，將導致院內廢水生物系統徹底中毒，進而引發毒物向周邊市政地下水大範圍外溢。環保室必須在一線實施極嚴格之「乾式化學阻絕與垃圾高溫消殺」，徹底隔離病原。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：環保室組長林良哲（分機 23 / 104）調派 4 名清潔同工穿戴最高規格之 C級防護裝備（防毒面具、防化學膠鞋、加厚丁腈手套），進駐隔離病區，啟動<strong>「傳染病溢出乾式化學阻絕、密封清運與低溫封存SOP」</strong>。</p><ul><li>*化學便器袋（乾式化學便器）專屬發放*：環保清潔工手動將隔離病區之一般便器物理性鎖閉。對傳染病腹瀉患者，一律發放本院儲備之<strong>「防漏化學便器袋（內置高吸水性固化片與漂白粉）」</strong>。</li><li>*高濃度消殺粉倒入*：患者排泄完畢後，清潔人員手動向袋內倒入 30    克「高濃度殺菌漂白粉」，使用自鎖式尼龍束帶物理紮緊袋口，將袋外側使用    75% 酒精進行大面積噴灑消殺。</li><li>*專屬運送路線與冷凍貨櫃封存*：密封袋放置於專屬「黃色傳染性廢棄物防漏垃圾桶」內，由清潔    Runner    沿指定的避難疏散車道，物理性主動推運移置於地下一樓既有之備援<strong>「低溫冷凍貨櫃（專用冷凍箱）」</strong>內就地冷凍封存，冷凍櫃溫度強制維持在    <strong>-18℃ 以下</strong>，徹底殺滅病原微生物。</li><li>*隔離病區大面積高濃度化學消殺*：環保清潔同工每班使用有效餘氯大於    1,000 ppm    的強效化學消毒漂白水，對隔離病房、地面、空氣孔道、醫護人員更衣室通道實施    360    度實體噴灑與刷洗，手寫記錄「傳染病區消殺查檢表」，死守本院地下避難所之公衛生命線。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>： 環保室（林良哲組長）盤點並严防物資空窗：</p><ul><li>儲備高濃度消毒漂白水 15 桶、化學消殺漂白粉 20 箱、防漏化學便器袋    <strong>2,500 個</strong>、一次性防護裝備 100 套。 工務組確保發電機負載卸除至 35%    模式下，優先為地下冷凍貨櫃（-18℃）及隔離病區排風裝置送電，確保在無水環境下傳染性廢物    100% 獲得妥善化學隔絕。</li></ul>"}, {"stage": 1, "scenario_id": "12", "scenario_title": "化學災害應變", "datetime": "", "summary": "屏東縣政府接獲「屏東科技產業園區疑似無水氨外洩」通報後，立即開設災害應變中心，統合消防、環保、衛生、警政及園區管理單位進行應處，執行警戒、疏散、除污與醫療分流，防止災情擴大。", "detail": "由環保室組長林良哲共同執行", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    化學災害事故發生後，急診臨時除污區清洗無水氨化災患者會產生大量含有毒化學物質之強鹼性化學污水。若直接排入常規管道，將造成本院污水處理廠爆倉崩潰或外部水體污染。環保室組長（林良哲）立即啟動<strong>「戰時化災污水廠緊急溢流隔離與污水池中和處置    SOP」</strong>。</li><li>環保同工穿戴 C    級防護衣物（含防毒面具、防化學手套、耐酸鹼水鞋），手動開啟急診洗消專用管路，將洗消產生的化災污水全數引流至本院<strong>「地下緊急污水隔離暫存池（溢流隔離區）」</strong>中暫存，切斷污水排向外部市政管道，嚴防化學毒物擴散。</li><li>環保技術員對隔離池內污水之 pH    值、氨氮濃度進行快速化學採樣篩檢，手動添加弱酸性中和藥劑及活性炭過濾耗材，對污水實施酸鹼中和與物理吸附定性除污。</li><li>同時，清潔同工對急診大門外之除污完畢車道、走廊、垃圾暫存區實施高濃度漂白水（有效餘氯大於    500    ppm）的實體化學消殺與刷洗，由專人填寫「化災消殺及污水中和紀錄表」，死守醫療核心環境感控紅線。</li><li><strong>實際確實數據</strong>：    環保室林良哲組長盤點消殺防護資材：緊急調撥化學消殺高濃度漂白水 15    桶、醫療用酒精 30 箱、一次性防護衣 100    套，確認污水隔離暫存池容量（最大可容納 <strong>50 噸</strong>    化災洗消污水，可確保本院 72 小時洗消作業不爆倉）安全，確保感控環境    100% 完好性。</li></ul>"}, {"stage": 1, "scenario_id": "PTCH-05", "scenario_title": "院外化災波及", "datetime": "", "summary": "【鄰近工業區毒氣外洩】屏東科技產業園區因人為破壞發生無水氨氣體外洩，毒氣隨風向朝市區飄散。急診室瞬間湧入數十名呼吸道灼傷病患，院方需立即啟動毒化災（HAZMAT）戶外除污機制。", "detail": "主責人：環保室組長林良哲，分機/簡碼同23, 104", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：急診前方臨時戶外洗消除污區在清洗無水氨化災患者時，會產生大量含有劇毒無水氨成分之強鹼性化學污水。若直接排入常規雨水或生活污水管道，將導致本院廢水處理廠生物系統瞬間中毒潰崩，或造成外部市政水體之嚴重化學污染。執行部設施運作組環保室（組長林良哲）必須立即啟動<strong>「戰時化災洗消污水緊急溢流隔離與污水池酸鹼中和處置SOP」</strong>。</p><p>環保室清潔同工穿戴 C級防護衣（含防毒面具、防化學手套、耐酸鹼水鞋），手動強制開啟急診洗消專用溢流管路，將戶外洗消產生的化災污水全數引流導入至本院<strong>「地下緊急污水隔離暫存池（溢流隔離暫存區）」</strong>中暫存，手動關閉通往外部市政管道之總排水閥，徹底切斷與外網之水體連通，嚴防毒物向外擴散。</p><p>環保技術員對隔離池內化學污水之 pH值、氨氮濃度進行快速化學採樣與試紙檢測，手動添加弱酸性中和藥劑及活性碳過濾耗材，對暫存廢水實施酸鹼中和與物理吸附除污。在化災搶救間隙，環保清潔同工配合保全人員，對急診大門外之洗消車道、走廊、垃圾暫存區實施高濃度漂白水（有效餘氯大於500ppm）的實體化學消殺與刷洗，填寫「化災消殺及污水中和紀錄表」，由專人雙簽確認，死守本院地下避難醫療大本營之環境感控紅線。</p><p><strong>2. 確實數據與資源規劃</strong>：環保室（林良哲組長）盤點消殺防護資材：緊急調撥化學消殺高濃度漂白水 15桶、醫療用酒精 30 箱、一次性防護衣 100套，確認污水隔離暫存池容量（最大可容納 <strong>50 噸</strong>化災洗消污水，可確保本院 72 小時洗消作業不爆倉）安全，確保感控環境 100%完好性。</p>"}]}]}, {"id": "sec", "name": "06　安全管制處／安全官", "roles": [{"role": "執行部安全管制處（醫勤室保安組）", "entries": [{"stage": 2, "scenario_id": "02", "scenario_title": "軍事威脅／飛彈", "datetime": "8月8日 10:00", "summary": "國防部發布監測資訊，指出自大陸沿岸方向朝臺灣周邊海空域發射多枚飛彈，部分彈道飛越臺灣本島上空，另有飛彈落入周邊海域；相關訊息經媒體即時報導，引發民眾對戰爭風險之疑慮，影響社會穩定。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>國防部發布飛彈發射監測資訊，指出飛彈彈道飛越臺灣本島上空，媒體即時報導引發民眾極度恐慌。本院位於屏東市核心區，極易面臨避難人潮與驚慌群眾強行衝擊院區門禁之危機。安全管制處組長（保安組長王建文）立即下令全院保全與警衛<strong>由常態保全轉為「戰術防衛警備」狀態</strong>。</p><p>保全同工立即關閉全院所有側門、後門、員工地下通道等非必要常態動線，實施全面封閉式管理。</p><ul><li><strong>實體大門管制</strong>：<strong>僅開放「急診出入口」</strong>供員工、救護車傷患及必要公務進出。</li><li><strong>約翰停車場出入口</strong>：設置實體隔離護欄，並架設防撞桿、阻絕沙包與拒馬。除救護車、消防車、警車及持特定通行證之物資車外，<strong>其餘所有民間與家屬車輛一律禁止駛入醫院核心區域</strong>。    保全人員部署於僅開放的通道，手持<strong>金屬探測器進行武器、危險品與易燃物安檢</strong>，強勢阻絕非醫療就醫人員進入院區，死守醫院實體安全界線。</li></ul>"}, {"stage": 2, "scenario_id": "04", "scenario_title": "民力協調", "datetime": "8月8日 16:00", "summary": "第四作戰區因動員演習需求，透過屏東縣「動員暨民力協調組」協請縣政府提供200組水泥紐澤西護欄，並協力運送至台17線雙園大橋屏東端、東港大橋及台1線枋寮段等指定地點，執行交通阻絕與防護部署。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>安全管制處組長（保安組長王建文）針對第四作戰區於周邊關鍵交通節點拉起阻絕之想定，立即啟動院內「交通節點清空與接運區分流管制」。保全人員徹底清理大連路大門及院內車道所有違停車輛與實體障礙。配合到場之武裝民防與警力，保安組將集結點與卸補區實施最嚴格之<strong>「三大接運疏散區」動線絕對分流</strong>：</p><ul><li><strong>救護車專區（急診大門出口）</strong>：僅允許編碼之簽證救護車及軍方衛勤車停靠，作為重症（高度照護）病患之垂直移轉上車通道。</li><li><strong>接駁車專區（門診大廳出口）</strong>：供大巴、中巴集結，快速後送 Level    2、3 輕中症病患。</li><li><strong>私人車專區（恩慈大樓車道）</strong>：供家屬私人車輛接回出院患者。    保全同工指派傳令兵（Runner）站立於車道轉折點，以手勢及大聲公實施人工導引，死守醫院生命運輸動線之暢通。</li></ul>"}, {"stage": 2, "scenario_id": "10", "scenario_title": "通信干擾／假訊息", "datetime": "8月9日", "summary": "敵對勢力利用軟體定義無線電設備，於屏東火車站、潮州火車站及東港轉運站等人潮密集區架設偽裝行動基地台，干擾合法電信訊號並發送偽造緊急告警；另透過簡訊與社群誘導民眾下載不明應用程式，造成混淆與恐慌。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>敵對勢力於屏東、潮州火車站及東港轉運站架設偽裝基地台，發送偽造緊急告警並干擾電信訊號，誘導下載惡意軟體，造成民眾集體混亂與恐慌就醫。本院大連院區及急診入口出現大批受騙、恐慌並企圖衝入搶奪資源之人群。保安組長王建文立即指揮保全同工，於急診大門外拉起實體管制線與阻絕拒馬，封鎖主要通道。</p><p>保全人員實施<strong>「單向安全通道最小化管制」<strong>。所有人員必須在保全與到場之武裝警力監視下，依序接受</strong>手持金屬探測器掃描與行李防爆搜查</strong>。保安組長指派保全加強對大連路及停車場外圍之實體巡邏，一旦發現有可疑人車於醫院周邊200公尺內滯留或架設不明無線電發射設備，立即上前盤查並通報民和派出所到場排除。</p>"}, {"stage": 2, "scenario_id": "15", "scenario_title": "金融假訊息擠兌", "datetime": "8月9日 10:00", "summary": "社群平台散布「資金將遭凍結」、「金融系統不穩」及「特定族群提前轉移資產」等訊息，引發土地銀行屏東分行、第一銀行屏東分行及其他金融據點提領人潮；排隊與推擠造成民生路、中山路、廣東路等路段壅塞，影響救護與消防車輛通行。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>社群散布金融不穩謠言，引發土銀、一銀屏東分行提領人潮，排隊與推擠造成民生路、中山路、廣東路嚴重壅塞，直接波及本院救護車與消防車輛之通行。保安組長王建文立即啟動<strong>「交通阻塞備援與硬邊界路網暢通計畫」</strong>。保安組長指派保全重兵至本院大連路與莊敬街、瑞光路等周邊聯外巷道口設立管制點。</p><p>保全同工拉起隔離防線，物理勸離於本院大門口、車道出入口及恩慈卸補點周邊之無關圍觀群眾。保安組調派 Runner（徒步傳令兵）持 VHF對講機，預置站立於大連路轉折點，一旦發現本院救護車或警消車輛受金融擠兌排隊車流阻塞，立即主動上前進行人工車流切割，在混亂路段強行引導救護車穿過，確保急診與重症後送動線不被金融擠兌之人潮癱瘓。</p>"}, {"stage": 2, "scenario_id": "16", "scenario_title": "金融擠兌擴大", "datetime": "8月9日 12:00", "summary": "擠兌情形經社群擴散後，帶動屏東市、潮州鎮、東港鎮及內埔鄉之農會、郵局與金融機構出現集中提領，造成現金調度壓力、營運負荷增加及周邊交通壅塞。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>擠兌情形擴散至屏東市、內埔鄉之農會、郵局，現金調度壓力及營運負荷增加，周邊交通塞車嚴重，本院周邊大連路巷口亦出現大量排隊提領人潮與推擠。保安組長王建文立即調派全班保全人員，<strong>拉下醫院大連路大門及停車場車道之部分鐵捲門與拒馬防線</strong>。</p><p>保全同工封鎖本院與周邊金融、郵局據點之物理交界，嚴防因排隊、推擠引發的社會暴動或搶奪風潮波及本院內部醫療區。保全在急診大門外實施最嚴格之通道管制，任何欲進院者強制查驗身分與<strong>手持金屬探測器安檢</strong>。保安組加派人員對發電機房、伺服器機房及馬太 B1 藥庫實施實體上鎖與 24小時站哨守護，防止歹徒企圖趁擠兌混亂潛入院內搶劫貴重藥品或破壞設施，死守醫院大本營之安全。</p>"}, {"stage": 2, "scenario_id": "17", "scenario_title": "銀行擠兌應處", "datetime": "8月9日 13:00", "summary": "受金融交易系統異常影響，臺灣銀行屏東分行出現民眾集中提領情形，造成現金調度與營運壓力；警方即時派遣警力進駐，執行人潮疏導、秩序維護、重要設施警戒及交通管制作業。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>臺灣銀行屏東分行民眾集中提領造成嚴重混亂，警方派遣警力進駐。本院大連院區距離相關提領據點較近，安全管制處（保安組長王建文）立即下令全體警衛保全進入<strong>「一級戰術警戒防禦狀態」</strong>。</p><p>保全同工協同到場支援之民和派出所武裝警力，在大連院區四周及停車場外圍築起拒馬、防撞桿與沙包防線，形成「硬邊界防禦」。保全嚴密監控外圍排隊提領人流，嚴防不法份子藉臺銀擠兌混亂，物理衝擊本院或於外圍縱火。保安組對進入本院急診、住院區之全體同工與就醫人員，實施最嚴厲之身分查驗：資訊人員在地下機房與總機室作業時，必須隨時穿戴<strong>粉紅色識別背心及臂章</strong>；傳令兵（Runner）必須穿戴<strong>紅色Runner臂章</strong>。非配戴此等防偽識別者一律禁止進入管制區，由保全強勢壓制並移交警方，死守安全邊界。</p>"}, {"stage": 2, "scenario_id": "PTCH-09", "scenario_title": "生化威脅與封鎖", "datetime": "", "summary": "【不明生化包裹攻擊】急診檢傷台收到疑似含有「炭疽桿菌（或不明致病粉末）」的惡意包裹，數名護理師接觸後出現急性紅腫與呼吸急促。院方需緊急拉起封鎖線，將急診室「就地隔離」，並啟動B級防護衣穿戴與通報應變。", "detail": "主責人：保安組長王建文，公務機簡碼69410 / 代理人：黃政彬組員，簡碼 69328", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當急診檢傷台收到疑似含有「炭疽桿菌（致病粉末）」的惡意包裹，且數名接觸之護理師出現急性紅腫與呼吸急促之懷疑生化化災事件時，安全管制處（保安組長王建文，公務機簡碼69410；代理人：黃政彬，公務機簡碼 69328）必須在接獲警報 <strong>3分鐘內</strong>，啟動最高規格之<strong>「黑色訊號（生化維安）與急診就地封鎖Lockdown 應急計畫」</strong>。</p><p>保安組長立即下令，現場保全人員<strong>「迅速拉下急診入口之防盜鐵捲門」</strong>，實施急診核心區與外界的物理性徹底封鎖，將暴露人員、受污染檢傷櫃檯就地隔離（Lockdown），嚴防病原體和恐慌人群四處流竄污染其他無菌醫療大樓。保全同工在急診外圍 50公尺拉起黃色「生化化災管制警戒線」，架設防暴拒馬與隔離護欄，設立「一級生化隔離管制哨」。</p><p>保全人員配備防暴盾牌、防暴鋼叉，除持有 HICS指揮官特別簽發之防偽背心及任務臂章（資訊同工戴<strong>粉紅色識別背心</strong>、傳令兵戴<strong>紅色Runner臂章</strong>）的專業洗消人員外，其餘任何家屬、同工、暴徒或媒體一律強勢阻絕進出。保安組長與到場之<strong>轄區警察局（民和派出所，約 6分鐘抵達）及消防局化學車（約 3分鐘抵達）</strong>進行定頻無線電對接，引導外部優勢武裝警力及國軍化學兵進院協助進行生化偵檢、證物封存、秩序維持及環境初期除污。</p><p><strong>2. 實際確實數據與資源盤點</strong>： 保安組長王建文部署 <strong>5 名專職保全</strong>在僅開放的急診 Lockdown隔離哨口進行雙人持盾看守，並與派出所及消防隊保持直接熱線通聯。保安組備有防暴盾牌 15 面、防暴鋼叉 5 支、手持金屬探測器 6支。中控室技術員在隔離期間，利用不断電系統支持的 CCTV對急診周邊與隔離空域進行 24小時無死角監控，嚴防特工物理滲透，死守實體硬防線。</p>"}, {"stage": 3, "scenario_id": "02", "scenario_title": "醫療降載危機", "datetime": "", "summary": "屏東基督教醫院於緊急命令發布後啟動醫療營運降載，暫緩非緊急門診、健檢與部分選擇性手術，以保全急重症核心量能；惟部分民眾無法接受措施，現場出現大量詢問、抱怨及情緒失控，院內外人潮聚集並影響就醫動線。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>當本院啟動醫療降載（暫緩非緊急門診、健檢與選擇性手術），導致大批無法接受的民眾在急診室外及院區周邊聚集、抱怨並企圖衝擊動線時，保安組長王建文立即下令保全由常態轉為<strong>「戰術防衛警備」狀態</strong>。保全人員在<strong>10分鐘內</strong>物理關閉醫院所有側門、後門、地下車道非必要通道，實施封閉式管制。</p><p>保全同工在大連路主要大門及急診入口，迅速架設拒馬、防撞桿及阻絕沙包。全院僅保留「急診出入口」供傷患、員工及必要公務進出。保全於急診入口設立實體管制防線，對欲進入院區之病患及家屬強制實施身分卡查驗，並使用手持式<strong>金屬探測器進行武器、危險品與易燃物安檢</strong>，強勢阻絕非就醫之抗議民眾。</p><p>任何召回之行政或資訊工程同工，保全人員嚴格比對人資名冊：資訊人員必須佩戴<strong>粉紅色識別背心及臂章</strong>，傳令兵（Runner）必須佩戴<strong>紅色專屬臂章</strong>，方可予以放行。一旦群眾推擠升級，保安組長王建文立即透過定頻無線電通報HICS 指揮中心，並撥打 110、119 通報轄區警察局（民和派出所，1.9公里，車程6 分鐘） 請求武裝警力到場實施強勢維安，死守急診就醫動線不被癱瘓。</p>"}, {"stage": 3, "scenario_id": "03b", "scenario_title": "無人機偵察威脅", "datetime": "", "summary": "敵方初期運用多架次無人機對東港、大鵬灣、林邊、枋寮、枋山及恆春半島沿海實施偵察，並結合電子干擾誘發防空系統反應；屏東基督教醫院同步啟動院內防空避難機制，執行人員疏散、地下備援醫療空間轉換及急重症持續收治。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>敵方多架次無人機在周邊沿海偵察，並伴隨電子干擾，威脅本院大連院區之空域安全與人員防空防護。保安組長王建文立即指揮保全由常態守備轉為<strong>「一級防空戰術警戒」狀態</strong>。保安同工立即將大連路停車場、急診室車道、恩慈大樓 1樓卸補點之所有露天待命人員、家屬與輕傷民眾，強勢引導轉入遮蔽物下，禁止任何人員在戶外空地滯留圍觀。</p><p>保全同工<strong>「迅速拉下急診入口防盜鐵捲門」與防火捲門</strong>，實施急診主要出入口之實體硬阻絕防護，防止攜帶爆裂物之無人機強行衝入醫療紅區。中控室警衛利用全院不斷電監視系統（CCTV）24小時嚴密監控韓偉、恩慈大樓頂樓平台與戶外液氧槽空域，重點觀測無人機之飛行方向、幾軸旋翼特徵及有無吊掛可疑物品，並將情資回報安全官杜傳榮主任（簡碼69170）。</p><p>保全同工在大連路巷口加強實體巡邏，防範特工操作手於周邊 200公尺內偵蒐。一旦確認威脅，安全管制組長立即透過對講機，同步向安全官及 110警察局報案，請求軍警攜帶干擾槍到場對無人機實施射頻壓制。警政通報後警力約<strong>6 分鐘</strong> 即可到場協防。</p>"}, {"stage": 3, "scenario_id": "08", "scenario_title": "無人機威脅關鍵設施", "datetime": "", "summary": "屏南地區重要能源與輸配電設施周邊出現不明來源無人機低空盤旋及定點停留，疑似進行設施偵查與目標標定，場站通報相關單位並加強警戒、反無人機與監控作業。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>屏南地區能源與輸配電設施周邊出現不明無人機低空盤旋，疑似標定目標，本院面臨大範圍停電與特工物理破壞之極高威脅。保安組長王建文立即指揮保全由常態巡邏提升為<strong>「一級戰術警戒防衛」狀態</strong>。</p><p>保全同工在大連院區四周及停車場外圍拉起實體管制線與阻絕拒馬。保全人員實施門禁最小化管制，全院關閉側門、地下通道，僅開放急診出入口。保安組長指派保全加強對約翰大樓 B1 核心配電房、工務發電機房、馬太大樓 B1藥庫（第一至三級管制麻醉藥存放區）及伺服器機房之巡邏，並對機房實施機械物理防護上鎖，嚴防第五縱隊特工潛入物理破壞。</p><p>保安組協同到場支援之民和派出所武裝警力（約接報後 <strong>6 分鐘</strong>可抵達），對院區周邊進行防禦掃描，一旦目視發現低空不明無人機，立即記錄特徵並利用干擾槍實施訊號壓制，死守院區實體防護安全邊界。</p>"}, {"stage": 3, "scenario_id": "13", "scenario_title": "配售秩序混亂", "datetime": "", "summary": "受物資短缺與不實訊息影響，東港鎮、林邊鄉及佳冬鄉部分民生物資配售站因等候時間過長、民眾質疑分配不公而出現爭搶與推擠，導致配售秩序混亂，影響物資發放。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>沿海配售站發生等候過長、民眾質疑不公而爆發爭搶推推擠、秩序混亂。此恐慌風潮極易蔓延至本院，導致失控群眾衝擊院區門禁或企圖搶奪資材室。保安組長王建文立即下令保全人員進入<strong>「一級戰術警戒防禦狀態」</strong>。</p><p>保全同工配合到場支援之民防隊伍（T-CERT支援人員），徹底鎖閉醫院大連路大門及約翰停車場之部分鐵捲門防線。保全於急診入口與恩慈大門架設實體隔離護欄。保全實施最嚴格之<strong>「單向受控通道最小化管制」</strong>，除就醫傷患外，禁止任何無關人員駛入或潛入。</p><p>保全同工手持<strong>金屬探探器實施安全檢查</strong>，嚴防攜帶器械之滋事分子混入醫療區搶奪。保全組派人看守B1 資材補給站及藥庫門禁，嚴防不法份子因物資短缺衝擊院舍，死守安全邊界。</p>"}, {"stage": 3, "scenario_id": "14", "scenario_title": "社會秩序惡化", "datetime": "", "summary": "因不實訊息持續擴散，群眾恐慌情緒升高，屏東市、潮州鎮及東港鎮陸續發生搶劫商家、藥局及配售站等案件；警方執勤能量受牽制，對社會治安與公共秩序造成嚴重衝擊。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>因不實訊息持續擴散，群眾恐慌情緒升高，屏東市多處發生搶劫商家、藥局及配售站案件，警方執勤能量受牽制。本院作為高儲量醫療基礎設施，極易成為歹徒搶劫管制藥品與衛材之目標。保安組長王建文立即啟動<strong>「防暴、防破壞與實體門禁封鎖SOP」</strong>。</p><p>保安組長下令保全同工，配合到場之民和派出所警力，對<strong>約翰大樓 B1核心配電房、工務發電機房、馬太大樓 B1藥庫（第一至三級管制麻醉藥存放區）、資通訊機房及頂樓水塔</strong>，實施 24小時雙人武裝守衛與物理機械上鎖防護。保全人員嚴格查驗身分卡，對進入上述關鍵機房之同工強制核對召回名冊。非配戴粉紅色背心或任務臂章之人員一律強烈攔阻。</p><p>任何企圖物理砸門或強搶藥庫之暴徒，保全同工在保護自身安全前提下，使用防暴盾牌、辣椒水等防衛裝備實施強勢防衛與物理壓制，並移交武裝憲警處理，死守醫院防護邊界。</p>"}, {"stage": 3, "scenario_id": "PTCH-13", "scenario_title": "避難秩序失控", "datetime": "", "summary": "【防空避難所暴動】空襲警報頻傳，大量非就醫的周邊社區民眾強制湧入屏基地下停車場尋求防空掩蔽。民眾隨地便溺、抽菸，並試圖搶奪醫院配給的飲用水與食物，與駐衛警爆發激烈衝突，威脅地下備援設施安全。", "detail": "主責人：保安組長王建文，公務機簡碼69410", "html": "<p><strong>1. 狀況概述與面臨挑戰</strong>：當空襲警報頻傳，大量非就醫的周邊社區驚慌民眾強制湧入屏基地下停車場尋求避難掩蔽時，極易發生隨地便溺、抽菸，並試圖搶奪醫院配給住院病人與醫護之飲用水、食物之暴動。民眾與駐衛警、保全人員爆發激烈衝突，直接威脅到本院地下一樓（B1）備援手術室、ICU及核心伺服器配電機房之物理安全與醫療秩序。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：安全管制處組長（保安組長王建文，公務機簡碼69410；代理人：黃政彬同工，簡碼69328）在接獲地下車道發生群眾衝突之通報後，必須在 <strong>3 分鐘內</strong>宣布全院進入<strong>「防空避難所秩序維護、邊界硬阻絕與防暴驅離應變計畫」</strong>。保安組長立即調派所有保全同工、自衛消防編組安全管制班人員攜帶防暴防護裝備趕赴現場。</p><p>為了確保地下替代醫療空間之核心紅區安全，保全同工必須立即執行<strong>「地下一樓空間實體硬邊界防護與鎖閉程序」</strong>：</p><p>1.  *拉設實體管制拒馬*：保全同工在約翰大樓 B1 臨時急診、韓偉大樓 B1    臨時開刀房／ICU    之聯外走廊與車道交界處，迅速推拉架設鋼製阻絕拒馬與隔離護欄，築起實體管制警戒線，強制將「難民避難區」與「臨床醫療核心區」進行物理性徹底隔離。</p><p>2.  *拉下防火鐵捲門*：保安組長下令：<strong>「迅速拉下地下一樓主要電梯口、防火區劃之防火門與急診防盜鐵捲門」</strong>，僅保留一個單向、狹窄之受控哨口，實施身分卡與手圈查驗。</p><p>3.  *手持金屬探測器安檢*：保全人員對欲進出哨口之人流，一律使用<strong>手持金屬探測器進行武器、易燃物、打火機（防範抽菸引發發電機房爆炸）之最嚴格掃描與安檢</strong>，強勢阻絕非醫療需求人員衝擊，並對在避難區內意圖搶奪物資、滋事之暴徒使用辣椒水及防暴盾牌實施強勢物理隔離與驅離。</p><p><strong>3. 實際確實數據與資源規劃</strong>： 保安組長王建文迅速重置安防人力： 部署<strong>5 名專職保全</strong> 在地下一樓核心避難隔離哨實施雙人持盾看守，<strong>4 名保全</strong>攜帶防暴鋼叉巡邏於發電機房與水泵房周邊。 安全管制處儲備有防暴盾牌 15面、防暴鋼叉 5 支、手持金屬探測器 6支。保安組長利用定頻對講機，與到場支援之<strong>民和派出所武裝警力（約接報後 6分鐘抵達本院）</strong> 及<strong>消防分隊（約 3 分鐘抵達）</strong>保持不間斷通聯，一旦發生大規模暴力推擠或縱火企圖，軍警在 5分鐘內進場協助防暴，死守實體硬防線。</p><p><strong>4. 指揮與管制（HICS 對接）</strong>： 保安組長每 <strong>15 分鐘</strong>定時向安全官杜傳榮主任（公務機簡碼69170）及執行部長回報地下停車場避難秩序、哨口安檢人次及警消對接動態，確保HICS 指揮中心掌握最新治安狀況。</p>"}, {"stage": 4, "scenario_id": "03", "scenario_title": "灘岸戰鬥傷亡", "datetime": "", "summary": "東港至枋寮沿海爆發灘岸戰鬥，部分建物及漁港設施受砲火波及，造成大量民眾傷亡；初步統計死亡28人、重傷36人、輕傷188人。另重要能源與通信設施遭敵特工滲透破壞，引發駐警與其對抗。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：灘岸戰鬥導致大批恐慌民眾、避難家屬以及企圖搶奪醫療資源之歹徒湧向本院，且重要能源與通信設施遭敵特工滲透破壞，本院面臨極高之安全威脅。保安組長王建文立即下令全體保全與警衛進入<strong>「一級戰術警戒防禦狀態」</strong>。保全同工在<strong>10分鐘內</strong>物理鎖閉醫院所有側門、後門、員工地下通道等非必要常態動線，實施全面封閉式管制。</p><p>保全班長帶領同工，在僅開放之主要急診出入口與停車場通道設立隔離拒馬、阻絕沙包與隔離防線。安全管制處實施最嚴格之<strong>「單向受控通道最小化管制」<strong>，除救護車及急診傷患外，其餘所有家屬與民間車輛一律禁止駛入醫院核心區域。保全人員荷槍實彈（配備防暴盾牌、防暴鋼叉、辣椒水），對欲進入院區之病患及家屬強制進行身分卡查驗，並使用手持式</strong>金屬探測器實施武器、易燃物與危險品安檢</strong>，強勢阻絕非醫療需求人員。保全嚴格盤點到勤同工：資訊與搶修人員必須穿戴<strong>粉紅色識別背心及授權臂章</strong>，Runner 必須佩戴 <strong>專屬紅色 Runner臂章</strong>，無配戴防偽識別之不明人員一律不予放行。</p><p><strong>2. 確實數據與資源規劃</strong>：保安組長王建文立即與外部警消協力單位對接，精算聯防到場時效：</p><ul><li><strong>警力支援到場時效</strong>：聯絡官通報轄區警察局（民和派出所，距本院    1.9公里） 後，武裝警力及交通交警可於 <strong>6分鐘內</strong>    抵達本院大連路現場，實施強制交管、驅離滋事分子，並協助維護急診大門秩序。</li><li><strong>消防支援到場時效</strong>：通報消防分隊（距本院    1.1公里）後，消防車及水車可於 <strong>3分鐘內</strong>    抵達大連路巷口進行防範縱火與初期滅火支援。    保安組每日維持三班制，每班部署至少 5名保全重兵把守 B1    關鍵機房與藥庫門禁，死守實體安全界線。</li></ul><p><strong>3. 指揮與管制（HICS 對接）</strong>：保安組長王建文直接與安全官杜傳榮主任（公務機簡碼69170）對接，利用中控室不斷電監視系統（CCTV）對發電機房、頂樓水塔、液氧槽空域進行24小時監控。</p>"}, {"stage": 5, "scenario_id": "03", "scenario_title": "後備動員困難", "datetime": "", "summary": "因應戰況需求，後續動員屏東地區後備軍人約3,600人，惟民眾配合疏散撤離、人口流動頻繁，召集對象行蹤不易掌握；警察局持續協助送達召集令，仍面臨通訊中斷與回覆延宕，影響動員時效。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：後備動員與召集令送達困難，社會秩序不穩，極易發生不法滋事分子或境外特工（第五縱隊）趁混亂、通訊癱瘓之際，喬裝成被召回之同工、外包工程人員或病患家屬潛入醫院大本營，對配電房、水塔或管制藥庫進行物理破壞。安全管制處組長（保安組長王建文，公務機簡碼69410；代理人醫勤室主任吳哲維，簡碼 62006）立即啟動<strong>「防滲透、防破壞與戰時防偽識別管制 SOP」</strong>。</p><p>保全同工封鎖全院所有非必要出入口，大連路大門及停車場車道拉下部分鐵捲門與防護拒馬，僅保留一個受控之急診單向安全通道，實施實體硬阻絕。保全人員在大連路大門、急診入口及恩慈 1樓報到站，架設隔離護欄與金屬安檢哨：</p><p>1.  *金屬掃描安檢*：對所有欲進入院區之召回同工、病患及家屬，一律手持<strong>金屬探測器實施武器、化學液體及防爆搜查</strong>。</p><p>2.  *防偽識別管制*：任何經核對召回名冊無誤之同工，一律配發防偽專屬識別：<strong>資訊及技術搶修同工必須穿戴「粉紅色識別背心及授權臂章」</strong>；<strong>傳令兵（Runner）必須佩戴「紅色專屬臂章」</strong>。保全同工在各樓梯間、電梯口及關鍵機房（約翰    B1 核心配電房、工務發電機房、馬太 B1 管制藥庫及伺服器機房）實施 24    小時站哨，非配戴此等防偽背心及臂章之人員一律禁止進入管制區，強勢維護醫院物理安全邊界。</p><p><strong>確實數據與資源規劃</strong>：安全管制處（王建文組長）盤點保全安防裝備：配備防暴盾牌 15面、防暴鋼叉5支、手持金屬探測器 6支、強光手電筒 20支、防割手套20雙，並與到場支援之民和派出所武裝警力（約接報後 <strong>6 分鐘</strong> 可抵達）及消防分隊（約 <strong>3 分鐘</strong> 可抵達）建立直接無線電構聯頻道，確保旦發生特工破壞或縱火能於 5分鐘內實施強勢壓制與初期滅火。</p><p><strong>指揮與管制（HICS 對接）</strong>： 保安組長王建文隨時向安全官杜傳榮（簡碼69170） 與執行部長王建銘 報告院區門禁警戒與人流甄別狀態，監控全院 CCTV監視器。</p>"}, {"stage": 5, "scenario_id": "05", "scenario_title": "大量死亡遺體處理", "datetime": "", "summary": "屏東地區累計死亡人數達352人，既有殯葬設施量能迅速飽和，遺體辨識、冷藏、運送及家屬聯繫面臨嚴重壓力；另有外籍旅客與移工家屬要求協尋，增加行政、翻譯及國際聯繫負荷。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機勤簡碼69410", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：大量死亡遺體飽和，對院區環境感控、疾病預防與門禁秩序形成致命壓迫。安全管制處組長（保安組長王建文，公務機簡碼69410；代理人吳哲維主任）立即下令保全同工配合環保室，啟動<strong>「戰時臨時殮房開設、遺體實體安全防護與衛生感控SOP」</strong>。</p><p>為防範遺體腐敗滋生疫病，工務與安全管制組立即於 <strong>約翰大樓 B1車道旁或恩慈 D 棟空地</strong>，架設並鎖閉啟用本院儲備之「-18℃低溫冷凍貨櫃」作為「戰時臨時殮房（LockerZone）」，確保遺體在低溫下安全冷藏。 保全人員在臨時殮房周邊 50公尺內，拉起黃色管制警戒線，架設實體隔離拒馬，設立「一級殮房管制哨口」，實施24小時雙人巡邏與站哨看守，非經指揮官特別派令、警方及法醫簽名核可之人員，一律強勢阻絕進出。</p><p>任何運送遺體或家屬前來辨認之車輛、人員，保全強制查驗防偽識別證，使用<strong>手持金屬探測器進行最嚴格的安全掃描與危險品搜查</strong>，嚴防不法份子或境外特工企圖藉混亂破壞冰櫃、投毒或砸毀殮房，死守醫院實體防護之「硬邊界」。</p><p><strong>確實數據與資源規劃</strong>：保安組長王建文協同環保組（室）林良哲組長，盤點遺體防護資材：儲備遺體袋<strong>150 個</strong>、化學消殺漂白水 15桶、一次性防護衣 100套，並指定1名資深保全班長專責殮房實體門禁登記。保安同工每 2小時巡視低溫冰櫃發電機配電迴路，確保其連接至發電機優先供電之核心配電盤，防止冰櫃因斷電回溫，死守衛生感控紅線。</p><p><strong>指揮與管制（HICS 對接）</strong>：保安組長隨時將臨時殮房運作、遺體冷藏容量及安防狀態，以對講機向安全官杜傳榮主任（簡碼69170） 彙整呈報。</p>"}, {"stage": 1, "scenario_id": "04", "scenario_title": "軍事整備", "datetime": "", "summary": "國防部同步開設應變中心，運用情監偵系統強化全時預警監控，持續掌握敵情發展，並維持部隊適度戰備狀態，實施「立即備戰操演」。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    為配合國軍「立即備戰操演」及防範戰時軍事整備引發的社會恐慌，保安組長王建文（公務機簡碼    69410；代理人醫勤室主任吳哲維，簡碼    62006）立即下令保全人員<strong>由常態保全轉為「戰術防衛警備」狀態</strong>。保全同工在    <strong>10 分鐘內</strong> 實施全院封閉式管理，關閉非必要通道。</li><li>保全人員立即關閉醫院所有側門、後門、員工地下車道等常態動線，實施實體物理鎖固。全院僅開放<strong>「急診出入口」</strong>供員工、救護車傷患及必要公務通行。在約翰停車場出入口，保全架設阻絕拒馬、防撞桿與阻絕沙包。</li><li>除救護車、軍警車及持有特定通行證之物資車外，<strong>其餘所有家屬與民間車輛一律禁止駛入醫院核心區域</strong>，並引導至外圍路網，徹底清空救護車專專用迴轉車道，死守醫院實體安全邊界與生命線動線。</li><li><strong>實際確實數據</strong>： 保安組長王建文部署 <strong>5 名專職保全</strong>    在僅開放的急診通道哨口，手持金屬探測器，對所有欲進入院區之人員強制實施身分卡查驗及防爆安檢。中控室警衛利用    UPS 備援供電之 CCTV，對發電機房、頂樓水塔、液氧槽等關鍵基礎設施實施    24 小時無死角監控，防範破壞。</li></ul>"}, {"stage": 1, "scenario_id": "10", "scenario_title": "社會秩序事件", "datetime": "", "summary": "屏東地區因假訊息與恐慌情緒擴散，於屏東縣政府周邊、屏東火車站及潮州轉運站等人潮聚集區出現對特定對象指認、圍觀與言語衝突，並伴隨推擠與秩序混亂；相關影像快速傳播後，對公共安全與社會秩序形成壓力。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    因假訊息擴散、群眾恐慌，於屏東火車站、潮州轉運站等聚集區出現言語衝突與推擠混亂，波及本院周邊大連路路段，大批驚慌群眾或暴民聚集於急診室外，企圖強行衝入院區搶奪資源，嚴重威脅就醫動線與病人安全。安全管制處組長（保安組長王建文，公務機簡碼    69410；代理人吳哲維主任）立即下令保全人員進入<strong>「一級戰術警戒防禦狀態」</strong>。</li><li>保全同工在 <strong>10 分鐘內</strong>    物理關閉全院所有側門、後門、員工地下通道等常態動線，大連路停車場拉下部分鐵捲門與拒馬防線，僅保留急診單向安全通道，實施全面封閉式管理。</li><li>保全同工在急診大門外拉起實體管制線、隔離防線與隔離護欄，將無關之圍觀人群物理阻絕於管制線外。</li><li>保安人員配備防暴盾牌、防暴鋼叉及辣椒水，對欲進院就醫或尋求庇護之人員實施最嚴格的門禁管制：強制查驗身分卡，並使用<strong>手持金屬探測器進行武器、危險品與易燃物安檢</strong>，強勢阻絕非醫療需求或企圖滋事之暴徒，死守大連院區實體防護之「硬邊界」。</li><li><strong>實際確實數據</strong>： 保安組長王建文部署 <strong>5 名專職保全</strong> 24    小時守衛急診單向通道哨口。保安組長與到場支援之民和派出所武裝警力（約接報後    <strong>6 分鐘</strong> 可抵達本院支援） 及消防分隊（約 <strong>3 分鐘</strong> 可抵達）    建立直接對講機聯防頻道，確保能於 5    分鐘內對現場暴力衝突實施物理壓制，防範火災。</li></ul>"}, {"stage": 1, "scenario_id": "11", "scenario_title": "化學災害事故", "datetime": "", "summary": "（通勤尖峰）屏東科技產業園區某食品冷鏈廠之無水氨系統發生外洩，現場出現刺鼻氣味，多名人員頭暈、嘔吐及呼吸不適，初估約50餘人受影響，其中5人重症、15人需住院；氣體受西南風影響向東北擴散，波及園區周邊道路、台1線及縣道189線。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    無水氨外洩伴隨大批化災患者與驚恐家屬擠爆急診入口，且受西南風擴散影響，刺鼻氣味與毒煙可能隨風向飄向本院大連路。保安組長王建文（公務機簡碼    69410；代理人吳哲維主任）立即啟動<strong>「化災空域屏蔽、門禁封鎖與外部警消到場接引    SOP」</strong>。</li><li>保全同工配合 T-CERT 救護班人員，於急診前方車道與恩慈大樓 1    樓停車場卸補點築起實體管制線與隔離護欄，將無關之圍觀人群物理阻絕於化災除污線外，嚴防現場因吸入有害氣體而發生二次中毒。</li><li>為防止刺鼻毒氣及有害無水氨隨空氣流通湧入本院大樓內部，保安組長立即下令：<strong>「迅速拉下急診入口之防盜鐵捲門」與防火捲門</strong>，建立實體硬邊界防護與內部空氣封鎖。保全人員實施「單向最小化受控通道管制」，僅允許經過實體除污之傷患及配戴防偽識別背心與臂章之同工進入核心區，強勢攔阻企圖強行衝擊大門之滋事分子或境外特工。</li><li><strong>實際確實數據</strong>： 保安組指派 Runner    穿戴紅色臂章，於瑞光路與大連路口設立實體接引哨，引導到場支援之消防局毒災化學車（約接報後    <strong>3 分鐘</strong> 可抵達本院支援）及武裝警力（約 <strong>6 分鐘</strong>    可抵達）快速切入指定路網進行環境除污與交管，死守安全邊界。</li></ul>"}, {"stage": 1, "scenario_id": "PTCH-01", "scenario_title": "藥品擠兌與恐慌", "datetime": "", "summary": "【民眾恐慌囤積藥品】受網路假訊息「外商藥廠撤資、慢性病藥品即將斷貨」影響，大量民眾湧入門診及藥局，強烈要求提前領取或自費購買3至6個月以上的慢性病用藥（降血壓、胰島素等）。民眾因遭拒絕與醫護發生肢體衝突，門診大廳癱瘓。", "detail": "主責人：保安組長王建文，公務機簡碼69410", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：當大量恐慌民眾因囤藥遭拒而在掛號批價櫃檯、藥局窗口與醫護同工爆發肢體衝突，導致門診大廳陷入癱瘓且威脅醫療秩序時，安全管制處（保安組長王建文，公務機簡碼69410；代理人吳哲維主任）必須在接獲警報 <strong>5 分鐘內</strong>宣布全院進入<strong>「一級戰術警戒防禦與實體硬邊界防護狀態」</strong>。保安組長立即調派保全人員在門診大廳、藥局前方周圍築起實體管制人牆與隔離防線，架設隔離護欄與防爆拒馬，將失控暴動之人群與核心藥庫、臨床診間實施物理性徹底阻絕。</p><p>為確保醫院實體安全邊界，保安組長立即下令執行<strong>「全院封閉式出入口管制」</strong>：保全人員必須在<strong>10 分鐘內</strong>關閉大連院區所有側門、後門、員工地下車道等常態動線，實施實體鎖固，<strong>「迅速拉下急診入口之防盜鐵捲門」</strong>，僅保留一個極其狹窄且受控之急診單向安全通道，由保全及民防人員共同把守。</p><p>保全人員配備防暴盾牌、防暴鋼叉及辣椒水，對欲進院之人員強制進行身分查驗，並使用<strong>手持金屬探測器進行武器、危險品與易燃物安檢</strong>，強勢將非醫療需求或企圖滋事之不法份子驅離至管制警戒線外。保全班長定時巡檢發電機房、配電室、頂樓水塔及藥庫等關鍵基礎設施門禁；若發生實體縱火或物理破壞，聯絡官立即通報轄區警察局（民和派出所，距本院1.9 公里，武裝警力約 <strong>6 分鐘內</strong> 抵達支援）及消防分隊（距本院 1.1公里，消防水車約 <strong>3 分鐘內</strong> 抵達），協助壓制暴徒與初期滅火。</p><p><strong>2. 確實數據與資源規劃</strong>： 安全管制處部署 <strong>5 名專職保全</strong>在大連路主要哨口實施 24 小時重兵看守，另調派 <strong>4 名保全</strong>攜帶防暴盾牌在藥局與門診大廳現場執行定點防衛與秩序維持。保安組配備防暴盾牌15 面、防暴鋼叉 5 支、手持金屬探測器 6 支、強光手電筒 20支。保全同工必須與民和派出所保持直通定頻無線電構聯，每 <strong>15 分鐘</strong> 利用UHF/VHF 無線電向 HICS 安全官（杜傳榮主任，公務機簡碼69170）回報大廳及大門警戒狀態，死守本院實體防護之「硬邊界」。</p>"}, {"stage": 1, "scenario_id": "PTCH-03", "scenario_title": "醫護人力流失", "datetime": "", "summary": "【認知作戰致人力缺口】社群流傳「屏基將被軍方徵用為軍事據點，恐遭首波轟炸」，導致部分醫護人員與外包清潔、傳送人員心生恐懼，出現集體請假、曠職或攜帶家屬連夜撤離至外縣市，院內排班出現嚴重缺口。", "detail": "主責人：保安組長王建文，公務機簡碼69410", "html": "<p><strong>1. 具體可行之平戰轉換作為與標準作業程序 SOP</strong>：當面臨醫護人力大量流失、社會動盪且不實謠言四起之極限狀態下，極易發生不法分子或敵方特工（第五縱隊）喬裝成被召回之同工、外包清潔或病患家屬，混入醫院進行實體破壞。安全管制處（保安組長王建文，公務機簡碼69410；代理人吳哲維主任）必須立即啟動最高規格之<strong>「防特工防物理滲透、門禁升級與防偽標記管制SOP」</strong>。</p><p>保全同工鎖死大連院區所有非必要常態側門與後門，瑞光大樓及韓偉大樓等出入口降下防盜鐵捲門實施物理封鎖。在大連路大門及恩慈 1樓動員報到站，保全架設鋼製拒馬與隔離護欄，設立「動員報到第一級安檢哨口」：保全人員手持<strong>金屬探測器，對所有欲進入院區之召回同工、病患及家屬進行最嚴格的安全掃描與危險品安檢</strong>，強勢阻絕攜帶燃燒彈、刀具或破壞性射頻設備之暴徒。所有經身分卡核對召回名冊無誤之同工，人資與保全現場發配專屬防偽背心及臂章：<strong>資訊與技術搶修同工必須穿戴「粉紅色識別背心及授權臂章」</strong>；<strong>徒步傳令兵必須佩戴「專屬紅色Runner 臂章」</strong>。保全人員在約翰大樓 B1 核心配電房、工務發電機房、馬太 B1管制藥局、伺服器機房及頂樓水塔入口實施 24小時雙人持盾站哨，非配戴此等防偽背心及臂章之不明人員一律不予放行，死守本院物理安全界線。</p><p><strong>2. 確實數據與資源規劃</strong>： 保安組長王建文部署 <strong>5 名專職保全</strong>在大連路僅開放之急診及報到通道進行人流甄別與安檢，另部署 <strong>4 名保全</strong>分別把守 B1關鍵柴油發電機房與配電室。保安組與民和派出所及消防分隊建立直接對話，一旦發現不明入侵包裹或暴動火警，武裝警察於<strong>6 分鐘內</strong> 到達，消防水車於 <strong>3 分鐘內</strong>到達大連路巷口進行防暴滅火支援，強力壓制滲透行為。</p>"}]}]}, {"id": "med", "name": "07　執行部長／醫療照護處", "roles": [{"role": "執行部醫療照護處", "entries": [{"stage": 2, "scenario_id": "02", "scenario_title": "軍事威脅／飛彈", "datetime": "8月8日 10:00", "summary": "國防部發布監測資訊，指出自大陸沿岸方向朝臺灣周邊海空域發射多枚飛彈，部分彈道飛越臺灣本島上空，另有飛彈落入周邊海域；相關訊息經媒體即時報導，引發民眾對戰爭風險之疑慮，影響社會穩定。", "detail": "由醫療照護組長徐禮平副部長帶領，公務機簡碼69231", "html": "<p>面對飛彈威脅可能伴隨之大範圍實體破壞與大量傷亡警報，醫療照護組長（徐禮平副部長）立即指揮急診、ICU、病房與開刀房主管，執行「戰前物資與臨床空間極速收縮應變」。住院照護組（蕭麗萍督導長，公務機簡碼69272）立即指派資深主治醫師進駐各普通病房，依據MEWS（成人早期預警評分）啟動強勢「反向檢傷」，篩選低風險患者，通知家屬配合快速出院程序。目標於4 小時內將普通病房病人數降載，強行騰出至少 <strong>20% 的可用空床</strong>。</p><p>重症加護組（李羽仁主任 / 陳素華督導長，公務機簡碼 69236）密切監控 ICU維生系統狀態，確保攜帶式生理監視器蓄電量大於 100%、備用氧氣鋼瓶壓力大於<strong>100bar</strong>，並安排病情穩定者手動移轉至一般病房。開刀房（莊詩蘋督導長，簡碼65311）立即停止所有非急迫性門診手術及檢查，準備將手術耗材及麻醉藥劑向 B1臨時手術室轉置，死守急診創傷與大量傷患搶救之黃金通道。</p>"}, {"stage": 4, "scenario_id": "02", "scenario_title": "敵前沿疏散決策", "datetime": "", "summary": "第四作戰區通報屏東縣聯合應變指揮管制中心，研判東港、林邊、佳冬及枋寮之台17線以西沿海聚落為敵我交戰前沿，居民滯留將面臨高度生命危險並影響部隊行動，建議立即分區疏散至內陸安全地區。", "detail": "由醫療照護組長徐禮平副部長帶領住院照護組蕭麗萍督導長，公務機簡碼69231 / 69272", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：執行部醫療照護處長（徐禮平副部長）會同住院照護組長（蕭麗萍督導長），接獲疏散前沿警報後，立即啟動<strong>「住院病患四級反向檢傷與隨車一對一配對程序」</strong>。醫療照護處召集病房主治醫師與護理長，針對107床住院病患實施強勢反向檢傷評估：</p><ul><li><strong>第 1    類：可返家（行動方便者）</strong>：生命徵象穩定，拔除靜脈點滴，由主治醫師簽發快速出院單，於    4小時內由家屬私人車接回或引導至巴士集結點。</li><li><strong>第 2    類：安置（需扶持者）</strong>：無立即生命危險但無生活自理能力，安排下轉至內陸安全重置之長照機構。</li><li><strong>第 3    類：一般住院（臥床者）</strong>：列為中優先級，配合中型巴士或一般救護車轉移至地下一樓（B1）避難醫療空間或下轉。</li><li><strong>第 4    類：高度照護（危急／ICU病患）</strong>：極度依賴維生設備、呼吸器之重症患者，列為<strong>「最高優先疏散級」</strong>。</li></ul><p>為防範轉運途中通訊中斷或資訊遺失，護理人員將每位患者之紙本轉診單、病歷摘要、手寫處方箋放入防水夾鏈資料袋，使用實體束帶<strong>「強制物理綁定於擔架或推床旁」</strong>（人藥病歷隨行原則）。醫護同工於路加大樓B1 停車場（人員集合點）與恩慈大樓 1樓停車場（物資裝載點）實施最嚴格的「哨口精準流向登記」。上車前逐一核對病患防偽手圈與車輛車牌，抵達接收醫院後，嚴格執行<strong>ISBAR 臨床交接機制</strong>，完成實體雙簽核對。</p><p><strong>2. 確實數據與資源規劃</strong>：住院照護組（蕭麗萍督導長）精算最低安全照護人力需求：若疏散轉置一般住院病患至B1 停車場臨時一般病房（共 36床），護病比採 <strong>1:9至1:16</strong>彈性排班，以因應人力短缺。隨車轉運重症（ICU）患者時，嚴格遵循「醫護與病人1:1 戰術配對」，指派 1名責任護理師與1名呼吸治療師隨救護車全程照護，備妥攜帶式氧氣鋼瓶（壓力高於 100bar，自撐 2小時以上）與足額 72小時必要用藥，死守患者之生命支持不中斷。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>： 徐禮平副部長彙整已出院、已轉院、已移置B1（目標為 10% 住院病患地下化） 之實體紙本報表，由 Runner遞送至狀況分析處，以登錄戰情面板呈報指揮官。</p>"}, {"stage": 4, "scenario_id": "07", "scenario_title": "收容與急救站衛生危機", "datetime": "", "summary": "東港臨海地區第1型急救站因戰線逼近撤離，出院後仍需照護之病人及醫護人力下轉至來義高中第2型急救站；因供水不穩、收容量快速增加及臨時儲水管理不當，出現群聚感染、環境衛生與情緒管理風險。", "detail": "由醫療照護組長徐禮平副部長帶領住院照護組蕭麗萍督導長，公務機簡碼69231 / 69272", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：來義高中收容站面臨水質異常、供水不穩及大批下轉患者群聚感染（如急性腸胃炎或呼吸道感染）之衛生危機。執行部醫療照護處組長（徐禮平副部長）會同住院照護組長（蕭麗萍督導長），立即成立<strong>「戰時急救站感控救援與病患分流收治特遣隊」</strong>。徐禮平副部長下令指派感控護理長帶領特遣隊進駐或遠端對接來義高中，協助該站建立最嚴格之<strong>「病患單向分流與隔離感控SOP」</strong>。</p><p>特遣隊醫護人員在來義高中，依病情實施單向分流：</p><p>1.  *隔離區劃分*：將大批腹瀉或呼吸道咳嗽傷患，在物理空間上強制隔離至來義高中之獨立教室（分別劃分為呼吸道隔離教室、腸胃道隔離教室），阻斷交叉傳染。</p><p>2.  *水質安全檢校*：手動印發「臨時儲水查檢表」至該站，指導其使用本院外送之漂白水進行儲水池餘氯快篩檢測（維持有效餘氯    0.5\\~1.0 ppm），徹底切斷水源傳播鏈。</p><p>3.  *心理第一輔助（PFA）*：社工人員對出現恐慌、情緒失控之收容群眾實施    PFA心理急救，分發家屬安撫說帖，降低群體壓力和情緒衝突。</p><p><strong>2. 確實數據與資源規劃</strong>：醫療照護處（徐禮平副部長）精算支援該站之抗菌、抗病毒與補液耗材：藥劑科主任陳秋榮為特遣隊配發「化災與急救感控 Go-Kits」（內含點滴輸液50袋、口服與靜脈注射強效抗生素 100劑、高容量乾水消毒液 20瓶、防護衣50套），不待電子開單、實施推拉式盲派物流直接運送。特遣隊每日下午精算收治病人流向，對於5名重度感染、脫水、生命徵象不穩之第四類危急病患，立即安排簽證救護車後送本院B1 備用 ICU（23床） 進行插管搶救。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：徐禮平副部長將派駐來義高中之特遣隊進度、感染隔離數據以紙本報表彙整，由Runner 送狀況分析處登錄，供指揮官監控決策。</p>"}, {"stage": 4, "scenario_id": "PTCH-16", "scenario_title": "極端斷電應處", "datetime": "", "summary": "【發電機當機與徒手急救】由於連日超載運轉且缺乏機油潤滑，院內最後一部備用發電機縮缸當機。醫院進入「全黑狀態」，UPS電池在30分鐘後耗盡。ICU護理人員必須在黑暗中，使用甦醒球（BVM）對葉克膜與呼吸器病患進行「徒手捏擠」維持生命。", "detail": "主責人：重症加護組陳素華督導長，公務機簡碼69236", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：當最後一部發電機縮缸當機，全院陷入全黑，且 UPS 電池確定將在 30分鐘內完全耗盡時，臨時加護病房（ICU，共設有 23床重症床位）內多名極度依賴高階電控呼吸器、葉克膜（ECMO）及精密點滴升壓劑幫浦之插管重症病人面臨瞬間斷電、窒息死亡的致命威脅。在零電力的黑暗與混亂環境下，醫療照護組必須在30分鐘內動員人力、備齊物理復甦資材，實施人工替代生命支持，以「臨床肉搏戰」硬抗斷電危機。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：重症加護組組長（陳素華督導長，公務機簡碼69236；代理人：專師部副部長）在接獲發電機當機通知 <strong>1分鐘內</strong>，必須宣布加護病房進入<strong>「零電力極端急救與人工捏球接力程序」</strong>。陳素華立即調派病區內所有在勤護理人員（共24名）、呼吸治療師、以及到勤之行政與勤務同工，執行以下最剛性的物理救命步驟：</p><ul><li>*一對一插管切換與人工通氣*：主護護理師在 UPS 電池耗盡前之 <strong>5    分鐘</strong>，手動將插管患者之呼吸器管路物理性斷開，<strong>手動連接至備用之手動甦醒球（Ambu    Bag /    BVM）</strong>，並手動接通床邊備用之攜帶式氧氣小鋼瓶，開啟流量控制閥。</li><li>*組織與培訓「人工捏球大隊」*：由於人工捏球需要長時間、高頻率（成人每分鐘    10 至 12 次，每次潮氣量約 500-600    mL）之精準肌肉擠壓，極易引發操作者之手部肌肉急性疲勞與痙攣。陳素華督導長立即將召回的    <strong>30    名非臨床行政同工、到勤志工、以及在場輕傷病患家屬，迅速組建為「人工捏球大隊（BVM    捏球接力班）」</strong>。重症醫護現場對其進行 3 分鐘速成示範，實施<strong>「2    人一組、15    分鐘強制輪替捏球制」</strong>。一線同工在黑暗中持手電筒或戴頭燈，一對一守護在    ICU 23 名插管病人床頭，肉搏維持患者人工通氣。</li><li>*高警訊藥物重力點滴灌注*：因斷電導致電控點滴幫浦死機，護理師立即手動拔除精密點滴幫浦，將強心劑與升壓藥改採<strong>「重力式精密點滴套管（手動調節滴數）」</strong>進行給藥，由資深護理師手持手電筒以肉眼嚴密讀秒、手動微調滑閥，死守重症患者之血壓紅線。</li><li>*Downtime 手寫生命體徵監控*：在 HIS/NIS    完全癱瘓且無心電監視器狀態下，主護護理師與呼吸治療師改用實體聽診器，每    <strong>15 分鐘</strong>    手動測量病患之橈動脈脈搏、呼吸音，並將數據手寫記錄於紙本「Downtime    重症照護特別紀錄單」中，與當班醫師實施<strong>「口頭覆誦（Read-back）雙人核確認」</strong>，死守照護品質。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>： 重症加護組精算維生及防護物資數據： 臨時ICU（共 23 床，配置於韓偉 B1 MRI 室與資材組走廊）編配護理同工 <strong>24人</strong>，實施 12 小時雙班強制輪替。</p><ul><li>主護護理師確保各病床端配置的<strong>手動甦醒球（BVM）共 23    組</strong>全部物理接通。</li><li>確認各床備用之<strong>攜帶式氧氣小鋼瓶（O2 Cylinder）壓力大於 100    bar</strong>，在大流量 10 L/min 模式下，單瓶可自撐連續供氧 <strong>2 小時</strong>。    資材組緊急調撥儲備之手持式 LED 頭燈 30 個、備用乾電池 100    顆送達護理站，由 Runner 每 2    小時巡檢各床鋼瓶壓力，確保在全黑孤島狀態下重症病人生命徵象 100%    安全。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>： 陳素華督導長隨時將 ICU內人工通氣維持狀況、手動捏球大隊人力缺口、以及備用氧氣小鋼瓶消耗餘量，以定頻對講機向執行部醫療照護處長（徐禮平副部長，公務機簡碼69231）報告，協調後勤組隨時派 Runner 送補鋼瓶。</p>"}, {"stage": 4, "scenario_id": "PTCH-20", "scenario_title": "戰火波及院區", "datetime": "", "summary": "【無人機/流彈誤擊建築】敵我交火過程中，不明無人機殘骸或流彈擊中屏基門診大樓高樓層，引發局部火災並造成氧氣管線破裂洩漏。院方需在缺乏消防隊支援（市區多處起火，消防癱瘓）的情況下，由醫護人員自行滅火並緊急疏散該樓層病患。", "detail": "主責人：住院照護組蕭麗萍督導長/ 安全管制組保安組長王建文，簡碼 69410", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：當高樓層火災發生、濃煙向下滲透，且面臨斷電、電梯停擺之複合性危機時，病區內殘存之住院病患（包括降載後保留之107床住院病人及待後撤重症患者）面臨生命威脅。為了防範吸入性煙入性灼傷，醫療照護組住院照護組（蕭麗萍督導長）與保安組長王建文（簡碼69410；代理人吳哲維主任）必須在 20分鐘內，執行全院「無動力垂直疏散避難」，引導大批臥床病人徒步向地下強固之B1 避難醫療空間撤離。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：蕭麗萍督導長與保安組長王建文立即啟動<strong>「戰時無電力無電梯垂直避難疏散與哨位防護SOP」</strong>。避難引導班與護理同工迅速執行以下最剛性的無動力物理撤離步驟：</p><ul><li>*病患四級反向檢傷分級撤離（避難引導班）*：護理人員逐一核對病人防偽識別手圈與手寫病歷。</li></ul><p>1.  *第一類：可自行移動之輕症患者*：在護理師引導下，用濕毛巾捂口鼻、沿常規安全逃生扶梯徒步撤離。</p><p>2.  *第二類：無法自理、臥床之病人*：護理師立即啟用護理站備置之<strong>「樓梯疏散滑墊」或軟擔架</strong>。</p><ul><li>*無動力純人力垂直疏散*：</li></ul><p>1.  *五人一組撤離編組*：護理部下令實施最剛性的「5 人一組（4        名搬運同工／家屬負責抬軟擔架、1        名護理師負責提隨行攜帶式維生氧氣小鋼瓶與藥物包，落實一對一隨行物理配對）」。</p><p>2.  *樓梯徒步下運*：同工在黑暗中持手電筒，手動將臥床患者沿逃生走廊及防煙梯道，一步一步手動物理性向下運送，穿越防火捲門屏障，將病患安全送達<strong>地下一樓（B1）臨時病房安全避難安置區（路加B1，配置        36 床）</strong>。</p><ul><li>*疏散哨位門禁與人流甄別*：保全同工配合武裝憲警在<strong>「路加大樓 B1    停車場入口避難集合點」<strong>及 B1    通道築起實體管制拒馬防線，保全手持</strong>金屬探測器對所有撤離人流實施武器安檢</strong>，強勢阻絕境外特工、暴徒或閒雜人等借混亂衝擊地下指揮中樞，嚴密核對病患防偽手圈，確保    107 名住院病人 100% 安全撤離、人頭數完全相符。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>： 住院照護組與保安組精算疏散避難數據：全院共需撤離一般普通病房保留之<strong>住院病患 107 名</strong>（病患分組B，含兒科 2B病房嬰幼兒）。</p><ul><li>避難引導班配置<strong>專責護理師 15 名</strong>、<strong>保安保全 5    名</strong>、自衛消防班同工 20 名。</li><li>確認備用之<strong>樓梯疏散滑墊 20 組</strong>、防水防潮病歷資料夾鏈袋 110    個全部隨推床實施 1:1 實體防水物理綁定，保障病歷資訊不遺失。    疏散點名率目標達 <strong>100% 覆蓋</strong>，嚴防在混亂中發生人員遺漏。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>：蕭麗萍督導長隨時將各樓層撤離完成進度、已抵達 B1安全避難人數、以及受傷同工清點清冊，以有線電話或定頻無線電向計畫部狀況分析處（莊詩蘋督導長，簡碼65311）報告，呈報事故指揮官劉思源完成第四階段狀況處置之最後簽證。</p>"}, {"stage": 5, "scenario_id": "04", "scenario_title": "醫療後撤機制啟動", "datetime": "", "summary": "台17線以西戰況持續惡化，屏東基督教醫院評估院區安全與供應鏈風險升高，啟動分級後撤與病人分流：高度照護病人及隨行醫護轉送至其他急救責任醫院；可下轉或出院後仍需照護者送至來義高中第2型急救站，並同步撤收關鍵設備、藥材、血品及資訊備援。", "detail": "由醫療照護組長徐禮平副部長帶領住院照護組蕭麗萍督導長，公務機簡碼69231 / 69272", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>： 當台 17線以西戰況惡化、院區供應鏈與實體安全風險升高，指揮官正式宣布啟動 HICS第三階段「預防性全面撤離與量能轉移」時，醫療照護處組長（徐禮平副部長，公務機簡碼69231 / 住院照護組蕭麗萍督導長，簡碼 69272）立即啟動<strong>「住院病患四級反向檢傷、醫護病人隨車一對一配對及跨院轉銜SOP」</strong>。</p><p>醫護同工立即進駐各普通病房與加護病房（ICU），針對降載 30% 保留之 <strong>107床住院病患</strong>（一般病床與特殊病床）執行強勢反向檢傷評估：</p><p>1.  *病人四級分類造冊（病患分組 B）*：</p><ul><li><strong>第一級重症</strong>（插管、使用呼吸器之 ICU        瀕死與極重症患者）：最優先級，一律指派 1 名主治醫師、ICU        護理師與呼吸治療師執行        <strong>1:1隨車陪同照護</strong>，轉送至協定聯防醫院（如高榮、屏榮、屏醫、寶建、安泰之重症收治區）。</li><li><strong>第二級中度</strong>（需氧療與特殊照護之慢性病患，如洗腎病人）：次高優先級，安排下轉至來義高中第2型急救站。</li><li><strong>第三級輕症與第四級完成治療者</strong>：協助自行辦理出院或批量大巴轉運。</li></ul><p>2.  *人藥病歷隨車綁定（人藥隨行）*：病房書記及病歷組將病患紙本轉診單、病歷摘要、手寫處方及最後給藥時間紀錄裝入「防水病歷夾鏈袋」，使用實體束帶或膠帶<strong>「強制物理性綁定於推床或擔架旁」</strong>，並為病患配戴防偽手圈。</p><p>3.  *哨口精準流向登記*：病患於避難集合點（<strong>路加大樓 B1 停車場</strong>）    登車前，哨口登記同工（醫療業務室住院櫃檯）手寫登記病患上的車輛牌號、隨行醫護編組    A 名單及接收醫院，抵達目的地後以 <strong>ISBAR</strong>    模式面對面交接簽收，防範資訊斷鏈。</p><p><strong>確實數據與資源規劃</strong>： 住院照護組（蕭麗萍督導長）精算：留院 107床中，列為第一級 ICU 患者約 23 床、第二級洗腎及一般臥床病人約 36床。隨車轉運重症患者時，護理同工確保攜帶式氧氣鋼瓶壓力高於 <strong>100bar</strong>，自撐時數高於 2 小時，備足 72小時之升壓劑、急救藥與無菌輸液，死守病患安全。</p><p><strong>指揮與管制（HICS 對接）</strong>：徐禮平副部長將完成出院、轉院、下轉來義高中急救站之手寫名冊，由傳令Runner 遞送狀況分析處登錄，保持決策完全同步。</p>"}]}, {"role": "社工室", "entries": [{"stage": 2, "scenario_id": "05", "scenario_title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "屏東縣政府內部通訊群組轉傳媒體與社群運用公開航情、船舶追蹤程式所呈現之資訊，並據以研判臺灣周邊海空域情勢；惟內容未經完整查證即快速擴散與再解讀，形成片面推論，加劇民眾對安全情勢之不安。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>社工室主任（葉秀芳主任）為防範恐慌情緒擴散引發集體就醫搶藥或醫病衝突，立即組織「心理韌性安撫特遣隊」。社工室同工、臨床心理師與院牧部人員迅速將編製之「戰時藥物與物資正常供應家屬說帖」分發至急診、普通病房、洗腎室與掛號批價櫃檯。</p><p>社工人員於轉診中心及 B1臨時安置區架設臨時「家屬關懷諮詢站」，派駐志工為排隊民眾與焦慮家屬遞送溫水、安撫情緒，並主動說明本院麻醉藥品與點滴輸液存量充足、醫療從未中斷。社工同工確保<strong>全院對外回答之口徑「百分之百一致」</strong>，不予散播猜測，以理性的官方口徑安撫病患焦慮，全力穩住院內就醫與照護秩序。</p>"}, {"stage": 2, "scenario_id": "06", "scenario_title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "敵對勢力運用社群平台、網路直播、新聞流量及AI生成影像，密集操作「南部已被放棄」、「政府錯判情勢拖入戰爭」、「沿海居民將無法撤離」等敘事，企圖干擾政治與作戰準備節奏，造成屏東地區民眾恐慌。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>社工室（葉秀芳主任）針對「南部已被放棄」等引起之極端悲觀與恐慌情绪，進駐員工休息區與家屬安置區。社工人員與心理師特別關懷在院之1,479名員工（特別是家屬居住於沿海林邊、佳冬等高風險地區之同工）。提供家屬安全疏散說帖與本院備妥之「員工專屬地下庇護站（設於約翰大樓B1 員工運動中心）」安置資訊。</p><p>此心理支持能有效安撫前線醫護因擔心家人而產生之戰鬥疲勞與急性壓力崩潰，穩定本院1,479名同工之防衛防衛心態與士氣。社工同工並於急診檢傷大廳部署重兵志工，手持大聲公與手寫公告牌，引導恐慌湧入之輕症患者，提供心理疏導與導診，協助安管處維護實體門禁安全。</p>"}, {"stage": 2, "scenario_id": "18", "scenario_title": "認知作戰升溫", "datetime": "8月10日 12:00", "summary": "社群媒體流傳縣府官員與家屬優先撤離、重要物資已私下轉移等不實內容，並以截圖與短影音快速擴散，形塑權貴避險觀感，削弱民眾對政府信任，加劇恐慌並引發民眾質疑指揮體系運作。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>社工室主任（葉秀芳主任）為安撫在院病患、家屬及全院同工對政府與本院指揮體系之質疑，立即於<strong>轉診中心（或 B1 臨時安置區）</strong> 設立臨時「家屬安撫諮詢站」。社工組迅速將統一的「戰時物資足額儲備與醫療降載說帖」發放給各普通病房護理長及到勤義工。</p><p>當面對現場焦急詢問或哭喊的病患家屬，諮詢站同工提供杯水、溫和說明本院發電機柴油可自撐77 小時、地下戰備水井日產 1,958 噸等鋼性自撐數據。社工同工確保<strong>全院對外回答口徑「百分之百一致」</strong>，不予散播猜測，以理性的官方口徑安撫病患焦慮。對於在院情緒失控或鼓噪之病患，社工人員會同保全進行一對一關懷，構築起實體與心理層面的「認知防護牆」。</p>"}, {"stage": 3, "scenario_id": "06", "scenario_title": "停水民眾搶購", "datetime": "", "summary": "受停水影響，民眾大量湧入超市、加水站搶購瓶裝水與儲水容器；社群流傳「全縣即將全面停水」及「水源污染」等不實訊息，放大恐慌情緒，造成排隊人潮、交通壅塞及民眾對政府供水能力之疑慮。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>社工室主任（葉秀芳主任）為安撫因停水謠言引發之群眾恐慌，立即於<strong>門診大廳與轉診中心（或 B1 臨時安置區）</strong> 開設臨時「家屬關懷諮詢站」。社工同工、臨床心理師與院牧部人員進駐現場。迅速將統一的「戰時本院水資源足額自撐說帖」發放給一線批掛櫃檯、各病房護理長及到勤志工。</p><p>當面對現場焦急詢問或哭喊的患者及家屬，諮詢同工提供小瓶裝飲用水，溫和向其說明本院戰備水井日供水高達1,958 噸、洗腎 RO 用水 100% 足額自撐之鋼性數據，並重申本院運作安全無虞。社工同工確保<strong>全院對外回答口徑「百分之百一致」</strong>，不散播未經證實之猜測。對於現場企圖搶奪病房飲用水或囤積物資之失控民眾，社工人員會同保全進行一對一心理疏導，防範群情激憤波及醫療區域，構築起實體與心理雙重防線。</p>"}, {"stage": 3, "scenario_id": "13", "scenario_title": "配售秩序混亂", "datetime": "", "summary": "受物資短缺與不實訊息影響，東港鎮、林邊鄉及佳冬鄉部分民生物資配售站因等候時間過長、民眾質疑分配不公而出現爭搶與推擠，導致配售秩序混亂，影響物資發放。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>配售秩序混亂與謠言流傳，造成民眾集體焦慮。社工室主任（葉秀芳主任）為安撫恐慌情緒並防範其衝擊本院醫療秩序，立即啟動「心理急救（PFA）與家屬關懷機制」。社工人員與臨床心理師迅速將編製之「本院醫療物資及膳食足額儲備說帖」分發至急診候診區、住院組櫃檯及B1 臨時病房安置區。</p><p>社工同工於轉診中心開設臨時「家屬關懷諮詢站」，引導排隊家屬與焦慮病患，大聲說明本院備戰藥品與民生物資正常配給、洗腎及急救服務從未中斷。社工同工確保<strong>全院對外回答口徑「百分之百一致」</strong>，以理性的官方口徑疏導病患情緒。對於現場情緒激憤、企圖搶奪病房飲用水之民眾，社工同工會同保全實施一對一心理安撫，構築起心理層面的「認知防護牆」。</p>"}, {"stage": 3, "scenario_id": "16", "scenario_title": "廣播電視遭入侵", "datetime": "", "summary": "屏東地區有線電視播出系統與廣播電台遭不明人士入侵，部分播出系統被控制並持續插入異常訊號，內容涉及重塑國家認同及兩岸政治秩序等高度政治訊息，與正常節目交錯播出，造成資訊混淆與地方輿情升溫。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>在電視媒體遭入侵與謠言交錯下，病患及員工家屬極易動搖人心。社工室主任（葉秀芳主任）為安撫人心，立即啟動「心理急救（PFA）與宣導一致性SOP」。社工人員與心理師進駐轉診中心及病房安置區，迅速將預備好的「戰時本院持續營運與指揮官決策家屬說帖」分發給一線櫃檯、護理同工及志工。</p><p>社工組於轉診大廳架設「家屬關懷諮詢站」，提供杯水與安撫。諮詢站同工面對焦急詢問的家屬，提供溫和情緒疏導，大聲說明本院發電機柴油儲量可支撐77小時、地下戰備水井日產1,958噸等鋼性自撐數據，消除大眾因異常政治訊號產生的集體焦慮。社工同工確保<strong>院內所有人員對外解釋的口徑「百分之百一致」</strong>，構築起實體與心理雙重「認知防護牆」，防範騷亂波及病房。</p>"}, {"stage": 3, "scenario_id": "17", "scenario_title": "民生物資謠言與抗議", "datetime": "", "summary": "網路流傳嬰兒奶粉等民生物資短缺及縣府囤積物資之謠言，屏東縣政府前出現民眾群聚抗議並要求發放物資；另於內埔、潮州、東港等地出現不明傳單，宣稱可憑單領取物資或兌換貨幣，誘發錯誤期待與群聚行為。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>抗議與物資謠言引發民眾衝擊院區秩序。社工室主任（葉秀芳主任）立即於<strong>門診大廳與轉診中心（或 B1 臨時安置區）</strong>架設臨時「家屬關懷與安撫諮詢站」。社工人員、臨床心理師與義工進駐現場，迅速將「戰時物資足額儲備與兒科營養供應家屬說帖」分發至急診、兒科病房（2B/PNICU）護理站及批掛台。</p><p>諮詢站同工面對焦急詢問或企圖憑傳單兌換物資之驚慌民眾，提供杯水並進行PFA。同工大聲向民眾說明本院奶粉、大米等管制必需品已完成備援採購，儲量高於 72小時、供應正常、醫療並未斷供。社工同工確保<strong>全院對外回答口徑「百分之百一致」</strong>，不參與盲目討論。對於企圖衝擊動線之群眾，社工配合保全進行物理引導與情緒安撫，死守急救區動線安全，防範混亂擴散。</p>"}, {"stage": 3, "scenario_id": "PTCH-13", "scenario_title": "避難秩序失控", "datetime": "", "summary": "【防空避難所暴動】空襲警報頻傳，大量非就醫的周邊社區民眾強制湧入屏基地下停車場尋求防空掩蔽。民眾隨地便溺、抽菸，並試圖搶奪醫院配給的飲用水與食物，與駐衛警爆發激烈衝突，威脅地下備援設施安全。", "detail": "主責人：社工室主任葉秀芳，分機20", "html": "<p><strong>1. 狀況概述與面臨挑戰</strong>：當大量恐慌的社區避難民眾湧入地下停車場，且因飲用水與食物匱乏而出現極度焦慮、憤怒並企圖哄搶救命資材時，極易引發嚴重的群體性精神崩潰與醫療暴力衝突。社工室主任葉秀芳（分機20；代理人為各病房資深社工師）必須立即進駐地下避難區，啟動人道輔撫慰、物資分發與心理第一輔助（PFA），以溫和且專業的口徑穩住人心，防止暴動升級。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：社工室主任葉秀芳立即動員全科社工人員與院牧人員，於 <strong>約翰大樓 B1停車場入口空地或轉診中心旁</strong>迅速開設實體<strong>「戰時難民與家屬安心撫慰諮詢站」</strong>。社工同工迅速執行<strong>「心理急救（PFA）與一致性口徑安撫程序」</strong>：</p><p>1.  *實體說帖分發*：社工人員向避難民眾大聲分發、講解本院印製之「屏基持續營運與物資自撐家屬說帖」，以理性的    Facts（事實）大聲向民眾說明：「本院備有地下戰備水井日產水 1,958    噸，發電機柴油充足，醫療物資由政府與軍方保障，絕不缺水斷糧，請大家保持冷靜配合管制」。</p><p>2.  *心理第一輔助（PFA）*：對現場極度恐慌、哭喊、與保全發生爭執之民眾，社工同工採取「雙人編組、主動趨前」策略，提供杯水、安撫情緒，協助照顧隨行之高齡長者及幼童，實施情緒減壓。</p><p>3.  *物資限量配給*：會同營養室，在諮詢站現場實施「手寫紙本登記、限額限量發放生活飲用水與乾糧」程序，確保每人能獲得基本生理所需，強力消弭因物資搶奪引發的混亂。    社工同工並進駐地下員工避難休憩站，為目睹大量戰傷、在極端壓力下持續工作、經歷「反向檢傷」面臨道德撕裂之核心醫護（如急診陳美錚護長團隊、ICU    重症加護組、開刀房莊詩蘋督導長團隊）實施一對一心理輔導與小組減壓支持，保全同工防禦信念。</p><p><strong>3. 實際確實數據與資源規劃</strong>： 社工室主任葉秀芳迅速編組 <strong>10名專職社工人員、3 名臨床心理師</strong>、<strong>5 名院牧部傳道</strong> 以及 <strong>20名到勤行政義工</strong> 投入地下安撫戰線。 諮詢站現場備有瓶裝飲用水 30箱、高熱量能量棒與應急罐頭 200份。社工組與家屬安撫組緊密構聯，確保全院對外、對避難民眾回答本院物資存量之<strong>口徑百分之百一致</strong>，徹底杜絕謠言擴散。</p><p><strong>4. 指揮與管制（HICS 對接）</strong>：社工室主任隨時將登記之避難民眾人數、物資配發賸餘量、醫護心理輔導情況，以有線電話或定頻無線電向計畫部狀況分析處（莊詩蘋督導長，簡碼65311）回報。</p>"}, {"stage": 4, "scenario_id": "09", "scenario_title": "通信廣播設施摧毀", "datetime": "", "summary": "屏東地區主要廣播、無線電視及通信發射設施遭敵摧毀，造成大範圍訊號中斷、頻道停播與網路不穩；民眾無法正常接收新聞及官方訊息，資訊傳遞效能下降，不實訊息與社會不安進一步擴大。", "detail": "由社工室主任葉秀芳帶領，分機 20 /代理人：各病房資深社工師", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：通信廣播受阻、社會陷入極度恐慌，大批焦慮、哭喊的患者及家屬擠爆急診室與大廳，質疑本院收治量能。社工室主任葉秀芳（分機20）立即啟動<strong>「戰時家屬詢答安撫、心理韌性防禦與導診分流SOP」</strong>。社工室同工、臨床心理師與院牧部牧師，立即進駐<strong>轉診中心（或地下一樓臨時安置區）</strong>，正式架設「臨時家屬關懷諮詢站」。</p><p>諮詢站社工人員與心理師，迅速將編製之「本院持續營運與物資足額儲備說帖」分發至各病房護理站、一線櫃檯及到勤志工。社工人員提供現場排隊家屬與病患杯水、溫和進行心理急救（PFA）。面對焦慮詢問，同工大聲向大眾宣導本院戰備柴油發電可撐77小時、地下戰備水井日產 1,958噸等 Fact數據，消除病患因斷網產生的焦慮衝突。社工人員與安全管制處保全密切配合，實施「輕重症導診分流」：引導無生命危險之輕症或恐慌患者至適當之基層醫療聯防診所，將本院急診红區與開刀房通道绝对保留給危及生命之灘岸戰傷重症病患，死守生命線。</p><p><strong>2. 確實數據與資源規劃</strong>： 社工室主任葉秀芳盤點可調派之人力資材： 除10名專職社工人員、3名心理師外，調集本院到勤義工 20名，並備妥瓶裝飲用水30箱、高熱量能量棒與應急乾糧 200份，於 B1 家屬安置區進行發放。社工同工協同文件記錄處（吳瑞敏經理），手工抄錄並更新「地下化就醫病患名冊與快速住院登記簿」，協助家屬進行名冊查詢，確保院內所有回答對外口徑百分之百一致，徹底杜絕謠言滋生。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：社工室主任隨時將諮詢站群眾情緒波動、家屬安置數據，以有線電話或定頻無線電向計畫部狀況分析處（莊詩蘋督導長，簡碼65311）手動回報。</p>"}, {"stage": 4, "scenario_id": "PTCH-18", "scenario_title": "大量傷患/血庫", "datetime": "", "summary": "【血庫歸零與活體捐血】沿海灘岸激戰導致超過百名遭砲擊、破片貫穿的重度創傷軍民湧入。高雄捐血中心血袋無法送達，院內血庫歸零。急診室被迫啟動戰時「活體捐血機制（Walking Blood Bank）」，現場號召醫護與輕傷民眾捲袖抽血，立即進行克難輸注。", "detail": "主責人：社工室主任葉秀芳，分機20", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：當血庫告零、大批重傷軍民命懸一線，且醫院必須在混亂的急診大廳與避難所現場號召大眾「捲袖抽血」時，極易引發民眾對「強抽人血、醫院隱匿傷亡、戰況徹底崩潰」的極度恐慌、憤怒與質疑，甚至在有心人士挑唆下衝擊採血區，威脅醫護安全。社工室（主任葉秀芳，分機20；代理人資深社工師）必須立即進駐前線，執行愛心招募、秩序維護、家屬安撫與心理第一輔助（PFA），以溫和、專業且鋼性的口徑建立起心理認知防禦牆，保全捐血秩序。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：社工室主任葉秀芳（分機 20）在接獲指令 <strong>5分鐘內</strong>，必須動員全科社工同工，於 <strong>約翰大樓 B1臨時急診大廳出口旁空地</strong>架設實體<strong>「戰時活體捐血愛心招募與諮詢站」</strong>。社工同工迅速執行以下剛性安撫與招募步驟：</p><ul><li>*愛心捐血說帖發放與闢謠*：社工人員手持便攜式擴音器，向現場焦慮的避難難民與輕傷病患發放本院印製之「屏基戰時活體捐血與救命保障說帖」，大聲宣導：「各位屏東鄉親，前線國軍與受傷民眾正在流血，本院血庫因聯外橋梁炸毀而告罄。本院擁有最安全的無菌採血技術，請大家捲起袖子、獻出熱血、拯救同胞。所有血液一律限額限量配給給瀕死傷患，請大家放心」。</li><li>*捐血人情緒減壓與心理急救（PFA）*：對願意捲袖捐血但身體劇烈發抖、極度緊張之醫護同工與民眾，社工人員採取「一對一隨行陪伴」策略，提供杯水、輕拍肩膀，實施心理第一輔助（PFA），引導其進入    B1 登記等待區。</li><li>*家屬詢答與實體隔離引導*：針對在急診紅區外大聲哭喊、企圖衝入搶奪血品的焦急家屬，社工人員迅速將其物理性引導至諮詢站內進行一對一懇談，大聲說明本院「活體血庫」已成功採集    50    袋全血、醫師正在進行損傷控制手術等Facts（事實），穩定家屬情緒，嚴防發生急診醫療暴力，死守就醫秩序。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>： 社工室主任葉秀芳迅速調配人力與物資：</p><ul><li>部署 <strong>10 名專職社工人員、3 名臨床心理師</strong>、<strong>20 名到勤義工</strong>    投入地下停車場與急診招募哨口。</li><li>招募站備有熱高流量葡萄糖水 3 箱（120 杯）、補給餅乾 5    箱、手寫捐血榮譽感謝狀 <strong>100 份</strong>（由 HICS 指揮官親自手寫簽章）。    社工同工與保全緊密聯防，確保全院同工對外回答口徑百分之百一致，以理性的溫暖阻斷謠言滋生。</li></ul><p><strong>4. 指揮與管制（HICS 對接）</strong>：社工室主任隨時將登記捐血人數、家屬諮詢人次、以及現場秩序監控讀數，以定頻無線電向計畫部狀況分析處（蕭麗萍督導長，簡碼69272）報告，以便指揮部評估醫療持續運作之社會支持韌性。</p>"}, {"stage": 5, "scenario_id": "05", "scenario_title": "大量死亡遺體處理", "datetime": "", "summary": "屏東地區累計死亡人數達352人，既有殯葬設施量能迅速飽和，遺體辨識、冷藏、運送及家屬聯繫面臨嚴重壓力；另有外籍旅客與移工家屬要求協尋，增加行政、翻譯及國際聯繫負荷。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>： 當屏東地區累計死亡人數達 352人，既有殯葬設施飽和，遺體辨識、冷藏及家屬聯繫面臨巨大壓迫，且外籍旅客與移工家屬要求協尋，行政翻譯負荷劇增。本院社工室主任葉秀芳（分機20；代理人各病房資深社工師）立即啟動<strong>「戰時大量遺體撫慰、身分協尋與外籍家屬翻譯溝通 SOP」</strong>。</p><p>社工組於 <strong>轉診中心（或 B1 臨時安置區）</strong>設立「臨時家屬撫慰與協尋登記諮詢站」，迅速編組 9 名社會工作師及 5名院牧部傳道。 針對大量死亡事件：</p><p>1.  *身分識別與造冊*：社工人員會同文件記錄處（吳瑞敏經理，公務機簡碼    69145），核對急診及病房手寫之「死亡病患登記名冊」，協助警方與法醫進行遺體特徵、防偽手圈比對，完成實體紙本登記。</p><p>2.  *家屬安心溝通與    PFA*：對焦急、痛哭之病患家屬提供杯水與「心理急救（PFA）」，大聲、溫和說明本院遺體臨時冷存位置及後續火化、安置程序，統一對外解釋口徑，防範醫療暴力與騷亂。</p><p>3.  *外籍與移工行政協尋*：社工同工協同院牧外語同仁，提供英、印、越、泰等四國語言翻譯，協助外籍旅客及移工家屬填寫協尋單，橫向聯絡外交部及勞動部地方服務站，死守人道救援防線。</p><p><strong>確實數據與資源規劃</strong>： 社工室主任葉秀芳調配安撫物資：備妥瓶裝飲用水30箱、高熱量能量棒與應急乾糧 200份，於 B1 家屬安置區分發。針對大量死亡導致醫護同工目睹大量傷亡、執行「反向檢傷」面臨道德撕裂（MoralInjury）與急性心理創傷（PTSD）之風險，社工室同工進駐地下避難休憩站，為退下前線的醫護提供PFA 減壓支持，穩定本院 1,479 名同工之殘存心態與防禦韌性。</p><p><strong>指揮與管制（HICS 對接）</strong>：社工室主任葉秀芳將每日傷亡、辨識登記人數及協尋數據，以有線電話手動回報狀況分析小組長，定時呈現於指揮官戰情面板。</p>"}, {"stage": 5, "scenario_id": "07", "scenario_title": "社福及產業移工滯留", "datetime": "", "summary": "大量社福、農漁業及產業移工因雇主照護功能受限、工作場所受損或聯繫中斷，安置需求未能即時掌握，聚集於屏東、潮州及枋寮車站周邊，形成臨時滯留，衍生生活保障、語言溝通與秩序維持壓力。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：大量社福、農漁業及產業移工因雇主失聯、工作場所受損或照護功能中斷，安置未能掌握，聚集於屏東、潮州及枋寮車站周邊臨時滯留，面臨生活保障與語言溝通危機。大批滯留之驚慌外籍移工及受影響之臥床長者，陸續湧入本院尋求醫療庇護與膳食用水。社工室主任葉秀芳（分機20；代理人各病房資深社工師）立即啟動<strong>「戰時移工緊急照護分流、多國語言溝通與 PFA 安撫計畫」</strong>。</p><p>社工組於 <strong>轉診中心（或 B1 臨時安置區）</strong>設立「滯留外籍移工及弱勢群眾就醫服務窗口」：</p><p>1.  *多國語言翻譯與安撫*：社工室會同院牧部外語傳道（傳道 3 人、幹事 1    人），提供印、越、泰、英等多國語言翻譯服務，發放手寫多國語言「戰時就醫指引與物資分發說明」。</p><p>2.  *心理第一輔助（PFA）*：社工同工對極度驚慌、哭泣、因語言不通發生言語衝突之移工實施    PFA 心理急救，提供溫水分發、舒緩情緒。</p><p>3.  *弱勢病患收治與分流*：針對無雇主、無健保卡之滯留傷病移工，文件記錄處派人手寫臨時病歷登記，實施「先醫療救治、後記帳核銷」之人道特殊程序，配合保全將輕症或無生命危險之移工，引導至    B1 避難一般病房或協調社會處收容點安置，死守前線就醫秩序。</p><p><strong>確實數據與資源規劃</strong>： 社工室主任葉秀芳盤點移工關懷資材：調配儲備瓶裝水 20箱、乾糧 100份，派駐4名社工人員專責滯留移工服務。社工組與家屬安撫組密切構聯，確保全院對外、對外籍人士回答本院「物資儲備充足、不缺藥、急診正常收治」之<strong>口徑「百分之百一致」</strong>，徹底阻斷恐慌與謠言之蔓延。</p><p><strong>指揮與管制（HICS 對接）</strong>：社工室主任隨時將移工收容人數、協尋登記數據，以有線電話或無線電向計畫部狀況分析處莊詩蘋督導長（簡碼65311） 回報。</p>"}, {"stage": 5, "scenario_id": "09", "scenario_title": "民生復原啟動", "datetime": "", "summary": "整體態勢由作戰階段轉入復原階段，中央與地方同步啟動民生恢復及基礎設施修復，優先辦理交通搶通、醫療與供水供電復原、治安維護、受災民眾安置及心理支持；國軍完成傷亡官兵救治、通報關懷及撫卹，地方整合民間資源投入復原。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：整體轉入復原階段，地方整合民間資源，國軍完成傷亡官兵撫卹，受災民眾安置及心理支持需求劇增。社工室主任葉芳（分機20；代理人各病房資深社工師） 立即啟動<strong>「戰後長期心理韌性重建、PTSD流行病學阻斷、民間物資整合與受災病患長期安置計畫」</strong>。</p><p>社工組於 <strong>轉診中心（或 B1 臨時安置區）</strong>設立「戰後民生復原與心理支持關懷中心」，編組 9 名社會工作師及 5名院牧部人員：</p><p>1.  *戰後長期心理支持（PFA與PTSD防治）*：臨床心理師與精神科醫師針對全院    1,479    名同工、在院病患及遺屬，實施系統性之創傷後壓力症候群（PTSD）篩檢。    對因目睹灘岸戰傷、經歷大量死亡或反向檢傷發生道德撕裂之核心醫護（特別是急診陳美錚護長團隊、ICU    重症加護組、開刀房莊詩蘋督導長團隊），實施一對一心理輔導與減壓團體，提供心靈輔導與關懷，保全本院長期醫護戰鬥力。</p><p>2.  *民間與國軍資源整合對接*：社工室作為單一窗口，對接地方社會處與慈善民間機構，整合募集之床單、輪椅、飲水與維生營養品，優先撥配給有需要的出院弱勢病患或移工。</p><p>3.  *受災病患安置與撫卹協助*：對住處毀損、無家可歸或雇主亡故之滯留病患、傷殘移工，社工人員協助辦理長期安置至合作之長照機構，並協助國軍傷亡官兵及本院殉職同工家屬辦理特別撫卹手續，保障其合法權益。</p><p><strong>確實數據與資源規劃</strong>：社工室主任葉秀芳彙整本院「民生復原安置與心理諮商造冊清單」：計畫於 2週內完成全院 1,479名同工之心理急救與減壓支持。社工同工協同文件記錄處，將所有參與演習、實兵撤離、Downtime手工記錄之簽到表、通報紀錄及評核表進行彙整，提報危機管理委員會追蹤缺失改進。</p><p><strong>指揮與管制（HICS 對接）</strong>： 社工室主任葉秀芳（分機 20）將每日民生復原安置、民間資源點收及同工心理諮商數據，以紙本報表呈報事故指揮官，圓滿完成115 年城鎮韌性演習之歸建任務。</p>"}, {"stage": 5, "scenario_id": "PTCH-21", "scenario_title": "醫療倫理危機", "datetime": "", "summary": "【啟動戰時醫療降級（CSC）】面對無電、無水、無藥且傷患持續湧入的極端困境，院方倫理委員會痛苦決定啟動「危機醫療照護指引（CSC）」。停止對存活率極低的重症病患（如大面積燒傷、末期癌症）進行心肺復甦（CPR），拔除其呼吸器以讓給前線搶救下來的年輕國軍。", "detail": "主責人：社工室主任葉秀芳，分機62414", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>： 當醫院被迫啟動 Crisis Standards ofCare（CSC）並撤除存活率極低病患的維生設備時，極易引發家屬極度的悲痛、憤怒與質疑，甚至在院內密閉地下避難所內爆發嚴重的醫療暴力衝突，嚴重威脅一線醫護同工的安全與醫療秩序。同時，被迫執行「生命篩選」的醫護同工將面臨毀滅性的創傷後壓力症候群（PTSD）與職業耗竭。關懷組必須立刻築起心理與實體雙重防禦防線。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：社工室主任葉秀芳（分機 62414；代理人：資深社工師）動員全科 9 名社工與 5名院牧部人員，啟動<strong>「CSC家屬溝通安撫、臨終關懷與醫護道德撕裂心理急救（PFA）SOP」</strong>。</p><ul><li>*家屬一對一安心撫慰諮詢*：關懷同工主動將被撤除維生設備病患之焦慮家屬，物理性引導移置至    <strong>路加大樓 B1    指定家屬關懷諮詢區</strong>，由社工師實施心理第一輔助（PFA）。社工師手持「本院危機醫療照護實體說帖」，以百分之百一致的官方口徑進行事實（Facts）溝通：「本院正處於戰時無電孤島極限狀態，醫師們正承受極大痛苦、依據國家法定的客觀存活率評估進行資源調配，請大家保持冷靜」。</li><li>*臨終關懷與安寧過度支持*：院牧人員隨即進駐病床端，為已被放棄插管、進入臨終階段之患者實施床邊撫慰、手動給予微量減痛管制藥品，陪伴其尊嚴走完最後一程，全力阻斷家屬的受害者情緒向醫療暴力轉化。</li><li>*一線同工道德撕裂心理除頻*：社工師與臨床心理師編組，進駐約翰 B1    員工休憩站，針對剛執行完 CSC    決策之醫護同工（如李羽仁主任、陳美錚護長團隊）實施「現場一對一深度傾聽與心理除頻」（如告訴同工：「在極限戰爭中，你們已做了當下最好的決定，你們正在拯救更多的生命」），全力保全醫護之持續防衛信念。</li><li>*哨口實體門禁聯防*：保安組長王建文（公務機簡碼 69410）在臨時 ICU    與關懷區大門部署 2    名保全，手持<strong>金屬探測器實施武器安檢，嚴密鎖固通道</strong>，防止情緒失控之家屬攜帶燃燒彈或利器衝擊病區，死守實體邊界。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>： 關懷組共編配 <strong>9 名社工、5 名院牧人員、3名臨床心理師</strong> 投入一線。關懷組確保為當班 24 名 ICU護理同工及急診醫護，每班次交接下線後，強制實施至少 <strong>30 分鐘</strong>的一對一心理減壓諮詢，造冊計時，強行將同工之心理創傷指數降至最低。</p>"}, {"stage": 5, "scenario_id": "PTCH-22", "scenario_title": "遺體處置危機", "datetime": "", "summary": "【太平間滿載與公衛危機】累計死亡人數破百，院內太平間冰櫃因斷電早已退冰，遺體快速腐敗散發惡臭。因外部殯葬系統崩潰，院方只能將遺體暫置於未受損的地下二樓角落，衍生嚴重的心理創傷與公共衛生（疫病）威脅。", "detail": "主責人：社工室主任葉秀芳，分機62414", "html": "<p><strong>1. 狀況概述與面臨之極限挑戰</strong>：當大量戰死、病逝及重創之遺體源源不斷送入，且外部殯葬與行政登記系統徹底癱瘓時，極易發生遺體身分遺失、家屬認錯屍、以及大批家屬在殮房外推擠暴動之極端混亂。這不僅對死者尊嚴造成踐踏，更會徹底摧毀在院同工與民眾之生存信念，引發集體創傷。關懷組必須立即啟動Downtime 遺體紙本登記與臨終靈性除頻。</p><p><strong>2. 具體可行之平戰轉換作為與標準作業程序（SOP）</strong>：社工室主任葉秀芳（分機62414）與院牧部主任共同啟動<strong>「戰時大量死亡身分紙本核對、手寫造冊登記與靈性追思安慰SOP」</strong>。</p><ul><li>*身分核確與實體防偽標記手寫造冊*：社工人員與血庫、病歷組同工轉任之文件紀錄人員，在遺體裝袋前，逐一核對亡者胸前之四色檢傷牌與實體防偽識別手圈。</li><li>*Downtime    手寫造冊*：行政人員手工填具「戰時死亡病患清冊登記簿」，手寫編製唯一的實體遺體防水標記卡（編號如：<strong>PTCH-DEATH-001    至    PTCH-DEATH-100</strong>）。卡上詳細手寫記錄亡者臨時病歷號、姓名、身分、死亡時間、以及遺體袋位置，使用防水尼龍束帶物理紮緊於遺體袋外側，嚴防帳物混亂。</li><li>*家屬悲傷輔導與多國語言撫慰*：社工師一對一陪伴在院哭泣之亡者家屬，提供杯水與    Psychological First    Aid（PFA）情緒減壓。針對本院收治之大連路周邊外籍移工或無家屬患者，社工人員提供多國語言（印尼語、越南語）撫慰與紙本公告，確保資訊公開、動向透明。</li><li>*床邊靈性追思儀式（心理除頻）*：院牧中心 5    名傳道人員進駐地下臨時殮房大門外，在不影響防護安全前提下，為亡者家屬及一線運送同工實施「簡短追思與點燈祈禱儀式」。社工師帶領經歷「反向檢傷道德撕裂」之醫護同工參與祈禱，以靈性光輝撫平目睹集體死亡之心理創傷，穩住本院持久抗戰之信仰底線。</li></ul><p><strong>3. 實際確實數據與資源規劃</strong>： 社工室主任葉秀芳編組 <strong>10名專職社工人員、5 名院牧同工</strong>，確保在 Downtime 狀態下，2 小時內完成對100 具遺體的手工核對、防防偽標記綁定與登記造冊率達 <strong>100%覆蓋</strong>。社工組與中控室隨時保持 UHF定頻無線電構聯，確保家屬接待動線不與救護車、發電機補油等戰略動線重疊。</p>"}, {"stage": 1, "scenario_id": "01", "scenario_title": "認知作戰／心理戰", "datetime": "", "summary": "中國持續升高對臺複合式壓力，藉聯合演訓掩護兵力前推部署，逐步壓縮戰略預警空間；散布「國際支援難以介入」、「政府決策失靈」及「南部防線即將失守」等論述，企圖削弱民心士氣、動搖政府威信並擴大社會不安。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>： 社工室主任葉秀芳（分機    20；代理人為各病房資深社工師）針對認知戰可能引發的病患與家屬集體心理恐慌，立即啟動<strong>「戰時家屬詢答安撫與心理第一輔助（PFA）計畫」</strong>。社工同工聯同臨床心理師與院牧部牧師迅速進駐<strong>轉診中心及病房家屬安置區</strong>，架設實體「臨時家屬諮詢安撫站」。</li><li>社工室迅速將本院編製之「戰時本院物資足額儲備與持續營運家屬說帖」分發給一線批掛櫃檯、各普通病房、加護病房（ICU）護理長及到勤義工，確保全院同工在面對焦慮家屬哭喊與質疑時，能提供溫和、理性的解答，且<strong>對外回答之口徑「百分之百一致」</strong>，不予散播猜測。</li><li>社工人員在現場為驚慌的就醫者與家屬分發杯水，一對一進行心理疏導，穩定現場病患與家屬情緒。若遇到因極度恐慌而試圖囤積藥物或在急診候診區鼓譟之民眾，社工同工會同安全管制處保全實施物理分流，將其引導至諮詢站進行一對一關懷，防範衝突升級，死守大連院區之就醫秩序。</li><li><strong>實際確實數據</strong>： 社工室迅速動員 <strong>10 名專職社工人員、3    名臨床心理師</strong> 以及 <strong>20 名到勤義工</strong>    投入安撫工作。諮詢站現場預備瓶裝水 30 箱及高熱量即食乾糧 200    份分發給在場家屬，確保安撫作業在斷水斷電危機前即部署完成，維持醫院整體防護韌性。</li></ul>"}, {"stage": 1, "scenario_id": "09", "scenario_title": "認知作戰／假訊息", "datetime": "", "summary": "網路社群大量流傳中國領導人對臺談話內容，並同步散布「臺灣已遭封鎖」、「屏東能源與民生物資即將斷供」及「政府應變失能」等不實訊息，透過認知作戰操作擾動民眾預期，製造社會不安。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>： 社工室主任（葉秀芳主任，分機    20）為防範民生物資斷供之謠言擴散、引發驚慌民众衝入醫院搶奪飲用水或藥品，立即動員社工同工進駐一線，啟動<strong>「家屬安撫諮詢、心理急救（PFA）與一致性口徑    SOP」</strong>。</li><li>社工室於<strong>轉診中心（或 B1    臨時安置區）所有同工對外回答口徑「百分之百一致」</strong>，絕不散播猜測。</li><li>社工同工在諮詢站為驚慌哭喊之病患及家屬遞送溫水、實施心理第一輔助（PFA），大聲向民眾說明本院擁有地下戰備水井日供水    1,958 噸、發電機柴油足夠自撐發電 77    小時、重要醫藥耗材庫存充足等鋼性數據，引導輕症患者至基層聯防診所就醫，將大連院區通道留給急重症病人，以溫和、專業的口徑建立起心理層面的「認知防護牆」。</li><li><strong>實際確實數據</strong>： 社工室動員 <strong>10 名專職社工人員、3 名心理師</strong> 與    <strong>20 名到勤志工</strong> 投入安撫工作。諮詢站現場備有瓶裝飲用水 30    箱及高熱量即食乾糧 200    份進行發放，以理性的官方數據和溫和行動消除大眾恐慌。</li></ul>"}, {"stage": 1, "scenario_id": "10", "scenario_title": "社會秩序事件", "datetime": "", "summary": "屏東地區因假訊息與恐慌情緒擴散，於屏東縣政府周邊、屏東火車站及潮州轉運站等人潮聚集區出現對特定對象指認、圍觀與言語衝突，並伴隨推擠與秩序混亂；相關影像快速傳播後，對公共安全與社會秩序形成壓力。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    大批因外部混亂而受驚、哭喊之民眾與家屬湧入本院大廳，極易因等待時間過長、焦慮不安而與一線醫護爆發激烈的言語或肢體醫病衝突。社工室主任（葉秀芳主任，分機    20）立即啟動<strong>「戰時診間與急診區醫病衝突應急安撫計畫」</strong>。</li><li>社工室動員社工人員與心理師，攜帶大批統一的「本院持續營運與醫療管制說帖」進駐轉診中心及病房安置區。</li><li>社工同工在諮詢站為驚慌哭喊之病患及家屬遞送溫水、實施心理第一輔助（PFA），大聲向民眾說明本院擁有地下戰備水井日供水    1,958 噸、發電機柴油足夠自撐發電 77    小時、重要醫藥耗材庫存充足等鋼性數據，引導輕症患者至基層聯防診所就醫，將大連院區通道留給急重症病人，以溫和、專業的口徑建立起心理層面的「認知防護牆」。</li><li><strong>實際確實數據</strong>： 社工人員及臨床心理師共 <strong>13 人</strong>    採取「雙人編組、隨處巡視」之戰術：2 人進駐一線急診掛號，2    人守住批掛大廳，2    人於病房電梯口導診。社工同工協助保全對情緒激憤、企圖搶奪資材之失控民众進行一對一心理安撫與物理疏導，防止混亂擴散至臨床核心紅區。</li></ul>"}, {"stage": 1, "scenario_id": "16", "scenario_title": "假訊息持續擴散", "datetime": "", "summary": "網路持續流傳化學物質外洩、醫院資安受攻擊及大規模停電等事件，並以剪輯影像及AI生成內容渲染「政府隱匿災情」、「醫院拒收病人」等說法，持續影響醫療秩序與民眾就醫信心。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>： 受 AI    變造影片與謠言擴散之影響，在院普通病房病人、加護病房病人家屬以及大批湧入院區之避難民眾情緒極度不穩，質疑本院是否會「拋棄病人、關閉撤離」。社工室主任（葉秀芳主任，分機    20）立即啟動<strong>「在院病人與家屬戰時心理韌性與關懷安撫 SOP」</strong>。</li><li>社工人員及心理師迅速進駐<strong>轉診中心及地下一樓臨時安置區</strong>之實體「家屬關懷諮詢站」，將統一之「屏基正常開診與病患安全保障說帖」分發給一線櫃檯、各病房護理長及志工，確保全院<strong>同工答詢口徑「百分之百一致」</strong>。</li><li>社工同工在諮詢站現場為家屬提供溫水分發、進行心理第一輔助（PFA），大聲向民眾說明本院擁有地下戰備水井日供水    1,958 噸、發電機柴油足夠自撐發電 77    小時、重要醫藥耗材庫存充足等鋼性數據，引導輕症患者至基層聯防診所就醫，將大連院區通道留給急重症病人，以溫和、專業的口徑建立起心理層面的「認知防護牆」。</li><li><strong>實際確實數據</strong>： 社工室調派 <strong>10 名專職社工人員、3 名心理師</strong> 與    <strong>20 名到勤志工</strong> 投入安撫工作。諮詢站現場備有瓶裝飲用水 30    箱及高熱量即食乾糧 200    份進行發放，以理
