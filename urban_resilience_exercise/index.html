rong>手持金屬探測器掃描與行李防爆搜查</strong>。保安組長指派保全加強對大連路及停車場外圍之實體巡邏，一旦發現有可疑人車於醫院周邊200公尺內滯留或架設不明無線電發射設備，立即上前盤查並通報民和派出所到場排除。</p>"}, {"stage": 2, "scenario_id": "15", "scenario_title": "金融假訊息擠兌", "datetime": "8月9日 10:00", "summary": "社群平台散布「資金將遭凍結」、「金融系統不穩」及「特定族群提前轉移資產」等訊息，引發土地銀行屏東分行、第一銀行屏東分行及其他金融據點提領人潮；排隊與推擠造成民生路、中山路、廣東路等路段壅塞，影響救護與消防車輛通行。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>社群散布金融不穩謠言，引發土銀、一銀屏東分行提領人潮，排隊與推擠造成民生路、中山路、廣東路嚴重壅塞，直接波及本院救護車與消防車輛之通行。保安組長王建文立即啟動<strong>「交通阻塞備援與硬邊界路網暢通計畫」</strong>。保安組長指派保全重兵至本院大連路與莊敬街、瑞光路等周邊聯外巷道口設立管制點。</p><p>保全同工拉起隔離防線，物理勸離於本院大門口、車道出入口及恩慈卸補點周邊之無關圍觀群眾。保安組調派 Runner（徒步傳令兵）持 VHF對講機，預置站立於大連路轉折點，一旦發現本院救護車或警消車輛受金融擠兌排隊車流阻塞，立即主動上前進行人工車流切割，在混亂路段強行引導救護車穿過，確保急診與重症後送動線不被金融擠兌之人潮癱瘓。</p>"}, {"stage": 2, "scenario_id": "16", "scenario_title": "金融擠兌擴大", "datetime": "8月9日 12:00", "summary": "擠兌情形經社群擴散後，帶動屏東市、潮州鎮、東港鎮及內埔鄉之農會、郵局與金融機構出現集中提領，造成現金調度壓力、營運負荷增加及周邊交通壅塞。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>擠兌情形擴散至屏東市、內埔鄉之農會、郵局，現金調度壓力及營運負荷增加，周邊交通塞車嚴重，本院周邊大連路巷口亦出現大量排隊提領人潮與推擠。保安組長王建文立即調派全班保全人員，<strong>拉下醫院大連路大門及停車場車道之部分鐵捲門與拒馬防線</strong>。</p><p>保全同工封鎖本院與周邊金融、郵局據點之物理交界，嚴防因排隊、推擠引發的社會暴動或搶奪風潮波及本院內部醫療區。保全在急診大門外實施最嚴格之通道管制，任何欲進院者強制查驗身分與<strong>手持金屬探測器安檢</strong>。保安組加派人員對發電機房、伺服器機房及馬太 B1 藥庫實施實體上鎖與 24小時站哨守護，防止歹徒企圖趁擠兌混亂潛入院內搶劫貴重藥品或破壞設施，死守醫院大本營之安全。</p>"}, {"stage": 2, "scenario_id": "17", "scenario_title": "銀行擠兌應處", "datetime": "8月9日 13:00", "summary": "受金融交易系統異常影響，臺灣銀行屏東分行出現民眾集中提領情形，造成現金調度與營運壓力；警方即時派遣警力進駐，執行人潮疏導、秩序維護、重要設施警戒及交通管制作業。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>臺灣銀行屏東分行民眾集中提領造成嚴重混亂，警方派遣警力進駐。本院大連院區距離相關提領據點較近，安全管制處（保安組長王建文）立即下令全體警衛保全進入<strong>「一級戰術警戒防禦狀態」</strong>。</p><p>保全同工協同到場支援之民和派出所武裝警力，在大連院區四周及停車場外圍築起拒馬、防撞桿與沙包防線，形成「硬邊界防禦」。保全嚴密監控外圍排隊提領人流，嚴防不法份子藉臺銀擠兌混亂，物理衝擊本院或於外圍縱火。保安組對進入本院急診、住院區之全體同工與就醫人員，實施最嚴厲之身分查驗：資訊人員在地下機房與總機室作業時，必須隨時穿戴<strong>粉紅色識別背心及臂章</strong>；傳令兵（Runner）必須穿戴<strong>紅色Runner臂章</strong>。非配戴此等防偽識別者一律禁止進入管制區，由保全強勢壓制並移交警方，死守安全邊界。</p>"}, {"stage": 3, "scenario_id": "02", "scenario_title": "醫療降載危機", "datetime": "", "summary": "屏東基督教醫院於緊急命令發布後啟動醫療營運降載，暫緩非緊急門診、健檢與部分選擇性手術，以保全急重症核心量能；惟部分民眾無法接受措施，現場出現大量詢問、抱怨及情緒失控，院內外人潮聚集並影響就醫動線。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>當本院啟動醫療降載（暫緩非緊急門診、健檢與選擇性手術），導致大批無法接受的民眾在急診室外及院區周邊聚集、抱怨並企圖衝擊動線時，保安組長王建文立即下令保全由常態轉為<strong>「戰術防衛警備」狀態</strong>。保全人員在<strong>10分鐘內</strong>物理關閉醫院所有側門、後門、地下車道非必要通道，實施封閉式管制。</p><p>保全同工在大連路主要大門及急診入口，迅速架設拒馬、防撞桿及阻絕沙包。全院僅保留「急診出入口」供傷患、員工及必要公務進出。保全於急診入口設立實體管制防線，對欲進入院區之病患及家屬強制實施身分卡查驗，並使用手持式<strong>金屬探測器進行武器、危險品與易燃物安檢</strong>，強勢阻絕非就醫之抗議民眾。</p><p>任何召回之行政或資訊工程同工，保全人員嚴格比對人資名冊：資訊人員必須佩戴<strong>粉紅色識別背心及臂章</strong>，傳令兵（Runner）必須佩戴<strong>紅色專屬臂章</strong>，方可予以放行。一旦群眾推擠升級，保安組長王建文立即透過定頻無線電通報HICS 指揮中心，並撥打 110、119 通報轄區警察局（民和派出所，1.9公里，車程6 分鐘） 請求武裝警力到場實施強勢維安，死守急診就醫動線不被癱瘓。</p>"}, {"stage": 3, "scenario_id": "03b", "scenario_title": "無人機偵察威脅", "datetime": "", "summary": "敵方初期運用多架次無人機對東港、大鵬灣、林邊、枋寮、枋山及恆春半島沿海實施偵察，並結合電子干擾誘發防空系統反應；屏東基督教醫院同步啟動院內防空避難機制，執行人員疏散、地下備援醫療空間轉換及急重症持續收治。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>敵方多架次無人機在周邊沿海偵察，並伴隨電子干擾，威脅本院大連院區之空域安全與人員防空防護。保安組長王建文立即指揮保全由常態守備轉為<strong>「一級防空戰術警戒」狀態</strong>。保安同工立即將大連路停車場、急診室車道、恩慈大樓 1樓卸補點之所有露天待命人員、家屬與輕傷民眾，強勢引導轉入遮蔽物下，禁止任何人員在戶外空地滯留圍觀。</p><p>保全同工<strong>「迅速拉下急診入口防盜鐵捲門」與防火捲門</strong>，實施急診主要出入口之實體硬阻絕防護，防止攜帶爆裂物之無人機強行衝入醫療紅區。中控室警衛利用全院不斷電監視系統（CCTV）24小時嚴密監控韓偉、恩慈大樓頂樓平台與戶外液氧槽空域，重點觀測無人機之飛行方向、幾軸旋翼特徵及有無吊掛可疑物品，並將情資回報安全官杜傳榮主任（簡碼69170）。</p><p>保全同工在大連路巷口加強實體巡邏，防範特工操作手於周邊 200公尺內偵蒐。一旦確認威脅，安全管制組長立即透過對講機，同步向安全官及 110警察局報案，請求軍警攜帶干擾槍到場對無人機實施射頻壓制。警政通報後警力約<strong>6 分鐘</strong> 即可到場協防。</p>"}, {"stage": 3, "scenario_id": "08", "scenario_title": "無人機威脅關鍵設施", "datetime": "", "summary": "屏南地區重要能源與輸配電設施周邊出現不明來源無人機低空盤旋及定點停留，疑似進行設施偵查與目標標定，場站通報相關單位並加強警戒、反無人機與監控作業。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>屏南地區能源與輸配電設施周邊出現不明無人機低空盤旋，疑似標定目標，本院面臨大範圍停電與特工物理破壞之極高威脅。保安組長王建文立即指揮保全由常態巡邏提升為<strong>「一級戰術警戒防衛」狀態</strong>。</p><p>保全同工在大連院區四周及停車場外圍拉起實體管制線與阻絕拒馬。保全人員實施門禁最小化管制，全院關閉側門、地下通道，僅開放急診出入口。保安組長指派保全加強對約翰大樓 B1 核心配電房、工務發電機房、馬太大樓 B1藥庫（第一至三級管制麻醉藥存放區）及伺服器機房之巡邏，並對機房實施機械物理防護上鎖，嚴防第五縱隊特工潛入物理破壞。</p><p>保安組協同到場支援之民和派出所武裝警力（約接報後 <strong>6 分鐘</strong>可抵達），對院區周邊進行防禦掃描，一旦目視發現低空不明無人機，立即記錄特徵並利用干擾槍實施訊號壓制，死守院區實體防護安全邊界。</p>"}, {"stage": 3, "scenario_id": "13", "scenario_title": "配售秩序混亂", "datetime": "", "summary": "受物資短缺與不實訊息影響，東港鎮、林邊鄉及佳冬鄉部分民生物資配售站因等候時間過長、民眾質疑分配不公而出現爭搶與推擠，導致配售秩序混亂，影響物資發放。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>沿海配售站發生等候過長、民眾質疑不公而爆發爭搶推推擠、秩序混亂。此恐慌風潮極易蔓延至本院，導致失控群眾衝擊院區門禁或企圖搶奪資材室。保安組長王建文立即下令保全人員進入<strong>「一級戰術警戒防禦狀態」</strong>。</p><p>保全同工配合到場支援之民防隊伍（T-CERT支援人員），徹底鎖閉醫院大連路大門及約翰停車場之部分鐵捲門防線。保全於急診入口與恩慈大門架設實體隔離護欄。保全實施最嚴格之<strong>「單向受控通道最小化管制」</strong>，除就醫傷患外，禁止任何無關人員駛入或潛入。</p><p>保全同工手持<strong>金屬探探器實施安全檢查</strong>，嚴防攜帶器械之滋事分子混入醫療區搶奪。保全組派人看守B1 資材補給站及藥庫門禁，嚴防不法份子因物資短缺衝擊院舍，死守安全邊界。</p>"}, {"stage": 3, "scenario_id": "14", "scenario_title": "社會秩序惡化", "datetime": "", "summary": "因不實訊息持續擴散，群眾恐慌情緒升高，屏東市、潮州鎮及東港鎮陸續發生搶劫商家、藥局及配售站等案件；警方執勤能量受牽制，對社會治安與公共秩序造成嚴重衝擊。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p>因不實訊息持續擴散，群眾恐慌情緒升高，屏東市多處發生搶劫商家、藥局及配售站案件，警方執勤能量受牽制。本院作為高儲量醫療基礎設施，極易成為歹徒搶劫管制藥品與衛材之目標。保安組長王建文立即啟動<strong>「防暴、防破壞與實體門禁封鎖SOP」</strong>。</p><p>保安組長下令保全同工，配合到場之民和派出所警力，對<strong>約翰大樓 B1核心配電房、工務發電機房、馬太大樓 B1藥庫（第一至三級管制麻醉藥存放區）、資通訊機房及頂樓水塔</strong>，實施 24小時雙人武裝守衛與物理機械上鎖防護。保全人員嚴格查驗身分卡，對進入上述關鍵機房之同工強制核對召回名冊。非配戴粉紅色背心或任務臂章之人員一律強烈攔阻。</p><p>任何企圖物理砸門或強搶藥庫之暴徒，保全同工在保護自身安全前提下，使用防暴盾牌、辣椒水等防衛裝備實施強勢防衛與物理壓制，並移交武裝憲警處理，死守醫院防護邊界。</p>"}, {"stage": 4, "scenario_id": "03", "scenario_title": "灘岸戰鬥傷亡", "datetime": "", "summary": "東港至枋寮沿海爆發灘岸戰鬥，部分建物及漁港設施受砲火波及，造成大量民眾傷亡；初步統計死亡28人、重傷36人、輕傷188人。另重要能源與通信設施遭敵特工滲透破壞，引發駐警與其對抗。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：灘岸戰鬥導致大批恐慌民眾、避難家屬以及企圖搶奪醫療資源之歹徒湧向本院，且重要能源與通信設施遭敵特工滲透破壞，本院面臨極高之安全威脅。保安組長王建文立即下令全體保全與警衛進入<strong>「一級戰術警戒防禦狀態」</strong>。保全同工在<strong>10分鐘內</strong>物理鎖閉醫院所有側門、後門、員工地下通道等非必要常態動線，實施全面封閉式管制。</p><p>保全班長帶領同工，在僅開放之主要急診出入口與停車場通道設立隔離拒馬、阻絕沙包與隔離防線。安全管制處實施最嚴格之<strong>「單向受控通道最小化管制」<strong>，除救護車及急診傷患外，其餘所有家屬與民間車輛一律禁止駛入醫院核心區域。保全人員荷槍實彈（配備防暴盾牌、防暴鋼叉、辣椒水），對欲進入院區之病患及家屬強制進行身分卡查驗，並使用手持式</strong>金屬探測器實施武器、易燃物與危險品安檢</strong>，強勢阻絕非醫療需求人員。保全嚴格盤點到勤同工：資訊與搶修人員必須穿戴<strong>粉紅色識別背心及授權臂章</strong>，Runner 必須佩戴 <strong>專屬紅色 Runner臂章</strong>，無配戴防偽識別之不明人員一律不予放行。</p><p><strong>2. 確實數據與資源規劃</strong>：保安組長王建文立即與外部警消協力單位對接，精算聯防到場時效：</p><ul><li><strong>警力支援到場時效</strong>：聯絡官通報轄區警察局（民和派出所，距本院    1.9公里） 後，武裝警力及交通交警可於 <strong>6分鐘內</strong>    抵達本院大連路現場，實施強制交管、驅離滋事分子，並協助維護急診大門秩序。</li><li><strong>消防支援到場時效</strong>：通報消防分隊（距本院    1.1公里）後，消防車及水車可於 <strong>3分鐘內</strong>    抵達大連路巷口進行防範縱火與初期滅火支援。    保安組每日維持三班制，每班部署至少 5名保全重兵把守 B1    關鍵機房與藥庫門禁，死守實體安全界線。</li></ul><p><strong>3. 指揮與管制（HICS 對接）</strong>：保安組長王建文直接與安全官杜傳榮主任（公務機簡碼69170）對接，利用中控室不斷電監視系統（CCTV）對發電機房、頂樓水塔、液氧槽空域進行24小時監控。</p>"}, {"stage": 5, "scenario_id": "03", "scenario_title": "後備動員困難", "datetime": "", "summary": "因應戰況需求，後續動員屏東地區後備軍人約3,600人，惟民眾配合疏散撤離、人口流動頻繁，召集對象行蹤不易掌握；警察局持續協助送達召集令，仍面臨通訊中斷與回覆延宕，影響動員時效。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：後備動員與召集令送達困難，社會秩序不穩，極易發生不法滋事分子或境外特工（第五縱隊）趁混亂、通訊癱瘓之際，喬裝成被召回之同工、外包工程人員或病患家屬潛入醫院大本營，對配電房、水塔或管制藥庫進行物理破壞。安全管制處組長（保安組長王建文，公務機簡碼69410；代理人醫勤室主任吳哲維，簡碼 62006）立即啟動<strong>「防滲透、防破壞與戰時防偽識別管制 SOP」</strong>。</p><p>保全同工封鎖全院所有非必要出入口，大連路大門及停車場車道拉下部分鐵捲門與防護拒馬，僅保留一個受控之急診單向安全通道，實施實體硬阻絕。保全人員在大連路大門、急診入口及恩慈 1樓報到站，架設隔離護欄與金屬安檢哨：</p><p>1.  *金屬掃描安檢*：對所有欲進入院區之召回同工、病患及家屬，一律手持<strong>金屬探測器實施武器、化學液體及防爆搜查</strong>。</p><p>2.  *防偽識別管制*：任何經核對召回名冊無誤之同工，一律配發防偽專屬識別：<strong>資訊及技術搶修同工必須穿戴「粉紅色識別背心及授權臂章」</strong>；<strong>傳令兵（Runner）必須佩戴「紅色專屬臂章」</strong>。保全同工在各樓梯間、電梯口及關鍵機房（約翰    B1 核心配電房、工務發電機房、馬太 B1 管制藥庫及伺服器機房）實施 24    小時站哨，非配戴此等防偽背心及臂章之人員一律禁止進入管制區，強勢維護醫院物理安全邊界。</p><p><strong>確實數據與資源規劃</strong>：安全管制處（王建文組長）盤點保全安防裝備：配備防暴盾牌 15面、防暴鋼叉5支、手持金屬探測器 6支、強光手電筒 20支、防割手套20雙，並與到場支援之民和派出所武裝警力（約接報後 <strong>6 分鐘</strong> 可抵達）及消防分隊（約 <strong>3 分鐘</strong> 可抵達）建立直接無線電構聯頻道，確保旦發生特工破壞或縱火能於 5分鐘內實施強勢壓制與初期滅火。</p><p><strong>指揮與管制（HICS 對接）</strong>： 保安組長王建文隨時向安全官杜傳榮（簡碼69170） 與執行部長王建銘 報告院區門禁警戒與人流甄別狀態，監控全院 CCTV監視器。</p>"}, {"stage": 5, "scenario_id": "05", "scenario_title": "大量死亡遺體處理", "datetime": "", "summary": "屏東地區累計死亡人數達352人，既有殯葬設施量能迅速飽和，遺體辨識、冷藏、運送及家屬聯繫面臨嚴重壓力；另有外籍旅客與移工家屬要求協尋，增加行政、翻譯及國際聯繫負荷。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機勤簡碼69410", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：大量死亡遺體飽和，對院區環境感控、疾病預防與門禁秩序形成致命壓迫。安全管制處組長（保安組長王建文，公務機簡碼69410；代理人吳哲維主任）立即下令保全同工配合環保室，啟動<strong>「戰時臨時殮房開設、遺體實體安全防護與衛生感控SOP」</strong>。</p><p>為防範遺體腐敗滋生疫病，工務與安全管制組立即於 <strong>約翰大樓 B1車道旁或恩慈 D 棟空地</strong>，架設並鎖閉啟用本院儲備之「-18℃低溫冷凍貨櫃」作為「戰時臨時殮房（LockerZone）」，確保遺體在低溫下安全冷藏。 保全人員在臨時殮房周邊 50公尺內，拉起黃色管制警戒線，架設實體隔離拒馬，設立「一級殮房管制哨口」，實施24小時雙人巡邏與站哨看守，非經指揮官特別派令、警方及法醫簽名核可之人員，一律強勢阻絕進出。</p><p>任何運送遺體或家屬前來辨認之車輛、人員，保全強制查驗防偽識別證，使用<strong>手持金屬探測器進行最嚴格的安全掃描與危險品搜查</strong>，嚴防不法份子或境外特工企圖藉混亂破壞冰櫃、投毒或砸毀殮房，死守醫院實體防護之「硬邊界」。</p><p><strong>確實數據與資源規劃</strong>：保安組長王建文協同環保組（室）林良哲組長，盤點遺體防護資材：儲備遺體袋<strong>150 個</strong>、化學消殺漂白水 15桶、一次性防護衣 100套，並指定1名資深保全班長專責殮房實體門禁登記。保安同工每 2小時巡視低溫冰櫃發電機配電迴路，確保其連接至發電機優先供電之核心配電盤，防止冰櫃因斷電回溫，死守衛生感控紅線。</p><p><strong>指揮與管制（HICS 對接）</strong>：保安組長隨時將臨時殮房運作、遺體冷藏容量及安防狀態，以對講機向安全官杜傳榮主任（簡碼69170） 彙整呈報。</p>"}, {"stage": 1, "scenario_id": "04", "scenario_title": "軍事整備", "datetime": "", "summary": "國防部同步開設應變中心，運用情監偵系統強化全時預警監控，持續掌握敵情發展，並維持部隊適度戰備狀態，實施「立即備戰操演」。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    為配合國軍「立即備戰操演」及防範戰時軍事整備引發的社會恐慌，保安組長王建文（公務機簡碼    69410；代理人醫勤室主任吳哲維，簡碼    62006）立即下令保全人員<strong>由常態保全轉為「戰術防衛警備」狀態</strong>。保全同工在    <strong>10 分鐘內</strong> 實施全院封閉式管理，關閉非必要通道。</li><li>保全人員立即關閉醫院所有側門、後門、員工地下車道等常態動線，實施實體物理鎖固。全院僅開放<strong>「急診出入口」</strong>供員工、救護車傷患及必要公務通行。在約翰停車場出入口，保全架設阻絕拒馬、防撞桿與阻絕沙包。</li><li>除救護車、軍警車及持有特定通行證之物資車外，<strong>其餘所有家屬與民間車輛一律禁止駛入醫院核心區域</strong>，並引導至外圍路網，徹底清空救護車專專用迴轉車道，死守醫院實體安全邊界與生命線動線。</li><li><strong>實際確實數據</strong>： 保安組長王建文部署 <strong>5 名專職保全</strong>    在僅開放的急診通道哨口，手持金屬探測器，對所有欲進入院區之人員強制實施身分卡查驗及防爆安檢。中控室警衛利用    UPS 備援供電之 CCTV，對發電機房、頂樓水塔、液氧槽等關鍵基礎設施實施    24 小時無死角監控，防範破壞。</li></ul>"}, {"stage": 1, "scenario_id": "10", "scenario_title": "社會秩序事件", "datetime": "", "summary": "屏東地區因假訊息與恐慌情緒擴散，於屏東縣政府周邊、屏東火車站及潮州轉運站等人潮聚集區出現對特定對象指認、圍觀與言語衝突，並伴隨推擠與秩序混亂；相關影像快速傳播後，對公共安全與社會秩序形成壓力。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    因假訊息擴散、群眾恐慌，於屏東火車站、潮州轉運站等聚集區出現言語衝突與推擠混亂，波及本院周邊大連路路段，大批驚慌群眾或暴民聚集於急診室外，企圖強行衝入院區搶奪資源，嚴重威脅就醫動線與病人安全。安全管制處組長（保安組長王建文，公務機簡碼    69410；代理人吳哲維主任）立即下令保全人員進入<strong>「一級戰術警戒防禦狀態」</strong>。</li><li>保全同工在 <strong>10 分鐘內</strong>    物理關閉全院所有側門、後門、員工地下通道等常態動線，大連路停車場拉下部分鐵捲門與拒馬防線，僅保留急診單向安全通道，實施全面封閉式管理。</li><li>保全同工在急診大門外拉起實體管制線、隔離防線與隔離護欄，將無關之圍觀人群物理阻絕於管制線外。</li><li>保安人員配備防暴盾牌、防暴鋼叉及辣椒水，對欲進院就醫或尋求庇護之人員實施最嚴格的門禁管制：強制查驗身分卡，並使用<strong>手持金屬探測器進行武器、危險品與易燃物安檢</strong>，強勢阻絕非醫療需求或企圖滋事之暴徒，死守大連院區實體防護之「硬邊界」。</li><li><strong>實際確實數據</strong>： 保安組長王建文部署 <strong>5 名專職保全</strong> 24    小時守衛急診單向通道哨口。保安組長與到場支援之民和派出所武裝警力（約接報後    <strong>6 分鐘</strong> 可抵達本院支援） 及消防分隊（約 <strong>3 分鐘</strong> 可抵達）    建立直接對講機聯防頻道，確保能於 5    分鐘內對現場暴力衝突實施物理壓制，防範火災。</li></ul>"}, {"stage": 1, "scenario_id": "11", "scenario_title": "化學災害事故", "datetime": "", "summary": "（通勤尖峰）屏東科技產業園區某食品冷鏈廠之無水氨系統發生外洩，現場出現刺鼻氣味，多名人員頭暈、嘔吐及呼吸不適，初估約50餘人受影響，其中5人重症、15人需住院；氣體受西南風影響向東北擴散，波及園區周邊道路、台1線及縣道189線。", "detail": "由保安組長王建文帶領醫勤室保安組，公務機簡碼69410", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    無水氨外洩伴隨大批化災患者與驚恐家屬擠爆急診入口，且受西南風擴散影響，刺鼻氣味與毒煙可能隨風向飄向本院大連路。保安組長王建文（公務機簡碼    69410；代理人吳哲維主任）立即啟動<strong>「化災空域屏蔽、門禁封鎖與外部警消到場接引    SOP」</strong>。</li><li>保全同工配合 T-CERT 救護班人員，於急診前方車道與恩慈大樓 1    樓停車場卸補點築起實體管制線與隔離護欄，將無關之圍觀人群物理阻絕於化災除污線外，嚴防現場因吸入有害氣體而發生二次中毒。</li><li>為防止刺鼻毒氣及有害無水氨隨空氣流通湧入本院大樓內部，保安組長立即下令：<strong>「迅速拉下急診入口之防盜鐵捲門」與防火捲門</strong>，建立實體硬邊界防護與內部空氣封鎖。保全人員實施「單向最小化受控通道管制」，僅允許經過實體除污之傷患及配戴防偽識別背心與臂章之同工進入核心區，強勢攔阻企圖強行衝擊大門之滋事分子或境外特工。</li><li><strong>實際確實數據</strong>： 保安組指派 Runner    穿戴紅色臂章，於瑞光路與大連路口設立實體接引哨，引導到場支援之消防局毒災化學車（約接報後    <strong>3 分鐘</strong> 可抵達本院支援）及武裝警力（約 <strong>6 分鐘</strong>    可抵達）快速切入指定路網進行環境除污與交管，死守安全邊界。</li></ul>"}]}]}, {"id": "med", "name": "07　執行部長／醫療照護處", "roles": [{"role": "執行部醫療照護處", "entries": [{"stage": 2, "scenario_id": "02", "scenario_title": "軍事威脅／飛彈", "datetime": "8月8日 10:00", "summary": "國防部發布監測資訊，指出自大陸沿岸方向朝臺灣周邊海空域發射多枚飛彈，部分彈道飛越臺灣本島上空，另有飛彈落入周邊海域；相關訊息經媒體即時報導，引發民眾對戰爭風險之疑慮，影響社會穩定。", "detail": "由醫療照護組長徐禮平副部長帶領，公務機簡碼69231", "html": "<p>面對飛彈威脅可能伴隨之大範圍實體破壞與大量傷亡警報，醫療照護組長（徐禮平副部長）立即指揮急診、ICU、病房與開刀房主管，執行「戰前物資與臨床空間極速收縮應變」。住院照護組（蕭麗萍督導長，公務機簡碼69272）立即指派資深主治醫師進駐各普通病房，依據MEWS（成人早期預警評分）啟動強勢「反向檢傷」，篩選低風險患者，通知家屬配合快速出院程序。目標於4 小時內將普通病房病人數降載，強行騰出至少 <strong>20% 的可用空床</strong>。</p><p>重症加護組（李羽仁主任 / 陳素華督導長，公務機簡碼 69236）密切監控 ICU維生系統狀態，確保攜帶式生理監視器蓄電量大於 100%、備用氧氣鋼瓶壓力大於<strong>100bar</strong>，並安排病情穩定者手動移轉至一般病房。開刀房（莊詩蘋督導長，簡碼65311）立即停止所有非急迫性門診手術及檢查，準備將手術耗材及麻醉藥劑向 B1臨時手術室轉置，死守急診創傷與大量傷患搶救之黃金通道。</p>"}, {"stage": 4, "scenario_id": "02", "scenario_title": "敵前沿疏散決策", "datetime": "", "summary": "第四作戰區通報屏東縣聯合應變指揮管制中心，研判東港、林邊、佳冬及枋寮之台17線以西沿海聚落為敵我交戰前沿，居民滯留將面臨高度生命危險並影響部隊行動，建議立即分區疏散至內陸安全地區。", "detail": "由醫療照護組長徐禮平副部長帶領住院照護組蕭麗萍督導長，公務機簡碼69231 / 69272", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：執行部醫療照護處長（徐禮平副部長）會同住院照護組長（蕭麗萍督導長），接獲疏散前沿警報後，立即啟動<strong>「住院病患四級反向檢傷與隨車一對一配對程序」</strong>。醫療照護處召集病房主治醫師與護理長，針對107床住院病患實施強勢反向檢傷評估：</p><ul><li><strong>第 1    類：可返家（行動方便者）</strong>：生命徵象穩定，拔除靜脈點滴，由主治醫師簽發快速出院單，於    4小時內由家屬私人車接回或引導至巴士集結點。</li><li><strong>第 2    類：安置（需扶持者）</strong>：無立即生命危險但無生活自理能力，安排下轉至內陸安全重置之長照機構。</li><li><strong>第 3    類：一般住院（臥床者）</strong>：列為中優先級，配合中型巴士或一般救護車轉移至地下一樓（B1）避難醫療空間或下轉。</li><li><strong>第 4    類：高度照護（危急／ICU病患）</strong>：極度依賴維生設備、呼吸器之重症患者，列為<strong>「最高優先疏散級」</strong>。</li></ul><p>為防範轉運途中通訊中斷或資訊遺失，護理人員將每位患者之紙本轉診單、病歷摘要、手寫處方箋放入防水夾鏈資料袋，使用實體束帶<strong>「強制物理綁定於擔架或推床旁」</strong>（人藥病歷隨行原則）。醫護同工於路加大樓B1 停車場（人員集合點）與恩慈大樓 1樓停車場（物資裝載點）實施最嚴格的「哨口精準流向登記」。上車前逐一核對病患防偽手圈與車輛車牌，抵達接收醫院後，嚴格執行<strong>ISBAR 臨床交接機制</strong>，完成實體雙簽核對。</p><p><strong>2. 確實數據與資源規劃</strong>：住院照護組（蕭麗萍督導長）精算最低安全照護人力需求：若疏散轉置一般住院病患至B1 停車場臨時一般病房（共 36床），護病比採 <strong>1:9至1:16</strong>彈性排班，以因應人力短缺。隨車轉運重症（ICU）患者時，嚴格遵循「醫護與病人1:1 戰術配對」，指派 1名責任護理師與1名呼吸治療師隨救護車全程照護，備妥攜帶式氧氣鋼瓶（壓力高於 100bar，自撐 2小時以上）與足額 72小時必要用藥，死守患者之生命支持不中斷。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>： 徐禮平副部長彙整已出院、已轉院、已移置B1（目標為 10% 住院病患地下化） 之實體紙本報表，由 Runner遞送至狀況分析處，以登錄戰情面板呈報指揮官。</p>"}, {"stage": 4, "scenario_id": "07", "scenario_title": "收容與急救站衛生危機", "datetime": "", "summary": "東港臨海地區第1型急救站因戰線逼近撤離，出院後仍需照護之病人及醫護人力下轉至來義高中第2型急救站；因供水不穩、收容量快速增加及臨時儲水管理不當，出現群聚感染、環境衛生與情緒管理風險。", "detail": "由醫療照護組長徐禮平副部長帶領住院照護組蕭麗萍督導長，公務機簡碼69231 / 69272", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：來義高中收容站面臨水質異常、供水不穩及大批下轉患者群聚感染（如急性腸胃炎或呼吸道感染）之衛生危機。執行部醫療照護處組長（徐禮平副部長）會同住院照護組長（蕭麗萍督導長），立即成立<strong>「戰時急救站感控救援與病患分流收治特遣隊」</strong>。徐禮平副部長下令指派感控護理長帶領特遣隊進駐或遠端對接來義高中，協助該站建立最嚴格之<strong>「病患單向分流與隔離感控SOP」</strong>。</p><p>特遣隊醫護人員在來義高中，依病情實施單向分流：</p><p>1.  *隔離區劃分*：將大批腹瀉或呼吸道咳嗽傷患，在物理空間上強制隔離至來義高中之獨立教室（分別劃分為呼吸道隔離教室、腸胃道隔離教室），阻斷交叉傳染。</p><p>2.  *水質安全檢校*：手動印發「臨時儲水查檢表」至該站，指導其使用本院外送之漂白水進行儲水池餘氯快篩檢測（維持有效餘氯    0.5\\~1.0 ppm），徹底切斷水源傳播鏈。</p><p>3.  *心理第一輔助（PFA）*：社工人員對出現恐慌、情緒失控之收容群眾實施    PFA心理急救，分發家屬安撫說帖，降低群體壓力和情緒衝突。</p><p><strong>2. 確實數據與資源規劃</strong>：醫療照護處（徐禮平副部長）精算支援該站之抗菌、抗病毒與補液耗材：藥劑科主任陳秋榮為特遣隊配發「化災與急救感控 Go-Kits」（內含點滴輸液50袋、口服與靜脈注射強效抗生素 100劑、高容量乾水消毒液 20瓶、防護衣50套），不待電子開單、實施推拉式盲派物流直接運送。特遣隊每日下午精算收治病人流向，對於5名重度感染、脫水、生命徵象不穩之第四類危急病患，立即安排簽證救護車後送本院B1 備用 ICU（23床） 進行插管搶救。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：徐禮平副部長將派駐來義高中之特遣隊進度、感染隔離數據以紙本報表彙整，由Runner 送狀況分析處登錄，供指揮官監控決策。</p>"}, {"stage": 5, "scenario_id": "04", "scenario_title": "醫療後撤機制啟動", "datetime": "", "summary": "台17線以西戰況持續惡化，屏東基督教醫院評估院區安全與供應鏈風險升高，啟動分級後撤與病人分流：高度照護病人及隨行醫護轉送至其他急救責任醫院；可下轉或出院後仍需照護者送至來義高中第2型急救站，並同步撤收關鍵設備、藥材、血品及資訊備援。", "detail": "由醫療照護組長徐禮平副部長帶領住院照護組蕭麗萍督導長，公務機簡碼69231 / 69272", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>： 當台 17線以西戰況惡化、院區供應鏈與實體安全風險升高，指揮官正式宣布啟動 HICS第三階段「預防性全面撤離與量能轉移」時，醫療照護處組長（徐禮平副部長，公務機簡碼69231 / 住院照護組蕭麗萍督導長，簡碼 69272）立即啟動<strong>「住院病患四級反向檢傷、醫護病人隨車一對一配對及跨院轉銜SOP」</strong>。</p><p>醫護同工立即進駐各普通病房與加護病房（ICU），針對降載 30% 保留之 <strong>107床住院病患</strong>（一般病床與特殊病床）執行強勢反向檢傷評估：</p><p>1.  *病人四級分類造冊（病患分組 B）*：</p><ul><li><strong>第一級重症</strong>（插管、使用呼吸器之 ICU        瀕死與極重症患者）：最優先級，一律指派 1 名主治醫師、ICU        護理師與呼吸治療師執行        <strong>1:1隨車陪同照護</strong>，轉送至協定聯防醫院（如高榮、屏榮、屏醫、寶建、安泰之重症收治區）。</li><li><strong>第二級中度</strong>（需氧療與特殊照護之慢性病患，如洗腎病人）：次高優先級，安排下轉至來義高中第2型急救站。</li><li><strong>第三級輕症與第四級完成治療者</strong>：協助自行辦理出院或批量大巴轉運。</li></ul><p>2.  *人藥病歷隨車綁定（人藥隨行）*：病房書記及病歷組將病患紙本轉診單、病歷摘要、手寫處方及最後給藥時間紀錄裝入「防水病歷夾鏈袋」，使用實體束帶或膠帶<strong>「強制物理性綁定於推床或擔架旁」</strong>，並為病患配戴防偽手圈。</p><p>3.  *哨口精準流向登記*：病患於避難集合點（<strong>路加大樓 B1 停車場</strong>）    登車前，哨口登記同工（醫療業務室住院櫃檯）手寫登記病患上的車輛牌號、隨行醫護編組    A 名單及接收醫院，抵達目的地後以 <strong>ISBAR</strong>    模式面對面交接簽收，防範資訊斷鏈。</p><p><strong>確實數據與資源規劃</strong>： 住院照護組（蕭麗萍督導長）精算：留院 107床中，列為第一級 ICU 患者約 23 床、第二級洗腎及一般臥床病人約 36床。隨車轉運重症患者時，護理同工確保攜帶式氧氣鋼瓶壓力高於 <strong>100bar</strong>，自撐時數高於 2 小時，備足 72小時之升壓劑、急救藥與無菌輸液，死守病患安全。</p><p><strong>指揮與管制（HICS 對接）</strong>：徐禮平副部長將完成出院、轉院、下轉來義高中急救站之手寫名冊，由傳令Runner 遞送狀況分析處登錄，保持決策完全同步。</p>"}]}, {"role": "社工室", "entries": [{"stage": 2, "scenario_id": "05", "scenario_title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "屏東縣政府內部通訊群組轉傳媒體與社群運用公開航情、船舶追蹤程式所呈現之資訊，並據以研判臺灣周邊海空域情勢；惟內容未經完整查證即快速擴散與再解讀，形成片面推論，加劇民眾對安全情勢之不安。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>社工室主任（葉秀芳主任）為防範恐慌情緒擴散引發集體就醫搶藥或醫病衝突，立即組織「心理韌性安撫特遣隊」。社工室同工、臨床心理師與院牧部人員迅速將編製之「戰時藥物與物資正常供應家屬說帖」分發至急診、普通病房、洗腎室與掛號批價櫃檯。</p><p>社工人員於轉診中心及 B1臨時安置區架設臨時「家屬關懷諮詢站」，派駐志工為排隊民眾與焦慮家屬遞送溫水、安撫情緒，並主動說明本院麻醉藥品與點滴輸液存量充足、醫療從未中斷。社工同工確保<strong>全院對外回答之口徑「百分之百一致」</strong>，不予散播猜測，以理性的官方口徑安撫病患焦慮，全力穩住院內就醫與照護秩序。</p>"}, {"stage": 2, "scenario_id": "06", "scenario_title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "敵對勢力運用社群平台、網路直播、新聞流量及AI生成影像，密集操作「南部已被放棄」、「政府錯判情勢拖入戰爭」、「沿海居民將無法撤離」等敘事，企圖干擾政治與作戰準備節奏，造成屏東地區民眾恐慌。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>社工室（葉秀芳主任）針對「南部已被放棄」等引起之極端悲觀與恐慌情绪，進駐員工休息區與家屬安置區。社工人員與心理師特別關懷在院之1,479名員工（特別是家屬居住於沿海林邊、佳冬等高風險地區之同工）。提供家屬安全疏散說帖與本院備妥之「員工專屬地下庇護站（設於約翰大樓B1 員工運動中心）」安置資訊。</p><p>此心理支持能有效安撫前線醫護因擔心家人而產生之戰鬥疲勞與急性壓力崩潰，穩定本院1,479名同工之防衛防衛心態與士氣。社工同工並於急診檢傷大廳部署重兵志工，手持大聲公與手寫公告牌，引導恐慌湧入之輕症患者，提供心理疏導與導診，協助安管處維護實體門禁安全。</p>"}, {"stage": 2, "scenario_id": "18", "scenario_title": "認知作戰升溫", "datetime": "8月10日 12:00", "summary": "社群媒體流傳縣府官員與家屬優先撤離、重要物資已私下轉移等不實內容，並以截圖與短影音快速擴散，形塑權貴避險觀感，削弱民眾對政府信任，加劇恐慌並引發民眾質疑指揮體系運作。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>社工室主任（葉秀芳主任）為安撫在院病患、家屬及全院同工對政府與本院指揮體系之質疑，立即於<strong>轉診中心（或 B1 臨時安置區）</strong> 設立臨時「家屬安撫諮詢站」。社工組迅速將統一的「戰時物資足額儲備與醫療降載說帖」發放給各普通病房護理長及到勤義工。</p><p>當面對現場焦急詢問或哭喊的病患家屬，諮詢站同工提供杯水、溫和說明本院發電機柴油可自撐77 小時、地下戰備水井日產 1,958 噸等鋼性自撐數據。社工同工確保<strong>全院對外回答口徑「百分之百一致」</strong>，不予散播猜測，以理性的官方口徑安撫病患焦慮。對於在院情緒失控或鼓噪之病患，社工人員會同保全進行一對一關懷，構築起實體與心理層面的「認知防護牆」。</p>"}, {"stage": 3, "scenario_id": "06", "scenario_title": "停水民眾搶購", "datetime": "", "summary": "受停水影響，民眾大量湧入超市、加水站搶購瓶裝水與儲水容器；社群流傳「全縣即將全面停水」及「水源污染」等不實訊息，放大恐慌情緒，造成排隊人潮、交通壅塞及民眾對政府供水能力之疑慮。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>社工室主任（葉秀芳主任）為安撫因停水謠言引發之群眾恐慌，立即於<strong>門診大廳與轉診中心（或 B1 臨時安置區）</strong> 開設臨時「家屬關懷諮詢站」。社工同工、臨床心理師與院牧部人員進駐現場。迅速將統一的「戰時本院水資源足額自撐說帖」發放給一線批掛櫃檯、各病房護理長及到勤志工。</p><p>當面對現場焦急詢問或哭喊的患者及家屬，諮詢同工提供小瓶裝飲用水，溫和向其說明本院戰備水井日供水高達1,958 噸、洗腎 RO 用水 100% 足額自撐之鋼性數據，並重申本院運作安全無虞。社工同工確保<strong>全院對外回答口徑「百分之百一致」</strong>，不散播未經證實之猜測。對於現場企圖搶奪病房飲用水或囤積物資之失控民眾，社工人員會同保全進行一對一心理疏導，防範群情激憤波及醫療區域，構築起實體與心理雙重防線。</p>"}, {"stage": 3, "scenario_id": "13", "scenario_title": "配售秩序混亂", "datetime": "", "summary": "受物資短缺與不實訊息影響，東港鎮、林邊鄉及佳冬鄉部分民生物資配售站因等候時間過長、民眾質疑分配不公而出現爭搶與推擠，導致配售秩序混亂，影響物資發放。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>配售秩序混亂與謠言流傳，造成民眾集體焦慮。社工室主任（葉秀芳主任）為安撫恐慌情緒並防範其衝擊本院醫療秩序，立即啟動「心理急救（PFA）與家屬關懷機制」。社工人員與臨床心理師迅速將編製之「本院醫療物資及膳食足額儲備說帖」分發至急診候診區、住院組櫃檯及B1 臨時病房安置區。</p><p>社工同工於轉診中心開設臨時「家屬關懷諮詢站」，引導排隊家屬與焦慮病患，大聲說明本院備戰藥品與民生物資正常配給、洗腎及急救服務從未中斷。社工同工確保<strong>全院對外回答口徑「百分之百一致」</strong>，以理性的官方口徑疏導病患情緒。對於現場情緒激憤、企圖搶奪病房飲用水之民眾，社工同工會同保全實施一對一心理安撫，構築起心理層面的「認知防護牆」。</p>"}, {"stage": 3, "scenario_id": "16", "scenario_title": "廣播電視遭入侵", "datetime": "", "summary": "屏東地區有線電視播出系統與廣播電台遭不明人士入侵，部分播出系統被控制並持續插入異常訊號，內容涉及重塑國家認同及兩岸政治秩序等高度政治訊息，與正常節目交錯播出，造成資訊混淆與地方輿情升溫。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>在電視媒體遭入侵與謠言交錯下，病患及員工家屬極易動搖人心。社工室主任（葉秀芳主任）為安撫人心，立即啟動「心理急救（PFA）與宣導一致性SOP」。社工人員與心理師進駐轉診中心及病房安置區，迅速將預備好的「戰時本院持續營運與指揮官決策家屬說帖」分發給一線櫃檯、護理同工及志工。</p><p>社工組於轉診大廳架設「家屬關懷諮詢站」，提供杯水與安撫。諮詢站同工面對焦急詢問的家屬，提供溫和情緒疏導，大聲說明本院發電機柴油儲量可支撐77小時、地下戰備水井日產1,958噸等鋼性自撐數據，消除大眾因異常政治訊號產生的集體焦慮。社工同工確保<strong>院內所有人員對外解釋的口徑「百分之百一致」</strong>，構築起實體與心理雙重「認知防護牆」，防範騷亂波及病房。</p>"}, {"stage": 3, "scenario_id": "17", "scenario_title": "民生物資謠言與抗議", "datetime": "", "summary": "網路流傳嬰兒奶粉等民生物資短缺及縣府囤積物資之謠言，屏東縣政府前出現民眾群聚抗議並要求發放物資；另於內埔、潮州、東港等地出現不明傳單，宣稱可憑單領取物資或兌換貨幣，誘發錯誤期待與群聚行為。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p>抗議與物資謠言引發民眾衝擊院區秩序。社工室主任（葉秀芳主任）立即於<strong>門診大廳與轉診中心（或 B1 臨時安置區）</strong>架設臨時「家屬關懷與安撫諮詢站」。社工人員、臨床心理師與義工進駐現場，迅速將「戰時物資足額儲備與兒科營養供應家屬說帖」分發至急診、兒科病房（2B/PNICU）護理站及批掛台。</p><p>諮詢站同工面對焦急詢問或企圖憑傳單兌換物資之驚慌民眾，提供杯水並進行PFA。同工大聲向民眾說明本院奶粉、大米等管制必需品已完成備援採購，儲量高於 72小時、供應正常、醫療並未斷供。社工同工確保<strong>全院對外回答口徑「百分之百一致」</strong>，不參與盲目討論。對於企圖衝擊動線之群眾，社工配合保全進行物理引導與情緒安撫，死守急救區動線安全，防範混亂擴散。</p>"}, {"stage": 4, "scenario_id": "09", "scenario_title": "通信廣播設施摧毀", "datetime": "", "summary": "屏東地區主要廣播、無線電視及通信發射設施遭敵摧毀，造成大範圍訊號中斷、頻道停播與網路不穩；民眾無法正常接收新聞及官方訊息，資訊傳遞效能下降，不實訊息與社會不安進一步擴大。", "detail": "由社工室主任葉秀芳帶領，分機 20 /代理人：各病房資深社工師", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：通信廣播受阻、社會陷入極度恐慌，大批焦慮、哭喊的患者及家屬擠爆急診室與大廳，質疑本院收治量能。社工室主任葉秀芳（分機20）立即啟動<strong>「戰時家屬詢答安撫、心理韌性防禦與導診分流SOP」</strong>。社工室同工、臨床心理師與院牧部牧師，立即進駐<strong>轉診中心（或地下一樓臨時安置區）</strong>，正式架設「臨時家屬關懷諮詢站」。</p><p>諮詢站社工人員與心理師，迅速將編製之「本院持續營運與物資足額儲備說帖」分發至各病房護理站、一線櫃檯及到勤志工。社工人員提供現場排隊家屬與病患杯水、溫和進行心理急救（PFA）。面對焦慮詢問，同工大聲向大眾宣導本院戰備柴油發電可撐77小時、地下戰備水井日產 1,958噸等 Fact數據，消除病患因斷網產生的焦慮衝突。社工人員與安全管制處保全密切配合，實施「輕重症導診分流」：引導無生命危險之輕症或恐慌患者至適當之基層醫療聯防診所，將本院急診红區與開刀房通道绝对保留給危及生命之灘岸戰傷重症病患，死守生命線。</p><p><strong>2. 確實數據與資源規劃</strong>： 社工室主任葉秀芳盤點可調派之人力資材： 除10名專職社工人員、3名心理師外，調集本院到勤義工 20名，並備妥瓶裝飲用水30箱、高熱量能量棒與應急乾糧 200份，於 B1 家屬安置區進行發放。社工同工協同文件記錄處（吳瑞敏經理），手工抄錄並更新「地下化就醫病患名冊與快速住院登記簿」，協助家屬進行名冊查詢，確保院內所有回答對外口徑百分之百一致，徹底杜絕謠言滋生。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：社工室主任隨時將諮詢站群眾情緒波動、家屬安置數據，以有線電話或定頻無線電向計畫部狀況分析處（莊詩蘋督導長，簡碼65311）手動回報。</p>"}, {"stage": 5, "scenario_id": "05", "scenario_title": "大量死亡遺體處理", "datetime": "", "summary": "屏東地區累計死亡人數達352人，既有殯葬設施量能迅速飽和，遺體辨識、冷藏、運送及家屬聯繫面臨嚴重壓力；另有外籍旅客與移工家屬要求協尋，增加行政、翻譯及國際聯繫負荷。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>： 當屏東地區累計死亡人數達 352人，既有殯葬設施飽和，遺體辨識、冷藏及家屬聯繫面臨巨大壓迫，且外籍旅客與移工家屬要求協尋，行政翻譯負荷劇增。本院社工室主任葉秀芳（分機20；代理人各病房資深社工師）立即啟動<strong>「戰時大量遺體撫慰、身分協尋與外籍家屬翻譯溝通 SOP」</strong>。</p><p>社工組於 <strong>轉診中心（或 B1 臨時安置區）</strong>設立「臨時家屬撫慰與協尋登記諮詢站」，迅速編組 9 名社會工作師及 5名院牧部傳道。 針對大量死亡事件：</p><p>1.  *身分識別與造冊*：社工人員會同文件記錄處（吳瑞敏經理，公務機簡碼    69145），核對急診及病房手寫之「死亡病患登記名冊」，協助警方與法醫進行遺體特徵、防偽手圈比對，完成實體紙本登記。</p><p>2.  *家屬安心溝通與    PFA*：對焦急、痛哭之病患家屬提供杯水與「心理急救（PFA）」，大聲、溫和說明本院遺體臨時冷存位置及後續火化、安置程序，統一對外解釋口徑，防範醫療暴力與騷亂。</p><p>3.  *外籍與移工行政協尋*：社工同工協同院牧外語同仁，提供英、印、越、泰等四國語言翻譯，協助外籍旅客及移工家屬填寫協尋單，橫向聯絡外交部及勞動部地方服務站，死守人道救援防線。</p><p><strong>確實數據與資源規劃</strong>： 社工室主任葉秀芳調配安撫物資：備妥瓶裝飲用水30箱、高熱量能量棒與應急乾糧 200份，於 B1 家屬安置區分發。針對大量死亡導致醫護同工目睹大量傷亡、執行「反向檢傷」面臨道德撕裂（MoralInjury）與急性心理創傷（PTSD）之風險，社工室同工進駐地下避難休憩站，為退下前線的醫護提供PFA 減壓支持，穩定本院 1,479 名同工之殘存心態與防禦韌性。</p><p><strong>指揮與管制（HICS 對接）</strong>：社工室主任葉秀芳將每日傷亡、辨識登記人數及協尋數據，以有線電話手動回報狀況分析小組長，定時呈現於指揮官戰情面板。</p>"}, {"stage": 5, "scenario_id": "07", "scenario_title": "社福及產業移工滯留", "datetime": "", "summary": "大量社福、農漁業及產業移工因雇主照護功能受限、工作場所受損或聯繫中斷，安置需求未能即時掌握，聚集於屏東、潮州及枋寮車站周邊，形成臨時滯留，衍生生活保障、語言溝通與秩序維持壓力。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：大量社福、農漁業及產業移工因雇主失聯、工作場所受損或照護功能中斷，安置未能掌握，聚集於屏東、潮州及枋寮車站周邊臨時滯留，面臨生活保障與語言溝通危機。大批滯留之驚慌外籍移工及受影響之臥床長者，陸續湧入本院尋求醫療庇護與膳食用水。社工室主任葉秀芳（分機20；代理人各病房資深社工師）立即啟動<strong>「戰時移工緊急照護分流、多國語言溝通與 PFA 安撫計畫」</strong>。</p><p>社工組於 <strong>轉診中心（或 B1 臨時安置區）</strong>設立「滯留外籍移工及弱勢群眾就醫服務窗口」：</p><p>1.  *多國語言翻譯與安撫*：社工室會同院牧部外語傳道（傳道 3 人、幹事 1    人），提供印、越、泰、英等多國語言翻譯服務，發放手寫多國語言「戰時就醫指引與物資分發說明」。</p><p>2.  *心理第一輔助（PFA）*：社工同工對極度驚慌、哭泣、因語言不通發生言語衝突之移工實施    PFA 心理急救，提供溫水分發、舒緩情緒。</p><p>3.  *弱勢病患收治與分流*：針對無雇主、無健保卡之滯留傷病移工，文件記錄處派人手寫臨時病歷登記，實施「先醫療救治、後記帳核銷」之人道特殊程序，配合保全將輕症或無生命危險之移工，引導至    B1 避難一般病房或協調社會處收容點安置，死守前線就醫秩序。</p><p><strong>確實數據與資源規劃</strong>： 社工室主任葉秀芳盤點移工關懷資材：調配儲備瓶裝水 20箱、乾糧 100份，派駐4名社工人員專責滯留移工服務。社工組與家屬安撫組密切構聯，確保全院對外、對外籍人士回答本院「物資儲備充足、不缺藥、急診正常收治」之<strong>口徑「百分之百一致」</strong>，徹底阻斷恐慌與謠言之蔓延。</p><p><strong>指揮與管制（HICS 對接）</strong>：社工室主任隨時將移工收容人數、協尋登記數據，以有線電話或無線電向計畫部狀況分析處莊詩蘋督導長（簡碼65311） 回報。</p>"}, {"stage": 5, "scenario_id": "09", "scenario_title": "民生復原啟動", "datetime": "", "summary": "整體態勢由作戰階段轉入復原階段，中央與地方同步啟動民生恢復及基礎設施修復，優先辦理交通搶通、醫療與供水供電復原、治安維護、受災民眾安置及心理支持；國軍完成傷亡官兵救治、通報關懷及撫卹，地方整合民間資源投入復原。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：整體轉入復原階段，地方整合民間資源，國軍完成傷亡官兵撫卹，受災民眾安置及心理支持需求劇增。社工室主任葉芳（分機20；代理人各病房資深社工師） 立即啟動<strong>「戰後長期心理韌性重建、PTSD流行病學阻斷、民間物資整合與受災病患長期安置計畫」</strong>。</p><p>社工組於 <strong>轉診中心（或 B1 臨時安置區）</strong>設立「戰後民生復原與心理支持關懷中心」，編組 9 名社會工作師及 5名院牧部人員：</p><p>1.  *戰後長期心理支持（PFA與PTSD防治）*：臨床心理師與精神科醫師針對全院    1,479    名同工、在院病患及遺屬，實施系統性之創傷後壓力症候群（PTSD）篩檢。    對因目睹灘岸戰傷、經歷大量死亡或反向檢傷發生道德撕裂之核心醫護（特別是急診陳美錚護長團隊、ICU    重症加護組、開刀房莊詩蘋督導長團隊），實施一對一心理輔導與減壓團體，提供心靈輔導與關懷，保全本院長期醫護戰鬥力。</p><p>2.  *民間與國軍資源整合對接*：社工室作為單一窗口，對接地方社會處與慈善民間機構，整合募集之床單、輪椅、飲水與維生營養品，優先撥配給有需要的出院弱勢病患或移工。</p><p>3.  *受災病患安置與撫卹協助*：對住處毀損、無家可歸或雇主亡故之滯留病患、傷殘移工，社工人員協助辦理長期安置至合作之長照機構，並協助國軍傷亡官兵及本院殉職同工家屬辦理特別撫卹手續，保障其合法權益。</p><p><strong>確實數據與資源規劃</strong>：社工室主任葉秀芳彙整本院「民生復原安置與心理諮商造冊清單」：計畫於 2週內完成全院 1,479名同工之心理急救與減壓支持。社工同工協同文件記錄處，將所有參與演習、實兵撤離、Downtime手工記錄之簽到表、通報紀錄及評核表進行彙整，提報危機管理委員會追蹤缺失改進。</p><p><strong>指揮與管制（HICS 對接）</strong>： 社工室主任葉秀芳（分機 20）將每日民生復原安置、民間資源點收及同工心理諮商數據，以紙本報表呈報事故指揮官，圓滿完成115 年城鎮韌性演習之歸建任務。</p>"}, {"stage": 1, "scenario_id": "01", "scenario_title": "認知作戰／心理戰", "datetime": "", "summary": "中國持續升高對臺複合式壓力，藉聯合演訓掩護兵力前推部署，逐步壓縮戰略預警空間；散布「國際支援難以介入」、「政府決策失靈」及「南部防線即將失守」等論述，企圖削弱民心士氣、動搖政府威信並擴大社會不安。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>： 社工室主任葉秀芳（分機    20；代理人為各病房資深社工師）針對認知戰可能引發的病患與家屬集體心理恐慌，立即啟動<strong>「戰時家屬詢答安撫與心理第一輔助（PFA）計畫」</strong>。社工同工聯同臨床心理師與院牧部牧師迅速進駐<strong>轉診中心及病房家屬安置區</strong>，架設實體「臨時家屬諮詢安撫站」。</li><li>社工室迅速將本院編製之「戰時本院物資足額儲備與持續營運家屬說帖」分發給一線批掛櫃檯、各普通病房、加護病房（ICU）護理長及到勤義工，確保全院同工在面對焦慮家屬哭喊與質疑時，能提供溫和、理性的解答，且<strong>對外回答之口徑「百分之百一致」</strong>，不予散播猜測。</li><li>社工人員在現場為驚慌的就醫者與家屬分發杯水，一對一進行心理疏導，穩定現場病患與家屬情緒。若遇到因極度恐慌而試圖囤積藥物或在急診候診區鼓譟之民眾，社工同工會同安全管制處保全實施物理分流，將其引導至諮詢站進行一對一關懷，防範衝突升級，死守大連院區之就醫秩序。</li><li><strong>實際確實數據</strong>： 社工室迅速動員 <strong>10 名專職社工人員、3    名臨床心理師</strong> 以及 <strong>20 名到勤義工</strong>    投入安撫工作。諮詢站現場預備瓶裝水 30 箱及高熱量即食乾糧 200    份分發給在場家屬，確保安撫作業在斷水斷電危機前即部署完成，維持醫院整體防護韌性。</li></ul>"}, {"stage": 1, "scenario_id": "09", "scenario_title": "認知作戰／假訊息", "datetime": "", "summary": "網路社群大量流傳中國領導人對臺談話內容，並同步散布「臺灣已遭封鎖」、「屏東能源與民生物資即將斷供」及「政府應變失能」等不實訊息，透過認知作戰操作擾動民眾預期，製造社會不安。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>： 社工室主任（葉秀芳主任，分機    20）為防範民生物資斷供之謠言擴散、引發驚慌民众衝入醫院搶奪飲用水或藥品，立即動員社工同工進駐一線，啟動<strong>「家屬安撫諮詢、心理急救（PFA）與一致性口徑    SOP」</strong>。</li><li>社工室於<strong>轉診中心（或 B1    臨時安置區）所有同工對外回答口徑「百分之百一致」</strong>，絕不散播猜測。</li><li>社工同工在諮詢站為驚慌哭喊之病患及家屬遞送溫水、實施心理第一輔助（PFA），大聲向民眾說明本院擁有地下戰備水井日供水    1,958 噸、發電機柴油足夠自撐發電 77    小時、重要醫藥耗材庫存充足等鋼性數據，引導輕症患者至基層聯防診所就醫，將大連院區通道留給急重症病人，以溫和、專業的口徑建立起心理層面的「認知防護牆」。</li><li><strong>實際確實數據</strong>： 社工室動員 <strong>10 名專職社工人員、3 名心理師</strong> 與    <strong>20 名到勤志工</strong> 投入安撫工作。諮詢站現場備有瓶裝飲用水 30    箱及高熱量即食乾糧 200    份進行發放，以理性的官方數據和溫和行動消除大眾恐慌。</li></ul>"}, {"stage": 1, "scenario_id": "10", "scenario_title": "社會秩序事件", "datetime": "", "summary": "屏東地區因假訊息與恐慌情緒擴散，於屏東縣政府周邊、屏東火車站及潮州轉運站等人潮聚集區出現對特定對象指認、圍觀與言語衝突，並伴隨推擠與秩序混亂；相關影像快速傳播後，對公共安全與社會秩序形成壓力。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    大批因外部混亂而受驚、哭喊之民眾與家屬湧入本院大廳，極易因等待時間過長、焦慮不安而與一線醫護爆發激烈的言語或肢體醫病衝突。社工室主任（葉秀芳主任，分機    20）立即啟動<strong>「戰時診間與急診區醫病衝突應急安撫計畫」</strong>。</li><li>社工室動員社工人員與心理師，攜帶大批統一的「本院持續營運與醫療管制說帖」進駐轉診中心及病房安置區。</li><li>社工同工在諮詢站為驚慌哭喊之病患及家屬遞送溫水、實施心理第一輔助（PFA），大聲向民眾說明本院擁有地下戰備水井日供水    1,958 噸、發電機柴油足夠自撐發電 77    小時、重要醫藥耗材庫存充足等鋼性數據，引導輕症患者至基層聯防診所就醫，將大連院區通道留給急重症病人，以溫和、專業的口徑建立起心理層面的「認知防護牆」。</li><li><strong>實際確實數據</strong>： 社工人員及臨床心理師共 <strong>13 人</strong>    採取「雙人編組、隨處巡視」之戰術：2 人進駐一線急診掛號，2    人守住批掛大廳，2    人於病房電梯口導診。社工同工協助保全對情緒激憤、企圖搶奪資材之失控民众進行一對一心理安撫與物理疏導，防止混亂擴散至臨床核心紅區。</li></ul>"}, {"stage": 1, "scenario_id": "16", "scenario_title": "假訊息持續擴散", "datetime": "", "summary": "網路持續流傳化學物質外洩、醫院資安受攻擊及大規模停電等事件，並以剪輯影像及AI生成內容渲染「政府隱匿災情」、「醫院拒收病人」等說法，持續影響醫療秩序與民眾就醫信心。", "detail": "由社工室主任葉秀芳帶領，分機 20", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>： 受 AI    變造影片與謠言擴散之影響，在院普通病房病人、加護病房病人家屬以及大批湧入院區之避難民眾情緒極度不穩，質疑本院是否會「拋棄病人、關閉撤離」。社工室主任（葉秀芳主任，分機    20）立即啟動<strong>「在院病人與家屬戰時心理韌性與關懷安撫 SOP」</strong>。</li><li>社工人員及心理師迅速進駐<strong>轉診中心及地下一樓臨時安置區</strong>之實體「家屬關懷諮詢站」，將統一之「屏基正常開診與病患安全保障說帖」分發給一線櫃檯、各病房護理長及志工，確保全院<strong>同工答詢口徑「百分之百一致」</strong>。</li><li>社工同工在諮詢站現場為家屬提供溫水分發、進行心理第一輔助（PFA），大聲向民眾說明本院擁有地下戰備水井日供水    1,958 噸、發電機柴油足夠自撐發電 77    小時、重要醫藥耗材庫存充足等鋼性數據，引導輕症患者至基層聯防診所就醫，將大連院區通道留給急重症病人，以溫和、專業的口徑建立起心理層面的「認知防護牆」。</li><li><strong>實際確實數據</strong>： 社工室調派 <strong>10 名專職社工人員、3 名心理師</strong> 與    <strong>20 名到勤志工</strong> 投入安撫工作。諮詢站現場備有瓶裝飲用水 30    箱及高熱量即食乾糧 200    份進行發放，以理性的官方數據和溫和行動消除大眾恐慌。</li></ul>"}]}, {"role": "執行部醫療照護處／住院及重症照護組", "entries": [{"stage": 2, "scenario_id": "08", "scenario_title": "關鍵基礎設施異常", "datetime": "8月9日 08:00", "summary": "高屏地區天然氣輸配與能源監控系統出現異常警示，部分壓力調節與輸送數據波動，遠端連線紀錄出現非常態來源及通訊中斷；初步研判為控制系統異常或疑似資訊干擾，致南部供氣壓力下降約15%至20%，影響區域能源穩定。", "detail": "由蕭麗萍督導長與陳素華督導長共同執行", "html": "<p>供氣壓力下降及區域電力受威脅。醫療照護組長（徐禮平副部長）下令住院及重症照護組（蕭麗萍督導長/ 陳素華督導長，簡碼 69236）立即執行「維生設備安全檢校」。加護病房護理人員逐床校驗重症病人插管呼吸器與點滴幫浦之不斷電系統（UPS）蓄電狀態。</p><p>本院不斷電系統在負載 10% 下可自撐 100 分鐘，負載 30% 可自撐 30分鐘。護理人員確保各床備用可攜式氧氣小鋼瓶壓力大於 100 bar。若外部電網因天然氣中斷爆發大限電，且發電機 ATS起動出現延遲，護理長立即組織「捏球小隊」，由現場待命之醫護與勤務同工守護病床，隨時準備以人工手動操作甦醒球（AmbuBag）維持患者人工呼吸，並手動抄錄生命徵象，以肉搏戰防範重症病人因能源危機發生生命威脅。</p>"}, {"stage": 3, "scenario_id": "09", "scenario_title": "能源設施爆炸事故", "datetime": "", "summary": "屏南地區能源轉運及輸配電設施疑遭無人機攻擊，部分設備受損並引發局部爆炸與火勢，造成作業人員2人重傷、6人輕傷、另有3人失聯；能源與輸配電作業中斷，造成東港、林邊、佳冬、枋寮、潮州及屏東市部分區域停電，衝擊交通號誌、ATM、醫療與民生用電。", "detail": "由蕭麗萍督導長與陳素華督導長共同執行，簡碼69272 / 69236", "html": "<p>停電直接波及普通病房與加護病房之臨床維生。醫療照護處住院及重症照護組（蕭麗萍督導長/ 陳素華督導長，簡碼69236）立即進駐病區，啟動<strong>「臨床維生設備不斷電系統（UPS）核檢與應急捏球SOP」</strong>。 主護護理師逐床檢查插管重症病人呼吸器、高劑量升壓劑點滴幫浦之UPS 蓄電池蓄電狀態。</p><p>不斷電系統在負載 10% 下可自撐 100 分鐘，負載 30% 可自撐 30分鐘。護理人員確保各床備用氧氣小鋼瓶壓力大於 <strong>100 bar</strong>。 若發電機 ATS送電出現空窗，或 UPS電池即將耗盡，護理長立即通報待命處，召集行政待命同工及志工組成<strong>「人工捏球大隊」</strong>進駐病床端。捏球同工在醫護指揮下，手動擠壓甦醒球（AmbuBag）維持患者通氣，並手動抄錄生命徵象，以「臨床肉搏戰」死守重症病患之呼吸安全與生命支持。</p>"}, {"stage": 1, "scenario_id": "08", "scenario_title": "能源供應中斷", "datetime": "", "summary": "受國際能源情勢緊張、海運受限及區域軍事活動升溫影響，天然氣供應波動加劇；南部燃氣機組配合調度降載運轉，區域發電出力下修約15%，部分地區採分段限電及輪替供電，進一步波及工業生產、醫療與民生用電。", "detail": "由蕭麗萍督導長與陳素華督導長共同執行", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    市電限電直接威脅普通病房、洗腎室（血液透析組）與重症加護病房（ICU）內仰賴維生儀器的危急病人生命。住院及重症照護組（住院照護組蕭麗萍督導長，簡碼    69272；重症加護組陳素華督導長，簡碼    69236；血液透析組組長）立即進駐病區，執行<strong>「維生設備安全核檢與人工甦醒（捏球）應急    SOP」</strong>。</li><li>主護護理師逐床校驗重症病人插管呼吸器、高劑量升壓劑點滴幫浦之不斷電系統（UPS）蓄電狀態，確保其在市電切換發電機的空窗期維持正常生命支持。</li><li>洗腎中心與重症醫師評估病人病況，實施戰時「血液透析降載與純水節約程序」：針對非危急洗腎腎友，彈性調整將一週    3 次透析降至一週 2 次，以極限節約血液透析每日高達 <strong>126 噸的 RO    淨水</strong>。</li><li>若發電機 ATS 送電延遲或不斷電系統即將耗盡，護理長立即通報 HICS    指揮中心調撥人力，組織現場待命醫護及勤務志工成立<strong>「人工捏球小隊」</strong>進駐病床端，手動擠壓甦醒球（Ambu    Bag）維持患者人工呼吸，並手動抄錄生命徵象，以肉搏戰死守病患呼吸安全。</li><li><strong>實際確實數據</strong>： 護理人員確保各床備用可攜式氧氣小鋼瓶壓力大於    <strong>100 bar</strong>，可自撐 2 小時。不斷電系統在負載 10% 下可自撐 100    分鐘，負載 30% 可自撐 30 分鐘。護理組召集 <strong>30 名行政同工與志工</strong>    預置於加護病房，一旦發生完全斷電，立即提供一對一人工捏球支持，死守重症病人生命。</li></ul>"}, {"stage": 1, "scenario_id": "13", "scenario_title": "醫療機構停電危機", "datetime": "", "summary": "屏東地區主要變電設備突發故障，致屏東基督教醫院雙迴路受電中斷，全院無預警停電，嚴重威脅手術中病人及ICU維生系統；備援發電機即時投入，惟1小時後其中一台出現高溫預警，整體供電能力降至約五成，院內燃油存量降至50%以下，急重症照護風險升高。", "detail": "由蕭麗萍督導長與陳素華督導長共同執行", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    大限電與發電機故障極易導致在院普通病房、加護病房及正在進行手術之患者面臨核心儀器斷電危機。住院及重症照護組（蕭麗萍督導長，簡碼    69272；陳素華督導長，簡碼    69236）立即進駐病區，啟動<strong>「維生設備不斷電系統（UPS）核檢與人工甦醒（捏球）應急    SOP」</strong>。</li><li>普通病房及 ICU    護理人員逐床檢查插管重症病人呼吸器、高警訊點滴幫浦之不斷電系統（UPS）蓄電池蓄電狀態，確保在供電受限期間維持正常運作。</li><li>若發電機故障高溫停機，或 UPS 電池即將耗盡，護理長立即通報 HICS    待命處調撥人員，召集行政同工及志工組成<strong>「人工捏球小隊」</strong>進駐病床端，手動擠壓甦醒球（Ambu    Bag）維持患者人工呼吸，並手動抄錄生命徵象，以「臨床肉搏戰」死守重症病患之呼吸安全與生命支持。</li><li>手術室莊詩蘋督導長立即暫停非急迫性之手術排程，通知門診及住院病人，手術無限期延後，準備將手術耗材及麻醉藥劑向    B1 臨時手術室轉置。</li><li><strong>實際確實數據</strong>： 護理人員確保各床備用可攜式氧氣小鋼瓶壓力大於    <strong>100 bar</strong>，可自撐 2 小時。不斷電系統在負載 10% 下可自撐 100    分鐘，負載 30% 可自撐 30 分鐘。護理組召集 <strong>30 名行政同工與志工</strong>    預置於加護病房，一旦發生完全斷電，立即提供一對一人工捏球支持，死守重症病人生命。</li></ul>"}]}, {"role": "執行部醫療照護處／血液透析與重症加護組", "entries": [{"stage": 2, "scenario_id": "09", "scenario_title": "天然氣管線異常", "datetime": "8月9日", "summary": "連接永安液化天然氣接收站與南部供氣網之管線傳出異常警示，監測系統顯示壓力快速下降及流量波動，天然氣輸送能力受限，造成高屏地區燃氣發電、工業及重要民生用氣調度困難。", "detail": "由李羽仁主任與陳素華督導長帶領", "html": "<p>天然氣及燃氣電力調度極度困難。洗腎中心與重症加護組（李羽仁主任 /陳素華督導長，簡碼69236）立即盤點核心臨床耗能與水電極限存量。洗腎（血液透析組，分機12）每日需要高達 <strong>126 噸 RO 淨水</strong>。重症加護組與洗腎中心在醫師評估下，針對非危急病人，實施戰時「透析彈性降載與節約程序」：將常規「一週洗腎3 次」彈性降至<strong>「一週 2次」</strong>，以在維持腎友基本生命徵象下，最大程度節約 RO 純水與電力消耗。</p><p>同時，洗腎與重症護理人員檢查 RO水處理主機與備用配電迴路，確保其連接至發電機優先供電之核心配電盤。若遭遇空襲斷電或設備損毀，醫護人員熟稔執行<strong>「不拔針極速脫離SOP」</strong>（使用雙止血鉗夾閉剪斷管路，穿刺針不拔出並套上無菌注射帽固定），指引病人沿指定樓梯快速疏散至地下避難所，死守病患安全。</p>"}]}, {"role": "執行部醫療業務室暨病歷組", "entries": [{"stage": 2, "scenario_id": "11", "scenario_title": "通信基礎設施異常", "datetime": "8月9日", "summary": "屏東、潮州及東港地區電信機房出現系統異常與網路延遲，並伴隨部分基地台通訊負載異常升高；部分區域出現訊號不穩與通話中斷，影響政府通報、金融交易、醫療聯繫及核心資料處理能力。", "detail": "由醫療業務室主任馬事佐帶領，分機1022", "html": "<p>通信與掛號系統嚴重延遲。醫療業務室（馬事佐主任 /住院組櫃檯）立即啟動<strong>「Downtime掛號批價紙本程序」</strong>。櫃檯同工關閉異常電腦，拿出預置之「手工收據存根」、「現金收付日報表」與「紙本掛號登記簿」。對前來就醫之傷患，一律手寫病歷號，實施「先看診救治、後記帳補登」之戰時寬限程序，病歷組同工改以人工手動調閱庫存之實體病歷。</p><p>針對出院之病患，住院組全面改用手工結算或填寫「未結費用列管單」，允許家屬簽署欠據或預繳部分押金後即刻辦理快速出院離院，不允許因通訊延遲造成掛號大廳人潮積壓。病歷室同工用紙本夾鏈袋裝妥病患之紙本 EMR摘要與手寫給藥單，隨病床由徒步傳令兵（Runner）送往病房或 B1替代空間，維持醫療資訊流。</p>"}, {"stage": 2, "scenario_id": "12", "scenario_title": "通信服務中斷", "datetime": "8月9日", "summary": "受通訊服務異常影響，屏東市、潮州鎮、東港鎮、枋寮鄉及恆春鎮等地區出現通訊不穩與網路中斷，波及政府通報與金融交易系統；坊間流傳即將「全縣斷網」等訊息，引發集中查詢並進一步加重系統負載。", "detail": "由醫療業務室主任馬事佐帶領，分機1022", "html": "<p>外部公網中斷，HIS/NIS 等核心資訊系統全面陷入 Downtime狀態。醫療業務室（馬事佐主任）立即動員全體住院組、批價組及病歷組行政同工，轉為<strong>「手工行政與傳令兵（Runner）機制」<strong>。行政組與計畫部配合，編組大批返院召回之同工擔任徒步傳令兵，傳令同工必須強制穿戴</strong>紅色專屬Runner 臂章</strong>。</p><p>傳令兵穿梭於地下各管制區，攜帶紙本掛號單、手寫處方箋、交叉配血報告與手寫檢驗單。傳令同工與醫護人員大聲執行「口令覆誦（Read-back）」，親自將藥品、檢體與血袋送達臨時開刀房或急診。系統恢復前，病歷組同工在病歷庫手動將所有就醫軌跡登錄至實體「當機期間就醫造冊簿」，待系統通訊恢復後，再由專人補登錄至HIS 系統，防範病歷及行政檔案缺失。</p>"}, {"stage": 3, "scenario_id": "10", "scenario_title": "電力基礎設施攻擊", "datetime": "", "summary": "屏東市、潮州及東港地區多處一次變電所疑遭敵特工滲透破壞，設備異常並引發饋線跳脫，造成屏東市大範圍停電與電壓不穩，並波及麟洛、內埔、萬丹及潮州；縣府機關、屏東基督教醫院、產業園區與主要交通號誌均受影響。", "detail": "由醫療業務室主任馬事佐帶領，分機1022", "html": "<p>全院大停電波及 HIS 掛號、批價與電子病歷。醫療業務室（馬事佐主任 /住院組櫃檯）立即向指揮官呈報，宣告全院進入<strong>Downtime（系統當機）紙本降級作業流程</strong>。櫃檯收費同工關閉異常電腦，物理砸開「當機緊急箱」封條，取出實體紙本病歷夾、手工收據存根、現金收付日報表及紙本掛號登記簿。</p><p>面對大批湧入之病患，掛號、批價與住院組一律手工手寫開立開單、填寫三聯式處方單及未結費用列管單。實施戰時<strong>「先就醫看診、後手工記帳、事後補登錄」</strong>之寬限程序。病歷室同工改以人工手動調閱庫存實體紙本病歷與 EMR 快照摘要。病歷同工用紙本夾鏈袋裝妥處方，交由徒步傳令兵（Runner）送往病房及 B1備援醫療區，傳令同工與醫護大聲覆誦口令（Read-backMechanism）確認醫囑，在無網無電下維持資訊流。</p>"}, {"stage": 1, "scenario_id": "07", "scenario_title": "網路攻擊／通信中斷", "datetime": "", "summary": "灰色地帶騷擾持續升高，敵對勢力針對南部通信節點展開系統性攻擊，中華電信屏東、潮州及東港地區機房遭滲透與網攻，部分核心資料節點受損，造成行動通信、市話及網路服務不穩，線上交易與行動支付驗證異常。", "detail": "由醫療業務室主任馬事佐帶領，分機1022", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    外部公網及掛號、收費電腦系統中斷。醫療業務室（馬事佐主任；代理人為住院組長，分機    1022）立即向指揮官呈報，宣告全院進入<strong>「Downtime    紙本降級與傳令兵（Runner）機制」</strong>。</li><li>櫃檯收費與住院同工關閉異常電腦，拿出預置之<strong>「當機緊急箱」<strong>，物理砸開箱體封條，取出實體紙本病歷夾、手工收據存根、現金收付日報表及紙本掛號登記簿。對前來就醫之傷患，一律手工手寫開立單據，給予臨時病歷號，實施</strong>「先看診救治、後手工記帳、事後補登錄」</strong>之戰時寬限程序。</li><li>病歷室同工改以人工手動調閱庫存實體紙本病歷與 EMR    歷史快照摘要。病歷組指派返院召回之同工擔任徒步傳令兵（Runner，強制穿戴<strong>紅色    Runner 臂章</strong>），用紙本夾鏈袋裝妥處方箋與檢驗單，穿梭於急診、藥局與    B1 替代醫療空間，與醫護大聲執行<strong>「口令覆誦（Read-back    Mechanism）」</strong>確認醫囑，在零網路下維持診療資訊流。</li><li><strong>實際確實數據</strong>：    病歷組與住院櫃檯整備手工紙本掛號單及三聯式處方箋共 <strong>1,500    份</strong>（可自撐至少 72 小時 Downtime 運作），派駐 <strong>10 名專責 Runner</strong>    穿戴紅色臂章，每小時往返各病區 4    次，以肉搏戰防範病歷及醫療資訊斷鏈。</li></ul>"}]}, {"role": "執行部醫療照護處／急診照護組", "entries": [{"stage": 3, "scenario_id": "12", "scenario_title": "警察局遭無人機攻擊", "datetime": "", "summary": "屏東縣警察局民防管制中心及屏東、潮州、東港、枋寮、恆春等分局同步遭多波次無人機攻擊，致防情通報與防空警報發布功能部分中斷；執勤警力出現傷亡，影響現場應變、治安與交通管制能力。", "detail": "由急診主任、陳美錚護理長帶領，簡碼69113", "html": "<p>警察分局遭攻擊造成大量警力與民眾傷亡，大批爆炸撕裂傷、粉碎性骨折傷患由救護車與私人車載運陸續送達。急診主任與護理長（陳美錚，公務機簡碼69113）評估就醫人數瞬間飽和後，立即通報指揮官，由總機發布<strong>「急診333」大量傷患廣播三次</strong>。</p><p>急診團隊立即實施「急診 333」大量傷患動員流程：</p><ul><li><strong>跨科人力緊急召回</strong>：透過「一呼百應」系統，緊急召回居住於<strong>醫院 1    公里內（30 分鐘內可到院）之醫護戰力（第一波預計召回 47 名護理人員及    31 名醫務同工）</strong>至急診紅區、黃區報到支援。</li><li><strong>空間戰術重構</strong>：工務與勤務同工於 30    分鐘內清空一樓門診大廳候診椅，將其重構為「大量傷患一線檢傷區」與「綠區輕傷處置區」，強勢將綠區輕症患者與恐慌群眾阻絕於核心搶救區外。</li><li><strong>START 快速檢傷</strong>：檢傷護理師依據 START    原則，快速對傷患之呼吸、循環及意識進行評估，在傷患胸前掛上明顯的<strong>紅、黃、綠、黑四色視覺分類牌</strong>。重傷患推送至「急診紅區」（工務室前方3床），由資深醫師與呼吸治療師執行插管與    DCR 搶救。</li></ul>"}, {"stage": 3, "scenario_id": "15", "scenario_title": "油品廠火災事故", "datetime": "", "summary": "屏南產業園區某油品儲運廠疑遭不明來源破壞，儲槽設施受損並引發火勢，造成油品外洩與濃煙；事故影響台1線枋寮段、周邊產業與工程物料供應，並對交通維修能量及民生物資配送體系造成壓力。", "detail": "由急診主任、陳美錚護理長帶領，簡碼69113", "html": "<p>油品廠大火與外洩，極易造成大批化學灼傷、吸入性有毒煙霧嗆傷之病患後送。急診主任與護理長陳美錚立即啟動「化災大量傷患收治與實體除污SOP」。 急診團隊於急診前方指定車道或恩慈 D棟旁，迅速架設<strong>「臨時除污區（Decontamination Zone）」</strong>。</p><p>所有遭受油品及化學有毒煙霧污染之傷患，進入急診硬邊界前，強制在此由穿戴 B級防護衣之醫護執行溫水淋浴沖洗、剪除污染衣物及中和除污，避免化學毒物被帶入內部地下醫療空間造成二次中毒。急診主任召回兒科、外科主治醫師，投入急診紅區。 護理人員依 <strong>START 原則</strong>實施紅、黃、綠、黑四級檢傷，掛上四色視覺分類牌。對吸入性呼吸窘迫之紅區病患，優先執行DCR 氣管插管、高濃度氧氣治療與解毒抗敏輸液，死守前線生命線。</p>"}, {"stage": 4, "scenario_id": "03", "scenario_title": "灘岸戰鬥傷亡", "datetime": "", "summary": "東港至枋寮沿海爆發灘岸戰鬥，部分建物及漁港設施受砲火波及，造成大量民眾傷亡；初步統計死亡28人、重傷36人、輕傷188人。另重要能源與通信設施遭敵特工滲透破壞，引發駐警與其對抗。", "detail": "由急診科主任、陳美錚護理長帶領，公務機簡碼69113", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：灘岸戰鬥爆發，部分建物及港口受波及，大量民眾傷亡（死亡 28人、重傷36人、輕傷188人），大批重創、撕裂傷、爆炸傷及骨折患者陸續由救護車與私人載具送達。急診主任評估就醫人數瞬間飽和、醫療量能超載後，立即向指揮官報告，指示總機發布<strong>「急診333」大量傷患廣播三次</strong>。急診照護組（陳美錚護長）立即啟動<strong>「急診333 大量傷患極限召回與空間重構程序」</strong>。</p><p>急診團隊於 <strong>30分鐘內</strong>執行戰術空間重構：工務與庶務人員迅速清空一樓門診大廳之候診椅，將其轉換為「大量傷患一線檢傷區」與「綠區輕傷縫合包紮區」，強勢將大批恐慌之輕傷民眾（約188人）阻絕於核心急救區外，確保重症紅區不受干擾。檢傷護理師依據 <strong>START快速檢傷分類原則</strong>，對傷患之呼吸、循環與意識實施30秒極速評估，在傷患胸前掛上明顯之<strong>紅（重傷）、黃（中傷）、綠（輕傷）、黑（死亡）四色視覺分類牌</strong>。對送入「急診紅區」（共3床）之 36名重傷患，由急診創傷團隊執行損傷控制復甦（DCR），並隨即送往 B1臨時開刀房（韓偉大樓 B1 腹膜透析室，配置無菌手術床 1張） 執行救命之DCS（損傷控制手術）。</p><p><strong>2. 確實數據與資源規劃</strong>：急診組（陳美錚護長）啟動一呼百應簡訊系統，緊急召回居住於<strong>醫院1公里內（30分鐘內可到院）之核心醫護戰力，預計第一波召回 47名護理人員及31名醫務同工</strong>，並從 MICU、SICU 及各病房抽調 1至2名護理同工支援。急診組協同血庫幸良蘭副主任（公務機簡碼 61417），精算戰傷輸血速率，一旦RBC（紅血球）庫存低於 48小時警戒（小於 41Units），立即呈報指揮官，做好隨時啟動院內同工「走動式活體血庫」之準備。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：急診組與文件記錄處（吳瑞敏經理）對接，指派行政人員於急診檢傷櫃檯進行手工手寫紙本登記，核發防偽手圈並編給臨時病歷號，病患動向由Runner 每 30分鐘抄送狀況分析處彙整。</p>"}, {"stage": 1, "scenario_id": "11", "scenario_title": "化學災害事故", "datetime": "", "summary": "（通勤尖峰）屏東科技產業園區某食品冷鏈廠之無水氨系統發生外洩，現場出現刺鼻氣味，多名人員頭暈、嘔吐及呼吸不適，初估約50餘人受影響，其中5人重症、15人需住院；氣體受西南風影響向東北擴散，波及園區周邊道路、台1線及縣道189線。", "detail": "由急診科主任、陳美錚護理長帶領，公務機簡碼69113", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    屏東科技產業園區某冷鏈廠無水氨（Ammonia）外洩，約 50 餘人受影響（5    人重症、15 人住院），氣體向東北擴散波及台 1 線與縣道 189    線。大批吸入有害氣體發生頭暈、嘔吐、呼吸窘迫及皮膚灼傷之化災患者陸續由救護車與私人載具送達本院。急診科主任評估就醫人數瞬間飽和後，立即向指揮官呈報，由總機發布<strong>「急診    333」大量傷患廣播三次</strong>。急診組（陳美錚護理長，公務機簡碼    69113）立即啟動<strong>「化災大量傷患極限召回、實體除污與 START 檢傷分類    SOP」</strong>。</li><li>急診團隊在 <strong>30 分鐘內</strong>    執行戰術空間重構：工務與庶務人員迅速清空一樓門診大廳，將其轉換為「化災大量傷患一線檢傷區」與「綠區輕傷處置區」。</li><li>檢傷護理師穿戴 B    級防護衣，於急診前方指定車道設立<strong>「臨時除污區（Decontamination    Zone）」</strong>：所有受無水氨污染之傷患，強制在此由溫水淋浴沖洗、剪除污染衣物、實施中和除污後，方得進入內部醫療紅區，嚴防化學毒物帶入大樓密閉地下空間造成二次污染。</li><li>護理人員依據 <strong>START 快速檢傷分類原則</strong>，對傷患實施 30    秒評估，掛上紅、黃、綠、黑四色視覺分類牌。重症紅區 5    名重傷患送入急救紅區，由資深醫師與呼吸治療師執行損傷控制復甦（DCR），給予氣管插管、高濃度氧氣吸入與解毒抗敏輸液，死守搶救生命線。</li><li><strong>實際確實數據</strong>： 急診組啟動一呼百應簡訊召回：召回居住於<strong>本院 1    公里內（30 分鐘內到院）之核心急診與創傷醫護共 47 名護理人員及 31    名醫務同工</strong>投入搶救。血庫幸良蘭副主任（簡碼    61417）備妥備備血製血量能，確保 RBC 庫存維持高於警戒線 41 Units。</li></ul>"}, {"stage": 1, "scenario_id": "15", "scenario_title": "醫療量能衝擊", "datetime": "", "summary": "傷患陸續送往屏東基督教醫院等急救責任醫院，短時間內約40餘人就醫，院方啟動毒化災與大量傷患應變機制；同時醫療資訊系統遭勒索軟體及DDoS攻擊，電子病歷與掛號系統運作異常，影響急診收治、手術調度及病人辨識。", "detail": "由急診科主任、陳美錚護理長帶領，公務機簡碼69113", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    傷患陸續送往本院等急救責任醫院，短時間內約 40    餘人就醫，本院啟動毒化災大量傷患應變機制。同時醫療資訊系統（HIS）遭勒索軟體及    DDoS    攻擊癱瘓，電子病歷與掛號異常，影響急診收治與病人辨識。急診主任與護理長陳美錚（公務機簡碼    69113）立即啟動<strong>「Downtime 狀況大量傷患收治與實體手寫病歷    SOP」</strong>。</li><li>急診團隊在 <strong>30 分鐘內</strong>    執行戰術空間重構：工務與庶務人員迅速清空一樓門診大廳，將其轉換為「大量傷患一線檢傷區」與「綠區輕傷處置區」。</li><li>急診護理師在無電腦聯網、HIS    當機狀態下，全面降級改採<strong>紙本「大量傷患檢傷單」與手寫處方箋</strong>。檢傷護理師依據    <strong>START 快速檢傷分類原則</strong>，快速對傷患實施 30    秒評估，在傷患胸前掛上紅、黃、綠、黑四色視覺分類牌。</li><li>為確保病人辨識安全，急診組為每位入院傷患手動核發配戴具有「唯一隨機病歷號」之防偽手圈。</li><li>指派配戴紅色專屬 Runner    臂章之徒步傳令同工，以夾鏈袋裝妥紙本醫囑與檢體，送往藥局及檢驗血庫；藥師與護理同工大聲執行<strong>「口令覆誦（Read-back    Mechanism）」</strong>核對處方，在網攻癱瘓下維持醫療品質。</li><li><strong>實際確實數據</strong>： 急診組啟動一呼百應簡訊召回：召回居住於<strong>本院 1    公里內（30 分鐘內到院）之核心急診與創傷醫護共 47 名護理人員及 31    名醫務同工</strong>投入搶救。血庫幸良蘭副主任（簡碼    61417）備妥備備血製血量能，確保 RBC 庫存維持高於警戒線 41 Units。</li></ul>"}]}]}, {"id": "log", "name": "08　後勤部長", "roles": [{"role": "後勤部任務支援組／採購資材組", "entries": [{"stage": 2, "scenario_id": "03", "scenario_title": "軍事動員演習", "datetime": "8月8日 12:00", "summary": "因應敵情發展，屏東地區國軍常備及後備部隊奉令實施「動員演習」，依計畫進入戰術位置並進行兵力、裝備整備與戰場經營；惟部分未完成簽證之物資（如阻絕器材、工程材料及偽裝資材）出現缺口，縣府協調民間通路緊急採購及調度現貨，並由第四作戰區統籌分配。", "detail": "由採購室主任邱芬娟與採購組長包淑惠、資材組長吳佳蓉共同執行", "html": "<p>因應敵情發展，國軍實施「動員演習」，部分未完成簽證之物資（如阻絕器材、工程材料及偽裝資材）出現缺口。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）必須主動啟動「戰時緊急採購與資材安全防護計畫」。採購組立即啟動本院預先備妥之「在地替代供應商與合約商名冊」，全力協助作戰區進行現貨調撥與採購協調。</p><p>資材組（吳佳蓉組長）會同藥劑科及血庫，精算院內 72小時耗用之核心維生物資。資材組人員迅速將無菌生理食鹽水、外傷縫合包、可攜式點滴幫浦、化學便器袋等衛材，以盲派形式由地面脆弱庫房打包，物理遷移至地下一樓（B1）資材補給站。所有打包物資均黏貼「防水且唯一之箱體編號」（例如：<strong>PTCH-L2-A001 至PTCH-L2-A050</strong>），並附上裝箱明細，落實「後裝先卸」原則，確保抵達接收點時可在10 分鐘內極速投入戰救，防範供應鏈中斷風險。</p>"}, {"stage": 2, "scenario_id": "19", "scenario_title": "物資供應短缺", "datetime": "8月11日 08:00", "summary": "部分奶粉與民生物資經銷商受市場短缺預期及價格波動影響，傾向保留庫存，進一步影響物流調度與通路補貨；屏東市、東港鎮等地受「嬰兒奶粉即將斷供」不實訊息影響，搶購與囤積行為擴大。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行", "html": "<p>部分民生物資經銷商傾向保留庫存影響物流調度，且屏東市受「嬰兒奶粉即將斷供」假訊息影響，引發瘋狂搶購與囤積。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）立即啟動<strong>「戰時嬰兒奶粉與核心物資緊急補給計畫」</strong>。本院二B兒科病房與新生兒加護病房（PNICU）對配方奶粉、嬰兒尿布及無菌衛材有剛性需求。</p><p>資材組（吳佳蓉組長）立即實施兒科維生物資盤點，精算 72小時消耗速率與補給缺口。採購組（邱芬娟主任）立即繞過斷鏈之大盤商，啟用不受長途交通阻斷的「屏東在地替代合約商與大型藥妝通路」名冊。採購組與在地通路商簽訂戰時緊急調撥備忘錄（MOU），緊急外購、調撥嬰兒配方奶粉<strong>50 箱（約 600 罐）</strong> 與無菌兒科衛材至本院地下資材倉庫保管。資材組派專人看守並核對實體「戰時庫存表」，確保本院 PNICU及住院嬰幼兒之維生營養 72 小時絕對不斷鏈。</p>"}, {"stage": 2, "scenario_id": "21", "scenario_title": "民生物資管制", "datetime": "8月13日", "summary": "屏東縣政府依緊急命令對食米、食用油、食用鹽、液化石油氣及嬰兒奶粉等法定必需品實施管制，盤點轄內存量並要求各通路配合限購，另優先保障醫療、收容、偏鄉及離島地區基本需求。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行", "html": "<p>政府依緊急命令對食米、食用油、液化石油氣、嬰兒奶粉等實施管制並限購，優先保障醫療與收容機構需求。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）立即啟動<strong>「管制物資簽證申報與庫存保全計畫」</strong>。資材組迅速清點院內大米、食用油、鹽及液化石油氣等關鍵民生存量，製成「管制物資申報單」。</p><p>採購組（邱芬娟主任）立即向屏東縣政府聯合應變指揮管制中心、社會處及經濟發展處提出「醫療關鍵基礎設施優先保障物資申請」。採購組取得政府簽發之「法定物資調撥簽證與配給通行證」。後勤同工憑通行證前往指定聯合徵集場與配售據點，優先接收保障調撥之民生管制糧食與液化石油氣。所有接收物資必須由資材組與會計組人員執行<strong>雙人雙簽點收</strong>，物理入庫至約翰大樓B1 物資倉庫與馬大 B1藥庫，由安全管制組保全加鎖看守，嚴格防止在管制期間發生盜竊或資敵，死守可自撐72 小時之能源與生存底線。</p>"}, {"stage": 3, "scenario_id": "03a", "scenario_title": "動員物資延遲", "datetime": "", "summary": "原定報到之在地營造廠商重型機具（挖土機7部、裝載機5部及傾卸卡車10部）未於時限內抵達指定地點或徵集場；因部分機具仍在外地，且受高屏主要幹道壅塞與交通管制影響，無法如期轉運，致動員進度延滯。", "detail": "由採購室主任邱芬娟與採購組長包淑惠共同執行，分機3932", "html": "<p>因交通管制及壅塞，原定報到之在地營造廠商重型機具（挖土機7部、裝載機5部及傾卸卡車10部）未於時限內抵達本院或指定徵集場，致防空避難室（B1地下醫療空間）改造與阻絕器材佈建進度延滯。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）必須立即啟動<strong>「戰時緊急安全採購與物資緊急調用預案」</strong>。</p><p>採購組立即中斷常規、非急迫性之行政採購。改採人工降級與實體手寫單、電話方式，聯繫本院預先簽訂戰時優先供應意向書之在地替代供應商與工程機具合約廠商。採購組致電備援機電與工程廠商：<strong>「明威紀元（0933-310332）或隆安機電（高壓維護）」</strong>，請求緊急調配庫存之工程阻絕鐵馬、紐澤西護欄、防爆沙包、蛇籠及輕型鏟裝機至本院恩慈大樓1 樓卸補點。</p><p>同時，資材組會同採購組，緊急清點在途工程耗材，填寫「戰時物資調用簽證申報單」。透過聯絡官向屏東縣政府聯合應變中心（LJMOC）和經濟發展處發出「關鍵基礎設施防護工程物資緊急調撥申請」，請求公權力介入，徵用鄰近市區之民營營造機具及砂石車，強行突破交通管制節點送抵本院，確保B1 避難醫療空間與實體防線之工期不被延誤。</p>"}, {"stage": 3, "scenario_id": "04", "scenario_title": "民生物資配給管制", "datetime": "", "summary": "行政院核定公告實施配給配售，中央供應站於公告起48小時內、地方配售站於72小時內完成開設。屏東縣政府成立民生必需品配售執行委員會，各鄉鎮市公所成立配售執行小組，並納入偏鄉與原住民族地區配送規劃。", "detail": "由資材組長吳佳蓉共同執行，分機3932", "html": "<p>行政院公告實施民生物資配給，屏東縣政府成立民生必需品配售執行委員會。本院收治之住院病患與召回之1,479名同工之食米、食用油、鹽、液化氣及配方奶粉等剛性物資，必須納入保障調配體系。後勤部任務支援組長（資材組長吳佳蓉，分機3932）立即啟動<strong>「戰時配給物資申報與庫存保全計畫」</strong>。</p><p>資材組同工迅速清點院內現有大米、食油、鹽之存量，精算 72小時消耗速率與缺口，編製實體「物資需求清冊」。採購組配合向屏東縣政府配售執行委員會出示本院「國家關鍵基礎設施優先保障證書」，並領取「法定管制必需品調撥簽證通行證」。資材組派專人攜帶通行證，前往指定地方配售站，優先接收配給調撥之米、油、鹽與液化石油氣。</p><p>所有接收之管制民生物資，一律運往約翰大樓 B1資材室備援庫房中妥善存放，由安全管制組保全實施專用門鎖加鎖看守，嚴防在管制期間發生盜竊、哄搶或資敵，確保可自撐72 小時之生存物資安全。</p>"}, {"stage": 3, "scenario_id": "11", "scenario_title": "糧食儲備設施縱火", "datetime": "", "summary": "萬丹、竹田、麟洛、潮州及崁頂等地多處碾米、糧食與物資儲存據點在短時間內同步發生縱火事件，造成部分倉儲設施受損與物資損失，影響區域糧食供應與物流調度，並引發市場恐慌。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行，分機3932", "html": "<p>多處碾米、糧食倉儲同步發生縱火事件，造成部分物資損失，糧食供應與物流調度受阻，市場爆發恐慌搶購。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機3932）立即啟動<strong>「戰時管制糧食儲備與採購調撥緊急計畫」</strong>。採購組立即中斷常規、非急迫性之採購與行政招標。</p><p>採購同工改採人工手工降級模式，聯繫預備之屏東在地民生與糧食合約廠商，繞過受損之大盤商，與大型量販通路直接簽訂緊急調撥备忘錄（MOU）。採購組緊急調配購入大米 <strong>30 箱（約 500公斤）</strong>、備用食用油及病患流質營養品至本院恩慈大樓 1 樓停車場。</p><p>會計同工（李華敏主任）會同資材組，於卸補點執行現場雙人雙簽核對，將物資入庫至B1 備援資材室，由保全加鎖看守，確保本院 1,479名同工與在院重症、一般病床病患之 72 小時糧食自撐極限無缺口。</p>"}, {"stage": 3, "scenario_id": "14", "scenario_title": "社會秩序惡化", "datetime": "", "summary": "因不實訊息持續擴散，群眾恐慌情緒升高，屏東市、潮州鎮及東港鎮陸續發生搶劫商家、藥局及配售站等案件；警方執勤能量受牽制，對社會治安與公共秩序造成嚴重衝擊。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行，分機3932", "html": "<p>社會治安惡化與搶劫藥局案爆發。藥劑科主任（陳秋榮）會同資材組（吳佳蓉組長），針對第一至三級管制麻醉藥品、高價抗生素及昂貴醫材，啟動<strong>「戰時管制藥品安全保管與雙簽交接SOP」</strong>。 管制藥品（如 Ketamine 等強效麻醉劑）一律放置於 B1備援藥庫之專用鋼製專櫃，強制加鎖，由指定的管制藥品管理人專責保管。</p><p>在 HIS系統當機、無電子醫囑狀態下，藥師依據主治醫師手寫處方箋進行人工調劑，調劑發藥一律採取<strong>「藥師與病房護理長雙人覆核與手寫雙簽交接點交」</strong>。雙簽程序絕對不可因混亂而簡化，確保管制藥品在運送轉運與抵達接收端時「手寫帳物完全一致」。所有出庫之管制藥箱，一律由勤務同工使用紮帶物理綁定於擔架車或隨行Go-Bag，由傳令兵盲派運送，落實「人藥隨行一對一物理移交」。</p>"}, {"stage": 4, "scenario_id": "04", "scenario_title": "關鍵設施撤離", "datetime": "", "summary": "因戰線逼近，屏南地區能源、油料、通信與交通關鍵設施進入緊急應變階段，依計畫執行人員分批撤離、資料備援、關鍵設備停機保護及反資敵作為。", "detail": "由採購室主任邱芬娟與會計室主任李華敏共同執行，分機24", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：當戰線逼近、關鍵基礎設施進入預防性全面撤離階段時，後勤部任務支援組與會計組立即啟動<strong>「關鍵醫藥資材打包撤離與戰時特別付款特別派令SOP」</strong>。採購室主任邱芬娟會同資材組長吳佳蓉，將本院備用之貴重醫療衛材、第一至三級管制麻醉藥品、備用血袋及重要病歷資料進行物理裝箱。所有撤離箱體一律使用防水、耐磨材料，並黏貼防水且唯一之箱體編號（如：<strong>PTCH-L2-B001至 PTCH-L2-B100</strong>），附上實體裝箱明細，以便在物資集合點（恩慈大樓 1樓停車場） 進行極速裝載。</p><p>會計室主任李華敏（分機24）依據指揮官特別授權，宣告全院財務轉入<strong>「戰時特別預算特別支付程序」</strong>。凍結承平時期繁瑣的行政審核與電子簽核，改用實體紙本簽收簿、手工開立特別派令。針對緊急雇用的撤離載具（如調用之大巴與貨車）與外購之72小時備用藥品，會計同工親至恩慈 1樓停車場卸補點，實施「現場簽證物資雙人雙簽核對」，核實後立即以實體支票或現金撥付特別預算。</p><p>同時，資安人員將存放核心電子病歷（EMR）、HIS 及關鍵資料之加密備份 USB硬碟取出，妥善置入隨身<strong>「指揮官避難包（Go-Bag）」</strong>中，由保全人員看守，死守全院病患之歷史數據資產。</p><p><strong>2. 確實數據與資源規劃</strong>：會計組與資材組精算撤離物資之實體資產價值，針對本院馬太大樓 B1藥庫內之高價麻醉強心劑、管制藥品及檢驗血庫內之 60袋 O型RBC，實施「人藥同步移交機制」。藥劑科主任陳秋榮為107床住院病患及待撤離病患，每人調配準備至少<strong>72小時之必要備用藥與管制藥品</strong>；所有管制藥品裝入專用防爆冷藏箱（維持1-6℃冷鏈），物理綁定於擔架車旁，由專人隨行核對簽收，嚴防高價值藥品流失或資敵。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>： 會計組與人資室劉淑梅主任（分機3977）對接，現場記錄並統計所有參與關鍵設施打包、高危物資搬運、Downtime傳令同工之「戰時危險出勤加給、差假與加班費」。</p>"}, {"stage": 4, "scenario_id": "05", "scenario_title": "水產冷鏈設施受損", "datetime": "", "summary": "東港及枋寮地區水產冷凍、製冰與物流設施遭砲火波及，冷凍庫、製冰設備及關鍵管線受損，部分廠區起火，造成水產冷鏈與民生食品供應中斷。", "detail": "由資材組長吳佳蓉帶領） &藥劑部（由藥劑科主任陳秋榮帶領", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：水產冷鏈與電力中斷，直接威脅本院馬大 B1藥庫內大量溫度敏感藥品（如冷藏胰島素、高警訊藥物及疫苗）之保存安全。藥劑科主任陳秋榮會同資材組長吳佳蓉，立即啟動<strong>「高警訊藥品與冷鏈藥材備援保溫及轉運SOP」</strong>。資材組同工立即物理砸開備援資材箱，取出儲備之大批「低溫蓄冷片」與「可攜式保冷保溫箱」。</p><p>藥庫技術員將大批冷藏藥品自脆弱的地面冷藏冰箱中取出，依據藥品之特定保存溫度（2\\~8℃）進行分類打包，每箱放入2至4片蓄冷片，並隨箱附上實體手寫溫度監控紀錄卡。藥師將調配好之72小時病患備用藥與冷鏈藥材，以「盲派推拉式物流」，主動物理推送至 B1臨時加護病房與手術室，藥箱與轉送的病人同步物理綁定移交，確保生命線藥物冷鏈不斷鏈。對於不需冷藏之高耗用外傷縫合包及點滴，資材組人員將其以箱體編號打包，搬運至路加大樓B1 安全避難倉儲，落實盲派形式。</p><p><strong>2. 確實數據與資源規劃</strong>： 藥劑部（陳秋榮主任）精算本院72小時高耗用急救藥品、升壓劑與管制藥品之存量與日消耗率。藥劑部盤點核心麻醉藥（Ketamine 等第一至三級管制藥物），將其集中存放於 B1地下血庫旁之專用鋼製管制櫃中，強制上鎖並指派專人保管，每班實施「藥師與病房護理長雙人覆核與手寫雙簽交接」。核對程序絕對不可因大限電而簡化，帳物必須百分之百相符，防止貴重麻醉藥品在混亂中發生遺失、被搶或資敵之重大事故。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：藥劑科主任陳秋榮隨時將冷鏈藥物保溫狀態、管制藥品存量數據，以有線電話或定頻無線電向執行部長報告，動態更新於戰情面板上。</p>"}, {"stage": 5, "scenario_id": "04", "scenario_title": "醫療後撤機制啟動", "datetime": "", "summary": "台17線以西戰況持續惡化，屏東基督教醫院評估院區安全與供應鏈風險升高，啟動分級後撤與病人分流：高度照護病人及隨行醫護轉送至其他急救責任醫院；可下轉或出院後仍需照護者送至來義高中第2型急救站，並同步撤收關鍵設備、藥材、血品及資訊備援。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行，分機3932", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：大後撤機制啟動，後勤部任務支援組長（資材組長吳佳蓉；採購室主任邱芬娟 /採購組長包淑惠，分機 3932） 立即進駐恩慈 B1指揮所，啟動<strong>「關鍵醫藥資材打包、編碼裝車與反資敵資料 Go-Bag 保全SOP」<strong>。資材同工動員行政待命同工與志工，將可移動之高價值醫療儀器、無菌手術縫合包、點滴輸液及血庫冰箱執行</strong>「2小時快速下移與打包」</strong>。</p><p>所有後撤之醫藥箱體，一律使用防水耐磨箱裝載，黏貼唯一且連續之防水「撤離箱體編碼」（如：<strong>PTCH-L2-B001至PTCH-L2-B100</strong>），並隨附實體手寫裝箱明細，於指定的物資撤離動線集合點（<strong>恩慈大樓1 樓停車場</strong>） 進行裝載。 藥劑科主任陳秋榮（公務機簡碼 69141）指派藥師為每位後撤病人調配準備 <strong>72小時之必要備用用藥與管制藥品</strong>；第一至三級管制麻醉藥品一律裝入防爆保冷箱（維持1-6℃ 冷鏈），由專人隨病人同步移交。</p><p>同時，為防範核心病歷資料外洩，資通訊支援組系統管理同工對 core HIS資料庫執行最後一次增量備份，將病歷、人事快照之高強度加密備份硬碟，物理裝入<strong>「指揮官避難包（Go-Bag）」</strong>中，由保全人員嚴密看守撤離，死守全院病患病歷資產。</p><p><strong>確實數據與資源規劃</strong>： 勤務組（吳哲維主任 /運輸組陶大屏組長）極限整備並調撥本院 <strong>16輛戰備車輛</strong>，單一波次可承載並安全後撤 <strong>101 人</strong>：</p><p>1.  *救護車（共 3 輛）*：單波次共乘載 <strong>15 人</strong>（每輛載擔架 ICU 患者    1人、醫護家屬共 4人），優先派往急診紅區與 ICU，轉送第一級危急病患。</p><p>2.  *輪椅車（共 2 輛）*：單波次共乘載 <strong>12    人</strong>，轉送第二級需要輪椅扶持之病人（如洗腎腎友）。</p><p>3.  *中型巴士（共 4 輛）*：單波次共乘載 <strong>60 人</strong>，批量後送 Level 2、3    可坐姿病患及醫護同工。</p><p>4.  *廂型貨車（共 7 輛）*：不載人，專門裝載打包編碼好的 Category A、B、C    級醫療物資與移動維生儀器。</p><p><strong>指揮與管制（HICS 對接）</strong>：後勤部長許慧莉隨時與聯絡官及衛生局對接，回報車隊載具缺口與接收端床位，確保異地重置先遣裝設小組（4人） 於主力車隊抵達前 1 小時提前就位。</p>"}, {"stage": 5, "scenario_id": "06", "scenario_title": "物資配送受阻", "datetime": "", "summary": "部分沿海配售站與物流據點受砲火波及，縣府於戰火間隙清查受損情形、盤點可用物資並向內陸安全地區轉移；惟台17線及聯外道路受阻，配送動線受限，影響東港、林邊、佳冬及枋寮物資供應效率。", "detail": "由採購室主任邱芬娟與資材組長吳佳蓉共同執行，分機3932", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：部分沿海配售站遭砲火波及，縣府於戰火間隙將可用物資向內陸安全地區轉移，但台17線及聯外道路受阻，東港、林邊物資供應效率低下。本院面臨剛性維生物資斷鏈與配送延遲。後勤部任務支援組（資材組長吳佳蓉/ 採購室主任邱芬娟 / 採購組長包淑惠，分機 3932）立即啟動<strong>「內陸物資緊急調撥、簽證物資安全接收與盲派配送計畫」</strong>。</p><p>採購組立即中斷常規行政採購，改採人工手工降級模式，繞過癱瘓之沿海大盤商，與「屏東內陸安全地區（如九如、麟洛、潮州）在地替代合約商與大型通路」對接，與加油合約商<strong>「全盛卓詩凱（0912-125515）」</strong>保持定時熱線，調撥戰備柴油。</p><p>資材組（吳佳蓉組長）會同保全人員，在指定的物資安全卸貨區（<strong>恩慈大樓 1樓停車場</strong>） 實施<strong>「簽證物資安全接收程序」</strong>。物資車抵達後，資材組與會計組同工於哨位執行「現場雙人雙簽核對」，清點管制柴油、外傷縫合包及點滴等數量，造冊列管，並於2 小時內將救命資材快速搬運移置地下備援庫房。後勤同工將「戰傷急救箱」不待前線科室電子表單申請，直接以<strong>「推拉式盲派物流」</strong>主動推送至臨時急診、B1開刀房及病房，死守搶救物資不斷鏈。</p><p><strong>確實數據與資源規劃</strong>： 資材組精算 72小時消耗速率與儲備缺口：精算本院每日消耗生理食鹽水及輸液約 <strong>15 箱（360袋）</strong>、醫療乾糧 300 份。資材組確保備用抗生素、止血帶、破傷風疫苗等 72小時庫存高於安全警戒線；冷藏藥品一律使用保冷設備運送並由專人 2小時抄錄溫度監控卡，嚴格維持 1-6℃ 冷鏈，防範藥材因物流受阻變質。</p><p><strong>指揮與管制（HICS 對接）</strong>：資材組長吳佳蓉隨時將物資入庫數據、自撐天數監測表，以無線電向後勤部長許慧莉（公務機簡碼61658） 報告。</p>"}, {"stage": 1, "scenario_id": "03", "scenario_title": "能源與漁業供應風險", "datetime": "", "summary": "屏東沿海地區（東港、林邊、佳冬、枋寮及恆春半島）海域作業受限，漁船出港比例下降約3至5成；高雄永安液化天然氣接收站船舶靠泊風險升高，南部天然氣與電力調度壓力增加。", "detail": "由採購室主任邱芬娟與採購組長包淑惠、資材組長吳佳蓉共同執行", "html": "<ul><li><strong>具體可行作為與標準作業程序（SOP）</strong>：    因應外部供應鏈不保證暢通及物流延遲之風險，後勤部任務支援組組長（資材組長吳佳蓉；採購室主任邱芬娟    / 採購組長包淑惠，分機 3932）立即啟動<strong>「72    小時核心維生物資盤點與緊急外購調撥計畫」</strong>。採購組同工立即停止所有非急迫性之行政採購與合約簽署，切換為「戰時降級手工記帳程序」，啟用「在地替代供應商與合約商名冊」。</li><li>資材組會同藥劑科、檢驗血庫，清點在院病人及 1,479 名同工 72    小時消耗之無菌衛材、外傷縫合包、可攜式點滴幫浦、化學便器袋、氧氣鋼瓶、血袋及大米、食用油存量，精算日消耗速率與補給缺口。資材組派專人攜帶    LJMOC    簽發之通行證，前往合約商據點，優先接收保障調撥之民生管制糧食與燃料。</li><li>所有調運抵院之物資，一律運送至大連院區指定的物資安全卸貨區（<strong>恩慈大樓    1    樓停車場</strong>），由資材組與會計組人員執行「現場雙人雙簽點收」，隨後搬運移置約翰大樓    B1    備援資材室，由安全管制組保全加鎖看守，嚴格防止在管制期間發生盜竊或哄搶，死守    72 小時營運物資底線。</li><li><strong>實際確實數據</strong>： 採購組與資材組精算 72    小時消耗缺口：緊急增購外傷縫合包 <strong>200 組</strong>、無菌生理食鹽水及輸液    <strong>30 箱（720 袋）</strong>、醫療乾糧 300    份及商業流質營養品，並對接氧氣合約商「信光氧氣」與「南屏氣體」，備妥高壓備用氧氣鋼瓶，確保氧氣存量在極限消耗下能自撐    72 小時以上。</li></ul>"}]}, {"role": "後勤部膳食供應處／營養室", "entries": [{"stage": 2, "scenario_id": "19", "scenario_title": "物資供應短缺", "datetime": "8月11日 08:00", "summary": "部分奶粉與民生物資經銷商受市場短缺預期及價格波動影響，傾向保留庫存，進一步影響物流調度與通路補貨；屏東市、東港鎮等地受「嬰兒奶粉即將斷供」不實訊息影響，搶購與囤積行為擴大。", "detail": "由營養室組長徐桂婷帶領，分機20", "html": "<p>由於全縣爆發奶粉、大米搶購風潮，且外部物資配送延遲。營養室組長（徐桂婷組長，分機20；代理人蔡佳紋營養師）立即啟動<strong>「兒科與一般病患戰時特殊膳食調配預案」</strong>。營養室於 <strong>約翰大樓 B1 工務室入口後右側</strong> 設立臨時「膳食處理與補給點」。</p><p>營養師實施乾糧、米食及病患特殊營養品盤點，並精算消耗速率。針對「嬰兒奶粉斷供」之不實訊息與兒科奶粉受限之情境，營養師調配並儲備足夠72 小時之「商業流質配方與兒科替代腸道營養品」。在備援廚房停水停電下，膳食同工全面切換為免洗拋棄式餐具，並關閉耗水耗電之熱食加工，改以無需熱水或僅需極微量熱水的食材（如穀物、能量棒、常溫即食包）進行配膳。膳食供應處將高熱量、易存存之膳食，優先配給 B1 臨時手術室與 ICU高能消耗之醫護，死守生命線。</p>"}, {"stage": 2, "scenario_id": "21", "scenario_title": "民生物資管制", "datetime": "8月13日", "summary": "屏東縣政府依緊急命令對食米、食用油、食用鹽、液化石油氣及嬰兒奶粉等法定必需品實施管制，盤點轄內存量並要求各通路配合限購，另優先保障醫療、收容、偏鄉及離島地區基本需求。", "detail": "由營養室組長徐桂婷帶領，分機20", "html": "<p>在政府對食米、食用油及液化氣實施最嚴格管制下。膳食供應處（營養室徐桂婷組長，分機20）立即切換為<strong>「戰時管制物資限額配膳與無水供膳 SOP」</strong>。營養師根據庫存，調降全院常規精細伙食，全面關閉高耗水耗油之廚房煎炸、清洗作業，改採「低耗水、低耗油、高熱量」之戰時限額配膳。</p><p>膳食同工精算每日大米、食用油及液化氣消耗率，對一般病患及行政同工實施每餐精準定量配給，杜絕食物浪費。營養室將調撥配給之液化石油氣、嬰兒奶粉及食米等，優先且 100%保障提供給二B、PNICU 住院嬰幼兒，以及 B1臨時加護病房（23床）、一般病房（36床）和臨時開刀房刷手搶救之重症患者及前線醫護。膳食供應處每日製作「物資消耗及自撐時數監測表」，上報狀況分析處登錄戰情面板，確保本院在管制死局中以極限節流戰術自行撐過72 小時連續營運。</p>"}, {"stage": 3, "scenario_id": "04", "scenario_title": "民生物資配給管制", "datetime": "", "summary": "行政院核定公告實施配給配售，中央供應站於公告起48小時內、地方配售站於72小時內完成開設。屏東縣政府成立民生必需品配售執行委員會，各鄉鎮市公所成立配售執行小組，並納入偏鄉與原住民族地區配送規劃。", "detail": "由營養室組長徐桂婷帶領，分機20", "html": "<p>在政府對米、油、鹽及液化石油氣等民生物資實施配給配售管制之極限想定下，營養室組長（徐桂婷，分機20；代理人蔡佳紋營養師）立即啟動<strong>「戰時管制物資限額配膳與極限節流SOP」</strong>。營養師依據配給存量與日消耗率，立即調整膳食配給。停止一切常規、精細餐飲製作，全面改採「低耗油、高熱量、低耗氣」之戰時限額配膳，杜絕任何食物與能源浪費。</p><p>膳食供應處（徐桂婷組長）於 <strong>約翰大樓 B1 工務室入口後右側</strong>設立臨時膳食處理點，實施無水配膳及免洗餐具分發。營養師將有限的大米、食用油與配給之液化石油氣、管灌營養品，<strong>100%絕對優先保障供應給 2B兒科病房、新生兒加護病房（PNICU）住院嬰幼兒</strong>，以及 B1 臨時ICU（23床）、臨時手術室、路加一般病房（36床）進行搶救之急重症病人與高能消耗之值班醫護。</p><p>膳食同工每日記錄管制物資之實際結存與自撐時數，彙整呈報至計畫部登錄戰情面板，在配給管制死局下死守全院同工與病患之最低生存防線。</p>"}, {"stage": 3, "scenario_id": "11", "scenario_title": "糧食儲備設施縱火", "datetime": "", "summary": "萬丹、竹田、麟洛、潮州及崁頂等地多處碾米、糧食與物資儲存據點在短時間內同步發生縱火事件，造成部分倉儲設施受損與物資損失，影響區域糧食供應與物流調度，並引發市場恐慌。", "detail": "由營養室組長徐桂婷帶領，分機20", "html": "<p>在糧食儲備點遭縱火、外部供應斷鏈且市場恐慌之情勢下，營養室組長（徐桂婷，分機20）立即啟動<strong>「戰時糧食限額配膳與無水供膳 SOP」</strong>。 營養室於<strong>約翰大樓 B1 工務室入口後右側</strong>開設臨時「膳食處理與補給點」，營養師實施糧食與飲用水庫存精算，並將自撐時數登錄戰情面板。</p><p>營養師制定「戰時定量限額配膳標準」，杜絕任何糧食浪費。膳食同工全面關閉耗水耗電之熱食洗滌與加工，改以无需熱水或僅需極微量熱水之大米、穀物、常溫即食包與營養餐進行配膳，一律發放拋棄式餐具。營養室將配給之熟食、高熱量能量棒及管灌流質配方，<strong>100%絕對優先保障供應給 2B兒科病房與新生兒加護病房（PNICU）住院嬰幼兒</strong>，以及 B1臨時加護病房、手術室與急診搶救之值班醫護，在物資短缺下死守醫療續航力。</p>"}, {"stage": 4, "scenario_id": "05", "scenario_title": "水產冷鏈設施受損", "datetime": "", "summary": "東港及枋寮地區水產冷凍、製冰與物流設施遭砲火波及，冷凍庫、製冰設備及關鍵管線受損，部分廠區起火，造成水產冷鏈與民生食品供應中斷。", "detail": "由營養室組長徐桂婷帶領，分機20 / 代理人：蔡佳紋營養師", "html": "<p><strong>1. 標準作業程序（SOP）與平戰轉換作為</strong>：沿海地區冷凍與冷鏈設施遭砲火波及受損、起火，導致南部地區水產冷鏈與民生食品供應大範圍中斷，本院面臨嚴重膳食原料斷鏈與保存危機。膳食供應處（營養室徐桂婷組長）立即啟動<strong>「戰時管制必需品限額配膳與非冷鏈膳食供應預案」</strong>。營養室於<strong>約翰大樓 B1 工務室入口後右側</strong>設立臨時「膳食補給點與物資配發站」，營養師蔡佳紋帶領同工，對院內儲備大米、食用油及乾糧存量實施盤點，精算72小時消耗速率。</p><p>針對冷鏈中斷、新鮮食材無法冷藏之想定，營養室實施<strong>「戰時無水無電配膳SOP」</strong>：全面停止清洗、煎炸常規餐飲，改以無水、免煮或僅需微量熱水之乾糧、即食真空包、常溫罐頭為主。膳食同工全面切換為<strong>拋棄式免洗餐具</strong>，嚴防在密閉地下空間中因餐具洗滌不當造成水源污染與感控危機。營養室調配儲備足夠72小時之「商業配方流質（管灌營養品）」與嬰兒配方奶粉，優先且 100%保障供應給 2B 兒科病房與新生兒加護病房（PNICU）住院嬰幼兒，以及 B1臨時加護病房、開刀房抢救重症病人與前線醫護，死守生命線之高熱量營養支持。</p><p><strong>2. 確實數據與資源規劃</strong>：營養室精算在院病患與到勤同工之每日基本熱量需求：本院現有1,479名同工、107床住院病患 及 19床急診留觀患者，每日需要至少3,200份應急膳食。在冷鏈受損死局下，採購組啟用在地合約商名冊，優先向屏東縣政府民生必需品配售委員會出示通行證，優先領取配給調撥之食米及常溫罐頭。膳食同工將每日大米（約500公斤）、配方奶粉及燃料消耗數據手寫登錄，由傳令兵送往狀況分析處，確保庫存可自撐72小時以上。</p><p><strong>3. 指揮與管制（HICS 對接）</strong>：徐桂婷組長直接對接後勤部長許慧莉（公務機簡碼61658），隨時回報膳食儲備缺口與燃料需求，以便後勤部長向 LJMOC申請民生管制必需品之配額。</p>"}]}, {"role": "後勤部勤務組／運輸組", "entries": [{"stage": 2, "scenario_id": "20", "scenario_title": "緊急命令／全國動員", "datetime": "8月13日 08:00", "summary": "總統依局勢發展於國安會議後發布緊急命令並實施全國動員，受徵用之人員與物資依通知向指定地點或聯合徵集場報到。屏東縣各警察分局完成召集令送達，縣府相關業管單位及屏東監理站同步執行物力動員徵購徵用書送達。", "detail": "由醫勤室庶務組長陶大屏與組長吳哲維共同執行", "html": "<p>全國物力動員徵購徵用書送達，本院面臨部分車輛、設備與擔架資源被國家強制徵用與調配之情境。後勤部勤務組（醫勤室庶務組長陶大屏，簡碼69400）立即執行<strong>「戰時運輸載具極限盤點與轉運管制」</strong>。勤務組指派專人，於恩慈大樓 1樓停車場（物資撤離動線集結點）實施車輛點名。</p><p>勤務組極限盤點本院可直接支配及徵用之車輛載具共計 <strong>16 輛</strong>：</p><ul><li><strong>救護車（共 3 輛）</strong>：其中 1 輛停於路加地下 1 樓，2 輛停於約翰地下    1 樓。每輛單波次可承載擔架重症病患 1 人、醫護與家屬 4 人（合計 5    人），3 輛合計單波次可載運 <strong>15    人</strong>。救護車列為重症轉院第一波次，絕對優先配給 MICU、SICU    及急診紅區。</li><li><strong>輪椅車（共 2 輛）</strong>：2 輛單波次共乘載 <strong>12    人</strong>，專用於運送需要輪椅扶持之第二、三級病患（如洗腎病人）。</li><li><strong>中型巴士（共 4 輛）</strong>：乘載容量各為 22 人座 2 輛、15 人座 2 輛，4    輛合計單波次乘載 <strong>74 人</strong>，專用於批量轉送 Level 2、3    輕中度病人及撤離醫護同工。</li><li><strong>廂型貨車（共 7 輛）</strong>：專門負責裝載打包編號之 Category A    救命醫療器材與藥材。 勤務組長陶大屏將上述 16    輛車進行車牌登記與實體編碼，發配專通行證，並派司機 24    小時備命，死守本院在物力動員下的生命運輸網。</li></ul>"}, {"stage": 3, "scenario_id": "01", "scenario_title": "軍事機動管制", "datetime": "", "summary": "第四作戰區聯合運輸指揮處協調屏東縣聯合應變指揮管制中心及交通控制中心，管制國道3號九如、長治、麟洛、竹田、崁頂及南州交流道，以及台88線萬丹端、台17線雙園大橋屏東端等節點，建立軍事機動優先通行機制。", "detail": "由醫勤室庶務組長陶大屏與組長吳哲維共同執行，簡碼69400", "html": "<p>後勤部勤務組（庶務組長陶大屏，簡碼69400；運輸組長陶大屏）在接獲軍事機動管制通報後，必須立即在 <strong>15分鐘內</strong>開設「戰時車輛與轉運調配中心」，並將全院運輸載具進入一級整備。勤務組立即盤點並整備本院列管之<strong>16 輛戰備運輸車輛</strong>（包含救護車 3 輛、輪椅車 2 輛、中型巴士 4輛及廂型貨車 7 輛）。司機全員召回在車上待命，確保車輛油箱儲量大於 100%。</p><p>陶大屏組長指揮運輸組針對交流道與橋樑管制，實施「救護動線變更與替代路由導引SOP」。司機與隨車醫護改採 VHF/UHF定頻無線電對講機通聯，避開受管制之國道與台88線主線，改由台27線、縣道189線等地方平面避難路由進行轉運。在院區登車哨口，勤務組協同保全，在大連路及恩慈大門口劃設實體管制邊界，實施「三大接運疏散區」動線絕對分流（急診大門救護車專區、門診大廳接駁車專區、恩慈大樓私人車專區），派出Runner站在轉折點以大聲公引導，確保後送救護車能以「一車進、一車出」的流暢波次快速駛入。</p><p>此外，針對可能因管制而延遲抵達的外部簽證物資車，勤務組預先派遣 2名引導人員攜帶對講機至大連路與瑞光路交叉口（距本院約 1.1 公里，車程 3分鐘）設立接引哨，配合民防隊伍實施物理交管，確保物資車能排除車流、直接對接至恩慈大樓1 樓停車場卸補集結點，死守醫院物資生命線。</p>"}, {"stage": 5, "scenario_id": "01", "scenario_title": "交通幹道遭打擊", "datetime": "", "summary": "敵軍為阻止國軍兵力機動，針對高屏縱深運輸要道實施火力打擊，高屏大橋、雙園大橋及台鐵高屏溪橋梁受損，並波及屏東產業園區部分化學儲槽，造成交通中斷與複合災害；救援車流壅塞，影響搶救與後勤運補。", "detail": "由醫勤室庶務組長陶大屏與組長吳哲維共同執行，簡碼69400", "html": "<p><strong>標準作業程序（SOP）與平戰轉換作為</strong>：當高屏主要幹道遭火力打擊受損中斷，且產業園區複合化災造成道路極度擁堵、後勤運補車流嚴重受阻時，後勤部勤務組長（醫勤室庶務組長陶大屏，簡碼69400；協同運輸組長吳哲維）必須立即啟動<strong>「縱深防禦階段物資車隊應急接運與替代路由導引SOP」</strong>。勤務組在接獲橋梁中斷警報 <strong>10 分鐘內</strong>，將全院 16輛戰備車輛移置於地下強固之車庫（其中路加大樓地下 1 樓停放 1輛救護車，約翰大樓地下 1 樓停放 2 輛救護車），防止砲火破片波及。</p><p>針對外部運送備用燃油、高壓氧氣鋼瓶及生理食鹽水之簽證物資車受阻於橋梁端之想定，陶大屏組長立即召回全班司機，切換使用獨立頻段之VHF/UHF 定頻無線電對講機（避開受干擾之外部公網），派出 <strong>2 輛廂型貨車</strong>組成「前進接運特遣隊」，經由台27線、縣道189線等地方平面避難便道，繞行開闢一條無障礙之替代路由，前往軍方浮橋或交界集結點，與外部供應商執行「浮橋端人工無縫物資接力移交」。</p><p>在院區卸補哨位管制上，勤務組協同保全人員，在 <strong>恩慈大樓 1樓停車場（物資撤離與接收點）</strong>築起實體警戒線與防爆沙包牆，嚴防恐慌人群在交通中斷、物資匱乏之際哄搶救命物資。勤務同工指派紅色Runner（專屬臂章徒步傳令兵）站在莊敬街與瑞光路等聯外交叉路口，實施人工交通導引，清理所有違停與擁堵車流，開闢一條寬度不小於<strong>3.5公尺之緊急醫療救護通道</strong>，保障轉運與補給車隊能以最快速度切入恩慈大樓，死守物資生命線。</p><p><strong>確實數據與資源規劃</strong>： 勤務組每日定時精算並向 HICS指揮中心回報「車輛物資消耗與續航能力」：本院現有 3 輛救護車單波次可載運15 人，4 輛中巴單波次可批量轉送 74人。為因應持久作戰，勤務組將備用柴油存量、水資源狀態（地下戰備水井日產1,958 噸）及生活乾糧消耗速率進行精準庫存控管，確保本院在無外部物資補充之「資訊與物理孤島狀態」下，車隊與後勤運補能自撐至少<strong>72 小時</strong> 以上。</p><p><strong>指揮與管制（HICS 對接）</strong>：勤務組長陶大屏隨時將車輛出勤狀態、備用柴油及氧氣運補缺口數據，以有線電話或定頻無線電向後勤部長許慧莉（公務機簡碼61658） 報告，隨時更新至 HICS 戰情面板（https://ci-board.ptch.org.tw）。</p>"}]}]}], "scenarioIndex": [{"stage": 2, "id": "01", "title": "軍事威脅升溫", "datetime": "8月7日 18:00", "summary": "中國東部戰區自福建、廣東沿海持續動員海、空及後勤部隊，逐步完成整備，並對臺南、高雄、屏東及臺東外海重要航道實施封控與威懾，同時配合心理戰傳達政治意志，南部地區安全情勢快速惡化。"}, {"stage": 2, "id": "02", "title": "軍事威脅／飛彈", "datetime": "8月8日 10:00", "summary": "國防部發布監測資訊，指出自大陸沿岸方向朝臺灣周邊海空域發射多枚飛彈，部分彈道飛越臺灣本島上空，另有飛彈落入周邊海域；相關訊息經媒體即時報導，引發民眾對戰爭風險之疑慮，影響社會穩定。"}, {"stage": 2, "id": "03", "title": "軍事動員演習", "datetime": "8月8日 12:00", "summary": "因應敵情發展，屏東地區國軍常備及後備部隊奉令實施「動員演習」，依計畫進入戰術位置並進行兵力、裝備整備與戰場經營；惟部分未完成簽證之物資（如阻絕器材、工程材料及偽裝資材）出現缺口，縣府協調民間通路緊急採購及調度現貨，並由第四作戰區統籌分配。"}, {"stage": 2, "id": "04", "title": "民力協調", "datetime": "8月8日 16:00", "summary": "第四作戰區因動員演習需求，透過屏東縣「動員暨民力協調組」協請縣政府提供200組水泥紐澤西護欄，並協力運送至台17線雙園大橋屏東端、東港大橋及台1線枋寮段等指定地點，執行交通阻絕與防護部署。"}, {"stage": 2, "id": "05", "title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "屏東縣政府內部通訊群組轉傳媒體與社群運用公開航情、船舶追蹤程式所呈現之資訊，並據以研判臺灣周邊海空域情勢；惟內容未經完整查證即快速擴散與再解讀，形成片面推論，加劇民眾對安全情勢之不安。"}, {"stage": 2, "id": "06", "title": "認知作戰／假訊息", "datetime": "8月8日", "summary": "敵對勢力運用社群平台、網路直播、新聞流量及AI生成影像，密集操作「南部已被放棄」、「政府錯判情勢拖入戰爭」、「沿海居民將無法撤離」等敘事，企圖干擾政治與作戰準備節奏，造成屏東地區民眾恐慌。"}, {"stage": 2, "id": "07", "title": "縣政府先期整備", "datetime": "8月8日 12:00", "summary": "因應整體情勢升高及可能衝擊民生與社會穩定之風險，屏東縣政府啟動先期整備，完成聯合應變指揮管制中心、各鄉鎮市應變中心及防災協作中心之功能編組，並盤點人力、物資、避難空間與關鍵資源。"}, {"stage": 2, "id": "08", "title": "關鍵基礎設施異常", "datetime": "8月9日 08:00", "summary": "高屏地區天然氣輸配與能源監控系統出現異常警示，部分壓力調節與輸送數據波動，遠端連線紀錄出現非常態來源及通訊中斷；初步研判為控制系統異常或疑似資訊干擾，致南部供氣壓力下降約15%至20%，影響區域能源穩定。"}, {"stage": 2, "id": "09", "title": "天然氣管線異常", "datetime": "8月9日", "summary": "連接永安液化天然氣接收站與南部供氣網之管線傳出異常警示，監測系統顯示壓力快速下降及流量波動，天然氣輸送能力受限，造成高屏地區燃氣發電、工業及重要民生用氣調度困難。"}, {"stage": 2, "id": "10", "title": "通信干擾／假訊息", "datetime": "8月9日", "summary": "敵對勢力利用軟體定義無線電設備，於屏東火車站、潮州火車站及東港轉運站等人潮密集區架設偽裝行動基地台，干擾合法電信訊號並發送偽造緊急告警；另透過簡訊與社群誘導民眾下載不明應用程式，造成混淆與恐慌。"}, {"stage": 2, "id": "11", "title": "通信基礎設施異常", "datetime": "8月9日", "summary": "屏東、潮州及東港地區電信機房出現系統異常與網路延遲，並伴隨部分基地台通訊負載異常升高；部分區域出現訊號不穩與通話中斷，影響政府通報、金融交易、醫療聯繫及核心資料處理能力。"}, {"stage": 2, "id": "12", "title": "通信服務中斷", "datetime": "8月9日", "summary": "受通訊服務異常影響，屏東市、潮州鎮、東港鎮、枋寮鄉及恆春鎮等地區出現通訊不穩與網路中斷，波及政府通報與金融交易系統；坊間流傳即將「全縣斷網」等訊息，引發集中查詢並進一步加重系統負載。"}, {"stage": 2, "id": "13", "title": "軍事動員與社會反應", "datetime": "8月9日", "summary": "國軍依計畫進入戰術區域實施戰備整備，戰甲砲車及部隊機動畫面經民眾拍攝與媒體即時報導，引發社會關注並放大戰爭風險認知；第四作戰區協請屏東縣政府啟動資訊應處機制，共同發布事實訊息以穩定民心。"}, {"stage": 2, "id": "14", "title": "金融市場動盪", "datetime": "8月9日 09:00", "summary": "受地緣政治緊張局勢升高影響，臺灣股市出現恐慌性賣壓，外資大量賣超、資金外流，進一步加劇市場不安與民眾對資產安全之疑慮。"}, {"stage": 2, "id": "15", "title": "金融假訊息擠兌", "datetime": "8月9日 10:00", "summary": "社群平台散布「資金將遭凍結」、「金融系統不穩」及「特定族群提前轉移資產」等訊息，引發土地銀行屏東分行、第一銀行屏東分行及其他金融據點提領人潮；排隊與推擠造成民生路、中山路、廣東路等路段壅塞，影響救護與消防車輛通行。"}, {"stage": 2, "id": "16", "title": "金融擠兌擴大", "datetime": "8月9日 12:00", "summary": "擠兌情形經社群擴散後，帶動屏東市、潮州鎮、東港鎮及內埔鄉之農會、郵局與金融機構出現集中提領，造成現金調度壓力、營運負荷增加及周邊交通壅塞。"}, {"stage": 2, "id": "17", "title": "銀行擠兌應處", "datetime": "8月9日 13:00", "summary": "受金融交易系統異常影響，臺灣銀行屏東分行出現民眾集中提領情形，造成現金調度與營運壓力；警方即時派遣警力進駐，執行人潮疏導、秩序維護、重要設施警戒及交通管制作業。"}, {"stage": 2, "id": "18", "title": "認知作戰升溫", "datetime": "8月10日 12:00", "summary": "社群媒體流傳縣府官員與家屬優先撤離、重要物資已私下轉移等不實內容，並以截圖與短影音快速擴散，形塑權貴避險觀感，削弱民眾對政府信任，加劇恐慌並引發民眾質疑指揮體系運作。"}, {"stage": 2, "id": "19", "title": "物資供應短缺", "datetime": "8月11日 08:00", "summary": "部分奶粉與民生物資經銷商受市場短缺預期及價格波動影響，傾向保留庫存，進一步影響物流調度與通路補貨；屏東市、東港鎮等地受「嬰兒奶粉即將斷供」不實訊息影響，搶購與囤積行為擴大。"}, {"stage": 2, "id": "20", "title": "緊急命令／全國動員", "datetime": "8月13日 08:00", "summary": "總統依局勢發展於國安會議後發布緊急命令並實施全國動員，受徵用之人員與物資依通知向指定地點或聯合徵集場報到。屏東縣各警察分局完成召集令送達，縣府相關業管單位及屏東監理站同步執行物力動員徵購徵用書送達。"}, {"stage": 2, "id": "21", "title": "民生物資管制", "datetime": "8月13日", "summary": "屏東縣政府依緊急命令對食米、食用油、食用鹽、液化石油氣及嬰兒奶粉等法定必需品實施管制，盤點轄內存量並要求各通路配合限購，另優先保障醫療、收容、偏鄉及離島地區基本需求。"}, {"stage": 3, "id": "01", "title": "軍事機動管制", "datetime": "", "summary": "第四作戰區聯合運輸指揮處協調屏東縣聯合應變指揮管制中心及交通控制中心，管制國道3號九如、長治、麟洛、竹田、崁頂及南州交流道，以及台88線萬丹端、台17線雙園大橋屏東端等節點，建立軍事機動優先通行機制。"}, {"stage": 3, "id": "02", "title": "醫療降載危機", "datetime": "", "summary": "屏東基督教醫院於緊急命令發布後啟動醫療營運降載，暫緩非緊急門診、健檢與部分選擇性手術，以保全急重症核心量能；惟部分民眾無法接受措施，現場出現大量詢問、抱怨及情緒失控，院內外人潮聚集並影響就醫動線。"}, {"stage": 3, "id": "03a", "title": "動員物資延遲", "datetime": "", "summary": "原定報到之在地營造廠商重型機具（挖土機7部、裝載機5部及傾卸卡車10部）未於時限內抵達指定地點或徵集場；因部分機具仍在外地，且受高屏主要幹道壅塞與交通管制影響，無法如期轉運，致動員進度延滯。"}, {"stage": 3, "id": "03b", "title": "無人機偵察威脅", "datetime": "", "summary": "敵方初期運用多架次無人機對東港、大鵬灣、林邊、枋寮、枋山及恆春半島沿海實施偵察，並結合電子干擾誘發防空系統反應；屏東基督教醫院同步啟動院內防空避難機制，執行人員疏散、地下備援醫療空間轉換及急重症持續收治。"}, {"stage": 3, "id": "04", "title": "民生物資配給管制", "datetime": "", "summary": "行政院核定公告實施配給配售，中央供應站於公告起48小時內、地方配售站於72小時內完成開設。屏東縣政府成立民生必需品配售執行委員會，各鄉鎮市公所成立配售執行小組，並納入偏鄉與原住民族地區配送規劃。"}, {"stage": 3, "id": "05", "title": "水資源供應異常", "datetime": "", "summary": "屏東主要原水與供水系統受不明來源干擾，造成取水設施異常、輸水管線壓力波動及監控資料不一致，進一步影響屏北、內麟、林邊供水系統及牡丹水庫輸水調度；屏東市、麟洛、內埔、潮州、東港、林邊及佳冬部分地區出現間歇性停水。"}, {"stage": 3, "id": "06", "title": "停水民眾搶購", "datetime": "", "summary": "受停水影響，民眾大量湧入超市、加水站搶購瓶裝水與儲水容器；社群流傳「全縣即將全面停水」及「水源污染」等不實訊息，放大恐慌情緒，造成排隊人潮、交通壅塞及民眾對政府供水能力之疑慮。"}, {"stage": 3, "id": "07", "title": "恆春半島設施疏散評估", "datetime": "", "summary": "第四作戰區情資研判，恆春半島重要能源、輸電及通信設施可能成為優先攻擊目標，建議疏散周邊非必要人員，必要運轉與安全維持人員依計畫留守；同時調整恆春、車城及枋山地區配售站與救濟站物資配置。"}, {"stage": 3, "id": "08", "title": "無人機威脅關鍵設施", "datetime": "", "summary": "屏南地區重要能源與輸配電設施周邊出現不明來源無人機低空盤旋及定點停留，疑似進行設施偵查與目標標定，場站通報相關單位並加強警戒、反無人機與監控作業。"}, {"stage": 3, "id": "09", "title": "能源設施爆炸事故", "datetime": "", "summary": "屏南地區能源轉運及輸配電設施疑遭無人機攻擊，部分設備受損並引發局部爆炸與火勢，造成作業人員2人重傷、6人輕傷、另有3人失聯；能源與輸配電作業中斷，造成東港、林邊、佳冬、枋寮、潮州及屏東市部分區域停電，衝擊交通號誌、ATM、醫療與民生用電。"}, {"stage": 3, "id": "10", "title": "電力基礎設施攻擊", "datetime": "", "summary": "屏東市、潮州及東港地區多處一次變電所疑遭敵特工滲透破壞，設備異常並引發饋線跳脫，造成屏東市大範圍停電與電壓不穩，並波及麟洛、內埔、萬丹及潮州；縣府機關、屏東基督教醫院、產業園區與主要交通號誌均受影響。"}, {"stage": 3, "id": "11", "title": "糧食儲備設施縱火", "datetime": "", "summary": "萬丹、竹田、麟洛、潮州及崁頂等地多處碾米、糧食與物資儲存據點在短時間內同步發生縱火事件，造成部分倉儲設施受損與物資損失，影響區域糧食供應與物流調度，並引發市場恐慌。"}, {"stage": 3, "id": "12", "title": "警察局遭無人機攻擊", "datetime": "", "summary": "屏東縣警察局民防管制中心及屏東、潮州、東港、枋寮、恆春等分局同步遭多波次無人機攻擊，致防情通報與防空警報發布功能部分中斷；執勤警力出現傷亡，影響現場應變、治安與交通管制能力。"}, {"stage": 3, "id": "13", "title": "配售秩序混亂", "datetime": "", "summary": "受物資短缺與不實訊息影響，東港鎮、林邊鄉及佳冬鄉部分民生物資配售站因等候時間過長、民眾質疑分配不公而出現爭搶與推擠，導致配售秩序混亂，影響物資發放。"}, {"stage": 3, "id": "14", "title": "社會秩序惡化", "datetime": "", "summary": "因不實訊息持續擴散，群眾恐慌情緒升高，屏東市、潮州鎮及東港鎮陸續發生搶劫商家、藥局及配售站等案件；警方執勤能量受牽制，對社會治安與公共秩序造成嚴重衝擊。"}, {"stage": 3, "id": "15", "title": "油品廠火災事故", "datetime": "", "summary": "屏南產業園區某油品儲運廠疑遭不明來源破壞，儲槽設施受損並引發火勢，造成油品外洩與濃煙；事故影響台1線枋寮段、周邊產業與工程物料供應，並對交通維修能量及民生物資配送體系造成壓力。"}, {"stage": 3, "id": "16", "title": "廣播電視遭入侵", "datetime": "", "summary": "屏東地區有線電視播出系統與廣播電台遭不明人士入侵，部分播出系統被控制並持續插入異常訊號，內容涉及重塑國家認同及兩岸政治秩序等高度政治訊息，與正常節目交錯播出，造成資訊混淆與地方輿情升溫。"}, {"stage": 3, "id": "17", "title": "民生物資謠言與抗議", "datetime": "", "summary": "網路流傳嬰兒奶粉等民生物資短缺及縣府囤積物資之謠言，屏東縣政府前出現民眾群聚抗議並要求發放物資；另於內埔、潮州、東港等地出現不明傳單，宣稱可憑單領取物資或兌換貨幣，誘發錯誤期待與群聚行為。"}, {"stage": 4, "id": "01", "title": "敵軍登陸作戰", "datetime": "", "summary": "敵軍於東港、林邊及枋寮沿海展開登陸作戰，企圖突破沿岸防線並沿台17線、台1線向縱深推進；另於佳冬及枋山沿海發現登陸船團接近，並結合無人機偵察、火力打擊與電子干擾策應，顯示有擴大登陸規模之態勢。"}, {"stage": 4, "id": "02", "title": "敵前沿疏散決策", "datetime": "", "summary": "第四作戰區通報屏東縣聯合應變指揮管制中心，研判東港、林邊、佳冬及枋寮之台17線以西沿海聚落為敵我交戰前沿，居民滯留將面臨高度生命危險並影響部隊行動，建議立即分區疏散至內陸安全地區。"}, {"stage": 4, "id": "03", "title": "灘岸戰鬥傷亡", "datetime": "", "summary": "東港至枋寮沿海爆發灘岸戰鬥，部分建物及漁港設施受砲火波及，造成大量民眾傷亡；初步統計死亡28人、重傷36人、輕傷188人。另重要能源與通信設施遭敵特工滲透破壞，引發駐警與其對抗。"}, {"stage": 4, "id": "04", "title": "關鍵設施撤離", "datetime": "", "summary": "因戰線逼近，屏南地區能源、油料、通信與交通關鍵設施進入緊急應變階段，依計畫執行人員分批撤離、資料備援、關鍵設備停機保護及反資敵作為。"}, {"stage": 4, "id": "05", "title": "水產冷鏈設施受損", "datetime": "", "summary": "東港及枋寮地區水產冷凍、製冰與物流設施遭砲火波及，冷凍庫、製冰設備及關鍵管線受損，部分廠區起火，造成水產冷鏈與民生食品供應中斷。"}, {"stage": 4, "id": "06", "title": "供水系統遭破壞", "datetime": "", "summary": "屏北、內麟及林邊等供水系統疑遭敵特工滲透破壞，關鍵設備受損並造成供水異常，致屏東市、麟洛、內埔、東港、林邊及佳冬部分區域供水不穩或中斷；屏東基督教醫院啟動備援供水與用水分級管制。"}, {"stage": 4, "id": "07", "title": "收容與急救站衛生危機", "datetime": "", "summary": "東港臨海地區第1型急救站因戰線逼近撤離，出院後仍需照護之病人及醫護人力下轉至來義高中第2型急救站；因供水不穩、收容量快速增加及臨時儲水管理不當，出現群聚感染、環境衛生與情緒管理風險。"}, {"stage": 4, "id": "08", "title": "應變指揮中心受損", "datetime": "", "summary": "屏東縣聯合應變指揮管制中心遭無人機攻擊，建築物部分區域坍塌並起火，產生大量濃煙；研判指揮官及多名工作人員受困，傷亡不明，縣府立即啟動備援指揮所與跨區接替機制。"}, {"stage": 4, "id": "09", "title": "通信廣播設施摧毀", "datetime": "", "summary": "屏東地區主要廣播、無線電視及通信發射設施遭敵摧毀，造成大範圍訊號中斷、頻道停播與網路不穩；民眾無法正常接收新聞及官方訊息，資訊傳遞效能下降，不實訊息與社會不安進一步擴大。"}, {"stage": 5, "id": "01", "title": "交通幹道遭打擊", "datetime": "", "summary": "敵軍為阻止國軍兵力機動，針對高屏縱深運輸要道實施火力打擊，高屏大橋、雙園大橋及台鐵高屏溪橋梁受損，並波及屏東產業園區部分化學儲槽，造成交通中斷與複合災害；救援車流壅塞，影響搶救與後勤運補。"}, {"stage": 5, "id": "02", "title": "軍事機動支援", "datetime": "", "summary": "因多點交通阻斷，南部國軍增援與補給路線受影響；第四作戰區協調屏東縣聯合應變指揮管制中心執行道路搶通、橋梁安全評估及交通疏導，優先恢復軍事機動、醫療後送與後勤運補路線，並提供替代路線情資。"}, {"stage": 5, "id": "03", "title": "後備動員困難", "datetime": "", "summary": "因應戰況需求，後續動員屏東地區後備軍人約3,600人，惟民眾配合疏散撤離、人口流動頻繁，召集對象行蹤不易掌握；警察局持續協助送達召集令，仍面臨通訊中斷與回覆延宕，影響動員時效。"}, {"stage": 5, "id": "04", "title": "醫療後撤機制啟動", "datetime": "", "summary": "台17線以西戰況持續惡化，屏東基督教醫院評估院區安全與供應鏈風險升高，啟動分級後撤與病人分流：高度照護病人及隨行醫護轉送至其他急救責任醫院；可下轉或出院後仍需照護者送至來義高中第2型急救站，並同步撤收關鍵設備、藥材、血品及資訊備援。"}, {"stage": 5, "id": "05", "title": "大量死亡遺體處理", "datetime": "", "summary": "屏東地區累計死亡人數達352人，既有殯葬設施量能迅速飽和，遺體辨識、冷藏、運送及家屬聯繫面臨嚴重壓力；另有外籍旅客與移工家屬要求協尋，增加行政、翻譯及國際聯繫負荷。"}, {"stage": 5, "id": "06", "title": "物資配送受阻", "datetime": "", "summary": "部分沿海配售站與物流據點受砲火波及，縣府於戰火間隙清查受損情形、盤點可用物資並向內陸安全地區轉移；惟台17線及聯外道路受阻，配送動線受限，影響東港、林邊、佳冬及枋寮物資供應效率。"}, {"stage": 5, "id": "07", "title": "社福及產業移工滯留", "datetime": "", "summary": "大量社福、農漁業及產業移工因雇主照護功能受限、工作場所受損或聯繫中斷，安置需求未能即時掌握，聚集於屏東、潮州及枋寮車站周邊，形成臨時滯留，衍生生活保障、語言溝通與秩序維持壓力。"}, {"stage": 5, "id": "08", "title": "戰後穩定", "datetime": "", "summary": "國軍反擊作戰持續推進，屏東地區敵軍約2,000餘人棄械投降，由國軍依戰俘處理程序集中收容、清點識別及安全管制；戰場態勢逐步穩定，政府持續發布查證訊息，民心士氣與社會運作逐步回穩。"}, {"stage": 5, "id": "09", "title": "民生復原啟動", "datetime": "", "summary": "整體態勢由作戰階段轉入復原階段，中央與地方同步啟動民生恢復及基礎設施修復，優先辦理交通搶通、醫療與供水供電復原、治安維護、受災民眾安置及心理支持；國軍完成傷亡官兵救治、通報關懷及撫卹，地方整合民間資源投入復原。"}, {"stage": 1, "id": "01", "title": "認知作戰／心理戰", "datetime": "", "summary": "中國持續升高對臺複合式壓力，藉聯合演訓掩護兵力前推部署，逐步壓縮戰略預警空間；散布「國際支援難以介入」、「政府決策失靈」及「南部防線即將失守」等論述，企圖削弱民心士氣、動搖政府威信並擴大社會不安。"}, {"stage": 1, "id": "02", "title": "軍事威脅升溫", "datetime": "", "summary": "中國突宣布實施「破勢行動－2026A」，陸、海、空及火箭軍兵力於臺灣周邊海空域展開多向抵近與聯合戰備警巡，並劃設多處操演區；同時實施灰色地帶騷擾與準封鎖行動，臺海對峙態勢持續升高。"}, {"stage": 1, "id": "03", "title": "能源與漁業供應風險", "datetime": "", "summary": "屏東沿海地區（東港、林邊、佳冬、枋寮及恆春半島）海域作業受限，漁船出港比例下降約3至5成；高雄永安液化天然氣接收站船舶靠泊風險升高，南部天然氣與電力調度壓力增加。"}, {"stage": 1, "id": "04", "title": "軍事整備", "datetime": "", "summary": "國防部同步開設應變中心，運用情監偵系統強化全時預警監控，持續掌握敵情發展，並維持部隊適度戰備狀態，實施「立即備戰操演」。"}, {"stage": 1, "id": "05", "title": "動員整備", "datetime": "", "summary": "屏東縣後備指揮部協調縣政府消防、警政及相關局處進駐，開設「動員暨民力協調組」實施演練；同時轄內常、後備部隊依令進入戰術位置，預置支援地方應變及後續作戰所需人力與資源。惟資訊未即時對外說明，造成部分單位及民眾誤解，並遭外部認知作戰放大疑慮。"}, {"stage": 1, "id": "06", "title": "網路攻擊／資訊安全", "datetime": "", "summary": "屏東縣政府對外資訊服務系統中斷，縣府全球資訊網並遭網頁置換，影響即時發布應變、疏散及協同作戰資訊；相關畫面經媒體與社群反覆轉載後，進一步擴大輿情波動。"}, {"stage": 1, "id": "07", "title": "網路攻擊／通信中斷", "datetime": "", "summary": "灰色地帶騷擾持續升高，敵對勢力針對南部通信節點展開系統性攻擊，中華電信屏東、潮州及東港地區機房遭滲透與網攻，部分核心資料節點受損，造成行動通信、市話及網路服務不穩，線上交易與行動支付驗證異常。"}, {"stage": 1, "id": "08", "title": "能源供應中斷", "datetime": "", "summary": "受國際能源情勢緊張、海運受限及區域軍事活動升溫影響，天然氣供應波動加劇；南部燃氣機組配合調度降載運轉，區域發電出力下修約15%，部分地區採分段限電及輪替供電，進一步波及工業生產、醫療與民生用電。"}, {"stage": 1, "id": "09", "title": "認知作戰／假訊息", "datetime": "", "summary": "網路社群大量流傳中國領導人對臺談話內容，並同步散布「臺灣已遭封鎖」、「屏東能源與民生物資即將斷供」及「政府應變失能」等不實訊息，透過認知作戰操作擾動民眾預期，製造社會不安。"}, {"stage": 1, "id": "10", "title": "社會秩序事件", "datetime": "", "summary": "屏東地區因假訊息與恐慌情緒擴散，於屏東縣政府周邊、屏東火車站及潮州轉運站等人潮聚集區出現對特定對象指認、圍觀與言語衝突，並伴隨推擠與秩序混亂；相關影像快速傳播後，對公共安全與社會秩序形成壓力。"}, {"stage": 1, "id": "11", "title": "化學災害事故", "datetime": "", "summary": "（通勤尖峰）屏東科技產業園區某食品冷鏈廠之無水氨系統發生外洩，現場出現刺鼻氣味，多名人員頭暈、嘔吐及呼吸不適，初估約50餘人受影響，其中5人重症、15人需住院；氣體受西南風影響向東北擴散，波及園區周邊道路、台1線及縣道189線。"}, {"stage": 1, "id": "12", "title": "化學災害應變", "datetime": "", "summary": "屏東縣政府接獲「屏東科技產業園區疑似無水氨外洩」通報後，立即開設災害應變中心，統合消防、環保、衛生、警政及園區管理單位進行應處，執行警戒、疏散、除污與醫療分流，防止災情擴大。"}, {"stage": 1, "id": "13", "title": "醫療機構停電危機", "datetime": "", "summary": "屏東地區主要變電設備突發故障，致屏東基督教醫院雙迴路受電中斷，全院無預警停電，嚴重威脅手術中病人及ICU維生系統；備援發電機即時投入，惟1小時後其中一台出現高溫預警，整體供電能力降至約五成，院內燃油存量降至50%以下，急重症照護風險升高。"}, {"stage": 1, "id": "14", "title": "假訊息攻擊醫療", "datetime": "", "summary": "網路流傳屏東科技產業園區化學物質外洩、屏東基督教醫院受資安攻擊及醫療院所大停電等事件，並散布「疑似人為蓄意破壞」、「敵對勢力已滲透醫療系統」等未經證實訊息，經媒體與社群放大後，影響醫療運作與社會信心。"}, {"stage": 1, "id": "15", "title": "醫療量能衝擊", "datetime": "", "summary": "傷患陸續送往屏東基督教醫院等急救責任醫院，短時間內約40餘人就醫，院方啟動毒化災與大量傷患應變機制；同時醫療資訊系統遭勒索軟體及DDoS攻擊，電子病歷與掛號系統運作異常，影響急診收治、手術調度及病人辨識。"}, {"stage": 1, "id": "16", "title": "假訊息持續擴散", "datetime": "", "summary": "網路持續流傳化學物質外洩、醫院資安受攻擊及大規模停電等事件，並以剪輯影像及AI生成內容渲染「政府隱匿災情」、「醫院拒收病人」等說法，持續影響醫療秩序與民眾就醫信心。"}, {"stage": 1, "id": "17", "title": "中央整備啟動", "datetime": "", "summary": "中國於軍演期間刻意在臺灣周邊及本島多點製造局部衝突與擾亂事件，行政院邀集情資研判及相關分組主責機關召開應變整備會議，啟動先期整備事項，並要求各項應變措施與屏東縣政府同步運作。"}], "contacts": {"聯絡官": {"lead": "醫療發展副院長／萬樹人", "deputy": "行政副院長／黃雅芳", "unit": "院長室", "phone": "公務機簡碼 60315（代理 61414）"}, "HICS指揮中心（事故指揮官）": {"lead": "醫務副院長／劉思源", "deputy": "醫教副院長／施丞貴", "unit": "院長室", "phone": "公務機簡碼 69086（代理 69181）"}, "公關發言組（資源發展中心）": {"lead": "醫教副院長／施丞貴（發言官）", "deputy": "行政副院長／黃雅芳", "unit": "資源發展中心", "phone": "簡碼 69181（代理 61414）"}, "社工室": {"lead": "社工室主任／葉秀芳", "deputy": "各病房資深社工師", "unit": "社工室", "phone": "分機 20"}, "計畫部狀況分析處": {"lead": "計畫部長／陳志文（醫務部部長）", "deputy": "狀況分析小組長／蕭麗萍・莊詩蘋督導長", "unit": "計畫部・狀況分析處", "phone": "簡碼 69120（狀況分析組 69272／65311）"}, "財務／行政部會計組": {"lead": "會計室主任／李華敏", "deputy": "", "unit": "財務／行政部・會計組", "phone": "分機 24"}, "財務／行政部管理部與會計組": {"lead": "管理部部長／張隆鐘", "deputy": "會計室主任／李華敏", "unit": "財務／行政部", "phone": ""}, "財務／行政部人資組": {"lead": "人資室主任／劉淑梅", "deputy": "組長／戴雅佩", "unit": "財務／行政部・人資組", "phone": "分機 3977"}, "機構持續運作處／資通訊支援組（資訊室）": {"lead": "資訊長／蔡哲民", "deputy": "硬體組長", "unit": "資訊室", "phone": "公務機簡碼 62320"}, "後勤部設施設備維護處／工務室": {"lead": "工務室主任／曹宏益", "deputy": "", "unit": "後勤部・設施設備維護處", "phone": "公務機簡碼 61658／62020"}, "執行部設施運作組／環保室": {"lead": "環保室組長／林良哲", "deputy": "", "unit": "執行部設施運作組・環保室", "phone": ""}, "執行部安全管制處（醫勤室保安組）": {"lead": "保安組長／王建文", "deputy": "", "unit": "醫勤室・保安組", "phone": "公務機簡碼 69410"}, "執行部醫療照護處": {"lead": "醫療照護組長／徐禮平（副部長）", "deputy": "住院照護組・蕭麗萍督導長", "unit": "執行部・醫療照護處", "phone": "簡碼 69231／69272"}, "執行部醫療照護處／住院及重症照護組": {"lead": "護理部督導長／蕭麗萍", "deputy": "護理部督導長／陳素華", "unit": "住院及重症照護組", "phone": "簡碼 69272／69236"}, "執行部醫療照護處／血液透析與重症加護組": {"lead": "李羽仁主任", "deputy": "護理部督導長／陳素華", "unit": "血液透析組・重症加護組", "phone": ""}, "執行部醫療業務室暨病歷組": {"lead": "醫療業務室主任／馬事佐", "deputy": "", "unit": "醫療業務室暨病歷組", "phone": "分機 1022"}, "執行部醫療照護處／急診照護組": {"lead": "急診科主任", "deputy": "護理長／陳美錚", "unit": "急診照護組", "phone": "簡碼 69113"}, "後勤部任務支援組／採購資材組": {"lead": "採購室主任／邱芬娟", "deputy": "資材組長／吳佳蓉（另：採購組長包淑惠）", "unit": "後勤部任務支援組・採購／資材組", "phone": "分機 3932"}, "後勤部膳食供應處／營養室": {"lead": "營養室組長／徐桂婷", "deputy": "營養師／蔡佳紋", "unit": "後勤部膳食供應處・營養室", "phone": "分機 20"}, "後勤部勤務組／運輸組": {"lead": "醫勤室庶務組長／陶大屏", "deputy": "組長／吳哲維", "unit": "後勤部勤務組・運輸組", "phone": "簡碼 69400"}}, "contactsSource": "屏東縣政府2026城鎮韌性演習模擬答案.docx"};

const stageTabsEl = document.getElementById('stageTabs');
const stageDescEl = document.getElementById('stageDesc');
const scenarioSelectEl = document.getElementById('scenarioSelect');
const contentEl = document.getElementById('content');

const noMatchEl = document.getElementById('noMatch');
const searchInput = document.getElementById('searchInput');

const STAGE_SHORT = {
  '1': ['階段一', '狀況應處'],
  '2': ['階段二', '備戰部署'],
  '3': ['階段三', '戰力防護保存'],
  '4': ['階段四', '反登陸灘岸戰鬥'],
  '5': ['階段五', '縱深防禦持久作戰'],
};

const stageKeys = Object.keys(DATA.stageNames).sort((a,b)=>Number(a)-Number(b));
let currentStage = stageKeys[0];
let currentScenario = '';
let searchQuery = '';

function scenariosForStage(stage){
  return DATA.scenarioIndex.filter(s => String(s.stage) === String(stage))
    .sort((a,b)=> a.id.localeCompare(b.id, 'zh-Hant-u-kn-true'));
}

function renderStageTabs(){
  stageTabsEl.innerHTML = '';
  stageKeys.forEach(k=>{
    const list = scenariosForStage(k);
    const [main, sub] = STAGE_SHORT[k] || [DATA.stageNames[k], ''];
    const btn = document.createElement('button');
    btn.className = (k === currentStage) ? 'active' : '';
    btn.innerHTML = `<span class="tab-main">${main}</span><span class="tab-sub">${sub}（狀況${list[0]?.id}～${list[list.length-1]?.id}）</span>`;
    btn.addEventListener('click', ()=>{
      currentStage = k;
      currentScenario = '';
      renderAll();
    });
    stageTabsEl.appendChild(btn);
  });
}

function renderStageDesc(){
  const list = scenariosForStage(currentStage);
  const dts = list.map(s=>s.datetime).filter(Boolean);
  let range = '';
  if(dts.length){
    range = `演習期程：${dts[0]}${dts.length>1 ? ' ～ ' + dts[dts.length-1] : ''}。`;
  }
  const first = list[0];
  stageDescEl.innerHTML = `
    <div class="official-title">官方事件概述（${DATA.stageNames[currentStage]}）</div>
    <div class="official-body">${first ? `狀況${first.id}｜${first.title}：${first.summary}` : ''}</div>
    <div class="official-meta">本頁另涵蓋本階段全部 <b>${list.length}</b> 項狀況編號。${range}</div>
    <div class="official-source">資料來源：屏東縣城鎮韌性演習各階段狀況彙整20260721_各縣市整理版_.docx</div>`;
}

function renderScenarioSelect(){
  const list = scenariosForStage(currentStage);
  scenarioSelectEl.innerHTML = '<option value="">－ 依角色瀏覽本階段所有狀況 －</option>' +
    list.map(s=>`<option value="${s.id}">狀況${s.id}｜${s.title}</option>`).join('');
  scenarioSelectEl.value = currentScenario;
}

function highlightMatch(text, q){
  return text;

}

function matchesSearch(role, entry, catName){
  if(!searchQuery) return true;
  const hay = (catName+' '+role+' '+entry.scenario_id+' '+entry.scenario_title+' '+entry.summary+' '+entry.detail+' '+entry.html).toLowerCase();
  return hay.includes(searchQuery);
}

function contactBoxHtml(role){
  const c = DATA.contacts && DATA.contacts[role];
  if(!c) return '';
  const rows = [];
  if(c.lead)   rows.push(`<dt>主管</dt><dd>${c.lead}</dd>`);
  if(c.deputy) rows.push(`<dt>代理</dt><dd>${c.deputy}</dd>`);
  if(c.unit)   rows.push(`<dt>單位</dt><dd>${c.unit}</dd>`);
  if(c.phone)  rows.push(`<dt>電話</dt><dd>${c.phone}</dd>`);
  return `<div class="contact-box">
    <div class="contact-title">人員單位窗口：${role}</div>
    <dl class="contact-grid">${rows.join('')}</dl>
    <div class="contact-source">資料來源：${DATA.contactsSource || ''}</div>
  </div>`;
}

function entryHtml(entry, showScenarioTag){
  const tag = showScenarioTag ? `<span class="entry-tag">狀況${entry.scenario_id}</span>` : '';
  const dt = entry.datetime ? `<span class="entry-dt">${entry.datetime}</span>` : '';
  const summary = entry.summary ? `<div class="entry-summary">${entry.summary}</div>` : '';
  const detail = entry.detail ? `<div class="entry-detail">▸ ${entry.detail}</div>` : '';
  return `<div class="entry">
    <div class="entry-head">${tag}<span class="entry-title">${entry.scenario_title}</span>${dt}</div>
    ${summary}${detail}
    <div class="answer">${entry.html}</div>
  </div>`;
}

function renderByRole(){
  contentEl.innerHTML = '';
  let anyMatch = false;
  DATA.categories.forEach(cat=>{
    const roles = cat.roles
      .map(r=>({role:r.role, entries: r.entries.filter(e=>String(e.stage)===String(currentStage))}))
      .filter(r=>r.entries.length>0)
      .map(r=>({role:r.role, entries: r.entries.filter(e=>matchesSearch(r.role,e,cat.name))}))
      .filter(r=>r.entries.length>0);
    if(roles.length===0) return;
    anyMatch = true;
    const catDiv = document.createElement('div');
    catDiv.className = 'cat';
    catDiv.innerHTML = `<div class="cat-head"><span>${cat.name}</span><span class="count">${roles.length} 個角色</span></div>`;
    const rolesDiv = document.createElement('div');
    rolesDiv.className = 'roles';
    roles.forEach(r=>{
      const roleDiv = document.createElement('div');
      roleDiv.className = 'role';
      const entriesHtml = r.entries
        .sort((a,b)=>a.scenario_id.localeCompare(b.scenario_id,'zh-Hant-u-kn-true'))
        .map(e=>entryHtml(e, true)).join('');
      roleDiv.innerHTML = `
        <button class="role-head">
          <span class="role-name-wrap"><span class="role-name">${r.role}</span></span>
          <span class="role-count">${r.entries.length}</span>
          <span class="chev">▾</span>
        </button>
        <div class="role-body"><div class="role-body-inner">${contactBoxHtml(r.role)}${entriesHtml}</div></div>`;
      rolesDiv.appendChild(roleDiv);
    });
    catDiv.appendChild(rolesDiv);
    contentEl.appendChild(catDiv);
    catDiv.querySelector('.cat-head').addEventListener('click', ()=> catDiv.classList.toggle('collapsed'));
  });
  contentEl.querySelectorAll('.role-head').forEach(btn=>{
    btn.addEventListener('click', ()=> btn.closest('.role').classList.toggle('open'));
  });
  noMatchEl.style.display = anyMatch ? 'none' : 'block';
}

function renderByScenario(){
  contentEl.innerHTML = '';
  const scn = DATA.scenarioIndex.find(s=>String(s.stage)===String(currentStage) && s.id===currentScenario);
  if(!scn){ renderByRole(); return; }
  const banner = document.createElement('div');
  banner.className = 'scenario-banner';
  banner.innerHTML = `<span class="tag">狀況${scn.id}</span>
    <div class="title">${scn.title}</div>
    ${scn.datetime ? `<div class="dt">${scn.datetime}</div>` : ''}
    <div class="desc">${scn.summary || ''}</div>`;
  contentEl.appendChild(banner);

  let anyMatch = false;
  DATA.categories.forEach(cat=>{
    const roles = cat.roles
      .map(r=>({role:r.role, entries: r.entries.filter(e=>String(e.stage)===String(currentStage) && e.scenario_id===currentScenario)}))
      .filter(r=>r.entries.length>0)
      .map(r=>({role:r.role, entries: r.entries.filter(e=>matchesSearch(r.role,e,cat.name))}))
      .filter(r=>r.entries.length>0);
    if(roles.length===0) return;
    anyMatch = true;
    const catDiv = document.createElement('div');
    catDiv.className = 'cat';
    catDiv.innerHTML = `<div class="cat-head"><span>${cat.name}</span><span class="count">${roles.length} 個角色</span></div>`;
    const rolesDiv = document.createElement('div');
    rolesDiv.className = 'roles';
    roles.forEach(r=>{
      const roleDiv = document.createElement('div');
      roleDiv.className = 'role open';
      const entriesHtml = r.entries.map(e=>entryHtml(e, false)).join('');
      roleDiv.innerHTML = `
        <button class="role-head">
          <span class="role-name-wrap"><span class="role-name">${r.role}</span></span>
          <span class="chev">▾</span>
        </button>
        <div class="role-body"><div class="role-body-inner">${contactBoxHtml(r.role)}${entriesHtml}</div></div>`;
      rolesDiv.appendChild(roleDiv);
    });
    catDiv.appendChild(rolesDiv);
    contentEl.appendChild(catDiv);
    catDiv.querySelector('.cat-head').addEventListener('click', ()=> catDiv.classList.toggle('collapsed'));
  });
  contentEl.querySelectorAll('.role-head').forEach(btn=>{
    btn.addEventListener('click', ()=> btn.closest('.role').classList.toggle('open'));
  });
  noMatchEl.style.display = anyMatch ? 'none' : 'block';
}

function renderAll(){
  renderStageTabs();
  renderStageDesc();
  renderScenarioSelect();
  if(currentScenario){ renderByScenario(); } else { renderByRole(); }
}

scenarioSelectEl.addEventListener('change', ()=>{
  currentScenario = scenarioSelectEl.value;
  if(currentScenario){ renderByScenario(); } else { renderByRole(); }
});

searchInput.addEventListener('input', ()=>{
  searchQuery = searchInput.value.trim().toLowerCase();
  if(currentScenario){ renderByScenario(); } else { renderByRole(); }
});

renderAll();
</script>
</body>
</html>
