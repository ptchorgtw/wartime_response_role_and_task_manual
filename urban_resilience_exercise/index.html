  opts = opts || {};
  const q = opts.query || '';
  const tagText = opts.showStageTag ? `階段${entry.stage}・狀況${entry.scenario_id}` : (opts.showScenarioTag ? `狀況${entry.scenario_id}` : '');
  const tag = tagText ? `<span class="entry-tag">${tagText}</span>` : '';
  const dt = entry.datetime ? `<span class="entry-dt">${entry.datetime}</span>` : '';
  const summary = entry.summary ? `<div class="entry-summary">${highlightText(entry.summary, q)}</div>` : '';
  const detail = entry.detail ? `<div class="entry-detail">▸ ${highlightText(entry.detail, q)}</div>` : '';
  return `<div class="entry">
    <div class="entry-head">${tag}<span class="entry-title">${highlightText(entry.scenario_title, q)}</span>${dt}</div>
    ${summary}${detail}
    <div class="answer">${highlightHtml(entry.html, q)}</div>
  </div>`;
}

function renderByRole(){
  contentEl.innerHTML = '';
  let anyMatch = false;
  DATA.categories.forEach(cat=>{
    const roles = cat.roles
      .map(r=>({role:r.role, entries: r.entries.filter(e=>String(e.stage)===String(currentStage))}))
      .filter(r=>r.entries.length>0);
    if(roles.length===0) return;
    anyMatch = true;
    const catDiv = document.createElement('div');
    catDiv.className = 'cat collapsed';
    catDiv.innerHTML = `<div class="cat-head"><span class="cat-name">${cat.name}</span><span class="count">${roles.length} 個角色</span></div>`;
    const rolesDiv = document.createElement('div');
    rolesDiv.className = 'roles';
    roles.forEach(r=>{
      const roleDiv = document.createElement('div');
      roleDiv.className = 'role';
      const entriesHtml = r.entries
        .sort((a,b)=>a.scenario_id.localeCompare(b.scenario_id,'zh-Hant-u-kn-true'))
        .map(e=>entryHtml(e, {showScenarioTag:true})).join('');
      roleDiv.innerHTML = `
        <button class="role-head">
          <span class="role-name-wrap"><span class="role-name">${r.role}</span></span>
          <span class="role-count">${r.entries.length}</span>
          <span class="chev">▾</span>
        </button>
        <div class="role-body"><div class="role-body-inner">${contactBoxHtml(r.role)}${entriesHtml}</div></div>`;
      rolesDiv.appendChild(roleDiv);
    });
    catDiv.appendChild(rolesDiv);
    contentEl.appendChild(catDiv);
    catDiv.querySelector('.cat-head').addEventListener('click', ()=> catDiv.classList.toggle('collapsed'));
  });
  contentEl.querySelectorAll('.role-head').forEach(btn=>{
    btn.addEventListener('click', ()=> btn.closest('.role').classList.toggle('open'));
  });
  noMatchEl.style.display = anyMatch ? 'none' : 'block';
}

function renderByScenario(){
  contentEl.innerHTML = '';
  const scn = DATA.scenarioIndex.find(s=>String(s.stage)===String(currentStage) && s.id===currentScenario);
  if(!scn){ renderByRole(); return; }
  const banner = document.createElement('div');
  banner.className = 'scenario-banner';
  banner.innerHTML = `<span class="tag">狀況${scn.id}</span>
    <div class="title">${scn.title}</div>
    ${scn.datetime ? `<div class="dt">${scn.datetime}</div>` : ''}
    <div class="desc">${scn.summary || ''}</div>`;
  contentEl.appendChild(banner);

  let anyMatch = false;
  DATA.categories.forEach(cat=>{
    const roles = cat.roles
      .map(r=>({role:r.role, entries: r.entries.filter(e=>String(e.stage)===String(currentStage) && e.scenario_id===currentScenario)}))
      .filter(r=>r.entries.length>0);
    if(roles.length===0) return;
    anyMatch = true;
    const catDiv = document.createElement('div');
    catDiv.className = 'cat collapsed';
    catDiv.innerHTML = `<div class="cat-head"><span class="cat-name">${cat.name}</span><span class="count">${roles.length} 個角色</span></div>`;
    const rolesDiv = document.createElement('div');
    rolesDiv.className = 'roles';
    roles.forEach(r=>{
      const roleDiv = document.createElement('div');
      roleDiv.className = 'role';
      const entriesHtml = r.entries.map(e=>entryHtml(e, {showScenarioTag:false})).join('');
      roleDiv.innerHTML = `
        <button class="role-head">
          <span class="role-name-wrap"><span class="role-name">${r.role}</span></span>
          <span class="chev">▾</span>
        </button>
        <div class="role-body"><div class="role-body-inner">${contactBoxHtml(r.role)}${entriesHtml}</div></div>`;
      rolesDiv.appendChild(roleDiv);
    });
    catDiv.appendChild(rolesDiv);
    contentEl.appendChild(catDiv);
    catDiv.querySelector('.cat-head').addEventListener('click', ()=> catDiv.classList.toggle('collapsed'));
  });
  contentEl.querySelectorAll('.role-head').forEach(btn=>{
    btn.addEventListener('click', ()=> btn.closest('.role').classList.toggle('open'));
  });
  noMatchEl.style.display = anyMatch ? 'none' : 'block';
}

function renderSearchResults(){
  contentEl.innerHTML = '';
  const q = searchQuery;
  let anyMatch = false;
  let totalEntries = 0;
  let totalRoles = 0;
  const stagesHit = new Set();
  DATA.categories.forEach(cat=>{
    const roles = cat.roles
      .map(r=>({role:r.role, entries: r.entries.filter(e=>matchesSearch(r.role,e,cat.name))}))
      .filter(r=>r.entries.length>0);
    if(roles.length===0) return;
    anyMatch = true;
    totalRoles += roles.length;
    const catDiv = document.createElement('div');
    catDiv.className = 'cat collapsed';
    catDiv.innerHTML = `<div class="cat-head"><span class="cat-name">${highlightText(cat.name,q)}</span><span class="count">${roles.length} 個角色</span></div>`;
    const rolesDiv = document.createElement('div');
    rolesDiv.className = 'roles';
    roles.forEach(r=>{
      totalEntries += r.entries.length;
      r.entries.forEach(e=>stagesHit.add(e.stage));
      const roleDiv = document.createElement('div');
      roleDiv.className = 'role';
      const entriesHtml = r.entries
        .sort((a,b)=> Number(a.stage)-Number(b.stage) || a.scenario_id.localeCompare(b.scenario_id,'zh-Hant-u-kn-true'))
        .map(e=>entryHtml(e, {showStageTag:true, query:q})).join('');
      roleDiv.innerHTML = `
        <button class="role-head">
          <span class="role-name-wrap"><span class="role-name">${highlightText(r.role,q)}</span></span>
          <span class="role-count">${r.entries.length}</span>
          <span class="chev">▾</span>
        </button>
        <div class="role-body"><div class="role-body-inner">${contactBoxHtml(r.role)}${entriesHtml}</div></div>`;
      rolesDiv.appendChild(roleDiv);
    });
    catDiv.appendChild(rolesDiv);
    contentEl.appendChild(catDiv);
    catDiv.querySelector('.cat-head').addEventListener('click', ()=> catDiv.classList.toggle('collapsed'));
  });
  contentEl.querySelectorAll('.role-head').forEach(btn=>{
    btn.addEventListener('click', ()=> btn.closest('.role').classList.toggle('open'));
  });
  noMatchEl.style.display = anyMatch ? 'none' : 'block';
  searchMetaEl.textContent = anyMatch
    ? `找到 ${totalEntries} 筆符合結果，共 ${totalRoles} 個角色、分布於 ${stagesHit.size} 個階段（可點擊下方項目查看，或改用階段頁籤離開搜尋）`
    : '';
}

function renderAll(){
  renderStageTabs();
  if(searchQuery){
    stageDescEl.style.display = 'none';
    scenarioPickerEl.style.display = 'none';
    renderSearchResults();
  } else {
    stageDescEl.style.display = '';
    scenarioPickerEl.style.display = '';
    renderStageDesc();
    renderScenarioSelect();
    searchMetaEl.textContent = '';
    if(currentScenario){ renderByScenario(); } else { renderByRole(); }
  }
  expandAllBtn.textContent = '全部展開';
}

expandAllBtn.addEventListener('click', ()=>{
  const cats = document.querySelectorAll('.cat');
  const anyCollapsed = Array.from(cats).some(c=>c.classList.contains('collapsed'));
  cats.forEach(c=> c.classList.toggle('collapsed', !anyCollapsed));
  expandAllBtn.textContent = anyCollapsed ? '全部收合' : '全部展開';
});

scenarioSelectEl.addEventListener('change', ()=>{
  currentScenario = scenarioSelectEl.value;
  if(currentScenario){ renderByScenario(); } else { renderByRole(); }
});

searchInput.addEventListener('input', ()=>{
  searchQuery = searchInput.value.trim().toLowerCase();
  searchClearEl.style.display = searchQuery ? 'flex' : 'none';
  renderAll();
});

searchClearEl.addEventListener('click', ()=>{
  searchInput.value = '';
  searchQuery = '';
  searchClearEl.style.display = 'none';
  renderAll();
  searchInput.focus();
});

renderAll();
</script>
</body>
</html>
